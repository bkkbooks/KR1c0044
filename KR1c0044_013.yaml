body:
  text: 欽定四庫全書欽定詩經傳說彚纂卷十一彤弓之什二之三彤弓弨尺昭反兮受言藏之我有嘉賓中心貺叶虛王反之鐘鼓既設一朝饗叶虛良反之集傳賦也彤弓朱弓也孔氏穎逹曰彤赤故言朱弓為弓者皆漆之以禦霜露色以赤者周之所尚故賜弓赤一而黑十以赤為重耳弨弛貌孔氏穎逹曰說文云弨弓反謂弛之而體反也嚴氏粲曰賜弓不張貺與也大飲賓曰饗孔氏穎逹曰饗者烹太牢以飲賔殽牲俎豆盛於食燕周語曰王饗有體薦燕有折俎公當饗卿當燕是其禮盛也劉氏彝曰行慶賞必與神人共之故行饗禮於廟此天子燕有功諸侯而錫以弓矢之樂歌也東萊呂氏曰受言藏之言其重也弓人所獻藏之王府以待有功不敢輕與人也中心貺之言其誠也中心實欲貺之非由外也一朝饗之言其速也以王府寶藏之弓一朝舉以畀人未嘗有遲留顧惜之意也後世視府藏為己私分至有以武庫兵賜弄臣者許氏謙曰漢哀帝建平四年上發武庫兵送侍中董賢及乳母王阿舍執金吾毋將隆奏武庫兵器天下公用今以給私門非所以示四方也則與受言藏之者異矣賞賜非出於利誘則迫於事勢至有朝賜鐵劵而暮屠戮者劉氏瑾曰如唐德宗於李懷光昭宗於王行瑜是也則與中心貺之者異矣屯膏吝賞功臣解體至有印刓玩平聲而不忍豫者許氏謙曰韓信言項羽之為人也見人慈愛言語嘔嘔至人有功當封爵者印刓敝忍不能豫此婦人之仁也則與一朝饗之者異矣集說劉氏彝曰湛露燕以示慈惠彤弓饗以訓恭儉慈惠以布政則貴舒緩故飲至夜而不為過所以致其厚而已恭儉以行禮則貴謹飭故饗在朝而不為速所以致其欽而已輔氏廣曰守之者不重則得之者亦輕豫之而不誠則其感之也亦淺畀之而不速則其視之也亦玩而不以為恩也然其所以重所以誠所以速者非懼其得之輕感之淺視之玩也盡吾之理而已嚴氏粲曰肜弓非常賜也鐘鼓大樂也饗盛禮也設盛所以重彤弓之賜也黃氏佐曰言彤弓則彤矢玈弓矢可知舉其重也司馬法曰賞不踰時欲其速得為善之利也首二句乃追言前日弓矢之所藏以起今日錫之之意以見其重如此也彤弓弨兮受言載叶子利反之我有嘉賓中心喜叶去聲之鐘鼓既設一朝右音又叶于記反之集傳賦也載抗之也劉氏瑾曰載彤弓於弓檠抗弓體使正言其藏之謹也喜樂也右勸也朱氏公遷曰燕飲之際勸以助歡尊也王氏安石曰尊而右之謝氏枋得曰古人以右為尊彤弓弨兮受言櫜古刀反叶古號反之我有嘉賓中心好呼報反之鐘鼓既設一朝酬市由反叶大到反之集傳賦也櫜韜陸氏德明曰櫜弓衣也徐氏鳯彩曰韜之於弓囊使其色常新也好說酬報也飲酒之禮主人獻賓賓酢主人主人又酌自飲而遂酌以飲賓謂之酬酬猶厚也王氏安石曰主既獻賔既酢則報施足矣於是有酬焉則所以為厚也勸也朱氏公遷曰酬以導飲故以為勸集說曹氏粹中曰其藏之也必載之於高燥之處其載之也必櫜之以韜鞬之物蓋言其甚實惜之也謝氏枋得曰饗之未足而右之右之未足而酬之此亦中心喜好之實也總論呂氏大臨曰天子賜有功諸侯必曰中心貺之喜之好之者言是錫也非以為儀也出於吾情而非勉也饗之右之酬之者言功之大者情必厚情之厚者賜必多賜之多者儀必盛所謂本末情文無所不稱者也輔氏廣曰大抵此詩首章已盡其意下兩章只是詠歎以加重焉耳櫜重於載載重於藏好誠於喜喜誠於貺酬厚於右右尊於饗曹氏居貞曰王者於賞功之物始而不知重其物則必有輕視之心而人亦䙝之矣終而不出於誠心又吝而不果則人雖得之亦不以為恩矣故未有功之時則藏之也不敢輕既有功之時則誠心與之而無所惜王者賞功之大權當如是矣彤弓三章章六句集傳春秋傳朱氏公遷曰文公四年寧武子曰諸侯敵王所愾音慨而獻其功於是乎賜之彤弓一彤矢百玈音盧弓矢千以覺報宴注曰愾恨怒也覺明也謂諸侯有四夷之功王賜之弓矢又為歌彤弓以明報功宴樂鄭氏曰凡諸侯賜弓矢然後專征伐東萊呂氏曰所謂專征者如四夷入邉臣子篡弒不容待報者其它則九伐之法乃大司馬所職非諸侯所專也與後世強臣拜表輒行者異矣朱氏公遷曰晉桓溫北伐劉牢之討孫恩皆拜表輒行其專擅如此集說黃氏櫄曰周平王束遷晉文侯有功焉王賜之以彤弓一肜矢百其後襄王以文公有獻楚俘之功而命之宥亦賜之彤弓一彤矢百夫以周室既衰賞罰無章而彤弓之賜必待有功況盛時乎胡氏一桂曰陳氏曰春秋所載皆謂諸侯有功則王賜之肜弓以旌伐功而巳未曽謂既賜得專征也王制言賜弓矢然後征蓋言天子命諸侯征伐故賜弓矢以將王靈耳菁菁子丁反者莪五何反在彼中阿既見君子樂音洛且有儀叶五何反集傳興也陳氏植曰此篇朱子舊以為比今改為興而下文兼存比說矣但二章三章比字皆失改今悉正之菁菁盛貌莪蘿蒿也陸氏璣曰莪蒿也一名蘿蒿生澤田漸洳之處葉似邪蒿而細科生三月中莖可生食又可蒸香美味頗似蔞蒿是也中阿阿中也大陵曰阿君子指實客也此亦燕飲賓客之詩言菁菁者莪則在彼中阿矣既見君子則我心喜樂而有禮儀矣或曰比也輔氏廣曰今於或曰下少比也二字當改定朱氏公遷曰今從輔氏說增之以菁菁者莪比君子容貌威儀之盛也下章放此集說輔氏廣曰既見君子則我心喜樂而有禮儀夫見賢而樂禮或不足則愛心雖至而敬心不至也樂且有儀則愛敬之心兩盡矣胡氏紹曽曰既見者舊以為下之見上朱子以為上之見下徐氏鳯彩曰菁莪而在中阿中阿之幸興君子而既見豈非主人之樂乎樂且有儀情發於外則有獻酬幣帛之文也附録毛氏萇曰君子能長育人材如阿之長莪菁菁然鄭氏康成曰既見君子者官爵之而得見也孔氏穎逹曰言菁菁然茂盛者蘿蒿也此蘿蒿所以得茂盛者由生在阿中得阿之長養故茂盛以興德盛者是學士也此學士所以致德盛者由升在彼學中得君之長育故使德盛此學士既見君子則心喜樂且又有禮儀見接也嚴氏粲曰莪蒿雖微物美而可食故以喻人材言君子能長育人材無微不遂也既見此能育材之君子則莫不喜樂而有威儀樂見良心之興起有儀見善教之作成菁菁者莪在彼中沚音止既見君子我心則喜集傳興也中沚沚中也喜樂也集說輔氏廣曰我心則喜則又獨言其樂之之意也徐氏鳯彩曰莪生澤國沮洳之地尤其性所近也我心則喜愛根於中則有聲音色笑之洽也附録李氏公凱曰喜其使我為成德逹材之歸也何氏楷曰因育材之有地喜已材之得成也菁菁者莪在彼中陵既見君子錫我百朋集傳興也中陵陵中也古者貨貝五貝為朋孔氏穎逹曰五貝者漢書食貨志以為大月牡貝么貝小貝不成貝為五也言為朋者為小貝以上四種各二貝為一朋而不成者不為朋鄭因經廣解之言有五種之貝貝中以相與為朋非總五貝為一朋也錫我百朋者見之而喜如得重貨之多也集說鄒氏泉曰常情好貨錫百朋則喜今我得見君子其喜之之情有如是此以形容得見而喜之之情非以得重貨形容得賢也附録鄭氏康成曰賜我百朋得祿多言得意也王氏安石曰彼厚之以祿則士之材成矣樂其成吾材而又能用我也豈特為厚祿乎哉范氏祖禹曰錫我百朋言獲益於王之多也泛泛芳劒反楊舟載沉載浮既見君子我心則休集傳比也楊舟楊木為舟也載則也載沉載浮猶言載清載濁載馳載驅之類以比未見君子而心不定也輔氏廣曰此又追言其未見之時休者休休然言安定也朱氏公遷曰此據今而言之集說黃氏震曰載沉載浮者言舟泛泛水中或上或下不定之貌戴氏云泛然不繫未有定止此說得之謝氏枋得曰書曰作德心逸日休又曰其心休休焉我心則休者歡樂而舒泰又不止於喜樂也附録嚴氏粲曰楊舟泛泛然於水中無所維繫或沉或浮未可知也猶人材泛泛然於天下無所依歸或成或壞亦未定也今見此君子能長育之則人材皆可以成就故我心休休然安樂也總論朱氏公遷曰首章喜樂有禮儀近乎外貌故次章以我心則喜言見其由中逹外也三章錫我百朋則甚遂其所欲四章言昔憂今喜則大遂其所願皆以見其真誠之心非僞也鄒氏泉曰此詩燕賔道其既見而喜喜而追反其昔日之思其悅賢之至藹然見於歌詠矣附録范氏處義曰中阿中沚中陵皆地之美有潤澤以養草木故得遂其性也百朋言錫豫之多也學校者人君養材之地有師友之訓有絃誦之習校試有法庖廩有繼所以待士者厚矣視莪之菁菁何足道哉然而人君之未視學也則不能不以為憂及人君之既視學則安得不樂安得不喜乎卒章自謂多士之材如以楊為舟可用以濟始者未見君子懼其不見用今既見君子故我心不復有私憂過計也朱子曰先王盛時家有孰黨有庠術有序國有學其制見於周官孟子與夫禮記漢儒之說者皆不同也蓋其詳不可得而考矣至以為教之以孝弟忠信詩書禮樂養其良知良能之善以俟其成德而賴其用焉則其意未嘗不同也故孟子曰學則三代共之皆所以明人倫也此所謂長育人材者能如是則天下喜樂之矣菁菁者莪四章章四句附録孔氏穎逹曰作菁菁者莪詩者樂育材也經四章言長養成就賜之官爵皆是育材之事也呂氏大臨曰法度以成天下之治法度雖具矣而非得人材則不能以自存故由鹿鳴至於彤弓其法度見於政事者如此其悉非得人材衆多有繼而不乏則無以垂裕於後此正小雅所以終之以此篇也陳氏鵬飛曰小雅二十二詩皆因其事而歌之也菁菁者莪之詩則宜何歌其天子行禮於學校燕飲而歌之與案菁菁者莪詩朱子初說從序義作君子能長育人材則天下喜樂為解後謂序失詩意改為燕飲賔客之詩然燕飲經亦無其文也考文王建豐水之辟雍而詩歎之曰於樂辟雍武王建鎬京之辟雍而詩詠之曰無思不服成王繼治修明學校造士之法備詳王制育材之盛蔑以加矣雖此詩未實指其事不能定其為何王而作然要是周公相成王時所制之樂歌也序主於育材自毛萇以下迄唐宋諸儒無異說朱子亦曾於他文引用序義則箋疏所詮繹者其論可竝存也六月棲棲音西戎車既飭音敕四牡騤騤求龜反載是常服叶蒲北反玁狁孔熾尺志反我是用急叶音棘王于出征以匡王國叶于逼反集傳賦也六月建未之月也濮氏一之曰詩言四月維夏六月徂暑則為夏正可知棲棲猶皇皇不安之貌戎車兵車也孔氏穎逹曰春官車僕掌戎路之倅廣車之倅闕車之倅屏車之倅輕車之倅注云此五者皆兵車所謂五戎也戎路王在軍所乘廣車橫陳之車闕車所用補闕之車也屏車所用對敵自蔽隱之車也輕車所用馳敵致師之車也是其等有五也飭整也王氏安石曰既飭者言其早正素治以待之也騤騤強貌王氏安石曰騤騤者馬之強而有節也常服戎事之常服以韎音昧韋梁氏益曰韎赤色韋熟皮為辨又以為衣而素裳白舄也周禮春官司服凡兵事韋辨服曹氏粹中曰軍中上下同服韎韋左傳謂之均服此謂之常服其義一也嚴氏粲曰韋辨服臨戰乃服未戰在道時載之於車也玁狁即獫狁北狄也孔甚熾盛匡正也輔氏廣曰匡有救正之意王國王畿也成康既沒周室寖衰八世而厲王胡㬥虐周人逐之出居於彘玁狁內侵逼近京邑劉氏瑾曰據詩文至于涇陽而言也王崩子宣王靖即位命尹吉甫帥師伐之有功而歸詩人作歌以序其事如此嚴氏粲曰吉甫受命北征此詩作於成功之後而述其受命之始也司馬法王氏逢曰穰苴田完之裔先為齊大司馬所著書名司馬法冬夏不興師朱氏公遷曰仁本篇云冬夏不興師所以兼愛民也今乃六月而出師者以玁狁甚熾其事危急鄭氏康成曰記六月者盛夏出兵明其急也故不得已而王命於是出征以正王國也集說謝氏枋得曰戎車曰既飭則車甲器械士卒馬牛皆平時盡備無一物不整齊矣四牡曰騤騤則戰馬皆平時閲習無一馬不精強矣曰載是常服則車中常服皆平時製造無一衣一裳不經檢點今特載之車上而已矣朱氏善曰玁狁內侵不得已而應之雖六月出師而人不以為暴者知其過之不在於君上蓋以為所以勞我者乃所以安我也比毗志反物四驪間之維則維此六月既成我服叶蒲北反我服既成于三十里王于出征以佐天子叶奬里反集傳賦也比物齊其力也孔氏穎逹曰比物者比同力之物凡大事祭祀朝覲㑹同毛馬而頒之凡軍事物馬而頒之毛馬齊其色物馬齊其力王氏逢曰見夏官校人吉事尚文武事尚強也則法也劉氏彝曰進退馳驅不失其則服戎服也三十里一舍也古者吉行曰五十里王氏逢曰吉行言行幸也如郊廟巡狩封禪之類師行日三十里既比其物而曰四驪則其色又齊孔氏穎逹曰戎事齊力尚強不取同色而言四驪者雖以齊力為主亦不厭其同色也無同色者乃取異毛耳可以見馬之有餘矣間習之而皆中法則又可以見教之有素矣毛氏萇曰言先教戰然後用師於是此月之中即成我服既成我服即日引道不徐不疾盡舍而止又見其應變之速從事之敏而不失其常度也劉氏瑾曰六月之中即成戎服則應變速矣我服既成即日引道則從事敏矣雖速雖敏而軍行止三十里則不失常度矣王命於此而出征欲其有以敵王所愾而佐天子耳集說王氏安石曰比物四驪間之維則者既言四牡騤騤矣又追本其比物而間之之事以美之也維此六月既成我服者既言載是常服矣又追本其成服之時以美之也輔氏廣曰馬之有餘教之有素則軍實之強可知矣六月成服行止有度則軍制之嚴又可知矣以佐天子則不止於正王畿而已鄒氏泉曰上六句言行師之善下則表其出師之意也此章與上章本是一時事互見之也四牡修廣其大有顒玉容反薄伐玁狁以奏膚公有嚴有翼共音恭武之服叶蒲北反共武之服以定王國叶于逼反集傳賦也修長廣大也顒大貌曹氏粹中曰修以言其身之長廣以言其腹背之充顒以言其首之大三者相稱所以成其大也季氏本曰言馬之大而有力乃其平時所物者如此奏薦膚大公功嚴威翼敬也范氏祖禹曰凡兵事莫尚於嚴莫先於敬共與供同服事也言將帥皆嚴敬以共武事也蘇氏轍曰嚴翼言將帥之德也集說輔氏廣曰此章車馬之盛足以薄伐玁狁而奏膚功矣薄伐則不窮追遠討也膚功則其功之成反大也兵陰事也用之當以嚴敬為主不嚴則不整不敬則不肅將帥皆嚴敬以共武事此王國之所以定也定則不止於匡矣有車馬為之用則足以却玁狁而成大功以嚴敬為之主則足以共武事而定王國吉甫之行師真足以繼南仲之軌迹矣玁狁匪茹如豫反整居焦穫音護侵鎬胡老反及方至于涇陽織音志文鳥章白旆央央於良反元戎十乘繩證反以先啓行叶户郎反集傳賦也茹度鄭氏康成曰言玁狁之來侵非其所當度為也整齊也孔氏穎逹曰整齊而處之者言其居周之地無所畏憚也焦穫毛氏萇曰焦穫周地接於玁狁者鎬方皆地名焦未詳所在穫郭璞以為瓠中王氏應麟曰爾雅十藪周有焦穫孫炎曰周岐周也郭璞注今扶風池陽縣瓠中是也則今在耀州三原縣也皇輿表耀州三原縣今西安府三原縣隸陜西鎬劉向以為千里之鎬則非鎬京之鎬矣前漢書劉向疏曰吉甫之歸周厚賜之其詩曰來歸自鎬我行永久千里之鎬猶以為遠顔氏師古曰鎬非豐鎬之鎬亦未詳其所在也方疑即朔方也劉氏瑾曰南仲亦以玁狁之難往城朔方靈夏等州之地則此玁狁所侵者疑即其地也涇陽涇水之北在豐鎬之西北言其深入為寇也織幟字同鳥章鳥隼之章也呂氏祖謙曰日月為常交龍為旗之類皆幟之文也鳥章特其一耳白旆繼旐者也曹氏粹中曰白帛也白旆以絳帛為旆也以帛續旐末為燕尾戰則旆之央央鮮明貌元大也戎戎車也軍之前鋒也毛氏萇曰夏后氏曰鉤車先正也殷曰寅車先疾也周曰元戎先良也孔氏穎逹曰司馬法文也先疾先良傳因名以解之元戎大車之善者故云先良也啓開行道也猶言發程也王氏安石曰軍前曰啓後曰殿元戎十乘以先軍行之前者所謂選鋒也兵法兵無選鋒曰北呂氏祖謙曰韓嬰章句曰車有大戎十乘謂車縵輪馬被甲衡軛之上盡有劒㦸名曰陷軍之車所以冒突先啓敵家之行伍也言玁狁不自度量深入為寇如此是以建此旌旗選鋒鋭進聲其罪而致討焉直而壯律而臧有所不戰戰必勝矣劉氏瑾曰左傳云師直為壯曲為老今因玁狁為寇而聲罪致討則直而壯夷易曰師出以律否臧凶今討玁狁而旌旗鮮明選鋒鋭進則律而臧矣集說曹氏粹中曰以匪茹之勢敢深入而為寇可以必勝於是始戰則所謂先計而後戰者也朱氏善曰玁狁惟不自度量故其大衆整齊既盤據於焦穫之閒其輕軍掩襲復時出入乎鎬方之地且逺及乎涇水之陽焉可謂熾矣於是建旗旄選鋒鋭以攘之元戎十乘則為馬四十匹甲士三十人其為步卒亦不過七百二十人而止耳數非加多也而玁狁之難已若不足平矣所以然者惟其辭直故其氣壯惟其用之以律故每事而盡善彼雖衆且盛又烏足以敵王者之師哉戎車既安叶於連反如輊竹二反如軒四牡既佶其乙反既佶且間叶胡田反薄伐玁狁至于大音泰原文武吉甫萬邦為憲叶許言反集傳賦也輊車之覆而前也軒車之却而後也凡車從後視之如輊從前視之如軒然後適調也佶壯健貌謝氏枋得曰戎車既安矣必曰如輊如軒制度工巧則利於戰鬭也四牡既強矣必曰既佶且間教訓習熟則耐於馳驅矣大原地名王氏應麟曰禹貢既修大原顔師古曰即今晉陽亦曰大鹵今在大原府陽曲縣皇輿表今大原府陽曲縣𨽻山西至于大原言逐出之而已不窮追也先王治戎狄之法如此呂氏祖謙曰前漢書嚴尤曰當周宣王時玁狁內侵至于涇陽命將征之盡境而還其視戎狄之侵譬猶蚊虻之螫驅之而已吉甫尹吉甫此時大將也憲法也非文無以附衆非武無以威敵能文能武則萬邦以之為法矣王氏安石曰能伐敵而攘之則吉甫之力於是美之陳氏鵬飛曰萬邦可以為憲法辦一玁狁是其所優為者集說輔氏廣曰此言其車之適調而安穩馬之壯健而間習逐出玁狁至于大原而已則吉甫之文武兼資德威竝用進止有度縱舍有法可謂全才矣萬邦安得不以之為法哉劉氏瑾曰上言吉甫共武之服必本於嚴翼之德末言吉甫飲至必及於孝友之友文事武備誠非兩途也北伐可見其武嵩高蒸民詩可見其文朱氏公遷曰上章歷數玁狁之罪則殄殲之不為過也況車馬整飭如此誅鋤翦滅乃其餘事今則薄伐之追至大原而已又不專稱吉甫之武而先美其文見其能協人心以禦侮非迫人強戰而取勝於敵也此章見用兵之道吉甫燕喜既多受祉來歸自鎬我行永久叶舉里反飲於鴆反御諸友叶羽已反炮白交反鱉膾鯉侯誰在矣張仲孝友叶羽已反集傳賦也祉福御進侯維也張仲吉甫之友也善父母曰孝善兄弟曰友毛氏萇曰使文武之臣征伐與孝友之臣處內此言吉甫燕飲喜樂多受福祉輔氏廣曰此吉甫私自與朋友燕飲而已非宣王燕之也朱氏公遷曰受福不在燕喜之外燕飲喜樂即所以為福也蓋以其歸自鎬錢氏文子曰鎬玁狁所侵之地嚴氏粲曰吉甫來歸自北方之鎬其地遙遠而行永久也是以飲酒進饌於朋友而孝友之張仲在焉言其所與宴者之賢所以賢吉甫而善是燕也集說王氏安石曰忠也者移孝以為之者也順也者移友而為之者也故言忠順之臣必及孝友之友嚴氏粲曰孝友者德之本卷阿言吉士曰有孝有德宣王之時朝多賢臣張仲獨以孝友稱則必盛德之士也美宣王北伐而以吉甫燕喜終之始終之辭也前日盛暑出師棲棲不遑所以有今日之燕喜也總論呂氏大臨曰上三章言自治之備四章言玁狁來侵從而禦之五章言治戎有備車馬安間驅之出境不窮追也六章言休兵飲至樂與孝友之臣同其燕樂則窮兵黷武之意消矣北伐之事所以自治者常優暇而有餘所治於彼者常簡略而不盡謝氏枋得曰一章曰戎車既飭四牡騤騤二章曰比物四驪間之維則三章曰四牡修廣其大有顒五章曰戎車既安如輊如軒四牡既佶既佶且間西北平原廣野舉目千里利於車戰故此詩以車馬為重鄒氏泉曰此詩之詞雖是稱美吉甫之功要歸美宣王能命將以成中興之業首二章原王命北伐之由也中三章敘將帥所以成功也末章言旋師之樂也六月六章章八句集說鄭氏康成曰六月言周室微而復興美宣王之北伐也孔氏穎逹曰此經六章皆是北伐之事毛意上四章說王自親行下二章說王還之後遣吉甫行故三章再言薄伐上謂王伐之下謂吉甫伐之也鄭以為獨遣吉甫王不自行王基云六月使吉甫采芑命方叔江漢命召公唯常武宣王親自征耳孫育亦以此篇王不自行鄭說為長朱子曰成康既沒文武之政侵尋弛壞至於夷厲而小雅盡廢矣宣王中興北伐南征以復文武之境土故序詩者詳記其所由廢興以發其端而小雅之見於經者於是變矣薄言采芑音起于彼新田于此菑側其反畝叶每彼反方叔涖音利止其車三千師干之試叶詩止反方叔率止乘其四騏四騏翼翼路車有奭許力反簟笰音弗魚服叶蒲北反鉤膺鞗音條革叶訖力反集傳興也芑苦菜也靑白色摘其葉有白汁出肥可生食許氏謙曰肥疏作脆亦可蒸為茹即今苦藚菜宜馬食軍行采之人馬皆可食也田一歲曰菑二歲曰新田三歲曰畬孔氏穎逹曰釋地文菑者災也畬和柔之意故孫炎曰菑始災殺其草木也新田新成柔田也畬和也田舒緩也郭璞曰今江東呼初耕地反草為菑是也曹氏粹中曰曰菑曰新田未成熟也曰畬始成熟矣故易曰不菑畬言其不勞力而可以享成功也方叔宣王卿士受命為將者也涖臨也其車三千法當用三十萬衆蓋兵車一乘甲士三人步卒七十二人又二十五人將重車在後凡百人也劉氏瑾曰兵車戰鬬之車駕馬所謂小車也重車輜重之車駕牛所謂大車也兵車一乘則士卒共七十五人重車一乘則將之者二十五人其中炊家子十人固守衣甲五人廏養五人樵汲五人然此亦極其盛而言未必實有此數也蘇氏轍曰其車三千以荆蠻強盛不得不爾耶朱子曰孔氏以為兼起鄉遂公邑之兵王氏謂㑹諸侯之師此皆以辭害意之過詩人但極其盛而稱之耳師衆干扞也試肄習也言衆且練也輔氏廣曰師衆之所以捍禦夫敵者又練習也鄒氏泉曰如五步六步之節六伐七伐之方無不間習是也率總率之也鄭氏康成曰率此戎車士卒而行也呂氏大臨曰涖止則布其行陳率止則作而用之翼翼順序貌路車戎路也奭赤貌簟笰以方文竹簟為車蔽也鉤膺馬婁頷有鉤而在膺有樊與鞶同有纓也樊馬大帶纓鞅央上聲也鞗革見蓼蕭篇宣王之時蠻荆背叛王命方叔南征軍行采芑而食故賦其事以起興曰薄言采芑則于彼新田于此菑畝矣方叔涖止則其車三千師干之試矣朱氏公遷曰新田在彼菑畝在此師衆如彼練習如此語正相應又遂言其車馬之美以見軍容之盛也集說蘇氏轍曰將采芑者于何取之其必于新田菑畝而後得之方其治田也則勞而及其采芑也則佚故宣王之南征則亦使方叔治其軍而後用之方叔之治軍也陳其車馬而試其衆以捍敵之法又親以身率之士之從之者皆知愛之是以美其車馬之飾而無厭也朱子曰南征蠻荆想不甚費力不曾大段戰鬭故只極稱其軍容之盛而已薄言采芑于彼新田于此中鄉方叔涖止其車三千旗旐央央方叔率止約軝祈支反錯衡叶户郎反八鸞瑲瑲七羊反服其命服朱芾音弗斯皇有瑲葱珩音衡叶户郎反集傳興也中鄉民居其田尤治約束軝轂也以皮纒束兵車之轂而朱之也孔氏穎逹曰說文云軝長轂也朱而約之謂以皮纒之而上加以朱漆也錯文也毛氏萇曰錯衡文衡也孔氏穎逹曰錯者雜也雜物在衡是有文飾鈴在鑣曰鸞馬口兩旁各一四馬故八也瑲瑲聲也彭氏執中曰荀子云錯衡以養目和鸞之聲以養耳則錯衡八鸞皆以為耳目之歡也命服天子所命之服也劉氏彝曰方叔出率則王命加等朱芾黃朱之芾也孔氏穎逹曰斯干傳曰天子純朱諸侯黃朱皆朱芾據天子之服言之也於諸侯之服則謂之赤芾耳皇猶煌煌也瑲玉聲蔥蒼色如蔥者也珩佩首橫玉也韓氏嬰曰佩玉上有葱衡下有雙璜衝牙蠙珠以納其閒曹氏粹中曰珩佩上之橫梁以蒼玉為之禮三命赤芾蔥珩孔氏穎逹曰三命以上至九命皆葱珩非謂方叔唯三命也集說程子曰旗旐央央言整肅首章言肄習次章言整肅蓋其序也其行也受服章之尊美言付之重彭氏執中曰此與上章言方叔率兵之時其精神氣焰見於旌旗車馬佩服之閒有以聳人觀聽其勝敵也必矣鴥惟必反彼飛隼息允反其飛戾天亦集爰止方叔涖止其車三千師干之試方叔率止鉦音征人伐鼓陳師鞠居六反旅顯允方叔伐鼓淵淵叶於巾反振旅闐闐徒顚反叶徒鄰反集傳興也隼鷂屬急疾之鳥也陸氏佃曰隼好翔一名雀鷹或曰隼鷙鳥也即今所呼為鶻者是戾至爰於也鉦鐃也鐲也伐擊也鉦以靜之鼓以動之鉦鼓各有人而言鉦人伐鼓互文也孔氏穎逹曰鐲鐃俱得以鉦名之鐲似小鐘鐃似鈴有大小之異耳凡軍進退皆鼓動鉦止非臨陳獨然是未戰時事也程子曰鉦人擊鉦者伐鼓擊鼓者方叔行師有鉦鼓為陳師鞠旅之節鞠告也二千五百人為師五百人為旅此言將戰陳其師旅而誓告之也陳師鞠旅亦互文耳淵淵鼓聲平和不㬥怒也謂戰時進士衆也振止旅衆也言戰罷而止其衆以入也春秋傳曰出曰治兵入曰振旅是也孔氏穎逹曰治兵尚威武也振旅反尊卑也出則幼賤在前貴勇力也入則尊老在前復常法也闐闐亦鼓聲也鄭氏康成曰戰止將歸又振旅伐鼓闐闐然或曰盛貌董氏逌曰闐闐衆行聲也程子曰振旅亦以鼓行金止言隼飛戾天而亦集於所止以興師衆之盛而進退有節如下文所云也集說程子曰此章言將之才士之衆且勇進退得宜趣舍有節曹氏粹中曰王師勇捷無敵而進退作止則惟方叔之命也輔氏廣曰上二章但言其車馬服飾之盛美而已故此章又以鳥之急疾興其猛鷙又以亦集爰止興其進退有節也其進退之有節者蓋以將戰而誓衆有法既戰而鼓聲不㬥戰罷振旅而入則又齊一而無先後也蠢尺允反爾蠻荆大邦為讎方叔元老克壯其猶方叔率止執訊音信獲醜叶尺由反戎車嘽嘽吐丹反嘽嘽焞焞吐雷反如霆如雷顯允方叔征伐玁狁蠻荆來威叶音隈集傳賦也蠢者動而無知之貌蠻荆荆州之蠻也王氏安石曰經或言蠻或言荆楚春秋之初曰荆而已後乃曰楚大邦猶言中國也元大猶謀也言方叔雖老而謀則壯也曹氏粹中曰凡謀則貴老決則貴壯此善謀而能決也劉氏瑾曰方叔以元老而率師則師卦所謂丈人所謂長子者也嘽嘽衆也焞焞盛也霆疾雷也方叔蓋嘗與於北伐之功者是以蠻荆聞其名而皆來畏服也王氏質曰方叔亦是與吉甫北伐之人六月不言者吉甫為帥方叔佐之此行方叔為帥併玁狁蠻荆之功結之於此詩也集說程子曰卒章言成功因言其致伐之由方叔克壯其猶故征而執獲戎車之盛如雷霆方叔之明信自伐玁狁時聞於四方故荆蠻畏威來服鄒氏泉曰來威非必不戰而服雖嘗用戰然以其名望之隆遽爾來服有不専主乎戰鬭之功矣姚氏舜牧曰示威重以加伐是謂克壯其猶然止於執訊獲醜而已斯老成之將也總論王氏安石曰前三章詳序其治兵末章美其成功出戰之事略而不言蓋以宿將董大衆荆人自服不俟戰而後屈也朱氏公遷曰一章二章啓行在道時也三章戰而獲勝時也四章則成功之後而言其獲勝之故也朱氏善曰南征之詩言其車三千者三以車之多可見其民之衆以民之衆可見其國之盛而凡其勞來於蕩析之餘還定於轉徙之後者其效益以著矣采芑四章章十二句集說陳氏鵬飛曰南征北伐二詩皆是班師時作六月之辭迫采芑之辭緩六月以討而定采芑以威而服也朱氏公遷曰玁狁匪茹犯義者也蠢爾蠻荆無知者也非文武之吉甫無以却玁狁非顯允之方叔無以威蠻荆二詩皆美當時將帥而因可以見宣王中興之功也我車既攻我馬既同四牡龐龐鹿同反駕言徂東集傳賦也攻堅程子曰既攻謂堅治同齊也傳曰宗廟齊豪尚純也戎事齊力尚強也田獵齊足尚疾也孔氏穎逹曰李巡曰祭於宗廟當加謹敬取其同色也某氏曰戎事謂兵革戰伐之事當齊其力以載干戈之屬舍人曰田獵取往於苑囿之中追飛逐走取其疾而已龐龐充實也東東都洛邑也周公相成王營洛邑為東都以朝諸侯周室既衰久廢其禮至於宣王內修政事外攘夷狄復文武之竟土修車馬備器械復㑹諸侯於東都因田獵而選車徒焉故詩人作此以美之首章泛言將往東都也集說嚴氏粲曰宣王中興為東都之㑹詩人喜於復見威儀之盛車既堅緻馬既齊力四牡皆龐龐而充實將駕之以往東都言初發車徒而往東都未言所為之事也朱氏善曰車攻馬同泛言其軍實之盛也四牡龐龐則自君子所乘者言之也軍政修治於間暇之時而四牡充實於啓行之日則可以駕言而徂東矣田車既好叶許厚反四牡孔阜符有反東有甫草叶此苟反駕言行狩叶始九反集傳賦也田車田獵之車鍾氏惺曰田車在周禮巾車謂之木路蓋朴素渾堅之制也好善也阜盛大也甫草甫田也後為鄭地今開封府中牟縣西皇輿表中牟縣屬開封府𨽻河南圃田澤是也鄭氏康成曰甫草者甫田之草也鄭有圃田孔氏穎逹曰下云搏獸于敖敖地名則甫草亦是地名故引爾雅以證之鄭有圃田釋地文也宣王之時未有鄭國圃田屬東都畿內故往田也劉氏瑾曰宣王嘗封庶弟於西都咸林之地是為鄭桓公其子武公當平王時徙封於東都然後圃田為鄭地此章指言將往狩于圃田也集說嚴氏粲曰此行以㑹同為主因講田獵耳詩先言行狩者序事當自內始故先言田獵車馬器械之備而從往行狩其實先㑹同而後田獵也姚氏舜牧曰上但言徂東此指言行狩見所徂在巡狩非徒行也之子于苖叶音毛選徒囂囂五刀反建旐設旄搏音博獸于敖集傳賦也之子有司也孔氏穎逹曰之子謂凡從王者非獨司馬官屬也朱子曰不敢斥王故以有司言之苖狩獵之通名也張子曰搜苗獮狩便習軍行草木閒事教茇舍亦然黃氏一正曰大司馬夏教茇舍遂以苖田義取其害苖者故獵可通名苗選數也囂囂聲衆盛也數車徒者其聲囂囂則車徒之衆可知且車徒不譁而惟數者有聲孔氏穎逹曰下云有聞無聲則在軍不得歡譁而云囂囂之聲故知惟數者有聲又見其靜治也敖近滎陽地名也呂氏祖謙曰敖山名晉師救鄭在敖鄗之閒士季設七覆於敖前則敖山之下平曠可以屯兵翳薈可以設伏也此章言至東都而選徒以獵也集說輔氏廣曰選徒囂囂言其衆且肅也既選其車徒矣則建設其旗旄焉見其序且整也方選徒以獵而遽曰搏獸于敖言其士衆之勇而氣大事小也徒手曰搏駕彼四牡四牡奕奕赤芾金舄㑹同有繹集傳賦也奕奕連絡布散之貌赤芾諸侯之服王氏安石曰諸侯涖其臣庶則朱芾君道也㑹同於王則赤芾臣道也金舄赤舄而加金飾亦諸侯之服也毛氏萇曰諸侯赤芾金舄舄逹屨也孔氏穎逹曰金舄者即禮之赤舄也加金為飾故謂之金舄赤舄則所尊莫是過故云逹屨時見曰㑹殷見曰同孔氏頴逹曰大宗伯文注云時見者無常期殷衆也繹陳列聯屬之貌也王氏安石曰繹者言其屬連而不絶若繹絲然也此章言諸侯來㑹朝於東都也集說劉氏彝曰赤芾金舄者服其命服以見王也來㑹同之國非一故絡繹不絶也朱氏善曰諸侯之來朝也其來也非一方其止也非一所先後之不同遠近之或異此其所以連絡而布散也及其會同於斯也五等各以其爵兩階各以其班尊卑之有其序貴賤之有其等此所以陳列而聨屬也讀是詩者可以想見當時朝㑹之盛矣徐氏鳯彩曰天子將行狩獵則同軌畢至故田獵未行朝會之儀先舉決拾既佽音次與柴叶弓矢既調讀如同與同叶射夫既同助我舉柴子智反集傳賦也決以象骨為之著於右手大指所以鉤弦開體嚴氏粲曰決即衛芄蘭所謂佩韘也拾以皮為之著於左臂以遂弦故亦名遂朱氏公遷曰放弦謂之遂詩詁云韜左臂拾其衣䄂以利弦故曰拾佽比也鄭氏康成曰謂手指相次比也調謂弓強弱與矢輕重相得也謝氏枋得曰弓既上弦必審視之端正則可用微有偏斜必加矯揉此弓之調也矢之輕重必視弓力之強弱弓強而矢輕則不中弓弱而矢重亦不中此矢之調也射夫蓋諸侯來㑹者孔氏頴逹曰射夫即諸侯也其大夫亦在獲射之中則此可以兼焉同協也柴說文作㧘謂積禽也梁氏益曰凡薪禽之積皆曰柴使諸侯之人助而舉之言獲多也曹氏粹中曰有餘力者又助我與積禽言不爭也此章言既㑹同而田獵也集說輔氏廣曰此章専言夫射田獵以射為主也射夫言諸侯獵則諸侯皆射也助我舉柴不惟見其獲之多又見其王師自足以辦事而諸侯但助之而已四黃既駕兩驂不猗於寄於箇二反不失其馳叶徒卧反舍音捨矢如破彼寄普過二反集傳賦也猗偏倚不正也馳馳驅之法也劉氏瑾曰五御之目三曰過君表五曰逐禽左即御田車馳驅之法也舍矢如破巧而力也蘇氏曰不善射御者詭遇則獲不然不能也今御者不失其馳驅之法而射者舍矢如破則可謂善射御矣此章言田獵而見其射御之善也朱氏公遷曰上章専言射此章兼言射御集說毛氏萇曰言習於射御法也鄭氏康成曰御者之良得舒疾之中射者之工矢發則中如椎破物也王氏安石曰向曰四牡既言力之強今曰四黃又言色之純也兩驂不猗御能正其馬也不失其馳車行節而法也舍矢知破矢行巧而力也蕭蕭馬鳴悠悠旆旌徒御不驚大庖蒲爻反不盈集傳賦也蕭蕭悠悠皆間暇之貌孔氏穎逹曰軍旅齊肅唯聞蕭蕭然馬鳴之聲見悠悠然旆旌之狀無有歡譁者徒步卒也御車御也驚如漢書夜軍中驚之驚劉氏瑾曰周亞夫傳亞夫擊吳楚深壁而守夜軍中驚頃之復定不驚言比匹志反卒事不喧譁也大庖君庖也不盈言取之有度不極欲也蓋古者田獵獲禽面傷不獻踐音翦毛不獻孔氏穎逹曰面傷謂當面射之翦毛謂在傍而逆射之不獻者嫌誅降之義不成禽不獻孔氏穎逹曰惡其害幼小擇取三等自左膘音縹許氏慎曰脅後髀前肉也而射之逹於右腢音愚陸氏德明曰謂肩前兩閒骨為上殺以為乾豆奉宗廟孔氏穎逹曰以其貫心死疾肉最潔美逹右耳本者次之以為賓客孔氏穎逹曰以其遠心死稍遲肉已微惡射左髀方爾反又薄禮反逹於右䯚餘繞反又胡了反梁氏益曰䯚水膁也膁腰左右虛肉處也為下殺以充君庖孔氏穎逹曰以其中脅死最遲肉又益惡每禽取三十焉每等得十朱氏公遷曰上殺中殺下殺為三等其餘以與士大夫習射於澤宮中者取之孔氏穎逹曰以大獸公之非復已物君賜使射故非中不取言嚮者田獵所取用勇力今射者禮樂所取用辭讓也是以獲雖多而君庖不盈也鄒氏泉曰惟取乎下殺而下殺惟得乎十數故不盈張子曰饌雖多而無餘者均及於衆而有法耳凡事有法則何患乎不均也舊說不驚驚也不盈盈也亦通鄭氏康成曰反其言而美之孔氏穎逹曰徒行者與御馬者豈不警戒乎言以相警戒也君之大庖所獲之禽不充滿乎言充滿也此章言其終事嚴而頒禽均也集說輔氏廣曰蕭蕭馬鳴悠悠旆旌見其整暇無始終之異也徒御不驚見其卒事而不驚擾也大庖不盈見其循禮守法而不從欲以取也夫力足以多取而不盡用焉此所以為王者之事也朱氏公遷曰行事從容馭軍整肅處已儉約待人周遍即此章可知之子于征有聞音問無聲允矣君子展也大成集傳賦也允信展誠也聞師之行而不聞其聲言至肅也信矣其君子也誠哉其大成也輔氏廣曰末二句乃美宣王也呂氏柟曰君子以德言大成以業言此章總敘其事之始終而深美之也集說嚴氏粲曰㑹同之事師徒衆盛由鎬至洛道路悠長非紀律嚴整其擾多矣觀者以田事之終而徒御整肅如此乃深美之言功業極盛無遺憾也朱氏善曰存於中而有興衰撥亂之志施於外而有內修外攘之事如此得不謂之君子乎靜治於往狩之初嚴肅於旋歸之際如此得不謂之大成乎此王道之所以為大而詩人所以贊美之也總論李氏樗曰車攻之詩其形容宣王之美可謂備矣既見其車馬之修又見其器械之備與夫諸侯之服射御之良此詩人之善形容也李氏公凱曰言宣王既能自治以全創業之國勢尤當自奮以合守成之人心故於車馬之大則修之器械之微則備之而往東都之地復新朝㑹之儀統一人心以為維持王業之計因講田獵之事而選車馬之美惡多寡以盡致治保邦之道焉車攻八章章四句集傳以五章以下考之恐當作四章章八句劉氏瑾曰五章六章通言其田獵射御七章八章通言其始終整肅而且音韻各相諧叶故疑其當以八句成章以此推之則合首章二章八句通言車馬盛備將往東都圃田之地合三章四章八句通言天子諸侯來會東都之事總為四章章八句也集說朱子語類時舉說車攻吉日二詩先生曰好田獵之事古人亦多刺之然宣王之田乃是因此見得其車馬之盛紀律之嚴所以為中興之勢者在此其所謂田異乎尋常之田矣吉日維戊叶莫吼反既伯既禱叶丁口反田車既好叶許口反四牡孔阜符有反升彼大阜從其羣醜集傳賦也戊剛日也黃氏一正曰外事以剛日內事以柔日內事如郊社宗廟冠昏外事如巡狩朝聘盟㑹治兵凡出郊皆是也伯馬祖也謂天駟房星之神也孔氏穎逹曰伯者長也馬祖始是長也鄭云馬祖天駟釋天云天駟房也孫炎曰龍為天馬故房四星謂之天駟鄭亦引孝經說曰房為龍馬是也嚴氏粲曰伯是馬祖之神言既伯是既有事於馬祖謂祭之也猶社是土神方是四方之神言以社以方則是祭社及方也既禱乃謂因祭而禱祈之也醜衆也謂禽獸之羣衆也此亦宣王之詩言田獵將用馬力故以吉日祭馬祖而禱之孔氏穎逹曰馬國之大用王者重之故夏官校人春祭馬祖夏祭先牧秋祭馬社冬祭馬步注云馬祖天駟先牧始養馬者馬社始乘馬者馬步神為災害馬者既四時各有所為祭之馬祖祭之在春其常也而將用馬力則又用彼禮以禱之既祭而車牢馬健於是可以歷險而從禽也以下章推之是日也其戊辰歟劉氏彝曰田之前二日也集說范氏處義曰將用馬之力必祭馬之祖謹其事也車攻而馬壯則升陵阜而從禽獸之醜類無不獲矣姚氏舜牧曰獵與狩皆賴車牢馬健以為用故車攻吉日皆有田車既好四牡孔阜句吉日庚午既差我馬叶滿浦反獸之所同麀音憂鹿虞麌愚甫反漆沮七徐反之從天子之所集傳賦也庚午亦剛日也程子曰戊日祭禱庚午于田差擇齊其足也同聚也鹿牝曰麀麌麌衆多也漆沮水名在西都畿內涇渭之北所謂洛水今自延韋流入鄜音孚坊至同州皇輿表鄜州今延安府鄜州坊州今延安府鄜州中部縣同州今西安府同州竝隸陕西入河也李氏樗曰禹貢所謂導渭自鳥鼠同穴東㑹于涇又東過漆沮即此漆沮是也故孔氏正義以明漆沮在涇水之東一名洛水與詩古公自土沮漆者别也此漆沮正周禮職方氏所謂雍州其浸渭洛雍州之地又非河南之洛也戊辰之日既禱矣越三日庚午遂擇其馬而乘之視獸之所聚麀鹿最多之處而從之惟漆沮之旁為盛宜為天子田獵之所也集說劉氏瑾曰此言差馬猶車攻言我馬既同也言漆沮之從猶車攻言甫草敖地彼則狩於東都此則狩於西都也黃氏佐曰天子之田或奉宗廟或進賔客或充君庖非禽獸之多不可此漆沮所以宜田獵也聸彼中原其祁孔有叶羽已反儦儦表驕反俟俟叶于紀反或羣或友叶羽已反悉率左右叶羽已反以燕天子叶奬里反集傳賦也中原原中也祁大也嚴氏粲曰其禽獸形體祁大又甚多有矣趣則儦儦行則俟俟嚴氏粲曰儦儦而疾走俟俟若相待獸三曰羣二曰友蘇氏轍曰言禽獸之多且擾也燕樂也言從王者視彼禽獸之多於是率其同事之人各共其事以樂天子也朱氏公遷曰或射或御各共其事也集說劉氏瑾曰此言率左右以樂天子猶車攻之射夫同而助舉柴也姚氏舜牧曰左右從王者之左右也凡王者搜狩必親執路鼓以御衆從王者不率左右以從事其何以愜天子之心故曰悉率左右以燕天子既張我弓既挾子洽户頰二反我矢發彼小豝音巴殪於計反此大兕徐履反以御賓客且以酌醴集傳賦也發發矢也豕牝曰豝一矢而死曰殪兕野牛也言能中微而制大也孔氏穎逹曰小豝云發言發則中之大兕言殪言射著即死朱氏公遷曰中微見其巧制大見其力御進也醴酒名周官五齊去聲二曰醴齊注曰醴成而汁滓相將如今甜酒也嚴氏粲曰坊記云醴酒在室醍酒在堂醴味甜於餘齊與酒味殊饗為盛禮惟王饗諸侯則設醴示不忘古禮之重也許氏謙曰周禮酒正五齊一曰泛齊二曰醴齊三曰盎齊四曰緹齊五曰沈齊注疏醴猶體也此齊熟時上下一體汁滓相將故名言射而獲禽以為俎實進於賓客而酌醴也蘇氏轍曰燕而也酌醴所以厚賔集說謝氏枋得曰田而得禽天子不以自奉故大庖不盈命有司以進賔客且以酌醴燕諸侯及羣臣也先王體羣臣懷諸侯常有恩惠其用心公溥而均齊常以一人養天下不以天下奉一人也劉氏瑾曰此言射者之善猶車攻言舍矢如破也言進禽於賔客亦猶車攻言大庖不盈之意也朱氏公遷曰車攻終於頒禽吉日終於酌醴王者之田獵豈為口腹計哉總論范氏處義曰詩人之美人君多舉一事終始言之以見其餘可知也田非重事也既謹日而祭馬祖又謹日以差我馬則必能致謹於國事矣因田而得禽非厚獲也猶為醴酒以御賔客則必能與之食天祿矣虞人既聚獸必於天子之所左右皆取禽共天子之燕則他日必能用命矣朱氏公遷曰一章祭禱戒行二章差馬擇地三章狩獵四章獵而獲禽可以供用也吉日四章章六句集傳東萊呂氏曰車攻吉日所以為復古者何也蓋搜狩之禮可以見王賦之復焉可以見軍實之盛焉可以見師律之嚴焉可以見上下之情焉可以見綜理之周焉欲明文武之功業者此亦足以觀矣輔氏廣曰王賦謂車馬之出軍實謂軍器之數師律謂進退之度上下之情諸侯及左右之人相率以共其事而天子又與之燕飲以為樂也綜理之周祭禱必講獵地必擇車馬有備射御有法終事嚴整頒禽之均酌醴之厚無一不至也集說蔣氏悌生曰車攻吉日雖皆田獵之詩車攻㑹諸侯於東都其禮大吉日専田獵不出西都畿內其事視車攻差小故二詩之辭其氣象大小詳略亦自不同鴻鴈于飛肅肅其羽之子于征劬其俱反勞于野叶上與反爰及矜棘冰反人哀此鰥寡叶果五反集傳興也大曰鴻小曰鴈孔氏穎逹曰鴻鴈俱是水鳥其形鴻大而鴈小肅肅羽聲也之子流民自相謂也征行也劬勞病苦也矜憐也老而無妻曰鰥老而無夫曰寡舊說周室中衰萬民離散而宣王能勞來還定安集之王氏安石曰勞者勞之來者來之往者還之優者定之危者安之散者集之故流民喜之而作此詩追敘其始而言曰鴻鴈于飛則肅肅其羽矣之子于征則劬勞于野矣朱氏公遷曰飛而有聲亦有行役劬勞之意故以起興且其劬勞者皆鰥寡可哀憐之人也然今亦未有以見其為宣王之詩後三篇放此集說蘇氏轍曰民人離散如鴻鴈之飛四方無所不往徒聞其羽聲肅肅未知所止也輔氏廣曰之子于征劬勞于野此民之流離者自相謂曰是子之行病苦於草野之中爰及矜人哀此鰥寡又言其所與行者無非可憐之人而就其中又惟鰥寡之可哀也鴻鴈于飛集于中澤叶徒洛反之子于垣音袁百堵丁古反皆作雖則劬勞其究安宅叶逹各反集傳興也中澤澤中也一丈為板五板為堵孔氏頴逹曰五板為堵謂纍五板也板廣二尺故周禮說一堵之牆長丈高一丈究終也流民自言鴻鴈集于中澤以興已之得其所止而築室以居今雖勞苦而終獲安定也集說鄭氏康成曰鴻鴈之性安居澤中今飛又集于澤中猶民去其居而離散今見還定安集蘇氏轍曰流民反其都邑築其牆垣而安處之然後民知所止雖勞不怨曰其終將安宅矣鴻鴈于飛哀鳴嗷嗷五刀反維此哲人謂我劬勞維彼愚人謂我宣驕叶音高集𫝊比也流民以鴻鴈哀鳴自比而作此歌也徐氏常吉曰鴻鴈之鳴哀故以為比亦見詩人取義之精哲知宣示也知者聞我歌知其出於劬勞不知者謂我閒暇而宣驕也韓詩云勞者歌其事魏風亦云我歌且謠不知我者謂我士也驕大抵歌多出於勞苦而不知者常以為驕也集說輔氏廣曰自其始之流離以及得所止而築室以居其病苦亦甚矣非明知者真能體恤我前日之情則亦焉能知其病苦之實哉若但見其今日之安定則必以我之此歌為閒暇而宣驕矣黃氏洪憲曰說愚人正見感哲人之意言哲人洞悉民隱故謂我劬勞彼愚人者慮不周於民瘼且謂我宣驕矣欲如哲人之知我得乎總論鄒氏泉曰一章追言在昔離散之苦二章述言今日還集之樂末章言由勞以逸是以作詩以述其慶幸之意感慨之情也前二章以鴻鴈引起之子故屬興末章言鴻鴈而不言之子故屬比沈氏守正曰詩作於安定之日痛定思痛其志則喜其情則哀故劬勞凡三見之鴻鴈三章章六句集說胡氏一桂曰此詩諸家皆本序說指之子為使臣然三章劬勞之義一章指使臣二章指民三章或指使臣或指民皆未的當朱子集傳以之子為流民自相謂而劬勞皆就民說但或謂不見勞來安集之意愚謂一章有取於鴻鴈羽翮之勞至言爰及矜人哀此鰥寡誰及之誰哀之實由於上之人矣二章有取於鴻鴈澤中之集而曰其究安宅以流民所止非其本土使可為築室久安之計誰實使之亦出於上之人矣三章有取於鴻鴈之哀嗷以離散之餘雖有定居而生理未復故不能不哀嗷赴訴然赴訴之於誰亦赴訴於上之人耳徐氏光啓曰此詩之作所謂沐浴膏澤而歌詠勤苦者也夜如何其音基夜未央庭燎之光君子至止鸞聲將將七羊反集傳賦也其語辭央中也胡氏旦曰說文云央中極也廣雅云央極中也秦風云宛在水中央央亦中也庭燎大燭也孔氏穎逹曰庭燎者樹之於庭燎之為明是燭之大者秋宫司烜云邦之大事供墳燭庭燎注云樹於門外曰大燭門內曰庭燎諸侯將朝則司烜音毁以物百枚并而束之設於門內也孔氏穎逹曰庭燎之差公蓋五十侯伯子男皆三十是天子庭燎用百古制未得而聞要以物百枚并而纒束之今則用松葦竹灌以脂膏也君子諸侯也將將鸞鑣聲許氏謙曰鸞鑣見秦駟驖王將起視朝不安於寢而問夜之早晚曰夜如何哉夜雖未央而庭燎光矣朝者至而聞其鸞聲矣集說季氏本曰庭燎之光謂始然而有光也將將衆集逺聞之聲夜當未央時則來朝者未至君門其鸞聲大而逺聞也姚氏舜牧曰夜未央未必有庭燎之光君子之至此所詠蓋像君心之不安寢若夜方半而即懷視朝之思爾夜如何其夜未艾音乂又如字庭燎晣晣之世反與艾叶君子至止鸞聲噦噦呼會反集傳賦也艾盡也晣晣小明也嚴氏粲曰晣晣然其光漸小噦噦近而聞其徐行聲有節也夜如何其夜鄉許亮反晨庭燎有輝許云反君子至止言觀其旗叶渠斤反集傳賦也鄉晨近曉也胡氏旦曰是從未央而至未盡從未盡而至鄉明也輝火氣也天欲明而見其烟光相雜也何氏楷曰輝與暈同周禮眂祲掌十輝之法即暈字也日月之旁氣為暈火之旁氣為輝既至而觀其旗則辨色矣蘇氏轍曰夜聞其鸞聲而已晨則見其旗矣集說杜氏佑曰朝辨色始入所以防微日出而視之所以優尊詩曰夜向晨言觀其旗臣辨色始入之時也又曰東方明矣朝既盈矣君日出而視之之時也輔氏廣曰問夜之早晚何如下二章只是一意直至辨色視朝之時而止計只是一時事未必有今昨之不同也總論許氏謙曰此固王者勤於視朝之詩而左右之臣設言以述王之意也蓋王勤於政事及時視朝而號令嚴肅執事者恪恭陳列以時百官之入朝者亦皆先時而至而車服威儀莫不和整以俟聽朝終篇未嘗言王之勤而勤勞之意自見於言外唐氏汝諤曰三章一節緊一節惟其心愈不安故其言愈警惕夫就所聞所見不過懸度其時而據此心之汲汲皇皇則儼然信以為然者若専為料想億度之詞即非勵精之旨庭燎三章章五句集說劉氏瑾曰列女傳云宣王嘗晏起姜后脫簪珥待罪於永巷宣王感悟於是勤於政事早朝晏退卒成中興之名以此證之或果宣王詩也沔綿善反彼流水朝直遙反宗于海叶虎洧反鴥惟必反彼飛隼息允反載飛載止嗟我兄弟邦人諸友叶羽軌反莫肯念亂誰無父母叶滿洧反集傳興也沔水流滿也諸侯春見天子曰朝夏見曰宗禹貢江漢朝宗于海蔡氏沈曰雖未至海而其勢已奔趨於海猶諸侯之朝宗於王也此憂亂之詩言流水猶朝宗于海朱氏公遷曰知所向也飛隼猶或有所止嚴氏粲曰隼解見采芑朱氏公遷曰知所止也而我之兄弟諸友乃無肯念亂者誰獨無父母乎亂則憂或及之是豈可以不念哉集說嚴氏粲曰兄弟指所親邦人指衆人諸友指所厚言兄弟邦人諸友則親疏厚薄識與不識皆在其中矣謝氏枋得曰一身之遇亂不足惜父母之遇亂深可憂誰無父母不為一身謀獨不為父母謀乎為父母謀則當念亂則必思所以救亂也鄒氏泉曰莫肯念亂者不思恐懼修省之道若安危利菑者然也父母人之最切者故獨舉此以示人不可不憂耳沔彼流水其流湯湯失羊反鴥彼飛隼載飛載揚念彼不蹟井亦反載起載行叶户郎反心之憂矣不可弭忘集傳興也湯湯波流盛貌不蹟不循道也胡氏紹曾曰蹟者行步之跡故不蹟為不循道載起載行言憂念之深不遑寧處也弭止也水盛隼揚以興憂亂之不能忘也集說輔氏廣曰不循道理則危亂之由也載起載行則憂思之深也朱氏公遷曰此章不蹟者致亂之由下章我友敬者止亂之本水方盛而未殺隼方揚而未止憂念方來而未息此皆理勢之不可遏者故用彼字相呼而為興也鴥彼飛隼率彼中陵民之訛言寧莫之懲我友敬矣讒言其興集傳興也率循訛僞懲止也隼之高飛猶循彼中陵而民之訛言乃無懲止之者然我之友誠能敬以自持矣則讒言何自而興乎徐氏常吉曰以之惑世謂之訛言以之誣民謂之讒言始憂於人而卒反諸已也集說韓氏嬰曰讒言緣閒而起輔氏廣曰衰亂之世訛言繁興使人無所適從而卒歸於危亡禍敗此所以歎其寧莫之懲也我友敬矣讒言其興此必有所指而言其興則是無自而興也凡有不得者皆反求諸已此自修之事也許氏謙曰末章憂而戒之之辭也讒言固可憂惟敬足以勝之知所本矣朱氏公遷曰自持以敬則小人不敢近其能止讒必矣讒言之人即上章不蹟者也始憂於人謂讒莫肯息卒反諸已謂敬當自持總論朱氏公遷曰一章言人皆不知憂亂二章言已獨憂人之造亂三章言在位者敬以自持則可止讒而息亂沔水三章二章章八句一章六句集傳疑當作三章章八句卒章脫前兩句耳集說陳氏櫟曰始念亂而憂及父母終憂讒而敬以反身憂念之中不忘孝敬詩人忠厚之意也鶴鳴于九皋聲聞音問于野叶上與反魚潛在淵或在于渚樂音洛彼之園爰有樹檀叶徒沿反其下維蘀音託他山之石可以為錯七落反集傳比也鶴鳥名長頸竦身高腳頂赤身白頸尾黑其鳴高亮聞八九里陸氏璣曰鶴常夜半鳴淮南子亦云雞知將旦鶴知夜半皋澤中水溢出所為坎從外數至九韓氏嬰曰九皋九折之澤濮氏一之曰澤曲曰皋見楚詞注喻深逺也蘀落也許氏謙曰蘀見豳七月錯礪石也嚴氏粲曰揚子不礱不錯焉攸用錯謂治玉也此詩之作不可知其所由然必陳善納誨之辭也輔氏廣曰不正言其事而必比物而為言者正所謂風刺上者皆不主於政事而主於文詞不以正諫而託物以諫也蓋鶴鳴于九皋而聲聞于野言誠之不可掩也魚潛在淵而或在于渚言理之無定在也朱氏公遷曰誠中形外非可矯飾為也千變萬化非可執一求也園有樹檀而其下維蘀言愛當知其惡也他山之石而可以為錯言憎當知其善也朱氏公遷曰君子或有未仁不可溺於愛也小人或有一長不可偏於惡也由是四者引而伸之觸類而長之天下之理其庶幾乎輔氏廣曰夫必能去私欲之蔽然後可以明善而誠身此其序則由大以至小也集說王氏安石曰易曰鳴鶴在陰其子和之子曰君子居其室出其言善則千里之外應之況其邇者乎與此意同朱氏善曰知誠之不可掩則知念慮方萌而鬼神已知形迹欲掩而肺肝已見所以不可無誠身之功也知理之無定在則知事有精粗而理無精粗事有大小而理無大小所以不可無明善之功也知愛當知其惡憎當知其善則知親愛賤惡之不可以或偏哀矜敖惰之不可以自恣所以於應接之間尤不可不去其私欲之心也能是數者則知行竝進而明誠兩立好惡不偏而人已兼盡其於治天下不難矣此所以為陳善納誨之辭也歟鶴鳴于九皋聲聞于天叶鐵因反魚在于渚或潛在淵叶一均反樂彼之園爰有樹檀其下維榖他山之石可以攻玉集傳比也榖陸氏德明曰說文云榖從木非從禾也一名楮惡木也陸氏璣曰榖幽州人謂之榖桑或曰禇桑荆揚交廣謂之榖中州人謂之禇殷中宗時桑榖共生是也今江南人績其皮以為布又搗以為紙謂之榖皮紙攻錯也嚴氏粲曰謂錯治之也程子曰玉之溫潤天下之至美也石之粗厲天下之至惡也然兩玉相磨不可以成器以石磨之然後玉之為器得以成焉猶君子之與小人處也橫逆侵加然後修省畏避動心忍性增益預防而義理生焉道德成焉吾聞諸邵子云邵子曰有才之正者有才之不正者詩云他山之石可以攻玉其小人之才乎許氏謙曰邵子論玉石又一意也略與前說不同總論朱氏公遷曰近則聞於野遠則聞於天泛言之則可以為錯親切言之則可以攻玉教誨之意以漸而深呂氏柟曰二章之言相類而意别于野以四方言也于天以上下言也在淵在渚言事雖散於廣逺而道則不下帶而存不可以為逺而忘之也在渚在淵言事雖在於目前而理則至深邃莫測不可以其近而忽之也維蘀以榮悴言猶利害安危之謂也則思亂防危之意其可怠乎維榖以美惡言猶賢佞是非之謂也則防奸逺佞之意其可少乎前章為錯猶渾以利器言之後章乃言攻玉夫人之德成如玉矣鶴鳴二章章九句集說朱子曰鶴鳴做得巧含蓄意思全不發露鄧氏元錫曰鶴鳴納誨也辭不直指義託遠諷可興可觀古納誨者之善誘如是乎徐氏常吉曰鶴鳴一詩可以類萬物之情可以悉天下之理彤弓之什十篇四十章二百五十九句集傳疑脫兩句當為二百六十一句欽定詩經傳說彚纂卷十一
