body:
  text: 欽定四庫全書欽定詩經傳說彚纂卷二召南一之二集傳召地名召公奭之采音菜邑也舊說扶風雍縣南有召亭即其地今雍縣析為岐山皇輿表同天興皇輿表鳳翔縣二縣未知召亭的在何縣餘已見周南篇王氏應麟曰召亭在岐山縣西南見括地志集說鄭氏康成曰召伯姬姓名奭食采於召作上公為二伯後封於燕陸氏德明曰皇甫謐云文王庶子勝殷後封於北燕留周佐政食邑於召輔成王康王卒諡曰康長子繼燕支子繼召案左傳富辰言文之昭十六國無燕未詳孰是孔氏穎達曰食采文王時為伯武王時次子世守采地在王官春秋時周公召公是也平王以西都賜秦則周公召公别於東都受采存本周召之名非復岐周之地蘇氏轍曰文王治周所以為其國者屬之周公所以交於諸侯者屬之召公大雅曰昔先王受命有如召公日辟國百里言其治外也李氏樗曰分陕以東如江漢汝墳即陕之東也分陕以西如江沱即陕之西也故其詩有周南召南之辨維鵲有巢維鳩居叶姬御反之之子于歸百兩如字又音亮御五嫁反叶魚據反之集傳興也鵲鳩皆鳥名毛氏萇曰鳩鳲鳩孔氏穎達曰釋鳥云鳲鳩秸鞠郭氏曰今布穀也鵲善為巢其巢最為完固禮記月令季冬之月鵲始巢鄭氏康成曰冬至架之至春乃成孔氏穎達曰鵲以復至之月始作室家鳲鳩因成事天性如此也鳩性拙不能為巢或有居鵲之成巢者禽經鳩拙而安歐陽氏修曰鳩不能作巢多在屋瓦間或於樹上架構樹枝初不成巢便以生子往往墜雛鵲作巢甚堅既生雛飛去容有鳩來處彼空巢之子指夫人也兩一車也一車兩輪故謂之兩御迎也諸侯之子嫁於諸侯送御皆百兩也孔氏穎達曰諸侯之女嫁於諸侯送迎皆百乘者探解下章將之明此諸侯之禮嫁女於諸侯故迎之百乘諸侯之女故送亦百乘若大夫之女雖為夫人其送不得百乘各由其家之所有為禮也南國諸侯被文王之化能正心修身以齊其家其女子亦被后妃之化而有專靜純一之德故嫁於諸侯而其家人美之曰維鵲有巢則鳩來居之是以之子于歸而百兩迎之也此詩之意猶周南之有關雎也集說楊氏時曰鵲巢言夫人之德猶關雎之言后妃也蓋自天子至於諸侯大夫刑于邦家無二道也以關雎為文王之妃則鵲巢夫人亦必有主名者若謂皆文王之詩則文王繼世之君非積行纍功以致爵位者文王一人之身而有聖賢之異無是道也然則二南之詩周公之以風天下無可疑者張氏栻曰惟其專靜均一能端然享之是乃夫人之德也有所作為則非婦道矣呂氏祖謙曰滎陽公云但取鳩之不自為巢而居鵲之成巢非取鵲之強而不淫知歲之所在亦非取鳩有均養之德也輔氏廣曰專靜純一婦人之庸德也后妃惟有幽閒貞靜之德故既得之也則琴瑟鐘鼓以樂之夫人惟有專靜純一之德故其來歸也則百兩之車以迎之此詩之意如周南之有關雎者說得最好便見周公當時集此二南詩意蓋欲人知夫治國平天下之道自修身齊家始也假氏昌武曰婦人無攸遂雖拙何害婦人之德貴乎靜正惟其有從一之志而無取乎能為之巧惟其能循法度而不貴其自出法度惟其能不失職而不貴其無所不職婦人而侵男子之事非天下之常也詩人有感於鳩居鵲巢其意亦微矣哉朱氏公遷曰鳩性拙宜居鵲之成巢夫人有德宜受諸侯之重禮蓋取得所宜得之意維鵲有巢維鳩方之之子于歸百兩將之集傳興也方有之也將送也集說孔氏穎達曰國君之禮夫人自乘其家之車鄭針膏肓云禮雖散亡以詩義論之天子以至大夫皆有留車反馬之禮故泉水云還車言邁箋云還車者嫁時乘來今思乘以歸是其義也知夫人自乘家車也言迓之者夫自以其車迎之送之則其家以車送之故知壻車在百兩迎之中婦車在百兩將之中矣維鵲有巢維鳩盈之之子于歸百兩成之集傳興也盈滿也謂衆媵姪娣之多公羊傳諸侯娶一國則二國往媵之以姪娣從諸侯一聘九女陸氏德明曰國君夫人有左右媵兄弟女曰姪娣女弟也成成其禮也集說薛氏應旗曰迎以百兩送以百兩而諸姪娣爛其盈門昏姻之禮於是乎成無曠義無缺典也總論朱子曰文王之時關雎麟趾之化行於內諸侯䝉化以成其德而其道亦始於家人故其夫人之德如是當時之人詠歌而美之當必為一人而作然周公取以為法明夫人之德皆當如是則其義不主於所指之人故序者特曰夫人之德而已問關雎言窈窕淑女則是明言后妃之德鵲巢三章皆不言夫人之德如何曰鳩之性靜專無比可借以見夫人之德也黃氏櫄曰關雎之詩未嘗言后妃之德而言詩人欲以琴瑟友之鐘鼓樂之則后妃之德可知鵲巢之詩未嘗言夫人之德而但言以百兩御之將之成之則夫人之德可知后妃之德宜如關雎夫人之德宜如鵲巢二詩為二南之首聖人之意深矣鵲巢三章章四句集說朱氏善曰周南召南合而言之則周南猶易之有乾召南猶易之有坤分而言之則國君能正心修身以刑其家是亦一乾道也夫人能專靜純一以配其君是亦一坤道也推而至於大夫妻亦然蓋陽健而陰順陽倡而陰和陽主其始陰主其成此天地之常經其理則通上下而無間其道則亘古今而不易能盡斯道者夫愛其內助婦愛其刑家交相愛而家道成矣于以采蘩于沼于沚于以用之公侯之事叶上止反集傳賦也于於也鄭氏康成曰于以猶言往以也執蘩菜者以豆薦蘩葅孔氏穎達曰經有三于傳訓為於不辨上下箋明下二于為於上于為往又言以豆薦蘩葅者醢人云四豆之實皆有葅葅在豆故知以豆薦也蘩白蒿也陸氏璣曰凡艾白色為皤音婆蒿春始生及秋香美可生食又可蒸一名遊胡北海人謂之旁勃故大戴禮夏小正傳曰蘩游胡游胡旁勃也沼池也沚渚也爾雅小洲曰渚小渚曰沚孔氏穎達曰蒿非水菜此言沼沚者謂於其旁采之事祭事也劉氏彝曰尊祭祀故直謂之事春秋有事於太廟是也南國被文王之化諸侯夫人能盡誠敬以奉祭祀而其家人叙其事以美之也問采蘋蘩采枲耳后夫人恐未必親為之朱子曰詩人且自如此說或曰蘩所以生蠶蓋古者后夫人有親蠶之禮此詩亦猶周南之有葛覃也問采蘩只作祭祀說自是曉然若作蠶事雖與葛覃同類而恐實非也葛覃是女功采蘩是婦職以為同類亦無不可何必以為蠶事而後同耶朱子曰此說亦姑存之而已又問何故存兩說曰如今不見得果是如何且與兩存從來說蘩所以生蠶可以供蠶事何必抵死說道只為奉祭祀不為蠶事集說毛氏萇曰公侯夫人執蘩菜以助祭神饗德與信不求偹焉沼沚溪澗之草猶可以薦也孔氏穎達曰言夫人往何處采此蘩菜乎於沼池於沚渚之旁采之也既采之為葅夫人往何處用之乎於公侯之宮祭祀夫人當薦之也楊氏時曰夫人為宗廟社稷主以共祭祀為職黃氏櫄曰禮記載國君取夫人之辭曰請君之玉女與寡人共有敝邑事宗廟社稷則知奉祭祀者國君夫人之職也而必曰可以奉祭祀者何哉人惟無愧於心而後無愧於祭祭不在物而在心心苟誠焉二簋可以為享心苟不誠殺牛不如禴祭蘩生於蠲潔之中夫人能有蠲潔之德惟無愧於蘩而後可以采蘩夫祭祀非難而可以奉祭祀為難也輔氏廣曰采蘩以供祭未齊以前事也徐氏光啓曰采蘩躬親使人為之亦是自為之也沈氏守正曰詩故云祭有蒸有禴蒸以薦品物禴以薦新味南國歲味莫先於蘩孟春始芽香脆可珍采而薦之理或然也冠以公侯亦須見與公侯合敬意婦無專成故也附録禮記祭義古者天子諸侯必有公桑蠶室近川而為之築宮仞有三尺棘牆而外閉之及大昕之朝君皮辨素積卜三宮之夫人世婦之吉者使入蠶于蠶室奉種浴于川桑于公桑風戾以食之世婦卒蠶奉繭以示于君遂獻繭于夫人夫人遂副褘而受之因少牢以禮之及良日夫人繅三盆手遂布于三宮夫人世婦之吉者使繅遂朱緑之𤣥黃之以為黼黻文章服既成君服以祀先王先公穀梁傳天子親耕以共粢盛王后親蠶以共祭服國非無良農工女也以為人之所盡事其祖禰不若以己所自親者也孔氏頴達曰養蠶是婦人之事婦人不與外祭故云以祀先王先公陸氏佃曰蒿青而高蘩白而繁七月之詩曰采蘩祁祁以生蠶也今覆蠶種尚用蒿云季氏本曰蠶之未出者采蘩以洗之令其易出于以采蘩于澗之中于以用之公侯之宫集傳賦也山夾水曰澗孔氏穎達曰于澗之中亦謂於曲內非水中也宫廟也曹氏粹中曰莊二十三年丹桓宫楹明年刻桓宫桷注宫廟也或曰即記所謂公桑蠶室也集說黃氏櫄曰采蘩于沼沚而用於諸侯之祀事采蘩在澗中而用於諸侯之宫廟則夫蠲潔之德亦可想而見之也金氏聲曰公侯之事公侯之宫鄭重之詞也蓋以公侯重何敢不夙夜以襄一人王氏志長曰祭以自致為敬天子躬耕以供粢盛射牲以表親殺后妃采荇夫人采蘩皆自致為敬之義也胡氏紹曾曰凡祭豆之品四葅之類七示物咸在詩偶掇一蘩耳指定在宫為薦蘩失之附録何氏楷曰古者蠶室近川以便浴蠶故有于沼于澗之采被皮寄反之僮僮音同夙夜在公被之祁祁薄言還歸集傳賦也被首飾也編偏上聲又如字髮為之嚴氐粲曰諸侯夫人於其國衣服與王后同上公夫人得褘音揮衣以下侯伯夫人得褕音遙翟以下夫人祭祀不應服次曹氏以為或在商時故與周禮異僮僮竦敬也劉氏彝曰步雖移而被不動之貌夙早也徐氏常吉曰夙夜非自夙至夜乃夜之夙也昧晦未分為夜天光向晨為夙公公所也朱子曰謂宗廟之中非私室也謝氏枋得曰齊廬之類祁祁舒遲貌去事有儀也祭義曰及祭之後陶陶音遙遂遂如將復入然不欲遽去愛敬之無已也或曰公即所謂公桑也集說段氏昌武曰張曰不獨賦其在公之時而復賦其還歸之際蓋於是人情易於懈怠惟平時一於敬故於此亦不失也嚴氏粲曰夫人服首飾之被僮僮竦敬夙夜在公所而助祭及祭畢則祁祁然舒遲而還歸有餘敬也此形容夫人孝敬宗廟周旋中禮其德可見矣陳氏組綬曰宗廟禮法森嚴極是束縛不自在處若不敬即急欲了事以適已便故祁祁尤難祭畢而徹以疾為敬既徹而歸又以舒遲為敬附録周禮追師掌王后之首服為副編次注副以覆首若今步搖服之以從王祭祀編列髮為之若今假紒音計服之以桑次次第髮長短為之所謂髲音備髢音第服之以見王孔氏穎逹曰言夫人首服被鬄之飾僮僮然先祭之時早夜在事甚竦敬矣至於祭畢釋祭服又首服被鬄之飾祁祁然還歸燕寢之時有威儀矣被者首服之名在首故曰首飾箋引少牢之文云主婦髲鬄與此被一也古者或剔賤者刑者之髮以被婦人之紒為飾因名髲鬄焉此周禮所謂次也此言被與髲鬄之文同故知被是少牢之髲鬄同物而異名耳知非祭服者郊特牲曰王皮辨以聼祭報又曰祭之日王被衮以象天王非正祭不服衮夫人非正祭不服狄衣明矣且狄首服副非被所當配耳故箋云夫人祭畢釋祭服而去是也早謂祭日之晨夜謂祭祀之先夕之期也先夙後夜便文耳夜在事謂先夕視濯溉早在事謂朝視饎音熾爨若為自夙至夜則文兼祭末下不宜復言祭末之事故鄭引髲鬄與被為一非祭時所服解在公為視濯非正祭之時也案特牲夕陳鼎於門外宗人外自西階視壺濯及籩豆即此所云夜也又云夙興主婦親視饎爨於西堂下即此所云夙也總論陳氏傅良曰采蘩其家人之六二乎無攸遂在中饋言婦人無遂事惟飲食薦享而已采蘩于沼澗而用之於祭祀其未事則夙夜以致吾力其既事則舒遲以言歸而已彭氏執中曰吕氏云一章二章言其事也三章言其容也案小序以夫人奉祭祀為不失職故毛鄭孔三家皆主祭祀以訓解之朱子以儒先有采蘩為蠶事之說故兩存之以親蠶亦后夫人大禮之所在也但末章所謂被者孔穎達考周禮被者次也夫人助祭首服副不應配被故解在公為視濯非正祭之時還歸為已釋副而服被為祭畢之時朱子集傳則未分祭前祭後也而時說則以在公為正祭還歸為祭畢是與朱孔之說又稍異而於禮亦無所據矣又案首章二章是祭是蠶二說俱可通惟末章集傳云或曰公即所謂公桑也却不解到被字上若以蠶事論之禮告桑服編受繭服副亦非服次何楷因為之說曰此言被者指三宫夫人世婦之服觀少牢禮卿大夫之主婦從祭服髲鬄可見公所即公桑夫人世婦夙而趨事至夜還歸非君夫人之重蠶事而勤倡率安能如此是亦通鮮經之窮也但告桑受繭禮有明文至蠶畢服成止言以祀先王先公故孔穎達以婦人無外祭解之而蠶畢未别有所謂祭者惟將蠶后齊戒以享先蠶蓋古禮也若以蠶事及祭其享先蠶之謂歟然不可考矣故今仍以祭祀為正說而以蠶事為附録云采蘩三章章四句集說假氏昌武曰姜曰鵲巢言德如鳲鳩不能自營則宜若朴拙而無能者及觀采蘩于沼沚而用之于公侯之事在公則僮僮其敬有肅肅在廟之意還歸則祁祁其和有雍雍在宫之意然後知鵲巢之德如鳲鳩非果拙也能奉宗廟而不失其職之所當然者乃前日拙誠所致也附録何氏楷曰射義云士以采蘩為節樂不失職也取末章被之僮僮夙夜在公為三宫夫人世婦有事於蠶者皆不失其職故士射以為之節云喓喓於遙反草蟲躍躍託歷反阜螽未見君子憂心忡忡敕中反亦既見止亦既覯止我心則降户江反叶乎攻反集傳賦也喓喓聲也孔氏穎達曰出車箋云草蟲鳴晚秋之時草蟲蝗屬竒音青色孔氏穎逹曰釋蟲云草蟲負蠜郭璞曰常羊也陸璣云小大長短如蝗也好在茅草中躍躍躍貌阜螽蠜音樊也孔氏穎達曰釋蟲云阜螽蠜李巡曰蝗子也陸璣云今人謂蝗子為螽子陸氏佃曰今謂之􅪁䗥亦跳亦飛飛不能逺草蟲鳴阜螽躍而從之故阜螽曰蠜草蟲謂之負蠜忡忡猶衝衝也止語辭覯遇降下也謝氏枋得曰猶今人云放下心也南國被文王之化諸侯大夫行役在外其妻獨居感時物之變而思其君子如此亦若周南之卷耳也集說李氏樗曰此指婦人既嫁而言如出車之詩亦曰草蟲阜螽是詩亦行役之詩則知其夫不在故其憂如此婦人以夫不在則不為容如伯兮之詩曰豈無膏沐誰適為容夫既歸則其心必降下矣許氏謙曰亦既見意之之詞也若既見則我心降矣蓋此詩作於思念之日非既歸之時也姚氏舜牧曰不獨曰見止又曰覯止覯則始叙其勞苦致其綢繆而往昔之懷念俱可釋也鄒氏泉曰諸侯大夫謂諸侯之大夫也時物之變則君子行役之久可知未見而憂必既見而喜見其思出於正而有貞靜専一之意故與卷耳詩一也陟彼南山言采其蕨未見君子憂心惙惙張劣反亦既見止亦既覯止我心則說音悅集傳賦也登山蓋託以望君子蕨鱉也初生無葉時可食陸氏璣曰周秦曰蕨齊魯曰鱉初生似蒜莖紫黑色可食如葵陸氏德明曰俗云其初生似鱉腳故名焉亦感時物之變也惙憂也集說范氏處義曰言大夫妻因升南山而采蕨薇感時物之一新念其夫征役之未反故于未歸則惙惙而憂至于傷悲及其既歸則心喜說而平夷矣假氏昌武曰朱曰非必大夫妻親出采蕨蓋言今其時矣嚴氏粲曰言有升南山而采蕨者矣感節物之新而思其君子也陟彼南山言采其薇未見君子我心傷悲亦既見止亦既覯止我心則夷集傳賦也薇似蕨而差大有芒而味苦山閒人食之謂之迷蕨陸氏璣曰薇亦山菜也莖葉皆似小豆蔓生其味亦如小豆藿可作羮亦可生食今官園種之以供宗廟祭祀項氏安世曰薇今之野豌豆苗也蜀人謂之巢菜東坡改名為元修菜也豌音剜胡氏曰疑即莊子所謂迷陽者胡氏寅曰荆楚之聞有草叢生修條四時發頴春夏之交花亦繁麗條之腴者大如巨擘音伯剝而食之甘美野人呼為迷陽疑莊子所謂迷陽迷陽無傷吾行即此蕨也夷平也集說輔氏廣曰蕨薇皆是山之所有登山采薇亦皆託言也凡詩中所言采掇之事多是託言嚴氏粲曰人喜悅則心平夷凌氏濛初曰其說既見方才樂正說未見則憂不能已也總論黃氏櫄曰序曰大夫妻而說者以為未嫁之女已失其㫖矣或以為大夫妻以其大夫之行役而惟恐為淫風所染因取此物以自警焉古今皆從此說豫獨以為非也夫不為淫風所化者在我而已何至於以禽蟲自喻㦲且以草蟲阜螽感於異類而憂念不已則其二章云采薇而悲采蕨而憂是亦恐為異類所感乎則其說不通矣詳觀詩文但直言喓喓草蟲躍躍阜螽未嘗言草蟲鳴而阜螽從之也詩人言此二物者記時候之變耳采薇采蕨其義亦然大夫行役之久而室家思念之切物情景態得於耳目之所接而傷時感嗟動乎心之所思未見而憂念則既見安得不樂不喜而不自慰㦲或曰所謂以禮自防者安在曰以禮自防非謂懼為淫風所染而以禮制之也人情思極則易至於怨怨極則易至於叛召南之大夫妻雖憂念其大夫而不敢怨其上此無他畏文王之禮義而不敢為非而以禮自防爾文王之風化至此深矣謝氏枋得曰惙惙憂之深不止於忡忡矣傷則惻然而痛悲則無聲之哀不止於惙惙矣此未見之憂一節緊一節也降則心稍放下說則喜動于中夷則心氣和平此既見之喜一節深一節也此詩每有三節蟲鳴螽躍采蕨采薇之時是一般意思忡忡惙惙傷悲之時是一般意思則降則說則夷之時是一般意思朱氏謀㙔曰張衡謂大火流草蟲鳴是深秋候采薇采蕨季夏候也秋暮而往春暮未還道里悠逺吉凶莫卜是以用憂豈感物而興男女之思乎草蟲三章章七句集說朱氏善曰卷耳后妃之思其君子也草蟲大夫妻之思其君子也汝墳殷其靁又行役者之妻之思其君子也尊卑之分雖殊而室家之情則一然以行役之久雖有别離之思而無怨恨之情所以為風之正也于以采蘋南澗之濵于以采藻于彼行潦音老集傳賦也蘋水上浮萍也江東人謂之䕯嚴氏粲曰本草水萍有三種大者曰蘋中者曰荇菜小者水上浮萍毛氏以蘋為大萍是也郭璞以蘋為水上浮萍蘋可茹而萍不可茹豈可以供祭祀乎濵崖也藻聚藻也生水底莖如叉股葉如蓬蒿陸氏璣曰藻水草也有二種其一種葉如雞蘇莖大如箸長四五尺其一種莖大如叉股葉如蓬蒿好聚生謂之聚藻二者皆可食行潦流潦也王氏質曰盛夏猛漲之水曰行潦亦曰黃潦南國被文王之化大夫妻能奉祭祀而其家人叙其事以美之也集說鄭氏康成曰女子十年不出內則注恆居內也姆教婉娩聼從執麻枲治絲繭織紝組紃學女事以共衣服觀於祭祀納酒漿籩豆葅醢禮相助奠十有五而笄二十而嫁今既嫁為大夫妻能循其為女時所學所觀之法度王氏肅曰此篇所陳皆是大夫妻助夫氏之祭毛傳所云牲用魚芼之以蘋藻謂教成之祭非經文之蘋藻也王氏安石曰采蘋必于南澗采藻必于行潦言其所薦有常物所采有常處郝氏敬曰序於諸侯妻奉祭言不失職於大夫妻奉祭言能循法度何也君修法度臣奉法度者也故君不祭為失職臣不祭為廢法度凡祭備物行禮主婦職中饋薦豆采取烹芼奠獻莫不各有法度也附録鄭氏康成曰古者婦人先嫁三月祖廟未毁教于公宫祖廟既毁教于宗室教以婦德婦言婦容婦功教成之祭牲用魚芼用蘋藻所以成婦順也此祭女所出祖也法度莫大於四教是又祭以成之故舉以言焉蘋之言賔也藻之言澡也婦人之行尚柔順自潔清故取名以為戒孔氏穎達曰鄭以昏義教成之祭言芼之以蘋藻此亦言蘋藻故知為教成祭也于以盛音成之維筐及筥居吕反于以湘之維錡宜綺反及釜符甫反集傳賦也方曰筐圓曰筥許氏慎曰筥筲也曹氏粹中曰筐筥皆竹器湘烹也蓋粗熟而淹以為葅也錡釜屬有足曰錡無足曰釜陸氏德明曰錡三足釡孔氏穎達曰錡與釜連文故知釜屬說文曰江淮之間謂釜曰錡此足以見其循序有常嚴敬整飭之意集說王氏安石曰筐筥錡釡所用有常器也輔氏廣曰所用有常器每事必躬親先後有次序皆嚴敬者之所為也嚴敬則自然整飭如此劉氏瑾曰必采而後盛以筐筥必盛而後烹以錡釜則非循序有常者不能也曰采曰盛曰湘無一不親曰筐曰筥曰錡曰釜無一不具則非嚴敬整飭者不能也黃氏佐曰器不苟同别類聚也物不欲䙝昭明薦也于以奠之宗室牖下叶後五反誰其尸之有齊側皆反季女集傳賦也奠置也宗室大宗之廟也大夫士祭於宗室劉氏瑾曰諸侯之庶子為别子别子之適子為大宗即大夫之始祖也故祭於其廟牖下室西南隅所謂奧也許氏慎曰牖穿壁以木為交窗所以見日朱子曰古人廟堂南向室在其北東户西牖皆南向室西南隅為奧尊者居之所謂牖下者也凡廟皆南向而主皆東向李氏如圭曰堂屋五架中脊之架曰棟次棟之架曰楣後楣之下以南為堂以北為室與房大夫房東室西相連為之室又户東而牖西户不當中而近東則西南隅最為深隱故謂之奧而祭祀及尊者常處焉尸主也齊敬季少也劉氏彞曰季女者大夫之妻也錢氏天錫曰少女而謂之主則采之必親治之必當奠之必預皆主者事不専在薦時言祭祀之禮主婦主薦豆實以葅醢少牢饋食禮主婦薦韭葅醓醢坐奠於筵前贊者執葵葅螺醢陪設于東熊氏剛大曰葅菜茹醢肉汁周禮有七葅七醢或曰醢肉醬也又曰無骨為醢少而能敬尤見其質之美而化之所從來者逺矣集說王氏肅曰采蘋藻以為葅設之於奧奧即牖下范氏處義曰此言置奠之合乎禮少女為大夫妻乃能齊戒以主祭非能循法度而何附録毛氏萇曰古之將嫁女者必先禮之於宗室牲用魚芼之以蘋藻鄭氏康成曰牖下户牖閒之前祭不於室中者凡昏事於女禮設几筵於户外此其義也歟祭事主婦設羮教成之祭更使季女者成其婦禮也孔氏穎達曰教之在宫祭乃在廟以魚為牲者告事耳非正祭也傳以昏義云教於宗室此言牖下故知是大宗之廟知非宗子之女者經言于以奠之宗室牖下若宗子之女自祭家廟何須言於宗室乎又云大夫士祭於宗室若非教成之祭則大夫之妻助祭夫氏何故云大宗之廟大夫豈皆為宗子也且大夫之妻助大夫之祭則無士矣傳何為兼言大夫士乎案采蘋序說大夫妻能循法度既稱大夫妻則非未嫁之女王肅亦云大夫妻助夫氏之祭朱子據其說以釋經是已但教成之祭始於毛傳鄭孔博引禮文以證之亦非無本故録之以備說詩者參觀焉總論吕氏祖謙曰采之盛之湘之奠之所為者非一端所歷者非一所矣煩而不厭久而不懈循其序而有常積其誠而益厚然後祭事成焉季女之少若未足以勝此而實尸此者以其有齊敬之心也采蘩以職言舉其綱也采蘋以法度言詳其目也尊卑之辨也輔氏廣曰首章言未祭之前采蘋藻之事次章言既得蘋藻而治以為葅之事三章言祭時獻豆葅之事少而能敬非質之美而教之豫者不能非文王之化所從來者逺曷能如此㦲采蘩見其始終之敬采蘋見其少而能敬嚴氏粲曰自后妃及夫人及大夫妻皆文王齊家之化也采蘋三章章四句集說孔氏穎達曰襄二十八年左傳濟澤之阿行潦之蘋藻置諸宗室季蘭尸之敬也隱三年左傳曰苟有明信澗溪沼沚之毛蘋蘩蕰藻之菜筐筥錡釡之器潢汙行潦之水可薦於鬼神可羞於王公風有采蘩采蘋雅有行葦泂酌昭忠信也皆取此篇之義蔽芾非貴反甘棠勿翦勿伐召伯所茇蒲曷反集傳賦也蔽芾盛貌李氏樗曰蔽芾毛氏以為小貌歐陽破之曰召公本以不欲勞煩人故舍息於棠下棠可容人舍其下則非小樹也蔽者謂蔽風日也芾茂盛貌甘棠杜梨也白者為棠赤者為杜陸氏璣曰甘棠今棠梨也陸氏佃曰其子有赤白美惡白色為甘棠赤色澀而酢俗語澀如杜是也翦翦其枝葉也伐伐其條幹也毛氏萇曰翦去伐擊也伯方伯也羅氏中行曰伯長也為諸侯之長也茇草舍也孔氏穎達曰茇草舍者周禮仲夏教茇舍注云舍草止也軍有草止之法然則茇者草也草中止舍故云茇舍羅氏中行曰止於其下以自蔽猶草舍耳非謂作舍也召伯循行南國以布文王之政或舍甘棠之下其後人思其德故愛其樹而不忍傷也集說鄭氏康成曰召伯聼男女之訟不重煩勞百姓止舍小棠之下國人被其德說其化思其人敬其樹孔氏頴達曰武王之時召公為西伯决訟于甘棠之下其教著明於南國愛結於民心故作是詩以美之蘇氏轍曰國人思之而愛其棠不忍伐也召公之為牧伯武王之世矣而詩稱召伯思者之辭也蔽芾甘棠勿翦勿敗叶蒲寐反召伯所憩起例反集傳賦也敗折憩息也許氏慎曰憩休息也亦作揭嚴氏粲曰敗謂殘壞之勿敗則非特勿伐而已愛之愈久而愈深也下章放此蔽芾甘棠勿翦勿拜叶變制反召伯所說始鋭反集傳賦也拜屈鄭氏康成曰拜之言拔也施氏士丏曰如人身之拜小低屈也嚴氏粲曰挽其枝以至地也說舍也王氏質曰說或為稅止詩稅意多通用說字勿拜則非特勿敗而已總論左傳蔽芾甘棠勿翦勿伐召伯所茇思其人猶愛其樹韓氏嬰曰昔者周道之盛召伯在朝有司請營召以居召伯曰嗟以吾一身而勞百姓此非吾先君文王之志也於是出而就蒸庶於阡陌隴畝之間而聼斷焉百姓大悅耕桑者倍力以勸於是嵗大稔民給家足其後詩人見召伯之所休息樹下美而歌之劉氏向曰召公述職當桑蠶之時不欲變民事故不入邑中舍於甘棠之下張氏耒曰召公為天子之大臣而治事臨務至出於草野田畝之間宜若不知體矣然古人惟不敢遺一人故能康一家不敢遺一家故能正一國嘗讀西漢書循吏傳美召信臣之徒其治郡邑事無大小一一立法至於躬行田野不少休息未嘗不愛其知為政之理而竭力勤事而至誠愛其民也范氏處義曰南國之人思召伯而不可見見其木如見其人故愛之至也南國之人心如此其忠厚以秉文王之德故也黃氏櫄曰召伯之教明於南國斯民之所以思召伯者非止於不勞民力一事也善政得民財善教得民心善政不如善教之得民也召伯之教不惟當時不能忘而後世亦有所不能忘召旻之序曰旻閔也閔天下無如召公之臣也觀後世之所思則知當時之所愛也已鄧氏元錫曰甘棠美德也詩曰豈弟君子民之父母召伯可謂民父母矣甘棠三章章三句集說孔氏穎達曰此篇所陳巡民决訟皆是武王伐紂之後為伯時事若文王時與周公共行王化有美即歸之於王詩人何得曲美召公㦲武王之時召公為王官之伯故得美之因詩繫召公故録之在召南論卷則總歸文王指篇即専美召伯也為伯分陕當云西國言南者以篇在召南為正耳厭於葉反浥於及反行露豈不夙夜叶羊茹反謂行多露集傳賦也厭浥濕意行道夙早也南國之人遵召伯之教服文王之化有以革其前日淫亂之俗故女子有能以禮自守而不為强暴所汚者自述己志作此詩以絶其人言道間之露方濕我豈不欲早夜而行乎畏多露之沾濡而不敢爾蓋以女子早夜獨行或有强暴侵陵之患故託以行多露而畏其沾濡也集說鄭氏康成曰言强暴之男禮不足而強來不度時之可否故云然杜氏預曰詩召南言豈不欲早暮而行懼多露之濡己以喻違禮而行必有汚辱孔氏穎達曰以行人之懼露喻貞女之畏禮蘇氏轍曰當紂之世淫風之被天下如露之濡物召南之女被文王之化能以禮自守故其稱曰行者未嘗不欲夙夜也謂道之多露是以不敢女子未嘗不欲從人也謂世之多强暴是以不可女子所以自保如此輔氏廣曰先生謂女子自述己意作此詩以絶其人既當矣下兩章所謂女者即指其人而言也但此章雖是賦體而託言畏多露之沾濡故不敢早晚獨行以見其恐懼戒謹以禮自守之意黃氏佐曰此章述其自守之辭固以禮也首句分上是有可畏之勢下是存敬畏之心姚氏舜牧曰禮女子夜行必燭况道間之行可夙夜乎謂行多露辭婉而拒嚴矣鍾氏惺曰豈不夙夜二句正逺嫌慎漸以禮守身處誰謂雀無角叶盧谷反何以穿我屋誰謂女音汝無家叶音谷何以速我獄雖速我獄室家不足集傳興也家謂以媒聘求為室家之禮也速召致也貞女之自守如此然猶或見訟而召致於獄因自訴而言人皆謂雀有角故能穿我屋以興人皆謂汝於我嘗有求為室家之禮故能致我於獄孔氏穎達曰獄者埆也囚證於角核之處周禮謂之圜土囚證未定獄事未决繫之於圜土因謂圜土亦為獄然不知汝雖能致我於獄而求為室家之禮初未嘗備如雀雖能穿屋而實未嘗有角也集說鄭氏康成曰人皆謂雀之穿屋似有角強暴之男召我而獄似有室家之道於我也物有似而不同雀之穿屋不以角乃以咮今强暴之男召我而獄不以室家之道於我乃以侵陵物與事有似而非者士師所當審也輔氏廣曰以首章推之恐後二章雖為興體亦皆是設言蓋以貞女自言誰謂雀無角何能穿我之屋誰謂女於我無求為室家之禮何能召致我於獄皆恐其或然而不敢忽之辭尤見其恐懼戒謹之意後兩句則又决絶之辭曰正使女真能召我於獄然女之求為室家之禮既有所不足則我亦終不女從也附録毛氏萇曰昏禮䊷帛不過五兩䊷同緇鄭氏康成曰幣可備也室家不足謂媒妁之言不和六禮之來彊委之孔氏穎達曰野有死麕箋云不由媒妁知此有媒妁者以此相訟明其使媒但不和而致訟耳誰謂鼠無牙叶五紅反何以穿我墉誰謂女無家叶各空反何以速我訟叶祥容反雖速我訟亦不女從集傳興也牙牡齒也楊氏時曰鼠無牡齒陸氏佃曰鼠有齒而無牙雀物之淫者鼠物之貪竊者故詩言雀角鼠牙以譬強暴輔氏廣曰牡齒謂齒之大者墉牆也言汝雖能致我於訟孔氏穎達曰司寇職云兩造禁民訟兩劑禁民獄注云訟謂以財貨相告者獄謂相告以罪名此詩無財罪之異重章變其文耳然其求為室家之禮有所不足則我亦終不汝從矣毛氏萇曰不從終不棄禮而隨此強暴之男集說嚴氏粲曰事有可疑而實不然者惟明者能辨之人見男女之訟孰不疑其有室家之事猶見雀之穿屋而疑其有角見鼠之穿墉而疑其有牙然雀實無角鼠實無牙男子乃是侵陵實無室家之事故繼言雖召我獄而室家之道終不足誣我以訟不與汝為夫婦也輔氏廣曰前章室家不足責之以禮也此章亦不女從斷之以義也貞女之志守禮執義如此則被化而成德者深矣總論鄭氏康成曰衰亂之俗微貞信之教興者此殷之末世周之盛德當文王與紂之時孔氏穎達曰行露言召伯聼斷男女室家之訟也文王之時被化日久故強暴之男不能侵陵貞女男雖侵陵貞女不從是以貞女被訟而召伯聼斷之經三章下二章陳男女對訟之辭首章言所以有訟由女不從男亦是聼訟之事也行露三章一章三句二章章六句集說朱子曰使貞女之志得以自伸者召伯聼訟之明召南非一國其被化必有淺深此詩之作其被化之未純者歟故未免有強暴侵陵之患必待聼之明而後察若周南則固無是詩然騶虞純被之後召南亦不宜有是詩矣劉氏瑾曰此詩貞女乃訟之初六強暴之男則訟之九四也初六隂深不永于訟而九四以剛不中正應之貞女自守非所以召訟而男子以强暴陵之然曰室家不足則初六之辨明矣曰亦不女從則九四不克訟矣所以能然者以有召伯為九五之大人也然以此詩之貞女猶周南漢廣之貞女也而彼之出逰人自不犯此雖早夜自守而猶有強暴之訟是又被化有逺近作詩有先後未可遽分優劣也朱氏善曰貞信之女能遵召伯之教服文王之化者也強暴之男不遵召伯之教服文王之化者也豈文王召伯之教化能行之女而不能行之男耶蓋當是時南國之人染商之惡深被周之政淺則或變或不變固不可以一律齊也桃夭之宜室宜家純乎純者也漢廣之逰女歎其終不可求此被化而先變者也行露之貞女見訟而致於獄被化而未純者也斯女也蓋幸而生聖人之世不幸而逺聖人之居也太陽雖無私而其照隂崖也獨後陽春雖無私而其至隂谷也獨遲其勢則然也附録劉氏向列女傳召南申女者申人之女也既許嫁於酆夫家禮不備而欲迎之女與其人言夫婦者人倫之始也不可不正夫家輕禮違制不可以行夫家訟之於理女終以一禮不備持義不往而作詩曰雖速我獄室家不足君子以為得婦道之儀故舉而揚之傳而法之以絶無禮之求防淫欲之行焉案韓嬰詩外傳所載作行露詩之人與劉向列女傳大指相同夫向世傳魯學者也則是詩之說韓魯合矣詩小序泛言貞女朱傳因之然其所謂室家不足者鄭箋曰禮不足而強來是已又曰媒妁之言不和六禮之來强委之其義稍别朱子則曰求為室家之禮初未嘗備是亦同韓魯之解故録向說於篇末羔羊之皮叶蒲何反素絲五紽徒何反退食自公委於危反蛇音移叶唐何反委蛇集傳賦也小曰羔大曰羊皮所以為裘大夫燕居之服孔氏穎達曰小羔大羊此說大夫之裘宜直言羔而已兼言羊者以羔亦是羊故連言以協句諸侯視朝及卿大夫等同用黑羔裘凡裘人君則用全其臣則褎飾為異素白也紽未詳蓋以絲飾裘之名也毛氏萇曰紽數也古者素絲以英裘不失其制孔氏穎達曰此言紽數謂紽之數有五非訓紽為數也素絲以英裘者織素絲為組紃以英飾裘之縫中既云素絲即云五紽是裘縫明矣錢氏文子曰兩皮之縫不易合故織白絲為紃施之縫中連屬兩皮因以為飾胡氏一桂曰縫之突兀謂紽郝氏敬曰織素絲為組掩其縫際曰紽顧氏夢麟曰羔裘以黑素絲英縫最為分明退食退朝而食於家也自公從公門而出也孔氏頴達曰言退者自朝之詞故知公謂公門少儀云朝廷曰退是也委蛇自得之貌毛氏萇曰委蛇行可從迹也吕氏祖謙曰惟其出入皆可從迹則仰不愧俯不怍而從容自得南國化文王之政在位皆節儉正直故詩人美其衣服有常而從容自得如此也集說孔氏穎達曰召南之國化文王之政在位皆節儉正直儉素由於心服制形於外首二句言節儉也無私存於情得失表於行下二句言正直也蘇氏轍曰君子愛其人則樂道其車服是以詩言羔羊之皮李氏樗曰以羔羊為裘而五紽可以見其節儉委蛇鄭氏謂自得之貌言召南之在位其心無邪故能雍容自得蓋人能平其心則無入而不自得其心不平安得雍容自得也委蛇委蛇雖不言正直而正直之意自見朱子曰衣服有常制進止有常所其節儉正直亦可見矣張氏栻曰重言委蛇舒泰而有餘裕也獨賦其退食之際蓋于此時而然則其在公之正直可知嚴氏粲曰在公之謹飭勉强可能也退食而委蛇則顯微無間也許氏謙曰節儉謂有節制而儉約皆不自放之意非謂用財也節儉即衣服有常之事而正直則從容自得之本也附録韓氏嬰曰素喻潔白絲喻柔屈詩人美大夫有潔白之性柔屈之行進退有度數也毛氏萇曰大夫羔裘以居孔氏穎達曰由大夫服之以居故詩人見而稱之也謂居於朝廷非居於家也論語曰狐貉之厚以居注云在家所以接賔客則在家不服羔裘矣論語注又云緇衣羔裘諸侯視朝之服卿大夫朝服亦羔裘惟豹祛與君異耳明此為朝服之裘非居家也宗伯注云羔取其羣而不失其類士相見注云羔取其羣而不黨公羊傳何休云羔取其贄之不鳴殺之不號乳必跪而受之死義生禮者此羔羊之德也今大夫亦能羣不失類行不阿黨死義生禮是德如羔羊也羔羊之革叶訖力反素絲五緎音域委蛇委蛇自公退食集傳賦也革猶皮也孔氏穎達曰對文則皮革異散文則皮革通此以為裘明非去毛故云革猶皮也緎裘之縫界也毛氏萇曰緎縫也孔氏穎逹曰釋訓云緎羔裘之縫也孫炎曰緎之為界緎然則縫合羔羊皮為裘縫即皮之界緎因名裘縫為緎胡氏一桂曰有界限謂之緎姚氏舜牧曰革之合異為同處則曰緎集說毛氏萇曰自公退食猶退食自公孔氏頴達曰傳於首章既解其數故二章解其體言緎縫也且因爾雅之文爾雅獨解緎者蓋舉中言之朱氏謀㙔曰紽緎皆五知其皮之有五也羔羊之縫符龍反素絲五總子公反委蛇委蛇退食自公集傳賦也縫縫皮合音閣之以為裘也毛氏萇曰縫言縫殺之大小得其制總亦未詳毛氏萇曰總數也胡氏一桂曰合二為一謂之總集說孔氏穎達曰二章既解其體恐人以為紽自數也緎自縫也故於卒章又言總數有五以明緎數亦五緎言縫則紽總亦縫可知傳互言也總論范氏處義曰退食自公再三言之者總見人臣在公無私也黃氏櫄曰詩言以羔為裘而以素絲組之初非以羔羊比在位之德也序曰德如羔羊謂如羔羊之詩所言耳案退食自公二句極寫從容自得光景而其所以能從容自得如此者由於朝廷無事也合觀芣苡可想見二南之時一種太和元氣洋溢於在朝在野之間羔羊三章章四句集說劉氏瑾曰此詩之言賢才猶周南之有罝也蓋文王作人之效如春風和氣所在生輝故人才之所成就驗諸在野則赳赳之武夫公侯腹心觀諸在朝則委蛇之大夫節儉正直此文王之化不可以淺深逺近論者也徐氏光啓曰書畢命云兹殷庶士席寵惟舊怙侈滅義服美於人驕淫矜誇將由惡終俗之不良乃爾文王一先以卑服道以懿恭而過化存神一至於此自非上聖其能若是殷音隱其靁在南山之陽何斯違斯莫敢或遑振振音真君子歸哉歸哉集傳興也殷靁聲也張子曰凡隂氣凝聚陽在內者不得出則奮擊而為靁山南曰陽何斯斯此人也違斯斯此所也遑暇也振振信厚也南國被文王之化婦人以其君子從役在外而思念之故作此詩言殷殷然靁聲則在南山之陽矣何此君子獨去此而不敢少暇乎於是又美其德且冀其早畢事而還歸也嚴氏粲曰或者間或之義不敢或遑則無一時之暇矣劉氏辰翁曰再言歸㦲者不敢必其即歸也集說張子曰如鸛鳴婦歎之義將風雨則思念行者蘇氏軾曰興之為言猶曰其意云爾殷其靁在南山之陽此非有取乎靁也蓋必其當時之所見而有動乎其意也吕氏大臨曰再言歸哉者欲慎其歸以復命也逺行從役不辱君命然後可以言歸嚴氏粲曰召南大夫之妻感風雨將作而念其君子言殷然之靁聲在彼南山之南何為此時違去此所乎蓋以公家之事而不敢遑暇也所謂勸以義也遂稱振振信厚之君子歸哉歸哉兾其畢事來歸而不敢為決辭知其未可以歸也從事獨賢而無怨惟信厚者能之彭氏執中曰或云行者遇雨則思居者之安居者遇雨則思行者之勞也朱氏公遷曰靁以興此人南山以興此所在字與違字相呼應而莫敢或遑又與殷殷舒緩之意應朱氏善曰何斯違斯念其久也莫敢或遑閔其勞也振振君子美其德也歸哉歸哉望其至也往役者君子事上之義思念者婦人愛夫之情二者固竝行而不相悖也顧氏夢麟曰案此詩反興之始也興四句止振振不専泥夫婦相與方氏應龍曰振振見其立心誠篤制行渾厚以殷勤效勞于國不至于僨事蒙愆以眷眷懷顧其私不至於二三其德公旬之託不負五日之期不移此可以望其早畢事而還歸也胡氏紹曾曰室家之情别則思思則怨而况以無定之蹤值不遑之勢第曰歸哉歸哉稱其君子者有素行之優望其君子者無意外之慮可謂中正和平矣附録鄭氏康成曰靁以喻號令于南山之陽又喻其在外也召南大夫以王命施號令於四方猶靁殷殷然發聲於山之陽大夫信厚之君子為君使功未成歸哉歸哉勸以為臣之義未得歸也王氏質曰君子行役當在南故屬耳多在南也君子出行當是靁收聲之後聞靁發聲則覺氣變候移念君子之歸也或何時與何日去此地所歷已多而不能盡省也猶勉之以勤而不勸之以偷然夫婦之情終不可廢也殷其靁在南山之側叶莊力反何斯違斯莫敢遑息振振君子歸哉歸哉集傳興也息止也集說李氏樗曰上既言殷其靁在南山之陽既而在山之側此言靁之在此復在彼以見召南之大夫逺行從政在彼又在此以勤於王事也殷其靁在南山之下叶後五反何斯違斯莫或遑處尺煮反振振君子歸哉歸哉集傳興也集說黃氏櫄曰因聞靁而動其思念之情南山之側南山之下皆是一意但更其韻以協聲耳不必求其異義也總論輔氏廣曰此詩念其勞美其德兾其早畢事以還歸無棘欲無怨辭可謂得其情性之正矣婦人而能如此文王之化深矣謝氏枋得曰始不敢暇中不敢止終不敢暇居處一節緊一節此詩人法度也吕氏柟曰殷其靁奚興乎曰言靁且有定處君子不遑曾靁之不若也有序乎曰陽而側側而下靁愈近君子愈逺徐氏光啓曰古者戍役仲春而歸閨中思婦此時獨切蓋以至家之期望之也此時靁乃發聲蟄蟲始振故殷靁草蟲俱即時即景而言可見歸期未至亦未敢遽望其歸序所云勸以義也殷其靁三章章六句集說朱子語類問殷其靁比君子于役之類莫是寬緩和平故入正風曰固然但正變風亦是後人如此分别當時亦只是大約如此取之聖人之言在春秋易書無一字虛至於詩則發乎情不同劉氏瑾曰此詩之念行役猶周南之有汝墳也然視汝墳獨無尊君親上之意者蓋彼詩作於既見君子之時故得慰其勞而勉以正此詩作於君子未歸之日故但念其行役之勞然而無怨咎之辭則其婦人之賢文王之化亦皆可見矣朱氏善曰二南言振振者凡三螽斯之振振以衆盛言也麟趾之振振以仁厚言也殷其靁之振振以信厚言也自子孫之衆多而言故取其盛自聖化之漸濡而言故取其仁自室家之别離而言故取其信言固各有所指也摽婢小反有梅其實七兮求我庶士逮其吉兮集傳賦也摽落也梅木名華白實似杏而酢庶衆逮及也吉吉日也毛氏萇曰盛極則隋落者梅也尚在樹者七吉善也歐陽氏修曰吉者宜也求其相宜者也南國被文王之化女子知以貞信自守懼其嫁不及時而有強暴之辱也故言梅落而在樹者少以見時過而太晚矣劉氏瑾曰周禮仲春令會男女梅落之時則四月矣故曰時過而太晚求我之衆士其必有及此吉日而來者乎集說輔氏廣曰此乃女子自言其心事之實而已無隱情無慝志非文王之化其能臻此哉嚴氏粲曰述女子之情言擊落之餘尚有殘梅其實之在木者惟七則其零落者多矣於此衆士之中其擇之以為昏姻當及此時日之吉懼良辰之難得而易失也季氏本曰願為有家女之同情不能已於有言故作是詩欲男子之早議昏也其言雖若女求於男然欲庶士以昏姻之禮相求則庶士之中猶有所擇而擇吉通言亦不苟從也庶幾知從一之道而無淫邪之心亦可謂不失正矣附録鄭氏康成曰梅實尚餘七未落喻始衰也謂女二十春盛而不嫁至夏則哀我我當嫁者求女之當嫁者之衆士宜及其善時善時謂年二十雖夏未大衰孔氏穎達曰女被文王之化貞信之教興必不自呼其夫令及時之取已言我者詩人我此女之當嫁者非女自我范氏處義曰詩人設為女家之詞黃氏震曰諸家皆以為女子之情戴岷隱云求我庶士擇壻之詞父母之心也摽有梅其實三叶疏簪反兮求我庶士逮其今兮集傳賦也梅在樹者三則落者又多矣今今曰也蓋不待吉矣毛氏萇曰今急辭也鄭氏康成曰此夏鄉晚梅之隋落差多歐陽氏修曰今者時也欲及時也集說嚴氏粲曰時過而不留不可緩矣故言及今可成昏也摽有梅頃音傾筐塈許器反之求我庶士逮其謂之集傳賦也塈取也頃筐取之則落之盡矣謂之則但相告語而約可定矣毛氏萇曰不待備禮也歐陽氏修曰謂相語也遣媒妁相語以求之也季氏本曰謂庶士當使媒妁通言非謂不待其禮之至而往也集說黃氏櫄曰毛氏以為男女相奔不禁固為害理少南以為此時可以言許也亦未為盡豫以為男女固欲及時而亦必以正雖盛年之當嫁亦必待父母之命媒妁之言也然桃夭言昏姻及時而此詩言得以反時云者謂僅及時也二詩之作亦有閒矣總論蘇氏轍曰女子之盛時猶是梅也七而擇其吉三而及其今盡而聼其謂此所以各及其時也吕氏祖謙曰是詩也其詞汲汲如將失之豈習亂而喜始治者耶輔氏廣曰其辭雖若汲汲然必待夫士之求也懼時之過者情也待士之求者禮也發乎情止乎禮義蓋不獨變風為然矣嚴氏粲曰此詩述女子之情欲得及時而嫁蓋紂之淫風既微而昏姻以正女無異志必待聘而後行所謂被文王之化也許氏謙曰摽有梅之詩女子守正也昏姻之時雖迫而禮義不可廢必其命媒妁通辭意以盡禮儀然後從之豈因過時之小失而不全昏姻之大禮乎此召南之風化也摽有梅三章章四句集說范氏祖禹曰昔者聖人觀天地萬物之情因民之有男女而制為昏禮使之夫婦有别以相生養以相代續是以關雎言后妃之德而至於男女以正昏姻以時鵲巢言夫人之德而至於男女得以及時桃夭美其盛也故以桃喻摽有梅欲其早也故以梅喻東山言嫁娶之候亦曰倉庚于飛熠耀其羽聖人覩草木蟲鳥之變意未嘗不在民也朱子曰如摽有梅詩女子自言昏姻之意如此看來自非正理但人情亦自有如此者不可不言向見伯恭麗澤詩有唐人女言兄嫂不以嫁之詩亦自鄙俚可惡後來思之亦自是見得人之情處為父母者能於是而察之則必使之及時矣此所謂詩可以觀女子之情欲昏姻之及時視桃夭則少貶矣行露死麕於漢廣亦然問若以此詩為女子自作恐不足以為風之正經曰以為女子自作亦不害蓋里巷之詩但如此已為不失正矣嘒呼惠反彼小星三五在東肅肅宵征夙夜在公實命不同集傳興也嘒微貌三五言其稀蓋初昏或將旦時也毛氏萇曰小星衆無名者三心五噣四時更見鄭氏康成曰衆無名之星隨心噣在天猶諸妾隨夫人以次序進御於君也心在東方三月時也噣在東方正月時也如是終嵗列宿更見孔氏穎達曰知三為心者心實三星公羊云心為大辰故言三星此及綢繆苕之華皆云心也知五是噣者元命苞云栁五星釋天云咮謂之栁天文志曰栁為鳥喙則喙者栁星也以其為鳥星之口故謂之喙心東方之宿栁南方之宿朱氏道行曰君日象夫人月象衆妾分被餘光以自照故取象小星因星小故曰嘒三五偶指所見而云也肅肅齊音咨又音齊遫音速貌鄭氏康成曰齊謙慤貌遫猶蹙蹙也宵夜征行也何氏楷曰衆妾進御於君初昏見星而往將旦見星而還往來總在暗中雖夙亦是夜故曰宵征實與實同命謂天所賦之分也南國夫人承后妃之化能不妒忌以惠其下故其衆妾美之如此蓋衆妾進御於君不敢當夕禮記內則妻不在妾御莫敢當夕注辟女君之御日也孔氏穎達曰妾非但不敢當女君之御日縱令自當君之御日猶不敢當夕而往見星而往見星而還故因所見以起興其於義無所取特取在東在公兩字之相應耳遂言其所以如此者由其所賦之分不同於貴者是以深以得御於君為夫人之惠而不敢致怨於往來之勤也集說鄭氏康成曰夙早也謂諸妾肅肅然夜行或早或夜在於君所以次序進御者是其禮命之數不同也孔氏穎達曰古者后夫人將侍君前至於房中釋朝服襲燕服然後入御於君雞鳴太師奏雞鳴於階下然後夫人鳴佩玉於房中告去由此言之夫人往來舒而有儀諸妾則肅肅然夜而疾行是其異也或早或夜在於君所謂諸妾夜晚始往及早來也亦異於夫人也嚴氏粲曰綢繆三星在天傳云在天謂始見於東方也列宿始見於天則在東方始見於東喻始進御於君也嘒彼小星維參所森反與昴叶力求反肅肅宵征抱衾與裯直留反實命不猶集傳興也參白卯西方二宿之名毛氏萇曰參伐也昴留也孔氏頴達曰天文志云參白虎宿三星直下有三星鋭曰伐演孔圖云參以斬伐故言參伐也昴六星昴之為言留言物成就繫留是也程子曰此言衆無名之星亦隨伐留在天衾被也裯襌音丹被也興亦取與昴與裯二字相應猶亦同也毛氏萇曰猶若也集說程子曰賤妾得進御於君是其僭恣可行而分限得踰之時也乃能謹於抱衾與裯而知命之不猶則教化至矣總論范氏處義曰小星之詩能使賤妾亦知天命自非夫人無妒忌之行所以感其心者有素何以得此序詩者以為惠及下殆與樛木逮下無異然則夫人與賤妾可謂兩盡其道矣黃氏櫄曰夫人不能無妒忌是之謂無其德衆妾不能盡其心是之謂不知命小星之夫人惠及賤妾而賤妾雖得進御於君亦知其命有貴賤真可為萬世閨門之法也輔氏廣曰夫人能惠下故其衆妾之情紓平樂易理明欲消皆能勤其事躬其勞知其命分之當然而安之無逸志無怨言也此豈勉強矯揉之所能哉小星二章章五句集傳呂氏曰夫人無妒忌之行而賤妾安於其命所謂上好仁而下必好義者也集說劉氏瑾曰此為衆妾美夫人之詩則亦周南樛木螽斯之類也江有汜音祀叶羊里反之子歸不我以不我以其後也悔叶虎洧反集傳興也水決復入為汜爾雅決復入為汜郭氏璞曰水出去復還邢氏昺曰凡水之岐流復還本水者名汜今江陵漢陽安復之閒蓋多有之朱子曰夏水自江而别以通於漢漢復入江冬竭夏流故謂之夏而其入江處今名夏口即所謂江有汜也皇輿表宋江陵府今湖廣荆州府宋漢陽軍今湖廣漢陽府宋安州今湖廣德安府宋復州今湖廣安陸府沔陽州之子媵妾指嫡妻而言也婦人謂嫁曰歸我媵自我也能左右之曰以謂挾已而偕行也鄭氏康成曰以猶與也范氏祖禹曰以之為言用也是時汜水之旁媵有待年於國而嫡不與之偕行者孔氏穎達曰古者女嫁必姪娣從謂之媵劉氏瑾曰公羊傳注云待年父母國也婦人八嵗備數十五從嫡二十承事君子其後嫡被后妃夫人之化乃能自悔而迎之故媵見江水之有汜而因以起興言江猶有汜而之子之歸乃不我以雖不我以然其後也亦悔矣集說鄭氏康成曰興者喻江水大汜水小然得竝流似嫡媵宜俱行孔氏穎達曰江水大似嫡汜水小似媵言江之有汜得竝流以興嫡之有媵宜俱行言是子嫡妻往歸之時不共我以俱行由不以我俱去故其後也悔蘇氏轍曰江則有汜嫡則有媵而之子之不我以何㦲其後必悔矣蓋不敢怨而俟其悔耳夫不敢怨者悔之道也欲求嫡之悔過而不以怨言犯之蓋事之不失而嫡自悔矣黃氏佐曰江水東注而猶有復入之汜以興之子初不與已偕行而其後有復回之志江有渚之子歸不我與不我與其後也處集傳興也渚小洲也水岐成渚王氏應麟曰韓詩章句一溢一否曰渚與猶以也處安也得其所安也毛氏萇曰處止也程子曰處得其所處也集說鄭氏康成曰江水流而渚留是嫡與已異心使己獨留不行嫡悔過自止黃氏佐曰江水下流猶有所岐之渚以興之子初不我與而後有所處之安蓋前日之悔心有不安今既迎歸則此心便安矣江有沱徒何反之子歸不我過音戈不我過其嘯也歌集傳興也沱江之别者爾雅水自河出為灉漢為潛江為沱孔氏安國曰沱江别名江水南流沱東行水經氐道縣北江水又東為沱郭氏璞曰岷山導江東别為沱大水溢出别為小水之名孔氏穎逹曰禹貢梁州云沱潛既道荆州亦有沱潛者蓋以水從江漢出者皆曰沱潛所以荆梁二州皆有也邢氏昺曰沱水自蜀郡都水縣前山與江别而更流過謂過我而與俱也嘯蹙口出聲以舒憤悶之氣言其悔時也歌則得其所處而樂也鄭氏康成曰嫡有所思而為之既覺自悔而歌歌者言其悔過以自解說也蘇氏轍曰嘯歌以言其不怒也集說范氏祖禹曰嫡悔其褊心而和樂也朱子曰此兼上兩章之意而言易曰震無咎者存乎悔於此見之王風云條其嘯矣列女傳云倚柱而嘯皆悲歎之聲也黃氏佐曰江水猶有别之而為沱時興之子之心猶有復之而為理時其嘯也歌者悔生樂樂生歌也始則未得所處而不樂今則迎我以歸得其所處而樂意之形於歌自不容己也朱氏道行曰江有别水曰沱與上汜渚皆始分終合故取以興總論程子曰此亦文王時詩因附于此其嫡不使備嬪妾之數以侍君也汜水之分渚水之岐沱水之别謂當使妾媵均承其澤也吕氏祖謙曰一章曰悔二章曰處三章曰歌始則悔寤中則相安終則相歡言之序也輔氏廣曰不我以不我與不我過者欲也其後也悔其後也處其嘯也歌者理也從欲者躁急而褊狹復理者安舒而和樂從欲而悔循理而樂則得其性情之正矣朱氏道行曰此詩作于迎時追想夫人當日如此媢忌于禮未安故悔而相迎迎而相處處而相樂婦人隂忮最難變化不意江汜女流善反若此其薰陶感格之神可知矣附録孔氏穎達曰當文王之時江沱之間有嫡不以其媵備妾御之數媵遇憂思之勞而無所怨而嫡有所思亦能自悔過也此本為美媵之不怨因言嫡之能自悔故美媵而後兼嫡也黃氏震曰岷隱云不我以正是置之於無所與事之地非遇勤勞也已乃寬釋曰久當自悔且有以處我嘯歌以俟時不必過為戚戚也無所怨尢此為媵之美此說得之江有汜三章章五句集傳陳氏曰小星之夫人惠及媵妾而媵妾盡其心江沱之嫡惠不及媵妾而媵妾不怨蓋父雖不慈子不可以不孝各盡其道而已矣集說陸氏深曰江有汜之詩次于小星之後小星取其下之能安也江汜取其上之能悔也人無不可改之過世無不可化之人而其本始皆起於家人是二詩之義也陳氏際泰曰江有汜樛木之應也野有死麕俱倫反與春叶白茅包叶補苟反之有女懷春吉士誘之集傳興也麕獐也鹿屬無角陸氏德明曰麕本亦作麏又作麇麞也青州人謂之麏懷春當春而有懷也嚴氏粲曰春者天地交感萬物孳生之時聖人順天地萬物之情令媒氏以中春會男女故女之懷昏姻者謂之懷春吉士猶美士也劉氏辰翁曰稱其人曰吉士厚也又愧之也南國被文王之化女子有貞潔自守不為強暴所汚者故詩人因所見以興其事而美之輔氏廣曰以為詩人因所見以興其事而美之則是以白茅包死麕而興吉士之誘女子也猶言有美質則必有來求之者也若以為賦則皆是言其實事但作興體則意味長故先生定以為興體而附或者之說於後或曰賦也言美士以白茅包其死麕而誘懷春之女也王氏安石曰野有死麕白茅包之者禮之薄也而猶愈於無禮朱子曰野有死麕潘叔恭謂強暴者欲以不備之禮為侵陵之具得之集說毛氏萇曰郊外曰野野有死麕羣田之獲而分其肉白茅取潔清也誘道也孔氏穎達曰曲禮注進客謂導之明進導一也故以誘為導言吉士誘之者女欲令吉士使媒人導達成昏禮也蘇氏轍曰野有死麕有欲用之猶以白茅包之而後行今有女於此思以春適人亦必得吉士以禮導之而後可疾時不然也古者昏禮以嵗之隙自冬及春皆其時也嚴氏粲曰此詩述聞者惡之之辭言野外有死麕人欲取其肉而食之猶以白茅包裹之恐為物所汚有女子懷春而欲嫁善良之士何不以禮娶之乃誘之乎無禮者豈是吉士但美其稱以責之言汝本善良何乃為此林有朴蒲木反􅈪音速野有死鹿白茅純徒尊反束有女如玉集傳興也朴􅈪小木也孔氏穎達曰釋木云朴􅈪心某氏曰朴􅈪斛􅈪也有心能音耐濕江河間以作柱孫炎曰朴􅈪一名心是朴􅈪為木名也言小木者以林有此木故言小木也鹿獸名有角純束猶包之也嚴氏粲曰純聚而包束之如玉者美其色也上三句興下一句也輔氏廣曰此在興體中又是一格但言有女如玉而不言所以求之者蒙上章意也或曰賦也言以朴􅈪藉死鹿束以白茅而誘此如玉之女也吕氏祖謙曰以朴􅈪為禮意其若致薪芻之饋之類集說毛氏萇曰德如玉也鄭氏康成曰取其堅而潔白蘇氏轍曰將取朴􅈪死鹿以為用猶知以白茅純束而取之况有女如玉而可不以禮成之㦲范氏處義曰女子之德如玉之潔白不可犯以非禮白茅純束亦以比德與生芻一束其人如玉之意同舒而脫脫敕外反兮無感我帨始鋭反兮無使尨美邦反也吠符廢反集傳賦也舒遲緩也脫脫舒緩貌鄭氏康成曰貞女欲吉士以禮來脫脫然舒也感動帨巾尨犬也鄭氏康成曰奔走失節動其佩飾非禮相陵則狗吠孔氏穎達曰內則云子事父母婦事舅姑皆云左佩紛帨注云帨拭物之巾此章乃述女子拒之之辭言姑徐徐而來毋動我之帨毋驚我之犬以甚言其不能相及也其凛然不可犯之意蓋可見矣輔氏廣曰舊說舒而脫脫兮作女子之容儀舒緩下兩句方為女子之言今先生定此章為述女子拒之之辭故併以此句為女子之言此詩之意都在此章不必於前章死字白字懷春字誘字上巧生意見才如此便害了此詩本旨集說嚴氏粲曰其人相近未必便動其帨未必便使尨吠但深惡而欲逺之所謂與惡人處若將浼焉者也胡氏一桂曰莫動我之帨拒之使逺其身也莫驚我之犬又拒之使逺其室也此可見其凛然不可犯矣總論吕氏祖謙曰此詩言貞女惡無禮而拒之曰有女懷春吉士誘之言非不懷昏姻必待吉士以禮道之也曰有女如玉則正言其貞潔不可犯矣至於其末拒之益切矣毛鄭以誘為道儀禮射禮亦先有誘射皆謂以禮道之古人固有此訓詁也朱氏公遷曰末章非必出於女子之口詩人特探其意而言之所謂極其形容也此詩大㫖全在末章若無此三言則淫奔之詩而已此與行露同類所美專在女子事雖不正而女子之心則正也蓋淫風方革之時故其詩如此郝氏敬曰是詩朱子改為女子自守不為强暴所汚詩人因所見以美之而古序必曰惡無禮何也蓋紂時淫昏成俗而羞惡之心人皆自有文王化行皆知無禮之可惡此格心之化也案朱子雅鄭之辨謂三百篇不能無邪聖人以無邪一言以蔽之者槩言詩之正者多而已然則何不於邪者而盡去之乎蓋以為泯其失無以彰其得也不指乎民心之流不足以顯民彝之真也夫周南召南夫子以為不學猶正牆面而立則周南召南皆為正風固已然召南所載懷春之女有誘之者行露之女有速之訟獄者彼士豈化外之民乎然非是無以見幽女之貞而文王之化行也詩人借彼以形此而聖人録之者其即所以為教也歟野有死麕三章二章章四句一章三句集說劉氏瑾曰召南有此詩亦猶周南有漢廣但漢廣則男女各得其正而行露死麕二詩方作之時則女已貞而男未正耳何彼穠奴容反與雍叶矣唐棣徒帝反之華芳無胡瓜二反曷不肅雍王姬之車斤於尺奢二反集傳興也穠盛也猶曰戎戎也穠石經作襛陸氏德明曰襛如容反韓詩作茙茙音戎唐棣栘音移也似白楊陸氏璣曰唐棣薁李也一名雀梅亦曰車下李所在山中皆有其華或白或赤五月中成實大如李子可食郭氏璞曰江東呼夫栘肅敬雍和也周王之女姬姓故曰王姬王姬下嫁於諸侯車服之盛如此而不敢挾貴以驕其夫家故見其車者知其能敬且和以執婦道於是作詩以美之曰何彼戎戎而盛乎乃唐棣之華也此何不肅肅而敬雍雍而和乎乃王姬之車也朱子曰何彼曷不皆設問之辭也此乃武王以後之詩不可的知其何王之世然文王大姒之教久而不衰亦可見矣輔氏廣曰此詩不可知其的在何王之世然為王姬下嫁齊侯而有肅敬雍和之德則無可疑矣敬與和婦德之首二南多言后妃夫人大夫妻之美而此詩乃美王姬下嫁而作故取而附之或近或逺皆所以見文王大姒之教也集說孔氏穎達曰王姬天子之女下嫁於諸侯其所乘之車所衣之服皆不繫其夫為尊卑下王后一等而已其尊如是猶能執持婦道以成肅敬雍和之德不以己尊而慢人此王姬之美也朱子曰使人望其車而知其敬且和則其根於中者深而發于外者著矣嚴氏粲曰王姬下嫁車服盛美而不以貴盛自驕故言豈不肅敬雍和乎王姬不可見唯見其車故指車以言車中之人何彼穠矣華如桃李平王之孫齊侯之子叶奬里反集傳興也李木名華白實可食舊說平正也武王女文王孫適齊侯之子鄭氏康成曰正王者德能正天下之王皇甫氏謐曰武王五男二女元女妻胡公王姬宜為媵今何得適齊侯之子或以尊故命同族為媵孔氏穎達曰此文王也文者諡之正名也稱之則隨德不一故以德能正天下則稱平王又大誥注受命曰寧王承平曰平王故君奭云寧王之德是文王也王氏安石曰所謂平王者猶格王寧王而已所謂齊侯者猶康侯寧侯而已劉氏瑾曰二南乃周公制作時所定則有武王以後之詩固無可疑其稱文王為平王猶棫朴之稱為辟王文王有聲之稱為王后江漢之稱為文人初不拘於諡也又如商頌稱湯為武王稱契為𤣥王文王有聲稱武王為皇王韓奕稱厲王為汾王詩人之詞類如此或曰平王即平王宜臼齊侯即襄公諸兒事見春秋春秋莊公十有一年王姬歸于齊左傳齊侯來迎共姬胡氏一桂曰以為東遷之王齊國之侯與春秋甚協然以東周之詩得入召南之風而黃氏所謂周太師編後經吾夫子手不應若此其失倫者誠為可疑豈秦火之餘漢儒修補不免簡編之雜耶然則此說只當如集傳作或曰以附之俾讀者知其說可也劉氏瑾曰集傳疑齊侯為襄公則所謂齊侯之子蓋指桓公小白也又案齊襄公亦娶王姬春秋書王姬歸于齊者是也若以為此事則襄公是僖公子詩中所指齊侯又當為僖公矣未知孰是朱子曰此詩義疑故兩存之問何彼穠矣之詩何以録於召南曰也有些不穩當但先儒相傳如此說也只得恁地就他說如定要分箇正經及變詩也自難考據以桃李二物興男女二人也鄭氏康成曰華如桃李者興王姬與齊侯之子顔色俱盛集說孔氏穎達曰上章言唐棣之華此章不言木名直言華如桃李則唐棣之華如桃李之華也李氏樗曰平王毛氏以為文王正也若以為東遷之平王則不當列之於二南矣黃氏櫄曰說者疑為周哀之詩詩自周大師之所編而後又經吾夫子之手豈若此其失倫㦲李迂仲又疑此詩若是武王之女則不當列之於風豫曰王姬雖武王之女而嫁諸侯之國則列之於風亦無可疑矣嚴氏粲曰言文王之孫者以見王姬肅雍之德其源流有自來也故此詩為文王之風附録李氏樗曰平王既非東遷之平王則齊侯之子亦非齊國之子也齊一也其釣維何維絲伊緡齊侯之子平王之孫叶須倫反集傳興也伊亦維也緡綸也孫氏炎曰緡綸皆繩名也郭氏璞曰緡繩也江東謂之綸絲之合而為綸猶男女之合而為昏也集說孔氏穎達曰其釣魚之法維何以為乎維以絲為繩則是善釣以興其娶妻之法亦何以為之乎維以禮為之則是善娶上章主美王姬適齊侯之子故先言平王之孫此章主說齊侯之子以善道求王姬故先言齊侯之子蘇氏轍曰魚之深釣而得之者由絲緡也王姬之貴娶而得之者由禮也總論范氏處義曰唐棣其華特盛桃李同時而華皆取相輝映之義詩人謂彼車服之盛如唐棣如桃李然一遵於禮初無浮靡僭侈之事人之見之皆以為能敬而和則王姬之德可想而知以絲為綸有合姓綢繆之意釣用絲綸可以得魚猶合二姓之好可以成家吕氏祖謙曰肅雍者王姬而曰王姬之車不敢指切之也平王之孫齊侯之子其辭匹敵則不驕亢可知也此詩為美王姬而作自應先稱王姬至末章則反覆歌詠之非有他義也輔氏廣曰一章専美王姬二章三章并美公子何彼穠矣三章章四句集說荀氏悅曰尚主之制非古也釐降二女陶唐之典歸妹元吉帝乙之訓王姬歸齊宗周之禮也胡氏安國曰陽倡而隂和夫先而婦從則雖以王姬之貴當執婦道與公侯大夫士庶人之女何以異㦲故舜為匹夫妻帝二女而曰嬪於虞王姬嫁於諸侯而亦成肅雍之德陳氏鵬飛曰美王姬則曰平王之孫齊侯之子美韓侯取妻則曰汾王之甥蹶父之子蓋曰其子如此以其父母如此也其孫如此以其祖父如此也君子之善善也周矣范氏處義曰此詩正如甘棠皆作於召公既去之後録詩者得於召南之地故編次於召南况王姬能成肅雍之德有文王雍雍在宫肅肅在廟之遺風世數雖逺實文王之子孫也在成王時多士助祭者肅雍顯相詩人亦以為秉文之德其詩繫之文王則文王之子孫有祖之德繫之文王何疑之有鄒氏忠𦙍曰鄭漁仲曰何彼穠矣為詩之時則東周也采詩之地則召南也曽不思黍離既作甘棠故地已非周有天朝歸妹何與岐雍舊民事穠李之歌不與條梅竝奏審矣顧安所采此或者又見春秋兩書王姬歸齊未知誰是此詩所詠夫帝子下降何國蔑有即齊以名邦聨姻王室當亦不止此二姬特由魯主昏則書非魯主昏則不書耳附録鄭氏樵曰何彼穠矣之詩平王以後之詩也詩中此類甚多召南中有康王以後之詩有平王以後之詩不特文武時也甘棠行露之美召公既沒之後在康王世也何彼穠矣作於平王以後亦猶是也章氏俊卿曰此詩乃是平王以後事大抵詩之所載上起文王下訖陳靈則陳靈之世詩之篇目皆未定也二南雖為文王之風而文王之後以至陳靈凡詩之主乎夫婦而言乎人倫則後世取而附之二南之末亦勢之所不免也案此詩古序美王姬也毛鄭皆以為武王之女下嫁侯國能執婦道故詩人美之其傳舊矣至宋世學者以此詩稱平王齊侯遂有一二家指為東周之詩而朱子亦不能定於是更有為之說者曰莊王命魯莊公主昏以桓王之妹嫁齊襄公周人傷之而作是詩嘗讀而疑之集傳云或曰平王即平王宜臼齊侯即襄公諸兒事見春秋夫春秋以前王姬之下嫁者當不少矣然無文爾兹就或說以考莊公十有一年即莊王十四年以共姬妻齊桓公桓公名小白父僖公名祿父兄襄公名諸兒則桓公乃是弟詩何得云齊侯之子也且桓立三年共姬歸齊言侯則允言侯子則非又考齊襄公于莊王四年亦娶王姬春秋莊公元年夏單伯逆王姬秋築王姬之館于外冬王姬歸于齊是紀魯莊公主王姬之嫁於齊襄公也若以為此事則襄公是僖公之子詩中所指齊侯又當為僖公而王姬嫁時襄公已為齊侯五年矣亦不應仍稱為齊侯之子也且襄公通夫人姜氏而醉殺魯桓公莊公為魯桓之子主昏嫁齊襄公春秋譏其忘親滅理故一書再書又再書如此况齊風南山詩以雄狐刺齊襄并刺桓公聖人録之以示戒豈有二南為風化之本又入衰世之變風乎左傳載季札觀樂於周南召南曰美㦲始基之矣蓋以為王化之基也亦安得有所謂刺詩矧聖人論詩首重二南則以是詩為正風所以翼經而從聖他說可以存而弗論矣彼茁側劣反者葭音加一發五豝百加反于音吁嗟乎騶虞叶音牙集傳賦也茁生出壯盛之貌葭蘆也亦名葦鄭氏康成曰記蘆始出者著春田之早晚嚴氏粲曰葭蘆葦又名華一物而四名葭葦之初生者發發矢豝牡豕也一發五豝猶言中必疊雙也季氏本曰毛傳云豕牝曰豝本爾雅釋獸文觀駟驖詩曰奉時辰牡則將為乾豆之具用牝者非也禮射每發四矢集傳若謂發四矢而得獸者五則獸多於矢意其間必有疊中者故以中必疊雙明之何氏楷曰案廣雅凡獸二嵗通名為豝據杜預解春獵為搜謂搜索擇取不孕者若云豕牝則有孕道當從二嵗名也騶虞獸名白虎黑文不食生物者也周禮凡射王以騶虞為節毛氏萇曰騶虞義獸也有至信之德則應之漢書司馬相如封禪書囿騶虞之珍羣頌曰般般之獸樂我君囿顔師古注謂騶虞也陸氏璣曰騶虞尾長於軀不食生物不履生草應信而至者也陸氏佃曰騶虞西方之獸而名之曰虎則宜以殺為事今反不履生草食自死之肉蓋仁之至也南國諸侯承文王之化修身齊家以治其國而其仁民之餘恩又有以及於庶類故其春田之際草木之茂禽獸之多至於如此而詩人述其事以美之且歎之曰此其仁心自然不由勉強是即真所謂騶虞矣集說毛氏萇曰虞人翼五豝以待公之發翼驅也孔氏頴達曰言彼茁茁然出而始生者葭草也國君於此草生之時出田獵一發矢而射五豝獸五豝惟一發者不忍盡殺仁心如是故于嗟乎歎之騶虞有仁心國君亦有仁心故比之田獵則虞人之事故山虞云若大田獵則萊除草曰萊山田之野澤虞云若大田獵則萊澤野天子田獵使虞人諸侯亦然君止一發必翼五豝者中則殺一而已朱子曰于田獵之際見動植之蕃庶因以贊詠文王平昔仁澤之所及而非指田獵之事為仁也禮曰無事而不田曰不敬故此詩彼茁者葭仁也一發五豝義也輔氏廣曰搜田乃有國之常禮南國諸侯舉行其禮而詩人述其事以美之夫草木之茂禽獸之多蓋必時和嵗豐封植蕃育之所致且一發而已行其禮而不逞其欲此詩人所以詠歎其仁也夫物生茂盛而諸侯于田獵之際又能體文王之德真若騶虞自然之仁焉則周家之王道豈不成全於此㦲附録歐陽氏修曰召南風人美其國君順時畋于騶囿之中搜索害田之獸其騶囿之虞官乃翼驅五田豕以待君之射君有仁心惟一發矢而已不盡殺也故詩之首句言田獵之得時次言君仁而不盡殺卒歎虞人之得禮嚴氏粲曰月令季秋天子乃教于田獵命僕及七騶咸駕鄭氏云七騶謂趣馬主為諸官駕說者也成十八年左傳晉悼公使程鄭為乘馬御六騶屬焉使訓羣騶知禮是騶為騶御也朱氏孟子解以虞人為守囿之吏故齊景公田則招虞人是虞為虞人也禮記射義云天子以騶虞為節樂官備也謂騶御虞人皆不乏人則官備可知王氏應麟曰射義騶虞為節鄭注云于嗟乎騶虞歎仁人也周禮疏引韓魯說騶虞天子掌鳥獸官其說與射義合郝氏敬曰田獵備官而所取不多不敢斥君而呼騶虞騶虞之仁君之仁也彼茁者蓬一發五豵子公反于嗟乎騶虞叶五紅反集傳賦也蓬草名許氏慎曰蓬蒿也一嵗曰豵亦小豕也鄭氏康成曰豕生三曰豵孔氏頴逹曰傳以七月云言私其豵獻豜于公大司馬云大獸公之小獸私之豵言私明其小故彼亦云一嵗曰豵獻豜于公明其大故彼與還傳皆云三嵗曰豜伐檀傳曰三嵗曰特蓋異獸别名故三嵗者有二名也大司馬職注云一嵗為豵二嵗為豝三嵗為特四嵗為肩五嵗為慎其說與毛或異或同不知所據箋以豵者豕生之數非大小之名故釋獸云豕生三豵二師一特一解雖生數之名大小皆得名之言私其豵謂小時此國君搜田所射未必小也集說袁氏仁曰葭生於水濵蓬生於陸地五豝五豵言獸之多一發言矢之少和氣充塞庶類繁殖恩及禽獸之意皆在言外沈氏守正曰舉一葭一豝而宇宙蕃育之氣象可推矣此非撙節愛養之所能致也苟有一毫勉強於其間何以亭毒無知之草木無情之禽獸而使之若此之茂對㦲故以騶虞歎之仁心自然即在二句內非進一層語總論朱子語類問麟趾騶虞莫是當時有此二物出來否曰不是只是取以為比即此便是麟趾便是騶虞吕氏祖謙曰彼茁者葭彼茁者蓬記搜田之時蓋所謂勾芒司節和氣扇物草淺獸肥之時也一發五豝一發五豵獸之多而取之鮮也天壤之間和氣充塞庶類蕃殖而恩足以及禽獸者皆可見矣化育之仁其何以形容曰于嗟乎騶虞非騶虞殆不足以當之也朱氏公遷曰麟趾騶虞皆不以物為瑞而以人為瑞麟趾是因公子之仁而見文王之仁騶虞是因諸侯之仁而見文王之仁騶虞二章章三句集傳文王之化始於關雎而至於麟趾則其化之入人者深矣形於鵲巢而及於騶虞則其澤之及物者廣矣蓋意誠心正之功不息而久則其熏蒸透徹融液周遍自有不能已者非智力之私所能及也故序以騶虞為鵲巢之應而見王道之成其必有所傳矣集說孔氏穎達曰詩人之作各言其志麟趾關雎騶虞之與鵲巢未必一人作也麟趾言公子之信厚騶虞歎國君之仁心别為興喻非歎瑞應與前篇共相始終但君子之道作事可法垂憲後昆大師比之於末序者申明其意因言關雎之應鵲巢之應耳其實作者本意不在於應也張氏栻曰麟趾言公子仁厚則在內者無不孚騶虞言國君搜田以時則在外者無不孚也未有邇之未孚而可以及逺者也鵲巢之化是亦關雎之所達也然則天下之本在國國之本在家家之本在身其本一而已劉氏瑾曰此詩之應鵲巢亦猶麟趾之終周南也但作詩者非同一人而皆以仁獸為喻皆以于嗟為詞皆以三句成章皆詞簡而意深豈其同被文王之化而吟詠情性亦有同然者歟編詩者分置二南之末得無意乎案毛鄭以騶虞為獸名歐陽修以騶蓋馬御虞則山澤之官又引射義天子以騶虞為節樂官備也以證其說之有本於是後儒依以立義者不少朱子則從毛鄭之說以釋此詩為正解而别録歐陽氏之論附於古序之後嘗考天子以騶虞為節諸侯以貍首為節卿大夫以采蘋為節士以采蘩為節皆以歌此四詩為節其曰樂官備也者謂一發五豝喻得賢人多賢人多則官備非騶御虞人不乏官之謂又修謂毛詩未出之前說者不聞以騶虞為獸嚴粲遂引爾雅不載騶虞為證然太公六韜淮南子皆曰文王拘羑里散宜生得騶虞獻紂而顔師古注相如封禪書亦指引騶虞他見于經疏緯書者甚夥則不得謂無此獸名矣太公在毛萇前劉安相如與毛同時在鄭康成前亦不得謂始自毛鄭矣顧此猶說詩者之末也總之此詩見南國被文王之化仁心及物春田之盛不忍多殺詩人歎美之曰是即所謂騶虞亦猶周南之歎美公子是即所謂麟也蓋借物為喻原非實有是獸若以為不斥言文王而美騶虞二官則麟趾何以美文王况二詩同一風體朱子以一體解之而别附虞官之說當己苐朱子謂一發五豝猶言中必疊雙似非詩人之意且田獵之禮天子不合圍諸侯不掩羣若以盡物為心於禮為遇而與嗟美文王之澤及草木昆蟲之意亦未符不若鄭孔以獸五豝矢惟一發為仁心之至其義似更優爾召南之國十四篇四十章百七十七句集傳愚案鵲巢至采蘋言夫人大夫妻以見當時國君大夫被文王之化而能修身以正其家也甘棠以下又見由方伯能布文王之化而國君能修之家以及其國也其詞雖無及於文王者然文王明德新民之功至是而其所施者溥矣抑所謂其民皞皞而不知為之者與唯何彼穠矣之詩為不可曉當闕所疑耳朱氏善曰南方之諸侯固非一國也而國君之夫人有鵲巢之德大夫之妻有采蘩之敬立乎朝廷者無不節儉而正直處乎閨門者無不専靜而純一為嫡妻者有逮下之仁為媵妾者有安分之義雖里巷僻逺之處民庶微賤之家而其女子之賢猶以貞信而自守無強暴之相陵則推而上之從可知也積而至於仁如騶虞則王道成矣先儒所謂舉一世而言固無一人之不仁舉一人而言又無一事之不仁者惟此時為然是雖文王意誠心正之功而召伯循行宣布之力亦不可誣也周南召南二國凡二十五篇先儒以為正風今姑從之孔子謂伯魚曰女為周南召南矣乎人而不為周南召南其猶正牆面而立也與章氏俊卿曰孔子告伯魚學詩必自周南召南始蓋詩之序先之以風而周南召南又為風之先焉此皆文王正心誠意有在於此故其肅肅雍雍在於閨門之內而其化行於二南之國儀禮鄉飲酒鄉射燕禮皆合樂周南關雎葛覃卷耳召南鵲巢采蘩采蘋李氏如圭曰鄉飲酒禮諸侯之卿大夫三年大比獻賢能於君以禮賔之與之飲酒之禮鄉射禮州長春秋以禮㑹民而射於州序之禮也合樂謂堂上歌瑟堂下鐘磬合奏此詩也燕禮遂歌鄉樂諸侯與羣臣燕飲酒之禮歌者亦與衆音俱作而歌之鄉飲酒鄉射自歌其樂故言合樂不言鄉樂也燕禮又有房中之樂鄭氏注曰弦歌周南召南之詩而不用鐘磬云房中者后夫人之所諷誦以事其君子李氏如圭曰與四方賔燕則有之程子曰天下之治正家為先天下之家正則天下治矣二南正家之道也陳后妃夫人大夫妻之德推之士庶人之家一也故使邦國至於鄉黨皆用之自朝廷至於委巷莫不謳吟諷誦所以風化天下楊氏時曰二南為王道之基本只為正家而天下定也張氏栻曰二南皆文王時詩周公取以為萬世后妃夫人大夫士庶人妻之法夫刑家之法雖自於己而於其配必謹所擇是蓋禍福之基所以重宗廟重其身正夫婦而為正家之本也集說李氏樗曰道無始則不行而周南則為正始之道化無基則不立而召南則為王化之基范氏處義曰周南以化言召南以德言蓋道德者教化之本教化者道德之效道則無所不該舉其效則德在其中故周南亦曰后妃之德德則隨遇而見舉其德則效在其中故召南亦曰文王之化其繫之周公召公雖因於所得之地其亦成文王之志與黃氏佐曰周公德教始自岐而行於南國故二南之詩始以后妃夫人之德而終以麟趾騶虞之應本之以和敬成之以仁厚萬世不能易也郝氏敬曰風名召南而詩非召詩皆王教也周南岐豐首善王者之風也召南教行南國諸侯之風也周南亦有南國詩如江漢汝墳化由周達也召南無周詩専言化之及逺也欽定詩經傳說彚纂卷二
