body:
  text: 欽定四庫全書欽定詩經傳說彚纂卷首下綱領一此篇論作詩刪詩及傳詩源流虞書詩言志歌永言班氏固曰誦其言謂之詩詠其聲謂之歌鄭氏康成曰詩者弦歌諷喻之聲也唐虞始造其初至周分為六詩孔氏穎達曰舜典命樂已道歌詩經典言詩無先此者上古之時徒有謳歌吟咏縱令土鼓葦籥必無文字雅頌之聲如此則時雖有樂容或無詩名為詩者內則注云詩之言承也春秋說題辭云詩之為言志也詩緯云詩者持也然則詩有三訓承也志也持也作者承君政述己志而為詩所以持人之行故一名而三訓也黃氏櫄曰有天地有萬物而詩之理已具雷之動風之偃萬物之鼓舞皆有詩之理而未著也嬰孩之嘻笑童子之謳吟皆有詩之情而未動也桴以蕢鼓以土籥以葦皆有詩之用而未文也康衢順則之謠元首股肱之歌詩之義已備矣以上論作詩禮記天子五年一巡守命大師陳詩以觀民風論語子曰吾自衛反魯然後樂正雅頌各得其所司馬氏遷曰古詩三千餘篇及至孔子去其重取可施於禮義上采契后稷中述殷周之盛至於幽厲之缺三百五篇孔子皆弦歌之以求合韶武雅頌之音禮樂自此可得而述以備王道成六藝班氏固曰古有采詩之官王者所以觀風俗知得失自考正也孔子純取周詩上采殷下取魯凡三百五篇王氏通曰詩上明三綱下達五常於是徴存亡辨得失故小人歌之以貢其俗君子賦之以見其志聖人采之以觀其變孔氏穎達曰案書傳所引之詩見在者多亡逸者少則孔子所録不容十分去九遷言未可信也據今者及亡詩六篇凡三百一十一篇而史記漢書云三百五篇者以見在為數也歐陽氏修曰馬遷謂古詩三千餘篇孔子刪存三百鄭學之徒以遷為謬豫考之遷說然也今書傳所載逸詩何可數也以詩譜推之有更十君而取一篇者有二十餘君而取一篇者由是言之何啻三千刪詩云者非止全篇刪去或篇刪其章章刪其句句刪其字如唐棣之華偏其反而豈不爾思室是逺而此小雅常棣之詩夫子謂其以室為逺害於兄弟之義故篇刪其章也衣錦尚絅文之著也此鄘風君子偕老之詩夫子謂其盡飾之過恐其流而不返故章刪其句也誰能秉國成不自為政卒勞百姓此小雅節南山之詩夫子以能字為意之害故句刪其字也邵子曰仲尼刪詩十去其九諸侯千有餘國風取十五西周十有二王雅取其六蓋善惡明著者存焉耳程子曰虞之君臣迭相賡和始見於書夏殷之世其傳鮮矣至周而益文所傳者多夫子刪之得三百篇可以垂世立教朱子曰王迹熄而詩亡其存者謬亂失次孔子自衛反魯復得之他國以歸定著為三百篇以上論刪詩陸氏德明曰孔子刪録周詩上兼商頌以授子夏子夏遂作序焉或曰毛公作序口以相傳未有章句戰國之世專任武力雅頌之聲為鄭衛所亂其廢絶亦可知矣遭秦焚書而得全者以其人所諷誦不專在竹帛故也漢興傳者有四家魯人申公受詩於浮邱伯為訓故以教無傳疑者則闕不傳號曰魯詩弟子為博士者十餘人郎中令王臧御史大夫趙綰臨淮太守孔安國膠西內史周霸城陽內史夏寬東海太守魯賜長沙內史繆生膠西中尉徐偃膠東內史闕門慶忌皆申公弟子也申公本以詩春秋授瑕邱江公盡能傳之徒衆最盛魯許生免中徐公皆守學教授丞相韋賢受詩於江公及許生傳子少翁又王式受詩於免中徐公及許生以授張生長安及唐長賓褚少孫張生兄子游卿以詩授元帝傳王扶扶授許晏又薛廣德受詩於王式授龔舍齊人轅固生作詩傳號齊詩傳夏侯始昌始昌授后蒼蒼授翼奉及蕭望之匡衡衡授師丹及伏理滿昌昌授張邯及皮容皆至大官徒衆尤盛後漢陳元方亦傳齊詩燕人韓嬰推詩之意作內外傳數萬言號曰韓詩淮南賁生受之嬰孫商為博士孝宣時涿韓生其後也河內趙子事燕韓生授同郡蔡誼誼授同郡食子公及琅邪王吉子公授太山栗豐吉授淄川長孫順豐授山陽張就順授東海髮福竝至大官毛詩者出自毛公河閒獻王好之徐整云子夏授髙行子髙行子授薛倉子薛倉子授帛妙子帛妙子授河閒人大毛公毛公為詩故訓傳於家以授趙人小毛公一云名萇小毛公為河閒獻王博士以不在漢朝故不列於學一云子夏傳曽申申傳魏人李克克傳魯人孟仲子孟仲子傳根牟子根牟子傳趙人孫卿子孫卿子傳魯人大毛公漢書儒林傳云毛公趙人治詩為河間獻王博士授同國貫長卿長卿授解延年延年授虢徐敖敖授九江陳俠或云陳俠傳謝曼卿元始五年公車徴說詩後漢鄭衆賈逵傳毛詩馬融作毛詩注鄭康成作毛詩箋申明毛義難三家於是三家遂廢矣魏太常王肅更述毛非鄭荆州刺史王基駮王肅申鄭義晉豫州刺史孫育為詩評評毛鄭王肅三家同異朋於王徐州從事陳統難孫申鄭宋徴士鴈門周續之豫章雷次宗齊沛國劉瓛竝為詩序義前漢魯齊韓三家詩列於學官平帝世毛詩始立齊詩久亡魯詩不過江東韓詩雖在人無傳者唯毛詩鄭箋獨立國學李氏延壽曰通毛詩者多出於魏朝劉獻之獻之傳李周仁周仁傳董令度程歸則歸則傳劉敬和張思伯劉軌思其後能言詩者多出二劉之門孔氏穎達曰漢氏之初詩分為四申公騰芳於鄢郢毛氏光價於河閒貫長卿傳之於前鄭康成箋之於後晉宋二蕭之世其道大行齊魏兩河之閒兹風不墜其近代為義疏者有全緩何𦙍舒瑗劉軌思劉醜劉焯劉炫等然焯炫竝聰明特達文而又儒於其所作疏內特為殊絶今據以為本削煩增簡庶以對揚聖範云韓氏愈曰太學博士施先生士丐明毛鄭詩善講說朝之賢士大夫從而執經考疑者繼於門大學生習毛鄭詩者皆其弟子劉氏昫曰許叔牙少精於毛詩貞觀初撰毛詩纂義以進御史大夫髙智同曰凡欲言詩者必須先讀此書宋氏祁曰張士衡瀛州人北齊博士劉軌思授以詩唐興士衡授永平賈公彥公彥傳業李元植元植又授詩齊威歐陽氏修曰梅堯臣周堯卿學長於毛氏詩毛鄭二學其說熾辭辨固已廣博然不合於經者亦不為少豫欲志鄭學之妄益毛氏疏略而不至者合之於經云蘇氏轍曰孔子刪詩三百五篇其亡者六焉經師不得見矣其存者將以解之故從而附益之其言反覆煩重類非一人之詞者凡此皆毛氏之學而衛宏之所集録也東漢儒林傳云衛宏從謝曼卿受學作毛詩序隋經籍志云先儒相承謂毛詩序子夏所創毛公及衛敬仲又加潤益古說本如此故豫存其一言而已曰是詩言是事也而盡去其餘以為此孔子之舊也朱子曰詩自齊魯韓氏之說不傳而學者盡宗毛氏毛氏之學傳者亦衆而今皆不存則推衍毛說者又獨鄭氏之箋而已唐初諸儒為作疏義百千萬言而不能有以出乎二氏之區域至於本朝劉侍讀名敞歐陽公名修王丞相名安石蘇黃門名轍河南程氏橫渠張氏始用己意有所發明魏氏了翁曰永嘉錢文子明經厲志以呂成公名祖謙集衆善存異本朱文公復古經主叶韻於是並去講師增益之說惟存序首一言約文實指篇為一贊曰錢氏集傳又别為詁釋如爾雅類例陳氏日强曰雪山王先生名質刪除詩序實與文公朱先生合主於以意逆志自成一家吳氏師道曰由漢以來毛鄭之學專行宋程純公名皓呂成公猶主序說至於朱子灼見其謬每篇則定其人之作每章則約以賦比興之分叶韻以復古用吟哦上下不加一字之法略釋而使人自悟破拘攣發蒙蔀復還溫柔敦厚之舊無復遺恨自北山何先生基得勉齊黃公幹淵源之傳而魯齊王先生柏仁山金先生履祥授受相承逮白雲許先生謙四傳有衍無閒益大以尊胡氏一中曰輔傳貽先生名廣親炙朱子之門深造自得於問答之際尊其師說所著有詩童子問羽翼集傳朱氏德潤曰詩傳自伊川歐蘇諸先生發其理趣南渡後李迂仲名樗張南軒名栻戴岷隱名漢嚴華谷名粲諸先生又各自名家而學咸宗朱氏虞氏集曰朱子詩傳去序别編以待考辨即經以求其故自為之說而學者從之宋氏濓曰胡一桂得朱子源委之正著詩傳附録纂疏梁益著詩傳㫄通發揮朱學三百篇朱子親注大義昭如日星讀者於事證音義或有未喻汪氏克寬作集傳音義㑹通楊氏士竒曰安成劉瑾輯詩傳通釋采録各經傳要義世謂瑾能闡朱子之蘊以上論傳詩源流綱領二此篇論六義四始詩樂及篇次音韻周禮大師教六詩曰風曰賦曰比曰興曰雅曰頌孔氏穎達曰詩有六義六義六詩其實一也鄭氏康成曰風言賢聖治道之遺化也賦之言鋪鋪陳政教善惡比見失不敢斥言取比類以言之興見美嫌於媚諛取善事以喻勸之雅正也言正者以為後世法頌之言誦也容也誦德廣以美之孔氏穎達曰比云見失謂刺詩之比也興云見美謂美詩之興也其實美刺俱有比興文武時詩風有周南召南雅有鹿鳴文王之屬及成王周公致太平制禮作樂而有頌聲興焉盛之至也故皆録之謂之詩之正經懿王夷王時詩訖於陳靈公之事謂之變風變雅王氏通曰詩有天下之作焉有一國之作焉有神明之作焉阮氏逸曰謂大雅國風頌孔氏穎達曰詩之四始以風為先故曰風風之所用以賦比興為之辭故於風之下即次賦比興然後次以雅頌雅頌亦以賦比興為之賦比興如此次者言事之道直陳為正故賦在比興之先比之與興雖同是附託外物比顯而興隱當先顯後隱故比居興先也天下有道則庶人不議治平纍世則美刺不興故初變惡俗則民歌之風雅正經是也始得太平則民頌之周頌諸篇是也成王之後其美不異於前故頌聲止也陳靈公之後不復可言故變風息也然則變風變雅之作皆王道始衰政教初失尚可匡而復之故執彼舊章覬望更遵正道所以變詩作也王道盛諸侯無正風者政出一人太平非諸侯之力不得有正風王道既衰政出諸侯惡則民怨善則民喜故各從其國有美刺之變風也變雅有先王之澤變風有先公之澤故季札見歌齊曰表東海者其太公乎見歌小雅曰猶有先王之遺民是其風禀先公雅禀先王也王者政教有小大詩人述之亦有小大故有小雅焉有大雅焉歌其大事制為大體述其小事制為小體詩體既異樂音亦殊有大雅小雅之聲王政衰變雅作取大雅之音歌其政事之變者謂之變大雅取小雅之音歌其政事之變者謂之變小雅故變雅之美刺皆由音體有小大不復由政事之大小也頌者美盛德之形容天子道教周備任賢養民逺邇咸服萬物得所故作詩歌其功遍告神明以報神恩也此惟周頌耳其商魯之頌則異商頌是祭其先王之廟述其生時之功非以成功告神其體異於周頌也魯頌主詠僖公功德才如變風之美者耳又與商頌異也歐陽氏修曰風生於文王而雅頌雜於武王之閒風之變自夷懿始雅之變自幽厲始霸者興變風息焉王道廢詩不作焉王通謂諸侯不貢詩天子不采風樂官不達雅國史不明變非民之不作也詩出於民之情性情性豈能無㦲職詩者之罪也程子曰學詩而不分六義豈知詩之體也詩有六體須篇篇求之或有兼備者或有偏得一二者風有風動之意興有興喻之意比則直比之而已蛾睂瓠犀是也賦則敷陳其事如齊侯之子衛侯之妻是也雅則正言其事頌則稱美之言也如于嗟乎騶虞之類是也鄭氏樵曰六義之序後先次第聖人初無加損也風者出於風土大槩小夫賤隸婦人女子之言其意雖逺其言淺近重復故謂之風雅出於朝廷士大夫其言純厚典則其體抑揚頓挫非復小夫賤隸婦人女子能道者故曰雅頌者初無諷誦惟以鋪張勳德而已其辭嚴其聲有節以示有所尊故曰頌風有正變仲尼未嘗言而他經不載焉獨出於詩序皆以美者為正刺者為變則邶鄘衛之詩謂之變風可也緇衣之美武公駟驖小戎之美襄公亦可謂之變風乎必不得已從先儒正變之說則當如榖梁春秋書築王姬之館於外書秋盟於首戴皆曰變之正也蓋言事雖變常而終合乎正也河廣之詩欲往而不往大車之詩畏之而不敢氓之詩反之而自悔此所謂變之正也序謂變風出乎情性止乎禮義此言得之然詩之必存變風何也見夫王澤雖衰人猶能以禮義自防也見中人之性能以禮義自間雖有時而不善終蹈乎善也見其用心之謬行已之乖倘反而為善則聖人亦録之而不棄也吕氏祖謙曰得風之體多者為國風得雅之體多者為二雅得頌之體多者為頌風非無雅雅非無頌興與比相近而難辨興之兼比者徒以為比則失其意味矣興之不兼比者誤以為比則失之穿鑿矣朱子曰詩中說興處多近比如關雎麟趾皆是興而兼比然雖近比其體却只是興且如關關雎鳩本是興起到得下面說窈窕淑女方是入題說那實事比則却不入題了如螽斯羽一句便是說那人了下面宜爾子孫依舊就螽斯羽上說更不用說實事此所以謂之比大率詩中比興皆類此比興之中各有兩例興有取所興為義者則以上句形容下句之情思下句指言上句之事實有全不取義者則但取一二字相應而已要之上句常虛下句常實則同也比有繼所比而言其事者有全不言其事者學者隨文㑹意可也比意雖切而却淺興意雖闊而味長葉氏適曰諸詩各具一體故皆以先後為次惟豳兼有風雅之制以為風則其辭作於朝廷繫於政事以為雅則又記風土焉故列於風雅之間明其不絶於風而可以雅也嚴氏粲曰純乎雅之體為雅之大雜乎風之體為雅之小太史公稱國風好色而不淫小雅怨誹而不亂若離騷可謂兼之言離騷兼國風小雅而不兼大雅見小雅與風騷相類而大雅不可與風騷竝言也王氏柏曰風雅之别即朱子答門人之問亦未一有腔調不同之說有體製不同之說有詞氣不同之說或以地分以時分以所作之人而分諸說皆可參考惟腔調之說朱子晚年之所不取至於楚詞之集注後詩傳二十年風雅頌之分其說審矣其言曰風則閭巷風土男女情思之詞雅則燕享朝㑹公卿大夫之作頌則鬼神宗廟祭祀歌舞之樂以此例推之則所謂體製詞氣所謂以時以地以所作之不同等說皆有條而不紊矣薛氏瑄曰詩之變者何其多而正者何其少邪是皆氣化人事之自然易之陽竒隂偶亦然以上論六義司馬氏遷曰關雎之亂以為風始鹿鳴為小雅始文王為大雅始清廟為頌始孔氏穎達曰風也小雅也大雅也頌也此四者人君行之則為興廢之則為衰是興廢之始故謂之四始也成氏伯瑜曰詩有四始始者正詩也謂之正始周召二南國風之正始鹿鳴至菁莪小雅之正始文王受命至卷阿大雅之正始清廟至般頌之正始此詩陳聖人之德為功用之極王氏安石曰風也二雅也頌也雖相因而成而其序不相襲故謂之四始以上論四始周禮瞽矇掌九德六詩之歌以役大師鄭氏康成曰九德謂六府三事役為之使禮記詩言其志也歌咏其聲也舞動其容也三者本於心然後樂器從之是故情深而文明氣盛而化神荀氏況曰詩者中聲之所止也楊氏倞曰詩謂樂章所以節聲音至乎中而止不使流淫也鄭氏康成曰周南召南為風之正經周公作樂用之鄉人焉用之邦國焉或謂之房中之樂者女史歌之故耳小大雅正經其用於樂國君以小雅天子以大雅然而饗賓或上取燕或下就何者天子饗元侯歌肆夏合文王諸侯歌文王合鹿鳴諸侯於鄰國之君與天子於諸侯同天子諸侯燕羣臣及聘問之賓皆歌鹿鳴合鄉樂此其著略大校孔氏穎達曰原夫作樂之始樂寫人音人音有小大髙下之殊樂器有宫徴商羽之異依人音而制樂託樂器以寫人是樂本效人非人效樂但制樂之後則人之作詩先須成樂之文乃成為音聲能寫情情皆可見聽音而知治亂觀樂而曉盛衰故神瞽有以知其趣也樂記曰其哀心感者其聲噍以殺其樂心感者其聲發以散是情之所感入於樂也季札見歌唐曰思深哉其有陶唐氏之遺民乎是樂音之得其情也朱子曰詩古之樂也亦如今之歌曲音各不同衛有衛音鄘有鄘音邶有邶音故詩有鄘音者係之鄘有邶音者係之邶若大雅小雅則亦如今之商調宫調作歌曲者亦案其腔調而作耳大雅小雅亦古作樂之體格案大雅體格作大雅案小雅體格作小雅非是做成詩後旋相度其辭目為大雅小雅也詩者樂之章也故必學樂然後誦詩所謂樂者蓋琴瑟塤箎之類以漸習之而節夫詩之音律者然詩本性情有美刺風喻之㫖其言近而易曉而從容詠歎所以感人者又易入至於聲音之髙下舞蹈之疾徐所以養其耳目和其心志使人淪肌浹髓而安於仁義禮智之實又有非思勉之所能及者詩之作本為言志而已方其詩也未有歌也及其歌也未有樂也以聲依永以律和聲則樂乃為詩而作非詩為樂而作也三代之時禮樂用於朝廷而下達於閭巷學者諷誦其言以求其志詠其聲執其器舞蹈其節以涵養其心則聲樂之所助於詩者為多然猶曰興於詩成於樂其求之固有序矣是以聖賢之言詩主於聲者少而發其義者多仲尼所謂思無邪孟子所謂以意逆志者誠以詩之作本乎其志之所存得其志而不得其聲者有矣未有不得其志而能通其聲者也就使得之止其鐘鼓之鏗鏘而已豈聖人樂云樂云之意哉況今去孔孟千有餘年古樂無復可考而欲以聲求詩則未知古樂之遺聲今皆可推而得之乎三百五篇皆可協之音律而被之絃歌乎故愚以為詩出乎志者也樂出乎詩者也志者詩之本而樂者其末也以上論詩樂孔氏穎達曰周召風之正經固當為首自衛以下十有餘國編比先後舊無明說蓋迹其先封善否參其詩之美惡驗其時政得失詳其國之大小斟酌所宜以為其次邶鄘衛者土地既廣詩又早作故以為變風之首邶鄘則衛之所滅美刺則同依其作之先後故邶鄘先衛周則平王東遷王爵仍存不可過於後諸侯故次於衛鄭桓武夾輔平王故次王齊則異姓諸侯又以太師之後國土仍大故次鄭魏國雖小踵虞舜之舊封有夏禹之遺化故次齊唐者叔虞之後故次魏秦為強國故次唐陳以三恪之尊國無令主故次秦檜曹則國小而君奢民勞而政僻次之於末宜哉豳者周公之事次於衆國之後小雅之前欲兼其上之美非諸國之例也風見優劣之差故周南先於召南雅見積漸之義故小雅先於大雅歐陽氏修曰周南召南邶鄘衛王鄭齊豳秦魏唐陳檜曹此孔子未刪之前周大師樂歌之次第也周召邶鄘衛王鄭齊魏唐秦陳檜曹豳此今詩次第也周召邶鄘衛檜鄭齊魏唐秦陳曹豳王此鄭氏詩譜次第也大抵國風之次以兩而合之分其次以為比周召以淺深比也衛王以世爵比也鄭齊以族氏比也魏唐以土地比也秦陳以祖裔比也檜曹以美惡比也豳能終之以正故居末焉張子曰詩固有次敘然不可一例惟二南之後次衛衛後王此有意若非以衛分之則王無異於正風也其他不必次一國之詩其首尾固有先後其中未必然當刪定之時只取得者置於其閒程子曰諸國之風先後各有義周南召南陳正家之道人倫之端王道之本風之正也故為首及乎周道衰政教失風遂變矣於是諸侯擅相侵伐衛首並邶鄘之地故為變風之首且一國之詩而三其名得於衛地者為衛得於邶鄘者為邶鄘所以見其首亂也刑政不能治天下諸侯放恣擅相並滅王迹熄矣故雅亡而為一國之風廢法失道則王畿之內亦不能保鄭本畿內之封因周之衰自為列國故次以鄭君臣上下之分失則人倫亂其風可知故次以齊天下之風至於如此則無不亂之國魏舜禹之都唐帝堯之國久被聖人之化厯二叔之世而遺風尚存今亦變矣故因其舊名而謂之唐所以見意唐魏之風且變則先代之風化禮義消亡極矣故次以秦秦之始封秦谷西戎之地國亂乃東侵而始大故美其始有車馬禮樂而刺其未能用周禮也禮義之俗亡先聖王之流風遺俗盡矣故次以陳陳舜之後也聖人之都風化所厚也王澤竭而風化熄矣天下之所以安且治者聖人之道行也聖人之道絶則危亡至矣人情迫於危亡則思治安故思治者亂之極也檜曹懼於危亡而思周道故為亂之終自昔天下何嘗不拯亂而興治革危而為安周家之先其居豳也趨時務農以厚民生王業之所以興也故次以豳王業成而為政於天下故次以雅雅王者之政也小之先大固其敘也政之衰則至於亡詩之亡王道之亡也天下之治始於以正風風天下其終也盛德之著而成功可以告於神明始終之義也故次以頌頌之有魯蓋生於不足王道之隆也所歌頌者如是及其衰也如魯之事已足矣商則頌前代之美不可廢也故附其後焉朱子曰十五國風次序恐未必有意而先儒及近世諸先生皆言之故集傳中不敢提起蓋詭隨非所安而辨論非所敢也以上論篇次孔氏穎達曰詩之大體必須依韻其有乖者古人之韻不協耳之兮矣也之類本取以為辭雖在句中不以為義故處末者皆字上為韻左右流之寤寐求之其實七兮逮其吉兮之類是也亦有即將助句之字以當聲韻者是究是圖亶其然乎其虛其邪既亟只且之類是也朱子曰古人文自是有叶泉州有詩譜紹興有韻譜皆吳才老做陸德明釋文中亦有此類甚多舊人作詩皆押韻與今人歌曲一般今日信口讀之全失古人詠歌之意周頌多不叶韻疑自有和底篇相叶清廟之瑟朱絃而疏越一唱而三歎歎即和聲也叶韻恐當以頭一韻為準且如華字叶音敷如有女同車是第一句則第二句顔如舜華當讀作敷字然後與下文佩玉瓊琚洵美且都皆叶至如何彼穠矣唐棣之華是第一韻則當依本音讀而下文王姬之車却當作尺奢反如此方是然楚辭紛吾既有此內美兮又重之以修能能音耐然後下文紉秋蘭以為佩叶若能字只從本音則佩字遂無音如此則又未可以頭一韻為定也音韻相叶好吟哦諷誦易見道理亦無甚要緊今且要將七分工夫理㑹義理三二分工夫理㑹這般去處陳氏振孫曰詩音舊有九家唐陸德明始定為釋文謂古人韻緩不煩改字最為確論以上附音韻綱領三此篇論讀詩之法及諸家說詩得失禮記溫柔敦厚詩教也論語詩三百一言以蔽之曰思無邪朱子曰程子以思無邪為誠蓋誠是在思上發出思便是性情無邪便是正以此觀之三百篇皆欲人出於性情之正誦詩三百授之以政不達使於四方不能專對雖多亦奚以為程子曰須是未讀詩時不達不能專對既讀後便達於政能專對始是讀詩只此便是法詩可以興可以觀可以羣可以怨邇之事父逺之事君多識於鳥獸草木之名孟子說詩者不以文害辭不以辭害志以意逆志是為得之程子曰舉一字是文成句是辭朱子曰逆迎也當以己意迎取作者之志乃可得之程子曰學者不可以不看詩看詩便使人長一格張子曰詩人之志至平易故無艱險之言以平易求之則思逺以廣愈艱險則愈淺近矣大率所言皆目前事而義理存乎其中謝氏良佐曰詩須諷咏以得之古詩即今之歌曲今之歌曲往往能使人感動至學詩却無感動興起處只為泥章句故也明道嘗談詩竝不曾下一字訓詁只轉却一兩字㸃掇地念過便教人省悟鄭氏樵曰善觀詩者當推詩外之意如孔子子思善論詩者當達詩中之理如子貢子夏善學詩者當取一二言為立身之本如南容子路善引詩者不必分别所作之人所采之詩如諸經所舉之詩可也綿蠻黃鳥止于丘隅不過喻小臣之擇卿大夫有仁者依之夫子推而至於為人君止於仁與國人交止於信鳶飛戾天魚躍于淵不過喻惡人逺去而民之喜得其所子思推之上察乎天下察乎地觀詩如此尚何疑乎如切如磋如琢如磨而子貢能達於貧富之閒巧笑倩兮美目盼兮而子夏能悟於禮後之說論詩若此尚何疑乎南容三復不過白圭子路終身所誦不過不忮不求學詩至此奚以多為維嶽降神生甫及申宣王詩也夫子以為文武之德夙夜匪懈以事一人仲山甫詩也左氏以為孟明之功引詩若此奚必分别所作之人所采之詩乎達是然後可以言詩也范氏浚曰髙山仰止景行行止夫子曰詩之好仁如此天生蒸民有物有則夫子曰為此詩者其知道乎凡夫子為詩之說率不過以明大義後世深求曲取穿鑿遷就之論興而詩之論始不明矣朱子曰讀詩之法只是熟讀涵泳自然和氣從胸中流出不待安排措置務自立說只恁平讀著意思自足學者觀詩先須讀得正文記得注解成誦精熟注中訓釋文意事物名義發明經㫖相穿紐處一一認得如已作出來底一般方能玩味反覆向上有透處詩本是恁地說話一章言了次章又從而歎咏之雖别無義理而意味深長不可於名物上尋義理後人往往見其言如此平淡只管添上義理却窒塞了他古人一篇詩必有一篇意思且要理㑹得這箇如柏舟之詩只說到靜言思之不能奮飛緑衣之詩說我思古人實獲我心此可謂止乎禮義所謂可以怨便是喜怒哀樂發而皆中節處今欲觀詩不若且置小序及舊說只將原詩虛心熟讀徐徐玩味見箇詩人本意却從此推尋將去方有感發若被舊說局定便看不出今雖說不用舊說終被他先入在內不期依舊從他去某向作詩解文字初用小序至解不行處亦曲為之說後來覺得不安第二次解者雖存小序閒為辨破然終是不見詩人本意後來方知只盡去小序便自可通於是盡滌舊說詩意方活以上論讀詩之法陸氏德明曰舊說云起后妃之德也至用之邦國焉名關雎序謂之小序自風風也訖末名為大序沈重云案鄭詩譜意大序是子夏作小序是子夏毛公合作卜商意有不盡毛更足成之或云小序是東海衛敬仲所作今謂此序止是關雎之序總論詩之綱領無大小之異成氏伯瑜曰學者以為大序皆是子夏所作未能無惑如關雎之序首尾相結冠束二南故梁昭明亦云大序是子夏全制編入文什其餘衆篇之小序子夏惟裁初句耳葛覃后妃之本也鴻鴈美宣王也如此之類是也其下皆是大毛公自以詩中之意而繫其詞也程子曰詩大序其文似繫辭其義非子夏所能言也分明是聖人作此以教學者蓋夫子慮後之不知詩也故序關雎以示之學詩而不求序猶欲入室而不由户也小序何人所作但看大序即可見序中分明言國史明乎得失之迹如非國史則何以知其所美所刺之人使當時無小序雖聖人亦辨不得國史得詩必載其事然後其義可知今小序之首是也其下則說詩者之詞也鄭氏樵曰武帝時毛詩始出自以源流出於子夏今觀其書所釋鴟梟與金縢合釋北山蒸民與孟子合釋昊天有成命與國語合釋碩人清人皇矣黃鳥與左氏合而序由庚六篇與儀禮合當毛公之時左氏傳未出孟子國語儀禮未甚行而毛氏之說先與之合不謂之源流子夏可乎漢興三家盛行毛最後出世人未知毛氏之密其說多從齊魯韓氏逮至魏晉有左氏國語孟子諸書證之然後學者捨三家而從毛氏從韓氏之說則二南商頌皆非治世音從毛氏之說則禮記左氏無往而不合此所以毛詩獨存於世也或謂小序作於衛宏是也謂大序作於聖人非也命篇大序蓋出於當時採詩大史之所題而題下之序則衛宏從謝曼卿受師說而為之也蓋詩之大序非一世一人之所能為採詩之官本其得於何地審其出於何人究其主於何事且有實狀然後致之大師上之國史是以取發端之二字以命題故謂大序是當時採詩大史之所題詩之下序序所作為之意其辭顯者其序簡其辭隱者其序備其善惡之微者序必明著其迹而不可以言殫者則亦闕其目而已故謂下序是宏誦師說而為之或曰序之辭非宏所能為使宏鑿空為之雖孔子亦不能使宏誦師說為之則雖宏有餘矣意者厯代講師之說至宏而悉加詮次焉今觀宏之序有專取諸書之文至數句者有雜取諸家之說而辭不堅決者有委曲宛轉附經以成其義者牽合為文取譏於世此不可不辨也程氏大昌曰謂詩序為子夏者毛公鄭康成梁昭明輩也謂子夏有不序詩之道三疑其為漢儒附託者韓愈是也范蔚宗之傳衛宏曰九江謝曼卿善毛詩宏從受學作毛詩序善得風雅之㫖今傳於世則今序為宏所作何疑㦲然詩之古序非宏也古序之與宏序今混並無别然有可考者凡詩發序兩語如關雎后妃之德也世人之謂小序者古序也兩語以外續而申之世謂大序者宏語也鄭康成之釋南陔曰子夏序詩篇義合編遭戰國至秦而南陔六詩亡毛公作傳各引其序冠之篇首故詩雖亡而義猶在今六序兩語之下明言有義亡辭知其為秦火之後見序而不見詩者所為也毛公於詩第為之傳不為之序則其申釋序義非宏而孰為之也范氏處義曰人以為詩之美刺與春秋相表裏而詩之美刺實繫於序蓋小序一言國史記作詩者之本義也小序之下皆大序也亦國史之所述閒有聖人之遺言可考而知文中子曰聖人述書帝王之制備述詩興衰之由顯述春秋邪正之迹明聖人於春秋既因魯史之舊而明其邪正之迹於書又各冠序於篇首而備帝王之制於詩苟不據序之所存亦何自而見其興衰之由而知其美刺之當否哉今觀春秋之褒貶與詩序相應詩序所書皆無曲筆宜為聖人之所取也又考論語周有大賚此夫子記周之政也而與賚之序同緇衣曰長民者衣服不貳從容有常記禮者稱子曰以實之而與都人士之序同孔叢子記夫子之讀詩曰於周南召南見周道所以盛也於柏舟見匹夫執志之不可易也於淇澳見學之可為君子也於考槃見遁世之士而不悶也於木瓜見苞苴之禮行也於緇衣見好賢之心至也於雞鳴見君子之不忘其敬也於伐檀見賢者之先事後食也於蟋蟀見陶唐儉德之大也於下泉見亂世之思明君也於七月見豳公所以造周也於東山見周公先公而後私也於狼跋見周公之逺志所以為聖也於鹿鳴見君臣之有禮也於彤弓見有功之必報也於無羊見善政之有應也於節南山見忠臣之憂世也於蓼莪見孝子之思養也於楚茨見孝子之思祭也於裳裳者華見賢者世保其祿也於采菽見明王所以敬諸侯也其言皆與今序同其義由是言之使詩序作於夫子之前則是為聖人之所録作於夫子之後則是取諸夫子之遺言也庸可廢邪案大序小序諸家議論不同然未嘗離關雎之序為二也至朱子以關雎序其閒有統論詩之綱領者數條乃詩大序宜引以冠經首使學者得以考遂分詩者志之所之也至詩之至也止謂之大序自關雎后妃之德也至關雎之義也及各篇之序謂之小序則另以附諸經末今以朱子所分為定呂氏祖謙讀詩記曰桑中溱洧諸篇幾於勸矣夫子取之何也曰仲尼謂詩三百一言以蔽之思無邪詩人以無邪之思作之學者亦以無邪之思觀之閔惜懲創之意隱然自見於言外矣或曰樂記所謂桑閒濮上之音安知非即此篇乎曰詩雅樂也祭祀朝聘之所用也桑閒濮上之音鄭衛之樂也世俗之所用也雅鄭不同部其來尚矣寧有編鄭衛樂曲於雅音中之理乎桑中溱洧諸篇作於周道之衰其聲雖已降於煩促而猶止於中聲荀卿獨能知之其詞雖近於諷一勸百然猶止於禮義大序獨能知之仲尼録之於經所以謹世變之始也借使仲尼之前雅鄭果嘗厖雜自衛反魯正樂之時所當正者無大於此矣論語答顔子之問乃孔子治天下之大綱也於鄭聲亟欲放之豈有刪詩示萬世反收鄭聲以備六藝乎朱子曰孔子之稱思無邪也以為詩三百篇勸善懲惡其要歸無不出於正非以作詩之人所思皆無邪也今必曰彼以無邪之思鋪陳淫亂之事而閔惜懲創之意自見於言外則曷若曰彼雖以有邪之思作之而我以無邪之思讀之則彼之自狀其醜者乃所以為吾警懼懲創之資邪若夫雅鄭若干篇自衛反魯以來未之有改至於桑中小序之文與樂記合則是詩之為桑閒不為無據今必曰三百篇皆雅則邪正錯糅非復孔子之舊矣夫二南正風房中之樂也鄉樂也二雅之正朝廷之樂也商周之頌宗廟之樂也見於序義傳記皆有可考至於變雅則固已無施於事而變風又特里巷之歌謡其領在樂官者以為可以識時變觀土風耳今必曰三百篇皆祭祀朝聘之所用則未知桑中溱洧之屬當以薦何等之鬼神接何等之賓客邪古者大師陳詩以觀民風固不問美惡而悉存以訓也然其與先王雅頌之正施用亦異則固不嫌於厖雜矣今於雅鄭之實察之既不詳於厖雜之名畏之又太甚顧乃文以風刺之美說强而置諸雅頌之列是乃反為厖雜之甚而不自知也其以二詩為猶止於中聲者太史公所謂孔子皆弦歌之以求合於韶武之音其誤蓋亦如此然古樂既亡無所考正吾獨以其理與詞推之有以知其必不然耳又以為近於勸百諷一而止乎禮義則又信大序之過者夫子虛上林猶有所謂諷也漢廣知不可而不求大車有所畏而不敢猶有所謂禮義之止也若桑中溱洧則吾不知其何詞之諷而何禮義之止乎小序大無義理是後人湊合而成多就詩中採托言語不能發明大㫖見有漢之廣矣之句以為德廣所及見有命彼後車之言以為不能飲食教載行葦之序見牛羊勿踐謂仁及草木見戚戚兄弟謂親睦九族見黃耇台背謂養老見以祈黃耇謂乞言見介爾景福謂成其福祿隨文生義無復倫理卷耳之序以求賢審官知臣下之勤勞為后妃之志固不倫矣況詩中所謂嗟我懷人其言親昵太甚寧后妃所得施於使臣者哉桃夭之詩謂婚姻以時國無鰥民為后妃所致不知文王刑家及國其化固如此豈專后妃所能致邪其他變風諸詩未必是刺者皆以為刺未必是言此人必傅㑹以為此人桑中之詩止是淫者相戲之詞豈有刺人之惡反自陷於流蕩之中子襟詞意輕儇豈刺學校之詞有女同車等皆以為刺忽而作鄭忽不娶齊女亦是好底意思見後來失國便將許多詩盡為刺忽而作考之於忽所謂淫㬥之類皆無其實至目為狡童豈詩人愛君之意況其失國正坐柔懦何狡之有幽厲之刺亦有不然甫田諸篇凡詩中無詆譏之意者皆以為傷今思古而作其他謬誤不可勝說後世但見詩序冠於篇首不敢議其非至解說不通多為飾辭以曲護之其誤後學多矣大序却好或謂補湊而成亦有此理大率古人作詩其閒亦自有感物道情吟咏情性幾時盡是譏刺他人只緣序者立例篇篇作美刺說將詩人意思盡穿鑿壞了馬氏端臨曰詩書之序自史傳不能明其為何人所作先儒多疑之至朱文公之解經於詩國風諸篇之序詆斥尤多以愚觀之雅頌之序可廢而十五國風之序不可廢也雅頌之作其意易明則序者之辭可略至於風之為體比興之詞多於序述風諭之意浮於指斥有聮章纍句而無一言序作之之意者而序者乃曰為某事也苟非其傳授有源孰能億料當時指意之所歸乎夫芣苡之序以為后妃之美也而其詩語不過形容采掇芣苡之情狀而已黍離之序以為閔周室之顛覆也而其詩語不過慨歎禾黍之苗穗而已叔于田之二詩序以為刺莊公也而其詩語則愛叔段之辭耳揚之水椒聊二詩序以為刺晉昭公也而其詩語則愛桓叔之辭耳此詩之賴序以明者也鴇羽陟岵之詩序以為征役者不堪命而作也四牡采薇之詩序以為勞使臣遣戍役而作也四詩之㫖辭同意異若捨序以求之則文王之臣民亦怨其上而四牡采薇不得為正雅矣即是觀之則桑中溱洧何嫌其為刺奔而必以為奔者所自作使聖經為録淫辭之具乎且詩之可刪孰有大於淫者今以詩傳考之其指為男女淫泆奔誘而自作詩以序其事者凡二十有四淫詩之繁多如此夫子猶存之則不知所刪何等一篇也又以為序者之意必以為詩無一篇不為刺時而作有害於溫柔敦厚之教愚謂欲使其避諷訕之名而自處於淫謔之地則夫身為淫亂而復自作詩以贊之反得為溫柔敦厚乎或曰春秋所記無非亂臣賊子之事不如是無以見當時事變之實而垂鑒於後世故不得已而存之愚以為史以記事有治不能無亂固不容録文武而棄幽厲也至於文辭則其淫哇不經者直為削之而已而夫子猶存之則必其意不出於此而序者之說是也或曰序求詩意於辭之外文公求詩意於辭之內子何以定其是非乎曰知詩人之意者莫如孔孟慮學者讀詩而不得其意者亦莫如孔孟是以有無邪之訓焉則以其辭之不能不鄰乎邪也使篇篇如文王大明則奚邪之可間乎是以有害意之戒焉則以其辭之不能不戾其意也使章章如清廟臣工則奚意之難明乎以是觀之則知刺奔果出於作詩者之本意而夫子所不刪者決非淫泆之人所自賦也如木瓜采葛遵大路風雨褰裳子襟揚之水諸篇雖疑其辭缺莊重然首尾無一字及婦人而謂之淫邪可乎或又曰二南雅頌祭祀朝聘之所用也鄭衛桑濮里巷狹邪之所作也夫子於鄭衛蓋深絶其聲於樂以為法今欲諱其鄭衛桑濮之實而文以雅樂之名將薦之於何等之鬼神用之何等之賓客乎愚以為左傳言季札來聘請觀周樂而所歌者邶鄘衛鄭皆在焉則諸詩固雅樂矣使其為里巷狹邪所用則周樂安得有之而魯之樂工亦安能歌異國之淫邪詩乎至於古人歌詩合樂之意蓋有不可曉者夫關雎鵲巢后妃夫人之詩也而鄉飲酒燕禮歌之采蘋采蘩夫人大夫妻主祭之詩也而射禮歌之肆夏繁遏渠宗廟配天之詩也而天子享元侯歌之文王大明綿文王興周之詩也而兩君相見歌之以是觀之其歌詩之用與作詩之意蓋有判然不相合不可强通也左傳載列國聘享賦詩固多斷章取義然其大不倫者亦以來譏誚如鄭伯有賦鶉之奔奔楚令尹子圍賦大明及穆叔不拜肆夏寧武子不拜彤弓之類是也然鄭伯如晉子展賦將仲子鄭伯享趙孟子太叔賦野有蔓草鄭六卿餞韓宣子子齹賦野有蔓草子太叔賦褰裳子游賦風雨子旗賦有女同車子栁賦蘀兮此六詩皆文公所斥以為淫奔之人所作也然所賦皆見善於叔向趙武韓起不聞被譏乃知鄭衛之詩未嘗不施之燕享而此六詩之㫖意訓詁當如序者之說也王氏應麟曰諸儒說詩一以毛鄭為宗未有參考三家者獨朱文公集傳閎意眇指卓然千載之上言關雎則取匡衡柏舟婦人之詩則取劉向笙詩有聲無辭則取儀禮上天甚神則取戰國策何以恤我則取左氏傳抑戒自警昊天有成命道成王之德則取國語陟降庭止則取漢書注賓之初筵飲酒悔過則取韓詩序不可休思是用不就彼岨者岐皆從韓詩禹敷下土方又證諸楚詞一洗末師專已守殘之陋黃氏震曰晦庵先生因鄭公之說盡去美刺探求古始雖東萊不能無疑然指桑中溱洧為鄭衛之音則其辭曉然諸儒安得回護而謂之雅音謂甫田大田諸篇皆非刺詩自今讀之皆藹然治世之音謂成王不敢康之成王為周成王則其說實出於國語亦文義之曉然者其餘改易固不可一一盡知若其發理之精微措辭之簡潔讀之使人瞭然孰有加於晦庵之詩傳者哉王氏禕曰朱子集傳其訓詁多用毛鄭而叶韻則本吳才老之說其釋諸經自謂於詩獨無遺憾當時東萊呂氏有讀詩記最為精密朱子實兼取之何氏楷曰𣙜訓詁則鄭孔之功決不可誣明義理則朱子之言深得其要以上論諸家說詩得失大序詩者志之所之也在心為志發言為詩朱注心之所之謂之志而詩所以言志也孔氏穎達曰詩人志意之所之適藴藏在心為志發見於言為詩輔氏廣曰此一節言詩之自出情動於中而形於言言之不足故嗟歎之嗟歎之不足故永歌之永歌之不足不知手之舞之足之蹈之也朱注情者性之感於物而動者也喜怒憂懼愛惡欲謂之七情形見永長也黃氏櫄曰寂然不動者謂之性感於物者謂之情情之所動則惡可已惡可已則不知手舞足蹈也集說孔氏穎達曰上辨詩志之異而直言者非詩故更序詩必長歌之意李氏樗曰永歌未足盡其情於是手舞之足蹈之而有舞焉歌詠其聲舞蹈其容聲容兩盡然後喜怒哀樂之情宣導於外無所湮鬱此所謂導和之至也情發於聲聲成文謂之音治世之音安以樂其政和亂世之音怨以怒其政乖亡國之音哀以思其民困治直吏反樂音洛思息吏反朱注聲不止於言凡嗟歎永歌皆是也成文謂其清濁髙下疾徐疏數之節相應而和也然情之所感不同則音之所成亦異矣輔氏廣曰此一節又言嗟歎永歌既發於聲因以其聲播於八音諧以律呂使之相應而和故謂之音集說鄭氏康成曰聲謂宮商角徴羽也聲成文者宫商上下相應孔氏穎達曰作詩之時次序清濁節奏髙下使五聲為曲似五色成文據其成文之響即是為音此音被諸弦管乃名為樂雖在人在器皆得為音樂記注雜比曰音單出曰聲治世之政教和順民心述其安樂之心而作歌故治世之音亦安以樂也良耜云百室盈止婦子寧止安之極也湛露云厭厭夜飲不醉無歸樂之至也天保云民之質矣日用飲食是其政和也亂世之政教與民心乖戾述其怨怒之心而作歌故亂世之音亦怨以怒也蓼莪云民莫不榖我獨何害怨之至也巷伯云取彼譖人投畀豺虎怒之甚也十月云徹我牆屋田卒汙萊是其政乖也國將滅亡民遭困厄述其哀思之心而作歌故亡國之音亦哀以思也苕之華云知我如此不如無生哀之甚也大東云眷言顧之潸焉出涕思之篤也正月云民今之無祿天天是椓是其民困也詩述民志樂歌民詩故時政善惡見於音也李氏樗曰論聲音之道與政通也五聲八音皆本於人情故國之安危政之醇疵皆可求之於聲音之閒苟發於聲必知心之所由然既知心之所由然則可知政之所由然蓋皆不能逃乎審音者之所知而詩者乃所以播於聲音者也故正得失動天地感鬼神莫近於詩朱注事有得失詩因其實而諷詠之使人有所創艾音刈興起至其和平怨怒之極又足以達於隂陽之氣而致祥召災蓋其出於自然而不假人力是以入人深而見功速非他教之所及也劉氏瑾曰天地人同一氣也詩雖出於人為而理氣感通則不假人力也達字貼動感字隂陽貼天地鬼神字集說孔氏穎達曰上言播詩於音音從政變政之善惡皆在於詩故又言詩之功德也由詩為樂章之故正人得失之行變動天地之靈感致鬼神之意無有近於詩者黃氏櫄曰先儒謂正得失者用此詩於諷刺之閒動天地者用此詩於郊祀之際感鬼神者用此詩於宗廟之中豫以為此一端耳非諷刺郊祀宗廟之時則不足以正得失動天地感鬼神乎今觀詩之美刺非出於愛惡之私則得失不難正矣言行所以動天地則天地不難動矣神之聽之終和且平則鬼神不難感矣此思無邪之效也故曰莫近於詩先王以是經夫婦成孝敬厚人倫美教化移風俗朱注先王指文武周公成王輔氏廣曰或疑指周公為先王先生曰此無甚害蓋周公行王事制禮樂若止言成王則失其實矣是指風雅頌之正經劉氏瑾曰序者言先王以詩為教正綱常而善風化故知其所指先王與正經如此經常也女正乎內男正乎外夫婦之常也孝者子之所以事父敬者臣之所以事君詩之始作多發於男女之閒而達於父子君臣之際故先王以詩為教使人興於善而戒其失所以道夫婦之常而成父子君臣之道也彭氏執中曰陳君舉云夫婦之經者孝敬之成也蓋天下之道只從夫婦中出而夫婦之道又只從中正中來以此氣象事親則成孝事君則成敬三綱既正則人倫厚教化美而風俗移矣劉氏瑾曰此一節專論正風雅及周頌集說孔氏穎達曰地理志云民有剛柔緩急音聲不同繫水土之風氣故謂之風好惡取舍動靜隨君上之情欲故謂之俗則風為本俗為末皆為民情好惡也王者為政當移之使緩急調和剛柔得中有風俗傷敗者當易之使善故地理志又云孔子曰移風易俗莫善於樂言聖王在上統理人倫必移其本而易其末然後王教成此皆用詩為之故云先王以是以用也言先王用詩之道為此五事也故詩有六義焉一曰風二曰賦三曰比四曰興五曰雅六曰頌興虛應反後同朱注此一條本出於周禮大師之官蓋三百篇之綱領管轄也風雅頌者聲樂部分之名也風則十五國風雅則大小雅頌則三頌也賦比興則所以製作風雅頌之體也賦者直陳其事如葛覃卷耳之類是也比者以彼狀此如螽斯緑衣之類是也興者託物興詞如關雎兔罝之類是也蓋衆作雖多而其聲音之節製作之體不外乎此故大師之教國子必使之以是六者三經而三緯之則凡詩之節奏指歸皆將不待講說而直可吟咏以得之矣朱子曰三經是風雅頌是做詩的骨子賦比興却是裏面橫串底都有賦比興故謂三緯輔氏廣曰聲音之節謂風雅頌製作之體謂賦比興三經謂風雅頌之體一定也三緯謂賦比興之用不一也六者之序以其篇次風固為先而風則有賦比興矣故三者次之而雅頌又次之蓋亦以是三者為之也然比興之中螽斯專於比而緑衣兼於興罝專於興而關雎兼於比此其例中又自有不同者學者亦不可以不知也集說孔氏穎達曰賦比興是詩之所用風雅頌是詩之成形用彼三事成此三事也劉氏瑾曰朱子嘗疑以七月詩變其音節或為風或為雅或為頌則風雅頌之例中亦恐有不同者不特比興之例為然也上以風化下下以風刺上主文而譎諫言之者無罪聞之者足以戒故曰風風刺之風福鳳反朱注風者民俗歌謡之詩如物被風而有聲又因其聲以動物也上以風化下者詩之美惡其風皆出於上而被於下也下以風刺上者上之化有不善則在下之人又歌詠其風之所自以譏其上也凡以風刺上者皆不主於政事而主於文詞不以正諫而託意以諫若風之被物彼此無心而能有所動也輔氏廣曰此一節解風之一字有此二義也上以風化下謂正風也然變風亦閒有如此者下以風刺上則止謂變風耳風雖有此二義不同然皆有取於彼此無心而能有所動故皆曰風也集說鄭氏康成曰風化風刺皆謂譬喻不斥言也主文主與樂之宮商相應也譎諫詠歌依違不直諫嚴氏粲者上之化下下之風上皆有優游㢲入之義故正風變風皆名為風至於王道衰禮義廢政教失國異政家殊俗而變風變雅作矣朱注先儒舊說二南二十五篇為正風鹿鳴至菁莪二十二篇為正小雅文王至卷阿十八篇為正大雅皆文武成王時詩周公所定樂歌之詞邶至豳十三國為變風六月至何草不黃五十八篇為變小雅民勞至召旻十三篇為變大雅皆康昭以後所作故其為說如此國異政家殊俗者天子不能統諸侯故國國自為政諸侯不能統大夫故家家自為俗也然正變之說經無明文可考今姑從之其可疑者則具於本篇云輔氏廣曰此一節言風雅之有變也所謂可疑者蓋指楚茨至車舝十篇之類而言也集說孔氏穎達曰詩之風雅有正有變故又言變之意禮義言廢者典法仍存但廢而不行耳政教言失者非無政教但施之失禮耳禮義者政教之本故先禮義而後政教家謂天下民家民隨君上之欲故稱俗王氏應麟曰大雅之變作於大臣召穆公衛武公之類是也小雅之變作於羣臣家父孟子之類是也風之變也匹夫匹婦皆得以風刺清議在下而世道益降矣劉氏瑾曰詩人各隨當時政教善惡人事得失而美刺之未嘗有意於為正為變後人比而觀之遂有正變之分所以正風雅為文武成王時詩變風雅為康昭以後所作而豳風不可以為康昭以後之詩也大抵就各詩論之以美為正以刺為變猶之可也若拘其時世分其篇帙則其可疑者多矣國史明乎得失之迹傷人倫之變哀刑政之苛吟詠情性以風其上達於事變而懷其舊俗者也風福鳳反朱注詩之作或出於公卿大夫或出於匹夫匹婦蓋非一人而序以為專出於國史則誤矣說者欲蓋其失乃云國史紬繹詩人之情性而歌詠之以風其上則不唯文理不通而考之周禮大史之屬掌書而不掌詩其誦詩以諫乃大師之屬瞽矇之職也故春秋傳曰史為書瞽為詩說者之云兩失之矣集說孔氏穎達曰國史者周官大史小史外史御史之等皆是也此承變風變雅之下則兼據天子諸侯之史矣明曉得失之迹哀傷而詠情性者詩人也非史官也國史采衆詩時明其好惡令瞽矇歌之其無作主皆國史主之令可歌由是國史掌書故託文史也苟能著作文章亦可謂之為史不必要作史官駉云史克作是頌史官自有作詩者矣不盡是史官為之也國史選取善者付樂官耳達於事變者若唐有帝堯殺禮救危之化後世習之失之於儉不中禮陳有大姬好巫歌舞之風後世習之失之於遊蕩無度是其風俗改變詩人曉達之也懷其舊俗者若齊有大公之風衛有康叔之化其遺法仍在詩人懷救之也李氏樗曰變風之作或出於婦人女子小夫賤隸而總謂之國史者蓋指其大槩也范氏處義曰此謂諸國之史而言故專論變風不及變雅也案周禮小史掌邦國之志奠繫世杜子春云奠讀為定注曰史官主書故韓宣子觀書於大史氏繫世謂帝繫世本之屬是也小史主之瞽矇誦之疏云經小史掌志引大史證之者大史史官之長共其事故也又周禮瞽矇職注云小史主次序先王之世昭穆之繫述其德行瞽矇主誦詩並誦世繫以戒勸人君也由此觀之小史之掌總於大史瞽矇之誦定於小史則詩之由國史以授樂官也明矣況周禮疏云大師是瞽人之中樂官之長瞽矇屬焉是大師與矇俱為無目之人所誦之詩非國史相而詔之亦何從知其條類義理也且序者承上文言變風變雅為國史采詩之意而言非以三百篇為作於國史其義似未為失也故變風發乎情止乎禮義發乎情民之性也止乎禮義先王之澤也朱注情者性之動而禮義者性之德也動而不失其德則以先王之澤入人者深至是而猶有不忘者也黃氏櫄曰止乎禮義喜怒哀樂之中節者然此言亦其大槩有如此者其放逸而不止乎禮義者固已多矣集說孔氏穎達曰作詩止於禮義則應言皆合禮而變風多傷化敗俗皆時政之疾病也所言者皆忠規切諫救世之針藥也典刑未亡覬可追改則針規之意切鶴鳴沔水殷勤而責王也淫風大行莫之能救則匡諫之志微溱洧桑中所以咨嗟歎息而閔世輔氏廣曰此言變風不及雅者變風如此則變雅從可知也是以一國之事繫一人之本謂之風朱注所謂上以風化下集說孔氏穎達曰序說正變之道以風雅與頌區域不同故又辨三者體異之意作詩之人覽一國之意以為己心所言者直是諸侯之政行風化於一國故謂之風以其狹故也言天下之事形四方之風謂之雅雅者正也言王政之所由廢興也政有大小故有小雅焉有大雅焉朱注形者體而象之之謂小雅皆王政之小事大雅則言王政之大體也輔氏廣曰正雅則可見王政之興變雅則可見王政之廢集說孔氏穎達曰言天下之事亦謂詩人總天下之心四方風俗以為己意而詠歌王政故作詩道說天下之事發見四方之風所言者乃是天子之政施齊正於天下故謂之雅以其廣故也風雅之作皆是一人之言耳必是言當舉世之心動合一國之意然後得為風雅載在樂章不然則國史不録其文也此言謂之風雅理兼正變王氏柏曰小雅之正詩其為體有二一曰燕享賓客之樂二曰勞來行役之樂朱子所謂歡欣和說以盡羣下之情者也大雅之正詩其體一曰㑹朝之樂而已朱子所謂恭敬齊莊以發先王之德者也頌者美盛德之形容以其成功告於神明者也告古毒反朱注頌皆天子所制郊廟之樂歌頌容古字通故其取義如此李氏樗曰漢書云徐生善容容字作此頌字劉氏瑾曰論頌詩之大體固是天子郊廟樂歌而所以美盛德告成功者也但驗之三頌諸篇亦不能盡然也集說段氏昌武曰古人言功必以德德苟未至於盛則功不可以成故盛德者成功之本彭氏執中曰盛德不可見也故美其形容成功不可忘也故告於神明是謂四始詩之至也朱注史記曰關雎之亂以為風始朱子曰關雎是樂之卒章故曰關雎之亂楚辭亦有亂曰是也自關關雎鳩至鐘鼓樂之皆是亂想其初必已是作樂到此處便是亂問關雎之亂亂何以訓終曰既奏以文復亂以武樂記注文謂鼓也武謂金也舞畢擊金鐃而退也亂乃樂終之雜聲也前面恐有聲而無辭鹿鳴為小雅始文王為大雅始清廟為頌始所謂四始也詩之所以為詩者至是無餘蘊矣後世雖有作者其孰能加於此乎邵子曰刪詩之後世不復有詩矣蓋謂此也輔氏廣曰此二句總結上三節而贊其為詩之極至也詩集傳序或有問於豫曰詩何為而作也豫應之曰人生而靜天之性也感於物而動性之欲也夫既有欲矣則不能無思既有思矣則不能無言既有言矣則言之所不能盡而發於咨嗟詠歎之餘者必有自然之音響節族而不能已焉此詩之所以作也曰然則其所以教者何也曰詩者人心之感物而形於言之餘也心之所感有邪正故言之所形有是非惟聖人在上則其所感者無不正而其言皆足以為教其或感之之雜而所發不能無可擇者則上之人必思所以自反而因有以勸懲之是亦所以為教也昔周盛時上自郊廟朝廷而下達於鄉黨閭巷其言粹然無不出於正者聖人固已協之聲律而用之鄉人用之邦國以化天下至於列國之詩則天子巡守亦必陳而觀之以行黜陟之典降自昭穆而後寖以陵夷至於東遷而遂廢不講矣孔子生於其時既不得位無以行帝王勸懲黜陟之政於是特舉其籍而討論之去其重復正其紛亂而其善之不足以為法惡之不足以為戒者則亦刋而去之以從簡約示久逺使夫學者即是而有以考其得失善者師之而惡者改焉是以其政雖不足以行於一時而其教實被於萬世是則詩之所以為教者然也曰然則國風雅頌之體其不同若是何也曰吾聞之凡詩之所謂風者多出於里巷歌謡之作所謂男女相與詠歌各言其情者也唯周南召南親被文王之化以成德而人皆有以得其性情之正故其發於言者樂而不過於淫哀而不及於傷是以二篇獨為風詩之正經自邶而下則其國之治亂不同人之賢否亦異其所感而發者有邪正是非之不齊而所謂先王之風者於此焉變矣若夫雅頌之篇則皆成周之世朝廷郊廟樂歌之詞其語和而莊其義寬而密其作者往往聖人之徒固所以為萬世法程而不可易者也至於雅之變者亦皆一時賢人君子閔時病俗之所為而聖人取之其忠厚惻怛之心陳善閉邪之意猶非後世能言之士所能及之此詩之為經所以人事浹於下天道備於上而無一理之不具也曰然則其學之也當奈何曰本之二南以求其端參之列國以盡其變正之於雅以大其規和之於頌以要其止此學詩之大㫖也於是乎章句以綱之訓詁以紀之諷詠以昌之涵濡以體之察之情性隱微之閒審之言行樞機之始則修身及家平均天下之道其亦不待他求而得之於此矣問者唯唯而退余時方輯詩傳因悉次是語以冠其篇云淳熙四年丁酉冬十月戊子新安朱熹書欽定詩經傳說彚纂卷首下
