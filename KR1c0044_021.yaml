body:
  text: 欽定四庫全書欽定詩經傳説彚纂卷十九蕩之什三之三蕩蕩上帝下民之辟必亦反疾威上帝其命多辟匹亦反天生蒸民其命匪諶市林反或叶市隆反靡不有初鮮克有終叶諸深反或如字集傳賦也蕩蕩廣大貌朱氏公遷曰此據理而正言蕩蕩二字本稱美之詞也辟君也疾威猶暴虐也多辟多邪辟也蒸衆諶信也言此蕩蕩之上帝乃下民之君也今此暴虐之上帝其命乃多邪辟者何哉蓋天生衆民其命有不可信者蓋其降命之初無有不善而人少能以善道自終是以致此大亂使天命亦罔克終如疾威而多僻也蓋始為怨天之辭而卒自解之如此劉康公曰熊氏剛大曰劉采邑名康諡也康公定王同母弟所謂王季子也民受天地之中以生所謂命也程子曰民受天地之中以生天命之謂性也朱子曰此大本之中也只是恰好處能者養之以福不能者敗以取禍此之謂也王氏安石曰受天地之中一也則靡不有初敗以取禍者衆則鮮克有終鮮終則命靡諶矣集説孔氏穎逹曰此下諸章皆言文王曰咨此獨不然者欲以蕩蕩之言為下章總目且見實非殷商之事故於章首不言文王以起發其意也民始皆庶幾於善道後更化於惡俗言靡不為盡然之辭鮮有為少有之稱文不同者容有君子不改其操故言鮮以見之嚴氏粲曰疾威者厲王所為而天實命之是天為此疾威天實為之則無所歸咎然天亦豈欲令厲王為惡乎天生衆民其命有不可信者其初皆善而其終鮮善是人自暴自棄非天使之然王自不為善豈天賦豫以惡哉許氏謙曰此章言人之多辟非天命之本然人自失其初耳以起後章之意朱氏善曰此章正意在靡不有初鮮克有終二句夫自其初而言之人性皆善厲王之性亦文武成康之性也而何不善之有及要其終而觀之則文武成康若彼其仁厚而厲王若彼其暴虐何也蓋文王性之者也武王身之者也成康困知勉行者也厲王自暴自棄者也惟其自暴自棄也故與之言仁義之言則拒之而不信與之行仁義之行則絶之而不為然則非天命之多辟也乃王之逆天命而自底於多辟也非天命之匪諶也乃王之逆天命而自為是匪諶也非天命之多辟非天命之匪諶則其蕩蕩者固自若也而豈可以疾威言之哉固知其為怨天之辭而非天之實有是也文王曰咨咨女音汝殷商曾是強禦曾是掊蒲侯反克曾是在位曾是在服叶蒲北反天降滔他刀反德女興是力集傳賦也此設為文王之言也咨嗟也殷商紂也曹氏粹中曰自契始封商地在上洛湯受命亳殷地在蒙今曰殷商并舉之也強禦暴虐之臣也謝氏枋得曰強強梁禦如禦人於國門之外之禦何氏楷曰強禦是妒賢疾能者下章言強禦多懟是也掊克聚斂之臣也何氏楷曰掊克是聚斂巧取者下章言寇攘式內是也服事也毛氏萇曰服政事也滔慢王氏安石曰強禦掊克是謂滔德興起也力如力行之力呂氏祖謙曰言任之之堅也詩人知厲王之將亡故為此詩託於文王所以嗟歎殷紂者言此暴虐聚斂之臣在位用事乃天降滔慢之德而害民然非其自為之也乃汝興起此人而力為之耳集説范氏處義曰賢者愛君不能自已以文王為周之始王聖德尤盛故假其辭猶冀厲王聞之翻然悔過蓋用意深矣強禦掊克之人而在朝廷之位服朝廷之事是天降滔淫之德為國之患王奈何起而力任之乎自二章以下皆設言商之過猶後世借秦為喻也輔氏廣曰此章以下託為文王歎紂之詞者蓋厲王暴虐詩人不敢直刺其惡故耳且厲王之虐大略似紂以謂與亂同事罔不亡也自古危亂之君率是暴虐與聚斂之臣並用蓋此兩等人實相須也非暴虐則無以為聚斂之資非聚斂則無以極暴虐之惡也滔德謂慢天之人即暴虐聚斂之臣也所以敢為暴斂之事者只緣慢天故爾朱氏善曰厲王之惡貪暴而已惟暴也故所用皆強禦之人惟貪也故所用皆掊克之人曾是在位謂以之而居公卿百執事之位也曾是在服謂以之而任公卿百執事之事也強禦也掊克也即所謂滔德也而以為天降之者世之有治有亂雖本於人事之得失亦關於氣化之盛衰然則汝之興起此人而力為之也果孰使之然哉亦不得而不歸於天矣文王曰咨咨女殷商而秉義類強禦多懟直類反流言以對寇攘式內侯作側慮反侯祝周救反靡屆靡究集傳賦也而亦女也義善懟怨也流言浮浪不根之言也侯維也作讀為詛詛祝怨謗也言汝當用善類而反任此暴虐多怨之人使用流言以應對胡氏一桂曰如所謂禦人以口給之意則是為寇盜攘竊而反居內矣是以致怨謗之無極也集説輔氏廣曰暴虐之人自以人多怨己而恐禍之及也故詭謀譎計採取浮浪不根之言以應對於上而惑亂其聰明以自掩其惡上之人用是而反親信之則是為寇盜攘竊之人而反使之居內矣人君好用暴斂多怨之人則怨謗必將反移於己也呂正獻公言小人聚斂以佐人主之欲而不知其終為害也賞其納忠而不知其大不忠也嘉其任怨而不知其怨歸於上也正謂此也嚴氏粲曰汝當秉持善道乃用強禦作怨之人非善類也此人問之則以流言對非忠言也小人為盜賊之行是寇攘不在外而在內也人心相疑則詛祝相要無有屆極窮究之時忠信之衰也文王曰咨咨女殷商女炮白交反烋火交反于中國叶于逼反斂怨以為德不眀爾德時無背布內反無側爾德不明以無陪蒲回反無卿集傳賦也炮烋氣健貌斂怨以為德多為可怨之事而反自以為德也背後側旁陪二也孔氏穎逹曰陪二謂副二王者則三公也范氏處義曰曰背曰側小臣也曰陪曰二大臣也言前後左右公卿之臣皆不稱其官如無人也集説輔氏廣曰此又承上章怨謗而言厲王資稟既暴虐矣而又用暴虐之人盛其氣力以肆行於中國方且斂衆怨而自以為德焉此皆由不明在我固有之德故也而其所以不明其德則又以王之前後左右公卿陪臣皆暴虐聚斂之人而無一人稱其官者故也朱氏善曰炮烋者怒氣之盛也斂怨以為德者不以德為德而以怨為德也人君不明其德則慈祥豈弟之人逺而暴虐聚斂之人進無背莫為之後也無側莫侍其旁也無陪莫為之二也無卿莫為之輔也非實無也雖有之而不稱其職不任其事則亦若無人焉爾韋氏調鼎曰德者何本心之明是也心明則自然所用必君子而前後左右皆得人矣文王曰咨咨女殷商天不湎面善反爾以酒不義從式叶式吏反既愆爾止靡明靡晦叶呼洧反式號式呼火故反俾晝作夜叶羊茹反集傳賦也湎飲酒變色也式用也言天不使爾沈湎以酒而惟不義是從而用也止容止也集説孔氏穎逹曰聖人用酒所以祭祀養賢周公作戒使德將無醉是湎然而醉者人自為之非天為之也蘇氏轍曰人之沈湎凡百不義皆將從是起故既愆爾止則無所不至矣范氏處義曰曰不義從式所謂縱淫佚于非彞也曰既愆爾止所謂用燕喪威儀也曰靡明靡晦則無時不醉矣曰俾晝作夜則不知蚤暮矣所謂君子有四時朝以聽政晝以訪問夕以修令夜以安身者胥失矣欲無亂得乎文王曰咨咨女殷商如蜩如螳音唐如沸如羮叶盧當反小大近喪息浪反叶平聲人尚乎由行叶户郎反內奰皮器反于中國覃及鬼方集傳賦也蜩音條螳皆蟬也如蟬鳴如沸羮皆亂意也小者大者幾於喪亡矣朱氏公遷曰小大指政事言尚且由此而行不知變也奰怒孔氏穎逹曰奰者怒而作氣之貌覃延也鬼方遠夷之國也易高宗伐鬼方毛氏萇曰鬼方遠方也言自近及遠無不怨怒也集説輔氏廣曰小大近喪即言如蜩如螳如沸如羮也人情怨亂如蟬之鳴如羮之沸則小者大者皆幾於喪亡矣乃尚不知變而由行於惡不已其亦不仁甚矣則人之怨怒豈有既哉內奰于中國覃及鬼方所以極言之也朱氏善曰如蟬之鳴言其無靜默之時也如羮之沸言其無清淨之處也小大近喪人尚乎由行言亂亡之證無間於小大也內奰于中國覃及鬼方言怨怒之極無間於遠邇也文王曰咨咨女殷商匪上帝不時叶上止反殷不用舊叶巨已反雖無老成人尚有典刑曾是莫聽湯經反大命以傾集傳賦也老成人舊臣也典刑舊法也謝氏枋得曰典先王之訓典刑先王之法度言非上帝為此不善之時但以殷不用舊致此禍爾雖無老成人與圖先王舊政然典刑尚在可以循守乃無聽用之者是以大命傾覆而不可救也集説鄭氏康成曰此言紂之亂非其生不得其時乃不用先王之故法之所致老成人謂若伊尹伊陟臣扈之屬雖無此臣猶有常事故法可案用也輔氏廣曰匪上帝不時不時猶言不辰也王自不能用舊爾王能用舊則時亦當如舊矣程子曰自是無人豈是無時者正謂是也正使無老成人可用而先王之政法尚存獨不可為扶持憑藉之資乎唯其並人與法皆莫之聽用夫然後大命從而傾覆也謝氏枋得曰三代而上國有大政有大議有大疑皆決於老成人之言曰圖任舊人共政殷先王所以立國也曰人惟求舊曰無侮老成人盤庚所以興也曰汝惟商耇成人宅心知訓周公所以誨康叔也黎老播棄格人罔敢知吉紂所以亡也在位罔有耆舊俊在厥服平王所以東遷也文王曰咨咨女殷商人亦有言顚沛之揭紀竭去例二反枝葉未有害許曷瑕憩二反本實先撥蒲末反叶方吠筆烈二反殷鑒不遠在夏后之世叶始制私列二反集傳賦也顚沛仆拔也揭本根蹶起之貌撥猶絶也鑒視也夏后桀也言大木揭然將蹶枝葉未有折傷而其根本之實已先絶然後此木乃相隨而顚拔爾蘇氏曰商周之衰典刑未廢諸侯未畔四夷未起而其君先為不義以自絶於天莫可救止正猶此爾殷鑒在夏蓋為文王歎紂之辭然周鑒之在殷亦可知矣歐陽氏修曰非獨周之鑒殷殷之鑒夏後之興者當又鑒厲王也集説孔氏穎達曰此意欲厲王以紂為鑒改修德教故也稱人亦有言者以古賢之言為驗是苦其不信故引古以為證也范氏處義曰人主者固天下之本根今所為如上章所陳是先絶其根也召公愛君之心猶惓惓未已故於卒章謂不獨商如此夏之亡亦如此也使商能以夏為鑒則商不亡矣言商又言夏冀厲王之必信也朱氏公遷曰根本之實指國家天命言陳氏推曰此總括上數章直指其禍亂之原而示以當鑒戒之意也總論潘氏時舉曰首章前四句有怨天之辭後四句乃解前四句謂天之降命本無不善惟人不以善道自終故天命亦不克終如疾威而多邪辟也此章意既如此故自次章以下託文王告紂之辭皆就人君身上説使知其非天之過如女興是力女德不明與天不湎爾以酒匪上帝不時之類皆是發首章之意薛氏應旗曰是詩曰任小人曰廢典刑曰沈湎于酒曰炮烋是用而其失皆原於任小人甚哉用人不可不愼也唐氏汝諤曰疾威自説上帝至其嗟歎殷紂亦自託之文王夫蕩本賦體也而卒無一語及當世蓋有諷諫之義焉蕩八章章八句集説序蕩召穆公傷周室大壞也嚴氏粲曰傷者傷悼其將亡甚於刺也臣之作詩皆發於憂國之忠欲以感悟其君雖弊壞已極猶庶幾其改圖君臣大義無所逃於天地之間也彭氏執中曰板蕩之詩深刺其君之惡蓋大臣憂國愛君之心不敢不如是也抑抑威儀維德之隅人亦有言靡哲不愚庶人之愚亦職維疾叶集二反哲人之愚亦維斯戾集傳賦也抑抑密也隅廉角也孔氏穎逹曰隅者角也廉者稜也角必有稜故云廉隅鄭氏曰人密審於威儀者是其德必嚴正也故古之賢者道行心平朱氏公遷曰道行於身如色溫貌恭之類心平者言其用心均平無處不然凡形於身者皆致意也可外占而知內如宮室之制內有繩直則外有廉隅也孔氏穎逹曰以屋之外角喻人之外貌由內方而外正故觀外而知內哲知庶衆職主戾反也衛武公作此詩使人日誦於其側以自警言抑抑威儀乃德之隅則有哲人之德者固必有哲人之威儀矣而今之所謂哲者未嘗有其威儀則是無哲而不愚矣夫衆人之愚蓋其稟賦之偏宜有是疾不足為怪哲人而愚則反戾其常矣集説范氏處義曰君子之威儀能謙下者必德之盛者也人雖或哲或愚然不知修德則形於威儀者必不能善所謂靡哲不愚也庶人之愚由其疾之使然也如所謂民有三疾是也哲人之愚則以不知修德亦自戾其性如所謂罔念作狂是也何以知其能修德哉見於威儀者抑抑而謙下是修德之符也呂氏祖謙曰此詩以威儀為主乃自古論修身者之所同蓋至切至近莫過於是也輔氏廣曰德與威儀內外之符也哲與愚德性之反也觀賔之初筵之詩則當時習俗都無威儀可知矣此所以有靡哲不愚之歎也嚴氏粲曰抑詩多自警之意所言修身治國平天下之道與中庸大學相表裏首章言威儀之當謹威儀云者聲音笑貌云乎哉容貌顔色曾子所謂道動容周旋中禮孟子所謂盛德蓋有諸中形諸外也朱氏善曰愚人之所以益愚者以其有稟賦之偏而又無學問之力也哲人之所以不愚者以其所稟既異於人而又有省察克治之功也今而曰靡哲不愚曰亦維斯戾則是既不能省察於幾微之際復不能克治於形著之後其為反常也大矣無競維人四方其訓之有覺德行下孟反四國順之訏況于反謨定命遠猶辰告叶古得反敬慎威儀維民之則集傳賦也競強也覺直大也鄒氏泉曰覺訓直大如人之生也直纍於物欲則曲矣如心體之廣大蔽於私意則小矣訏大謨謀也大謀謂不為一身之謀而有天下之慮也定審定不改易也命號令也猶圖也遠謀謂不為一時之計而為長久之規也辰時告戒也辰告謂以時播告也則法也言天地之性人為貴王氏逄曰性生也董仲舒云性者生之質也故能盡人道則四方皆以為訓有覺德行則四國皆順從之故必大其謀定其命遠圖時告敬其威儀然後可以為天下法也謝氏枋得曰人君以一身之法為天下之法也集説歐陽氏修曰言莫強於人乃以一身所為而訓道四方謂以天下為己任可謂自強者也德行修著可以動人則四國服從矣謂一日克己而天下歸仁也二者為君天下者言也君天下者欲使四方四國訓道而服從其君臣相與謨謀以出命令遠慮深圖而以時相告戒者其要在敬慎威儀以為民法爾謂修身而天下服也呂氏祖謙曰所謀不止於一身而計天下之安危所謀不止於一時而監百世之損益所謂大其謀也既大而謀以定其命矣猶未敢輕出復長慮却顧思其所終稽其所弊然後以時而播告焉治道之大端既備又終之以威儀者蓋本其切近者言之以承前章之意也輔氏廣曰無競維人舊解皆以為所用得人而先生獨以為能盡人道者蓋此詩本為自警而作況首二章所重在威儀又以下二句觀之亦是盡人道之事不應説及所用得人也無競維人謂無強於人耳所謀者大則其命令之出也必審定而不易朝令夕改者不能訏謨者也所圖者遠則告戒於下者必以時而不忽號令不時者不能遠猶者也朱氏善曰謨之訏猶之遠自綱領上説所以立一代之規模者也命之定告之辰自號令上説所以為一時之政事者也此戒其加於人者不可不審諸己也敬愼者戒懼之存乎中威儀者光輝之著乎外能敬能愼則容止必可觀進退必可度而斯民無不畏而愛之則而象之此勉其修於己者必有以示於人也其在于今叶音經興迷亂于政叶音征顚覆厥德荒湛都南反下同于酒叶子小反女音汝雖湛樂音洛從弗念厥紹市沼反罔敷求先王克共九勇反明刑叶胡光反集傳賦也今武公自言已今日之所為也興尚也鄭氏康成曰興猶尊尚也女武公使人誦詩而命己之詞也後凡言女言爾言小子者放此問抑詩東菜硬要做刺厲王中緣以爾汝字礙朱子曰如幕之辨人反以女為叛臺中之評人反以女為傾等類亦是自謂古人此樣多湛樂從言惟湛樂之是從也紹謂所承之緒也敷求先王廣求先王所行之道也共執張氏所望曰奉以周旋弗敢失墜之義刑法也何氏楷曰謂成法之昭垂者集説輔氏廣曰此言當時習俗之不善而恐已或墮於其間正所謂自警者也所承之緒甚重而不可不思念先王之法甚明而不可不求執人惟湛樂之從則於此皆不暇顧矣是豈可不自警也哉黃氏佐曰此章方就武公身上説曰亂政則與訏謨相反而治人失其道曰覆德則與敬愼威儀相反而修已失其道女雖惟湛樂之是從獨不念所承之緒之重乎而乃不廣求先王之道以克共乎明法如此肆皇天弗尚叶平聲如彼泉流無淪胥以亡夙興夜寐灑掃廷內維民之章修爾車馬弓矢戎兵叶晡亡反用戒戎作用逖他歷反蠻方集傳賦也弗尚厭棄之也淪陷胥相章表孔氏穎逹曰章者在人之上為之表憲故云表也戒備戎兵作起逖遠也言天所不尚則無乃淪陷相與而亡如泉流之易乎朱氏公遷曰先致警懼之詞後致教告之詞是以內自庭除之近外及蠻方之遠細而寢興灑掃之常大而車馬戎兵之變慮無不周備無不飭也上章所謂訏謨定命遠猶辰告者於此見矣集説輔氏廣曰此承上章而言所為如此則必為天所厭棄矣無乃淪胥以亡如泉流之不可止歟是豈可不自警乎故必無內外無遠近無細大無常變皆當整辦飭備如此然後庶幾近而吾民有所儀表遠而蠻方有所畏避也朱氏善曰夙興夜寐修身之事也灑掃廷內齊家之事也身者民之主家者國之則身修而家齊是豈不足以為民之章乎車馬所以安身也固不可以不修弓矢戎兵所以禦患也尤不可以不戒在我者既不至於妄動則在彼者亦不敢以輕侮此又治國之要也詳於內而不遺乎外謹於大而不忽乎細地有遠近之不同而慮之無不周事有常變之不同而備之無不飭此所以為訏謨定命遠猶辰告之實也歟鄒氏泉曰君之舉動民人之視效所關兵之修廢遠人之向背所係故特言之有不泄邇不忘遠意質爾人民謹爾侯度用戒不虞叶元具反愼爾出話敬爾威儀叶牛何反無不柔嘉叶居何反白圭之玷丁簟反尚可磨也斯言之玷不可為叶吾禾反也集傳賦也質成也定也輔氏廣曰質訓成與定惟成而後能定也侯度諸侯所守之法度也虞慮話言柔安嘉善玷缺也言既治民守法防意外之患矣輔氏廣曰益之告舜以警戒無虞亦以罔失法度為先能謹我之法度則可以免不虞之患矣又當謹其言語蓋玉之玷缺尚可磨爐良豫反使平言語一失莫能救之其戒深切矣朱氏公遷曰質人民謹侯度戒不虞即上章之無所不備也治人之事則備矣而治已之事尤不可慢故又專為教告之詞故南容一日三復此章黃氏幹曰謂每誦至此再三反覆以識之非謂一次三復亦非謂只一日三次誦之也而孔子以其兄之子妻之集説輔氏廣曰上三句治國之事也中三句治己之事也身正而後國治此尤不可不謹前但言威儀而已至此章又兼話言言之威儀形於身者言語出於口者皆德之符也下四句又極言其言語之不可不愼也段氏昌武曰言行均不可以有失而言之失尤易能謹其易者則行可知也故此惟戒乎斯言之玷陳氏櫟曰上以出話威儀對言下專以言語言蓋容貌辭氣皆德之符其不可不謹一也故此詩於威儀凡六言之而於言語亦三致意焉前章之命告此章之言玷下章之無易由言是也黃氏佐曰患出不虞雖聖賢亦所不能免也亦自治以備禦之耳無不柔嘉承上言語威儀説發號施令罔有不臧使詞氣雍容而不煩不易此愼爾出話而柔嘉矣出入起居罔有不欽使氣象從容而中規中矩此敬爾威儀而柔嘉矣無易以豉反由言無曰苟矣此二句不用韻莫捫音門朕舌言不可逝叶音折與舌叶矣無言不讎叶市又反無德不報叶蒲救反惠于朋友叶羽已反庶民小子叶奬里反子孫繩繩萬民靡不承集傳賦也易輕捫持逝去讐答承奉也言不可輕易其言蓋無人為我執持其舌者故言語由已嚴氏粲曰由言者自由之言也易致差失常當執持不可放去也且天下之理無有言而不讐無有德而不報者若爾能惠于朋友朱氏公遷曰朋友羣臣也庶民小子段氏昌武曰此小子止謂庶民與後章不同則子孫繩繩而萬民靡不承矣皆謹言之效也集説輔氏廣曰此章又承上章慎言之意而戒其言不可輕出而章末又言謹言之效以歆動之無易由言者戒其不可輕易也無曰苟矣者戒其不可苟發也至於莫捫朕舌言不可逝矣其言愈切而其戒愈至也常詠此二句則知所以謹於言語矣徐氏常吉曰入言於朝有以順百辟卿士之心出言於國有以愜庶民小子之望則垂之為子孫之眀徴傳之為萬民之定保謹言之效何如徐氏光啓曰子孫繩繩法其善言而不忘也萬民靡不承遵其善言而不違也視爾友君子輯音集柔爾顔叶魚堅反不遐有愆相息亮反在爾室尚不愧于屋漏無曰不顯莫豫云覯神之格叶剛鶴反思不可度待洛反思矧可射音亦叶弋灼反思集傳賦也輯和也遐何通愆過也尚庶幾也屋漏室西北隅也李氏如圭曰曾子問謂之當室之白孫炎云當室之白日光所漏入也覯見也格至度測矧況也射斁通厭也言視爾友於君子之時和柔爾之顔色其戒懼之意常若自省曰豈不至於有過乎蓋常人之情其修於顯者無不如此然視爾獨居於室之時亦當庶幾不愧于屋漏然後可爾無曰此非明顯之處而莫豫見也當知鬼神之妙無物不體其至於是有不可得而測者不顯亦臨猶懼有失況可厭射而不敬乎此言不但修之於外又當戒謹恐懼乎其所不睹不聞也子思子曰君子不動而敬不言而信又曰夫微之顯誠之不可掩如此此正心誠意之極功而武公及之則亦聖賢之徒矣集説朱子曰相在爾室以下只是做存養工夫輔氏廣曰輯柔爾顔言其顔色之溫柔也不遐有愆言其心思之警懼也常能如是則豈至於有過失乎然人心操則存舍則亡天理存亡只在敬肆之間須當於暗室屋漏之中不睹不聞之際常若十手所指十目所視兢兢業業之心不可有一息之間斷方可所以如此者蓋鬼神體物而不遺洋洋乎如在其上如在其左右其至也尚不可測度況可厭射之乎惟不敢有所厭射則此心始無間斷嚴氏粲曰不度不射乃無思無為寂然不動之時程子所謂主一無適尹氏所謂其心收斂不容一物者也謝氏枋得曰莊子云為不善於顯明之中者人得而非之為不善於幽暗之中者鬼神得而責之君子無人非無鬼責亦此意也彭氏執中曰視爾友君子以下以誠而交於人修之於顯也相在爾室以下以誠而對乎天愼之於靜也劉氏瑾曰不遐有愆者是省察之功所以遏人欲於將萌即中庸之內省不疾而愼獨之事也能愼獨則意無不誠矣不愧屋漏者是存養之功所以存天理之本然即中庸之不睹不聞而戒懼之事也能戒懼則心無不正矣所謂正心誠意之極功者也蓋由武公本亦聖賢之徒宜其所言合乎聖賢之道也朱氏公遷曰此章又言持敬之功當如此恐其於顯明之地用功而幽隱之地有間則不免乎色莊也故極言之辟爾為德俾臧俾嘉叶居何反淑愼爾止不愆于儀叶牛何反不僭不賊鮮息淺反不為則投我以桃報之以李彼童而角實虹户公反小子叶奬里反集傳賦也辟君也指武公也止容止也僭差賊害則法也無角曰童何氏楷曰童以角為言猶易言童牛詩言童羖也虹王氏逄曰字書虹與訌同潰亂也既戒以修德之事而又言為德而人法之猶投桃報李之必然也彼謂不必修德而可以服人者是牛羊之童者而求其角也亦徒潰亂汝而已豈可得哉集説歐陽氏修曰鮮不為則謂人心樂善惟上所為是效投桃報李謂上若修德以示下則下當為善以應之也張子曰不僭不賊則人當效之猶投桃報李之必然王氏安石曰童無角理譬我施惡無報我以善之理謂童而角實惑小子耳非其理也朱氏善曰言爾為人君之德當使無一事之不善無一事之不嘉容止之不可以不慎威儀之不可以不謹不僭則於事無所差不賊則於理無所害夫如是鮮不為民之則矣投桃報李言理之必有者以勉之也彼童而角言理之必無者以戒之也荏而甚反染而漸反柔木言緍之絲叶新夷反溫溫恭人維德之基其維哲人告之話言順德之行與言叶其維愚人覆謂我僭叶七尋反民各有心集傳興也荏染柔貌柔木柔忍音刃之木也緍綸也被之綸以為弓也話言古之善言也覆猶反也僭不信也民各有心言人心不同愚智相越之遠也集説鄭氏康成曰柔忍之木荏染然則被之弦以為弓寬柔之人溫溫然則能為德之基止言內有其性乃可以有為德也張子曰柔和之木乃弓之材溫恭之人乃德之質輔氏廣曰武公三以溫柔為言無不柔嘉也輯柔爾顔也至此又明言溫柔為進德之基蓋人才溫柔則便是消磨了那客氣消磨得客氣則其德方可進故明道謂義理與客氣常相勝只看消長分數為君子小人之别消盡者為大賢而橫渠亦言學者先須去其客氣惟溫柔則可以進學真氏德秀曰築室者以基為固修身者以敬為本故此溫溫恭謹之人有立德之基也首章驗其德之隅此章立其德之基熟味其辭武公作聖之功於是焉在鄒氏泉曰上數章皆言德之當修然聽言又修德之要機故此章以下皆欲其聽言以修德也話言之善便是德順德猶言順其話言之善者而行之無違逆也於音烏乎音呼小子叶奬里反未知臧否音鄙匪手攜之言示之事叶上止反匪面命之言提其耳借曰未知亦既抱子同上民之靡盈誰夙知而莫音慕成集傳賦也非徒手攜之也而又示之以事非徒靣命之也而又提其耳所以喻之者詳且切矣嚴氏粲曰曲禮云長者與之提攜則兩手奉長者之手負劒辟咡詔之注云傾頭與語又云口耳之間曰咡是攜手提耳皆長者教誨小子之常假令言汝未有知識則汝既長大而抱子宜有知矣人若不自盈滿能受教戒則豈有既早知而反晚成者乎集説輔氏廣曰武公老矣而使人謂其小子可謂不自盈滿矣只此便見其溫柔之意嚴氏粲曰學問之道患在自滿則不復有進此見武公切問近思工夫也唐氏汝諤曰上言哲人惟不自滿故能進德今告以臧否而不知者非由於知識之未開正以滿假之為纍也昊天孔昭叶音灼我生靡樂音洛視爾夢夢莫公反我心慘慘當作懆七到反叶七各反誨爾諄諄之純反聽我藐藐美角反匪用為教叶入聲覆用為虐借曰未知亦聿既耄叶音莫集傳賦也夢夢不明亂意也慘慘憂貌諄諄詳熟也藐藐忽略貌耄老也八十九十曰耄左史所謂年九十有五時也集説輔氏廣曰此章又言其不能聽受人言者以自警其意尤切我使誦詩之人自我也武公豈有是哉惟無是而自以為有是此聖賢兢業之心也何氏楷曰我生靡樂託為誦詩者自警之語謂我生無日非恐得罪於天之日不見有可逸樂也惟憂之深故誨之切聽我藐藐不以我之諄諄為意反以我言太多為將欲煩苦之也於乎小子見上章告爾舊止聽用我謀庶無大悔叶虎委反天方艱難曰喪息浪反厥國叶于逼反取譬不遠昊天不忒他得反回遹于橘反其德俾民大棘集傳賦也舊舊章也或曰久也止語詞庶幸悔恨忒差遹僻棘急也言天運方此艱難將喪厥國矣我之取譬夫豈遠哉觀天道禍福之不差忒則知之矣今汝乃回遹其德而使民至於困急則喪厥國也必矣集説歐陽氏修曰言我所告爾者非我妄言皆據舊事之已然者庶幾聽我猶可不至於大悔也天方將喪我國不暇遠引前世興亡之驗天之於人福善禍淫不差忒言為惡必及禍也黃氏佐曰告爾舊止謂我所告於爾者皆舊章也如治民守法而預防外患謹言愼儀而隱顯交修者是也姚氏舜牧曰吾之取譬不須遠但看天之禍福不忒自有凛然不可怠者所當聽人之話言存敬畏謹威儀毋自蹈於昏愚也總論許氏謙曰武公晚年自為針戒之詞惓惓於威儀言語而其工夫能及於聖賢者乃受教聽言之功十章之言是成德之所自乎其次第先後味詩可見汪氏應蛟曰抑戒聖學也近而威儀言語遠而謨令政刑細而寢興灑掃大而車馬戎兵顯而賓友臣庶微而暗室屋漏凛凛乎若師保在前天威在上既耄如此敬義之功於是為至矣抑十二章三章章八句九章章十句集傳楚語左史倚相曰昔衛武公年數九十五矣猶針警於國曰自卿以下至於師長士梁氏益曰師長大夫也士衆士也苟在朝者無謂我老耄而舍我必恭恪於朝夕以交戒我在輿有旅賁之規劉氏瑾曰周禮旅賁氏掌執戈盾夾車而趨車止則持輪位寧有官師之典倚几有誦訓之諫梁氏益曰周禮司徒有誦訓掌道四方志以詔觀事居寢有暬御之針真氏德秀曰暬御謂近習也臨事有瞽史之道朱氏公遷曰瞽樂師史太史宴居有師工之誦真氏德秀曰師工樂官史不失書矇不失誦以訓御之於是作懿戒以自警及其沒也謂之睿聖武公韋昭曰懿讀為抑即此篇也董氏曰侯包王氏應麟曰隋經籍志有韓詩翼要十卷侯苞撰然則苞學韓詩者也梁氏益曰包一作苞言武公行年九十有五猶使人日誦是詩而不離於其側然則序説為刺厲王者誤矣集説朱子語類抑小序衛武公刺厲王亦以自警不應一詩既刺人又自警之理以史記考之武公即位在厲王之後宣王之時説者謂是追刺尤不是若以為武公自警之詩則其意味甚長國語云武公九十餘歲作此其間亦聿既耄可以為據又如謹爾侯度只是侯國之度曰喪厥國則是諸侯自謂無疑蓋武公作此詩使人日夕諷誦以警已耳所以有小子告爾之類皆是針戒作文之體自指耳輔氏廣曰衛武公可謂老而好學不厭者也其所以至於睿聖者蓋本於此詳詠武公之事又知人心之危一或懈怠則非心邪念將乘間抵巇而入之矣其所以戰兢自持者蓋不可一息有所間斷也一詩之中曲折次第惟篤志力行者當自知之胡氏一桂曰抑詩國語之説既明賓之初筵韓詩作飲酒悔過皆為有據矣但不知二雅王者事也何武公二詩獨得入二雅乎劉氏瑾曰周之諸侯惟衛武公於國風二雅皆有詩風有淇澳無可疑也賓筵抑詩所以得入二雅者豈公作此二詩在於為王朝卿士之日而二詩之體制音節又有合於大小雅乎然而二詩但得列於變雅則與先王雅樂亦自無相亂矣菀音鬱彼桑柔與劉憂叶篇內多放此其下侯旬捋力活反采其劉瘼音莫此下民不殄心憂倉初亮反兄與恍同填舊説古塵字兮倬彼昊天叶鐵因反寧不我矜集傳比也菀茂旬遍劉殘殄絶也倉兄與愴音創恍音況同悲閔之意也填未詳舊説與塵陳同蓋言久也孔氏穎逹曰孫炎曰蒸物久之塵則塵為久義古者塵填字同故填得為久或疑與癲音顚字同為病之義但召旻篇內二字並出又恐未然今姑闕之胡氏一桂曰填滿也積也倉兄填兮言悲閔積滿於中之意倬明貌舊説此為芮伯刺厲王而作春秋傳亦曰芮良夫之詩則其説是也孔氏穎逹曰芮伯周同姓國杜預云芮國在馮翊臨晉縣則在西都之畿內也以桑為比者桑之為物其葉最盛然及其采之也一朝而盡無黃落之漸謝氏枋得曰捋采以手捋之采取其葉也其劉用斧斨以伐遠揚並枝葉盡去之矣故取以比周之盛時如葉之茂其陰無所不遍至於厲王肆行暴虐以敗其成業王室忽焉凋弊如桑之既采民失其蔭而受其病故君子憂之不絶於心悲閔之甚而至於病遂號天而訴之也劉氏瑾曰呼天者亦無所歸咎之意也後章言天之意皆然集説歐陽氏修曰桑無葉不能蔭人喻王無德不能庇民他木皆有枝葉而詩人獨以桑為喻者惟桑以葉用於人也范氏處義曰詩人見桑之柔者菀然茂盛其庇下維均一旦捋采既盡則下之託其庇者病矣周德之衰厲王無以庇其民所以不絶心之憂於呼天而訴之謂昊天非不倬然而明寧能不憐我乎四牡騤騤旟旐有翩叶批賓反亂生不夷靡國不泯叶彌鄰反民靡有黎具禍以燼叶咨辛反於音烏乎音呼有哀叶音依國步斯頻集傳賦也夷平泯滅黎黑也謂黑首也具俱也燼灰燼也步猶運也頻急蹙也厲王之亂天下征役不息故其民見其車馬旌旗而厭苦之自此至第四章皆征役者之怨辭也集説歐陽氏修曰四牡騤騤臣吏奔走於道路也旟旐有翩庶民召集於兵役也輔氏廣曰王者豈能無所征役但出於不得已則民將悅而從之以忘其勞今也使人見其車馬旌旗而厭苦若是則民不可得而用矣朱氏善曰車馬之盛旌旗之美一也而在正雅則為美在變雅則為怨者亦猶聞鐘鼓管籥之音其欣欣喜色而相告者以其能與民同樂也其疾首蹙頞而相告者以其不能與民同樂也身之所遇有勞逸之殊而心之所感有悲喜之異也何氏楷曰征役煩興侯國有調遣之煩故財力頓盡非謂無國不伐而使之皆泯滅也國步蔑資天不我將叶子兩反靡所止疑魚乞反叶如字云徂何往君子實維秉心無競叶其兩反誰生厲階叶居奚反至今為梗古杏反叶古黨反集傳賦也蔑滅資咨將養也疑讀如儀禮疑立之疑定也朱氏公遷曰鄉射禮賓升西階上疑立主人阼階東疑立鄉飲酒亦有此文又士昏禮婦疑立於席之西注疑正立自定之貌徂亦往也朱子曰云往耳而果何所往也競爭厲怨梗病也言國將危亡天不我養居無所定徂無所往然非君子之有爭心也誰實為此禍階使至今為病乎蓋曰禍有根原其所從來也遠矣集説輔氏廣曰居無所定則無以自安也徂無所往則無以避患也君子實維秉心無競非有所指言也蓋言凡為君子則其心自無所爭耳然不知誰實為此厲階而使至今為病乎此則指厲王言之也其辭婉矣朱氏善曰無爭者君子之所以已亂好爭者小人之所以生亂亂階之既成則其禍之所及者遠矣此所以無所適而可也何氏楷曰言柄政之君子實為國家之所繫維其所以執持其心者當以無所爭競為主用養和平之福誰為興兵搆怨之謀以階之厲使從役之民飄泊靡定至今如梗乎憂心殷殷念我土宇我生不辰逄天僤都但反怒叶暖五反自西徂東叶音丁靡所定處多我覯痻武巾反孔棘我圉集傳賦也土鄉宇居辰時僤厚陸氏德明曰僤本亦作亶覯見痻病棘急圉邊也毛氏萇曰圉垂也孫氏炎曰圉國之四垂也或曰禦也鄭氏康成曰禦寇之事多矣我之見病也急矣我之在邊也集説孔氏穎逹曰上言不知所往此言在役而憂我既不得還歸故自傷我之生也不得時節正逄天之厚怒使我從西而往於東無所安定而居處又自歎傷多矣我之所遇之病言遇貧困之病多也甚急矣我之在於邊垂言已守邊之勞甚也徐氏常吉曰居邊陲之苦則思內地之安念旅寄之勞則有故鄉之望故曰念我土宇亦人情也周在西故曰自西徂東為謀為毖叶音必亂況斯削告爾憂恤誨爾序爵誰能執熱逝不以濯其何能淑載胥及溺叶奴學反集傳賦也毖愼況滋也歐陽氏修曰亂日滋而國日削也序爵辨别賢否之道也執熱手持熱物也蘇氏曰王豈不謀且愼哉然而不得其道適所以長亂而自制耳故告之以其所當憂而誨之以序爵且曰誰能執熱而不以濯者賢者之能已亂猶濯之能解熱耳不然則其何能善哉相與入於陷溺而已集説王氏安石曰為謀為毖反更亂況斯削則以不與君子為謀而乃專與小人為毖故也故遂誨爾序爵張氏耒曰告爾憂恤誨爾序爵夫爵未嘗無序也序之者使賢者尊不肖者卑而已召旻曰彼疏斯稗不能序爵故也曹氏粹中曰外之公侯伯子男內之公卿大夫士皆爵也其序則賢者當在上而用事不肖者當在下而聽命有功者當進無功者當退錢氏天錫曰説一序字見爵之高下與賢之大小其序若天定不可以一已之私心與也照下文宣猶考愼之意如彼遡風叶孚音反亦孔之僾音愛民有肅心荓普耕反云不逮好呼報反是稼穡力民代食稼穡維寶代食維好集傳賦也遡鄉僾唈烏合反郭氏璞曰嗚唈短氣肅進荓使也蘇氏曰君子視厲王之亂悶然如遡風之人唈而不能息孔氏穎逹曰風唈人氣故不能喘息雖有欲進之心皆使之曰世亂矣非吾所能及也於是退而稼穡盡其筋力與民同事以代祿食而已當是時也仕進之憂甚於稼穡之勞故曰稼穡維寶代食維好言雖勞而無患也集説范氏處義曰言亂政之拂人情所向不遂如此惟不得已而歸耕治稼穡庶可用力於民事以代祿食耳申言稼穡可寶代食為善者蓋下章云稼穡卒癢則代食又不可望矣朱氏善曰君子之出處世治而行其道則祿食為無愧世亂而守其志則稼穡為無憾夫以稼穡而視祿食其勞逸固有間矣而維君子之心視之如一稼穡之所以為寶者可資之以養吾生也代食之所以為好者可因之以全吾志也姚氏舜牧曰民有肅心是欲進而與國家為謀為毖者荓云不逮者衆皆謂時之不可而止之不行也所以甘稼穡以食其力耳天降喪息浪反亂滅我立王降此蟊賊稼穡卒癢音羊哀恫音通中國具贅之芮反卒荒靡有旅力以念穹蒼集傳賦也恫痛具俱也贅屬也言危也春秋傳曰君若綴旒然與此贅同何氏休曰旒旗旒贅繫屬之辭卒盡荒虛也旅與膂同穹蒼天也穹言其形蒼言其色言天降喪亂固已滅我所立之王矣又降此蟊賊則我之稼穡又病而不得以代食矣哀此中國皆危盡荒是以危困之極無力以念天禍也此詩之作不知的在何時其言滅我立王則疑在共和之後也李氏樗曰太子靜匿召穆公家國人圍之召公乃以子代太子卒得脫穆公乃與周公行政謂之共和共和十四年厲王死於彘乃立太子靜是為宣王羅氏中行曰厲王三十七年國人畔襲王王出奔彘召公周公二相行政號曰共和劉氏瑾曰此詩果作於共和之時則厲王尚在故詩人得以追敘其事而刺之也集説胡氏一桂曰王者以民為本民以食為天病其稼穡者所以病其民也穡事之有關於國也如此朱氏善曰上章言稼穡以代祿食則朝廷雖不可以留田野猶可得而處也今曰降此蟊賊稼穡卒癢則中國之皆危無可安之所矣中國之盡荒無可食之資矣所以危困之極無力以念天禍也維此惠君民人所瞻叶側薑反秉心宣猶考愼其相息亮反叶平聲維彼不順自獨俾臧自有肺腸俾民卒狂集傳賦也惠順也順於義理也宣遍猶謀相輔狂惑也言彼順理之君所以為民所尊仰者以其能秉持其心周遍謀度考擇其輔相朱氏公遷曰考者辨之明愼者用之謹必衆以為賢而後用之季氏本曰即前章序爵之意也彼不順理之君則自以為善而不考衆謀自有私見而不通衆志所以使民眩惑至於狂亂也集説輔氏廣曰順理之君民尊鄉之以其能用賢也蓋操持其心而不為私意所乘廣詢博訪必盡衆人之見重加考擇而謹愼以用之獨言相者舉重者言也能擇一相則所用無不賢矣用賢則民皆有定志用不肖則民皆眩惑狂亂奔競以圖進矣瞻彼中林甡甡所巾反其鹿朋友已譖子念反叶子林反不胥以榖人亦有言進退維谷集傳興也甡甡衆多並行之貌曹氏粹中曰鹿性善羣得食則相呼而共之慮患則環居以禦之譖不信也胥相穀善谷窮也言朋友相譖不能相善曾鹿之不如也何氏楷曰以鹿之相從起朋友之相譖乃反興也言上無明君下有惡俗是以進退皆窮也曹氏粹中曰欲進則恐爭名而謗興欲退又懼身遠而讒遂集説呂氏祖謙曰此言君暗於上俗毁於下自傷處斯世之難也輔氏廣曰朋友既相譖毁則不復相與以善也上無明君則人倫攸斁故朋友道絶此所以進退皆窮也朱氏公遷曰上章舉錯失宜而民無以定其志此章讒譖為害而已無所容其身也維此聖人瞻言百里維彼愚人覆狂以喜匪言不能胡斯畏忌叶巨已反集傳賦也聖人炳於幾先所視而言者無遠而不察愚人不知禍之將至而反狂以喜今用事者蓋如此我非不能言也如此畏忌何哉言王暴虐人不敢諫也集説輔氏廣曰聖人明睿所照物無遁情故其所視所言無遠不察愚人則安危利災冥行倒曵不惟不覺而更狂以喜我非愚也於此豈不能一言哉但無如此畏忌何耳錢氏天錫曰聖人只借以形愚人瞻言百里惟瞻之故言之指未形之禍福不以地言愚人指當時用事之小人瞻言之言在禍患未然之前先見之言也匪言之言在禍患已見之後救時之言也維此良人弗求弗迪叶徒沃反維彼忍心是顧是復房六反民之貪亂寧為荼毒集傳賦也迪進也忍殘忍也顧念復重也荼苦菜也味苦氣辛能殺物故謂之荼毒也言不求善人而進用之其所顧念重復而不已者乃忍心不仁之人民不堪命所以肆行貪亂而安為荼毒也集説吕氏祖謙曰言王棄君子而厚小人民不堪命而王不知也輔氏廣曰上章之聖人愚人乃泛言之耳此章之良人忍心則指當時士大夫言也夫善人國之寶也所宜求訪而進用之忍心民之賊也所宜擯棄而決絶之今也維此良人則弗求弗迪維彼忍心則是顧是復好惡悖理而用舍乖僻如此民之所以貪黷悖亂安為荼毒之行也大風有隧音遂有空大谷維此良人作為式穀維彼不順征以中垢古口反叶居六反集傳興也隧道式用穀善也征以中垢未詳其義或曰征行也中隱暗也垢汙穢也大風之行有隧蓋多出於空谷之中以興下文君子小人所行亦各有道耳集説范氏處義曰大風之徑隧由空谷而起喻民之善惡皆有所從來王能用善良之人則民作而應之皆為善行或用不順之人則民之所行皆垢穢之事曰中垢者由中而發於外也輔氏廣曰大抵君子之所為必光明小人之所為必隱暗君子之所行必髙潔小人之所行必汙穢光明髙潔即所謂善道也大風有隧貪人敗類聽言則對誦言如醉匪用其良覆俾我悖叶蒲寐反集傳興也敗類猶言圯音痞族也蔡氏沈曰圯敗族類也言與衆不和傷人害物也王使貪人為政我以其或能聽我之言而對之然亦知其不能聽也故誦言而中心如醉由王不用善人而反使我至此悖眊音冒也輔氏廣曰以上一句興下一句大風則有隧矣貪人則敗類矣聽言則對四句一串説厲王説音悅榮夷公芮良夫曰王室其將卑乎夫榮公好專利而不備大難夫利百物之所生也天地之所載也而或專之其害多矣此詩所謂貪人其榮公也與芮伯之憂非一日矣集説朱氏公遷曰無可與語故自誦其言耳誦言猶云獨語也任小人而不聽善言舍君子而不見信用是以使我憂之甚耳朱氏善曰厲王之惡極矣而一言以蔽之曰貪曰暴惟貪也故所用皆聚斂之臣惟暴也故所用皆暴虐之臣此詩所謂維彼忍心是顧是復則其用暴虐之證也所謂貪人敗類職盜為寇則其用聚斂之證也貪人用則必至於竭人之財暴人用則必至於竭人之力民財竭而愁怨之聲作民力竭而謗讟之患起而後國隨以亡則君子之憂將何時而息哉嗟爾朋友豫豈不知而作如彼飛蟲時亦弋獲叶胡郭反既之陰于鴆反女音汝反豫來赫叶黑各反集傳賦也如彼飛蟲時亦弋獲王氏逄曰飛蟲飛鳥弋獲射中也言己之言或亦有中猶曰千慮而一得也之往陰覆也赫威怒之貌我以言告女是往陰覆於女朱氏公遷曰欲使之改惡為善轉禍為福耳女反來加赫然之怒於己也張子曰既往密告於女反謂我來恐動也亦通劉氏瑾曰釋文陰或音如字赫亦作嚇莊子云以梁國嚇我是也張子之説蓋用釋文二字之意集説孔氏穎逹曰此言朋友還是上之貪人貪人非詩人所親而謂之朋友者意欲親而切磋之故以朋友言之呂氏祖謙曰厲王之朝舉無信芮伯之言者故告之曰豫豈不知而妄發哉如彼飛蟲時亦弋獲豈無一二或中者乎朱氏公遷曰所謂朋友者即譖己之朋友也此特以其同僚共事耳本即小人之徒也苟為同類之君子則豈反豫來赫乎黃氏佐曰小人為惡而不知悛禍將及之君子教戒之者所以救藥之也故曰陰女是指前日而言非謂今日即以此詩而逄其怒也民之罔極職涼善背叶必墨反為民不利如云不克民之回遹職競用力集傳賦也職專也涼義未詳傳曰涼薄也鄭讀作諒信也疑鄭説為得之善背工為反覆也克勝也回遹邪僻也言民之所以貪亂而不知所止者專由此人名為直諒而實善背又為民所不利之事如恐不勝而力為之也又言民之所以邪僻者亦由此輩專競用力而然也反覆其言所以深惡之也集説朱氏公遷曰道民以惡貽民以禍莫非小人之為也此其所以致亂也民之未戾職盜為寇涼曰不可覆背善詈力智反雖曰匪豫既作爾歌叶韻未詳集傳賦也戾定也民之所以未定者由有盜臣為之寇也蓋其為信也亦以小人為不可矣及其反背也則又工為惡言以詈君子是其色厲內荏音稔真可謂穿窬之盜矣然其人又自文音問飾以為此非我言也胡氏一桂曰匪豫是不認過之詞則我已作爾歌矣言得其情且事已著明不可掩覆也集説朱氏善曰職競用力指暴虐之臣言之也職盜為寇指聚斂之臣言之也上有聚斂之臣則民亦怨咨而不定矣涼曰不可者外為正直之言覆背善詈者陰為險詐之行然亦孰得而掩之哉此我之所以既作爾歌也唐氏汝諤曰其於小人則外離而內合於君子則陽與而陰排以為盜之姦而濟其為寇之虐民亦何由定哉雖曰匪豫小人姑以自解而吾已形容其情暴揚其惡卒不可得而解矣總論范氏處義曰是詩首言世亂民無所庇至不能安處國將從之中言厲王不能考擇賢相以致貪人敗類在位之人與天下之民皆化之故其終責望在位者尤詳呂氏祖謙曰此詩本厲王之亂在於用小人故於聽任之際屢致意焉王氏炎曰風雅未有如此詩十六章者其言反覆不已而有倫次大意在於刺王用小人一章言其無以芘民二章言其征役不息三四章皆言其亂離五韋告以救亂六章言仕於朝則有禍七章言退處田野亦不能安存八章刺其獨用小人九章並刺在位之不善十章十一章以聖愚善惡相對言之所以刺愚人不能逺慮忍人不可信用也十二章言民之不善十三章言王之不善皆由在位之不賢也十四章至十六章則皆規諷其僚友之詞也桑柔十六章八章章八句八章章六句集説朱氏公遷曰小雅正月大雅桑柔皆詩人深悲甚痛之詞故言之長也如此然彼多憂懼此多哀怨則有不容不辨也倬彼雲漢昭回于天叶鐡因反王曰於音烏乎音呼何辜今之人天降喪息浪反亂飢饉薦在甸反臻靡神不舉靡愛斯牲叶桑經反圭璧既卒寧莫我聽吐丁反集傳賦也雲漢天河也昭光回轉也言其光隨天而轉也曹氏粹中曰漢之在天似雲而非雲故曰雲漢史遷曰漢者金之散氣其本曰水張衡曰水精為漢梓愼曰漢水祥也漢實水之祥而雨者水之施也天將雨其兆先見於漢故望雲漢而占之也薦荐通孔氏穎逹曰左傳曰晉荐飢釋天云仍飢為荐重也臻至也靡神不舉所謂國有凶荒則索鬼神而祭之也孔氏穎逹曰大司徒以荒政十有二聚萬民其一有曰索鬼神鄭司農云索鬼神者求廢祀而修之圭璧禮神之玉也孔氏穎逹曰春官大宗伯以蒼璧禮天黃琮禮地青圭禮東方赤璋禮南方白琥禮西方玄璜禮北方典瑞云四圭有邸以祀天兩圭有邸以祀地祼圭有瓚以肆先王圭璧以祀日月星辰璋邸射以祀山川皆祭神所用言圭璧為其總稱卒盡羅氏中行曰牲用不可盡故言無愛圭璧少而易竭故言既盡寧猶何也舊説以為宣王承厲王之烈呂氏祖謙曰周氏曰烈暴虐也內有撥亂之志公羊傳撥亂世反諸正何氏休曰撥猶治也遇災而懼側身修行欲消去之天下喜於王化復行百姓見憂孔氏穎逹曰側者反側也憂不自安故處身反側也王之憂旱正為百姓是天下百姓見被憂矜也朱子曰百姓見憂見憂恤於王也故仍叔作此詩以美之鄭氏康成曰仍叔周大夫孔氏穎逹曰仍氏叔字春秋之例天子大夫稱字范氏處義曰仍叔周之世臣也春秋書仍叔之子來聘即其後也言雲漢者夜晴則天河明故述王仰訴於天之詞如此也集説段氏昌武曰宣王所以遍走羣望如此勤渠豈不知水旱自有定數惟盡其誠心庶幾感格憂民如此雖有暴戾之氣必潛消於冥冥之中況憂民之憂者民亦憂其憂上下互相體恤而民心亦將安之而無戾矣朱氏善曰王曰於呼何辜今之人此哀矜惻怛不能自已之誠所以消災弭禍之本也靡神不舉言於神無不求也靡愛斯牲言於牲無所愛也圭璧既卒言羣祀遍舉而於玉無所吝也而何為其莫我聽乎旱既大音泰甚藴隆蟲蟲不殄禋祀自郊徂宫上下奠瘞靡神不宗后稷不克上帝不臨叶力中反耗斁丁故反下土寧丁我躬集傳賦也藴蓄隆盛也曹氏粹中曰藴者陽氣之蓄積也隆者陽氣之驕亢也蟲蟲熱氣也爾雅釋訓蟲蟲薰也郭氏璞曰旱熱薰炙人也殄絶也郊祀天地也宫宗廟也上祭天下祭地黃氏佐曰郊宫以天地宗廟對上下是從郊祀中又以天地相對説奠其禮瘞其物孔氏穎逹曰奠謂置之於地瘞謂埋之於土皆禮神之物酒食牲玉之屬也黃氏佐曰奠是方祭時事瘞是祭畢時事宗尊也劉氏濟曰前曰靡神不舉則秩而祭之後曰靡神不宗則尊而事之克勝也言后稷欲救此旱災而不能勝也臨享也曹氏粹中曰上帝力能勝旱災而不肯臨我稷以親言帝以尊言也斁敗丁當也何以當我之身而有是災也鄒氏泉曰寧丁我躬是自省自怨之詞猶曰前此未嘗有旱何以當我之身而有是災耶意者亦有以致之也或曰與其耗斁下土寧使災害當我身也亦通集説王氏安石曰自郊徂宮上下奠瘞則天地神祗人鬼內外上下無不禋祀矣在宮之神莫尊於后稷既無以勝旱災在郊之神莫尊於帝又不顧我也輔氏廣曰先郊後宮先尊而後親也上下先天而後地也靡神不宗遍舉所祭之鬼神也前言舉舉其也禮此言宗極其尊也后稷不克上帝不臨先親而後尊不言地及他鬼神者舉尊親以該之也救災人事斁也故言后稷不克臨享神事也故言上帝不臨耗下土何為適當我之身乎不敢知之辭也旱既大甚則不可推吐雷反兢兢業業如霆如雷周餘黎民靡有孑遺叶夷回反下同昊天上帝則不我遺胡不相畏先祖于摧在雷反集傳賦也推去也孔氏穎逹曰推是遠離之辭故為去也兢兢恐也業業危也如霆如雷言畏之甚也孑無右臂貌遺餘也言大亂之後周之餘民無復有半身之遺者孟子説詩者不以文害辭不以辭害志以意逆志是為得之如以辭而已矣雲漢之詩曰周餘黎民靡有孑遺信斯言也是周無遺民也朱子曰若但以其辭而已則如雲漢之言是周之民真無遺種矣惟以意逆之則知作詩者之志在於憂旱而非真無遺民也而上天又降旱災使我亦不見遺也季氏本曰民無遺則我無所依是即夫不我遺也摧滅也言先祖之祀將自此而滅也集説蘇氏轍曰恐懼之甚如雷霆震於其上天將不復使我遺餘胡為尚不相畏哉曹氏粹中曰宣王自謂不足以當天意而庶幾以先祖之靈冀尚存其宗社朱氏公遷曰既憂於民又憂於己又憂先祖之祭祀則其恐懼不得不然矣季氏本曰先祖之業以得民而成無民則先祖之業亦摧落矣安可不畏何氏楷曰胡不相畏對大夫君子言之言我君子何可不相與畏懼乎韋氏調鼎曰兢業恐懼修省也救災弭患之本在此旱既大甚則不可沮在呂反赫赫炎炎云我無所大命近止靡瞻靡顧叶果五反羣公先正則不我助叶牀所反父母先祖胡寧忍豫叶演女反集傳賦也沮止也赫赫旱氣也炎炎熱氣也無所無所容也大命近止死將至也瞻仰顧望也羣公先正月令所謂雩祀陳氏澔曰雩者吁嗟其聲以求雨之祭百辟卿士之有益於民者以祈穀實者也毛氏萇曰先正百辟卿士也孔氏穎逹曰正者長也先世為官之長又與羣公相配故知是百辟卿士也月令注云百辟卿士古之上公以下若勾龍后稷之類於羣公先正但言其不見助至父母先祖孔氏穎逹曰於民則為父母於周則為先祖則以恩望之矣所謂垂涕泣而道之也集説范氏處義曰上章既於羣祀之中訴於神之尊者如后稷如上帝此章又於羣祀之中舉其神之親者而告之如雩祭之羣公先正宗廟之父母先祖是也輔氏廣曰上章言我心極於危懼而天怒未之息此章言天旱方甚未已而我身無所容羣公先正則不我助父母先祖胡寧忍豫所以望之者各有輕重之不同也劉氏瑾曰忍之一辭可見望之以恩之意旱既大甚滌滌徒歷反山川叶樞倫反旱魃蒲末反為虐如惔音談如焚叶符勻反我心憚暑憂心如熏羣公先正則不我聞叶微勻反昊天上帝寧俾我遁叶徒勻反集傳賦也滌滌言山無木川無水如滌而除之也魃旱神也孔氏頴達曰神異經曰南方有人長二三尺袒身而目在頂上走行如風名曰魃所見之國大旱一名旱母蓋是鬼魅之物惔燎之也鄭氏康成曰草木燋枯如見焚燎然憚勞也畏也熏灼遁逃也言天又不肯使我得遁逃而去也集説朱氏公遷曰羣公先正上章言其不助則不肯用其力也此章言其不我聞則不肯聼其言也昊天上帝尊也故其畏之也深雖欲逃遁而不敢季氏本曰措身無所而欲逃避無可奈何之辭也謂昊天上帝亦哀閔下民者何為使我遁逃無所乎蓋即云我無所之意旱既大甚黽勉畏去胡寧癲都田反我以旱憯七感反不知其故祈年孔夙方社不莫音慕昊天上帝則不我虞叶元具反敬恭明神宜無悔怒集傳賦也黽勉畏去出無所之也癲病憯曾也祈年孟春祈穀於上帝孟冬祈來年于天宗是也曹氏粹中曰月令祈穀注云謂以上辛郊祭天也天宗注云天宗謂日月星辰也方祭四方也社祭土神也曹氏粹中曰社祭五土之神主司稼穡者也方者祭五方之神於四郊也姚氏舜牧曰前郊宫上下是方旱時祈禱之祭此祈年方社是平日祈報之祭虞度悔恨也言天曾不度我之心如我之敬事神明宜可以無恨怒也集説王氏安石曰胡寧癲我以旱憯不知其故則王之自反也蓋以至矣蘇氏轍曰始以旱故欲遁去以避賢者既又以為棄位以避憂患非人主之義故黽勉不去以求濟斯難畏不敢也謝氏枋得曰古之聖王無一日不為民慮稼之方納預祈來年於天宗農之始耕先祈榖於上帝春祈社稷已願百榖之堅實秋報社稷又願嗣歲之豐登所謂孔夙不莫也胡氏紹曾曰胡寧數句非謂無罪之詞蓋自閔其格天無術旱既大甚散無友紀鞫居六反哉庶正疚哉冢宰叶奬里反趣七口反馬師氏膳夫左右叶羽已反靡人不周無不能止瞻卬音仰昊天云如何里集傳賦也友紀猶言綱紀也嚴氏粲曰人君以臣為友相與紀綱四方者今羣臣以救旱之急於常務之可緩者不暇整之故云散無友紀也或曰友疑作有鞫窮也庶正衆官之長也疚病也冢宰又衆長之長也趣馬掌馬之官師氏掌以兵守王門者梁氏益曰朱子於小雅十月之交傳云師氏掌司朝得失之事此云師氏掌以兵守王門者各以職之所在而分言之膳夫掌食之官也歲凶年榖不登孔氏穎逹曰四時一終曰歲取歲星行一次也年取榖一熟也歲凶謂此歲凶也年榖不登謂此年之榖不成熟也則趣馬不秼孔氏穎逹曰不以粟秣養其馬師氏弛其兵朱氏公遷曰掌近王之兵故可弛馳道不除孔氏穎逹曰曲禮注云為妨民取蔬食故也榖梁傳大侵之禮亦云道不除朱子曰秦漢謂天子所行之道為馳道祭祀不縣孔氏穎逹曰穀梁傳曰大侵之禮禱而不祀然則此云祭者正謂祈禱之祭不用樂也膳夫徹膳孔氏穎逹曰徹膳者天子日食太牢今減損之也左右布而不修孔氏穎逹曰左右之官布列於位不令有所修造大夫不食粱士飲酒不樂王氏逄曰歲凶以下本毛傳語周救也無不能止言諸臣無有一人不周救百姓者無有自言不能而遂止不為也孔氏穎逹曰無不能而止者其發倉廩散積聚有分無多分寡無敢有不能而止者言上下同也里憂也呂氏祖謙曰釋文曰里本作㾖爾雅作悝釋詁曰悝憂也與漢書無俚之俚同聊賴之意也劉氏瑾曰孟子稽大不理於口集傳訓賴亦引季布傳無俚之俚為證然則里理俚蓋通用集説輔氏廣曰歲凶故上下離散無有統紀止言百官者百官猶如此則萬民又可知矣君吏民三者相須有一病焉則皆受其病此理之必然也瞻卬昊天云如何里蓋又呼天而訴之言其如我之憂何也此亦人窮則反本之意黃氏佐曰上數章見君能憂民之憂此見臣能憂君之憂也靡人不周謂各竭精誠以回天意而救百姓無不能止無有以天意不可回百姓不可救而遂止不為也徐氏常吉曰此章蓋又訴諸臣之勞以冀天之察也瞻卬昊天有嘒呼惠反其星大夫君子昭假音格無贏音盈大命近止無棄爾成何求為于偽反我以戾庶正叶諸盈反瞻卬昊天曷惠其寧集傳賦也嘒明貌昭明假至也久旱而仰天以望雨則有嘒然之明星未有雨徵也陸氏佃曰言旱久而繁星備見星陽之精也陽盛而亢則星稠於上其理然也姚氏舜牧曰有嘒其星應首章倬彼雲漢昭回于天句然羣臣竭其精誠而助王以昭假于天者已無餘矣雖今死亡將近而不可以棄其前功當益求所以昭假者而修之固非求為我之一身而已乃所以定衆正也蘇氏轍曰未有民不寧而庶官定者也於是語終又仰天而訴之曰果何時而惠我以安寧乎張子曰不敢斥言雨者畏懼之甚且不敢必云爾集説孔氏穎逹曰上閔羣臣同恤此又勸以終之朱子曰古之聖賢遇災而懼嚴恭祗畏以正厥事猶不敢庶幾其萬一故曰瞻仰昊天曷惠其寧朱氏善曰始言有嘒其星歎其雨之不可必終言曷惠其寧幸其雨之或可必上言大命近止靡瞻靡顧求其助於神此言大命近止無棄爾成盡其責於己凡若此者非以為一人也固以定衆志也李氏本曰爾成謂假天之成功也因旱之不止而不黽勉以求天之必應則棄爾成矣棄其成而自怠則有為我之私是自取戾也惟天惠之以雨乃可安寧爾此勉羣臣救災之不怠也非其有愛民之誠而能之乎總論張氏耒曰不誠意於人事而誠之於祭祀不勉之於吾身而推之於臣僕何也蓋人事已修矣吾身已勉矣所不可知者祭祀與臣僕而已今也祭祀無不誠臣僕無不善則本末大小無不治矣此所為側身修行之主也許氏謙曰宣王遇災憂懼始祈於外神次祈於宗廟既而無驗則自揆事神之誠或未至誠既盡則又盡人事以聽天命也其恐懼修省之意仁愛惻怛之誠反覆淫溢於言辭之間宣王之所以賢可見矣朱氏善曰讀是詩見宣王有事天之敬有事神之誠有恤民之仁敬畏以事天而天監之虔恭以事神而神享之惻怛以恤民而民懷之藴隆之氣消豐穰之效著內治既修外攘斯舉中興之業皆自雲漢一念之烈而基之也雲漢八章章十句集説李氏樗曰春秋傳宋大水公子御説對魯數語耳而臧孫逹便知其有恤民之心況宣王憂民之心如此如之何而不中興乎吕氏祖謙曰宣王之小雅始於六月言其功也其大雅始於雲漢言其心也無是心安得有是功哉沈氏守正曰或曰三年餘一年之食九年餘三年之食遺人掌邦之委積以待施舍此周制也先時無備臨變而君臣同憂是棄本而修末也蓋雲漢承厲王之後百物凋弊有不可得為者耳嵩息中反高維嶽駿音峻極于天叶鐡因反維嶽降神生甫及申維申及甫維周之翰叶胡于反四國于蕃叶分邅反四方于宣集傳賦也山大而高曰嵩李氏巡曰山高大者自名嵩本不指中嶽今之中嶽名嵩高或取此文以立名乎嶽山之尊者東岱南霍西華北恆是也孔氏穎逹曰羣書多云五嶽此傳惟言四嶽者以堯立四伯主四時四方之嶽而已不主中嶽故堯典每云咨四嶽而不言五也駿大也甫甫侯也即穆王時作呂刑者孔氏穎達曰孔安國云呂侯後為甫侯詩及禮記作甫尚書與外傳作呂或曰此是宣王時人而作呂刑者之子孫也呂氏祖謙曰甫申意者皆宣王時賢諸侯同有功于王室者甫雖不見於經以文意考之蓋當如此也申申伯也李氏樗曰申侯爵以其為方伯故謂之申伯皆薑姓之國也孔氏穎達曰堯之時有薑氏者掌四嶽之祭周則有甫申齊許皆薑氏之苗裔也翰幹蕃蔽也宣王之舅申伯出封于謝而尹吉甫作詩以送之言嶽山高大而降其神靈和氣以生甫侯申伯孔氏穎達曰美申伯而及甫侯由上世俱出於四嶽故連言之實能為周之楨幹屛蔽而宣其德澤於天下也蓋申伯之先神農之後朱氏公遷曰薑氏出神農為唐虞四嶽總領方嶽諸侯而奉嶽神之祭能修其職嶽神享之故此詩推本申伯之所以生以為嶽降神而為之也黃氏櫄曰惟嶽降神乃詩人形容之辭以見上天興周之意不必泥其有無也集説李氏樗曰言嵩髙之山其大極矣在穆王之時則生甫侯在宣王之時則生申伯是二人者皆為周室之屛翰四國則皆賴之為蕃衛四方又賴之以宣布恩澤魏氏了翁曰人之此心與天地山川相為流通固也而人物之生又係乎時數清明之感山川英靈之會祖宗德澤之積朱氏公遷曰嶽山靈氣深厚故鍾為二賢前後迭出功相比業相齊其生也有自來其出也有所為非偶然也推賢者以配古人其敬重如此朱氏善曰四嶽之佐唐虞有功於神人大矣故愈久而不替其在於周既生甫侯於前復生申伯於後要昔足以為周之楨幹四國其有不賴之而屛蔽者乎四方之人其有不賴之而宣布天子之德澤者乎亹亹申伯王纘祖管反之事于邑于謝南國是式叶失吏反王命召伯叶逋莫反定申伯之宅叶達各反登是南邦叶卜工反世執其功集傳賦也亹亹強勉之貌朱子曰與亹亹文王者異矣姚氏舜牧曰亹亹就蕃宣之勤言纘繼也使之繼其先世之事也邑國都之處也王氏安石曰國之所都亦曰邑作邑于豐商邑翼翼是也謝在今鄧州南陽縣周之南土也曹氏粹中曰地理志南陽宛縣有申伯國棘陽縣東北百里有謝城其地蓋相近式使諸侯以為法也陳氏鵬飛曰南國是式者命為州牧也召伯召穆公虎也登成也世執其功言使申伯後世常守其功也或曰大封之禮召公之世職也孔氏穎達曰王肅云召公為司空主繕治然則營築城郭召伯所主其事劉氏瑾曰如或説則此章前四句述王褒封申伯之事後四句述王命穆公為申伯定邑居常守康公之職也集説林氏之竒曰宣王之世申伯以王舅大臣為南國屛翰蓋前此申在王畿之內而宣王始分封之以扞城王室范氏處義曰申伯始以申國之賢諸侯入為卿士既佐王有功王遂使繼其前日之事改大其邑俾邑於謝以為南國之式則方伯連帥之任也其營謝邑也特命召虎以卜築之役召伯既告成則申伯之宅定矣於是申伯得以成此南邦之功而世守之也彭氏執中曰申伯之先已為諸侯故王使繼其事而邑於謝式於南邦此加地進律之賞也朱氏公遷曰此言申伯封謝之由天子城謝之意盡尊崇之道致悠久之規禮意無加於此矣薛氏應旗曰定以經營言登以成就言宅指宗廟城郭宮室之類其功即屛翰蕃宣之功王命申伯式是南邦叶卜功反因是謝人以作爾庸王命召伯徹申伯土田叶地因反王命傅御遷其私人集傳賦也庸城也孔氏穎達曰傳以下云有俶其城故以庸為城言因謝邑之人而為國也朱氏公遷曰體勢不重則不足以鎮南服故因謝邑居民稠密而以之作邑也鄭氏曰庸功也為國以起其功也段氏昌武曰起發其功使之彰顯庸民功也封於謝以作其民功徹定其經界正其賦稅也傅御申伯家臣之長也私人家人遷使就國也輔氏廣曰申伯為卿大夫時必有家臣今出封於謝不敢自與之往也故王命其家臣之長使遷之漢明帝送侯印與東平王蒼諸子而以手詔賜其國中傅蓋古制如此集説朱氏善曰徹土田王者之大法故以命之大臣遷私人王者之私恩故以命之傳御土田徹而國制定私人遷而家道成則王之所以待申伯者厚矣何氏楷曰用徹法以正其土田則經界之修明稅賦之畫一皆在其中矣此即黍苖篇所云平原隰清泉流之事韓奕言實畝實籍江漢言徹我疆土而此言徹申伯土田蓋自厲王貪暴而徹法壞盡矣宣王中興之美此亦可見其一也王氏志長曰宣王於申伯慶以土地俾式南國倚賴至矣至於徹謝土田仍命召伯蓋建國徹田司空之事此見周法之嚴於畔官離次如此申伯之功召伯是營有俶尺叔反其城寢廟既成既成藐藐王錫申伯叶逋各反四牡蹻蹻渠略反鉤膺濯濯集傳賦也俶始作也藐藐深貌蹻蹻壯貌濯濯光明貌集説孔氏穎達曰此説往營謝邑訖而告王言召伯既作其城又作寢廟王乃賜申伯以四牡之馬又賜以在首之金鉤在膺之樊纓將欲遣之故賜以此物也案巾車金路鉤樊纓九就同姓以封申伯異姓而得此賜者以其命為侯伯故得車如上公曹氏粹中曰申伯之功宜以建國召伯營之得其時制故並美之也輔氏廣曰有俶其城者言城則始作若寢廟則先居宅而成之矣召公既迄事而告王故王錫申伯以車馬而使之就國也姚氏舜牧曰申伯之功與世執其功不同此營謝之功也黍苖云肅肅謝功召伯營之正謂此也四牡鉤膺即下之路車乘馬也預偹以送其行曰王錫及行而贈送之曰王遣王遣申伯路車乘繩證反馬叶滿補反我圖爾居莫如南土錫爾介圭以作爾寶叶音補往近鄭音記案説文從辵從丌今從斤誤王舅南土是保叶音補集傳賦也介圭諸侯之封圭也孔氏穎達曰毛以為特賜汝以大圭謂桓圭九寸也以為汝之執瑞言介者大於常圭故王肅云寶瑞也桓圭諸侯圭之大者所以朝天子是也呂氏祖謙曰韓奕曰以其介圭入覲于王則當是諸侯之瑞圭蓋介之為言大也詩人特美大其圭而稱之也近辭也鄭氏康成曰聲如彼記之子之記徐氏光啓曰辭者語辭也集説段氏昌武曰呂曰古之封建營其城邑寢廟必其所封諸侯自為之天子有所不與申伯以親且賢王欲褒賞而尊顯之皆使召伯先為營之然後以禮遣之所以建國親侯者恩禮無不曲盡嚴氏粲曰五章申述錫遣之事也王遣申伯之國賜之以路車即上文鉤膺金路也賜以一乘之馬即上文四牡蹻蹻也申伯以異姓受金路異恩也故侈君之賜而申復言之也王因告申伯我謀爾之所居無如南土之最善又特賜汝以大圭為汝所執之瑞亦侈君賜而美大言之也朱氏公遷曰南國是式德足以為矜式也南土是保才足以為屏蔽也申伯之承重任如此徐氏常吉曰南土是保欲其保障一方為南國巨鎮非但自保其國而已即首章維翰之意申伯信邁王餞淺賤反于郿芒悲反申伯還南謝于誠歸王命召伯徹申伯土疆以峙直里反其粻音張式遄市專反其行叶户郎反集傳賦也郿在今鳳翔府郿縣皇輿表今隸陜西在鎬京之西岐周之東而申在鎬京之東南時王在岐周故餞于郿也孔氏穎逹曰自鎬適申塗不經郿時宣王蓋省視岐周故餞之于郿申伯既受命王餞還歸於鎬而後適申也言信邁誠歸以見王之數音朔留疑於行之不果故也何氏揩曰邁行也信邁猶云果行也謝于誠歸者鄭云誠歸于謝也峙積粻糧遄速也召伯之營謝也則已斂其稅賦積其餱糧孔氏穎逹曰謂自京至謝所在道路具其糧食不乏絶也使廬市有止宿之委積許氏謙曰地官遺人掌其道路之委積凡國野之道十里有廬廬有飲食二十里有宿宿有路室路室有委五十里有市市有候館候館有積注疏倉人主穀廪人主米計足國用以其餘共委積少曰委多曰積故能使申伯無留行也集説曹氏粹中曰祭統曰明君爵有德而祿有功必賜爵祿於太廟示不敢專也郿近岐周先王之廟在岐申伯之受封則册命於先王之廟故王在岐而飲餞于郿也江漢言召虎之封亦曰于周受命於此可見矣呂氏祖謙曰是詩載封申伯如遷其私人以峙其粻莫不曲盡宣王之待元舅其恩意周浹綜理微密如此輔氏廣曰此言王餞申伯之誠意也王先使召伯為之定居宅作城郭以成其國徹土田遷私人以分其業終又斂賦稅積餱糧而後申伯之行無道路留滯之虞矣朱氏公遷曰上言徹土田是井其田以授民人此言徹土疆則取井田什一之賦以為餱糧而供一時之用耳申伯番番音波叶分邅反既入于謝徒御嘽嘽吐丹反周邦咸喜戎有良翰叶胡千反不顯申伯王之元舅文武是憲叶虛言反集傳賦也番番武勇貌嘽嘽衆盛也戎女也申伯既入于謝周人皆以為喜而相謂曰汝今有良翰矣元長憲法也言文武之士皆以申伯為法也孔氏穎達曰由申伯有文有武故得與文武之人為表式或曰申伯能以文王武王為法也集説曾氏鞏曰此章所謂文武後章所謂柔惠且直辭異而實同皆美其全德耳輔氏廣曰不顯申伯言申伯之甚顯也親則為王之元舅賢則為文武之士之法則始言番番但見其武終則並文言之嚴氏粲曰七章述申伯至謝此方送行而豫道其事也鄒氏泉曰周人就京師之人而言戎周人自相謂也天下以京師為根本京師以列國為藩垣藩垣得人根本之所由以固也故曰女今有良翰矣此正應維周之翰意申伯之德柔惠且直揉汝又反此萬邦聞音問于四國叶于逼反吉甫作誦其詩孔碩其風肆好以贈申伯集傳賦也揉治也吉甫尹吉甫周之卿士孔氏穎逹曰尹吉甫以尹為氏其先嘗為尹官而因氏焉誦工師所誦之詞也孔氏穎逹曰詩者工師樂人誦之以為樂曲碩大風聲王氏安石曰此雅也而謂之風則以辭不迫切而能感動人之善心也朱氏公遷曰述於言為詩歌於工為誦其聲足以感人則為風肆遂也集説輔氏廣曰柔惠柔德之善也直剛德之善也其德剛柔相濟文武兼資故能揉治萬邦而名聞著於四方之侯國此吉甫之詩所以不容不作也嚴氏粲曰所言王室依賴諸侯表式皆天下安危之大計是其詩之大也美其功以勉之是其風之好也謝氏枋得曰人臣之事君柔而順者多流於邪曰柔惠且直異乎小人之佞柔矣總論許氏謙曰史記謂四嶽佐禹有功虞夏之際或封於申然則申舊國非宣王始封之也謝非申國之舊宣王改封申伯於此觀我圖爾居莫如南土之言可見矣申之舊國莫可考知今南陽之申因申伯而名謝地也曰四國于蕃四方于宣揉此萬邦見其功也南國是式式是南邦亹亹番番柔惠且直聞于四國見其賢也姚氏舜牧曰王纘王命王錫王遣王餞見天子眷注殷勤之意又數稱申伯見詩人丁寧鄭重之詞總之則申伯之德足以承天子寵命之隆故在錫之者非濫與承之者非濫受其作詩以送之者非溢美也嵩高八章章八句集説朱子語類問嵩高蒸民二詩皆是遣大臣出為諸侯築城曰此也曉不得封諸侯固是大事看黍苖詩當初召伯帶領許多車徒人馬去也自勞攘胡氏一桂曰嵩髙與黍苖相表裏黍苖不過述召伯營謝之功嵩髙則尹吉甫送申伯雖薑申伯多述王命故雅有大小不同也天生蒸民有物有則民之秉彝音夷好呼報反是懿德天監有周昭假音格于下叶後五反保兹天子生仲山甫集傳賦也蒸衆則法秉執彝常懿美監視昭明假至保祐也仲山甫樊侯之字也孔氏穎逹曰周語稱樊仲山甫諫宣王是山甫為樊國之君也韋昭云食采於樊僖二十五年左傳説晉文公納定襄王王賜之樊邑則樊在東都之畿內也宣王命樊侯仲山甫築城于齊而尹吉甫作詩以送之言天生衆民有是物必有是則蓋自百骸九竅五藏而達之君臣父子夫婦長幼朋友無非物也而莫不有法焉如視之明聽之聰貌之恭言之順君臣有義父子有親之類是也是乃民所執之常性何氏楷曰即書言恆性是也故其情無不好此美德者朱子曰天之生此物必有箇當然之則故民執之以為常道所以無不好此懿德者物物有則止於仁君之則也止於敬臣之則也視遠惟明目之則也聽德惟聰耳之則也從作又言之則也恭作肅貌之則也四肢百骸萬事萬物莫不有當然之則而況天之監視有周能以昭明之德感格于下朱氏公遷曰明德在下而感格于天也故保祐之而為之生此賢佐曰仲山甫焉則所以鍾其秀氣而全其美德者又非特如凡民而已也嚴氏粲曰詩欲美山甫故謂山甫天實生之若所稟獨厚於人者昔孔子讀詩至此而贊之曰為此詩者其知道乎故有物必有則民之秉彝也故好是懿德而孟子引之以證性善之説其旨深矣讀者其致思焉集説王氏質曰民之秉彝好德蓋其常稟然天有特為時而生者則與常稟不同所謂出乎其類拔乎其萃者也真氏德秀曰則者準則之謂一定而不可易也彝而言秉者渾然一理具於吾心不可移奪若秉執然為其有此故於美德無不知好之者仁義忠孝所謂美德也人無賢愚莫不好之也嚴氏粲曰於均稟同賦之中而有賢者獨鍾氣之粹焉是有關於國家盛衰之數而非偶然也有周總一代言之天子指宣王也言由先世積德之久故天眷宣王為生賢佐也陳氏櫟曰天之生人氣以成形理亦賦焉氣之成形者物也理之成性者則也自性之確然有定者言之謂之則自性之秩然有常者言之謂之彝自其行道而得此性理於心者言之謂之德好以情言也惟其有此則是以秉此彝惟其性秉此彝是以情好此德情之所發好善如此則性之本善可知矣此言賦受精微之理三百篇第一義也仲山甫之德柔嘉維則令儀令色小心翼翼古訓是式威儀是力天子是若明命使賦叶韻若賦未詳集傳賦也嘉美令善也儀威儀也色顔色也翼翼恭敬貌古訓先王之遺典也式法力勉若順賦布也東萊呂氏曰柔嘉維則不過其則也過其則斯為弱不得謂之柔嘉矣令儀令色小心翼翼言其表裏柔嘉也古訓是式威儀是力言其學問進修也天子是若明命使賦言其發而措之事業也此章蓋備舉仲山甫之德集説朱子詩傳遺説問東萊呂氏説後一章云柔亦不茹剛亦不吐此言仲山甫之德剛柔不偏也而二章獨以柔嘉維則蔽之嵩髙稱申伯亦曰柔惠且直然則入德之方其可知矣曰如此則乾卦用不得了人之資稟自有柔德勝者自有剛德勝者今仲山甫却是柔但其中自有骨子不是一向如此柔去若以仲山甫柔嘉維則必要以此為入德之方則不可人之進德須用剛健不息問巧言令色鮮矣仁詩言令儀令色何也曰詩人所謂令色者非是做作恁地上文云仲山甫之德令儀令色此德之形於外者如此與鮮矣仁者不干事段氏昌武曰黃曰天子是若而必曰明命蓋順君而不至於逄君矣嚴氏粲曰山甫令儀令色則動容周旋中禮矣猶曰威儀是力何也有德者固威儀之所自形而謹其威儀者亦所以檢攝而養其德也故致禮以治躬則莊敬外貌斯須不莊不敬則慢易之心入之矣可不勉與大臣以道事君而曰天子是順何也順者臣道也坤道也事君盡禮順也有犯無隱亦順也將順正救皆出於忠愛無往非順也蔣氏悌生曰德性之美純乎天故體之所具無不善知行之學盡諸己則用之所施無不宜大臣有美質而加學問之功宜其得君以行其道也王命仲山甫式是百辟音壁無韻未詳纘戎祖考王躬是保出納王命王之喉舌賦政于外四方爰發叶方月反集傳賦也式法戎女也王躬是保所謂保其身體者也朱氏公遷曰出大戴記保傅篇然則仲山甫蓋以冢宰兼大保而大保抑其世官也與問仲山甫以冢宰兼大保何以知之曰其言式是百辟則是為宰相可知其曰保兹天子王躬是保則是為大保可知出承而布之也納行而復之也孔氏穎逹曰宰夫掌諸臣之復注云復之言報也反也反報於王謂朝廷奏事是謂奏事為復也喉舌所以出言也發發而應之也東萊呂氏曰仲山甫之職外則總領諸侯內則輔養君德入則典司政本出則經營四方輔氏廣曰今兹築城於齊則亦經營之一事也嚴氏粲曰出納則居中以通達上下之情賦政則出外以經營四方之治此章蓋備舉仲山甫之職集説黃氏櫄曰宣王命山甫曰纘戎祖考而繼之曰王躬是保蓋使之以其孝於祖父者而忠於其君又繼之曰出納王命賦政于外蓋使之以其忠於君者以及於民想其在朝廷則有以得君之心在邦國則足以得民之心吁賢哉朱氏公遷曰式百辟保王躬必盛德而後行出納王命而賦其政則非剸煩治劇之才不能當此任也朝廷衆職專命於山甫則其才全德備可見矣蔣氏悌生曰仲山甫之出使為城齊而行吉甫舉其職於賦政于外特一言之至於式百辟保王躬為王喉舌屢言而不一言焉可見大臣之職以朝夕匡弼為本而出使於外特一時之用耳肅肅王命仲山甫將之邦國若否音鄙仲山甫明叶謨郎反之既明且哲以保其身夙夜匪解佳賣反以事一人集傳賦也肅肅嚴也將奉行也若順也順否猶臧否也徐氏常吉曰明臧否者謂於諸侯治國之政知其善而益奬勸之知其不善而益戒飭之也明謂明於理哲謂察於事保身蓋順理以守身非趨利避害而偷以全軀之謂也饒氏魯曰明者大無不照哲者微無不察保身者其中庸不驕不倍足興足容之謂乎解怠也一人天子也集説李氏樗曰既明且哲以保其身此則內以保其身也夙夜匪解以事一人此則外以致其君也朱子語類問既明且哲以保其身有些小委曲不正處否曰安得此只是見得道理分明事事處之得其理有可全之道便有委曲處亦是道理可以如此原不失正特不直犯之耳若到殺身成仁處亦只得死古人只是平説中庸無一理不眀即是明哲若只見得一偏便有蔽便不能見得理盡便不可謂之明哲學至明哲只是依本分行去無一事不當理即是保身之道上文肅肅王命仲山甫將之邦國若否仲山甫明之便是明哲所謂明哲者只是曉天下事理順理而行自然災害不及其身可以保其祿位然明哲保身亦只是常法若到那舍生取義處又不如此論輔氏廣曰王命尊嚴山甫則奉而行之邦國有順有否山甫則能明而辨之此承上章賦政于外四方爰發而言之也大凡徇外者多忘乎內而山甫又能以明哲而保其身守己者或簡於人山甫又能夙夜匪解以事一人此其為全德也歟人亦有言柔則茹忍與反之剛則吐之維仲山甫柔亦不茹剛亦不吐不侮矜古頑反寡叶果五反不畏強禦集傳賦也人亦有言世俗之言也茹納也不茹柔故不侮矜寡不吐剛故不畏強禦孔氏穎達曰不侮不畏即是不茹不吐既言其喻又言其實以充之以此觀之則仲山甫之柔嘉非軟美之謂而其保身未嘗枉道以徇人可知矣集説廖氏剛曰立人之道曰仁與義仁則無不愛也豈以其柔而茹之義則無不理也豈以其剛而吐之書曰無虐煢獨而畏高明仲山甫與有焉劉氏瑾曰周子以柔善為慈祥柔惡為懦弱剛惡為強梁剛善為嚴毅山甫不茹不侮則有柔善而無剛惡不吐不畏則有剛善而無柔惡故其柔嘉不為軟美保身不致枉道剛柔合德而發皆中節也朱氏善曰常人之情因物有遷而惟君子之守則不以物情之異而或變也人亦有言德輶羊久反如毛民鮮息淺反克舉之我儀圖叶丁五反之維仲山甫舉之愛莫助叶牀五反之衮職有闕維仲山甫補之集傳賦也輶輕劉氏濟曰駟驖曰輶車者亦取其馳逐之輕故輶有輕之義儀度圖謀也衮職王職也天子龍衮不敢斥言王闕故曰衮職有闕也言人皆言德甚輕而易舉章氏甫曰德輶易舉朱子所謂能知能行者也然人莫能舉也我於是謀度其能舉之者鄭氏康成曰我吉甫自我也則惟仲山甫而已是以心誠愛之而恨其不能有以助之蓋愛之者秉彝好德之性也而不能助者能舉與否在彼而已固無待於人之助而亦非人之所能助也黃氏櫄曰助者生於有所不足今山甫能舉衆人不能舉之德則無所不足何助之有故雖愛之而莫能助之也至於王職有闕失亦維仲山甫獨能補之蓋惟大人然後能格君心之非未有不能自舉其德而能補君之闕者也嚴氏粲曰此推尊其德足以格君也朱氏善曰舉己之德者所以立本補君之闕者所以致用即上章所謂能保身而後能事君者也集説輔氏廣曰德者人之固有然非知至意誠者莫能舉也舉在我之德補在君之德此亦非強立者不能山甫之德至是又不可獨以柔稱矣朱氏公遷曰舉者以身體之也舉其德者似易而實難自本然之理言之則人情莫不好此懿德自氣質之稟言之則有能舉不能舉之異觀令儀令色以下數語則山甫之能舉其德可見矣舉德所以申二章之意補闕所以申三章四章之意德業俱盛此章備焉仲山甫出祖四牡業業征夫捷捷在接反每懷靡及叶極業反四牡彭彭叶鋪郎反八鸞鏘鏘七羊反王命仲山甫城彼東方集傳賦也祖行祭也曹氏粹中曰顔師古曰祖者送行之祭因饗飲焉是出門而後祖祭故云出祖業業健貌捷捷疾貌東方齊也傳曰古者諸侯之居逼隘則王者遷其邑而定其居蓋去薄姑而遷於臨災也孔氏曰史記齊獻公元年徙薄姑都治臨災歐陽氏修曰齊世家大公封營邱至五世胡公徙都薄姑子獻公徙治臨災計獻公當夷王之時與此傳不合豈徙於夷王之時至是而始備其城郭之守歟集説曹氏粹中曰車徒之行如是其速而山甫每以不及事為懷蓋言其忠也輔氏廣曰每懷靡及應四章之夙夜匪解也言每懷靡及故説車馬之健與疾言王以禮遣之則説四牡之盛鸞聲之和以見騶從車馬之光華末章之騤騤喈喈則又言其既行之儀也何氏楷曰懷如不及事之慮山甫之急公也然以下章永懷之語觀之山甫身遠闕廷而心懸啓沃其所為皇皇如靡及者亦欲事畢而早還朝耳徐氏鳯彩曰起大事動大衆既非旬月之功又恐調度之失是以有靡及之懷也四牡騤騤求龜反八鸞喈喈音皆叶居奚反仲山甫徂齊式遄其歸吉甫作誦穆如清風叶孚愔反仲山甫永懷以慰其心集傳賦也式遄其歸不欲其久於外也穆深長也清風清微之風化養萬物者也以其遠行而有所懷思故以此詩慰其心焉曾氏曰賦政于外雖仲山甫之職然保王躬補王闕尤其所急城彼東方其心永懷蓋有所不安者尹吉甫深知之作誦而告以遄歸所以安其心也集説曹氏粹中曰仲山甫奉王命總衆以出當有節度故雖行疾亦有威儀也蓋山甫久勞於外乃心無不在王室故永懷輔氏廣曰人不足適政不足間惟大人為能格君心之非山甫內外之事無不綜理而其輕重緩急之序則於心自有定見吉甫知之故告以遄歸焉所以安其心也穆如清風者言感而入之意味深長也朱氏公遷曰車馬既啓行矣無他告焉式遄其歸而已遄其歸則庶有以寬其靡及之心也此二章言山甫如齊而已所以作詩之故張氏所望曰人臣事君事無大小皆不敢以忽心處之固也然山甫一身所係甚重不可一日不在朝廷之上者當時城齊之役未詳其事或者當用大臣董治之亦未可曉然一旦遠行不得朝夕納誨顧瞻君側繫心不忘能無永長之懷乎故山甫之城齊而有懷愛君之心也吉甫作誦以慰山甫亦以諷王也夫漢臣尚有辭淮陽願出入禁闥者山甫豈無是心遄歸之語其旨深矣唐氏汝諤曰一則以山甫之德望而出城齊其事要不足辦一則以王躬是保而使之久出其心猶不自安故作詩以慰其心焉總論陳氏櫟曰篇內諸章多與開端之語相應柔嘉維則之則即有物有則之則儀色之令威儀之力皆所以全物中之則柔不茹剛不吐則剛柔不過其則也民之稟氣受性雖同而氣未必皆秀性未必皆全故德雖易舉而不能舉也山甫鍾其秀氣而全其美德是以獨能舉此德而異於凡民耳許氏謙曰蒸民詩反覆贊詠雖兼職業事功言之大率主於德耳八章之間凡言仲山甫者十有二於以見惓惓尊慕之意然則尹吉甫可謂知德而善言德行者歟首章且言天命之原人心之本則當時吉甫之下仲山甫又最賢歟蒸民八章章八句集説陳氏鵬飛曰嵩高蒸民二詩皆尹吉甫贈行之詩而序詩者皆以為美宣王何也蓋人君委任得人而僚友之間賦詩以相娛樂則人君之美莫大焉林氏之竒曰宣王時北有玁狁南有荆楚東有徐夷故式是南邦以申伯城彼東方以仲山甫奄受北國以韓侯其為謀甚悉也朱子曰看蒸民詩及左傳國語周人説話多有好處也是文武周公立學校教養得許多人所以傳得這些言語如蒸民詩大故細膩郝氏敬曰詩稱山甫才德位望為王保躬補衮之臣不可一日去王所而城齊之役何足以煩之亦異於采芑六月之命使矣詩言衮職有闕式遄其歸寓諷規之意云爾奕奕梁山維禹甸之有倬其道下與考叶韓侯受命王親命之纘戎祖考上與道叶無廢朕命夙夜匪解音懈叶訖力反虔共爾位朕命不易幹古旦反不庭方以佐戎辟音璧集傳賦也奕奕大也梁山韓之鎮也曹氏粹中曰禹貢梁岐在雍州李氏樗曰其後屬晉爾雅梁山晉望也孫炎注曰晉國所望祭則是韓滅之後故以為晉之望也今在同州韓城縣皇輿表今屬西安府隸陜西甸治也蘇氏轍曰禹之治水也九州之鎮山無所不甸雖梁山亦禹之所甸也倬明貌韓國名侯爵武王之後也受命蓋即位除喪以士服入見天子而聽命也班氏固曰世子上受爵命衣士服何謙不敢自專也纘繼戎女也言王錫命之使繼世而為諸侯也虔敬易改幹正也鄭氏康成曰作楨幹而正之不庭方不來庭之國也梁氏益曰左傳鄭莊公以王命討不庭説者曰下之事上皆成禮於庭中不庭言不趨走於庭故討其罪徐氏鳯彩曰幹不庭方韓為北方牧伯釐正外藩此又職業中之尤大者辟君也此又戒之以修其職業之詞也韓侯初立來朝始受王命而歸詩人作此以送之序亦以為尹吉甫作今未有據下篇云召穆公凡伯者放此集説朱子曰將言韓侯故先序其國曰梁山之下有倬然之道此韓侯之所從朝周以受命者也纘戎祖考以下述王親命之詞也輔氏廣曰夙夜匪解勤也虔共爾位敬也為諸侯而能勤與敬若此則能無廢朕命矣幹不庭方以佐戎辟言我既信任於汝則韓侯自可力修其職業有不來庭之諸侯則助王以幹正之也以末章觀之則其所正者亦追貊之國耳蔣氏悌生曰言地利出於前聖之功既加錫命而使之盡繼述之道侯爵出於時王之制又加申戒而使之勤方伯之職蓋王者分封班爵正欲其世守封強以藩屏王室故不惟使嗣君以祖宗之心為心纘承舊緒而無愧於往昔尤欲諸侯以天子之心為心勤修乃職而無負於君也朱氏善曰朕命不易示之以信也幹不庭方以佐戎辟又欲其有以敵王之愾也鄒氏泉曰幹訓正不專言征伐亦示以大分誨以彝倫之意蓋韓之立國所以為遠人計耳正彼不庭之國以風遠人之歸則布德宣威以佐汝辟者在是而職業以修世業以繼矣四牡奕奕孔修且張韓侯入覲以其介圭入覲于王王錫韓侯淑旗綏章簟笰錯衡叶户郎反玄衮赤舄鉤膺鏤音漏錫音羊鞹苦郭反鞃苦𢎞反淺幭莫歷反鞗音條革金厄叶於栗反集傳賦也修長張大也介圭封圭執之為贄以合瑞朱氏公遷曰瑞玉也于王也孔氏穎逹曰毛於嵩高以介圭為所執之瑞則此言介圭亦為瑞也黃氏一正曰介圭乃其先祖為州牧所受者入覲執之修玉輯瑞之制也淑善也鄭氏康成曰善旗旗之善色者也交龍曰旗綏音緌章染鳥羽或旄牛尾為之注於旗竿之首為表章者也孔氏穎逹曰天官夏采注云徐州貢夏翟之羽有虞氏以為綏後世或無染鳥羽象而用之或以旄牛尾為之綴於幢上然則綏者即交龍旗竿所建與旗共一竿為貴賤之表章故云綏章鏤刻金也馬睂上飾曰錫今當盧也孔氏穎逹曰當盧者當馬之額盧在睂眼之上案巾車玉路錫樊纓金路鉤樊纓注云金路無錫有鉤此言鉤膺必金路矣而得有鏤錫者蓋特賜之鞹去毛之革也鞃式中也謂兩較朱氏公遷曰較音角見衛淇奧注之間橫木可憑者以鞹持之使牢固也孔氏穎逹曰以去毛之皮施於軾之中央持車使牢固也淺虎皮也毛氏萇曰虎皮淺毛也幭覆式也字一作幦又作􅍜以有毛之皮覆式上也孔氏穎逹曰幭字禮記作幦周體作􅍜字異而義同玉藻言羔幦鹿幦春官巾車言犬􅍜犴􅍜皆以有毛之皮為幦少儀御車之法云拖諸幦明在軾上故知覆軾也鞗革轡首也曹氏粹中曰以鞗皮為轡其有餘而垂者謂之革也金厄以金為環纏扼轡首也孔氏穎逹曰厄大蟲如指似蠶金厄者以金接轡之端如厄蟲然也集説鄭氏康成曰諸侯秋見天子曰覲韓侯以時覲於宣王故多錫以厚之曹氏粹中曰既覲則王班圭而復之乃以車馬旗服賜焉范氏處義曰不言其人而稱其車馬美之至也韓侯入覲既知尊君親上而無廢禮故王之錫韓侯其儀物亦為甚盛王氏炎曰此章乃言所錫之多以見恩寵之厚也朱氏公遷曰韓為侯爵不當服衮但孔氏疏無衣引周禮巾車注謂王子母弟出封者雖為侯伯而車服皆如上公以九為節也然又為特止於其身後世子孫則各服其服是則不可曉者豈周禮至此已變其舊而然歟姚氏舜牧曰王既親命必有錫也詩人將敘錫豫之隆故追敘韓侯始來之儀度及入覲合信之禮言之韓侯出祖出宿于屠顯父音甫餞之清酒百壺其殽維何炮白交反鱉鮮魚其蔌音速維何維筍恤尹反及蒲其贈維何乘繩證反馬路車籩豆有且子余反侯氏燕胥集傳賦也既覲而反國必祖者尊其所往去則如始行焉屠地名或曰即杜也梁氏益曰杜者杜伯之國也漢之杜陵長安縣有杜伯冢顯父周之卿士也䔩菜殽也孔氏穎逹曰䔩者菜茹之總名對肉殽故云菜殽謂為菹也筍竹萌也蒲蒲蒻音弱也孔氏穎逹曰天官醢人加豆之實有深蒲筍菹且多貌侯氏覲禮諸侯來朝者之稱呂氏祖謙曰覲禮來朝之諸侯皆曰侯氏此則指韓侯也胥相也或曰語辭集説鄭氏康成曰王既使顯父餞之又使送以車馬所以贈厚意也諸侯在京師未去者於顯父餞之時皆來相與燕其籩豆且然榮其多也孔氏穎達曰始行而為祖祭者為尊其往也反則自歸其國而亦作祖祭言其來為尊王歸亦謹愼也祖與所宿不是一處餞訖然後出宿今出宿之文在餞之上者示行不留於是也諸侯反國為王臣所送送者惟卿士耳故知顯父周之卿士也王氏炎曰此章言已覲而返也謝氏枋得曰申伯之行王親餞之韓侯之行王使顯父餞之禮亦有差等也章氏甫曰乘馬路車是於常制之外特有贈行之儀蓋殊典也韓侯取七注反妻汾符云反王之甥蹶俱衛反父音甫之子叶奬里反韓侯迎魚覲反止于蹶之里百兩音亮又如字彭彭叶鋪郎反八鸞鏘鏘不顯其光諸娣大計反從之祁祁巨移反如雲韓侯顧之爛其盈門叶睂貧反集傳賦也此言韓侯既覲而還遂以親迎也何氏楷曰於蹶父所居行親迎之禮蹶父為周卿士意其采邑必在王城外也汾王厲王也厲王流于彘在汾水之上故時人以目王焉猶言莒郊公黎比音毗公也孔氏穎逹曰左傳於昭公之世有莒郊公襄公之世有黎比公莒不為君諡每世皆以地號公嚴氏粲曰解頥新語云晉侯居翼謂之翼侯晉人納諸鄂謂之鄂侯鄭叔段居京謂之京城大叔及出奔謂之共叔其皆汾王之類乎蹶父周之卿士孔氏穎達曰知蹶父卿士者蹶氏父字不書國爵則非諸侯下言靡國不到則是為王聘使之人故知卿士也姞姓也曹氏粹中曰説文曰黃帝之後百䱔姓姞后稷妃家也然則蹶蓋其氏也諸娣諸侯一娶九女二國媵之皆有娣姪也鄭氏康成曰媵者必娣姪從之獨言娣者舉其貴者羅氏中行曰妻之女弟曰娣公羊傳云媵者何諸侯娶一國則二國往媵之以娣姪從姪者何兄之子娣者何弟也劉氏瑾曰嫡妻有娣有姪同姓二國之媵亦有娣有姪則九女也祁祁徐靚也劉氏瑾曰徐言其行動靚言其容飾如雲衆多也集説曹氏粹中曰詩人言人之貴必敘其內外親族如碩人之詩是也呂氏祖謙曰古者任遇方面之臣既盡其禮復恤其私使之內外光顯體安志平然後能展布自竭為王室之屏翰詩人述宣王能錫命韓侯而因道其娶之盛其意蓋在於此而王室尊安人情暇樂亦莫不在其中矣輔氏廣曰此章言韓侯覲禮既畢而遂就王國親迎以歸也韓侯取妻汾王之甥蹶父之子由是推之則蹶父者厲王之壻又周之賢卿士也此言韓姞家世之貴盛也韓侯迎止于蹶之里蹶父時為卿士其里必在京師也此言親迎之得禮也百兩彭彭八鸞鏘鏘不顯其光言韓侯車馬輿衛之光顯也諸娣從之祁祁如雲韓侯顧之爛其盈門言韓姞娣姪之盛儀容之美亦有以當韓侯之心也楊氏愼曰儀禮親迎御輪三周下車曲顧即所謂韓侯顧之也蓋正其始男先於女者禮體之嚴也止而説男下於女者禮用之和也是所謂顧者禮也姚氏舜牧曰方敘韓侯受命天子錫命之事而更端於取妻一節何也凡臣子日用之所享何莫而非君父之所賜而況乎婚娶之禮之大行於承君錫命之後且所娶者汾王之甥蹶父之子恩光寵賁有出於尋常萬萬者此所以詩人並序之以見受命寵光之一至於此也徐氏鳳彩曰迎以百兩從以諸娣皆邦君之禮也韓侯始受命為諸侯故其取妻成其為夫人也蹶父孔武靡國不到為干偽反韓姞其一反相息亮反攸莫如韓樂音洛叶力告反孔樂韓土川澤訏訏況甫反魴鱮甫甫麀鹿噳噳愚甫反有熊有羆有貓苖茅二音有虎慶既令居叶斤御斤於二反韓姞燕譽叶羊茹羊諸二反集傳賦也韓姞蹶父之子韓侯妻也孔氏穎逹曰婦人稱姓今以姓配夫之國謂之韓姞相攸擇可嫁之所也訏訏甫甫大也噳噳衆也貓似虎而淺毛爾雅虎竊毛謂之虦音棧貓郭氏璞曰竊淺也慶喜令善也喜其有此善居也朱氏道行曰由物阜以徴民蕃其居之令可慶矣燕安譽樂也集説孔氏穎達曰蹶父為王卿士人臣不得外交無國不到是為王使也昏禮男先求女而蹶父為女擇夫者禮陽倡陰和固當男行女隨但男女長幼賢愚當量敵取匹女家意相許可然後遣媒故女家亦擇男也曹氏粹中曰此章與碩人卒章意同齊近河韓多山各賦其所有一則美其父母之國一則美其所嫁之國也輔氏廣曰言蹶父武勇健敏其為卿士出使侯國所歷之多而為其子韓姞懌可嫁之所莫如韓國之樂也北地少得川澤而獨韓之川澤訏訏然大水陸所産衆多既喜韓姞有此善居則韓姞之安與樂也可知矣上章言韓侯之迎韓姞有以當其心此章則言韓姞之歸韓國有以適其意男女相稱夫婦咸和則家道正矣謝氏枋得曰韓侯之宜家室皆宣王信任寵祿之恩也詩人之意欲臣子知其所自無忘上恩竭智盡忠以報國也許氏謙曰詩人言國之富樂必道其禽獸魚鱉之盛蓋日用之所須者未嘗言及金玉也是亦性情之正之一端也唐氏汝諤曰雖敘韓姞歸韓之樂亦以見韓封域之美也溥彼韓城燕因肩反師所完以先祖受命因時百蠻王錫韓侯其追其貊母伯反奄受北國因以其伯實墉實壑實畝實籍獻其貔音毗皮赤豹黃羆集傳賦也溥大也燕召公之國也師衆也追貊夷狄之國也墉城壑池籍稅也孔氏穎達曰公羊傳曰什一而籍是籍為稅之義也貔猛獸名孔氏穎逹曰釋獸云貔白狐赤豹毛赤而文黑羆大於熊貔言皮則豹羆亦獻皮也韓初封時召公為司空朱氏公遷曰此召公指康公王命以其衆為築此城朱氏公遷曰言王命者先王命之也如召伯營謝山甫城齊春秋諸侯城邢城楚邱之類也孔氏穎逹曰左傳云邘晉應韓武之穆也是韓侯之先武王之子也以言先祖受命故本之始封之君言初為韓君者受此侯伯之命也朱子曰不知當初何故不教本土人築又須去别處發人來豈不大勞攘古人重勞民如此等事却又不然更不可曉強説便成穿鑿如漢築長安城却去别處調人來如今建州南劒上下築城却去建康府發人來這般却曉不得呂氏祖謙曰春秋之時城邢城楚邱城緣陵城杞之類皆合諸侯為之霸令尚如此則周之盛時命燕城韓固常政也王以韓侯之先孔氏穎達曰韓是武王之子其封當在成王之時其命為侯伯或成或康未知定何時也因是百蠻而長之孔氏穎達曰言因時百蠻者本立侯伯主治州內因主外夷故云因也故錫之追貊使為之伯孔氏穎達曰夏官職方氏正北曰並州言受王畿北面之國當是並州牧也朱氏公遷曰此則指宣王言蓋向者先王以百蠻不可無長因封韓侯之祖為之長今宣王又錫以追貊而使韓侯悉長之則國益以大矣以修其城池治其田畝正其稅法而貢其所有於王也朱氏善曰修城池治田畝正稅法貢土物皆修其職業之謂以終首章之意也集説毛氏萇曰韓侯之先祖武王之子也因時百蠻長是蠻服之百國也奄撫也實墉實壑言髙其城深其壑也追貊之國來貢而侯伯總領之鄭氏康成曰韓侯先祖有功德者受先王之命封為韓侯居韓城為侯伯其州界外接蠻服因見使時節百蠻貢獻之往來後君微弱用失其業今王以韓侯先祖之事如是而韓侯賢故於入覲使復其先祖之舊職賜之蠻服追貊之戎狄令橅柔其所受王畿北面之國因以其先祖侯伯之事盡豫之皆美其為人子孫能興復先祖之功韓之先祖微弱所受之國多滅絶今復舊職興滅國繼絶世故築治是城濬修是壑井牧是田畝收斂是賦稅使如故常輔氏廣曰此章又言王之委重於韓侯而勉以強於自治而修其職貢於王也謝氏枋得曰高城深池可以固圉徹田為糧可以足食宣王為邊方慮亦詳矣總論朱氏公遷曰一章來朝而受天子之命二章既朝而得天子之賜三章祖送而歸四章五章親迎以歸六章則因前人之封建增今日之土宇而使修國中之職貢也韓奕六章章十二句集説程子曰嵩高之詩止於建國親諸侯褒賞申伯韓奕之序止於能錫命諸侯文武盛時大邦畏其力小邦懷其德朝覲會同無敢失時征伐誅討莫不如志爵賞有度錫命有禮夫豈以是為盛哉天子之事固如是也至於厲王王室衰微諸侯肆行賞罰不行於上則褒美申伯為可嘉錫命不行於下則錫命韓侯為可嘉也黃氏震曰宣王封申伯所以懷南方之諸侯也命樊侯城齊所以懷東方之諸侯也錫命韓侯所以懷北方之諸侯也鄒氏忠胤曰韓為望國諸侯之向背係焉而又密邇北國為一方屛藩韓侯來朝猶用繼世稟命之禮王因令之纘舊服受北國為伯其依毗亦隆重哉而馭下之柄可槩見矣江漢浮浮武夫滔滔叶他侯反匪安匪遊淮夷來求既出我車既設我旟匪安匪舒淮夷來鋪集傳賦也浮浮水盛貌鄭氏康成曰江漢之水合而東流浮浮然滔滔順流貌蘇氏轍曰自周而南出於江漢之間召公率兵循江而下也淮夷夷之在淮上者也孔氏穎達曰召公伐淮夷當在淮南魯僖伐淮夷應在淮北淮之南北皆有夷也鋪陳也陳師以伐之也宣王命召穆公平淮南之夷詩人美之此章總序其事言行者皆莫敢安徐而曰吾之來也惟淮夷是求是伐耳蘇氏轍曰言用命也集説鄭氏康成曰宣王命將率遣士衆使循流而下滔滔然其順王命而行非敢斯須自安也非敢斯須遊止也為來求淮夷所處據至其境故言來其曰出戎車建旟又不自安不舒行者為來伐討淮夷也據至戰地故又言來輔氏廣曰首章言師衆之行其志專其氣鋭有不戰戰必勝矣故次章便言其成功嚴氏粲曰持重之師不貪利疾趨疑於遲緩故言非敢安處非敢遊息當時南征北伐四方略定惟淮夷未平故召公從容臨之而有餘也鄒氏泉曰上言順水勢以伐遠下言盛軍容以伐遠只是一事一意而兩敘之以成章耳江漢湯湯書羊反武夫洸洸音光經營四方告成于王四方既平王國庶定叶唐丁反時靡有爭叶災陘反王心載寧集傳賦也洸洸武貌庶幸也彭氏執中曰用兵非人主之美事不得已而興師故召公告成于王曰王國庶定庶云者幸其僅然非以是為美也此章言既伐而成功也集説孔氏穎逹曰上言來至戰地此言經營四方明是既戰而勝乃經營四方之叛國也言告成于王是伐之克勝使傳遽告王也知非召公親告王者以下章方云于疆于理則是召公未還且王國庶定是未見王之辭也故知使人告也曹氏粹中曰宣王厲志恢復始則北伐玁狁次則南征蠻荆至於常武江漢而夷之居淮南北者悉已討定之矣故召虎於是以經營四方之武功告成於王也李氏樗曰王國既定則於是無有戰爭之心而宣王之心亦可以安寧矣觀此則知宣王之心在於安天下其戰爭誠出於不得已亦可以見召伯能奉王之心而能盡其職位也輔氏廣曰四方既平則王國庶可平定所謂柔遠能邇也時靡有爭王心載寧此見宣王能以天下之心為心而召公又能以宣王之心為心也嚴氏粲曰首章言王師之持重二章則言告成蓋淮夷望風而服不待戰也許氏謙曰此詩三言四方皆指淮夷左右而言非天下之四方也朱氏公遷曰淮南者四方之一也一隅有警天下不定故征伐淮夷所以經營四方也既告成功則王國可定而王心可寧矣宜其急於告成也江漢之滸音虎王命召虎式辟音闢四方徹我疆土匪疚匪棘王國來極于疆于理至于南海叶虎委反集傳賦也虎召穆公名也辟與闢同徹井其田也疚病棘急也極中之表也居中而為四方所取正也郝氏敬曰來極猶之歸極則壤視中國也言江漢既平王又命召公陳氏鵬飛曰非謂宣王臨江漢之地而命之也朱子曰再言江漢之滸者繫上事起下事也闢四方之侵地而治其疆界薛氏應旗曰江漢平則侵地復故開闢之然為其所侵則疆界亂矣故使之徹以治之非以病之非以急之也但使其來取正於王國而已於是遂疆理之盡南海而止也集説嚴氏粲曰三章述平賦也古人伐叛討二之後則必去其苛政平其賦斂以慰民心故此章言徹法之事召虎既成功於江漢之滸王命由此地以開闢四方而施徹法於疆土武事僅定而即行疆理賦稅之法疑於病民且疑於急迫矣宣王謂我非疚也非棘也蓋什一天下之中正乃我周之定制欲天下皆於王國來取中焉耳宜往而疆之以正其疆界往而理之以分其土宜推而至于南海之遠淮夷在南故曰至于南海朱氏善曰封建井田皆先王之良法也故江漢既平宣王即命闢四方之侵地將以復封建之舊也徹四方之疆土將以復井田之舊也復封建之舊所以息四方之爭而固小國之利也復井田之舊所以戢四國之暴而固小民之利也於是疆之理之盡南海而止則雖濱海之國無不復乎舊封也濱海之民無不安於什一也此所以為中興之盛也王命召虎來旬來宣文武受命召公維翰叶胡千反無曰豫小子叶奬里反召公是似叶養里反肇敏戎公用錫爾祉集傳賦也旬遍宣布也自江漢之滸言之故曰來召公召康公奭也翰幹也豫小子王自稱也肇開戎女公功也又言王命召虎來此江漢之滸遍治其事以布王命而曰昔文武受命惟召公為楨幹鄭氏康成曰為虎之勤勞故述其祖之功以勸之今女無曰以豫小子之故也但自為嗣女召公之事耳能開敏女功輔氏廣曰肇謂自爾開之敏則自能有功也則我當錫女以祉福如下章所云也集説孔氏穎達曰上章云經營四方告成于王又言于疆于理至于南海今王命召虎稱其功勞則來旬來宣當指此二事來旬謂勤勞於經營四方來宣謂勤勞於遍理衆國也李氏樗曰人君之命臣多言祖考之事以戒之宣王命韓侯既告之纘戎祖考今命召公亦以祖考訓之蓋欲世其家也劉氏瑾曰此章追述王命召虎之詞以終上章所言經營疆理之意而起下章所序賞賜之事朱氏公遷曰康公宣布政教在江漢之間今召虎征淮南繼乃祖之業耳故勉之使視王事如家事既陳忠孝之道以勸勉之復明報施之道以歆動之朱氏善曰昔先王受命有如召公日辟國百里則召公者實文武之楨幹也我之命虎以來旬來宣也豈惟一人之為亦惟先人之功業是繼果能以繼先人之業為心則淮夷之未服豈惟虎之責抑亦虎之恥也汝能開敏汝功則我固當錫汝以祉福矣勉之以先人之業期之以後日之報宣王真得待世臣之體也哉釐力之反爾圭瓚才旱反秬音巨鬯初亮反一卣音由無韻未詳告于文人錫山土田叶地因反于周受命叶滿並反下同自召祖命虎拜稽首天子萬年叶禰因反集傳賦也釐賜卣尊也爾雅釋器卣中尊也孫氏炎曰尊彝為上罍為下卣居中孔氏穎達曰春官鬱人掌和鬱鬯以實彝而陳之則鬯當在彝而此及尚書左傳皆云秬鬯一卣者當祭之時乃在彝未祭則在卣賜時未祭故卣盛之文人先祖之有文德者謂文王也嚴氏粲曰下云於岐周告先王之廟知文人為文王也周岐周也召祖穆公之祖康公也此序王賜召公策命之詞言錫爾圭瓚秬鬯者使之以祀其先祖又告于文人而錫之山川土田毛氏萇曰諸侯有大功德賜之名山土田附庸孔氏穎達曰禮名山大川不以封諸侯有大功德乃得賜之以廣其封邑孔氏穎達曰召本岐山之陽采地之名且為畿內之國書傳無召穆出封之文則益之土田大於故耳未成為大國也蓋古者爵人必於祖廟示不敢專也又使往受命於岐周從其祖康公受命於文王之所以寵異之而召公拜稽首以受王命之策書也人臣受恩無可以報謝者但言使君壽考而已集説孔氏穎逹曰宣王欲尊顯召虎故如岐周以虎祖康公在岐周事文武有功而受采地今虎嗣其業功與之等故往岐周命之明其復祖之業所以尊顯之也還用其祖召康公受封之禮明虎之功與康公同也岐是周之所起有先王之别廟在焉故就之也謝氏枋得曰錫山川土田必使召虎受賜於岐周用文武封康公之禮以待之此時此意賞非宣王之賞如稟命於乃祖文武也功非召虎之功如受教於乃祖康公也召虎思文武之德思康公之德必能盡心盡力以報宣王之德矣三代令王不責臣子以事功惟勉臣子以忠孝本於人心天理而感動之也盤庚亦得此意朱氏公遷曰前以康公之佐文武者勉其功此以文武之命康公者行其賞以上三章皆述策命之詞此又以祝頌之語結之也朱氏道行曰山川土田受之先王傳之後世豈得輕假故必告之文人俾從召祖受命周廟示不敢私以重典也虎拜稽首對揚王休叶虛久反作召公考叶去久反天子萬壽叶殖酉反明明天子叶奬里反令聞音問不已矢其文德洽此四國叶越逼反集傳賦也對答揚稱休美考成矢陳也言穆公既受賜遂答稱天子之美命作康公之廟器而勒王策命之詞以考其成胡氏一桂曰曰作召公考者蓋不自有其功歸美於乃祖康公之意耳朱氏謀㙔曰古者論撰其先祖之有德善功烈勳勞慶賞聲名列於天下而酌之祭器自成其名以祀其先祖是之謂考且祝天子以萬壽也劉氏瑾曰上章虎拜稽首天子萬年者述穆公受册書而祝謝其君之詞也此復言虎拜稽首天子萬壽者述穆公銘祖廟器而祝君之詞也古器物銘云􅌏音辨拜稽首敢對揚天子休命用作朕皇考龔音恭伯尊敦音對􅌏其睂壽萬年無疆朱氏公遷曰􅌏周大夫名龔伯者其父也尊酒器敦盛黍稷器也語正相類但彼自祝其壽而此祝君壽耳既又美其君之令聞而進之以不已勸其君以文德而不欲其極意於武功古人愛君之心於此可見矣朱氏善曰淮夷之服王則有令聞矣然猶願其令聞之不已焉四方之平王則有武功矣然猶願其文德之洽焉若召穆公可謂愛君之至矣集説曹氏粹中曰宣王以康公之事命召虎虎即以康公之事成之使宣王永有令聞而文德普洽是所謂以康公之事成之者也李氏樗曰宣王之命召虎乃曰來旬來宣是不以武功為事矣召公告宣王曰矢其文德洽此四國其臣不以黷武為事矣君臣相勉如此其視皋陶之賡歌不相遠矣嚴氏粲曰六章申報上之意而納君於德也宣王方以武功褒虎而虎乃以文德勉宣王蓋不矜己之功而納君於德意度遠矣黃氏佐曰首三句詩人但作己意以述其事下五句則述其勒銘之詞蓋於勒銘之後並勒此數句以致其報國祝願之詞耳總論黃氏櫄曰江漢一詩乃召公還師奏凱之日論功行封之時所作也初則整師而往非為邀功特以淮夷作患不能自安耳次則淮夷之患除而其功成次則安民之政舉而其功廣次則即功而論賞次則論定而賞行次則人臣報塞之義也假氏昌武曰林賢良事要曰古者畿兵不出所以重內卒有四方之役即用諸侯人耳或遣上公帥王賦亦不過元戎十乘以先啓行而已而調兵諸侯又各從其方之便高宗伐楚蓋裒荆旅武王伐商實用西土至於征徐以魯平淮夷以江漢略見於經可考也江漢六章章八句集説陳氏鵬飛曰淮夷之地不一徐州在淮北揚州在淮南江漢常武二篇同言淮夷以地理考之曰江漢之滸王命召虎者是淮南之夷也若在淮北則江漢非所由入之路矣曰率彼淮浦省此徐土者是淮北之夷也若在淮南則徐土非聮接之地矣嚴氏粲曰周興西北岐豐去江漢最遠故淮夷難服從化則後倡亂則先周人經理淮夷用力最多成王初年淮夷同三監以叛其後又同奄國以叛伯禽就封又同徐戎以叛宣王一命吉甫北方旋定繼命方叔伐蠻荆後命召公平淮南之夷又命皇父平淮北之夷蓋南方之役至再至三淮夷未定則一方倡亂天下皆危故至淮夷平然後四方定此江漢常武所以為宣王之終事而繫之於宣王大雅之末也赫赫明明王命卿士叶音所南仲大音泰下同祖大師皇父音甫整我六師以修我戎叶音汝既敬既戒叶訖力反惠此南國叶越逼反集傳賦也卿士即皇父之官也孔氏穎逹曰十月之交皇父與此皇父得為一人或皇氏父字傳世稱之亦未可知也南仲見出車篇大祖始祖也大師皇父之兼官也陳氏鵬飛曰自冢宰而下謂之六卿大師而下謂之三公既曰王命卿士又曰大師皇父周家不特設三公皆兼職而已如周公以冢宰兼大師也我為宣王之自我也戎兵器也宣王自將以伐淮北之夷而命卿士之謂南仲為大祖兼大師而字皇父者整治其從行之六軍修其戎事以除淮夷之亂而惠此南方之國孔氏穎逹曰王肅述毛以為王不親行王基述鄭為王自親行王既親行仍須命元帥以統領六軍也詩人作此以美之必言南仲大祖者稱其世功以美大之也輔氏廣曰稱其世功以美大之者見當時之重世臣也集説孔氏穎達曰師嚴器備當恭敬臨之又當戒懼而處之施仁愛之心於此南方淮浦之旁國勿得暴掠為民之害也輔氏廣曰既敬既戒臨事而懼也敬戒乃用兵第一義能如是則成功可必而南國可惠矣南方之國則淮南諸國也蓋徐州之夷南侵諸國為之不安故其言如此謝氏枋得曰宣王命將多取之世臣何也文事武備素講於家庭定亂持危常在其念慮一日用之必老成持重不以輕易誤國事矣胡氏一桂曰既敬則不敢輕肆既戒則不敢妄殺此其所以為王者之師嚴重詳審而為南國之惠也朱氏善曰赫赫言其聲勢之盛明明言其威靈之顯是時天子親征故親命皇父以整六師以修我戎軍事以敬戒為主敬則無一念之或怠戒則無一事之敢忽即南仲所謂憂心悄悄也爾祖南仲既以敬戒而服玁狁於前矣爾其可不以敬戒而惠此南國於後乎王謂尹氏命程伯休父左右陳行户即反戒我師旅率彼淮浦省比徐土不留不處三事就緒象呂反集傳賦也尹氏吉甫也蓋為內史掌䇿命即大夫也程伯休父周大夫孔氏穎逹曰程國之伯字休父楚語云重黎氏世敘天地其在周程伯休父其後也當宣王時失其官守而為司馬氏濮氏一之曰程畿內邑在豐三事未詳或曰三農之事也鄭氏康成曰三農之事皆就其業孔氏穎達曰大宰九職一曰三農生九穀注云三農原隰及平地言王詔尹氏䇿命程伯休父為司馬使之左右陳其行列鄭氏康成曰軍禮司馬掌其誓戒循淮浦而省徐州之土蓋伐淮北徐州之夷也陳氏鵬飛曰淮夷即徐州之夷而服屬於徐曰徐方者兼徐淮而言之曰徐國者特言徐戎也上章既命皇父而此章又命程伯休父者蓋王親命大師以三公治其軍事而使內史命司馬以六卿副之耳集説曹氏粹中曰此詩所敘先伐淮夷次征徐國蓋先其小而易者後其大而難者用兵之法當然也師之所處荆棘生焉故必不留不處然後三農得以就緒輔氏廣曰天子親命大師以三公出將又使內史命司馬以六卿副之皆所以重其事命大將則曰整我六師以修我戎既敬既戒惠此南國命其副則曰左右陳行戒我師旅率彼淮浦省此徐土不留不處三事就緒者宜也大將則總其綱副將則詳其目也兵以速為上久則毒民而傷財黃氏佐曰江漢是揚州之夷故順江漢而下此章是伐淮北之夷故順淮浦而下張氏榜曰上既敬既戒見不慢敵此不留不處見不病民皆行師之要也徐氏常吉曰左右陳行使行列整齊也戒我師旅使進退有方也省此徐土察其為亂者而伐之也徐氏鳳彩曰甫定淮南而旋事疆理方省淮北而軫念三農民無失業則暴亂不足平矣赫赫業業叶宜却反有嚴天子王舒保作匪紹匪遊徐方繹騷叶蘇侯反震驚徐方如雷如霆徐方震驚集傳賦也赫赫顯也業業大也嚴威也天子自將其威可畏也王舒保作未詳其義或曰舒徐保安作行也言王師舒徐而安行也曹氏粹中曰雖以天子之威靈如此亦安徐詳諦而後動紹糾緊也遊遨遊也繹連絡也騷擾動也夷厲以來周室衰弱至是而天子自將以征不庭其師始出不疾不徐而徐方之人皆已震動如雷霆作於其上不遑安矣集説王氏安石曰江漢曰匪安匪舒此曰王舒保作蓋江漢武夫之事此則王者之事也此章但言徐方則知宣王之兵及淮而未及徐方而徐方已震驚也此以見先聲也次則言征淮言征徐末章則言徐方之服其次序皆可考也嚴氏粲曰言王師之行赫赫然威嚴業業然震動者是尊嚴之天子也王乃舒徐而安行依於軍法日行三十里進兵不急人自畏威徐方之人皆絡繹騷動矣奮楊威武以震動驚懼於徐方如雷之發聲如霆之迅擊而徐方之人莫不震動而驚懼矣必震驚之者使懼而服也朱氏善曰用兵之法攻心為上徐方繹騷徐方震驚雖未即順從而已先服其心矣王奮厥武如震如怒叶暖五反進厥虎臣闞呼檻反如虓火交反虎鋪普吳反敦淮濆符云反仍執醜虜截彼淮浦王師之所集傳賦也進鼓而進之也闞奮怒之貌虓虎之自怒也陸氏佃曰言將帥之勇發於忠毅非激而怒之也鋪布也布其師旅也敦厚也厚集其陳也仍就也老子曰攘臂而仍之朱氏公遷曰出論德篇截截然不可犯之貌朱氏公遷曰截然以兵勢言謂王師所在其威可畏也集説輔氏廣曰此章言或有不服者君臣各奮其怒厚集其陳而執之王師在淮浦之上有截然不可犯之勢也臨戎不可以不怒不怒則無以作氣也黃氏佐曰上章言在道是先聲此章言至徐是後實先加以聲後致其實行師之法也王旅嘽嘽吐丹反如飛如翰如江如漢如山之苞叶鋪鈎反如川之流綿綿翼翼不測不克濯征徐國叶越逼反集傳賦也嘽嘽衆盛貌翰羽苞本也如飛如翰疾也如江如漢衆也薛氏應旗曰言起六師之衆如江漢之渺漫一望無際也如山不可動也如川不可禦也孔氏穎逹曰兵法有動有靜靜則不可驚動故以山喻動則不可禦止故以川喻綿綿不可絶也翼翼不可亂也輔氏廣曰不可絶言其續不可亂言其整不測不可知也不克不可勝也徐氏鳳彩曰謀祕而不可知鋒鋭而不可勝濯大也集説孔氏穎逹曰既克定淮浦之國又進而伐徐言王之師旅雖經淮夷其師之盛間暇而有餘力以此嚴威武力將大往而征此徐國言其盛不可當往必克敵也朱氏公遷曰師徒衆盛而律又嚴所以奮揚威武而大伐之也此用兵之時也淮南易伐淮北難平故彼以召虎將兵來求來鋪而遂克之此必天子親征又大用其師如此然後能取勝也王猶允塞徐方既來叶六直反徐方既同天子之功四方既平徐方來庭徐方不回王曰還歸叶古回反集傳賦也猶道允信塞實庭朝孔氏穎逹曰既降服後朝京師而至王庭回違也嚴氏粲曰不回謂既服而不復叛也還歸班師而歸也梁氏益曰禹謨班師振旅班還也前篇召公帥師以出歸告成功故備載其褒賞之詞此篇王實親行故於卒章反復其詞以歸功於天子言王道甚大而遠方懷之非獨兵威然也序所謂因以為戒者是也集説孔氏穎逹曰王之謀慮信而誠實用兵有常伐得其罪故兵未陳而徐方已自來告服其罪因此歸功於王徐方來與他國同服於王者是天子之功使之然也又四方既已平定徐方又來在王庭便是天下宴安不須用武徐方先嘗叛者已不敢違命則無復有事王乃告之曰可以還歸矣是武事既立故述而美之劉氏敞曰凡兵出則戒於詐故曰王猶允塞乃能來也武成則戒於黷故王曰還歸者止於義也曹氏粹中曰宣王以誠實之道不用詭謀詐計徐方服而來歸而無二心徐方來同則由宣王推赤心置其腹中故也輔氏廣曰言由王道之信大故徐夷自然來服非獨兵威使然也甫得其不相違悖王則振旅而歸無求多之意既盡歸美之義而又寓規戒之忠焉朱氏善曰首章言敬戒卒章言允塞敬戒以見軍律之嚴允塞以見王道之大服而來來而同終而曰不回則王道之大信有以服其心矣於是班師振旅而歸其即輯干戈而櫜弓矢求懿德而肆時夏之時乎故因以戒其武功之不可黷也黃氏佐曰王猶凡平日所以施於中外者皆是詩人恐王全以為兵威之功故曰由於王道之大而不獨以兵威蓋欲王勉於王道而不狃於武功故曰以為戒亦猶前篇矢其文德之意總論許氏謙曰一章命皇父主兵二章命休父為副三章言天子自將四章言戰伐五章言軍勢之盛卒章歸美於王錢氏天錫曰此詩作於成功後專美天子自將故曰王命曰王武曰王旅曰王猶以明王道之服遠原不在於兵威無非歸功天子而已常武六章章八句集説孔氏穎逹曰經無常武之字美其有常德以立此武功征伐之事故名為常武李氏樗曰常者有常德也武者立武事也常德者本也立武者末也能盡其本則其心在於愛民有愛民之心則見於征伐無非愛民也朱氏公遷曰中興之功非威武不能致宣王所以中興者此詩可見矣殷武之頌髙宗亦然瞻卬音仰昊天則不我惠孔填舊説古塵字不寧降此大厲邦靡有定士民其瘵側界反叶側例反蟊音牟賊蟊疾靡有夷屆音戒叶居氣反罪罟不收靡有夷瘳敕留反集傳賦也填久厲亂瘵病也蟊賊害苗之蟲也疾害夷平屆極罟網也此刺幽王嬖褒姒任奄人許氏謙曰周禮酒人注內門則用奄以守之以致亂之詩首言昊天不惠而降亂無所歸咎之詞也蘇氏曰國有所定則民受其福無所定則受其病於是有小人為之蟊賊刑罪為之網古鄭氏康成曰如蟊賊之害禾稼無止息時施刑罪以羅網天下而不收斂亦無止息時凡此皆民之所以病也集説輔氏廣曰瞻卬昊天則天不我惠顧也固已甚病而不寧矣又降此大亂使國家之勢隉杌不安而士與民皆病也小人而為之蟊賊者無有平夷屆止之期刑罪而為之網罟者無有平夷瘳愈之望則士民之病未已也季氏本曰君心定則國定國定則民受福而昊天為能惠矣何氏楷曰蟊賊比當時用事者如師尹皇父虢石父輩是也人有土田女音汝反有酉由二音之人有民人女覆奪徒活反之此宜無罪女反收殖酉殖由二反之彼宜有罪女覆説音脫之集傳賦也反覆劉氏濟曰女反有之奪之言王削黜諸侯及卿大夫無罪者收拘説赦也謝氏枋得曰宜無罪者反拘之宜有罪者反赦之亂世之君刑罰不中皆此類也集説廖氏剛曰先王分人以土田民人所以崇德報功也必其有顯罪然後可以奪而有之今則土田人所宜有也無故而反有之民人人所能治也無故而覆奪之此宜無罪而反收之則人懷不免之虞將無所措手足矣彼宜有罪而覆説之則惡者無所懼姦宄熾而禍亂滋矣輔氏廣曰上四句承上章蟊賊之言而述其侵牟奪取於人者反覆無常也下四句則承上章罪罟之言而述其拘繫縱釋於人者反覆不當也何氏楷曰土田人民乃諸侯卿大夫所有無罪有罪則兼括士民而言彼淫刑以逞惟賄是求其待諸侯卿大夫已如此矣又何有於士民乎宜其刑宥之顚倒也哲夫成城哲婦傾城懿厥哲婦為梟古堯反為鴟處之反婦有長舌維厲之階叶居奚反亂匪降自天叶鐵因反生自婦人匪教匪誨叶呼位反時維婦寺集傳賦也哲知也城猶國也哲婦蓋指褒姒也傾覆懿美也梟鴟惡聲之鳥也長舌能多言者也孔氏穎逹曰以舌動而為言故謂多言為長舌論語云駟不及舌亦謂言為舌也階梯也寺奄人也言男子正位乎外為國家之主故有知則能立國婦人以無非無儀為善無所事哲哲則適以覆國而已故此懿美之哲婦而反為梟鴟蓋以其多言而能為禍亂之梯也若是則亂豈真自天降如首章之説哉特由此婦人而已蓋其言雖多而非有教誨之益者是惟婦人與奄人耳豈可近哉王氏安石曰幽王如上所刺則荒昏故也其荒昏則婦言是用故也上文但言婦人之禍末句兼以奄人為言蓋二者常相倚而為姦不可不並以為戒也歐陽公嘗言宦者之禍甚於女寵其言尤為深切有國家者可不戒哉歐陽氏修曰女色而已宦者之禍非一端也女色之惑不幸而不悟則禍斯及矣使其一悟猝而去之可也宦者之為禍雖欲悔悟而勢有不得而去也唐昭宗之事是矣集説王氏質曰此推言蟊賊罪罟所由起自婦人寺人也輔氏廣曰此則始言其致亂之由哲夫成城哲婦傾城便判得男女之德不同婦人而有男子之德未必不為禍也懿厥哲婦指褒姒非不美也非不哲也而為梟為鴟非不能言也而適為亂階厲字便應首章厲字説故下文便説亂匪降自天生自婦人也匪教匪誨時維婦寺者又所以結上文長舌之言他人之多言則有教誨於人之益若婦寺之多言則非誣譖夫人則戕敗於己而已豈可近也先生發明婦寺相倚而為姦之意而並取歐陽公之説以為戒其意切矣朱氏善曰哲夫成城言其智謀之可以立國也哲婦傾城則其智辨徒足以亡人之國而已然言之多而非有教誨之益者又非特婦人而已也雖奄寺亦然蓋有嬖妾以蠱惑於內必有奄寺以煽亂於外其可以莫之察乎徐氏光啓曰正人君子之言足以為我教誨若婦寺之言則敏對以成姦飾巧以亂實為譖為訴而已何教誨之有此詩人微婉之詞也鞫人忮之䜴反忒譖子念反始竟背音佩叶必墨反豈曰不極伊胡為慝如賈音古三倍君子是識婦無公事休其蠶織集傳賦也鞫窮胡氏一桂曰鞫如鞫獄之鞫推勘窮究之意忮害忒變也譖不信也竟終背反胡氏一桂曰背如反道背德之背極已慝惡也賈居貨者也三倍獲利之多也公事朝廷之事蠶織婦人之業言婦寺能以其智辨窮人之言其心忮害而變詐無常既以譖妄倡始於前而終或不驗於後則亦不復自謂其言之放恣無所極已而反曰是何足為慝乎孔氏穎逹曰佞人似智姦人亂德皆自以為善夫商賈之利非君子之所宜識如朝廷之事非婦人之所宜與也今賈三倍而君子識其所以然婦人無朝廷之事而舍其蠶織以圖之則豈不為慝哉集説鄭氏康成曰賈物而有三倍之利者小人所宜知也君子反知之非其宜也今婦人休其蠶桑織絍之職而與朝廷之事其為非宜亦猶是也輔氏廣曰知則哲也辨則長舌也此亦承上章而言婦人而有知辨者之為害也以其知辨窮人之言用心忮害而變詐讒訴不知自咎責而但曰不為害此説盡婦寺之情狀胡氏一桂曰譬如君子當求仁義賈利三倍不當君子是識婦人當事蠶織朝廷公事不當婦人是預今也不惟使之預於公事又且聽其譖毁惟婦言是用其欲不速亡得乎朱氏公遷曰君子喻利則害於義婦人謀政則害於治天何以刺叶音砌何神不富叶方味反舍音捨爾介狄維豫胥忌不弔不祥威儀不類人之云亡邦國殄瘁集傳賦也刺責介大胥相弔閔也言天何用責王神何用不富王哉毛氏萇曰富福也朱氏公遷曰用以也天何為而以禍亂責王乎神何為而不以盛大之業富王乎若問詞也凡以王信用婦人之故也是必將有夷狄之大患今王舍之不忌而反以我之正言不諱為忌何哉夫天之降不祥庶幾王懼而自修今王遇災而不恤又不謹其威儀又無善人以輔之則國之殄瘁宜矣或曰介狄即指婦寺猶所謂女戎者也晉語史蘇曰有男戎必有女戎注戎兵也女兵言其禍猶兵也集説范氏處義曰謹其威儀如側身修行無敢戲豫是也王氏質曰天何以災異而責王神何以不富盛而厚王則天神之意可知夷狄不問而惟我相忌怨之辭也災則不弔不畏天者也威儀則不善不愧人者也有賢人相助猶或庶幾又云亡則必殄瘁矣亦怨之辭也謝氏枋得曰君有君之威儀臣有臣之威儀今幽王自亂於威儀不類乎人君之威儀矣又曰國有賢人如一身之有元氣元氣亡則身必喪賢人亡則國必危殄如脈絶瘁如病危朱氏公遷曰上二章言婦寺不可聽任此章極言聽任婦人之言以重結蟊賊蟊疾之意天之降罔維其優矣人之云亡心之憂矣天之降罔維其幾矣人之云亡心之悲矣集傳賦也罔罟優多幾近也鄭氏康成曰言災異譴告離人身近蓋承上章之意而重言之以警王也集説呂氏祖謙曰前章曰不弔不祥威儀不類故此曰維其優矣維其幾矣前章曰人之云亡邦國殄瘁故此曰心之憂矣心之悲矣季氏本曰罔即上章所謂罪罟也罔優則投之者多罔幾則入之者近人之云亡蓋以此也觱音必沸音弗檻胡覽反泉維其深矣心之憂矣寧自今矣不自我先不自我後叶下五反藐藐昊天無不克鞏叶音古無忝皇祖式救爾後同上集傳興也觱沸泉涌貌檻泉泉正出者藐藐高逺貌鞏固也孔氏穎逹曰謂能固其王位也言泉之瀵甫問反涌上出其源深矣我心之憂亦非適今日然也朱氏公遷曰此為事物有所從來之意蓋以源泉之深興憂心之久也然而禍亂之極適當此時蓋已無可為者惟天高遠雖若無意於物然其功用神明不測雖危亂之極亦無不能鞏固之者幽王苟能改過自新而不忝其祖則天意可回來者猶必可救而子孫亦蒙其福矣集説范氏處義曰昊天雖藐藐高遠然未嘗不仁愛尚人君無有不能鞏固我國之理王誠率德改行可用以救後來也傷其大壞尚欲救之此詩人所以為忠厚歟呂氏祖謙曰克能也幽王之國勢自人觀之則不可扶持天則無不能鞏固也雖然所謂天者亦豈可外求哉王氏質曰泉久則愈深心久則愈憂此時不在我先不在我後適然當此豈非天乎傷之辭也苟能不忝於祖尚可救其後所謂往者不可諫來者猶可追此又愛之辭也何氏楷曰鞏固之道惟在法祖而已去讒遠色賤貨貴德此文武之道王當倣而行之逬羣蟊親善類毋自忝於皇祖也救者維挽之謂對往日言為後幽王果能猛圖補救當自今日始矣總論姚氏舜牧曰幽王之大壞在維婦寺之聽若設罔罟以待天下而君子遠遁國事終不可為者故首云罪罟不收後云天之降罔錢氏天錫曰詩中雖並言婦寺當以嬖褒姒為主蓋女謁盛故寺人親婦寺近則正人疏此定勢也故詩人憂人之云亡亦欲其用正人以承克鞏之天而已瞻卬七章三章章十句四章章八句集説廖氏剛曰蕩之詩言傷周室大壞瞻卬召旻言刺幽王大壞者蕩主言天下無綱紀文章故稱周室而傷之瞻卬召旻主言蟊賊其民故主幽王而刺之黃氏佐曰案鄭語云幽王九年王室始騷此詩蓋九年以後所作也亂已至此猶欲遷善改過以圖福是則詩人之忠厚也鄧氏元錫曰瞻卬曰無忝皇祖式救爾後召旻曰維今之人不尚有舊變雅終而汲汲乎天人治亂之思是救之之道也旻天疾威天篤降喪息浪反叶桑郎反癲都田反我飢饉民卒流亡我居圉魚呂反卒荒集傳賦也篤厚癲病卒盡也居國中也圉邊陲也何氏楷曰拒守在外故為邊垂左傳聊以固吾圉是也此刺幽王任用小人以致飢饉侵削之詩也集説范氏處義曰謂天曰旻本望其閔下今乃厚降喪亂病我以飢饉使人民卒皆流移內而國中外而四境卒皆荒蕪空虛豈非疾用其威虐乎所謂閔下者安在哉輔氏廣曰言天之威怒甚為急疾故其所降之喪亂甚厚病我以飢饉使斯民盡以流亡內而國中外而邊境悉皆荒虛也此與瞻卬首章同皆極言其喪亂也劉氏瑾曰此詩刺王而首言旻天疾威又言天篤降喪下章又言天降罪罟者固為無所歸咎之詞矣而首章則言飢饉之災卒章則言侵削之事餘章則皆言用小人之事也天降罪罟蟊賊內訌户工反昏椓丁角反靡共音恭潰潰回遹實靖夷我邦叶卜工反集傳賦也訌潰也孔氏穎逹曰以訌字從言是爭訟相陷故致潰敗胡氏一桂曰小人之害在內蟊賊之害稼亦在內故曰內訌昏椓昏亂椓喪之人也共與恭同蘇氏轍曰昏椓羣小不恭之人一説與供同謂共其職也孔氏穎逹曰王所親任之小人無供其職事者潰潰亂也回遹邪僻也靖治夷平也言此蟊賊昏椓者皆潰亂邪僻之人而王乃使之治平我邦所以致亂也集説王氏安石曰言所使靖夷我邦者非其人也靖與俾豫靖之同意夷與亂生不夷同意廖氏剛曰治民者必得明哲之師慈惠之長與夫肅乂正直之人然後民以安而國平今皆反此則非特不足以靖夷我邦也小大內外昏而不明椓而肆虐靡共而慢侮潰潰而泯亂回遹而邪曲是能相率以為亂而已幽王何恃而不大壞耶輔氏廣曰此章言致亂之由蟊賊之人內潰其心腹昏椓之人靡共其職業但相與為潰亂邪僻之行而王乃使之治平我之邦國則豈不至於危亂乎皋皋訿訿音紫曾不知其玷丁險反兢兢業業孔填已見上篇不寧我位孔貶集傳賦也皋皋頑慢之意毛氏萇曰皋皋頑不知道也爾雅疏舍人曰皋皋不治之貌訿訿務為謗毁也蘇氏轍曰訿訿多讒謗也玷缺也填久也言小人在位所為如此而王不知其缺至於戒敬恐懼甚久而不寧者其位乃更見貶黜其顚倒錯亂之甚如此集説輔氏廣曰此又言王之舉錯顚倒錯謬用者不賢而賢者不用夫小人之不可用亦明矣而臨亂之君所以必用夫小人者蓋以其心實不知其惡耳然亦皋皋訿訿者善於毁人以自蓋故也立亂人之朝而獨戒敬恐懼甚久而不寧則豈容獨立哉終必為人所擠排也朱氏公遷曰此章言其舉枉錯直亦推言致亂之由也何氏楷曰兢兢業業形容憂時供職之心即末章召公之流所謂不尚有舊者也我代為兢業者自我也位所居之職位也勞於趨事而不遑安寧如我者反不能安其位而遭貶黜其顚倒錯亂如此十月之交篇云黽勉從事不敢告勞無罪無辜讒口囂囂正謂此也如彼歲旱草不潰集注作遂茂如彼棲音西苴七如反我相息亮反此邦無不潰止叶韻未詳集傳賦也潰遂也孔氏穎達曰草之生當遂其生長之性故以潰為遂嚴氏粲曰谷風有洸有潰潰怒也小旻是用不潰于成召旻草不潰茂潰遂也潰潰回遹無不潰止潰亂也項氏云水之潰者其勢橫暴而四出故怒之甚者為潰怒遂之甚者為潰遂亂之甚者為潰亂皆一理也棲苴水中浮草棲於木上者言枯稿無潤澤也相視潰亂也集説孔氏穎逹曰王無恩於民致使下民如彼歲之大旱其草不得申遂而盛茂也王氏安石曰民蕩析離散無復生理故如彼棲草也廖氏剛曰民惟邦本本固邦寧今民用蕩析流散無復生理則邦其有不潰者乎春秋傳曰國亂曰潰此序所謂大壤也朱氏善曰歲之旱則草之生於谷中者且不能以遂長况其棲於木上者安得而不枯稿乎國之亂則民優於財用者且不能以自給况其窮而無告者安得而不流亡乎是以我相此邦無不潰亂者也維昔之富不如時維今之疚不如兹彼疏斯稗薄賣反胡不自替職兄音況下同斯引叶韻未詳集傳賦也時是疚病也疏糲音辣也稗則精矣朱子曰九章粟米之法糲十稗九鑿八侍御七糲米一斛治而成稗則九斗矣替廢也兄恍同引長也言昔之富未嘗若是之疚也而今之疚又未有若此之甚也楊氏愼曰昔時之富言君子之得志也今兹之疚言君子之失志也彼小人之與君子如疏與稗其分審矣而曷不自替以避君子乎而使我心專為此故至於愴恍引長而不能自已也輔氏廣曰愴恍謂憂亂而無情緒之意集説蘇氏轍曰疏粗也稗精也君子與小人精粗之不同可指而知也小人曷不自替以避君子而乃自任以長此亂也季氏本曰糲疏稗精各有其分宜疏而精猶以小人而乘君子之器也池之竭矣不云自頻泉之竭矣不云自中叶諸仍反溥斯害矣職兄斯𢎞不災我躬叶姑𢎞反集傳賦也輔氏廣曰有問此章集傳作賦體竊疑是比體未知如何先生曰作比為是頻崖溥廣𢎞大也池水之鍾也泉水之發也故池之竭由外之不入泉之竭由內之不出言禍亂有所從起而今不云然也此其為害亦已廣矣是使我心專為此故至於愴恍日益𢎞大而憂之王氏志長曰上章職兄斯引言其憂之長此章職兄斯𢎞言其憂之大曰是豈不災及我躬也乎集説范氏處義曰頻水涯也中水源也池之所以竭者由其涯之疏漏也泉之所以竭者由其源之他泄也今池竭而不言自頻泉竭而不言自中是不知弊端之所由失其救弊之道終於竭而已矣昔先王受命有如召公日辟音闢國百里今也日蹙子六反國百里於音烏乎音呼哀哉維今之人不尚有舊叶巨已反集傳賦也先王文武也召公康公也辟開蹙促也文王之世周公治內召公治外故周人之詩謂之周南諸侯之詩謂之召南所謂日辟國百里云者言文王之化自北而南至於江漢之間服從之國日以益衆及虞芮質成而其旁諸侯聞之相帥歸周者四十餘國焉朱氏公遷曰召公宣布德化其流行之速自然非以力強取之也今謂幽王之時促國蓋犬戎內侵諸侯外畔也孔氏穎逹曰言日辟日蹙甚言之耳不得一日之間便有百里之效又歎息哀痛而言今世雖亂豈不猶有舊德可用之人哉曹氏粹中曰當是時去宣王中興之日不遠其舊臣故老無尚存者乎言有之而不用耳集説范氏處義曰此章傷幽王土地人民日以削小故有辟國蹙國之言先王受命召公能使教明於南國化行於江漢是日辟國百里也幽王用非其人交侵背叛是日蹙國百里也悲傷之極思有以救之在用舊德之人耳維今之人豈不尚有舊德者乎何為不用也輔氏廣曰此則明言先王用得其人而興今日用非其人而亂任用一乖而效驗大異因歎舊德可用之人天下豈盡無哉特以不能用而隱伏不見耳陳氏櫟曰前詩望其改過而無忝皇祖此詩望其改圖而擢用舊人審如是則否猶可泰危猶可安也豈至有犬戎禍哉總論錢氏天錫曰此詩刺王用小人故飢饉侵削無不因之以致耳篇末有惓惓望治之意召旻七章四章章五句三章章七句集傳因其首章稱旻天卒章稱召公故謂之召旻以别小旻也集説孔氏穎逹曰首章卒章雖有召旻之字而其文不次作者錯綜以名篇也陳氏傅良曰周南係於周公召南係於召公豈非化之盛者必有待乎二公也至於風之終係以豳雅之終係以召旻豈非化之衰者必有思乎二公也劉氏瑾曰此詩居變雅之終而第七章又居此詩之終慨然有懷文武召公之盛以見亂極思治之理其亦猶下泉之終變風歟蕩之什十一篇九十二章七百六十九句欽定詩經傳説彚纂卷十九
