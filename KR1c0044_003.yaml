body:
  text: 欽定四庫全書欽定詩經傳説彚纂卷一國風一孔氏穎達曰詩國風是大師所題也劉氏瑾曰集傳於國風之下係以一者以國風居四詩之首也下文周南一之一者周南又居國風中十五國之首也集傳國者諸侯所封之域而風者民俗歌謠之詩也謂之風者以其被上之化以有言而其言又足以感人如物因風之動以有聲而其聲又足以動物也是以諸侯采之以貢於天子天子受之而列於樂官於以考其俗尚之美惡而知其政治之得失焉朱子曰男女相與詠歌以言其情行人振木鐸徇路采之何休云男年六十女年五十無子者官衣食之使采詩邑移於國國以聞於天子舊説二南為正風所以用之閨門鄉黨邦國而化天下也程子曰二南之詩為教於衽席之上閨門之內上下貴賤之所同也故用之鄉人邦國而謂之正風十三國為變風則亦領在樂官以時存肄備觀省而垂監戒耳合之凡十五國云朱子曰變風多是淫亂之詩故班固言男女相與詠歌以言其傷者聖人存此亦以見上失其教則民欲動情勝其弊至此故曰詩可以觀也劉氏瑾曰男女亂倫而邶鄘衛鄭之風變君臣失道而王豳之風變畋遊荒淫而齊國之風變儉嗇褊急而魏國之風變以至唐風變而憂傷秦風變而武勇陳風變而淫遊歌舞檜曹之風變而亂極思治此十三國風之大槩也然變詩雖不可以風化天下而亦各有音節如季札所觀是己故樂官兼掌其詩使夫學者時習之以自省而知所戒蓋亦莫非所以為教也集説匡氏衡曰室家之道修則天下之理得故詩始國風原性情而明人倫也鄭氏樵曰古者三百篇之詩皆可歌歌則各從其國之聲周召王豳之詩同出於周而分為四國之聲邶鄘衛之詩同出於衛而分為三國之聲蓋采詩之時得之周南者繫之周南得之召南者繫之召南得之王城與豳者繫之王城與豳得之邶鄘衛者繫之邶鄘衛蓋歌則各從其國之聲何彼穠矣之詩何以不列於王風蓋為詩之時則東周也采詩之地則召南也故列之召南黍離之詩何以不列之於二南蓋周大夫行役至於宗周之地閔其壞而思其舊其詩雖作於西周其人則東周也故列之王風乎王何以不曰雅以其地則東周也幽厲何以不曰風以其地則西周也如此則木瓜雖美齊而在衛猗嗟雖刺魯而在齊泉水載馳等詩皆衛詩而在邶鄘召穆之民勞衛武之賔之初筵不附其國而在二雅皆以聲别也夫風之詩出於土風而雅之詩則出於朝廷大夫爾文武之詩見於風者二南是也成王之詩見於風者豳風是也平王之詩見於風者王風是也雅頌之音與天下同列國之音隨風土而異若謂降黍離而為國風則豳詩亦可降耶大抵時有三百皆以聲别古人采詩之時隨其國而繫之聖人無容心於其間也至於稱其國之名號亦然如三監之地自康叔得國已統於衛今其詩之在頃襄文武者亦分而為三不專曰衛唐叔封唐在燮父時已為晉矣至春秋時實有其詩今其目乃為唐也七月以後多為周公作今其詩乃皆為豳在盤庚時商已為殷故頌其殷武今其頌乃皆為商得於其地繫於其國云爾夫子曰吾自衛反魯然後樂正雅頌各得其所夫謂雅頌各得其所可也而謂樂正者何哉蓋樂者鄉樂也鄉樂即風詩也十五國風之中惟邶鄘衛其國相近其聲相似不比周召王豳猶有隔絶夫子平時見魯太師所傳三國之聲時有異同及其環轍之時見衛人所歌之聲從而正之故鄉樂曰正而雅頌但曰得所其意如此所以詩有十五此國風之别也王氏柏曰國風者周為商列國之風也曰王風者周王天下以後之風也凡在下之作槩謂之風初不系周之盛衰也當周盛時風如二南及其衰也風如黍離何獨平王以後雅始降而為風乎鄧氏元錫曰周公作樂定二南為化本因列國山川封域次國風列之樂官以導化移俗大師所歌列國風之次第是也其後迹熄詩亡孔子博采存者表二南為風始其列國詩繫善敗得失之原為興替存亡之統足垂勸戒者頗更定其第次以表裏乎春秋則今經國風之所以教也周南一之一召南説附集傳周國名南南方諸侯之國也周國本在禹貢雍州境內岐山之陽后稷十三世孫古公亶父始居其地劉氏瑾曰棄為后稷封於邰其後公劉遷豳至古公又遷於岐山之下傳子王季歷至孫文王昌辟國寖廣於是徙都於豐而分岐周故地以為周公旦召公奭之采邑顔氏師古曰采官也因官食地故曰采地且使周公為政於國中而召公宣布於諸侯司馬氏貞曰周地本大王所居以為公旦采邑故曰周公奭食邑於召故曰召公蓋文王取岐周故墟分爵二公也孔氏穎逹曰文王若未居豐則岐邦自為都邑明知分賜二公在作豐之後且二南文王之詩而分繫二公若文王不賜采邑不使行化安得以詩繫之故知此時賜之也於是德化大成於內而南方諸侯之國江沱汝漢之間莫不從化蓋三分天下而有其二焉鄭氏康成曰雍梁荆豫徐揚之人咸被其德而從之孔氏穎逹曰其餘冀青兖屬紂是為三分有二也至子武王發又遷於鎬遂克商而有天下武王崩子成王誦立周公相之制作禮樂乃采文王之世風化所及民俗之詩被之管弦以為房中之樂而又推之以及於鄉黨邦國王氏安石曰凡詩用於天子者諸侯不得用用於諸侯者大夫不得用此關雎鄉人邦國皆得用者以之正夫婦也所以著明先王風俗之盛而使天下後世之修身齊家治國平天下者皆得以取法焉蓋其得之國中者雜以南國之詩而謂之周南言自天子之國而被於諸侯不但國中而已也其得之南國者則直謂之召南言自方伯之國被於南方而不敢以繫於天子也章氏俊卿曰周南召南樂章之名也文王之化自北而南及於江漢故作樂者采自北以南土風而名之曰南用為燕樂鄉樂射樂房中樂所以彰文王之化也劉氏瑾曰其詩得於國中者多為文王后妃而作故雜以南國漢廣汝墳二詩而謂之周南所謂自天子之國被於諸侯者不敢使周公食邑之號專主其風也然周公之事固統於其所尊矣觀下文復取小序繫之周公之説可互見也若召公則宣化於諸侯故以侯國之詩繫之而謂之召南正以其食邑之號專主之也謂召公為方伯之國謂豐邑為天子之國者皆通乎追王之後制作之時而言也岐周在今鳳翔府岐山縣皇輿表屬陜西豐在今京兆府鄠縣皇輿表屬陜西西安府終南山北南方之國即今興元府京西湖北等路諸州皇輿表宋興元府今陜西漢中府宋京西路今湖廣安陸襄陽鄖陽德安諸府河南歸德河南南陽汝寧諸府及汝州宋湖北路今湖廣武昌漢陽安陸德安荆州嶽州常德辰州諸府鎬在豐東二十五里小序曰關雎麟趾之化王者之風故繫之周公南言化自北而南也鵲巢騶虞之德諸侯之風也先王之所以教故繫之召公斯言得之矣集説馬氏融曰二南國風之始三綱之首王教之端鄭氏康成曰周召者雍州岐山之陽地名地形險阻而原田肥美周之先公曰大王自豳始遷焉修德建王業商王帝乙命其子王季為西伯至紂又命文王典治南國之諸侯故雍梁荆豫徐揚之人咸被其德而從之文王受命作邑于豐乃分岐邦周召之地為周公召公采地施先公之教於已所職之國武王定天下巡狩述職陳誦諸國之詩以觀民風俗六州者得二公之德教尤純故獨録之屬之大師分而國之其得聖人之化者謂之周南得賢人之化者謂之召南言二公之德教自岐而行於南國也謂為風之正經初古公亶父聿來胥宇爰及薑女其後大任思媚周薑大姒嗣徽音歷世有賢妃之助以致其治文王刑于寡妻至于兄弟以御于家邦是故二國之詩以后妃夫人之德為首終以麟趾騶虞言后妃夫人有斯德興助其君子皆可以成功至於獲嘉瑞孔氏穎逹曰周召之地共方百里而皆名曰周其召是周內之别名也孔叢子云羊容問於子思曰古之帝王中分天下而二公治之謂之二伯周自后稷封為諸侯奚得為西伯乎子思曰吾聞諸子夏云殷王帝乙之時王季以九命作伯於西受圭瓚秬鬯之賜故文王因之得專征伐此諸侯為伯猶周召分陜文王繼父為州伯化行乎江漢之域若非受紂之命其化無以及之江漢之域即梁荆二州故尚書注云南兼梁荆其後化廣民附三分有二不必皆紂命也言王者之風是得聖人之化也言諸侯之風是得賢人之化也以周公聖人故以聖人之風繫之以召公賢人故以賢人之風繫之先聖後賢故先周後召也不直稱周召而連言南者欲見行化之地作詩之處也且直言周召嫌主美二公故並皆云南也此詩既繫二公即二公為其詩主若有美二公則各從其國甘棠之在召南是其事也周南無美周公或時不作或録不得也此實文王之詩而繫之二公者志張逸問王者之風王者當作雅在風何答者文王以諸侯而有王者之化述其本宜為風也逸以文王稱王則詩當在雅鄭以此詩述文王為諸侯時事以有王化故稱王者之風於時實是諸侯也化霑一國謂之為風道被四方乃名為雅文王才得六州未能天下統一此二南之人猶以諸侯待之為作風詩不作雅體體實是風不得謂之為雅天子之妃曰后諸侯之妃曰夫人以周南王者之化故稱后妃召南諸侯之化故稱夫人直以化感為名非為先後之别二風皆是文王之化大姒所贊周南以桃夭至芣苡三篇為后妃所致漢廣以下其事差逺為文王之致召南以草蟲至行露四篇為夫人所致羔羊以下差逺為文王之致各舉其事互相發明此二南之詩文王時作文王即位至受命之時已四十餘年諸侯從之蓋亦早矣是受命之前已行王德當此之時詩已作也何則化被於下則民述其志何須待布王號然後作歌武王采得之時二公已有爵土命其行化遂分繫之非由二公有土此詩始作也周召二十五篇唯甘棠與何彼穠矣二篇乃是武王時作蘇氏轍曰周公在內近於文王雖有德而不見則其詩不足召公在外逺於文王功業明著則詩作於下然則謂之周召者蓋因其職而明之也謂之南者文王在西而化行於南國以其及之者言之也東北則紂之所在文王之初所不能及也鄭氏樵曰二南之詩本於所得之地而繫之歌則從二南之聲二南皆出於文王之化言王者之化自北而南周召二公未嘗與其間二南之詩後世取於樂章用之為燕樂為鄉樂為射樂為房中之樂所以彰文王之德美也故曰夫武始而北出再成而滅商三成而南南之為義蓋如是也五成而分周公左召公右周召南之為義蓋如是也范氏處義曰二南諸篇皆本其所得之地而録之彼區區欲分周南召南以為聖賢淺深者未為通論也且周南召南皆陳文王大姒風化之效難以優劣論如周南言道化行召南亦言王道成周南言文王之道被於南國召南亦言天下純被文王之化以是知二南之論風化亦互見之耳然周公止稱公召公乃稱伯豈召公後嘗典治南國之諸侯乎抑嘗考國風終於美周公二雅終於思召公則聖人刪詩之際傷衰亂之極非周召不能救也蓋與首二南同意朱子曰周南言文王閨門之化召南言諸侯夫人大夫妻被文王后妃之化而成德之事蓋詩之正風也詩言文王之德者繫之周公以周公主內治故也言諸侯之國被文王之化以成德者繫之召公以召公長諸侯故也吕氏祖謙曰程子以周南召南猶易之有乾坤取其有承乾之義周召乃詩之綱領乾坤其易之門黃氏櫄曰説詩者曰關雎麟趾之化繫之周公者自陜以東周公主之鵲巢騶虞之化繫之召公者自陜以西召公主之陳少南又謂文王撫有西戎南化江漢天下既一則分岐東於周公分岐西於召公一東一西皆以北為上自上而下故言自北而南李迂仲亦從其説吾不知文王所以分地於二公者果請之天子而與之耶抑不請之天子而自與之耶且當是時紂猶天子文王猶諸侯文王居羑里而繫易辭其志可見安有紂猶在上而文王擅分其地以與人哉或者又以謂文王受命稱王於是乎分陜不知武王未得天下則但曰文考而已曷嘗王哉少南迂仲皆嘗言文王未嘗受命稱王而又自謂分陜於二公何其自戾也先儒但見孔子論文王三分天下有其二故信分陜之説而不疑不知孔子所謂有其二者但謂二分民心已歸文王非有其地也豫謂分陜當在武王既得天下之後不當在文王之時二南之繫當在二公既分陜之後真氏德秀曰二南用之房中所以間邪僻而養中正也嚴氏粲曰詩經首二南見夫婦之倫焉見王道之端焉二南繫周召見君臣之倫焉見文王心術之微盛德之至焉關關雎七余反鳩在河之洲窈烏了反窕徒了反淑女君子好逑音求集傳興也關關雌雄相應之和聲也雎鳩水鳥一名王雎狀類鳧鷖今江淮間有之左傳少皥氏以鳥名官雎鳩氏司馬也杜預注摯而有别故為司馬主法制陸氏璣曰雎鳩幽州人謂之鷲而揚雄許愼皆曰白鷢似鷹尾上白郭氏璞曰雎鳩雕類今江東呼之為鶚好在江邉沚中亦食魚生有定偶而不相亂偶常並遊而不相狎故毛傳以為摯而有别鄭氏康成曰摯之言至也謂王雎之鳥雌雄情意至然而有别歐陽氏修曰毛公曰鳥摯而有别不取其摯取其别也雎鳩之在河洲聽其聲則和視其居則有别此詩人之所取也朱子曰雎鳩毛氏以為摯而有别一家作猛鷙説謂雎鳩是鶚之屬鶚自是沈鷙之物恐無和樂之意蓋摯與至同言其情意相與深至而未嘗狎便見其樂而不淫之意列女傳以為人未嘗見其乘居而匹處者蓋其性然也朱子曰嘗見人説淮上一般水禽名王雎雖有兩箇相隨然相離每逺此説却與列女傳所引義合乘居謂四箇同居也河北方流水之通名洲水中可居之地也窈窕幽間之意鄒氏泉曰幽有深潛不露意間有安靜自如意言幽間而又言貞靜蓋貞靜乃幽間之本在內為貞靜在外為幽間非有二也淑善也女者未嫁之稱蓋指文王之妃大姒為處子時而言也君子則指文王也好亦善也逑匹也毛傳云摯字與至通言其情意深至也興者先言他物以引起所詠之詞也周之文王生有聖德又得聖女姒氏以為之配宫中之人於其始至見其有幽間貞靜之德故作是詩言彼關關然之雎鳩則相與和鳴於河洲之上矣此窈窕之淑女則豈非君子之善匹乎言其相與和樂而恭敬亦若雎鳩之情摯而有别也後凡言興者其文意皆放此云朱子曰興起也引物以起吾意如雎鳩之摯而有别之物引此起興猶不甚逺其他亦有全不相類只借物而起吾意者雖皆是興與此又略不同也吕氏祖謙曰首章以雎鳩發興後章以荇菜發興至於雎鳩之和靜荇菜之柔順則又取以為比也漢匡衡曰窈窕淑女君子好逑言能致其貞淑不二其操情欲之感無介乎容儀宴私之意不形乎動靜夫然後可以配至尊而為宗廟主此綱紀之首白虎通曰三綱君臣父子夫婦也六紀諸父兄弟族人諸舅師長朋友也綱張也紀理也大綱小紀所以張理上下整齊大道也王教之端也可謂善説詩矣集説毛氏萇曰后妃説樂君子之德無不和諧愼固幽深若關雎之有别焉后妃有關雎之德是幽間貞專之善女宜為君子之好匹程子曰關雎之義樂得淑女以為后妃配君子也其所憂思在於進賢淑非説於色也哀窈窕思之切也切於思賢才而不在於淫色無傷善之心也思之甚切以常人言之直入於邪關雎却止乎禮義哀不至於傷則其思也亦異乎常人之思矣後人以為后妃樂得淑女以配君子配惟后妃可稱后妃自是配更何别求淑女以為配淫其色乃男子之事此自關雎之義如此非謂后妃也黃氏櫄曰關關雎鳩詩人之意取其和鳴學者以猛摯求之其氣象大不侔不淫其色乃關雎之義不足以形容后妃之德也嚴氏粲曰雎鳩有關關然之聲在河中之洲逺人之處興后妃德音聞於外而身居深宫之中也太姒有徽音故以關關興之此窈窕幽間之善女足以為君子之良匹也言大姒之賢而文王齊家之道可見矣朱氏善曰文王聖人也而詠其德者一言以蔽之不過曰敬而已大姒聖女也而詠其德者一言以蔽之不過曰淑而已蓋能敬則能自強不息純亦不已所以為乾之健也能淑則足以配至尊奉宗廟所以為坤之順也故曰窈窕淑女君子好逑言能體坤道之順以承乾也黃氏佐曰聽內治以明章婦順內和而家理聽外治以明章男教外和而國治實自此始此好逑之義也附録鄭氏康成曰言后妃之德和諧則幽間處深宫貞專之善女能為君子和好衆妾之怨皆化后妃之德不嫉妒謂三夫人以下孔氏穎逹曰關雎之篇説后妃心之所樂樂得此賢善之女以配已之君子心之所憂憂在進舉賢女不自淫恣其色又哀傷處窈窕幽間之女未得升進思得賢才之人與之共事君子勞神苦思而無傷害善道之心此是關雎詩篇之義也參初金反差初宜反荇行猛反菜左右流之窈窕淑女寤寐求之求之不得寤寐思服叶蒲北反悠哉悠哉輾哲善反轉反側集傳興也參差長短不齊之貌荇接余也根生水底莖如叉股上靑下白葉紫赤圓徑寸餘浮在水面陸氏璣曰鬻其白莖以苦酒浸之脆美可案酒李氏樗曰荇菜是水有之黃花葉似蓴可為葅或左或右言無方也流順水之流而取之也程子曰左右皆隨水之貌嚴氏粲曰流流水也流之謂於流水以潔之也陳氏推曰左右是尋此索彼之謂故曰無方或寤或寐言無時也毛氏萇曰寤覺寐寢也服猶懷也悠長也王氏安石曰悠者思之長也惟其以得淑女為樂故其求之而不得則哀思也輾者轉之半轉者輾之周反者輾之過側者轉之留皆臥不安席之意鄭氏康成曰臥而不周曰輾孔氏穎達曰反側猶反覆輾轉猶婉轉此章本其未得而言彼參差之荇菜則當左右無方以流之矣此窈窕之淑女則當寤寐不忘以求之矣蓋此人此德世不常有求之不得則無以配君子而成其內治之美故其憂思之深不能自己至於如此也集説程子曰荇菜以興后妃之柔順朱子曰此詩看來是妾媵做所以形容得寤寐反側之事外人做不到此附録毛氏萇曰流求也后妃有關雎之德乃能共荇菜備庶物以事宗廟也鄭氏康成曰左右助也言后妃將共荇菜之葅必有助而求之者言后妃覺寐則常求此賢女欲與之共已職也參差荇菜左右采叶此禮反之窈窕淑女琴瑟友叶羽已反之參差荇菜左右芼莫報反叶音邈之窈窕淑女鐘鼓樂音洛之集傳興也采取而擇之也芼熟而薦之也禮內則芼羮注以菜雜肉為羮也又雉兔皆有芼注雉羮兔羮皆有菜以芼之琴五弦或七弦瑟二十五弦皆絲屬樂之小者也邢氏昺曰琴長三尺六寸六分五弦後加文武二弦雅瑟長八尺一寸廣一尺八寸二十五弦其常用者十九弦頌瑟長七尺一寸廣一尺八寸二十五弦盡用段氏昌武曰明堂位曰大琴大瑟中琴小瑟四代之樂器也古人用大琴必以大瑟配之用中琴必以小瑟配之然後大者不陵細者不抗而五聲和矣友者親愛之意也鄭氏康成曰同志為友吕氏祖謙曰友亦樂也鐘鼓有時而奏琴瑟無時而不在側若朋友然故曰友鐘金屬鼓革屬樂之大者也樂則和平之極也鄭氏康成曰琴瑟在堂鐘鼓在庭孔氏穎達曰皋陶謨云琴瑟以詠乃云下管鼗鼓明琴瑟在上鼗鼓在下大射禮頌鐘在西階之西笙鐘在東階之東是鐘鼓在庭也胡氏紹曾曰周禮有縵樂燕樂之鐘此其燕樂與或云琴瑟於閨門燕居之時鐘鼓於朝廷贄見之際然若止以琴瑟鐘鼓為樂其樂易盡樂其德之有合則可暢於天下矣此章據今始得而言彼參差之荇菜既得之則當采擇而亨芼之矣此窈窕之淑女既得之則當親愛而娛樂之矣蓋此人此德世不常有幸而得之則有以配君子而成內治故其喜樂尊奉之意不能自已又如此云集説孔氏穎達曰以琴瑟相和似人情志故以友言之鐘鼓鏗宏非情志可比故以樂言之程子曰琴瑟友之鐘鼓樂之言后妃之配君子和樂如此也徐氏鳳彩曰琴瑟堂上之樂與歌聲洽比者也得相親密故曰友鐘鼓堂下之樂以始八音者也更為宣暢故曰樂附録孔氏穎達曰此稱后妃之意后妃言已思此淑女若來已宜以琴瑟鐘鼓友樂之假設之辭也蘇氏轍曰窈窕淑女不可得也苟其得之則將友之樂之庶其肯從我也此求之至也總論程子曰樂得淑女以配君子不淫其色是樂而不淫哀窈窕思賢才求之不得輾轉反側是哀而不傷吕氏祖謙曰后妃之德坤德也萬化之源一本諸此未得之也如之何其勿憂既得之也如之何其勿樂輔氏廣曰此皆是興而兼比首章以關雎起興因以關雎摯而有别為比二章三章以荇菜起興亦以荇菜為比但先儒皆取於荇菜之潔淨柔順而集傳只言其不可不求者豈非正以其潔淨柔順之故乎朱氏公遷曰一章美后妃之德二三章則詩人自言其憂思喜樂之當然初無與於文王而文王之化自見矣關雎三章一章四句二章章八句孔氏穎逹曰關雎者詩篇之名金縢云公乃為詩以貽王名之曰鴟梟然則篇名皆作者所自名名篇之例多不過五少才取一或偏舉兩字或全取一句亦有捨其篇文假外理以定稱自古有篇章之名故那序曰得商頌十二篇東山序曰一章言其完是也句則古者謂之言論語云一言以蔽之曰思無邪則以一句為一言也秦漢以來衆儒各為訓詁乃有句稱論語注云此我行其野之句是也句者聯字以為言則一字不制也故詩之見句少不減二即祈父肇禋之類也三字綏萬邦屢豐年之類也四字者關關雎鳩窈窕淑女之類也五字者誰為雀無角何以穿我屋之類也六字者昔者先王受命有如召公之臣之類也七字者如彼築室于道謀尚之以瓊華乎而之類也八字者十月蟋蟀入我牀下我不敢效我友自逸是也其外更不見九字十字者由聲度闡緩不協金石也句字之數四言為多唯以二三七八者將由言以申情唯變所適播之樂器俱得成文故也章者積句所為不限句數以其作者陳事須有多少章總一義必須意盡而成故也纍句為章則一句不可二句得為之其多者三十八句自外不過也篇之大小隨章多少風雅之中少猶兩章以上多則十六以下唯周頌三十一篇及那烈祖玄鳥皆一章者以其風雅敘人事一章不盡重章以申殷勤頌者太平德洽之歌直言寫志不必殷勤故一章而已魯頌不一章者魯頌美僖公之事非告神之歌亦殷勤而重章也髙宗一人而玄鳥一章長發殷武重章者或詩人之意所作不同明成功有大小其篇詠有優劣乎立章之法不常厥體或重章共述一事或一事疊為數章或初同而末異或首異而末同或事訖而更申或章重而事别一章而再言三章而一發或篇有數章章句衆寡不等章有數句句字多少不同皆由各言其情故體無恆式也集傳孔子曰關雎樂而不淫哀而不傷愚謂此言為此詩者得其性情之正聲氣之和也問關雎樂而不淫哀而不傷是詩人性情如此抑詩之詞意如此朱子曰是有那情性方有那詞氣聲音又曰樂止於琴瑟鐘鼓是不淫也若沉湎淫泆則淫矣憂止於輾轉反側是不傷也若憂愁哭泣則傷矣此是得性情之正輔氏廣曰哀樂情之發也心不宰焉則流於傷與淫而不自知矣關雎之詩感於性發於情而宰於心者也其形於聲詩播諸音樂皆得其和且正焉蓋德如雎鳩摯而有别則后妃性情之正固可以見其一端矣至於寤寐反側琴瑟鐘鼓極其哀樂而皆不過其則焉則詩人性情之正又可以見其全體也獨其聲氣之和有不可得而聞者雖若可恨然學者姑即其詞而玩其理以養心焉則亦可以得學詩之本矣輔氏廣曰樂不淫哀不傷論語集注只説作詩者之性情而此兼言后妃之性情者蓋並首章言之也聲氣之和指其發於言以至播於八音以成樂而言也饒氏魯曰一章言文王有聖德而后妃亦有聖德可為之配二章推言未得大姒之時求之如此其切三章言始得后妃之時喜之如此其至自他詩觀之言哀者易至於悲傷如澤陂之詩曰有美一人傷如之何寤寐無為涕泗滂沱是也言樂者易至於淫泆如溱洧之詩曰洧之外洵訏且樂惟士與女伊其相謔贈之以芍藥是也惟此詩得情性之正故玩其詞可為養心之助也劉氏辰翁曰夫子自衛反魯考禮正樂其時師摯在魯為夫子歌周南故曰師摯之始關雎之亂洋洋乎盈耳哉今世所存之詩特其詞與義耳詩之詞未嘗亡也其聲亡也劉氏瑾曰首章取興見樂而不淫是后妃性情之一端也二章三章所言一哀一樂皆不過則是詩人性情之全體也蓋由后妃與詩人性情之正如此故發於詩歌播之音樂宜其聲氣之無不和矣然樂者所以節夫詩之聲而有音律以養人耳歌詠以養人心舞蹈以養血脈此樂之全體也古樂既亡則此詩聲氣之和所以樂不淫哀不傷者固不得聞而其所以養心者幸有詩詞之可玩則亦尚存樂之一端而可為學詩之本也匡衡曰妃音配匹之際輔氏廣曰妃匹猶言匹耦也生民之始萬福之原昏姻之禮正然後品物遂而天命全孔子論詩以關雎為始言大上者民之父母后夫人之行不侔乎天地則無以奉神靈之統而理萬物之宜自上世以來三代興廢未有不由此者也集説韓氏嬰曰子夏問曰關雎何以為國風始也孔子曰關雎至矣乎仰則天俯則地德之所藏道之所行大哉關雎之道也萬物之所繫羣生之所懸命也天地之間生民之屬王道之原不外此矣子夏喟然歎曰大哉關雎乃天地之基也班氏固曰周之興也以薑嫄及大任大姒故易基乾坤詩首關雎書美釐降夫婦之際人道之大倫也朱子曰主於德而言則樂而不淫哀而不傷主於色而言則樂必淫哀必傷此幾微之理毫釐之辨善養心者審諸此而已矣讀關雎詩便使人有齊莊中正意思所以冠乎三百篇與記言毋不敬書言欽明文思皆同當時人被文王大姒德化之深不覺形容歌詠如此故當作樂之時引為篇首以見一時之盛為萬世之法尢是感人妙處詩意只是疊疊推上去因一事上有一事一事上又有一事如關雎形容后妃之德如此又當知君子之德如此又當知詩人形容得意味深長如此又當知所以齊家所以治國所以平天下人君則必當如文王后妃則必當如大姒其原如此問曹叔遐曰君舉所説詩謂關雎如何對曰謂后妃自謙不敢當君子謂如此之淑女方可為君子之仇匹這便是后妃之德曰鄭氏自如此説了熹看來恁地説也得只是覺得偏主一字無正大之意關雎如易之乾坤意思如何得恁地無方際如下面諸篇却多就一事説這只反覆形容后妃之德而不可指説道甚麼是德只恁地渾淪説這便見后妃德盛難言處黃氏櫄曰周人但以關雎之詩形容后妃初不指后妃而謂之關雎也曰樂曰憂曰哀皆詩人樂之憂之哀之也案古者后立三夫人九嬪二十七世婦八十一御妻乃所以理隂德治內事章女教賔祭之事皆后夫人供之而衆嬪御佐之非得淑女不足以稱其職后妃思得淑女以自助而事君子未得而求思之深如此設若既得而和樂之浹如此此其所以為女德之至盛而足以為風教之首也自毛鄭而後從此説者衆至朱子不主后妃自作蓋因君子好逑之語以為非衆嬪御所可當且專主一事其義為狹論固宏逺矣然亦未嘗以鄭氏為非也今以朱傳為宗而仍附其説於章末俾後之學者見自有關雎詩以迄漢唐諸儒之論蓋如此葛之覃兮施以䜴反于中谷維葉萋萋黃鳥于飛集于灌木其鳴喈喈叶居奚反集傳賦也葛草名蔓生可為絺綌者覃延施移也中谷谷中也孔氏穎逹曰中谷倒其言者古人語皆然詩文多此類也萋萋盛貌黃鳥鸝也毛氏萇曰黃鳥摶黍也陸氏璣曰黃鸝留也或謂之黃栗留幽州人謂之黃鶯一名倉庚一名商庚一名鵹黃一名楚雀齊人謂之摶黍當椹熟時來在桑間故里語曰黃栗留看我麥黃椹熟亦是應節趨時之鳥也灌木叢木也喈喈和聲之逺聞也賦者敷陳其事而直言之者也蓋后妃既成絺綌而賦其事追敘初夏之時葛葉方盛而有黃鳥鳴於其上也後凡言賦者放此集説毛氏萇曰葛所以為絺綌女功之事煩辱者歐陽氏修曰后妃見葛生鳥鳴因時感事樂女功之將作蘇氏轍曰葛者婦人之所有事也詠歌其所有事而又及其所聞見也嚴氏粲曰葛初生之時未可刈也而已動女功之思見念念不忘也先時感事乃豳民艱難之俗今以后妃之貴而志念如此豈復有一毫貴驕之習邪味詩人言外之意可以見文王齊家之道矣葛之覃兮施于中谷維葉莫莫是刈魚廢反是濩胡郭反為絺恥知反為綌去逆反叶去略反服之無斁音亦叶弋灼反集傳賦也莫莫茂密貌刈斬濩煮也精曰絺粗曰綌斁厭也此言盛夏之時葛既成矣於是治以為布而服之無厭蓋親執其勞而知其成之不易所以心誠愛之雖極垢弊而不忍厭棄也集説毛氏萇曰古者王后織玄紞公侯夫人紘綖卿之內子大帶大夫命婦成祭服士妻朝服庶士以下各衣其夫陸氏佃曰夫禮后織玄紞今乃親葛事如此者親蠶以勸女功之正事親葛以勸女功之餘事陳氏鵬飛曰以為衣服而服之無厭斁之心女功之勤身親嘗之所以能儉陳氏傅良曰知稼穡之勤者飲食則念農功知絲麻之勤者衣服則思女功親執其勞所以心誠愛而不忍棄也嚴氏粲曰婦人驕侈之情何有紀極苟萌一厭心雖窮極靡麗耳目日新猶以為不足也味服之無斁一語可見后妃之德性朱氏善曰刈而後濩濩而後績績而後成布成布而後為衣其為之也有序其服之也不厭此所以為勤且儉也言告師氏言告言歸薄汚我私薄浣戶管反我衣害户葛反浣害否方九反歸寧父母莫後反集傳賦也言辭也劉氏瑾曰如言采言念薄言駕言之類皆語辭也師女師也毛氏萇曰古者女師教以婦德婦言婦容婦功祖廟未毁教於公宫三月祖廟既毁教於宗室孔氏穎逹曰女師教女之師婦人五十無子出而不復嫁能以婦道教人者若今時乳母矣女已出嫁母尚隨之薄猶少也汚煩撋軟平聲之以去其汚猶治亂而曰亂也陸氏德明曰煩撋猶捼莎也捼莎音那梭王氏安石曰治汚曰汚浣則濯之而已私燕服也衣禮服也毛氏萇曰婦人有副禕盛飾以朝事舅姑接見於宗廟進見於君子其餘則私也孔氏穎逹曰六服禕衣從王祭先王褕翟祭先公闕翟祭羣小祀鞠衣以告桑展衣以禮見王及賔客褖衣以御於王六服皆為公衣其餘則為私也三狄之服刻繒為形而畫以五色所以得浣者言公服有浣者耳不必六服皆浣也三狄不可浣鞠展褖純色之衣得浣之也劉氏瑾曰周禮王后禮有六服文王未嘗稱王則大姒亦未必備此六服但泛言禮服而已害何也寧安也謂問安也孔氏穎逹曰諸侯夫人及王后之法父母在得歸寧父母既沒則使卿寧於兄弟不得歸寧也上章既成絺綌之服矣此章遂告其師氏使告於君子以將歸寧之意且曰盍治其私服之汚而浣其禮服之衣乎何者當浣而何者可以未浣乎我將服之以歸寧於父母矣集説范氏處義曰其燕服則汚治之其禮服則浣洗之初非好潔其衣服故又問何者當浣何者未浣惟其宜稱王氏質曰歸寧告女師女師告君所歷不可越也輔氏廣曰薄汚薄浣者不為甚飾之辭害浣害否者又見其不苟之意嚴氏粲曰此章乃説后妃將歸寧之事舉動必告於師氏浣衣猶為之斟酌觀此氣象其賢可見朱氏善曰師氏導我者也則必每事而詢訪見其不敢專也父母生我者也則必及時而問安見其不敢忘也君子宗主我者也則必因師以致告見其不敢褻也總論王氏質曰處貴適谷采葛隨時變趣婦功其勤苦如此人情歸寧當有所整飾乃簡朴如此可想見古風也許氏謙曰此詩蓋后妃已成絺綌之服將歸寧而追賦之也春葛方盛未刈濩之時后妃已念念於此黃鳥飛集和鳴於叢本之上於以見和氣薰蒸物各得所之意及葛之成也即刈之濩之以為絺綌既成服而服之可見勤於女事不失其時及將歸寧則必謀之姆師告之夫君至於浣濯微事亦且咨詢而不置其勤儉恭敬之德備見於詞氣之間則文王刑于寡妻之效尤著於此矣案序云后妃之本毛鄭諸家皆以為后妃在父母家志在女功其解歸寧父母句曰父母在則有時歸寧耳朱子則謂此詩是治葛成而歸寧之時作以既為后妃貴而勤儉乃見其德之厚其義較舊説為長又案載於禮經者止后夫人躬桑之文觀此詩則知凡百婦功無不躬親所以女教修明而足以化下也古者夫婦之禮甚謹婦之於夫夫之於婦有不自言而使人將命者所以嚴內外而禁狎昵也妻將娠夫出居側室使人日再問之女子歸寧使師氏告於君子閨門之內儼若嚴賔所為起教於微渺者其意深矣葛覃三章章六句集傳此詩后妃所自作故無贊美之辭然於此可以見其已貴而能勤已富而能儉己長而敬不弛於師傅已嫁而孝不衰於父母是皆德之厚而人所難也小序以為后妃之本庶幾近之吕氏祖謙曰關雎后妃之德也而所以成德者必有本也曷謂本葛覃所陳是也集説張氏栻曰后妃之貴亦必立師傅以訓之法家拂士不可一日無后妃亦然也周自后稷以農為務歷世相傳其君子則重稼穡之事其室家則重織紝之勤相與服習其艱難詠歌其勞苦此實王業之根本也故誦服之無斁之章則知周之所以興誦休其蠶織之章則知周之所以衰輔氏廣曰勤儉孝敬固婦人之懿德又能不以勢之貴富時之久逺而有所變遷焉則尤見其德厚有常而人所難及也朱氏善曰即為絺為綌而知其能勤即浣濯無斁而知其能儉因其言告師氏而知其能敬因其歸寧父母而知其能孝關雎之所謂淑指其德之全體言也此所謂勤儉孝敬又各就其一事言也采采卷上聲耳不盈頃音傾筐嗟我懷人置彼周行叶户郎反集傳賦也采采非一采也卷耳枲音洗耳葉如鼠耳叢生如盤毛氏萇曰苓耳也陸氏璣曰葉青白色似胡荽白花細莖蔓生可煮為茹四月中生子如婦人耳中璫或謂之耳璫幽州人謂之爵耳郭氏璞曰亦名胡枲江東呼常枲朱子曰據本草即今蒼耳頃攲也筐竹器毛氏萇曰頃筐畚屬懷思也人蓋謂文王也姚氏舜目曰后妃當采卷耳時懷望文王之歸終莫能釋置舍也周行大道也朱子曰詩有三周行此及大東皆道路之道鹿鳴乃道義之道后妃以君子不在而思念之故賦此詩託言方采卷耳未滿頃筐鄭氏康成曰器之易盈而不盈者憂思深也而心適念其君子故不能復采而置之大道之旁也問卷耳與前篇葛覃同是賦體又似略不同蓋葛覃直敘其所嘗經歷之事卷耳則是託言也朱子曰設使不曾經歷而自言我之所懷者如此則亦是賦體也集説朱氏善曰卷耳易采也頃筐易盈也然采之又采而不盈頃筐何也蓋託言其心在乎君子而不在乎物也於是舍之而置彼大路之旁焉其心之專一而不暇乎他可知也此詩是后妃之於君子思之切憂之深望之至有懇切至到之意而無悲愁愴慘之懷所以得性情之正也凌氏濛初曰不是已采物方嗟懷人總為懷人在念則采物都無興趣耳意在言外附録左傳嗟我懷人置彼周行能官人也毛氏萇曰憂者之興也置置行列也思君子官賢人置周之列位杜氏預曰周遍也詩人嗟歎言我思得賢人置之遍於列位是后妃之志以官人為急歐陽氏修曰后妃因采卷耳之不盈而知求賢之難得因物託意諷其君子陟彼崔徂回反嵬五回反我馬虺呼回反隤音頽我姑酌彼金罍維以不永懷叶胡隈反集傳賦也陟升也崔嵬土山之戴石者虺隤馬罷音皮不能升髙之病許氏慎曰隤下墜也姑且也輔氏廣曰維以欲其也曰且曰欲其亦可見託言之意罍酒器刻為雲雷之象以黃金飾之陸氏德明曰罍其形似壺容一斛孔氏穎逹曰謂之罍者取象雲雷言刻畫則用木矣永長也此又託言欲登此崔嵬之山以望所懷之人而往從之則馬罷病而不能進於是且酌金罍之酒而欲其不至於長以為念也集説徐氏常吉曰登髙飲酒不過摹寫其思而不遂之情凌氏濛初曰亦不是因登髙不得方思酌酒總為懷人在念則登髙飲酒都無趣耳附録鄭氏康成曰我我使臣也臣以役事行出離其列位身勤勞於山險而馬又病君子宜知其然我我君也臣出使功成而反君當設饗燕之禮與之飲酒以勞之我是以不復長憂思也陟彼髙岡我馬玄黃我姑酌彼兕徐履反觥古橫反叶古黃反維以不永傷集傳賦也山眷曰岡玄黃玄馬而黃病極而變色也兕野牛一角靑色重千斤觥爵也韓氏嬰曰觥容五升以兕角為爵也集説毛氏萇曰傷思也鄭氏康成曰此章為意不盡中殷勤也觥罰爵也饗燕所以有之者禮自立司正之後旅酬必有醉而失禮者罰之亦所以為樂朱子曰周禮有觥罰之事又云觥其不敬者但謂以觥罰之耳非必觥專為罰爵也陟彼砠七餘反矣我馬瘏音塗矣我僕痡音敷矣云何吁矣集傳賦也石山戴土曰砠孔氏穎逹曰爾雅釋山云石戴土謂之崔嵬土戴石為砠二傳相反或傳寫誤也劉氏瑾曰今集傳從毛氏而不從爾雅者豈以其書後出也歟瘏馬病不能進也痡人病不能行也吁憂歎也爾雅注引此作盱張目望逺也詳見何人斯篇集説輔氏廣曰馬病不能進猶可資於人也僕病不能行則斷不能往矣此亦甚之之詞至於云何吁矣則憂之極惟有愁歎而已非酒可得而解也嚴氏粲曰僕馬皆病而今云何乎長歎而已何氏楷曰始而懷既而傷終而吁其念愈深則其憂苦矣總論黃氏佐曰詩序云后妃之志志者心之所之也此詩以志為主俱是託言錢氏天錫曰通章都非實事思之變境也一室之中無端采物忽焉登髙忽焉飲酒忽焉馬病僕痡繚繞紛紜卒之念息而歎曰云何吁矣可見懷人之思自真而念之所設皆假安得以不思哉所謂詩之正也附録孔氏穎逹曰作卷耳詩者言后妃之志也后妃輔佐君子欲令君子求賢德之人審置於官位復知臣下出使之勞欲令君子賞勞之內有進賢人之心至於憂思而成勤此是后妃之志也歐陽氏修曰婦人無外事求賢審官非后妃之職蓋后妃諷其君子愛養臣下慰其勞苦而接以恩義其宫中相語者如是而已非私謁之言也劉氏敞曰此詩言后妃警戒人君使求賢審官之意耳不謂后妃已自求賢審官也朱子曰一章言后妃志於求賢審官又知臣下之勤勞故采卷耳備酒漿雖后妃之職然及其有懷也則不盈頃筐而棄置之於周行之道矣言其憂之切也二章三章皆臣下勤勞之甚思欲酌酒以自解之辭凡言我者皆臣下自我也此則述其所憂又見不得不汲汲於采卷耳也四章甚言臣下之勤勞也案此詩之序以為后妃當輔佐君子求賢審官知臣下之勤勞朝夕思念至於憂勤而歸本於后妃之志如此其説始於左氏自漢唐宋諸儒及朱子舊説俱從之至撰集傳則斷以為后妃懷文王以婦人不預外事也其論固正然詩人特詠其情如此耳非果預外事也理亦可通卷耳四章章四句集傳此亦后妃所自作可以見其貞靜專一之至矣豈當文王朝會征伐之時羑里拘幽之日而作歟然不可考矣集説輔氏廣曰先生又嘗曰此詩後三章只是承首章之意欲登髙望逺而往從之則僕馬皆病而不得往故欲酌酒以自解其憂傷耳大意與草蟲詩相似劉氏瑾曰后妃託言方采卷耳而適思君子則遂不能復采欲望君子而僕馬不前則且飲酒解憂可見其心之貞靜而不動於邪情之專一而不失其常矣至其自言不永懷傷者又合所謂哀而不傷之意乃其情性之正發見於一端者參之關雎首章樂而不淫則又可備見其情性全體也又案羑里先儒以其地在相州鄴都因羑水得名昔紂信崇侯虎之譖囚文王於此文王因作拘幽操南有樛居糾反木葛藟力軌反纍力追反之樂音洛只之氏反君子福履綏之集傳興也南南山也木下曲曰樛藟葛類陸氏璣曰藟一名巨苽似燕薁亦延蔓生孔氏穎逹曰藟與葛異亦葛之類也纍猶繫也陸氏德明曰纍纒繞也只語助辭君子自衆妾而指后妃猶言小君內子也朱子曰夫人稱小君大夫妻稱內子妾謂嫡曰女君則后妃有君子之德固可以君子目之問君子作后妃亦無害否曰以文義推之不得不作后妃若作文王恐太隔越了履祿綏安也嚴氏粲曰動罔不吉謂之福履后妃能逮下而無嫉妒之心故衆妾樂其德而稱願之曰南有樛木則葛藟纍之矣樂只君子則福履綏之矣集説楊氏時曰婦人無嫉妒之行容有勉而至者無嫉妒之心則性之也故以樛木況之樛與性俱生非矯揉而然李氏樗曰詩序言能逮下逮與吕刑羣后之逮在下同后妃能逮下衆妾得進御於君以成肅雍之治福祿所以綏之也王氏質曰木曲易引蔓人卑易引福輔氏廣曰此詩雖是興體然亦兼比意與關雎同故鄭氏以為木枝以下垂之故葛藟得纍而蔓之喻后妃能以惠下逮衆妾故衆妾得上而事之也案鄭箋云樂只君子猶樂是君子孔疏云所以樂得君子者以內和而家治則天下化之四方感德樂事文王而此為福祿所安也歐陽修曰后妃不嫉妒下其意以和衆妾衆妾得附之而並進君子云樂只君子者衆妾愛樂其君子之辭也蘇轍吕祖謙嚴粲輩亦皆宗其説以為君子指文王獨朱子以君子指后妃為切實而引小君內子之文為證蓋體貼詩之本文以説詩故其義為優爾南有樛木葛藟荒之樂只君子福履將之集傳興也荒奄衣檢反也吕氏祖謙曰荒芘覆也黃氏佐曰葛藟之性必出木杪故能芘覆也將猶扶助也孔氏穎達曰福履將之毛以為福祿所大鄭以為福祿之所扶助鄒氏泉曰掩庇之遍為荒將者思若或啓之而使開發行若或翼之而使順適集説汪氏應蛟曰人之所樂天之所助也南有樛木葛藟縈烏營反之樂只君子福履成之集傳興也縈旋成就也鄒氏泉曰旋繞之周為縈成者言諸福之物可致之祥莫不畢至有純全悠久之意顧氏起元曰成言自始至終自大至小其福無不成就總論輔氏廣曰三章皆有淺深其美也無夸辭其禱也無侈説此又可見衆妾性情之正也徐氏光啓曰天保定爾亦孔之固綏也自天祐之吉無不利將也綏以多福俾緝熙于純嘏成也顧氏夢麟曰三章大旨以稱願不已為義黃才伯謂稱者稱其所已然德也願者願其所未然福也樛木三章章四句集説黃氏櫄曰此文王雍雍在宫時也中庸曰無憂者其惟文王乎中庸形容其父子之美而此詩形容其閨門之美中庸言其無憂而此詩言其和樂吁此文王所以聖歟鄧氏元錫曰樛木關雎之報也后妃逮下無妒忌之心和平極矣天地和而萬物生至和召祥福履綏將且成焉螽斯得無應乎宜繩蟄矣螽音終斯羽詵詵所巾反兮宜爾子孫振振音真兮集傳比也螽斯蝗屬長而靑長角長股能以股相切作聲一生九十九子毛氏萇曰螽斯蚣蝑也孔氏穎逹曰此言螽斯七月云斯螽文雖顛倒其實一也陸璣疏云幽州人謂之舂箕朱子曰詩中有以斯為語辭者如鹿斯露斯之類然七月詩乃云斯螽動股則恐螽斯是名也詵詵和集貌爾指螽斯也振振盛貌比者以彼物比此物也后妃不妒忌而子孫衆多故衆妾以螽斯之羣處和集而子孫衆多比之言其有是德而宜有是福也後凡言比者放此朱子曰子孫振振是説螽斯之子孫不是説后妃之子孫蓋比詩多不説破這意然亦有説破者此前數篇賦比興皆已備矣集説孔氏穎逹曰以螽斯之多喻后妃之子言羽者螽斯羽蟲故舉羽以言多也不妒忌則嬪妾俱進所生亦后妃之子故得衆多也言孫者協句且孫則子所生生子衆則孫亦多矣鄭氏伯熊曰婦人之德莫大於不妒忌蓋功容可勉而根於情者難自克也張氏栻曰螽斯蝗蟲之類耳而乃取之以喻后妃疑若不倫是不然詩人亦取其合於德如何耳如雎鳩亦取其德之合也左傳韓簡曰物生而後有象象而後有滋滋而後有數隂陽和氣盈天地間而萬物生焉螽斯形之微僅寸餘耳而其滋數之多凡物皆不能及其子之類聚者大小不一與他彚不亂亦不相軋且有大字小小依大之狀焉是雖微蟲實鍾大和之氣以成形以之擬后妃之德誰謂不倫也哉嚴氏粲曰螽蝗生子最多信宿則羣飛因飛而見其多故以羽言之喻子孫之衆多歸其自於后妃也此詩之意全在宜爾二字風人意在言外見后妃子孫衆多但言宜其如此使人自思其所以宜者何故而不明言之謂由不妒忌而致也朱氏道行曰説螽斯就是説后妃重詵詵字物羣則爭羣集而和乃是真和和者生理亦是生氣以是宜爾子孫螽斯羽薨薨兮宜爾子孫繩繩兮集傳比也薨薨羣飛聲毛氏萇曰薨薨衆多也王氏安石曰薨薨言其飛之衆繩繩不絶貌螽斯羽揖揖側立反兮宜爾子孫蟄蟄直立反兮集傳比也揖揖會聚也王氏安石曰揖揖言其聚之衆蟄蟄亦多意方氏應龍曰振與繩易明蟄即蟄蟲之蟄伏藏盤聚意總論吕氏大臨曰螽斯將化其羽比次而起已化而齊飛有聲既飛復斂羽而聚歷言衆多之狀其變如此也陸氏深曰螽斯之詩與樛木三章皆后妃之德也詞氣和平文義回互反覆而吟詠之則深淳醲郁之化自溢於音響節奏之餘以聲詩言之三疊之類也以聲樂言之三闋之類也而古調從可識矣郝氏敬曰於螽斯詠其羣不言和而其和可知於后妃詠其子孫多不言羣而其羣可知不直稱君子而借螽斯感歎微婉深厚悠然可想朱子謂為比是也胡氏紹曾曰此詩美周家一宫雍穆耳詩人反覆一螽而卜世卜年皆系於此螽斯三章章四句集説朱子曰不妒忌是后妃之一節關雎所論却是全體張氏栻曰后妃多子孫推本其然則由不妒忌而已故繼樛木之後黃氏櫄曰詩人以螽斯比后妃取其子孫衆多也作詩序者既曰言若螽斯又曰不妒忌則子孫衆多言若云者繼上文之辭不妒忌者乃其推本之論蓋子孫衆多者人君之福而不妒忌者婦人所難也漢明德皇后嘗以皇嗣未廣薦逹左右後宫有進幸者多加慰納宗社以隆故嘗謂大姒不妒忌而周以興思齊言大姒嗣徽音則百斯男此詩言不妒忌則子孫衆多皆是一意劉氏瑾曰管蔡世家云武王同母兄弟十人長伯邑考次武王發次管叔鮮次周公旦次蔡叔度次曹叔振鐸次成叔武次霍叔處次康叔封次𣆀季載此其多子之驗誠后妃之德所致也朱氏善曰樛木后妃不妒忌而衆妾有祝願之誠螽斯后妃不妒忌而衆妾美其子孫有衆多之盛蓋正家之道始於閨門尊卑貴賤之分雖不可以不嚴然必上無嫉妒之心則下無怨恨之意和氣充溢瑞慶流衍福履之綏子孫之衆自有不期而然者矣桃之夭夭於驕反灼灼其華芳無呼瓜二反之子于歸宜其室家古胡古牙二反集傳興也桃木名華紅實可食夭夭少好之貌灼灼華之盛也嚴氏粲曰灼灼鮮明貌木少則華盛孔氏穎達曰夭夭言桃之少灼灼言華之盛桃或少而未華或華而不少此詩夭夭灼灼並言之則是少而有華者故辨之言桃有華之盛者由桃少故華盛以喻女少而色盛也徐氏常吉曰桃之為木多華然五年則老老則華減故以木少華盛為言之子是子也此指嫁者而言也婦人謂嫁曰歸何氏休曰婦人生以父母為家嫁以夫為家故謂嫁曰歸周禮仲春令會男女鄭氏康成曰隂陽交以成昏禮順天時也然則桃之有華正昏姻之時也蔡氏卞曰桃先百果而花故從兆其時則春而陽中也故以紀昏姻之時正宜者和順之意室謂夫婦所居家謂一門之內毛氏萇曰于往也宜以有室家無踰時者鄭氏康成曰宜者謂男女年時俱當王氏志長曰宜其室家則室家皆得其宜也左傳曰男有室女有家室家謂夫婦也文王之化自家而國男女以正昏姻以時故詩人因所見以起興而歎其女子之賢知其必有以宜其室家也集説孔氏穎達曰傳以桃之夭夭言其少壯宜其室家為不踰時則上句言其年盛下句言嫁娶得時也張氏栻曰此言興也然興之中有比焉惟比意輕於興則謂之興而已詩中若此者蓋多也輔氏廣曰仲春之月天地之氣既如此其融和而草木之花又如此其襛盛先王於此時而令會男女以成昏姻宜矣文王之化始於家故天下亦先有此應婦人之賢莫大於宜家使一家之人相與和順而無一毫乖戾之心始可謂之宜矣朱氏公遷曰木少則華盛女賢則家和亦有相因之義黃氏佐曰宜室是必敬必戒無違夫子宜家是克孝克慈不違老幼皆間於婦道也因其往嫁之賢知其已嫁之善夫婦相與必有和樂而恭敬存焉非被文王之化其能然乎徐氏光啓曰詩人所見者嫁以時耳何以遽知其賢蓋被化之深風俗素美閨門素飭可望而知其為宜家之婦矣桃之夭夭有蕡浮雲反其實之子于歸宜其家室集傳興也蕡實之盛也毛氏萇曰蕡實貌非但有華色又有婦德羅氏願曰麻實謂之蕡麻於植物中最多子實之多興其德之厚朱氏道行曰凡華艷者鮮實桃夭不然春開夏結其實多而味美故曰有蕡其實彼于歸者之有子似之家室猶室家也桃之夭夭其葉蓁蓁側巾反之子于歸宜其家人集傳興也蓁蓁葉之盛也毛氏萇曰蓁蓁至盛貌有色有德形體至盛也家人一家之人也毛氏萇曰一家之人盡以為宜鄭氏康成曰家人猶室家也朱子曰室家家室家人變文以叶韻耳總論張氏栻曰乖爭之風始於閨門至使萬物不得其所而況昏姻之能以時乎此意蓋深逺矣吕氏祖謙曰灼灼其華因時物以發興也既詠其華又詠其實又詠其葉非有他義蓋反覆歌詠之耳黃氏櫄曰之子于歸宜其室家又曰宜其家室又曰宜其家人此則形容其男女以正之義也如不待父母之命媒妁之言則非所謂宜也大學云宜其家人而後可以教國人則知宜之一字亦見男女以正之意許氏謙曰詩人見親迎者而作此詩自華而有實又見其葉之盛蓋自仲春至於春暮非一時也而皆曰之子于歸所見非一女矣宜其家之德則同也可見文王之化行於近逺女子皆有德之人則於其至家又胥教訓風俗安得不厚乎附録孔氏穎逹曰作桃夭詩者后妃之所致也男女以正昏姻以時周南之國無鰥獨之民焉此雖文王化使之然亦由后妃內贊之致故因上螽斯后妃不妒忌後言其所致也且言致從家至國亦自近致逺之辭也王氏安石曰后妃處乎重闈深密之地而四方之廣家人婦子服化者正其本而已朱氏善曰之子之所謂宜猶后妃之所謂淑然淑以其德之藴於中者言宜以其效之著於外者言惟其有是德故可必其有是效也宜者和順之意和則不乖順則無逆此非勉強所能也必孝不衰於舅姑敬不違於夫子慈不遺於卑幼義不咈於夫之兄弟而後可以謂之宜也然由后妃教化倡於上之子則效應於下故于歸之際見者知其必有以宜室宜家焉此亦可以觀感應之機矣案文王之聖治莫先於正家后妃之淑德莫盛於不妒忌由宫閫而逹於閭閻風化之美有不知致而致之者詩序主於后妃朱傳主於文王意各專重而道實相成也桃夭三章章四句集説陸氏深曰桃夭之善善時也大抵女子之失身由於失時一失其身則淫蕩猜二之情有終其身而不自宜者矣況能宜其室家乎后妃內助文王以成齊家治國之化既無強暴侵凌以奪其守又無凶荒札厲以奪其時雖中人之性皆可跂及於善道也故因桃夭起興而所感者深矣馮氏復京曰案朱傳宗鄭義以桃夭為昏姻之候今人多用其説不知毛鄭二義合之則兩得離之則兩偏也為毛説者以秋冬為期孔子家語云霜降而婦功成嫁娶者行焉冰泮而農桑起昏禮殺於此孫卿韓嬰皆曰霜降逆女冰泮殺止為鄭説者以二月為期夏小正曰二月綏多女士綏安也冠子取婦之時也月令仲春祀郊禖蓋玄鳥生乳之月以為嫁娶之候天子重之而祀焉白虎通曰嫁娶以春何也春天地始通隂陽交接之時也凡此諸書皆二家證據未易評定得失然鄭本據媒氏之文愚請即以周禮正之媒氏云仲春令會男女奔者不禁司男女之無夫家者而會之蓋時至仲春則農桑已起昏期過晚故不禁奔者或無夫家則司而會之若正為昏姻之時而復不禁奔豈禮也哉據荀卿云霜降逆女冰灃殺止其意謂九月至二月皆可昏也此近得其實矣肅肅兔罝子斜反又子余反與夫叶椓之丁丁陟耕反赳赳武夫公侯干城集傳興也肅肅整飭貌毛氏萇曰肅肅敬也焦氏延夀曰兔罝之容不失其恭歐陽氏修曰肅肅嚴整貌輔氏廣曰肅肅亦有嚴敬之意罝罟也爾雅兔罟謂之罝李氏巡注兔自作徑路張罝捕之也丁丁椓杙聲也爾雅樴謂之杙李氏巡注杙謂橛也許氏慎曰擊橛於地中張罝其上也孔氏穎逹曰此丁丁連椓之故知椓杙聲故伐木傳亦云丁丁伐木聲赳赳武貌輔氏廣曰赳赳是緊敏強立之義干盾也干城皆所以扞外而衛內者毛氏萇曰干扞也孔氏穎達曰扞蔽如盾防守如城化行俗美賢才衆多雖罝兔之野人而其才之可用猶如此故詩人因其所事以起興而美之而文王德化之盛因可見矣問兔罝詩作賦看得否朱子曰亦可但其辭上下相應恐當為興然亦是興之賦也集説鄭氏康成曰罝兔之人鄙賤之事猶能恭敬則是賢者衆多也干也城也皆以禦難也此罝兔之人賢者也有武力可任為將帥之德諸侯可任以國守扞城其民折衝禦難於未然范氏處義曰干城言扞衛公侯所謂隱若長城是也詩人偶見施兔罝者肅肅然嚴整椓杙之聲丁丁然可聞則非逺人之地因是知其人赳赳然勇而難犯移此心為公侯之扞衛有何不可公侯猶言國君朱子曰聞橛杙之聲而視其人甚勇可為干城者也田野之人皆有可用之才足以見賢才衆多矣此詩極其尊稱不過曰公侯而已亦文王未嘗稱王之一驗也凡雅頌稱王者皆追王後所作耳膽欲大而心欲小戰戰兢兢如臨深淵方能為赳赳武夫公侯干城之事黃氏櫄曰武夫以勇力自恃風化所難至也今兔罝之人亦有至誠恭敬之心愛民忠君之德以見風化之所及人者深耳嚴氏粲曰可為公侯之干城言勇而忠也唐氏汝諤曰干城非止以用武言以彼其才即今可為公侯之保障非擬他日為公侯之用也陸氏化熙曰赳赳不必謂是椎魯少文肅肅兔罝施于中逵赳赳武夫公侯好仇叶渠之反集傳興也逵九逹之道爾雅九達謂之逵郭氏璞注四道交出復有旁通者劉氏瑾曰中逵謂九逹之道中也仇與逑同匡衡引關雎亦作仇字公侯善匹猶曰聖人之耦則非特干城而已歎美之無已也下章放此集説孔氏穎達曰毛以為赳赳然有威武之夫有文有武能匹耦於公侯之志為公侯之好匹范氏處義曰好仇為公侯之善耦是也詩人偶見施兔罝者於山間之道稍逺人迹而肅肅然嚴整與初無異因是知其人赳赳然勇而有守移此心為公侯之仇耦有何不可朱子曰好仇是善匹言其才德相合處嚴氏粲曰可謂公侯之善匹言勇而良也鄒氏泉曰九逵兔所往來之地故設罝於此好仇即元首明股肱良有是君有是臣之謂所謂聖人有作此其為聖人之耦有王者起此其為王者之佐是也肅肅兔罝施于中林赳赳武夫公侯腹心集傳興也中林林中爾雅野外謂之林許氏愼曰平土有叢木曰林腹心同心同德之謂則又非特好仇而已也集説孔氏穎逹曰臣之倚用如己腹心王氏安石曰中林人莫之聞見也欲觀好德之實其在於處隱乎范氏處義曰腹心言公侯之謀臣所謂作朕心膂是也詩人偶見施罝者於中林幽深之處而肅肅然嚴整不以人所不聞不見而少懈由是知其赳赳然勇而不欺移此心以為公侯之腹心有何不可朱子曰注云同心同德是言其才德與己無異嚴氏粲曰謂機密之事可與之謀慮言勇而智也季氏本曰以守禦武夫而其德猶如是見周南之世賢者在位能者在職而所謂才者皆本於德也豈專以勇力為武者哉總論歐陽氏修曰捕兔之人布其網罟於道路林木之下肅肅然嚴整使不能越送以興周南之君列其武夫為國守禦赳赳然勇力使姦民不得竊發而此武夫者外可以扞城其民內可以為公侯好匹其忠信又可倚以為腹心以見周南之君好德樂善得賢衆多所任守禦之夫猶如此也蘇氏轍曰丁丁人所聞也中逵人所見也中林聞見所不及也而猶肅肅焉則敬其事也至矣張氏栻曰和平之風致使兔罝之人亦興其好德之彝性則固有不言而信不疾而速者其要在於修身以齊家而已吕氏祖謙曰曰干城曰好仇曰腹心其詞浸重亦歎美無己之意也胡氏紹曾曰此詩人深知公侯又即武夫而直觀其表裏看此氣象真是天地開賢人出且當時才力大略可見西伯武功亦有可想案古者文武同揆兵民合一所以推干戈以屬人而無意外之慮也六官之長即六軍之將鄉遂之民即卒伍之士降至春秋之世霸國之用其民也猶曰民未知義未安其教民未知禮未生其共故衆心成城緩急足恃文王教化之行至於兔罝之野人而足為天好仇足為腹心所以以戰則克以綏則威而無敵於下也兔罝三章章四句集説范氏處義曰二南為風化之首所謂化者謂變易其心思矯揉其氣習暴者仁薄者厚愚者靈而感者解其感發之機與天地同其妙詩人多取人之難化者言之以明二南風化之效兔罝其一也輔氏廣曰文王之時固多賢者此特言武夫者見其無所不備也且文王於武事尚矣觀此及棫朴所謂六師及之者亦可見當時俗尚之萬一夫三分天下有其二雖是德化之盛而天下歸之然遏密侵阮伐崇戡黎之後其於武事大略可觀矣朱氏善曰以武夫而才可以為干城德可以為好仇為腹心是何人才之盛哉蓋幸而遇聖人之世又幸而生聖人之國則其涵濡聖人之化固宜其成就之若此也棫朴之詠文王曰豈弟君子遐不作人旱麓之詠文王曰周王壽考遐不作人是人才之作興固本之文王之德尤本之文王之夀也有文王之德故其造就之也速有文王之壽故其涵養之也深雖以兔罝之野人而其才德之美若此則其在官使者從可知矣附録金氏履祥曰案墨子書文王舉閎夭泰顚於罝網之中授之政西土服此與兔罝之詩辭意吻合計此詩必為此事而作也夫肅肅敬也赳赳約也罝兔而體貌有肅敬之容武夫而步伐有約束之度此閎夭泰顛之所以為賢而文王所以取之也閎夭泰顛為文王奔走疏附禦侮之友後為武王將威劉敵之人信哉其為公侯之干城好仇腹心者歟采采芣音浮苡音以薄言采叶此禮反之采采芣苡薄言有叶羽己反之集傳賦也芣苡車前也大葉長穗好生道旁爾雅芣苡馬舄馬舄車前韓氏嬰曰直曰車前瞿曰芣苡生於兩旁者為瞿陸氏璣曰車前一名當道喜在牛迹中生故曰車前當道也采始求之也有既得之也毛氏萇曰采采非一辭也問傳曰有藏也然下章曰掇曰捋曰袺曰襭首章乃先言藏恐非其序朱子曰首章舉始終後章述次序詩亦有此例輔氏廣曰求其所生之處曰采得其所生之處曰有化行俗美家室和平婦人無事相與采此芣苡而賦其事以相樂也采之未詳何用或曰其子治産難毛氏萇曰宜懷任焉陸氏璣曰藥中車前子是也幽州人謂之牛舌草可鬻作茹大滑其子治婦人難産陸氏佃曰神仙服食法曰車前之實雷之精也善療孕婦難産及令人有子輔氏廣曰芣苡陸璣以為治難産而先生取之者蓋以今醫治難産者用其子故也毛氏以為宜懷任者亦只是陸璣之意非謂其能治人之無子也集説嚴氏粲曰芣苡宜懷妊故婦人有子則采之采采非一采矣而又采之喜樂之深也有言采而得之為己所有也黃氏佐曰首章方去采時事也蓋以門庭之內幸無係纍而機杼之外尚有餘間乃相與采此芣苡始焉眩於求也薄言采之既而真於遇也薄言有之采采芣苡薄言掇都奪反之采采芣苡薄言捋力活反之集傳賦也掇拾也捋取其子也沈氏守正曰子之在地者拾之未落者捋之也徐氏鳳彩曰掇者芣苡之子在穗故拾其穗捋者芣苡之用在子故取其子集説嚴氏粲曰采而聚之於地既為已有於是就地掇拾之既掇拾之又捋其子黃氏佐曰此章正是采芣苡時事也既求而得之矣於是穗可拾也薄言拾其穗於是子可取也薄言取其子掇之捋之兼收並蓄殆取諸物而有餘矣采采芣苡薄言袺音結之采采芣苡薄言襭户結反之集傳賦也袺以衣貯之而執其衽也襭以衣貯之而扱其衽於帶間也孔氏穎達曰釋器云執衽謂之袺孫炎曰持衣上衽又云扱衽謂之襭李巡曰扱衣上衽於帶劉氏瑾曰衽者衣之襟也帶者腰之帶也集説黃氏佐曰此章既采而攜以歸時事也采之既多非掬之所能容以衣貯之而執其衽於手中非手之所能執以衣貯之而扱其衽於帶間袺之襭之可謂不厭矣總論孔氏穎達曰天下和平婦人始樂有子三章皆樂有子之事也此三章頻言采采見其采者多也明非一人而為此六事而已楊氏時曰后妃無嫉妒之心則和平矣惟其和平則天下化而和平則婦人以有子為樂矣芣苡和平之詩也天下和平非文辭形容所能及故每章言采采而已無他詞也黃氏櫄曰和平説者以為天下和平迂仲以為不如程氏曰家室之和平豫以為始於室家之和平而極於天下之和平二説一説也易曰感人心而天下和平后妃不妒忌於閨門之中而風化及於天下之夫婦豈非有以感人心而然乎治世之音安以樂其政和尤於此詩而見之黃氏震曰芣苡諸家皆以為治妊蓋因詩序樂有子之言也戴氏謂此詩見一時同輩相與之樂此語蓋得其氣象劉氏瑾曰自采之至襭之有無多寡之序如此許氏謙曰朱子之説謂化行俗美家室和平蓋教化流行風俗淳美夫夫婦婦各得其宜莫不遂其生生之道故婦人以有子為樂而同賦此詩也黃氏佐曰芣苡微物也而相與采之采物細事也而相與賦之家室和平之樂固溢於采物之餘而廣大自得之風自暢於行歌之外成周太和氣象不亦可想見哉此亦文王家齊國治之效郝氏敬曰此詩本詠王者化國之日不言朝野士庶而言婦人不及織紝女工而託詠采芣苡詩之所以善於言也芣苡三章章四句集説王氏肅曰自關雎至芣苡房中之樂吳氏師道曰此詩終篇言樂不出一樂字讀之自見意思陸氏深曰案此詩凡三章章四句四言總之為四十八字內用采采字凡十三芣苡字凡十二薄言字凡十二除為語助者才餘五字耳而敘情委曲從事始終與夫經行道途招邀儔侣以相容與之意藹然可掬天下之至文也即此亦可以見其和平矣鄧氏元錫曰芣苡葛覃之感也志和而音平南有喬木不可休息吳氏曰韓詩作思漢有遊女不可求思漢之廣叶古曠反矣不可泳叶于誑反思江之永叶弋亮反矣不可方叶甫妄反思集傳興而比也上竦無枝曰喬爾雅曰小枝上繚為喬思語辭也篇內同孔氏穎逹曰疑息字作思詩之大體韻在辭上疑休求為韻二字俱作思漢水出興元府皇輿表今陜西漢中府嶓冡山至漢陽軍皇輿表今湖廣漢陽府大别山入江江漢之俗其女好遊漢魏以後猶然如大堤之曲可見也劉氏瑾曰大堤漢水之堤大堤曲宋隨王誕為襄州時作樂府遺聲都邑三十四曲有大堤曲泳潛行也江水出永康軍皇輿表今四川成都府灌縣岷山東流與漢水合東北入海永長也方桴也許氏謙曰漢言廣謂橫渡也江言永謂沿泝也文王之化自近而逺先及於江漢之間而有以變其淫亂之俗故其出遊之女人望見之而知其端莊靜一非復前日之可求矣因以喬木起興江漢為比而反覆詠歎之也劉氏瑾曰上四句以喬木不可休對遊女不可求而言故屬興下四句但言漢廣不可泳江永不可方以比貞女不復可求之意而不説其所比之事故屬比此其興比體製之殊備見於一章之內後凡言興與比者其文意亦皆倣此章云集説鄭氏康成曰紂時淫風遍於天下惟江漢之域先受文王之教化不可者本有可道也木以髙其枝葉之故故人不得就而止息也興賢女雖出遊流水之上人無欲求犯禮者亦由貞潔使之然漢也江也其欲渡之者必有潛行乘泭之道今以廣長之故故不可也又喻女之貞潔犯禮而往將不至也孔氏穎逹曰此言遊女尚不可求則在室無敢犯禮可知也出者猶能為貞處者自然尤潔內則云女子居內深宫固門閽寺守之則貴家之女也庶人之女則執筐行饁不得在室故有出遊之事既言不可求明人無求者程子曰漢廣言文王之道南被江漢之域因取漢水為興水之為限不可踰也禮義之為間不可犯也南國被文王之化家齊俗厚婦人知守禮義既以禮義為防則非僻之思自絶雖有以非禮求之者亦不可得而犯也不可得而犯則不思犯矣夫人之休於木下必攀枝跛倚喬木不可攀及也故人絶欲休之思興女有髙潔之行非禮者自無求之之思也漢之廣不可泳以濟江之永不可方而渡興以禮自間不可侵凌也女之遊者謂曠僻獨行可動之地異乎閨門之內姆傅之側也李氏樗曰此章言漢廣不可泳江永不可方作詩者是在江漢合流之處也朱子曰主意只説漢有遊女不可求思兩句餘六句是反覆比興説如奕奕寢廟至遇犬獲之上下六句亦只興出他人有心豫忖度之兩句黃氏櫄曰居周南者因漢水而起興故作漢廣之詩自文王而言之則謂之德謂之道自其所及者言之則謂之化嚴氏粲曰詩人偶見漢上遊女人無凌犯之心紂之淫風已變由文王風化所及故假此遊女以起義耳男子見遊女自無犯禮之思後序謂求而不可得非也朱氏善曰言今日之不可求則知前日之可求矣前日之可求衰世之俗也今日之不可求聖人之化也夫觀聖人之化不於其他而必於江漢之遊女何也曰天下之治正家為先録一漢廣以見天下之家正也天下之家正而天下治矣非被聖人之化而能若是哉翹翹祈遙反錯薪言刈其楚之子于歸言秣其馬叶滿蒲反漢之廣矣不可泳思江之永矣不可方思集傳興而比也翹翹秀起之貌錯雜也楚木名荆屬孔氏穎逹曰薪木稱月令云收秩薪柴注云大者可柝謂之薪下章蔞草亦言薪者因此通其文楚亦木名王風鄭風並云不流束楚是也之子指遊女也秣飼也毛氏萇曰六尺以上曰馬以錯薪起興而欲秣其馬則悅之至以江漢為比而歎其終不可求則敬之深集説鄭氏康成曰楚雜薪之中尤翹翹者我欲刈取之以喻衆女皆貞潔我又欲取其尤髙潔者之子是子也謙不敢斥其適己于是子之嫁我願秣其馬致禮餼示有意焉歐陽氏修曰願秣其馬此悅慕之詞猶古人言雖為執鞭猶欣慕焉者是也既述此意矣末乃極陳男女之情雖有而不可求則見文王之政化被人深矣程子曰之子者若得之以歸則言秣其馬矣惟其禮法之限不可得也不止無非禮之私思又知其端直之美而願慕之也蘇氏轍曰此知女子之不可犯而思以禮道之之辭也輔氏廣曰悅之至敬之深則可見其性情之正也悅之不敬則便放佚矣何氏楷曰秼馬謂親迎也言人若欲娶此女必待秣馬以行親迎之禮庶可耳寧可以非禮干之哉翹翹錯薪言刈其蔞音閭之子于歸言秣其駒漢之廣矣不可泳思江之永矣不可方思集傳興而比也蔞蔞蒿也葉似艾靑白色長數寸生水澤中孔氏穎逹曰蔞一名蔏蔞郭云蔏蔞蔞蒿也生下田初生可啖江東用羮魚也陸璣疏云生食之香而脆美其葉又可蒸為茹駒馬之小者毛氏萇曰五尺以上曰駒集説王氏質曰秣馬秣駒皆遊子欲求遊女之意卒有所抑畏而止言不可犯也陶氏所謂激清音以感余願接膝以交言欲自往以結誓懼冒禮之為愆徐氏鳳彩曰樵薪者即刈蔞猶以為幸興嘉會者即秣駒亦以為榮總論輔氏廣曰三章之末皆終之以不可求之意所謂言之詳辭之復所以見其敬慕有不能自己之意也沈氏守正曰三章無淺深各上四句是欽慕其德下四句是沮息其干求也漢廣三章章八句集説孔氏穎逹曰作漢廣詩者言文王之道初致桃夭芣苡之化今被於南國美化行於江漢之域故男無思犯禮女求而不可得此由德廣所及然也此與桃夭皆文王之化后妃所贊於此言文王者因經陳江漢指言其處為遠辭遂變后妃而言文王為逺近積漸之義南國六州也不言周南者以天子事廣故直言南也鄭氏樵曰周為河洛召為岐雍河洛之南瀕江岐雍之南瀕漢江漢之間二南之地詩之所起在於此屈宋以來騷人辭客多生江漢故仲尼以二南之地為作詩之始朱子曰漢廣汝墳諸詩皆是説婦人豈是文王之化只化及婦人不化及男子只看他意恁地拘不得漢廣遊女求而不可得行露之男不能侵凌貞女豈當時婦人蒙化而男子則非亦是偶然有此樣詩説得一邉耳黃氏櫄曰此正文王風化自北而南之時沈氏守正曰二南詩當作兩項看岐周久被文王之化其民忘故詩多熙皞而平桃夭芣苡之類是也南國新變淫慝之風其心悔故詩多湔洗而露江漢行露之類是也召南之所以不同於周南亦然一采之都內一得之列國故也王氏志長曰案漢廣四語意象宏遠神理深微商季淫風未殄乃關雎化洽頓令漢濵遊女覿面有難犯之色采風者推厥所自恍見王風過化存神難以思議真有若漢廣之不可泳江永之不可方者反覆長歌此其所以謂之風也不然遊女既不可求而見者獨流連低徊則是篇乃後世髙唐洛神一流文耳何以為周南乎遵彼汝墳伐其條枚叶莫悲反未見君子惄乃歷反如調張留反飢集傳賦也遵循也汝水出汝州天息山徑蔡潁州入淮皇輿表宋汝州今河南汝州宋蔡州今河南汝寧府宋潁州今江南鳳陽府潁州墳大防也孔氏潁達曰墳謂崖岸狀如墳墓名大防也常武注云水崖曰墳則此墳謂汝水之側崖岸大防也枝曰條幹曰枚孔氏穎達曰木大不可伐其幹取條而已枚細者可以全伐之也惄飢意也孔氏穎逹曰釋詁云惄思也釋言云惄飢也然則惄之為訓本為思耳但飢之思食意又惄然故又以為飢惄是飢之意非飢之狀故傳言飢意箋以為思義相接成也以思食比思夫故箋又云如朝飢之思食調一作輖重也王氏安石曰調飢飢而又飢飢之甚也汝旁之國亦先被文王之化者故婦人喜其君子行役而歸因記其未歸之時思望之情如此而追賦之也集説歐陽氏修曰周南大夫之妻出見循汝水之墳以伐薪者為勞役之事念己君子以國事奔走於外者其勤勞亦可知思之欲見如飢者之思食爾程子曰君子從役於外婦人為樵薪之事遵彼汝墳伐其條肄以自反既見君子不我遐棄集傳賦也斬而復生曰肄孔氏穎達曰肄餘也左傳曰晉國不恤宗周之闕而夏肄是屏又曰杞夏餘也是肄為復生之餘遐遠也伐其枚而又伐其肄則踰年矣至是乃見其君子之歸而喜其不逺棄我也集説鄭氏康成曰己見君子君子反也於己反得見之知其不逺棄我而死亡於思則愈故下章勉之孔氏穎達曰婦人以君子處勤勞之職恐避役死亡今既得見知不逺棄我也黃氏櫄曰李迂仲辨以為庶人之妻非大夫之妻豫以為詩人之意不在此蓋此篇之意其所以起興者皆在於條枚條肄之句枝曰條幹曰枚旁之斬而明年復生曰肄託此以見其行役之久也方其夫行役之時見其人之伐其條枚則思念之情已不能自己今又見伐其條肄矣歷時若是之久矣庶幾見其不逺棄我也詩人之意大抵如此蓋言其歲復歲而君子行役之未歸也意豈在於伐薪之事哉黃氏佐曰别離之久而遂契濶之約即是不遐棄也魴符方反魚赬敕貞反尾王室如燬音毁下同雖則如燬父母孔邇集傳比也魴魚名身廣而薄少力細鱗陸氏璣曰魴一名魾江東呼為鯿赬赤也魚勞則尾赤魴尾本白而今赤則勞甚矣孔氏穎達曰魴魚之尾不赤故知勞則尾赤左傳如魚赬尾衡流而倣徉鄭氏云魚肥則尾赤此自魴魚尾本不赤赤故為勞也王室指紂所都也燬焚也父母指文王也孔甚邇近也是時文王三分天下有其二而率商之叛國以事紂故汝墳之人猶以文王之命供紂之役朱子曰傳云文王率商叛國以事紂蓋天下歸文王者六州惟靑兖冀屬紂耳張氏栻曰玩此詩則民雖怨乎紂而尚以周之故未至於泮散也是文王以盛德為商之方伯與商室係民心而維宗社者也其家人見其勤苦而勞之曰汝之勞既如此而王室之政方酷烈而未已雖其酷烈而未已然文王之德如父母然望之甚近亦可以忘其勞矣此序所謂婦人能閔其君子猶勉之以正者蓋曰雖其别離之久思念之深而其所以相告語者猶有尊君親上之意而無情愛狎昵之私則其德澤之深風化之美皆可見矣一説父母甚近不可以懈於王事而貽其憂亦通劉氏向曰周南大夫受命平治水土過時不來其妻恐其懈於王事言國家多難惟勉強之無有譴怒貽父母憂乃作詩劉氏辰翁曰父母行役者之父母也集説鄭氏康成曰君子仕於亂世顔色瘦病如魚勞則尾赤所以然者畏王室之酷烈是時紂存辟此勤勞之處或時得罪父母甚近當念之以免於害孔氏穎逹曰箋言君子仕於亂世不斥大夫士王肅云當紂之時大夫行役王基云汝墳之大夫久而不歸樂詳等皆云大夫則箋云仕於亂世是為大夫矣若庶人之妻杕杜言我心傷悲伯兮則云甘心首疾憂思皆在於情性豈有勸於德義恐其死亡若是乎序稱勉之以正則非庶人之妻言賢者不宜勤勞則又非為士周南召南述本大同而殷其靁召南之大夫遠行從政其妻勸以義此引父母之甚近傷王室之酷烈閔之則恐其死亡勉之則勸其盡節比之於殷其靁志遠而義髙大夫妻於是明矣雖王者之風見感文王之化但時實紂存文王率諸侯以事殷故汝墳之國大夫猶為殷紂所役李氏樗曰文王之化非獨能使士大夫從於征役以勉於王事亦能使婦人勉其夫以正此足以見文王之化盛也王氏質曰王室在衛近汝雖可畏不可往然以近父母為懷亦差慰也此徵役渡河趣都者人情所不欲其妻勉以君民之分父母之情蓋賢婦人也段氏昌武曰勞苦莫難堪於身嘗之久而嗟恨猶深於痛定之餘安其酷於無可奈何而寄其心於文王樂以忘憂也沈氏守正曰二年行役夫婦相見形容色澤必有改常者故以赬尾喻之而歎所以致此者以王室之如燬銷鑠之也周在西北汝墳在極南而云孔邇者文王之德漸被暨及人遠而澤近也總論王氏安石曰前二章篤於夫婦之仁後一章篤於君臣之義黃氏櫄曰文王事商出於誠然而不以一毫之偽介乎其間至誠之理可以通金石化豚魚故雖汝墳之婦人亦皆以文王之故而化其怨紂之心輔氏廣曰未見君子惄如調飢思望之情也既見君子不我遐棄喜幸之意也雖則如燬父母孔邇慰勉之辭也未見而思既見而喜發乎情也終勉之以正止乎禮義也此可見其情性之正矣劉氏瑾曰婦人之伐枚伐肄則别其夫之久矣惄如調飢則念其夫之深矣然其久别於行役之勞宜有怨上之意相見於深思之餘宜有情昵之私今乃有親上之語以相慰則可見文王德澤之深而其無情昵之私言則又可見文王風化之美也汝墳三章章四句集説陳氏傅良曰汝墳是已被文王之化者江漢是聞文王之化而未被其澤者朱氏公遷曰漢廣變淫風汝墳識公義二詩見淺深之間朱氏善曰周南十一篇而南國之詩僅居其二何也曰漢廣汝墳之間是非一國也而其被聖人之化則一而已矣不録則無以見其風俗之美盡録則又有不勝其可録者焉故録一漢廣以見其德之端莊其性之靜一者非特一女而已也録一汝墳以見其意之忠厚其志之專慤者又非特一行役之婦人而已也是時王化自北而南故觀於桃夭而見化之行於國中者如此觀於漢廣汝墳而見化之行於南國者又如此詩亦何以多為哉麟之趾振振音真公子叶奬里反于音吁嗟麟兮集傳興也鄭氏康成曰興者喻公子有似於麟麟麕身牛尾馬蹄毛蟲之長也許氏愼曰麒仁獸也麟牝麒也趾足也孔氏穎達曰必言趾者以麟是行獸以足而至故言麟之趾麟之足不踐生草不履生蟲陸氏璣曰麟色黃員蹄音中鐘吕行中規矩行必擇地詳而後處不羣居不侣行不入陷阱不罹羅網王者至仁則出振振仁厚貌吁嗟歎辭程子曰麟趾有仁厚之象既言之又歎美之曰于嗟麟兮朱子曰吁嗟麟兮指公子而言文王后妃德修於身而子孫宗族皆化於善故詩人以麟之趾興公之子言麟性仁厚故其趾亦仁厚文王后妃仁厚故其子亦仁厚然言之不足故又嗟歎之言是乃麟也何必麕身牛尾而馬蹄然後為王者之瑞哉彭氏執中曰關雎之應雖無麟而若麟之時春秋之作雖有麟而非麟之時集説蘇氏轍曰麟仁獸也其於仁也非有意為之其資之也天矣公子之賢非其身為之父母所以資之者逺矣輔氏廣曰振振毛傳以為信厚然詩內初無信意故先生從程氏以為仁厚麟趾不踐生草不履生蟲有仁厚之意也文王身修家齊后妃又有賢德而子孫宗族皆化而為善則文王雖不王而不害其為有王者之道也有王者之道則有王者之瑞故以麟之趾為興嚴氏粲曰于嗟麟兮指公子猶楚狂接輿稱仲尼曰鳳兮也瞿氏景淳曰詩只以麟之趾興公之子其文王后妃仁厚是髙一層意麟之定都佞反振振公姓于嗟麟兮集傳興也定額也孔氏穎逹曰定或作顛釋畜云的顙曰顛顛亦額也麟之額未聞或曰有額而不以抵也嚴氏粲曰有定者宜抵惟麟不然是其仁也公姓公孫也姓之為言生也王氏志長曰公姓公孫孫傳姓者也集説范氏處義曰麟有定而不抵如公姓之不忤物朱氏謀㙔曰麟神物也世不槩有以比公子公孫不世出之賢聖耳麟之角叶盧谷反振振公族于嗟麟兮集傳興也麟一角角端有肉毛氏萇曰麟角所以表其德也鄭氏康成曰麟角之末有肉示有武而不用何氏休曰麟設武偹而不為害所以為仁公族公同高祖祖廟未毁有服之親禮記同姓從宗合族屬繫之以姓而弗别注始祖為正姓髙祖為庶姓左傳衆仲曰天子建德因生以賜姓胙之土而命之氏諸侯以字為諡因以為族注諸侯位卑不得賜姓故其臣因氏其王父字或使即先人之諡稱以為族劉氏瑾曰公同髙祖與文王同髙祖也蓋亞圉之元孫文王之三從兄弟至武王時然後亞圉服盡也集説范氏處義曰麟有角而不觸如公族之不好競姚氏舜牧曰公族子孫之蕃衍成族者始公子次公孫次公族即後世所謂子孫賢族將大之意總論朱子曰興是以一箇物事貼一箇物事説如麟之趾下又便説振振公子一箇對一箇説蓋公本是一箇好底人子也好孫也好譬如麟也好定也好角也好輔氏廣曰一章言公子二章言公姓三章言公族自近而逺自狹而廣也謝氏枋得曰麟一身之間皆仁曰趾曰定曰角自下而至於上也朱氏善曰此詩見麟性之仁者其體雖不一而固無一體之不仁始焉即物以興乎人終焉因人而擬諸物麟之趾三章章三句集傳序以為關雎之應得之集説孔氏穎達曰古者太平之時以麟為瑞文王關雎之化能使宗族振振然如麟應之時無以過也此篇本意直美公子似古致麟之時大師編之以象應序者述以示法張氏栻曰麟出於上古蓋極治之日也以紂之在上而周之公子振振仁厚不減於極治之日故詩人歌之以為是乃麟也周取之以為關雎之應也嚴氏粲曰應效應也公子生長富貴宜其驕也今乃仁厚豈非關雎風化之效歟公子猶仁厚則他人可知熊氏朋來曰麟以興西伯非公子也文王時為西伯其子稱公子于嗟之歎詩人歎西伯有子知武王周公之將有為矣郝氏敬曰詩人託麟趾表聖瑞見文王修齊之化成而周道大興也周南之國十一篇三十四章百五十九句集傳案此篇首五詩皆言后妃之德關雎舉其全體而言也葛覃卷耳言其志行之在已樛木螽斯美其德惠之及人皆指其一事而言也其詞雖主於后妃然其實則皆所以著明文王身修家齊之效也至於桃夭兔罝芣苡則家齊而國治之效漢廣汝墳則以南國之詩附焉而見天下已有可平之漸矣若麟之趾則又王者之瑞有非人力所致而自至者故復以是終焉而序者以為關雎之應也夫其所以至此后妃之德固不為無所助矣然妻道無成則亦豈得而專之哉今言詩者或乃專美后妃而不本於文王其亦誤矣集説朱氏善曰周天子之國南南方諸侯之國謂之周南者修齊治平之道本之乎天子達之乎諸侯表立於此而天下無不知所取正焉法立於此而天下無不知所取則焉此化之所以行而俗之所以美也是時王道明盛國不得異政家不得殊俗故以南之一字該之則南方諸侯之風皆可得而見矣黃氏佐曰孔叢子曰孔子讀詩自周南至正雅喟然歎曰周道成矣蓋周南詩皆醇正體裁畢備此周道之所以成正雅之所由作也故孔子歎之鄧氏元錫曰王業基於岐周王化起於閨門化行而南故首周南昔者文王愼明德穆雍以刑厥家后妃配之求賢善成孝敬美德義以明章坤順關雎葛覃卷耳作焉其言不出於閨門而其究以宣教輔化順性命之理召天地之和豈非盛哉欽定詩經傳説彚纂卷一
