body:
  text: 欽定四庫全書欽定詩經傳説彚纂卷十五桑扈之什二之七交交桑扈侯古反有鶯其羽君子樂音洛胥叶思呂反受天之祜侯古反集傳興也交交飛往來之貌桑扈竊脂也許氏謙曰竊脂見小宛鶯然有文章也君子指諸侯胥語詞祜福也此亦天子燕諸侯之詩言交交桑扈則有鶯其羽矣君子樂胥則受天之祜矣頌禱之詞也集説鄭氏康成曰竊脂飛而往來有文章人觀視而愛之喻君臣以禮法威儀升降於朝廷則人亦觀視而仰樂之蘇氏轍曰君子樂循禮義以受天福夫苟樂之則其為之也安安則如固有之譬如桑扈之羽鶯然有文而不自知亦非其強之也朱氏公遷曰桑扈交飛則彼此相輝而有文人臣受燕則上下相與而獲福此以相交之益為興也朱氏謀㙔曰桑扈應候而至喻諸侯時見不違禮也張氏彩曰觀卒章兕觥其觩旨酒思柔則樂胥亦當指燕飲之時為言樂胥云者足以洽情而不逾禮也交交桑扈有鶯其領君子樂胥萬邦之屛卑郢反集傳興也領頸屛蔽也王氏安石曰屛之為物禦外以蔽內也言其能為小國之藩衛蓋任方伯連帥之職者也禮記王制千里之外設方伯十國以為連連有帥二百一十國以為州州有伯集説輔氏廣曰為諸侯者外有文章內復和樂固天子之所喜也則願其承上天之祜福為萬邦之屛翰宜矣呂氏柟曰領者上輔元首下統四體猶屛之蔽內而捍外也朱氏道行曰懷萬邦者天子也屏萬邦而捍其外患者君子之撫柔以安天子也之屛之翰叶胡見反百辟音璧為憲不戢莊立反不難叶乃多反受福不那集傳賦也翰幹也所以當牆兩邊障土者也辟君憲法也言其所統之諸侯皆以之為法也戢斂難慎那多也不戢戢也不難難也不那那也蓋曰豈不斂乎豈不慎乎其受福豈不多乎古語聲急而然也後放此劉氏瑾曰菀栁云不尚文王云不顯不時大明韓奕皆云不顯其光生民云不寧不康清廟云不顯不承以至嵩髙維天之命烈文執競皆言不顯並倣此義集説王氏安石曰戢則不肆難則不易肆則放逸易則傲慢動不以禮非所以受福故戢而難然後受福多也輔氏廣曰此章又言不獨為萬邦之屏翰其所統之諸侯又皆以其所為為法則其德亦盛矣方且戢且斂而不敢自恃其難其慎而不敢少忽則其受福又豈不多乎哉百辟為憲有期之之意不戢不難有戒之之意兕徐履反觥古橫反其觩音求旨酒思柔彼交匪敖五報反萬福來求集傳賦也兕觥爵也觩角上曲貌朱子曰觩頌作救春秋穀梁傳作觓與此字同旨美也思語詞也敖傲通交際之間無所傲慢則我無事於求福而福反來求我也集説輔氏廣曰此章又言其飲燕之時交際之間略不敢少有傲慢之意則其福祿之來又有不待於求而得之者矣彼交匪敖亦有戒意何氏楷曰君子謹守侯度位雖高而不驕情雖通而不肆雖非有意於斂福萬福皆來就而聚之易曰德言盛禮言恭謙也者致恭以存其位者也正謂此也總論鄒氏泉曰首章願其德足以得天二章言其德有以衛人三章言其在國功大而能敬足以獲福也四章言其在燕情通而能敬足以獲福也桑扈四章章四句集説陳氏櫟曰即維周之翰四國于蕃文武吉甫萬邦為憲等語參之則此為天子燕諸侯而頌禱之詩無疑也鴛鴦于飛畢之羅之君子萬年福祿宜叶牛何反之集傳興也鴛鴦匹鳥也鄭氏康成曰匹鳥言其止則相偶飛則為雙性馴耦也崔氏豹曰鴛鴦鳧類雄雌未嘗相離故謂之匹鳥畢小罔長柄者也羅罔也孔氏穎逹曰羅則張以待鳥畢則執以掩物君子指天子也此諸侯所以答桑扈也鴛鴦于飛則畢之羅之矣君子萬年則福祿宜之矣亦頌禱之詞也集説朱氏公遷曰鴛鴦于飛既畢之又羅之君子萬年既宜福又宜祿二者皆有不一而足之意故以為興唐氏汝諤曰君子萬年福祿若與君子而相宜者然故曰宜之鴛鴦在梁戢其左翼君子萬年宜其遐福叶筆力反集傳興也石絶水為梁戢斂也張子曰禽鳥並棲一正一倒戢其左翼以相依於內舒其右翼以防患於外蓋左不用而右便故也陸氏佃曰凡鳥左顧則怒作右盼則喜生飛而起則仰左翼飛而下則仰右翼故今鷙鳥下擊皆先側左翅也遐遠也久也集説朱氏道行曰鴛鴦在梁則宿而不飛矣以宿之戢左翼而舒其右以捍外興君子斂小心而久於位以無危此宜福祿根源胡氏紹曽曰鴛鴦之靜也靜亦何患君子之安安而止也與時俱息凝然以受遐福而又何不宜哉乘繩證反馬在廏音救摧采臥反之秣音末叶莫佩反之君子萬年福祿艾魚蓋反叶魚肺反之集傳興也摧莝秣粟許氏謙曰莝與摧同説文莝斬芻也秣食馬穀也艾養也蘇氏曰艾老也言以福祿終其身也亦通乘馬在廏則摧之秣之矣君子萬年則福祿艾之矣集説黃氏佐曰艾訓養如受四方之貢獻以天下奉一人是也乘馬在廏秣之摧叶徂為采臥二反之君子萬年福祿綏叶宣佳土果二反之集傳興也綏安也集説顧氏起元曰綏者無為而治恭己南面也朱氏道行曰綏訓安不專是安身舉世泰寧方是君子遐福總論輔氏廣曰鴛鴦之詩乃下禱上之辭上之禱下猶且述其德桑扈是也下之禱上則但極其頌禱之情而已鴛鴦是也若不敢有擬議其德者敬之至也鴛鴦四章章四句集説黃氏佐曰上下交而德業成觀有周盛時君以桑扈燕其臣臣以鴛鴦答其君殆與唐虞賡歌之意同也有頍缺婢反者辨實維伊何爾酒既旨爾殽既嘉叶居何反豈伊異人兄弟匪他湯何反蔦音鳥與女蘿力多反施以䜴反于松柏叶逋莫反未見君子憂心奕奕叶弋灼反既見君子庶幾説音悅懌叶弋灼反集傳賦而興又比也頍辨貌或曰舉首貌張氏彩曰許氏曰頍即古規字規為員者辨之貌也辨皮辨孔氏穎逹曰辨者冠之大名稱辨者多矣但爵辨則士之祭服韋辨則服以即戎冠辨則服以從禽非常服也惟皮辨上下通服之故知皮辨也曹氏粹中曰士之爵辨服之以祭皮辨服之以朝其在王者常朝則服皮辨而燕同姓亦服之所謂皮辨者以白鹿皮為冠其衣十五升布其裳素積嘉旨皆美也匪他非他人也蔦寄生也葉似當盧子如覆盆子赤黑甜美劉氏瑾曰本草一名寓木凡桑槲樹櫸柳楊楓等樹上皆有之此物自感造化之氣而生别是一物也沈氏萬鈳曰圗經云寄生是烏鳥食物子落枝節間感氣而生葉似橘而厚軟莖似槐皮而肥脆三四月開花黃白色六七月結實黃色如小豆女蘿兔絲也蔓連草上黃赤如金陸氏璣曰今合藥兔絲子是也非松蘿松蘿自蔓松上生枝正青與兔絲殊異此則比也君子兄弟為賓者也奕奕憂心無所薄也孔氏穎逹曰憂則心遊不定故為無所薄也此亦燕兄弟親戚之詩朱氏公遷曰此於兄弟之下添親戚二字蓋本於末章兄弟甥舅而言故言有頍者辨實維伊何乎爾酒既旨爾殽既嘉則豈伊異人乎乃兄弟而匪他也又言蔦蘿施于木上以比兄弟親戚纏綿依附之意是以未見而憂既見而喜也集説輔氏廣曰有頍者辨本但言與宴者其辨頍然耳只是賦體又貼一句實維伊何以興起下二句此則興體至於蔦與女蘿施于松柏則又為比體也豈伊異人兄弟匪他言當極其親厚之意耳以蔦蘿施于松柏比兄弟親戚纏綿依附之意則其體之也切矣未見而憂既見而喜則其與之也深矣朱氏公遷曰松柏蔦蘿異根同植兄弟親戚以異姓為骨肉蓋若此矣有頍者辨實維何期爾酒既旨爾殽既時豈伊異人兄弟具來叶陵之反蔦與女蘿施于松上叶時亮反未見君子憂心怲怲兵命反叶兵旺反既見君子庶幾有臧叶才浪反集傳賦而興又比也何期猶伊何也時善輔氏廣曰以時為善何也曰物得其時則善矣與維其時矣之時同具俱也怲怲憂盛滿也臧善也集説陳氏推曰天倫之樂既敘天下事無有善於此者故曰有臧有頍者辨實維在首爾酒既旨爾殽既阜方九反豈伊異人兄弟甥舅巨九反如彼雨于付反雪先集維霰蘇薦反死喪去聲無日無幾居豈反相見樂音洛酒今夕君子維宴集傳賦而興又比也阜猶多也甥舅謂母姑姊妹妻族也爾雅母之晜弟為舅妻之父為外舅姑之子為甥舅之子為甥妻之晜弟為甥姊妹之夫為甥謂我舅者吾謂之甥霰雪之始凝者也將大雨雪必先微溫雪自上下遇溫氣而摶謂之霰久而寒勝則大雪矣孔氏穎逹曰太戴禮曽子云陽之專氣為霰盛陰之氣在雨水則凝滯而為雪陽氣薄而脅之不相入則消散而下因水而為霰是霰由陽氣所薄而為之故言遇溫氣而摶也何氏楷曰説文云霰稷雪也徐鍇云雪初作未成花圎如稷粒撒而下也言霰集則將雪之候以比老至則將死之徴也故卒言死喪無日不能久相見矣但當樂飲以盡今日之歡篤親親之意也集説劉氏辰翁曰相會之始為此危語相感動以極歡趣耳季氏本曰言甥舅者燕兄弟而併及甥舅也無幾相見兄弟甥舅自相謂也蓋欲其盡今日而樂酒也總論朱氏善曰推親親之恩由兄弟以及甥舅亦其親踈之意也言蔦蘿施于木上以比纏綿依附之意以雪之先集維霰比老至之驗方其纒綿固欲相依以永久也既而自知老之將至惟當樂酒以盡今夕之歡耳蓋君子之于兄弟親戚其相與之情無窮而相見之日有限以無窮之情乘有限之日則其飲食聚會亦真情之所不能已也姚氏舜牧曰凡燕飲洽彼此之情况兄弟親戚其情尤不可解者故此詩先問其所與燕者始敘其所為燕者曰此我之兄弟也甥舅也然後道逹其情必先悅懌而有臧樂酒而維宴此其情意極欵洽也頍辨三章章十二句集説鄒氏泉曰此詩見篤親親之意與角弓相反陳氏際泰曰頍辨猶常棣之志也間關車之舝胡瞎下介二反兮思孌力兗反季女逝石列石例二反兮匪飢匪渴德音來括雖無好友叶羽已反式燕且喜集傳賦也間關設舝聲也舝車軸頭鐡也無事則脫行則設之董氏逌曰案説文舝鍵也故謂之關又曰舝車聲也車鍵而行則有聲故古人以間關為聲其説本此昏禮親迎者乘車孌美貌逝往括會也此燕樂其新昏之詩故言間關然設此車舝者蓋思彼孌然之季女故乘此車往而迎之也匪飢也匪渴也望其德音來括而心如飢渴耳雖無他人亦當宴飲以相喜樂也集説朱氏公遷曰望其德音來括則以賢配賢雖樂而不失其正矣朱氏善曰思孌季女則男至女家而親迎也德音來括則女至男家而成室也式燕且喜則既至而燕飲以相喜樂也季氏本曰言我所以思孌然之少女而貫舝以往迎者特以德音之善而欲其來會耳凡人之德賴友以成既得季女之賢自足以助我成德雖無好友而式燕且喜矣此則以得賢女為慶也依彼平林有集維鷮音驕辰彼碩女令德來教叶居爻反式燕且譽好呼報反爾無射音亦叶都故反集傳興也依茂木貌鷮雉也微小於翟走而且鳴其尾長肉甚美陸氏佃曰薛綜曰雉之健者為鷮尾長六尺字説曰從喬尾長而走且鳴則其首尾喬如也辰時碩大也爾即季女也射厭也依彼平林則有集維鷮辰彼碩女則以令德來配已而教誨之黃氏佐曰來教只是贊內治意是以式燕且譽而悅慕之無厭也集説范氏處義曰上章言季女以其年之季也此章言碩女言其德之碩也朱氏公遷曰上言德音聞其有是德也此言令德則見其實有是德矣故疊燕喜之意而申以無射云季氏本曰言平林茂木有文采之鷮集而依焉喻己有碩女能及時來配而以令德教我也如此不唯可以得其燕安且有以成我美譽則碩女之德誠可為全而我之好是懿德寧有厭射之心乎雖無旨酒式飲庶幾雖無嘉殽式食庶幾雖無德與女音汝式歌且舞集傳賦也旨嘉皆美也女亦指季女也言我雖無旨酒嘉殽美德以與女女亦當飲食歌舞以相樂也集説朱氏公遷曰上言德音令德此言無德與女蓋美其新昏而謙以承之也故又冀其飲食歌舞以答燕喜燕譽之意也陟彼高岡析星曆反其柞才落反薪叶音襄析其柞薪其葉湑思呂反兮鮮息淺反我覯爾我心寫叶想羽反兮集傳興也陟登柞櫟湑盛鮮少覯見也陟岡而析薪則其葉湑兮矣我得見爾則我心寫兮矣集説顧氏起元曰析薪而其葉湑所得副所求故以為興鮮我覯爾猶言難得見爾也蓋惟其令德世不恆有故云然我覯即上文令德來教我心寫即上文燕樂無厭飲酒歌舞等事高山仰叶五剛反止景行行叶戶郎反止四牡騑騑孚非反六轡如琴覯爾新昏以慰我心集傳興也仰瞻望也景行大道也如琴謂六轡調和如琴瑟也慰安也高山則可仰景行則可行馬服御良則可以迎季女而慰我心也此又舉其始終而言也表記曰小雅曰高山仰止景行行止子曰詩之好仁如此鄉音向道而行中道而廢忘身之老也不知年數之不足也俯焉日有孶孶斃而後已輔氏廣曰表記之言雖非詩之本旨然讀者能如此則能有益於己矣時過而學者可常常涵泳此數語以自警朱氏公遷曰既鄉道而行矣可中道而廢乎是以不能自已也意謂山必陟巔道必涉畿學必至於極然後止此推廣而為學者言之耳集説錢氏天錫曰高山景行興令德仰止行止興慰心何氏楷曰此興季女之賢可為師法與令德來教相應總論輔氏廣曰一章言其望之甚切故得之甚喜也二章言得之有譽故好之無厭也三章則自謙之詞言我雖無以與女而女則宜有以相樂也四章則言我心傾寫於女以見誠之至也五章則舉其始終而言之上四句言其始下二句言其終前已極言之矣故此但言其略耳劉氏瑾曰此詩皆言慕悅賢女之意故其未得之也望其德音來括而心如飢渴既得之也喜其令德來教而心如輸寫至於宴樂之也又歎為歡之無美具而且恐無德以相與證之關雎亦可謂得牲情之正者也車舝五章章六句集説朱氏善曰正小雅有鹿鳴以燕羣臣有常棣以燕兄弟有伐木以燕朋友而獨於夫婦缺焉則此詩雖燕樂新昏之詩其亦昏禮上下通用之樂也歟營營青蠅止于樊音煩叶汾乾反豈弟君子無信讒言集傳比也營營往來飛聲亂人聽也青蠅汙穢能變白黑鄭氏康成曰蠅之為蟲汙白使黑汙黑使白喻佞人變亂善惡也許氏謙曰營營者青蠅之聲也變白黑者青蠅之性也見其飛之營營則知其必變白黑矣聽小人之讒則知其亂是非矣傳上言亂人聽下言變白黑意蓋如此樊藩也孔氏穎逹曰孫炎曰樊圃之樊君子謂王也詩人以王好聽讒言故以青蠅飛聲比之而戒王以勿聽也集説歐陽氏修曰青蠅之為物甚微至其積聚而多也營營然往來飛聲可以亂人之聽故詩人引以喻讒言漸漬之多能致惑爾其曰止于樊者欲其遠之當限之於藩籬之外也陳氏鵬飛曰青蠅穢不潔之物驅之使去而復還以比小人態狀可惡而又難遠讒言多由持心傾險而後入故君子當持心樂易不聼讒言也呂氏祖謙曰營營青蠅止于樊行且至於几席盤杅之間矣蓋憂之也營營青蠅止于棘讒人罔極交亂四國叶越逼反集傳興也棘所以為藩也極猶已也集説吕氏祖謙曰前漢注曰樂易之君子不當信讒人若讒言無極則四國亦以交亂宜深察也嚴氏粲曰讒言無有窮極豈特近者不安雖四國之遠亦以交亂其禍甚大矣營營青蠅止于榛士巾反讒人罔極構古豆反我二人集傳興也構合也猶交亂也孔氏穎逹曰構者構合兩端令二人彼此相嫌交更惑亂與上章義同已與聽者為二人集説陳氏櫟曰讒人罔極之禍其末至於亂四國其始先於構二人聽者察於其始而早絶之庶乎不至於罔極也張氏彩曰枝葉之繁密者無過於榛而蠅亦集其中喻人之情好雖密而讒人無不能離間其間也總論程子曰青蠅詩言樊棘榛言二人四國自樊而觀之則樊為近而棘榛為遠自二人而觀之則二人為小而四國為大讒人之情常欲汙白以為黑也而其言不可以直逹故曰營營往來或自近以至于遠或自小而至于大然後其説得行矣何氏楷曰羅願云君子之于讒也初蓋易之至于亂之又生而後君子信其讒故首章但云毋信讒言至其二章則已交亂在外之四國至其三章則雖同心如我二人者亦不能以相有其始輕之而不忌皆如此蠅矣青蠅三章章四句集説劉氏瑾曰首章以青蠅與君子對言故知以蠅聲比讒言下二章以青蠅與讒人對言故知屬興此比興相似而不同者凱風詩亦然賓之初筵左右秩秩無韻未詳後三四章放此籩豆有楚殽户交反核户革反維旅酒既和旨飲酒孔偕音皆叶舉里反鐘鼓既設叶書質反舉酬市由反逸逸大侯既抗叶居郎反弓矢斯張射夫既同獻爾發功發彼有的叶丁藥反以祈爾爵集傳賦也初筵初即席也孔氏穎逹曰春官司几筵注云筵亦席也鋪陳曰筵藉之曰席左右筵之左右也秩秩有序也楚列貌殽豆實也核籩實也鄭氏康成曰豆實菹醢也籩實有桃梅之屬孔氏穎逹曰殽是總名此文殽核與籩豆相對故分之耳其實核亦為殽旅陳也和旨調美也孔甚也偕齊一也孔氏穎逹曰言衆賓之飲酒又威儀齊一也主人敬其事而衆賓肅慎明賓主皆得其宜也設宿設而又遷於下也大射樂人宿縣厥明將射乃遷樂於下以避射位是也鄭氏康成曰鐘鼓於是言既設者將射改縣也劉氏瑾曰大射儀有樂人宿縣之文蓋將射於學宮先一宿各縣鐘磬鼓鏞於堂下東西北三面鄉射禮則有樂正命遷樂於下之文集傳所引乃參約大射鄉射禮文以明此鐘鼓既設之義耳射皆用樂者蓋諸侯之射則先行燕禮大夫士之射則先行鄉飲禮故也然此章乃言人君燕射燕在路寢自有常縣之樂謂宿設者先儒以為更整理之耳舉酬舉所奠之酬爵也逸逸往來有序也大侯君侯也天子熊侯白質諸侯麋侯赤質大夫布侯畫以虎豹士布侯畫以鹿豕孔氏穎逹曰鄉射記注云此所謂獸侯也燕射則張之熊麋虎豹鹿豕皆正面畫其頭象於正鵠之處君畫一臣畫二陽竒陰耦之數也李氏如圭曰言質者以白與赤采其地而後畫布侯者直畫而已天子侯身一丈其中三分居一白質畫熊其外則丹地畫以雲氣劉氏瑾曰凡侯有中有身有上下舌獸侯以布為之天子與圻外諸侯皆用布九幅每幅闊二尺其高一丈八尺九幅之布廣一丈八尺最中一幅即所謂中也中之上下各二幅連中幅共高一丈所謂身也身之上下又各二幅以為舌據侯中之廣一丈八尺以三分之一為正鵠則正鵠當廣六尺此燕射之侯不設正鵠則於正鵠之處以白采其地而畫熊為的又於其側以丹色為質畫雲氣為飾自麋侯以下其飾皆然抗張也凡射張侯而不繫左下綱中掩束之劉氏瑾曰鄉射禮注綱持舌繩也不繫者事未至也至將射司馬命張侯弟子脫束遂繫下綱也劉氏瑾曰侯有上下左右舌故有上下左右綱繩出於舌外以持舌而繫之也又有維以綴侯身侯舌之四角而繫之大侯張而弓矢亦張節也射夫既同比毗至反其耦也鄭氏康成曰比選次其才相近者也射禮選羣臣為三耦李氏如圭曰三耦使大夫士為之三耦之外其餘各自取匹謂之衆耦獻猶奏也孔氏穎逹曰獻奏皆奉上之言以發矢能中是呈奏己功故以獻為奏也發發矢也的質也孔氏穎逹曰侯中所射之處為質也祈求也禮記射義求中以辭爵也酒者所以養老也所以養病也求中以辭養也爵射不中者飲豐上之觶音置也儀禮卒射司射命弟子設豐弟子奉豐升設於西楹之西勝者之弟子洗觶升酌奠於豐上不勝者進取觶少退立卒觶進奠於豐下注豐形蓋似豆而卑衛武公飲酒悔過而作此詩此章言因射而飲者初筵禮儀之盛酒既調美而飲者齊一至於設鐘鼓舉酬爵劉氏瑾曰燕射主於飲酒而於獻酢旅酬之後司射乃命納射器司馬命張侯樂正命遷樂於是乃射故此言大侯既抗於設鐘鼓舉酬爵之後也抗大侯張弓矢而衆耦拾其劫反發孔氏穎逹曰大射禮注云拾更也射者更代發矢各心競云我以此求爵汝也集説輔氏廣曰賓之初筵左右秩秩言其坐次之有序也籩豆有楚殽核維旅言其陳列之整潔也酒既和旨飲酒孔偕言其飲者之齊一也鐘鼓既設言其樂之備也鐘鼓舉其大者舉酬逸逸言其進止之安徐也舉酬謂旅酬時安徐則有序矣大侯既抗弓矢斯張言其射之有節也射夫既同獻爾發功言其善射者之多也發彼有的以祈爾爵言其射之命中以辭爵辭養也徐氏鳯彩曰首章言賓初即席未射而飲如此其毖飭也及將射則遷堂上之鐘鼓於堂下以避射位而舉席前之爵以行旅酬是將射而飲又如此其從容也及弓矢張衆耦同各心競云我務中的祈爾以飲此爵不曰罰而曰祈言借以勸飲耳是方射而飲又如此其謙和也籥舞笙鼓樂既和奏叶宗五反蒸衎苦旦反烈祖以洽百禮百禮既至有壬有林錫爾純嘏子孫其湛都南反叶持林反其湛曰樂音洛各奏爾能叶奴金反賓載手仇音拘叶求其二音室人入又叶由怡二音酌彼康爵以奏爾時叶酬時二音集傳賦也籥舞文舞也毛氏萇曰秉籥而舞與笙鼓相應蒸進衎樂列業洽合也百禮言其備也孔氏穎逹曰百禮所薦之酒食殽羞之百種也壬大林盛也言禮之盛大也錫神錫之也爾主祭者也嘏福湛樂也朱子曰既錫爾福及爾子孫皆獲湛樂也各奏爾能謂子孫各酌獻尸尸酢而卒爵也劉氏瑾曰特牲三獻之後長兄弟洗觶獻尸尸飲畢酢之長兄弟受而卒爵少牢下篇三獻之後亦有二人洗觶酌獻之禮各奏爾能之義其謂此類歟仇讀曰㪺許氏謙曰釋文㪺音拘挹取酒也室人有室中之事者謂佐食也孔氏穎逹曰佐食謂於賓客之中取人令佐主人為尸設饌食之人又復也賓手挹酒室人復酌為加爵也儀禮特牲衆賓長為加爵劉氏辰翁曰入又者更迭再酌也黃氏一正曰賓載手仇賓長加爵以獻尸也室人入又亦加爵以獻尸也仇挹於罍也酌注於爵也康安也酒所以安體也呂氏祖謙曰邱氏曰以其養老養病故曰安爵或曰康讀曰抗記曰崇坫康音抗圭梁氏益曰明堂位崇坫康圭鄭氏注云崇髙也康讀為亢又為髙坫亢所受圭奠於上焉康舉也舉圭於坫之上也此亦謂坫上之爵也時時祭也蘇氏曰時物也此言因祭而飲者始時禮樂之盛如此也集説歐陽氏修曰前二章略陳飲酒必賓主秩秩然肅恭至於籩豆殽䔩皆有次序而酒旨樂和又不徒燕飲而已也或行射禮以揖讓周旋因其勝不以相爵或因祭其先祖神享而降福子孫受賜乃相湛樂蓋明非以淫佚為樂也王氏安石曰先王用酒常以祭祀必有禮樂有大禮斯有大樂以和之有備樂斯有備禮以成之籥舞笙鼓有備樂也以洽百禮有備禮也劉氏瑾曰此言祭宴禮樂之盛亦蒙上章初筵之意然武公因酒過作詩宜於深自懲創若大禹惡而絶之也今二章乃皆盛陳飲酒之禮者蓋酒非有過也飲者常至於過也飲者之於初筵亦未有過也其於既醉則不能無過也公之自悔自戒亦慎終如始而已豈必廢燕射祭祀之禮而後免於酒禍哉賓之初筵溫溫其恭其未醉止威儀反反叶分邅反曰既醉止威儀幡幡叶分邅反舍音捨其坐遷屢舞仙仙其未醉止威儀抑抑曰既醉止威儀怭怭毗必反是曰既醉不知其秩集傳賦也反反顧禮也幡幡輕數音朔下同也毛氏萇曰反反言重慎也幡幡失威儀也遷徙屢數也劉氏彜曰賓主各有定位今則舍其坐而遷其位是賓主可得而易也舞之奏各有其時非可以屢也仙仙軒舉之狀抑抑慎密也孔氏穎逹曰謂慎禮而密靜怭怭媟音薛嫚音慢也秩常也此言凡飲酒者常始乎治而卒乎亂也集説鄭氏康成曰此言賓初即筵之時能自敕戒以禮至於旅酬而小人之態出范氏處義曰上二章既言飲酒始終皆不失禮此章乃極言飲酒未醉與既醉之狀謂今之飲酒始即席固亦溫溫而恭有足觀者奈其未醉則威儀皆顧禮而反復無倦及其既醉則威儀皆幡幡而舉動不寧舍其坐次遷徙不常屢舞無節仙仙輕舉視未醉之時則抑抑而謙下既醉之後則怭怭而媟嫚此之謂為酒所困不復知有秩序矣賓既醉止載號乎毛反載呶女交反亂我籩豆屢舞僛僛起其反是曰既醉不知其郵叶于其反側辨之俄屢舞傞傞素多反既醉而出並受其福叶筆力反醉而不出是謂伐德飲酒孔嘉叶居何反維其令儀叶牛何反集傳賦也號呼呶歡也孔氏穎逹曰唱呌也僛僛傾側之狀郵與尤同過也側傾也俄傾貌傞傞不止也出去伐害孔甚令善也此章極言醉者之狀因言賓醉而出則與主人俱有美譽鄒氏泉曰賓能節飲而謹德之名著主能善燕而親德之譽揚所謂並受其福也醉至若此是害其德也飲酒之所以甚美者以其有令儀耳今若此則無復有儀矣集説孔氏穎逹曰前章言燕初及旅酬之事此述無算爵之後上言曰既醉止與此是曰既醉言醉而復益醉也上言仙仙是舞之形貌猶能自正僛僛則不能自正傞傞則非徒不正又不能止為差降也蘇氏轍曰此章申言其亂而終誨之也姚氏舜牧曰德是人之所以自立者使亂其威儀而喪德是自伐也儀與德正相照凡有令德者必有令儀喪失其儀即為伐德小宛大夫以一醉日富為戒而歸之敬爾儀此以是謂伐德為戒而歸之維令儀儀之關於酒德也如是夫凡此飲酒或醉或否叶補美反既立之監或佐之史彼醉不臧不醉反恥式勿從謂無俾大音泰怠叶養里反匪言勿言匪由勿語由醉之言俾出童羖音古三爵不識叶失志二音矧失引反敢多又叶夷益夷豉二反集傳賦也監史司正之屬董氏逌曰立之監以監之佐之史以書之古之慎禮如此燕禮鄉射恐有解音懈倦失禮者立司正以監之察儀法也朱子曰鄉飲酒禮鄉射禮皆曰相為司正燕禮曰射人為司正謂告由從也童羖無角之羖羊必無之物也蘇氏轍曰羖未有童者也俾出童羖深戒之也識記也言飲酒者或醉或不醉故既立監而佐之以史則彼醉者所為不善而不自知使不醉者反為之羞愧也安得從而告之使勿至於大怠乎告之若曰所不當言者勿言所不當從者勿語醉而妄言則將罰汝使出童羖矣設言必無之物以恐之也女飲至三爵已昏然無所記矣况敢又多飲乎又丁寧以戒之也集説輔氏廣曰欲其不至於昏醉而告之使勿大怠蓋凡溺於酒者其病只在怠稍自謹飭者便不至若是匪言勿言匪從勿語應前章號呼歡呶而云也言自言也語與人語也苟不可從則豈可語人哉姚氏舜牧曰三爵不識二句正與首二章相照應首章曰發彼有的以祈爾爵言禮射而飲未有過於三爵者次章云酌彼康爵以奏爾時言祭畢而飲亦未有過於三爵者兹燕飲者屢舞而不知號呶而無節伐德喪儀莫此為甚則觥觩交錯之所便也故立之監史以警戒之而終之曰三爵不識矧敢多又蓋教之但如射飲獻酬之合禮而不可至於大怠也總論許氏謙曰一章言因射而飲二章言因祭而飲是言古飲酒之禮也三章以下則今飲酒之失也三章言飲而未醉則威儀中適醉而不止則喪敗其威儀四章言飲當知止而戒其謹威儀五章言飲不可至醉而戒其謹言語姚氏舜牧曰大抵酒之為禍嘗在於賓筵故詩首説賓之初筵舉為射而設者其禮儀卒度而無亂次及祭畢而飲者其儀度一歸於禮而無亂方提燕飲之賓筵始乎治卒乎亂者再三以深致其戒云賓之初筵五章章十四句集傳毛氏序曰衛武公刺幽王也韓氏序曰衛武公飲酒悔過也韓氏嬰曰衛武公飲酒悔過也言賓客初就筵之時賓主秩秩然俱謹敬也賓既醉止不知其為惡也今案此詩意與大雅抑戒相類劉氏瑾曰此詩之意恐醉酒而伐德猶抑詩所謂顛覆厥德荒湛于酒也此詩之意反覆以威儀為言猶抑詩言抑抑威儀敬慎威儀敬爾威儀不愆于儀也此詩言載號載呶勿言勿語之意猶抑詩言慎爾出話無易由言也以至此詩有童羖之語抑詩亦有彼童而角之喻其語意多相類也然抑詩凡言女言爾集傳以為武公使誦詩者命己之詞今案此詩凡言賓言爾者恐亦武公自謂也必武公自悔之作當從韓義集説董氏鼎曰史鴻漸云衛人何其服酒誥之訓世守於無窮也始也商俗淫湎武王以酒誥戒之幽王之世上下沈湎武公飲酒自悔作賓之初筵見衛人非特一時聞訓不敢自越於禁防又能以其所以禁防者傳為子孫法焉劉氏瑾曰酒誥言謹酒之意以為父母慶克羞耉羞饋祀則皆可用酒亦若武公謹酒而言因射而飲因祭而飲之意也夫酒之為禍內則喪人之德外則喪人威儀謹酒之要亦惟致力於二者而已故此詩言德者一而言威儀者五酒誥言德者八而言威儀者一詳略可亙相備矣武公此詩其真有得於武王康叔之家法歟魚在在藻有頒符云反其首王在在鎬豈苦在反樂音洛飲酒集傳興也藻水草也頒大首貌毛氏萇曰魚以依蒲藻為得其性豈亦樂也此天子燕諸侯而諸侯美天子之詩也言魚何在乎在乎藻也則有頒其首矣王何在乎在乎鎬京也則豈樂飲酒矣黃氏佐曰此以樂得其所為興而語勢又相應也集説劉氏彜曰夏月之時淺水生藻陽氣在外魚亦從之不潛於淵而在於藻也有頒其首者出遊水面則露其首故見其頒大也朱氏道行曰魚藻諸侯據所在以起興而誦美其與下之仁豈樂飲酒猶有前王厭厭之遺風焉魚在在藻有莘所巾反其尾王在在鎬飲酒樂豈叶去幾反集傳興也莘長也集説劉氏彜曰有莘其尾者飽滿無虞則戲於水面既升而露其首又降而露其尾莘然其長矣許氏謙曰豈樂飲酒飲酒樂豈固易韻以反覆其詞然其意亦疑有異上章樂而飲酒樂四方和平諸侯賓服也下章飲酒而樂樂禮儀既備人情洽和也魚在在藻依于其蒲王在在鎬有那乃多反其居集傳興也那安居處也集説鄭氏康成曰天下平安王無四方之虞故其居處那然安也呂氏柟曰魚依于蒲則釣餌不能施綸竿不能加可謂益安矣王而那居則仰得天命之眷俯得人心之從此所以豈樂飲酒也總論輔氏廣曰此詩與鴛鴦相類辭雖簡而意則切矣不頌其德者德盛而非言之所能盡亦尊敬之至而不敢加以形容也但美其樂飲安居而己則非盛德其孰能之姚氏舜牧曰豈樂飲酒是始其樂飲酒樂豈是終其樂有那其居則安然以享此樂之無已魚藻三章章四句集説黃氏震曰此詩與王在靈囿於牣魚躍氣象同因詩序以為刺諸家遂強以愁歎之辭釋之然本文之和樂氣象終不可改但外添一語云傷今之不然三味此詩初無此意采菽采菽筐音匡之筥音舉之君子來朝音潮何錫豫音與之雖無豫之路車乘繩證反馬叶滿補反又何豫之玄衮古本反及黼音甫集傳興也菽大豆也君子諸侯也路車金路以賜同姓象路以賜異姓也周禮巾車金路鉤樊纓九就同姓以封象路朱樊纓七就異姓以封注金路以金飾諸末鉤婁頷之鉤以金為之樊馬大帶也纓馬鞅樊纓皆以五采罽飾之而九成象路以象飾諸末無鉤以朱飾勒而已其樊纓飾七成玄衮玄衣而畫以卷音衮龍也黼如斧形刺七亦反之於裳也呂氏祖謙曰上公之服九章衮畫於衣九章之第一章也黼繡於裳九章之第八章也周制諸公衮冕九章已見九罭篇鄭氏康成曰一曰龍二曰山三曰華蟲四曰火五曰宗彜皆畫以為繢六曰藻七曰粉米八曰黼九曰黻皆絺以為繡則衮之衣五章裳四章凡九也侯伯鷩音鱉冕七章則自華蟲以下鄭氏康成曰鷩畫以雉謂華蟲也其衣三章裳四章凡七也子男毳尺鋭反冕五章衣自宗彜以下而裳黼黻鄭氏康成曰毳畫虎蜼謂宗彜也其衣三章裳二章凡五也孤卿絺知上聲冕三章則衣粉米而裳黼黻鄭氏康成曰絺刺粉米無畫也其衣一章裳二章凡三也大夫玄冕則玄衣黻裳而已鄭氏康成曰玄冕者衣無文裳刺黻而已凡冕服皆玄衣纁裳六服同冕者首飾尊也此天子所以答魚藻也采菽采菽則必以筐筥盛之君子來朝則必有以錫豫之又言今雖無以豫之然已有路車乘馬玄衮及黼之賜矣其言如此者好之無已意猶以為薄也集説朱氏善曰豫之以車馬所以為之乘豫之以衮黼所以為之衣其禮亦已厚矣而猶以為薄者蓋以車馬衣服之賜自先王以來所以懷諸侯者如此吾遵而行之非能有加於常禮之外也則其歉然不自足之意可見矣顧氏起元曰錫車馬以分氏族也賜衣服以别官階也玄衮及黼有衮龍以繪於衣自公而下隨其等而降殺有黼黻以刺於裳自子男而上隨其等而加隆也觱音必沸音弗檻胡覽反泉叶才勻反言采其芹巨斤反君子來朝言觀其旗巨依反叶巨斤反其旗淠淠匹弊反鸞聲嘒嘒呼惠反載驂七南反載駟君子所屆叶居氣反集傳興也觱沸泉出貌檻泉正出也梁氏益曰爾雅云檻泉正出公羊傳云直出直猶正也正出者涌出也自發源處涌而直上故曰正出芹水草可食陸氏佃曰芹水菜一名水英爾雅謂之楚葵潔白而有節其氣芬芳而味不如蓴之美淠淠動貌嘒嘒聲也王氏安石曰嘒嘒言其聲之細無敢馳驅故也屆至也觱沸檻泉則言采其芹諸侯來朝則言觀其旗見其旗聞其鸞聲又見其馬則知君子之至於是也集説李氏公凱曰於檻前涌出之地則可采其芹矣於君子來朝之時則可以觀其旗矣既望其交龍之旗淠淠然飛動又聞其鸞鈴之聲嘒嘒然中節又見其驂駟之來則知諸侯至於此矣顧氏起元曰此言始來朝之儀以見錫豫之由也何氏楷曰以檻泉自下上出興君子自下國而朝於王朝檻泉之旁有芹可采興君子來朝亦有儀從可觀赤芾音弗在股邪幅在下叶後五反彼交匪紓音舒叶上與反天子所豫音與樂只音止君子天子命叶彌并反之樂只君子福祿申之集傳賦也脛本曰股邪幅逼也邪纒於足如今行縢所以束脛在股下也鄭氏康成曰邪幅行縢也逼束其脛自足至膝故曰在下孔氏穎逹曰縢緘也名行縢者言行而緘束之也陳氏鵬飛曰帶裳幅舄昭其度也幅雖微而有差等之度故井觀之交交際也紓緩也言諸侯服此芾逼見於天子恭敬齊咨齋二音遫不敢紓緩則為天子所與而申之以福祿也集説蘇氏轍曰君子之所以自敕而交於人者如此則天子從而豫之矣是以錫之命而申之以福祿朱氏善曰禮以齊遫為敬彼交匪敖則萬福之所求彼交匪紓則天子之所豫即福祿之所申也鄒氏泉曰此章正是入覲之事匪紓以上言其入覲之敬下言其得君而獲福也姚氏舜牧曰人臣之上交敬而已敬則謹嚴整肅莫敢一事之少紓紓則怠緩而不恭未有不取譴於天子者此言彼交匪紓福祿申之信知上交須敬也維柞之枝其葉蓬蓬樂只君子殿多見反天子之邦叶卜工反樂只君子萬福攸同平平婢延反左右亦是率從集傳興也柞見車舝篇蓬蓬盛貌殿鎮也孔氏穎逹曰軍行在後曰殿取鎮重之義故曰殿鎮也平平辨治也黃氏佐曰辨而不雜治而不亂乃整齊意言其威儀如此也左右諸侯之臣也率循也維柞之枝則其葉蓬蓬然樂只君子則宜殿天子之邦而為萬福之所聚又言其左右之臣亦從之而至此也集説劉氏彜曰柞之所以有枝以衛其株枝之所以有葉以庇其幹者皆由根本堅固氣脈盛大俾之然也根本天子也枝葉諸侯也氣脈者朝廷之寵命也故葉之蓬蓬者根本氣脈之所及然則葉之蓬蓬反以衛其根株而為之堅固猶天子寵錫諸侯俾之茂盛反能殿天子之邦而益朝廷之固也故曰樂只君子殿天子之邦樂只君子萬福攸同姚氏舜牧曰殿邦是與之之詞蓋即其來朝匪紓者信其能鎮定天子邦家而為萬福之所同也泛泛芳劒反楊舟紼音弗纚力馳反維之樂只君子天子葵之樂只君子福祿膍頻尸反之優哉遊哉亦是戾叶郎之反矣集傳興也紼繂音律也孔氏穎逹曰孫炎云繂大索也李巡云所以維持舟者纚維皆繫也言以大索纚其舟而繫之也葵揆也揆猶度也輔氏廣曰言天子能揆度諸侯之心而知其底藴也膍厚戾至也泛泛楊舟則必以紼纚維之樂只君子則天子必葵之福祿必膍之於是又歎其優遊而至於此也集説歐陽氏修曰泛泛楊舟紼纚維之者詩意紼纚維舟如天子以爵命維制諸侯爾故其下文云樂只君子天子葵之黃氏佐曰此章興至膍之舟之不定者必纚之又維之諸侯之可喜者必深察之又厚遇之葵之是於交際之匪紓而度其有忠君愛國之心也唐氏汝諤曰左右之從與優遊之戾皆是作詩者用意處見不獨君子賢而其旅亦賢不獨在朝時敬而在道時已敬總論輔氏廣曰此詩首章之意至矣言其寵錫之厚而心猶以為不足也二章則言其始來之時見其車旗而喜其至三章則言其始見天子時恭敬齊遫而為天子之所豫四章則言其德足以鎮天子之邦為萬福之所聚而又喜其左右之臣相從而至五章則申言之而又歎其至也優遊自適而無勉強不得已之意一有勉強之心則怠矣采菽五章章八句集説王氏志長曰采菽詩車馬衮黼福祿申重亦既優渥矣至於末章以天子葵之一語寓豫奪隆殺之義而當時侯度之恪於赤芾邪幅間著其匪紓之節千載之下想見九重之遐若咫尺焉故可以懷諸侯治天下也騂騂息營反角弓翩匹然反其反叶分邅反矣兄弟昏姻無胥遠叶於圓反矣集傳興也騂騂弓調和貌角弓以角飾弓也孔氏穎逹曰弓人以六材為弓謂幹角筋膠絲漆也翩反貌弓之為物張之則內向而來弛之則外反而去有似兄弟昏姻親疏遠近之意胥相也此刺王不親九族而好讒佞使宗族相怨之詩言騂騂角弓既翩然而反矣兄弟昏姻則豈可以相遠哉集説歐陽氏修曰弓之為物其體往來詩人以喻九族之親王若親之以恩則內附若不以仁恩結之則亦離叛而去矣徐氏光啓曰角弓張之乃來一弛便去兄弟昏姻親之乃近一疏便遠言當黽勉同心之意爾之遠叶於圓反矣民胥然矣爾之教矣民胥效矣集傳賦也爾王也上之所為下必有甚者集説李氏樗曰堯親九族九族既睦然後協和萬邦黎民於變時雍周之文武親親以睦然後民德歸厚蓋上有所好下必有甚焉兄弟昏姻王苟遠之則民皆然矣王苟以此教民則民亦將效之矣此令兄弟綽綽有裕預與二音不令兄弟交相為愈同上集傳賦也令善綽寬裕饒愈病也言雖王化之不善然此善兄弟則綽綽有裕而不變彼不善之兄弟則由此而交相病矣蓋指讒己之人而言也集説王氏安石曰綽綽有裕者交相愛也交相為愈者交相惡也輔氏廣曰交相病言交相讒害也集傳以為指讒己之人者言其病己者也民之無良相怨一方受爵不讓叶如羊反至于已斯亡集傳賦也一方彼一方也相怨者各據其一方耳若以責人之心責己愛己之心愛人使彼己之間交見而無蔽則豈有相怨者哉況兄弟相怨相讒以取爵位而不知遜讓終亦必亡而已矣朱氏公遷曰已斯亡者亡而後已也集説王氏安石曰民喪其良心不參彼己之曲直躬自薄而厚責於人也則各相怨於一方受爵不讓專利而有之也至於已斯亡怨之所歸禍之所集故也老馬反為駒叶去聲不顧其後叶下故反如食音嗣宜飫於據反如酌孔取叶音娶集傳比也飫飽孔甚也言其但知讒害人以取爵位而不知其不勝任如老馬憊蒲拜反矣而反自以為駒不顧其後將有不勝任之患也又如食之已多而宜飽矣酌之所取亦已甚矣朱氏公遷曰此章比喻凡三節所以終受爵不讓之意集説蘇氏轍曰老馬不自謂老而任駒之任後將不勝而不顧譬如小人而任賢者之事不畏其後之不克也王氏質曰食量所飫酌量所取則不傷不量飢飽而食不忖多寡而酌亦不顧其後也言有後患也許氏天贈曰上喻小人不量力下喻小人不知足毋教猱升木如塗塗附君子有徽猷小人與屬音蜀叶殊遇反集傳比也猱獮猴也性善升木毛氏萇曰猱猿屬邢氏昺曰善攀援樹枝不待教而能也塗泥附著徽美猷道屬附也言小人骨肉之恩本薄王又好讒佞以來之是猶教猱升木又如於泥塗之上加以泥塗附之也苟王有美道則小人將反為善以附之不至於如此矣集説劉氏彜曰小人之為不善皆為所自能今又以倡之是教猱升木也小人樂於不善而又蓋之以不善之教是以塗塗附其塈且相著不可脫矣非所以為上之道也故陳為上之道曰君子有徽猷小人與屬也先王有至德要道民用和睦正其五品為之孝友是之為徽猷呂氏祖謙曰親親長長之道乃民之良心非由外鑠也宜其與屬而不敢解也雨于付反雪瀌瀌符驕反見晛乃見反曰音越韓詩劉向作聿下章放此消莫肯下遐嫁反遺式居婁力住反荀子作屢驕集傳比也瀌瀌盛貌晛日氣也張子曰讒言遇明者當自止劉氏瑾曰盛雪見日氣則自消正如此也而王甘信之不肯貶下而遺棄之更益以長慢也集説姚氏舜牧曰讒佞之人貶之則少退引之則日長必宜下遺之為是莫肯下遺則必自處於敖惰矣顧氏起元曰此章喻明能消讒而王反長之式居婁驕言王信讒使小人以驕慢自處者不一也雨雪浮浮見晛曰流如蠻如髦叶莫侯反我是用憂集傳比也浮浮猶瀌瀌也流流而去也蠻南蠻也髦夷髦也書作髳孔氏穎逹曰爾雅八蠻在南故為南蠻髦西夷之别名牧誓曰及庸蜀羌髳微盧彭濮人髳髦音義同言其無禮義而相殘賊也集説顧氏起元曰讒言殘害滅棄禮法我是用憂憂世變之趨也總論歐陽氏修曰一章言雖骨肉之親若遇之失其道則亦怨叛而乖離如角弓翩然而外反矣二章言下民亦將效上之所為也三章四章遂言效上之事五章六章則刺王所以不親九族者由好讒佞也七章八章又述骨肉相怨之言角弓八章章四句集説劉氏瑾曰中庸之九經必以親親為先而其道則唯在於尊其位重其祿同其好惡此先王所以有常棣伐木頍辨行葦諸詩之深仁厚澤也今若此詩所刺則喪其治國平天下之本矣詩人所以於卒章深致其憂也有菀音鬱者柳不尚息焉上帝甚蹈戰國䇿作上帝甚神無自昵焉俾豫靖之後豫極焉集傳比也柳茂木也尚庶幾也上帝指王也蹈當作神言威靈可畏也昵近靖安也極求之盡也王者暴虐諸侯不朝而作此詩言彼有菀然茂盛之柳行路之人豈不庶幾欲就止息乎以比人誰不欲朝事王者而王甚威神使人畏之而不敢近耳使我朝而事之以靖王室後必將極其所欲以求於我蓋諸侯皆不朝而已獨至則王必責之無已如齊威王朝周而後反為所辱也或曰興也下章放此集説輔氏廣曰視其君如上帝本知所尊也然王甚威神畏之而不敢近使我朝王則王室其可定乎然其後必求我而無已將反有所不堪者焉則又不可不慮此其所以不肯來朝也然亦豈得已哉有菀者柳不尚愒欺例反焉上帝甚蹈見上無自瘵側界反叶子例反焉戰國䇿作也俾豫靖之後豫邁叶力制反焉集傳比也愒息瘵病也邁過也求之過其分也集説李氏樗曰無自瘵焉言苟朝王適所以自病也顧氏起元曰過分者取之於常法之外而物有所難繼困之以不堪之事而責有所難塞所以無自瘵者不忍其豫邁也有鳥高飛亦傅音附于天叶鐡因反彼人之心于何其臻曷豫靖之居以凶矜集傳興也傅臻皆至也彼人斥王也居猶徒然也凶矜遭凶禍而可憐也鳥之高飛極至于天耳彼王之心于何所極乎言其貪縱無極求責無已人不知其所至也如此則豈豫能靖之乎乃徒然自取凶矜耳集説朱氏公遷曰鳥飛有所止王心無所極以意相反而為興也唐氏汝諤曰凶矜即上豫極豫邁之意蓋貪縱無極則難弭責望無已則難塞加禍所不免矣總論朱氏公遷曰始則慮其極欲以求于我繼則慮其過分以求于我終則慮其貪欲無厭而加禍於我也菀柳三章章六句集説姚氏舜牧曰朝覲會同禮也嘗聞一不朝則貶其爵二不朝則削其地三不朝則六師移之未聞來朝而反極其欲以求之且求之過其分如菀柳之所刺者春秋書天王求車亦此詩之指也桑扈之什十篇四十三章二百八十二句欽定詩經傳説彚纂卷十五
