body:
  text: 欽定四庫全書欽定詩經傳說彚纂卷十二祈父之什二之四祈勤衣反父音甫豫王之爪牙叶五胡反胡轉豫于恤靡所止居集傳賦也祈父孔氏穎達曰古者祈圻畿同字得通用故此作祈尚書作圻司馬也職掌封坼之兵甲故以為號酒誥曰圻父薄違是也蔡氏沈曰圻父迫逐違命者豫六軍之士也或曰司右虎賁之屬也周禮司右徒八十人虎賁氏虎士八百人鄭氏康成曰右謂有勇力之士充王車右虎士徒之選有勇力者爪牙鳥獸所用以為威者也孔氏穎達曰鳥用爪獸用牙以防衛已身此人自謂王之爪牙以鳥獸為喻也恤憂也軍士怨於久役故呼祈父而告之曰豫乃王之爪牙汝何轉我於憂恤之地使我無所止居乎集說朱子語類天子六卿故有六軍諸侯三卿故有三軍所謂五家為比比即伍也五比為閭閭即兩也四閭為族族即卒也則是夫人為兵矣至於九夫為井四升為邑四邑為邱四邱為甸甸出兵車一乘且以九夫言之中為公田只是八夫甸則五百一十二夫何其少於鄉遂也便自難曉以某觀之鄉遂之民以衛王畿凡有征討止用邱甸之民附録鄭氏康成曰司馬掌祿士故司士屬焉又有司右主勇力之士此勇力之士責司馬之辭也我乃王之爪牙爪牙之士當為王間守之衛女何移我於憂使我無所止居乎六軍之士出自六鄉法不取於王之爪牙之士孔氏穎達曰爪牙之士所職有常不應遷易由宣王使人不稱故陳之以刺王有勇力而不當轉於憂惟守衛者耳司右止言勇力屬焉不言使之守衛夏官虎賁氏其屬者虎士八百人其職云掌先後王而趨以卒伍軍旅㑹同亦如之舍則守王間王在國則守王宫注云舍王出所止宿處間梐枑也然則為王間守乃是虎賁之屬周禮司右虎賁連官虎賁之徒既為宿衛則司右之徒亦為宿衛矣小司徒職曰乃㑹萬民之卒伍而用之五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍以起軍旅又曰凡起徒役無過家一人是出自六鄉也張子曰禁衛天子之爪牙而使之逺戍是詩所謂轉豫于恤也許氏謙曰或曰一說於爪牙二字為切而得詩意案成周兵制籍鄉遂之衆以作六軍而邱甸之民亦出車乘甲士步卒然其為數少故統言之則六軍之士出自六鄉也至虎賁司右簡勇士屬焉以左右王鄭康成所謂征行之事例不取王之爪牙之士也朱子集傳以為豫者六軍自謂則當征行者又屬何人因揆之曰鄉遂之民以衛王畿凡有征討止用邱甸之民此出朱子獨見考之周禮竝無明文可證章俊卿謂司馬法王有四方之事則冡宰命師於諸侯小宰掌其戒具虎賁氏以牙璋發之畿兵不出也援是說以解是詩則豫指六軍之士容或可通然與朱子征討止用邱甸民之說亦不符也合而觀之當以箋疏之解為長矣故自漢唐北宋諸儒以及朱子以後若嚴粲許謙輩皆從之即朱子亦附其說以俟後世論定也祈父豫王之爪士鉏里反胡轉豫于恤靡所底之履反止集傳賦也爪士爪牙之士也底至也集說嚴氏粲曰靡所底止謂逺戍而行役未已祈父亶不聰胡轉豫于恤有母之尸饔集傳賦也亶誠尸主也饔熟食也言不得奉養而使母反主勞苦之事也東萊吕氏曰越勾踐梁氏益曰勾踐越王名伐吳有父母耆老而無昆弟者皆遣歸朱氏公遷曰見國語吳語魏公子無忌梁氏益曰號信陵君救趙亦今獨子無兄弟者歸養朱氏公遷曰見史記本傳則古者有親老而無兄弟其當免征役必有成法故責司馬之不聰其意謂此法人皆聞之汝獨不聞乎乃驅吾從戎使吾親不免薪水之勞也責司馬者不敢斥王也劉氏瑾曰不斥王而責司馬此詩人之忠厚也亦若北山所謂大夫不均之意集說黃氏佐曰此亦重久役上謂祈父信乎不聰明胡乎轉我於憂恤之地而乃使母之尸饔乎使其聰焉則必有以體悉我而不至久役之如是矣總論輔氏廣曰上兩章言自戕其上之衛末章言不體其下之情其言之序亦先公而後私也不戕其上之衛則上得以安必體夫下之情則下不忘其死鄒氏泉曰禁衛之兵本以藩衛王室也使之逺戍則轉之憂恤之地矣末章亦只是此意但以不聰尸饔觀之則見得本為天子爪牙亦國之獨子故以不知法言也祈父三章章四句集傳序以為刺宣王之詩說者又以為宣王三十九年戰于千畝杜氏預曰西河介休縣南有地名千畝王師敗績于姜氏之戎韋氏昭曰西戎之别種四嶽之後也故軍士怨而作此詩東萊吕氏曰太子晉諫靈王之詞曰自我先王厲宣幽平而貪天禍至於今未弭宣王中興之主也至與幽厲竝數之其詞雖過觀是詩所刺則子晉之言豈無所自歟但今考之詩文未有以見其必為宣王耳下篇放此集說鄭氏康成曰刺其用祈父不得其人也官非其人則職廢朱氏善曰先王之制諸侯有故則方伯連帥以諸侯之師討之王室有故則方伯連帥以諸侯之師救之司馬所掌封圻之兵甲不過衛王室而已使王而自棄其爪牙則謂之不智使司馬而棄王之爪牙則謂之不忠至於使孤子之無以為養則又謂之不仁一事而三失具焉其取敗也宜哉皎皎古了反白駒食我場苖縶陟立反之維之以永今朝所謂伊人於焉逍遙集傳賦也皎皎潔白也張子曰言白者以表賢者潔白之意駒馬之未壯者謂賢者所乘也場圃也孔氏穎逹曰言食苖藿則夏時矣七月注云春夏為圃秋冬為場此宜云圃而言場者以場圃同地耳嚴氏粲曰榖之始生曰苖草之類始生亦曰苖言圃中之苖則菜茹之嫩者猶今言菜秧非禾苖也下云場藿藿豆葉也亦菜茹之類縶絆音半其足維繫其靷也永久也伊人指賢者也逍遙遊息也吕氏大臨曰徘徊少留之貌為此詩者以賢者之去而不可留也故託以其所乘之駒食我場苖而縶維之庶幾以永今朝使其人得以於此逍遙而不去若後人留客而投其轄於井中也劉氏瑾曰前漢書陳遵每大飲輒閉門取客車轄投井中雖有急終不得去集說蘇氏轍曰賢者有不得志而去者君子思之故於其去也猶欲其於是逍遙逍遙不事事也雖逍遙猶愈於去耳鄒氏泉曰一朝不可以言永但於欲去之時留得一朝亦若永矣皎皎白駒食我場藿火郭反縶之維之以永今夕叶祥籥反所謂伊人於焉嘉客叶克各反集傳賦也藿猶苖也何氏楷曰藿本作藿說文云菽之少也或以為豆葉夕猶朝也嘉客猶逍遙也蘇氏轍曰客亦非執事者也吕氏大臨曰嘉客者暫客於斯亦將去也集說謝氏枋得曰賢者髙蹈逺引吾知其不可留矣猶欲縶維其白駒以强留之雖一朝一夕亦滿吾志好德之彞性尊賢之良心在人自不能泯沒也黃氏佐曰藿非苖也注言猶苖者同為己之物也嘉客非逍遙也注言猶逍遙者同為我留之意也皎皎白駒賁彼義反又音奔然來叶云俱反思爾公爾侯叶洪孤反逸豫無期愼爾優游叶汪胡反勉爾遁思叶新齎反集傳賦也賁然光采之貌也謝氏枋得曰賁者華采也賢人所過之地山川草木皆有精采蓬户蓽門皆有輝華也或以為來之疾也朱子曰王氏讀為奔字言其來之速也思語詞也爾指乘駒之賢人也愼勿過也勉毋決也遁思陸氏德明曰遁字又作遁嚴氏粲曰易遁卦遁奉身退隱之謂也猶言去意也言此乘白駒者若其肯來則以爾為公以爾為侯而逸樂無期矣猶言橫來大者王小者侯也許氏謙曰史記田橫故齊王族自立為齊王戰敗入海居島中髙帝使使召之曰田橫來大者王小者乃侯耳豈可以過於優游決於遁思而終不我顧哉蓋愛之切而不知好爵之不足縻王氏逢曰縻繫也易中孚曰我有好爵我與爾縻之留之苦而不恤其志之不得遂也劉氏瑾曰上四句見其愛之切末二句見其留之苦集說輔氏廣曰此又原賢者欲去之意而反其說以留之謂賢者之所以欲去不過欲優游自適而已若一旦肯賁然而來則當以爾為公為侯而逸樂無有期限也何必過為優游決其去意而不肯留哉皎皎白駒在彼空谷生芻楚俱反一束其人如玉毋金玉爾音而有遐心集傳賦也賢者必去而不可留矣於是歎其乘白駒入空谷束生芻以秣之嚴氏粲曰生芻新刈之草所謂青芻也而其人之德美如玉也薛氏瑄曰君子之德必如玉斯無一毫之㸃汙蓋已邈乎其不可親矣然猶冀其相聞而無絶也故語之曰毋貴重爾之音聲而有逺我之心也集說嚴氏粲曰上三章猶望賢者來訪於已末章言賢者晦迹巖谷不可復望其來見止望其寄聲耳極稱其美而為拳拳思慕之辭所以見其人之賢而刺時之不能用也朱氏公遷曰是詩至此方言其德夫以卷懷去亂如此非明智勇決不能信乎其美如玉矣總論蔣氏悌生曰賢者之用世豈不欲得君以行其道哉蓋必義有不可留者是以見幾而作不俟終日而在朝同心同德之才惜其才而願其留故其辭如此非不知其志決而不可留也乃欲縶其馬以永朝夕非不知其潔已而輕富貴也乃欲其賁來而爵以公侯及其已去而不可即其繾綣之情瞻戀之意不能已已所留之賢者今不可考其才德聞望抑亦當時之俊又歟白駒四章章六句集說毛氏萇曰宣王之末不能用賢賢者有乘白駒而去者朱子曰宣王始也任賢使能如申伯山甫韓侯或為將或為相或為諸侯如方叔召虎或征蠻荆或伐獫狁或平淮夷至其晚年怠心一生如虢文公之徒諫既不行則小人乘閒而用事矣故觀祈父之詩則司馬非其人矣小人在位則賢者必不得志矣故白駒之詩留賢者而不肯留也黃鳥黃鳥無集于榖無啄陟角反我粟此邦之人不我肯穀言旋言歸復我邦族集傳比也榖木名嚴氏粲曰解見鶴鳴榖善鄒氏泉曰善即處患難相賙相恤之道也旋回復反也民適異國不得其所故作此詩託為呼其黃鳥而告之曰爾無集于榖而啄我之粟朱氏公遷曰以黃鳥之啄粟比人之害已苟此邦之人不以善道相與則我亦不久於此而將歸矣集說范氏祖禹曰民之去其土離其親者不得已也人不相恤是以懷其邦族而復之也曹氏粹中曰易曰傷於外者必反其家迫窮禍患害惟天屬之至親乃肯相收輔氏廣曰始言不以善道相與則其望之猶厚也黃鳥黃鳥無集于桑無啄我粱此邦之人不可與明叶謨郎反言旋言歸復我諸兄叶虛王反集傳比也集說吕氏祖謙曰人之所以相依者以其明足以知其緩急休戚故也不可與明則不可與處矣嚴氏粲曰言以橫逆加已不可與之求明白也黃鳥黃鳥無集于栩况甫反無啄我黍此邦之人不可與處言旋言歸復我諸父扶雨反集傳比也集說馮氏復京曰諸訓衆則諸父諸兄當合三族而言鄒氏泉曰不可與處强陵弱衆㬥寡之意總論范氏處義曰適異國之民而所至之邦人不能與之相善不能與之相知不能與之相安於是思歸故國復依族人與諸兄諸父也國風曰豈無他人不如我同姓此之謂也輔氏廣曰首言復我邦族而已中言復我諸兄末言復我諸父人情困苦之極則愈益思其親者焉黃鳥三章章七句集傳東萊吕氏曰宣王之末民有失所者意他國之可居也及其至彼則又不若故鄉焉故思而欲歸使民如此亦異於還定安集之時矣今案詩文未見其為宣王之世下篇亦然集說范氏處義曰黃鳥我行其野二詩之序皆不明言所刺然黃鳥言此邦之人不我肯榖故說者以為適異國而失其所者我行其野言昏姻之故言就爾居故說者以為從異國之昏姻而不見恤者詩辭亦可見也我行其野蔽必制反芾方味反其樗敕雩反昏姻之故言就爾居爾不我畜復我邦家叶古胡反集傳賦也樗惡木也李氏樗曰樗不材之木莊子曰大枝擁腫不中繩墨小枝卷曲不中規矩壻之父婦之父相謂曰昏姻畜養也民適異國依其昏姻而不見收恤故作此詩言我行於野中依惡木以自蔽於是思昏姻之故而就爾居而爾不我畜也則將復我之邦家矣集說嚴氏粲曰我從本國而來經行於野見有惡木之樗野中自生非藉人力種植而其枝葉蔽芾然茂盛我猶得休息於其下我以爾是昏姻親戚之故素有恩義交結非野樗之比也今來就爾居爾乃不我養是無恩之甚惡木之不如也我當復反我之邦家矣與之訣也我行其野言采其蓫敕六反昏姻之故言就爾宿爾不我畜言歸思復集傳賦也蓫牛蘈音頽惡菜也今人謂之羊蹄菜陸氐璣曰似蘆蔔而莖赤可瀹為茹滑而美也集說范氏處義曰我行於野見采蓫者雖為惡卉猶可以療疾我以昏姻之故謂可就爾止宿矣爾既不能養我故言欲自反是蓫之不如也假氏昌武曰首章言居欲為久居也次章言宿則暫寓矣人情於其相待之薄者則望之也愈輕於其相待之厚者則望之之意日進矣我行其野言采其葍音福叶筆力反不思舊姻求爾新特成論語作誠不以富亦只音支以異叶逸織反集傳賦也葍䔰音富惡菜也陸氏璣曰幽州人謂之燕䔰其根正白可著熱灰中溫噉之饑荒之歲可蒸以禦飢特匹也言爾之不思舊姻而求新匹也雖實不以彼之富而厭我之貧亦祇以其新而異於故耳此詩人責人忠厚之意集說王氏安石曰葍野菜之惡者也然尚可采以禦飢昏姻之相與固為其窮則相收困則相恤也今不思舊姻而求爾新特則又葍之不如也鄒氏泉曰趨富厭貧風之薄也其失大厭故喜新情之常也其失小故不責彼而責此然傳所謂責人忠厚者則以其實以貧賤之故而棄之耳總論輔氏廣曰常人之情有不得已來依親舊而不見收恤則怨怒形於色辭苛責痛詆無所不至而此詩但言爾不我畜則復我邦家而已至其末章則又原其情實而歸之忠厚焉此情性之正而詩之所謂可以怨者於此可見矣朱氏公遷曰依惡木采惡菜困窮如比而昏姻不見收恤薄已甚矣雖不怨焉而不免有棄絶之意也一章二章自決以義而其意確三章責人以恕而其意微我行其野三章章六句集傳王氏曰先王躬行仁義以道民厚矣猶以為未也又建官置師以孝友睦姻任恤六行教民為其有父母也故教以孝為其有兄弟也故教以友為其有同姓也故教以睦為其有異姓也故教以姻為鄰里鄉黨相保相受也故教以任相賙相救也故教以恤以為徒教之或不率也故使官師以時書其德行而勸之王氏逢曰族師書其孝弟睦姻者閭胥書其任恤者以為徒勸之或不率也於是乎有不孝不睦不姻不弟不任不恤之刑焉何氏士信曰鄭氏云制刑之意終不為卑者而罪其長故六行則教兄以友而制刑則謂之不弟使少者不敢陵長也賈氏云此不弟即六行之友上文言友在睦姻之上専施於兄弟此變言弟退在睦姻之下兼施於師長方是時也安有如此詩所刺之民乎集說嚴氏粲曰周之盛時以睦姻任恤教道其民風俗醇厚何如也至黃烏我行其野之詩作則教道微而習俗薄矣君子是以知宣王之後周道之衰也秩秩斯干叶居焉反幽幽南山叶所旃反如竹苞叶補苟反矣如松茂叶莫口反矣兄及弟矣式相好呼報反叶許厚反矣無相猶叶余久反矣集傳賦也秩秩有序也斯此也干水涯也南山終南之山也許氏謙曰南山見秦終南苞叢生而固也陸氏佃曰竹性叢生而行鞭深逺故曰苞猶謀也此築室既成而燕飲以落之因歌其事言此室臨水而面山其下之固如竹之苞其上之密如松之茂又言居是室者兄弟相好而無相謀則頌禱之詞猶所謂聚國族於斯者也禮記檀弓晉獻文子成室張老曰美哉輪焉美哉奐焉歌於斯哭於斯聚國族於斯君子謂之善頌善禱張子曰猶似也人情大抵施之不報則輟故恩不能終兄弟之閒各盡己之所宜施者無學其不相報而廢恩也君臣父子朋友之間亦莫不用此道盡己而己愚案此於文義或未必然然意則善矣朱氏公遷曰張子借其言以教人朱子引之非以此釋經也特廣說詩之法耳或曰猶當作尤朱氏公遷曰尤怨也咎也集說范氏處義曰臨水面山形勢之美如竹之苞謂根本之固也如松之茂謂枝葉之密也宜其聚國族於斯兄弟和好輯睦無相圖之事也似續妣必履反祖築室百堵西南其户胡五反爰居爰處爰笑爰語集傳賦也似嗣也妣先於祖者協下韻爾或曰謂姜嫄后稷也孔氏穎逹曰鄭以為宣王既於國門之左立先妣姜源先祖后稷以下之廟然後乃宫內築燕寢之室西南其户天子之宫其室非一在東者西其户在北者南其户輔氏廣曰舉西南以見東北也猶言南東其畝也爰於也集說李氏樗曰繼紹先王之制而築室於百堵言宣王之居處可謂安矣夫二人之情千萬人之情是也宣王之時其考室也築室百堵又遣使招集流民而百堵皆作則斯民必有居處也若宣王者所謂與民同其憂樂也嚴氐粲曰美宣王中興王業築宫室以復舊觀故曰嗣續妣祖若竟土未復雖作宫室不足言嗣續矣百堵言廣且多也約之閣閣椓陟角反之槖槖音託風雨攸除直慮反鳥鼠攸去君子攸芋香于反叶王遇反集傳賦也約束板也鄭氏康成曰約謂縮板也孔氏穎逹曰綿云縮板以載縮約皆謂以繩纒束之若今之牆袵也閣閣上下相承也孔氏穎逹曰繩均板直則牆端正也椓築也槖槖杵聲也孔氏穎逹曰既投土於板以杵㭬築之則牆牢固也除亦去也無風雨鳥鼠之害言其上下四㫄皆牢密也芋尊大也君子之所居以為尊且大也濮氏一之曰此以下由外而內由垣牆而堂寢次第當然也集說曹氏粹中曰君子雍容於其閒心廣體胖是以大也所謂居移氣也黃氏佐曰尊大不可謂居室尊大蓋天子本自尊大在於此室之中為尊所以統衆卑為大所以統羣小邈乎廉地之相逺凛然堂陛之森嚴如跂音企斯翼如矢斯棘如鳥斯革叶訖力反如翬音輝斯飛君子攸躋子西反集傳賦也跂竦立也翼敬也嚴氏粲曰如論語翼如也之翼棘急也矢行緩則枉急則直也革變翬雉鄭氏康成曰伊洛而南素質五色皆備成章曰翬躋升也言其大勢嚴正如人之竦立而其恭翼翼也其廉隅整飭如矢之急而直也鄒氏泉曰大勢嚴正自前後左右言廉隅整飭自堂之四角言其棟宇峻起如鳥之警而革也其簷阿華采而軒翔如翬之飛而矯其翼也吕氏大臨曰覆以瓦而加丹雘有文采而勢騫舉也蓋其堂之美如此而君子之所升以聽事也集說孔氏穎逹曰矢鳥翬指形言之如跂不言人者義取於跂言跂則人可知也如矢喻四隅廉正也斯革斯飛言簷阿之勢似鳥飛也翼言其體飛象其勢各取喻也輔氏廣曰其言有序而又善於形容如此殖殖市力反其庭有覺其楹噲噲音快其正叶音征噦噦呼㑹反其冥君子攸寧集傳賦也殖殖平正也庭宫寢之前庭也黃氏一正曰庭蓋在路寢之後寢室之前所謂適小寢釋服者也覺髙大而直也朱氏公遷曰卑小迂回則暗故以髙大而直訓覺楹柱也噲噲猶快快也朱氏謀㙔曰爽塏之意正向明之處也噦噦深廣之貌冥奧窔音要之閒也王氏安石曰噲噲其正則知噦噦其冥是偏也噦噦其冥則知噲噲其正是明也許氏謙曰奧室西南隅也窔東南隅也奧窔之間在户之西而牖之下正幽暗處也故曰冥言其室之美如此而君子之所休息以安身也集說董氏逌曰噲噲其正所謂陽室者也噦噦其冥所謂隂室者也古者放隂陽以為宫室故其正為陽冥為陰夫負陰抱陽以安其神所以寧也鄒氏泉曰只就一室言之向明之處軒豁而噲噲奧窔之閒深廣而噦噦蓋一室而有向陽向隂之别故其明暗不同如此下莞音官上簟叶徒檢徒錦二反乃安斯寢叶于檢于錦二反乃寢乃興乃占我夢叶彌登反吉夢維何維熊維羆彼宜反叶彼何反維虺許鬼反維蛇市奢反叶于其土何二反集傳賦也莞蒲席也陸氏德明曰莞草叢生水中莖圓江南以為席形似小蒲而實非也孔氏穎逹曰郭璞曰西方人呼蒲為莞蒲江東謂之苻蘺司几筵有莞筵蒲筵則為兩種席也竹葦曰簟馮氏復京曰司几筵有次席注以為桃枝竹所次成者其即此簟歟莞席在下即筵也竹簟在上即重席也羆似熊而長頭髙腳猛憨呼談切多力能拔樹許氏愼曰熊獸似豕山居冬蟄陸氏璣曰羆有黃羆有赤羆大於熊陸氏佃曰淮南子云熊羆之動以攫搏虺蛇屬細頸大頭色如文綬大者長七八尺祝其君安其室居夢兆而有祥亦頌禱之詞也下章放此集說輔氏廣曰莞簟安寢承上章攸寧而言也其寢既安然後有夢可占嚴氏粲曰考室之時當有頌禱之語以終之居室之慶莫過於子孫之繁衍故願入此室處之後發於夢兆而開子孫之祥蓋設為之辭非實有是夢也大音泰人占之維熊維羆男子之祥維虺維蛇女子之祥集傳賦也大人大卜之屬占夢之官也劉氏瑾曰周禮大卜為卜筮官之長凡卜師卜人龜人菙時髓反氏占人簭音筮人占夢皆其官屬也熊羆陽物在山彊力壯毅男子之祥也虺蛇隂物穴處柔弱隱伏女子之祥也或曰夢之有占何也曰人之精神與天地隂陽流通故晝之所為夜之所夢其善惡吉凶各以類至是以先王建官設屬周禮春官占夢中士二人史二人徒四人使之觀天地之會辨隂陽之氣以日月星辰占六夢之吉凶獻吉夢贈惡夢朱氏公遷曰六夢一曰正夢無感而自夢也二曰噩夢三曰思夢因驚愕思念而夢也四曰寤夢因覺時道之而夢也五曰喜夢六曰懼夢則又因喜懼而成夢也獻者獻羣臣之吉夢而歸美於王贈者祭於四方而遣之以明逆新善而去故惡也其於天人相與之際察之詳而敬之至矣故曰王前巫而後史卜筮瞽侑皆在左右王中心無為也以守至正真氏德秀曰巫掌祀以鬼神之事告王史掌書以三王五帝之事告王掌卜筮者以吉凶諫王瞽矇之叟以歌詩諫王一人之身而左右前後挾而維之故王中心他無所為惟守至正而已朱氏公遷曰自前巫後史以下語出禮運集說嚴氏粲曰心清神定則有開必先博物通逹則占事知來熊羆猛獸為男之祥虺蛇隂類為女之祥昔人謂占夢無書以意言之殆近是矣然皆設為禱辭耳乃生男子載寢之牀載衣於既反之裳載弄之璋其泣喤喤華彭反叶胡光反朱芾音弗斯皇室家君王集傳賦也半圭曰璋嚴氏粲曰璋玉以禮神及朝聘以為瑞璋瓚以祼宗廟此生男弄璋當止是璋玉也喤大聲也芾天子純朱諸侯黃朱班氏固曰芾者蔽也行以蔽前天子朱芾諸侯赤芾以葦為之上廣一尺下廣二尺孔氏穎逹曰純朱明其深也黃朱明其淺也舉其大色皆得為朱芾也皇猶煌煌也君諸侯也寢之於牀尊之也衣之以裳服之盛也弄之以璋尚其德也嚴氏粲曰皆表異其為男子也言男子之生於是室者皆將服朱芾煌煌然有室有家為君為王矣集說何氏楷曰此下二章皆未然事蓋因夢兆而預卜其將然也室家者國與天下之通稱如瞻彼洛矣所謂保其家室胡安國亦曰王者以京師為室天下為家是也衆子為諸侯以君稱嫡長為天子以王稱言生子衆多他日者皆將服朱赤之芾以保有其室家而或為一國之君或為天下王也乃生女子載寢之地載衣之裼他計反載弄之瓦叶魚位反無非無儀叶音義唯酒食是議無父母詒以之反罹叶音麗集傳賦也裼褓也陸氏德明曰裼韓詩作􅠷孔氏穎逹曰褓縛兒被也瓦紡磚也儀善孔氏穎逹曰釋詁文也罹憂也寢之於地卑之也鄒氏泉曰非謂卑賤乃天尊地卑之義衣之以褓即其用而無加也弄之以瓦習其所有事也嚴氏粲曰皆表異其為女子也有非非婦人也有善非婦人也蓋女子以順為正無非足矣有善則亦非其吉祥可願之事也唯酒食是議而無遺父母之憂則可矣易曰無攸遂在中饋貞吉王氏逢曰家人六二傳曰以隂柔之才而居柔不能治於家者也故無攸遂無所為而可也若為婦人之道則其正也婦人居中而主饋者也故曰中饋本義曰六二柔順中正女子正位乎內者也故其象占如此而孟子之母亦曰婦人之禮精五飯梁氏益曰五飯五榖之飯幂音覓酒漿養舅姑縫衣裳而已矣故有閨門之修而無境外之志朱氏公遷曰出列女傳此之謂也集說孔氏穎逹曰言有非有善皆非婦人之事者婦人從人者也家事統於尊善惡非婦人之所有耳不謂婦人之行無善惡也鄒氏泉曰無非無儀則女德以修酒食是議則婦道以備其何詒父母之憂乎總論吕氏祖謙曰一章總述其宫室之面勢而願其親睦二章三章述其作室之意與營築之狀至於風雨攸除鳥鼠攸去則宫室成矣故四章言望其外則雄壯軒翥如此五章言觀其內則髙明深廣如此望其外則未入也故曰君子攸躋言其方升也觀其內則已入也故曰君子攸寧言其既處也六章以下皆禱頌之辭斯干九章四章章七句五章章五句集傳舊說厲王既流于彘宫室圯壞故宣王即位更作宫室既成而落之今亦未有以見其必為是時之詩也或曰儀禮下管新宫朱氏公遷曰下管與升歌對蓋堂下之樂也出燕禮與大射儀春秋傳宋元公賦新宫朱氏公遷曰昭公二十五年恐即此詩然亦未有明證輔氏廣曰若以儀禮之下管新宫當之則此詩非宣王之詩矣集說李氏樗曰劉向曰周德既哀而奢侈宣王賢而中興更為儉宫室小寢廟詩人美之蘇氏曰厲王之世亂而宫室敗壞宣王謀所以續其先祖先妣者蓋築其宫廟一則以為因其敗壞而作新之也一則以為因其奢侈而革之以儉也竊觀此詩則知宣王之營宫室可謂得禮不失之侈亦不失之陋如所謂跂翼矢棘鳥革翬飛不失之陋矣然其作室也特以除風雨而去鳥鼠不失之侈矣則非徒為美觀將以承先王所為而已誰謂爾無羊三百維羣誰謂爾無牛九十其犉而純反爾羊來思其角濈濈莊立反爾牛來思其耳溼溼始立反集傳賦也黃牛黑脣曰犉羊以三百為羣其羣不可數也牛之犉者九十非犉者尚多也董氏逌曰三百維羣以羣計也九十其犉以犉計也黑脣為犉則黑眥為牰音柚黑耳為犚音尉亦各以其數也聚其角而息濈濈然呞音癡而動其耳溼溼然陸氏德明曰呞食已復出嚼之也王氏曰濈濈和也董氏逌曰說文濈為知則濈而比者也羊以善觸為患故言其和謂聚而不相觸也溼溼潤澤也牛病則耳燥安則潤澤也此詩言牧事有成而牛羊衆多也集說孔氏穎逹曰周禮牧人掌牧六牲而阜蕃其物六牲謂牛馬羊豕犬雞此詩唯言牛羊者馬則祭之所用者少豕犬雞則比牛羊為卑故特舉牛羊以為美也鄒氏泉曰上以羣色之盛見其多下以動息之適見其多誰謂見前此凋耗之意或降于阿或飲于池叶唐何反或寢或訛爾牧來思何河可反蓑素多反何笠音立或負其餱音侯三十維物叶微律反爾牲則具叶居律反集傳賦也訛動陸氏德明曰訛韓詩作訛何揭也許氏謙曰揭音竭擔也蓑笠所以備雨孔氏穎逹曰蓑惟備雨之物笠則元以禦暑兼可禦雨故良耜傳曰笠所以禦暑雨也三十維物何氏楷曰物謂毛物與比物四驪之物同齊其色而别之凡為色三十也孔氏穎逹曰謂青赤黃白黑毛色别異者各三十也言牛羊無驚畏而牧人持雨具齎飲食從其所適以順其性是以生養蕃息至於其色無所不備而於用無所不有也集說黃氏佐曰或降于阿三句自物之性而言何蓑何笠二句自人之順其性而言用無不足如大可以祀郊社小可以祀羣神內可以充君庖外可以享賔客皆是爾牧來思以薪以蒸之承反以雌以雄叶于陵反爾羊來思矜矜兢兢不騫不崩麾之以肱畢來既升集傳賦也粗曰薪細曰蒸雌雄禽獸也矜矜兢兢堅强也朱氏公遷曰堅强猶曰壯盛騫虧也崩羣疾也朱氏公遷曰羊有疾輒相汙故曰羣疾肱臂也既盡也升入牢也許氏謙曰牢防獸間也言牧人有餘力則出取薪蒸搏禽獸其羊亦馴擾從人不假箠之纍反楚但以手麾之使來則畢來使升則既升也陳氏鵬飛曰牧事畢也集說王氏安石曰爾羊來思者與夫君子于役之詩曰羊牛下來者類也矜矜兢兢者豈非山川草木之所宜而牧之者不失其性而至於堅彊歟不騫不崩言羊得其性而無耗敗也言羊而不言牛者羊善耗敗故也言羊不耗敗則牛可知矣朱氏善曰麾之以肱畢來既升見人識物情物解人意而無事乎奔走追逐之勞也牧人乃夢衆維魚矣旐音兆維旟音餘矣大人占之衆維魚矣實維豐年叶尼因反旐維旟矣室家溱溱側巾反集傳賦也占夢之說未詳溱溱衆也或曰衆謂人也旐郊野所建統人少旟州里所建統人多劉氏瑾曰周禮大司馬曰郊野載旐司常曰州里建旟蓋人不如魚之多旐所統不如旟所統之衆故夢人乃是魚則為豐年旐乃是旟則為人衆集說王氏安石曰此牧成而考之之詩也故以吉祥之事終焉吕氏祖謙曰以斯干無羊之卒章觀之所願乎上者子孫昌盛所願乎下者歲熟民滋皆不願乎其外也朱氏公遷曰衆維魚旐維旟皆以少變多之象也夢中變化之祥如此則天下富庶之兆可推牛羊衆多已為可喜民人富庶又大可願而至可喜故廣其意以祝之總論黃氏櫄曰古人以生畜之多寡而卜其國之興廢故奉牲以告曰博碩肥腯謂民力之普存也謂其備腯咸有也於是民和而神降之福故動則有成此禱頌之辭所以詳及於牛羊之衆多牧人之安逸以見其民物富庶之效也無羊四章章八句集說黃氏佐曰禮曰問庶人之富數畜以對國家何取於牧事哉蓋當百物凋耗之餘而能致此富盛中興氣象此亦其一端也序以為宣王考牧而作其信然歟節音截下同彼南山維石巖巖赫赫師尹民具爾瞻叶側銜反憂心如惔徒藍反不敢戲談國既卒子律反斬叶側銜反何用不監古銜反集傳興也節髙峻貌何氏楷曰節通作岊徐鍇云山之陬隅髙處曰岊巖巖積石貌赫赫顯盛貌師尹大師尹氏也大師三公毛氏萇曰師大師周之三公也孔氏穎逹曰尚書周官云大師大傅大保兹惟三公尹氏蓋吉甫之後春秋書尹氏卒劉氏瑾曰隱公三年公羊子以為譏世卿者即此也何氏休曰世卿者父死子繼也氏者起其世也若曰世世尹氏也李氏樗曰春秋後又書尹氏立王子朝則尹氏之為世卿其來甚久具俱瞻視惔燔王氏安石曰如惔者內熱之謂也李氏樗曰雲漢曰如惔如焚惔焚之類也卒終斬絶監視也此詩家父所作刺王用尹氏以致亂言節彼南山則維石巖巖矣赫赫師尹則民具爾瞻矣而其所為不善使人憂心如火燔灼又畏其威而不敢言也然則國既終斬絶矣汝何用而不察哉集說輔氏廣曰以南山積石之髙峻興師尹位望之尊崇以見望既重則責亦深因不可以冒處而竊據也憂心如惔憂之甚也不敢戲談畏其威也戲談猶且不敢而况敢正言其失直指其非乎小人而居髙位縱欲戕理以致禍亂其終未有不厲威肆虐以箝人之口者然國既終將斬絶矣汝何用而不察哉蓋事已至此而在家父則又不得而不言者也節彼南山有實其猗於宜反叶於何反赫赫師尹不平謂何天方薦徂殿反瘥才何反喪息浪反亂𢎞多民言無嘉叶居何反憯七感反莫懲嗟叶遭哥反集傳興也有實其猗未詳其義傳曰實滿猗長也孔氏穎逹曰南山既髙峻矣而又滿之使平均者以其草木之長茂也箋云猗倚也言草木滿其㫄倚之畎谷也孔氏穎逹曰言有實其猗是猗為山之所實之處故以為倚言山傍而倚近山者也山傍近山唯甽谷耳能實甽唯草木也故知以草木平滿其傍之甽谷也或以為草木之實猗猗然皆不甚通輔氏廣曰有實其猗先生以為諸說皆不甚通者蓋與不平之意不相似耳然鄭氏之意太鑿而或者之說似可通故蘇氏亦云草木山之實也山之生物平均如一凡草木之生於上者無不猗猗其長也如此則與不平之意相近矣薦荐通重直用反也瘥病𢎞大憯曾懲創也節然南山則有實其猗矣赫赫師尹而不平其心則謂之何哉鄭氏康成曰責三公之不均平不如山之謂也王氏安石曰不平謂何者發問之辭也蘇氏曰為政者不平其心則下之榮瘁勞佚有大相絶者矣是以神怒而重之以喪亂人怨而謗讟其上然尹氏曾不懲創咨嗟求所以自改也集說嚴氏粲曰禮言冢宰均邦國書言冢宰均四海大臣之事唯在均平公溥也此詩原幽王之亂由於師尹究師尹之惡在於不平而已下言秉國之均昊天不傭式夷式已君子如夷既夷既懌昊天不平皆此意也蔣氏悌生曰南山之髙大則有草木之實猗猗然而茂盛而赫赫之師尹居於髙位乃不能平其政上則得罪於天而喪亂薦至下則得罪於民而怨讟方興禍亂之形若此其著孰不恐懼而尹氏曾無懲創之意咨嗟之聲可謂空食天祿居髙位也始則舉其理之當然者以問之終則指其禍之顯然者以責之尹氏大音泰師維周之氐丁禮反叶都黎反秉國之均四方是維天子是毗婢尸反俾民不迷不弔昊天不宜空我師叶霜夷反集傳賦也氐本均平朱子曰均本當從金如所謂泥之在鈞者不知均是何物潘時舉曰恐只是為瓦器者所謂車盤是也蓋運得愈急則其成器愈快曰秉國之均只是此義今訓平者此物亦惟平乃能運也維持毗輔弔愍空窮師衆也言尹氏大師維周之氐王氏安石曰京室以大族為氐朝廷以尊官為氐氐者安危存亡所出也尹氏大族也大師尊官也而秉國之均黃氏佐曰居權衡之任也則是宜有以維持四方毗輔天子而使民不迷乃其職也今乃不平其心而既不見愍弔於昊天矣則不宜久在其位使天降禍亂而我衆並及空窮也吕氏祖謙曰空我師如空其國空其地之類甚言之也集說鄭氏康成曰言尹氏作大師之官持國政之平維制四方上輔天子下教化天下使民無迷惑之憂言任至重輔氏廣曰此又承上二章而明言尹氏維周之本則其所繫者重矣秉國之平則其用心不可偏矣所宜公平其心以維持四方而不傾毗輔天子而以正使民皆曉然知其所以示我者而無所迷惑則是其宜也今乃不平其心一切反是則必不見愍恤於上天矣其可久竊其位而不去哉弗躬弗親庶民弗信叶斯人反弗問弗仕鉏里反下同勿罔君子叶奬里反式夷式已無小人殆叶養里反瑣瑣素火反姻亞則無膴音武仕集傳賦也仕事罔欺也君子指王也夷平已止王氏安石曰已廢退也孟子所謂士師不能治士則已之與此已同義殆危也瑣瑣小貌壻之父曰姻兩壻相謂曰亞膴厚也鄭氏康成曰厚任用之言王委政於尹氏尹氏又委政於姻亞之小人而以其未嘗問未嘗事者欺其君也故戒之曰汝之弗躬弗親庶民已不信矣其所弗問弗事則豈可以罔君子哉當平其心視所任之人有不當者則已之無以小人之故而至於危殆其國也瑣瑣姻亞而必皆膴仕則小人進矣集說吕氏祖謙曰式夷式已無小人殆謂尹氏所與圖事者也瑣瑣姻亞則無膴仕謂尹氏以親昵而置之髙位者也朱氏公遷曰凡事必咨訪而後明必更練而後熟苟未能然而欲妄試之則是欺其君耳民已不可欺况可欺其君乎任用小人皆不平之心為之而所當改者也故以式夷式已告之昊天不傭敕龍反降此鞠九六反訩音凶昊天不惠降此大戾君子如屆音戒叶居例反俾民心闋古穴反叶苦桂反君子如夷惡烏路反怒是違集傳賦也傭均鞠窮訩亂戾乖屆至朱氏公遷曰惠字對傭字屆字對夷字訓義雖不同皆主均平之意也闋息違逺也言昊天不均而降此窮極之亂昊天不順而降此乖戾之變然所以靖之者亦在夫人而已君子無所苟而用其至則必躬必親而民之亂心息矣君子無所偏而平其心則式夷式已而民之惡怒逺矣傷王與尹氏之不能也夫為政不平以召禍亂者人也而詩人以為天實為之者蓋無所歸咎而歸之天也抑有以見君臣隱諱之義焉有以見天人合一之理焉後皆放此集說輔氐廣曰鞠凶大戾不過如二章所言天怒人怨之事也然其所以銷去之者亦在夫人而已矣故君子如屆俾民心闋君子如夷惡怒是違不啻如反手之易初言天而後止言人者天人一理人心悅則天意解矣朱氏善曰大抵人事之有得失氣化之有盛衰此皆治亂之所由惟君子為能以人合太不諉於天以義制命不諉於命則可以轉禍而為福轉災而為祥轉凶而為吉轉亂而為治天也有人焉君子不純以為天也使王能平其心以任尹氏尹氏能平其心以用在朝之君子而不以小人閒之則豈至於危亡而不可救哉故善為國者亦反求諸己而已不弔昊天叶鐵因反亂靡有定叶唐丁反式月斯生叶桑經反俾民不寧憂心如酲音呈誰秉國成不自為政叶諸盈反卒勞百姓叶桑經反集傳賦也酒病曰酲嚴氏粲曰猶黍離言中心如醉成平卒終也蘇氏曰天不之恤故亂未有所止而禍患與嵗月增長君子憂之曰誰秉國成者胡氏一桂曰秉國成即上章秉國均乃不自為政而以付之姻亞之小人其卒使民為之受其勞弊以至此也輔氏廣曰不自為政者亂之始也使百姓受其勞弊者亂之終也集說嚴氏粲曰國之有成乃法度紀綱一成而不可變人主所操執天下所遵守者今誰秉持之乎師尹實秉持之而乃不自為政信任姻亞羣小用事終勞苦我百姓也駕彼四牡四牡項領我瞻四方蹙蹙子六反靡所騁敕領反集傳賦也項大也蹙蹙縮小之貌言駕四牡而四牡項領可以騁矣薛氏漢曰騁馳也而視四方則皆昏亂蹙蹙然無可往之所亦將何所騁哉東萊吕氏曰本根病則枝葉皆瘁是以無可往之地也集說范氏處義曰此章言亂既靡定則四方莫不皆然雖有四牡且項領肥健而視四方蹙縮無有可馳騁之地亦寓言君子有可用之才而無所施設也徐氏光啓曰詩人非果欲去國也但言天下皆亂以見致之者之罪耳方茂爾惡相息亮反爾矛矣既夷既懌如相酬市由反矣集傳賦也茂盛相視懌悅也言方盛其惡以相加則視其矛㦸如欲戰鬭及既夷平悅懌則相與歡然如賓主而相酬酢不以為怪也蓋小人之性無常而習於鬭亂其喜怒之不可期如此是以君子無所適而可也集說吕氏祖謙曰私相疾惡則如矛盾及其好時則依舊相酬或好或惡皆是私情更不以國家為意輔氏廣曰此章則言其一時風俗人情乖戾不顧義理喜怒任意倐忽變遷不可保任如此昊天不平我王不寧不懲其心覆芳服反怨其正叶諸盈反集傳賦也尹氏之不平若天使之故曰昊天不平若是則我王亦不得寧矣然尹氏猶不自懲創其心乃反怨人之正已者則其為惡何時而已哉集說鄭氏康成曰師尹為政不平使我王不得安寧女不懲止女之邪心而反怨憎其正也吕氏祖謙曰此章篇將終矣復歎曰昊天其使尹氏不平乎我王其不得安寧乎今尹氏不懲創其惡覆怨正人之攻己者方且報復而米已吾是以憂君之不得寧也此憂豈為身哉家父音甫作誦叶疾容反以究王訩式訛爾心以畜許六反萬邦叶卜工反集傳賦也家氏父字周大夫也孔氏穎達曰春秋之例天子大夫則稱字究窮訛化畜養也家父自言作為此誦何氏楷曰周禮注云背文曰諷以聲節之曰誦作誦謂作此可誦之辭也以窮究王政昏亂之所由冀其改心易慮以畜養萬邦也陳氏曰尹氏厲威使人不得戲談而家父作詩乃復自表其出於己以身當尹氏之怒而不辭者蓋家父周之世臣義與國俱存亡故也孔氏穎達曰詩人之情不一或微加諷諭或指斥愆咎或隱匿姓名或自顯官字此家父盡忠竭誠不憚誅罰故自載字焉寺人孟子亦此類也東萊吕氏曰篇終矣故窮其亂本而歸之王心焉致亂者雖尹氏而用尹氏者則王心之蔽也李氏曰孟子曰人不足與適也政不足與閒也惟大人為能格君心之非蓋用人之失政事之過雖皆君之非然不必先論也惟格君心之非則政事無不善矣用人皆得其當矣集說嚴氏粲曰窮究訩亂之由乃是王心之未回王庶幾改化其心以養萬邦謂心一悔悟則本原既正而萬邦皆理矣師尹安得容其姦乎朱氏善曰家父作詩冀其改心易慮以畜養萬邦者拳拳愛君之心不敢謂其必不能而絶望焉厚之至也總論許氏謙曰此詩刺王用尹氏前九章惟極言尹氏之罪而卒章以一言歸之王心則輕重本末自見此家父之善於辭也其所以刺尹氏者大要有二事為政不平而委任小人也節南山十章六章章八句四章章四句集傳序以此為幽王之詩而春秋桓十五年有家父來求車於周為桓王之世上距幽王之終已七十五年不知其人之同異大抵序之時世皆不足信今姑闕焉可也劉氏瑾曰刺尹氏為政不平而皆似亂亡以後之詞疑此或東遷後詩也集說吕氏祖謙曰案左傳韓宣子來聘季武子賦節之卒章杜氏謂取式訛爾心以畜萬邦之義然則此詩在古止名節也正音政月繁霜我心憂傷民之訛言亦孔之將念我獨兮憂心京京叶居良反哀我小心癙音鼠憂以癢音羊集傳賦也正月夏之四月謂之正月者以純陽用事為正陽之月也繁多訛僞將大也京京亦大也癙憂幽憂也吕氏大臨曰癙憂與下鼠思泣血文雖小異義亦同也癢病也劉氏彝曰鼠病而憂在於穴內人所不知也我有癙憂至於癢病人所不知也此詩亦大夫所作言霜降失節不以其時范氏祖禹曰正月長養之月也繁霜肅殺之氣也曹氏粹中曰霜者隂之凝也正月建巳之月不宜有霜陽微而為隂所勝則霜為之降既使我心憂傷矣而造為姦僞之言以惑羣聽者又方甚大吕氏祖謙曰凡譸張為幻以罔上惑衆者皆謂之訛言然衆人莫以為憂故我獨憂之以至於病也集說蘇氏轍曰純陽用事而繁霜降大夫憂之以為此王聼用訛言之罰也訛言之害大矣然衆不以為憂也獨我憂之而已輔氏廣曰正月而繁霜則災之降於天者甚矣訛言而孔將則亂之起於人者深矣而當時君臣上下恬然不以為憂是皆所謂安其危而利其菑者也故曰念我獨兮憂心京京而又自哀我之憂所以如是大者政緣其小心畏慎是以幽憂而至於病也父母生我胡俾我愈音庾不自我先不自我後叶下五反好言自口叶孔五反下同莠餘久反言自口憂心愈愈是以有侮集傳賦也愈病自從莠醜也王氏安石曰莠惡也穀謂之善則莠惡可知愈愈益甚之意疾痛故呼父母而傷已適丁是時也訛言之人虛僞反覆言之好醜皆不出於心而但出於口是以我之憂心益甚而反見侵侮也集說輔氏廣曰言心聲也言出於心則有根源合義理今言之好醜皆不出於心而但出於口則其為害豈有既哉夫君子之處亂世彼以為是而已以為非彼以為樂而己以為憂動與衆違此所以反見侵侮也季氏本曰好言莠言謂有時言人之善有時言人之惡變亂無常也以此為憂則與小人不合而為所忌矣故反見侮侮之者謂加以才言也此章言己適當訛言之為害而不能避也憂心惸惸其營反念我無祿民之無辜並必政反其臣僕哀我人斯于何從祿瞻烏爰止于誰之屋集傳賦也惸惸憂意也無祿猶言不幸爾辜罪並俱也古者以罪人為臣僕毛氏萇曰古者有罪不入於刑則役之國土以為臣僕亡國所虜亦以為臣僕箕子所謂商其淪喪我罔為臣僕是也言不幸而遭國之將亡與此無罪之民將俱被囚虜而同為臣僕未知將復從何人而受祿如視烏之飛不知其將止于誰之屋也李氏樗曰左傳曰鳥則擇木木豈能擇鳥哉烏鳥微物猶有所擇自歎己之不如鳥也集說朱氏善曰念我無祿傷已之不幸也並其臣僕傷斯民之俱不幸也于何從祿未知其所從之人也于誰之屋未見其所止之處也瞻彼中林侯薪侯蒸之丞反民今方殆視天夢夢莫工反叶莫登反既克有定靡人弗勝音升有皇上帝伊誰云憎集傳興也中林林中也侯維殆危也夢夢不明也皇大也上帝天之神也程子曰以其形體謂之天以其主宰謂之帝言瞻彼中林則維薪維蒸分明可見也劉氏瑾曰大者為薪細者為蒸甚分明也民今方危殆疾痛號訴於天而視天反夢夢然若無意於分别善惡者然此特值其未定之時爾及其既定則未有不為天所勝者也徐氏常吉曰靡人弗勝言不善之人不能勝天也夫天豈有所憎而禍之乎福善禍淫亦自然之理而巳申包胥曰人衆則勝天天定亦能勝人疑出於此集說朱氏公遷曰人之視物小大甚明而天之於人善惡乃無别此以人之有見興天之無知亦反其意以為興也朱氏善曰福善而禍淫此天之常理也善者未必福淫者未必禍則以氣化自盛而趨於衰常者有時而變此正其未定之時也方其未定則人或能以勝天及其既定則天必能以勝人然則今日之受禍者安知其不為他日之福而今日之受福者又安知其不為他日之禍乎謂山蓋卑為岡為陵民之訛言寧莫之懲召彼故老訊音信之占夢叶莫登反具曰豫聖誰知烏之雌雄叶胡陵反集傳賦也山脊曰岡廣平曰陵懲止也故老舊臣也訊問也占夢官名掌占夢者也具俱也烏之雌雄相似而難辨者也歐陽氏修曰凡禽鳥雌雄多以首尾毛色不同别之烏之首尾毛色雌雄不異人所難别謂山蓋卑而其實則岡陵之崇也今民之訛言如此矣而王猶安然莫之止也朱氏公遷曰前責才人矣至此乃以縱讒責其上及其詢之故老訊之占夢則又皆自以為聖人亦誰能别其言之是非乎子思言於衛侯許氏謙曰衛侯慎公頽曰君之國事將日非矣公曰何故對曰有由然焉君出言自以為是而卿大夫莫敢矯其非卿大夫出言亦自以為是而士庶人莫敢矯其非君臣既自賢矣而羣下同聲賢之賢之則順而有福矯之則逆而有禍如此則善安從生詩曰具曰豫聖誰知烏之雌雄抑亦似君之君臣乎集說輔氏廣曰故老舊臣可以决事理之是非者也占夢之官可以決徴兆吉凶者也今也不平心據實而言而但皆自以為聖已耳誰能别其言之果是果非乎唐氏汝諤曰召彼故老四句只形容朝廷之上唯唯諾諾之風如此同聲附和莫敢矯上之非不過聽言則答而已謂天蓋高不敢不局叶居亦反謂地蓋厚不敢不蹐井亦反維號音豪斯言有倫有脊哀今之人胡為虺吁鬼反蜴星歷反集傳賦也局陸氏德明曰局本又作局曲也孔氏穎逹曰曲身也蹐纍足也許氏慎曰小步也號長言之也脊理蜴螈音原也爾雅釋魚蠑螈蜥蜴蜥蜴蝘蜓蝘蜓守宫也郭璞注别四名也虺許氏謙曰虺見斯干蜴皆毒螫音釋之蟲也言遭世之亂天雖高而不敢不局地雖厚而不敢不蹐謝氏枋得曰身在天地閒如無所容其所號呼而為此言者又皆有倫理而可考也哀今之人胡為肆毒以害人而使之至此乎輔氏廣曰所謂此者即上所言局蹐而不敢自安者也集說嚴氏粲曰人謂天為髙而我不敢不曲身傴僂而行懼壓也人謂地為厚而我不敢不纍足小步而行懼陷也天地必無壓陷喻身處亂世禍出意外不可謂必無之事而不懼也人孰不疑其言之過然實則有倫有理何也蓋當時羣小肆毒以害人無所不至不可不慮故言可哀今之人何故為虺蜴之行務欲傷害人乎瞻彼阪音反田有菀音鬱其特天之扤五忽反我如不我克彼求我則如不我得執我仇仇亦不我力集傳興也阪田崎嶇墝音敲埆音殼之處許氏謙曰崎嶇山險也墝埆瘠薄也菀茂盛之貌特特生之苗也扤動也黃氏一正曰扤動搖臲卼使不遂也力謂用力瞻彼阪田猶有菀然之特而天之扤我如恐其不我克何哉朱氏公遷曰地力雖至薄且能生物天心本至仁乃不愛人皆理之難明者也故以為興亦無所歸咎之詞也夫始而求之以為法則惟恐不我得也及其得之則又執我堅固如仇讎然然終亦莫能用也求之甚艱而棄之甚易鄭氏康成曰言其有貪賢之名無用賢之實其無常如此集說蘇氏轍曰君子仕於亂世而困於羣小譬如特苗之生於阪田風雨動之如恐不勝者故尤之曰方其求我以為法也如恐失我耳及與之終日相執仇仇相偶曾不力用我也書曰凡人未見聖若不克見既見聖亦不克由聖輔氏廣曰無所歸咎故歸之天亦窮極而呼天之意也求之甚艱者勉强以徇名也棄之甚易者其氣象識趣皆與已不相類則自然不能用也心之憂矣如或結之今兹之正胡然厲叶力桀反矣燎力詔反之方揚寧或滅之赫赫宗周褒姒音似滅呼悅反之集傳賦也正政也厲㬥惡也火田為燎揚盛也宗周鎬京也褒姒幽王之嬖妾褒國女姒姓也滅亦滅也言我心之憂如結者為國政之㬥惡故也燎之方盛之時則寧有能撲而滅之者乎然赫赫然之宗周而一褒姒足以滅之蓋傷之也李氏樗曰火燎於原寧能滅之今也赫赫之宗周而乃為褒姒之所滅誠可駭也時宗周未滅以褒姒淫妒讒諂而王惑之知其必滅周也孔氏穎達曰詩人明得失之迹見微知著也或曰此東遷後詩也時宗周已滅矣其言褒姒滅之有監戒之意而無憂懼之情似亦道已然之事而非慮其將然之詞今亦未能必其然否也集說歐陽氏修曰上七章皆述王信訛言亂政至此始言滅周主於褒姒者推其禍亂之本也終其永懷又窘求隕反陰雨其車既載才再反乃棄爾輔叶扶雨反載如字輸爾載才再反將七羊反伯助豫叶演女反集傳比也陰雨則泥濘寧去聲而車易以陷也載車所載也輔如今人縛杖於輻以防輔車也孔氏穎逹曰輔是可解脫之物張氏耒曰輔之為物有功於車而非車也輸墮許規反也將請也伯或者之字也蘇氏曰王為淫虐譬如行險而不知止君子永思其終知其必有大難故曰終其永懷又窘陰雨王又不虞難之將至而棄賢臣焉故曰乃棄爾輔君子求助於未危故難不至苟其載之既墮而後號伯以助豫則無及矣集說鄭氏康成曰以車之載物喻王之任國事也棄輔喻逺賢也棄女車輔則墮女之載乃請長者見助以言國危而求賢者已晚矣吕氏祖謙曰前章既言周之必亡矣此懷不能已復誨幽王曰此何等時乃棄賢者不以自助乎無至於傾覆而悔之也無棄爾輔員音云于爾輻方六反叶筆力反屢顧爾僕不輸爾載叶節力反終踰絶險曾是不意叶乙力反集傳比也員益也張氏彩曰員者周防完美無缺陷傾側之意輔所以益輻也屢數顧視也僕將車者也此承上章言若能無棄爾輔以益其輻而又數數顧視其僕則不墮爾所載而踰於絶險若初不以為意者蓋能謹其初則厥終無難也一說王曾不以是為意乎胡氏一桂曰此尚欲救其危亡教之用賢也言苟能如上文所戒尚可以踰歷絶險之地而保其終也顧乃曾是不以為意乎集說范氏祖禹曰治天下者任重道逺故以將車為喻黃氏佐曰上喻棄賢之患此喻用賢之益曰無棄爾輔者喻王用賢者以輔國家也曰屢顧爾僕者喻王先未危而常求賢也曰不輸爾載終踰絶險曾是不意者喻王雖有危難亦可免也是能求賢於未危則可免患於既至賢可不求乎哉魚在于沼之紹反叶音灼亦匪克樂音洛潛雖伏矣亦孔之照音灼憂心慘慘七感反當作懆七各反念國之為虐集傳比也沼池也照明易見也魚在于沼其為生已蹙矣其潛雖深然亦照然而易見言禍亂之及無所逃也集說孔氏穎達曰上章教王求賢而王不能用故此章言賢者不得其所莫知所逃已為之憂而心中慘慘然言王政㬥虐賢人困厄已所以憂也嚴氏粲曰魚相忘於江湖者也今在于池沼非其所樂矣喻君子立於衰亂之朝亦非所樂也魚之深潛雖云藏伏然沼之水淺亦甚照然易見無所逃於網罟之害喻君子雖自韜晦亦未必能避患也然君子不專為一身之安危其憂心慘慘然愁戚者唯念國之行虐政而民罹其害耳彼有旨酒又有嘉殽户交反無韻未詳洽比毗志反其鄰昏姻孔云念我獨兮憂心殷殷集傳賦也洽比皆合也云旋也李氏樗曰與其親戚周旋也殷殷然痛也言小人得志有旨酒嘉殽以合比其鄰里怡懌其昏姻而我獨憂心至於疾痛也鄭氏康成曰此賢者孤特自傷也昔人有言燕雀處堂母子相安自以為樂也突決棟焚而怡然不知禍之將及其此之謂乎李氏樗曰國勢如此而小人之徒乃羣居飲酒以相樂殆燕雀之類也集說蘇氏轍曰小人以利相求故其鄰比昏姻相與膠固為一而君子孑然無朋也輔氏廣曰此章則又言彼得志之小人惟與其姻親鄰里喣濡以相樂而我獨憂心至於疾痛然彼之所以自樂者亦豈真能長保其樂哉佌佌音此彼有屋䔩䔩音速方有穀民今之無祿天夭於遙反是椓陟角反叶都木反哿哥我反矣富人哀比惸獨集傳賦也佌佌小貌䔩䔩窶陋貌指王所用之小人也榖祿夭禍何氏楷曰商書肜日篇云非天夭民與此天夭同義椓害哿可獨單也佌佌然之小人既己有屋矣䔩䔩窶陋者又將有榖矣而民今獨無祿者是天禍椓喪之耳亦無所歸咎之詞也亂至於此富人猶或可勝惸獨甚矣吕氏祖謙曰困苦之甚者又就其閒自較其淺深故曰哿矣富人哀此惸獨此孟子所以言文王發政施仁必先鰥寡孤獨也集說李氏樗曰衰亂之世要其極也貧富俱受其禍言其一時之虐政富者之財猶可以勝其求貧者愈不堪也總論許氏謙曰此詩大概刺小人用事訛僞相挺變亂是非已不得志而憂世之必亂也一章總言其大略二章歎已之遭亂三章憂國必為人所滅四章訛僞之勢甚一時足以勝天五章言如山之髙卑易見者訛言尚欲亂之而上下成俗不知其非六章憂身之無所容七章言用人不常八章言政事㬥惡九章言不可無君子之輔十章承上輔佐而言當謹慎之意十一章言禍亂之極無所逃十二章言小人得志而連其親舊十三章亦言小人得位而良民受禍也正月十三章八章章八句五章章六句集說嚴氏粲曰正月憂亂之作也鄒氏泉曰此詩憂訛言之甚大至於邦國之將亡傷國政之淫虐至於周宗之既滅而斯民之病賢者之困又皆有感慨之思焉可謂以天下之憂為憂者矣十月之交朔日辛卯叶莫後反日有食之亦孔之醜彼月而微此日而微今此下民亦孔之哀叶於希反集傳賦也十月以夏正言之建亥之月也交日月交會謂晦朔之閒也厯法周天三百六十五度四分度之一左旋於地一晝一夜則其行一周而又過一度日月皆右行於天一晝一夜則日行一度月行十三度十九分度之七故日一嵗而一周天月二十九日有奇而一周天又逐及於日而與之會一歲凡十二會張子曰天左旋處其中者順之少遲則反右矣問經星左旋緯星與日月右旋是否朱子曰今諸家是如此說橫渠說天左旋日月亦左旋看來橫渠之說極是只恐人不曉所以詩傳只載舊說或曰此亦易見如以一大輪在外一小輪載日月在內大輪轉急小輪轉慢雖都是左轉只有急有慢便覺日月是右轉了曰然吳氏澄曰古來厯家蓋非不知七政亦左行但順行不可算只得將其逆退與天度相直處算之今當以大虛中作一空盤却以八者之行較其遲速天一土二木三火四日五金六水七月八天土木火其行之速過於日金水月其行之遲又不及日此其大率也方㑹則月光都盡而為晦已會則月光復蘇而為朔朔後晦前各十五日日月相對則月光正滿而為望晦朔而日月之合東西同度南北同道則月掩日而日為之食望而日月之對同度同道則月亢日而月為之食是皆有常度矣問月本無光受日而有光朱子曰方合朔時日在上月在下則月靣向天者有光向地者無光故人不見及至望時月靣向人者有光故見其圓滿若至弦時所謂近一逺三只合有許多光月只是受日光月質常圓不曾缺如圓毬只有一面受日光望日日在酉月在卯正相對受光為盛天積氣上靣徑只中閒空為日月來往地在天中不甚大四邉空有時月在天中央日在地中央則光從四旁上受於月其中昏暗便是地影望以後日與月行便差背向一畔相去漸漸逺其受光靣不正至朔行又相遇日與月正緊相合日便蝕無光然王者修德行政用賢去姦能使陽盛足以勝陰陰衰不能侵陽則日月之行雖或當食而月常避日故其遲速髙下必有參差而不正相合不正相對者所以當食而不食也朱子曰合朔之時日月之東西雖同在一度而月道之南北或差逺於日則不蝕或南北雖亦相近而日在內月在外則不蝕若國無政不用善使臣子背君父妾婦乘其夫小人陵君子夷狄侵中國則陰盛陽微當食必食雖曰行有常度而實為非常之變矣朱氏公遷曰以數言之則其常以理言之則其變矣蘇氏曰日食天變之大者也然正陽之月古尤忌之夏之四月為純陽故謂之正月十月純陰疑其無陽故謂之陽月純陽而食陽弱之甚也純陰而食陰壯之甚也微虧也彼月則宜有時而虧矣此日不宜虧而今亦虧是亂亡之兆也王氏安石曰月有盈虧虧則微矣彼月而微則固其所此日而微則非其常集說陳氏埴曰日月交㑹日為月掩則日蝕日月相望月與日亢則月蝕自是行度分道到此交加去處應當如是厯家推算專以此定踈密本不足為變異但天文才遇此際亦為陰陽厄會於人事上必有災戾故聖人畏之側身修行庶幾可弭災戾也徐氏常吉曰天象民情若不相干天象變於上而遂思下民之可哀此詩人之隱憂日月告凶不用其行叶户郎反四國無政不用其良彼月而食則維其常此日而食于何不臧集傳賦也行道也凡日月之食皆有常度矣而以為不用其行者月不避日失其道也然其所以然者則以四國無政不用善人故也孔氏穎達曰昭七年左傳晉士文伯曰國無政不用善則自取謫於日月之災朱氏善曰不用其行天之反其常也不用其良人之反其常也天之所以反其常正以人之不用善而有以致之也如比則日月之食皆非常矣而以月食為其常日食為不臧者陰亢陽而不勝猶可言也陰勝陽而掩之不可言也故春秋日食必書王氏逢曰隱公一桓公二莊公四僖公三文公二宣公三成公二襄公九昭公七定公三凡三十有六而月食則無紀焉亦以此爾集說嚴氏粲曰日月告以凶證而不由其道謂月掩日也四方無政事而不用其善謂㬥亂又作也因天變而修人事則可以轉災為祥今天變既如彼人事又如此天之所廢不可支也唐氏順之曰幽王不能修德行政陽事失矣故言不用其良為召災之本􅏎􅏎于輒反震電不寧不令叶盧經反百川沸騰山冢崒徂恤反崩高岸為谷深谷為陵哀今之人胡憯七感反莫懲集傳賦也􅏎􅏎電光貌震雷也寧安徐也令善沸出騰乘也山頂曰冢崒崔嵬也髙岸崩陷故為谷深谷填塞故為陵憯曾也言非但日食而已十月而雷電山崩水溢亦災異之甚者孔氏穎達曰此所陳皆當時實事是宜恐懼修省改紀其政而幽王曾莫之懲也董子曰國家將有失道之敗而天乃先出災異以譴告之不知自省又出怪異以警懼之尚不知變而傷敗乃至此見天心仁愛人君而欲止其亂也朱氏公遷曰由董子之言觀之則當上天災異譴告之時正人君恐懼修省之日朱子引之以證詩人願望其君之意集說孔氏光曰大中之道不立則咎徵荐臻天右與王者故災異數見以謫告之欲其改更若不畏懼而輕忽簡誣則凶罰加焉詩曰畏天之威于時保之謂不懼者凶懼之則吉也謝氏枋得曰災異如此幽王之心曾不懲創詩人不指幽王而曰哀今之人微而婉也皇父音甫卿士番維司徒家伯冢宰仲允膳夫棸側留反子內史蹶俱衛反維趣七走反馬叶滿補反楀音矩維師氏豔餘贍反妻煽音扇方處集傳賦也皇父家伯仲允皆字也番棸蹶楀皆氏也孔氏穎達曰皇父及伯仲是字之義其番棸蹶楀單言人棸子以子配之若曾子閔子然故知皆氏卿士六卿之外更為都官以總六官之事也鄭氏康成曰皇父則為之端首兼擅羣職故但目以卿士云或曰卿士蓋卿之士周禮大宰之屬有上中下士劉氏瑾曰周禮大宰卿一人宰夫上士八人中士十有六人旅下士三十有二人公羊所謂宰士朱氏公遷曰隱公九年天王使宰咺來歸仲子之賵公羊氏曰宰咺宰士也左氏所謂周公以蔡仲為已卿士是也朱氏公遷曰定公四年蓋以宰屬而兼總六官位卑而權重也司徒掌邦教冢宰掌邦治皆卿也膳夫上士劉氏瑾曰天官膳夫上士二人掌王之飲食膳羞者也鄭氏康成曰食飯也飲酒漿也膳牲肉也羞有滋味者內史中大夫掌爵祿廢置殺生豫奪之法者也劉氏瑾曰周禮春官內史中大夫一人掌王八柄之法趣馬中士掌王馬之政者也孔氏穎逹曰趣馬下士一人此言中士者誤也王氏逢曰集傳從鄭箋師氏亦中大夫掌司朝得失之事者也劉氏瑾曰周禮地官師氏中大夫一人居虎門之左司王朝掌國得失之事注曰司猶察也察王視朝若有善道可行者則以詔王記君得失若春秋是也美色曰豔豔妻即褒姒也煽熾也王氏安石曰言其勢盛若火之煽然方處方居其所未變徙也陳氏推曰言其寵方固也言所以致變異者由小人用事於外而嬖妾蠱惑王心於內以為之主故也集說季氏本曰七人之中卿士最為要職其餘司徒冢宰膳夫內史趣馬師氏六人之中雖官有崇卑而皆權寵相連其序則必以寵任為先後耳皇父為卿士而引用家伯仲允番棸蹶楀諸小人褒姒方處於勢位根據而不動搖也此言災變之大不惟無以弭之而又益之也抑此皇父豈曰不時胡為我作不即我謀叶謨悲反徹我牆屋田卒汙音烏萊叶陵之反曰豫不戕在良反禮則然矣叶於姬反集傳賦也抑發語辭時農隙之時也嚴氏粲曰陳氏曰不問其非時作動即就卒盡也汙停水也萊草穢也戕害也言皇父不自以為不時欲動我以徙而不與我謀黃氏佐曰動民以徙蓋謂作都于向而遷民使居之乃遽徹我牆屋使我田不獲治卑者汙而髙者萊孔氏穎達曰下田可以種稻無稻則為池髙田可以種禾無禾則生草故下則汙髙則萊又曰非我戕汝乃下供上役之常禮耳李氏公凱曰皇父之文過如此集說彭氏執中曰三代之君不敢鄙夷其民以從已之欲每有興作謀及庶民如盤庚遷殷登進厥民而告之三代世守此道故詩人曰胡為我作不即我謀鄒氏泉曰此章言皇父違常時以徙民而猶假大義以責民也末二句是皇父責民以徙之辭皇父孔聖作都于向式亮反下同擇三有事亶侯多藏才浪反不憖魚覲反遺一老俾守我王叶于放反擇有車馬以居徂向集傳賦也孔甚也聖通明也王氏安石曰皇父甚愚而自謂甚聖故詩人因其自聖而譏之曰孔聖也都大邑也周禮畿內大都方百里小都方五十里皆天子公卿所封也向地名在東都畿內孔氏穎逹曰左傳說桓王與鄭十二邑向在其中杜預云河內軹縣西有地名向上則向在東都之畿內也今孟州河陽縣是也皇輿表今懷慶府孟縣隸河南三有事三卿也鄭氏康成曰禮畿內諸侯二卿孔氏穎逹曰皇父當二卿今立三有事是自同畿外增一卿以比列國也亶信侯維藏蓄也憖者心不欲而自强之詞陸氏德明曰憖爾雅云願也强也且也有車馬者亦富民也徂往也鄭氏康成曰又擇民之富有車馬者以往居于向也董氏逌曰以實其邑也言皇父自以為聖而作都則不求賢而但取富人以為卿又不自强留一人以衛天子但有車馬者則悉與俱往不忠於上而但知貪利以自私也集說王氏安石曰擇三有事亶侯多藏則其用人惟貨其吉也蘇氏轍曰皇父以卿士出封而周之老與其富民無不從者言恣而且貪也民富者乃有車馬耳朱氏公遷曰上章言皇父役以非時而戕其民此章言皇父動以私事而棄其君使下不義事上不忠也黽民允反勉從事不敢告勞無罪無辜讒口囂囂五刀反下民之孽魚列反匪降自天叶鐵因反噂子損反沓徒合反背蒲昧反憎職競由人集傳賦也囂衆多貌孽災害也噂聚也沓重復也陸氏德明曰噂說文作僔沓本又作􅊱職主競力也言黽勉從皇父之役未嘗敢告勞也猶且無罪而遭讒然下民之孽非天之所為也噂噂沓沓多言以相說而背則相憎專力為此者皆由讒口之人耳集說嚴氏粲曰七章言已被讒也顧氏起元曰從事即從不時之役無罪遭讒即下民之孽噂沓諛佞悅人之情狀背則相憎而譖訴以交構讒人之反覆如此用之所以興孽也悠悠我里亦孔之痗莫背反叶呼洧反四方有羡徐靣反我獨居憂民莫不逸我獨不敢休天命不徹叶直質反我不敢效我友自逸集傳賦也悠悠憂也里居痗病羡餘逸樂徹均也當是之時天下病矣而獨憂我里之甚病且以為四方皆有餘而我獨憂衆人皆得逸豫而我獨勞者以皇父病之而被禍尤甚故也然此乃天命之不均吾豈敢不安於所遇而必效我友之自逸哉胡氏一桂曰王氏曰時蓋有潔身而去者已獨不去故有是言蘇氏轍曰所謂知其不可而為之者也集說謝氏枋得曰君子不以一身之憂勤為賢亦不以衆人之逸樂為非凡人命有窮通我之憂勤乃天之所付者如是安之而已不敢效我友之自逸也其辭甚婉其志堅而不可變矣徐氏光啓曰凡人之情已處其樂不知人之憂已處其憂但見人之樂自傷之至則視天下之苦無甚於我者如四月篇民莫不榖我獨何害亦是此意皆善言哀苦之情者也總論胡氏一桂曰王氏曰前三章言災異之變四章言致災由於小人而皇父小人之魁也故五六章專言皇父之惡七章言小人在位天降之災則天變生於人妖也八章言已之憂勞而一篇之義終矣十月之交八章章八句集說曹氏粹中曰鄭氏以十月之交雨無正小旻小宛皆厲王之詩毛公作傳時移其篇第在此而歐陽修蘇轍陳鵬飛皆以其說為非證據甚明當從本序李氏樗曰唐書志云十月之交以厯推之在幽王之六年則是為幽王之詩無疑矣浩浩昊天不駿其德降喪息浪反饑饉其覲反斬伐四國叶于逼反旻密巾反天疾威弗慮弗圖舍音赦彼有罪既伏其辜若此無罪淪胥以鋪普烏反集傳賦也浩浩廣大貌昊亦廣大之意駿大德惠也榖不熟曰饑蔬不熟曰饉李氏巡曰可食之菜皆不熟為饉疾威猶㬥虐也慮圖皆謀也舍置淪陷胥相鋪遍也此時饑饉之後羣臣離散其不去者作詩以責去者故推本而言昊天不大其惠降此饑饉而殺伐四國之人如何旻天陸氏德明曰本有作昊天者非也曾不思慮圖謀而遽為此乎輔氏廣曰言天之幽逺不可測識故降此㬥虐而曾不思慮圖謀也彼有罪而饑死則是既伏其辜矣舍之可也蘇氏轍曰置而弗疑可也此無罪者亦相與而陷於死亡則如之何哉輔氏廣曰此皆心有所疑無所歸咎而訴天之辭也集說朱氏善曰自其廣大而言謂之昊天自其仁覆閔下而言謂之旻天天之廣大也而饑饉以斬伐則是不大其惠也天之仁覆閔下也而有罪無罪俱陷死亡則是不溥其仁也周宗既滅靡所止戾正大夫離居莫知我勩夷世反三事大夫莫肯夙夜叶弋灼反邦君諸侯莫肯朝夕叶祥籥反庶曰式臧覆芳服反出為惡集傳賦也宗族姓也蘇氏轍曰周宗姬姓之宗也戾定也正長也周官八職一曰正梁氏益曰天官宰夫掌百官府之徵令辨其八職一曰正二曰師三曰司四曰旅五曰府六曰史七曰胥八曰徒謂六官之長皆上大夫也離居蓋以饑饉散去而因以避讒譖之禍也我不去者自我也勩勞也三事三公也陳氏櫟曰如漢魏以來史云位登三事皆指為三公大夫六卿及中下大夫也臧善覆反也言將有易姓之禍其兆已見王氏安石曰方是時周未滅而曰既滅者其滅之形成故也而天變人離又如此劉氏瑾曰天變上章所言是也人離此章所言是也庶幾曰王改而為善乃覆出為惡而不悛也或曰疑此亦東遷後詩也陳氏埴曰亦字乃因前正月篇而言耳劉氏瑾曰詩言周宗既滅似亦道已然之事而非慮其將然之辭似果作於東遷之後也集說范氏祖禹曰靡所止戾未知天之所命民之所定矣莫肯夙夜無在公之節也莫肯朝夕無尊王之禮也朱氏善曰人臣之義有與君同休戚者有與國同休戚者今曰正大夫離居則非特無與國同休戚者亦無與君同休戚者矣然衆人皆去而已獨居則衆人皆逸而已獨勞雖有黽勉從事之勤孰得而知之哉三事大夫有官守者也而莫肯夙夜邦君諸侯有民社者也而莫肯朝夕則雖未至於離居而已莫有任其責者矣天變人離敗亡之兆可見庶幾王改而為善乃覆出而為惡則天意豈可得而回人心豈可得而挽哉如何昊天叶鐵因反下同辟言不信叶斯人反如彼行邁則靡所臻凡百君子各敬爾身胡不相畏不畏于天集傳賦也如何昊天呼天而訴之也辟法臻至也凡百君子指羣臣也季氏本曰即指三事大夫之在位者言如何乎昊天也法度之言而不聽信則如彼行往而無所底至也然凡百君子豈可以王之為惡而不敬其身哉不敬爾身不相畏也不相畏不畏天也集說孔氏穎達曰天道設教以卑承尊若下不事上是不畏天道王氏安石曰世雖昏亂君子不可以為惡自敬故也畏人故也畏天故也黃氏佐曰人與已一心也不敬身不相畏也天與人一理也不相畏不畏天也戎成不退叶吐類反下同饑成不遂曾在登反我暬思列反御憯憯七感反日瘁徂醉反凡百君子莫肯用訊叶息悴反聽言則答譖言則退集傳賦也戎兵遂進也易曰不能退不能遂是也劉氏瑾曰易大壯上六曰羝單觸藩不能退不能遂暬御近侍也國語曰居寢有暬御之針劉氏瑾曰楚語暬作褻注云近也蓋如漢侍中之官也應氏劭曰入侍天子故曰侍中憯憯憂貌瘁病訊告也言兵寇已成而王之為惡不退饑饉已成而王之遷善不遂使我暬御之臣憂之而慘慘日瘁也凡百君子莫肯以是告王者雖王有問而欲聽其言則亦答之而已不敢盡言也一有譖言及已則皆退而離居莫肯夙夜朝夕於王矣其意若曰王雖不善而君臣之義豈可以若是恝乎集說嚴氏粲曰此章言羣臣無忠告也兵戎之禍已成外患之熾也饑困之災已成內憂之迫也朱氏善曰凡百君子莫肯以是告王即上章正大夫之離居邦君大夫之莫肯夙夜朝夕者聽言則答謂告君不盡其誠也譖言則退謂引身逺避其禍也斯人也愛君不如愛身之厚憂國不如憂家之深其自為計則得矣而以君臣之大義責之能無愧乎哀哉不能言匪舌是出尺遂反維躬是瘁哿矣能言巧言如流俾躬處休集傳賦也出出之也瘁病哿可也言之忠者當世之所謂不能言者也故非但出諸口而適以瘁其躬佞人之言當世所謂能言者也故巧好其言如水之流無所凝滯而使其身處於安樂之地蓋亂世昏主惡忠直而好諛佞類如此詩人所以深歎之也集說姚氏舜牧曰緊承上節若謂聽言則答譖言則退亦無怪其然也聞忠言則病其不能言而俾處瘁聞佞言則喜其能言而俾處其休是出言誠有不易者但人臣之義則應言無不盡不應若是之退避耳此於曲體其情中深寓切責之意維曰于仕鉏里反孔棘且殆叶養里反云不可使得罪于天子叶奬里反亦云可使怨及朋友叶羽已反集傳賦也于往棘急殆危也蘇氏曰人皆曰往仕耳曾不知仕之急且危也當是之時直道者王之所謂不可使而枉道者王之所謂可使也直道者得罪于君而枉道者見怨于友此仕之所以難也嚴氏粲曰言進退皆有咎也集說輔氏廣曰直道而盡言者則得罪於其君巧言以徇人者則見怨於其友蓋朋友以相切磋為道若枉道以從君則朋友必見棄絶矣以是言之則當時之仕又豈易為哉忠言獲罪而巧言處休直道見抑而枉道見容皆亂世之常事也謂爾遷于王都曰豫未有室家叶古胡反鼠思息嗣反泣血叶虛屈反無言不疾昔爾出居誰從作爾室集傳賦也爾謂離居者鼠思猶言癙憂也當是時言之難能而仕之多患如此劉氏瑾曰此承上文五章六章而言也故羣臣有去者有居者居者不忍王之無臣已之無徒則告去者使復還于王都去者不聽而託於無家以拒之至於憂思泣血有無言而不痛疾者蓋其懼禍之深至於如此然所謂無家者則非其情也故詰之曰昔爾之去也誰為爾作室者而今以是辭我哉季氏本曰此為正大夫之離居者言集說曹氏粹中曰君子立於羣枉之中孤立而無與畏禍之深欲其來而助已也輔氏廣曰此章則又盡言已意以告諸離居者使之復反於王都彼既不從則又言其痛切之情為可念者而猶盡言以詰之而庶其或見聽可謂既能盡人之情而又能盡已之志也然則此暬御之臣蓋亦非常人矣總論黃氏佐曰吾讀哀哉以下三章而知詩人之責去者尤甚於上三章也蓋徒責之而不言時勢之難處不體其情之痛切則近乎不近人情者而彼猶得以有辭矣惟責之至此則以為吾非不知汝情之痛切也然以是而遂去之則君臣之義固若是恝乎沈氏守正曰通詩責離散而詞旨嗟歎體諒不正責之至末章始窮其情而猶有屬望之意蓋去者原未嘗以義絶亦不敢以明言窮之正冀以返之也雨無正七章二章章十句二章章八句三章章六句集傳歐陽公曰古之人於詩多不命題而篇名往往無義例其或有命名者則必述詩之意如巷伯常武之類是也今雨無正之名據序所言與詩絶異當闕其所疑元城劉氏曰嘗讀韓詩有雨無極篇序云雨無極正大夫刺幽王也至其詩之文則比毛詩篇首多雨無其極傷我稼穡八字愚案劉說似有理然第一二章本皆十句今遽增之則長短不齊非詩之例又此詩實正大夫離居之後暬御之臣所作其曰正大夫刺幽王者亦非是且其為幽王詩亦未有所考也附録劉氏瑾曰二章首言周宗既滅繼言正大夫離居卒章又言謂爾遷于王都曰豫未有室家似是東遷之際羣臣懼禍者因以離居不復隨王遷于東都故見於詩詞如此而文侯之命亦曰即我御事罔或耆壽俊在厥服則其驗也參考正月所謂赫赫宗周褒姒滅之及節南山國既卒斬何用不監等語疑此三詩猶皆為東周之變雅其後雅亡於上而國風作於下於是春秋託始於隱公實為平王之四十九年也祈父之什十篇六十四章四百二十六句欽定詩經傳說彚纂卷十二
