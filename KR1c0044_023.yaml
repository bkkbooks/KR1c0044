body:
  text: 欽定四庫全書欽定詩經傳説彚纂卷二十一魯頌四之四集傳魯少皥之墟孔氏穎達曰昭十七年左傳云郯子曰少皥摯之立也定西年左傳祝佗曰命伯禽封於少皥之墟是其文所出也明堂位曰封周公於曲阜少皥之墟即曲阜也在禹貢徐州蒙羽之野王氏應麟曰蒙山在沂州新㤗縣東南八十里羽山在海州胊山縣西北一百里成王以封周公長子伯禽孔氏穎達曰史記魯世家武王既克殷封周公旦於曲阜周公不就封卒相成王使其子伯禽代就封於魯至歸政之後成王乃大啓土宇合地方七百里魯之封疆於是始定故據後定言之今襲慶東平府沂宻海等州即其地也皇輿表襲慶府今兖州府東平府今東平州沂州今沂州俱属兖州府宻州今諸成縣屬肯州府海州今寜海州屬登州府竝𨽻山東成王以周公有大勲勞於天下故賜伯禽以天子之禮樂魯於是乎有頌以為廟樂鄭氏康成曰初成王以周公有太平制典法之勲命魯郊祭天三望如天子之禮孔氏穎逹曰禮運杞之郊也禹宋之郊也契是王者之後得郊天申命魯得郊天子禮周為王者之後故孔子亦録其詩之頌同於王者之後也王者之後而有頌者正謂宋有商頌解魯頌所以得與商頌同稱頌之意也其後又自作詩以美其君亦謂之頌王氏炎曰魯頌皆以美其君與宗廟無預其詩似用以燕樂此頌之變也嚴氏粲曰周之衰也風變而雅頌亡頌聲之息前乎風雅之變矣越桓莊僖惠至襄而魯乃有頌是故雅變而亡頌亡而變雅之亡甚於變頌之變甚於亡也朱氏公遷曰以其皆稱美頌禱之辭故不謂之風而謂之頌舊説皆以為伯禽十九世孫僖公申之詩今無所考獨閟宫一篇為僖公之詩無疑耳夫以其詩之僭如此然夫子猶錄之者蓋其體固列國之風孔氏穎達曰名雖為頌而體實國風非告神之歌曹氏粹中曰今以其體觀之分章斷句實國風之流耳而所歌者乃當時之事則猶未純於天子之頌若其所歌之事又皆有先王禮樂教化之遺意焉則其文宜若猶可予也况夫子魯人亦安得而削之哉然因其實而著之而其是非得失自有不可揜者亦春秋之法也朱子曰著於篇所以見其僭也春秋書郊禘大雩雉門兩觀猶是意也削之則沒其實矣故其文予之而實則不予也或曰魯之無風何也先儒以為時王襃周公之後比於先代故廵守不陳其詩而其篇第不列於太師之職是以宋魯無風其或然歟蘇氏轍曰春秋之際大國皆有變風宋魯獨無風有頌鄭氏云宋王者之後魯聖人之後是以天子廵守不陳其詩所以禮之也或謂夫子有所諱而削之則左氏所記當時列國大夫賦詩及吳季子觀周樂皆無曰魯風者其説不得通矣集説鄭氏康成曰周公歸政成王封其元子伯禽於魯自後政衰國事多廢十九世至僖公遵伯禽之法國人美其功季孫行父請命於周而作其頌蘇氏轍曰頌之為詩本於其德而已天子有德於天下則天下頌之諸侯有德於其國則國人頌之商周之頌天下之頌也魯人之頌其國之頌也范氏處義曰魯頌之作曰頌僖公非告神明也曰居常與許復周公之宇皆願之之辭非成功也聖人思西周之盛而不可得幸而有僖公之賢而魯人尊之聖人若曰魯周公之後也而其所以得人心者又如此吾又何疑焉故詩有魯頌所以尊周也魯頌之異於商周者四商周天下頌之魯國人頌之一也商周以告神明而魯用以燕樂二也商周子孫頌其先魯臣下頌其君三也商周多事實魯多頌禱四也章氏俊卿曰頌之為體非徒天子用之諸侯之臣子凡所以祝頌其國者亦得而用之僖公比之諸侯則勤儉其時比之諸侯則小康其事則臣子之願心而非有諂畏此孔子所以取而錄之黄氏佐曰魯之頌雖不皆於祀乎用之而其節奏必皆依頌成聲故得齒於商周而無嫌故曰夫子自衛反魯然後樂正雅頌各得其所夫雅頌得所於樂正之後非樂而何其審聲以配樂而不徒作也明矣以魯而廁商周是猶秦穆之誓上同湯武文侯之命參配傅説駉駉古榮反牡馬叶滿補反在坰古榮反之野叶上與反薄言駉者叶章與反有驈户橘反有皇有驪力知反有黃以車彭彭叶鋪郎反思無疆思馬斯臧集傳賦也駉駉腹幹肥張貌孔氏穎達曰腹謂馬肚幹謂馬脅肥張者充而張大邑外謂之郊郊外謂之牧牧外謂之野野外謂之林林外謂之坰鄭氏康成曰必牧於坰野者避民居與良田也坰之牧地水草既美牧人又良飲食得其時則自肥健耳驪馬白跨曰驈孔氏穎達曰孫炎曰驪黑色也郭璞云跨髀間也然則跨者所跨據之處黄白曰皇孔氏穎達曰黄而雜白者名為皇純黑曰驪孔氏穎達曰月令孟冬云駕鐵驪象時之色檀弓云夏后氏尚黑戎事乗驪故知純黑曰驪黃騂曰黃孔氏穎達曰騂者赤色謂黄而雜赤者也彭彭盛貌毛氏萇曰有力有容也思無疆言其思之深廣無窮也臧善也此詩言僖公牧馬之盛朱氏公遷曰此言僖公牧馬之盛用序説也由其立心之遠故美之曰思無疆則思馬斯臧矣衛文公秉心塞淵而騋牝三千亦此意也劉氏瑾曰美文公之馬則言其騋而牝者有三千之衆美僖公之馬則言其駉而牡者有十六種之毛色蓋各極其盛而言皆以見其國之殷富也集説毛氏萇曰諸侯六閑馬四種有良馬有戎馬有田馬有駑馬孔氏穎達曰首章言良馬朝祀所乗故云彭彭見其有力有容蘇氏轍曰僖公推其誠心以治其國家其思慮無所不及以為不可徧舉故舉其一曰思馬斯臧苟思馬而馬善則凡其思慮之所及未有不善者也姚氏舜牧曰思無疆不專牧馬一節凡公之君國子民盡人與物無不極其思慮而圗謀之逺眞有無疆域之可限者即馬一節觀之而皆馴良可御若隨所思而臧焉斯可見其略矣徐氏常吉曰馬重駉駉言色特以騐其盛耳上思字就君國子民言下思字就馬政修舉言駉駉牡馬在坰之野薄言駉者有騅音佳有駓符悲反有騂有騏以車伾伾符丕反思無期思馬斯才叶前西反集傳賦也蒼白雜毛曰騅孔氏穎達曰雜毛是體有二種之色相間雜上云黄白曰皇黃騂曰黃止二毛色之中自有淺深與此二色者異故不云雜毛也黃白雜毛曰駓孔氏穎達曰郭璞曰今之桃華馬也赤黃曰騂孔氏穎達曰周人尚赤而牲用騂是騂為純赤言赤黄者謂赤而㣲黄其色辨明者上云黄騂曰黄是黄而㣲赤此云赤黃曰騂是赤而㣲黄青黑曰騏孔氏穎達曰騏者黑色之名蒼騏曰騏謂青而㣲黑今之驄馬也伾伾有力也無期猶無疆也才材力也集説孔氏穎達曰此章言戎馬戎馬貴多力故云伾伾有力張氏耒曰斯臧良馬也斯才戎馬也臧者言其德才者言其用陳於禮者尚德用於戰者尚才故也駉駉牡馬在坰之野薄言駉者有驒徒河反有駱有駵音畱有雒以車繹繹叶弋灼反思無斁叶弋灼反思馬斯作集傳賦也青驪驎曰驒色有深淺斑駁如魚鱗今之連錢驄也許氏慎曰青驪白鱗文如鼉魚白馬黑鬣曰駱孔氏穎達曰鬣謂馬之騣也赤身黒鬣曰駵孔氏穎達曰駵為赤色若身鬣俱赤則騂馬故赤身黑鬣曰駵黑身白鬣曰雒繹繹不絶貌黄氏一正曰繹繹連屬貌言其馬之善走也斁厭也作奮起也何氏楷曰作即易震卦為作足之作謂奮迅而動作也集説孔氏穎達曰此章言田馬田獵尚疾故言繹繹善走駉駉牡馬在坰之野薄言駉者有駰音因有騢音遐叶洪孤反有驔音簟有魚以車祛祛起居反思無邪叶祥余反思馬斯徂集傳賦也隂白雜毛曰駰隂淺黑色今泥驄也彤白雜毛曰騢孔氏穎達曰舍人曰赤白雜毛今赭馬名騢郭璞云彤赤也即今赭白馬是也豪骭户晏反曰驔豪在骭而白也孔氏穎達曰説文云骭骹也郭璞曰骭脚脛然則骭者膝下之名二目白曰魚似魚目也羅氏願曰馬目欲得黃又欲光而有紫燄若目小而多白則驚畏驚畏馬之大病故其序尤在後祛祛彊健也徂行也何氏楷曰以駕給使之車可以䇿逐而行也孔子曰詩三百一言以蔽之曰思無邪蓋詩之言羙惡不同或勸或懲皆有以使人得其情性之正朱子曰如正風雅頌等語可以起人善心如變風刺滛等詩可以使人知戒懼人讀好底詩固是知勸若讀不好底詩便知得此心不可如此所以讀詩者便思無邪也蓋詩之功用如此所謂得情性之正者情性是貼思字正是貼無邪字然其明白簡切通於上下未有若此言者故特稱之以為可當三百篇之義以其要為不過乎此也學者誠能深味其言而審於念慮之間必使無所思而不出於正則日用云為莫非天理之流行矣王氏安石曰思無邪一出於正彭氏執中曰夫子敎人學詩之法思無邪一言乃學者之樞要也劉氏瑾曰詩之為教無非使人得其情性之正然就詩經而指其要以示人則惟思無邪之語既明白簡切而足明各詩之直指又通於上下而足該衆詩之全體比於其他詩詞則多㣲婉而或不能明白簡切各言一事而或不能通於上下故夫子獨稱思無邪之一言以示學詩者守約施博之道誠意正心之方也王氏守仁曰思無邪一言豈特三百篇六經只此一言便可該貫以至窮古今天下聖賢的語思無邪一言也可該貫此外更有何説此是一了百當的功夫蘇氏曰昔之為詩者未必知此也孔子讀詩至此而有合於其心焉是以取之蓋斷章云爾梁氏益曰左襄二十八年盧蒲癸曰賦詩斷章言賦詩者但取其一章為義斷取其一章也集説孔氏穎達曰此章言駑馬主以給官中之役貴其肥壯故曰祛祛強健也總論呂氏大臨曰僖公修牧馬之政以誠心行之故言思無疆思無期思無斁思無邪馬之所以臧才作徂者其效也古之賢君誠心以行善政其效皆若此非獨牧馬而已范氏處義曰每章言牡蓋馬以牡為善也每章言薄言駉者謂馬之善不止是也其品固多矣言馬之善而繼之以思則僖公蓋嘗精思而後得此也馬之臧也馬之才也馬之作也馬之徂也皆有以致之而原於一心之思慮以見處事無不曲當其效自如此也許氏謙曰每章之意惟在第七句無疆者廣大也無期者不苟於近利也無斁者持之能乆也惟所思者如此故乆而有富盛之效其富盛非特馬也因馬可以見其他爾然思之無疆無期無斁猶未知其所思者當耶否耶至其卒章辭曰思無邪則見其心之正取於民者有制其富盛皆所當得非掊克苛斂以致之者也朱氏公遷曰問國君之富數馬以對故詩人以之頌美其君如此鄧氏元錫曰魯頌首駉重本也思無邪政本也思無疆無期則大無斁則久無邪則貞鄒氏泉曰各章上思字汛就平日立心言下思字則思及於馬凡畜之而不枉其性用之而不窮其力食之而必以其道䇿之而曲盡其材皆是也駉四章章八句集説朱氏謀㙔曰魯政多矣獨舉考牧一事軍國之所重也沈氏萬鈳曰孔子曰魯衛之政兄弟也蓋憫其衰亂之相似也夫憫其衰亂之相似則豈不喜其興復之相侔乎是故魯之駉牡揚於頌衞之騋牝襃於風有駜蒲必反有駜駜彼乗繩證反黃夙夜在公在公明明叶謨郎反振振鷺鷺于下叶後五反鼓咽咽烏𤣥反醉言舞于胥樂音洛兮集傳興也駜馬肥強貌許氏慎曰馬飽也郝氏敬曰重言有駜者非一馬也明明辨治也歐陽氏修曰明明修明其職也朱氏公遷曰辨則不雜治則不亂道燕飲而先之以夙夜明明蓋勤勞治理以其餘暇為樂耳振振羣飛貌鷺鷺羽舞者所持或坐或伏如鷺之下也陸氏佃曰鷺之集每至水面數尺則必低徊少盤其勢與飛之時徑起特異蓋其天性舞而後下也咽與淵同陸氏德明曰咽本又作淵鼓聲之深長也毛氏萇曰咽咽鼔節也孔氏穎達曰燕禮以樂助勸故以鼓節之咽咽然或曰鷺亦興也毛氏萇曰鷺以興潔白之士鄭氏康成曰潔白之士羣集於君之朝君以禮樂與之飲酒歐陽氏修曰振鷺取其能自修潔翔集有威儀也胥相也醉而起舞以相樂也鄭氏康成曰至於無算爵則又舞燕樂以盡其歡君臣於是則皆喜樂也此燕飲而頌禱之詞也劉氏瑾曰此為燕飲之詩唯卒章自今以始以下則頌禱之詞也集説曹氏粹中曰魯之羣臣乗其駜然壯健之馬來朝夙夜在於公所而不敢懈輔氏廣曰駜彼乗黄恐是指來燕者所乗之馬故因以起興在公明明所謂精白一心以承休德也有駜有駜駜彼乗牡夙夜在公在公飲酒振振鷺鷺于飛鼓咽咽醉言歸于胥樂兮集傳興也鷺于飛舞者振作鷺羽如飛也集説毛氏萇曰言臣有餘敬而君有餘惠孔氏穎達曰臣禮朝朝暮夕不當常在君所今閒暇無事而夙夜在公是臣有餘敬也君之於臣饗燕有數今以無事之故即與之飲酒是君有餘惠也曹氏粹中曰上章醉言舞以樂成之也此章醉言歸以禮節之也季氏本曰在公飲酒相導以和也明明在其中矣醉言歸止而不過之意何氏楷曰酒以成禮不繼以滛此之謂能樂有駜有駜駜彼乗駽呼縣反夙夜在公在公載燕自今以始嵗其有叶羽已反君子有穀詒孫子叶奬里反于胥樂兮集傳興也青驪曰駽今鐵驄也孫氏炎曰色青黑之間載則也有有年也孔氏穎達曰春秋書有年者謂五穀大熟豐有之年穀善也或曰祿也何氏楷曰國以民為本民以食為大使嵗歲豐登家給人足是即君子之享有天祿也詒遺也何氏楷曰詒通作貽説文云贈遺也頌禱之辭也朱氏公遷曰頌禱則願之之詞蓋有唐風蟋蟀好樂無荒之意集説鄭氏康成曰君臣相樂則隂陽和而有豐年其善道則可以遺子孫也曹氏粹中曰君民如此治道得矣復何為哉若自此年穀常登子孫相承力於為善則無疆之休也輔氏廣曰自今以始歳其有為庶民之慮切矣君子有穀詒孫子為後世之慮深矣此可謂善頌善禱也黄氏佐曰豐年而繼於後則常有以需國用而贍民生善道而傳於後則常有以固人心而承天命總論范氏處義曰始言在公明明則明足以善其職中言飲酒卒言載燕既善其職則朝廷無事君臣相與飲酒而宴樂耳始言舞不知手之舞之足之蹈之也終言歸既醉而出竝受其福也上二章醉而舞醉而歸一時之樂耳未若卒章人臣稱願歳歲有年君子之穀詒孫子其樂為無窮不止於一時也姚氏舜牧曰詩本燕飲而章内都著夙夜在公句首章更著在公明明句見君臣之所先圗者在國家之幾務政有餘暇然後燕以樂耳有駜三章章九句集説鄧氏元錫曰有駜有小雅慈惠之心焉上下交則和而安思樂音洛泮普半反水薄采其芹其斤反魯侯戾止言觀其旂叶其斤反其旂茷茷蒲害反鸞聲噦噦呼㑹反無小無大從公于邁集傳賦其事以起興也思發語辭也泮水泮宫之水也諸侯之學鄉射之宫謂之泮宫毛氏萇曰天子辟廱諸侯泮宫其東西南方有水形如半璧以其半於辟廱故曰泮水而宫亦以名也鄭氏康成曰辟廱者築土雝水之外圓如璧四方來觀者均也泮之言半也半水者蓋東西門以南通水北無也孔氏穎達曰北無水者下天子耳芹水菜也嚴氏粲曰解見采菽戾至也毛氏萇曰戻來也茷茷飛揚也錢氏文子曰茷茷草葉多貌旂下垂如葉之多也噦噦和也毛氏萇曰噦噦言其聲也孔氏穎達曰言其車服得宜行趨中節也王氏安石曰觀其旂其物茷茷而有容聽其鸞其聲噦噦而有節此飲於泮宫而頌禱之詞也劉氏瑾曰首章本其始而言魯侯與其衆至泮宫也三章以後然後言飲酒頌禱之事集説李氏樗曰菁莪以莪喻人才豐水有芑以芑喻人才此詩言薄采其芹薄采其藻薄采其茆皆是言僖公能育人才也國人無長無㓜皆從公而徃以見國人從僖公之樂也漢明帝開辟廱冠帶縉紳之人圜橋門而觀聽者蓋億萬計今僖公修泮宫而從之者多宜矣嚴氏粲曰稱其儀物之美者喜其來至之辭如所謂聞車馬之音見羽旄之美舉欣欣然有喜色也何氏楷曰興意在大小從公二句教不擇人苟有其材皆可以取而成就之猶采菜者之不廢夫芹也思樂泮水薄采其藻魯侯戾止其馬蹻蹻居表反其馬蹻蹻其音昭昭叶之繞反載色載笑匪怒伊教集傳賦其事以起興也蹻蹻盛貌毛氏萇曰其馬蹻蹻言彊盛也色和顔色也毛氏萇曰色溫潤也集説李氏樗曰教人而至於有所怒是非所謂樂育人材也惟其匪怒伊教此其所以為善育人材歟以國人之從公于邁其喜觀之如此僖公至泮水又且和顔悦色其樂教人又如此上下各盡其樂則泮水之中風化之盛可知矣黄氏櫄曰芹藻㣲物也而樂之有餘所樂者在僖公而寓於芹藻也樂心一生則烏可已觀其旂則樂其茷茷聞其鸞則樂其噦噦見其馬則樂其蹻蹻人之樂之也如此僖公何以得此於魯人哉載色載笑即之也溫匪怒伊教循循善誘僖公之育才可見矣輔氏廣曰其音昭昭集傳遺此一句解鄭氏謂僖公之德音者是也故下面説載色載笑匪怒伊教以見善於敎人載色載笑王氏以為洪範所謂而康而色者亦是也劉氏瑾曰言魯侯至泮而和其笑語也思樂泮水薄采其茆叶謨九反魯侯戾止在泮飲酒既飲旨酒永錫難老叶魯吼反順彼長道叶徒吼反屈此羣醜集傳賦其事以起興也茆鳧葵也葉大如手赤圎而滑江南人謂之蓴菜者也陸氏璣曰茆與荇菜相似或謂之水葵諸陂澤水中皆有長道猶大道也屈服醜衆也孔氏穎達曰順彼仁義之長道以收歛此醜衆人民王氏安石曰順從此君子之長道而屈服此魯國之羣衆也此章以下皆頌禱之詞也集説輔氏廣曰此章言在泮飲酒則是在泮宫燕飲矣自此而下皆頌禱之辭首祈其夀考次祈其功業亦可謂善頌善禱矣長道謂長乆之道也其曰羣醜雖曰羣衆便已含淮夷在其中朱氏善曰三章教畢而燕賢者樂告以善道内治益修逺人自服也季氏本曰永錫難老欲其乆於敷教以致治安也穆穆魯侯敬明其德敬慎威儀維民之則允文允武昭假音格烈祖靡有不孝自求伊祜候五反集傳賦也昭明也假與格同烈祖周公魯公也集説李氏樗曰民之所以則之者非在於空言亦以僖公内焉能慎其明徳外焉能慎其威儀民所以慕其德而化之也凡所行之事無不盡其孝故福祿是魯侯之福祿乃自求之也范氏處義曰此章專頌僖公之德為下四章服淮夷張本也雖曰頌之亦有規意蓋謂非有德不足以服人也輔氏廣曰威儀者君德之符文武者君德之備也黄氏佐曰敬徳欲存養省察無間也敬儀欲動容周旋中禮也文武兼資所以昭假乎烈祖所謂靡有不孝也自求伊祜即永言配命自求多福之意明明魯侯克明其德既作泮宫淮夷攸服叶蒲北反矯矯虎臣在泮獻馘古獲反叶况壁反淑問如皋陶叶夷周反在泮獻囚集傳賦也矯矯武貌馘所格者之左耳也孔氏穎達曰馘臨陣格殺之而取其耳也淑善也問訊囚也囚所虜獲者孔氏穎達曰生執而係虜之則所謂執訊者也蓋古者出兵受成於學鄭氏康成曰定兵謀也及其反也設奠於學而以訊馘告鄭氏康成曰釋菜奠幣禮先師也訊馘所生獲㫁耳者孔氏穎達曰以生獲解訊以斷耳解馘故詩人因魯侯在泮而願其有是功也朱子曰或謂僖公末嘗有淮夷之功而疑此詩之妄蓋未嘗深考此詩乃頌禱之辭冀其有是功耳集説孔氏穎達曰所馘者是不服之人須武臣之力當殺其人而取其耳而使武臣如虎者獻之所囚者服罪之人察獄之吏當受其辭而斷其罪故使善聽獄如皋陶者獻之李氏樗曰古者建學校養人材在此飲酒在此受成在此獻功在此則學校之制不為虚設也鄭之鄉校以議執政之善否則是學校之建其有補於風化多矣范氏處義曰此後四章皆言服淮夷之事詩意欲歸功於學校見僖公能明其德故知以修學校為先泮宫既修已足服淮夷矣況有虎臣以征伐又有善折獄如皋陶者則僖之服淮夷為可信矣嚴氏粲曰詩人因其修泮宫可以為獻功之地而頌禱之耳自此以下皆然非有實事也劉氏瑾曰願魯侯以德服人而獻功於學也鄒氏泉曰有事宫室便是興作修亦作也如閟宫修廟亦曰奚斯所作可見作泮如何便服淮夷蓋泮宫者所以講學行禮興賢育才而出兵受成釋奠獻功亦於斯也濟濟子禮反多士克廣德心桓桓于征狄他歴反彼東南叶尼心反烝烝皇皇不吳音話不揚不告于訩音凶在泮獻功集傳賦也廣推而大之也德心善意也狄猶逷也陸氏德明曰狄遠也王氏安石曰攘而逖之也蘇氏轍曰狄古逖通東南謂淮夷也孔氏穎達曰淮夷在魯之東南烝烝皇皇盛也爾雅烝烝作也郭氏璞曰物盛興作之貌曹氏粹中曰其竝進而向敵也烝烝然其合而大之也皇皇然不吳嚴氏粲曰不諠譁不揚嚴氏粲曰不輕浮肅也不告于訩師克而和不爭功也鄭氏康成曰訩訟也無以爭訟之事告於治訟之官者李氏樗曰征伐有交爭者必告於治獄之官左傳穿封戍與公子圍爭囚是也集説蘇氏轍曰言其羣臣無忿狷之心故於其征淮夷而逖遠之於東南也雖烝烝其衆皇皇其大未嘗有讙譁輕揚相告於訟者是以能成功而還獻之於泮宫李氏樗曰人心惟其洪厚未嘗偏躁所以廣也心廣故徃征伐也則桓桓然有威武逖遠淮夷於東南不得䖍劉我邊陲劉氏瑾曰願公之臣皆有才德以立功也朱氏善曰徂茲淮夷徐戎竝興見於費誓之書則淮夷之為魯患自伯禽受封之時而已然矣故詩人頌禱其君必至於逖彼東南而後可以無愧於烈祖伯禽焉角弓其觩音求束矢其搜色畱反戎車孔博徒御無斁叶弋灼反既克淮夷孔淑不逆叶宜腳反式固爾猶淮夷卒獲叶黃郭反集傳賦也觩弓健貌鄭氏康成曰言持弦急也五十矢為束或曰百矢也孔氏穎達曰荀卿論兵云操十二石之弩負矢五十箇是一弩用五十矢大司寇云入束矢於朝注云古者一弓百矢鄭以尚書及左傳所言賜諸侯弓矢者皆云彤弓一彤矢百以一弓百矢故謂束矢當百箇而在軍之禮重弓以備折壊或亦分百矢為兩束搜矢疾聲也孔氏穎達曰搜為矢行之聲言勁且疾也博廣大也無斁言競勸也逆違命也王氏安石曰孔淑不逆言無復作慝而順以服也蓋能審固其謀猶鄭氏康成曰堅固軍謀度己之德慮彼之罪以出兵也則淮夷終無不獲矣集説輔氏廣曰此章又願其器械修整卒乗競勸既勝淮夷甚善而無有違命者章末又致戒以為苟能審固其謀猶則淮夷豈終不可獲哉以詩意觀之是時魯國想必為淮夷所擾而未有以勝之也劉氏瑾曰願公之兵徒精好謀慮審固而終服淮夷也朱氏公遷曰征伐之道用武在下發謀在上智勇兼濟成功可期亦祝願之意也翩彼飛鴞吁驕反集于泮林食我桑黮尸荏反懷我好音憬九永反彼淮夷來獻其琛敕金反元龜象齒大賂南金集傳興也鴞惡聲之鳥也嚴氏粲曰解見陳墓門黮桑實也許氏慎曰桑葚之黑也憬覺悟也琛寶也陸氏德明曰舍人云美寶曰琛元龜尺二寸司馬氏遷曰龜千歳滿尺二寸孔氏穎達曰漢書食貨志云龜不盈尺不得為寶此言元龜龜之大者故尺二寸也賂遺也鄭氏康成曰大猶廣也廣賂者賂君及卿大夫也南金荆揚之金也毛氏萇曰南謂荆揚也鄭氏康成曰荆揚之州貢金三品此章前四句興後四句如行葦首章之例也集説尹氏焞曰周原膴膴堇荼如飴美土可以變惡味食我桑黮懐我好音美味可以變惡聲曹氏粹中曰傳曰桑黮甘香鴟鴞革響是知鴞食桑黮則其音變而美也泮林有黮鴞來食之歸我好音則淮夷被泮宫禮義之化其有不革面而柔服者哉李氏樗曰集於泮林喻淮夷慕泮宫之化也懷我好音喻淮夷之歸於我無有惡聲也輔氏廣曰此章則遂願其既服淮夷之後淮夷如是來朝貢於魯有是寶物之富凡貢物龜為前列故先及之嚴氏粲曰淮夷世為魯患未必慕泮宫之化詩人張言泮宫之美以為淮夷亦將來慕也劉氏瑾曰卒章又願魯公常使淮夷順服而來獻也總論劉氏瑾曰朱子以作泮宫克淮夷之事他無所考故不質其為僖公之詩而且以克服淮夷為頌禱之詞以愚考之春秋不書常事則夫作泮宫之事十二公之經固宜皆無所見也至於僖公克服淮夷雖亦不見於春秋而僖公十三年嘗從齊桓會于鹹為淮夷之病杞十六年嘗從齊桓會于淮為淮夷之病鄫矣但此詩所言不無過其實者要當為頌禱之溢詞也鄒氏泉曰此詩見僖公建學育才固足稱賢者而魯人欲其修德服遠蓋亦寓規戒之意黃氏一正曰王制諸侯天子命之教然後為學小學在公宫南之左大學在郊人君涖之以講學行禮行禮有燕故此燕飲作詩以頌之也泮水八章章八句集説王氏應麟曰春秋時急攻戰而緩教化其畱意學校者唯魯僖公能修泮宫衛文公敬教勸學他無聞焉鄭有子衿城闕之刺子産僅能不毁鄉校而已閟筆位反宫有侐況域反實實枚枚赫赫姜嫄音元其德不回上帝是依叶音隈無災無害彌月不遲叶陳回反是生后稷降之百福叶筆力反黍稷重直龍反穋音六叶六直反稙徵力反稺菽麥叶訖力反奄有下國叶于逼反俾民稼穡有稷有黍有稻有秬求許反奄有下土纘禹之緒象吕反集傳賦也閟深閉也宫廟也吕氏大臨曰閟宫魯廟非姜嫄廟也朱子曰魯之羣廟也侐清靜也實實鞏固也枚枚礱密也孔氏穎達曰枚枚者細密之意故云礱密晋語及書傳説天子廟餙皆云斲其材而礱之加密石焉是礱密之事也鄒氏泉曰實實言下之盤基固也枚枚言上之結搆宻也時蓋修之故詩人歌詠其事以為頌禱之詞而推本后稷之生而下及於僖公耳孔氏穎達曰作者將美僖公追述遠祖上陳姜嫄后稷至於大王文武爰及成王封建之辭魯公受賜之命言其所以有魯之由回邪也依猶眷顧也毛氏萇曰上帝是依依其子孫也説見生民篇李氏樗曰無菑無害即生民所謂不坼不副也彌月不遲即生民所謂誕彌厥月也先種曰稙後種曰稺孔氏穎達曰重穋稙稺生熟早晚之異稱非穀名奄有下國封於邰也緒業也禹治洪水既平后稷乃播種百穀孔氏穎達曰禹能平水土稷能種穀二者俱以利民故謂之繼禹之事稷之播種種禹所治之地也范氏處義曰論語曰禹稷躬稼謂相因以成也集説鄭氏康成曰姜嫄生子后稷天人多與之福以五穀終覆蓋天下使民知稼穡之道言其不空生也堯時洪水為菑民不粒食天神多予后稷以五穀禹平水土乃教民播種之於是天下大有故曰繼禹之事也劉氏瑾曰首章推本僖公所奉之祖上出於后稷也朱氏公遷曰下國指邰言下土則以天下言稷止封邰而教民稼穡則偏乎天下也身親稼穡而能繼大禹之功此章專言后稷季氏本曰此先言作廟之盡善以見僖公崇重周公之意也次述姜嫄生后稷之由以推本周公相武王功業之所自始也后稷之孫實維大音㤗王居岐之陽實始翦商至于文武纘大王之緒致天之屆于牧之野叶上與反無貳無虞上帝臨女音汝敦都囘反商之旅克咸厥功叶居古反王曰叔父扶雨反建爾元子叶子古反俾侯于魯大啓爾宇為周室輔扶雨反集傳賦也翦斷也大王自豳徙居岐陽四方之民咸歸往之於是而王迹始著蓋有翦商之漸矣曾氏鞏曰大王蓋諸侯之能興邦者本不必云肇基王迹也武王既有天下推其寖盛之由故曰肇基王迹所謂實始翦啇者殆因肇王迹之語而言之過耳朱子曰蓋有翦商之漸非謂大王有翦商之心也趙氏順孫曰蔡節齋云大王雖未始有翦商之志然大王始得民心王業之成實基於此屆極也猶言窮極也黄氏佐曰屆與無遏爾躬之遏字相同觀前徒之倒戈即大命之遏躬也徐氏光啓曰紂惡苟有絲毫未稔天命苟有絲毫未絶武王必無絲毫變節之意惟致天命窮極則牧野之師不得不興矣虞慮也無貳無虞上帝臨女猶大明云上帝臨女無貳爾心也鄭氏康成曰其時之民皆樂武王之如是故戒之曰無有二心也無復虞度也天視䕶汝至則克勝敦治之也范氏處義曰謂攻治商紂如林之旅嚴氏粲曰謂治而正之季氏本曰敦如敦琢之敦故訓曰治之咸同也范氏處義曰十亂同心同德三千人如一心所謂咸者如此郝氏敬曰上帝臨視天心順也三千同心人心應也言輔佐之臣同有其功而周公亦與焉也季氏本曰見其以一心而成功蓋為周公有大功發也王成王也叔父周公也元子魯公伯禽也啟開宇居也鄭氏康成曰謂封以方七伯里集説鄭氏康成曰后稷大王文王亦周公之祖考也伐紂周公又與焉故述之以美大魯范氏處義曰上章言周之有國始於邰此章言周之王業始於岐也翦商者武王也而曰實維大王何也盖得乎邱民而可為天子大王自豳遷岐有仁人之稱從之者如歸市則周之得民自岐始也許氏謙曰實始翦商謂周之所以滅商者自此基之爾蓋古公遷岐吳越春秋謂居三月成城郭一年成邑二年成都而民五倍其初則德化及於民其勢固不可遏也但遷岐在殷王小乙之時後高宗立傅説為相中興在位五十九年次祖庚立七祀次祖甲二十八祀而文王生書稱祖甲不義惟王知小人之依能保惠庶民不敢侮鰥寡肆祖甲享國三十三年自遷岐至文王之生已九十餘年古公壽百二十歳則古公始終正居商令王有道之世翦商之志何自而生耶故傳止曰蓋有翦商之漸謂其國自此而漸大真得詩人之㫖矣朱氏公遷曰言大王文武繼世而成業伯禽以父而受封魯之所以有國者如此乃命魯公俾侯于東錫之山川土田附庸周公之孫莊公之子叶奬里反龍旂承祀叶養里反六轡耳耳春秋匪解音懈叶訖力反享祀不忒皇皇后帝皇祖后稷享以騂犧虛宜虛何二反是饗是宜牛奇牛何二反降福旣多章移當何二反周公皇祖亦其福女音汝集傳賦也附庸猶屬城也鄭氏康成曰小城曰附庸小國不能自達於天子而附於大國也陳氏祥道曰民功曰庸謂之附庸以其有所附然後有功於民也朱子曰小國之地不足五十里者因大國以姓名通若春秋邾儀父之類是也問顓臾亦魯附庸在魯地七百里之中從孟子百里之説則魯安得七百里之地曰是禮記説封周公曲阜之地七百里所謂錫之山川土田附庸其勢必不止於百里上章既告周公以封伯禽之意此乃言其命魯公而封之也莊公之子其一閔公其一僖公知此是僖公者閔公在位不乆未有可頌此必是僖公也劉氏瑾曰閔公名啓方在位二年僖公以庶兄繼立在位三十三年耳耳柔從也春秋錯舉四時也鄭氏康成曰春秋猶言四時也孔氏穎達曰錯舉春秋以明冬夏忒過差也范氏處義曰此言僖公祀於廟之禮也成王以周公有大功於王室故命魯公以夏正孟春郊祀上帝配以后稷孔氏穎達曰明堂位稱成王以周公為有勲勞於天下是以魯君祀帝於郊配以后稷天子之禮也是成王命魯郊天亦配以后稷之事朱氏公遷曰天子以冬至祭天魯諸侯也不敢純用天子之禮故用夏之正月冬至陽之始正月歳之始也牲用騂牡毛氏萇曰騂赤犧純也董氏仲舒曰周色尚赤魯以天子命郊故以騂皇祖謂羣公劉氏瑾曰上言皇祖在后稷上則是指后稷為皇祖此言皇祖在周公下故知此指羣公此章以後皆言僖公致敬郊廟而神降之福國人稱願之如此也黄氏佐曰格神獲福皆是未然事國人稱願之如此耳集説鄭氏康成曰東東籓魯國也既告周公以封伯禽之意乃䇿命伯禽使為君於魯加賜以山川土田及附庸令專統之王制曰名山大川不以封諸侯附庸則不得專臣也皇皇后帝謂天也成王以周公功大命魯郊祭天亦配之以君祖后稷其牲用赤牛純色與天子同也天亦饗之宜之多與之福孔氏穎達曰明堂位云魯君孟春乗大輅載弧韣旂十有二旒日月之章祀帝于郊配以后稷天子之禮也彼祀天之旂建日月之章此龍旂是宗廟之祭也李氏樗曰春秋書郊多矣大抵以為僭而詩乃以為美則知所美非美也輔氏廣曰此章言封魯公之事而遂以頌僖公之能奉祭祀而願其祖享之以膺受多福也龍旂承祀儀物之盛也六轡耳耳車馬之整也春秋匪解享祀不忒僖公之誠也朱氏公遷曰此章言魯公受封子孫得以主祭而僖公又善於致祭如此則格神受福乃其必然也鄒氏泉曰龍旂四句是廟祭而致敬也皇皇三句是郊祭而致敬也是饗二句郊祭獲福也周公二句廟祭獲福也先言廟祭者時修廟也郊祭獲福連言之者䝉上文也韋氏調鼎曰魯用天子禮樂成王思周公之明德大功而賜之也劉氏謂惠公請之出於呂覽未可信也秋而載嘗夏而楅衡叶户郎反白牡騂剛犧尊將將七羊反毛炰薄交反胾側吏反羮叶盧當反籩豆大房此下當脱一句如鐘鼔喤喤之類萬舞洋洋孝孫有慶叶祛羊反俾爾熾而昌俾爾壽而臧保彼東方魯邦是常不虧不崩不震不騰三壽作朋如岡如陵集傳賦也嘗秋祭名鄭氏康成曰載始也秋嘗而言始者秋物新成尚之也楅衡施於牛角所以止觸也周禮封人云凡祭飾其牛牲設其楅衡是也鄭氏衆曰所以楅持牛也孔氏穎達曰楅衡謂設橫木於角以楅廹此牛秋將嘗而夏楅衡其牛言夙戒也朱氏公遷曰預敬其事曰夙戒白牡周公之牲也騂剛魯公之牲也白牡殷牲也周公有王禮故不敢與文武同魯公則無所嫌故用騂剛孔氏穎達曰公羊傳云周公用白牡魯公用騂犅説文云犅特也白牡謂白特騂剛謂赤特也何氏楷曰剛通作犅犧尊畫牛於尊腹也孔氏穎達曰阮諶禮圗云犧尊餙以牛於尊腹之上畫為牛形或曰尊作牛形鑿其背以受酒也王氏肅曰太和中魯郡於地中得齊大夫子尾送女器有犧尊以犧牛為尊也馮氏復京曰宋蔡絛云徽宗崇尚古器政和間尚方所貯盡三代冢墓中物今博古圗所載是也其犧尊正如王肅所言全作牛形開背受酒則阮諶之言殆臆度耳毛炰周禮封人祭祀有毛炰之豚注云爓許氏謙曰似鹽反湯中爚肉去其毛而炰之也胾切肉也羮大羮鉶羮也孔氏穎達曰以特牲士之祭祀尚有大羮鉶羮故以此羮兼二羮也大羮大古之羮湇欽入聲煮肉汁不和鄭氏康成曰無鹽菜盛之以豋爾雅瓦豆謂之豋貴其質也鉶羮肉汁之有菜和者也盛之鉶器故曰鉶羮大房半體之俎足下有跗如堂房也鄭氏康成曰大房玉餙俎也其制足下有横下有跗似乎堂後有房然孔氏穎達曰明堂位曰周以房俎注云房謂足下跗也上下兩間有似於堂房然知是半體者周語云禘郊之事則有全烝王公立飫則有房烝親戚燕饗則有殽烝全烝謂全載牲體殽烝謂體解節折則房烝是半體可知萬舞名嚴氏粲曰萬舞文武二舞之總名解見邶簡兮震騰驚動也曹氏粹中曰不虧如日常盈不崩如山常固不震如地常静不騰如水常平三壽未詳鄭氏曰三卿也嚴氏粲曰願有壽考之三卿為朋友皆如岡陵之固祝其君臣同慶也或曰願公壽與岡陵等而為三也鄭氏康成曰此皆慶孝孫之辭也曹氏粹中曰俾爾熾昌以下皆嘏辭集説范氏處義曰此章言僖公之受福由祭之得禮自牲至舞皆言禮之備也既言僖公盡其禮敬遂假尸祝之言以報僖公也劉氏瑾曰此章專言僖公致敬宗廟而祝願其獲福壽也姚氏舜牧曰秋而載嘗節專指閟宮之祭言熾而昌指其業所統承壽而臧指其身所享受保彼東方魯邦是常以下又申言其熾而昌夀而臧處公車千乘繩證反叶神陵反朱英綠縢徒豋反二矛重直龍反弓叶姑𢎞反公徒三萬貝胄朱綅息廉反叶息稜反烝徒增增戎狄是膺荆舒是懲則莫我敢承俾爾昌而熾俾爾壽而富叶方未反黃髪台背叶蒲寐反壽胥與試俾爾昌而大叶特計反俾爾耆而艾吾蓋反叶五計反萬有千歳睂壽無有害叶暇憇反集傳賦也千乘大國之賦也孔氏穎達曰司馬法成方十里出革車一乗計魯方七百里為車多矣而云千乗者坊記云制國不過千乘然則地雖廣大以千乗為限故云大國之賦千乗成方十里出革車一乘甲士三人左持弓孔氏穎達曰左傳楚許伯御樂伯攝叔為右以致晉師樂伯曰吾聞致師者左射以菆樂伯在左而云左射是左人持弓也右持矛孔氏穎達曰戰于鄢陵左傳稱欒鍼為右使人告子重曰寡君乏使使鍼御持矛焉鐵之戰衛太子為右禱云蒯聵不敢自佚備持矛焉是右人持矛也中人御孔氏穎達曰甘誓云左不攻於左汝不共命右不攻於右汝不共命御非其馬之正汝不共命既云左右又别云御是御在中央也歩卒七十二人將重車者二十五人劉氏瑾曰牛十二頭駕重車在後炊家子十人固守衣裝五人廐養五人樵汲五人合二十五人也千乘之地則三百十六里有竒也朱氏倬曰集傳㨿司馬法而言魯之封域錫之山川土田附庸豈儉於百里而已哉朱英所以餙矛孔氏穎達曰清人云二矛重英故云朱英矛飾蓋絲纏而朱染之以為矛之英飾也綠縢所以約弓也孔氏穎達曰小戎云竹閉緄縢傳曰緄繩縢約謂内弓於閉以繩束之此云縢亦為約之以繩二矛夷矛酋矛也重弓備折壞也毛氏萇曰重弓重於鬯中也李氏樗曰凡此皆言器械之備也徒歩卒也三萬舉成數也車千乘法當用十萬人而為歩卒者七萬二千人然大國之賦適滿千乘苟盡用之是舉國而行也故其用之大國三軍而已孔氏穎達曰司馬法兵車一乘甲士三人歩卒七十二人計千乘有七萬五千人則是六軍矣與下公徒三萬數不合者二者事不同也禮天子六軍出自六鄉萬二千五百家為鄉萬二千五百為軍地官小司徒曰凡起徒役無過家一人是家出一人鄉為一軍此則出軍之常也天子六軍既出六鄉則諸侯三軍出自三鄉下云公徒三萬自謂鄉之所出非此千乘之衆也此云公車千乘自謂計地出兵非彼三軍之事也二者不同故數不相合朱氏公遷曰公車千乘國賦之常數公徒三萬則出軍之定數三軍為車三百七十五乘三萬七千五百人其為歩卒不過二萬七千人舉其中而以成數言故曰三萬也朱氏公遷曰三軍總甲士一千一百二十五人將重車者九千三百七十五人共一萬五百人餘二萬七千人為歩卒貝胄貝飾胄也孔氏穎達曰貝者水蟲甲有文章胄謂兜鍪以貝為飾朱綅所以綴也朱氏公遷曰綅綫也以朱綫綴貝而飾胄也增增衆也李氏樗曰衆之進則增增然而多戎西戎狄北狄膺當也荆楚之别號王氏應麟曰春秋莊十年書荆僖元年始書楚舒其與國也鄭氏康成曰舒舒鳩舒鄝音了本又作蓼舒庸之屬王氏應麟曰舒鳩今無為軍巢縣舒蓼在安豐縣舒庸東夷國謂之羣舒皆偃姓孔氏曰又有龍舒龍舒故城在無為軍龍江縣西懲艾孔氏穎達曰懲艾皆創故為艾也章氏甫曰彼入冦而我當之為膺我伐冦而彼畏之為懲承禦也范氏處義曰莫我敢承者莫敢當我也僖公嘗從齊桓公伐楚故以此美之鄭氏康成曰此慶僖公勇於用兵討有罪也孔氏穎達曰僖四年經書公㑹齊侯等侵蔡蔡潰遂伐楚羣舒是楚之與國故連言荆舒其伐戎狄則無文李氏樗曰泮水美僖公能服淮夷皆無是事而美之則膺戎狄懲荆舒未必不如其服淮夷也蓋祝頌之辭問戎狄是膺荆舒是懲僖公安有此事而魯頌言之何也朱子曰此是願頌之辭劉氏瑾曰僖公從齊伐楚遂盟召陵僖公雖不得專其功而詩人之辭容有溢美讀者當不以辭害意而祝其昌大壽考也范氏處義曰昌而熾昌而大則言魯國也壽而富耆而艾則言僖公也壽胥與試之義未詳王氏曰壽考者相與為公用也曹氏粹中曰老壽者相與試用則不特三夀作朋而已所用皆老成人也蘇氏曰願其壽而相與試其才力以為用也朱氏公遷曰王氏説優蓋以三壽作朋例之可見集説孔氏穎達曰上既美其祭祀鬼神此又美其用兵征伐蘇氏轍曰此章言僖公治其軍旅繕其車甲器械故其民無不欲其昌大壽考而托之以為安也王氏質曰作朋之福未盡其意又推廣之自俾爾昌而熾以下是也劉氏瑾曰承前章祭祀獲福之意而美公以武功祝公以福壽也泰山巖巖叶魚杴反魯邦所詹奄有龜蒙遂荒大東至于海邦叶卜工反淮夷來同莫不率從魯侯之功集傳賦也泰山魯之望也司馬氏遷曰泰山之陽則魯其隂則齊孔氏穎達曰泰山在齊魯之界二國皆以為望也詹與瞻同何氏楷曰韓詩外傳説苑風俗通俱作瞻龜蒙二山名孔氏穎達曰春秋齊人來歸鄆讙龜隂之田謂龜山之北田也論語説顓臾云昔者先王以為東蒙主魯境内有此二山故言奄有曹氏粹中曰龜則鄒之龜山蒙則費之東蒙山何氏楷曰䝉山一名東山孟子所謂登東山而小魯是也荒奄也大東極東也孔氏穎達曰地之最東至海而已大東之下即云至于海邦故以東為極東海邦近海之國也季氏本曰如萊牟之類是也集説范氏處義曰願其有功如此劉氏瑾曰此亦承上章祭祀獲福之意而言願公治其境内以服遠國也遂荒以下皆期望之辭下章放此朱氏公遷曰此與下章又反覆其辭專以擴充土宇為祝乃受福之最大者以發上章保彼東方魯邦是常之意蓋必能使國勢尊嚴足以攝人心收衆望而内外逺近無不服之然後乃為魯侯之功也季氏本曰奄有者本其所固有而言也荒者開拓而大之之意曰荒曰同曰從皆謂以德綏之而得其歸心如太王文王之得人心也張氏彩曰荒者經略包羅之意同者來合於我無異志也保有鳧繹叶弋灼反遂荒徐宅叶達各反至于海邦淮夷蠻貊叶莫博反及彼南夷莫不率從莫敢不諾魯侯是若集傳賦也鳧繹二山名李氏樗曰禹貢徐州嶧陽孤桐此繹即嶧陽也王氏應麟曰郡縣志鳧山在兖州鄒縣東南三十八里嶧山一名鄒山在鄒縣南二十二里宅居也謂徐國也諾應辭若順也季氏本曰謂順魯侯之德也泰山龜蒙鳧繹魯之所有其餘則國之東南勢相連屬可以服從之國也王氏應麟曰傅氏曰上已言荆舒此南夷是南蠻也蠻貊亦東方諸種集説劉氏瑾曰泰山曰所詹龜蒙曰奄有鳧繹曰保有皆以魯地而言也其餘非魯所有則皆以遂荒總發其辭而致其願望於公也朱氏公遷曰能守土宇廣封疆而盡東南諸國又皆歸於魯莫不心悦誠服之此尤詩人之所願也何氏楷曰李云魯侯封於曲阜其時戎夏錯處與徐淮實壤接世為封境憂故伯禽至不避三年之喪袵兵革以開東郊之難後之子若孫世仰其功故為臣子者亦以此致君之祝天錫公純嘏叶果五反睂壽保魯居常與許復周公之宇魯侯燕喜令妻壽母叶滿委反宜大夫庶士鉏里反邦國是有叶羽已反既多受祉黃髮兒齒集傳賦也常或作嘗在薛之旁鄭氏康成曰春秋魯莊公三十一年築臺于薛是與周公有常邑六國時齊有孟嘗君食邑於薛曹氏粹中曰漢地里志魯有薛縣而齊孟嘗君食邑於薛則嘗先當屬魯許許田也魯朝宿之邑也孔氏穎達曰諸侯有大德受采邑於京師為將朝而宿焉謂之朝宿之邑魯以周公之故成王賜之許田春秋之時魯不朝周邑無所用而許田近於鄭國鄭有祊田地勢之便而與鄭易之桓元年鄭伯以璧假許田則魯之有許見於經傳也皆魯之故地見侵於諸侯而未復者故魯人以是願僖公也令妻令善之妻聲姜也壽母壽考之母成風也劉氏瑾曰僖公娶齊女姜姓曰聲姜其母風姓曰成風為荘公之妾薨於文公四年閔公八歲被弑必是未娶其母叔姜亦應未老劉氏瑾曰叔姜莊公夫人哀姜之娣也此言令妻壽母又可見公為僖公無疑也有常有也兒齒齒落更生細者亦壽徵也集説蘇氏轍曰願公壽考以復魯之侵地宜其室家臣庻以保有其國也此詩所謂居常與許復周公之宇者人之所以願之而其實則未能也輔氏廣曰八章既禱其福壽興復故疆於是遂言其燕喜之事閨門之内則有令妻壽母朝廷之上則宜大夫庶士外則保有邦國焉則祉益多而壽益固矣劉氏瑾曰此章稱願僖公享富壽康寜之福有夫妻子母之樂皆承前章祭祀獲福之意也何氏楷曰人惟壽可以享福故以壽始終之徂來之松新甫之栢叶逋莫反是斷音短是度待洛反是尋是尺叶尺約反松桷音角有舄叶七約反路寢孔碩叶常約反新廟奕奕叶弋灼反奚斯所作孔曼音萬且碩同上萬民是若集傳賦也徂來新甫二山名王氏應麟曰水經注鄒山記曰徂來山在兖州梁父奉髙博城三縣界今猶有美松後魏地形志魯郡汶陽縣有新甫山八尺曰尋舄大貌王氏肅曰言無刻飾文章徒見松桷彊大至牢固路寢正寢也孔氏穎達曰釋詁云路大也黄氏佐曰路寢在廟之後所以藏衣冠新廟僖公所修之廟鄭氏康成曰修舊曰新劉氏瑾曰即前所謂閟宫也奚斯公子魚也作者教護屬功課章程也孔氏穎達曰奚斯為之主帥教令工匠監護其事屬付功役課其章程而已朱氏公遷曰教者指令也䕶者監視也屬功則付以事課章程則考其功也曼長鄭氏康成曰修也廣也碩大也萬民是若順萬民之望也鄭氏康成曰國人謂之順也集説輔氏廣曰九章則本其所以作是頌者言之取木於山斷而度之或長或短而松之為椽桷者猶舄然而大則其為梁為柱者可知既成廟後之正寢又甚宏大則僖公所修之廟大矣又言其教護屬功董其工役之人而曰此實奚斯所作其制度甚長且大有以順萬民之望也劉氏瑾曰此章復詳言修廟之事與篇首兩句之意相首尾也季氏本曰萬民是若順萬民之心也蓋周公德澤及於天下萬民莫不被其澤而欲其廟貌之新者見僖公之興此役非妄勞民力也春秋之中凡用民於所不當為必書而獨不書作閟宫謂此為當作不以為勞民耳總論黄氏櫄曰此詩膺戎狄懲荆舒荒大東荒徐宅至於海邦淮夷蠻貊及彼南夷莫不率從在僖公無是事而詩人言之孔子取之何也夫子之意蓋曰僖公之得民心如此魯人之愛僖公如此則雖未有是事亦人情之所願欲也人情之所願欲夫子安得而不取之嚴氏粲曰閟宫止為僖公能修寢廟張大其事而為頌禱之辭朱氏倬曰詩人之論自源徂流故雖頌魯僖而上及乎后稷太王文武周公之事明其源本之所自出也因成王賜周公以天子禮樂故遂以夏正孟春郊祀上帝而以后稷配之然非禮矣魯人據其實而頌之夫子因其舊而存之豈非春秋據事直書而善惡自見之義歟閟宫九章五章章十七句内第四章脱一句二章章八句二章章十句集傳舊説八章二章章十七句一章十二句一章三十八句二章章八句二章章十句多寡不均雜亂無次蓋不知第四章有脫句而然今正其誤集説胡氏一桂曰竊謂閟宫是依倣殷武而作特殷武簡而嚴閟宫張而夸故朱子於殷武之末謂與閟宫卒章文意略同但先儒因此詩服淮夷蠻貊等事春秋所不載皆不能無疑故黄氏以為未然之期望朱子以為頌禱之辭也陳氏櫟曰僖公修閟宫以其新修故又曰新廟而路寢即廟中之正寢也毛鄭以閟宫為姜嫄廟者固非毛又以新廟為閔公廟者尤非也朱氏公遷曰出師奏凱必於學故泮水專以馴服淮夷言致祭受福必於宗廟故閟宫總以享受福祿言魯頌四篇二十四章二百四十三句集説王氏安石曰周頌之辭約約所以為嚴盛德故也魯頌之辭侈侈所以為夸德不足故也章氏俊卿曰駉詩言牧馬之事有駜言君臣宴飲泮水言其修泮宫服淮夷所襃之事猶為可襃也至於閟宫則毁譽失真且如言姜嫄后稷至於文武與夫郊天之祭魯以諸侯而乃盛稱以示誇耀不亦遇乎商頌四之五集傳契為舜司徒而封於商鄭氏康成曰商者契所封之地堯之末年舜舉為司徒有五教之功乃賜姓而封之孔氏穎達曰長發箋云堯封之於商為小國舜之末年益其土地為大國是舜亦封之故歸之舜也商者成湯一代之大號而云商者契所封之地則以湯取契之所封以為代號也傳十四世而湯有天下孔氏穎達曰殷本紀云契卒子昭明立卒子相土立卒子昌若立卒子曹圉立卒子冥立卒子振立卒子微立卒子報丁立卒子報乙立卒子報丙立卒子主壬立卒子主癸立卒子天乙立是為成湯是從契至湯為十四世也其後三宗迭興許氏謙曰太甲受伊尹之訓反善修德諸侯咸歸是為太宗至大戊伊陟為相殷復興是為中宗武丁舉傅説為相殷道復興是為高宗所謂三宗也及紂無道為武王所滅封其庻兄微子啓於宋修其禮樂以奉商後鄭氏康成曰武王伐紂乃以陶唐氏火正閼伯之墟封㣲子啓為宋公為商後孔氏穎達曰漢書地理志云周封微子于宋今之睢陽是也其地在禹貢徐州泗濱西及豫州盟音孟豬之野孔氏穎達曰禹貢徐州云泗濵浮磬豫州云導菏澤被孟豬地理志云孟豬澤在梁國睢陽東北是孟豬在豫州地理志云宋地今之梁國沛楚山陽濟隂東平及東都之須昌壽張皆宋分也據時騐之是宋之封域東至泗濱西至孟豬也王氏應麟曰郡縣志宋州禹貢豫州之域高辛氏之子閼伯所居商邱今州治是也契孫相土亦都於此春秋為宋國都自㣲子至君偃三十三世為齊椘魏所滅泗水在兖州泗水縣至淮陽軍宿遷縣南入淮其後政衰商之禮樂日以放失孔氏穎達曰㣲子為商之後得行殷之禮樂明時商頌皆在宋矣於後不具明是政衰而失之七世至戴公時孔氏穎達曰史記宋世家云微子啓卒弟仲衍立卒子宋公稽立卒子丁公申立卒子湣公共立卒弟煬公熙立湣公子鮒祀殺煬公而自立是為厲公卒子釐公舉立卒子惠公覵立卒子哀公立卒子戴公立自㣲子至戴公凡十君除二及餘八君是㣲子之後七世至戴公也大夫正考甫陸氏德明曰宋湣公之曾孫孔子七世祖孔氏穎達曰世本云宋湣公生弗父何弗父何生孔父孔父生正考甫得商頌十二篇於周大師鄭氏康成曰周大師何由得商頌周用六代之樂故有之孔氏穎達曰以周用六代之樂樂章固當有之故得有商頌也歸以祀其先王至孔子編詩而又亡其七篇然其存者亦多闕文疑義今不敢強通也商都亳宋都商邱皆在今應天府亳州界皇輿表應天府今歸德府隸河南亳州今鳯陽府亳州隸江南集説鄭氏康成曰正考父校商之名頌於周犬師孔子録之以備三頌著為後王之義監三代之成功法莫大於是矣問者曰列國政衰則變風作宋何獨無乎曰有焉乃不録之王者之後時王所客也廵狩述職不陳其詩亦示無貶黜客之義也孔氏穎達曰王者存二王之後所以通三統夏之篇章既以泯棄惟有商頌而已孔子既錄魯頌同之二王之後乃復取商頌列之以備三頌著為後王之義使後人監視三代之成法其法莫大於是聖人之深意也歐陽氏修曰案周本紀稱武王伐紂下車而封武庚於宋以為商後及武庚叛周公又以㣲子繼之是聖人之意雖惡紂之暴而不忘湯之德故始終不絶其為後焉商頌之存豈異是乎蘇氏轍曰春秋之際大國略皆有變風宋魯獨無風而有頌鄭氏疑而為之説曰宋王者之後也魯聖人之後也是以天子巡狩不陳其詩蓋所以禮之也予聞周之盛時千八百國雖後世凌遲力強相吞而春秋所見猶百有七十餘國變風之作先於春秋數世矣而詩之載於大師者獨十三國其不見於詩者豈復皆有説哉意者列國不皆有詩其有詩者雖檜曹之小邶鄘魏之亡而有不能已其無詩者雖燕蔡之成國宋魯之禮樂而有不能作且非獨此也齊桓晉文霸者之盛也而皆不得有詩桓附於衞文附於秦皆止於一見衞莊姜齊襄公鄭昭公事至㣲矣然其詩屢作而不止蓋事有適然而無足疑者朱子語類問商頌恐是宋作曰宋襄一伐楚而已其事可考安有莫敢不來享等事又問恐是宋人作之追述徃事以祀其先王若是商時所作商尚質不應商頌反多於周頌曰商頌雖多如周頌覺得文勢自别周頌雖簡文自平易商頌自是奥古非宋人所能作王氏應麟曰揚子謂正考甫作商頌史記宋世家襄公欲為盟主其大夫正考甫美之作商頌考之左傳正考父佐戴武宣世本正考甫生孔父嘉為宋司馬華督殺之而絶其世皆在襄公之前安得作頌於襄公之時乎猗於宜反與音余那與置我鞉音桃鼓奏鼓簡簡衎我烈祖集傳賦也猗歎辭孔氏穎達曰美而歎之也那多王氏安石曰美商之樂歎而多之也曹氏粹中曰言其美之不足故嗟歎而多之也置陳也歐陽氏修曰置當讀如置器之置簡簡和大也衎樂也烈祖湯也孔氏穎達曰謂成湯是殷家有功烈之祖也記曰商人尚聲臭味未成滌蕩其聲鄭氏康成曰滌蕩猶摇動也樂三闋然後出迎牲陳氏澔曰迎牲於門外也即此是也劉氏瑾曰凡聲屬陽故曰樂由陽來商人祭祀尚聲所以先求諸陽者也朱氏公遷曰臭未成未用灌也味未成未用牲也滌蕩者動而發㪚之義樂所以動其和而㪚之於外也舊説以此為祀成湯之樂也集説毛氏萇曰鞉鼔樂之所成也孔氏穎達曰禮記曰鼔無當於五聲五聲不得不和是樂之所成在於鼓也王制曰天子賜諸侯樂則以柷將之賜伯子男樂則以鞉將之注曰柷鞉皆所以節樂是樂成亦由鞉也陳氏澔曰鬼神在天地間隂陽合㪚而聲音之道無間顯幽故殷人之祭必先作樂欲以此樂之聲音號呼而詔告於兩間庻幾其聞之而來格來享也朱氏公遷曰此一節專以鼓言蓋鼓者衆音之主故先言之始而置之既而奏之言之序也黄氏佐曰此節是將祭之時也商人未祭之先而作樂亦如周人取蕭祭脂亦以未祭之先求神也唐氏汝諤曰長樂陳氏曰聖人作革以為鞉鼓鞉以兆奏鼓者也播鞉而鼓從之中聲以發焉案此則奏鼓管之時已先奏鞉可知矣湯孫奏假音格綏我思成鞉鼓淵淵叶於巾反嘒嘒管聲既和且平依我磬聲於音烏赫湯孫叶思倫反穆穆厥聲集傳湯孫主祀之時王也歐陽氏修曰自大甲以下至紂皆可為湯孫不知頌作於何時所斥者何王耳假與格同言奏樂以格於祖考也綏安也思成未詳鄭氏曰安我以所思而成之人范氏處義曰謂祖考所以安我者使我遂其孝思而成其祀事郝氏敬曰成猶如在也謂神明來格也孔氏穎達曰於祭之時心之所思唯思神耳故知安我心所思而成之謂神明來格也嚴氏粲曰祭祀則思其祖考若神不來格則所思不遂今神明來格是安我所思而成之也周氏昌年曰我所思者成而心安是以思成而綏我也禮記曰孔氏穎達曰所引禮記祭義文也齊之日思其居處思其笑語思其志意思其所樂思其所嗜孔氏穎達曰所思五事先思居處後思樂嗜者先粗而後精自外而入内也居處措身之所笑語貌之所發此皆目所可見是外之粗者在内有常理可測度者志意也在内無常緣物而動者樂嗜也内事難測深思然後及之故後言之也齊三日乃見其所為齊者朱子曰見所為齊者思之熟若見其所為齊之親也何氏士信曰慕容氏曰思之之至雖親之不可見者如見其存㣲之顯誠之不可揜者如此祭之日入室僾音愛然必有見乎其位孔氏穎達曰入室初入廟室僾髣髴見也如見親之在神位也周旋出戸肅然必有聞乎其容聲孔氏穎達曰孝子薦俎酌獻行歩周旋或出戸當此時必有悚然肅然如聞親舉動容止之聲出戸而聽愾開代反然必有聞乎其歎息之聲朱子曰設祭既畢孝子出戸而聽也朱氏公遷曰祭義之文止此此之謂思成朱氏公遷曰以上鄭氏説蘇氏曰其所見聞本非有也生於思耳此二説近是蓋齊而思之祭而如有見聞則成此人矣鄭注頗有脱誤今正之張氏所望曰鄭注本云安我心所思而成之也夫心之所思思祖考也始尚茫然既而若有見聞則成之矣心於是安矣箋語渾融亦自明白淵淵深遠也王氏安石曰淵淵深也深以言其聞之遠嘒嘒清亮也毛氏萇曰嘒嘒然和也磬玉磬也堂上升歌之樂非石磬也毛氏萇曰磬聲之清者也以象萬物之成孔氏穎達曰磬非樂之主而云鼓管和平來依磬聲明此異於常磬非石磬也張子曰玉磬聲之最和平者可以養心其聲一定始終如一無隆殺也王氏安石曰依我磬聲者言與堂上之樂諧也鄒氏忠𦙍曰磬聲非如諸聲可以人力髙下故依之則為和平穆穆美也孔氏穎達曰穆穆然而美者其樂之音聲黄氏震曰樂以悦神故曰於赫湯孫穆穆厥聲以侈言其樂之美如飲食云苾苾芬芬以侈言其飲食之美凡以悦神非自誇也集説鄭氏康成曰堂下諸縣與諸管聲皆和平不相奪倫又與玉磬之聲相依亦謂和平也玉磬尊故異言之陳氏暘曰言鞉鼓繼之以淵淵言管聲先之以嘒嘒何也蓋鞉鼓必待奏之然後聞其聲管聲與鞉鼓合奏聞其嘒嘒之聲知為管聲而已此細大不踰無相奪倫之意也商樂以磬為主故言依我磬聲舜樂以簫為主故言簫韶九成堂上言依我磬聲則博拊琴瑟之類舉矣堂下言鞉鼓管鏞則柷敔笙簫之類舉矣李氏樗曰樂器之備奏如此必由赫赫之湯孫能使樂聲和也朱氏公遷曰八音之中磬尤難諧今者作樂降神而堂下之樂與堂上之磬聲相諧如此湯孫之樂可謂甚美矣何氏楷曰既和且平兼堂上堂下八音諸器言周語單穆公云聲應相保曰和細大不踰曰平陳氏際泰曰商人尊鬼而尚聲聲者所以詔告於天地之間聲召風風召氣氣召神懼其雜而集焉則有湯孫之思矣思者氣之精者也鬼神非其類也不至心有精氣而借聲以召之神無不格矣庸鼓有斁萬舞有奕我有嘉客亦不夷懌集傳庸鏞通毛氏萇曰大鐘曰庸斁斁然盛也奕奕然有次序也濮氏一之曰執籥秉翟者文舞也朱干玉戚者武舞也萬舞乃二舞之總名今言萬舞有奕正謂文武迭用而有序蓋上文言鞉鼓管籥作於堂下其聲依堂上之玉磬無相奪倫者至於此則九獻之後鐘鼓交作萬舞陳於庭而祀事畢矣劉氏瑾曰周制宗廟九獻之次尸未入前王祼於奥以降神一獻也后亞祼二獻也尸入薦血腥後王酌泛齊獻尸所謂朝踐三獻也后酌醴齊亞獻亦為朝踐四獻也薦熟畢王酌盎齊獻尸五獻也后酌緹齊亞獻六獻也皆所謂饋獻也尸乃食訖王更酌朝踐之泛齊以酳尸所謂朝獻七獻也后更酌饋獻之緹齊以亞酳所謂再獻八獻也又有諸臣為賓者之一獻凡九也若商之九獻則未有考朱氏公遷曰羣小祀一獻祭社稷五祀三獻望祀山川五獻祭先公七獻大享先王九獻祭將畢時樂盛作如楚茨言鐘鼓既戒鼓鐘送尸亦其一徴也嘉客先代之後來助祭者也夷悦也何氏楷曰爾雅注作怡亦不夷懌乎言皆悦懌也集説范氏處義曰此與䕫之論樂虞賓在位羣后徳讓之意同謂樂之感格先祖考而次及在位之人也朱氏善曰湯孫奏假綏我思成始焉人固因樂以致其感格之效也於赫湯孫穆穆厥聲終焉樂復因人而成其和聲之美也至於鏞鼔之斁斁然而盛也萬舞之奕奕然有次序也則不特幽有以感乎神而嘉賓在位亦無不夷懌者矣獨言嘉客者尊之也自古在昔先民有作温恭朝夕執事有恪集傳恪敬也言恭敬之道古人所行朱氏公遷曰以行訓作不可忘也閔馬父韋氏昭曰馬父魯大夫曰先聖王之傳恭猶不敢專稱曰自古古曰在昔昔曰先民韋氏昭曰有作言先聖人行此恭敬之道久矣不敢創之於己乃云受之於先古此其不敢專也朱氏公遷曰自古又推在昔在昔又推先民如湯之敬禹之祇舜之恭堯之欽愈推之而其傳愈遠也集説范氏處義曰平居則朝夕温然可卽而不忘於恭故於執事之時則愈恪而敬也以敬奉祀徳之美也猶謙曰非我能然乃效先民之所為耳然則朝夕則温恭執事則有恪乃從古聖賢之常行湯孫能師古者也季氏本曰上言作樂而致感格實本於誠敬也故此遂言其敬之所自温恭朝夕敬之常也至於執事則尤有恪此則言其祭時之敬矣顧予烝嘗湯孫之將集傳將奉也言湯其尚顧我烝嘗哉鄭氏康成曰顧猶念也此湯孫之所奉者致其丁寜之意庶幾其顧之也集説朱氏公遷曰神不歆非類故曰此湯孫之所將也則祖孫之間精神相感其享之也必然矣總論歐陽氏修曰猗那之頌詩人述商王祀其先祖成湯美其樂舞及其助祭諸侯與其執事之臣皆由商王之能將其事也吕氏柟曰那至綏我思成總言奏樂期格乎湯也鞉鼔淵淵以下言和也自古在昔以下言敬也可謂禮樂具至矣湯也豈不顧汝孫之烝嘗綏以思成乎蓋有思先之孝斯有和敬之發其曰湯孫親之也朱氏謀㙔曰湯之功徳偉矣宜在可述此詩獨舉鞉鼔管磬庸鼔之聲與萬舞之奕者何哉商人尚聲聲之盛是德之盛也湯之功德自有大濩之樂此所謂聲即大濩之聲耳那一章二十二句集傳閔馬父曰正考甫校商之名頌韋氏昭曰名頌頌之美者也孔氏穎達曰宋之禮樂雖則亡㪚猶有此詩之本考父恐其舛繆故就大師校之也以那為首其輯之亂韋氏昭曰輯成也凡作篇章義既成撮其大要以為亂辭詩者歌也所以節舞者也曲終乃更變章亂節故謂之亂也曰云云朱氏公遷曰自古在昔以下四句即此詩也集説歐陽氏修曰商人作頌以為祀湯之樂歌述其祀時樂舞之盛以衎樂先祖如周頌我將祀文王但述祀時羊牛肥腯執競祀武王亦言祀時鐘鼓管磬之類是也沈氏萬鈳曰祭義禘有樂而嘗無樂疏云春夏陽來似神之來故祭有樂秋冬隂象神之去故無樂然周禮四時之祭皆有樂殷烝嘗之祭亦有樂此詩具見嗟嗟烈祖有秩斯祜候五反申錫無疆及爾斯所集傳賦也烈祖湯也孔氏穎達曰商之王功起於湯故知功烈之祖正謂成湯也秩常申重也爾主祭之君蓋自歌者指之也劉氏瑾曰頌詩所以美盛德告成功而皆自歌工以導達主祭者之意也歌工自己身而指主祭者則曰爾自先祖之身而指主祭者則曰湯孫自主祭者之身而言則曰我曰予立言雖殊所指之人則一如上篇所稱亦然也又如周頌雝詩既稱天子則固自歌工之身而指主祭者矣下文又稱孝子亦若此詩稱湯孫也又稱予稱我亦若此詩稱予我也斯所猶言此處也此亦祀成湯之樂言嗟嗟烈祖鄭氏康成曰重言嗟嗟美歎之深范氏處義曰言烈祖而云嗟嗟以簡朴故也若周頌則言於穆於皇近於文矣有秩秩無窮之福可以申錫於無疆是以及於爾今王之所而修其祭祀如下所云也吕氏祖謙曰及爾斯所言流慶無窮今方於爾之所其後蓋未艾也所謂申錫無疆也集説輔氏廣曰凡子孫得以奉其祭祀於祖先者皆祖先之福有以錫被於子孫故耳朱氏善曰成湯以盛徳而受天命故有秩秩無窮之福可以申錫於無窮爾後人所以得入烈祖之廟以奉烈祖之祭者是即其福之所及也言此以起下文之意既載清酤叶侯五反賚我思成叶音常亦有和羮叶音郎既戒既平叶音旁鬷中庸作奏今從之假音格無言叶音昂時靡有爭叶音章綏我睂壽黃耉無疆集傳酤酒何氏楷曰清者清潔之義酤説文云一宿酒也徐鍇云謂造之一夜而熟若今雞鳴酒也酒只用一宿而成者亦見商人尚質處賚與也毛氏萇曰賚賜也王氏安石曰與徂賚孝孫同思成義見上篇和羮味之調節也鄭氏康成曰和羮者五味調腥熟得節荀氏悦曰酸鹹甘苦不同嘉味以濟謂之和羮曹氏粹中曰鉶羮也戒夙戒也平猶和也朱氏公遷曰言味調均也儀禮於祭祀燕享之始每言羮定音訂蓋以羮熟為節然後行禮劉氏瑾曰郷飲酒禮鄉射禮燕禮大射儀公食大夫禮少牢饋食皆曰羮定鄭氏曰定猶熟也定即戒平之謂也吕氏祖謙曰清酤和羮皆言祭之始也嚴氏粲曰其事戒謹而不苟其味和平而適宜鬷中庸作奏正與上篇義同蓋古聲奏族相近族聲轉平而為鬷耳吴氏師道曰中庸奏假無言章句奏進也進而感格於神明極其誠敬無有言説而人自化之也烈祖鬷假傳依中庸作奏謂與上篇同義案上篇那湯孫奏假傳言奏樂以格於烈祖則奏字義不同無言無爭肅敬而齊一也輔氏廣曰無言則是肅敬無爭則是齊一朱氏公遷曰肅敬則靜齊一則定統而言之皆敬也黄氏佐曰鬷假無言句自主祭言時靡有爭句則指一時助祭者下之諸侯皆是王氏志長曰無言非止不諠譁之謂靡爭非止職不交侵之謂蓋湛然寅恭對越一念不起所謂心無為以守至正也瞥起一念便是爭矣言其載清酤而既與我以思成矣及進和羮而肅敬之至則又安我以睂壽黄耉之福也集説歐陽氏修曰既載清酤賚我思成謂以清酒祼獻而神賚我使成祀事也鬷假無言時靡有爭者謂執事之臣無諠譁又不交侵其職位以見在廟之人皆肅恭而舉動得禮所以神明錫以睂壽黄耉之福也李氏樗曰賚我思成亦猶所謂綏我思成也既戒言調羮之慎既平言酸鹹之適其酒食如此可以盡其至誠也鬷假無言此以見君能盡其誠臣亦能盡其誠也蓋宗廟之中尚敬惟君臣能如此然後為盡善矣范氏處義曰清酤和羮皆祭祀之物凡祭酒在先羮在後有次第也始用清酤已謂祖考所以賚我者使吾遂其孝思而成其祀事猶上篇言奏鼓即綏我思成也儀禮祭祀燕享每言羮定而後成禮戒則夙戒其事平則腥熟得節矣羮既和執事者至寂然無聲謂其講習既熟臨事靡有交侵其職事所以靡爭也祖考於是安我睂壽使我享黄耉之年無疆也朱氏善曰既戒既平誠意之寓於物也無言無爭誠意之存乎人也張氏彩曰當鬷假之時渾然一敬無有言説而得於觀感者已成靡爭之化即易所謂觀盥而不薦有孚顒若記所謂宗廟之中未施敬於民而民敬者也人孚如此神格可知矣約軝祈支反錯衡叶户郎反八鸞鶬鶬七羊反以假音格以享叶虚良反我受命溥將自天降康豐年穰穰來假音格來饗叶虚良反降福無疆集傳約軝錯衡八鸞見采芑篇鶬見載見篇鄭氏康成曰約軝轂飾也鸞在鑣四馬則八鸞諸侯來助祭者乗篆轂金飾錯衡之車駕四牡其鸞鶬鶬然聲和劉氏瑾曰采芑作八鸞瑲瑲烝民韓奕作八鸞鏘鏘此詩作鶬鶬載見曰鞗革有鶬字雖不同皆言其聲也言助祭之諸侯乘是車以假以享於祖宗之廟也唐氏汝諤曰以心曰假以物曰享溥廣將大也穰穰多也言我受命既廣大鍾氏惺曰諸侯來助祭益見受命之廣大而天降以豐年黍稷之多嚴氏粲曰年豐則民安故以年豐為降康亦謂之康年也使得以祭也吕氏祖謙曰豐年穰穰言時和歲豐祭禮得成所謂可以備物者也假之而祖考來假享之而祖考來饗歐陽氏修曰上言以享者謂諸侯來助致享於神也下云來饗者謂神來至而歆饗也姚氏舜牧曰以假以享是人之以來假來饗是神之來則降福無疆矣集説蘇氏轍曰言人既助之天又應之然後庶幾祖考來假而饗其祭報之以福曹氏粹中曰諸侯助祭者如此是我之受命大得天人之助也得萬國之懽心以事其先王所謂得人也降康豐年所謂得天也李氏樗曰王者祭祀四海皆來助祭然後為祭之大清廟之詩言肅雝顯相雝之詩言有來雝雝至止肅肅皆以諸侯來為助祭之盛事也惟其諸侯各以其職來祭故自天降之以康寜使之享豐年穰穰之福也朱氏道行曰緣黃耉之祝未盡降福之大故又舉助祭諸侯萬國㑹同者推廣之降福無疆就今日之福及於後者言與首章申錫無疆就前日之福及於今者微不同顧予烝嘗湯孫之將集傳説見前篇集説張氏彩曰湯為創業之始祖故後世率稱湯孫猶周之文子文孫耳總論鄒氏泉曰此詩首節本先祜以見得以奉祭之由中二節備道其奉祭獲福之事皆先祜之所及也末節冀先之饗也附錄序烈祖祀中宗也鄭氏康成曰中宗殷王太戊湯之𤣥孫也有桑穀之異懼而修德殷道復興故表顯之號為中宗孔氏穎達曰祀中宗之樂歌也中宗之有天下由成湯創業故言嗟嗟乎我功烈之祖成湯也有常者是此王天下之福天又重賜我商家以無疆境之期故得及爾中宗以此處所也謂能成湯之業復使中興也中宗既有此業故今祀之歐陽氏修曰序言烈祖祀中宗則嗟嗟烈祖者中宗也申錫及爾者爾時主祀之王也范氏處義曰謂中宗為烈祖以有復興之功也秩秩有序也惟其有序所以重錫後人也案商有三宗太甲為太宗太戊為中宗武丁為髙宗禮祖有功而宗有德廟皆不毁中宗髙宗頌皆有樂章而太宗無有蓋商詩㪚亡其初未必無詩中宗髙宗幸而存焉爾此烈祖之詩鄭康成以為祀中宗而經文烈祖則指湯歐陽修以序言祀中宗則烈祖即指中宗如丙以甲為祖戊以丙為祖此古今之常也二解雖㣲不同其為遵序一也朱子以此詩未見其為祀中宗而末言湯孫則亦祭成湯之詩耳故黜序説而為祀成湯之樂然毛鄭嘗先言之矣毛以祭中宗而引湯善為子孫者以湯是商家王業之所起歸功於湯鄭以為此時祭者當是中宗子孫亦是湯遠孫故得言湯孫其説皆可通然則將何去取乎子曰殷禮吾能言之宋不足徴也商頌得於周太師十二篇而今只存五篇中有祀中宗之詩而古序或傳之有自其亦庶乎可徴者歟故存其説以備經解之一義烈祖一章二十二句附錄李氏樗曰那之詩但言作樂烈祖之詩但言酒食非祭成湯之時則無酒食之味祭中宗之時則無簫管之聲也詩人各隨其宜而言之爾蓋以大樂之奏所以發揚成湯之德故那之詩專言作樂烈祖之詩所以不言也天命𤣥鳥降而生商宅殷土芒芒古帝命武湯正域彼四方集傳賦也𤣥鳥鳦於筆反又烏轄反也春分𤣥鳥降髙辛氏之妃有娀氏女簡狄祈于郊禖鳦遺卵簡狄吞之而生契其後世遂為有商氏以有天下事見史記宅居也殷地名王氏應麟曰周氏曰商人稱殷自盤庚始自此以前稱商自盤庚既都亳於是殷商兼稱黄氏一正曰宅殷土者後世所稱而追言於湯也芒芒大貌孔氏穎達曰左傳稱芒芒禹迹畫為九州是芒芒為大貌也古猶昔也帝上帝也朱氏公遷曰言天又言帝天即帝互文耳武湯以其有武德號之也曹氏粹中曰書曰惟我商王布昭聖武長發曰武王載旆有虔秉鉞湯曰吾甚武自號曰武王故此稱為武湯也正治也域封境也歐陽氏修曰正域彼四方謂湯始受命以正四方之疆域此亦祭祀宗廟之樂而追叙商人之所由生以及其有天下之初也劉氏瑾曰此詩推本商人生於𤣥鳥猶生民推本周人生於帝武此詩追述契之生以及於湯有天下猶閟宫追叙后稷之生以及文武也集説鄭氏康成曰降下也天使鳦下而生商者謂鳦遺卵娀氏之女簡狄吞之而生契為堯司徒有功封商自契至湯八遷始居亳之殷地而受命國日以廣大芒芒然湯之受命由契之功故本其天意朱子語類問𤣥鳥詩吞卵事亦有此否曰當時恁地説必是有此今不可以聞見不及定其為必無輔氏廣曰上古天人感應聖哲踵生故商頌周雅皆言契稷初生其瑞應之異乃如此此言始祖之生及成湯之有天下皆有天命而非人力之所與故能使四方諸侯無不受命嚴氏粲曰契封於商而商因以興是生契所以生商也其後子孫遂居亳之殷地國土芒芒然廣大古者上帝命其威武之湯正域於四方謂以四方為界域天下一統也附錄毛氏萇曰春分𤣥鳥降湯之先祖有娀氏女簡狄配髙辛氏帝帝率與之祈于郊禖而生契故本其為天所命以𤣥鳥至而生焉孔氏穎逹曰毛氏不信讖緯以天無命鳥生人之理而月令仲春是月也𤣥鳥至之日以太牢祀于高禖天子親徃后妃率九嬪御𤣥鳥降之日有祀郊禖之禮也大戴禮帝系篇説帝嚳卜其四妃之子皆有天下契為高辛之子簡狄高辛之妃以𤣥鳥至日祈而得之記其所祈之時羙其得天之命故言天命𤣥鳥使下生商也𤣥鳥之來非從天至而謂之降者重之若自天來然鄭以中候契握云𤣥鳥翔水遺卵流娀簡吞之生契封商殷本紀云簡狄行浴見𤣥鳥堕其卵簡狄取吞之因孕生契此二文及諸緯候言吞鳦生契者多矣故鄭據之以易傳也歐陽氏修曰天命𤣥鳥降而生商毛氏之説以今人情物理推之事不為怪宜其有之而鄭謂吞鳦卵而生契者怪妄之説也秦漢之間學者喜為異説鄭學博而不知統又特喜讖緯諸書故於怪説尤篤信由是言之義當從毛蘓氏洵曰史記載簡狄行浴見燕堕卵取而吞之因生契為商始祖神竒妖濫不亦甚乎使聖人而有異於衆庶也將儲陰陽之和積元氣之英以生之焉用此微禽之卵哉毛傳以鳦降為祀郊禖之候及鄭之箋而後有吞踐之事遷之説出於疑詩而鄭之説又出於信遷也甚矣遷之以不祥誣聖人也案自古聖帝明王之生受命而有天下實由天意不必侈言符瑞凡心之所願人之所從時之所會有不期然而然者孰非天哉如詩言稷契之生皆因帝嚳之郊禖而致是已毛萇以為郊禖之時適鳦以春分而至遂兆其祥謂之降者若自天來者然此據理以言詩也鄭康成以為娀簡取吞堕卵因孕生契從殷本紀及諸緯候之文此據事以言詩也朱子以古有是説不敢定其為必無盖就詩以言詩爾總之毛鄭之説雖微有不同而未嘗不歸於天故曰聖帝明王之生皆天也方命厥后奄有九有叶羽巳反商之先后受命不殆叶養里反在武丁孫子叶奬里反集傳方命厥后四方諸侯無不受命也鮮于氏侁曰隨其所在之方而命羣后也黄氏光昇曰厥后謂其方之諸侯與書舜典班瑞于羣后大禹謨禹乃㑹羣后武成曰王若曰羣后義同九有九州也嚴氏粲曰以四方為界域則九州在其中矣天命湯以四方為域湯能命其諸侯而奄有九有成天意也武丁高宗也鄭氏康成曰武丁修徳殷道復興故表顯之號為高宗言商之先后受天命不危殆故今武丁孫子猶頼其福歐陽氏修曰武丁孫子謂武丁之孫子也范氏處義曰武丁孫子蓋指主祭之君集説輔氏廣曰此詩作於武丁孫子之世此蓋言商之先后皆有其德故其受天之命安而不危以至於今猶賴其福而得承其祭祀李氏公凱曰湯乃随其所在之方封建諸侯覆有九有而為王焉繼是而後凡為商之先君者世受天命無有危殆以至武丁之孫與子也附錄王氏肅曰商之先君成湯受天命所以不危殆者在武丁之為人孫子也孔氏穎達曰毛以為湯孫湯為人子孫則此亦當如肅言也嚴氏粲曰成湯之興天實命之其後中微天命幾危矣武丁能振起之所受天命不至於危殆者在武丁能為人之孫子盡繼述之義也徐氏常吉曰先后指湯孫子即武丁對孫子言故曰先后對先后言故曰孫子武丁孫子武王靡不勝音升龍旂十乗繩證反大糦尺志反是承集傳武王湯號而其後世亦以自稱也龍旂諸侯所建交龍之旂也鄭氏康成曰十乗者二王後八州之大國孔氏穎達曰諸侯當以服數來朝而得十乗竝至者或者王不廵守之歲則諸侯竝時來朝四時更來則一年之閒而十乗俱至也嚴氏粲曰龍旂十乗舉諸侯之尊者而言之也大糦黍稷也孔氏穎達曰祭之粢盛唯黍稷耳糦字從米故知是黍稷也承奉也言武丁孫子今襲湯號者其武無所不勝於是諸侯無不奉黍稷以來助祭也集説輔氏廣曰武丁孫子武王靡不勝言其徳之類乎祖也龍旂十乗大糦是承言諸侯之來助祭者皆備車服奉黍稷此即其所頼之福也朱氏公遷曰此一節言嗣王克肖先王而有以致助祭之臣威徳逺加祀事明備如此附錄孔氏穎逹曰武丁為人之子孫能行其先祖武徳之王道威徳盛大無所不勝任也李氏樗曰武丁以威武而王天下無有不勝者殷武之詩曰奮伐荆楚易曰高宗伐鬼方則是四方無不服也惟其威武如此故諸侯之來助祭所建之旂則有十乗以見武丁之威可畏也嚴氏粲曰或以武丁孫子為武丁之孫子然子孫祀其先王而夸言己之武徳義未為安況武丁之後無顯王乎胡氏一桂曰武王只合稱湯而以稱高宗然高宗既稱武丁亦可以稱武王矣邦畿千里維民所止肇域彼四海叶虎洧反集傳止居肇開也言王畿之内民之所止不過千里而其封域則極乎四海之廣也集説曾氏鞏曰人於其所歸赴則止焉商之盛時邦畿千里民所歸赴也李氏樗曰王畿千里乃斯民之所止也先正王畿然後正四海王畿者四海之本也朱氏公遷曰王畿雖有制疆域則無限居中而能制外如此黄氏一正曰肇域彼四海言定天下封域自邦畿始也附錄王氏肅曰殷道衰四夷來侵至高宗然後始復以四海為境域也四海來假音格下同來假祈祈景員維河殷受命咸宜叶牛何反百祿是何音荷叶如字集傳假與格同祈祈衆多貌鄭氏康成曰天下既蒙王之政令皆得其所而來朝覲貢獻其至也祈祈然衆多景員維河之義未詳或曰景山名商所都也見殷武卒章春秋傳亦曰商湯有景亳之命是也梁氏益曰左昭四年楚子合諸侯于申椒舉言於楚靈王曰夏啓有鈞臺之享商湯有景亳之命周武有孟津之會河南鞏縣西南有湯亭或言亳即偃師湯㑹諸侯於此員與下篇幅隕義同盖言周也河大河也嚴氏粲曰武丁至庚丁八世皆居亳此詩所言河正指亳也亳有三蒙為北亳穀熟為南亳偃師為西亳湯自南亳遷西亳盤庚所遷即西亳偃師是也言景山四周皆大河也何任也鄭氏康成曰百祿是何謂擔負天之多福春秋傳作荷集説輔氏廣曰此又承上而言四海之遠諸侯無不來至祈祈然衆多見商之所都所謂景山者四周皆大河其形勢之盛而居之安如此故又歎殷之受命無所不宜此所以能負荷其百福也嚴氏粲曰四海朝覲諸侯輻凑則京師氣象盛大於是總羙殷家前後相承受天之命無有不宜能負荷天之百福謂成湯至高宗也朱氏公遷曰此一節言人心歸極者衆良由山河鞏固而致然然山河之所以不改其舊者以天命之不替於今耳附錄黄氏一正曰武丁時都近河言諸侯來假大集於河也總論朱氏公遷曰此詩首尾皆以天命為重謂先王因天命而得天下故有以詒子孫之福後王因天命而不失乎地利故天下諸侯皆畏威而助祭者即先王所詒之福附錄李氏樗曰此詩歴言殷之先祖其實為高宗設也高宗中興之主也商之先祖能正四方故奄有天下其政中微則諸侯必有不服者高宗既興之後能肇域彼四海是以四海之諸侯莫敢不服此詩大抵言奄有天下之由而發揚高宗能紹祖宗之舊服諸侯之心也祀高宗而指武丁者盖以諱事神者周人之制也自周以前則未嘗諱之也胡氏一桂曰武湯與先后皆指成湯武丁與武王皆指高宗正域彼四方方命厥后者成湯受命之初事也肇域彼四海四海來假者高宗中興成湯所受之命不至危殆也案此章毛鄭以為祀高宗之詩從序説也朱子改為祀宗廟之詩則是以意斷之爾既泛言祀宗廟則武丁非詩意所重而武王靡不勝句當指主祭之時王言然後儒以時王入廟祭其祖宗而盛稱己之威徳為四海所歸命於理未安故從序立説而指武王為武丁者居多以見髙宗有中興之功故時王特祀而表著之揆之詩義亦可通也𤣥鳥一章二十二句濬哲維商長發其祥洪水芒芒禹敷下土方絶句楚辭天問禹降省下土方盖用此語外大國是疆幅隕音員既長有娀息容反方將帝立子生商集傳賦也濬深哲知李氏樗曰哲明也惟其徳之深故不溺於褊淺惟其徳之明故不至於昏塞長乆也方四方也外大國遠諸侯也幅猶言邊幅也范氏處義曰猶布帛之有幅也隕讀作員謂周也王氏應麟曰徐氏曰自其直方言之曰幅自其周圍言之曰員曹氏曰猶云廣輪有娀契之母家也司馬氏貞曰有娀當在蒲州朱子曰舊説有娀國在不周之北恐不應絶逺如此將大也言商世世有濬哲之君孔氏穎逹曰總歎商家深智不指斥一人也劉氏瑾曰泛言濬哲之君盖自湯以上契以下皆是也其受命之祥發見也乆矣方禹治洪水以外大國為中國之竟境同孔氏穎逹曰諸夏為外對京師為内也呂氏祖謙曰禹先分布九州之土地規畫既定然後用工而幅隕廣大之時有娀氏始大故帝立其女之子而造商室也盖契於是時始為舜司徒掌布五教於四方而商之受命實基於此曹氏粹中曰契雖未能有天下然其有天下之祥既已於堯舜之時發見矣集説孔氏穎逹曰毛以為有深智者維我商家之徳也昔在前世久發見其禎祥矣其祥之見在何時乎往者唐堯之末有大水芒芒然有大禹者敷廣下土以正四方京師之外大國於是畫其疆境令使中國廣大均平是時契已佐禹治水敬敷五教功被當世故後嗣克昌是其王之萌兆也爾時已有萌兆即是乆見其祥比至成湯之興歴虞夏之世故為乆也商之有天下其本由契而來止湏言契而已乃述禹敷下土者以契禹俱事帝堯皆有大功故將欲論契先言洪水也朱氏善曰有商受命之祥雖在於濬哲相繼之時而有商受命之基實定於有娀生商之日必言有娀者以契固商人之所由生而有娀又商人之所自出猶云稷固周人之所由生而有邰又周人之所自出也何氏楷曰契之封商雖帝舜命之而皆本於天意故歸之於帝立焉𤣥王桓撥叶必烈反受小國是逹叶他悅反受大國是逹率履不越遂視既發叶方月反相息亮反土烈烈海外有截集傳賦也𤣥王契也𤣥者深㣲之稱或曰以𤣥鳥降而生也王者追尊之號孔氏頴逹曰國語云𤣥王勤商十四世而興𤣥王為契明矣國語又曰我先王不窋韋昭云商頌亦以契為𤣥王是其為王之祖故呼為王非追號為王也朱氏公遷曰言追尊而不言追王葢追王之禮始於周且湯之祖父主壬主癸未嘗稱曰王不應舍壬癸而獨王契此特於祭祀之際以美號稱之耳下章稱湯為武王是其例也桓武撥治達通也受小國大國無所不達言其無所不宜也蘇氏轍曰授之以國政無不能逹率循履禮黄氏佐曰率履正是五典自彼惇之意越過發應也言契能循禮不過越王氏安石曰率履不越者循行無所踰也遂視其民徐氏常吉曰視與視民不恌之視同則既發以應之矣王氏志長曰契能以身教故在寛而奏效㨗也相土契之孫也王氏質曰契之後湯之前十三傳而獨舉相土一人左氏謂閼伯居商邱相土因之是最盛者也截整齊也孔氏穎達曰有截謂守其職不敢内侵外畔也至是而商益大四方諸侯歸之截然整齊矣其後湯以七十里起豈嘗中衰也與集説鄭氏康成曰𤣥王廣大其政治始堯封之商為小國舜之末年乃益其土地為大國皆能達其教令使其民循禮不得踰越乃徧省視之教令則盡行也相土居夏后之世承契之業入為王官之伯出長諸侯其威武之盛烈烈然四海之外率服截然整齊輔氏廣曰契為司徒初不見有武之事然文武乃君之徳既封為國君則是當有武徳也撥即撥亂之撥乃武徳之驗也此章又叙契及相土之事朱氏善曰舜之命契也百姓不親者欲其治之而使親五品不遜者欲其治之而使遜是即撥亂以為治也非有武徳而何達者徳孚於人而行無不得之謂率履不越自已之躬行者言之所以為敷教之本也遂視既發自民之丕應者言之是即受小國大國是達之實也𤣥王以桓撥肇造於前相土以烈烈繼承於後則必其當方伯之任掌征伐之權故諸侯畏之截然整齊是亦天命之所不違也何氏楷曰契始封商至相土遷於閼伯之虛以主大火厥後湯以亳興其地即在商邱東南是開商基業者契而開興王之基者相土帝命不違至于湯齊湯降不遲聖敬日躋子兮反昭假音格遲遲上帝是祗帝命式于九圍集傳賦也湯齊之義未詳蘓氏曰至湯而王業成與天命會也毛氏萇曰至湯與天心齊孔氏穎達曰易稱聖人與天地合其徳此之謂也范氏處義曰天之眷命固未嘗違於商而由湯之前未有其徳可以配天者至于湯則徳與命㑹故曰至于湯齊降猶生也朱子曰如維嶽降神之降遲遲乆也徐氏光啓曰遲遲形容不息之意祗敬式法也王氏安石曰以能祗上帝故帝命式于九圍也式與成王之孚下土之式同意黄氏佐曰式字有表正萬邦之意九圍九州也孔氏穎達曰謂九圍為九州者蓋九分天下各為九處若規圍然故謂之九圍也商之先祖既有明徳朱氏公遷曰先祖指契與相土言之明徳即以濬哲言之也天命未嘗去之以至于湯湯之生也應期而降適當其時其聖敬又日躋升王氏質曰聖敬随日而升徐氏鳳彩曰人心敬則日升怠則日墮也以至昭假於天鮮于氏侁曰假感梧也乆而不息惟上帝是敬故帝命之以為法於九州也郝氏敬曰式九圍為君師也集説孔氏穎達曰上陳𤣥王相土論商興所由此下皆述成湯朱子曰湯降不遲聖敬日躋天之生湯恰好到合生時節湯之修徳又無一日間斷成湯之聖稱其徳者不邇聲色不殖貨利又曰以義制事以禮制心又曰從諌弗咈改過不吝又曰與人不求備檢身若不及至於所謂聖敬日躋云者則其言愈約而意愈切矣嚴氏粲曰商自契以來天命所嚮未嘗去之然至湯而後與天齊謂王業至此而成天命至此而集天人適相符合也敬為聖人之敬言至誠也日躋言至誠無息也徳日新又日新是聖敬日躋之實即文王之純亦不已也湯無所覬倖唯上帝是敬其誠專一然天自命之以為法於天下使為王也朱氏公遷曰既當此時而得天人㑹合之機又有此敬以致天人交與之妙二者皆非一日之積宜受天命而立人極也此見成湯起為天子之故受小球音求大球為下國綴張衞反旒音流何音賀天之休不競不絿音求不剛不柔敷政優優百祿是遒子由反集傳賦也小球大球之義未詳或曰小國大國所贄之玉也鄭氏曰小球鎮圭尺有二寸大球大圭三尺也皆天子之所執也孔氏穎達曰考工記玉人云大圭長三尺杼上終葵首天子服之鎮圭尺有二寸天子守之所服所守惟此二圭曹氏粹中曰玉藻云笏天子以球玉美玉也周禮典瑞曰王搢大圭執鎮圭注鎮圭以四鎮之山為瑑飾所以鎮安四方大圭杼上終葵首明無所屈也下國諸侯也綴猶結也孔氏穎達曰内則云衣裳綻裂紉箴請補綴是綴為連結之義也旒旗之垂者也孔氏穎達曰大行人及考工記説旌旗之事皆云九旒七旒爾雅説旌旗云練旒九是旌旗垂者名為旒也言為天子而為諸侯所係屬梁氏益曰公羊傳注綴係屬也如旗之縿音衫為旒所綴著也鄭氏康成曰結定其心如旌旗之旒縿著焉嚴氏粲曰詩故云旗所垂為旒衆旒所著為縿梁氏益曰縿者旗之正幅也著者綴也朱氏公遷曰此言綴旒猶卷阿所謂四方為綱易所謂拘係之乃從維之皆以喻其固結而不散也何荷何氏楷曰何説文云儋也猶言承任也言承任天之嘉羙於我故為衆諸侯所歸鄉也競強絿緩也優優寛裕之意遒聚也集説孔氏穎達曰言受小玉大玉者此小玉大玉是天子之器非為天子不得執用湯既為天所命則得用之是受之於天故言受也輔氏廣曰言湯能為天子受小國大國所執之玉則為諸侯所附屬如旂旒之與縿然此皆上帝休羙之命使然也然湯之負何天休者非有他也本其聖敬只中道上行更無偏倚故其為政不强不弱不剛不柔優游寛裕此固百禄之所聚也朱氏善曰為下國綴旒者譬之於旗旗之旒必附於縿天下之諸侯必附於有徳也既為諸侯之所附則有以何天之休矣受小共音恭叶居勇反大共為下國駿音峻厖莫邦反叶莫孔反何天之龍叶丑勇反敷奏其勇不震不動叶徳總反不戁奴版反不竦小勇反百祿是總子孔反集傳賦也小共大共駿厖之義未詳或曰小國大國所共之貢也嚴氏粲曰萬邦惟正之供郝氏敬曰共供通鄭氏曰共執也猶小球大球也蘓氏曰共珙通合珙之玉也傳曰駿大也厖厚也嚴氏粲曰受小國大國之共貢惟薄取之所以大厚天下也董氏曰齊詩作駿駹梁氏益曰隋書以為齊詩魏代已亡今舉其説蓋雜見於傳注者耳謂馬也輔氏廣曰當從董説謂馬也如此則與上章綴旒相類皆是譬喻胡氏一桂曰駿駹是喻其有力量能負重致逺之意下國皆於我乎負載也龍寵也鄭氏康成曰龍當作寵榮名之謂孔氏穎達曰何天之龍與上何天之休其文相值休為羙譽則此宜為榮名也李氏樗曰與為龍為光之龍同敷奏其勇猶言大進其武功也戁恐竦懼也李氏樗曰不戁恐不竦懼毅然以天下自任無有恐懼之心此百禄所以總聚而歸之也集説輔氏廣曰上章言政事此章言武功先能自治然後能進其武功不震動不戁竦即周頌所謂無貳無虞之意臨大事固不可不懼然神武不殺者自能不震動不戁竦朱氏善曰為下國駿駹者譬之於馬馬之任重必以力聖人任天下之重亦必以武徳也既能任天下之重則有以何天下之寵矣敷政優優本上章聖敬言敷奏其勇則又以為下章征伐張本也武王載斾有虔秉鉞音越如火烈烈則莫我敢曷漢書作遏阿葛反叶阿竭反苞有三蘖五葛反叶五竭反莫遂莫逹叶他悦反九有有截韋顧既伐叶房越反昆吾夏桀集傳賦也武王湯也曹氏粹中曰湯以武定亂故號武王王氏質曰前詩先言武湯次曰武王大率湯以武為盛即其盛者相承為常稱非諡也虔敬也言恭行天討也顔氏師古曰成湯興師本於仁義雖秉鉞以欽為先也呂氏祖謙曰有虔秉鉞敬天討也曷遏通或曰曷誰何也苞本也蘖旁生萌蘖也歐陽氏修曰大者為本小而附者為蘖言一本生三蘖也本則夏桀蘖則韋也顧也昆吾也皆桀之黨也鄭氏曰韋彭姓顧昆吾已紀杞二音姓孔氏穎達曰鄭語云祝融其後八姓己姓昆吾顧溫彭姓豕韋則商滅之矣昭十八年左傳云二月乙卯周毛得殺毛伯過萇𢎞曰是昆吾稔之日也昆吾與桀同日亡故檀弓注曰桀以乙卯亡言湯既受命載斾秉鉞以征不義桀與三蘖皆不能遂其惡鄒氏泉曰遂肆其惡也達行其志也而天下截然歸商矣段氏昌武曰截者定於一之謂也初伐韋次伐顧次伐昆吾乃伐夏桀當時用師之序如此歐陽氏修曰湯已為天下所歸用此九有之師以伐三蘖并其本而去之也集説鄭氏康成曰上既美其剛柔得中勇敢不懼於是有武功有王徳及建旆興師出伐志在誅有罪也黃氏佐曰初伐韋次伐顧庶幾夏桀知所改圖也及其終不悛也然後興南巢之師以快人神之憤苟徒以為治亂者必先其黨翦其枝葉而後除其本根則是後世以計取天下之為而非聖人恭行天討之意矣昔在中葉有震且業允也天子叶奬里反降予卿士鉏里反實維阿衡叶戸郎反實左音佐右音又商王集傳賦也葉世震懼業危也孔氏穎逹曰湯未興之前國弱而危懼也劉氏敞曰有震且業者常有震恐危業之事即仲虺云肇我邦於有夏若苗之有莠若粟之有秕小大戰戰罔不懼於非辜者此也承上文而言昔在則前乎此矣朱氏公遷曰此字指成湯時言之豈謂湯之前世中衰時與范氏處義曰此詩據商祖之所自出而言則湯以前為商之中葉也允也天子指湯也何氏楷曰贊湯有聖徳信乎其為真主降言天賜之也朱氏公遷曰即賚弼之義卿士則伊尹也孔氏穎逹曰君奭注云伊尹名摯湯以為阿衡至太甲改為保衡阿衡為公官此言卿士者三公兼卿士也言至於湯得伊尹而有天下也阿衡伊尹官號也鄭氏康成曰阿倚衡平也伊尹湯所依倚而取平故以為官名郝氏敬曰古字阿倚通集説孔氏穎達曰既言成湯伐桀又上本未興之時及得臣之助蘓氏轍曰自契至湯其間盖有微弱振動之憂與信矣天之子商也降之卿士以左右商王而後商室以興輔氏廣曰昔在中葉有震且業分明是指相土之後成湯以前中衰之時言也允也天子言湯之為天子當乎天心降予卿士言伊尹不徒出乃天為湯而錫之也左右商王謂輔佐成湯以成王道也朱氏善曰前章言湯降不遲是湯之生不先不後而適當其期乃天實立之以為興王之君也此章言降予卿士是尹之生亦不先不後而適當夏商革命之際乃天實賜之以為興王之佐也使生湯而不生尹則是有君無臣而何以成興王之業惟有湯以為之君而又有尹以為之佐此天命之所以集而王業之所以成也已上四章皆頌成湯功烈至此乃以左右商王一語歸之阿衡則湯固百世不遷之烈祖而商之子孫凡有大享於先王則伊尹以佐命元臣得與於享無疑矣總論陳氏櫟曰此詩頌湯之興而推本於契之始湯武徳之盛如此本其所以聖者不越乎敬而已是敬也即契率履不越之心也率履不越之心即舜命之以敬敷五教之心歟長發七章一章八句四章章七句一章九句一章六句集傳序以此為大禘之詩盖祭其祖之所出而以其祖配也張子曰其祖之所自出則帝嚳也蘓氏曰大禘之祭所及者遠故其詩歴言商之先后又及其卿士伊尹盖與祭於禘者也啇書曰兹予大享於先王爾祖其從與享之是禮也豈其起於商之世歟今案大禘不及羣廟之主馮氏復京曰陸淳云禘於始祖廟祭所出之帝便以祖配不兼羣廟朱子蓋同陸說此宜為祫祭之詩然經無明文不可考也附錄序長發大禘也孔氏安國曰禘祫之禮為序昭穆故毁廟之主及羣廟之主皆合食於太廟孔氏穎逹曰王肅以大禘為殷祭謂禘祭宗廟非祭天也程子曰禘其祖之所自出之帝以所出之帝為東嚮之尊其餘合食於其前是為禘也劉氏敞曰禘於太祖則功臣與祭故末章言伊尹也王氏安石曰長發序以為大禘之詩雝序以為禘太祖周無四時之禘故也今曰大禘則商有四時之禘故也四時之禘為小則禘其祖之所自出為大矣陳氏祥道曰陸淳謂禘祭不兼羣廟為其疎逺不敢䙝狎此殆未嘗考之於經也詩頌長發大禘而歌𤣥王桓撥相土烈烈則不兼羣廟之說其足信哉何氏楷曰漢儒皆以大禘為合祭羣廟程子胡致堂皆從其說而趙楊泥大傳中以其祖配之一語謂禘祭推始祖之所自出其配之者惟始祖一人而已朱子亦以為然今據大傳本文曰禮不王不禘王者禘其祖之所自出以其祖配之諸侯及其太祖大夫士有大事省于其君于祫及其高祖馬端臨謂玩其文意亦似共只說一祭天子則謂之禘及其祖之所自出諸侯所祭止太祖大夫士有功勞見知於君許之祫則于祫可及高祖蓋共是合祭祖宗而以君臣之故所及有逺近也蓋禘之為言諦也一則如宋神宗謂審諦其祖之所自出一則如許慎為審諦昭穆張純謂諦諟昭穆尊卑之義是也斯則大禘之禮七廟之主皆在亦以明矣此詩末章舉及阿衡正配享太廟之事固大禘之一證也書盤庚篇兹予大享于先王爾祖其從與享之周禮司尊彝云凡四時之閒祀追享朝享先儒謂禘追其所自出故為追享祫羣主皆朝於太廟故為朝享禘祫皆以享名而禘尤大於祫故以大享名也盤庚言功臣配享正在大享之時則序以長發為大禘信非妄矣何休亦云禘所以異於祫者功臣皆祭也楊氏云詩頌長發大禘但述𤣥王以下而不及於所自出之帝則安得謂之禘詩今案篇首即以長發其祥一語開端明是指帝嚳而言未嘗不及於所自出之帝也豈必舉嚳之名而後謂之及嚳耶案序長發大禘也鄭康成曰郊祭天也禮記云王者禘其祖之所自出以其祖配之是謂也夫禘之名祭天古矣然考之此詩曰契曰相土曰湯曰伊尹則與郊祭之制未協故王肅以為宗廟之祭也案殷制夏祭亦名禘然夏禘時祭也不及羣廟之主無因而言相土若以為五年殷禘鄭康成於禘祫志推之以為禘祭各就其廟經述商所由興歴更前世有功之祖非是各就其廟之言故朱子以此宜為祫祭之詩然以經無明文可考未定厥義今錄諸儒之説近於禘祫者俾後有所徴焉撻他達反彼殷武奮伐荆楚罙面規反入其阻裒蒲侯反荆之旅有截其所湯孫之緒象呂反集傳賦也撻疾貌曹氏粹中曰言其兵威神速徐氏鳳彩曰徳綏者宜緩威震者宜疾積衰之後非可遲疑重發者也殷武殷王之武也冞冐裒聚湯孫謂高宗舊説以此為祀高宗之樂盖自盤庚沒而殷道衰楚人叛之孔氏穎達曰周始封熊繹為楚子於武丁之世不知楚君何人也嚴氏粲曰解頤新語云或謂成王始封熊繹於荆至魯僖公元年始有楚號遂疑商時未有荆楚乃欲假此以實韓詩宋襄公時作商頌之說殊不思禹貢荆及衡陽為荆州乃在南即荆楚也荆岐既旅至於荆山乃在西盖雍州之荆也詩人以有二荆故以荆楚别荆岐耳孰謂周始有荆楚哉高宗撻然用武以伐其國入其險阻以致其衆朱氏公遷曰叛則散以亂裒以聚之所以致其來而平之也黄氏佐曰裒旅謂斂人心之渙散收荆楚之叛衆而致其來如所謂是致是附也盡平其地使截然齊一皆高宗之功也易曰高宗伐鬼方三年克之盖謂此歟朱氏公遷曰高宗伐鬼方朱子以為荆楚盖荆楚之地好鬼自古而然下至戰國之際猶爾驗諸屈原九歌可見也集説鄭氏康成曰殷道衰而楚人叛高宗撻然奮揚威武出兵伐之冒入其險阻謂踰方城之隘克其軍率而俘虜其士衆所伐之處國邑皆服其罪更自敕整截然齊一李氏樗曰荆楚在商周之時為夷狄之國世亂則先叛世治則後服及商室中㣲世為中國患此高宗所以討之也輔氏廣曰撻彼殷武言高宗能疾於用武也奮伐荆楚知所怒也冞入其阻不憚勞也裒荆之旅不縱殺也有截其所使之截然齊一各居其所也此其所以為高宗之功緒也朱氏善曰自古中興之君未有不以武徳勝者蓋繼衰亂之後内之則法度之既弛綱紀之既壞外之則諸侯之既叛四夷之既起自非以武徳勝之則安能舉王綱於己墜合人心於既離撥亂而復反於正哉若殷之高宗信乎其無愧於為湯之孫矣維女音汝荆楚居國南鄉昔有成湯自彼氐都啼反羌莫敢不來享叶虚良反莫敢不來王曰商是常集傳賦也氐羌夷狄國在西方孔氏穎達曰氐羌之種漢世仍存其居在秦隴之西曹氏粹中曰漢志隴西郡有氐道縣羌即西羌婼丑畧反羌之屬也享獻也朱氏善曰謂獻其方物也世見曰王孔氏穎達曰逺夷一世而一見於王秋官大行人云九州外謂之蕃國世一見謂其父死子繼及嗣王即位乃來朝謂之世見也蘓氏曰既克之則告之曰爾雖遠亦居吾國之南耳曹氏粹中曰商居河洛之閒則荆楚在國南鄉昔成湯之世雖氐羌之遠猶莫敢不來朝朱氏道行曰氐羗其種不一故曰莫不曰此商之常禮也况汝荆楚曷敢不至哉集説孔氏穎達曰首章言伐楚之功二章言責楚之義輔氏廣曰既以克之則慰安之戒敕之使之循其常禮而不敢為異也朱氏公遷曰此舉逺者以戒近者之當然也徐氏鳳彩曰上章以威克此章以文告天命多辟音璧設都于禹之績歲事來辟勿予禍適直革反稼穡匪解音懈叶訖力反集傳賦也多辟諸侯也來辟來王也適謫通郝氏敬曰責讓也言天命諸侯曹氏粹中曰說命云明王奉若天道建邦設都則多辟雖受封於天子實天所命也各建都邑于禹所治之地鄭氏康成曰禹平水土弼成五服而諸侯之國定是以云然而皆以歲事來至于商黄氏佐曰歳事乃周禮春朝夏宗秋覲冬遇之屬正所謂述職也以祈王之不譴曰我之稼穡不敢解也庶可以免咎矣項氏安世曰言以歲事來享於君而冀以免於禍適奉其稼穡而不敢觧也鍾氏惺曰以禍適為言商道先罰後賞也言荆楚既平而諸侯畏服也朱子曰頌中有全篇句句是韻如殷武之類無兩句不是韻到稼穡匪觧自是欠了一句集説李氏樗曰禹貢甸服之外毎百里為差今立都于禹所治之功以嵗時來朝覲於王以見諸侯無不服也凡諸侯之所以朝於天子者勿使禍責之惟當以勸民稼穡而無有觧倦則可以免禍責矣古者天子之於諸侯訓以農事視其農事或修或否以為賞罰誠以農事乃諸侯之急務也上章言夷狄率服則是天下無事其所先者農事耳故於此繼而言之也季氏本曰稼穡民事之所急者稼穡匪觧則能安民而諸侯之職脩矣所以免禍適在此而已曰勿予禍適據諸侯免禍之心而言天命降監下與濫叶下民有嚴叶五剛反不僭不濫不敢怠遑命于下國叶越必反封建厥福叶筆力反集傳賦也監視嚴威也僭賞之差也濫刑之過也孔氏穎逹曰左傳曰賞僣懼及滛人刑濫懼及善人遑暇封大也言天命降監不在乎他皆在民之視聴則下民亦有嚴矣朱氏公遷曰天之視聽在民則聰明明畏皆自我民矣非可畏乎惟賞不僭刑不濫而不敢怠遑則天命之以天下而大建其福此高宗所以受命而中興也集説輔氏廣曰言天雖髙而實下其監視甚可畏也民雖卑而天實以為視聽不可忽也惟髙宗上畏天下敬民而見於刑賞者未嘗有僣濫之失存於中心者不敢有怠遑之意故天命之以天下而大建其福朱氏公遷曰畏天在於畏民公賞罰勤政事畏民以盡畏天之實如此則得天而得民矣此章乃髙宗所以中興之故凡荆楚之来庭諸侯之畏服功業之顯著福祚之乆長皆不僣濫怠遑以致之耳苟不務此而唯威力之是尚則民碞即天顯見其可畏而已商邑翼翼四方之極赫赫厥聲濯濯厥靈壽考且寧以保我後生叶桑經反集傳賦也商邑王都也翼翼整敕貌極表也嚴氏粲曰言政教取正於此也沈氏萬鈳曰極中之表也赫赫顯盛也濯濯光明也朱氏公遷曰整敕明盛皆以中興氣象言言高宗中興之盛如此壽考且寧云者盖高宗之享國五十有九年我後生謂後嗣子孫也集説范氏處義曰此章美髙宗能正都邑為天下之本福及子孫也髙宗能治都邑使風俗翼翼然禮遜恭敬故四方皆取中焉謂天下視都邑為風俗也其聲聞則赫赫而盛其威靈則濯濯而大故身享夀考康寧之福使後嗣得以保其基業朱氏公遷曰殷道中衰國勢頽靡四方慢易而弗庭者乆矣及髙宗振厲而都邑尊嚴復為民極而聲威大著無逺弗加而又歴年多施澤於民乆人心天命鞏固俾子孫世世治安此中興之功所以不可及也何氏楷曰身夀考則經營必周世治安則靈長未艾此髙宗之中興所以為烈而子孫崇報之所以不容己歟陟彼景山叶所旃方松柏丸丸叶胡員反是斷音短是遷方斲陟角反是虔松桷音角有梴丑連反旅楹有閑叶胡田反寢成孔安叶於連反集傳賦也景山名商所都也朱子曰春秋傳云商湯有景亳之命而此言陟彼景山蓋商所都之山名衛詩亦言景山乃商舊都也丸丸直也錢氏文子曰丸丸圓直也遷徙徐氏常吉曰斷是㫁之於景山之上遷是遷之於造作之所方正也謝氏枋得曰以繩墨取方正虔亦截也季氏本曰如䖍劉之䖍梴長貌孔氏穎逹曰桷以長為善故梴為長貌旅衆也孔氏穎逹曰言為桷與衆楹故訓旅為衆閑閑然而大也薛氏漢曰閑大也寢廟中之寢也何氏楷曰閟宮篇詠新廟亦但舉路寢則此可例推矣安所以安高宗之神也此盖特為百世不遷之廟不在三昭三穆之數史記武丁修政行徳天下咸驩殷道復興子祖庚立嘉武丁之徳立其廟為髙宗既成始祔而祭之之詩也然此章與閟宫之卒章文意略同未詳何謂集説輔氏廣曰材植之美規模之宏此髙宗之神之所安也言其有以當之矣其與閟宮之卒章文義略同者蓋俱為宗廟始成而祭之詩豈作閟宮者亦取法於是詩乎劉氏瑾曰商書曰七世之廟可以觀徳蓋天子七廟三昭三穆與太祖之廟而七八世九世而後隨其昭穆親盡遞遷其主而祧於太祖之廟其有功徳之君則後世宗之雖親盡而不祧别立百世不遷之廟而特祔其主焉凡有功徳者皆然初不可預限其數而商則止有三宗髙宗即其一也郝氏敬曰此與魯頌新廟異魯更新此始作也總論許氏謙曰髙宗中興之功必以伐荆楚為大故作頌者惟言此以見殷之復治者在是蓋蠻夷猾夏聖人所憂四夷来王盛徳所及也朱氏公遷曰一章稱伐楚之功二章述戒楚之詞三章言諸侯來服四章本中興之故五章極言中興之盛六章則言今日作廟以祭如此殷武六章三章章六句二章章七句一章五句劉氏瑾曰篇内第三章為五句朱子疑其脱一句則此詩當作四章章六句二章章七句集説蘓氏轍曰司馬遷言宋襄公修仁行義欲為盟主其大夫正考父美之故追道契湯髙宗殷之所以興作商頌其説蓋出於韓詩近世學者因此詩有奮伐荆楚則以襄公伐楚之事當之遂以韓嬰之説為信予考商頌五篇皆盛徳之事非宋之所宜有且其詩有邦畿千里維民所止肇域彼四海命于下國封建厥福此類非復諸侯之事無可疑者襄公伐楚而敗於泓幾以亡國此宋之大恥既非其所當頌而長發之詩謂湯武王苟誠襄公之頌周有武王豈復以命湯哉劉氏瑾曰閟宮為頌僖公修宗廟而作殷武為宗武丁特立廟而作故閟宮所以頌僖公服夷蠻享福夀者皆未然之期望而此詩所以頌武丁服夷夏享福夀者皆已然之實事卒章則皆述其作廟之事以結之郝氏敬曰荆楚之國天下有道則首善焉文王之二南是也無道則首叛焉商周之中葉是也繼世之王有能中興者則天下視此為向背焉髙宗之殷武周宣之采芑是也商頌五篇十六章一百五十四句集説班氏固曰殷周之雅頌上本有娀姜嫄契稷公劉古公大伯王季姜女大任大姒之徳乃及成湯文武受命武丁成康宣王中興下及輔佐阿衡周召大公申伯召虎仲山甫之屬君臣男女有功徳者靡不褒揚功徳既信美矣褒揚之聲盈乎天地之間是以光名著於當世遺譽垂於無窮也張子曰商頌之詞粹欽定詩經傳説彚纂卷二十一
