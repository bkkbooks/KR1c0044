body:
  text: 欽定四庫全書欽定詩經傳説彚纂卷十八生民之什三之二厥初生民時維姜嫄音原叶魚倫反生民如何克禋音因克祀叶養里反以弗無子叶奨里反履帝武敏叶母鄙反歆攸介攸止載震載夙叶相即反載生載育叶曰逼反時維后稷集傳賦也民人也謂周人也時是也姜嫄炎帝後姜姓有邰氏女名嫄為高辛之世妃孔氏穎達曰鄭以姜嫄為髙辛之世妃謂其後世子孫之妃也未知其為㡬世故直以世言之精意以享謂之禋祀祀郊禖也弗之言祓也祓無子求有子也古者立郊禖孔氏穎達曰月令稱高禖蔡邕月令章句云高禖祀名高猶尊也禖猶媒也毛於此及𤣥鳥傳皆作郊禖則讀高為郊鄭於此箋亦云郊禖蓋祭天於郊而以先媒配也變媒言禖者神之也其禮以𤣥鳥至之日用大牢祀之孔氏穎逹曰燕至在春分二月之中主為産乳蕃滋故王者重其初至之日用牛羊豕之大牢祀於郊禖之神郊天用特牲而此祭天用大牢者以兼祭先禖之神異於常郊故也顔氏逹龍曰祠以仲春正其候也祭以大牢尊其禮也祀以南郊重其事也天子親往后率九嬪御孔氏穎逹曰天子親往敬其事故親祭之后妃率九嬪從之而往侍御於祭焉乃禮天子所御帶以弓韣音獨授以弓矢于郊禖之前也孔氏穎逹曰禮天子所御幸者使大祝酌酒飲之于郊禖之庭以神之惠光顯之也弓矢者男子之事使之帶弓衣執弓矢冀其所生為男也劉氏瑾曰此上所言祭郊禖之禮乃通言古者天子有此禮耳非専指姜嫄之事也履踐也帝上帝也武迹敏拇郭氏璞曰拇迹大指處朱子曰敏字當為絶句叶上韻耳歆動也猶驚異也介大也震娠也孔氏穎逹曰左傳云邑姜方震大叔后緡方震皆謂有身為震也夙肅也生子者及月辰居側室也朱氏公遷曰内則妻將生子及月辰居側室疏云側室次燕寢之旁生子必於側室以正室燕寢尊故也育養也姜嫄出祀郊禖見大人迹而履其拇鄭氏康成曰時有大人迹姜嫄履之足不能滿履其拇趾之處劉氏瑾曰姜嫄以髙辛子孫之妃而得祀郊禖豈古禮簡質天子諸侯皆用其禮歟遂歆歆然如有人道之感於是即其所大所止之處而震動有娠乃周人所由以生之始也周公制禮尊后稷以配天故作此詩以推本其始生之祥明其受命於天固有以異於常人也然巨迹之説先儒或頗疑之而張子曰天地之始固未嘗先有人也則人固有化而生者矣蓋天地之氣生之也蘇氏亦曰凡物之異於常物者其取天地之氣常多故其生也或異麒麟之生異於犬羊蛟龍之生異於魚鼈物固有然者矣神人之生而有以異於人何足怪哉斯言得之矣集説王氏安石曰緜所謂民之初生則本由大王之興此所謂厥初生民則本其由后稷而起也朱子曰毛公説姜嫄出祀郊禖履帝嚳之迹而行將事齊敏鄭氏説姜嫄見大人迹而履其拇二家之説不同古今諸儒多是毛而非鄭然案史記亦云姜嫄見大人迹心忻然欲踐之踐之而身動如孕則非鄭之臆説矣後世所謂祥瑞固多偽妄然豈可因後世之偽妄而并眞實者皆以為無乎鳯鳥不至河不出圖孔子之言不成亦以為非天下之理一而已而有常變之不同夫二氣交感化生萬物者理之常也若姜嫄簡狄之生稷契此理之變也履巨迹之事有此理且如契之生詩中亦云𤣥鳥降而生啇蓋以為稷契皆天生之耳非有人道之感非可以常理論也漢高祖之生亦類此此等不可以言盡當意㑹之可也輔氏廣曰初生周人者實姜嫄也生民如何是又問其所以然也以下則述其所以然而終結之以時維后稷一句蓋言其所生之子實后稷也后稷始教民播種而利及萬世非天所命而何宜其始生之靈異乎誕彌厥月先生如達他末反不坼敕宅反不副孚逼反叶孚廹反無菑音災無害叶音曷以赫厥靈上帝不寧不康禋祀叶養里反居然生子叶奬里反集傳賦也誕發語辭張子曰此篇多誕字皆訓為大後有不甚通者疑皆發語辭耳彌終也終十月之期也鄭氏樵曰彌滿也先生首生也達小羊也羊子易生無畱難也坼副皆裂也何氏楷曰副本作疈説文云判也赫顯也不寧寧也不康康也居然猶徒然也凡人之生必坼副菑害其母而首生之子尤難今姜嫄首生后稷如羊子之易無坼副菑害之苦是顯其靈異也上帝豈不寧乎豈不康我之禋祀乎而使我無人道而徒然生是子也集説孔氏穎逹曰天既祐令有身又使之生易是天意以此顯眀其有神靈也上天之意豈不降福而安之乎言上天誠降福而安之使母無病苦子得易生是天安之也姜嫄之身豈不見安於禋祀乎言姜嫄實見安於禋祀祈則有子生之又易是為禋祀所安也蘇氏轍曰后稷姜嫄之元子也既終其月而生其生也如達之易赫然甚異於人此豈上帝不安之哉然姜嫄乃反以其由禋祀之故居然無疾而生子是以不安而棄之誕寘之隘於懈反巷牛羊腓符非反字之誕寘之平林㑹伐平林誕寘之寒冰鳥覆敷救反翼叶音異之鳥乃去矣后稷呱叶去聲矣實覃實訏叶去聲厥聲載路集傳賦也隘狹腓芘字愛胡氏一桂曰集傳於采薇小人所腓引程子曰腓隨動也如足之腓足動則隨而動如是則正與易咸其腓同義意者牛羊見稷以足肚遮芘之如有愛之之意故謂之腓字㑹值也值人伐木而收之覆蓋翼藉也以一翼覆之以一翼藉之也孔氏穎逹曰上覆下翼明非一翼耳姜嫄以𤣥鳥至月而禋祀在母十月而生稷其生正當冰月故得棄之冰也呱啼聲也覃長訏大載滿也滿路言其聲之大也無人道而生子或者以為不祥故棄之而有此異也於是始收而養之集説朱氏善曰牛羊之腓䕶之以其股也鳥之覆護之以其翼也人之㑹伐平林則又収而置之懐抱也人與我同類者也物與我異類者也而無有不愛䕶之意以見天之所生固非人之所能棄也實覃實訏厥聲載路此稷之所以異於人也於是始收而養之則亦知其受命於天而不可以常兒待之矣誕實匍音蒲匐蒲北反克岐克嶷魚極反以就口食蓺之荏而甚反菽荏菽旆旆禾役穟穟音遂麻麥幪幪莫孔反瓜瓞唪唪布孔反集傳賦也匍匐手足竝行也岐嶷峻茂之狀就向也口食自能食也蓋六七歳時也蓺樹也荏菽大豆也孔氏穎達曰釋草云戎菽謂之荏菽孫炎以為大豆旆旆枝旟揚起也錢氏文子曰如旗之旆也役列也孔氏穎逹曰種禾則使有行列穟穟苗美好之貌也王氏安石曰成秀也錢氏文子曰穟與穂通穟穟禾多實也幪幪然茂密也唪唪然多實也劉氏彛曰旆旆穟穟幪幪唪唪言皆異於常人所種言后稷能食時已有種殖之志蓋其天性然也史記曰棄為兒時其遊戲好種殖麻麥麻麥美及為成人遂好耕農堯舉以為農師集説鄭氏康成曰能匍匐則岐岐然意有所知也其貌嶷嶷然有所識别也以此至於能就衆人口自食謂六七歳時就口食之時則有種殖之志言天性也輔氏廣曰此章則言后稷之於種殖葢天性自然生知非從習得皆所以終首章之意也曹氏居貞曰聖人一種殖之間而嘉種各遂其性則所禀之異可知矣誕后稷之穡有相息亮反之道叶徒口反茀音弗厥豐草叶此苟反種去聲之黄茂叶莫口反實方實苞叶補苟反實種上聲實褎叶徐久反實發實秀叶思久反實堅實好叶許口反實穎營井反實栗即有邰他來反家室集傳賦也相助也言盡人力之助也張子曰有相之道贊化育之一端也今農民未見致力於田者或有一耕即種其收即天幸也惟后稷則盡人力之助茀治也季氏本曰茀草盛之名因草盛而治去之故茀即為治也種布之也黄茂嘉榖也何氏楷曰黄土色洪範曰土爰稼穡故五榖色多黄方房也苞甲而未拆也此漬其種也種甲拆而可為種也朱氏公遷曰生意藏於其中是為房生意蓄而欲泄是為甲甲者草木之仁也拆則破其種而出之矣褎漸長也發盡發也秀始穟也黄氏震曰發者苗之長盛秀者苗之吐華堅其實堅也好形味好也穎實繁碩而垂末也孔氏穎逹曰説文云穎禾末也言其穂重而穎垂也栗不秕補履反也既收成見其實皆栗栗然不秕也孔氏穎達曰左傳云嘉栗㫖酒服䖍云榖之初熟為栗邰后稷之母家也豈其或滅或遷而遂以其地封后稷歟陸氏德眀曰邰后稷所封國也今在京兆武功縣言后稷之穡如此故堯以其有功於民封於邰使即其母家而居之以主姜嫄之祀故周人亦世祀姜嫄焉劉氏瑾曰曹氏曰生民之功本於姜嫄不可弗祀故周官大司樂奏夷則歌小吕舞大濩以享先妣而序於先祖之上尊之也集説輔氏廣曰自浸種以至收成無非盡人力以相助之而但曰穡者要其成而言之耳且稷大賢也為農師則専於農事以至於受封有國而未嘗及於他務焉古人之精於事也盖如此嚴氏粲曰所以詳言其成熟之次序者見稼穡之艱難非一日所能致或苗而不秀或秀而不實滅裂耕者報之亦滅裂鹵莽耕者報之亦鹵莽今后稷能教民以盡人事故其穡如此朱氏善曰實方實苞自其漬種時言之也實種實襄自其始苗時言之也實發實秀自其始穟時言之也實堅實好自其始實時言之也實穎實栗自其實熟而收成時言之也此稷之播種所以大有功於斯民而有邰之封所以享無窮之報也姚氏舜牧曰天之所以生萬民者稼穡乃天能生地能成而不能使其民之生且成棄相天之時因地之利一一左右而曲成之使稼穡之利昭然大播於天下則有相之道也易曰后以財成天地之道輔相天地之宜以左右民何氏楷曰此章是后稷已為農師而教民之事誕降嘉種維秬音巨維秠孚鄙反維穈音門維芑音起恒古鄧反之秬秠是穫是畝叶滿洧反恒之穈芑是任音壬是負叶扶委反以歸肇祀叶養里反集傳賦也降降是種於民也書曰稷降播種是也秬黒黍也秠黒黍一稃音孚二米者也穈陸氏徳眀曰爾雅作􅚂赤粱粟也芑白粱粟也恒徧也謂徧種之也孔氏穎達曰以言種之廣多故以恒為徧定本作恒集注皆作亘字任肩任也負背負也既成則穫而棲之於畝任負而歸以供祭祀也秬秠言穫畝穈芑言任負互文耳肇始也稷始受國為祭主故曰肇祀劉氏瑾曰后稷得國而始主祭則宗廟羣神之祀皆始此矣集説黄氏櫄曰后稷以前未嘗無黍稷之種也特未别其維秬維秠維穈維芑耳后稷為之别其類以時其耕種故曰誕降嘉種言后稷降之於民也非天降之於后稷也朱氏善曰稷之降種其名不一而此獨以秬秠穈芑言者自其種之嘉而可以供祭祀者言之也秬秠可以供鬱鬯穈芑可以供粢盛故降之於民使得以徧種之種焉而成成焉而穫穫焉而任負以歸於是為鬯酒以降神為粢盛以享神此自其始封時言之也誕我祀如何或舂傷客反或揄音由或簸波我反或蹂音柔釋之叟叟所留反烝之浮浮載謀載惟取蕭祭脂取羝都禮反以軷蒲末反叶蒲昧反載燔載烈如字叶力制反以興嗣歳叶音雪又如字集傳賦也我祀承上章而言后稷之祀也揄抒音暑臼也陸氏德眀曰抒蒼頡篇云取出也孔氏穎達曰謂抒米以出臼也簸揚去糠也蹂蹂禾取榖以繼之也劉氏彝曰蹂以脱其穂釋淅米也叟叟聲也浮浮氣也陸氏德眀曰叟字又作溲濤米聲也爾雅作溞浮爾雅説文竝作烰云烝也謀卜日擇士也劉氏瑾曰周禮太宰及儀禮少牢饋食皆前期十日帥執事而卜祭日之吉凶又案射義將祭必先習射以擇士射中者得與於祭所擇之士謂諸侯諸臣及所貢士也惟齋戒具脩也劉氏瑾曰大宰掌百官之誓戒與其具脩齋者散齋七日戒者致齋三日具謂所當供脩謂埽除糞洒也朱氏公遷曰謀惟即天保所為吉蠲也蕭蒿也脂膟音律膋也宗廟之祭取蕭合膟膋爇之使臭達牆屋也羝牡羊也孔氏穎達曰祭不用牝軷祭行道之神也月令孟冬其祀行鄭氏康成曰行在廟門外之西為軷壤厚二寸廣五尺輪四尺祀行之禮北面設主於軷上孔氏穎達曰東西為廣南北為輪常祀行神之壇則然若於國外祖道軷祭其壇随路所嚮而為廣輪尺數同也季氏本曰軷毛氏以為道祭即鄭氏所謂七祀行神也冬月隂往陽來故有此祭祭在廟門之外非必有逺行而始軷祭也燔傅諸火也烈貫之而加於火也孔氏穎達曰烈即今之炙肉也曹氏粹中曰宗廟與軷皆有尸燔烈所以為尸羞也四者皆祭祀之事曹氏居貞曰朱子雖只指取蕭以下四者而言然舂簸以及謀惟亦莫非祭祀時事特舂簸以及謀惟乃將祭時事取蕭以及燔烈則臨祭時事所以興來歳而繼往歳也集説輔氏廣曰言祭祀之事前詳於舂簸釋烝之事者不忘本也載謀載惟而下備其禮也其所以祭祀者以興來歳繼往歳葢始終農事也曹氏居貞曰祭祀以農事而始興則亦以農事而迭舉今嵗豐年而祭所以報也亦所以祈也於是豐年之祥無或間斷往歳之豐登可繼來歳之豐登又興矣可見后稷之謹祭祀而重農事也如此朱氏道行曰此皆后稷義起之禮後來周禮皆本此以賁飾之卬五郎反盛音成于豆于豆于豋其香始升上帝居歆下與今叶胡臭亶時叶上止反后稷肇祀叶養里反庶無罪悔叶呼委反以迄許乙反于今上與歆叶集傳賦也卬我也木曰豆以薦菹醢也瓦曰豋以薦大音泰羮也孔氏穎達曰天官醢人掌四豆之實皆有菹醢是豆為薦羞菹醢也公食大夫禮云大羮湇不和實於豋是豋為大羮湇者肉汁大古之羮也不調以鹽菜以質故以瓦器盛之居安也鬼神食氣曰歆謝氏枋得曰天地間惟理與氣有此理則有此氣有此氣則有此理鬼神無形無聲惟有理有氣在冥漠之間耳凡祭皆以心感神以氣合神者也黍稷必馨香酒殽必芬芳用椒用桂用蕭用鬱金草皆以香氣求神神以歆饗此氣耳胡何臭香亶誠也時言得其時也庶近迄至也此章言其尊祖配天之祭其香始升而上帝已安而饗之言應之疾也此何但芳臭之薦信得其時哉葢自后稷之肇祀則庶無罪悔而至于今矣曽氏曰自后稷肇祀以來前後相承兢兢業業惟恐一有罪悔獲戾於天閲數百年而此心不易故曰庶無罪悔以迄于今言周人世世用心如此也集説范氏處義曰后稷雖肇祀而未及郊天之禮以非天子不可也周公相成王郊祀后稷以配天而歸功之言嚴氏粲曰天生后稷以養民后稷能教民稼穡以相天故以功封邰而祀宗廟為周家祭祀之始天心眷之久矣自后稷肇祀以來子孫世修其業不敢失墜以𫉬罪於天遂至今日得以成王業而郊天天之歆饗葢在此耳周之郊也因稷而致所謂文武之功起於后稷尊后稷以配天不亦宜乎朱氏公遷曰周人敬天之心傳自后稷今以后稷所以敬天者祀稷而配天則志意相合精神相感神妙之機有不容言者矣后稷肇祀之敬於上章可見盡志盡物皆敬也郊以稷配天此言帝而不言稷者統於尊也帝享則稷亦享之矣朱氏善曰上章言后稷之祀此章遂言今日尊祖配天之祭夫莫髙於天莫尊於帝若不可得而感格也而香之始升上帝已安而饗之豈為其芳臭之薦得其時而已哉葢自后稷之肇祀也載謀載惟之致其誠取蕭取羝之致其謹載燔載烈之致其戒固未嘗有一亳之罪悔由后稷而公劉公劉之心無以異於后稷也由公劉而大王大王之心無以異於公劉也由大王而文武文王武王之心又無以異於大王也今至於後王之時而此心之敬畏猶前日也則上帝之饗之也豈徒以其物哉正以周人之用心同一敬畏之相傳也總論孔氏穎達曰生民詩言尊祖之意以后稷生於姜嫄而來其文王受命武王除亂以定天下之功其兆本起由於后稷及周公成王致太平制禮以王功起於后稷故推舉之以配天經八章上三章言后稷生之所由顯異之事下五章言后稷長而有功見其得以配天之意生民八章四章章十句四章章八句集傳此詩未詳所用豈郊祀之後亦有受釐頒胙之禮也歟舊説第三章八句第四章十句今案第三章當為十句第四章當為八句則去呱訏路音韻諧協呱聲載路文勢通貫而此詩八章皆以十句八句相間為次又二章以後七章以前每章章之首皆有誕字集説段氏昌武曰配天樂歌已見於頌祀主於嚴肅故其辭簡此殆大臣因祀事之餘推原其所以尊者與七月之辭相類吴氏澂曰頌有思文后稷矣生民乃祭之後飲酒受釐時所歌施於人而非施於鬼神者自當為雅葢祭祀之時歌之於鬼神者頌詩也受釐之時歌之於生人者雅詩也劉氏瑾曰此詩雖未眀言尊稷配天之事而一詩之意實為尊稷配天而推本言之以為受釐之樂歌也敦徒端反彼行葦牛羊勿踐履方苞方體維葉泥泥乃禮反戚戚兄弟待禮反莫遠具爾或肆之筵或授之几集傳興也敦聚貌勾萌之時也鄭氏康成曰勾屈生也芒而直曰萌行道也勿戒止之詞也苞甲而未坼也體成形也孔氏穎達曰成形者謂至秋乃成為葦此時未成故言方泥泥柔澤貌陸氏德眀曰張楫作苨苨云草盛也戚戚親也吕氏祖謙曰毛氏以戚戚為内相親惟體之深者為能識之莫猶勿也具俱也爾與邇同肆陳也疑此祭畢而燕父兄耆老之詩故言敦彼行葦而牛羊勿踐履則方苞方體而葉泥泥矣戚戚兄弟而莫遠具爾則或肆之筵而或授之几矣鄭氏康成曰王與族人燕年稚者為設筵而已老者加之以几曹氏粹中曰几尊者所憑以為安此方言其開燕設席之初而慇勤篤厚之意藹然已見於言語之外矣讀者詳之集説孔氏穎達曰言先王有仁恩之故能誠心親戚其親戚之兄弟無遠無近王俱爾而揖進之與之燕樂於時王心實悦或有陳之筵席者或有授之以几者是王能親其所親也蘇氏轍曰道上之葦其為物也微矣仁人君子將於是何求哉然謂其方且欲生也故禁牛羊使勿踐之而况於人乎故王者内則親睦九族外則尊事黄耇凡以無逆其性而非有所望之也此所謂忠厚也范氏處義曰由物理以察人倫乃知兄弟相親出於天性其相聚而處如葦之同根其相依而生如葦之枝葉所以不可相遠者亦如此葦也輔氏廣曰兄弟親戚恩意本厚其所以至於薄者只緣相遠而相疎故耳若常使相近相見情意浹洽則相親相敬相與燕樂其於肆筵授几之事自然有不容己者矣此為首章一篇之意皆具於此何氏楷曰此詩二章以下皆言燕樂兄弟之事然必有此心為之本而後燕樂不為虚文肆筵設席叶祥勺反授几有緝御叶魚駕反或獻或酢才洛反洗爵奠斝古雅反叶居訝反醓他感反醢以薦叶即略反或燔或炙叶陟略反嘉殽脾婢支反臄渠略反或歌或咢五洛反集傳賦也設席重席也孔氏穎達曰既言肆筵上又設席故知重席也不過下莞上簟而已春官司几筵注云筵亦席也鋪陳曰筵藉之曰席然則言之筵席通矣彼以在下為鋪陳在上人所蹈藉故在下者稱筵在上者稱席此當與之同也緝續御侍也有相續代而侍者言不乏使也劉氏􅉓曰更其僕御所以優老不暫闕其侍從也朱氏道行曰老者既加几使有所憑則道飲食祝噎哽左右之者不得少閒故御曰緝進酒於客曰獻客荅之曰酢主人又洗爵醻客客受而奠之不舉也曹氏粹中曰案文王世子曰若公與族人燕則異姓為賔膳宰為主人異姓為賔者以同姓無相賔客之道也膳宰為主人者以君尊不親獻酒也如是則獻與酢皆非宗族親行之禮推諸侯以見王者當亦然耳斝爵也夏曰醆阻限反殷曰斝孔氏穎達曰謂之斝者謂畫禾稼也曹氏粹中曰斝商爵也舉商爵者見周之親親尚矣周曰爵醓醢之多汁者也燔用肉炙用肝臄口上肉也歌者比於琴瑟也孔氏穎達曰經傳諸言歌者皆以絃歌之徒擊鼓曰咢言侍御獻醻飲食歌樂之盛也集説李氏樗曰非特肆筵又且設加之以重席非特授几又且有緝御而侍之設席者即周官司几筵所謂設莞筵加繅席設蒲筵加莞席是也緝御即周禮所謂更僕是也主人獻賔賔酢主人洗爵奠斝則所以飲之者無不至也醓醢以薦或燔或炙嘉殽脾臄則所以食之者無不至也飲食之具既至而又思所以樂之凡此皆見親親之誠無不用其極也黄氏佐曰侍御以養其體飲以養其陽食以養其陰歌樂以和其心燕禮之盛如此所以示慈恵也敦音雕下同弓既堅叶吉因反四鍭音侯既鈞舍音捨矢既均序賔以賢叶下珍反敦弓既句古候反叶古侯反既挾子協反四鍭四鍭如樹叶上主反序賔以不侮集傳賦也敦雕通畫也天子雕弓孔氏穎達曰敦與彫古今之異彫是畫飾之義冬官弓人為弓唯言用漆不言畫則漆上又畫之耳堅猶勁也鍭金鏃翦羽矢也爾雅金鏃翦羽謂之鍭孫氏炎日金鏑斷羽使前重也鈞參音驂亭也謂三分之一在前二在後三訂之而平者前有鐵重也孔氏穎達曰輕重鈞停四矢皆然故言四鍭既鈞舍釋也謂發矢也均皆中也賢射多中也投壺曰某賢於某若干純音全竒則曰竒均則曰左右均是也禮記投壺司射執算曰左右卒投請數二算為純一純以取一算為竒遂以竒算告曰某賢於某若干純竒則曰竒鈞則曰左右鈞注以勝為賢尚技藝也儀禮鄉射禮若右勝則曰右賢於左若左勝則曰左賢於右以純數告若有竒者亦曰竒若左右鈞則左右皆執一算以告曰左右鈞注賢猶勝也言賢者射之以中為雋也句彀通謂引滿也孔氏穎達曰説文云彀張弓也二京賦曰彫弓既彀彀與句字雖異音義同射禮搢音晉三挾音浹一既挾四鍭則徧釋矣孔氏穎達曰搢者插也挾謂手梜之射用四矢故插三於帶閒挾一以扣弦而射也案大射禮搢三挾一个謂卿大夫若其君則使人屬矢不親挾也如樹如手就樹之言貫革而堅正也不侮敬也令弟子辭朱氏公遷曰致其辭命也所謂無憮音呼無敖音傲無偝音佩立無踰言者也劉氏瑾曰投壺注弟子賔黨主黨年穉者也謂其立堂下相褻慢司射戒令之憮敖慢也偝立不正向前也踰言遠談語也或曰不以中病不中者也射以中多為雋以不侮為德言既燕而射以為樂也吕氏祖謙曰鄭康成以為將養老大射擇士王肅以為燕射以詩之所叙考之儀禮王肅之説是也李氏如圭曰大射主於射故大夫未舉旅則射燕射主於飲酒故王肅以此為燕射於燕旅酬後為之集説吕氏祖謙曰四鍭既鈞泛言射者也故繼之曰序賔以賢四鍭如樹専言勝者也故繼之曰序賔以不侮案儀禮燕射如鄉射之禮射雖畢而飲未終舉觶無算爵獻酌尚多言酌大斗祈黄耇於既射之後亦豈不可乎輔氏廣曰前四句言射而中又以中多為賢後四句言射而貫革又以不侮為德所謂射不主皮也中多則藝精不侮則德盛案三禮燕必有射故此章或主養老行射或主燕射而吕祖謙軰以王肅燕射之説為長朱子疑此為祭畢而燕父兄耆老之詩因下章有曾孫維主句又改既醉為荅行葦之篇既醉言祭則此篇不得不言祭耳但祭畢之燕射以為樂稽之三禮無文可考故朱子亦作疑辭而未定也曽孫維主如字或叶當口反酒醴維醹如主反或叶奴口反酌以大斗叶腫庾反或如字以祈黄耉叶果五反或如字黄耉台湯來反背叶必墨反以引以翼夀考維祺音其以介景福叶筆力反集傳賦也曾孫主祭者之稱今祭畢而燕故因而稱之也毛氏萇曰曾孫成王也陸氏佃曰周官王燕則膳夫為獻主臣莫敢與君抗禮今此曾孫維主則以尊事黄耇所以為厚也朱子曰此詩作於成王之時則葢謂成王也而説者於他詩所謂曾孫皆以為成王則誤矣醹厚也大斗柄長三尺孔氏穎達曰漢禮器制度注勺五升徑六寸長三尺是也此葢從大噐挹之以樽用此勺耳其在樽中不當用如此長勺也祈求也黄耉老人之稱以祈黄耉猶曰以介眉夀云耳古器物款識王氏逄曰款刻也識記也云用蘄萬夀用蘄眉夀永命多福用蘄眉夀萬年無疆王氏逄曰竝見吕大臨考古圖皆此類也台鮐湯來反也大老則背有鮐文孔氏穎達曰舍人曰老人氣衰皮膚消瘠背若鮐魚也引導翼輔祺吉也此頌禱之詞欲其飲此酒而得老夀又相引導輔翼以享夀祺介景福也集説輔氏廣曰頌禱之辭尤見親愛無窮之意曰黄耇曰台背曰夀考則可見其為燕父兄耆老之詩也台背則老又甚於黄耇也相引導則不昧於所適相輔翼則不怠於所行相與年髙而德劭也附録王氏安石曰以祈黄耇則序所謂養老乞言也吕氏祖謙曰酌大斗而祈黄耇飲之也頌禱與乞言皆在其中矣不必専指一端也言黄耇相導左右成王庶其豋夀考而介景福也案此詩漢唐宋諸儒皆衍序説以為周家忠厚親睦九族養老乞言遂於末章疏其義因言成王以禮在前導引之以禮在旁贊翼之如此尊養老人故得夀考維吉以受景福朱子則専作老人自相引翼而得福看二説皆可通至序以行葦為仁及草木則屬講師附益之辭殊失詩義朱子闢之洵不刋矣總論朱氏善曰侍御之盛言其人之不乏也獻酬之盛言其禮之無闕也飲食之盛言其物之豐也歌樂之盛言其聲之和也前兩章未射而飲燕之始也故備言其禮樂之盛後二章既射而飲燕之終也故惟致其頌禱之誠言之固有序也行葦四章章八句集傳毛七章二章章六句五章章四句鄭八章章四句毛首章以四句興二句不成文理二章又不協韻鄭首章有起興而無所興皆誤今正之如此集説輔氏廣曰先儒分章之誤皆由不知比興之體音韻之節故也是以先生於序説不得不眀辨之既醉以酒既飽以德君子萬年介爾景福叶筆力反集傳賦也德恩惠也陳氏鵬飛曰燕接之開恩澤充足故言飽德朱子曰德王之德也君子謂王也爾亦指王也此父兄所以荅行葦之詩言享其飲食恩意之厚而願其受福如此也集説孔氏穎達曰毛以為成王之祭宗廟羣臣助之至旅酬而酌酒終無算爵而皆醉言成王既醉之以酒矣又於祭末見恵施先後歸俎之事差次二者之德志意充滿又是既飽以德矣君子成王德能如此當有萬年之夀天又大與汝大福也李氏樗曰自古人臣之荅其君者惟冀其受福之多也天保報上之詩也而其所以報之者不過欲其受遐福故成王之羣臣其所以荅其君者亦曰萬年也黄氏櫄曰既醉以酒既飽以德酒可醉也德如之何而可飽哉孔子曰吾食於少施氏而飽少施氏食我以禮乃所以為飽成王之待羣臣既醉之以酒又飽之以德則其所以待羣臣之禮至矣是以羣臣祈之皆愛君之辭也輔氏廣曰醉酒飽徳别行葦所謂侍御獻酬飲食歌樂之盛皆舉之矣但言德者葢徳寓於物言德則可該之行葦末句云以介景福者泛禱之之辭也此言介爾景福者特禱其君之辭也既醉以酒爾殽既將君子萬年介爾昭眀叶謨郎反集傳賦也殽俎實也將行也亦奉持而進之意昭眀猶光大也王氏安石曰昭眀眀德也集説孔氏穎逹曰天又光大汝成王與之以昭眀使之永作眀君也曹氏粹中曰天既錫以夀考又助之以昭眀則受福無窮黄氏櫄曰成王之德既昭眀矣天如之何而助之葢所謂介爾昭眀者所謂錫王勇知之意也輔氏廣曰介爾昭明欲其君大其眀德也德極於光大則福亦極於盛大矣朱氏公遷曰光輝盛大受福之氣象也朱氏善曰上章言介爾景福此章言介爾昭眀則昭眀者亦指福之髙眀光大而言耳昭眀有融高朗令終令終有俶尺六反公尸嘉告叶姑沃反集傳賦也融眀之盛也春秋傳曰眀而未融朗虛眀也朱氏公遷曰虚眀則眀之極盛而無以復加矣令終善終也洪範所謂考終命古器物銘所謂令終令命是也鄭氏康成曰使王有高眀之譽而以善名終俶始也公尸君尸也周稱王而尸但曰公尸葢因其舊如秦已稱皇帝而其男女猶稱公子公主也嘉告以善言告之謂嘏辭也葢欲善其終者必善其始今固未終也而既有其始矣於是公尸以此告之黄氏櫄曰尸有祝辭有嘏辭祝以孝告嘏以慈告公尸嘉告先儒以為奉牲以告之辭愚以為此非祝辭嘏辭也宗祝傳公尸之辭以告主人集説李氏摴曰蘇氏曰昭眀而能融高朗而能終終而復始福無窮也惟受福如此故公尸以善言而告之輔氏廣曰昭眀有融者欲其眀德之極於盛也既言昭明又言高朗者昭眀但言其眀德而已言高則見其超然於事物之表言朗則又見其中虛而表裏瑩徹也高朗令終則又欲其高朗之極於常久而能考終命也然能善其始則斯能善其終今雖未有終既有其始此公尸所以嘉告之也所謂公尸之嘉告則四章以下皆是也朱氏公遷曰昭眀與景福相屬高朗又與令終相貫皆言福耳大抵受福之君為赫赫之命所屬是以安富尊榮身顯名著治化熈洽休祥畢至其光眀俊偉氣象自然耳朱氏善曰昭眀髙朗言其福之光大令終言其福之悠久此詩之言昭眀高朗猶天保之言單厚多益若以德言而實以福言也案既醉之詩成王嗣位坐致太平盡誠敬以事宗廟備禮文以燕父兄故頌其德而祝之曰介爾景福又進而曰介爾昭眀昭眀有融高朗令終令終有俶其㫖遠矣自漢唐宋儒者詮昭眀之義都主德以言福元眀以來始有専主福而不言德者此傳自講師之見而非定於朱子况威儀孔時是言成王之孝德也孝子不匱是言成王之孝德所孚也孰謂詩人之意不原諸君德而徒貢其錫嘏之辭也哉其告維何籩豆靜嘉叶居何反朋友攸攝攝以威儀叶牛何反集傳賦也靜嘉清潔而美也朋友指賔客助祭者説見楚茨篇劉氏瑾曰將祭之先筮其臣之吉者戒之使之助祭為祼獻之事謂之賔客謂之朋友皆尊之之辭所以重祭事也攝檢也公尸告以汝之祭祀籩豆之薦既靜嘉矣陳氏鵬飛曰傳所謂馨香而無讒慝之意也而朋友相攝佐者又皆有威儀當神意也孔氏穎達曰各自收斂以相助佐為威儀之事祭義所謂濟濟漆漆是也黄氏佐曰攝字有檢佐二義集傳前後互言之自此至終篇皆述尸告之辭集説王氏安石曰其設之也不譁而為之也至美與執爨踖踖為俎孔碩君婦莫莫為豆孔庶同意攝以威儀則其助祭也莫或敢慢與既齊既稷既匡既飭同意黄氏櫄曰籩豆所以嚴潔者固王之誠亦相祀者之敬祭不在物而在誠誠之所可見者寓於威儀之間輔氏廣曰其告維何問尸告之辭若何也籩豆之靜嘉德之寓於物也朋友之攝檢以威儀德之寓於人也祭祀之事無大於此二者人纔敬則自然收斂而相攝佐以威儀矣威儀孔時叶上止反君子有孝子叶奬里反孝子不匱求位反永錫爾類集傳賦也孝子主人之嗣子也儀禮祭祀之終有嗣舉奠劉氏瑾曰特牲祝酌酒奠於神席前祝祭告畢迎尸入至獻尸而旅酬主人嗣子入尸執前所奠觶飲之嗣子卒飲洗酌酒酢尸尸啐酒仍奠其觶匱竭類善也言汝之威儀既得其宜曹氏粹中曰祭義以為主人則其親也慤其行也趨趨以數賔客則濟濟漆漆然各致其至故威儀甚得其時也朱氏公遷曰攝以威儀助祭者之威儀也威儀孔時主祭者之威儀也又有孝子以舉奠吕氏大臨曰祭祀之終有嗣舉奠所以致其傳付祖考德澤之意深矣孝子之孝誠而不竭則宜永錫爾以善矣東萊吕氏曰君子既孝而嗣子又孝其孝可謂源源不竭矣集説李氏樗曰祭義曰小孝用力中孝用勞大孝不匱惟不匱故為大孝焉上之人盡其孝道如此故天錫之以善也黄氏櫄曰不匱云者記禮者之所謂大孝也孝之為道始焉盡之於心行之於身施之於家終焉推之於國達之於天下又安有所窮極焉故曰孝子不匱惟其孝之不匱也所以轉相教化而永錫爾類也彭氏執中曰觀其威儀孔時可以見成王之奉先孝矣固宜有孝子繼於其後永久不匱代代相傳葢天之錫君以類相從必然之理也鄒氏泉曰上章言不特君子之敬而朋友之攝佐者又敬是朋友之敬亦君子之敬也此章言不特君子之孝而嗣子之舉奠者又孝是孝子之孝亦君子之孝也其類維何室家之壼苦本反叶苦俊反君子萬年永錫祚才故反𦙍羊刃反集傳賦也壼宫中之巷也言深遠而嚴肅也祚福禄也𦙍子孫也錫之以善莫大於此集説輔氏廣曰此又問其所謂善者如何則云使爾居於深遠嚴密之宫室無有外虞厯萬年之永而長錫以福禄與子孫也劉氏瑾曰此述尸告以錫善之意由其儀物之盛美故錫之以祚由其嗣子之盡孝故錫之以𦙍葢亦各以其類為報如楚茨工祝致告之意也朱氏公遷曰下章被禄景命即祚也從以孫子之賢即𦙍也永錫祚𦙍則以世繼世而福無窮矣其𦙍維何天被皮寄反爾禄君子萬年景命有僕集傳賦也僕附也王氏安石曰屬也言將使爾有子孫者先當使爾被天禄而為天命之所附屬下章乃言子孫之事集説孔氏穎達曰此但乘其句末而轉之故云其𦙍維何不言其祚耳其實天被爾禄景命有僕即祚也劉氏瑾曰上章言錫善而兼舉祚𦙍此章述尸告錫祚之事而必發之以其𦙍維何下章述尸告錫𦙍之事而必發之以其僕維何葢錫以𦙍者必錫以祚得其祚者必得其𦙍反覆互言以見二者相因而兼備也錢氏天錫曰萬年景命已屬子孫而子孫之有祚正君子之福故仍歸重君子永命上其僕維何釐力之反爾女士鉏里反釐爾女士從以孫子叶奬里反集傳賦也釐予音與也女士女之有士行者謂生淑媛音院使為之妃音配也從隨也謂又生賢子孫也集説蘇氏轍日天之所以屬之者予之以女子而有君子之行者也予之以女士而其子孫無不賢者矣輔氏廣曰以賢女為妃又隨之而生賢子孫焉所謂天命之附屬者莫大於此觀周家自大王大姜以來之事則可見矣總論陳氏櫟曰介爾昭眀君子之賢眀也從以孫子後嗣之賢眀也由君子之有孝子故世世予以女士而生孫子國家千萬世無窮之福其基本實在於此父兄之意逺矣朱氏善曰籩豆靜嘉孝誠之著於物也朋友攸攝孝誠之寓於人也孝子不匱孝誠之傳於後嗣也室家之壺孝誠之形於内助也錫爾以祚所以厚其身也錫爾以𦙍所以昌厥後也釐爾女士則室家之深遠而嚴肅者非止於一世從以孫子則嗣子之孝誠而不竭者非止於一人也此皆述所告之詞也既醉八章章四句集説李氏樗曰先儒以此詩備五福君子萬年夀也天被爾禄富也室家之壼康寧也昭眀有融攸好徳也高朗令終景命有僕考終命也以某觀之非特五福也方且至於子孫緜緜延延似續而不絶豈特五福而已哉朱子詩傳遺説潘時舉説既醉詩以為古人祝頌多以夀考及子孫衆多為言如華封祝堯以為願聖人夀願聖人多男子亦是此意曰此兩事孰有大於此者乎對曰觀行葦及既醉二詩見古之人君盡其誠敬於祭祀之時極其恩義於燕飲之際凡父兄耆老所以祝望之者如此則其獲福也宜矣此所謂禍福無不自己求之者也先生頷之鳧音扶鷖於雞反在涇公尸來燕來寧爾酒既清爾殽既馨公尸燕飲福禄來成集傳興也鳧水鳥如鴨者陸氏璣曰青色卑脚短喙水鳥之謹愿者也鷖鷗也陸氏佃曰鷖鳧屬鳧好没鷖好浮故鷖一名漚涇水名爾自歌工而指主人也馨香之遠聞也此祭之眀日繹而賔尸之樂爾雅釋天祭名繹又祭也周曰繹商曰肜夏曰復胙郭氏璞曰祭之眀日尋繹復祭邢氏昺曰詩頌絲衣序云繹賔尸言繹者是此祭之名賔尸是此祭之事也朱子曰古者宗廟之祭有尸既祭之眀日則煖其祭食以燕為尸之人故有此詩故言鳧鷖則在涇矣公尸則來燕來寧矣嚴氏粲曰水鳥在水中得其所喻公尸來燕而安寧也酒清殽馨則公尸燕飲而福禄來成矣集説輔氏廣曰賔尸者以賔禮燕尸也此乃繹祭燕尸之樂歌故不及其他但重疊言之以極其尊敬頌禱之誠耳來如董子所謂福禄自來之來成就也言福禄來成就乎尸也徐氏常吉曰案楚􅗔鼓鐘送尸神保聿歸則祭畢之燕尸不與也尸何以不與以其象神故不敢留而轉為次日之燕也燕於次日所以尊尸也尊尸所以尊神也徐氏鳯彩曰公尸於廟中必有踧然不安者今釋為尸之勞而享為賔之逸為安其禮而來寧也惟酒與殽即前灌將燔炙之餘來成祖考以福禄成就之即於燕欽閒卜之也附録孔氏穎達曰毛以為成王之時天下太平萬物衆多莫不得所其鳧鷖之鳥在於涇水之中得其處也既天下太平成王祭宗廟之神以其眀日繹而燕尸此時公尸之來與王燕也其來心則安寧不以已實臣之故而不安由王誠心敬之故也其燕之時爾王之酒既清潔矣爾王之殽既馨香矣乃用之以與公尸燕樂而飲之則為神所悦以此致福禄而來成汝孝子是為神所安樂之也鳧鷖在沙叶桑何反公尸來燕來宜叶牛何反爾酒既多爾殽既嘉叶居何反公尸燕飲福禄來為叶吾禾反集傳興也為猶助也集説毛氏萇曰沙水旁也孔氏穎達曰易需卦九三需于沙注云沙接水者説文云沙水中散石也水少則沙見故字從水少耳鄒氏泉曰宜者稱是燕也或云宜者懌其心也有惬所欲之意為訓助天休之至有扶持翼相之意附録毛氏萇曰宜宜其事也言酒品齊多而殽傋美厚為孝子也孔氏穎逹曰鳧鷖在於水傍之沙而得其所公尸之來燕也自以其來為宜其事不以臣故而自嫌言王事尸之禮備也其燕之時爾王之酒既多矣爾王之殽既善矣王用之以與公尸燕樂而飲之故致福禄來而厚為孝子也鳧鷖在渚公尸來燕來處爾酒既湑息汝反爾殽伊脯公尸燕飲福禄來下叶後五反集傳興也渚水中高地也湑酒之泲者也朱氏公遷曰泲見伐木篇集説輔氏廣曰下自上而下易辭也附録孔氏穎達曰鳧鷖來在水中之者得其常處公尸之來燕也其來似若止得其處其燕之時爾王之酒既湑然而泲之爾王之殽維是脯矣王用此酒脯與公尸燕樂而飲之為神所饗福禄來下而與之鳧鷖在潨在公反公尸來燕來宗既燕于宗福禄攸降叶乎攻反公尸燕飲福禄來崇集傳興也潨水㑹也許氏愼曰小水入大水也來宗之宗尊也于宗之宗廟也劉氏瑾曰二宗字虚實不同崇積而髙大也集説黄氏佐曰宗訓尊為主人所賔而居尊位也既燕指祭而在廟言所謂以妥以侑是也燕飲指繹而在寢言所謂酒清殽馨是也向也敬之如神眀福固髙大矣今也待以殊遇有隆無替其視前日之福寜不積之而益髙以大乎附録孔氏穎達曰鳧鷖在於水之㑹得其常處公尸之來燕也其來有尊敬孝子之心既來與王燕於宗廟則福禄從此尸所而下與王也於時王與公尸燕樂飲酒故致福禄而來重與王也廟以尊重稱宗廟故宗為尊也王肅云言尊敬孝子也鳧鷖在亹音門公尸來止熏熏叶睂貧反㫖酒欣欣燔炙芬芬叶豐勻反公尸燕飲無有後艱叶居銀反集傳興也亹水流峡中兩㟁如門也毛氏萇曰亹山絶水也孔氏穎達曰謂山當水路令水勢絶也熏熏和説也欣欣樂也芬芬香也集説黄氏佐曰熏熏訓和説葢燕主通情非若向者象神之嚴肅也孫氏鑛曰無有後艱可見古人兢兢戒愼意附録毛氏萇曰無有後艱言不敢多祈也孔氏穎達曰鳧鷖在山絶水之亹得其常處公尸之來止於燕坐熏熏然其又和悦而得其宜於是行㫖美之酒欣欣然歡樂薦燔炙之羞芬芬然馨香王用之以與公尸燕樂而飲之致其無復有後日之艱難孝子之意不敢多祈故變文不言福禄以見之總論朱氏公遷曰來成來為來下攸降來崇皆即今日言之凡得安樂尊榮如此者是即所謂福也無有後艱則自今以往永永無堕而福常若此矣案鳧鷖之詩漢唐宋諸儒皆定為祭之眀日繹而賔尸之樂固已但毛萇以為燕宗廟之尸鄭則以首章之在涇喻燕祭宗廟之尸二章之在沙喻燕祭四方萬物之尸三章之在渚喻燕祭天地之尸四章之在潨喻燕祭社稷山川之尸五章之在亹喻燕祭七祀之尸歐陽修破之曰鳧鷖在涇在沙謂公尸和樂如水鳥在水中及水旁得其所爾在渚在潨在亹皆水旁爾鄭氏曲為分别以譬在宗廟等處者皆臆説也斯論甚當是以朱子亦不從鄭而從毛第毛鄭遵大序以詩中爾字指成王言朱子謂歌工指主人也然詩在大雅則亦言王者矣毛鄭又以成王誠敬燕尸為神所悦故貺之福禄朱子則以公尸燕飲而受其福禄葢疑假樂是公尸之荅鳧鷖則此篇不便重言王之受釐然通考詩之全義凡言祭者皆美主祭之誠敬而獲福無歸神貺於公尸者且假樂全篇未露公尸見荅之文故朱子究疑而未敢定則毛鄭之指成王其説亦未可盡非矣鳧鷖五章章六句集説范氏處義曰既醉鳧鷖皆祭畢燕飲之詩故皆言公尸然既醉乃詩人託公尸告嘏以禱頌鳧鷖則詩人専美公尸之燕飲君臣相與燕樂善頌善禱祈國祚於萬年非天下無事朝廷晏然不能也假中庸春秋傳皆作嘉今當作嘉樂音洛君子叶音則顯顯令德宜民宜人受禄于天叶鐵因反保右音又命叶彌并反之自天申之集傳賦也嘉美也君子指王也民庶民也人在位者也虞書臯陶謨知人則哲能官人安民則恵黎民懐之申重也言王之德既宜民人而受天禄矣朱氏善曰此自其已然者言之也而天之於王猶反覆眷顧之不厭既保之右之命之而又申重之也朱氏善曰此自其無窮者言之也疑此即公尸之所以荅鳧鷖者也集説孔氏穎達曰安民官人即善德之事也天不能自治下民立君以治民治民得宜則天降之福朱子曰我有受福禄之理故天既右之又申之也董仲舒曰為政而宜於民故當受禄于天雖只是疊將来説然玩味之覺他説得自有意思輔氏廣曰顯顯是眀而可見之意令德顯然眀著民人皆宜之故天禄之也保安也右助也命命之為天子也自天申之則又眷顧無窮之意在己之德不已則在天之命無窮也嚴氏粲曰言可嘉樂者此成王也有顯顯之善德宜其在下之民謂萬姓以和也宜其在位之人謂百官以和也人民皆宜是可嘉樂以此能受福禄于天也干禄百福叶筆力反子孫千億穆穆皇皇宜君宜王不愆不忘率由舊章集傳賦也穆穆敬也皇皇美也姚氏舜牧曰穆穆皇皇皆敬德之著於容貌者君諸侯也王天子也愆過率循也舊章先王之禮樂政刑也言王者干禄而得百福季氏本曰本上文令德受禄而言故其子孫之蕃至於千億適為天子庶為諸侯朱氏道行曰君子宜民人天亦報之以宜君王之子孫無不穆穆皇皇以遵先王之法者集説朱子曰上二句是願其子孫之衆多下四句是願其子孫之賢問不愆不忘率由舊章是勿忘勿助長之意曰不必如此説不愆是不得過不忘是不得忘能如此則能率由舊章輔氏廣曰此説王者干禄而得百福然却不説其他只説其子孫之多且賢者葢福禄無盛於此也有能敬可美之德則自然宜君宜王矣不愆不忘率由舊章又是詠上兩句不過乎理不忘乎心只是敬也能敬則能遵先王之法矣嚴氏粲曰干禄言自求多福謂在我有以致之非天私於王也宜子孫之繁至於千億傳之無窮也謝氏枋得曰不愆則無聰眀亂舊章之過不忘則常有繼志述事之心威儀抑抑德音秩秩無怨無惡烏路反率由羣匹受福無疆四方之綱集傳賦也抑抑宻也秩秩有常也匹類也言有威儀聲譽之美又能無私怨惡以任衆賢季氏本曰與率由舊章相對率舊章則法祖矣率羣匹則尊賢矣是以能受無疆之福為四方之綱孔氏穎達曰言常為君王統領天下此與下章皆稱願其子孫之辭也劉氏瑾曰上章願王子孫之多且賢兼適庶而言此及下章稱願之詞則皆但言其適為天子者葢主為王言之也或曰無怨無惡不為人所怨惡也鄭氏康成曰天下皆樂仰之無有怨惡集説輔氏廣曰威儀以其見於容止者而言德音以其形於聲譽者而言容止抑抑然甚宻而無間聲譽秩秩然有常而不替其德可謂全矣能如此則自然無私怨惡矣率由舊章能循用先王之法也率由羣匹能盡用天下之賢也人君而能如此則宜其受無疆之福為四方之綱也嚴氏粲曰威儀謹密德音有常皆盛德之所著見故能無所咎怨無所憎惡推誠樂與惟循用羣臣之賢者此章與上章一體不愆不忘為率由舊章言之也無怨無惡為率由羣匹言之也朱氏公遷曰宜民宜人受禄于天是得人即是得天受福無疆四方之綱是得天所以得人天人之相因如此鄒氏泉曰威儀者德之符也抑抑則動容周旋之中禮聲譽者德之著也秩秩則内外始終之無閒密於修己公於用人則其德盛矣惟德動天惟天眷德此所以能受無疆之福也修已而密則有以為出治之本用賢而公則有以得輔治之人此所以政教兼舉而天下皆在其統括之内也何氏楷曰羣臣之才品髙下不同各循其匹而衡量之絶不以一己之私意叅預其間葢大以成大小以成小所謂建官惟賢位事惟能正自如此之綱之紀燕及朋友叶羽已反百辟卿士鉏里反媚睂備反于天子叶奨里反不解佳賣反于位民之攸墍許既反集傳賦也燕安也朋友亦謂諸臣也吕氏祖謙曰泰誓曰友邦冢君酒誥曰太史友内史友則朋友者合百辟卿士言之也解惰墍息也言人君能綱紀四方而臣下賴之以安嚴氏粲曰羣臣與國同休是安及羣臣也則百辟卿士媚而愛之維欲其不解于位而為民所安息也東萊吕氏曰君燕其臣臣媚其君此上下交而為泰之時也泰之時所憂者怠荒而已此詩所以終於不解于位民之攸塈也方嘉之又規之者葢臯陶賡歌之意也王氏逄曰書益稷臯陶賡載歌曰元首眀哉股肱良哉庶事康哉即嘉之之意又歌曰元首叢脞哉股肱惰哉萬事墮哉即規之之意民之勞逸在下而樞機在上上逸則下勞矣上勞則下逸矣不解于位乃民之所由休息也集説朱子曰此章承上章之意故上云四方之綱即繼之曰之綱之紀葢張之為綱理之為紀下面百辟卿士至於庶民皆是賴君以為綱所謂不解于位者葢欲綱常張而不弛也曹氏居貞曰上章既極其稱願之意矣此章乃又於稱願之中而寓規警焉葢人君居天下之尊而使冶效及於臣下信可稱也如或為之臣者但知己之得其安而所以愛君者不知致勉而使民生之舉安是豈所願哉此其規戒之意有黙寓焉者矣朱氏公遷曰百辟在外之諸侯也卿士在内之羣臣也不解于位即之綱之紀而不厭也於政治之大體而總之無所遺於其節目而理之無所紊則天下重任皆歸於己矣故臣下恃之以安而愛之願之惟欲君之無逸以逸其民也總論劉氏瑾曰首章之言乃一詩之大㫖二章之不愆不忘三章之威儀德音所以為顯顯令德也三章四方之綱四章之綱之紀而民之攸塈所以宜民也二章之無怨無惡率由羣匹四章燕及朋友媚于天子所以宜人也至於二章之干禄百福子孫千億三章之受福無疆者又皆所謂受禄于天而自天申之也朱氏公遷曰此詩祝其君以顯德致福禄然所謂福禄者不惟得天命於一時尤欲其子孫之賢而保治於無窮也假樂四章章六句集説輔氏廣曰自行葦至假樂四詩若如序説而不明其所用則皆奉上之諛辭耳先生云大雅為受釐陳戒之辭如此四篇其受釐之辭也歟然假樂亦有戒意故先生不敢斷然以為公尸荅鳧鷖之作但為疑辭於首章之末而又取東萊之説載於篇終也篤公劉匪居匪康廼埸音易廼疆廼積廼倉廼裹音果餱音侯糧音良于橐他洛反于囊乃郎反思輯音集用光弓矢斯張干戈戚揚爰方啓行叶户郎反集傳賦也篤厚也公劉陸氏德眀曰王肅云公號劉名也尚書傳云公爵劉名也季氏本曰公者侯國尊君之通稱劉名商以前無諱禮亦如古公之稱亶父也后稷之曽孫也事見豳風居安康寧也埸疆田畔也董氏逌曰埸疆皆田之界畔然詩云迺場廼疆當有小别疆如封疆所包者廣故王氏於信南山言疆者為之大界然則埸是小界今之小田塍也積露積也餱食糧糗也嚴氏粲曰餱乾食也糧米食也無底曰橐有底曰囊何氏楷曰橐今纏腰下者東方朔傳云奉一囊粟是乾餱盛于橐糧米盛于囊也輯和戚斧揚鉞孔氏穎達曰戚揚皆斧鉞之别名鉞大而斧小方始也舊説召康公名奭以成王将涖政當戒以民事故詠公劉之事以告之曰厚哉公劉之於民也謝氏枋得曰周人以忠厚為家法此詩六章皆曰篤公劉篤者厚之至也其在西戎不敢寧居治其田疇實其倉廩既富且強於是裹其餱糧思以輯和其民人而光顯其國家然後以其弓矢斧鉞之備爰始啟行而遷都於豳焉葢亦不出其封内也集説蘇氏轍曰后稷始封邰傳於不窋而失其官犇於戎狄之間再世不顯其孫公劉復修后稷之業始居於豳故召公稱之以教成王曹氏粹中曰于橐于囊則糧聚矣干戈戚揚則兵治矣足食足兵於是乃可以遷張氏栻曰公劉遷國已與百姓俱無不足之患也吕氏祖謙曰毛鄭以公劉居於邰而遭夏人亂辟難遷於豳且以為在邰有疆場積倉為夏人廹逐乃棄而去攷之是章意象整暇不見廹逐之事以國語史記叅之葢自不窋竄於西戎至公劉而復興疆場積倉内治既備然後裹糧治兵拓大境土而遷國於豳焉國都雖遷向之疆埸積倉固在其封内也黄氏櫄曰公劉不輕於用民也必先有以蓄民之財洽民之情而後用民之力其篤於為民之心可見矣孟子曰居者有積倉行者有裹糧然後可以爰方啟行然後可三字足以見公劉厚民之心篤公劉于胥斯原既庶既繁叶粉乾反既順廼宣而無永歎他安反陟則在巘魚輦反叶魚軒反復降在原何以舟叶之遙反之維玉及瑶音遥鞞必頂反琫必孔反容刀叶徒招反集傳賦也胥相也庶繁謂居之者衆也順安宣徧也言居之徧也無永歎得其所不思舊也巘山頂也陸氏德眀曰巘本又作甗孔氏穎達曰甗甑山状似之上大下小因以為名舟帶也鞞刀鞘音笑也琫刀上飾也何氏楷曰禮天子玉琫而珧珌諸侯璗琫而璆珌則琫字從玉而非玉名乃刀鞘受飾之處名之為琫耳容刀容飾之刀也或曰容刀如言容臭謂鞞琫之中容此刀耳朱子曰容臭如今香囊是也劉氏瑾曰臭者香物若茞蘭之屬亦以香囊之中容此香物而謂之容臭耳言公劉至豳欲相土以居而帶此劒佩以上下於山原也東萊吕氏曰以如是之佩服而親如是之勞苦斯其所以為厚於民也歟朱氏公遷曰貴而能勤所以為厚集説朱子詩傳遺説問二章説既庶既繁既順廼宣而四章方言居邑之成不知未成邑之時何以得民居之繁庶也曰公劉始於草創而人從之者已若是其盛是以居邑由是而成也輔氏廣曰既庶既繁者言民之來遷者既衆而且多也既順廼宣者言民之來居者既安而遂徧也如此則得其所而無永歎也宜矣此章前五句言相土而居以後事後五句言相土以居初時事言其後民之所以即其安者由公劉初時躬執其勞如此故也錢氏天錫曰邑居未定民情已安民安而後居可定也陟降正見上下山原之勞凡夫形勢之髙下俱要審察以觀其風氣之萃聚然後可以定都也篤公劉逝彼百泉瞻彼溥音普原廼陟南岡乃覯于京叶居良反京師之野叶上與反于時處處于時廬旅于時言言于時語語集傳賦也溥大覯見也京髙邱也師衆也京師髙邱而衆居也董氏曰所謂京師者葢起於此其後世因以所都為京師也彭氏執中曰公劉營邑於豳曰京師之野葢山川盤結風氣所萃亦一都㑹也時是也處處居室也廬寄也旅賔旅也孔氏穎達曰地官遺人治國野之道以待賔客云十里有廬廬有飲食則廬是賔客寄舎其中也直言曰言論難曰語此章言營度邑居也自下觀之則往百泉嚴氏粲曰百泉衆水也今地理家言衆水所聚為得水也杜佑云百泉在漢為朝那縣屬安定郡在唐為百泉縣屬平凉郡當是其地因詩百泉而得名耳而望廣原何氏楷曰李巡云土地寛博而平正曰原溥原即豳地以其地形廣平則曰原狀其大則曰溥非先有此地名也自上觀之則陟南罔而覯于京于是為之居室于是廬其賔旅于是言其所言于是語其所語無不于斯焉集説鄭氏康成曰厚乎公劉之相此原地也往之彼百泉之閒視其廣原可居之處乃升其南山之脊乃見其可居者于京謂可營立都邑之處京地乃衆民所宜居之野也于是安民館客施教令也蘇氏轍曰公劉之營京邑也自下自上觀之審其可處矣則經畫以定之曰此可以居民此可以廬賔旅此可以施教令此可以議政事葢自遷豳至此而始有朝廷邑居之正焉輔氏廣曰既即流水之㑹以觀則見其廣原之所在又登在南之岡以望而復見其髙邱之所在於是即其衆居之野而為居室焉既宜地利又順民心也鄒氏泉曰廣原在百泉之側瞻溥原而必逝百泉者葢原惟廣必周流而後可以徧覽之髙邱在南岡之下覯于京而必陟南岡者葢京惟髙必登其尤髙者而後可以逺視之下觀者觀其包絡之形方面之正也上觀者觀其横峙之形向背之宜也篤公劉于京斯依叶於豈反蹌蹌七羊反濟濟子禮反俾筵俾几既登乃依同上乃造七到反其曹執豕于牢酌之用匏歩交反食音嗣之飲於鴆反之君之宗之就用之字為韻集傳賦也依安也孔氏穎達曰上京師之野于時處處謂衆民處處此言于京斯依則是公家之事公劉之居此京依而築宫室蹌蹌濟濟羣臣有威儀貌曲禮注濟濟修飭齊一之貌蹌蹌翔舉舒揚之貌俾使也使人為之設筵几也登登筵也依依几也曹羣牧之處也以豕為殽用匏為爵儉以質也宗尊也主也嫡子孫主祭祀而族人尊之以為主也李氏樗曰周禮宗子有五大宗子一小宗子四别子為祖繼别為宗百世不遷者大宗也繼禰之宗繼祖之宗繼曽祖之宗繼髙祖之宗五世則遷者小宗也皆所以主祭祀而統族人如有國有家之重者也此章言宫室既成而落之許氏謙曰宫室成而祭之曰落左氏傳願與諸侯落之既以飲食勞其羣臣而又為之君為之宗焉徐氏鳯彩曰自其長國人而言則公劉為之君自其主族人而言則公劉為之宗見同異姓咸在也東萊吕氏曰既饗燕而定經制以整屬其民上則皆統於君下則各統於宗葢古者建國立宗其事相須楚執戎蠻子而致邑立宗以誘其遺民哀公四年左傳注楚復詐為蠻子作邑立其宗主即其事也集説鄭氏康成曰宗尊也公劉雖去邰國来遷羣臣從而君之尊之猶在邰也孔氏穎達曰毛以為厚乎公劉之為君也既為邑於京地於此依之而築宫室宫室既成則饗燕羣臣其来君所公劉則使人為之設筵設几賔来就燕既登席矣乃依几矣公劉乃使人造羣牧執豕以為殽其飲此酒酌之用匏言其新為邦國儉而禮合也又説公劉己身與之為君與之為大宗也言公劉之厚於羣臣如此饗禮當烹太牢以飲賔此唯用豕者秋官掌客曰凡禮賔客國新殺禮公劉新至豳地殺禮也此章言羣臣之愛敬上下之有禮無饗燕尊賔之事且饗之禮設几而不倚何有賔已登席依几之義又國君不統宗故有大宗小宗安得為之君復為之大宗乎箋説為長朱子語類問君之宗之曰東萊以為為之立君立宗恐未必是如此只是公劉白為君宗耳蓋此章言其一時燕饗恐未説及立宗事也朱氏公遷曰宗字之義朱傳吕説各是一意但此方為燕飲言之則朱子之説為切篤公劉既溥既長既景廼岡相息亮反其隂陽觀其流泉其軍三單音丹叶多涓反度待洛反其隰原徹田為糧度同上其夕陽豳居允荒集傳賦也溥廣也言其芟夷墾辟土地既廣而且長也景考日景以正四方也孔氏穎達曰民居田畆或南或東皆須正其方面故以日影定之岡登髙以望也相視也隂陽向背寒暖之宜也孔氏穎達曰山南為陽山北為隂但廣谷大川有寒有暖寒暖不同所宜則異故相之也何氏楷曰使種植各適土之宜如黍宜髙燥稌宜下濕之類流泉水泉灌溉之利也何氏楷曰使灌溉各盡水之利如水東畝南水南畝東之類三單未詳徹通也一井之田九百畝八家皆私百畝同養公田耕則通力而作收則計畝而分也周之徹法自此始其後周公葢因而修之耳山西曰夕陽允信荒大也此言辨土宜以授所徙之民定其軍賦與其税法又度山西之田以廣之曹氏粹中曰豳在梁山之西其東葢廹於山乃復自西而度之以益其封域而豳人之居於此益大矣集説鄭氏康成曰公劉居豳既廣其地之東西又長其南北既以日景定其經界於山之脊觀相其隂陽寒煖所宜流泉浸潤所及皆為利民富國邰后稷上公之封大國之制三軍以其餘卒為羨今公劉遷於豳民始從之丁夫適滿三軍之數單者無羡卒也度其隰與原田之多少徹之使出税以為國用什一而税謂之徹夕陽者豳之所處也度其廣輪豳之所處信寛大也孔氏穎達曰地官小司徒云凡起徒役無過家一人以其餘為羡羡謂家之副丁也今言其軍三單則是單而無副故稱單也徹乃周之税法公劉夏時諸侯而言徹者以其俱是什一其名可以相通也大國三軍亦是周制而謂公劉之時已作三軍者以三代損益事多相因甘誓云乃召六卿是夏時天子六軍之将方命卿其法與周同也於時大國亦立三卿則知亦作三軍而周制因之耳范氏處義曰立大國三軍之制以治兵為徹田什一之法以儲糧言三單則是單而無副然立國之初以周官軍數言之三軍已三萬七千五百人不為少矣凡周家軍制徹法葢皆始於此也案其軍三單毛傳以為三單相襲也王肅述之云三單相襲止居則婦女在内老弱次之強壯在外言自有備也孔疏謂此言在道時未得安居慮有寇鈔故三重為軍以備禦之然此詩二章已言至豳不應三章方説在道既至豳之日無所用兵三單相襲復何禦哉則疏家已覺傳義未安矣至鄭康成據大國三軍之制則宋儒皆從之惟朱子以為三單未詳然亦未聞以鄭説為非且總注云定軍賦與税法既依鄭以税法為即周之徹法則軍賦之定舎周禮奚從耶故存鄭箋於正説不竟闕而勿論也篤公劉于豳斯館叶古玩反渉渭為亂取厲取鍜丁亂反止基廼理爰衆爰有叶羽已反夾其皇㵎遡其過古禾反㵎止旅廼密芮鞫居六反之即集傳賦也館客舍也亂舟之截流横渡者也孔氏穎達曰禮有公館私館所以止舍其中也水以流為順横渡則截其流故為亂厲砥鍛鐵止居基定也理疆理也衆人多也有財足也遡郷也皇過二㵎名芮水名出吴山西北東入涇周禮職方作汭周禮夏官職方氏雍州其川涇汭注汭在豳地鞫水外也此章又總叙其始終言其始来未定居之時涉渭取材而為舟以来往取厲取鍜而成宫室孔氏穎達曰取其厲石鍜具所以鍜礪斧斤伐取材木乃為宫室言其豫事省功也王氏應麟曰史記公劉自漆沮渡渭取材用既止基於此矣乃疆理其田野則日益繁庶富足其居有夾㵎者有遡㵎者孔氏穎達曰夾者在其兩旁遡者開門嚮之王肅云或夾或嚮所以利民也其止居之衆日以益密乃復即芮鞫而居之而豳地日以廣矣集説吕氏祖謙曰風氣日開民編日衆規模日廣有方興未艾之象焉周之王業既兆於此矣朱氏善曰于豳斯館為客舍以居也渉渭為亂為方舟以濟也取厲為斤斧之用不可以無砥也取鍛為宫室之噐不可以無鐵也止基言其居室之初定也廼理言其田疇之初治也衆者人之多即止基之驗也有者財之足即廼理之效也夾㵎遡㵎止居益密復即芮鞫而居之要其終之盛而言也總論王氏安石曰周之有公劉言乎其時則甚微言乎其事則甚勤稱時之甚微以戒其盈稱事之甚勤以懲其逸葢召公之志也陳氏際泰曰太王之遷也以迫逐公劉之遷非以迫逐也擇而取之也富庶之後而遷都故其後遂大古者之建國也相其隂陽之和嘗其水泉之甘審其土地之宜觀其草木之饒然後營邑立城制里割宅夫定軍賦也取厲鍜也為政有三取材有五誰能去之公劉始遷之時即治及此有備也夫公劉六章章十句集説孔氏穎達曰此與泂酌巻阿俱是召公所作厚民之事人君之急務故先作公劉非有道德則不能愛民故又作泂酌欲王之修德行道也君雖有德不能獨治又作卷阿戒王使求賢用士也陳氏鵬飛曰公劉之詩相類七月之詩七月言先公之風化而公劉則言建國君民之事風雅之不同如此泂音迥酌彼行潦音老挹音揖彼注兹可以餴甫云反饎尺志反叶昌里反豈弟君子民之父母叶滿彼反集傳興也泂遠也行潦流潦也孔氏穎達曰行道上雨水流聚故云流潦也餴烝米一熟而以水沃之乃再烝也饎酒食也君子指王也舊説以為召康公戒成王言遠酌彼行潦挹之於彼而注之於此孔氏穎達曰彼器挹之而注於此器葢以潦水之濁置之大器以澄之挹小器而用之所以轉經二噐也尚可以餴饎蘇氏轍曰言物無不可用也况豈弟之君子豈不為民之父母乎傳曰豈以強如字又上聲教之弟以悦安之民皆有父之尊有母之親朱氏公遷曰此引表記語兼釋豈弟之義又曰民之所好好之民之所惡惡之此之謂民之父母朱氏公遷曰此引大學語専釋父母之義集説輔氏廣曰每章上三句有逺近相須彼此相益貴賤相資之意故以興下兩句豈以強教之故有父之尊弟以悦安之故有母之親此以成民之才而言也民之所好好之民之所惡惡之此以體民之心而言也既有以成其才又有以體其心則能盡教育之道矣此其所以為民之父母也朱氏公遷曰此以小物之功用興大德之功用明人君不可無豈弟之德也夫以文王之盛德至極無加乃得稱為豈弟召公以此期之成王則其戒君之意逺矣吕氏柟曰行潦餴饎汚潔不同也然挹彼注兹汚者亦可潔用之君子與民上下殊分也然豈弟以近之則為民之父母矣泂酌彼行潦挹彼注兹可以濯罍音雷豈弟君子民之攸歸叶古囘反集傳興也濯滌也孔氏穎達曰説文云滌洗也濯浣也則滌濯俱是洗浣之名集説張子曰皇天親有德饗有道民之攸歸之類也何氏楷曰罍者貴器可以濯罍言其可以貴用之也君子以豈弟為德於天下之人教之則無類立之則無方宜其為民之所歸心也泂酌彼行潦挹彼注兹可以濯溉古愛反叶古氣反豈弟君子民之攸塈許既反集傳興也溉亦滌也孔氏穎達曰傳云溉清也謂洗之使清潔也塈息也集説輔氏廣曰攸歸為民所歸往攸塈為民所安息皆所以終首章父母之義也徐氏鳯彩曰可以濯溉則無物不濯又不止一罍而已以物潔滌而可用興君子和易而民安總論鄒氏泉曰此詩見民之休戚在下而其機則係於上詞雖褎美而意則實以勸戒之召公之善於告君如此厥後成王祇勤於德夙夜以綏兆民而六服羣辟罔不承德葢深有得於召公之訓者泂酌三章章五句有卷音權者阿與歌叶飄風自南叶尼心反豈弟君子來游來歌與阿叶以矢其音集傳賦也卷曲也阿大陵也豈弟君子指王也曹氏粹中曰豈弟君子樂於循理而以平易近民人君之德也故詩人羙人君之德必以豈弟稱之矢陳也此詩舊説亦召康公作疑公從成王游歌於卷阿之上因王之歌而作此以為戒此章總叙以發端也集説輔氏廣曰此是賦體皆言其實有卷者阿言其地也飄風自南言其時也豈弟君子來游來歌以矢其音言其事也朱氏善曰太和盛治之時以三光則得其眀以四時則得其序以庶類則得其所是誠可樂也然天地盈虚與時消息而謂盛可保其常不衰乎此其所可慮也夫惟慮之於極盛之時此有虞所以有臯陶之𢋫歌有周所以有召公之矢音也王氏逄曰地勢美而天氣和則君心悦而臣言入矣葢見成王當此之際其胷次直與天地同流所以召公繼其詠歌而以規戒之言進之也附録毛氏萇曰興也巻曲也飄風囘風也鄭氏康成曰大陵曰阿有大陵卷然而曲廻風從長養之方来入之喻王當屈體以待賢者王氏安石曰有巻者阿則虚中屈體之大陵飄風自南則化養萬物之迴風不虚中則風無自而入不屈體則風無自而留其為陵也不大則其化養也不博王之求賢則亦如此而已吕氏祖謙曰此章具賦比興三義其作詩之由當從朱氏其因巻阿飄風而發興當從毛氏以卷阿飄風而興求賢因以虚中屈體化養萬物為比則當如鄭氏王氏之説也三説相須其義始備案巻阿首章毛以為興鄭王以為比朱子以為賦吕以為三説相須其義始備然詩言豈弟君子毛鄭俱作賢人看故比興可通朱子作成王看則比興無所取故疑召公從王游於卷阿之上而為賦也毛鄭之於此章詩義似紆曲不若朱傳為直㨗矣伴音判奐音喚爾游矣優游爾休矣豈弟君子俾爾彌爾性似先公酋在由反矣集傳賦也伴奐優游閑暇之意鄒氏泉曰伴奐有精神舒展之意優游有啟居自適之意爾君子皆指王也彌終也性猶命也酋終也言爾既伴奐優游矣又呼而告之言使爾終其夀命似先君善始而善終也朱氏公遷曰言先公則先王在其中故傳以先君代先公字自此至第四章皆極言夀考福禄之盛以廣王心而歆動之五章以後乃告以所以致此之由也集説輔氏廣曰伴奐爾游矣言成王當此閑暇而来游於此也優游爾休矣言成王於此優游而自得其休也豈弟君子呼成王以為樂易君子也觀成王閑暇優游於此則其樂易可知矣俾爾彌爾性謂終其夀考似先公酋矣謂如周之先公以来善始善終也於此見召公得保傅之體不過稱不溢美之意朱氏善曰當閑暇之時享和平之福此其已然者也又當使爾終其夀命以保之於無窮周之先公皆能享夀考福禄之盛成王以持盈守成之主而欲似先公之善始善終則所以致此者必自有其道矣此所以廣王心而歆動之也姚氏舜牧曰天保三俾爾是天所賦畀此三俾爾是人所注望皆忠臣望君之辭附録王氏安石曰彌者充而成之使無閒之謂也董氏逌曰能充其性則能似其先君矣吕氏祖謙曰自此章以下皆召公陳其詠歌之辭也國家閑暇君臣游衍可謂伴奐而優游矣所願乎成王者惟充其性似先公之克終而已俾爾者祝辭也彌爾性者祝其進益成就至於無虧闕之地也似先公者召公周之尊老故其祝成王遠本先公不忘舊也祝之所以戒之也案俾爾彌爾性毛鄭以為終女之性命朱子從之作夀考上講宋元諸儒以性之義廣未可以命該之故從德性上詮觧者居多其理亦通爾土宇昄符版反章亦孔之厚叶狠口下主二反矣豈弟君子俾爾彌爾性百神爾主叶當口腫庾二反矣集傳賦也昄章大眀也或曰昄當作版版章猶版圖也梁氏益曰周禮秋官司民掌登萬民之數自生齒以上皆書於版鄭氏注版今户籍也夏官職方氏掌天下之圖以掌天下之地注云如今司空輿地圖也言爾土宇昄章既甚厚矣又使爾終其身常為天地山川鬼神之主也孔氏穎達曰祭法云有天下者祭百神則為天子者固自為百神主矣集説張氏耒曰治天下者雖無事於恢大幸而治得於内則土宇廣於外葢人歸者衆則各以其地附之矣非侵伐攻取而得之也朱氏善曰王者之都雖止乎千里之遠而其封域則極乎四海之廣昄者大也言其無不包也章者眀也言其無不治也厚者如地勢之重厚言其無不承載也郊焉而祭天社焉而祭地所以為天地之主也望焉而祭山川所以為山川之主也廟焉而祭人鬼所以為人鬼之主也爾受命長矣茀芳弗反禄爾康矣豈弟君子俾爾彌爾性純嘏爾常矣集傳賦也茀嘏皆福也曹氏粹中曰草多謂之茀茀禄言得福之蕃茂也常常享之也集説吕氏祖謙曰自二章至此章皆歎美祝戒之辭雖未及於求賢然成王所以彌爾性而似先公主百神而常純嘏者果何以致之乎其意葢在其中矣姚氏舜牧曰周自文武受命以至今而太平無事極一時之盛故稱受命長而茀禄康純嘏即上文之受命茀禄也爾常者常膺此無窮之厯服常享此太平之茀禄也有馮符冰反有翼有孝有德以引以翼豈弟君子四方為則集傳賦也馮謂可為依者翼謂可為輔者孝謂能事親者德謂得於己者引導其前也翼相其左右也東萊吕氏曰賢者之行非一端必曰有孝有德何也葢人主常與慈祥篤實之人處謝氏枋得曰不求非常之才而止曰孝德何也葢孝於親者必忠於君唐虞以上無才德之分如臯陶九德皆才也舜舉元凱之才皆德也朱氏公遷曰慈祥以孝言篤實以德言朱子以馮翼孝德為四臣吕氏即以孝德之人為可馮翼者其所以興起善端涵養德性鎮其躁而消其邪日改月化有不在言語之閒者矣言得賢以自輔如此則其德日修而四方以為則矣自此章以下乃言所以致上章福禄之由也集説輔氏廣曰以引以翼引如引君以當道之引翼如予欲有為汝翼之翼吕氏所謂慈祥者能孝之人也所謂篤實者有德之人也得如是之人以引翼之則王德無愆王德無愆則四方以為法則四方以為法則則可以居大位而無忝受天禄而無窮矣季氏本曰馮翼以賢臣之適於用者言孝德以賢臣之本於心者言人君能致賢臣以為引翼則惟以德自将而無為民化故曰四方為則鄒氏泉曰享福之道必由於有德而有德之助必在於得賢馮翼孝德已用之賢非無是人而作詩之意則主未用者言馮者忠諒可託心膂翼者才猷可任股肱孝者順德善事親則有移忠之心德者行道有得於己則具正物之學以之引導而不昧於所適以之輔翼而不怠於所行則其德日修矣顒顒卬卬如圭如璋令聞音問令望叶無方反豈弟君子四方為綱集傳賦也顒顒魚容反卬卬五岡反尊嚴也如圭如璋純潔也令聞善譽也令望威儀可望法也蘇氏轍曰逺之則有令聞近之則有令望承上章言得馮翼孝德之助則能如此而四方以為綱矣集説輔氏廣曰此章乃足上章之義顒顒卬卬體貌之尊嚴也如圭如璋德行之溫純也令聞聲譽之美也令望表儀之善也夫如是然後為人君之全德非得賢而引翼之何以臻此四方為綱四方以為綱領也朱氏公遷曰綱者衆紀之所繫天下歸於一人猶衆紀屬於一綱耳顧氏起元曰為則有師道意為綱有君道意鳳凰于飛翽翽呼㑹反其羽亦集爰止藹藹王多吉士鉏里反維君子使媚于天子集傳興也鳳凰靈鳥也雄曰鳳雌曰凰孔氏穎達曰天老曰鳳象麟前鹿後蛇頸魚尾龍文龜背燕頷雞喙五色備舉出於東方君子之國見則天下大安寧翽翽羽聲也鄭氏以為因時鳳凰至故以為喻理或然也蔡氏沈曰是時周方隆盛鳴鳯在郊鳴于髙岡者乃詠其實也藹藹衆多也媚順愛也鳳凰于飛則翽翽其羽而集於其所止矣藹藹王多吉士則維王之所使而皆媚于天子矣既曰君子又曰天子猶曰王于出征以佐天子云爾集説吕氏祖謙曰自此以下廣言人材之盛也亦集爰止言其萃聚也劉氏濟曰鳯隠見以時類君子之出處朱氏公遷曰禽鳥之性必欲得所止賢士之心必欲致於用苟得見用則随所使令而皆輸其媚愛于天子矣鳳凰于飛翽翽其羽亦傅音附于天叶鐵因反藹藹王多吉人維君子命叶彌并反媚于庶人集傳興也媚于庶人順愛于民也謝氏枋得曰媚于天子愛君也媚于庶人為王愛其民也集説輔氏廣曰上二章乃因時鳳凰之至而以興賢者之來集也維君子使維君子命謂委質於君一聼其使令也媚于天子則見賢者無勉強不得已之意媚于庶人則見賢者有維持浹洽之德後世多以鳳比賢人葢本於此姚氏舜牧曰吉人吉士總是馮翼孝德之人在朝曰士在外曰人耳王氏志長曰亦集爰止由野而升朝也始進也亦傳于天由庶僚而躋師保也媚于庶人所以為媚于天子舎安民而外寧復有所謂熙帝載者乎鳳凰鳴矣于彼髙岡梧桐生矣于彼朝陽菶菶布孔反萋萋七西反雝雝喈喈叶居奚反集傳比也陳氏鵬飛曰比賢者必聚於有道之朝朱氏善曰鳳凰者賢才之喻髙岡者朝廷之喻梧桐者賢君之喻朝陽者眀時之喻又以興下章之事也徐氏鳳彩曰以梧桐生之盛而後鳯凰鳴之和興下章聖君有待賢之禮而後賢才有效用之忠山之東曰朝陽孫氏炎曰朝先見日也孔氏穎達曰早見日陽被温仁之氣鳯凰之性非梧桐不棲陸氏佃曰梧一名櫬即梧桐也今人以其皮青號曰青桐非竹實不食菶菶萋萋梧桐生之盛也雝雝喈喈鳯凰鳴之和也集説劉氏彞曰萬物之理類之所感有不召而自應惟其梧桐菶菶萋萋是以鳯凰雝雝喈喈非類之自應不期然而然耶由此觀之則君臣感㑹之機可想矣朱氏公遷曰髙岡非潛伏之地朝陽為眀盛之處賢者出潛離隠而逄致治之時也其相遇之盛既如此必君盡其禮猶菶萋然則臣得展其所藴猶雝喈然其相與之盛當如此今而賢者集於王朝矣而禮意之隆則有望於成王也君子之車既庶且多君子之馬既閑且馳叶唐何反矢詩不多維以遂歌集傳賦也承上章之興也菶菶萋萋則雝雝喈喈矣君子之車馬則既衆多而閑習矣其意若曰是亦足以待天下之賢者而不厭其多矣遂歌葢繼王之聲而遂歌之猶書所謂賡載歌也蔡氏沈曰賡續載成也續帝歌以成其義也集説吕氏祖謙曰髙岡顯地也梧桐嘉木也鳳凰棲鳴其間可謂得其所矣故極言菶萋之盛雝喈之樂以形容之今王之車馬既多且閑苟得衆賢載之其光華和樂殆非形容所及也有其時有其具召公所以欲成王勉乎此也輔氏廣曰車馬衆多而閑習則足以為招來待遇賢者之具矣其所以望於王葢有不待言而可知者詩所以言其志而音則聲之成文者其實一也先言以矢其音即其歌而言之也終言矢詩不多即其實而言之也王氏日休曰此詩非不多也召公以為不多者愛君之心無已也總論范氏處義曰召公進戒曰求賢足矣必曰吉士吉人何也周公作立政以告成王亦曰其勿以憸人其惟吉士葢憸利之人常近於薄吉善之士常近於厚使人主於用人之際必求吉善之士而信任之雖其天資靜重不求赫赫之名誠足以夀風俗之脈為國家之福也朱子曰召康公戒成王其始只説箇好意思如豈弟君子皆指成王純嘏爾常之類皆説優游享福之事至有馮有翼以下方説用賢大抵告人之法亦當如此須先令人歆羡此事則其肯從吾言必樂為之矣時舉説卷阿詩畢以為詩中凡稱頌人君之夀考福禄者必歸於得人之盛故既醉云君子萬年介爾景福而必曰朋友攸攝攝以威儀假樂言受天之禄與干禄百福而必曰率由羣匹與百辟卿士媚于天子葢人君所以致福禄者未有不自得人始也先生頷之卷阿十章六章章五句四章章六句集説嚴氏粲曰康公三詩皆作於成王将涖政之初公劉泂酌皆直述之辭惟卷阿宛轉反覆使人再三歌詠而後悟葢其深意所寓實在此篇也民亦勞止汔許乙反可小康恵此中國以綏四方無縱詭居毁反隨以謹無良式遏寇虐憯七感反不畏眀叶謨郎反柔遠能邇以定我王集傳賦也汔㡬音祈也中國京師也四方諸夏也京師諸夏之根本也詭隨不顧是非而妄隨人也嚴氏粲曰詭詐也懐詐面從也謹斂束之意憯曽也眀天之眀命也朱氏公遷曰憯不畏眀言不畏正理而無忌憚也柔安也能順習也蔡氏沈曰柔者寛而撫之也能者擾而習之也逺近之勢如此序説以此為召穆公刺厲王之詩以今考之乃同列相戒之辭耳未必専為刺王而發然其憂時感事之意亦可見矣蘇氏曰人未有無故而妄從人者維無良之人将悦其君而竊其權以為寇虐則為之朱氏善曰非詭隨無以媚上而為寇虐之本非宼虐無以威下而遂詭隨之志詭隨者柔惡之所為寇虐者剛惡之所發故無縱詭隨則無良之人肅而寇虐無畏之人止沈氏守正曰無縱謂眀以燭之斷以絶之也然後柔遠能邇而王室定矣穆公名虎康公之後厲王名胡成王七世孫也集説輔氏廣曰同列之君子相戒無縱詭隨則無良之人不敢肆而寇虐無忌憚之人亦且消沮退縮而無所容如是然後逺者自然得其安近者亦自然順習而無所乖忤而王室定矣濮氏一之曰每章首言民今勞弊可少休息京師者諸夏之本欲安四方之民當自恤京師始嚴氏粲曰穆公戒同列之用事者言國以民為本民勞則國危今周民亦疲勞矣庶㡬可以小安之乎京師諸夏之根本愛此京師則可以安天下也詭隨者心知其非而詐順從之此姦人也人見詭隨者無所傷拂則目為喜良不知其容悦取寵皆為自利之計而非忠於所事實非善良之士也苟喜其甘言而信用之足以召禍亂致宼虐但權位尊重者往往樂軟熟而憚正直故詭隨之人得肆其忘是居上位者縱之為患也今戒用事者無縱此詭隨則可以謹防無良之人用遏止其寇虐此理眀甚可痛其不畏眀也治道略外而詳内惟柔逺能邇者可以安吾君而何取於詭隨乎彭氏執中曰先言恵中國以綏四方此出治之序也後言柔逺能邇此成冶之效也書言柔逺能邇而必曰難任人詩言柔逺能邇而必曰謹無良皆有常戒懼之意民亦勞止汔可小休恵此中國以為民逑無縱詭隨以謹惽怓女交反叶尼猶反式遏宼虐無俾民憂無棄爾勞以為王休集傳賦也逑聚也惽怓猶讙譁也朱氏公遷曰讙譁即巧言利口之徒勞猶功也言無棄爾之前功也朱氏善曰勉之以修職業之詞休美也唐氏汝諤曰小休之休以民之休息言王休之休以王之休美言二休字異義集説輔氏廣曰以為民逑者葢中國者民之所聚也讙譁乃詭隨者之態也上有寇虐之臣則下有憂苦之夫矣無棄爾勞者葢同列平時相與為國家慮者固已有定説矣嚴氏粲曰無縱詭隨之人以防其惽怓惑亂主聽也爾前有功於國今勿棄其前功則為吾君之美謂使其君安富尊榮也不然敗君之事矣鄒氏泉曰逑聚也聚其渙散之心而一之也王以安民為休逺小人以安民則民聚而中國恵享天下治安之美所以成王者之休也沈氏守正曰當時非眞有除奸之成勞曰無棄爾勞者重其責故往来善詞以誘進之也何氏楷曰獨言中國者上章標天下之大勢發論此章則専主修内治而言民亦勞止汔可小息恵此京師以綏四國叶于逼反無縱詭隨以謹罔極式遏寇虐無俾作慝吐得反敬愼威儀以近有德集傳賦也罔極為惡無窮極之人也有德有德之人也集説輔氏廣曰罔極亦是詭隨者之證以妄隨人則為惡豈有窮極也無縱詭隨式遏寇虐是防禁小人也敬愼威儀以近有德是親近賢者也徒欲防禁小人而不知親近有德則無以増益其知識開廣其心志矣然欲近賢者則須先謹其威儀威儀不謹則賢者将望望然去之矣豈可得而親之乎嚴氏粲曰非修身則賢不可得而親故必敬愼威儀然後可以近有德謝氏枋得曰威儀所以定命也有德之士未有無威儀若不敬謹威儀則驕淫傲惰何所不為侮老成逺耆德則賢者不能相親矣黄氏佐曰人臣之道所以為國慮者莫大於息民之勞然昔之勞之也由於用悖德之小人而今之安之也必在於親有德之君子耳沈氏守正曰三章以所以禁奸之本告之葢我禁奸奸愈伺我君子不日親則小人終不可疎故必敬威儀近有德而後彼之窺覸消耳民亦勞止汔可小愒起例反恵此中國俾民憂泄以世反無縱詭隨以謹醜厲式遏寇虐無俾正敗叶蒲寐反戎雖小子而式𢎞大叶特計反集傳賦也愒徐氏鍇曰猶憩也息泄去孔氏穎達曰其憂寫泄而去厲惡也正敗正道敗壊也戎汝也言汝雖小子而其所為甚廣大不可不謹也集説輔氏廣曰以小子稱同列必是長老者之辭觀下篇可見以身言之則是小子以職言之則是王官故曰戎雖小子而式𢎞大嚴氏粲曰詭隨之人終必召亂是為醜厲也又戒其同列之用事者云汝雖小子而所用事甚大豈可樂佞諛而縱詭隨乎此詩戎雖小子及板詩小子蹻蹻皆戒責同寮故稱小子耳顧氏起元曰小子以年言𢎞大以所為係天下安危生民休戚言所為甚廣大則去小人以安民者不容己矣民亦勞止汔可小安恵此中國國無有殘無縱詭隨以謹繾綣式遏宼虐無俾正反王欲玉女音汝是用大諫春秋傳荀子書竝作簡音簡吴氏棫曰諫諍也毛詩式遏宼虐無俾正反王欲玉女是用大諫荀子左氏傳髙堂隆傳皆作簡古簡讀如蹇反甫臠切集傳賦也繾綣小人之固結其君者也孔氏穎達曰昭二十五年左傳繾綣從公無通外内則繾綣者牢固相著之意正反反於正也王氏安石曰正敗者敗而己未盡反而為不正也正反則無正矣彭氏執中曰正反則善惡曲直無不倒置天下其可得而正邪每章言愈切而意愈深玉寳愛之意言王欲以女為玉而寳愛之故我用王之意大諫正於女葢託為王意以相戒也輔氏廣曰既是王欲寳愛之人必其寵任者也故作詩者託為王意以戒止之集説嚴氏粲曰無良惽怓罔極醜厲繾綣皆極小人之情狀而總之以詭隨葢小人之媚君子其始皆以詭隨入之其終無所不至孔子所謂佞人殆也朱氏公遷曰戎雖小子而式𢎞大憂其任負之重王欲玉女是用大諫體其愛念之深皆所以為同列謀也總論朱子語類時舉謂每章上四句是刺厲王下六句是戒其同列曰皆只是戒其同列鋪叙如此便自可見古人非是直作一詩以刺其王只陳其政事之失自可以為戒時舉因謂第二章末謂無棄爾勞以為王休葢以為王者之休莫大於得人惟羣臣無棄其功然後可以為王之休美至第三章後二句謂敬愼威儀以近有德葢以為既能拒絶小人必須自反於己又不可以不親有德之人不然則雖欲絶去小人未必有以服其心也後二章與俾正敗無俾正反尤見詩人憂慮之深葢正敗則惟敗壊吾之正道而正反則全然反乎正矣其憂慮之意葢一章切於一章也先生頷之彭氏執中曰此詩以寛治民以嚴取友曰綏曰恵寛而不擾也曰無縱曰以謹曰式遏嚴而不怒也民勞五章章十句集説沈氏萬鈳曰卷阿主於用賢民勞主於絀不肖治亂雖異所以揆亂致治則同也上帝板板下民卒癉當簡反出話不然為猶不遠靡聖管管不實於亶猶之未遠是用大諫叶音簡集傳賦也板板反也卒盡癉病猶謀也管管無所依也孔氏穎達曰以管管與靡聖同文既無聖法故知無所依繫亶誠也序以此為凡伯鄭氏康成曰凡伯周同姓周公之𦙍也入為王卿士孔氏穎達曰春秋隠七年天王使凡伯来聘世在王朝葢畿内之國刺厲王之詩今考其意亦與前篇相類但責之益深切耳胡氏一桂曰召穆凡伯以親賢之故宜直致其諫而姑責同僚以使之聞之者豈非亦以監謗之故不欲嬰其鋒以䧟於罪而甚吾君之惡也邪吁二公忠愛之懐於此益可見矣此章首言天反其常道而使民盡病矣嚴氏粲曰凡伯不欲斥王而歸之於天而女之出言皆不合理為謀又不久遠其心以為無復聖人但恣己妄行而無所依據又不實之於誠信豈其謀之未遠而然乎世亂乃人所為而曰上帝板板者無所歸咎之詞耳集説輔氏廣曰正者常道也循其常則民安天既盡反其常道則民亦安得而不盡病話者言語也猶者謀慮也不然則背理傷道也不遠則但為目前之計也人心知有聖人則動作皆有所依據故出話不敢不然為謀不至不遠既已靡聖管管則所為皆是虚妄故曰不實於亶末言猶之未逺是用大諫者葢人無遠慮必有近憂用是而諫庶乎其知畏而能止也朱氏公遷曰既以出話為猶竝言而又以猶之不遠申結之葢謀出於心而後言出於口二者相對而謀為之主也顧氏起元曰天以安民為心反其常道故曰板此二句見天變必有人以致之正當修已囘天也而人事乃如此故因以責之天之方難叶泥涓反無然憲憲叶虚言反天之方蹶俱衛反無然泄泄以世反辭之輯音集叶徂合反矣民之洽矣辭之懌叶弋灼反矣民之莫矣集傳賦也憲憲欣欣也蹶動也泄泄猶沓沓也葢弛緩之意孟子曰事君無義進退無禮言則非先王之道者朱氏公遷曰非詆毁也猶沓沓也輯和洽合懌悦莫定也辭輯而懌則言必以先王之道矣所以民無不合無不定也集説輔氏廣曰天方艱難則人當憂懼也今乃欣欣然自以為適天方蹶動則人當斂飭也今乃弛緩而不以為事則是自絶於天矣始也不有夫聖終也自絶於天則其何以能立於人之朝哉下四句又教以先謹其言而不妄發爾辭能和則民自合爾辭能悦則民自定辭和與懌則合乎理而異於不然者矣民合且定則前所謂卒癉者其有瘳乎嚴氏粲曰首章責同寮出話不然為猶不逺故二章因戒之以言論之閒宜相和協謂爾之出話為猶徒執一已之見者未必有深長之慮而惟寮友之閒和同商議庶㡬合謀并智可以揩民於安耳錢氏天錫曰難蹶俱以天運言板蕩之天存亡决於頃刻豈易處之際故曰難天必震動命祚将轉連於他人故曰蹶凡言無然皆懲往戒来之詞輯和謂無乖戻悦懌謂無㬥厲民洽民莫便可上囘天變曰輯曰懌不過一反其不然者而即收其效非難事也我雖異事及爾同僚我即爾謀聴我囂囂許驕反我言維服勿以為笑叶思邀反先民有言詢于芻初俱反蕘如謡反集傳賦也異事不同職也同僚同為王臣也春秋傳曰同官為僚孔氏穎達曰左傳荀林父謂先蔑曰同官為寮吾嘗同寮敢不盡心乎即就也囂囂自得不肯受言之貌服事也猶曰我所言者乃今之急事也先民古之賢人也芻蕘采薪者古人尚詢及芻蕘况其僚友乎集説蘇氏轍曰告其寮之信於王者庶㡬王信之而其言易入輔氏廣曰第一第二句言其同有恩義也三四句言其不有於我也五六句冀其察也七八句欲其警也朱氏善曰我之於爾其職分雖不同而其為王臣則一故就爾而謀之将以輸其忠也而爾乃囂囂而自得我所言乃今日之急務汝其可以為笑乎古人所以詢及芻蕘者誠以淺近之言至理存焉不可以其人之賤而忽之也况於寮友之言其可忽而不聼乎天之方虐無然謔謔虚虐反老夫灌灌小子蹻蹻其略反匪我言耄莫報反叶毛博反爾用憂謔多將熇熇叶許各反不可救藥集傳賦也謔戲侮也老夫詩人自稱灌灌款款也孔氏穎達曰至誠款實而告之蹻蹻驕貌李氏樗曰説文蹻蹻舉足髙也以足髙之意觀之是驕之意耄老而昏也熇熇熾盛也蘇氏曰老者知其不可而盡其款誠以告之少者不信而驕之故曰非我老耄而妄言乃汝以憂為戲耳何氏楷曰當可憂之時而反以之為謔孟子所謂安其危而利其菑是也夫憂未至而救之猶可為也苟俟其益多則如火之盛不可復救矣集説輔氏廣曰此章責之又深矣一二句戒其不可慢天也三四句戒其不可忽已也五六句斥其病也七八句危其禍也朱氏公遷曰上章誘之使聴其言此章警懼之使不可不聼其言皆以盡其告戒之誠也朱氏善曰匪我言耄自老夫灌灌者言之也爾用憂謔自小子蹻蹻者言之也夫憂不可戲也苟以憂為謔則積之之多将如火之燎於原而不可得而樸滅矣天之方懠才細反叶箋西反無為夸苦花反毗威儀卒迷善人載尸民之方殿屎許伊反則莫我敢葵喪息浪反亂蔑資叶箋西反曽莫恵我師叶霜夷反集傳賦也懠怒夸大毗附也小人之於人不以大言夸之則以諛言毗之也尸則不言不為飲食而已者也孔氏穎達曰祭時之尸以為神象故終祭而不言王氏安石曰善人載尸畏禍故也殿屎呻吟也葵揆也蔑猶滅也資與咨同嗟歎聲也恵順師衆也戒小人毋得夸毗使威儀迷亂而善人不得有所為也又言民方愁苦呻吟而莫敢揆度其所以然者是以至於散亂滅亡而卒無能恵我師者也集説輔氏廣曰此章又言上天方怒而戒小人不可行其常態也夫大言以夸人則人或以為真能而信之諛言以毗人則人或以為愛己而親之是以威儀迷亂而不分善惡卒至於使善人反不得有所為也夫小人用事而善人不得有所為此民之所以病苦而呻吟也然君臣上下方且迷亂㬥虐無敢揆度其所以然者故雖至於喪亂滅亡而嗟歎之聲盈耳而卒無有順我衆之意者也自此而下則其所譏刺漸及於君矣朱氏公遷曰辭輯辭懌則民合而定夸大毗附則民愁苦而呻吟反覆言之以見治亂之機實在於此也季氏本曰善人不為用則民情雖急莫有以逺猶與之葵度者矣故民喪亂無以為生而卒無恩恵及於衆庶此所以不可救藥也天之牖民如壎許元反如篪音池如璋如圭如取如攜攜無曰益牖民孔易以豉反叶夷益反民之多辟匹亦反下同無自立辟集傳賦也牖開眀也程子曰牖開通之義室之暗也故設牖以通眀猶言天啟其心也何氏楷曰左傳言天牖其衷用字同此壎唱而篪和璋判而圭合孔氏穎達曰半圭為璋合二璋則成圭取求攜得而無所費劉氏瑾曰言求之即得而無費於己以益之也皆言易也辟邪也言天之開民其易如此以眀上之化下其易亦然今民既多邪辟矣豈可又自立邪辟以道之耶集説陳氏櫟曰上之於下開其本眀之天性者固甚易導之以邪辟之人偽者亦不難因開之易而謹導之方可也豈可導以邪辟耶朱氏善曰天之開民如壎篪之相和言必應也如璋圭之相合言必同也如取物之必得攜物之必從也攜而必從非别立一道以増益之也因其所固有耳牖民之道其易如此上之化下其道獨不然乎价音介人維藩叶分邅反大師維垣大邦維屏大宗維翰叶胡田反懐德維寧宗子維城無俾城壊叶胡罪胡威二反無獨斯畏叶紆㑹於非二反集傳賦也价大也大德之人也藩籬師衆垣牆也大邦強國也屏樹也所以為蔽也大宗強族也翰榦也宗子同姓也言是六者皆君之所恃以安而德其本也有德則得是五者之助不然則親戚叛之而城壊城壊則藩垣屏翰皆壊而獨居獨居而所可畏者至矣集説李氏樗曰王所恃以為蕃籬屏翰蔽其國家者在此數者苟以德懐之則無有不寧矣詩人以懐德維寧間於中則宗子維城亦當以德懐之也左氏曰君其修德以固宗子何城如之所謂宗子維城是也輔氏廣曰自价人維藩至大邦維屏是自内説及外大宗維翰宗子維城又自疎説及親自价人至大宗皆王所恃以為藩垣屏翰者然維以德懐之則王得其所恃以為安而同姓宗子亦且為我之城矣王若不務德以為本則城壊城壊而藩垣屏蔽亦皆傾圮而禍亂至矣彭氏執中曰王者之治親親為大雖用人以為藩垣屏而資同姓以為翰翰者所資以立也又必待同姓以為城城者所恃以固也曰大宗曰宗子其意反覆言同姓之至重至切葢垣重於藩屏不可以無翰而城又大而且重焉然在人者皆有形之勢而德之在我乃無形之勢也故獨曰維寧焉徐氏鳯彩曰藩在垣之外喻大德之人足以匡逺也垣在藩之内喻羣黎之衆足以固本也屏以為蔽喻強大之邦分長方岳翰以為榦喻勲舊之族聨合人心惟君懐德則多助自至故曰維寧王室維同姓是依故曰維城敬天之怒無敢戲豫敬天之渝用朱反無敢馳驅昊天曰眀叶謨郎反及爾出王音往叶如字昊天曰旦叶得絹反及爾游衍叶怡戰反集傳賦也渝變也朱子曰如迅雷風烈必變之變王往通言出而有所往也旦亦眀也衍寛縱之意言天之聰眀無所不及不可以不敬也板板也難也蹶也虐也懠也其怒而變也甚矣而不之敬也亦知其有日監在兹者乎張子曰天體物而不遺猶仁體事而無不在也禮儀三百威儀三千無一事而非仁也昊天曰眀及爾出王昊天曰旦及爾游衍無一物之不體也集説朱氏公遷曰戲豫者自慢之心馳驅者自恣之意皆不知畏天者也天者理而已理無往而不在故天無往而不監知此則敬天之意常存而易亂為治不難矣朱氏善曰及爾出王言一出入之際而天必與之俱也及爾游衍言一動息之頃而天必與之同也此所謂陟降厥士日監在兹也君子之學所以必戒懼愼獨之為貴也沈氏守正曰八章教以囘天之在敬也曰眀曰旦狀天威也平時猶然况怒且渝之時乎何氏楷曰敬非空空畏懼而已必思所以安民而囘天者其所懐當在德矣總論朱氏公遷曰一章至五章歸咎於天教戒而切責之六章有望於天欲其易亂以為治七章歸本於德欲其得人心以輔治八章則告以天所當敬之故庶㡬亂之反乎治也板八章章八句集説嚴氏粲曰朱氏以此詩為切責其寮友用事之人而義歸於刺王與上篇同味詩意信然姚氏舜牧曰上篇先致責詞而以是用大諫終此篇略提責詞而以是用大諫始各一體生民之什十篇六十一章四百三十三句欽定詩經傳説彚纂卷十八
