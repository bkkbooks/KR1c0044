body:
  text: 欽定四庫全書欽定詩經傳説彚纂卷十七大雅三集傳説見小雅集説朱子曰大雅非聖賢不能為平易明白正大光明熊氏禾曰案小雅集傳云正大雅會朝之樂受釐陳戒之辭文王大明綿三篇國語皆以為兩君相見之樂朱子謂特舉其一端而言其實天子諸侯會朝之樂也皇矣追述大王王季之德業與大明綿詩同意生民又推本后稷所以積行纍功之由朱子疑為郊祀之後受釐頒胙之詩旱麓有玉瓚享祀神勞等語或亦受釐之樂思齊追述大任大姒大薑之德言文王御家在宮之事為詳疑此入而燕處之樂靈臺豈亦出而遊觀之樂乎若棫朴言文王之德下武有聲皆兼言武王之事其樂或用之宗廟或用之朝廷今皆不可知若行葦以下四篇為受釐之辭公劉以下三篇為陳戒之辭則又明白曉然者矣惜其被之聲歌者其音節已不復存然善觀詩者但玩其辭氣亦足以識先王之雅道矣黃氏佐曰左傳吳季札觀周樂至於大雅曰廣哉熙熙乎曲而有直體其文王之德乎樂記師乙亦曰廣大而靜疏逹而信者宜歌大雅又曰夫歌者直已而陳德也動已而天地應焉四時和焉星辰理焉萬物育焉猗與文王之德章於關雎麟趾之化本之以和敬成之以仁厚純亦不已猶於穆之神也武王傳及成康儀刑而已後王厲及宣幽依違文王之德者則變大雅之美刺作矣然歌樂以養成天子之德則惟正大雅為常奏之聲而大師道其德焉故經解論樂曰其在朝廷則道仁聖禮義之序燕處則聽雅頌之音所謂直已而陳德也理義深長詞旨廣大其斯所以異諸小雅者歟文王之什三之一文王在上於音烏下同昭于天叶鐵因反周雖舊邦其命維新有周不顯帝命不時叶上紙反文王陟降在帝左右叶羽已反集傳賦也於歎辭昭明也命天命也不顯猶言豈不顯也帝上帝也不時猶言豈不時也左右旁側也周公追述文王之德明周家所以受命而代商者皆由於此以戒成王此章言文王既沒而其神在上昭明于天是以周邦雖自后稷始封千有餘年而其受天命則自今始也夫文王在上而昭于天則其德顯矣周雖舊邦而命則新則其命時矣故又曰有周豈不顯乎帝命豈不時乎蓋以文王之神在天一升一降無時不在上帝之左右輔氏廣曰與中庸所謂洋洋乎如在其上如在其左右之意同蓋非貌説實理然也是以子孫蒙其福澤而君有天下也春秋傳天王追命諸侯之詞曰叔父陟恪在我先王之左右以佐事上帝朱氏公遷曰昭公七年追錫衛襄公策命之詞語意與此正相似或疑恪亦降字之誤理或然也集説歐陽氏修曰文王在上於昭于天者據武王以為言也言武王雖滅殷而有天下然由文王在上其德昭著于天也周雖舊邦其命維新者據后稷公劉以來為言也言周自上世以來為周久矣至文王始受天之眷命而興盛也文王陟降在帝左右者謂其俯仰之間常如在帝左右言為天所親輔也王氏安石曰周受封自后稷則為其邦舊矣至文王而天命之肇造區夏則其命維新矣不顯則所以甚言其顯也不時則所以甚言其時也惟其德之顯是以為帝命之時也蘇氏轍曰聖人先天而天弗違後天而奉天時與天如一故也詩於天人之際多以陟降言之朱子語類問周受命如何曰命如何受於天只是人與天同然觀周自后稷以來積仁纍義到此時人心奔赴自有不容已德顯命時間不容息蓋以文王德合乎天一陟一降常在上帝之左右與之同運而無違也亹亹音尾文王令聞音問不已陳錫哉周侯文王孫子叶奬里反文王孫子本支百世凡周之士不顯亦世集傳賦也亹亹強勉之貌輔氏廣曰亹亹雖訓強勉然亦有繼續不已之意與四章緝熙二字相似令聞善譽也陳猶敷也哉語辭侯維也本宗子也支庶子也孔氏穎逹曰以樹木本幹喻適枝葉喻庶言文王子孫本幹枝葉適子庶子皆傳國百世由文王之德堪使蕃滋故也文王非有所勉也純亦不已而人見其若有所勉耳其德不已故今既沒而其令聞猶不已也李氏樗曰惟文王亹亹故其令聞亦不已蓋有實者必有名也令聞不已是以上帝敷錫于周維文王孫子則使之本宗百世為天子支庶百世為諸侯而又及其臣子使凡周之士孔氏穎逹曰士者下至諸侯及王朝公卿大夫總稱亦世世修德與周匹休焉李氏樗曰天既錫之以造周之命又及其子孫又及其臣之子孫則文王之德盛矣而天之所以錫文王亦至矣集説鄭氏康成曰勉勉乎不倦文王之勤用明德也其善聲聞日見稱歌無止時也乃能受命造周其子孫適為天子庶為諸侯皆百世凡周之士謂其臣有光明之德者亦得世世在位重其功也王氏安石曰凡周之士亦皆世顯則秉文之德故也黃氏櫄曰文王至誠之德亹亹而不已則發而為令聞亦無有窮已推而及於後世亦無有窮已八百其年三十其世皆已基於文王之時矣朱氏公遷曰文王盛德之著不以今昔而有間則天之福其後者亦不以子孫臣子而有間也朱氏善曰此詩言不顯者三有周不顯自聖人言之也不顯亦世與世之不顯自臣子言之也上章以德言此章以世言惟其德之顯是以其傳世亦顯也上章言文王之德之神此章以下専言德者周公告戒成王固欲其法先王之顯德保上天之顯命非但欲其求之窈冥恍惚而已也世之不顯厥猶翼翼思皇多士生此王國叶于逼反王國克生維周之楨音貞濟濟子禮反多士文王以寧集傳賦也猶謀翼翼勉敬也輔氏廣曰勉則無怠敬則無他謀猶如此則其忠誠可知矣思語辭皇美楨幹也朱子曰幹者版築之楨幹今人築牆必立一本於中為骨謂之夜義木橫曰楨直曰幹濟濟多貌毛氏萇曰濟濟多威儀也孔氏穎逹曰多士是上世顯之人則諸侯及公卿大夫此文皆兼之此承上章而言朱氏公遷曰承上章末句専以人臣之世言其傳世豈不顯乎而其謀猶皆能勉敬如此也美哉此衆多之賢士而生於此文王之國也文王之國能生此衆多之士則足以為國之幹而文王亦賴以為安矣輔氏廣曰自文王之時言之則文王之身固以多士寧矣自成王之時言之則文王之神亦以多士寧也蓋言文王得人之盛而宜其傳世之顯也集説歐陽氏修曰言周之興也不獨其君因其世德其衆士佐文王成功業者亦世有顯名而謀事忠敬惟此多士生於周國為幹事之臣文王用之以寧周邦也劉氏彜曰濟濟多士本由文王教化陶範而生也而文王之邦國又待多士濟濟以為安寧焉猶人勤於災田反以自養樂於植材反以自庇王氏安石曰楨國所恃以立也周獲天人之助矣故能生周之楨也輔氏廣曰多士之生於周國為之楨幹二程子論治天下之道未始不以求賢才為先務者以此然則天之所以使周之士傳世之顯者非所以為周之士乃所以為周之國也嚴氏粲曰牆恃幹而立國恃人而立此章述周士之盛朱氏公遷曰傳世之顯即謀猷勉敬而可見謀猷勉敬是以能為周之楨幹而文王賴之以安也美哉多士生此王國可謂盛矣然非王國克生何以能致是哉謂之克生則所以長育作成者有其道故羣臣之德傳及子孫而世之顯也如此穆穆文王於緝七入反熙敬止假古雅反哉天命有商孫子商之孫子其麗不億上帝既命侯于周服叶蒲北反集傳賦也穆穆深遠之意緝續熙明亦不已之意真氏德秀曰詩言緝熙者四文王之詩於緝熙敬止以德言也敬之之詩曰學有緝熙於光明以學言也維清之詩曰維清緝熙文王之典昊天有成命曰於緝熙單厥心二者以事言也止語辭假大麗數也不億不止於億也侯維也言穆穆然文王之德不已其敬如此是以大命集焉以有商孫子觀之則可見矣蓋商之孫子其數不止於億然以上帝之命集於文王而今皆維服于周矣嚴氏粲曰釋文云服事也用也故為臣而見用謂之服言服行其職也集説毛氏萇曰盛德不可為衆也孔氏穎逹曰此作在成王之時從後見其歸周夲而美之耳輔氏廣曰先生謂四章始言文王之所以聖與夫上昭於天不已於令聞者止在於敬之緝續煕明不已而已可謂深得周公之心及文王之德也程先生曰毋不敬可以對越上帝觀文王之詩則可見矣張氏所望曰光明者敬之本體繼而續之使其常明而不昏即所謂不已其敬也侯服于周天命靡常殷士膚敏祼古亂反將于京叶居良反厥作祼將常服黼音甫冔況甫反王之藎才刃反臣無念爾祖集傳賦也諸侯之大夫入天子之國曰某士朱氏公遷曰曲禮注云列國卿大夫其命數與天子之士等則殷士者商孫子之臣屬也嚴氏粲曰殷士總言商之孫子及其舊臣猶書稱爾殷遺多士及茲殷庶士也膚美敏疾也祼灌鬯也嚴氏粲曰祼謂以鬯酒獻尸尸受酒而灌於地以降神也祼灌古字通也將行也酌而送之也孔氏穎逹曰天官小宰云凡祭祀贊祼將之事注以將為送則此言祼將亦宜為送但祼是送爵亦是行之其義同也京周之京師也黼黼裳也孔氏穎逹曰冬官繢人云白與黑謂之黼祭服不止於黼舉一章而表之耳董氏逌曰黼繡於裳雖章數不同皆以黼為裳也冔殷冠也孔氏穎逹曰郊特牲及士冠禮皆云周辨殷冔夏收故知冔殷冠也蓋先代之後統承先王修其禮物作賓于王家蔡氏沈曰修其典禮文物不使廢壞以備一王之法也賔以客禮遇之也時玊不敢變焉而亦所以為戒也王指成王也藎進也言其忠愛之篤進進無已也無念猶言豈得無念也爾祖文王也言商之孫子而侯服于周以天命之不可常也故殷之士助祭於周京而服商之服也於是呼王之藎臣而告之曰得無念爾祖文王之德乎蓋以戒王而不敢斥言猶所謂敢告僕夫云爾劉向曰孔子論詩至於殷士膚敏祼將于京喟然歎曰大哉天命善不可不傳於後嗣是以富貴無常蓋傷微子之事周而痛殷之亡也集説歐陽氏修曰詩人既先引商王子孫以戒成王又引商之衆士以戒周之羣臣以謂殷之衆士乃服其服而來助周祭故引以戒周臣使亦無失其世德以配天命而求福祿王氏安石曰商之孫子侯服于周則以天命靡常故也天嘗命商使有九有之師矣今侯服于周所謂靡常也惟其靡常故商之子孫其為士而膚美敏疾者乃反祼將于周京以助周祭也嚴氏粲曰不以文王為念則將墜厥緒周之孫子臣士又將服周之服而助祭於他人之廟矣此章述殷士祼將之事以為戒也朱氏善曰膚敏言其才之美祼將言其職之共黼冔言其服之常以商之士而服商之服若不改昔日之舊也然以其膚敏之才而奔走於周王之廟則今日之命非復昔日之命矣藎者忠愛之篤惟其忠愛之篤是以欲其監戒之深也無念爾祖聿于筆反修厥德永言配命自求多福叶筆力反殷之未喪息浪反師克配上帝宜鑒于殷駿音峻命不易以豉反集傳賦也聿發語辭永長配合也命天理也師衆也上帝天之主宰也駿大也不易言其難也劉氏瑾曰言難保也言欲念爾祖在於自修其德而又常自省察使其所行無不合於天理則盛大之福自我致之有不外求而得矣李氏樗曰禍福無不自己求之者天何容心於其間哉又言殷未失天下之時其德足以配乎上帝矣朱氏公遷曰此指殷之六七賢君言之今其子孫乃如此宜以為鑒而自省焉則知天命之難保矣大學傳曰得衆則得國失衆則失國此之謂也集説王氏安石曰足乎已無待於外之謂德以德求多福則非有待於外也呂氏祖謙曰王者代天理物操典禮命討之柄以臨天下故曰配命又曰配上帝嚴氏粲曰德者民之所歸得民斯得天不修厥德則失其民而天命去之故宜以殷為鑒也此章戒成王念祖而鑒殷也蔣氏悌生曰周之受命始於文王後王當思文王所以受命者在於修德而所謂修德者蓋無一時一事之不合乎理而其所以求多福之機又在已而不在人也周之後王可不以殷為鑒而思天命之不易保乎王業興廢之由天人感應之機反覆詳切如此命之不易無遏爾躬叶姑𢎞反宣昭義問有虞殷自天叶鐡因反上天之載無聲無臭叶初尤反儀刑文王萬邦作孚叶房尤反集傳賦也遏絶問無遏爾躬朱子曰無自遏絶於爾躬如家自毁國自伐宣布昭明義善也問聞通有又通虞度載事儀象刑法孚信也言天命之不易保故告之使無若紂之自絶於天而布明其善譽於天下又度殷之所以廢興者而折之於天然上天之事無聲無臭不可得而度也惟取法於文王則萬邦作而信之矣禮記緇衣注儀法文王之德而行之則天下無不信者也子思子曰維天之命於穆不已蓋曰天之所以為天也於乎不顯文王之德之純蓋曰文王之所以為文也純亦不已夫知天之所以為天又知文王之所以為文則夫與天同德者可得而言矣是詩首言文王在上於昭于天文王陟降在帝在右而終之以此其旨深矣集説程子曰上天之載無聲無臭之可聞其體則謂之易其理則謂之道其命在人則謂之性其用無窮則謂之神一而已矣呂氏大臨曰凡欲配天命者當法天然天無聲臭可求苟儀刑文王則天德全矣此萬邦所以作孚呂氏祖謙曰宣昭義問所謂闢四門明四目逹四聰蓋天命之大非小知偏學所能與也又虞度商之興亡自天者自敬與怠瞭然可識愈敬懼而不敢怠矣總論輔氏廣曰此詩七章以一章言之首尾只是言文王與天為一以一篇言之首尾亦是言文王與天為一但首章則専説文王末章則欲成王之法文王耳王氏柏曰初言文王只如此亹亹然強勉做將去而令聞自至今不已亹亹二字又未足以盡其形容又添一箇穆穆字其所以能如此深遠者只是緝熙此一敬字而已此令聞之所以不已也末曰天理無形但取法於文王天下自能興起孚信凡所以稱贊文王者只一箇敬字天難取法只法文王便能孚信劉氏瑾曰天高在上而文王之神亦在上帝為天之主宰而文王之神則升降乎帝之左右是天帝所在即文王所在也何以知文王之能然哉以其與天同德而已天之德於穆不已所以為天文王之德純亦不已所以為文於穆不已者天之誠也純亦不已者文王之誠也是文王之德即天之德儀刑文王即儀刑於天也天與文王一而已矣文王七章章八句集傳東萊呂氏曰呂氏春秋引此詩以為周公所作味其詞意信非周公不能作也今案此詩一章言文王有顯德而上帝有成命也二章言天命集於文王則不唯尊榮其身又使其子孫百世為天子諸侯也三章言命周之福不唯及其子孫而又及其羣臣之後嗣也四章言天命既絶於商則不唯誅罰其身又使其子孫亦來臣服于周也五章言絶商之禍不唯及其子孫而又及其羣臣之後嗣也六章言周之子孫臣庶當以文王為法而以商為監也七章又言當以商為監而以文王為法也其於天人之際興亡之理丁寧反覆至深切矣故立之樂官而因以為天子諸侯朝會之樂蓋將以戒乎後世之君臣而又以昭先王之德於天下也國語以為兩君相見之樂特舉其一端而言耳然此詩之首章言文王之昭于天而不言其所以昭次章言其令聞不已而不言其所以聞至於四章然後所以昭明而不已者乃可得而見焉然亦多詠歎之言而語其所以為德之實則不越乎敬之一字而已然則後章所謂修厥德而儀刑之者豈可以他求哉亦勉於此而已矣集説張子曰文王之於天下都無所與惟正已而已觀文王一篇便知文王之德性文王之德業固美更得詩人能道之朱子曰文王之德業固美矣詩人所以稱述之者又極形容之妙是以其辭尤粹學者於此而盡心焉則凡其德性之藴皆可見矣輔氏廣曰敬之一字聖學之所以為始終者又可見於此二程先生挈出此一字以詔後學其有功於聖學多矣學者舍是無以為進德之階也劉氏瑾曰敬者干聖傳心之法即所謂欽也虞書五篇言欽者十有三言敬者七唐虞君臣相傳相戒固惟在於此也故仲虺告湯亦曰欽崇天道尚父告武王亦曰敬勝怠者吉是創業垂統者固在於此敬而持盈守成者尤在於此敬也然則成王所以念祖修德儀刑文王之事者誠不可以他求亦惟法文王之敬德而已又若召誥召公告王亦曰曷其奈何弗敬又曰王敬作所又曰不可不敬德又曰王其疾敬德又兩曰惟不敬厥德乃早墜厥命又曰肆惟王其疾敬德其語意尤為諄復剴切也成王之為令主也宜哉明明在下赫赫在上叶辰羊反天難忱市林反斯不易以豉反維王天位殷適音的使不挾子燮反四方集傳賦也明明德之明也赫赫命之顯也忱信也不易難也天位天子之位也殷適殷之適嗣也挾有也此亦周公戒成王之詩將陳文武受命故先言在下者有明明之德則在上者有赫赫之命達於上下去就無常此天之所以難忱而為君之所以不易也紂居天位為殷嗣乃使之不得挾四方而有之蓋以此爾集説王氏安石曰明明在下王德之明也赫赫在上天命之赫也今紂所居之尊則天位也所傳之正則殷適也使不挾四方其不可保恃如此范氏處義曰明明赫赫言周之有德顯受天命如此明明則文王所修之德也赫赫則文王所受之命也由成王言之則文王在上由天命言之則文王又在下此詩亦周公作以戒成王故既言周之受顯命又言天亦難信為王亦不易如紂無德以當天心遂使之不能挾四方而有之所謂命靡常也呂氏祖謙曰天位殷適使不挾四方則下章所陳眷顧周家有加無已者非天私我有周也栽者培之傾者覆之因其材而篤焉耳朱氏善曰天果不可信乎在下者有明明之德則在上者有赫赫之命未嘗不可信也天果可信乎夏有昏德而商受之商有昏德而周受之其去就無常又未嘗必可信也惟天之不可信此為君之所以不易也案董仲舒曰善言天者必有徵於人天人相通之故亦微矣哉前詩言文之德合於天天之命集於文而終之以上天之載無聲無臭儀刑文王萬邦作孚以見天人之合一此詩首二句即揭出天人感通之故以為一篇綱領天位殷適使不挾四方逆天者天必亡之也天監在下而命集於文王上帝式臨而保佑乎武王順天者天必興之也使不挾四方使字説得威靈赫然所謂危言以惕之而告諸天之不假易也摯音至仲氏任音壬自彼殷商來嫁于周曰嬪毗申反于京叶居良反乃及王季維德之行叶戶郎反大音泰任有身叶尸羊反生此文王集傳賦也摯國名仲中直衆反女也任摯國姓也毛氏萇曰摯國任姓之中女也殷商商之諸侯也黃氏一正曰摯奚仲之後自彼殷商蓋摯商畿內國也嬪婦也京周京也李氏樗曰王氏曰天子所都曰京是時周未有天下言京則詩人追稱也曰嬪于京疉言以釋上句之意猶曰釐降二女于媯音規汭嬪于虞也蔡氏沈曰釐理降下也史言堯治裝下嫁二女于媯水之北使為舜婦于虞氏之家也王季文王父也身懷孕也將言文王之聖而追本其所從來者如此蓋曰自其父母而已然矣集説列女傳大任端一誠莊惟德之行及其娠文王目不視惡色耳不聼淫聲口不出敖言生文王而明聖大任教之以一而識百卒為周宗君子謂大任為能胎教劉氏彝曰乾健而不息坤順以相承物理自然形影相附不可以無實而取之也王季天錫大任以配其德故克生文王焉文王天作之合以大其慶故克生武王焉王氏安石曰摯仲氏任繫其夫而言大任繫其子而言李氏樗曰言文王之有明德由其母之賢而致之輔氏廣曰維德之行所謂以成德為行也只此一句足以盡王季大任之事可謂辭約而義博也陳氏櫟曰聖賢之生不偶然也有配偶之賢而後有嗣續之賢故詩推本聖賢之生往往自其所從來如生民言稷而及薑嫄此言文王而及大任下章言武王而及大姒皆是也其意深矣鄒氏泉曰大任王季俱有其德一維德之是行王季之德如明類長君是也大任之德如思齊思媚是也維此文王小心翼翼昭事上帝聿懷多福叶筆力反厥德不回以受方國叶越逼反集傳賦也小心翼翼恭愼之貌即前篇之所謂敬也文王之德於此為盛昭明懷來回邪也朱氏公遷曰敬以直內故不回方國四方來附之國也集説孔氏穎逹曰人度量欲其心之大謹慎欲其心之小見其終常戒懼出於性然表記引此詩云有君民之大德有事君之小心是也言受方國故知四方之國來附之輔氏廣曰前篇釋厥猶翼翼為勉敬此篇説小心翼翼為恭慎其義雖一而有在臣在君之不同此須是以心體之則自見其有廣狹也昭事上帝言文王之敬洞洞屬屬終日對越上帝也如此則盛大之福自然來集而文王之敬直上直下更無回曲之時所以又能受四方來附之國也一有回曲則此心便息此理便絶天人上下皆不相管攝矣嚴氏粲曰言文王之德天人所與也文王小心翼翼然恭敬以明事上帝至誠之運與天周旋也遂能懷來多福蓋其德不回邪故受此四方侯國之歸也有一毫覬幸之心則邪矣朱氏善曰聖人之德敬為大泛言之而為德切言之而為敬敬者德之與也無敬則德不行聖人之敬上與天心合下與人心合故以之事天非有心於求福也而自足以來多福以之治人非有心於求媚也而自足以受方國其德之不回即其心之敬者為之也天監在下有命既集叶昨合反文王初載天作之合在洽之陽在渭之涘音士叶羽已反文王嘉止大邦有子叶奬禮反集傳賦也監視集就載年合配也洽水名本在今同州郃音洽陽夏陽縣皇輿表今西安府同州郃陽縣隸陜西今流已絶故去水而加邑王氏應麟曰説文作郃渭水亦徑此入河也嘉婚禮也大邦莘國也子大姒也梁氏益曰莘姒姓之國文王妃大姒之母家今同之夏陽漢郃陽也有大姒冢祠將言武王伐商之事故此又推其本而言天之監照實在於下其命既集於周矣故於文王之初年朱氏公遷曰初年猶曰壯盛之年也或謂即位之初年恐鑿而默定其配所以洽陽渭涘當文王將昏之期而大邦有子也蓋曰非人之所能為矣集説嚴氏粲曰述天生大姒以配文王也文王有盛德而天監之於下大命集焉天為生配在洽水之北渭水之涯指莘國也當文王嘉禮之時而莘國有賢女殆非偶然天實為之朱氏善曰天命必有所厭也而後有所集以六百年之商將欲革其命而新之非監視之久而眷顧之深夫固不輕集也天命既集於文王則文王之配豈人力之所能為哉洽陽渭涘有聖女焉天實擬之以為聖人之配也而天命之集於周益可信矣大邦有子俔牽遍反天之妹文定厥祥親迎魚敬反于渭造舟為梁不顯其光集傳賦也俔磬也韓詩作磬説文云俔譬也孔氏曰如今俗語譬喻物曰磬作然也文禮祥吉也言卜得吉而以納幣之禮定其祥也蘇氏轍曰昏禮既問名則卜之卜而吉則納幣以定之造作梁橋也作船於水比之而加版於其上以通行者即今之浮橋也傳曰天子造舟諸侯維舟大夫方舟士特舟孔民穎達曰李巡曰比其舟而渡曰造舟中央左右相維持曰維舟併兩船曰方舟一舟曰特舟杜預云造舟為梁則河橋之謂也維舟以下則水上浮而行之但船有多少為等差耳張子曰造舟為梁文王所制而周世遂以為天子之禮也不顯顯也集説鄭氏康成曰賢女配聖人得其宜故備禮也迎大姒而更為梁者欲其昭著示後世敬昏禮也天子造舟周制也殷時未有等制真氏德秀曰其禮盛故其光顯黃氏一正曰俔天之妹以其德與天合也親迎于渭至莘之界也諸侯無出境親迎之禮而文王遠至莘界者洽陽在其境內且文王為世子不嫌於遠迎也姚氏舜牧曰詩於大任大姒備敘其所出而於嫁嬪親迎之禮一一詳之見聖人重大禮而不苟且以見其合之非偶也有命自天命此文王于周于京叶居良反纘子管反女維莘所巾反長丁丈反子維行叶户郎反篤生武王保右音祐命爾燮伐大商集傳賦也纘繼也莘國名長子長女大姒也行嫁篤厚也言既生文王而又生武王也饒氏魯曰文王生於祖甲之三十一年武王後文王二十年生是商道始微之際二人已生矣右助燮和也陳氏鵬飛曰書言燮友柔克有和順之意言天既命文王于周之京矣而克纘大任之女事者維此莘國以其長女來嫁于我也天又篤厚之使生武王保之助之命之而使之順天命以伐商也集説輔氏廣曰天監在下有命既集言其始也有命自天命此文王言其終也天之生聖人者其用力多矣既以篤生之故保護之右助之所以命之燮伐大商也征伐本非和者之事而曰燮伐者所謂剛中而應行險而順者也朱氏善曰有大任以為之母有大姒以為之婦故謂之纘言女德之有繼也既生文王於前又生武王於後故謂之篤言天命之匪懈也其伐商也上以順乎天下以應乎人故謂之燮言其無慚德也殷商之旅其會如林矢于牧野維豫侯興叶音歆上帝臨女音汝無二爾心集傳賦也如林言衆也書曰受率其旅若林毛氏萇曰旅衆也如林言衆而不為用也矢陳也牧野在朝歌南七十里梁氏益曰衛之汲縣故商都牧野之邑侯維二疑也爾武王也此章言武王伐紂之時紂衆會集如林以拒武王而皆陳于牧野則維我之師為有興起之勢耳然衆心猶恐武王以衆寡之不敵而有所疑也故勉之曰上帝臨女毋二爾心蓋知天命之必然而贊其決也然武王非必有所疑也設言以見衆心之同非武王之得已耳集説王氏安石曰明文武之興以德不以力也蘇氏轍曰牧野商郊也紂陳其衆以拒武王然其衆維武王是為無不欲武王興者曰上帝臨女矣無疑不克也呂氏祖謙曰紂以如林之衆來戰苟較強弱而計衆寡其心必疑二矣然當是時武王方一心以奉天討若上帝實臨之較計之私豈得而容哉曰上帝臨女無二爾心蓋設為勉之之辭以形容武王奉天討之心也劉氏瑾曰武王誓師曰受有臣億萬惟億萬心豫有臣三千惟一心商罪貫盈天命誅之又曰朕夢協朕卜襲于休祥戎商必克又曰雖有周親不如仁人觀是語也則武王固知上帝之監臨矣固知衆寡之不足疑矣牧野洋洋檀車煌煌駟騵音元彭彭叶鋪郎反維師尚父時維鷹揚涼音亮彼武王肆伐大商會朝清明叶謨郎反集傳賦也洋洋廣大之貌檀堅木宜為車者也煌煌鮮明貌駵馬白腹曰騵孔氏穎達曰檀弓亦言戎事乘騵因此武王所乘遂為一代常法彭彭強盛貌師尚父大公望為大師而號尚父也鷹揚如鷹之飛揚而將擊言其猛也涼漢書作亮佐助也肆縱兵也輔氏廣曰肆伐亦可見三千惟一心之意朱氏道行曰上曰燮伐屬主德調劑此曰肆伐屬將帥奮庸會朝會戰之旦也蘇氏轍曰書所謂甲子昧爽也此章言武王師衆之盛將帥之賢伐商以除穢濁不崇朝而天下清明孔氏穎逹曰王肅云天下乃大清明無復濁亂之政所以終首章之意也集説陳氏櫟曰篇首之明明以德之明言之也篇末之清明以治象之明言之也然不崇朝而天下清明非德之明者能之乎劉氏瑾曰天下本清而紂汨濁之故伯夷大公避之以待其清及去紂則源清而流悉清矣故武王泰誓以永清四海為己任詩人歌之亦以會朝清明歎其撥亂反正之神速蓋知其心唯在於清四海而已彭氏執中曰當癸亥之夕俟天休命之前猶有如陰曀之中及甲子昧爽一戰之後民情大悅向者昏亂穢濁之氣一洗而出之朱氏善曰此章述牧野之事然言其檀車之煌煌而已不及乎矛戟之利則是無待於擊刺也言其駟騵之彭彭而已不及乎弓矢之良則是無待於貫革也言尚父之鷹揚而已不及乎徒御之衆則是無待於選鋒陷陳之勇也所以然者殷周之不敵久矣孔子曰仁不可為衆也孟子曰征之為言正也各欲正已也焉用戰皆此意也會朝清明所謂一戎衣而天下定也附録鄭氏康成曰會合也以天期已至兵甲之強師率之武故今伐殷合兵以清明書牧誓曰時甲子昧爽武王朝至于商郊牧野乃誓孔氏穎達曰引牧誓證清明之時是昧爽之義牧誓注亦引此詩交相為證昧爽者言其昧之而初明晚則塵昏旦則清故謂朝旦為清明言會朝清明正是會清明之朝耳曹氏粹中曰武成云陳于商郊俟天休命孔安國云休命謂雨止畢陳也六韜云武王東伐至河上雨甚雷疾大公率衆先涉然則至畢陳乃雨止而清明嚴氏粲曰會戰之朝乃雨止而清明是天相之也史載行師以雨敗者多矣故以會朝清明為得天助大公先涉畢陳而雨止故以尚父鷹揚發之案會朝清明毛鄭各有一解後儒或從毛或從鄭然毛傳得王肅而益明義極正大朱子集傳依之固宜總論吳氏師道曰此詩言王季大任之德以及文王言文王大姒之德以及武王又言武王伐商以及尚父明一家祖孫父子夫婦婦姑皆有盛德而又有將帥之賢師衆之盛至於天命之保佑昭事之聿懷天之與聖人又相與為一蓋無一而不盡其道詩人形容之備莫過於此大明八章四章章六句四章章八句集傳名義見小旻篇一章言天命無常惟德是與二章言王季大任之德以及文王三章言文王之德四章五章六章言文王大姒之德以及武王七章言武王伐紂八章言武王克商以終首章之意其章以六句八句相間又國語以此及下篇皆為兩君相見之樂説見上篇劉氏瑾曰事見外傳魯語叔孫穆子之言也集説王氏通曰愚讀大明之詩而知人之求配不可不慎擇也蓋雖大聖賢而配非其人所生之子必不能全類其父詩稱文武之興必各本其母而言有旨哉輔氏廣曰君有明德則天有明命有王季文王則有大任大姒有王季大任則有文王有文王大姒則有武王有武王之君則有大公之臣讀大明之詩則當知天人夫婦父子君臣之際安危治亂廢興存亡之機如影響形聲之相似皆非苟然也此詩周公作以戒成王前五章言周三王積德之盛而天命之積亦非一日有人力之所不得與者後兩章言武王順天應人以伐紂而克之有非得已者成王聞之思天命之不苟集祖宗之於天下也非苟得則兢兢業業以保守之自有不能已者矣綿綿瓜瓞田節反民之初生自土沮七余反漆音七古公亶都但反父音甫陶音桃復音福陶穴叶户橘反未有家室集傳比也綿綿不絶貌大曰瓜小曰瓞邢氏昺曰瓞一名瓝小瓜也瓜之近本初生者常小其蔓不絶至末而後大也民周人也自從土地也朱氏公遷曰自土沮漆自沮漆之土也語倒如此沮漆二水名在豳地水經沮水出北地直路縣東過馮翊祋祤繇北東入于洛漆水出扶風杜陽縣俞山東北入于渭古公號也亶父名也或曰字也後乃追稱大王焉趙氏順孫曰古公猶言先公也蓋未追王前之本號古公當殷末時猶尚質故亶父以名言陶窰竈也復重窰也穴土室也賈氏公彥曰古者窟居隨地而造若平地則不鑿但纍土為之謂之為復言於地上重復為之也若高地則鑿為坎謂之為穴其形皆如陶竈復穴皆開其上取明家門內之通名也豳地近西戎而苦寒故其俗如此此亦周公戒成王之詩追述大王始遷岐周以開王業而文王因之以受天命也此其首章言瓜之先小後大以比周人始生於漆沮之上王氏安石曰周國嘗幾亡矣其後土漆沮而國復興故以為民之初生也而古公之時居於窰竈土室之中其國甚小至文王而後大也集説孔民穎達曰周語云昔我先世后稷以服事虞夏及夏之衰棄稷不務我先王不窋用失其官而自竄於戎狄之間蓋不窋時失官竄豳猶尚往來邰國未即定居於豳公劉者不窋之孫至公劉而盡以邰民遂往居焉是定國於豳自公劉始也大王之基王業在於岐周始盛故閟宫云居岐之陽實始翦商但在岐始盛由未遷已得民心故本周之興自於漆沮也公劉始遷於豳比至古公將十世公劉云于豳斯館則豳有宮館也此以文王在岐而興上本大王初來之事歎美在岐新立故言在豳未有下云俾立室家故此言未有室家其實在豳之時亦有宮室七月云入此室處即豳事也豈常穴居乎但豳近西戎處在山谷其俗多復穴而居故詩人舉而言耳李氏公凱曰周家歷世不絶如瓜瓞之生綿綿然延蔓自公劉遷豳在於沮漆之地傳至先公大王之初其民尚復穴而處未曽有室家之盛是其勢尚微也朱氏公遷曰厥初生民自后稷始入此室處自豳公時已然此云爾者生民之詩是推始祖所自出綿詩首章是見民人所自來薑嫄生后稷建邦啓土之由出稷封於邰而不窋竄去則有邰廢而周無民漆沮之豳又周之民人始生之地也夾皇遡過雖云已有宫室但穴處乃豳地所不能無謂之未有家室何怪哉詩意主言大王肇基王迹文王克成厥勳以見在豳而小遷岐而大耳古公亶父來朝走馬叶滿補反率西水滸呼五反至于岐下叶後五反爰及薑女聿來胥宇集傳賦也朝早也走馬避狄難也滸水崖也漆沮之側也岐下岐山之下也許氏謙曰地理考異郡縣志歧山亦名天柱山在鳯翔府岐山縣東北十里薑女大王妃也胥相宇宅也孟子曰大王居邠狄人侵之事之以皮幣珠玉犬馬而不得免乃屬其耆老而告之曰狄人之所欲者吾土地也吾聞之也君子不以其所以養人者害人二三子何患乎無君我將去之去邠踰梁山邑於岐山之下居焉邠人曰仁人也不可失也從之者如歸市張子曰書稱大王肇基王迹蓋見得民心之始也方其去邠民皆攜持而隨之固木嘗率之也王迹之始莫大於此蓋民歸之則天命之矣集説孔氏穎逹曰文王之先古公避狄之難循西方水崖漆沮之側東行而至於岐山之下與其妃大薑自來相土地之可居者言大王既得民心又有賢妃之助故能克成王業遷都自是人君之事鄭言爰及薑女明其著大薑之賢知也范氏處義曰此言大王去邠之時其從容如此黃氏佐曰大王雖不得已而遷岐及其至岐則須擇可都之地以為稅駕之所此又與孟子非擇取之意不相背也錢氏天錫曰大王當間關去國而相土擇居規模宏逺種種皆興王之兆薑女與大王共起艱危得其贊助所謂天立厥配者也周原膴膴音武堇音謹荼如飴音移爰始爰謀叶謨悲反爰契苦計反我龜曰止曰時築室于兹叶津之反集傳賦也周地名在岐山之南廣平曰原膴膴肥美貌堇烏頭也孔氏穎逹曰釋草云芨堇草郭璞曰即烏頭也江東人呼為堇荼苦菜蓼屬也飴餳夕清反也契所以然火而灼龜者也儀禮所謂楚焞音寸又音暾是也孔氏穎逹曰春官菙氏掌共燋契以待卜事注云楚焞置於燋在龜東楚焞即契所用灼龜也燋謂炬其存火也楚荆也然則卜用龜以楚焞之木燒之於燋炬之火既然執之以灼龜既契乃開出其兆也或曰以刀刻龜甲欲鑽之處也蘇氏轍曰契刻也卜者必刻龜而灼之王氏應麟曰契漢書注作挈言周原土地之美雖物之苦者亦甘於是大王始與豳人之從已者謀居之又契龜而卜之既得吉兆乃告其民曰可以止於是而築室矣或曰時謂土功之時也王氏安石曰曰止則命其臣民止於兹也曰時則命其臣民以土功之時也既命其土功之時遂築室也集説孔氏穎達曰洪範曰汝則有大疑謀及乃心謀及卿士謀及庶人謀及卜筮大王自相之知此地將可居是謀及乃心也與從己者謀是謀及卿士庶人也契龜而卜是謀及卜筮也李氏樗曰古之建國必有以相土地之宜土地既善然後稽之於卜筮姚氏舜牧曰公劉遷豳時相其陰陽觀其流泉度其隰原此云周原膴膴堇荼如飴大抵風氣之美惡略見於山川而精藴之祕藏可徵於生物知此理而地不難識矣乃慰乃止乃左乃右叶羽已反乃疆乃理乃宣乃畝叶滿彼反自西徂東周爰執事叶上止反集傳賦也慰安止居也左右東西列之也孔氏穎達曰據公宫在中民居左右故王肅云乃左右開地置邑以居其民疆謂畫其大界理謂别其條理也宣布散而居也或曰導其溝洫也畝治其田疇也自西徂東自西水滸而徂東也孔氏穎達曰豳在周原西北而經言自西據至周之時從水滸而言也周遍也言靡事不為也集説輔氏廣曰慰止左右則民居各有定而得以營立矣疆理宣畝則民田各有分而得以耕治矣周爰執事凡經始之事所當為者無不盡也蔣氏悌生曰建國之初必先正疆界以立其大綱然後及庶事以盡條目蓋遷國甫定凡事未備既有以定民之居即所以制民之産乃召司空乃召司徒俾立室家叶古胡反其繩則直縮色六反版以載叶節力反作廟翼翼集傳賦也司空掌營國邑司徒掌徒役之事孔氏穎達曰司空之屬有匠人其職有營國廣狹之度廟社朝市之位司徒之屬有小司徒凡用衆庶則掌其政教繩所以為直曹氏粹中曰審曲而勢直必以繩凡營度位處孔氏穎達曰位處者即匠人所謂左祖右社面朝後市之類是也朱子曰人君國都如井田樣畫為九區面朝背市左祖右社中間一區則君之宫室宮室前一區為外朝凡朝會藏庫之屬皆在焉後一區為市市四面有門左右各三區皆民所居而外朝一區左則宗廟右則社稷焉此國君都邑規模之大槩也皆先以繩正之既正則束版而築也朱氏善曰此司空立室家之事縮束也載上下相承也言以索束版投土築訖則升下而上以相承載也李氏樗曰如所謂約之閣閣是也朱氏善曰此司徒命徒役之事君子將營宮室宗廟為先廄庫為次居室為後王氏逄曰毛傳本曲禮語翼翼嚴正也孔氏穎達曰言能依就凖繩牆屋方正也集説劉氏彝曰其繩則直揆其基址必正也縮版以載築其垣墉必堅也曹氏粹中曰俾立室家則定其規模而已若其營作則先於廟故其序如此救音俱之陾陾耳升反度待洛反之薨薨築之登登削屢馮馮扶冰反百堵丁古反皆興鼛音皋鼓弗勝音升集傳賦也救盛土於器也陾陾衆也度投土於版也薨薨衆聲也登登相應聲削屢牆成而削治重復也劉氏彝曰謂牆成脫版削其堅凸以就平直馮馮牆堅聲蘇氏轍曰既成而削之其聲馮馮然堅也五版為堵興起也此言治宫室也鼛鼓長一丈二尺嚴氏粲曰鼛鼓解見鼓鐘以鼓役事弗勝者言其樂事勸功鼓不能止也章氏俊卿曰春秋傳曰魯人之皋皋緩也役事以勿急為義故以皋鼓節之上之使下以仁常欲緩而不迫下之事上以義常欲敏而有功以鼓節之而弗止故曰弗勝集説孔氏穎逹曰毛以為掘土實之於虆謂之救者衆多陾陾然既取得土送至牆上牆上之人受取而居於版中居之亟疾其聲薨薨然築之者用力登登然牆成削之以牆堅緻土從上下打鍛削之人屢其聲馮馮然其作此牆之時百堵皆同時而起其間欲令之食息擊鼛擊鼓不能勝而止之民皆勸事樂功競欲出力言大王之得人心也輔氏廣曰言治宮室獨詳於版築之事者蓋垣牆所以圍乎外舉此則其中衆役可知又版築比之其他工役為最勞至於百堵皆興鼛鼓弗勝則人之樂事於是為至矣乃立皋門皋門有伉苦浪反叶苦郎反乃立應門應門將將七羊反乃立冢土戎醜攸行叶户郎反集傳賦也傳曰王之郭門曰皋門孔氏穎逹曰郭門者宮之外郭之門伉陸氏德明曰本又作亢韓詩作閌高貌王之正門曰應門孫氏炎曰謂朝門也孔氏穎逹曰毛以明堂位云庫門天子皋門雉門天子應門魯以諸侯而作庫雉則諸侯無皋應故以皋應為王門之名也將將嚴正也大王之時未有制度特作二門其名如此及周有天下遂尊以為天子之門而諸侯不得立焉朱子曰書天子有應門春秋書魯有雉門禮記云魯有庫門家語云衛有庫門皆無云諸侯有皋應者則皋應為天子之門明矣冢土大社也陳氏祥道曰大社土五色而冒以黃其位則中門之右社主隂故也其壝北面社向隂故也其飾則不屋其表則木其方廣則五丈其主則石為之亦大王所立而後因以為天子之制也孔氏穎逹曰祭法云王為羣姓立社曰大社郊特牲云天子大社必受霜露風雨之氣也大社之名唯施於天子朱子曰大王立岐周之社武王既有殷國遂通立周之社於天下以為大社猶漢初令民立漢社稷也戎醜大衆也起大事動大衆必有事乎社而後出謂之宜孫氏炎曰兵凶戰危慮有負敗祭之以求福宜故謂之宜孔氏穎逹曰宜祭社之名也集説王氏安石曰宗廟宮室內事也自內以及外故言冢土也輔氏廣曰戎醜攸行便帶下章伐昆戎之意二門既立而大社遂立大社既立而大衆攸行周家之勢至是蓋勃勃然有不可得而禦者矣劉氏瑾曰上四章之序營立宗廟居室社稷皆在居民之後先王重民之意如此蓋國以民為本也黃氏一正曰外門以聳觀望故曰有伉內門布列象魏故曰將將社雖非為戎醜而立凡出軍必先宜於社軍歸必獻於社故特舉以為服昆夷之端肆不殄田典反厥慍紆問反亦不隕韻敏反厥問柞子洛反棫音域拔蒲貝反矣行道兌吐外反矣混音昆夷駾徒對反矣維其喙吁貴反矣集傳賦也肆故今也猶言遂也承上起下之辭殄絶慍怒隕墜也問聞通謂聲譽也柞櫟也枝長葉盛叢生有刺棫白桵音緌也小木亦叢生有刺拔挺拔而上不拳曲蒙密也兌通也始通道於柞棫之間也駾突孔氏穎逹曰説文云駾馬疾行貌然則馬之疾行即有奔突之義也喙息也呂氏大臨曰喙張喙而息也奔趨者其狀如此言大王雖不能殄絶混夷之慍怒亦不隕墜已之聲聞蓋雖聖賢不能必人之不怒已但不廢其自修之實耳然大王始至此岐下之時林木深阻人物鮮少至於其後生齒漸繁歸附日衆則木拔道通混夷畏之而奔突竄伏維其喙息而已言德盛而混夷自服也蓋已為文王之時矣集説呂氏祖謙曰此章或以為專指大王或以為專指文王義皆未安孟子曰文王事昆夷文王猶事昆夷則大王安得有昆夷駾矣維其喙矣之事乎皇矣之詩曰帝省其山柞棫斯拔松柏斯兌帝作邦作對自大伯王季然則柞棫拔矣行道兑矣安可專指以為文王之詩乎蓋總敘周家王業積施屈伸之理始於大王而終於文王耳劉氏瑾曰下章之首即言虞芮質成之事則此章之末固通文王而言矣蓋其始也昆夷不服而大王不墜其聞及其終也文王德盛而昆夷自服一章之間神祖聖孫實相首尾集傳既曰大王始至又曰至於其後又曰已為文王之時則其歷年亦久矣若以皇矣三章及天作之頌證之則此章通言大王王季文王之事明矣蔣氏悌生曰大王之遷於岐避狄人之難自國勢而觀可謂削弱之甚宜其聲譽之頓減也惟其不以人之慍怒為輕重而惟視吾之政不廢而加勉是以政日修治地益墾闢昔之見侵於我者今則竄伏而潛消非其能自強於政治何以得此朱氏善曰昆夷之慍患之自外至者也內治之修政之由中出者也自外至者聖賢之所不能必由中出者聖賢必加勉焉蓋積纍之既久培植之既厚至於木拔道通則屈不終屈而必於伸晦不終晦而必於顯昆夷之竄自有不期然而然者矣虞芮如鋭反質厥成文王蹶居衛反厥生叶桑經反豫曰有疏附叶上聲豫曰有先息薦反後胡豆反叶下五反豫曰有奔奏與走通叶宗五反豫曰有禦侮集傳賦也虞芮二國名質正成平也傳曰虞芮之君相與爭田久而不平乃相與朝周入其境則耕者讓畔行者讓路入其邑男女異路斑白不提挈入其朝士讓為大夫大夫讓為卿二國之君感而相謂曰我等小人不可以履君子之境乃相讓以其所爭田為間田而退天下聞之而歸者四十餘國蘇氏曰虞在陜之平陸梁氏益曰陜之平陸吳山有虞城本帝舜之後所謂西虞也芮在同之馮翊酈氏道元曰河水自河北城南徑芮城有芮君祠梁氏益曰今陜西芮城西二十里有芮故城平陸有間原焉則虞芮之所讓也曹氏粹中曰虞芮皆在岐周之東鍾氏惺曰間田在平陸縣西五十里俗呼讓畔城蹶生未詳其義或曰蹶動而疾也生猶起也豫詩人自豫也率下親上曰疏附相道前後曰先後喻德宣譽曰奔奏武臣折衝曰禦侮言昆夷既服而虞芮來質其訟之成於是諸侯歸周者衆而文王由此動其興起之勢是雖其德之盛然亦由有此四臣之助而然故各以豫曰起之其辭繁而不殺者所以深歎其得人之盛也集説蘇氏轍曰虞芮欲質其成而文王有以動之使其禮義亷耻之心油然而生君子曰文王之所以能至於此者何哉豫以為其臣無所不具其臣無所不其者文王之盛德也輔氏廣曰質虞芮之訟初非期於興起也而其興起之勢蹶然而動焉此聖人之事也然亦豈一己所能獨致哉故周公以為四臣之助為多所謂四臣者謂有此四等之臣耳固非止於四人而已也朱氏善曰虞芮之質成是訟獄者不之商而之文王也歸者四十餘國是朝覲者不之商而之文王也至是而興起之勢沛然而不可禦矣詩人推本言之以為文王之德雖非四臣之所能及而非四臣則亦無以宣其化也書亦曰無能往來兹迪彝教文王蔑德降于國人知此則知文王得人之盛而人才之為聖化之助亦大矣總論陳氏櫟曰王迹肇基於大王而王業漸大於文王此追王所以自大王始而此詩推夲文王之受命亦自大王之遷岐始也然言文王受命惟至於虞芮質成者蓋人心所歸即天命所在也朱氏公遷曰周家世有哲王其作則垂憲者備矣周公未嘗舉古先聖王以為言所以戒者不曰文王則曰武王不曰大王則曰王季蓋祖宗之所行正子孫之所法周公拳拳於成王者正欲其守家法以承先業耳綿九章章六句集傳一章言在豳二章言至岐三章言定宅四章言授田居民五章言作宗廟六章言治宮室七章言作門社八章言至文王而服混夷九章遂言文王受命之事劉氏瑾曰所謂受命者蓋諸侯歸文王則文王於天命似有不得而辭者矣然亦推原之詞耳非謂其有改元稱正之事也餘説見上篇集説輔氏廣曰以上三篇皆周公作以戒成王之詩文王則専美文王之德大明則追述王季大任文王大姒以及武王之德綿則又追述大王大薑文王之德而其意則歷述其先王積纍德業之盛以見成王之任大責重不可不謹戒而保守之耳黃氏佐曰右三詩乃兩君相見之樂也左傳所謂及文王之三皆周公所作以戒成王者後世因諸侯朝見燕享必歌奏以致警此大雅所以為大政也芃芃薄紅反棫雨逼反朴音卜薪之槱音酉之濟濟子禮反辟音壁王左右趣叶此苟反之集傳興也芃芃木盛貌嚴氏粲曰棫解見綿朴叢生也言根枝迫迮音窄相附著也槱積也孔氏穎達曰伐木析之謂之薪既以為薪則當積聚故知槱為積也嚴氏粲曰積以待其乾而用之濟濟容貌之美也朱氏公遷曰聖人之德容如此則其根於心者可知辟君也君王謂文王也此亦以詠歌文王之德言芃芃棫朴則薪之槱之矣濟濟辟王則左右趣之矣蓋德盛而人心歸附趣向之也集説蔣氏悌生曰物生之盛資用而不窮聖德之盛同歸而無間文王德容之盛美而且多不可以一德名言但見左右之人皆趣向之蓋德盛而人歸無方向之限量韋氏調鼎曰薪之取材之廣也槱之儲材之豫也趣者盛德感人爭趣而不能已也濟濟辟王左右奉璋奉璋峩峩五歌反髦士攸宜叶牛何反集傳賦也半圭曰璋許氏謙曰圭之制其廣三寸其厚半寸其頭斜鋭寸半其長則天子尺有二寸公八寸侯伯七寸半圭曰璋言其廣之度也祭祀之禮王祼以圭瓚諸臣助之亞祼以璋瓚孔氏穎達曰冬官玉人云大璋中璋邊璋皆是璋瓚也郊特牲曰灌以圭璋故知璋為璋瓚祭統云君執圭瓚祼尸大宗伯執璋瓚亞祼是也天官小宰云凡祭祀贊祼將之事注云又從太宰助王然則太宰助王祼小宰又助之是助行祼事非獨一人故言諸臣左右奉之其判在內亦有趣向之意梁氏益曰判分也半也璋之為用酌酒祼獻其分判處分一半處皆朝向祼酒之人所謂其判在內也故以喻趣向之意峩峩盛壯也髦俊也集説曹氏粹中曰國之大事在祀與戎故二章言祀事三章言戎事輔氏廣曰此因首章所言而賦以足成其意俊髦之士至誠一意於奉璋助祭之時峩峩然無不得其所宜尤可見其趣向之意渒匹世反彼涇音經舟蒸徒楫音接叶籍入反之周王于邁六師及之集傳興也渒舟行貌涇水名王氏安石曰涇在周地興所見也蒸衆楫棹陸氏德明曰方言云楫謂之橈或謂之棹釋名云在旁撥水曰棹于往邁行也六師六軍也孔氏穎達曰瞻彼洛矣云以作六師常武云整我六師皆謂六軍為六師明此六師亦六軍也詩為大雅莫非王制詩人之作或以後事言之春秋之兵雖纍萬之衆皆稱師軍之言師乃是常稱言渒彼涇舟則舟中之人無不楫之周王于邁則六師之衆追而及之蓋衆歸其德不令而從也集説陳氏鵬飛曰周王有所行邁則六師汲汲然而及之不待戒命而至輔氏廣曰此章又見不徒奉璋助祭之士歸向之如此至於文王一有所往則六軍之衆亦必追而及之則人心之歸向又可見矣于邁謂有所征往也如伐崇與密須及戡黎之事皆是也助祭內事也于邁外事也或外或內而人心之歸向無異焉則文王之振作綱紀之道至矣故下兩章遂言之蔣氏悌生曰聖德為人所歸惟觀其衆志和一之心舟行於水彼此相須有不可相無之勢民歸於德君行師從有不能相離之理黃氏佐曰人心莫同於同舟共濟周王邁而六師及何以異此故以為興倬陟角反彼雲漢為章于天叶鐡因反周王壽考遐不作人集傳興也倬大也雲漢天河也在箕斗二星之間其長竟天爾雅箕斗之間漢津也邢氏昺曰劉炫謂是天漢即天河也章文章也文王九十七乃終故言壽考遐與何同朱子曰遐古注并諸家皆作逺字甚無道理禮記注訓胡字甚好作人謂變化鼓舞之也蘇氏轍曰鼓之舞之之謂作董氏逌曰遐不作人甚言其作也曹氏粹中曰作者鼓舞振動之意商之末世士氣卑弱甚矣非鼓舞振動之烏能自奮而有成哉集説陳氏鵬飛曰聖人久於其道而天下化成此夀考作人之謂也朱子曰倬彼雲漢則為章于天矣周王夀考則何不作人乎此等言語自有箇血脈流通處但涵詠久之自然見得條暢浹洽不必多引外來道理言語却壅滯了詩人活底意思也周王既是壽考豈不作成人材此事已是分明更著箇倬彼雲漢為章于天喚起來便愈見活發潑地此六義所謂興也凡言興者當以此例觀之輔氏廣曰此章方言人心之所以歸向於文王者文王能有以振作之故也作人非一日偶然之可為也必積纍漸漬之久乃底於成嚴氏粲曰雲漢倬然明大為文章于天矣文王自少至老所以興起人者多矣人心之善作之則興凡自暴自棄習俗益流於下者由上之人無以興起之耳故孟子曰待文王而後興者凡民也蓋人同此心心同此理非外立一道以強其所無特作而興之使之自不能已不知所以然而然如樂則生矣生則烏可已不知手之舞之足之蹈之也追對回反琢陟角反其章金玉其相勉勉我王綱紀四方集傳興也追雕也金曰雕玉曰琢相質也孔氏穎達曰二句相對章是成文則相是本質故相為質也勉勉猶言不已也黃氏佐曰勉勉即是敬兼內外言之凡網罟張之為綱理之為紀孔氏穎逹曰綱者網之大繩以舉綱能張網之目故張之為綱紀者别理絲縷故理之為紀追之琢之則所以美其文者至矣金之玉之則所以美其質者至矣勉勉我王則所以綱紀乎四方者至矣集説朱子詩傳遺説遐不作人却是説他鼓舞作興底事功夫細密處又在此一章如曰勉勉我王綱紀四方四方都便在他線索內牽著都動問勉勉即是純亦不已否曰然如追琢其章金玉其相是那功夫到後文章真箇是盛美資質真箇是堅實許氏謙曰言文王之德之純也文之見乎外者固若金玉之追琢質之存乎中則實金玉也表裏如一豈致飾於外而已故勉勉其德之我王能綱紀乎四方也朱氏公遷曰此以用心至極為興蓋追琢金玉是貴重乎物而用心致美之極勉勉不已是勤勞於事而用心致治之極總論王氏柏曰此詩文王得人之心如此之盛維持經理天下之功如此之大只收在一箇勉勉上勉勉即亹亹也朱氏公遷曰此亦以昭先王之德使人知周所以得天下之故也五章之序首以左右言次以六師言至作人綱紀則盡乎人矣人心所以歸之之故於此見矣棫朴五章章四句集傳此詩前三章言文王之德為人所歸後二章言文王之德有以振作綱紀天下之人而人歸之自此以下至假樂皆不知何人所作疑多出於周公也集説輔氏廣曰振作謂變化鼓舞之不容怠廢也綱紀謂統括維繫之不容渙散也此天下之人奉璋之士六軍之衆四方之民所以無不歸附趣向之也以芃芃棫朴薪之槱之興濟濟辟王左右趣之則但見其人心歸附趣向之而已初不見有能官人之意如序説也序蓋因二章髦士攸宜四章遐不作人之説而遂以為能官人而歐陽公又因序而足成其説却反失了詩之正意也瞻彼旱麓音鹿榛楛音戶濟濟子禮反豈弟君子干祿豈弟集傳興也旱山名嚴氏粲曰毛氏以旱為山名不知山之所在或取漢地理志漢中郡南鄭縣之旱山以實之詩人託興皆取其在境內者何獨逺取漢中之旱山乎闕其所不知可也麓山足也許氏慎曰林屬於山為麓榛似栗而小楛似荆而赤曹氏粹中曰楛可以為箭濟濟衆多也豈弟樂易也君子指文王也此亦以詠歌文王之德言旱山之麓則榛楛濟濟然矣豈弟君子則其干祿也豈弟矣干祿豈弟言其干祿之有道猶曰其爭也君子云爾集説程子曰高峻非生物之所麓乃百物所聚生也瞻彼旱麓之榛楛草木得麓之氣濟濟茂盛興君子豈弟之道所以興盛受福也嚴氏粲曰豈弟者德盛仁熟和順充積之謂也干祿非文王之心詩人言干祿者謂在我有以致之猶曰自求多福耳非有心求之也朱氏公遷曰此皆莫之致而至者故以自然之理為興旱麓無意於榛楛而榛楛自生之以其地之美也君子無意於福祿而福祿自歸之以其德之盛也瑟所乙反彼玉瓚才旱反黃流在中豈弟君子福祿攸降叶乎攻反集傳興也瑟縝密貌玉瓚圭瓚也以圭為柄黃金為勺青金為外而朱其中也孔氏穎達曰圭以玉為之指其體謂之玉瓚據成器謂之圭瓚冬官玉人云祼圭尺有二寸有瓚以祀宗廟春官典瑞注引漢禮瓚槃大五升口徑八寸下有槃口徑一尺則瓚如勺為槃以承之也黃流鬱鬯也釀秬黍為酒築鬱金煮而和之使芬芳條鬯以瓚酌而祼之也孔氏穎達曰秬黑黍一秠二米者也秬鬯者釀秬為酒以鬱金之草和之草名鬱金則黃如金色酒在器流動故謂之黃流攸所降下也言瑟然之玉瓚則必有黃流在其中豈弟之君子則必有福祿下其躬明寶器不薦於褻味而黃流不注於瓦缶則知盛德必享於祿夀而福澤不降於淫人矣集説輔氏廣曰此又承上章豈弟君子則福祿自然降下其躬蓋亦不待乎求之之意真氏德秀曰玉瓚至寶也黃流至潔也夫必至寶之器而後能受至潔之物嚴氏粲曰言盛德必得其福以類應也鳶弋專反飛戾天叶鐵因反魚躍于淵叶一均反豈弟君子遐不作人集傳興也鳶鴟類戾至也李氏曰抱朴子曰鳶之在下無力及至乎上聳身直翅而已蓋鳶之飛全不用力亦如魚躍怡然自得而不知其所以然也朱氏公遷曰此可以見鳶魚飛躍對言之故遐何通言鳶之飛則戾于天矣魚之躍則出于淵矣豈弟君子而何不作人乎言其必作人也程子曰作興起之於善也集説謝氏良佐曰鳶飛戾天魚躍于淵猶韓愈謂魚川泳而鳥雲飛上下各得其所也詩人言如此氣象周家作人似之嚴氏粲曰鳶飛魚躍言天壤之內莫不自得其性而不知所以然也豈弟文王遐不作人乎言有以興起之而使之不自已也作之以豈弟是性天感發之妙自有手舞足蹈而不自知者惟久於其道者能之非意氣鼓舞於一時之暫也朱氏善曰物之囿於氣者有自然之機人之囿於德者有自然之化清酒既載叶節力反騂息營反牡既備叶蒲北反以享以祀叶逸織反以介景福叶筆力反集傳賦也載在尊也備全具也承上章言有豈弟之德則祭必受福也集説李氏樗曰以清酒則載之於器以赤色之牡則既備言享祀祖考而受此福也豈以清酒騂牡之故而得之哉古人奉牲以告曰博碩肥腯謂民力之普存也謂其畜之碩大蕃滋也謂其不疾瘯蠡也謂其備腯咸有也奉酒醴以告曰嘉栗旨酒謂其上下皆有嘉德而無違心也所謂馨香無讒慝也如此則神降之以福朱氏公遷曰德有以及乎人斯有以感乎神矣故其受福之必然如此瑟彼柞棫民所燎力召反矣豈弟君子神所勞力報反矣集傳興也瑟茂密貌劉氏瑾曰上章玉瓚故言縝密此章柞棫故言茂密燎爨也或曰熂燎除其旁草使木茂也陸氏德明曰芟草燒之曰熂嚴氏粲曰箋以為柞棫所以茂者乃人熂燎除其旁草養治之使無害也不若以為民取以供燎不費詞也勞慰撫也朱氏道行曰上介福就祭時言此勞就平日言集説輔氏廣曰此又承上章而言豈弟君子必為神所慰撫則祭必受福亦其宜也黃氏佐曰柞棫非美材也然瑟然茂密則亦為民之所燎況豈弟盛德也通於神明格於上下豈不為神所勞乎章氏甫曰神所勞者聖人之德與鬼神合其吉凶故白天祐之吉無不利也大戴禮云德盛者神歆莫莫葛藟力軌反施以豉反于條枚莫回反豈弟君子求福不回集傳興也莫莫盛貌回邪也集説朱氏公遷曰葛盛則自施于條枚德盛則自享乎福祿文王之福豈回邪要求而得之哉以足首章干祿豈弟之意起興亦與首章同黃氏佐曰求福不回就求福本於豈弟上見德在是而福亦在是耳易曰受兹介福以中正也總論朱氏公遷曰首末兩章見其自然受福二章至五章見其必然受福鄒氏泉曰此詩見文王之盛德上有以得天下有以得人而幽有以格神張子所謂至當之謂德百順之為福詩人之詠歌義兼之矣旱麓六章章四句集説唐氏汝諤曰棫朴言人心之自趣而此詩言天心之自福無非見其德之盛也思齊側皆反大音泰任文王之母莫後反思媚美記反周薑京室之婦房九反大同上姒嗣徽音則百斯男叶尼心反集傳賦也思語辭齊莊媚愛也周薑大王之妃大薑也京周也大姒文王之妃也徽美也百男舉成數而言其多也朱子曰案春秋傳云管蔡郕霍魯衛毛聃郜雍曹滕畢原豐郇文之昭也并伯邑考武王十八人然此特其見於書傳者耳亦可見其多也此詩亦歌文王之德而推本言之曰此莊敬之大任乃文王之母實能媚於周薑而稱其為周室之婦至於大姒又能繼其美德之音而子孫衆多上有聖母所以成之者遠內有賢妃所以助之者深也集説孔氏穎達曰大任能上慕先姑之所行下為子婦之所續是其德行純備故生聖子是文王所以聖也王氏安石曰齊者母道也媚者婦道也為人母盡母道為人婦盡婦道者大任也歐陽氏修曰大姒每思慕任薑而繼其美聲有不妬忌之賢而子孫衆多李氏樗曰以大任而能愛大薑以大姒而又能嗣大任之徽音則周之賢妃可謂世不乏人矣此周之所以興也王氏炎曰嗣徽音雖大姒之賢非文王有以儀刑之豈能全此婦德之懿乎故下章言其儀刑之德也蔣氏悌生曰此詩推聖德之由開於前而裕於後內助之賢世濟其美其所成就者深遠有非人之所能及也夫妻道無成雖無専美之義而正始之道實為風化之原由大薑而及大任由大任而及大姒而又得邑薑所以紹前美而昌厥後者自生民以來帝王之興世有賢助未有若周家之盛者也惠于宗公神罔時怨神罔時恫音通刑于寡妻至于兄弟以御牙嫁反于家邦叶卜工反集傳賦也惠順也宗公宗廟先公也張子曰未追王故稱公恫痛也刑儀法也寡妻猶言寡小君也御迎也孔氏穎達曰御毛讀為迓訓為迎鄭讀為馭訓為治王氏逄曰此從毛傳孟子注與鄭箋同言文王順于先公而鬼神歆之無怨恫者其儀法內施于閨門而至于兄弟以御于家邦也孔子曰家齊而后國治孟子曰言舉斯心加諸彼而已張氏栻曰文王之刑寡妻至兄弟御家邦亦舉斯心加諸彼而已蓋無非是心之所存也聖人雖無事乎推然其自身以及家自家以及國亦固有序矣張子曰言接神人各得其道也朱氏善曰誠以事神而神無不格誠以治人而人罔不孚此所謂接神人各得其道也集説歐陽氏修曰毫髮不愧於隱微然後近者孚故神罔時怨神罔時恫始可以刑于寡妻輔氏廣曰此言文王之德足以和神人治家國以足前章之意其序則先尊而後卑先親而後疏也嚴氏粲曰文王以昭事神明之德推之齊家治國隱微之間一毫無愧故能施儀法于妻至于兄弟即是家推之以治于家邦言由家以及國同此一理之推也沈氏守正曰神之怨恫微而難知曰罔是怨恫非仁孝通於志意者不能也雍雍於容反在宮肅肅在廟叶音貌不顯亦臨無射音亦亦保叶音鮑集傳賦也雍雍和之至也肅肅敬之至也朱氏善曰和之至所以為治人之本敬之至所以為事神之本不顯幽隱之處也射與斁同厭也嚴氏粲曰無射如孔子云學不厭如董仲舒云復而不厭之謂道言安行之久也保守也言文王在閨門之內則極其和在宗廟之中則極其敬雖居幽隱亦常若有臨之者雖無厭射亦常有所守焉其純亦不已蓋如是集説李氏樗曰詩人之意以謂文王之德外內顯隱如一也朱子曰觀文王雍雍在宫肅肅在廟不顯亦臨無射亦保便可見敬只是如此呂氏祖謙曰聖人神人之主也如前章所載神人孚格可謂得為主之道矣欲求所以孚格者當於此章觀之嚴氏粲曰此章言純亦不已也文王之誠一也在宮則和在廟則敬隨所寓而形見也不顯之處人所不見而亦若有所臨洋洋乎如在其上也無厭之時踐履已熟而亦自保守悠久無間也蔣氏悌生曰德施於人神之交可見之地而各極其美德存於獨處之地不可見之時而常有其誠德之著乎外者隨其地誠之存於中者純乎天德形於接物之時盡和敬之道德存於無為之頃有純一之誠聖人於內外動靜之間始終一於敬而已案集傳於在宮言其和於在廟言其敬照詩義分屬而平日論此章則専歸於敬蓋緝熙敬止是文德之全體和亦從敬中流出用分而體一也肆戎疾不殄烈假古雅反不瑕不聞亦式不諫亦入此與下章用韻未詳集傳賦也肆故今也戎大也疾猶難也大難如羑里之囚及昆夷玁狁之屬也殄絶烈光假大瑕過也此兩句與不殄厥慍不隕厥問相表裏聞前聞也式法也承上章言文王之德如此故其大難雖不殄絶而光大亦無玷缺呂氏祖謙曰文王之德如上章所陳故雖遭大難而不失其聖光大而不可毁缺也雖事之無所前聞者而亦無不合於法度雖無諫諍之者而亦未嘗不入於善傳所謂性與天合是也集説孔氏穎達曰文王聖德生知無假學習不聞人之道説亦自合於法不待臣之諫諍亦自入於道言其動應規矩性與天合輔氏廣曰大難之來雖聖人有所不能免特處之有道耳故言其大難雖不能殄絶之而使無而在我光大之德終無瑕玷焉此樂天之事非聖人不能也不聞亦式不諫亦入所謂不思不勉從容中道文王之德至是則無以復加矣肆成人有德小子有造古之人無斁音亦譽髦斯士集傳賦也冠以上為成人小子童子也造為也孔氏穎達曰有為者謂所習有業不虛廢也古之人指文王也呂氏祖謙曰典謨作於虞夏其稱堯舜禹皋陶已曰稽古則以文王為古之人復何疑哉譽名髦俊也承上章言文王之德見於事者如此故一時人材皆得其所成就蓋由其德純而不已故令此士皆有譽於天下而成其俊乂之美也朱氏公遷曰譽髦即指有德有造言斯士即指成人小子言集説王氏安石曰初言大姒則化成乎內也終言譽髦斯士則化成乎天下也呂氏祖謙曰聖人流澤萬世者莫大於作人故此詩以是終焉輔氏廣曰此章則遂言其德盛而無斁故天下人才無小無大皆有所觀感而蒙其成就是以令其為士者得其名譽於天下而成其俊乂之美也以上三詩皆言文王之德之盛而皆及於作成人才之事以是觀之則聖人之德必見於作成一世之人才者然後為至在易觀卦曰觀我生君子無咎象曰觀我生觀民也意蓋如此嚴氏粲曰言至誠為能化也朱氏公遷曰聖人德盛如此天下涵泳於教化中大以成大小以成小則所以譽髦之者至矣然不易致也必久於其道而後化成彼乍作乍輟者其能與於斯乎總論陳氏櫟曰文王之聖生之者聖母助之者賢妃然文王固不能不資助於大姒而實能修身以刑于寡妻三四章皆言修身事也末章則不特成已而且能成物矣薛氏瑄曰思齊一詩修身齊家治國平天下之道備焉思齊五章二章章六句三章章四句集説輔氏廣曰此詩毛傳以為四章章六句故言以為五章後三章章四句今從故言者以四章五章兩章章首皆有一肆字而四章又有四箇不字其章義又必如此而後宜故也蓋緣後二章不用韻故毛傳誤分之耳皇矣上帝臨下有赫叶黑各反監觀四方求民之莫維此二國其政不獲叶胡郭反維彼四國爰究爰度待洛反上帝耆之憎其式廓乃眷西顧此維與宅叶達各反集傳賦也皇大臨視也赫威明也監亦視也莫定也二國夏商也黃氏佐曰大王當祖甲之時殷政漸衰故云然不獲謂失其道也四國四方之國也究尋度謀也耆憎式廓未詳其義或曰耆致也程子曰頌云耆定爾功毛氏傳曰耆致也朱氏公遷曰致猶取也言其德為上帝之所取也憎當作增式廓猶言規模也輔氏廣曰式如式樣之式廓如匡廓之廓此謂岐周之地也此詩敘大王大伯王季之德以及文王伐密伐崇之事也此其首章先言天之臨下甚明但求民之安定而已彼夏商之政既不得矣故求於四方之國苟上帝之所欲致者則增大其疆境之規模於是乃眷然顧視西土以此岐周之地與大王為居宅也集説程子曰此泛言天佑下民作之君長使得安定也天維求民所定故君不善則絶之如彼夏商二國不得其政則於四方之國求謀有德之君使王天下焉上帝耆之謂天命所歸式廓猶云規模範圍也天命所致則增大其規限自諸侯而天子由百里而四海是增而大之也范氏處義曰大哉天之主宰天下其照臨之威可謂赫然而明矣察視四方求民之所定以夏政不獲於天則以與商商政不獲於天則以與周所謂天難忱命靡常也蔣氏悌生曰言天心惓惓於求民之安屑屑焉為民而擇君其事甚明而可畏大王之遷岐以興王業皆天所為而非人所及也朱氏善曰臨下有赫言其威命之顯也求民之莫言其主宰之公也彼夏商失道天之絶之也久矣故求之四方之國其未得之也則於是而尋究之於是而謀度之其既得之也復於是而耆定之於是而增大之然則天豈私我有周哉其眷周也即所以求民之安定也徐氏鳯彩曰大王之時去桀已遠而紂猶未生曰夏商者以見周之先公久矣屬天之眷也案序皇矣美周也天監代殷莫若周周世世修德莫若文王朱子於此序無異議但毛傳二國是殷夏四國是四方鄭箋則以二國謂殷紂及崇侯四國謂密阮徂共也至憎其式廓謂憎其為惡浸大此維與宅謂指文王則毛鄭解同既以為指文王故二章之天立厥配謂為大姒三章之作邦作對謂天之興周國而生明君自大伯王季時已然矣其説亦可通漢唐宋諸儒率從之至朱子而謂此維與宅指大王蓋天作高山大王荒之已見於頌不得言文王故二國四國從毛義而首章二章皆屬大王厥配亦屬大薑明自大王已膺天眷義尤完備至憎作增從程子之説於詩解更為直捷集傳之勝於傳箋多類此也作之屏必領反之其災莊持反其翳一計反修之平之其灌其栵音例啓之辟婢亦反之其柳丑貞反其椐羌居反叶紀庶反攘之剔它歷反之其檿烏劒反其柘章夜反叶都故反帝遷明德串古患反夷載路天立厥配受命既固集傳賦也作拔起也屏去之也災木立死者也翳自斃者也孔氏穎逹曰立死之木妨他木生長為木之害故曰災生木自倒枝葉覆地為蔭翳故曰翳或曰小木蒙密蔽翳者也修平皆治之使疏密正直得宜也灌叢生者也栵行生者也啓辟芟除也柳河桞也似楊赤色生河邉陸氏璣曰一名雨師枝葉似松椐匱音匱也腫節似扶老可為杖者也陸氏璣曰即今靈夀是也攘剔謂穿剔去其繁冗使成長也檿山桑也與柘皆美材可為弓幹又可蠶也考工記弓人取幹柘為上檿桑次之嚴氏粲曰禹貢青州厥篚檿絲注云檿桑蠶絲中琴瑟弦明德謂明德之君即大王也串夷載路未詳或曰串夷即混夷載路謂滿路而去所謂混夷駾矣者也配賢妃也謂大薑此章言大王遷於岐周之事蓋岐周之地本皆山林險阻無人之境而近於昆夷大王居之人物漸盛然後漸次開闢如此歐陽氏修曰此章本周作宅之始岐周之民樂就有德皆共刋除樹木而營理邑居乃上帝遷此明德之君使居其地而昆夷遠遁天又為之立賢妃以助之是以受命堅固而卒成王業也集説輔氏廣曰首八句人事也後四句天命也由天命時故人事應由人事治故天命從也災翳則因其死斃而拔去之灌栵則因其叢列而修治之柳椐凡木則芟除之檿柘美材則攘剔之蓋皆順理而為之舉此開辟林木一事言之則餘可知矣嚴氏粲曰大王之遷岐天非徒遷之也將使周家王天下其受命堅固不易也蓋曰大王之時天命已定周之當王也久矣彭氏執中曰大王之遷從之者如歸市非人之所能為也必有主宰之者故詩人託辭以為帝遷之帝遷之則天命之蓋帝所以主宰乎天者也書言昭受上帝而後言天其申命用休言帝休而後言天乃大命文王皆此類也帝省息井反其山柞棫斯拔蒲貝反松柏斯兌徒外反帝作邦作對自大音泰伯王季維此王季因心則友叶羽已反則友其兄叶虛王反則篤其慶叶袪羊反載錫之光受祿無喪息浪反叶平聲奄有四方集傳賦也拔兌見綿篇此亦言其山林之間道路通也對猶當也作對言擇其可當此國者以君之也大伯大王之長子王季大王之少子也因心非勉強也李氏樗曰孝悌之道豈可以偽為哉因其心而然耳孩提之童無不知愛其親長而無不知敬其兄本於良知良能豈非因心而然哉善兄弟曰友兄謂大伯也篤厚載則也奄字之義在忽遂之間言帝省其山而見其木拔道通則知民之歸之者益衆矣於是既作之邦又與之賢君以嗣其業蓋自其初生大伯王季之時而已定矣於是大伯見王季生文王又知天命之有在故適吳不反大王沒而國傳於王季及文王而周道大興也然以大伯而避王季則王季疑於不友故又特言王季所以友其兄者乃因其心之自然而無待於勉強既受大伯之讓則益修其德以厚周家之慶而與其兄以讓德之光猶曰彰其知人之明不為徒讓耳彭氏執中曰大伯以天下讓王季乃能修其德而有以篤其慶使大伯讓國之美赫然光顯於後世者王季與之也其德如是故能受天祿而不失至於文武而奄有四方也集説孔氏穎逹曰傳以言周世世修德須論王季而已今并言大伯謂見其生聖子而讓之故王季得為君而修德是以本之於大伯也王肅曰大伯見王季之生文王知其天命之必在王季故去而適吳大王沒而不返而後國讓於王季周道大興也大伯以王季為賢故讓之若王季不賢則讓功不顯由王季能稱大伯之心見大伯為知人達命使傳之後世共稱誦之此亦其王季之德故説王季之美言其能明大伯也朱子曰大王欲立賢子聖孫為其道足以濟天下而非有愛憎之間利欲之私也是以大伯去之而不為狷王季受之而不為貪蓋處君臣父子之變而不失乎中庸此所以為至德也黃氏幹曰大伯知王季之後又有文王之聖必能基成王業從而讓之亦大王之志也是大伯之讓上以繼大王之志下以成王季之業無非為天下之公而不為一之身之私也真氏德秀曰王季之友大伯蓋其因心本然非以其遜已而後友之使大伯未嘗有遜國之事王季所以友之者亦若是而已嚴氏粲曰天省視岐山之地柞棫拔而松柏兌則氣象蔥鬱而都邑成矣天作邦於此謂興周使為王國也作對於此謂生文王以配天也此作邦作對由於大王王季之時蓋大伯遜於王季而後文王起也朱氏善曰王業之成雖在於武王得天下之時而天命之定已見於大伯讓王季之日大伯讓焉而無迹王季受之而無愧此王業之所由基也文王創造於前武王繼績於後此王業之所由成也大伯當立而不立文王可為而不為故皆謂之至德非王季之友無以成大伯之志非武王之孝無以成文王之功武王之孝易知也王季之友難知也此詩人所以再三歎詠於王季也維此王季帝度待洛反其心貊武伯反其德音其德克明克明克類克長丁丈反克君王如字或于況反此大邦克順克比必里反比毗至反于文王其德靡悔叶虎洧反既受帝祉音恥施以豉反于孫子叶奬里反集傳賦也度能度物制義也貃春秋傳樂記皆作莫謂其莫然清靜也克明能察是非也克類能分善惡也克長教誨不倦也克君賞慶刑威也言其賞不僭故人以為慶刑不濫故人以為威也順慈和遍服也比上下相親也比于至于也悔遺恨也言上帝制王季之心使有尺寸能度義朱子曰猶言天誘其衷使能制義也輔氏廣曰孟子曰權然後知輕重度然後知長短物皆然心為甚先生解以為人心有本然之權度者蓋謂是也又清靜其德音使無非間之言是以王季之德能此六者孔氏穎達曰王季君其國耳以其追號為王故以王言之至於文王而其德尤無遺恨是以既受上帝之福而延及于子孫也集説鄭氏樵曰能為人之長能為人之君故使之王此大邦又能惠順親比其民人也王季本非當立其立者天也嚴氏粲曰明類是一意長君是一意順比是一意類者明之充君者長之推比者順之積也克明謂知此理克類謂觸類而通克長能為人長克君能為人君君又尊於長矣學記能為長然後能為君是也克順能和其民克比能親其民順言不擾比則歡然相愛矣比及文王其德無有可悔人有過則悔恨靡悔則無過從容中道無毫髮之歉也言王季之德傳於文王而益盛也朱氏善曰此章専美王季之德故言之特詳至於文王則但言其德之靡悔而已然謂之靡悔則其德之純一無間亦可見矣惟其德之無間是以其福之無窮也何氏楷曰王此大邦是據理之詞言王季之克長克君如此雖進而興王業於此大邦之地無所難者帝謂文王無然畔援于願反無然歆羡餞面反誕先登于岸叶魚戰反密人不恭敢距大邦叶卜攻反侵阮魚宛反徂共音恭王赫斯怒叶暖五反爰整其旅以按音遏徂旅以篤于周祜候五反以對于天下叶後五反集傳賦也帝謂文王設為天命文王之詞如下所言也朱子曰天豈諄諄然命之只是文王要恁地便是理合恁地便是天命之也嚴氏粲曰天不言以意謂之也必託之帝謂者言文王之心天實知之也無然猶言不可如此也畔離畔也援攀援也言舍此而取彼也歆欲之動也羡愛慕也言肆情以徇物也朱氏善曰畔者疏而離之援者親而附之也歆者欲之動乎中羡者心之慕乎外也岸道之極至處也密密須氏也姞姓之國梁氏益曰密須子爵商侯國世本云商有密須文王伐之在今寧州阮國名在今涇州皇輿表寧州今平涼府靜寧州涇州今平涼府涇州並隸陜西徂往也共阮國之地名今涇州之共池是也張子曰共阮皆在涇州今有共池即共也梁氏益曰虞公所奔之共池其旅周師也按遏也徂旅密師之往共者也祜福對答也人心有所畔援有所歆羡則溺於人欲之流而不能以自濟朱氏公遷曰曰溺曰流曰濟皆與經文登岸相應文王無是二者故獨能先知先覺以造道之極至蓋天實命之而非人力之所及也彭氏執中曰無畔援則中正而不溺於私無歆羡則剛大而不溺於欲故能造道之極也是以密人不恭敢違其命而擅興師旅以侵阮而往至于共則赫怒整兵而往遏其衆以厚周家之福而答天下之心蓋亦因其可怒而怒之初未嘗有所畔援歆羡也王氏安石曰有所畔援歆羡不得其欲而怒則其怒也私而已文王之怒是乃與民同怒而異乎人之私怒也此文王征伐之始也集説呂氏大臨曰文王以無心得天下雖赫怒用師皆出於無心也畔援歆羡皆有心者也朱子曰此詩稱文王德處是從無然畔援無然歆羡上説起後面却又説不識不知順帝之則見得文王先有這功夫此心無一毫之私故見於伐崇伐密皆是道理合著恁地初非聖人之私怒也周人詠文王伐崇伐密事皆以帝謂文王言之若曰此蓋天意云耳文王既戡黎又伐崇伐密已做得事勢如此只是尚不肯伐紂故曰至德輔氏廣曰人心一有畔援歆羡則流於私欲凡所云為必不能先知先覺又焉能有所濟乎況於用兵行師之際情欲易縱之時而二病不去幾何而不流於窮黷也哉故此章將言文王之征伐而先言文王之無此病也誕先登于岸以涉水為譬也嚴氏粲曰商政不綱天下之望在周矣所救者一阮而為亂者懼小國皆安故天下之心以慰也朱氏善曰密之敢距大邦不知事大之禮侵阮徂共不知恤小之義此天理所當怒而王法所當誅也依其在京叶居良反侵自阮疆陟我高岡無矢我陵我陵我阿無飲我泉我泉我池叶徒何反度待洛反其鮮息淺反原居岐之陽在渭之將萬邦之方下民之王集傳賦也依安貌京周京也矢陳鮮善將側方鄉也孔氏穎達曰鄉人嚮望之也言文王安然在周之京而所整之兵既遏密人遂從阮疆而出以侵密嚴氏粲曰侵自阮疆謂自阮疆而侵密猶春秋書公至自晉謂自晉而至魯也胡氏一桂曰侵與侵于之疆同義所陟之岡即為我岡而人無敢陳兵於陵飲水於泉以拒我也於是相其高原而徙都焉所謂程邑也鄭氏康成曰後竟徙都於豐孔氏穎達曰大王初遷已在岐山此亦在岐山之陽是去舊都不遠也周書稱文王在程作程寤程典皇甫謐云文王徙宅於程蓋謂此也箋嫌此即為豐故云後竟徙都於豐知非豐者以此居岐之陽豐則岐之東南三百里耳胡氏一桂曰度其鮮原以下即上章以篤周祜以對天下之實事耳其地於漢為扶風安陵梁氏益曰今咸陽故安陵城周邑也地志安陵隸扶風在岐南今在京兆府咸陽縣皇輿表今西安府咸陽縣隸陜西集説歐陽氏修曰言周師先據勝地然後侵之而密人不敢有其岡陵水泉密人既服外患已除乃度善原於岐渭之間以定周國輔氏廣曰文王之兵侵密乃遽曰我陵我阿我泉我池無敢陳其兵飲其水者辭直理正威靈氣焰莫有敵者所謂帝王之道出萬全者也嚴氏粲曰自阮疆以侵密密在寧州阮在涇州涇寧接壤也下所言髙岡陵阿泉池皆師行所經之地密人恃強以侵弱文王興問罪之師可謂公天下以為心矣豈有一毫畔援歆羡之私耶文王用心廣大威德暢洽人之歸者益衆非舊邑所能容於是就周境之內謀度鮮善之平原而徙都之雖未為君師天下已心歸之矣伐崇有訊馘伐肆之事而伐密止述問罪之辭是師次其境而密人即服不待戰也劉氏瑾曰文王伐密之後而作程邑亦猶伐崇之後而作豐邑方其伐之討罪而已固未嘗先有作邑之心也自常情觀之必謂貪其土地矣詩人知其心之無私故言伐密伐崇之事皆先以帝命發之蔣氏悌生曰文王處於周京之中安然無為而共阮之地來歸自有不可遏之勢程邑作於岐陽之側本有疆境之限而萬邦歸向同有不自外之心非聖人之德何以致之帝謂文王豫懷明德不大聲以色不長丁丈反夏以革不識不知順帝之則帝謂文王詢爾仇方同爾兄弟以爾鉤援音爰與爾臨衝以伐崇墉集傳賦也豫設為上帝之自稱也懷眷念也明德文王之明德也以猶與也夏革未詳呂氏祖謙曰不長夏以革雖難強通然與不大聲以色立文既同訓詁亦當相類聲以色謂聲音與笑貌也夏以革謂侈大與變革也不大聲以色則不事外飾矣不長夏以革則不縱私意矣此明德之實也則法也仇方讐國也呂氏祖謙曰邱氏曰仇方即崇也兄弟與國也彭氏執中曰以諸侯之國為兄弟亦未嘗稱王一驗也鉤援鉤梯也所以鉤引上城所謂雲梯者也孔氏頴達曰墨子稱公輸般作雲梯以攻宋臨臨車也在上臨下者也衝衝車也從旁衝突者也皆攻城之具也孔氏穎逹曰兵書有作臨車衝車之法墨子有備衝之篇知臨衝俱是車也崇國名在今京兆府鄠縣皇輿表今西安府鄠縣隸陜西墉城也史記崇侯虎譖西伯於紂紂囚西伯於羑里西伯之臣閎夭之徒求美女竒物善馬以獻紂紂乃赦西伯賜之弓矢鈇鉞得專征伐曰譖西伯者崇侯虎也西伯歸三年伐崇侯虎而作豐邑言上帝眷念文王而言其德之深微不暴著其形迹劉氏瑾曰明德者文王之德所得乎天之本體也不大不長者文王之心不暴其德之形迹也朱氏公遷曰朱子以不大聲色不長夏革為一類皆有深潛不露之意猶中庸不顯篤恭之妙也又能不作聰明以循天理嚴氏粲曰不識不知不作聰明也天理自然謂之則謂理之不可踰也故又命之以伐崇也呂氏曰此言文王德不形而功無迹與天同體而已雖興兵以伐崇莫非順帝之則而非我也集説程子曰聖人之誠感無不通故所過者化所存者神豈暴著其形迹也哉文王之化如此而天下有昏惡之甚不能化者謀而伐之則天下皆善而王業成蘇氏轍曰文王之德不以識識不以智知漠然無心而與天為徒故無內外之異無窮逹之變此天之所以歸之也輔氏廣曰文王之明德上則與天為一下則三分天下有其二可謂至矣然未嘗暴著於聲色之間其所云為但不識不知順帝之則而已此天所以又命之使伐仇方也夫文王之以崇為仇蓋亦天理之當然也嚴氏粲曰此章言文王之心純乎天理非有私喜怒為伐崇張本也崇侯譖文王而文王伐之疑於報私怨者然虎倡紂為不道乃天人所共怒文王奉天討罪何容心哉故此章亦設為帝謂之辭以發明文王之心由此心純乎天理故喜怒皆與天合所仇者非私怨所同者非苟合也朱氏公遷曰上章帝謂文王是設為上帝教戒之詞此章帝謂文王則設為上帝愛念而稱美之詞也語意不同臨衝間間叶胡員反崇墉言言執訊音信連連攸馘古獲反安安叶於肩反是類是禡馬嫁反叶滿補反是致是附叶上聲四方以無侮臨衝茀茀音弗叶分聿反崇墉仡仡魚乞反是伐是肆是絶是忽叶虛屈反四方以無拂叶分聿反集傳賦也間間徐緩也言言高大也連連屬續狀馘割耳也軍法獲者不服則殺而獻其左耳孔氏頴逹曰玉藻云聽嚮任左故不服者殺而獻其左耳曰馘罪其不聼命服罪故取其耳以計功也安安不輕暴也類將出師祭上帝也孔氏穎逹曰王制言類乎上帝則類祭祭天也祭天而謂之類者尚書夏侯歐陽説以事類祭之在南方就南郊祭之也禡至所征之地而祭始造軍法者謂黃帝及蚩尤也章氏俊卿曰漢書稱髙祖祠黃帝蚩尤於沛庭管仲稱蚩尤作劒戟史記稱黃帝與蚩尤戰於阪泉豈軍法之興始於此故後世祭之歟致致其至也附使之來附也茀茀強盛貌仡仡堅壯貌肆縱兵也忽滅拂戾也春秋傳曰文王伐崇三旬不降退修教而復伐之因壘而降孔氏穎逹曰僖十九年左傳云因壘而降則似兵合不戰此言訊馘必嘗戰矣蓋知戰不敵然後乃降言文王伐崇之初緩攻徐戰告祀羣神程子曰暴明其罪告之神明其伐合神明之道也以致附來者而四方無不畏服及終不服則縱兵以滅之而四方無不順從也夫始攻之緩戰之徐也非力不足也非示之弱也將以致附而全之也劉氏瑾曰此其三旬不降之時乎及其終不下而肆之也則天誅不可以留而罪人不可以不得故也劉氏瑾曰此其復伐之日乎此所謂文王之師也朱子曰皆城下之戰也集説歐陽氏修曰言周師攻具之盛而崇城高大難攻而周師執生獻馘禱兵而伐之遂以伐崇而威德加於四方無敢侮戾者言天下之心遂歸周也一侵一伐未必能使天下皆歸詩人上述伐崇皆先言帝謂者古人舉事必稱天於興師討伐尤託天命如天討有罪肅將天威恭行天罰之類是也侵密而外患息乃定邑居伐崇而威德著則四方皆服詩人雖推大祖宗之功務極其美然功業大小次第先後亦自有倫也程子曰文王之征始於密王功之始也終於崇天下遂無不服王功之成也李氏樗曰文王之所伐者但崇國耳而四方之國無有侮慢拂戾之者以文王之罰當其罪故也輔氏廣曰是致是附仁也是絶是忽義也仁以附之天下畏之而不敢侮仁之至也義以絶之天下從之而不敢拂義之至也非文王與天同德者其孰能之蔣氏悌生曰王者之行師雖有先後緩急之序而遠人之歸德初無彼此遠近之異也黃氏佐曰兩設帝謂文王之語為伐密伐崇張本見文王伐密非有欲心所以行之者乃事理之至極也其伐崇也非欲張其聲威氣焰所以處之者皆天理之自然也嗚呼非周公言之孰知文王奉天不已之心乎瞿氏景淳曰無侮謂王師不暴人皆畏服而無敢為應援之舉無拂謂王師無敵人皆順從而無敢有疑二之心總論徐氏常吉曰各章俱以帝言見周之所以受命興王者一本於天非人力也錢氏天錫曰大王遷岐疑於畏狄不知眷西與宅天固與以安民之地也王季受讓疑於不友不知篤慶順比天固授以安民之任也文王伐崇伐密疑於自私不知以對天下以順四方此孰非求民之莫也皇矣八章章十二句集傳一章二章言天命大王嚴氏粲曰首章言天初眷大王之意次章述大王遷岐也劉氏瑾曰兩章稱帝者三稱天者一可見天之所以命大王者矣蓋其始去邠則邠人從之其居於岐則四方歸之民之歸往如此即大王已受天命矣然而求大王之所以得乎天者則以帝遷明德而然也三章四章言天命王季嚴氏粲曰三章述大伯王季相遜之事為文王張本四章則述王季之德以及文王也劉氏瑾曰三四章言帝者四可見天之命王季者矣然而王季之所以得乎天者則以其德克明而然也五章六章言天命文王伐密七章八章言天命文王伐崇劉氏瑾曰五章至八章言帝者四而帝之所以命文王者唯拳拳於武功求其所以然者則又以帝之懷其明德也唯其祖父子孫相傳一德是以天之眷命有加而無替及至商罪貫盈而天又命武王誅之天豈私於有周也哉集説范氏處義曰此詩與綿相類綿言大王者詳言文王者略蓋詳其始而略其終也此詩首言天之眷周次言大王治岐次言大伯王季友愛之德次言文王加詳焉蓋略其始而詳其終也朱子詩傳遺説詩自從大王王季説來如云至于大王實始翦商如下武之詩文王有聲之詩都説文王出做事且如伐崇一節是做甚麼這又不是一項小小侵掠乃是大征伐詢爾仇方同爾兄弟以爾鉤援與爾臨衝以伐崇墉此見大段動衆岐山之下與崇相去自是多少里因甚如此這般處要做文王無意出做事都不得又如説侵自阮疆陟我髙岡無矢我陵我陵我阿無飲我泉我泉我池這看見都自據有其土地這自是大段施張了或云紂命文王得専征伐紂不得已命之文王不得已受之橫渠云不以聲色為政不以革命有中國默順帝則而天下歸焉其為文王乎若如此説恰似內無純臣之義外亦不屬於商這也未必如此只是事勢自是不可已只當商之季七顛八倒上下崩頺忽於岐山下突出許多人也是誰當得文王之事惟孟子識之故七篇之中所以告列國之君莫非勉之以王道經始靈臺叶田飴反經之營之庶民攻之不曰成之經始勿亟居力反庶民子來叶六直反集傳賦也經度也靈臺文王所作謂之靈者言其倐然而成如神靈之所為也服氏虔曰天子曰靈臺諸侯曰觀臺劉氏瑾曰文王之臺其名如此豈至周有天下遂以為天子之臺而諸侯别名觀臺也歟營表鄭氏康成曰營表其位孔氏穎逹曰謂以繩度立表以定其位處也攻作也不日不終日也亟急也國之有臺所以望氛祲察災祥時觀遊節勞佚也劉氏瑾曰韻注氛祥氣祲妖氣蓋察災祥則於此望氣節勞佚則於此遊觀皆取其高明也文王之臺方其經度營表之際而庶民已來作之所以不終日而成也雖文王心恐煩民戒令勿亟而民心樂之如子趣父事不召自來也張氏栻曰文王則勿亟庶民則子來君臣之相與如此陳氏櫟曰不欲其急而過於勞者愛民之仁子來而忘其勞者事君之義未有上好仁而下不好義也孟子曰文王以民力為臺為沼而民歡樂之謂其臺曰靈臺謂其沼曰靈沼此之謂也朱子曰言文王雖用民力而民反歡樂之加以美名也集説孔氏穎逹曰言文王有德民心附之既徙於豐乃為靈臺經理之營表之其位既定於是庶民則競攻而築作之不設期日而已成之民悅其德自勸其事也李氏樗曰文王經營之心本不欲亟也苐以庶民慕文王之德名為靈臺如子之事父而來築之也鄒侍郎曰庶民子來非強之也在彼者實子來也不日成之非迫之也在我者實勿亟也為上者惟恐民之勞苦為下民者乃不憚其勞苦以從上見民之樂從也觀左傳曰築郎囿季文子欲其速成叔孫昭子曰焉用速成其以勦民也蓋速成者出於民之意則可出於君之意則不可出於君之意則為勦民出於民之意則為愛君也呂民祖謙曰文王之作臺主於望氛祲觀民俗以察天人之意因以疏瀹精神宣節勞逸蓋一弛一張無非事也蔣氏悌生曰文王德澤之在人心蓋已久積於未作靈臺之前而庶民之趨事勸功特形於經始靈臺之日文王視民如傷之仁又發於經始勿亟之辭而庶民親戴父母之心尤有出於通力竭作之外豈惟庶民以文王之心為心而文王實能以庶民之心為心也王在靈囿叶音郁麀音憂鹿攸伏麀鹿濯濯直角反白鳥翯翯戶角反王在靈沼叶音灼於音烏牣音刃魚躍集傳賦也靈囿臺之下有囿所以域養禽獸也孔氏穎逹曰春秋築鹿囿築即囿則囿者築牆為界域而禽獸在其中呂氏祖謙曰説文曰囿苑有垣也麀牝鹿也伏言安其所處不驚擾也劉氏彜曰鹿易驚易逸王在靈囿徒御非少不驚不逸而攸伏者無害獸之心也濯濯肥澤貌翯翯潔白貌靈沼囿之中有沼也牣滿也魚滿而躍言多而得其所也集説范氏處義曰文王未嘗稱王凡詩謂文王為王者皆非作於文王之時是詩亦作於後世故以王在言之呂氏祖謙曰鄒氏曰鹿之在囿不知囿之為囿亦如在於山林魚之在沼不知沼之為沼亦如相忘於江湖自非文王之德上及飛鳥中及走獸下及潛魚豈能及此嚴氏粲曰次章言既作臺而遊焉夫車馬羽旄一也有見之而欣欣喜色者有見之而疾首蹙頞者由人心之樂不樂也文王鳥獸魚鱉何以異於人哉特民心樂之耳孟子最善説詩只民樂其有麋鹿魚鱉一語道盡一詩意朱氏善曰臺下有囿則從而謂之靈囿囿中有沼則從而謂之靈沼王而時在靈囿也則見其鹿之攸伏言其性之適也見其鹿之濯濯言其體之肥也見其鳥之翯翯言其色之潔也此飛走者樂其為飛走也王而時在靈沼也則既見其魚之牣而其多可知也復見其魚之躍而其適可知也此鱗介者樂其為鱗介也已虡音巨業維樅七凶反賁扶云反鼓維鏞音庸於論盧門反鼓鐘於樂音洛辟音璧雍集傳賦也虡植木以懸鐘磬其橫者曰栒音筍業栒上大版刻之捷業如鋸齒者也孔氏穎逹曰懸鐘磬者兩端有植木其上有橫木謂植立者為虡謂橫牽者為栒栒上加之大版為之飾釋器云大版謂之業樅業上懸鐘磬處以綵色為崇牙其狀樅樅然者也胡氏一桂曰段氏曰筍之上有業業之上有崇牙筍之兩端又有璧翣鄭氏謂戴璧垂羽是也蓋筍虡所以架鐘磬崇牙璧翣所以節筍虡夏后氏飾以龍而無崇牙商飾以崇牙而無璧翣至周則極文而三者具矣此有瞽所以言設業設虡崇牙樹羽也賁大鼓也陸氏德明曰賁亦作鼖長八尺鼓四尺中圍加三之一劉氏瑾曰中圍者謂鼓腹也鼓面徑四尺則其圍十二尺鼓腹之圍加以三之一則其圍十六尺而徑五尺三寸三分寸之一也鏞大鐘也論倫也言得其倫理也辟璧通雍澤也辟雍天子之學大射行禮之處也水旋邱如璧以節觀者故曰辟雍孔氏穎逹曰水旋邱如璧者璧體圓而內有孔此水亦圓而內有地猶如璧然水下而地高故以邱言之以水繞邱所以節約觀者令在外而觀也朱子曰王制論學曰天子曰辟雍諸侯曰泮宮説者以為辟雍大射行禮之處也水旋邱如璧以節觀者泮宮諸侯鄉射之宮也其水半之蓋東西門以南通水北無也故振鷺之詩曰振鷺于飛于彼西雍説者以雍為澤蓋即旋邱之水而其學即所謂澤宮也蓋古人之學與今不同孟子所謂序者射也則學蓋有以射為主者矣蘇氏引莊周言文王有辟雍之樂遂以辟雍亦為樂名而曰古人以樂教胄子則未知學以樂而得名歟樂以學而得名歟則是又以為習樂之所也張子亦曰辟雍古無此名其制蓋始於此及周有天下遂以名天子之學而諸侯不得立焉記所謂魯人將有事於上帝必先有事於泮宮者蓋射以擇士云爾集説孔氏穎逹曰上言臺沼此言作樂之意治世之音安以樂故在辟雍之內與聞之者莫不喜樂是其和之至也范氏處義曰於論者歎其鐘鼓得倫理也於樂者歎其以樂教國子於辟雍為可樂也昔舜命夔典樂以教胄子為先故文王亦論樂於學也呂氏祖謙曰或疑靈臺之詩敘臺池苑囿與民同樂胡為以辟雍學校勦入之彼蓋未嘗深考三代人君與士大夫甚親遊宴之暬御征行之扈衛無所往而不與髦俊俱焉樂正司業父師司成則樂者固學士之所常隸也夫豈二事哉劉氏瑾曰古之教者固不廢樂而大射之禮亦先用樂作樂於辟雍無可疑者此後兩章自説辟雍作樂之事前兩章自説遊觀靈臺之事也於論鼓鐘於樂辟雍鼉徒河反鼓逢逢薄紅反矇音蒙瞍音叟奏公集傳賦也鼉似蜥蜴長丈餘皮可冒鼓逢逢和也陸氏佃曰夏小正云剝鼉以為鼓其皮堅厚取以冒鼓故曰鼉鼓鼉鼓非特有取於皮亦其鼓聲逢逢然象鼉之鳴續博物志曰鼉長一丈其聲如鼓有眸子而無見曰矇無眸子曰瞍古者樂師皆以瞽者為之以其善聽而審於音也公事也聞鼉鼓之聲而知矇瞍方奏其事也集説嚴氏粲曰申言鼓鐘辟雍之樂詠歎不能已樂之更端曰奏故九成謂之九奏言方奏其事樂之不厭之辭也總論饒氏魯曰文王未嘗無靈臺靈沼然與民同樂便是天理文王畢竟自朝至於日中昃不遑暇食用咸和萬民人必得所然後有此樂嚴氏粲曰文王始作靈臺民樂成之其遊於囿沼也又樂其有鳥獸魚鱉其作樂於辟雍也又樂其有鐘鼓之音所謂聞王鼓樂於此欣欣然有喜色也言之不能盡而嗟歎之不能已則民之愛戴者深矣陳氏櫟曰靈臺一詩辟雍之教寓焉臺池鳥獸鐘鼓之樂樂之形也其樂也外辟雍教化道義之樂樂之本也其樂也內民樂其樂蓋至此矣朱氏善曰靈臺遊觀辟雍教育遊觀而必言其物之盛者以見涵育長養之有其素也教育而必言其樂之和者以見鼓舞作興之有其術也然則臺池鳥獸之樂囿與百姓共之而鐘鼓之樂殆將與賢者共之也郝氏敬曰周自后稷公劉大王王季世世積德干有餘年而文王勤勞日昃不睱食至是始有園囿臺池鐘鼓而後民歡樂之創業若此其難而得民若此其未易也詩人作是詩以見文王造周功成蓋民樂而後君樂民樂君之樂而後見民樂文王所以釋如傷之憂也雖民心歸周非自今始而文王求寧今始觀成也王氏志長曰庶民子來民之太和麀鹿攸伏於牣魚躍物之太和也於論鼓鐘於樂辟雍君臣之太和也所謂太和在成周宇宙間也靈臺四章二章章六句二章章四句集傳東萊呂氏曰前二章樂文王有臺池鳥獸之樂也後二章樂文王有鐘鼓之樂也皆述民樂之詞也集説孔氏穎逹曰鄭氏云韓詩説辟雍者天子之學所以教天下春射秋饗尊事三老五更在南方七里之內左氏説天子靈臺在太廟之中壅之以靈沼謂之辟雍皆無明文靈臺一篇有靈臺有靈囿有靈沼有辟雍則辟雍及三靈同處在郊矣袁凖正論云辟雍大射養孤之處下武維周世有哲王三后在天王配于京叶居良反集傳賦也下義未詳或曰字當作文言文王武王實造周也哲王通言大王王季也三后大王王季文王也在天既沒而其精神上與天合也王武王也配對也謂繼其位以對三后也京鎬京也此章美武王能纘大王王季文王之緒而有天下也集説陳氏鵬飛曰哲王謂誰其在天則大王王季文王其在鎬京則武王是也在鎬京者足以配彼在天者朱子語類問在天言其既沒而其精神上合於天此是如何曰便是又有此理用之云恐只是此理上合於天耳曰既有此理便有此氣或曰想是聖人稟得清明純粹之氣故其氣上合於天曰也是如此這事又微妙難説如云文王陟降在帝左右若説文王真箇在上帝之左右真箇有上帝如世間所塑之像固不可然聖人如此説便是有此理朱氏善曰一代興王之業必世德之相承有以基之於其始而後聖德之受命有以成之於其終周之王業自文王而始著自武王而始成是文王武王實造周矣然推原其始則文王之前固有王季也王季之前又有大王也謂王業之所基不在於是而可乎是以武王繼之實能配彼在天之靈於鎬京焉則武王之繼三后謂非王業之所成而可乎原其始而歸美於三后要其終而歸功於武王則夫任繼述之責者其必知所法矣鄒氏泉曰此言先緒之所從來者已久因言三后之精神上與天合總見所傳之緒於今為烈難於其為配而武王則能纘緒而有天下也附録毛氏萇曰武繼也鄭氏康成曰下猶後也孔氏穎逹曰居下世即是在後故云下猶後也言後人能繼祖者維周家最大謂大王王季文王稍稍就盛者也王季為西伯文王又受命是稍盛也不通數武王者此言哲王即是下文三后王配之文别在於下故知世有之中不兼武王也王氏安石曰大王王季文王以文德造始於上武王以武功續終於下故曰下武維周世有哲王呂氏祖謙曰下者繼上之辭也下武之繼文即頌所謂嗣武受之也武王一戎衣而天下大定其樂曰大武故言周王業之成必曰武焉案集傳下義未詳或曰字當作文言文王武王實造周也但詩言世有哲王三后在天所謂三后者不得不指大王王季文王也文王既列於三后之中則下武作文武於詩義為復矣即朱子亦闕疑而未定也故先儒都從毛鄭之訓以詮經似亦可通王配于京世德作求永言配命成王之孚叶孚尤反集傳賦也言武王能繼先王之德蘇氏轍曰作起也起而求其先世之德以繼之也李氏樗曰武王所以配三后者則以維世德之求故也起而求以繼之也而長言合於天理故能成王者之信於天下也若暫合而遽離暫得而遽失則不足以成其信矣集説王氏安石曰大王肇基王迹王季其勤王家文王大統未集至於武王然後自西自東自南自北無思不服然後能為成王之孚陳氏鵬飛曰三后之孚著於民久矣至武王配天然後成王者之信嚴氏粲曰武王所以配三后于京者以其善繼述也所求者先世之德故能長配天命有天下而傳無窮遂成王者之信也王者之事業莫大於信信則天下心服而王也陳氏櫟曰配祖宗而與世德一即配天而與天理一者命原於天而三后亦在天配三后即配天矣配命則必能配三后矣朱氏善曰此章二配字不同王配于京是以下而對乎上之辭永言配命是以人而合乎天之辭有以配對於下而已之德既與先王而為一有以配合乎天而已之心復與天理而為一此所以能成王者之信而為天下之法也然則王者之信豈可以他求哉亦在乎求世德配天命而已蓋世德皆實心之形著而天命即實理之流行既有以配對於先王復有以配合乎天命則王者之德著於下而天下之心應乎上上下交孚而其為信也成矣鄒氏泉曰世德就德之見於事者言如大王修德行政王季積德纍仁文王發政施仁之類乃三后所以造周者即世德所在也王氏志長曰武王以作求配命之德繼三后而起則天下翕然信之若子之信父母其王也雖百却之亦不可得矣時邁曰允王維后酌曰實維爾公允師皆言成王之孚也成王之孚下土之式永言孝思孝思維則集傳賦也式則皆法也言武王所以能成王者之信而為四方之法者以其長言孝思而不忘是以其孝可為法耳曹氏粹中曰孝思猶舜見堯於羹牆徐氏光啓曰維則者當纘緒則以纘緒為孝當變通則以變通為孝有國則以國孝有家則以家孝若有時而忘之則其孝者偽耳何足法哉集説陳氏鵬飛曰王者之德著於人而可信者謂之孚存於心而不忘者謂之孝天下皆知法武王之德而不知德之可法者本於聖人之孝朱子曰武王既成王業天下咸法則之以法其孝思而已蓋求其世德而成王之孚孝思之至孰大於是劉氏瑾曰武王之孝可為天下之法此所以為逹孝所謂德教加于百姓刑于四海此天子之孝是也蔣氏悌生曰孝者根於人心之同然者也武王躬行於上而心純乎孝以是道而化天下亦惟因人心之所同然者而振作興起之故能為法於天下而民信之亦莫不興起於孝而親戴於其君繼述之善又孰有明著於此者乎媚兹一人應侯順德永言孝思昭哉嗣服叶蒲北反集傳賦也媚愛也一人謂武王應如丕應徯志之應朱氏公遷曰此則天下信之之驗也侯維服事也言天下之人皆愛戴武王以為天子而所以應之維以順德是武王能長言孝思而明哉其嗣先王之事也集説輔氏廣曰下武六章下章都疉上章一句説獨四章不然者蓋承上二章三章兩章而言武王既能成王者之信又能使天下以其孝思為法故天下之人皆戴武王而所以應之維是順德焉至此然後再疉上章一句永言孝思説起而又言明乎其嗣先王之事也夫嗣先王之事即是世德作求世德作求昭哉嗣服又皆是孝孝即是順德上以孝感下以順應尤非一朝一夕暫行復輟者之所能致也嚴氏粲曰孝者德之順故又言武王永有孝思昭昭然能嗣其先世之事也朱氏公遷曰此又因民心愛戴武王而推見武王之能孝思嗣服也嗣服對求德言求德是繼志嗣服是述事順德者民之順德也上以孝思感乎下下以順德應乎上感應以類於此見之徐氏光啓曰武王通先人之節以濟天下之變與先人志意流通此其心事何等光明正大故曰昭哉嗣服不但以其變侯化國為能閳揚光大而已昭兹來許繩其祖武於萬斯年受天之祜侯古反集傳賦也昭兹承上句而言兹哉聲相近古蓋通用也朱子曰昭兹漢碑作昭哉洪氏隸釋兹哉叶韻來後世也許猶所也繩繼武迹也言武王之道昭明如此來世能繼其迹則久荷天祿而不替矣集説輔氏廣曰言武王既明乎其繼先王之事則來世亦必能繼先王之迹矣如此則於萬斯年世有哲王永受天祿而不替又不止此大王王季文王武王而已朱氏公遷曰此又言武王之道足以福後世後王之孝思如武王則無不受福矣朱氏善曰繩祖武者欲後人繼武王之迹也武王之道惟信與孝而已然武王之信乃王者之大信武王之孝乃天下之逹孝法武王之信在乎天命之永配法武王之孝在乎世德之作求如是而不受天之祜者未之有也受天之祜四方來賀於萬斯年不遐有佐集傳賦也賀朝賀也周末秦強天子致胙諸侯皆賀史記商君傳秦人富強天子致胙於孝公諸侯畢賀劉氏瑾曰事見周顯王時此借引之故朱子初解此下有曰其事則猶此也但秦以力周以德耳遐何通佐助也蓋曰豈不有助乎云爾輔氏廣曰豈不有助乎者言天下皆來朝賀於周則豈不有助乎周家也哉王氏炎曰受天之福則四方諸侯皆來朝賀雖千萬年相與佐助也集説黃氏櫄曰孝之至則通於神明光於四海而得萬國之歡心此所以受天之祜四方來賀也陳氏櫟曰天且福之人將焉往不徒賀之而尤佐之見人心蕃屏王室之至也何氏楷曰受天之祜語聫上章當主後日子孫言四方來賀所謂四海之內悉主悉臣莫敢不來享莫敢不來王也總論輔氏廣曰首章言武王能纘大王王季文王之緒而有天下中三章言武王善繼善述之孝又有常永不已之誠故能成王者之信為天下之法以致天下之愛戴如此末兩章又言武王之成效大驗如此則其後世子孫亦將善繼其先人之緒而久受上天之福多得天下之助也陳氏櫟曰此詩美武王繼三后於已往開後嗣於方來惟以求世德永孝思而上合天理下孚人心者為之本耳錢氏天錫曰孝者通乎古今而無久近貫乎宇宙而無廣狹者也在武王為求德在子孫為繩武在今日為媚兹在萬年為有佐孝之分量固如是也下武六章章四句集傳或疑此詩有成王字當為康王以後之詩然考尋文意恐當只如舊説且其文體亦與上下篇血脈通貫非有誤也集説黃氏櫄曰中庸言武王纘大王王季文王之緒身不失天下之顯名而此詩言武王得天下亦言其配三后之德故中庸言逹孝而此詩言其孝思中庸言孝者善繼志述事而此詩言孝亦曰成王之孚也文王有聲遹尹橘反駿音峻有聲遹求厥寧遹觀厥成文王蒸哉集傳賦也遹義未詳疑與聿同發語辭駿大蒸君也呂氏大臨曰蒸君也衆也皆所以得衆為君也此詩言文王遷豐武王遷鎬之事而首章推本之曰文王之有聲也朱氏公遷曰聲聲聞也與赫赫厥聲同甚大乎其有聲也蓋以求天下之安寧而觀其成功耳文王之德如是信乎其克君也哉集説曹氏粹中曰文王在書稱寧王又稱寧人蓋以其道務在安民而已是以視民如傷輔氏廣曰文王之所以大有聲者本由於征伐而其所以征伐者不過是求天下之安寧而欲觀其功底於成耳此所以克君也哉黃氏佐曰此章將言文王遷豐之事故先推其心於安民厥成即謂安民之成功錢氏天錫曰大凡人君舉動出於為民者帝王之盛節出於自為者世主之私心此天理人欲之判也今文王先言求寧而後除暴驅殘見得為天下為生民無一毫私意於其間也文王受命有此武功既伐于崇作邑于豐文王蒸哉集傳賦也伐崇事見皇矣篇作邑徙都也嚴氏粲曰國勢寖盛程邑不足以容乃作邑于豐以居之豐即崇國之地在今鄠縣杜陵西南集説鄭氏康成曰武功謂伐四國及崇之功也作邑者徙都于豐以應天命孔氏穎逹曰武功非獨伐崇而已所伐邘耆密須混夷之屬皆是也别言伐崇者以其功最大其伐最後故特言之為作邑張本言功成乃作邑也范氏處義曰詩人於文王得天得民皆謂之受命故於伐崇之功亦謂之受命也伐崇之後遂徙都豐蓋非崇侯之降則豐不可作此文王之盡君道也朱氏善曰大命自文王而始集故武功自文王而始成伐崇所以除天下之暴作豐所以立天下之本有以除天下之暴則人心服有以立天下之本則人心歸徐氏常吉曰受命者詢爾仇方是也武功者是伐是肆是也伐崇以除殘天意也作豐以容民亦天意也奉若天道豈不克君築城伊淢況域反作豐伊匹匪棘居力反其欲禮記作猶遹追來孝叶許六反或呼侯反王后蒸哉集傳賦也淢陸氏德明曰韓詩作洫成溝也方十里為成成間有溝深廣各八尺匹稱棘急也王后亦指文王也蘇氏轍曰自其克崇作豐而王業成故以王后稱之輔氏廣曰王王也追稱也后君也本稱也言文王營豐邑之城因舊溝為限而築之其作邑居亦稱其城而不侈大皆非急成己之所欲也特追先人之志而來致其孝耳集説孔氏穎逹曰此述作豐之制言文王興築豐邑之城維如一成之淢淢內之地其方十里文王作此豐邑維與相匹言大小正與成淢相配偶是大於諸侯小於天子之制所以才得伐崇即作此邑者非以急從已之欲而廣此都邑乃追述王季勤孝之行思進其業故耳此誠得人君之道哉嚴氏粲曰文王之作豐邑稱上公之制已所宜為不務侈大也陳氏櫟曰上章言作豐受命於天此章言作豐追孝於前以見作豐乃天與前人之心也劉氏瑾曰孝者善繼志善述事者也故文王之孝在於伐崇作豐武王之孝在於成王之孚文王所求乎子即文王所以事父者也故曰父作之子述之朱氏公遷曰肇王迹勤王家先王志在安民久矣文王遷豐所以繼其志而盡其孝耳朱氏善曰遹追來孝文王之孝也永言孝思武王之孝也文王之孝有以追先人之志武王之孝有以成文王之功此周之王業所以盛也王公伊濯直角反維豐之垣音袁四方攸同王后維翰叶胡田反王后蒸哉集傳賦也公功也濯著明也王之功所以著明者以其能築此豐之垣故爾四方於是來歸而以文王為楨幹也集説鄭氏康成曰文王述行大王王季之王業其事益大作邑於豐城之既成又垣之立宮室乃為天下所同心而歸之王后為之幹者正其政教定其法度呂氏大臨曰濯如滌言明白而不昧文王至此明建都邑示天下知所歸往天下皆倚以為賴曹氏粹中曰垣非翰不立猶四方以豐為根本而豐以文王為根本王氏日休曰維豐之垣有形之勢王后維翰無形之勢也朱氏公遷曰四方攸同有所歸也王后維翰有所附也至此而三分天下有其二矣鄒氏泉曰能築此豐之垣則上以承天意下以定人心前以承先王之志後以開無窮之基此其功之所以著明也豐水東注維禹之績四方攸同皇王維辟皇王蒸哉集傳賦也豐水東北流徑豐邑之東入渭而注于河孔氏穎逹曰禹貢曰導渭自鳥鼠同穴東會于灃入于河是灃水入渭東注于河嚴氏粲曰灃水自南而北流入渭故豐在其西鎬在其東經言東注者是會渭之後乃東注入河也績功也皇王有天下之號指武王也蘇氏轍曰皇大也武王之王業益大矣故稱皇王焉辟君也言豐水東注由禹之功故四方得以來同於此而以武王為君此武王未作鎬京時也季氏本曰言豐水係於王業之成為下章遷鎬張本也集説孔氏穎逹曰左傳劉定公見雒汭之水曰美哉禹之功也此亦見豐水而思禹帝王世紀云豐鎬皆在長安之西南言豐邑在豐水之西鎬京在豐水之東以時驗而知之董氏逌曰詩人論周之建都在豐鎬而豐水正居其中者於是思禹之績而見周之成功也嚴氏粲曰豐水所以東注于河者是禹之功也四方之所以同歸周者以武王為天下之君也蓋以武王之功配禹皆除害濟民也朱氏善曰豐水東注言其水勢之順也四方攸同言其人心之合也即水勢之順而有以見神禹之功即人心之合而有以見武王之德武王因人心之合而益有以盡君道之隆則不惟近無愧於文王而且遠無愧於神禹矣唐氏汝諤曰上注曰來歸則猶有未歸者此直曰來同則盡乎人矣維翰只有所倚賴之意而維辟則實以之為君而政教號令無不從之也兩言四方攸同而俱就豐説然一同於文王謂作豐以容之也一同於武王即豐亦不能容矣一以終文之事一以起武之遷也鎬京辟雍自西自東自南自北無思不服叶蒲北反皇王蒸哉集傳賦也鎬京武王所營也在豐水東去豐邑二十五里呂氏祖謙曰後漢地理志曰鎬在京兆尹上林苑中孟康云長安西南有鎬池古史考曰武王遷鎬長安豐亭鎬池也張子曰周家自后稷居邰公劉居豳大王邑岐而文王則遷于豐至武王又居于鎬當是時民之歸者曰衆其地有不能容不得不遷也劉氏彜曰武王以諸侯之朝覲四夷之來王非豐邑可容也故越豐水之東作鎬焉朱子曰秦始皇營朝宮渭南史以為咸陽人多先王之宮庭小故作之想遷鎬之意亦是如此辟雍説見前篇張子曰靈臺辟雍文王之學也鎬京辟雍武王之學也至此始為天子之學矣無思不服心服也孟子曰天下不心服而王者未之有也此言武王徙居鎬京講學行禮而天下自服也集説劉氏濟曰都鎬而先建學首善之地教化之原也輔氏廣曰見武王得天下以教化為先務也先生謂以見武王之得天下非以力取之者是也嚴氏粲曰四方之服也久矣此言辟雍之化深入其心也四方先言西鎬京在西近者先被其化也繼伐之詩而言教化者見武王德化流行而人心服也朱氏善曰四方攸同皇王維辟見武王之盡君道也鎬京辟雍無思不服見武王之盡師道也君以治之而四方無不攸同師以教之而四方無不心服則其尚德而不尚力於此亦可見矣唐氏汝諤曰人知武王之得天下在於武功而不知天下之服武王由於文德故首以辟雍為言何氏楷曰左傳周景王曰我自夏以后稷魏駘芮岐畢吾西土也及武王克商蒲姑商奄吾東土也巴濮楚鄧吾南土也肅愼燕亳吾北土也其數四方之次第正與此同周自西土興近者先被其化其後乃漸及於東故曰自西自東周自文王化已南行於江漢其後乃漸及於北故曰自南自北皆對舉之詞立言之序也考卜維王宅是鎬京叶居良反維龜正叶諸盈反之武王成之武王蒸哉集傳賦也考稽董氏逌曰卜筮之道必先斷於心故白考卜維王則王志先定矣其考卜者所以齊衆志也洪範稽疑以汝則從為主宅居正決也嚴氏粲曰以吉凶取正於龜而龜出其吉北以正定之也成之作邑居也張子曰此舉諡者追述其事之言也劉氏瑾曰此詩五章六章先稱武土為皇王至此章以後乃舉武王之諡故朱子引橫渠説明此詩為追述武王之事以證其後所論鄭譜之誤爾集説呂氏大臨曰言武王稽天命宅鎬京定都以為天下君也曹氏粹中曰周官大卜國大遷則正龜然筮人九筮之名一曰筮更説者謂更為遷都邑也則武王之遷當亦用筮而獨言龜者蓋凡國之大事先筮而後卜筮有吉凶然後斷之於龜維龜正之則筮可知矣輔氏廣曰此章言武王之居鎬稽決於龜而成其居邑亦非私意之所為與三章言文王匪棘其欲之意同豐水有芑武王豈不仕鉏里反詒厥孫謀以燕翼子叶奬里反武王蒸哉集傳興也芑草名仕事詒遺燕安翼敬也子成王也鎬京猶在豐水下流故取以起興言豐水猶有芑武王豈無所事乎鄭氏康成曰豐水猶以其潤滭生草武王豈不以其功業為事乎孔氏穎逹曰言實以功業為事思得澤及後人詒厥孫謀以燕翼子則武王之事也謀及其孫則子可以無事矣王氏安石曰雖詒之以謀非翼子亦不能以燕也或曰賦也言豐水之傍生物繁茂武王豈不欲有事於此哉但以欲遺孫謀以安翼子故不得而不遷耳輔氏廣曰此章兩説雖不同然以遺孫謀安翼子為武王之事則同也第二説雖覺輕快然首句著箇豐水有芑一句畢竟似興體集説朱氏公遷曰聿追來孝文王繼志述事也謀孫翼子武王創業垂統也一者以卒前人之業一者以定後人之業此遷豐遷鎬之本意也朱氏善曰水之流不窮則其生物亦無窮也聖人之德無窮則其善後亦無窮也於孫謀曰詒則所以遺之者至矣於翼子曰燕則所以安之者至矣徐氏常吉曰當武王時一統大定而伊淢之制隘不能容使武王不遷則繼世之下有不得辭其責者故身任其責以靖人民民安而子孫亦安無勞締造坐享盈成其規模之宏遠蓋為萬世之子孫謀即為萬世之天下謀也謂之克君信矣總論鄒氏泉曰此詩上四章言文王遷豐之事下四章言武王遷鎬之事析言之首章言遷豐之由次三章詳其事五章言遷鎬之由末三章詳其事姚氏舜牧曰文王之心追孝武王之心詒謀總之只是遹求厥寧郝氏敬曰詩首尾四章稱文武者文始之武終之也中四章稱王后皇王者繼諸侯而為天子也文王伐崇作豐而王業始武王伐商作鎬而王業成文王求寧觀成以始武也武王燕子詒孫以終文也文王有聲八章章五句集傳此詩以武功稱文王至於武王則言皇王維辟無思不服而已蓋文王既造其始則武王續而終之無難也又以見文王之文非不足於武而武王之有天下非以力取之也集説朱子詩傳遺説徐宇問三分天下有其二以服事殷使文王更在十三四年將終事紂乎抑為武王牧野之舉乎曰看文王亦不是安坐不做事底人如詩中言文王受命有此武功既伐于崇作邑于豐文王蒸哉云云武功皆是文王做來詩載武王武功却少但卒其伐功耳觀文王一時氣勢如此度必不終竟休了一似果實文王待他十分黃熟自落下來武王却似生擘破一般呂氏祖謙曰此詩未嘗一言及武王伐功何耶蓋創業而詒厥孫謀固非大告武成之前所能致也詩人亦有言其意而略其事者矣不可一體求也輔氏廣曰每章皆言蒸哉以結之者不獨以見其歎美無已之意又以示後世子孫使之知其必如文王武王之為然後於君天下為宜也故其丁寧不一而足耳劉氏瑾曰允文文王而有此武功則非不足於武也桓桓武王而鎬京辟雍則非不足於文也所謂一張一弛文武之道也文王之什十篇六十六章四百一十四句集傳鄭譜此以上為文武時詩以下為成王周公時詩今案文王首句即云文王在上則非文王之詩矣又曰無念爾祖則非武王之詩矣大明有聲并言文武者非一安得為文武之時所作乎蓋正雅皆成王周公以後之詩但此什皆為追述文武之德故譜因此而誤耳欽定詩經傳説彚纂卷十七
