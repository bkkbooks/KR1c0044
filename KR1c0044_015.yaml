body:
  text: 欽定四庫全書欽定詩經傳說彚纂卷十三小旻之什二之五旻天疾威敷于下土謀猶回遹音聿何日斯沮在呂反謀臧不從不臧覆用叶于封反我視謀猶亦孔之邛其凶反集傳賦也旻幽遠之意敷布猶謀姚氏舜牧曰議論曰謀由是見之施為曰猶故二字竝舉而専重於謀回邪遹辟沮止臧善覆反邛病也大夫以王惑於邪謀不能斷以從善而作此詩言旻天之疾威布于下土使王之謀猶邪辟無日而止劉氏瑾曰此章稱天之意猶可見君臣隱諱之義天人合一之理謀之善者則不從而其不善者反用之朱氏善曰謀臧不從所謂惡人之所好也不臧覆用所謂好人之所惡也故我視其謀猶亦甚病也姚氏舜牧曰亦孔之邛病在國也即下章所謂淪胥以敗也集說曹氏粹中曰王者舉錯移陰陽動作關盛衰一嚬一笑尚不可不謹而況於謀猶乎謀國之道正直是與古人謀及乃心謀及卿士謀及庶人謀及卜筮公聽竝觀擇善而從之無敢不用其至彼小人者謀止其身而不及國謀専于利而不顧義回邪僻遹不知何時而止也謀之臧者出于君子而不見從謀之不臧者出於小人乃反見用謀國如此亦甚病矣潝潝許急反訿訿音紫亦孔之哀叶於希反謀之其臧則具是違謀之不臧則具是依我視謀猶伊于胡底之履反叶都黎反集傳賦也潝潝相和也訿訿相詆也劉氏向曰衆小在位而從邪議歙歙相是而背君子曹氏粹中曰潝潝然相和者黨同而無公是訿訿然相毁者伐異而無公非具俱底至也言小人同而不和其慮深矣然於謀之善者則違之其不善者則從之亦何能有所定乎集說輔氏廣曰小人為謀相和相詆是雖常態然其所以為此者則有二故焉一則幸其不成而欲以自解一則恐其或成而彼有所利是其為慮亦已深矣然其昏蔽之極是非莫辨則亦終歸於敗亂而已故我但視其謀猶則知爾之胡能有定也朱氏善曰謀之其臧則具是違即所謂謀臧不從也謀之不臧則具是依即所謂不臧覆用也但上章指王而言此章指小人而言我龜既厭不我告猶叶于救反謀夫孔多是用不集韓詩作就叶疾救反發言盈庭誰敢執其咎叶巨又反如匪行邁謀是用不得于道叶徒候反集傳賦也集成也卜筮數則瀆而龜厭之故不復告其所圖之吉凶鄭氏康成曰猶圖也不復告其所圖之吉凶言雖得兆占繇不中謀夫衆則是非相奪而莫適所從故所謀終亦不成蘇氏轍曰謀者多無斷而行之者故其功不成蓋發言盈庭各是其是無肯任其責而决之者嚴氏粲曰謂事若不成則咎有所歸故皆持兩端也猶不行不邁而坐謀所適謀之雖審而亦何得於道路哉鄭氏康成曰匪非也君臣之謀事如此與不行而坐圖遠近是於道路無進於跬歩何以異乎孔氏穎達曰謀而不行則於道不進言而無決則於事不成集說曹氏粹中曰謀之貴多斷之在獨凡謀於衆惟斷乃成今謀夫孔多而事不就者以其愚而無斷也朱氏善曰卜筮將以求之神而神則厭而不吾告詢訪將以謀之人而人則泛而不吾決蓋惟堂上之人方可以辨堂下之曲直今發言盈庭則是雜於堂下衆人之中果孰能任其責而決之乎譬之適國者必駕輕車就熟路而後可以言至若不行邁而坐以謀之則言之雖善亦何能有所得哉姚氏舜牧曰書曰朕志先定詢謀僉同鬼神其依龜筮協從凡謀未有不先於定其志者志不先定而謀之鬼龜厭而不我告矣謀之盈庭而莫執其咎矣謀之回遹端在此哀哉為猶匪先民是程匪大猶是經維邇言是聽叶平聲維邇言是爭叶側陘反如彼築室于道謀是用不潰于成集傳賦也先民古之聖賢也程法猶道劉氏瑾曰詩中猷猶字通用故前章猶訓謀此訓道而徽猷與秩秩大猷又皆作猷亦訓道經常潰遂也言哀哉今之為謀不以先民為法不以大道為常孔氏穎達曰古人之法是先王成事已行者也大道之常謂禮樂典法古今所通者也其所聽而爭者皆淺末之言以是相持如將築室而與行道之人謀之人人得為異論其能有成也哉蘇氏轍曰築室于道而與行道之人謀之人心不同而皆聽焉是以不能遂成也古語曰作舍道邊三年不成蓋出於此集說李氏樗曰夫謀之遠者近於迂濶而難行謀之近者近於切要而易用故近雖有小利而其害隨至遠謀者雖目前未見其利而可以終身無害自非聽之者明安能愼擇而用之哉姚氏舜牧曰先民即出大猶之人對舉言者甚言其猶之不歸於法則耳何氏楷曰聽在上爭在下言上之人固維邇言是聽而下之人見上之聽邇言也亦隨有起而以邇言爭邇言者蓋始合終離自相犄角小人情態往往如此國雖靡止或聖或否方九反叶補美反民雖靡膴火呉反或哲或謀叶莫徒反或肅或艾音乂如彼泉流無淪胥以敗叶蒲寐反集傳賦也止定也聖通明也膴大也多也艾與乂同治也淪陷胥相也言國論雖不定然有聖者焉有否者焉民雖不多然有哲者焉有謀者焉有肅者焉有艾者焉朱氏公遷曰聖人之徳五者咸備此則人各有其一徳耳但王不用善則雖有善者不能自存將如泉流之不反而淪胥以至於敗矣嚴氏粲曰言賢愚將同受其禍也聖哲謀肅艾即洪範五事之徳豈作此詩者亦傳箕子之學也與劉氏瑾曰洪範九疇其二為五事貎之徳恭而作肅言之徳從而作乂視之徳明而作哲聽之徳聰而作謀思之徳睿而作聖其次序與此不同者彼以人事發見先後為序此則便文以叶韻耳集說蘇氏轍曰政淫則民徳無所定雖世亂民辟猶有賢者在焉苟能用之愚者可頼以皆濟也苟廢而不用而使愚者壅之於上則相與皆敗無能為矣譬如泉水苟疏而流之則淤腐者從之而行苟不疏其源而瀦畜之雖其流者亦相與陷溺腐敗而已矣輔氏廣曰子曰十室之邑必有忠信天下豈有無才之世哉故告之以國論雖未定而人民之中有聖與否者焉人民雖不多而有哲謀肅乂者焉但患王不能用之耳王不能用則雖有是五者之才皆將如泉流之不反而相與淪陷於敗故以是戒王庶其能愛䕶而扶持之無使至於此極也不敢㬥虎不敢馮皮冰反河人知其一莫知其他湯河反戰戰兢兢如臨深淵叶一均反如履薄冰集傳賦也徒搏曰㬥徒渉曰馮李氏巡曰無舟而渡水曰徒渉如馮几然也戰戰恐也兢兢戒也如臨深淵恐墜也如履薄冰恐陷也蘇氏轍曰臨淵恐墜履冰恐陷善為國者常如是衆人之慮不能及逺㬥虎馮河之患近而易見則知避之喪國亡家之禍隱於無形則不知以為憂也故曰戰戰兢兢如臨深淵如履薄冰懼及其禍之詞也集說輔氏廣曰荀卿子樂王鮒皆以此章為畏小人而發是古之傳經者已有此說矣而集解不取者蓋此詩專為刺王惑於邪謀不能斷以從善而作初不為小人而賦也且小人之禍固不可不防閑畏懼然亦何至於戰戰兢兢如臨深淵如履薄冰哉易曰君子待小人不惡而嚴此君子待小人之正法也至於禍患之來亦豈如此戰兢所能免哉朱氏公遷曰惟其惑之而不知不斷之為患也故詩人危之如此上章以其不明不決而憂禍不可救此章以其不明不決而恐禍不可避也總論鄧氏元錫曰小旻刺謀失也夫古之謀者經大猷程先民聖者主之哲者謀者慮之肅者乂者斷之如是而將之以戒懼故全也今謀不及逺聽邇言矣爭邇言矣合而潝潝不合而訿訿斯於謀必回遹矣如是而聚襜以謀之是坐謀也匪行邁謀也如是而盈庭以謀之是道謀也非室謀也即有肅謀即有哲乂且聖如流泉然淪於汙敗豈有救乎是謀之大惑也凡厥有謀皆以其戒㬥虎戒馮河之心將之是篤敬之謀也小旻六章三章章八句三章章七句集傳蘇氏曰小旻小宛小弁小明四詩皆以小名篇所以别其為小雅也其在小雅者謂之小故其在大雅者謂之召旻大明獨宛弁闕焉意者孔子刪之矣雖去其大而其小者猶謂之小蓋即用其舊也集說季氏本曰上無道揆嘉謀不得信用故在位大夫之不得行其志者憂而作此詩也此亦在位者直言以譏切時事與正月同宛於阮反彼鳴鳩翰胡旦反飛戾天叶鐡因反我心憂傷念昔先人明發不寐有懐二人集傳興也宛小貎鳴鳩斑鳩也陸氏佃曰似鵓鳩項有繡文翰羽戾至也明發謂將旦而光明開發也二人父母也此大夫遭時之亂而兄弟相戒以免禍之詩故言彼宛然之小鳥亦翰飛而至于天矣則我心之憂傷豈能不念昔之先人哉是以明發不寐而有懐乎父母也朱氏公遷曰不寐有懐正可以見努力追及之意前二句興後四句也言此以為相戒之端輔氏廣曰兄弟相戒以免禍則發言而首及於父母者宜也集說朱氏善曰鳩之飛非可以戾天也而猶有時乎戾天人之質本可以為善也而豈能不念昔之先人乎鳩之翰飛戾天勉而為高也我之有懐二人勉而為孝也勉而為孝則無所徃而不善庶可以免於禍矣此兄弟相戒之意也黄氏佐曰明發謂欲旦而未即旦欲寐而不能寐此正夜氣方清之際好惡未逺之時也有懐父母則所以相戒以求無辱之意自不能已矣人之齊聖飲酒温克彼昏不知壹醉日富叶筆力反各敬爾儀天命不又叶夷益反集傳賦也齊肅也聖通明也克勝也富猶甚也又復也言齊聖之人雖醉猶温恭自持以勝所謂不為酒困也曹氏粹中曰齊則整肅而不亂聖則通達而不惑如是則雖惟酒無量而常能以温和自克矣彼昏然而不知者則一於醉而日甚矣劉氏彝曰彼昏而不醒壹志於酒日増其甚故曰壹醉日富於是言各敬謹爾之威儀天命已去將不復來不可以不恐懼也時王以酒敗徳臣下化之故此兄弟相戒首以為說集說輔氏廣曰酗酒者必昏肆唯肅敬通明之人則雖醉而能温恭自持以勝彼昏不知正與通明者相反也昏亂於酒則自喪其威儀故相戒各自敬謹我身之威儀天命不又蓋言不可恃天命之常如此㑹有禍亂生也人能敬我身之威儀則能敬天矣天豈在外哉此義精矣朱氏公遷曰此篇以敬威儀為主温克能敬者也昏而不知不能敬者也一善一惡可以為勸戒中原有菽音叔庶民采叶此禮反之螟音冥蛉音零有子蜾音果蠃力果反負叶蒲美反之教誨爾子式穀似叶養里反之集傳興也中原原中也菽大豆也許氏謙曰菽見豳七月螟蛉桑上小青蟲也似歩屈蜾蠃土蜂也似蜂而小腰取桑蟲負之於木空中七日而化為其子揚氏雄曰螟蛉之子殪而逢果蠃祝之曰類我類我則肖之矣式用榖善也中原有菽則庶民采之矣以興善道人皆可行也螟蛉有子則蜾蠃負之以興不似者可教而似也教誨爾子則用善而似之可也朱氏公遷曰似之者使之似已也善也似也終上文兩句所興而言也朱氏公遷曰穀所以終采菽之興似所以終負螟蛉之興戒之以不惟獨善其身又當教其子使為善也集說朱氏善曰中原有菽而庶民采之斯庶民之有矣螟蛉有子而蜾蠃負之斯蜾蠃之似矣吾兄弟豈可不思所以善其身思所以教其子乎善其身所以繼吾親也教其子所以繼吾身也物之在外也猶可采而有之况性善本吾心之所有乎物之不似也猶可負而化之况子之性亦吾之性乃其本似者乎為此詩者其於保身教子可謂兩得矣何氏楷曰上章危以命此章感以子蓋身者親之枝子者身之枝敬威儀以善吾身所以繼先人也式穀以教吾子所以繼吾身亦所以繼先人也題大計反彼脊令音零載飛載鳴我日斯邁而月斯征夙興夜寐無忝爾所生叶桑經反集傳興也題視也鄭氏康成曰題之為言視睇也脊令胡氏一桂曰脊令見常棣飛則鳴行則摇載則而汝忝辱也視彼脊令則且飛而且鳴矣我既日斯邁則汝亦月斯征矣言當各務努力不可暇逸取禍恐不及相救恤也夙興夜寐各求無辱於父母而已集說朱氏公遷曰漢東方朔傳云日夜孳孳敏行而不怠譬如脊令飛且鳴矣愚謂飛而且鳴用力為甚努力進善亦猶是也此亦以勉强勤勞之意為興努力以求無辱其親亦曰敬威儀而已此申首章及二章之意朱氏善曰脊令之且飛且鳴其勢之不能以已也我兄弟之日邁月征亦其情之不能以已也夙興夜寐各務努力以求無忝於先人可也天之密運聖人之不已君子之自强皆此意也而此詩及之其亦有得於聖賢之學也歟交交桑扈音户率場啄粟哀我塡都田反寡宜岸宜獄握粟出卜自何能穀集傳興也交交往來之貎桑扈竊脂也俗呼青觜肉食不食粟陸氏佃曰桑扈有二種青質者觜曲食肉好盗脂膏素質者其翅與領皆有文章所謂率場啄粟有鶯其羽也吕氏祖謙曰淮南子云馬不食脂桑扈不食粟塡與瘨同病也岸亦獄也韓詩作犴鄉亭之繫曰犴劉氏瑾曰字書云犴一作豻豻胡地犬也野犬所以守故以獄為犴朝廷曰獄扈不食粟而今則率場啄粟矣鄭氏康成曰竊脂肉食今無肉而循場啄粟失其天性不能以自活病寡不宜岸獄今則宜岸宜獄矣言王不恤鰥寡喜陷之於刑辟也然不可不求所以自善之道故握持其粟出而卜之曰何自而能善乎王氏安石曰方是時也塡寡不能自直必矣則雖出卜自何能穀乎言握粟以見其貧窶之甚集說輔氏廣曰塡寡自謂也王既不恤鰥獨則如我之病寡宜岸宜獄矣故握粟出卜以求自善之道貧窶如是而猶不忘所以自善之道然後為君子也徐氏常吉曰謹儀教子特人事之常今鰥寡猶宜岸獄則非意之遭無妄之災初不論其致之之由也故從而稽之於神曰自何能穀然卒取法於温恭小心而已其他巧為趨避之術亦非其志慮所及也温温恭人如集于木惴惴之瑞反小心如臨于谷戰戰兢兢如履薄冰集傳賦也温温和柔貎如集于木恐隊音墜也董氏逌曰莊子以民木處則惴慄恂懼如臨于谷恐隕也鄭氏康成曰衰亂之世賢人君子雖無罪猶恐懼集說曹氏粹中曰集木則憂摧敗臨谷則憂隕越履冰則憂陷溺夫温則不㬥以忤物恭則不慢以侮人惴惴小心則能下人而事之戰戰兢兢則又常戒懼而不忽然其畏禍猶如此則其危可知矣輔氏廣曰温温恭人惴惴小心皆指他人言也戰戰兢兢則自謂也言今處亂世温柔恭敬之人則如集于木而恐墜也惴惴小心之人則如臨于谷而恐隕也我其可不戰戰兢兢如履薄冰哉總論許氏謙曰此詩遇亂而戒兄弟修徳以免禍修徳當法其親免禍則謹其徳前四章修徳之事後二章免禍之意姚氏舜牧曰雨無正責羣臣之離居教之各敬爾身此戒人子之式穀教之各敬爾儀敬之一字眞人子持身之大本也小宛六章章六句集傳此詩之詞最為明白而意極懇至說者必欲為刺王之言故其說穿鑿破碎無理尤甚今悉改定讀者詳之弁薄干反彼鸒音豫斯叶先齎反歸飛提提是移反民莫不穀我獨于罹何辜于天我罪伊何心之憂矣云如之何集傳興也弁飛拊翼貎何氐楷曰弁通作拚拊手之義烏之將飛而拊翼似之鸒雅烏也毛氏萇曰鸒卑居卑居雅烏也小而多羣腹下白江東呼為鵯音匹又音卑烏斯語詞也孔氏穎達曰猶蓼彼蕭斯菀彼柳斯提提羣飛安閒之貎穀善罹憂也舊說幽王太子宜臼被廢而作此詩言弁彼鸒斯則歸飛提提矣民莫不善而我獨于憂則鸒斯之不如也何辜于天我罪伊何者怨而慕也舜號泣于旻天曰父母之不我愛於我何哉蓋如此矣毛氏萇曰舜之怨慕日號泣于旻天于父母輔氏廣曰怨者怨咎已之不得其親慕者思慕其親不能忘也心之憂矣云如之何則知其無可奈何而安之之詞也趙氏岐曰親親而悲怨之詞也集說朱氏善曰子以父為天父之不吾愛即天之不吾與也何辜于天我罪伊何自責不知已有何罪而不見愛於父也踧踧徒歴反周道叶徒苟反鞠九六反為茂草叶此苟反我心憂傷惄乃歴反焉如擣丁老反叶丁口反假寐永歎維憂用老叶魯口反心之憂矣疢丑覲反如疾首集傳興也踧踧平易也周道大道也鞠窮朱氏公遷曰窮塞也謂廢塞而不用惄思擣舂也孔氏穎達曰說文云擣手椎一曰築也不脫衣冠而寐曰假寐孔氏穎達曰左傳趙盾盛服將朝尚早生而假寐是也疢猶疾也踧踧周道則將鞠為茂草矣我心憂傷則惄焉如擣矣精神憒毦至於假寐之中而不忘永歎憂之之深是以未老而老也疢如疾首孔氏穎達曰疾首謂頭痛也則又憂之甚矣集說朱氏公遷曰平易之路一或塞之則生草憂傷之事一或念之則痛心是皆先事而致慮之意何氏楷曰上章怨已之不得於親而思慕此則憂親之終棄乎己而自傷也維桑與梓叶奬里反必恭敬止靡聸匪父靡依匪母叶滿彼反不屬音燭于毛不離于裏天之生我我辰安在叶此里反集傳興也桑梓二木古者五畝之宅樹之牆下以遺子孫給蠶食具器用者也劉氏瑾曰古者一夫受五畝宅二畝半在邑二畝半在田四圍牆下植木桑以給蠶食梓以具器用然此民居之制也蓋託以起興耳瞻者尊而仰之依者親而倚之屬連也毛膚體之餘氣末屬也離麗也裏心腹也辰猶時也鄭氏康成曰此言我生所值之辰安所在乎謂六物之吉凶孔氏穎達曰左傳晉侯謂伯瑕曰何謂六物對曰嵗時日月星辰是謂也服䖍以為嵗星之神也十二嵗而一周時四時也日十日也月十二月也星二十八宿也辰十二辰也言桑梓父母所植尚且必加恭敬况父母至尊至親宜莫不瞻依也然父母之不我愛豈我不屬于父母之毛乎豈我不離于父母之裏乎無所歸咎則推之於天曰豈我生時不善哉何不祥至是也集說謝氏枋得曰桑梓父母所植以遺子孫見其樹則思其人思其人則愛其樹所以必恭必敬也敬其桑梓豈敢忘其父母乎父母不我愛求其說而不可得於是歸之於天曰不知天生我之時我之日月星辰果在何處吉歟凶歟不可得而知也菀音鬱彼柳斯鳴蜩音條嘒嘒呼惠反有漼千罪反者淵􅍉音丸葦韋鬼反淠淠孚計反譬彼舟流不知所屆音戒叶居氣反心之憂矣不遑假寐集傳興也菀茂盛貎蜩蟬也嘒嘒聲也漼深貎淠淠衆也孔氏穎達曰柳由茂故上有鳴蟬其聲嘒嘒然淵由深故傍萑葦其衆淠淠然胡氏一桂曰蜩萑葦俱見七月屆至遑暇也菀彼柳斯則鳴蜩嘒嘒矣有漼者淵則萑葦淠淠矣今我獨見棄逐如舟之流于水中不知其何所至乎是以憂之之深昔猶假寐而今不暇也集說朱氏公遷曰物類相容則有可止息之處我不見容則如人所不用之舟而無可止息之處此以人不如物而起興鹿斯之奔維足伎伎其宜反雉之朝雊古豆反尚求其雌叶千西反譬彼壊胡罪反木疾用無枝心之憂矣寧莫之知集傳興也伎伎舒貎宜疾而舒留其羣也孔氏穎達曰獸走故以遲相待羅氏願曰鹿愛其類發於天性欲食皆鳴相召志不忌也雊雉鳴也孔氏穎達曰高宗肜日雉升鼎耳而雊說文云雊雄雉鳴也雉鳴而句其頸故字從隹句壊傷病也陸氏徳明曰壊說文作瘣爾雅云瘣木符婁郭云尫傴癭腫無枝條也寧猶何也鹿斯之奔則足伎伎然雉之朝雊亦知求其妃音配匹今我獨見棄逐如傷病之木憔悴而無枝是以憂之而人莫之知也集說蘇氏轍曰鹿走而留其羣雉鳴而求其雌物無不有恩於其親者親之不可去非獨以其愛亦以其助也今獨兀然如壊木之無枝而曾莫之顧何也相息亮反彼投尚或先蘇薦反叶蘇晉反之行有死人尚或墐音覲之君子秉心維其忍之心之憂矣涕既隕音藴之集傳興也相視投奔行道墐埋毛氏萇曰墐路冢也孔氏穎達曰左傳曰道墐相望是也秉執隕墜也相彼被逐而投人之尚或有哀其窮而先脫之者道有死人尚或有哀其㬥露而埋藏之者蓋皆有不忍之心焉今王信讒棄逐其子曾視投死人之不如則其秉心亦忍矣是以心憂而涕隕也集說王氏安石曰見迫逐而投人人宜利而取之也乃或先之使得避逃行路之死人人宜惡而違之乃或墐之使免㬥露惻隱之心人所宜有故也君子信讒如或醻市由反叶市救反之君子不惠不舒究之伐木掎寄彼反叶居何反矣析薪杝敕氏反叶湯何反矣舍音捨彼有罪予之佗吐賀反叶湯何反矣集傳賦而興也醻報鄭氏康成曰醻旅醻也如醻之者謂受而行之孔氏穎達曰醻酢皆作酬此作醻者古字得通用也惠愛舒緩究察也掎倚也以物倚其巓也杝隨其理也佗加也言王惟讒是聽如受醻爵得即飲之曾不加惠愛舒緩而究察之夫苟舒緩而究察之則讒者之情得矣伐木者尚倚其巓析薪者尚隨其理皆不妄挫折之今乃捨彼有罪之譖人而加我以非其罪曾伐木析薪之不若也此則興也集說輔氏廣曰六章七章始微有及其親之意然皆以君子稱之亦不過言其忍心信讒視我之不如投死人於我之不如伐木析薪而已雖怨而不忘於慕也莫高匪山叶所旃反莫浚蘇俊反匪泉君子無易夷䜴反由言耳屬音燭于垣無逝我梁無發我笱我躬不閱遑恤我後集傳賦而比也山極高矣而或陟其巔泉極深矣而或入其底故君子不可易於其言陳氏鵬飛曰由言言之所由發也恐耳屬于垣者有所觀望左右而生讒譖也王於是卒以裦姒為后伯服為太子故告之曰毋逝我梁毋發我笱胡氏一桂曰梁笱見邶谷風我躬不閲遑恤我後蓋比詞也東萊呂氏曰唐徳宗將廢太子而立舒王李泌諫之且曰願陛下還宫勿露此意左右聞之將樹功於舒王太子危矣此正君子無易由言耳屬于垣之謂也小弁之作太子既廢矣而猶云爾者蓋推本亂之所由生言語以為階也集說陳氏鵬飛曰王無輕發言小人之為讒者尚屬耳于垣壁閒以窺伺之讒賊之生也亦伺君子之向背如何耳范氏處義曰被讒見逐猶慮其敗我家事故以逝梁發笱為喻是我身自不能省閲何暇為後人計也所謂可以怨者如此總論許氏謙曰總言怨慕之意篇内五心之憂矣一曰云如之何其詞尚緩二曰疢如疾首則切於身矣三曰不遑假寐則晝夜無有休止四曰寧莫之知則無所告訴而倉卒急迫故終之以涕隕也朱氏善曰小弁之詩其哀痛迫切之意具於首章其下不過自此而推之耳小弁八章章八句集傳幽王娶於申生太子宜臼後得裦姒而惑之生子伯服信其讒黜申后逐宜臼而宜臼作此以自怨也序以為太子之傅述太子之情以為是詩不知其何所據也傳曰高子曰小弁小人之詩也孟子曰何以言之曰怨曰固哉高叟之為詩也有人於此越人關音彎弓而射之則已談笑而道之無他疏之也其兄關弓而射之則已垂涕泣而道之無他戚之也小弁之怨親親也親親仁也固矣夫高叟之為詩也曰凱風何以不怨曰凱風親之過小者也小弁親之過大者也親之過大而不怨是愈疏也親之過小而怨是不可磯也愈疏不孝也不可磯亦不孝也孔子曰舜其至孝矣五十而慕集說朱子語類問小弁詩古今說者皆以為此詩之意與舜怨慕之意同竊以為只我罪伊何一句與舜於我何哉之意同至後面君子秉心維其忍之與君子不惠不舒究之分明是怨其親却與舜怨慕之意似不同曰作小弁者自是未到得舜地位蓋亦常人之情耳只我罪伊何上面説何辜于天亦一似自以為無罪相似未可與舜同日而語也悠悠昊天曰父母且子餘反無罪無辜亂如此憮火呉反昊天已威叶紆胃反予愼無罪叶悴音昊天泰憮予愼無辜集傳賦也悠悠遠大之貎且語詞憮大也已泰皆甚也愼審也大夫傷於讒無所控告而訴之於天曰悠悠昊天為人之父母何氏楷曰天之於人若父母然親之之辭也胡為使無罪之人遭亂如此其大也昊天之威已甚矣我審無罪也昊天之威甚大矣我審無辜也此自訴而求免之詞也集說曹氏粹中曰昊天人之父母所當以生育長養為徳今人無罪辜也而亂降如此之大故呼天而訴之而怪其悠悠也亂之初生僭側䕃反始既涵音含亂之又生君子信讒君子如怒叶奴五反亂庶遄市專反沮慈呂反君子如祉音恥亂庶遄已集傳賦也僭始不信之端也涵容受也季氏本曰涵容如水之涵物君子指王也遄疾沮止也祉猶喜也言亂之所以生者由讒人以不信之言始入而王涵容不察其眞偽也亂之又生者則既信其讒言而用之矣君子見讒人之言若怒而責之則亂庶幾遄沮矣見賢者之言若喜而納之則亂庶幾遄已矣朱氏公遷曰喜怒以正遏惡揚善則讒無從生亂無從起矣今涵容不斷讒信不分是以讒者益勝而君子益病也蘇氏曰小人為讒於其君必以漸入之其始也進而嘗之君容之而不拒知言之無忌於是復進既而君信之然後亂成集說孔氏穎達曰人之行讒當有所因君能明察是非則偽辭不入讒言無由進也輔氏廣曰讒譖之始萌王惟一喜一怒之正足以絶之嚴氏粲曰言亂生於讒讒生於優柔不斷所謂懐狐疑之心者來讒賊之口持不斷之意者開羣枉之門也君子屢盟叶謨郎反亂是用長丁丈反叶直良反君予信盜亂是用㬥盜言孔甘亂是用餤音談匪其止共音恭維王之邛其恭反集傳賦也屢數也盟邦國有疑鄭氏康成曰有疑不協也則殺牲歃音霎血告神以相要束也鄭氏康成曰盟者書其辭於䇿殺牲取血坎其牲加書於上而埋之謂之載書李氏樗曰考之春秋如伯有之亂鄭伯與其臣下盟蓋盟生於君臣相疑而致也盜指讒人也孔氏穎達曰盜竊者必小人讒者亦小人因以盜名之餤進邛病也言君子不能已亂而屢盟以相要則亂是用長矣君子不能堲在力反讒王氏逢曰舜典朕堲讒説殄行蔡氏傳堲疾也而信盜以為虐則亂是用㬥矣讒言之美如食之甘使人嗜之而不厭則亂是用進矣然此讒人不能供其職事徒以為王之病而已蘇氏轍曰止職也言小人不守其位維為讒以病王也夫良藥苦口而利於病忠言逆耳而利於行維其言之甘而悅焉則其國豈不殆哉集說輔氏廣曰夫既不能用其喜怒以已亂則疑信不決故君臣或用盟誓以自固而讒人益得以行其意則亂是用長矣指讒為盜疾之之辭也巧為言以入於王心使王不覺而以㬥虐加人則是誠可謂盜矣至於嗜其言而甚甘焉則亂之益進未有窮已也匪其止共維王之邛此必指其實事以曉王耳夫讒諂之人必須自力於其職以市信於王然後其説始得以蠱惑王心而使不自覺焉故言此以曉之曰斯人也非眞能共其職業也適足以為王之病而已奕奕寢廟君子作之秩秩大猷聖人莫之他人有心予忖七損反度音鐸之躍躍他歴反毚士咸反遇犬獲叶黃郭反之集傳興而比也奕奕大也秩秩序也猷道莫定也鄒氏泉曰秩秩大猷聖人莫之如天叙有典天秩有禮而聖人為能品節之不差經綸之各當使之一定而不可易也躍躍跳疾貎毚狡也韓氏嬰曰趯趯往來貎獲得也言趯趯之毚謂狡數往來逃匿其跡有時遇犬得之奕奕寢廟則君子作之秩秩大猷則聖人莫之以興他人有心則予得而忖度之朱子曰詩人所見極大如此章本意只是惡巧言讒譖之人却以奕奕寢廟與秩秩大猷起興便見其所見極大形於言者無非義理之極致也嚴氏粲曰忖度讒人之心如下篇何人斯皆忖度之辭也而又以躍躍毚遇犬獲之比焉反覆興比以見讒人之心我皆得之不能隱其情也輔氏廣曰讒者方且跳梁恣肆以害人自謂人莫得而知已也一旦遇智者臨之則其情偽顯露有不可得而隱者誠有似乎毚之躍躍而忽遇犬焉則無所逃矣集說朱氏善曰寢廟之奕奕者惟君子為能作之以其法之定也太猷之秩秩者惟聖人為能莫之以其徳之盛也以興他人之有心亦惟我為能度之以其鑒之明也狡之走疾矣而遇犬則其跡無所逃讒人之言巧矣而遇明哲則其情無所遁亦何益之有哉荏而甚反染柔木君子樹叶上主反之往來行言心焉數所主反之蛇蛇以支反碩言出自口叶孔五反矣巧言如簧顔之厚叶胡五反矣集傳興也荏染柔貎柔木桐梓之屬可用者也行言行道之言也數辨也蛇蛇安舒也碩大也謂善言也顔厚者頑不知恥也荏染柔木則君子樹之矣往來行言則心能辨之矣若善言出於口者宜也巧言如簧則豈可出於口哉言之徒可羞愧而彼顔之厚不知以為恥也孟子曰為機變之巧者無所用恥焉其斯人之謂與眞氏徳秀曰憸巧之言悅可人聽如笙簧然使其知愧則不為矣集說朱氏善曰詳審而不㬥質實而無偽此君子之所謂碩言也阿狥以為容逢迎以為悅此小人之所謂巧言也自君子觀之不勝其可恥而小人之處此則顔厚而不以為愧也亦何望其能擴充羞惡之心而為不可勝用之義哉黃氏佐曰上章言讒人之心不難度此章言讒人之言不難辨彼何人斯居河之麋音睂無拳音權無勇職為亂階叶居奚反既微且尰市勇反爾勇伊何為猶將多爾居徒幾音紀叶居希反何集傳賦也何人斥讒人也此必有所指矣賤而惡之故為不知其姓名而曰何人也斯語辭也水草交謂之麋李氏樗曰左氏所謂孟諸之麋是也朱子曰居河之麋則非高明爽塏之地也拳力階梯也骭音限瘍音羊為微腫足為尰孔氏穎達曰郭璞云骭脚脛也瘍瘡也膝脛之下有瘡腫是渉水所為猶謀將大也言此讒人居下溼之地雖無拳勇可以為亂而讒口交鬭専為亂之階梯又有微尰之疾亦何能勇哉而為讒謀則大且多如此是必有助之者矣然其所與居之徒衆幾何人哉言亦不能甚多也集說呂氏祖謙曰此非特賤讒人之辭蓋言其本易驅除特王不悟耳鄒氏泉曰讒人本不難知不難辨不難除宜其無讒也特以王心信之而不悟此大夫所以傷於讒也總論許氏謙曰夫人既被讒終篇未嘗有怨懟詆斥之語拳拳專欲諷上之審聽而五章且以開讒人之迷不自憂其身而惟憂天下之亂不惡怒其人而發其羞恥之心詩人之忠厚如此呉氏師道曰此詩前三章刺聽讒者後三章刺讒人巧言六章章八句集傳以五章巧言二字名篇集說范氏處義曰言之巧者善讒人者也聖人以為鮮仁蓋不仁者乃能巧言故木訥者所以近仁也鄒氏泉曰此詩見大夫憂亂之情而忠君之義惡惡之嚴見於言表矣彼何人斯其心孔艱叶居銀反胡逝我梁不入我門叶睂貧反伊誰云從維㬥之云集傳賦也何人亦若不知其姓名也孔甚艱險也我舊說以為蘇公也㬥㬥公也皆畿内諸侯也舊說㬥公為卿士而譖蘇公故蘇公作詩以絶之然不欲直斥㬥公故但指其從行者而言彼何人者其心甚險胡為往我之梁而不入我之門乎既而問其所從則㬥公也夫以從㬥公而不入我門則㬥公之譖已也明矣但舊說於詩無明文可考未敢信其必然耳集說呂氏大臨曰託過門不入之喻以道其反側之情情之不直讒我必矣范氏處義曰彼何人斯雖為鄙薄之語然不斥㬥公指其從㬥公者耳亦譎諌之義人心固險如山川難於知矣況於小人尤為艱險不可測也過我門而不入必其中自有可愧者使㬥公不譖我爾必入而見我今爾從㬥公而不我見則踪跡可疑也輔氏廣曰彼何人斯其心孔艱責之也而不為已甚之辭胡逝我梁不入我門疑之也而猶有望之之意伊誰云從維㬥之云始明言之而其情既不得而遁然亦無忿懟之辭也可謂忠厚矣二人從行誰為此禍胡果反胡逝我梁不入唁我始者不如今云不我可集傳賦也二人㬥公與其徒也唁弔失位也言二人相從而行不知誰譖已而禍之乎既使我得罪矣而其逝我梁也又不入而唁我汝始者與我親厚之時豈嘗如今不以我為可乎蘇氏轍曰始謂我可而今謂我不可也集說輔氏廣曰雖已明知其人之譖已而猶為不知之辭曰二人從行誰人譖我而為我之禍乃今逝我之梁而不入唁我乎大抵讒人者自是無面目以見人然其所以自解者則必曰我之所以不見此人者以此人之不足見也故詰之曰爾始者豈嘗如今乎趙氏一元曰不責其譖已而責其入唁可謂善於立言彼何人斯胡逝我陳我聞其聲不見其身不愧于人不畏于天叶鐡因反集傳賦也陳堂塗也堂下至門之徑也李氏如圭曰其北當階其南接門内霤也在我之陳則又近矣聞其聲而不見其身言其蹤跡之詭祕也不愧于人則以人為可欺也天不可欺女獨不畏于天乎奈何其譖我也集說范氏處義曰逝我陳則不止逝我梁我已聞其聲則又近矣而不使我見其身意其隂有窺伺蹤跡詭祕也於是歎曰爾為此舉固以人為可欺而不愧也獨不畏于天乎輔氏廣曰古之責人往往至天而極如雨無正所謂胡不相畏不畏于天亦是意也彼何人斯其為飄風叶孚愔反胡不自北胡不自南叶尼心反胡逝我梁祇音支攪交卯反我心集傳賦也飄風㬥風也攪擾亂也言其往來之疾若飄風然自北自南則與我不相値也輔氏廣曰言其儇利便㨗耳此則讒人之態也今則逝我之梁則適所以攪亂我心而已集說孔氏穎達曰以其徑來而徑去知為疾也非在道急速故下章言其安行姚氏舜牧曰又著其人心情靡定踪跡無常不南不北而又不實來唁我祇以攪我之心此深疾而痛恨之詞也爾之安行亦不遑舍叶啇居反爾之亟紀力反行遑脂爾車壹者之來云何其盱況于反集傳賦也安徐遑暇舍息亟疾盱望也字林云旴張目也易曰盱豫悔劉氏瑾曰豫六三爻本義曰盱上視也隂不中正而近於四故六三上視於四而下溺於豫宜有悔者也三都賦云旴衡而誥是也許氏謙曰左太冲魏都賦魏國先生盱衡而誥注盱張目也睂上曰衡謂舉睂揚目也言爾平時徐行猶不暇息而況亟行則何暇脂其車哉今脂其車則非亟也乃託以亟行而不入見我則非其情矣何不一來見我如何使我望汝之切乎集說嚴氏粲曰反覆委曲以情責之也汝之不來見我謂無暇耳我謂爾行之緩乎亦不見爾舍息固不可謂有暇也我謂爾行之亟乎又閒暇而脂其車不可謂無暇也今屢出而不來見我是可疑矣爾還而入我心易以䜴反叶以支反也還而不入否難知也壹者之來俾我祇也集傳賦也還反易說祇安也言爾之往也既不入我門矣儻還而入則我心猶庶乎其說也王氏安石曰入則我心乎易而不之怨也還而不入則爾之心我不可得而知矣何不一來見我而使我心安乎董氏曰是詩至此其詞益緩若不知其為譖矣集說叚氏昌武曰爾還而入我心即為之平易則蘇公之怨良易解也其心之忠厚可知矣朱氏善曰壹者之來云何其盱望之切也壹者之來俾我祇也悅之深也未見而望之切既見而悅之深我之所以待彼者其故舊之情自若也而彼之所以待我者乃獨異於平時何也反覆委曲言之而讒者之情愈無所遁矣伯氏吹壎況袁反仲氏吹篪音池及爾如貫諒不我知出此三物以詛側助反爾斯叶先齎反集傳賦也伯仲兄弟也俱為王臣則有兄弟之義矣樂器土曰壎大如鵝子銳上平底似稱錘六孔劉氏熙曰塤喧也聲濁喧喧然孔氏穎達曰壎周禮小師職作塤古今字異耳釋樂云大塤謂之嘂音呌孫炎曰音大如呌呼也竹曰篪長尺四寸圍三寸七孔一孔上出徑三分凡八孔横吹之劉氏熙曰篪啼也聲從孔出如嬰兒啼也何氏楷曰篪本作䶵亦作竾如貫如繩之貫物也言相連屬也諒誠也三物犬豕雞也刺其血以詛盟也陸氏徳明曰以禍福之言相要曰詛孔氏穎達曰隱十一年左傳曰鄭伯使卒出猳行出犬雞以詛射穎考叔者豭即豕也竝言詛而俱用三故知此三物豕犬雞也民不相信則盟詛之言古者有此禮故欲與之詛也伯氏吹壎而仲氏吹篪言其心相親愛而聲相應和也朱氏公遷曰親愛以伯仲言應和以壎篪言與汝如物之在貫豈誠不我知而譖我哉苟曰誠不我知則出此三物以詛之可也集說輔氏廣曰讒者之讒人或責之而自文其過不過有二説焉不以為其人實有其事則必以為我本無心但實是不相知耳以人為實可罪則二章之所責是也以為實不相知則此章之所責是也黃氏佐曰吹壎吹篪者言相與謀國之時一議一論相為和附而不拂逆也如貫者言同為王臣之時勢相聨屬而休戚安危相倚也姚氏舜牧曰前六章通就讒人往來踪跡之可疑上說以見其情之可惡此節始以正義責之相知何待於今日相信何待於詛盟若此云者正責其面和而背詆非同寅協㳟和衷之君子也為鬼為蜮音域則不可得有靦土典反面目視人罔極作此好歌以極反側集傳賦也蜮短狐也江淮水皆有之能含沙以射水中人影其人輒病而不見其形也陸氏徳明曰蜮狀如鼈三足一名射工俗呼之水弩靦面見人之貌也好善也反側反覆不正直也言汝為鬼為蜮則不可得而見矣女乃人也靦然有面目與人相視無窮極之時豈其情終不可測哉是以作此好歌以究極爾反側之心也嚴氏粲曰此章峻辭責之不復含隱也集說王氏安石曰作是詩將以絶之也而曰好歌者有欲其悔悟之心焉耳鄒氏泉曰究極其反側使知智可以欺君而不可以欺君子之心姦可以欺中人而不可以逃君子之見庶知所悔悟以回其孔艱之心也總論郝氏敬曰詩言微婉未有刺其人而直斥之者故屢言彼何人斯為窮詰之詞從行二人究其推諉之奸逝梁不入發其忸怩之情飄風鬼蜮比其曖昧之私辭婉而意切矣錢氏天錫曰通詩只以極反側一言盡之應其心孔艱句孔艱内即含下文始厚今薄欺天罔人踪跡之詭秘鬼蜮之情狀下文特段段委曲以申其意耳蓋譖人之人難施面目所以藏形匿影若被譖之人於心無愧明目張膽無不可復見也是以屢屢欲其一來則彼羞澀難前之態宛然在目而讒搆排擠之罪不言自顯矣何人斯八章章六句集傳此詩與上篇文意相似疑出一手但上篇先刺聽者此篇専責讒人耳王氏曰㬥公不忠於君不義於友所謂大故也故蘇公絶之然其絶之也不斥㬥公言其從行而已不著其譖也示以所疑而已既絶之矣而猶告以壹者之來俾我祇也蓋君子之處已也忠其遇人也恕使其由此悔悟更以善意從我固所願也雖其不能如此我固不為已甚豈若小丈夫然哉一與人絶則醜詆固拒唯恐其復合也集說王氏志長曰蘇公之為人不詳意其被譖之事有闗於君徳之邪正社稷之安危者蓋人臣一身之進退甚小而國事之是非所爭甚大也不然此詩不過同列得謗相詬詈之言何足登之雅乎萋七西反兮斐孚匪反兮成是貝錦彼譖人者亦已大音泰甚食荏反集傳比也萋斐小文之貎毛氏萇曰文章相錯也貝水中介蟲也有文彩似錦陸氏璣曰貝龜鼈之屬其文彩之異大小之殊甚衆古者貨貝是也餘蚔黄為質以白為文餘泉白為質黃為文又有紫貝其白質如玉紫㸃為文皆行列相當其大者常有徑一尺小者七八寸時有遭讒而被宫刑為巷伯者作此詩言因萋斐之形而文致之以成貝錦以此讒人者因人之小過而飾成大罪也彼為是者亦已大甚矣集說季氏本曰貝不可以為錦但以其背有錯雑之文有似於錦遂以錦名以比讒言起於疑似亦以見文致之意也大甚言成之而不可解也哆昌者反兮侈尺是反兮成是南箕彼譖人者誰適丁歴反下同與謀叶謨悲反集傳比也哆侈微張之貎南箕四星嚴氏粲曰箕東方之宿考星者多騐於南方故曰南箕二為踵二為舌其踵狹而舌廣則大張矣朱氏謀㙔曰天文箕主口舌以喻讒者何氏楷曰以比意求之取象南箕有簸揚其說之意適主也誰適與謀言其謀之閟也姚氏舜牧曰凡人為謀有所以主之者則其為譖也深矣集說陳氏鵬飛曰南箕之星本非箕張大其口以成其名爾貝錦南箕皆曰成是者言我本無是實因萋斐張大以成之爾朱氏善曰萋斐以成貝錦喻讒人者能因細小而飾成大罪也哆侈以成南箕喻讒人者能因疑似而構成實罪也始則以小而成大終則以虚而為實此讒人者所以能傾人之家國也緝緝七立反翩翩音篇叶批賓反謀欲譖人愼爾言也謂爾不信叶斯人反集傳賦也緝緝口舌聲或曰緝緝人之罪也或曰有條理貎皆通翩翩往來貎譖人者自以為得意矣然不愼爾言聽者有時而悟且將以爾為不信矣集說嚴氏粲曰三章四章述讒人情狀而戒之也爾讒人當謹愼其言無専飾虛為實虚言無實有時而敗露聽者將謂爾不足信矣朱氏善曰譖之初行既以不信而加諸人言之不愼亦以不信而責於汝戒之也捷捷幡幡芳煩反叶芬邅反謀欲譖言豈不爾受既其女音汝遷集傳賦也捷捷儇利貌幡幡反覆貌王氏曰上好譖則固將受女然好譖不已則遇譖之禍亦既遷而及女矣嚴氏粲曰女能譖人人亦能譖女其禍將遷及女矣曾氏曰上章及此皆忠告之詞集說輔氏廣曰愼爾言也謂爾不信自譖者而言也豈不爾受既其女遷自聽者而言也皆所必至之理故以之忠告於為譖者庶乎其知所畏而不敢肆耳徐氏常吉曰譖人之事豈可恃以為常君能聽爾之言亦能聽人之言君能以爾之言加罪於人亦能以人之言加罪於爾且不以誠相與而惟以詐相傾則聽者之心固不能保其終不吾疑矣驕人好好勞勞草草蒼天蒼天叶鐡因反視彼驕人矜此勞人集傳賦也好好樂也草草憂也驕人譖行而得意勞人遇譖而失度其狀如此集說輔氏廣曰視彼驕人庶乎有以抑遏沮止之也矜此勞人庶乎有以扶持慰安之也彼譖人者叶掌與反誰適與謀叶滿補反取彼譖人投畀豺士皆反虎豺虎不食投畀有北有北不受叶承呪反投畀有昊叶許候反集傳賦也再言彼譖人者誰適與謀者甚嫉之故重言之也或曰衍文也投棄也北北方寒涼不毛之地也孔氏穎達曰左傳曰食土之毛地官載師曰宅不毛皆謂草木也劉氏瑾曰窮北之地多寒不生草木五穀投棄讒人於彼使凍餓之也不食不受言讒譖之人物所共惡也昊昊天也投畀昊天使制其罪王氏逢曰制斷也正也此皆設言以見欲其死亡之甚也故曰好賢如緇衣惡惡如巷伯集說陸氏佃曰豺虎以殺為性則宜無所不食有北以載為徳則宜無不受者今曰不食不受且付昊天使制其罪則惡之甚也楊園之道猗於綺反于畝丘叶祛竒反寺人孟子作為此詩凡百君子敬而聽之集傳興也楊園下地也朱氏公遷曰楊者近水之木宜下隰故楊園為下地猗加也畝丘高地也朱氏公遷曰畝田之壟也邱如田壟故曰畝丘寺人内小臣蓋以讒被宮而為此官也劉氏瑾曰周禮天官寺人之官凡五人寺之言侍也侍王於路寢而掌王之内人及女宮之戒令蓋奄人也孟子其字也楊園之道而猗于畝丘以興賤者之言或有補於君子也蓋譖始於微者而其漸將及於大臣故作詩使聽而謹之也劉氏曰其後王后大子及大夫果多以讒廢者集說黃氏佐曰不敬而聽之則萋斐之形未必不為貝錦之文致哆侈之萌未必不為南箕之羅織聽而曰敬者願於信從之謂也鄒氏泉曰卑可升高有下可益上之意故以為興楊園畝丘是自下而上故曰加敬而聽之欲其因已之言而善保其身以免於讒也總論朱氏公遷曰一章二章責之三章四章誨之五章怨而訴之六章深惡而痛疾之七章則言作詩以為君子之戒也顧氏起元曰前六章極言讒人之無忌而望制於天末章言讒禍之漸進而致謹於人錢氏天錫曰詩被痛而作故反覆哀傷或怨或訴皆深惡讒人之詞篇中一敬字總是發明憂讒畏譏惴惴小心之旨亦未敢謂敬遂足以免讒也巷伯七章四章章四句一章五句一章八句一章六句集傳巷是宮内道名秦漢所謂永巷是也劉氏瑾曰三輔黃圖云永長也宮中之長巷伯長也主宮内道官之長即寺人也故以名篇陳氏鵬飛曰詩名巷伯以寺人解之明巷伯即寺人也班固司馬遷贊云迹其所以自傷悼小雅巷伯之倫其意亦謂巷伯本以被讒而遭刑也而楊氏曰寺人内侍之微者出入於王之左右親近於王而日見之宜無閒之可伺矣今也亦傷於讒則疎遠者可知故其詩曰凡百君子敬而聽之使在位知戒也其說不同然亦有理姑存於此云集說陳氏櫟曰巧言何人斯巷伯三篇具述讒言之禍與讒人之情狀可謂極矣朱氏公遷曰已上三篇皆刺讒者之詩故相屬習習谷風維風及雨將恐邱勇反將懼維予與女音汝將安將樂音洛女轉棄予叶演女反集傳興也習習和調貌谷風東風也將且也恐懼謂危難憂患之時也此朋友相怨之詩故言習習谷風則維風及雨矣將恐將懼之時則維予與女矣毛氏萇曰風雨相感朋友相須奈何將安將樂而女轉棄予哉毛氏萇曰言朋友趨利窮達相棄朱氏公遷曰患難則相保安樂則相遺此無恒心之人也集說李氏樗曰朋友之相須既如風之與而今也當罹患難之時則惟我與女二人同其憂至於安樂之時女反棄予朋友相須之義豈如是乎呂氏祖謙曰朋友之義出於天其相求本非以利害也故窮達若一不知其義則利害而已耳離合安可常哉玩習習谷風維風及雨之辭其義蓋可識矣習習谷風維風及頽徒雷反將恐將懼寘之䜴反予于懐叶胡隈反將安將樂棄予如遺叶夷回反集傳興也頽風之焚輪者也毛氏萇曰風薄相扶而上喻朋友相須而成孔氏穎達曰釋天云焚輪謂之頽孫炎曰廻風從上下曰頽然則頽者廻風從上而下力薄不能更升谷風與相遇乃相扶而上寘與置同置于懐親之也如遺忘去而不復存省也集說王氏安石曰風之扇物則因其勢而相高朋友相汲引則徳義相高輔氏廣曰維予與女喣濡之私意也棄予如遺反覆之薄情也寘予于懐維予與女之甚也棄予如遺女轉棄予之甚也夫喣濡之私情則非天理之公反覆之薄情則非天理之厚夫朋友相與自有一定之分誠信相與憂樂如一固不必有喣濡之私意亦豈可有反覆之薄情也習習谷風維山崔徂回反嵬五回反無草不死無木不萎叶於回反忘我大徳思我小怨叶韻未詳集傳比也崔嵬山巓也習習谷風惟山崔嵬則風之所被者廣矣然猶無不死之草無不萎之木況於朋友豈可以忘大徳而思小怨乎或曰興也朱氏公遷曰以谷風生物興大徳以草死木萎興小怨謂興體亦可也蓋謂之比則重在忘字與思字謂之興則重在大徳小怨字集說劉氏敞曰習習之風生草木也崔嵬之山養草木也然而不能使草長不死不能使木長不萎者天地之功有所不足也奈何忘我大徳思我小怨乎輔氏廣曰大徳謂朋友之義出於天者小怨謂懟語忿色生於人者忘大徳思小怨必是當時人有如是實事故末章因風以為比而明言之以戒其不可如是也或以為興者拘於例耳然不若以為比之是也總論呂氏大臨曰急則相求緩則相棄恩厚不知怨小必記皆小人之交也鄒氏泉曰一章二章怨其始合而終睽末章言其不當以小怨而見睽也谷風三章章六句集說朱氏公遷曰谷風蓋與伐木為反對終和且平則無谷風之怨矣蓼蓼音六者莪五河反匪莪伊蒿呼毛反哀哀父母生我劬勞集傳比也蓼長大貌莪美菜也蒿賤草也嚴氏粲曰釋草曰蘩之醜秋為蒿釋云醜類也言蘩蕭蔚莪之類春始生氣味既異故其名不同至秋老成則皆蒿也此說莪蒿甚明以莪彤蒿莪美而蒿惡人民勞苦孝子不得終養而作此詩言昔謂之莪而今非莪也特蒿而已以比父母生我以為美材可頼以終其身而今乃不得其養以死於是乃言父母生我之劬勞而重自哀傷也集說呂氏祖謙曰莪蒿不能報天地之生育猶人子不能報父母之劬勞也朱氏善曰此詩諸儒皆以為興至集傳正以為比而其義始明凱風之予以棘自比棘固木之賤者也蓼莪之子以蒿自比蒿固草之賤者也凱風以已非美材故念母氏養我之劬勞則自責以期親之悔悟也蓼莪以已非美材而念父母生我之劬勞則父母已没矣重自哀傷而已蓼蓼者莪匪莪伊蔚音尉哀哀父母生我勞瘁似醉反集傳比也蔚牡菣去刃反也三月始生七月始華如胡麻華而紫赤八月為角似小豆角銳而長嚴氏粲曰馬薪蒿也蒿之尤麤大者也瘁病也集說何氏楷曰羅願云匪莪伊蒿蒿猶有子者匪莪伊蔚蔚則無子蓋今青蒿葉端皆作子如米大蔚獨無爾以見父母得我之難今皆無報則有我之不如無也瘁通作顇顦顇也劬勞而至於瘁勞苦見於貌也念生我之勞瘁而我不能以子報其哀何如缾之罄矣維罍之恥鮮息淺反民之生不如死之久叶舉里反矣無父何怙無母何恃出則銜恤入則靡至集傳比也缾小罍大皆酒器也罄盡鮮寡恤憂靡無也言缾資於罍而罍資缾猶父母與子相依為命也故缾罄矣乃罍之恥猶父母不得其所乃子之責劉氏瑾曰以缾比父母以罍比子但取其相資之義而不取義於缾罍之小大也如左傳昭公二十四年鄭子大叔引此而曰王室之不寧晉之恥也以缾喻周以罍喻晉亦不取小大之義也所以窮獨之民生不如死也蓋無父則無所怙無母則無所恃陸氏徳明曰韓詩云怙賴也恃負恃也是以出則中心銜恤入則如無所歸也集說曹氏粹中曰以無怙恃故謂之鮮民言其薄徳而寡祜也孝子出必告反必面今出而無所告故銜恤上堂入室而不見故靡至也父兮生我母兮鞠我拊音撫我畜喜六反我長丁丈反我育我顧我復我出入腹我欲報之徳昊天罔極集傳賦也生者本其氣也鞠畜皆養也拊拊循也劉氏彝曰防其驚也則拊之育覆育也孔氏穎達曰謂其寒暑或身體嫗之覆近而愛育焉顧旋視也孔氏穎達曰謂去之而反顧也復反覆也呂氏祖謙曰邱氏曰不能暫舍也腹懐抱也孔氏穎達曰謂置之於懐抱罔無極窮也言父母之恩如此欲報之以徳而其恩之大如天無窮不知所以為報也集說揚氏雄曰父母人之天地與無天何生無地何形何氏楷曰得天地之塞以成形而所以成其形者親得天地之帥以成性而所以成其性者親形性合而成人天親原自合一以其生生者一也南山烈烈飄風發發民莫不穀我獨何害叶音曷集傳興也烈烈高大貌發發疾貌穀善也南山烈烈則飄風發發矣民莫不善而我獨何為遭此害也哉集說曹氏粹中曰周民皆然而乃云民莫不穀者勞苦之民身受其害自以為夫人而不若耳朱氏公遷曰山高大則風亦疾民莫不穀則我當與之皆善也而獨遭此害何哉此以物理之齊興人事之不齊亦反其意以為興也南山律律飄風弗弗叶分聿反民莫不穀我獨不卒集傳興也律律猶烈烈也王氏安石曰南山之勢律律蓋崒嵂之謂也弗弗猶發發也卒終也言終養也集說輔氏廣曰我獨何為而遭此害也哉我獨何為而不得終養也哉此兩句最宜玩蓋末後方及其所以不得終養之意總論鄒氏泉曰此詩首二章是喻其不得終養而因傷父母之劬勞三章是言不得終養正以應匪莪伊蒿二句意四章是言父母之恩正以應生我劬勞二句意末二章又重自哀痛以申不得終養之意也姚氏舜牧曰為人子者常存匪莪伊蒿之心則自不敢為匪才以辱其親矣常存昊天罔極之念則自不敢少偷惰以終其身矣蓼莪六章四章章四句二章章八句集傳晉王裒以父死非罪劉氏瑾曰司馬昭為魏安東將軍與呉戰敗昭問於衆曰近日之事誰任其咎王裒父儀對曰責在元帥昭怒而斬之每讀詩至哀哀父母生我劬勞未嘗不三復流涕受業者為廢此篇詩之感人如此集說朱氏善曰孝子行役不得以養其父母而形於歎詠者如陟岵鴇羽皆是也而蓼莪之詩獨使人誦之者流涕嗚咽而不能止何也曰陟岵鴇羽思念於父母尚存之日蓼莪之詩感傷於父母既没之後父母尚存則雖曠廢於今日而猶幸來日之可繼也若父母之既没則念生育之艱思顧復之勤罔極之恩既不可得而報則無涯之悲亦孰得而止之哉此蓼莪之所以作也有饛音䝉簋音軌飧音孫有捄音求棘七必履反周道如砥之履反其直如矢君子所履小人所視叶善止反睠音眷言顧之澘所奸反焉出涕音體集傳興也饛滿簋貌飧熟食也毛氏萇曰謂黍稷也孔氏穎達曰禮之通例皆簠盛稻粱簋盛黍稷捄曲貌棘七以棘為七所以載鼎肉而升之於俎也毛氏萇曰七所以載鼎實孔氏穎達曰以七載之謂出之於鼎升之於俎也棘棘木也吉禮用棘砥礪石言平也孔氏穎達曰禹貢曰礪砥砮丹以砥石能磨物使平也矢言直也孔氏穎達曰矢則幹必直君子在位履行小人下民也睠反顧也潸涕下貌序以為東國困於役而傷於財譚大夫作此以告病鄭氏康成曰譚國在東故其大夫尤苦征役之事也杜氏預曰譚國在濟南平陵縣孔氏穎達曰譚大夫雖自為已怨而王政大經偏東非譚獨然故言東以廣之言有饛簋飧則有捄棘七周道如砥則其直如矢是以君子履之而小人視焉今乃顧之而出涕者則以東方之賦役莫不由是而西輸於周也集說輔氏廣曰周道只道路之道與下章周行一意故集解以為東方之賦役莫不由是而西輸於周是即指道路而言也然以上四句平直視履之義觀之則又似指周之王道而言豈本意只是指道路而言而其中亦含此意耶黄氏佐曰君子履此道以朝周小人視此道以往周是時賦役尚均履則履之未嘗有懟憾之色視則視之未嘗有欷歔之歎也今乃睠言顧之至潸然而出涕者則周道雖無恙而時政之弊已不復前時矣小東大東叶都郎反杼直呂反柚音逐其空叶枯郎反糾糾葛履可以履霜佻佻徒彫反公子行彼周行叶户郎反既往既來叶六直反使我心疚叶訖力反集傳賦也小東大東東方小大之國也自周視之則諸侯之國皆在東方杼持緯音渭者也曹氏粹中曰用梭以行緯柚受經者也陸氏徳明曰柚本又作軸董氏逌曰柚卷織者空盡也佻輕薄不奈勞苦之貌公子諸侯之貴臣也周行大路也疚病也言東方小大之國杼柚皆已空矣至於以葛屨履霜而其貴戚之臣奔走往來不勝其勞使我心憂而病也集說范氏處義曰此言周室賦歛於東者偏重凡東方諸侯無小無大杼柚皆為之空也輔氏廣曰糾糾葛屨可以履霜舉其甚者言之也以葛屨履霜則冬裘之不備可知矣既往既來則言其來往之不一也周道一也方其盛時君子履之而小人視焉及其衰也公子行之而人心病焉時移事變而人心所感不同如此有冽音列氿音軌泉叶才勻反無浸穫薪契契苦計反寤歎哀我憚丁佐反人薪是穫薪尚可載叶節力反也哀我憚人亦可息也集傳興也冽寒意也側出曰氿泉劉氏熙曰流狹而長如車軌穫艾也孔氏穎達曰穫讀如穫稻之穫故為刈也契契憂苦也憚勞也尚庶幾也載載以歸也蘇氏曰薪已穫矣而復漬之則腐民已勞矣而復事之則病故已艾則庶其載而畜之已勞則庶其息而安之輔氏廣曰上兩章既言傷於財故此章推本其困於役而言之耳集說嚴氏粲曰穫薪以供㸑必㬥而乾之然後可用若浸之於寒冽之泉則溼腐而不可㸑矣喻民當撫恤之然後可用若困之以㬥虐之政則窮悴而不能勝矣故契契寤歎哀我東國勞苦之人也徐氏光啓曰凡徴發之煩供億之困皆可言勞也不盡人力不盡人財皆可言息也東人之子職勞不來音賚叶六直反西人之子粲粲衣服叶蒲北反舟人之子熊羆是裘叶渠之反私人之子百僚是試叶申之反集傳賦也東人諸侯之人也職専主也來慰撫也嚴氏粲曰専主為勞苦而曾不被慰來西人京師人也孔氏穎達曰東以對西則西人是京師之人粲粲鮮盛貌舟人舟楫之人也熊羆是裘言富也私人私家皁隸之屬也僚官試用也舟人私人皆西人也此言賦役不均羣小得志也輔氏廣曰賦役不均言貧富不同勞佚有異也羣小得志言衣服之華百僚是試也集說歐陽氏修曰言東人困苦如此而周人方事侈富潔其衣服以相誇至於操舟之賤亦衣熊羆之裘而私家之人皆備百官而祿食朱氏善曰東人之子職勞不來則雖以公子之貴而奔走往來其賤者可知也西人之子而粲粲衣服熊羆是裘則貧窶者且轉而富矣復百僚之是試則卑賤者且轉而貴矣别舟人私人言之者舉卑賤以見其餘也或以其酒不以其漿鞙鞙胡犬反佩璲音遂不以其長維天有漢監古暫反亦有光跂邱豉反彼織女終日七襄集傳賦也鞙鞙長貌陸氏徳明曰鞙或作琄璲瑞也鄭氏康成曰佩璲者以瑞玊為佩佩之鞙鞙然漢天河也孔氏穎達曰揚泉物理論云漢水之精也氣發而著精華浮上宛轉隨流名曰天河一曰雲漢此天河雖則有光不能照物故有光而無明也跂隅貌陸氏徳明曰跂說文作織女星名在漢㫄三星跂然如隅也孔氏穎達曰孫毓云織女三星跂然如隅然則三星鼎足而成三角望之跂然故云隅貌七襄未詳傳曰反也孔氏穎達曰謂從日至暮七辰而復反於夜也箋云駕也駕謂更其肆也蓋天有十二次日月所止舍所謂肆也經星一晝一夜左旋一周而有餘則終日之閒自卯至酉當更七次也孔氏穎達曰在天為次在地為辰星之行天晝夜雖各六辰數者舉其終始故七即自卯至酉也言終日是晝也晝不見而言七移者據其理當然矣劉氏瑾曰日月五星為緯其餘皆為經星經星周布與天為體所謂經星一晝夜左旋一周天而有餘者即天之旋一周而又過一度者也然周天十二次一晝夜十二時則一時當歴一次故終其晝日之閒自卯至酉凡七時織女星當歴七次也言東人或饋之以酒而西人曾不以為漿東人或與之以鞙然之佩而西人曾不以為長維天之有漢則庶乎其有以監我而織女之七襄則庶乎其能成文章以報我矣無所赴愬而言惟天庶乎其恤我耳集說輔氏廣曰侯邦供王賦役固其職也然為王者當有以體恤之不敢易視而輕用之可也觀禹貢之底愼財賦無逸之惟正之供則必不至於易視而輕用之矣今也東國財力俱困而西人易視之如此則輕用之必矣此東國之所以怨病而愬之於天也朱氏善曰酒之厚而不以為漿佩之鞙鞙而不以為長其出之也甚艱其視之也甚賤蓋其意氣驕溢類如此然則貧富勞逸之不均吾將曷愬哉亦惟愬之於天而已漢之有光其亦能監視我也耶織女之七襄其亦能成文章以報我也耶其詞之婉而不迫如此詩人之忠厚亦可見矣雖則七襄不成報章晥華板反彼牽牛不以服箱東有啓明叶謨郎反西有長庚叶古郎反有捄天畢載施之行戸郎反集傳賦也睆明星貌牽牛星名毛氏萇曰河鼔謂之牽牛服駕也箱車箱也孔氏穎達曰車内容物之處為箱以經有牽牛之文故知車箱也啓明長庚皆金星也以其先日而出故謂之啓明以其後日而入故謂之長庚毛氏萇曰庚續也劉氏彝曰金星朝在東所以啓日之明夕在西所以續日之長蓋金水二星常附日行而或先或後但金大水小故獨以金星為言也劉氏瑾曰金水附日而行無定在或一在日先一在日後或俱在日先或俱在日後金星行在日後則晨見而昏不見行在日先則昏見而晨又不見也天畢畢星也狀如掩之畢朱氏公遷曰畢長柄小網也畢八星二星直上如柄六星曲為兩行張其口如畢網也行行列也言彼織女不能成報我之章牽牛不可以服我之箱而啓明長庚天畢者亦無實用但施之行列而已至是則知天亦無若我何矣集說歐陽氏修曰雖有織女不能為我織而成章雖有牽牛不能為我駕車而輸物雖有啓明長庚不能助曰為晝俾我營作雖有天畢不能為我掩捕鳥獸朱氏公遷曰此又怨天弗能加憫恤也維南有箕不可以簸波我反揚維北有斗不可以挹音揖酒漿維南有箕載翕許急反其舌維北有斗西柄之揭音訐集傳賦也箕斗二星以夏秋之閒見於南方劉氏瑾曰六七月閒見於南方者指當時昏見為言也云北斗者以其在箕之北也孔氏穎達曰二十八宿連四方為名者唯箕斗井壁四星而已壁在室東故稱東壁井在參東故稱東井推此則箕斗竝在南方之時箕在南而斗在北故言南箕北斗也劉氏瑾曰此謂南斗即上文夏秋之閒見南方者也或曰北斗常見不隱者也董氏逌曰斗四星為斗三星為柄朱子曰北斗七星在紫宮南其杓所建周於十二辰之舍以定十有二月斟酌元氣運乎四時者也翕引也舌下二星也朱氏公遷曰箕四星在天漢之中二為踵在上二為舌在下踵反在上故曰引其舌也南斗柄固指西若北斗而西柄則亦秋時也嚴氏粲曰露漸為霜雲漢分明斗指西箕在南皆秋時也言南箕既不可以簸揚糠粃北斗既不可以挹酌酒漿而箕引其舌反若有所吞噬斗西揭其柄反若有所挹取於東是天非徒無若我何乃亦若助西人而見困甚怨之詞也集說歐陽氏修曰言我譚人困於供億取資於地者皆已竭矣欲取於天又不可得也末言箕斗非徒不可用箕反若有所噬斗反若有所挹取於東是皆怨諷之辭也總論曹氏粹中曰此詩縁困於役而傷於財故其所冀望而不足者皆衣服飲食之事徐氏常吉曰俯觀周道而傷今思古之懐既有感於中中察人事而彼此不均之狀又有激於目仰觀天象又若有不恤東人而反助西人之意俯仰之閒何莫而非見困者哉大東七章章八句集說王氏應麟曰陳氏曰古者諸侯無私史有邦國之志則小史掌之而藏周室故費誓繫於周書漢汝江沱至於譚大夫下國之詩皆編入於南雅四月維夏叶後五反六月徂暑先祖匪人胡寧忍予叶演女反集傳興也徂往也四月六月亦以夏正數之建已建未之月也此亦遭亂自傷之詩言四月維夏則六月徂暑矣孔氏穎達曰月令季夏六月昏大火中是火星中而暑退暑盛而往矣我先祖豈非人乎何忍使我遭此禍也無所歸咎之詞也集說孔氏穎達曰人困則反本窮則告親故言我先祖非人明怨恨之甚猶正月之篇怨父母生已不自先後也朱氏公遷曰暑去有時禍去無時天不忍以暑害人先祖忍以禍害人也亂世之禍與暑氣酷烈同故以起興秋日淒淒七西反百卉許貴反具腓芳菲反亂離瘼音莫矣爰家語作奚其適歸集傳興也淒淒涼風也卉草腓病離憂瘼病郭氏璞曰今江東呼病曰瘵東齊曰瘼奚何適之也秋日淒淒呂氏祖謙曰秋日冬日猶云秋時冬時也則百卉具腓矣亂離瘼矣則我將何所適歸乎哉集說鄭氏康成曰具猶皆也涼風用事而衆草皆病興貪殘之政行而萬民困病嚴氏粲曰遭亂離之病於何所適歸乎謂不知何處是可歸之所也冬日烈烈飄風發發民莫不穀我獨何害叶音曷集傳興也烈烈猶栗烈也發發疾貌穀善也鄒氏泉曰民穀而我獨害自傷之甚耳夏則暑秋則病冬則烈言禍亂日進無時而息也輔氏廣曰此章亦興也而先生但連上二章為說云夏則暑秋則病冬則烈言祸亂日進無時而息如此說則郤似賦體其不解所以為興者蓋此章之說已見於蓼莪篇矣集說歐陽氏修曰極言民物窮極如冬日寒風凜冽㬥急而萬物彫盡也民莫不穀我獨何害者民被患愈深則其辭愈緩蓋知其無如之何但自傷歎而已范氏祖禹曰言夏秋冬獨不及春蓋天氣和暢萬物發育治之象也自古治世少亂世多觀四時可知矣山有嘉卉侯栗侯梅叶莫悲反廢為殘賊莫知其尤叶于其反集傳興也嘉善侯維廢變尤過也山有嘉卉則維栗與梅矣范氏處義曰以栗以梅為嘉卉古人亦通言草木耳在位者變為殘賊則誰之過哉輔氏廣曰廢為殘賊先儒皆以為指民而言云王㬥而剝下下無完民焉而先生獨以廢為變指在位而言何也曰若以為民則為字與賊字說不行矣先生之說卻與序說在位貪殘一句相應集說朱氏公遷曰物之美者能全其美可見也人之善者乃變而惡不可知也物性有常人性無常此以人不如物起興也姚氏舜牧曰凡仕人國者孰不可為忠良盡瘁之臣哉然非人之所能與也其人之自立也一變而為殘為賊又誰從而使之其人之自廢也相息亮反彼泉水載清載濁叶殊玉反我日構禍曷云能穀集傳興也相視載則構合也相彼泉水猶有時而清有時而濁而我乃日日遭害則曷云能善乎集說范氏處義曰自歎如泉水之無清時亦怨辭也滔滔吐刀反江漢南國之紀盡瘁以仕寧莫我有叶羽已反集傳興也滔滔大水貌江漢二水名許氏謙曰江漢見周南漢廣紀綱紀也謂經帶包絡之也瘁病也有識有也朱氏公遷曰識有猶言顧念滔滔江漢猶為南國之紀今也盡瘁以仕而王何其不我有哉集說曹氏粹中曰江漢受百川之水而注之海使無汎溢之患所以紀理南國也范氏處義曰君子盡瘁事國莫知有我者謂其勤惰不分亦怨辭也輔氏廣曰上章則專言其身此章則并言王之不我有江漢為南國之紀則是江漢之有南國也王不我有則是自絶於下矣匪鶉徒丸反匪鳶以専反叶以旬反翰飛戾天叶鐡因反匪鱣張連反匪鮪于軓反潛逃于淵叶一均反集傳賦也輔氏廣曰此章本亦興體但有所託之物而無所興之辭故不可謂之興又有四個匪字故亦不可謂之比而只得以為賦也鶉鵰也陸氏徳明曰鶉字或作陸氏佃曰鵰能食草似鷹而大黑色俗呼皂鵰鳶亦鷙鳥也其飛上薄雲漢邢氏昺曰鳶鴟也鴟鳥之類其飛也布翅翺翔鱣鮪大魚也胡氏一桂曰鱣鮪見碩人鶉鳶則能翰飛戾天鱣鮪則能潛逃于淵我非是四者則亦無所逃矣集說陳氏鵬飛曰言雖欲髙飛深藏而不可得也范氏處義曰君子遭禍不能飛潛無所避也山有蕨薇隰有杞桋音夷君子作歌維以告哀叶於希反集傳興也杞枸檵也呂氏祖謙曰杞解見四牡桋赤梀也樹葉細而岐銳皮理錯戾好叢生山中中為車輞許氏謙曰輞車輪之牙山則有蕨薇隰則有杞桋君子作歌則維以告哀而己輔氏廣曰惟以告哀而已無他事也則其情切矣集說孔氏穎達曰菜生於山木生於隰所生皆得其所以興今我遇亂草木之不如也由此作八章之歌詩以告哀作者自言君子以非君子不能作詩故也總論朱氏善曰此詩或以為行役或以為憂亂以詩考之由夏而秋由秋而冬則見其經歴之久由西周而南國由豐鎬而江漢則見其䟦渉之遠此行役之證也父母先祖胡寧忍予則無所歸咎之辭亂離瘼矣爰其適歸則無所逃避之辭此憂亂之證也専以為行役則先祖匪人之怨其辭過於深専以為憂亂則滔滔江漢之詠其辭過於遠然則是詩也蓋大夫行役而憂時之亂懼其禍之辭也四月八章章四句集說范氏處義曰周室在位之人以貪而致殘則下國之遠以亂而生怨幽王曾不加恤欲無禍得乎四月次於大東之後蓋大東乃貪殘之實而此詩則遭禍而怨刺也小旻之什十篇六十五章四百十四句欽定詩經傳說彚纂卷十三
