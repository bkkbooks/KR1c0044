body:
  text: 欽定四庫全書欽定詩經傳說彚纂卷二十頌四集傳頌者宗廟之樂歌大序所謂美盛德之形容以其成功告於神明者也蓋頌與容古字通用許氏愼曰頌貌也故序以此言之孔氏穎達曰頌之言容歌成功之容狀也周頌三十一篇多周公所定鄭氏康成曰周頌者周室成功致太平徳洽之詩其作在周公攝政成王即位之初孔氏穎達曰成康之間四十餘年刑錯不用則成王終世太平正言即位之初者以即位之初禮樂新定其詠父祖之功業述時世之和樂宏勲盛事已盡之矣以後無以過此且檢周頌事迹皆不過成王之初故斷之以為限不謂其後不得作頌也故曰成康没而頌聲寝不廢頌之作主為顯神明多由祭祀而為惟敬之小毖不言廟祀而承謀廟之下亦當於廟進戒廟中求助者昊天有成命我将思文噫嘻載芟良耜及桓是郊社之歌也其清廟維天之命維清天作執競雝武酌賚之等為祖廟之祭也其烈文臣工振鷺豐年潛有瞽載見有客閔予小子訪落絲衣之等雖有祖廟之事其頌徳又與上異也時邁與般有望祭河岳之事是山川之祭也惟五祀之祭頌無其歌耳頌為四始之主歌其盛徳者也五祀為制度常事非其盛故無之圜丘之天神方澤之地祇五方之帝六宗之祀今頌皆無者以其頌者感今徳澤上述祖父郊以祖配故其言及之至於圜丘方澤所配非周之祖不可歌之以美周徳五方之帝與六宗同於天神所配之人不異於思文與我将詩人不為之頌所以今皆無也范氏處義曰王襃曰昔周公詠文王之徳而作清廟國語亦以時邁思文為周文公之頌則頌作於周公無疑也蓋太平然後頌聲作周公之前不可謂太平不應有頌明堂位謂周公六年朝諸侯於明堂制禮作樂然則周頌三十一篇其皆出於周公之手歟朱子曰周公相武王成王天下既平作為樂章薦之郊廟所謂周頌也然其篇第之先後則不可究矣又其間多闕文疑義焉而亦或有康王以後之詩劉氏瑾曰康王以後之詩昊天有成命及執競噫嘻是也魯頌四篇商頌五篇因亦以類附焉孔氏穎達曰雅不言周頌言周者以别商魯也書叙列虞夏商周書名為一科當代異其第則詩本亦當代為别商頌不與周頌相雜為次第也國語曰有正考甫者校商之名頌十二篇於周之太師以那為首若在周詩之中則天下所共不湏獨校於周之太師也明不與周詩同處矣孔子論詩雅頌乃次魯商於下以示三代之法故魯譜云孔子錄其詩之頌同之王者後商譜云孔子錄詩列之以備三頌是商頌者孔子列之於詩末也既有商魯須題周以别之故知孔子加周也陳氏傳良曰别以尊卑之禮故魯頌以諸侯而後於周間以親疏之義故商頌以先代而後於魯凡五卷劉氏瑾曰雅頌無諸國别元以十篇為一卷故此分周頌三什為四之一四之二四之三魯頌四篇為四之四商頌五篇為四之五通為五卷集説鄭氏康成曰頌之言容天子之徳光被四表格于上下無不覆燾無不持載此之謂容於是和樂興焉頌聲乃作劉氏勰曰四始之至頌居其極風雅序人事兼變正頌主告神義必純美斯乃宗廟之正歌非燕饗之常樂也孔氏穎達曰言頌聲者此頌聲由其時之君徳洽於民而作則頌聲係於所興之君不係於所歌之主故周頌三十一篇左方中皆以為周公成王之頌也以其雖詠徃事顯祖業昭文徳述武功皆令歌頌述之以美今時不為祖父之頌矣顯其父祖之功所以頌子孫也故時邁之等盡為武王之事要歸頌聲於周公成王也徐氏積曰詩之有頌所以明盛徳而告成功雖有文王之業武王之功㣲成王周公則不作矣是太平之事也其商頌散亡特附之而已子不欲絶一代之事因其所得而附之非有所褒貶也蘇氏轍曰周頌皆有所施於禮樂盖因禮而作頌非如風雅之詩有徒作而不用者也文武之世天下未平禮樂未備則頌有所未暇至周公成王天下旣平制禮作樂而為詩以歌之於是頌聲始作然其篇第之先後則不可究矣考之以其時則不倫求之以其事則不類意者亦以其聲相從乎周頌清廟之什四之一於音烏穆清廟肅雝顯相息亮反濟濟子禮反多士秉文之德對越在天駿奔走在廟不顯不承無射音亦與斁同於人斯周頌多不叶韻未詳其説集傳賦也於歎辭穆深遠也清清靜也賈氏逵曰肅然清静謂之清廟張氏耒曰治人之道尚明故施政之堂曰明堂事神之道尚潔故文王之廟曰清廟肅敬雝和顯明相助也謂助祭之公卿諸侯也鄭氏康成曰諸侯有光明著見之徳者來助祭嚴氏粲曰稱助祀之人曰顯相者謂其有顯著之徳美稱之也濟濟衆也多士與祭執事之人也黃氏佐曰助祭者祭統云君執圭瓚祼尸太宗執璋瓚亞祼小宰云凡祭祀贊祼將之事是助行祼事非獨一人與祭者宗祝有司之類中庸曰序爵所以辨貴殘也序事所以辨賢也此便是助祭與祭之别越於也駿大而疾也孔氏穎逹曰疾奔走言勸事也朱氏公遷曰布武而行則大而疾承尊奉也斯語辭此周公旣成洛邑而朝諸侯因率之以祀文王之樂歌曹氏粹中曰洛誥周公告王曰王肇稱殷禮祀於新邑予齊百工伻從王于周則是成王就新邑祀文武周公率諸侯以從之耳李氏樗曰周公朝諸侯者特相成王以朝諸侯而已周公非自居南面而受諸侯之朝也言於穆哉此清靜之廟其助祭之公侯皆敬且和而其執事之人又無不執行文王之德旣對越其在天之神鄭氏康成曰對配也文王精神已在天矣猶配順其素如在生存孔氏穎達曰文王在天而云多士能配者正謂順其素先之行如其生存之時焉文王既有是徳多士今猶行之是與之相配也而又駿奔走其在廟之主如此則是文王之德豈不顯乎豈不承乎朱子曰對越在天便是顯處駿奔走在廟便是承處信乎其無有厭斁於人也徐氏鳯彩曰無斁於人即廟中以槩天下也集説鄭氏康成曰諸侯與衆士於周公祭文王俱奔走而來在廟中助祭是不光明文王之徳與言其光明之也是不承順文王之志意與言其承順之也此文王之徳人無厭之王氏安石曰秉文王之徳故能對越文王在天之神駿奔走在廟以承清廟之事也蘇氏轍曰其祀文王於清廟也有肅肅其敬雝雝其和者實來顯相其禮文王没矣其神在天其主在廟然士之來助祭者猶不忘秉持其徳以對其在天而奔走其在廟者言文王之澤久而不忘也范氏處義曰文王雝雝在宮肅肅在廟則詩人嘗以肅雝形容文王之徳矣今助祭之諸侯皆能肅雝是知體文王之徳者呂氏祖謙曰成王祭主也周公及助祭之諸侯皆顯相也濟濟多士廣言助祭之人凡執事者皆在也秉文之徳顯相多士凡助祭者莫不秉文之徳也相維辟公天子穆穆言顯相之肅雝則成王穆然奉祭之氣象不言可見矣胡氏一桂曰此詩只第一句説文王之廟餘皆就祀文王者身上説雖未嘗明頌文王之徳自有隠然見於辭意之表者何則文王徃矣今助祭之公侯執事之人所對越者己不見其有顯然之迹所奔走者亦不見其有可承之實而人心之敬恭嚴事者無厭射乃如此於此可以見盛徳至善淪肌浹髓没世自有不能忘者矣許氏謙曰秉文之徳總承上二句能敬和明顯之諸侯及濟濟之多士皆執行文王之徳也對越在天内敬也駿奔走在廟外菾也其心足以對在天之神明方可以盡駿奔走之職總論廖氏剛曰傳曰孝子之至莫大於寜親寜親莫大於寜神寜神莫大於四表之懽心成洛邑而朝諸侯於是率以事文王所謂得萬國之懽心以事其先王其斯以為天子之孝矣潘氏時舉曰文王之徳不可名言凡一時在位之人所以能敬且和與執行文王之徳者即文王盛徳之所在也必於其不可容言之中而見其不可掩之實則詩人之意得矣錢氏天錫曰七世之廟可以觀徳文王之感人也在廟尚爾則當時可知已清廟一章八句集傳書稱王在新邑烝祭歲蔡氏沈曰歲者嵗舉之祭文王騂牛一武王騂牛一實周公攝政之七年李氏樗曰書云在十有二月惟周公誕保文武受命惟七年是成洛邑在於七年而此其升歌之辭也朱氏公遷曰歌詩在堂上故曰升歌書大傳曰周公升歌清廟苟在廟中嘗見文王者愀音悄然如復見文王焉孔氏穎達曰記毎云升歌清廟然則祭宗廟之盛歌文王之徳莫重於清廟故為周頌之首樂記曰清廟之瑟朱絃而疏越壹倡而三歎有遺音者矣鄭氏曰朱絃練朱絃朱氏公遷曰練之使柔而朱其色也練則聲濁孔氏穎達曰不練則體勁而聲清練則絲熟而聲濁越瑟底孔也疏之使聲遲也孔氏穎達曰熊氏曰瑟兩頭有孔疏通也使兩頭孔相通孔小則聲急孔大則聲遲朱氏公遷曰音節舒徐以象其徳也倡發歌句也三歎三人從歎之耳孔氏穎達曰壹倡謂一人始倡歌三歎謂三人讃歎也樂歌文王之道不極音聲故但以熟絃廣孔少倡寡和此音有徳傳於無窮是有餘音不已也朱子曰壹倡而三歎謂一人倡而三人和也漢因秦樂乾豆上奏登歌顔氏師古曰乾豆脯羞之屬獨上歌朱氏公遷曰此亦倣壹倡之意也不以筦絃亂人聲欲在位者徧聞之猶古清廟之歌也劉氏瑾曰堂上之樂以人聲為貴故舜之韶樂鳴球琴瑟以詠清廟之瑟朱絃而疏越秦漢之薦乾豆亦惟堂上獨奏登歌之曲謂之登歌者豈以堂上特歌而名之也歟集説劉氏瑾曰書言烝祭文武而此樂歌止頌文王之徳者父子竝祭統於尊也維天之命於音烏穆不已於同上乎音呼不顯文王之德之純集傳賦也天命卽天道也孔氏穎達曰天之教命即是天道故命猶道也程子曰言天之自然者曰天道言天之賦予萬物者曰天命不已言無窮也毛氏萇曰孟仲子曰大哉天命之無極鄭氏康成曰天之道動而不止行而不已程子曰此是理自相續不已非是人為之也使可為雖使百萬般安排也須有息時只為無為故不息純不雜也張子曰純則舉大本也此亦祭文王之詩言天道無窮而文王之德純一不雜與天無閒以贊文王之德之盛也子思子曰維天之命於穆不已瞿氏景淳曰於穆不已猶言黙運不窮也蓋曰天之所以爲天也孔氏穎達曰易繫辭云日徃則月來暑徃則寒來乾卦象曰天行健君子以自強不息是天道不已止之事也於乎不顯王氏安石曰不顯者乃所以甚言其顯也文王之德之純蓋曰文王之所以爲文也純亦不已程子曰天道不已文王純於天道亦不已純則無二無雜不已則無閒斷先後朱氏公遷曰無二無雜全體也無閒斷先後不息也惟其全體所以不息集説眞氏徳秀曰純是至誠無一毫人偽惟其純誠無雜自然能不已如天之春而夏夏而秋秋而冬晝而夜夜而晝循環運轉一息不停以其誠也聖人自壮而老自始而終無一息之懈亦以其誠也既誠自然能不已嚴氏粲曰天命即天理也於乎美哉是天之運行不已也造化之機或息則其賦物者窮矣於乎甚顯者是文王之徳純一也純則無二無雜矣朱氏公遷曰穆與顯對互言之耳其實天道之流行賦予者非不顯著文王之徳仁義禮智之藴未嘗不深且逺也但詩意正欲法乎文王故以不顯歸之純徳見其明著而可法猶大雅文王末章之意耳薛氏瑄曰維天之命於穆不已天命即元亨利貞天命深逺流行不已即程子所謂動静無端隂陽無始朱子所謂太極之有動静是天命之流行也假春秋傳作何以溢春秋傳作恤我我其收之駿惠我文王曾孫篤之集傳何之爲假聲之轉也朱子曰何遐通轉而為假也恤之爲溢字之訛也收受駿大惠順也黃氏一正曰謂身體文王之道無少悖也曾孫後王也鄭氏康成曰曾猶重也自孫之子而下事先祖皆稱曾孫篤厚也孔氏穎達曰用意專而隆厚即假樂所云不愆不忘率由舊章是也言文王之神将何以恤我乎有則我當受之以大順文王之道後王又當篤厚之而不忘也鄭氏康成曰欲後王皆厚行之非維今也集説范氏處義曰於己則大順我文王之所為於孫子則勉其益篤厚而不忘則可以收文王之遺澤矣由成王以下皆文王之曾孫也嚴氏粲曰文王之徳我當有以收之使不失墜惟在大順文王之徳而已其者自期之辭大惠則無斯湏毫釐之違戾也我既以駿惠文王自勉繼自今為文王之子孫者當世世篤厚之勿忘也去聖寖逺典刑易墜非用意篤厚不能守也總論黄氏佐曰上節言文王之徳配天道於無窮贊其徳之盛也下節言文王之徳被子孫於無窮冀其道之傳也鄒氏泉曰此詩總見文徳合天之盛而後王之自勉於己致望於後者盖於法祖之中而得法天之道矣維天之命一章八句集説吕氏祖謙曰說詩者非惟有鑿說之害亦有衍說之害如此詩曾孫篤之毛氏謂能厚行之於文義未有害也然詩人之意本勉後人篤厚之而不忘所謂行者固亦在其中矣但曰曾孫篤之則意味深長衍一行字意味即短至王氏遂云篤力行而有所至説益詳而無復餘味矣凡諸說皆當以此倣之維清緝熙文王之典肇禋音因迄許乞反用有成維周之禎集傳賦也清清明也緝續熙明肇始禋祀迄至也此亦祭文王之詩言所當清明而緝熙者文王之典也朱氏公遷曰清而明之則討論宣布而文王之典益以著矣清明之功時時繼續之是則所謂緝熈也故自始祀張子曰肇禋始大祀文王也顧氏夢麟曰謂武王有天下始祀文以王禮之時至今有成實維周之禎祥也曹氏粹中曰文王之法實啓有周之祥也然此詩疑有闕文焉集説蘇氏轍曰由文王之法迄於周公遂以有成其成雖當周公之世然其禎祥見於文王矣嚴氏粲曰此詩言清緝熈者備舉文王之徳而以典言之者謂其徳寓於法也文王有典則以貽後人王業雖未成而禋祀之禮已肇始於此遂至於後而有成焉是文王之典為周之禎祥也祥者吉之先見也徐氏常吉曰文王之心在法即康岐之政是也始祀至今創業守成隨試而輙效是用文王之典安天下也非禎而何顧氏起元曰典就紀綱法度言要見本於精神心術文王之徳原是緝熈敬止故必繼續光明其典方不至遏佚成謂治功成也總論鄒氏泉曰首二句言聖典之當法下言聖典之致治正見其所以當法也附錄序維清奏象舞也鄭氏康成曰象舞象用兵時刺伐之舞武王制焉文王造此征伐之法至今用之而有成功謂伐紂克勝也征伐之法乃周家得天下之吉祥孔氏穎達曰維清詩者奏象舞之樂歌也謂文王時有擊刺之法武王作樂象而為舞號其樂曰象舞至周公成王之時用而奏之於廟詩人以今太平由彼五伐覩其奏而思其本故述之而為此歌焉此詩之作在周公成王之時非言作詩之時為武王也象舞之樂象文王之事其大武之樂象武王之事二者俱是為象但序者於此云奏象舞於武之篇不可復言奏象故指其樂名言奏大武耳其實大武之樂亦為象也文王之樂象箾與南籥各是一舞南籥既是文舞象箾當是武舞也詩云維清奏象舞則此象箾之舞故鄭注云象用兵時刺伐之舞是武舞可知張子曰武王初有天下象文王武功之舞歌維清以奏之成童以學之劉氏敞曰文王之舞謂之象武王之舞謂之武将舞象則先歌維清是以其序曰奏象舞其辭曰文王也将舞武則先歌武是以武之序曰奏大武其辭曰於皇武王也廖氏剛曰清廟文王之徳也維清文王之事也故記曰升歌清廟示徳也下而管象示事也曹氏粹中曰季札觀樂見舞象箾南籥者杜預云文王樂也又見舞韶箾者杜預云舜樂也是象有箾韶亦有箾説者謂以竿擊人曰箾然則執箾以舞猶干舞也執籥以舞即籥舞也文王雖大業未究而本其功徳之所起可得而形容也故作樂以象之謂之象舞祭統明堂位文王世子所謂下管象者象即象舞也何氏楷曰象箾而歌維清賈氏謂詩為樂章與舞人為節殆近之若舞籥則歌二南鼔鐘之詩所謂以籥以南是也武舞左執朱干右秉玉戚文舞則左執籥右秉翟故知象箾之舞原係武舞康成之解非無據而云然也案維清序奏象舞也朱子謂詩中無象舞之意故泛指為祭文王之詩然頌之為辭簡嚴取於形容功徳或無事鋪叙制樂之由如清廟之詩亦未及營洛邑而朝諸侯以祭也至先儒以象為文王之舞者左傳襄二十九年季札觀樂見舞象箾南籥者曰美哉猶有憾服虔曰象文王之樂也孔穎逹曰舞時堂上歌其舞曲也則可知堂下奏象舞而堂上歌維清盖自古矣故録諸儒之從序説者於右維清一章五句集説黃氏櫄曰周人郊祀后稷以配天宗祀文王於明堂以配上帝故生民所謂肇祀者言祭天之禮而歸功於后稷此詩所謂肇禋者言祀帝之禮而歸功於文王如所謂大王肇基王迹皆推本之論也烈文辟音璧下同公錫兹祉福惠我無疆子孫保之集傳賦也烈光也辟公諸侯也孔氏穎達曰有光明文章者君人之辟公嚴氏粲曰辟君也説命云樹后王君公君公諸侯也此祭於宗廟而獻助祭諸侯之樂歌朱氏公遷曰儀禮賓三獻尸之後主人酌酒獻賓歌烈文其在此時歟言諸侯助祭使我獲福則是諸侯錫此祉福而惠我以無疆使我子孫保之也集説輔氏廣曰祭畢則飲福受胙故於其獻助祭諸侯而歌此言我之所以獲此福者實維諸侯助祭而得之朱氏公遷曰此歸徳於諸侯之辭顧氏夢麟曰宗廟之祭主之者王助之者辟公今烈文之辟公誠敬以格神而降我以福實辟公錫兹祉福之大也附錄歐陽氏修曰錫兹祉福毛以為文王錫之鄭以為天錫之據序言成王新即政諸侯來助祭於廟則祉福當為文武所錫宜從毛義為是范氏處義曰助祭諸侯即洛誥所謂王在新邑烝祭歲之時也嚴氏粲曰成王即政之初周興未久也其助祭諸侯徃徃身佐文武以定天下者故言汝有功徳之辟公錫我以此福矣謂其夾輔以興周祚也此豈徒目前淺近計哉蓋惠我周家以無疆之休使我子孫世世永保之矣無封靡于爾邦維王其崇之念兹戎功繼序其皇之集傳封靡之義未詳或曰封專利以自封殖也靡汰侈也朱氏公遷曰取之有制則不封用之有節則不靡崇尊尚也戎大皇大也言汝能無封靡于汝邦則王當尊汝王氏安石曰戒之以無封以專利無靡以傷財則王之所崇也又念汝有此助祭錫福之大功則使汝之子孫繼序而益大之也孔氏穎達曰釋詁云叙緒也繼父祖之緒也唐氏汝諤曰皇之只世繼侯封國勢日益昌大不作加地進律説集説輔氏廣曰先言無封靡于爾邦維王其崇之者盖諸侯必無自封殖侈汰害於其國故王得以尊崇之而後念功之不忘而使爾子孫得以繼序而益大之不然則有害於國而自絶於天天子不得而私庇之也蒋氏悌生曰今我既蒙其功而使我之子孫世世保守而勿失矣我其可不使辟公之子孫亦世世保守而益大其業乎必也克儉於家謹爾侯度無厲民以自奉宜節用而愛人夫然後為天子所尊崇而繼序益大其業也始也歸美於諸侯而思我之子孫保守於不窮終也致戒於諸侯而欲諸侯之子孫亦保守於永久成周之天子諸侯交相親愛之情至矣朱氏善曰無封靡所以致其戒也崇之皇之所以厚其報也此所以為忠厚之至也陳氏際㤗曰念其助祭之勞遂欲其世世子孫與周相始終而益昌大特戒其封靡盖駕馭之權亦隠隠寓焉附錄嚴氏粲曰言相與平定之者爾諸侯之力也其相與扶持之者尤有望於爾諸侯也爾於爾之國無封殖無侈靡當維王室之是尊也念屏翰之大功其繼序之者益思増益而皇大之世世相承無替前功也何氏楷曰徐云我念爾辟公夾輔先王用武功平定天下以有今日自今以後凡汝之子孫繼汝為諸侯者其亦能張皇威武以消四方覬覦不軌之心而壮王室之勢不徒保守其爵土而已是則我之所深致望者也無競維人四方其訓之不顯維德百辟其刑之於音烏乎音呼前王不忘集傳又言莫強於人莫顯於德先王之德所以人不能忘者用此道也孔氏穎達曰文王武王也此戒飭而勸勉之也中庸引不顯維德百辟其刑之而曰故君子篤恭而天下平大學引於乎前王不忘而曰君子賢其賢而親其親小人樂其樂而利其利此以沒世不忘也集説朱氏善曰莫強於人能盡人道則四方其訓之矣莫顯於徳能顯明其徳則百辟其刑之矣道者天下所共由徳者人心所同得故施諸當世而人心無不服傳諸後世而人心不能忘先王既以此道徳而感人心則後人當以此道徳而事先王使助祭之諸侯而皆惟先王之是法則人道無不盡徳行無不顯而國内之民莫不是訓而是從矣其子孫豈不能與王者之子孫相保守於無窮乎上言子孫保之繼序皇之故此言道徳乃告以所以致此之由也唐氏汝諤曰前王所以不忘正為道徳能維繫人心也當奉祭時就将人心思慕前王來作證使其惕然有感動處附錄鄭氏康成曰無彊乎維得賢人也得賢人則國家彊矣王氏安石曰無競維人四方其訓之者戒之以用人也不顯維徳百辟其刑之者戒之以務徳也於乎前王不忘者言如上所云則前王所念而不釋也范氏處義曰能用人則彊四方無不從其令能務徳則顯百辟無不法其行此之謂永保勿失之道總論歐陽氏修曰詩人述成王初見於廟諸侯來助祭既祭而君臣受福自相敕戒之辭也烈文一章十三句集傳此篇以公疆兩韻相叶未審當從何讀意亦可互用也劉氏瑾曰第一句與第六第七句相叶第三句與第五第八第十三句相叶亦隔互叶韻也案序烈文成王即政諸侯助祭也孔穎達解之曰成王即政諸侯助祭之樂也謂周公居攝七年致政成王成王乃祭祖考戒諸侯集傳以為此祭於宗廟而獻助祭諸侯之樂歌不專屬成王槩言諸侯助祭錫兹祉福又以念兹戎功為助祭錫福之大功其歸美諸侯者至矣先儒以為福祉錫自文王武王戎功為孟津諸侯與前王共定天下之大功夫辟公助祭誠敬以格神而降福似只可美顯相之肅雝而祭主受胙必歸之祖考在天之佑所以先儒以為文王武王之錫而諸侯助成之其義為更完矣至助祭錫福諸侯不可為無功然當洛邑初成之年與祭之諸侯大抵皆與前王定天下者也則戎功為念其開國底定之勲意似宏博耳故附羣儒之説以俟考焉至末章即於廟中歎美前王以感發諸侯疏義與集傳本一揆也天作高山大音泰王荒之彼作矣文王康之彼岨矣岐沈括曰後漢書西南夷傳作彼岨者岐今案彼書岨但作徂而引韓詩薛君章句亦但訓為徃獨矣字正作者如沈氏説然其注末復云岐雖阻僻則似又有岨意韓子亦云彼岐有岨疑或别有所据故今從之而定讀岐字絶句有夷之行叶户郎反子孫保之集傳賦也高山謂岐山也荒治輔氏廣曰治荒謂之荒猶治亂謂之亂也康安也岨險僻之意也夷平行路也此祭大王之詩朱氏公遷曰詩意首尾主岐山言之故知為祀大王之詩也言天作岐山而大王始治之廖氏剛曰大王有胥宇築室之勤左右疆理之功故曰荒之大王旣作而文王又安之王氏志長曰文王康之孟子所謂治岐之政備之矣於是彼險僻之岐山人歸者衆而有平易之道路子孫當世世保守而不失也徐氏鳳彩曰王業艱難根本之地不可忘也集説輔氏廣曰髙山大川皆天造地設也故曰天作大王始荒之而亦曰彼作矣者推大王與天同功也祖先所以經理其始計安其後者既已甚艱勤矣則子孫固宜世世保之而不失也叚氏昌武曰劉氏曰其始作之固自乎天其終保之亦繫乎人朱氏公遷曰天作岐山可為興王之地大王承天而創業文王繼世而成功治險為夷如此其難可不世世保守之乎總論黃氏櫄曰遷岐之役詩人曰帝省其山曰帝遷明徳曰帝作邦作對而此詩又曰天作髙山大王荒之夫大王之遷非得已也而詩人必以天言之其意似以為岐可興周而天因使大王之都岐也然其一篇之意則在於大王之荒文王之康子孫之保而不獨歸之天也大王遷岐從之者如歸市文王徽柔懿恭以保民不遑暇食以和民人心愈固而天命愈不可易成王以為積於前者如此其至繼於後者其敢有忽心哉曰子孫保之歸其功於前人勉其效於後世是豈獨歸於天而已乎附錄序天作祀先王先公也孔氏穎達曰天作詩者祀先王先公之樂歌也謂周公成王之時祭祀先王先公詩人以今太平是先祖之力故因此祭述其事而作歌焉祀先王先公謂四時之祭時祭所及惟親廟與大祖成王時祭當自大王以下上及后稷一人而已言先公者唯斥后稷經之所陳唯有先王之事而序并言先公者以詩人因於祭祀而作此歌近舉王迹所起其辭不及后稷序以祭時實祭后稷故其言及之賈氏公彦曰天作詩是祫之祭祀在后稷廟中蘇氏轍曰周之初時祀猶及先公李氏樗曰天保曰禴祀烝嘗于公先王乃四時之祭也四時之祭及於先公天保之詩先言公而後言王者先後之序也此先言王者蓋王迹之所自起故序先言先王也郝氏敬曰朱子但謂祀大王不兼文王以其閒遺王季也然詩并頌二王安得燭為祀大王乎既祀大王文王又安得遺后稷與王季乎序説是也案天作之詩序以為祀先王先公孔穎逹曰謂四時之祭也詩之所陳只有大王文王而時祭則有先王先公故序并及之朱子只以為祭大王詩而不及文王者意以并祭王季頌其子不頌其父與祭其閒非所安也揆之於理固為甚正然詩中有大王與文王則亦難斷其為不祭文王矣且舍時祫之外惟有大祫以此詩擬之亦非其倫今觀經文獨歸重大王文王者殆以太王遷岐為王業之基文王治岐為王業之盛光前裕後二君為大既以天作名篇播諸廟樂美有專屬無取徧揚祖烈耳詩意或然也况從古序則増詩中所無之先公從集傳則又偏遺詩中所有之文王而粤稽秦漢以上簡篇殘缺無文可證則序説猶為近古故姑存之天作一章七句集説嚴氏粲曰成功告神之頌多言子孫當保守之意盖子孫能保守則可以慰祖宗之心也朱氏倬曰天作祭大王之詩又兼言文王大武祭武王而益言文王盖祭父而并及其子者所以表其有後也祭子而及其父者所以表其有自也昊天有成命二后受之成王不敢康夙夜基命宥密於音烏緝熙單厥心肆其靖之集傳賦也二后文武也成王名誦武王之子也問昊天有成命詩成王不敢康詩傳皆斷以為成王誦某問下武言成王之孚如何朱子曰這箇且只得做武王説劉氏瑾曰朱子於下武詩成王二字則辨先儒之誤而謂非王誦之諡於此詩成王字則正先儒之誤而以為諡名固各有當也基積累於下以承藉乎上者也宥宏深也密静密也何氏楷曰宥説文云寛也密當依新書作謐説文云静語也一曰無聲也禮仲尼燕居篇孔子曰夙夜基命宥密無聲之樂也今案密通為謐乃無聲之義於歎辭靖安也此詩多道成王之德疑祀成王之詩也言天祚周以天下既有定命而文武受之矣成王繼之又能不敢康寜而其夙夜積德以承藉天命者又宏深而静密是能繼續光明文武之業而盡其心張氏彩曰成王之緝熈與文祖亦當有閒成王之緝熈乃是常自提醒書所謂祇勤于徳夙夜不怠嗣守文武大訓無敢昏渝者是已故今能安靖天下而保其所受之命也國語叔向引此詩而言曰是道成王之德也成王能明文昭定武烈者也以此證之則其爲祀成王之詩無疑矣濮氏一之曰朱文公采歐公時世論以斥序之非而獨表章國語説斷其無可疑今觀基命定命之語意與洛誥合其為頌成王審矣何必委曲謂文武成此王業乎集説輔氏廣曰不敢康戒謹恐懼也不宏則體不盡不深則見不徹不静則不能到冲漠無眹處不密則不能到萬象森具處宏深陽之徳也静密隂之徳也合是二徳則能承藉乎天之命我者矣夙夜者無閒斷也能夙夜基命宥密則能繼續光明文武之業而盡其心才有閒斷則文武之業便有蔽昧處而已之心亦不能盡矣天命也文武之業也已之心也天下之安也皆是一統底事朱氏善曰不敢康以心言宥密以徳言以不敢康寜之心成宏深静密之徳以宏深静密之徳成繼續光明之業則所以基上天之命者在是所以繼先王之業者在是而皆不外乎此心故又以單厥心終焉今日所以能安靖天下而保其所受之命者是成王之賜也總論徐氏鳳彩曰成命謂不易之命也周家天命所歸歴千有餘年而不易故曰成命文武受命與天下更始成王基命與天下休息所以終文武之功昊天有成命一章七句集傳此康王以後之詩問康王如何無詩朱子曰昊天有成命之類便是康王詩而今却要解那成王做成王業費盡氣力要解從那王業上去不知怎生地附錄序昊天有成命郊祀天地也鄭氏康成曰有成命者言周自后稷之生而已有王命也文王武王受其業成此王功不敢自安逸早夜始順天命行寛仁安静之政以定天下孔氏穎達曰詩郊祀天地之樂歌也天地神祗佑助周室文武受其靈命王有天下詩人見其郊祀思此二王能受天之命勤行道徳故述之而為此歌焉經之所陳皆言文武施行道徳撫民不倦之事也此經不言地序云地者作者因祭天地而為此歌王者之有天下乃是天地同助言天可以兼地故辭不及地序知其因此二祭而作故具言之此詩作在成王之初不得稱成之諡所言成王有渉成王之嫌韋昭云謂文武修已自勤成其王功非謂周成王身也鄭賈唐説皆然是時人有疑是成王身者故辨之也杜氏佑曰周制禋祀畢獻之後天子舞六代之樂若感帝及迎氣即天子舞當代之樂其樂章用昊天有成命也古制天子親在舞位蘇氏轍曰此詩有成王不敢康而執競有不顯成康世或以為此言成王誦康王釗也然則周頌有康王子孫之詩矣周公制禮禮之所及樂必從之樂之所及詩必從之故頌之施於禮樂者備矣後世無容易之且詩曰成王不敢康夙夜基命宥密又曰自彼成康奄有四方成王非基命之君而周之奄有四方非自成康始也案昊天有成命詩自古序以至漢唐諸儒皆以為郊祀天地之樂歌文武受天命成其為王業其詩作在周公成王之世宋諸儒亦遵其説惟歐陽修以昊天有成命之成王執競之成康噫嘻之成王謂成王誦康王釗也朱子初亦從毛鄭之詁後定集傳援國語從歐説以為祭成王之詩盖依經為解辭無紆曲當為正説矣然後儒遵之者固衆而豎議以申序説者亦不少其意謂周公制禮作樂頌之用於郊廟為大孔子刪詩雅頌得所既以頌為周公所作不應有康昭以後之詩若康昭之詩次於我将時邁及思文大武之前似非得所且禋祀大典文公何得無詩一疑也國語叔向引詩朱子作成王誦解亦可然國語載穆叔聘晋樂及鹿鳴而後拜晋侯使人問焉對曰先樂金奏肆夏繁遏渠天子所以饗元侯也故不敢拜吕叔玉云樊遏執競也朱子取吕説載於集傳若從國語叔向之告以昊天章為康王之詩則國語穆叔之對稱執競為先王饗元侯所用又不可為昭王以後詩矣二疑也然要皆未識朱子虚公之心耳頌首集傳云周頌三十一篇多周公所定則即鄭箋據周禮以詮詩之説也又云亦或有成王以後之詩夫據經文以解詩而猶曰或曰疑者朱子何嘗蔑視古昔哉宋黃震曰古注晦菴凡二説在學者詳之是矣我將我享維羊維牛維天其右叶音由之集傳賦也將奉享獻右尊也神坐東向在饌之右所以尊之也問所解右字與舊説不同朱子曰周禮有享右祭祀之文如詩中此例亦多如既右烈考亦右文母之類如我将所云作保佑更難方説維羊維牛如何便説保佑到伊嘏文王既右享之也説未得佑助之右劉氏瑾曰古人以右為尊如云位在其右尤出其右故右有尊義朱氏公遷曰明堂之位帝居中文王居西南主皆西坐東向東左西右則饌在左而神在右矣此宗祀文王於明堂以配上帝之樂歌廖氏剛曰明堂王者之堂也方其朝覲則以㑹諸侯周公朝諸侯於明堂天子負斧扆而立是也方其祭祀則以享上帝宗祀文王於明堂以配上帝是也王者方以人道交應物之帝則雖即人所居而享之可也况祖考之親者乎范氏處義曰明堂之制始於黃帝之合宫有虞謂之總章夏謂之世室商謂之重屋周謂之明堂以為聽政之所耳祀文王於此則周公為之也言奉其牛羊以享上帝而曰天庶其降而在此牛羊之右乎蓋不敢必也張子曰維天其右之不必饗之劉氏瑾曰天比文王為尊以尊事之故不敢必天之饗而以其字言之王氏志長曰案彭山季氏云周禮羊人曰積共羊牲謂積柴祭天則用羊實柴也先柴而後獻故維羊文在維牛之上将者奉羊以共柴饗者獻牛以共祀理或然歟集説孔氏穎達曰謂祭五帝於明堂以文王配而祀之詩人因其配祭述其事而為此歌焉即孝經所謂宗祀文王於明堂以配上帝是也文王之配明堂其祀非一此言祀文王於明堂謂大饗五帝於明堂也明堂之祀凡聽朔必以特牲告其帝及神配以文王武王是告朔之在明堂其祭止用特牛四時迎氣於四郊祭帝還於明堂亦如之但迎氣於郊已有祭祀其盛在於郊明堂之祭不過與告朔同也則迎氣之還明亦用特牲矣此之維羊維牛祭之大禮是大饗也吕氏祖謙曰明堂記上帝而文王配焉故先言祀天而次言祀文王此段言祀天也後段言祀文王也儀式刑文王之典日靖四方伊嘏古雅反文王既右饗叶虚良反之集傳儀式刑皆法也嚴氏粲曰累言之者謂法之不已也嘏錫福也孔氏穎達曰特牲少牢皆載祀以神辭嘏主人與之以福言我儀式刑文王之典以靖天下則此能錫福之文王既降而在此之右以享我祭若有以見其必然矣輔氏廣曰亦洋洋乎如在其上如在其左右之意劉氏瑾曰文王比天帝為親以親望之故知文王之必饗我祭而以既字言之集説朱氏公遷曰儀式刑者取法於文王不一而足也日靖四方者安靖四方之志無日而或忘也此不特以右饗期之而且先以錫福望之矣是則親之之甚也故用既字對上文其字以見事帝事親之别朱氏善曰承上文而言雖不敢必於天而實可必於文王文王之典安靖天下之典也我惟於文王之典儀式刑焉以之而日安靖乎四方則所以感格之者有其素矣今而将是羊牛則此能錫福之文王豈不降而右饗我乎我其夙夜畏天之威于時保之集傳又言天與文王既皆右饗我矣則我其敢不夙夜畏天之威以保天與文王所以降鑒之意乎鄭氏康成曰早夜敬天於是得安文王之道朱子曰夙夜畏天之威然後天命可以長保矣集説李氏樗曰雖曰享吾之祭亦豈可自滿哉故當夙興夜寐亹亹怵惕畏天之威輔氏廣曰我其夙夜畏天之威則儀式刑文王者益至而安靖四方者益久此其所以能保天與文王降鑒之意也姚氏舜牧曰小心翼翼昭事上帝文王之心也畏天之威于時保之則存文王之心矣存文王之心則可常保上帝降鑒之心此是頌者之本㫖總論范氏處義曰既以文王配故其所告之辭惟文王之是頼已則加畏敬焉既以推尊文王亦以自勉非周公不能為此詩也我將一章十句集傳程子曰萬物本乎天人本乎祖故冬至祭天而以祖配之以冬至氣之始也萬物成形於帝而人成形於父故季秋享帝而以父配之以季秋成物之時也郝氏敬曰郊天報始享帝報成郊配后稷始於祖之義明堂配文王成於父之義也陳氏曰古者祭天於圜與圓同丘埽地而行事器用陶匏牲用犢其禮極簡聖人之意以爲未足以盡其意之委曲故於季秋之月有大享之禮焉天即帝也郊而曰天所以尊之也故以后稷配焉后稷逺矣配稷於郊亦以尊稷也明堂而曰帝所以親之也以文王配焉文王親也配文王於明堂亦以親文王也尊尊而親親周道備矣曹氏粹中曰以天道事之則藁秸以為席陶匏以為器繭栗之牲埽地而祭所以尊之也以帝道事之則牛羊以為牲簠簋以為器鼎爼之實其薦用熟所以親之也然則郊者古禮而明堂者周制也周公以義起之也濮氏一之曰文王之祀既不敢同后稷於郊又無屈天神於宗廟之理故特尊其祀於明堂也斯其為曲盡矣東萊呂氏曰於天維庶其饗之不敢加一辭焉於文王則言儀式其典日靖四方天不待贊法文王所以法天也卒章惟言畏天之威而不及文王者統於尊也畏天所以畏文王也天與文王一也集説朱子語類問帝即是天天即是帝却分祭何也曰為壇而祭故謂之天祭於屋下而以神祇祭之故謂之帝后稷生於姜嫄以上更推不去故配天須以稷然上帝即天也聚天之神而言之則曰上帝此武王祀文王推父以配上帝者配帝須以父也問我将乃祀文王於明堂之樂章詩傳以謂物成形於帝人成形於父故季秋祀帝於明堂而以父配之取其成物之時也此乃周公以義起之非古禮也不知周公以後将以文王配耶以時王之父配耶曰諸儒正持此二義至今不决看來只得以文王配且周公所制之禮不知在武王之時在成王之時若在成王則文王乃其祖也亦自可見又問繼周者如何曰只得以有功徳之祖配之昔者周公宗祀文王於明堂乃不言武王者以禮樂出於周公制作故以作禮樂者言之何氏楷曰胡致堂云文王已有廟矣以季秋享帝而奉文王配焉不可於七廟中獨舉大禮於一廟故迎主致之明堂以配帝也祭帝必於明堂者帝出震而宰萬物猶向明而治天下也武王即位追王文王周公制禮推本王功故以文王配帝而祀於明堂此義類也時邁其邦昊天其子之集傳賦也邁行也邦諸侯之國也周制十有二年王巡守殷國柴望祭告諸侯畢朝周禮大行人十有二嵗王巡守殷國注云殷猶衆也書周官六年五服一朝又六年王乃時巡諸侯各朝於方岳蔡氏沈曰柴燔柴以祀天也望望秩以祀山川也五嶽四瀆之屬望而祭之故曰望劉氏瑾曰胡氏曰望祭各設於巡守之方其位茅以辨之而植表於中周禮所謂旁招以茅晋語所謂置茅蕝設表望是也此巡守而朝會祭告之樂歌也孔氏穎達曰武王既定天下而巡行其守土諸侯至於方岳之下乃作告至之祭為柴望之禮周公述其事而為此歌焉劉氏瑾曰此雖武王初定天下而巡守所作之歌其後王之巡守者因而皆用之歟言我之以時巡行諸侯也天其子我乎哉蓋不敢必也嚴氏粲曰有天下曰天子子之謂以周繼夏商也胡氏一桂曰徐氏曰子之者親而爱之劉氏瑾曰所謂不敢必者亦以其字言之盖初為疑辭也下文言允王維后允王保之者則終之以决辭也集説孔氏穎逹曰天子封建諸侯以為邦國令之為王者守土天子以時徃行其邦國至於其方岳之下為此告祭故有柴望之事也為此巡守之禮者以諸侯為王者守土專制一國告從令行而王者垂帷端拱深居髙視一日二日庶事萬幾耳目不逹於逺方神明不照於幽僻或将強以陵弱恃衆以侵寡擁遏王命寃不上聞而使逺道細民受枉聖世聖王知其如是故制為此禮時自巡之廖氏剛曰謂之邁者言其行之逺而不遽也時邁則春而東夏而南秋而西冬而北不疏以弛事不數以擾民上以順天之道下以從人之欲而已周行不怠天道也夫能體斯道以有為於天下得不為天所子乎以其足以繼天故也呂氏祖謙曰人之宗子主一家者也天之子主天下者也時邁其邦人神莫不受職則昊天其子之可知矣劉氏瑾曰此二句總言巡守之事以發端也朱氏公遷曰巡守之禮所以浹和神人而盡天子之職也是以有望於天之子我必以時者事天之至不敢必者畏天之至實右序有周薄言震之莫不震疊懐柔百神及河喬嶽允王維后集傳右尊序次黄氏一正曰右者尊於諸侯之上序者次於帝王之統明其實為天所子也陳氏際泰曰周當天命初受受於唐虞夏商之統五帝迭生子孫更王天下其尊之也盖以序焉震動疊懼懐來柔安允信也既而曰天實右序有周矣是以使我薄言震之孔氏穎逹曰薄是初始之義徐氏鳳彩曰薄言震之言不專尚威嚴也而四方諸侯莫不震懼又能懐柔百神曹氏粹中曰祭法云有天下者祭百神故巡守所至百神皆祭焉以至於河之深廣嶽之崇髙而莫不感格則是信乎周王之為天下君矣李氏樗曰人神各得其所信乎王能盡為君之道也集説孔氏穎達曰箋云甫動之以威則莫不動懼而服畏謂不但為天所爱復為人所畏也武王伐紂之後天下即服至於巡守始言莫不服者以王者之為巡守慮有不服之處故美其無不服耳巡守之行得有動威之意謂王巡守若會同司馬起師合軍以從所以威天下行其政也百神者謂天與山川之神神以王為主祭之則安允王維后總上事而歎之云信哉武王之徳宜為君也廖氏剛曰王者所為與天合徳威政所加孰敢不震動疊息效順而圖新者乎蓋巡守之際有所謂削地黜爵君流君討之事是以言也河之善溢於地嶽之峻極於天其神為難懐柔而言及之則山川莫不寧可知矣是信能成天使之傳序之意也嚴氏粲曰初得天下而人神受職此非人之所能為也天實右序之也劉氏瑾曰此一節言巡守而祭告百神之事也何氏楷曰蔡汝楠云諸侯所懐也而曰震疊仁義之盡也百神所欽也而曰懐柔和敬所生也明昭有周式序在位載戢側立反干戈載櫜古刀反弓矢我求懿德肆于時夏户雅反允王保之集傳戢聚櫜韜孔氏穎達曰櫜弓衣一名韜故納弓於衣謂韜弓肆陳也夏中國也又言明昭乎我周也既以慶讓黜陟之典式序在位之諸侯李氏樗曰孟子載巡守之事入其疆而慶讓行王制言不順不敬有黜地削爵之罰有功徳於民者有加地進律之賞凡此皆所以按諸侯之功罪而升黜之所謂式序在位也袁氏煒曰考其典章之合否曰式次其功罪之差等曰序又收斂其干戈弓矢而益求懿美之德以布陳于中國則信乎王之能保天命也李氏樗曰武王取天下必求文徳以施中國則可以保天下也季氏本曰斂武事而修文徳保天命之本也故曰允王保之或曰此詩即所謂肆夏以其有肆于時夏之語而命之也集説鄭氏康成曰王巡守而天下咸服兵不復用此又見震疊之效也廖氏剛曰天則右序神則懐柔君則明昭臣則式序夫然則安所用於兵革哉敷求哲人以與之共圖億萬斯年而已輔氏廣曰懿徳文徳也此與諸侯相期以文徳治乎諸夏而無或相尋於干戈弓矢之中也所謂偃武修文者是也雖詰爾戎兵張皇六師設司馬以教閲自有不可廢者而與諸侯相期之志則固不在此也劉氏瑾曰此一節則言巡守朝會黜陟之事也鄒氏泉曰式序在位是以政而肅天下君道也載戢四句是以教而化天下師道也賞罰者天子之大權教化者天下之大務而能兼舉之則上天作之君師之意以慰信乎周王之能保天命而昊天之子我為有常矣總論朱氏善曰實右序有周所以見天眷之隆也故使之治人而人無不治使之事神而神無不懐益有以見其盡君道之可信明昭有周所以見王道之大也惟王道之大故慶譲黜陟而刑賞行偃武修文而好尚定益有以見其保天命之可信時邁一章十五句集傳春秋傳曰昔武王克商作頌曰載戢干戈而外傳又以為周文公之頌則此詩乃武王之世周公所作也陳氏鵬飛曰武王凱歌方終而有方岳之行觀此詩是告方岳以革命之事因其時而震服諸侯故其詩與他廟樂不同外傳又曰金奏肆夏樊遏渠天子以饗元侯也鄭氏康成曰金奏擊金以為奏樂之節金謂鐘及鎛韋昭注云肆夏一名樊韶夏一名遏納夏一名渠即周禮九夏之三也呂叔玉云肆夏時邁也樊遏執競也渠思文也周禮鐘師凡樂事以鐘鼔奏九夏王夏肆夏昭夏納夏章夏齊夏族夏祴夏驁夏鄭氐康成曰杜子春云王出入奏王夏尸出入奏肆夏牲出入奏昭夏四方賓來奏納夏臣有功奏章夏夫人祭奏齊夏族人侍奏族夏客醉而出奏陔夏公出入奏驁夏呂叔玉云肆夏繁遏渠皆周頌也肆遂也夏大也言遂於大位謂王位也繁多也遏止也言福禄止於周之多也渠大也言以后稷配天王道之大也九夏皆詩篇名頌之族類也此歌之大者載在樂章樂崩亦從而亡是以頌不能具顔氏逹龍曰韋昭之説與呂叔玉雖不同而時邁執競思文即三夏之異名也集説廖氏剛曰皆巡守之詩或言時邁或言般者邁逺行也孟子所謂逰也般樂也孟子所謂豫也一逰一豫此周之先王所以為諸侯也時邁告至之詩也故言柴望以皇天后土為主般過而祭之詩也故言祀四岳河海以名山大川為主亦互相備也黄氏櫄曰時邁之作見武王所以得天下所以保天下者皆無愧也武王巡守之事詩有時邁書有武城時邁告祭之樂章也武城識其政事以示天下來世也庚戌柴望大告武城此告祭懐柔之實也昭我周王天休震動此莫不震疊之實也庶邦冢君暨百工受命於周此式序在位之實也偃武修文歸馬放牛此非戢櫜之意乎建官位事重民五教惇信明義崇徳報功此非懿徳以保之乎執競武王無競維烈不顯成康上帝是皇集傳賦也此祭武王成王康王之詩競強也言武王持其自強不息之心何氏楷曰執競以徳之剛言敬勝怠義勝欲純守此心如執持而不失者然故其功烈之盛天下莫得而競何氏楷曰無競維烈以興王之功業言烈本火猛之義功之光且盛者亦以烈名之豈不顯哉成王康王之德亦上帝之所君也集説李氏樗曰易曰天行健君子以自強不息天位乎上隂陽日月迭運推移以其健故也人君法天亦當自強然後可以成功武王能於自強之心執而勿失造次顛沛未嘗敢捨則其功烈所以莫強也其曰無競維烈盖言執競之效如此輔氏廣曰武王能持自強之心而不息故天下莫能強於功烈之盛此盖内外之符也黄氏佐曰成之不顯如日就月将學有緝熈于光明夙夜基命宥密夙夜敬止等是康之不顯如眇眇予末小子其能而亂四方以敬忌天威等皆是人皆曰守成之主徳未必顯繼體之君命非出於天故詩人特言成康有不顯之徳亦上帝之所君也附錄毛氏萇曰無競競也烈業也不顯乎其成大功而安之也鄭氏康成曰競強也能持強道者維有武王耳不強乎其克商之功業言其強也不顯乎其安祖考之道言其又顯也孔氏穎逹曰釋詁文曰康安故云成大功而安之武王既伐紂是成大功安祖考蘇氏轍曰武王持其強心為而不捨故天下莫能與之競遂成其王業而安之為天下之所君自彼成康奄有四方斤斤紀覲反其明叶謨郎反集傳斤斤明之察也言成康之德明著如此也錢氏天錫曰武王克商而會朝清明至於成康制禮作樂紀綱明備纎悉必到故曰斤斤集説朱氏公遷曰此則指其不顯之實也繼明以照四方如此於先王何愧乎功徳足相配則祭祀所相配矣姚氏舜牧曰君徳只是箇剛與明武王持自強之心成大功烈天下莫與為競成康繼世而亦持此心便不為物欲所蔽而可以照臨四方故既稱不顯成康而又稱斤斤其明附錄蘇氏轍曰周之興也逺矣至於武王成而安之然後能奄有四方使其明無所不至鐘鼓喤喤華彭反叶胡光反磬筦音管將將七羊反降福穰穰如羊反集傳喤喤和也將將集也孔氏穎逹曰喤喤将将俱是聲也故言和與集謂與諸聲相和與諸樂合集也穰穰多也孔氏穎逹曰釋訓云穰穰福也某氏引此詩明穰穰是福豐之貌也言今作樂以祭而受福也集説孔氏穎達曰作鐘鼓之樂其聲和樂喤喤然奏磬筦之音其聲合集鏘鏘然合於禮度當於神明故神下與之福衆多而穣穣然降福簡簡威儀反反旣醉旣飽福祿來反集傳簡簡大也李氏巡曰簡簡降福之大也反反謹重也孔氏穎逹曰傳言反反難者謂順理閑習自重難也反覆也言受福之多而愈益謹重是以既醉既飽而福祿之來反覆而不厭也集説鄭氏康成曰君臣醉飽禮無違者以重得福禄也孔氏穎逹曰祭末旅酬下及羣臣故有醉飽之義即既醉所云醉酒飽徳是也此時祭之末節人多倦而違禮故美其禮無違者以重得福禄即經之來反也李氏樗曰既醉既飽盖祭終而飲福耳上言祭時樂備而和故神降之福此言祭終而飲威儀備具此福禄所以反覆日至而未艾也朱氏公遷曰樂者格神之具神來格則降之福矣敬者受福之本敬以受福則福之降又無窮也總論鄒氏泉曰全詩上二節是頌三后功徳之盛下二節言今日奉祭獲福之隆執競一章十四句集傳此昭王以後之詩國語説見前篇朱氏公遷曰祭三王無其例然武王有世室則必有專祭矣豈昭王以後祭武世室而配以成康歟附錄李氏樗曰歐陽公曰昊天有成命曰成王不敢康夙夜基命宥密則成王者成王也當是康王已後之詩而毛鄭之説以頌皆是成王時作遂以成王為成此王功不敢康執競之詩曰自彼成康奄有四方則成康者乃成王康王也當是昭王已後之詩而毛氏以為成大功而安之鄭氏以為成安祖考之道觀毛鄭之説雖不如歐陽之簡直然觀諸詩亦有窒礙者成王之時但持盈守成而已不可以為基命也今曰基命則非持盈守成也執競之祀武王如果是成康則是祀武王之詩其言成康之文如此其屢言武王無幾矣豈古人祀先祖之意乎不當以成王康王為説書曰成王畏相又曰惟助成王徳書之所言不是周之成王矣郝氏敬曰祀成康則此詩作於康王以後周之禮樂定自周公是篇所謂遏即韶夏者也禮牲出入奏韶夏天子以遏饗元侯康王以後昭穆之季未聞有繼周公作禮樂者矣即有新聲豈可以配九夏乎云成康者武王成功康定天下猶酒誥言成王大誥言寧王云爾凡詩書言武成康寧多頌武王而王誦王釗率祖考以為諡耳豈凡言成康者即為二王乎案朱子初注執競詩曰武王持其自強不息之心故其功烈之盛天下莫得而競此其所以成大功而安之見於呂祖謙讀詩記中則亦毛萇之説也後從歐陽修之説而定集傳始闢毛鄭然呂叔玉指執競為樊遏韋昭以遏為韶夏而朱子不辨其非且仍采其説盖以傳之自古無以證其必不然故附舊説以資博覽云思文后稷克配彼天立我烝民莫匪爾極貽我來牟帝命率育叶曰逼反無此疆爾界叶訖力反陳常于時夏集傳賦也思語詞文言有文德也范氏處義曰古人以文為徳之盛如書稱堯曰欽明文思稱舜曰濬哲文明也鄒氏泉曰思文裁成輔相開物成務正經天緯地之文也立粒通極至也德之至也貽遺也來小麥牟大麥也劉氏瑾曰本草曰小麥味甘大麥味鹹為五榖長注大麥今稞麥一名麰麥形似小麥皮厚故謂大麥率徧育養也言后稷之德眞可配天劉氏瑾曰謂之克配如文王之克明徳也蓋使我烝民得以粒食者莫非其德之至也且其貽我民以來牟之種乃上帝之命以此徧養下民者叚氏昌武曰詩言來牟者二盖麥者五榖成熟之最先一歳豐稔之占又正闕乏之時故養民者以此為善也唐氏汝諤曰管子曰夏至而麥熟榖之始也是以無有逺近彼此之殊而得以陳其君臣父子之常道於中國也陳氏鵬飛曰遂使常道得陳於中國所謂富而後教之也李氏公凱曰富而後教此所以裨天地不及之功而其能與天一歟或曰此詩即所謂納夏者亦以其有時夏之語而命之也集説李氏樗曰稼穡之事其來尚矣但以為洪水之害民苦於昏墊猶未暇為至后稷教民稼穡利及於民而始有嘉種故詩人推美之以為天誘其衷如親貽之以嘉種者也后稷教民稼穡但飬之而已未及教之也如舜命契敬敷五教在寛則教之者乃契之事也思文之詩惟美后稷乃以陳常于時夏言者盖民無常産因無常心放僻邪侈無不為己倉廩實而知禮義府庫充而知榮辱使當洪水之後后稷不能教民以稼穯則天下之民必無常産矣既無常産則何常心之有惟其教民稼穡此其所以陳當于時夏也范氏處義曰周公論后稷之飬民特取於來牟者何哉是二物者種於稼穡之後熟於稼穡之先能補斯民之艱食者莫急於此是以聖人重之曰此出於天命也鄒氏泉曰民生既植則民行可興故盡中國之地皆得以施其教也飬民者稷之功得以教民者亦稷之功其與天生成覆幬之徳真可配矣徳足以配天則祭以配天誰曰不宜附錄毛氏萇曰極中也孔氏穎逹曰昔堯遭洪水后稷播殖百榖存立我天下衆民之命使衆民無不於爾后稷得其中正言民頼后稷復其常性是后稷有大功矣范氏處義曰后稷之徳在於天下者以教民稼穡為之本也凡堯舜之相授受所謂允執其中者即五典之所陳謂之常道者是也是中也人性之所固有故曰爾極所謂常性是也頼后稷教民稼穡使民無艱食然後能立於爾極而常道可行也故執中於上者堯舜也使烝民立於中以飬其常性者后稷之徳也嚴氏粲曰中者民心所自有特因后稷有以飬之而勿喪耳民之中即后稷之中故曰莫匪爾極康衢所詠爾極洪範所謂汝極天保所謂爾德君牙所謂惟爾之中其意一也案立我烝民鄭箋立當作粒與尚書益稷篇烝民乃粒義同朱子集傳從之當矣毛傳極訓中孔疏以為傳不解立但毛無破字之理必其不與鄭同宜為存立衆民也後儒多有主是説者盖謂立我烝民立當如字時烝民阻饑教化不得施無以立人之道后稷播種民人率育而陳常時夏是立我烝民皆后稷之功也義亦可通總論孔氏穎逹曰思文詩者后稷配天之樂歌也周公制禮推后稷以配帝祭於南郊既已祀之因述后稷之徳可以配天之意而為此歌焉經皆陳后稷有徳可以配天之事李氏樗曰古之祭者必以其祖配之公羊宣公三年傳曰郊則曷為必祭稷王者必以其祖配自内出者無匹不行自外至者無主不至則后稷所以配天盖所以尊祖也思文一章八句集傳國語説見時邁篇孔氏穎逹曰國語云周文公之為頌曰思文后稷克配彼天是此篇周公所自歌與時邁同也集説孔氏穎逹曰后稷之配南郊與文王之配明堂其義一也而此與我将序不同者我将主言文王饗其祭祀不説文王可以配上帝故云祀文王於明堂此篇主説后稷有徳可以配天不説后稷饗其祭祀故言后稷配天由經文有異故為序不同也張氏所望曰后稷配天一事也生民述事故詞詳而文直思文頌徳故語簡而旨深雅頌之體其不同如此清廟之什十篇十章九十五句周頌臣工之什四之二嗟嗟臣工敬爾在公王釐力之反爾成來咨來茹如預反集傳賦也嗟嗟重歎以深敕之也臣工羣臣百官也公公家也釐賜也成成法也茹度也此戒農官之詩先言王有成法以賜女女當來咨度也薛氏應旂曰釐爾是始置法以賜之非謂周以農事開國已有成法也錢氏天錫曰成法具矣而其間土宜不同風氣不一有許多調停纖悉處務要講求之審度之而後可行不可視為具文也集説輔氏廣曰總敕羣臣百官使各敬其公家之事也盖周家當時毎事皆有成法布在天下况於后稷教民稼穡之事乎羣臣百官或有所不知故使之來咨來度也徐氏鳳彩曰戒農官而統飭臣工者國之重務在農臣下皆有兼責也修稼政簡稼器因地利順天時皆成法也我周自有邰肇基其法講求最久王固有以賜爾臣工矣成法雖定而土宜歲時不齊當咨茹而後行此所謂敬也嗟嗟保介維莫音慕之春亦又何求如何新畬音余於音烏皇來牟將受厥明明昭上帝迄用康年命我衆人庤持恥反乃錢子淺反鎛音博奄觀銍珍栗反艾音刈集傳保介見月令呂覽其説不同然皆爲藉田而言蓋農官之副也輔氏廣曰保介助王耕藉田者介有副意故以為農官之副莫春斗柄建辰夏正之三月也畬三歲田也朱氏謀㙔曰稱新畬者田野之日闢也於皇歎美之辭來牟麥也明上帝之明賜也言麥将熟也迄至也康年猶豐年也衆人甸徒也庤具錢銚鎛鉏皆田器也銍穫禾短鎌也孔氏穎逹曰説文云錢銚古田器世本云垂作銚宋仲子注云銚刈也然則銚刈物之器也説文云鎛田器也釋名云鎛鋤類也鏄廹地去草世本云垂作鎒呂氏春秋髙誘注云鎒芸苗也六寸所以入苗間鎛鎒當是一器釋名云銍穫禾鐵也管子云一農之事必有一銍一鎒一銚然後成農是三者皆田器錢氏天錫曰錢以起土用於耕鎛以去草用於芸銍以穫禾用於榖艾穫也此乃言所戒之事言三月則當治其新畬矣今如何哉然麥已将熟則可以受上帝之明賜而此明昭之上帝又将賜我新畬以豐年也於是命甸徒具農器以治其新畬而又将忽見其收成也王氏安石曰治其事於前則收其功於後不可不勉也李氏樗曰惟能庤乃錢鎛乃能有銍艾之望也集説范氏處義曰來牟當夏而熟莫春将熟之時故因言莫春而思來牟亦以莫春民間舊榖已盡新榖未殖所頼來牟以補民間之闕故尤為可美也輔氏廣曰維莫之春亦又何求戒之使及時而專務農事也如何新畬問所治之新畬今如何也新田則費工多故舉新以該舊也命甸徒具農器者盡人事也奄觀銍艾者徯天命也總論輔氏廣曰命他官皆無詩而特命農官則有詩者周人以農事開國故成王周公特作詩以戒敕之以重其事也胡氏紹曾曰先王深知生民之仁起於菽粟故農事嘗首天下之政周官一書三致意焉或以巡稼穡或以簡稼器趣其耕耨辨其穜稑合耦以相助移用以相恤懸其法式行其秩叙又三歲大比以興其治田之甿如興士焉或誅或賞或興或廢及其朝巡慶則始於土地之闢罰則始於田野之荒故當時風之七月臣戒其君頌之臣工君戒其臣舉不外此也附錄序臣工諸侯助祭遣於廟也孔氏穎逹曰周公成王之時諸侯以禮春朝因助天子之祭事畢将歸天子戒敕而遣之於廟詩人述其事而作此歌焉經陳戒諸侯之臣使助其公事又戒車右令及時勤農天子賓敬諸侯不敕其身戒其臣亦所以戒諸侯是其遣之事也此諸侯助祭是下土諸侯自外來也月令説天子耕藉之禮天子親載耒耜措置之於參乗之人保介之與御者二人間君之車上止有御者與車右二人而已今言保介與御明保介即車右也諸侯耕藉勸農則此人與之同車而置田器於其間嘗見勸農之事故敕之也李氏樗曰保介者在車之右農事實無與焉故知所謂嗟嗟臣工嗟嗟保介其實戒敕諸侯借以為言也朱子曰鄭氏據月令天子親載耒耜措之於參保介之御閒以為車右衣甲持兵故曰保介案呂氏春秋亦有此文髙誘注云保介副也莫春在夏正為建辰之月在周正為建寅之月然先儒謂商周雖改正朔特以是月為歲首至於朝聘烝享猶用夏正祭用仲月則春祠宜在建卯之月祭畢遣之時春已向莫農事不可緩也馮氏復京曰保介即戎右髙誘注云副也朱子増成其義曰農官之副然未見確然郝氏敬曰戒農官何與於頌諸侯守土民事為先故於來朝助祭歸而申飭王章稼穡其首務也周先公力農開國故告於廟以祖徳訓之所以為頌案序義以諸侯來朝因助天子之祭事畢将歸天子戒敕而遣之於廟詩人述其事而作此歌也朱子初亦從序後改為戒農官之詩盖以經文止言農事耳後之儒者以為戒農官當列於雅何次於頌今既次於頌則序説不可偏廢矣其論亦近理也若夫詮解經文總屬重農之意箋疏集傳原未两岐耳臣工一章十五句噫嘻成王旣昭假音格爾率時農夫播厥百榖駿發爾私終三十里亦服爾耕十千維耦叶音擬集傳賦也噫嘻亦歎辭也昭明假格也爾田官也時是駿大發耕也私私田也三十里萬夫之地四旁有川内方三十三里有竒言三十里舉成數也鄭氏康成曰周禮曰凡治野田夫間有遂十夫有溝百夫有洫千夫有澮萬夫有川計此萬夫之地方三十三里少半里也孔氏穎逹曰一夫百畝方百歩積萬夫方之是廣長各百夫以百自乗是萬也夫有百歩三夫為一里則百夫為三十三里餘百歩即三分里之一為少半里是三十三里又少半里也何氏楷曰三百歩為一里耦二人竝耕也此連上篇亦戒農官之辭昭假爾猶言格汝衆庶蓋成王始置田官而嘗戒命之也爾當率是農夫播其百榖使之大發其私田皆服其耕事萬人為耦而竝耕也蓋耕本以二人為耦今合一川之衆為言故云萬人畢出并力齊心如合一耦也胡氏一桂曰十千維耦者盖萬夫合耦而耕實五千耦耳此必鄉遂之官司稼之屬其職以萬夫為界者溝洫用貢法無公田故皆謂之私陳氏淳曰周制國中鄉遂之地用貢法田不井授但為溝洫一夫受田百畝與同溝之人通力合作計畝均收大率十而賦其一陳氏埴曰鄉遂用貢法周禮遂人是也梁氏益曰鄭康成云周制畿内用夏之貢法税夫無公田邦國用殷之助法制公田不税夫朱文公亦以為溝洫以十為數井田以九為數井田溝洫决不可合蘇氏曰民曰雨我公田遂及我私而君曰駿發爾私終三十里其上下之間交相忠愛如此集説朱氏善曰成王既置田官而戒命之後王復遵其法而重戒之率時農夫農官之職也播厥百榖農夫之事也終三十里欲其地之無遺利也十千維耦欲其人之無遺力也地無遺利人無遺力此豐穣之所以可必也總論徐氏鳯彩曰上章言奄觀銍艾而此章專言耕謹始也大田言雨我公田而此章專言私惠下也附錄序噫嘻春夏祈榖於上帝也鄭氏康成曰月令孟春祈榖於上帝夏則龍見而雩孔氏穎逹曰謂周公成王之時春郊夏雩以禱求膏雨而成其榖實為此祭於上帝詩人述其事而作歌焉經陳播種耕田之事是重榖為之祈禱戒民使勸農業故作者因其禱祭而述其農事毛以為成是王事之王謂周公成王也王既已政教光明如此猶能敬重農事率是典田之官令之教民耕田終於三十里欲使各極其望無不墾耕及時趨農萬夫俱作天下太平尚能重民如此為之祈神殷勤戒敕故美而歌之毛以公田在民井之間亦當民所耕發而云駿發爾私者上意欲富其民而譲於下欲民之大發私田使之耕以取富故言私而不及公也終三十里者各極其望為言王肅云三十里天地合所之而三十則天下徧也蘇氏轍曰歎天之所以成我王業者既昭至矣我今率是佃田之農夫令無不咸播百榖曰其大發爾私盡三十里而後已既令之民之服其耕者萬人皆出於野言人事盡矣所不足雨耳是以告之天也李氏樗曰是詩所言者播厥百榖但曰十千維耦其意但言民從事於田畝殊無祈榖之意以為人事於此盡矣故播厥百榖十千維耦此皆人所能為也若夫百榖順成非人之所能為天也故於此而祈榖焉嚴氏粲曰祈榖之後即躬耕帝藉故言率時農夫以張本也言駿發爾私不及公田為民祈也案此為春夏祈榖於上帝之詩古序傳之歴代諸儒遵之為説是亦頌中一大禮所在也朱子初説信之而著為傳矣後改為亦戒農官之詩未審何據是以後之窮經者有疑焉且注中為國中鄉遂之地用貢法無公田故皆謂之私夫天子戒敕勸農止及國中之鄉遂猶未及乎畿甸似毛義之推廣於天下為所該者逺矣况言私而不言公以為譲富於民意亦可存也噫嘻一章八句集説朱氏公遷曰臣工噫嘻非祭祀樂歌而入於頌盖頌體也抑豈祈年祈榖之時即其地以戒農官歟振鷺于飛于彼西雝我客戾止亦有斯容集傳賦也振羣飛貌鷺白鳥雝澤也孔氏穎逹曰以鷺是水鳥明所徃為澤故知雝澤也澤名為雝在西有此澤無取於西之義也王氏安石曰西雝盖辟廱也辟廱有水鷺所集也朱子曰先儒多謂辟廱在西郊故曰西廱客謂二王之後夏之後杞商之後宋於周爲客孔氏穎逹曰客者敵主之言先代之後時王偏所尊敬特謂之客史記杞世家云武王克殷求禹之後得東樓公封之於杞其殷後則初封武庚後以叛而誅之更命㣲子為殷後李氏樗曰二王之後不純臣待之故謂之我客如所謂虞賓在位作賓於王家也天子有事膰焉有喪拜焉者也黃氏佐曰天子有事膰焉有䘮拜焉二句見左傳僖公二十四年杜注曰天子祭宗廟則歸之膰杞宋來弔䘮則拜以謝也此二王之後來助祭之詩言鷺飛于西雝之水而我客來助祭者其容貌修整亦如鷺之潔白也或曰興也鄭氏康成曰白鳥集於西雝之澤言所集得其處也興者喻杞宋之君有潔白之徳來助祭於周之廟得禮之宜也其至止亦有此容言威儀之善如鷺然集説曹氏粹中曰鷺之為物羽毛潔白而容止舒閑其譬則修潔之君子也振者矜持修飾之意我客戾止亦有斯容則有潔白之徳而能文之以禮者也朱氏公遷曰親之曰我尊之曰客愛敬兼至以其先代之後也而徳容如此則又有可愛敬之實也在彼無惡烏路反在此無斁叶丁故反庶幾夙夜叶羊茹反以永終譽集傳彼其國也在國無惡之者曹氏粹中曰國人安其豈弟也在此無厭之者鄭氏康成曰謂其來朝人皆愛敬之如是則庶幾其能夙夜以永終此譽矣陳氏曰在彼不以我革其命而有惡於我知天命無常惟德是與其心服也在我不以彼墜其命而有厭於彼崇德象賢蔡氏沈曰崇徳謂先聖王之有徳者則尊崇而奉祀之也象賢謂其後嗣子孫有象先聖王之賢者則命之以主祀也統承先王忠厚之至也集説李氏樗曰二王之後來助祭容止可觀在國則國人爱之在周則周人爱之則可以有譽矣又從而勉之欲其夙夜匪懈然後徳音不已是所謂爱人以徳也成王告微子曰與國咸休永世無窮又曰俾我有周無斁亦此意也朱氏公遷曰無惡之者言皆爱之也無厭之者言皆敬之也庶幾者望之之詞也既有若此之令名又願其徳之常然而長保此令名也總論孔氏穎逹曰二王之後能盡禮備儀尊崇王室故詩人述其事而為此歌焉天子之祭諸侯皆助獨美二王之後來助祭者以先代之後一旦事人自非聖徳服之則彼情未適今二王之後助祭得宜是其敬服時王故能盡禮客主之美光益王室所以特歌頌之曹氏粹中曰必存二代之後者所以尊其先世受命之君俾承祀而不廢耳振鷺一章八句集説朱子語類問振鷺詩不是正祭之樂歌乃獻助祭之臣未審如何曰看此文意都無告神之語恐是獻助祭之臣古者祭祀毎一受胙主與賓尸皆有獻酬之禮既畢然後亞獻至獻畢復受胙如此禮意甚好有接續意思豐年多黍多稌音杜亦有髙廩力錦反萬億及秭咨履反爲酒爲醴烝畀祖妣以洽百禮降福孔皆叶舉里反集傳賦也稌稻也郭氏璞曰今沛國呼稻為稌是也黍宜髙燥而寒稌宜下濕而暑黍稌皆熟則百榖無不熟矣李氏樗曰職方氏謂雍冀髙燥其榖宜黍荆揚下濕其榖宜稻是黍利髙燥稌利下濕也豐年之時或髙或下無所不熟亦助語辭數色主反下同萬至萬曰億數億至億曰秭烝進畀予洽備皆徧也此秋冬報賽田事之樂歌蓋祀田祖先農方社之屬也黃氏佐曰田祖神農也郊特牲之先嗇是也先農后稷也郊特牲之司嗇是也方社則甫田以社以方是也言其收入之多至於可以供祭祀備百禮而神降之福将甚徧也集説序豐年秋冬報也蘇氏轍曰報謂秋祭四方冬祭八蜡豐年載芟皆非宗廟之詩而曰烝畀祖妣何也以為所以能進享先祖者皆方蜡社稷之功也曹氏居貞曰以洽百禮非特言祭祀而已而飬耆老享賓客皆在其中矣朱氏公遷曰天地山川鬼神不一祭祀之禮亦不一隨處而得豐年之用則将随事而受豐年之福所以降福甚徧者莫非田祖方社之所致也朱氏善曰收入之多而祭禮之無不備祭禮之備而福禄之無不徧此方社之賜也而亦田祖先農之力也秋而報焉則方社之謂也冬而報焉則蜡祭百神之謂也以其同謂之報祭故同歌是詩也總論謝氏枋得曰百禮如禮儀三百之類民知禮則風俗厚風俗厚則天下平君臣上下皆樂年豐矣附錄鄭氏康成曰報者謂嘗也烝也孔氏穎逹曰謂周公成王之時致太平而大豐熟秋冬嘗烝報祭宗廟詩人述其事而為此歌焉經言年豐而多獲黍稻為酒醴以進與祖妣是報之事也言烝畀祖妣則是祭於宗廟但作者主美其報故不言祀廟耳不言祈而言報者所以追飬繼孝義不祈於父祖至秋冬物成以為鬼神之助故歸功而稱報亦孝子之情也王氏安石曰為酒為醴烝畀祖妣以洽百禮者天地之功也曹氏粹中曰秋冬大享於明堂秋祭四方冬祭八蜡天地百神無所不報而同歌是詩故不言其所祭耳陳氏鵬飛曰噫嘻祈之於春夏豐年報之於秋冬是一體之詩也祈曰上帝而報不言者省文也胡氏一桂曰案濮氏謂此年榖始登而薦宗廟之樂歌豈非以其有烝畀祖妣之辭歟劉氏瑾曰序以噫嘻為春夏祈此詩為秋冬報載芟為春祈良耜為秋報朱子初解皆用其説今此集傳乃其改本於彼三詩傳文及序説既皆不取小序獨此篇於序説亦謂其誤而傳猶用序意者豈後來所改有未盡歟然得濮氏胡氏之説亦足以補之矣案豐年序以為秋冬報也箋以秋冬報為嘗烝王安石以豐年屬天地之功故以此詩為祭上帝陳祥道引豐年詩以證禮謂秋報者季秋之於明堂也吕祖謙謂以祈為郊則季秋大饗明堂安知不併歌豐年之詩以為報歟曹粹中謂秋冬大饗及祭匹方八蜡天地百神無所不報同歌是詩漢唐宋諸儒之説大約如是集傳定為報賽田事之樂歌盖指田祖先農方社之屬然詳觀此詩言黍稌之多倉廩之富而得為此酒醴以饗祖考洽羣神祀事無缺而百禮咸備皆上帝之賜故曰降福孔皆也考祀典秋冬大報上自天地以至方蜡靡祀不舉祀則有樂是詩槩為報祭之樂章故序不明斥所祭為何神也朱子從序説為報大指相符特未舉其全耳至箋以秋冬為烝嘗盖據祖妣以為説孔穎逹曲逹其義矣理亦可通也豐年一章七句集説孔氏穎逹曰年之豐熟必大有物豐訓為大故云豐年大有之年也春秋宣十六年榖梁傳曰五榖大熟為大有公羊以為大豐年是也有瞽有瞽在周之庭集傳賦也瞽樂官無目者也鄭氏康成曰樂官目無所見於音聲審也周禮上瞽四十人中瞽百人下瞽百六十人有視瞭者相之孔氏穎逹曰春官序於瞽矇之下云視瞭三百人則一瞽一視瞭也注云瞭目明者也其職云掌太師之懸凡樂事相瞽注云太師當懸則為之相謂扶工是主相瞽又設懸也序以此為始作樂而合乎祖之詩鄭氏康成曰王者治定制禮功成作樂合者大合諸樂而奏之孔氏穎逹曰合諸樂器於祖廟奏之告神以知和否詩人述其事而為此歌焉經皆言合諸樂器奏之事也止説周之樂器既備乃奏非合諸異代樂也蘇氏轍曰始作樂謂周公始成大武也朱子曰祖通言先祖两句總序其事也集説輔氏廣曰瞽言作樂之人也庭言作樂之處也朱氏善曰重言有瞽見其非一人姚氏舜牧曰樂先審音故先舉其人設業設虡音巨崇牙樹羽應田縣鼓鞉音桃磬柷尺叔反圉魚女反既備乃奏叶音祖簫管備舉以上叶瞽字集傳業虡崇牙見靈臺篇樹羽置五采之羽於崇牙之上也孔氏穎逹曰植者為虡横者為栒大板謂之業所以飾此栒而為崇牙刻之如鋸齒捷業然故曰業其形卷然可以縣鼔磬樹五采之羽以為文畫繒為翼載以璧樹翼於栒之角明堂位所謂夏后氏之龍簨虡殷之崇牙周之璧翣以見飾之彌多也胡氏一桂曰曹氏曰盖横木為簨飾以鱗屬植木為虡飾以臝羽之屬又加大板於上形捷業然此夏后氏制也商於龍簨上刻畫為重牙以縣垂紘所謂崇牙也周又畫繒為翣載以璧玉垂五采羽於其下所謂植羽也應小鞞田大鼓也孔氏穎逹曰釋樂云大鼓謂之鼖小者謂之應是應為小鼓也大射禮應鞞在建鼓東則為應和建鼔應鞞共文是為一器故知應小鞞也應既是小田宜為大故曰田大鼓也鄭氏曰田當作􅉧音引小鼓也孔氏穎逹曰以經傳皆無田鼓之名太師職云下管播樂器令奏鼔􅉧注云為大鼓先引是古有名朄引導鼓故知田當為朄是應鞞之屬也縣鼓周制也夏后氏足鼓殷楹鼓周縣鼓鄭氏康成曰足謂四足也楹謂之柱貫中上出也縣縣之簨虡也孔氏穎逹曰周法鼓始在懸故云懸鼓解此詩特言懸意也若大射禮其樂建鼔則殷之楹鼔也而大射用之者以彼諸侯射禮畧於樂備三面而已故無懸鼔也鞉如鼓而小有柄两耳持其柄摇之則旁耳還自擊陳氏暘曰鞉所以兆奏鼓磬石磬也柷狀如漆桶以木為之中有椎連底挏朱氏公遷曰音動撞也之令左右擊以起樂者也圉亦作敔狀如伏虎背上有二十七鉏鋙刻以木長尺擽朱氏公遷曰音厯捎也掠也之以止樂者也毛氏萇曰柷木椌也圉楬也孔氏穎逹曰柷木椌圉楬者以樂記有椌楬之文與此柷圉為一故辨之言柷用木則圉亦用木也釋樂云所以鼓柷謂之止所以鼓敔謂之籈音眞郭璞云柷方二尺四寸深一尺八寸中有椎柄連底挏之止其椎名也敔以木長尺擽之籈其名也是言擊柷之椎名為止戛敔之木名為籈章氏俊卿曰柷方二尺四寸隂也敔二十七鉏鋙陽也樂作陽也以隂數成之樂止隂也以陽數成之固天地自然之理也聲之所出以虚為本虚然後可擊及其止則歸於實焉故敔為伏虎之形則實而已簫編小竹管為之孔氏穎逹曰郭璞曰簫大者編二十三管長尺四寸小者十六管長尺二寸風俗通云簫參差象鳳翼十管長二尺其言管數長短不同盖有大小故也管如篴朱氏公遷曰即笛字併两而吹之者也孔氏穎逹曰謂竝吹两管也郭璞曰管長尺圍寸併漆之有底賈氏以為如篪六孔集説朱氏公遷曰此皆堂下之樂也鼓以主乎衆音磬以收乎衆音柷以起樂圍以止樂既皆言之而又曰備乃奏又至於簫管之細亦備舉焉則餘不言者在其中矣何氏楷曰但述樂器之名而已其或言奏或言舉互相備也喤喤音横厥聲肅雝和鳴先祖是聽我客戾止永觀厥成以上叶庭字集傳我客二王後也觀視也成樂闋也如簫韶九成之成曹氏粹中曰永觀厥成觀之無厭斁也朱子曰成樂之一終也蔡氏沈曰樂者象成者也故曰成獨言二王後者猶言虞賓在位我有嘉客蓋尤以是為盛耳謝氏枋得曰舜作樂而曰虞賓在位祖考來格成王合樂而曰先祖是聽我客戾止以先代之後與先祖竝言尊之至也書曰崇徳象賢統承先王修其禮物非尊其後尊聖帝明王也集説孔氏穎逹曰作之喤喤然和集諸聲皆肅敬和諧而鳴不相奪倫先祖之神於是降而聽之我客二王之後適來至此與聞此樂助祭之人多獨言我客者以二王之後尊故特言之徐氏常吉曰肅雝二字詩傳未詳其義樂記引此詩而曰肅肅敬也雝雝和也乃知肅即皦如義雝即純如義總論朱氏公遷曰作樂有其人樂作備其器故聲音極其和而神人無不和也有瞽一章十三句集説王氏志長曰樂聲歌始備薦之於祖以告成事非祭祀之時所奏故篇中詳序樂工之位樂器之設既備乃奏至厥成而終焉盖凡樂初成必薦之祖考而後譜之樂官登之郊廟也猗於宜反與音余漆沮七余反潛有多魚有鱣張連反有鮪叶于軌反鰷音條鱨音常鰋音偃鯉以享以祀叶逸織反以介景福叶筆力反集傳賦也猗與歎辭潛槮素感反也孔氏穎逹曰釋器云槮謂之涔李巡曰今以木投水中飬魚曰涔孫炎曰積柴飬魚曰槮涔潛古今字蓋積柴養魚使得隱藏避寒因以薄圍取之也或曰藏之深也王氏安石曰潛有多魚言取之深也范氏處義曰魚喜潛故取者必求之深鰷白鰷也月令季冬命漁師始漁天子親徃乃嘗魚先薦寢廟季春薦鮪于寢廟鄭氏康成曰冬魚之性定春鮪新來孔氏穎逹曰冬則衆魚皆可薦故總稱魚春惟獻鮪而已故特言鮪冬月既寒魚不行乃性定而肥充故冬薦之也陸氏佃曰鮪岫居至春始出而浮陽何氏楷曰夏小正則以二月祭鮪戴徳傳云祭不必記記鮪何也鮪之至有時美物也鮪者魚之先至者也而其至有時謹記其時此其樂歌也集説李氏樗曰漆沮之水有魚之多如此則以祭以祀故神助之以大福夫神之所以降福者豈為魚之多耶盖其恭敬誠信奉之以物因其時而薦之未嘗敢後此其所以助之多福也范氏處義曰鱣鮪之大鰷鱨之長鰋形似偃鯉之形俯舉其類之多皆可用以薦享者亦形容萬物盛多之意也以是備物以享祀則神助我以大福所以報也徐氏常吉曰享祀是薦非祭所謂備四時之異物順孝子之誠心也沈氏守正曰此是常祭之外另舉此祭如漢原廟薦新之意總論彭氏執中曰子孫之祭其先祖九州之美味莫不畢備然其樂歌必言其所興之地取其所産之物而薦之者以示不忘本之意抑亦思其所嗜之意方氏慤曰王者於祖廟以人道事之則有寝以神道事之則有廟祭神道薦人道也潛一章六句集説黄氏櫄曰魚麗言萬物盛多可以告於神明知魚麗之意則知潛之意矣有來雝雝與公叶篇内同至止肅肅相息亮反維辟音璧公天子穆穆集傳賦也雝雝和也肅肅敬也孔氏穎逹曰雝雝和肅肅敬樂記文也和在色敬在心和敬賢者之常因來至異文而分之耳相助祭也辟公諸侯也穆穆天子之容也邢氏昺曰曲禮云天子穆穆爾雅釋詁云穆穆美也是天子之容貌穆穆然美也此武王祭文王之詩言諸侯之來皆和且敬輔氏廣曰來而不和則有勉強不得已之心至而不敬則有怠緩不敏事之意劉氏瑾曰諸侯之來者非一故以雝雝言其和其至止於廟中也故以肅肅言其敬以助我之祭事而天子有穆穆之容也集説劉氏向曰武王周公繼政朝臣和於内萬國驩於外故能盡其驩心以事其先祖詩曰有來雝雝至止肅肅相維辟公天子穆穆言四方皆以和來也王氏肅曰來助祭者維國君諸公天子穆穆然以美徳為之主孔氏穎逹曰從彼本國而來其顔色雝雝然而柔和既至止於此則容貌肅肅然而恭敬助祭事者維為國君之諸公於是時天子之容則穆穆然而美言助祭者敬和祭者又美各得其宜於音烏薦廣牡相同上予肆祀叶飬里反假古雅反哉皇考叶音口綏予孝子叶奨里反集傳於歎辭廣牡大牲也王氏安石曰廣牡碩大肥腯之謂也肆陳假大也皇考文王也綏安也孝子武王自稱也朱氏公遷曰對辟公言則曰天子對皇考言則曰孝子語意各有所主故不同言此和敬之諸侯薦大牲以助我之祭事而大哉之文王庶其享之以安我孝子之心也集説孔氏穎逹曰又指言助祭之事天子薦進大牡之牲辟公助祭陳其祭祀之饌言得天下之懽心由君考文王其徳被於後世能安定我之孝子也蘇氏轍曰其助者公侯其薦者天子也故於其薦大牡也皆助其饌言得天下之懽心也案宗廟之祭主者為尊故薦大牲者歸於天子以對祖考而賛助之者諸侯爾載於周禮詳於禮器及祭義甚備鄭康成孔穎逹軰皆據是以詮詩而集傳作助祭之諸侯薦之未審所本所以後儒多遵箋疏盖其義為長云宣哲維人文武維后燕及皇天叶鐵因反克昌厥後集傳宣通哲知燕安也此美文王之德宣哲則盡人之道吕氏柟曰宣以其行言無事之不當哲以其智言無理之不明人之道知而行之耳文武則備君之德故能安人以及於天黄氏佐曰監觀四方求民之莫此天以安民為心也故人安則天安矣而克昌其後嗣也蘇氏曰周人以諱事神文王名昌而此詩曰克昌厥後何也曰周之所謂諱不以其名號之耳不遂廢其文也諱其名而廢其文者周禮之末失也李氏樗曰周人以諱事神者如稱文王則不敢斥之曰文王昌書稱惟爾元孫某史官不敢斥其名故也如穆王名滿當時亦有王孫滿㐮王名鄭當時亦有衛侯鄭魯武公名敖而後世之臣有公孫敖觀此則知此詩克昌厥後噫嘻言駿發爾私皆未嘗諱也孔子作春秋如匡王名班而書曹伯班簡王名夷而書晋侯夷吾皆未嘗諱集説曹氏粹中曰安及皇天則隂陽和而風雨時日月光而星辰静無錯行妄動之變輔氏廣曰言文王之徳安於人而格於天所以能昌盛於後嗣之人也人為萬物之靈維通與知所以盡人之道文武之徳所該者甚衆故曰備君之徳堯之徳廣運亦曰乃武乃文而已人道立故天道成是以能安人者則能燕及於天也天之佑君者莫大於予以賢子孫是以能燕及於天則能昌我後嗣也綏我睂壽叶殖酉反介以繁祉既右音又烈考叶音口亦右文母叶滿彼反集傳右尊也周禮所謂享右祭祀是也周禮春官大祝辨九􅉔音拜以享右祭祀烈考猶皇考也文母大姒也何氏楷曰烈考與文母相配而言非文王無足以當之烈考既為文王則詩中言孝子者乃武王自稱是則皇考烈考俱為一人矣徐氏鳯彩曰皇考徳至矣而崇其功故曰烈文母尊等矣而配其徳故曰文言文王昌厥後而安之以睂壽助之以多福使我得以右於烈考文母也集説季氏本曰綏眉夀介繁祉此正昌後之實也此承上章言所以能饗親之意黄氏佐曰眉夀就夀之徴言繁祉就貴為天子富有四海言有已然意盖武王未受命也謂之右者上祀以天子后妃之禮之云也總論鄒氏泉曰此詩見文王啟佑之仁武王對揚之孝徐氏常吉曰武王既得天下以祭故言諸侯獨詳盖得萬國之􅌚心以祀其先王乃天子之孝也附錄序雝禘大祖也鄭氏康成曰禘大祭也大祖謂文王孔氏穎逹曰周公成王禘文王之事也知大祖謂文王者以經云假哉皇考又言文武維后是此皇考為天下之人后明非后稷若是后稷則身非天子不得言維后也大祖謂祖之大者既非后稷明知謂文王也文王雖不得為始祖可以為大祖也以大祖為文王皇考當之矣而引言烈考故知為武王即洛誥所云烈考武王𢎞朕恭一也王氏安石曰皇考武王也烈考謂文王也吕氏祖謙曰禮不王不禘周所以王天下得行禘禮於大祖者皆文王武王之功也故成王於禘之時推其得禘之由播之樂歌以告大祖曰大哉我皇考武王綏予小子以已成之業其君臣賢聖再造區夏所安者上及於皇天用能昌大於後居王位而行禘禮而膺夀祉之多是皆武王之力而文王大姒之所右助也文武雖同建王業而武王實得天下故歸功之言詳於武王而卒章本於文王大姒焉閔予小子之頌曰遭家不造嬛嬛在疚於乎皇考永世克孝故皇考者武王之稱也烈考與文母相配而言故烈考者文王之稱也案序雝禘大祖也箋疏以為成王禘祭文王之詩大祖即文王也詩内烈考毛萇謂武王皇考鄭康成謂文王王安石以皇考謂武王烈考謂文王然俱於禘無異辭也吕祖謙以周之王天下得行禘禮於大祖者皆文王武王之功故作此樂歌以告大祖是嚳與后稷俱在所告之中於禘祭旁逹而無窒礙矣至朱子以禘所自出則經無嚳與后稷之意以吉禘於文王則與序已不協恐屬序誤故改為武王祭文王之詩則皇考烈考俱為一人其義更為得解而武王之祭文王劉向固先言之矣若後之儒者更合吕祖謙之説而觀之則禘亦可通也夫雝一章十六句集傳周禮樂師及徹帥學士而歌徹説者以為即此詩鄭氏康成曰學士國子也徹者歌雍陳氏暘曰大祭祀告利成之後徹必歌雍古之祭祀有樂以迎來必有樂以徹食論語亦曰以雍徹朱子曰徹祭畢而收其俎也天子宗廟之祭則歌雍以徹然則此蓋徹祭所歌而亦名為徹也載見賢遍反下同辟音璧王曰求厥章龍旂陽陽和鈴央央於良反鞗音條革有鶬七羊反休有烈光集傳賦也載則也發語辭也章法度也輔氏廣曰徳禮刑政皆是也交龍曰旂陽明也毛氏萇曰言有文章也軾前曰和旂上曰鈴爾雅釋天有鈴曰旂郭氏璞曰懸鈴於竿頭畫交龍於旒孔氏穎逹曰和亦鈴也何氏楷曰和亦鈴也而疊云和鈴者車中之鈴有二在軾者名和或在衡或在鑣者皆名鸞言和鈴所以别於鸞鈴也干寶云和鸞皆以金為鈴馬動則鸞鳴鸞鳴則和應央央有鶬皆聲和也黄氏一正曰鞗革有鶬轡首纒搤小金環也何氏楷曰鶬當依説文通作瑲玉聲也鞗革有瑲音者金厄所觸亦如玉之鳴也休美也此諸侯助祭於武王廟之詩先言其來朝稟受法度其車服之盛如此集説蒋氏悌生曰言諸侯朝覲而稟王法備其車服之美助祭而獻先王斯可盡繼述之心今其來覲者皆曰我将見於王而稟受法度也觀其龍旂則陽陽然而光耀聽其和鈴則央央然而和鳴而鞗革之垂又有鶬而相應豈惟其車服之美若是哉盖由其能稟法度故人見其儀文之美自有光輝耳鄒氏泉曰此就其未祭之先言之厥章乃天子所制諸侯所守凡典禮法度皆是但中間因革損益或有不同故來朝時稟而行之以為循守之規耳盛其車服有重王事昭君賜之意率見昭考以孝以享叶虚良反集傳昭考武王也廟制大祖居中左昭右穆周廟文王當穆武王當昭故書稱穆考文王而此詩及訪落皆謂武王為昭考朱子曰大祖廟在北昭穆各以次而南廟皆南向羣廟之列左為昭而右為穆也若武王謂文王為穆考成王稱武王為昭考則自其始祔而然盖但以左右為昭穆而不以昭穆為尊卑也凡廟主在本廟之室中皆東向及其祫於大廟之室中則惟大祖東向自如而為最尊之位羣昭之入乎此者皆列於北牖下而南向羣穆之入乎此者皆列於南牖下而北向南向者取其向明故謂之昭北向者取其深逺故謂之穆盖羣廟之列則左為昭而右為穆祫祭之位則北為昭而南為穆也昭穆之分是始封以下入廟之時便有定次後雖百世不復移易而其尊卑不以是而可紊也故成王之世文王為穆而不害其尊於武武王為昭而不害其卑於文劉氏瑾曰后稷為始封之君其廟居中自二世為昭三世為穆遞數至十五世而文王廟次當穆十六世而武王廟次當昭也此乃言王率諸侯以祭武王廟也集説蒋氏悌生曰載見而諸侯事君之禮備矣率見而孝子事親之心至矣朱氏善曰諸侯之來朝将以稟受法度也而我乃率之以祀武王何也盖先王者法度之所從出而宗廟者又禮法之所由施也徐氏光啟曰能左右之曰以以孝以享者合天下之孝享以為一人之孝享也何氏楷曰孝者孝思内盡志也享者獻享外盡物也以介睂壽永言保之思皇多祜後五反烈文辟公綏以多福俾緝熙于純嘏叶音古集傳思語辭皇大也美也又言孝享以介睂壽而受多福是皆諸侯助祭有以致之使我得繼而明之以至于純嘏也蓋歸德於諸侯之詞猶烈文之意也集説朱氏公遷曰綏以多福即介眉壽而保多祜者是已緝熈于純嘏則明融髙朗又以漸進而氣象尤為極盛矣意謂祭祀而得長有其福是皆諸侯所錫之福使我因此福而馴致乎大福也總論朱氏公遷曰言祀事之行非徒以合人心之和正所以一人心之敬也是則一代之典章寓焉諸侯因朝覲而求遵守之規王者因致祭而示忠敬之意此詩意也附錄序載見諸侯始見乎武王廟也毛氏萇曰載始也鄭氏康成曰諸侯始見君王謂見成王也孔氏穎逹曰周公居攝七年而歸政成王成王即政諸侯來朝於是率之以祭武王之廟詩人述其事而為此歌焉經皆為見廟而言故舉見廟以總之序不言始見成王者以作者美其助祭不美朝王但諸侯之來必先朝而後助祭耳武王立廟久矣諸侯往前之朝已應嘗經助祭於此乃言始見於武王廟者成王於此親為祭主諸侯於成王之世始見武王非謂立廟以來諸侯始見也四時之祭徧祭羣廟獨言見武王者作者特言昭考其意主於武王故也百辟助祭得禮昭考之神乃安之以多福又使之光明于大嘏也天子受福曰大嘏綏以多福是神安辟公非謂安孝子也禮運大嘏是天子受福之事也不可謂諸侯朱子曰諸侯始來見王稟受法度其車服之盛如此而率之以祭武王之廟受此眉壽之福以多福綏諸侯使之緝熈于純嘏盖均福於諸侯之辭黄氏櫄曰君臣之間竝受多福案載見之詩序謂始見乎武王之廟也毛萇因載有始義故訓為始朱子以載亦作語辭故以毛解為恐未必然然後儒終未敢以毛訓為不然而多從之者何歟盖以成王新即政率是百辟見於昭廟以隆孝享一以顯耆定之大烈彌光一以彰萬國之歡心如一有丕承王業畏懐天下氣象故曰始也若泛言諸侯助祭則烈祖有功徳之廟多矣何獨詣武王一廟而作此歌乎又未章箋疏以為天子諸侯均受多福今集傳以為多福緝續於成王義亦稍别然攷之朱子初解原從序説而序辨於毛詁亦無決辭故竝存之載見一章十四句集説何氏楷曰大抵宗廟祭祀多以諸侯助祭為重觀此及清廟雍詩可見胡氏紹曽曰諸侯之來本為朝王而詩之作則為助祭如車攻之于苗瞻洛之講武詩中此例甚多有客有客亦白其馬叶滿補反有萋有且七序反敦都回反琢其旅集傳賦也客微子也曹氏粹中曰封於微而爵為子微盖商圻内國名周既滅商封微子於宋以祀其先王而以客禮待之不敢臣也孔氏穎逹曰客止一人而重言有客有客是丁寜殊異以尊大之也范氏處義曰微子之命曰作賓於王家故謂之有客也亦語辭也蘇氏轍曰亦仍也殷尚白修其禮物仍殷之舊也蔡氏沈曰修其典禮文物不使廢壊以備一代之法也何氏楷曰明堂位云殷人白馬黒首案此亦修先王禮物中之一事萋且未詳傳曰敬愼貌孔氏穎逹曰萋萋且且承白馬之下則是微子威儀故云敬愼貌敦琢選擇也旅其卿大夫從行者也孔氏穎逹曰敦琢治玉之名人而言敦琢故為選擇明尊其所往故擇卿大夫之賢者與之朝王此微子來見祖廟之詩孔氏穎逹曰言見於祖廟必是助祭微子既受命乃來朝而見也與上有瞽振鷺或亦一時事而此一節言其始至也集説孔氏穎逹曰言我周家今有承先代之客此客自乗所尚而白其馬其來則有萋萋然有且且然言能敬愼威儀盡心力於其事也身既如此又敦琢其從行之徒旅言選擇從者如敦琢玉然是從者皆賢故為周人所爱朱氏公遷曰先代之後禮物不與時王同作賓王家文獻有足徴也而又敬愼威儀選擇從者其來之不苟如此則所以尊時王重祀事者至矣有客宿宿有客信信言授之縶陟立反以縶其馬同上集傳一宿曰宿再宿曰信爾雅釋訓有客宿宿言再宿也有客信信言四宿也縶其馬愛之不欲其去也此一節言其将去也集説鄭氏康成曰周之君臣皆爱微子其所館宿可以去矣而言絆其馬意各殷勤黄氏佐曰有客宿宿二句只於女信宿之意言授之縶盖欲其行之不果也薄言追之左右綏之既有淫威降福孔夷集傳追之已去而復還之愛之無已也徐氏常吉曰設言以見爱之至非眞已去而復追之也左右綏之言所以安而留之者無方也薛氏應旂曰左右是借此二字以形容留之無方如百爾所思之意淫威未詳舊説淫大也統承先王用天子禮樂所謂淫威也曹氏粹中曰威等威也夷易也大也王氏安石曰有淫威則所享宜盛大故降福孔夷也此一節言其留之也集説孔氏穎逹曰又歎美微子得為王者之後用其正朔行其禮樂既有大法則矣神明降與之福則又甚易言有徳故易福總論孔氏穎逹曰有客詩者微子來見於祖廟之樂歌也經之所陳皆説微子之美雖因見廟而歌其意不美在廟故經無廟事為周太平之歌而述微子之美者言王者所封得人即為王者之美故歌之也朱氏公遷曰有客一詩既足以見微子之賢尤足以見周家之厚有客一章十二句集説李氏樗曰有客與振鷺之詩大抵相類振鷺之所謂亦有斯容者即此詩所謂有萋有且是也此詩所謂言授之縶追之綏之即振鷺之詩所謂在此無斁是也何氏楷曰辭雖頌客而亦告於廟故皆為頌於音烏皇武王無競維烈允文文王克開厥後嗣武受之勝殷遏劉耆音指定爾功集傳賦也於歎辭皇大遏止劉殺耆致也周公象武王之功為大武之樂孔氏穎逹曰禮器云樂樂其所自成武王用武除暴為天下所樂故謂其樂為武樂武樂為一代大事故歴代皆稱大也李氏樗曰周禮舞大武以享先祖謂之大者如堯之樂大章舜之樂大韶禹之樂大夏湯之樂大濩武王之樂大武是也言武王無競之功實文王開之而武王嗣而受之勝殷止殺鄭氏康成曰武王受文王之業舉兵伐殷而勝之以止天下之暴虐而殺人者孔氏穎逹曰謂遏止其時枉殺人者非止天下之用刑也以致定其功也王氏肅曰致定其大功謂誅紂定天下集説孔氏穎逹曰言克商之功業實最為彊也所以能致此業而得為彊者由於信有文徳者之文王以聖徳受命能開其後世子孫之基緒故武王繼而受之勝此殷家止於殺人之害以致安定汝大功其盛業如此故象而制樂是以美而歌之嚴氏粲曰文王有文徳以開其後人之基緒然殷虐未除武王伐紂以止殺然後致定其功所以歸重武王之功明非武王之武無以成文王之文也朱氏善曰於勝殷見其義於遏劉見其仁此大功之所由定而大業之所由成也姚氏舜牧曰一戎衣而天下定自此民免於水火之虐故知武王之用殺乃所以止殺而世稱其烈與文王等有由也總論李氏樗曰案禮記總干而山立武王之事也發揚蹈厲太公之志也武亂皆坐以象周召之治言大武之舞其始則持盾正立以待諸侯既而戰鬭既而又使行列皆坐以見其為止戈之武也大武之舞在於止戈大武之詩在於止殺其類一也武一章七句集傳春秋傳以此為大武之首章也左傳宣公十二年楚子曰武王克商作武其卒章曰耆定爾功孔氏穎逹曰頌皆一章言其卒章者謂終章之句也大武周公象武王武功之舞歌此詩以奏之何氏楷曰聲以節舞唐賈氏謂詩為樂章與舞人為節是也禮曰朱干玉戚冕而舞大武梁氏益曰禮記明堂位注朱干赤盾也玉戚玉飾斧柄也著衮冕而執此干戚以舞武王伐紂之樂然傳以此詩為武王所作則篇内已有武王之諡而其説誤矣張子曰大武武王没嗣王象武王之功之舞歌武以奏之冠者舞之集説鄭氏康成曰大武周公作樂所為舞也孔氏穎逹曰周公攝政六年之時象武王伐紂之事作大武之樂既成而於廟奏之經之所陳皆武王生時之功也何氏楷曰樂記子曰夫樂者象成者也且夫武始而北出再成而滅商三成而南四成而南國是疆五成而分周公左召公右六成復綴以崇天子鄭云成猶奏也毎奏武曲一終為一成臣工之什十篇十章一百六句周頌閔予小子之什四之三閔予小子遭家不造叶徂候反嬛嬛其傾反在疚音救於音烏乎音呼皇考叶袪候反永世克孝叶呼候反集傳賦也成王免喪始朝于先王之廟而作此詩也閔病也許氏愼曰痛也予小子成王自稱也曹氏粹中曰洛誥云予小子其退即辟于周盖成王常以幼沖自處故毎稱之造成也孔氏穎逹曰有所造為終必成就故造猶成也嬛與煢同何氏楷曰石經作煢無所依怙之意李氏樗曰嬛字與哀此煢獨之義同嬛者孤獨而已疚哀病也匡衡曰煢煢何氏楷曰漢書作焭在疚言成王喪畢思慕意氣未能平也盖所以就文武之業崇大化之本也朱氏公遷曰大化之本則以孝道言也皇考武王也歎武王之終身能孝也李氏樗曰亦猶大舜終身慕父母也季氏本曰歎其能以繼述為心雖文王已没而不忘故曰永世克孝也集説輔氏廣曰周至成王之時可謂成矣而曰遭家不造者王業雖成天下雖治而成王之心常若未成未治也如此然後能保其成若自謂已成已治則殆矣黄氏佐曰成王朝廟之時有紹述先王之心故其言如此小子對先王而言也遭家不造者盖周室方新而天下之向慕猶淺商祚爰革而人心之感慨未灰觀書大誥多方可見矣方言遭家不造嬛嬛在疚而遂歎及武王之孝盖知有今日之可哀則知有皇考之可法其成家繼業之心切矣念兹皇祖陟降庭叶去聲止維予小子夙夜敬止集傳皇祖文王也承上文言武王之孝思念文王常若見其陟降於庭猶所謂見堯於牆見堯於羹也後漢書李固曰堯没舜仰慕三年坐則見堯於牆食則見堯於羹楚詞云三公揖譲登降堂只與此文勢正相似劉氏瑾曰大招曰三公穆穆登降堂只其言三公登降堂正猶此言皇祖陟降庭其言只為語已詞正猶此言止也但集傳所引揖譲二字彼文正作穆穆則此或傳寫之誤也而匡衡引此句顔注亦云若神明臨其朝廷是也朱子曰匡衡時未行毛説顔監又精史學而不梏於專經之陋故其言獨得經之本旨也余舊讀詩而爱顔説然尚疑其無據及讀楚辭乃有登降堂只之文於是益信陟降庭止之為古語其義審如顔説而無疑也集説陳氏櫟曰思親而見其如在者此人子終身慕親之孝當親没而愈篤者也記云致爱則存致慤則著著存不忘於心夫安得不敬乎惟武王之孝於文王者有此心故成王之孝於武王者亦惟致敬以不忘乎此心此武王之逹孝所以上無愧於文王而下可示法於成王也黄氏佐曰夙夜之敬即陟降之思也此正是欲法皇考之孝處姚氏舜牧曰緝熈敬止原是文王之家傳武王受丹書曰敬勝怠者吉成王曰夙夜敬止其淵源亦深矣哉於乎二字同上皇王繼序思不忘集傳皇王兼指文武也承上文言我之所以夙夜敬止者思繼此序而不忘耳毛氏萇曰序緒也集説鄭氏康成曰於乎君王歎文王武王也我繼其緒思其所行不忘也李氏樗曰武王能以念兹皇祖為孝則成王亦當以思繼祖考為孝朱氏公遷曰敬則無間斷故能思之不忘黄氏佐曰自己有之曰業自相傳言之則曰序繼序即是就文武之業也總論朱氏公遷曰武王所以永世克孝者以其盡孝思之誠也成王敬以承之繼文武之序而思之亦欲如武王之念文王也敬以夙夜而思不忘亦欲如武王之永世克孝也朱氏善曰孝敬一理也自繼述而言謂之孝自存主而言謂之敬敬其身即所以孝於親孝於親未有不敬其身者也此所以能崇大化之本也閔予小子一章十一句集傳此成王除喪朝廟所作疑後世遂以為嗣王朝廟之樂後三篇放此劉氏瑾曰此篇及訪落敬之小毖四詩詞意相表裏如云遭家不造率時昭考未堪家多難乃懲創管蔡之事皆可騐其為成王之詩而小序於四詩皆泛言嗣王故又疑其後為嗣王朝廟通用之樂歌也集説黄氏櫄曰當武王之後王業已成天命已固而詩有慄然若處危難之辭盖天下之治常生於戒謹恐懼而天下之亂常基於㤗然自滿故天下雖有㤗山之勢而聖人常以累卵為心無虞而戒無難而畏此其能保治於無窮也大誥亦曰予惟小子若涉淵水又曰予造天役遺大投艱于朕身又曰矧今天降戾于周邦皆若此詩之意則成王之心亦可見矣訪予落止率時昭考於音烏乎音呼悠哉朕未有艾五蓋反將予就之繼猶判渙維予小子未堪家多難乃旦反紹庭上下陟降厥家休矣皇考以保明其身集傳賦也訪問許氏愼曰汎謀曰訪徐氏鍇曰謂廣問於人也落始曹氏粹中曰凡宫室始成則落之故以落為始悠逺也艾如夜未艾之艾許氏謙曰庭燎傳艾盡也則此朕未有艾謂未能盡率昭考之道也判分孔氏穎逹曰春秋荘三年紀季以酅入于齊左傳曰紀於是始判是判為分之義也渙散孔氏穎逹曰渙然是散之意故為㪚也保安明顯也王氏安石曰保其身則無危亡之憂明其身則無昏塞之患成王既朝於廟因作此詩以道延訪羣臣之意言我將謀之於始唐氏汝諤曰落乃莅政之始非即位之始也以循我昭考武王之道然而其道逺矣予不能及也將使予勉強以就之而所以繼之者猶恐其判渙而不合也則亦繼其上下於庭陟降於家何氏楷曰紹庭二句與陟降庭止義同庶幾頼皇考之休孔氏穎逹曰上言昭考此言皇考皆斥武王也有以保明吾身而已矣集説鄭氏康成曰成王自以承聖父之業懼不能遵其道徳故於廟中與羣臣謀始即政之事也李氏樗曰自訪予落止以至繼猶判渙皆是仰武王之盛徳歎眇躬之凉薄苦前哲之髙逺也輔氏廣曰延訪羣臣所以盡下情率時昭考所以守家法二者相資於乎悠哉朕未有艾又歎武王之道甚逺而恐在我有所不能及也味此意則成王固已黙識夫武王之道矣将予就之繼猶判渙言将使我勉強以就之猶恐其力量不足意思不能接續或至於判渙不能收拾聚蓄其道於我之一身也於是又歎以為予乃幼沖小子未能任國家之多難此盖指武庚之事而言則亦當繼紹武王内外所行之事上下於庭指其外事也陟降於家指其内事也庶幾賴武王之休以保安明顯我之身而已胡氏一桂曰自繼猶判渙而上猶皇皇如有所求而弗獲之意自維予小子而下則焄蒿悽愴若或見之也陳氏櫟曰武王之道若悠逺而難繼而武王之上下於庭陟降於家者其迹未逺則近而可繼成王紹武王之上下陟降於家庭者是即武王念文王而見其陟降於庭者也如此者豈不由於前詩之夙夜敬止繼序思不忘哉維其能敬以思繼武王念文王之心所以能紹武王於家庭也總論李氏樗曰人君者天下之本也始即位者又人君之本也故召公告成王曰王乃初服若生子罔不在厥初生自貽哲命盖言始之不可不愼此訪落之詩所以作也許氏謙曰紹庭上下欲法武王之正朝廷也陟降厥家欲法武王之齊其家也保明其身欲賴武王助其修身也成王之學有本末先後矣訪落一章十二句集傳説同上篇集説蘇氏轍曰閔予小子成王朝廟言将繼其祖考之詩訪落謀所以繼之之詩也劉氏瑾曰夫子稱武王善繼志善述事而以為踐其位行其禮奏其樂固可以見武王之逹孝矣即前篇所謂永世克孝者也成王之繼武王而曰繼序思不忘曰繼猶判渙曰紹庭上下無非繼述之心其孝可謂不匱矣姚氏舜牧曰文王陟降在帝左右此文之所以為文念兹皇祖陟降庭止此武之所以為武紹庭上下陟降厥家此成王之所以為成王敬之敬之天維顯思叶新夷反命不易以豉反哉叶奨黎反無曰高高在上陟降厥士日監在兹叶津之反集傳賦也顯明也何氏楷曰顔師古云言天甚明察也案大雅曰皇矣上帝臨下有赫維顯之謂也思語辭也士事也何氏楷曰案説文事乃士之本訓其以士為人品之稱者則謂其人足任事故亦以士名之成王受羣臣之戒而述其言曰敬之哉敬之哉天道甚明其命不易保也杜氏預曰言有國宜敬戒天明臨下奉承其命甚難孔氏穎逹曰言天之臨下善惡必察承天命甚為難無謂其高而不吾察當知其聰明明畏常若陟降於吾之所為鄧氏元錫曰陟降厥士無大小衆寡無精粗不體也而無日不臨監於此者匡氏衡曰言天之日監王者之處也不可以不敬也集説李氏樗曰天之道甚顯善則福之淫則禍之栽者培之傾者覆之惟天有顯道故其命靡常此命所以為不易也夫天命難諶如此為人君者無以天之髙髙在上去人甚逺而不知敬也俯仰之間所為之事天皆日監而見之天之去人甚逺而其監人則不逺也昊天曰明及爾出王昊天曰旦及爾游衍則是天命常在日前也苟知日監在兹之説則敬之之道豈可須臾離哉許氏謙曰陟降厥士天無事而不在也日監在兹天無時而不在也君子所以無不敬也徐氏鳯彩曰惟天於敬肆甚明故命之予奪難定無一事而天之陟降不及焉即是日監也維予小子叶奨里反不聰敬止日就月將學有緝熈于光明叶謨郎反佛符弗反又音弼時仔音兹肩示我顯德行下孟反叶户郎反集傳將進也佛弼通鄭氏康成曰輔也嚴氏粲曰輔謂之佛者言正救其失不專順從之也學記云其求之也佛佛不順也猶孟子所謂法家拂士也仔肩任也嚴氏粲曰仔肩為負荷之意故為任此乃自為荅之之言鄭氏康成曰羣臣戒王以敬之敬之故承之以謙云曰我不聰而未能敬也然願學焉庶幾日有所就月有所進朱子曰日就月将是日成月長就成也将大也續而明之以至于光明又賴羣臣輔助我所負荷之任而示我以顯明之德行何氏楷曰徳行謂徳見於行者先王已然之成跡皆明徳所流露故曰徳行也則庶乎其可及爾集説輔氏廣曰不聰知有所不及之事不敬行有所未至之事成王自知其知與行皆有所未至故日就月将學有緝熈于光明所以自責於已佛時仔肩示我顯徳行所以外資於人責於己者盡資於人者廣則大學明明徳以至於平天下之事庶乎其可及矣故先生嘗語學者曰詩中説得學有緝熈于光明此句最好盖心地本自光明只被利欲昏了今所以為學者要令其光明處轉光明所以下緝熈緝如緝麻之緝連緝不已之意熈則訓明字心地光明則此事有此理此物有此理自然見得且如人心何嘗不光明只是才明便昏了朱氏公遷曰聰與不聰係於學不聰則窒於物而不能敬必日新又新緝熈不已然後可以漸去其窒而馴至於光明光明即是聰而聰則無不敬也但工夫至此最為難明非羣臣輔助而示以顯徳行則光明不可至盖以爾昭昭使我昭昭乃可期於有成也唐氏汝諤曰何確齋曰示我顯徳行猶云開陳善道凡日用間何者為天理而為我所當用力者皆明白示我以為進修之助也總論朱氏善曰敬者戒懼愼獨之事所以誠身也明者學問講習之事所以明善也羣臣以敬而進戒欲成王之誠之也成王以明而自勉謂必先有以明之而後可以誠之也既有以致其明之之功復有以致其誠之之力則聖賢之事業可以訓致矣敬之一章十二句集説陳氏櫟曰戒王以天之當敬者臣之忠也荅羣臣以未能敬者君之謙也憂其未能敬而内為學於己外求助於臣是即求所以盡此敬也學求造於光明而臣復示我以徳之顯明則天不在高高在上之天而在吾心之天矣其為敬天孰大於是唐氏汝諤曰成王作事歩歩確實上章之率昭考則欲求之家庭此章之敬天命則欲求之顯徳行誠意懇惻不為空言如此予其懲直升反而毖後患莫予荓普經反蜂自求辛螫施隻反肇允彼桃蟲拚芳煩反飛維鳥未堪家多難乃旦反予又集于蓼音集傳賦也懲有所傷而知戒也毖愼荓使也蜂小物而有毒許氏愼曰飛蟲螫人者陸氏佃曰其毒在尾垂穎如鋒故謂之蜂肇始允信也桃蟲鷦鷯小鳥也郭氏璞曰桃雀也俗呼為巧婦陸氏佃曰説苑曰鷦鷯巢於葦苕繫之以髮性巧故俗呼巧婦其喙尖利如錐取茅秀為巢巢至精宻以麻紩之如刺韈然故又一名韈雀拚飛貌鳥大鳥也鷦鷯之雛化而為鵰故古語曰鷦鷯生鵰言始小而終大也王氏安石曰成王於是始信小物之能成大不敢不毖也蓼辛苦之物也陸氏佃曰莖赤味辛一名薔此亦訪落之意范氏處義曰毖之於小猶謀之於始也成王自言予何所懲而謹後患乎荓蜂而得辛螫吕氏祖謙曰莫予荓蜂言莫如予前之使蜂信桃蟲而不知其能為大鳥此其所當懲者蓋指管蔡之事也然我方幼沖未堪多難而又集於辛苦之地徐氏鳯彩曰盖管蔡蠢動之後事變方殷羣臣奈何捨我而弗助哉集説蘇氏轍曰成王始信二叔而疑周公既而悟其姦故曰予其懲而謹後患也范氏處義曰懲者懲其既往毖者毖其将來成王懲始信二叔之流言而疑周公幾䘮王室故毖其後來之患雖小而不敢忽也朱子曰蜂不可使而使之則是自求辛螫矣始信其為桃蟲及其拚飛則為鳥矣以比信二叔則其禍如此也輔氏廣曰悔之極反之至憂之深慮之逺求助之意雖不言而可見矣許氏謙曰莫予荓蜂自求辛螫在我有間物得以乗之肇允桃蟲拚飛維鳥事機不謹變必至於大何氏楷曰蜂以比二叔桃蟲以比武庚總論張氏耒曰成王懲周公之事将毖後患使後之知人不復如前日之惑而首之以求助何也盖昔之不知周公之聖出於無助故也何以知其然耶夫成王在廷之臣聖莫如周公而賢莫如召公周公之為師召公固不說之矣召公且不說則在廷之臣豈復有能辨而言之者也此成王所以懲前日之事出於左右無有助之者則其懲後患而首之以求助不亦宜乎鄒氏泉曰此詩乃管蔡既誅周公已歸之後而作維鳥以上詳其當患之事以下示其求助之意荓蜂是輕任之過允桃蟲是輕信之過此詩見成王虚心求助之意至親隐諱之情小毖一章八句集傳蘇氏曰小毖者謹之於小也謹之於小則大患無由至矣集説鄭氏康成曰天下之事當愼其小小時而不愼後為禍大朱氏公遷曰閔予小子之思念文武訪落之専法武王敬之勉於學問以敬天小毖懲其往事以謹患皆有皇皇不及之意焉盖一時詩也沈氏萬鈳曰訪落謹始也所以處常小毖謹後也所以處變載芟載柞側百反叶疾各反其耕澤澤音釋叶徒洛反集傳賦也除草曰芟除木曰柞秋官柞氏掌攻草木是也孔氏穎逹曰隐六年左傳云如農夫之務去草焉芟夷藴崇之是除草曰芟也秋官柞氏掌攻草木及林麓是除木曰柞曹氏粹中曰除草木是初墾闢而為田者也澤澤解散也郭氏璞曰言土解也李氏樗曰唯其除草木然後土氣解散集説鄭氏康成曰萬民樂治田業将耕先始芟柞其草木土氣蒸達而和耕之則澤澤然解散嚴氏粲曰専言新墾之田其用力尤難故也劉氏瑾曰第一節言墾土也千耦其耘徂隰徂畛音眞集傳耘去苗間草也劉氏瑾曰朱子初解嘗從鄭箋以耘為除根株盖除草木之根株也今此傳改為去苗間草然以下文之次序觀之恐此句未遽説耘苗也故曹氏以為反土之後草木根株有芟柞不盡者則復耘之也隰為田之處也嚴氏粲曰下溼曰隰畛田畔也孔氏穎逹曰地官遂人云十夫有溝溝上有畛則畛謂地畔之徑路也集説鄭氏康成曰輩作者千耦言趨時也孔氏穎達曰千耦謂為耦者千是二千人為千耦與十千維耦異也或往之隰或往之畛言其所往皆徧也王氏安石曰千言其多也耦言竝耕也或徂隰或徂畛無曠土也劉氏瑾曰第二節言治田也侯主侯伯侯亞侯旅侯彊侯以有嗿他感反其饁于輙反思媚其婦有依其士與以叶有略其耜叶養里反俶載南畝叶滿委反集傳主家長也孔氏穎逹曰坊記云家無二主主是一家之尊故知主家長也伯長子也班氏固曰子最長迫近父也亞仲叔也孔氏穎逹曰亞訓次也次於伯故知仲叔也旅衆子弟也孔氏穎逹曰旅訓衆幼者之衆即季弟及伯仲叔之諸子也彊民之有餘力而來助者孔氏穎逹曰彊有餘力謂其人彊壮治一夫之田仍有餘力能佐助他事者也遂人所謂以彊予音與任甿與氓同者也孔氏穎逹曰遂人注云彊予謂民有餘力復予之田引之以證彊有餘力能左右之曰以朱氏公遷曰使之左則左使之右則右太宰所謂閒音閑民轉移執事者鄭氏衆曰閒民謂無事業者若今時傭力之人隨主人所左右者也嚴氏粲曰言衆力競勸無游民也嗿衆飲食聲也何氏楷曰說文云聲也毛傳云衆貌盖衆多之聲也媚順許氏愼曰悦也依愛何氏楷曰依說文云倚也親近之意故云依愛也士夫也何氏楷曰士者男子之稱婦人亦稱夫為士易老婦得其士夫是也言餉婦與耕夫相慰勞也曹氏粹中曰士不辭耕稼之勞而知愛其婦婦不惮饁餉之煩而知依其夫有和樂之風焉嚴氏粲曰夫耕婦饁驩然相愛見治世之氣象焉略利曹氏粹中曰利則入土也深何氏楷曰略當依字書通作㗉說文云刀劔刃也言有鋒利如刀劔刃之耜也俶始載事也曹氏粹中曰前曰其耕澤澤初反土也今曰俶載南畝則将種矣集説劉氏瑾曰第三節言男女長幼齊力於始耕也季氏本曰言主伯亞旅彊以皆出而治田而婦則饋餉男則共食夫婦相親同勤農事皆利其耜而有事於南畝也播厥百榖實函斯活叶呼酷反集傳函含孔氏穎逹曰函者容藏之義故轉為含猶人口含之也活生也孔氏穎逹曰活者生活故為生既播之其實含氣而生也鄭氏康成曰實種子也其種皆成好含生氣集説曹氏粹中曰百榖之性各有所宜而水旱豐凶不可預料故悉種之所以為備也劉氏瑾曰第四節言苗生也朱氏公遷曰此播種以至萌芽之時驛驛其達叶佗悦反有厭其傑集傳驛驛苗生貌輔氏廣曰驛驛接續貌言其苗之生意接續達出土也毛氏萇曰達射也孔氏穎逹曰苗生逹則射而出厭受氣足也范氏處義曰厭以饜足為義傑先長者也何氏楷曰才過人者謂之傑故以苗先長者為傑言其異於衆苗也集説劉氏瑾曰第五節言苗生之盛也厭厭其苗緜緜其麃表驕反集傳緜緜詳宻也王氏肅曰芸者其衆緜緜然不絶也郭氏璞曰芸不息也徐氏光啟曰荘子滅裂而耘之則亦滅裂而報余詳宻正與滅裂相反麃耘也孔氏穎達曰麃是耘之别名徐氏鍇曰禾已長大復鉏其閒草也邢氏昺曰説文云穮耨鉏田也字林曰穮耕禾間也是言芸耨精也穮麃音義同集説王氏安石曰前曰千耦其耘則既耕而耘今曰緜緜其麃則既苗而耘既苗而耘則以緜緜為善恐傷苗也嚴氏粲曰芟耘麃皆除草也芟與柞竝言是新闢為田先除其土上之草木也既耕而言耘是反土之後除其土中之草木根株也既苗而言麃是除苗間之草也劉氏瑾曰第六節言耘苗也載穫濟濟子禮反有實其積子賜反叶上聲萬億及秭為酒為醴烝畀祖妣以洽百禮集傳濟濟人衆貌何氏楷曰濟之為言齊也盖謂人衆而齊力也實積之實也積露積也何氏楷曰積説文云聚也據公劉篇以積與倉對言朱子以為露積是也穫言在野積言在場萬億及秭言在廩自有次第集説胡氏一桂曰酒三酒醴五齊祭祀則酒正供之祭有十倫其禮實繁而皆以酒行之故祭可以洽百禮劉氏瑾曰第七節言收入之多以供祭祀也有飶蒲即反其香邦家之光有椒其馨胡考之寧集傳飶芬香也未詳何物胡壽也孔氏穎達曰左傳曰雖及胡耉周書諡法保民耆艾曰胡胡為壽也李氏樗曰士冠禮祝辭曰眉壽萬年永享胡福注云胡遐也逺也杜元凱曰胡耇元老之稱則知胡耇乃老人也以燕享賓客則邦家之所以光也以共養耆老則胡考之所以安也集説范氏處義曰說文云飶食之香有飶言其饌也楚辭曰奠桂酒兮椒漿有椒言其酒也大亨以飬聖賢故為邦家之光酌大斗以祈黄耇故致胡考之寜劉氏瑾曰第八節又言可以待賓飬老也季氏本曰此與上節言以酒醴供祭祀燕飲皆賴農夫所穫之多也匪且有且匪今斯今叶音經振古如兹無韻未詳集傳且此振極也言非獨此處有此稼穯之事非獨今時有今豐年之慶蓋自極古以來已如此矣猶言自古有年也集説陳氏鵬飛曰振古以來皆如上文之所謂也劉氏瑾曰第九節則追言田事之所由來者逺矣徐氏常吉曰匪且以地言匪今以時言振古兼地與時言總論蒋氏悌生曰此詩鋪叙農事極有次序載芟載柞至徂隰徂畛言其初至田畔除去草木侯主侯伯至俶載南畝言其人心齊器用利故田畝墾治播厥百榖至萬億及秭言耕耘及時得所是以有收成之利為酒為醴至胡考之寧言惟其收成之多是以祭祀燕饗之禮無不足末三句又總言稼穡豐穣古今内外如一而無間也自始至終其序有條而不紊載芟一章三十一句集傳此詩未詳所用然辭意與豐年相似其用應亦不殊集説沈氏守正曰小序曰載芟春藉田而祈社稷也良耜秋報社稷也朱子俱以為報詩亦不相逺但言祈則章中耕耘收穫祭祀尊賢飬老諸事皆預言之冀望之言報則直述其已然以昭神貺耳附錄序載芟春藉田而祈社稷也鄭氏康成曰藉田甸師氏所掌王載耒耜所耕之田天子千畝諸侯百畝藉之言借也借民力治之故謂之藉田孔氏穎達曰王者於春時親耕藉田以勸農業又祈社稷使獲年豐詩人述其豐熟之事而為此歌經陳下民樂治田業收穫𢎞多釀為酒醴用以祭祀是由王者耕藉田祈社稷勸之使然故序本其多穫所由言其作頌之意經則主説年豐故其言不及藉社也月令孟春天子躬耕帝藉仲春擇元日命民社與耕藉異月俱在春時故以春總之祭法云王為羣姓立社曰㤗社王自為立社曰王社此為百姓祈祭當主於㤗社其稷與社共祭亦當為㤗社社稷蘇氏轍曰王社在藉田中藉田所祈也案此詩序以為因藉田而祈社稷孔穎達解之曰王者藉田以勸農又祈社稷序本其所由以言其作頌之意經則主説年豐故其言不及藉社似已朱子疑詩無祈田之意故云未詳所用然猶謂辭意與豐年相似其用應亦不殊是以為報而非祈也案豐年之詩曰降福孔皆故序主秋冬報而朱子亦主於報其意相符矣然豐年詩言報祀而神降福而此詩無其文則似不可言報况噫嘻詩序以為祈榖只言農夫盡力於耕而不言福此詩但言農事之勤所穫之多可備百禮之用未嘗言祭報而獲福也則非報之樂章明矣若以類諸豳之七月雅之大田則當次於風雅今次於頌則為王者之樂章明矣况集傳原無定指而序在毛萇以前與詩竝出於漢則且從古説為是畟畟楚側反良耜叶飬里反俶尺叔反載南畝叶滿委反集傳賦也畟畟嚴利也孔氏穎達曰畟畟是刃利之状故以為利之意舍人曰耜入地之貌集説劉氏瑾曰第一節言始耕也播厥百榖實函斯活叶呼酷反集傳說見前篇集説鄭氏康成曰種此百榖其種皆成好含生氣言得其時劉氏瑾曰第二節言苗生也朱氏公遷曰此播種之事或來瞻女音汝載筐及筥其饟式亮反伊黍集傳或來瞻女婦子之來饁者也錢氏文子曰瞻猶省也筐筥饟具也許氏愼曰周人謂餉曰饟顧氏夢麟曰前篇餉耕在播種之前此餉耘在播種之後何氏楷曰或載筐或載筥見耕者之多故饁者衆也集説李氏樗曰此言婦子行饁之器與所盛之物也彭氏執中曰其饟伊黍無珍味也劉氏瑾曰第三節言餉田也其笠伊糾叶其了反其鎛音博斯趙直了反以薅呼毛反荼蓼集傳糾然笠之輕舉也毛氏萇曰笠所以禦暑雨也趙刺孔氏穎逹曰趙是用鎛之事鎛是鋤類故趙為刺地也薅去也許氏愼曰㧞田草也荼陸草孔氏穎達曰荼穢草非苦菜也釋草云荼委葉舍人曰荼一名委葉蓼水草孫氏炎曰虞蓼澤之所生故為水草一物而有水陸之異也孔氏穎達曰由田有原有隰故竝舉水陸穢草今南方人猶謂蓼為辣荼或用以毒溪取魚即所謂荼毒也集説彭氏執中曰此見其無華飾無怠力所以記耕民之状也劉氏瑾曰第四節言耘苗也荼蓼朽止黍稷茂叶莫口反止集傳毒草朽則土熱而苗盛陸氏徳明曰朽爛也集説陸氏佃曰因暑雨化之則草不復生而地美盖非特去草之害亦以醲其田疇故荼蓼朽於是黍稷茂月令季夏燒薙行水利以殺草如以熱湯可以糞田疇可以美土疆此之謂也劉氏瑾曰第五節言苗盛也穫之挃挃珍栗反積之栗栗其崇如墉其比毗志反如櫛側瑟反以開百室集傳挃挃穫聲也栗栗積之密也嚴氏粲曰堅實也櫛理髮器言密也百室一族之人也朱氏謀㙔曰百室百夫之室十夫有溝百夫有洫此稱百室舉一洫之田而言也五家為比五比為閭四閭為族孔氏穎達曰於六鄉則一族於六遂則一鄼以鄉尊於遂故舉鄉言耳族人輩作相助朱氏公遷曰輩作者同輩共作也故同時入榖也曹氏粹中曰使之同時納榖所以示親睦均有無也集説鄭氏康成曰如墉如櫛言積之髙大且相比迫也一族同時納榖親親也百室者出必共洫閒而耕入必共族中而居劉氏瑾曰第六節言收穫之多而齊也百室盈止婦子寧止集傳盈滿寧安也何氏楷曰七月之詩曰嗟我婦子曰為改歲入此室處正此詩所謂寧止者集説李氏樗曰百室既盈婦子於是安寧盖終歳勤動不得安寧今農事已畢故各享其樂也劉氏瑾曰第七節言其樂豐稔也殺時犉如純反牡有捄音求其角叶盧谷反以似以續續古之人無韻未詳集傳黄牛黑脣曰犉孔氏穎達曰地官牧人云凡隂祀用黝牲毛之注云隂祀祭地北郊及社稷也然則社稷用黝牛角以黒而用黄者盖正禮用黝至於報功社是土神故用黄色仍用黒脣也社稷太牢獨云牛者牛三牲為大故特言之捄曲貌毛氏萇曰社稷之牛角尺何氏楷曰捄通作觩本作觓續謂續先祖以奉祭祀蘇氏轍曰以似以續興來歲繼往歲也續古之人庶幾不替其先也集説劉氏瑾曰篇末言田事畢而以祭祀也其曰續古之人亦上篇振古如兹之意鄒氏泉曰此節總上七節意正舉報賽之典以荅神之休也祭祀祭田祖方社之屬盖社牲從其方色此用黄牛黒脣之犉舉一以例其餘也以似二句言先祖於農事之成常行報賽之典故我今日之舉亦以似續古之人而修常典於不墜庶其荅神之貺而永賴神之休耳總論李氏樗曰蘇氏曰聖人之為詩道其耕耨播種之勤而述其歲終倉廩豐實婦人喜樂之際以感動其意夫詩之可以興者所以感發人之善志故也先言勤勞後言逸樂使夫勤者有以自忘其勤勞怠者亦知以自奮則天下之人趨事赴功而其心未嘗惰於三農之務也附錄孔氏穎達曰良耜詩者秋報社稷之樂歌也謂周公成王太平之時年榖豐稔以為由社稷之所祐故於秋物既成王者乃祭社稷之神以報生長之功詩人述其事而作此歌焉嚴氏粲曰此詩為報社稷必陳農功之本末故當秋時而追述春耕預言冬穫也案詩曰殺時犉牡則天子用太牢之禮也其為報社稷可無疑矣曰續古之人則亦非宗廟之祭可知此詩與載芟相連則一報一祈理亦當然也良耜一章二十三句集傳或疑思文臣工噫嘻豐年載芟良耜等篇即所謂豳頌者其詳見於豳風及大田篇之末亦未知其是否也絲衣其紑孚浮反載弁俅俅音求自堂徂基自羊徂牛鼐乃代反鼎及鼒叶津之反兕觥其觩音求㫖酒思柔不呉音詁不敖音傲胡考之休集傳賦也絲衣祭服也紑潔貌載戴也弁爵弁也吕氏祖謙曰士冠禮注云爵弁其色赤而微黒如爵頭然士祭於王之服孔氏穎達曰爵弁之服𤣥衣纁裳皆以絲為之故云絲衣也禮有冠弁韋弁皮弁皆不以絲為衣且非祭祀之服雜記云士弁而祭於公冠而祭於已士冠禮有爵弁服絿衣與此絲衣相當故知此弁是爵弁士服之以助君祭也曹氏粹中曰大夫以上祭服謂之冕士祭服謂之弁其首服弁則衣用絲也俅俅恭順貌基門塾之基孔氏穎達曰釋宮云門側之堂謂之塾孫炎曰夾門堂也冬官匠人云門堂三之二注云以為塾也劉氏瑾曰門之内外夾其東西皆有塾一門凡四塾外两塾南向内两塾北向謂之堂則宜有基矣詩所指則内塾之基矣鼐大鼎鼒音兹小鼎也爾雅釋器鼎圜弇上謂之鼒孫氏炎曰鼎斂上而小口者思語辭柔和也呉譁也許氏愼曰大言也此亦祭而飲酒之詩言此服絲衣爵弁之人升門堂視壺濯籩豆之屬降往於基告濯具又視牲從羊至牛反告充已乃舉鼎冪音覔告潔禮之次也孔氏穎達曰特牲先夕陳事主人即位於堂下宗人升自西階視壺濯及籩豆反降東北面告濯具主人出復外位宗人視牲告充宗人舉鼎冪告絜彼先視濯籩豆次視牲次舉鼎先後與此次第正同禮之次者謂特牲之禮為此次故凖之以說天子之禮也黄氏佐曰告皆告於主人主人就王者言馮氏復京曰案特牲是正祭主人先即位於堂下所謂堂者乃廟堂非門外西夾之堂也此所謂堂乃在廟門外之旁與正祭異又能謹其威儀不諠譁不怠傲故能得壽考之福鄒氏泉曰不呉是言之謹猶笑語卒獲也不敖是儀之謹猶禮儀卒度也集説孔氏穎達曰上五句言祭之初下四句言祭之末初言卑者恭順則當祭尊者可知祭未舉其不慢則當祭敬明矣是舉終始以見中舉輕以明重自羊徂牛是從此往彼為先後之次詩意言先小後大為行事之漸也自堂徂基但言所往之處不言所為之事牛羊但言所視之物不言所往之處互相足也鼎則先大後小與牛羊異者取鼒為韻故變其文也祭初行禮唯謂士耳言飲則是諸助祭者非獨士也以祭末能不讙譁不傲慢則於祭前齊敬明矣恭敬明神必将獲福故以此得夀考之休徴夀考未然之事故言徴也賈氏公彦曰兕觥其觩祭末飲酒恐有過失故設罰爵其時無犯非禮用爵觩然陳設而已附錄序絲衣繹賓尸也鄭氏康成曰繹又祭也天子諸侯曰繹以祭之明日卿大夫曰賓尸與祭同日周曰繹商謂之肜爵弁而祭於王士服也繹禮輕使士孔氏穎達曰絲衣詩者繹賓尸之樂歌也謂周公成王太平之時祭宗廟之明日又設祭事以尋繹昨日之祭謂之為繹以賓事所祭之尸行之得禮詩人述其事而為此歌焉經之所陳皆繹祭始末之事也天子諸侯禮大異日為之别為立名謂之為繹卿大夫禮小同日為之不别立名直指其事謂之賓尸耳此序言繹者是此祭之名賓尸是此祭之事故特詳其文也正祭則小宗伯云視滌濯祭之日逆齊省鑊告時於王告備於王彼正祭重使小宗伯此繹祭輕故使士盖亦宗伯之屬士也朱子語類繹祭之明日也賓尸以賓客之禮燕為尸者案宗廟正祭之明日又祭曰繹繹禮在廟門而廟門側之堂謂之塾今詩云自堂徂基則基是門塾之基盖謂廟門外西夾室之堂基也其為繹祭明矣天子宗廟正祭小宗伯視滌濯祭之日逆齊省鑊告時告備於王今詩言絲衣爵弁之士告濯具告充告潔則非正祭而為繹祭又明矣禮記為祊乎外注祊祭明日之繹祭也謂之祊者於廟門之外因名焉其祭之禮既設祭於室而事尸於堂是祊之與繹一時之事祊於廟門外之西室繹又於其堂而統名曰繹疏引頌絲衣篇證繹祭在堂事尸士之省視從堂上往於堂下之基故云自堂徂基此又繹祭之明證矣朱子辨序說以為誤而以為亦祭而飲酒之詩然未嘗指其為何祭但士而祭祭而飲酒何與於天子而列之於頌耶盖詩意以闗宗廟也且集傳仍用鄭箋語類中亦有解繹與賓尸一條則序說宜竝存絲衣一章九句集傳此詩或紑俅牛觩柔休竝叶基韻或基鼒竝叶紑韻集説蘇氏轍曰絲衣本宗廟之詩於音烏鑠式灼反王師遵養時晦時純熙矣是用大介我龍受之蹻蹻居表反王之造叶徂候反載用有嗣叶音祠實維爾公允師集傳賦也於歎辭鑠盛遵循熈光介甲也所謂一戎衣也龍寵也蹻蹻武貌造為載則公事允信也此亦頌武王之詩言其初有於鑠之師而不用退自循養與時皆晦孔氏穎達曰上天誅紂之期未至武王靖以待之是其遵天之道也歐陽氏修曰遵飬時晦者循飬以自晦之道謂有師而不耀其威武飬之以晦也既純光矣然後一戎衣而天下大定錢氏天錫曰天運無久晦而不明之理王者無坐視塗炭之心王業昌明闗於戎衣一著此之謂主張造化也後人於是寵而受此蹻蹻然王者之功其所以嗣之者亦惟武王之事是師爾集説朱氏公遷曰武王之師盛矣然時止則止時行則行動静不失其時是以武功之成如此我既受此武功矣一有用武而繼其事則将如之何哉亦曰必以其時如武王耳朱氏善曰方其遵飬時晦聖人非忘天下也及其是用大介聖人非利天下也聖人無忘天下之心亦無利天下之心此所以為聖人之武也季氏本曰遵飬時晦時當晦而遵飬之非有心於得天下也鄒氏泉曰時晦之時天命人心未始不歸周特紂惡未稔耳此非有意於蓄鋭盖待紂悔悟之意先儒云武王十三年以前無非事商之心是也總論朱氏公遷曰此篇重在時字武頌止殺酌頌適時盖窮兵黷武不足以為武違天悖時不足以成功可謂頌所當頌矣酌一章八句集傳酌即勺也儀禮燕禮若舞則勺鄭氏康成曰既合鄉樂萬舞而奏之所以美王侯勸有功也賈氏公彦曰舞則勺者謂為之舞則歌勺詩以為曲嚴氏粲曰漢禮樂志言周公作勺其字皆单作勺内則十三舞勺即以此詩為節而舞也孔氏穎達曰熊氏云勺籥也言十三之時學此舞籥之文舞也然此詩與賚般皆不用詩中字名篇疑取樂節之名如曰武宿夜云爾梁氏盖曰禮記祭統舞莫重於武宿夜疏曰武王至商郊停止宿士卒皆歡樂歌舞以待旦故名焉集説嚴氏粲曰此酌頌言武王初則遵飬繼則蹻蹻酌其時措之宜也左氏傳以武為武之卒章以賚為武之三以桓為武之六朱氏謂桓賚二篇皆大武篇中之一章然則酌與賚般一體亦大武篇中之一章明矣綏萬邦屢力注反豐年天命匪解佳賣反桓桓武王保有厥士于以四方克定厥家於音烏昭于天皇以閒之集傳賦也綏安也桓桓武貌大軍之後必有凶年梁氏益曰老子道徳經儉武篇而武王克商則除害以安天下故屢獲豐年之祥傳所謂周饑克殷而年豐是也鄭氏康成曰誅無道安天下則亟有豐熟之年隂陽和也孔氏穎達曰僖十九年左傳云昔周饑克殷而年豐是伐紂之後即有豐年也王氏安石曰師之所處荆棘生焉而曰屢豐年則其為武也異乎人之武矣然天命之於周久而不厭也故此桓桓之武王保有其士而用之於四方李氏樗曰保有厥士與熊羆之士虎賁之士同何氏楷曰左傳云能左右之曰以于以四方者猶言使之宰制運量乎四方也以定其家孔氏穎達曰能安定其家謂成就先王之業遂為天下之主其德上昭于天也張氏所望曰於眧于天如至治馨香感於神明意閒字之義未詳傳曰閒代也言君天下以代商也孔氏穎達曰閒代釋詁文范氏處義曰毛氏訓閒為代盖本之書多方曰有邦閒之說者謂使有國聖人代之也此亦頌武王之功集説范氏處義曰成王謂我今日所以能撫綏萬邦屢獲豐年足以見上天之命我有周可謂匪懈矣何以得此哉盖由桓桓然有威武之武王保有熊羆虎賁之士使三千人惟一心故能用四方諸侯之力以定我周家之王業也於是遂歎美武王既有以昭格于天可謂能盡皇王之道代商而有天下也輔氏廣曰綏萬邦者武王之本志也屢豐年者上天之嘉應也有是志則有是應先天而天弗違也天命匪解者天命之無厭也桓桓武王者武王之無怠也天命之無厭乃武王之無怠也後天而奉天時也天命武王不閒毫髮保有厥士于以四方克定厥家此武王之武所成就也是以其徳上昭於天而君天下以代乎商也桓一章九句集傳春秋傳以此為大武之六章則今之篇次盖已失其舊矣又篇内已有武王之諡則其謂武王時作者亦誤矣序以為講武類禡之詩豈後世取其義而用之於其事也歟集説孔氏穎達曰桓詩者講武類禡之樂歌也武王伐紂之後民安年豐克定王業代殷為王由講武類禡得使之然故序達其意言其作之所由講武是軍衆初出在國治民也類則於内祭天禡則在於所征之地自内而出為事之次也李氏樗曰此詩言講武類禡也而詩言武王用師未嘗有講武之意盖不妄用武則足以講武觀詩者又以意通之也范氏處義曰武王有其事而無其詩以頌聲未作故也至成王制禮作樂於是作此詩以歌其事亦以告於武王序詩者謂之武志盖發明武王講武類禡之時其志已欲保厥士而用四方定厥家而昭于天後果如其志可謂善得詩人之㫖也文王既勤止我應受之敷時繹思我徂維求定時周之命於音烏繹思集傳賦也應當也敷布時是也繹尋繹也於歎辭繹思尋繹而思念也此頌文王之功朱氏公遷曰諸本王字作武字誤盖首句是頌文王之功其下五句則言今日大封功臣之意而言其大封功臣之意也孔氏穎達曰以言大封則所封者廣惟初定天下可有此事守文之世不應得然昭二十八年左傳曰武王克商光有天下其兄弟之國者十有五人姬姓之國者四十人尚書武成篇說列爵惟五分土惟三皆是武王大封之事言文王之勤勞天下至矣孔氏穎達曰文王既勞心於政事者尚書所謂日昃不遑暇食是也其子孫受而有之孔氏穎達曰謂受其位為天子也然而不敢專也布此文王功徳之在人而可繹思者以賚有功而往求天下之安定孔氏穎達曰行之於天下以求安定天下也又以為凡此皆周之命而非復商之舊矣遂歎美之而欲諸臣受封賞者繹思文王之徳而不忘也季氏本曰時周之命如此則武王本非以力争天下而欲後人求之於文王之徳也故再言於繹思以歎美之集説鄭氏康成曰文王之勞心是周之所以受天命而王之所由也於汝諸臣受封者陳繹而思行之以文王之功業敕勸之王氏安石曰大賚善人封建以為諸侯與共天下則所以求天下之定也李氏樗曰武王克商大封有功之臣於廟盖歸功於祖宗不敢專也盖由吾之所以封功臣者非吾之私意乃文王之意也輔氏廣曰武王之封賞功臣人見其為武王之恩也自武王之心言之乃是文王功徳之在人心而可思繹者耳非己之恩也以是而往求天下之安定則庶乎其可矣然則受其封賞者又可以不思繹文王之徳哉時周之命此又提起來說以興起人心也何氏楷曰命即上文敷繹求定之命曰時周之命者言是我周新命非殷之舊政爾諸侯當時時以此命自為提撕不可忘也既又歎而敕之仍於時繹惓惓焉武王安民之心與文王之既勤後先同揆矣賚一章六句集傳春秋傳以此為大武之三章而序以為大封於廟之詩說同上篇劉氏瑾曰此頌為武樂第三章故詩中皆述武王封賞之意而推本文王之徳集説孔氏穎達曰賚詩者大封於廟之樂歌也謂武王伐紂於廟中大封有功之臣以為諸侯周公成王太平之時詩人追述其事而為此歌焉經之所陳皆是武王陳文王之徳以戒敕受封之也大封於廟謂文王廟也樂記說武王克殷之事云将帥之士使為諸侯下文則云虎賁之士脱劒祀於明堂注云文王之廟為明堂則是大封諸侯在文王之廟也於音烏皇時周陟其髙山嶞吐果反山喬嶽允猶翕許及反河敷天之下裒蒲侯反時之對時周之命集傳賦也高山泛言山耳毛氏萇曰髙山四嶽也何氏楷曰此髙山即下文所云喬嶽嶞則其狹而長者何氏楷曰爾雅云巒山曰嶞說文云山之嶞嶞者案公羊傳謂山川有能潤於百里者天子秩而祭之此望祀之所以及於嶞山也喬髙也嶽則其髙而大者允猶未詳或曰允信也猶與由同翕河河善泛溢今得其性故翕而不為㬥也戴氏溪曰祭先河而後海故以河為主吕氏柟曰言允則疆土皆周有也言翕則天地亦可知其位矣裒聚也對荅也言美哉此周也其巡守而登此山以柴望又道於河以周四嶽何氏楷曰陟其髙山燔柴以祭天也郊特牲云天子適四方先柴禮器云因名山升中於天嶞山二句望秩以祀山川也凡以敷天之下莫不有望於我故聚而朝之方嶽之下以荅其意耳錢氏天錫曰裒時之對若虞典所謂修五禮輯五瑞恊時月正日同律度量衡是也聚而朝之方嶽諸侯各朝於方嶽非盡朝於一方也集説孔氏穎達曰天子巡守所至則登其髙山而祭之謂毎至其方告祭其方之岳也堯典及王制說巡守之禮皆言望秩於山川則知嶞山喬嶽允猶翕河皆謂秩祭之事黄氏櫄曰得天下必告於名山大川禮也舜受天下於堯猶必望於山川徧於羣神受命之始不得不然也而况武王革命之主乎故此詩首末皆言是周之受命也鄒氏泉曰上三句本言祭告事然於此而祭告百神即於此而朝㑹諸侯盖不言朝㑹而朝㑹之意已在故下敷天二句遂承上而推言其朝㑹之意也般音盤一章七句集傳般義未詳鄭氏康成曰般樂也孔氏穎達曰經無般字序又說其名篇之意般樂也為天下所美樂蘇氏轍曰般遊也曹氏粹中曰說文云般旋也象舟之旋從舟從殳殳所以旋也今名篇曰般取盤旋之義巡守而徧乎四岳所謂盤旋也集説孔氏穎達曰般詩者巡守而祀四岳河海之樂歌也謂武王既定天下巡行諸侯所守之土祭祀四岳河海之神神皆享其祭祀降之福助至周公成王太平之時詩人述其事而作此歌焉范氏處義曰周頌言時周之命者再其一賚也其一般也意謂周之受命明則賴善人之助幽則賴百神之助故申言之閔予小子之什十一篇一百三十六句欽定詩經傳説彚纂卷二十
