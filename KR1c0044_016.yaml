body:
  text: 欽定四庫全書欽定詩經傳説彚纂卷十四北山之什二之六陟彼北山言采其杞偕偕士子叶奨里反朝夕從事叶上止反王事靡盬憂我父母叶滿彼反集傳賦也偕偕強壯貌士子詩人自謂也毛氏萇曰士子有王事者也大夫行役而作此詩自言陟北山而采杞以食者皆強壯之人而朝夕從事者也鄭氏康成曰言不得休止蓋以王事不可以不勤是以貽我父母之憂耳謝氏枋得曰言王事不可以不堅固也子以王事為憂父母以子之勤勞為憂集説輔氏廣曰此詩行役之大夫所作以言上之役使不均也然首章則自言其年壮力強故朝夕從事於此又言其所以如此者蓋以王事不可不勤故不免遺父母之憂耳未及乎上之不均也士子雖作詩者自言然行役者非一人蓋兼舉之矣劉氏瑾曰此章可見詩人忠孝之心也溥音普天之下叶後五反莫非王土率土之濵莫非王臣大夫不均我從事獨賢叶下珍反集傳賦也溥大率循濵涯也孔氏穎達曰詩意言民之所居民居不盡近水而以濵為言者濵是四畔近水之處言率土之濵舉其四方所至之内見其廣也言土之廣臣之衆而王不均平使我從事獨勞也毛氏萇曰賢勞也吕氏祖謙曰孔叢子曰我從事獨賢勞事獨多也不斥王而曰大夫朱氏公遷曰大夫行役而怨大夫不均蓋天子之大夫非一人也此則指夫執政者而言不言獨勞而曰獨賢詩人之忠厚如此集説孔氏穎達曰作者言其有人衆而不使即以廣大言之王不均大夫之使不過朝廷而普及天下者明其衆也以此大夫怨已勞於事故以賢為勞從事獨賢猶下云嘉我未老鮮我方將問辭也謝氏枋得曰自古君子小人立已不同其事君亦異君子常任其勞小人常處其逸君子常任其憂小人常享其樂雖曰役使不均我獨賢勞然君子本心亦不願逸樂也四牡彭彭叶鋪郎反王事傍傍布彭反叶布光反嘉我未老鮮息淺反我方將旅力方剛經營四方集傳賦也彭彭然不得息也傍傍然不得已也嘉善鮮少也以為少而難得也將壯也旅與膂同許氏慎曰膂脊骨也吕氏祖謙曰李氏曰毛氏以旅為衆案桑柔曰靡有旅力秦誓曰旅力既愆若桑柔之詩謂衆力方盛猶可也如秦誓及此詩但指作詩者及良士耳不得解為衆也言王之所以使我者善我之未老而方壯錢氏天錫曰未老方将正獨賢處也旅力可以經營四方耳謝氏枋得曰經經畫營營造如人作室曰經之營之言區畫造作四方之事也猶上章之言獨賢也集説輔氏廣曰此章又承上句獨賢之意而言王之所以使我者得無善我之未老而方壯其膂力足以經營四方乎此意尤忠厚而有盡力盡瘁之誠也或燕燕居息或盡瘁事國叶越逼反或息偃在牀或不已于行叶戸郎反集傳賦也燕燕安息貌輔氏廣曰燕安也重言之見安之甚也瘁病嚴氏粲曰盡瘁見四月事國從事於國也已止也言役使之不均也下章放此劉氏瑾曰以下三章凡十二句為偶皆以他人之逸樂對已之憂勞所以形容不均之意集説劉氏彛曰以彼為賢耶則國事待我而集以我為賢耶則厚禄居彼為多輔氏廣曰此章而下則方言其不均之實然亦不過以其勞逸者對言之使上之人自察耳伹言之重辭之複則其望於上者亦切矣詩可以怨謂此類也或不知叫號戸刀反或慘慘七感反劬勞或栖音西遲偃仰或王事鞅於兩反掌集傳賦也不知叫號深居安逸不聞人聲也鞅掌失容也孔氏穎達曰傳以鞅掌為煩勞之状故云失容今俗語以職煩為鞅掌其言出於此言事煩勞不暇為儀容也集説李氏公凱曰大夫或有深居於内而不知外之叫號者或有慘慘然憂戚而憚其劬勞難堪者或有安息無事而偃仰自得者或有勞於王事而鞅掌失容者其役使不均如此或湛都南反樂飲酒或慘慘畏咎巨九反或出入風音諷議叶魚羈反或靡事不為集傳賦也咎猶罪過也出入風議孔氏穎達曰謂閒暇無事出入放恣議量時政者嚴氏粲曰曹氏曰風議則任口舌而已言親信而從容也集説姚氏舜牧曰湛樂飲酒何等逸豫慘慘畏咎猶恐其或及之出入風議何等從容靡事不為維日其猶不給所謂不均也總論李氏樗曰孔子曰公則説人主苟有均平之心則雖征役之重不以為怨若有不均之心則雖征役未甚勞苦而人亦将怨矣觀大東之詩有粲粲衣服者有葛屨履霜者北山之詩有偃息在牀者有不已于行者則無一得其平矣天下安得而説服哉朱氏善曰臣之於君不擇事而安之所以為忠也而不免於怨何也蓋怨生於彼此之相形者也均之為臣子也彼以其逸我以其勞彼若是其相親我若是其相逺果能自已於言邪然則臣子之事君雖不可不竭其力而君之使臣要必有道矣為人上者其亦均平其心而無使其彼此之相形乎北山六章三章章六句三章章四句集説鄧氏元錫曰北山刺不均也秉均者不均膴仕者衆而賢者獨勞瘁畏讒譏焉蓋四牡皇華之意索其盡矣故雅之盛也上平其政載恤其私故士盡瘁而忘其勞雅之變也上不平其政不恤其私故士盡瘁而哀其病也無將大車祇音支自塵兮無思百憂祇自疧劉氏曰當作與痻同眉貧反兮集傳興也將扶進也孔氏穎達曰言将猶扶進者以大車須人傍而将之是為扶車而進導也大車平地任載之車駕牛者也祇適疧病也此亦行役勞苦而憂思者之作言將大車則塵汚之思百憂則病及之矣朱氏公遷曰此皆事之可戒者故因行役所見而用語相呼為興集説輔氏廣曰夫行役者進而有王事之期程惟恐其有不及之悔退而有家事之多端惟恐其有意外之虞所可憂者固不一而足也故曰百憂戒之以無思者言姑置之勿以為念可也不然適所以自病而已矣黄氏一正曰大車必駕牛而後可行若徒自将之則祇取塵汚而已何得於道哉百憂必得遂而後可止若徒自思之則祇致身病而已何益於事哉無將大車維塵冥冥叶莫迥反無思百憂不出于熲古迥反集傳興也冥冥昏晦也鄭氏康成曰冥冥者蔽人目明令無所見也熲與耿同小明也在憂中耿耿然不能出也輔氏廣曰人心憂則拘而定故在憂中耿耿然不能逸而出也集説嚴氏粲曰塵冥冥則為塵所昏可憂多端不必更思之終不能自明矣徐氏光啓曰言百憂不可思正其憂之深也熲訓小明凡人有一事關心則此心全向此一處芥蒂只見有此事也無將大車維塵雝於勇於容二反兮無思百憂祇自重直勇直龍二反兮集傳興也雝猶蔽也重猶累也集説王氏安石曰凡物之行不為物所累則輕而速為物所累則重而遲鄒氏泉曰自重者自累其心鬱鬱然而不得伸舒也總論姚氏舜牧曰将大車者有任重意凡人一身百責萃焉百憂聚焉行役者身勞王事将百責委之於家全在上之人體恤其情使無内顧之憂耳上不加恤奈何使彼無怨心哉無思云者正言其思之不能置也易曰説以先民民忘其勞忘則何事於思而至於疧且重哉無將大車三章章四句集説黄氏震曰戴云詩意未嘗及小人非悔将小人也世既亂矣力微而挽重無益於事與無田甫田之意同朱云此亦行役勞苦而憂思者愚案序言悔将小人本不成文沉詩亦初無悔用小人之意合以上二説詳之明明上天照臨下土我征徂西至于艽音求野叶上與反二月初吉載離寒暑心之憂矣其毒大音泰苦念彼共音恭下章竝同人涕零如雨豈不懐歸畏此罪罟音古集傳賦也征行徂往也艽野地名蓋遠荒之地也二月亦以夏正數之建卯月也初吉朔日也孔氏穎達曰以言初而又吉故知朔日也君子舉事尚早故以朔為吉周禮正月之吉亦朔日也毒言心中如有藥毒也輔氏廣曰言其涉行之逺歴時之乆故其心之憂如中藥之毒而甚苦也共人僚友之處者也懐思罟網也大夫以二月西征至於歳莫而未得歸故呼天而訴之復念其僚友之處者且自言其畏罪而不敢歸也集説輔氏廣曰共人即靖共爾位之僚友也僚友不一而足有出者有處者宜也已之征役固勞苦矣然以其所謂罪罟譴怒蹙急反覆者觀之則僚友之處者亦豈有樂事哉此所以思之而涕零如雨又自言我亦豈不懐歸而相與共事哉正以畏不測之罪而不敢歸爾罪罟言其以罪而加人如網罟之取物而物有不及知者也不言思其室家而欲歸乃言思其僚友者善為辭也昔我往矣日月方除直慮反曷云其還歳聿云莫音慕念我獨兮我事孔庶心之憂矣憚丁佐反我不暇叶胡故反念彼共人睠睠音眷懐顧豈不懐歸畏此譴怒集傳賦也除除舊生新也謂二月初吉也庶衆憚勞也睠睠勤厚之意譴怒罪責也言昔以是時往今未知何時可還而歳已莫矣蓋身獨而事衆是以勤勞而不暇也集説李氏樗曰念我獨兮亦猶我從事獨賢也我事孔庶亦猶或靡事不為也心之憂矣勞我不復有暇也念彼昔者之友睠睠然懐顧之非不懐歸畏取怒於當時也謝氏枋得曰念彼共人所謂靖共爾位敬共朝夕者此君子人也與詩人志同道合者也詩人勤勞於外又念斯人雖以恭敬自持然上無愛惜善類者不知果能免於禍否所以念之深愛之至既涕零如雨又睠睠懐顧也昔我往矣日月方奥於六反曷云其還政事愈蹙子六反歳聿云莫采蕭穫菽心之憂矣自詒伊戚叶子六反念彼共人興言出宿豈不懐歸畏此反覆芳福反集傳賦也奥煖孔氏穎達曰煖即春温亦謂二月也蹙急詒遺戚憂興起也反覆傾側無常之意也言以政事愈急是以至此歳莫而猶不得歸劉氏彜曰采蕭穫菽者冬之事也又自咎其不能見㡬遠去而自遺此憂至於不能安寝而出宿於外也謝氏枋得曰興言出宿又不止於睠睠懐顧矣集説曹氏粹中曰蕭以供祭菽以致養此思歸之心尤切也徐氏常吉曰言歳忽已莫而百工皆休所見皆采蕭穫菽之事而我猶無言歸之期此心之憂惟有反躬自咎耳敢誰怨哉嗟爾君子無恒安處靖共爾位正直是與神之聽之式穀以女音汝集傳賦也君子亦指其僚友也謝氏枋得曰即所謂共人也恒常也靖與靜同謝氏枋得曰靖如自靖自獻之靖凡事謀之心而安也共如温共朝夕之共凡事共敬而不敢慢也君子本共又勉之靖共與猶助也穀禄也以猶與也上章既自傷悼此章又戒其僚友曰嗟爾君子無以安處為常言當有勞時勿懐安也當靖共爾位惟正直之人是助則神之聽之而以穀禄與女矣集説輔氏廣曰戒僚友之處者雖得免於出外征行之勞然亦不可自以安處為常蓋皆忠告之辭僚友之義不徒懐思睠睠而已也嚴氏粲曰君子仕於亂世凛凛畏罪然其勢未可以去也則惟敬共以聽天命而已蓋以已之自處者告其同志也嗟爾君子無恒安息靖共爾位好呼報反是正直神之聽之介爾景福叶筆力反集傳賦也息猶處也好是正直愛此正直之人也介景皆大也集説黄氏佐曰人情與正直之士共處各能樹立若與回邪之人共處易得隨風而靡故戒之一則曰正直是與二則曰好是正直不求人合當為神明所祐而福禄至矣知其不可奈何而安之若命故其言如此王氏志長曰君子遭亂先㡬明決奉身以退智也或義不可去勢不及去靖共正直盡忠厥職仁也君子不得乎智則得乎仁靖共正直之外安得更有所謂式穀景福者哉總論陳氏櫟曰此詩因已之乆役於外而思僚友之安處於内者且於己無賢勞之恨而謂憂戚之自詒於彼無憎疾之辭而勉以為正直之是助哀而不傷怨而不怒視北山之詩稍庶㡬焉北山辭極哀怨小明辭頗和平許氏謙曰詩言其毒大苦憚我不暇可謂甚矣其三章乃曰自詒伊戚不敢咎其上而祇自咎其後二章且告其友勤職事親善人以忠其上詩人之忠厚也小明五章三章章十二句二章章六句集説歐陽氏修曰大雅明明在下謂之大明小雅明明上天謂之小明自是名篇者偶為誌别爾了不關詩義鼔鐘將將七羊反淮水湯湯音傷憂心且傷淑人君子懐允不忘集傳賦也將將聲也孔氏穎達曰鼔擊其鐘而聲将将然淮水出信陽軍皇輿表今汝寧府信陽州隸河南桐柏山至楚州漣水軍皇輿表今淮安府安東縣隸江南入海禹貢導淮自桐柏東㑹于泗沂東入于海湯湯沸騰之貌淑善懐思允信也此詩之義未詳王氏曰幽王鼔鐘淮水之上為流連之樂久而忘反聞者憂傷而思古之君子不能忘也輔氏廣曰懐允不忘言其傷今思古而信不能忘也集説鄭氏康成曰為之憂傷者嘉樂不野合犧象不出門今乃於淮水之上作先王之樂失禮尤甚古者善人君子其用禮樂各得其宜至信不可忘嚴氏粲曰古者作樂必先擊鐘所謂金奏也今聞幽王擊鐘将将然其聲之揚乃在淮水湯湯然流盛之處當時為從流忘反之樂詩人憂而且傷而思先王徳澤之在人我懐思而允信之不忘於心周家以仁厚立國故以善人君子稱其先王也鼔鐘喈喈音皆叶居奚反淮水湝湝戸皆反叶賢雞反憂心且悲淑人君子其徳不回叶乎為反集傳賦也喈喈猶將將湝湝猶湯湯悲猶傷也回邪也集説范氏處義曰湝湝則不溢矣淑人君子所以能與民同樂以其徳無回邪故也輔氏廣曰悲甚於傷樂所以象徳其徳不回則言古之君子樂與徳稱也鼔鐘伐鼛古毛反叶居尤反淮有三洲憂心且妯敕留反淑人君子其徳不猶集傳賦也鼛大鼔也周禮作皋云皋鼔尋有四尺劉氏瑾曰集傳所引周禮考工記韗人文也然地官鼔人又云以鼛鼔鼔役事則字亦作鼛矣注云長丈二尺即尋有四尺也三洲淮上地吕氏祖謙曰淮有三洲作詩者賦其當時所見也蘇氏曰始言湯湯水盛也中言湝湝水流也終言三洲水落而洲見也言幽王之久於淮上也妯動猶若也言不若今王之荒亂也集説王氏安石曰作樂當淮水之溢至淮水之降以言其久也其流連亦甚矣輔氏廣曰伐鼛舉樂器之大者言之妯甚於悲謂常動而不息也其徳不猶言與今之君子不相似也将将喈喈伐鼛言其樂之盛也湯湯湝湝三洲言其時之久也且傷且悲且妯言其憂之甚也樂之盛作之乆而民心之憂益甚則與古之王者憂民之憂樂民之樂者異矣鼔鐘欽欽鼔瑟鼔琴笙磬同音以雅以南叶尼心反以籥不僭子念反叶七心反集傳賦也欽欽亦聲也錢氏文子曰聲有節也磬樂器以石為之呂氏祖謙曰其制在考工記磬氏琴瑟在堂笙磬在下同音言其和也鄭氏康成曰同音者謂堂上堂下八音克諧孔氏穎達曰經言鐘琴笙磬是金石絲匏四者矣舉此明土革竹木亦和同可知雅二雅也南二南也籥籥舞也嚴氏粲曰籥解見邶簡兮僭亂也言三者皆不僭也蘇氏曰言幽王之不徳豈其樂非古歟樂則是而人則非也濮氏一之曰但時非古之時聞其樂祇見其可傷也孟子告齊宣王者可以觀矣集説熊氏朋來曰古者堂上樂皆受笙均堂下樂皆受磬均琴瑟堂上樂也小雅言鼔瑟則曰吹笙即瑟受均於笙之證也鞉鼔管笛堂下樂也商頌言鞉鼔淵淵嘒嘒管聲則曰依磬聲即鼔笛受均於磬之證也不然則鼔鐘欽欽雅南合奏豈無他樂器同音而特舉笙磬二器而言之正以見堂上下之樂皆和也徐氏常吉曰樂之章有詩樂之容有舞以詩歌則音律分明以舞蹈則疾徐有節所謂不僣也以雅以音而奏夫雅也以南以音而奏夫南也以籥以舞而協夫音也附録毛氏萇曰笙磬東方之樂也同音四縣皆同也孔氏穎達曰大射樂人宿縣阼階東笙磬西面其南笙鐘其南鑮皆南陳注云笙猶生也東為陽中萬物以生是東方為笙磬舉磬則鐘鑮可知矣以笙磬之下即言同音故知四縣皆同也以東為始舉笙磬則四方可知胡氏紹曾曰笙磬是石磬名非笙簧之笙儀禮設於阼階東者為笙磬西階西者為頌磬亦有笙鐘頌鐘皆編而縣之總論沈氏守正曰三章皆婉刺之詞鼔鐘伐鼛宜其樂也而見之者反憂作樂者今之人也而懐思者古之淑人君子也是所以刺也末章見我之憂傷者非樂之故也如以樂則以雅以南以籥俱不僣矣獨其作之者非人何哉鼔鐘四章章五句集傳此詩之義有不可知者今姑釋其訓詁名物而畧以王氏蘇氏之説解之未敢信其必然也集説胡氏一桂曰歐文忠公之論曰鼔鐘序但言刺幽王不知刺何事據詩文則是作樂於淮上矣然旁考詩書史記皆無幽王東廵之事書曰徐夷竝興蓋自成王時徐戎及淮夷已皆不為周臣宣王時嘗遣将征之亦不自往初無幽王東至淮徐之事然則不得作樂於淮上矣當闕其所未詳横渠張子以為淮水為害幽王不恤作樂不止詩人憂而傷之今以書所謂湯湯洪水方割觀之則湯湯固可言淮水為害也若下文湝湝三洲又不得謂為害矣嚴氏謂古事亦有不見於史而因經以見者詩即史也其論固當然而詩文亦不明言其為幽王也故集傳以為未詳又曰未敢信其必然得之矣楚楚者茨言抽敕留反其棘自昔何為我蓺魚世反黍稷我黍與與音餘我稷翼翼我倉既盈我庾維億以為酒食以饗以祀叶逸織反以妥湯果反以侑音又叶夷益反以介景福叶筆力反集傳賦也楚楚盛密貌茨蒺藜也董氏逌曰鄭康成謂趨以采齊當為楚薺之薺吕氏祖謙曰説文曰薺蒺藜也而茨則以茅葺屋覆之名然則當康成世字猶為薺其為茨者後人誤也抽除也我為有田禄而奉祭祀者之自稱也與與翼翼皆蕃盛貌露積如字又音漬曰庾孔氏穎達曰甫田曾孫之庾如坁如京是積粟也庾未入倉故曰露積周語云野有庾積十萬曰億鄭氏康成曰倉言盈庾言億亦互辭喻多也饗獻也妥安坐也禮曰詔妥尸鄭氏康成曰尸始入祝則詔主人拜安尸使之坐蓋祭祀筮族人之子為尸李氏如圭曰曲禮云為人子者祭祀不為尸則尸筮無父者皆用孫之倫有爵者為之既奠迎之使處神坐而拜以安之也儀禮少牢饋食禮祝設几于筵上祝酌奠主人西面再拜祝出迎尸于廟門外尸入升筵祝主人皆拜妥尸尸不言答拜遂坐李氏如圭曰祭統云君迎牲而不迎尸别嫌也尸在廟門外則疑於臣在廟中則全於君侑勸也恐尸或未飽祝侑之曰皇尸未實也少牢饋食禮尸告飽祝獨侑曰皇尸未實侑尸又食主人不言拜侑尸又三飯介大也景亦大也此詩述公卿有田禄者力於農事以奉其宗廟之祭故言蒺藜之地有抽除其棘者古人何乃為此事乎朱氏公遷曰古人古者治田之人也蓋將使我於此蓺黍稷也輔氏廣曰首四句推本而言以見其不忘所自也故我之黍稷既盛倉庾既實則為酒食以饗祀妥侑而介大福也葉氏向髙曰此言力農為奉祭之本而享祀妥侑則總一祭而言集説朱氏善曰此章言由古人有墾闢之勞是以今日有收成之富由倉廪有收成之富是以宗廟有享祀之豐是以我君獲福禄之大蓋力於農事所以致其勤也以奉宗廟所以致其孝也惟勤故致力於民者盡惟孝故致力於神者詳濟濟子禮反蹌蹌七羊反絜爾牛羊以往烝嘗或剥或亨普庚反叶鋪郎反或肆或將祝祭于祊補彭反叶補光反祀事孔明叶謨郎反先祖是皇神保是饗叶虚良反孝孫有慶叶袪羊反報以介福萬壽無疆集傳賦也濟濟蹌蹌言有容也孔氏穎達曰曲禮曰大夫濟濟士蹌蹌是有容也輔氏廣曰古之祭祀用人甚多此言濟濟蹌蹌者謂凡與祭之人皆有容儀也冬祭曰烝秋祭曰嘗許氏謙曰烝嘗宗廟之祭名嘗嘗新穀也烝進品物也朱氏公遷曰言烝嘗則禴祠在其中矣剝解剝其皮也亨煮熟之也肆陳之也蘇氏轍曰謂陳其骨體於爼也將奉音捧持而進之也輔氏廣曰剥亨肆将各有其人皆䝉濟濟蹌蹌一句祊廟門内也孝子不知神之所在故使祝博求之於門内待賓客之處也禮記郊特牲索祭祝于祊不知神之所在於彼乎於此乎注索求神也輔氏廣曰王氏云凡祀祼鬯則求諸隂焫蕭則求諸陽索祭祝于祊則求諸隂陽之間蓋魂無不之神無不在求之之備如此朱氏公遷曰公食大夫皆行事於廟是廟門之内有待賓客之處也孔甚也明猶備也著也皇大也君也輔氏廣曰君也者如府君之謂所以尊之也保安也神保蓋尸之嘉號楚詞所謂靈保亦以巫降神之稱也朱子曰靈保神巫也神降而託於巫蓋身則巫而心則神也今詩中不説巫當便是尸也孝孫主祭之人也慶猶福也集説范氏處義曰自此章而下皆言祭祀之禮容及飲福之事朱氏公遷曰濟濟蹌蹌以下五句是薦牲之敬為一節祝祭于祊一句是求神之誠為一節祀事孔明一句則總結之也薦牲之禮如此求神使饗之又如此祀事可謂明備矣此先祖之所以來饗孝孫之所以受福者盛大而悠久也何氏楷曰廟事莫重於烝嘗田功成而品物備也執爨七亂反踖踖七亦反叶七畧反為俎孔碩叶常約反或燔音煩或炙之敕反叶陟畧反君婦莫莫音麥叶木各反為豆孔庶叶陟畧反為賓為客叶克各反獻酬市由反交錯禮儀卒度叶徒洛反笑語卒獲叶黄郭反神保是格叶剛鶴反報以介福萬壽攸酢集傳賦也爨竈也毛氏萇曰饔爨廪爨也孔氏穎達曰饔爨以煑肉廪爨以炊米少牢云饔爨在門東南北上廪爨在饔爨之北踖踖敬也俎所以載牲體也碩大也朱氏公遷曰所謂博碩肥腯是也燔燒肉也炙炙肝也孔氏穎逹曰燔者火燒之名炙者遠火之稱以難熟者近火易熟者遠之故肝炙而肉燔也皆所以從獻也特牲主人獻尸賓長以肝從主婦獻尸兄弟以燔從是也孔氏穎達曰言從獻者既獻酒即以此燔炙從之而置之在俎也夏官量人云凡祭祀制其從獻脯燔之數量是從獻之文也君婦主婦也莫莫清靜而敬至也王氏安石曰執爨賤者也賤者踖踖則貴者可知也君婦尊者也尊者莫莫則卑者可知也輔氏廣曰莫莫有冲漠之意唯清靜而敬之至者方有此意思曰君婦者君即主也又所以尊稱之也豆所以盛内羞庶羞主婦薦之也孔氏穎達曰有司徹云宰夫羞房中之羞于尸司士羞庶羞于尸注云二羞所以盡歡心房中之羞其籩則糗餌粉餈其豆則酏音移食糝食庶羞羊臐音熏豕膮音枵皆有胾醢房中之羞内羞也内羞在右隂也庶羞在左陽也庶多也賓客筮而戒之使助祭者既獻尸而遂與之相獻酬也主人酌賓曰獻賓飲主人曰酢主人又自飲而復飲賓曰酬賓受之奠於席前而不舉至旅而後少長相勸而交錯以徧也毛氏萇曰東西為交邪行為錯劉氏瑾曰特牲主人酳尸主婦亞獻賔三獻畢主人遂酌以獻賔賔飲獻爵主人飲酢爵遂以觶酌于西方之尊以酬賔又自飲再酌飲賔賔奠觶于尊南至旅酬乃舉其觶酬長兄弟遂自飲更酌于東方之尊以飲長兄弟長兄弟卒觶酌于西方之尊以飲受旅者其衆賔及衆兄弟交錯以徧皆如初儀卒盡也度法度也獲得其宜也朱氏公遷曰卒度卒獲言無不合於法無不得其宜也黄氏佐曰古者於旅也語恩澤行於禮法之中和樂生於誠敬之内格來酢報也集説朱氏公遷曰内而主婦外而賔客及賤而執爨者無不敬以将事如此此神之所以饗而福之所以降也朱氏善曰言自始至終皆盡善於是神保來格而報之以介福言其盛大也酢之以萬夀言其悠久也我孔熯而善反矣式禮莫愆叶起巾反工祝致告徂賚孝孫叶須倫反苾蒲必反芬孝祀叶逸織反神嗜飲食卜爾百福叶筆力反如幾音機如式既齊既稷既匡既敕永錫爾極時萬時億集傳賦也熯竭也善其事曰工王氏逢曰工於為祝者苾芬香也卜予與同也幾期也春秋傳曰易幾而哭是也式法齊整稷疾匡正敕戒極至也朱氏公遷曰整則不亂疾則不慢正則不邪戒則不忽皆荘敬之容也禮行既久筋力竭矣而式禮莫愆敬之至也於是祝致神意以嘏音假主人輔氏廣曰徂賚孝孫鄭氏以為徂往也賚予也所以重釋上句致告之義如言以其所致告者往而予孝孫也集傳失解此二字曰爾飲食芳潔朱氏公遷曰上章酒食牛羊燔炙之類故報爾以福禄使其來如幾其多如法孔氏穎達曰言須而即來不遲晚也來必豐足不乏少也爾禮容莊敬故報爾以衆善之極使爾無一事而不得乎此輔氏廣曰禮容荘敬解既齊既稷既匡既敕二句故報爾以衆善之極解永錫爾極一句使爾無一事而不得乎此解時萬時億一句各隨其事而報之以其類也李氏如圭曰工祝致告以下皆序嘏主人之詞少牢嘏詞曰皇尸命工祝承致多福無疆于女孝孫劉氏瑾曰注曰承猶傳也來女孝孫朱氏公遷曰注云來讀曰釐釐賜也即所謂承而致之也使女受禄于天宜稼于田眉壽萬年勿替引之此大夫之禮也朱氏公遷曰公卿大夫其禮皆然故引以為證集説嚴氏粲曰祭祀甚勞筋力既竭而用禮皆無愆過異於跛倚臨祭矣於是工善之祝致神意以告主人謂致嘏辭也不言錫福而曰錫極者詩人祝君以福多言致福之本人君能建其有極則五福備矣錫云者猶曰天誘其衷也朱氏公遷曰事有始終敬無間斷上章絜牛羊者執爨者君婦賔客皆極其禮敬如彼此乃言主祭者之敬其不替又如此則自妥侑以來敬可知也極訓為至則至極而無以復加者也修身而得身修之極齊家治國而得家齊國治之極推之其餘莫不皆然所謂無一事而不得乎此也福禄以報飲食之芳潔衆善之極以報禮容之荘敬各隨其事而報之也但極之所在即福之所在極又可以兼乎福矣禮儀既備叶蒲北反鐘鼓既戒叶訖力反孝孫徂位叶力入反工祝致告叶古得反神具醉止皇尸載起鼔鐘送尸神保聿歸諸宰君婦廢徹直列反不遲諸父兄弟備言燕私叶息夷反集傳賦也戒告也輔氏廣曰禮儀既備言其禮之無不舉也鐘鼔既戒言其樂之無不奏也如此則祭事以畢矣徂位祭事既畢主人往阼階下西面之位也致告祝傳尸意告利成於主人言孝子之利養成畢也吕氏祖謙曰少牢注云利猶養也成畢也言孝子之養禮畢於是神醉而尸起送尸而神歸矣曰皇尸者尊稱之也鼔鐘者尸出入奏肆夏也劉氏瑾曰周禮大司樂曰尸出入奏肆夏鐘師注曰先擊鐘次擊鼔以奏時邁也朱氏公遷曰先既戒之至此乃奏之鬼神無形言其醉而歸者誠敬之至如見之也諸宰家宰非一人之稱也廢去也鄭氏康成曰尸出而可徹諸宰徹去諸饌君婦籩豆而已不遲以疾為敬不留神惠之意也劉氏彝曰不遲不敢怠且緩如神猶在也祭畢既歸賓客之俎同姓則留與之燕以盡私恩所以尊賓客親骨肉也劉氏瑾曰儀禮主人之俎佐食徹之尸俎則佐食徹而有司歸之賔俎則有司徹而歸之祝及兄弟衆賓之俎則皆自徹而出拜賓于門外而不敢留歸賓俎而不敢後所以尊賓也主人以阼俎豆籩及尸祝兄弟之庶羞宴族人於堂主婦以祝豆籩及姑姊妹之俎宴内兄弟於房所以親親也集説范氏處義曰此祀事既畢孝孫往於位而立矣祝於是告利成焉謂致尸意於主人也神醉而尸起送尸而神歸誠敬之至如神在也廢徹不遲不敢以祀畢而慢其事也自是以往可以燕同姓矣故曰備言燕私唐氏順之曰此交神明之終逮羣下之始所謂既盡禮於所尊遂致愛於所親者也案古者賔饗或上取或下就蓋禮尚優賔樂可斷章寓意其義寛若宗廟之祭禮主尊祖敬天樂以昭徳象功罔敢踰越其義嚴如周禮鐘師掌金奏有曰肆夏天子之廟尸出入奏之而饗元侯竝奏焉元侯相饗亦得用之所謂其義寛也至於廟祭魯得用天子禮樂者成王特以褎周公之徳他國則不敢干然孔子猶竊病之蓋若是其嚴也今楚茨五章鼔鐘送尸句集傳以為尸出入鼔鐘以奏肆夏此沿鄭箋然毛鄭以楚茨為思古盛王重農奉祭故引大司樂之文集傳改為公卿有田禄者力於農事以奉宗廟之祭則肆夏皆述天子之事於公卿奚取焉故正其説於此然觀章句下集傳引吕祖謙先王致力於民一叚則朱子仍未盡廢舊説後之學者其善擇焉樂具入奏叶音族以綏後禄爾殽既將莫怨具慶叶祛羊反既醉既飽叶補苟反小大稽首神嗜飲食使君壽考叶去九反孔惠孔時維其盡叶子忍反之子子孫孫勿替天帝反引之集傳賦也凡廟之制前廟以奉神後寢以藏衣冠邢氏昺曰月令仲春云寝廟畢備鄭注云前曰廟後曰寝以廟是接神之處其處尊故在前寝衣冠所藏之處對廟為卑故在後祭於廟而燕於寢故於此將燕而祭時之樂皆入奏於寢也孔氏穎達曰上章云備言燕私故此即陳燕私之事燕祭不得同樂而云皆入者歌詠雖異樂器則同故皆入也且於祭既受禄矣故以燕為將受後禄而綏之也毛氏萇曰綏安也安然後受福禄也爾殽既進與燕之人無有怨者朱氏公遷曰此之小大即前章之諸父兄弟也燕私舉而人心和悦如此而皆懽慶醉飽稽首而言曰向者之祭神既嗜君之飲食矣是以使君壽考也又言君之祭祀甚順甚時無所不盡董氏逌曰内盡禮外盡物朱氏公遷曰順者順於理時者適於時子子孫孫當不廢而引長之也集説曹氏粹中曰凡祭必欲其饗之故工祝致告宗族具慶皆以神嗜飲食歸美焉蒋氏悌生曰卒章言神歸賔去之後同姓復燕於寝以厚其恩也詩人立言六章各有條序朱氏公遷曰祭而格神則一身宜受其福祭而盡禮則子孫當守其規此與燕者所以祝主人也此章以燕私之事言之而述與燕者之慶詞如此總論許氏謙曰一章謂勤於稼穡所入者盛得以為祭祀之具二章言牲體之絜三章言俎豆之盛又皆言神饗而降福四章祝致神語五章送神而起下章燕宗族之端卒章宗族燕而祝君壽福也姚氏舜牧曰神之所饗在明徳之馨然非黍稷之馨無由以将所以公卿必力田以供祭祀之禮楚茨六章章十二句集傳吕氏曰楚茨極言祭祀所以事神受福之節致詳致備所以推明先王致力於民者盡則致力於神者詳朱氏公遷曰此本序説故以先王言觀其威儀之盛物品之豐所以交神明逮羣下至於受福無疆者非徳盛政修何以致之集説朱子詩傳遺説問楚茨以下四篇先生謂即豳雅反復讀之其辭氣與七月載芟良耜等篇大扺相類無可疑然又以為述公卿有田禄者力於農事以奉其宗廟之祭則恐未然蓋周自后稷以農事肇祀其祥未嘗不惓惓於此今以為豳風豳頌者皆是也而孟子亦曰禮曰諸侯耕助以供粢盛粢盛不潔不敢以祭古之人未有不先成民而後致力於神者恐不必專指公卿言之曰此諸篇在小雅而非天子之詩故止得以公卿言之蓋皆畿内諸侯矣輔氏廣曰此詩先儒皆以為天子祭祀之事者豈其見詩中慶祝之詞太侈如萬壽之類乎然少牢嘏詞固曰眉壽萬年者此正大夫之禮也吕氏之説徳盛政修亦以為天子事耳然公卿固亦有家事而國之政事亦無不與聞也故集傳取而載之信彼南山維禹甸田見反叶徒鄰反之畇畇音勻原隰曾孫田叶地因反之我疆我理南東其畝叶滿彼反集傳賦也南山終南山也甸治也孔氏穎達曰此及韓奕之傳皆言甸治不為邱甸之異於鄭也甸之為字以治其地使平成田則訓為治以方十里出兵車一乘又音為乘故鄭以為禹治而邱甸之畇畇墾辟貌孔氏穎達曰墾耕其地辟除草萊以成柔田也曾孫主祭者之稱曾重也自曾祖以至無窮皆得稱之也疆者為之大界也理者定其溝塗也劉氏彝曰疆謂有夫有畛有塗有道有路以經界之也理謂有遂有溝有洫有澮有川以疏道之也徐氏光啓曰疆理不是一定只是在外為疆在内為理就一夫論則遂徑為疆中間畝畎為理就十夫論則溝畛為疆中間遂徑又為理矣推而至於萬夫則一成之外川路為疆中間澮道洫塗遂徑皆為理矣畝壟也何氏楷曰韋昭云下曰畎髙曰畝畝隴也案畎乃隴中水道古作􅎌六畎為一畝對畝則畎為下對畎則畝為髙畝即田身是也長樂劉氏曰其遂東入於溝則其畝南矣其遂南入於溝則其畝東矣孔氏穎達曰成二年左傳曰先王疆理天下物土之宜故詩曰我疆我理南東其畝是於土之宜須縱須横故或南或東也朱氏公遷曰周禮百畝為夫夫間有遂九夫為井井間有溝凡遂在田首如此則遂在井之内溝在井之外田首者水之來處也畝以防水則當卑下之處地之大勢東南卞故欲水自西而東則為畝在水之南欲水自北而南則為畝在水之東也然髙下相因無定勢舉東南則西北可推故傳於下文言順其地勢水勢之所宜則知不可執一論也此詩大指與楚茨略同此即其篇首四句之意也言信乎此南山者本禹之所治董氏逌曰雍州之山荆岐既旅終南惇物則禹固治之矣嚴氏粲曰言禹甸之則平水患理溝洫皆在其中故其原隰墾闢而我得田之於是為之疆理而順其地勢水勢之所宜或南其畝或東其畝也集説朱氏善曰首章言地利之盡也此南山之下有神禹以甸治之於前若彼其可信也有曾孫以耕治之於後又若此其墾闢也於是而疆之理之使之為畛為塗為邱為甸則所以順地勢之所宜也使之為溝為洫為澮為川則所以順水勢之所宜也何氏楷曰自首章至黍稷彧彧先從田事説起為祭祀張本與楚茨同意上天同雲雨于付反雪雰雰敷云反益之以霡亡革反霂音木既優既渥叶烏谷反既霑既足生我百穀集傳賦也同雲雲一色也將雪之候如此雰雰雪貌陸氏佃曰雰盛也霡霂小雨貌陸氏佃曰釋名曰言纔霂瀝霑漬如人之沐惟及其上支而已根不濡也霡膏潤入土如人之脉故曰霡也優渥霑足皆饒洽之意也冬有積雪春而益之以小雨潤澤則饒洽矣彭氏執中曰上章言地利此章言天時俗云蝗産子於地中至春夏而出地若冬有雪寒氣逼之深入於地春夏不能出矣一雪入地三尺三雪則入地九尺故三白為豐年之兆也集説陸氏佃曰三農之事雪則欲盛而徧也雨則欲微而潤也蓋豐年之冬必有積雪而其春必有小雨故是詩雨言小雪言盛雪則欲其盛矣然又欲其澤浸之甚周也故繼之曰既優既渥雨則欲其微矣然又欲其膏澤之僅足也故繼之曰既霑既足朱氏公遷曰雨雪以時斂藏發育得其正故能生我百穀也田之辟者禹之功穀之生者天所賜於篇首二章述之不忘本也疆埸音亦翼翼黍稷彧彧於六反叶於逼反曾孫之穡以為酒食畀必寐反我尸賓壽考萬年叶泥因反集傳賦也埸畔也何氏楷曰疆埸皆田界之名疆乃八家同井之界畔埸乃一夫百畝之界畔埸通作易翼翼整飭貌劉氏彝曰謂八家一井各有疆埸萬井縱横左右翼翼也彧彧茂盛貌劉氏彝曰謂萬井碁布廣野彧彧成文也畀與也言其田整飭而穀茂盛者皆曾孫之穡也劉氏瑾曰詩人本欲言此章之事而先言首章田畝之墾闢疆理次章雨雪之滋生百穀而以此章首二句承上章之意言之也於是以為酒食而獻之於尸及賓客也吕氏祖謙曰邱氏曰與尸謂獻熟食并酌齊獻尸是也與賓謂助祭之賓酌齊獻尸尸因酌以酢賓并祭末燕同姓於燕寝是也此祭始終用酒食之事劉氏瑾曰三獻尸之後主人亦有獻賓之禮隂陽和萬物遂而人心懽悦以奉宗廟則神降之福故壽考萬年也劉氏瑾曰集傳所謂隂陽和者亦承上章雨雪饒洽之意也集説朱氏善曰三章言人事之善也田以井制其疆埸翼翼然整齊其黍稷彧彧然茂盛皆曾孫之穡也於以為酒則三酒五齊之無不備於以為食則潔粢豐盛之無不宜於以畀尸則可以妥侑於以畀賔則可以獻酬於是而神降之福使之壽考萬年也中田有廬疆埸有瓜叶攻乎反是剝是菹側居反獻之皇祖曾孫壽考叶孔五反受天之祐侯古反集傳賦也中田田中也菹酢音醋菜也毛氏萇曰剝瓜為菹也祐福也一井之田其中百畝為公田内以二十畝分八家為廬舎以便田事許氏慎曰廬寄也秋冬去春夏居董氏逌曰毎家廬舍二畝半吕氏祖謙曰後漢書注春秋井田計人授田百畝公田十畝廬舎在内貴人也公田次之重公也私田在外賤私也於畔上種瓜以盡地利吕氏祖謙曰前漢書食貨志瓜瓠果蓏植於疆埸瓜成剝削淹漬以為菹而獻皇祖孔氏穎達曰周禮埸人祭祀供其果蓏是祭必有瓜菹矣貴四時之異物順孝子之心也集説孔氏穎達曰古者宅在都邑田於外野農時則出而就田須有廬舍故農人於田中作廬以便其田事於畔上種瓜亦所以便地也范氏處義曰斷壺食瓜本以養農夫今乃為菹以供祀事蓋祀貴乎備物大至於玉帛牲牢微至於蘋蘩蕰藻無不用也而以瓜為菹又見於此所謂苟可薦者莫不咸在矣詩人舉至微之物而有取於農夫之瓜亦以見因農事之成而報祭故受福亦厚也朱氏公遷曰地無遺利祭無遺禮於此可知但菹不止於瓜舉此以為例耳祭以清酒從以騂息營反牡享于祖考叶去久反執其鸞刀以啓其毛取其血膋音聊叶音勞集傳賦也清酒清潔之酒嚴氏粲曰猶鳬鷖言爾酒既清烈祖既載清酤鬱鬯之屬也孔氏穎達曰春官鬱人掌祼器凡祭祀之祼事和鬱鬯以實彝而陳之彝尊彝四時之祭皆祼用彝是祀祼用鬱鬯也朱子曰鬱鬯者禮家以為釀秬為酒煮鬱金香草和之其氣芬芳而條暢也騂赤色周所尚也孔氏穎達曰地官牧人云陽祀用騂牲三代祭其廟各用其所尚之毛色也祭禮先以鬱鬯灌地求神於隂董氏鼎曰酒以灌地降神取其馨香下達然後迎牲執者主人親執也鸞刀刀有鈴也孔氏穎達曰鸞即鈴也謂刀環有鈴其聲中節故郊特牲曰割刀之用而鸞刀之貴貴其義也聲和而後斷是中節也膋脂膏也啓其毛以告純也取其血以告殺也取其膋以升臭也合之黍稷實之於蕭而燔之以求神於陽也孔氏穎達曰楚語云毛以示物韋昭曰物色是毛以告純血以告殺亦楚語文膋以升臭謂以脂膏合之黍稷置之蕭乃以火燒之合其馨香之氣是升臭也記曰周人尚臭灌用鬯臭鬱合鬯臭隂達於淵泉灌以圭璋用玉氣也既灌然後迎牲致隂氣也鄭氏康成曰灌以圭瓚酌鬯始獻神也已乃迎牲於庭殺之天子諸侯之禮也蕭合黍稷臭陽達於牆屋故既奠然後焫蕭合羶馨同薌香同鄭氏康成曰奠謂薦熟時也蕭薌蒿也染以脂合黍稷燒之凡祭慎諸此魂氣歸于天形魄歸于地故祭求諸隂陽之義也朱子曰天地隂陽之氣交合便成人氣便是魂精便是魄所以祭祀燎以求諸陽灌以求諸隂也問祖先以何而求曰只是以我之氣承接其氣便是有求底道理古人於祭祀極重直是要求而得之商人求諸陽便先作樂發散即陽氣以求之周人求諸隂便焚燎鬱鬯以隂氣求之集説范氏處義曰上章言瓜菹因物之微以見其備也此章言牲酒因物之重以見其備也輔氏廣曰此方言祭祀之禮有酒有牲則祭禮備是烝是享叶虚良反苾苾芬芬祀事孔明叶謨郎反先祖是皇報以介福萬壽無疆集傳賦也烝進也嚴氏粲曰烝畀祖妣之烝或曰冬祭名輔氏廣曰若以為冬祭則其義亦如楚茨二章説上章既言有酒有牲以享于祖考故此章於是言以是牲酒為冬祭之烝而飲食苾芬祭事備著先祖於是既大且尊而降福無疆也集説鄭氏康成曰既有牲物而進獻之苾苾芬芬然香祀禮於是則甚明也朱氏公遷曰承上章牲酒言以此而烝以此而享則飲食芳潔而祭祀明備矣總論張氏耒曰受莫大之福而其君有安寧壽考之樂此天下之至美極治之際也而其本出於倉廪之盈原隰之治田廬之修雨雪之時而後乃及於祭祀禮樂之事也蓋衣食不足於下則禮樂不備於上惟田事修則衣食豐衣食豐而禮樂備禮樂備而和平興和平興而人君有福禄壽考之盛此詩人深探其本要其終而言之序如此也朱氏公遷曰一章二章三章共一意以黍稷為主以壽考萬年結之四章自是一意以瓜為主以受天之祜結之五章六章又共一意以牲酒為主以萬壽無疆結之但畀尸賔獻皇祖皆擬議於其前至烝享苾芬而祀事始成也鄒氏泉曰此詩亦見公卿徳盛政修以基享神之本而因力農奉祭以盡事神之道其夀考福祜之錫蓋所謂賢者之祭必受其福歟信南山六章章六句集説朱氏謀㙔曰楚茨因祭祀而推原粢盛所自出此詩則因力田而成祭享之禮也何氏楷曰楚茨信南山同為一時之作楚茨詳於後而略於前自祭祊以前但以祀事孔明一語該之信南山詳於前而略於後自薦熟以後但以祀事孔明一語該之倬陟角反彼甫田叶地因反歳取十千叶倉新反我取其陳食音嗣我農人自古有年叶泥因反今適南畝叶滿彼反或耘或耔音子叶奨里反黍稷薿薿魚起反攸介攸止烝我髦音毛士鉏里反集傳賦也倬明貌甫大也十千謂一成之田地方十里為田九萬畝而以其萬畝為公田蓋九一之法也鄭氏康成曰井田之法九夫為井井税一夫其田百畝井十為通通税十夫其田千畝通十為成成方十里成税百夫其田萬畝欲見其數從井通起故言十千我食禄主祭之人也陳舊粟也農人私百畝而養公田者也有年豐年也適往也耘除草也耔雝音壅本也蓋后稷為田一畝三畎廣尺深尺而播種上聲於其中苖葉以上朱氏公遷曰以已通以上猶言既長也稍耨劉氏瑾曰鉏也壠草因壝以水反朱氏公遷曰漢書作隤孔疏作壝壝埓也猶培也其土以附苖根壠盡畎平則根深而能音耐風與旱也薿茂盛貌介大烝進髦俊也俊士秀民也古者士出於農而工商不與焉管仲曰農之子恒為農野處而不暱其秀民之能為士者必足賴也韋氏昭曰暱近也秀民民之秀出者也即謂此也此詩述公卿有田禄者力於農事以奉方社田祖之祭故言於此大田歳取萬畝之入以為禄食及其積之久而有餘則又存其新而散其舊以食農人補不足助不給也蓋以自古有年是以陳陳相因所積如此然其用之之節又合宜而有序如此所以粟雖甚多而無紅腐不可食之患也劉氏瑾曰歳取萬畝之入取之有常也積粟有餘而能散以周農則用之合宜也於有餘之中必散舊而存新則用之有序也存新散舊而無紅腐之患又見其不至於暴棄天物也又言自古既有年矣今適南畝農人方且或耘或耔而其黍稷又已茂盛則是又將復有年矣故於其所美大止息之處進我髦士而勞之也未氏公遷曰髦士即農人之秀者慰勉之意不可人人曉之惟可與言者與之言庶幾達於衆也集説謝氏枋得曰取民常少與民常多斂散得宜豐凶有備新者方入倉廪陳者即取之以食農人從古以來豈無水旱霜蝗吾民常如有年者上之人斂散得其道也朱氏善曰歳取十千賦斂之常也食我農人周給之仁也今適南畝廵省之勤也烝我髦士勸相之備也以我齊音咨明叶謨郎反與我犧羊以社以方我田既臧農夫之慶叶祛羊反琴瑟擊鼔以御牙嫁反田祖以祈甘雨以介我稷黍以穀我士女集傳賦也齊與粢同曲禮曰稷曰明粢此言齊明便文以協韻耳犧羊純色之羊也社后土也以句龍氏配孔氏穎達曰鄭駮異義以為社者五土之神能生萬物者以古之有大功者配之祭法曰共工氏之霸九州也其子曰后土能平九州故祀以為社昭二十九年傳曰共工氏有子曰句龍為后土又曰后土則社后土者地之大名也僖十五年左傳曰履后土而戴皇天指謂地為后土也句龍職主土地故謂其官為后土此人為后土之官後轉以配社又謂社為后土方秋祭四方報成萬物周禮所謂羅弊致禽以祀祊音方是也鄭氏康成曰羅弊罔止也秋田主用罔中殺者多也皆殺而罔止祊當為方聲之誤也賈氏公彥曰祊是廟門之外内今因秋田而祭當是祭四方故云誤秋物成四方神之功故報祭之臧善慶福御迎也田祖先嗇也謂始耕田者即神農也孔氏穎達曰祖者始也始教造田謂之田祖先為稼穡謂之先嗇神其農業謂之神農名殊而實同也周禮籥章凡國祈年于田祖則吹豳雅擊土鼔以樂田畯是也許氏謙曰此傳田畯與經三章田畯不同傳以神言經以人言也穀養也又曰善也言倉廪實而知禮節也言奉其齊盛毛氐萇曰器實曰齊在器曰盛犧牲以祭方社而曰我田之所以善者非我之所能致也乃賴農夫之福而致之耳又作樂以祭田祖而祈雨庶有以大其稷黍而養其民人也朱氏公遷曰是蓋一時之祭而報祈之意具焉者也集説王氏安石曰作樂以御田祖祈甘雨農事終則有始也祈甘雨所以介稷黍介稷黍所以穀士女樂歳則士女多賴故也朱氏善曰上五句言報成之祭下五句言祈年之祭齊明犧羊禮之成也禮以備物故於報成之祭言之琴瑟擊鼔樂之盛也樂以達和故於祈年之祭言之上言方社而不及田祖因方社以見田祖也下言田祖而不及方社舉田祖以見方社也上言農夫之慶歸其功於民也下言穀我士女溥其惠於下也曾孫來止以其婦子叶奨里反饁于輒反彼南畝叶滿彼反田畯音俊至喜攘如羊反其左右叶羽已反甞其㫖否叶補美反禾易以豉反長畝同上終善且有叶羽已反曾孫不怒農夫克敏叶母鄙反集傳賦也曾孫主祭者之稱非獨宗廟為然曲禮外事曰曾孫某侯某王氏逢曰陳氏曰先儒以外事為治兵然廵狩朝聘盟㑹之類皆外事也武王禱名山大川曰有道曾孫周王發是也饁餉攘取㫖美易治長竟有多敏疾也曾孫之來適見農夫之婦子來饁耘者於是與之偕至其所而田畯亦至而喜之乃取其左右之饋而甞其㫖否言其上下相親之甚也既又見其禾之易治竟畝如一而知其終當善而且多何氏楷曰善者實穎實栗之美有者萬億及秭之饒是以曾孫不怒而其農夫益以敏於其事也集説朱氏善曰曾孫之來以省耕為職者也田畯之至以勸農為職者也以其婦子饁彼南畝言其力之齊也攘其左右甞其㫖否言其情之親也禾易長畝終善且有言其效之著也於田畯曰喜於曾孫曰不怒互文以見意也田畯見之喜曾孫見之不怒則農夫益以敏於其事矣謂不待督趣而自勸也曾孫之稼如茨才私反如梁曾孫之庾羊主反如坻直基反如京叶居良反乃求千斯倉乃求萬斯箱黍稷稻梁農夫之慶叶祛羊反報以介福萬壽無疆集傳賦也茨屋蓋言其密比也孔氏穎達曰墨子稱茅茨不翦謂以茅覆屋故箋以茨為屋蓋言其積聚髙大如屋茨耳梁車梁言其穹窿也劉氏瑾曰小戎所謂梁輈是也坻水中之髙地也京髙邱也箱車箱也此言收成之後禾稼既多則求倉以處之求車以載之而言凡此黍稷稻梁皆賴農夫之慶而得之是宜報以大福使之萬夀無疆也其歸美於下而欲厚報之如此集説蘇氏轍曰茨言其多也梁言其積也古之税法近者納總逺者納粟禾稼既積乃求千倉以處之萬車以載之黍稷稻粱言無所不有也輔氏廣曰夫以時斂散補助不足而勞來勸相以致農夫之敏者固賴乎上之人而火耕水耨沾體塗足勞苦自竭以致禾稼之登則實賴農夫之力也歸美於彼而欲報之厚宜矣附録范氏處義曰黍稷稻粱既無所不有農夫相慶於下謂此皆君賜也何以報之神能助君以福至萬年之永乃所以為報也胡氏一桂曰集傳歸美於下之説善矣但農夫不當得此重辭只恐是田祖報曾孫介福如曽孫之稼以下事而萬夀無疆則其頌禱之辭也總論黄氏佐曰此詩固重有年上亦重勞農上篇内所以多歸美農夫之辭蓋言有年見得於神不可不祭而祭祀固所以為農也此所以來大田之答也唐氏順之曰首章言力農二章言奉祭三章申言力農之意四章申言奉祭之意總之皆見其厚民耳甫田四章章十句大田多稼既種章勇反既戒既備乃事叶上止反以我覃以冉反耜叶養里反俶載南畝叶滿彼反播厥百穀叶工洛反既庭且碩叶常約反曾孫是若集傳賦也種擇其種也戒飭其具也何氏楷曰月令季冬令告民出五種所謂既種也命農計耦耕事修耒耜具田器所謂既戒也覃利俶始載事庭直朱氏公遷曰直則茂拳曲則生不遂矣碩大若順也蘇氏曰田大而種多故於今歳之冬具來歳之種戒來歳之事凡既備矣然後事之取其利耜而始事於南畝王氏安石曰畝大抵以南為正故毎曰南畝既耕而播之其耕之也勤而種之也時故其生者皆直而大以順曾孫之所欲朱氏公遷曰曾孫之所欲者豐年而已故用力致此黍稷以順之此詩為農夫之詞以頌美其上若以答前篇之意也集説吕氏祖謙曰大田多稼總言之也既種既戒以下至於卒章自始及末以次陳之也輔氏廣曰既備乃事凡事豫則立也播厥百穀見其種之多也農夫以百穀庭碩為順曾孫之欲則上之意孚於下而下之意順乎上矣既方既皁叶子苟反既堅既好叶許苟反不稂音郎不莠餘久反去起吕反其螟莫廷反螣音特及其蟊莫侯反賊無害我田稺音稚田祖有神秉畀炎火叶虎委反集傳賦也方房也謂孚甲始生而未合時也孔氏穎達曰孚甲米生於中若人之房舎然也孚者米外之粟皮甲者以在米外若鎧甲之在人表禾既有穗即生孚甲實未堅者曰皁劉氏彝曰穀粒既實而未充滿曰皁稂童粱陸氏徳明曰童粱草也説文作莭云稂或字也禾粟之采生而不成者謂之童莭也莠似苖孔氏穎達曰仲虺之誥若苖之有莠若粟之有粃粃似粟莠似苖也皆害苖之草也食心曰螟食葉曰螣食根曰蟊食節曰賊孔氏穎達曰皆釋蟲文陸璣疏云舊説螟螣蟊賊一種蟲也故犍為文學曰此四種蟲皆蝗也實不同故分别釋之何氏楷曰月令孟夏行春令則蝗蟲為災仲夏行春令則百螣時起以螣之種類不一故曰百螣皆害苖之蟲也稺幼禾也孔氏穎達曰蟲災之盛稙者亦食以稺者偏甚故舉以言之言其苖既盛矣又必去此四蟲然後可以無害田中之禾然非人力所及也故願田祖之神為我持此四蟲而付之炎火之中也姚崇遣使捕蝗引此為證夜中設火火邊掘坑且焚且瘞於罽反蓋古之遺法如此集説鄭氏康成曰盡生房矣盡成實矣盡堅熟矣盡齊好矣而無稂莠擇種之善民力之專時氣之和所致之張子曰三代盛時必無蟲患天下之田盡墾何處不種縱或有之亦人衆覺察必豫早能去其害雖有山林陂澤亦人以時出入瀦停水陂不得生也且不論盛時故災害不作直人謀足以勝之蝝螟之類其去易於蝗又况古人除田害亦易得人只於采芑使三千乘要以百井之民除一井之民患計之為不難有渰於檢反萋萋七西反興雨祁祁雨于付反我公田遂及我私叶息夷反彼有不穫稺此有不斂力檢反穧才計反彼有遺秉此有滯穗伊寡婦之利集傳賦也渰雲興貌萋萋盛貌祁祁徐也雲欲盛盛則多雨雨欲徐徐則入土公田者方里而井井九百畝其中為公田八家皆私百畝而同養公田也漢書食貨志建步立畝六尺為步步百為畝畝百為夫夫三為屋屋三為井井方一里是為九夫八家共之各受私田百畝公田十畝是為八百八十畝餘二十畝以為廬舍穧束秉把也滯亦遺棄之意也劉氏彝曰稺謂穗之低小刈穫之所不及者穧謂刈而遺忘束縳之所不及者秉謂束而輦載之所不盡者滯謂刈而折亂秉穫之所不逮者言農夫之心先公後私故望此雲雨而曰天其雨我公田而遂及我之私田乎冀怙君徳而蒙其餘惠使收成之際彼有不及穫之稺禾此有不及斂之穧束彼有遺棄之禾把此有滯漏之禾穗而寡婦尚得取之以為利也此見其豐成有餘而不盡取又與鰥寡共之既足以為不費之惠而亦不棄於地也不然則粒米狼戾不殆於輕視天物而慢棄之乎集説輔氏廣曰既無稂莠之害又無蟲蝗之害則其不可無者雨而已故此章又言其望雲與雨先公田而後私田如此則成有年矣鰥寡孤獨聖人亦不能使其無也但發政施仁則先及之而已雨我公田尊君之義也伊寡婦之利及衆之仁也謝氏枋得曰三代盛時君之愛民無所不用其極民之愛君亦無所不用其極民之望雨惟願其田中之洋溢今所願者公田之雨優渥霑足其餘波及我私田也尊君親上之心亦厚矣稺有不穫穧有不斂秉有遺穗有滯此樂歳粒米狼戾之時也農夫何見而乃能留有餘不盡之利以養鰥寡此上好仁而下好義也陳氏櫟曰此章欲雨公田不至知有已而不知有君利及寡婦不至知有已而不知有人忠厚若此其豳風之氣象乎曾孫來止以其婦子饁彼南畝子畝竝見前篇田畯至喜來方禋音因祀叶逸織反以其騂黑與其黍稷以享以祀同上以介景福叶筆力反集傳賦也精意以享謂之禋董氏逌曰來方禋祀以其所至之方而禋祀也農夫相告曰曾孫來矣於是與其婦子饁彼南畝之穫者而田畯亦至而喜之也王氏安石曰喜其趨穫事也朱氏公遷曰此四句與甫田同但彼則君上勸農而見農夫之勤此則農夫相勸以慰君上之心一為耘耔之時一為收斂之時也曾孫之來又禋祀四方之神而賽禱焉四方各用其方色之牲此言騂黑舉南北以見其餘也吕氏祖謙曰南方用騂牲北方用黑牲獨舉騂黑者孔氏所謂略舉二方以為韻句是也以介景福農夫欲曾孫之受福也集説輔氏廣曰以其婦子饁彼南畝田畯至喜所以慰上之心也以享以祀以介景福所以錫上之福也始焉竭力以慰上之心終則至誠以錫上之福民之愛君者如此則知君之所以愛民為何如哉吳氏師道曰此詩為農夫之詞以頌美其上而亦直稱曾孫可以見俗之質厚而上下親愛之誠總論劉氏瑾曰一章言田事修飭而苖生盛美也二章言苖既秀實而願其無損也三章復願其雨澤溥及而收成有餘也卒章言其收穫之後而報祀獲福也大田四章二章章八句二章章九句集傳前篇有擊鼔以御田祖之文故或疑此楚茨信南山甫田大田四篇即為豳雅其詳見於豳風之末亦未知其是否也然前篇上之人以我田既臧為農夫之慶而欲報之以介福此篇農夫以雨我公田遂及我私而欲其享祀以介景福上下之情所以相賴而相報者如此非盛徳其孰能之案周禮籥章龡豳詩以逆暑迎寒祈年於田祖龡豳雅以樂田畯祭蜡則龡豳頌以息老物鄭康成箋豳詩以應豳籥分殆及公子同歸以上二章為豳風十月穫稻為此春酒以介眉夀以上四章為豳雅稱彼兕觥萬夀無疆以上為豳頌孔穎達疏之曰述其政教之始則為豳風述其政教之中則為豳雅述其政教之成則為豳頌故一篇之内備有風雅頌也此漢唐相傳之説而程子亦以為然也至宋而解詩者衆或謂既曰雅頌當非七月之詩蓋若九夏亡之矣或謂以七月全篇隨其音節吹之以合於風雅頌或謂楚茨大田甫田是豳之雅思文臣工噫嘻豐年載芟良耜等篇是豳之頌朱子謂數説皆通而未敢必也間嘗考之楚茨專言廟祭甫田有祈甘雨之文似有合矣然周禮言吹豳雅擊土鼔而不言有琴瑟之樂也大田詞主報賽非以言祈至思文為配天臣工為戒田官噫嘻為成王後詩惟豐年載芟良耜止言農事可以通用然在周頌無文以證其為豳朱子既無定論則鄭箋引周禮以解豳詩似尚為近古况周禮出於西漢鄭氏一門具有師承其説或非無本也瞻彼洛矣維水泱泱於良反無韻未詳君子至止福禄如茨韎音昧韐音閤有奭許力反以作六師集傳賦也洛水名在東都㑹諸侯之處也問洛水或云兩處朱子曰此只就洛邑言之吕氏祖謙曰職方氏河西曰雍州其浸渭洛故毛傳以洛為宗周之浸水洛水雖出於京兆上洛西山然其流尚微此詩所謂洛蓋指東都也泱泱深廣也君子指天子也茨積也韎茅蒐所染色也梁氏益曰茅蒐茹藘也古謂之茅蒐今謂之茜草茜亦作蒨染絳之草也韐韠也合韋為之問韎韐毛鄭以為祭服王氏以為戎服朱子曰只是戎服左傳云有韎韋之跗注是也周官所謂韋弁兵事之服也劉氏瑾曰韋弁詳見六月常服注鄒氏泉曰注引周官韋弁云者乃証韋為兵服之意作弁看則非奭赤貌作猶起也六師六軍也天子六軍劉氏瑾曰天子六軍出自六鄉蓋一萬二千五百家為鄉凡起徒役毋過家一人故一萬二千五百人為一軍六軍總七萬五千人也此天子㑹諸侯於東都以講武事而諸侯美天子之詩言天子至此洛水之上御戎服而起六師也集説鄒氏泉曰此詩言講武而先言洛水之勢者以見所建朝㑹之所據天下之上游足以起天下之朝宗也瞻彼洛矣維水泱泱君子至止鞞補頂反琫必孔反有珌賓一反君子萬年保其家室集傳賦也鞞容刀之鞞今刀鞘音笑也琫上飾珌下飾毛氏萇曰天子玉琫而珧音遥珌諸侯璗音蕩琫而璆音求珌孔氏穎達曰説文云珧蜃甲又云黄金謂之璗亦戎服也集説朱氏公遷曰服飾如此尊臨天下福禄盛矣且将長受福禄保有天下而不失也朱氏道行曰天子以天下為家故此章曰家室下章曰家邦四方户闥不敢自外之詞也君子萬年萬年連下讀致治久長之祝俱根作六師來瞻彼洛矣維水泱泱君子至止福禄既同君子萬年保其家邦叶卜工反集傳賦也同猶聚也姚氏舜牧曰言福禄無不㑹聚也集説朱氏公遷曰福禄既同已盛矣萬年保家邦又将及其久也此二章既美之又祝之蓋上章申韎韐有奭之意此章申福禄如茨之意季氏本曰人心所歸即是福禄之同總論朱子詩傳遺説問瞻彼洛矣傳以為諸侯美天子之詩今考其閒有以作六師之言則其為天子之事審矣然二章三章祈頌之語則不過保其家室家邦而已氣象頗陿反若天子所以告諸侯者何也曰家室家邦亦趂韻耳天子以天下為家雖言家室何害又凡言萬年者多是臣祝君之辭朱氏善曰瞻彼洛矣維水泱泱言其形勢之壯盛也君子至止福禄如茨言其福祥之厚集也韎韐有奭以作六師言其人心之翕聚也形勢壮盛得乎地也福祥厚集得乎天也人心翕聚得乎人也周人尚文其弊也必趨於弱故周公戒成王曰詰爾戒兵畢公戒康王曰張皇六師皆欲其振厲奮發以聳萬民之觀瞻一四方之趨向也此詩云天子至洛水之上親御戎服以起六師則必於此乎朝㑹於此乎田獵修戎備於閑暇之時講武事於燕安之日據地利以合人心遵國典以承天意使斯民知國勢之尊安王靈之赫奕是固福禄之所由聚邦家之所由安也瞻彼洛矣三章章六句集説朱子曰詩多有酬酢應答之篇瞻彼洛矣是臣歸美其君君子指君也當時朝㑹於洛水之上而臣祝其君如此裳裳者華又是君報其臣桑扈鴛鴦皆然鄒氏泉曰此㑹諸侯而因講武事如車攻詩東都之行本為朝㑹而詩之作則為田獵此詩當如此例㸔東都之至本為朝㑹而作詩之意則重講武也裳裳者華其葉湑思吕反兮我覯之子我心寫叶想與反兮我心寫兮是以有譽處兮集傳興也裳裳猶堂堂董氏云古本作常常棣也湑盛貌覯見處安也此天子美諸侯之辭蓋以答瞻彼洛矣也言裳裳者華則其葉湑然而美盛矣我覯之子則其心傾寫而悦樂之矣夫能使見者悦樂之如此則其有譽處宜矣吕氏祖謙曰譽處見蓼蕭此章與蓼蕭首章文勢全相似輔氏廣曰先生正以此章與蓼蕭首章文勢相似故知其為天子美諸侯之詩以答瞻彼洛矣也集説朱氏公遷曰此以可喜之物為喜見諸侯之興也見裳華之葉湑然己心喜況得見此賢諸侯乎喜可知矣譽處安樂也既能獲乎上斯宜有其樂錢氏天錫曰洛邑朝而之子覯則制治保邦之長䇿足以慰求治之心故傾倒無留恨如此一見便使人悦樂必有所以感動乎人者便含下威儀才徳在内裳裳者華芸其黄矣我覯之子維其有章矣維其有章矣是以有慶叶墟羊反矣集傳興也芸黄盛也朱氏公遷曰裳華之芸黄亦有文章粲然之意故以為興章文章也有文章斯有福慶矣集説蘇氏轍曰黄色之正也芸黄之盛也有章有文也君子之有文粲然如華之盛也輔氏廣曰文章徳之弸中而彪外者徳之彰著如此則固宜其有福慶也朱氏公遷曰和順積中英華發外交際之頃不愆於儀則上得於君而獲福必然矣上章之譽處即此章之福慶也裳裳者華或黄或白叶僕各反我覯之子乘其四駱乘其四駱六轡沃若集傳興也言其車馬威儀之盛集説謝氏枋得曰愛其人見其車馬之盛亦喜之徳足以稱其車服者也朱氏公遷曰裳華之色不齊而之子之馬則其色齊也此反其意以為興也美其文章則有根於中者美其車服則有所以稱其服者二章皆不顯言而自可見我心寫兮之故朱氏道行曰六轡沃若就升車攬轡閒節度不爽而言維其有章之一端也左叶祖戈反之左同上之君子宜叶牛何反之右叶羽已反之右同上之君子有叶羽已反之維其有同上之是以似叶養里反之集傳賦也言其才全徳備以左之則無所不宜以右之則無所不有朱氏公遷曰此有字是有之於外維其有之於内是以形之於外者無不似其所有也集説蘇氏轍曰君子左而宜其左右而有其右有者有諸中也中誠有之則其發於容貌者睟然其似之矣朱氏公遷曰左之宜右之有人見其然而不知夫體無不具是以用無不周也此則因其所設施而推其所藴蓄以見我心寫兮之故鄒氏泉曰宜者紛紜交錯而皆以其道大小常變而各適其時也有者百為庶務而出之無窮千變萬化而應之不竭也總是言其設施於外而時措之妙如此總論朱氏善曰朱子以為答瞻彼洛矣則是天子㑹諸侯於東都講武既畢而燕飲之詩也夫國君之才全徳備觀於朝廷而見其禮文之無不周觀於田獵而見其射御之無不善則信乎其才之全矣即夫多儀之享而知其有事上之敬即夫趨事之敏而知其有事上之忠則信乎其徳之備矣蓋容貌詞氣乃徳之符其外之無可選擇如此則其中之所存可知有於中者所以為外之本宜於外者乃其中之似裳裳者華四章章六句集説姚氏舜牧曰此詩荅瞻洛諸侯因講武而美天子萬年之固天子因祝頌而美諸侯左右之宜一時明良之歌盛矣哉北山之什十篇四十六章三百三十四句欽定詩經傳説彚纂卷十四
