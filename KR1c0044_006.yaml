body:
  text: 欽定四庫全書欽定詩經傳說彚纂卷四鄘一之四集傳說見上篇集說孔氏穎達曰王肅服虔以為鄘在紂都之西孫育云據鄘風定之方中楚邱之歌鄘在紂都之南相證自明而城以西無驗其城之西迫於西山南附洛邑檀伯之封溫原樊州皆為列國鄘風所興不出於此王氏應麟曰通典衛州新鄉縣西南三十二里有鄘城即鄘國泛彼柏舟在彼中河髧徒坎反彼兩髦音毛實維我儀叶牛何反之死矢靡他湯何反母也天叶鐡因反只音紙下同不諒人只集傳興也中河中於河也鄭氏康成曰舟在河中猶婦人之在夫家是其常處髧髮垂貌兩髦者翦髮夾囟音信許氏愼曰頭㑹腦蓋也象形孔氏穎達曰夾囟故兩髦也子事父母之飾親死然後去之內則翦髮為鬌音朵男角女羈注夾囟曰角兩髻也午達曰羈三髻也喪大記小斂主人脫髦注幼時翦髮為之年雖成人猶垂於兩邊若父死脫左髦母死脫右髦親沒不髦謂此也此蓋指共伯也鄭氏康成曰共伯僖侯之世子僖史記作釐兩髦之人謂共伯也禮世子昧爽而朝亦櫛纚音離笄總拂髦冠緌纓我共姜自我也陸氏德明曰共姜共伯之妻也婦人從夫諡姜姓也儀匹孔氏穎達曰言其同德齊意吕氏大臨曰儀以夫為法也之至矢誓靡無也只語助辭諒信也舊說以為衛世子共伯蚤死其妻共姜守義父母欲奪而嫁之故共姜作此以自誓言柏舟則在彼中河兩髦則實我之匹雖至於死誓無他心母之於我覆育之恩如天罔極而何其不諒我之心乎不及父者疑時獨母在或非父意耳吕氏大臨曰序言父母詩獨言母蓋止是母意序并言之文勢當爾如將仲子云父母之言時鄭莊公亦止有母姜氏此其比也集說輔氏廣曰實維我匹一定而决不可易也之死矢靡他雖死而誓不敢易也夫母之欲嫁共姜不過是惑乎愛而慮其終耳今味共姜自誓之言其至誠貞固之意如此則母之惑可解而慮可釋矣嚴氏粲曰舟必不可以去水猶我必不可以他適父母者子之天夫者婦之天今父與夫俱不存惟母是我所天也何不信我而欲奪我志也黃氏佐曰易曰婦人貞吉從一而終也之死靡他從一之謂也即柏舟有定在興在已有定匹之死以死自誓非指共伯也泛彼柏舟在彼河側髧彼兩髦實維我特之死矢靡慝他得反母也天只不諒人只集傳興也特亦匹也陸氏德明曰特韓詩作直云相當值也朱子曰特有孤特之義而以為匹者古人用字多如此猶治之謂亂也黃氏佐曰特如萬人之特蓋婦人稱夫之辭慝邪也以是為慝則其絶之甚矣集說許氏謙曰慝邪之匿於心者也他適而誓之死靡為之其事猶顯至於一念邪思之微亦誓之死而靡發可見其心之貞固而節不可渝矣朱氏公遷曰自誓之意以漸而深總論程子遺書問或有孤孀貧窮無託者可再嫁否曰只是後世怕寒餓死故有是說然餓死事極小失節事極大真氏德秀曰柏舟之不再適蓋婦人之大節故孔子列之使萬世取法焉程子之論可為後世深戒陳氏櫟曰衛之淫風流行而有共姜特立之節真可謂遏人欲之橫流矣讀此詩者豈不可以感發人之善心乎柏舟二章章七句集說范氏祖禹曰衰亂之世淫風大行共姜得禮之正而能守義故以首鄘風也呂氏祖謙曰史記載共伯釐侯世子釐侯已葬武公襲攻共伯共伯入釐侯羡羡墓道也自殺案武公在位五十五年國語又稱武公年九十有五猶針警於國計其初即位蓋已四十餘矣使果弒共伯而篡立則共伯見弒之時其齒又加長於武公安得謂之蚤死乎髦者子事父母之飾諸侯既小斂則脫之史記謂釐侯已葬而共伯自殺則是時共伯已脫髦矣詩安得猶謂之髧彼兩髦乎是共伯未嘗有見弒之事武公未嘗有篡弒之惡也朱氏善曰衛詩三十九篇前乎此者為靜女為新臺後乎此者為牆有茨為君子偕老人道至此而盡天理至此而滅矣聖人於其閒而置柏舟焉又以見人心之未嘗亡天理之未嘗滅也挽風俗之衰而扶綱常之重置之鄘風之首宣矣牆有茨不可掃叶蘇后反也中冓古侯反之言不可道叶徒厚反也所可道也言之醜也集傳興也茨蒺藜也蔓生細葉子有三角刺人中冓謂舍之交積材木也吕氏祖謙曰前漢梁王共傳聽聞中冓之言應劭曰中冓材構在堂之中也顔師古曰構謂舍之交積材木也當從應顔說蓋閫內隱奧之處也中冓之言若曰閨門之言也道言醜惡也舊說以為宣公卒惠公幼其庶兄頑蒸於宣姜孔氏穎達曰左傳閔二年曰初惠公之即位也少齊人使昭伯蒸於宣姜不可强之生齊子戴公文公宋桓夫人許穆夫人服虔云昭伯衛宣公之長庶伋之兄宣姜宣公夫人惠公之母是其事也故詩人作此詩以刺之言其閨中之事皆醜惡而不可言理或然也集說孔氏穎達曰言人以牆防禁一家之非常上有蒺藜之草欲掃去之反傷牆而毁家以興國君以禮防制一國之非法中有淫昏之行欲除滅之反違禮而害國也朱氏善曰宣姜一失身於宣公而為新臺之有泚再失身於公子頑而為中冓之不可道蓋由其節義虧缺於前是以無所顧藉於後而無復羞愧悔悟之萌也牆有茨不可襄也中冓之言不可詳也所可詳也言之長也集傳興也襄除也詳詳言之也陸氏德明曰詳韓詩作揚言之長者不欲言而託以語長難競也牆有茨不可束也中冓之言不可讀也所可讀也言之辱也集傳興也束束而去之也讀誦言也毛氏萇曰讀抽也鄭氏康成曰抽猶出也孔氏穎達曰上云不可詳則此為讀誦於義亦通必以為抽者以讀誦非宣露之義傳訓為抽箋申抽為出也辱猶醜也總論范氏祖禹曰掃之則傷牆道之則傷君必不得已而道之則不可復詳必不得已而詳之則不可復讀詩人之意本不欲道疾之而不能不道既道而復以為恥又悔而相戒也牆有茨三章章六句集傳楊氏曰公子頑通乎君母閨中之言至不可讀其汙甚矣聖人何取焉而著之於經也蓋自古淫亂之君自以為密於閨門之中世無得而知者故自肆而不反聖人所以著之於經使後世為惡者知雖閨中之言亦無隱而不彰也其為訓戒深矣輔氏廣曰楊氏之說蓋不獨為此篇發凡聖人所録淫亂之詩其意皆如此即先生所謂惡者可以懲創人之逸志者也集說鄧氏元錫曰偕老之辭婉巽言也牆茨之言厲法言也然偕老詳容服不詳不淑牆茨言不可道不詳不道刺而猶有風焉君子偕老副筓六珈音加叶居河反委委於危反他他待河反如山如河象服是宜叶牛何反子之不淑云如之何集傳賦也君子夫也偕老言偕生而偕死也女子之生以身事人則當與之同生與之同死故夫死稱未亡人言亦待死而已不當復有他適之志也朱子曰宣姜夫死而淫是失偕老之義副祭服之首飾編髮為之劉氏熙曰王后首飾曰副副覆也以覆首亦言副二也兼用衆物成其飾也筓衡筓也孔氏穎達曰以玊為之惟祭服有衡筓垂於副之兩㫄當耳其下以紞音黕懸瑱羅氏中行曰紞織如絛上屬於衡者瑱以玊為之以纊縳之而屬於紞懸之當耳縳音篆卷也馮氏復京曰衡筓二物衡垂於當耳筓橫於頭上垂於副之兩㫄當耳其下以紞懸瑱此乃釋衡非釋筓也珈之言加也以玊加於筓而為飾也毛氏萇曰珈筓飾之最盛者所以别尊卑鄭氏康成曰如今步搖上飾劉氏熙曰步搖上有垂珠步則搖也孔氏穎達曰言六珈必飾之有六但所施不可知據此言侯伯夫人為六王后則多少無文也委委他他雍容自得之貌孔氏穎達曰釋訓云委委他他美也孫炎曰委委行之美他他長之美皆佳麗美豔之貌郝氏敬曰委委舒徐他他安重如山安重也如河𢎞廣也王氏逢曰此二句主德容言郝氏敬曰委委如河他他如山象服法度之服也鄭氏康成曰象服者謂揄翟闕翟也人君之象服則所謂豫欲觀古人之象日月星辰之屬孔氏穎逹曰象鳥羽而畫之故謂之象淑善也言夫人當與君子偕老故其服飾之盛如此而雍容自得安重寬廣又有以宜其象服毛氏萇曰能與君子偕老乃宜居尊位服盛服也今宣姜之不善乃如此雖有是服亦將如之何哉言不稱也鄭氏康成曰子乃服飾如是而為不善之行於禮當如之何深疾之集說程子曰其德之深厚如山如河乃稱象德之服服章之設象其德位之宜德尊位隆乃稱盛服今子之不淑奈何蘇氏轍曰能與君子偕老乃可以有副筓六珈委委他他緩而有禮如山河之崇深乃可以有象服今宣姜之不善將如是服何哉范氏處義曰詩人謂昔之夫人所以能與君子偕老被服副筓六珈之貴以奉祭祀者以其德見於容委委然婉順他他然和易其立如山其潤如河象所被之服得其宜稱今宣姜無淑善之德何以稱其服也朱氏公遷曰此章言服飾之盛而德不相稱為可責玼音此兮玼兮其之翟叶去聲也鬒真忍反髮如雲不屑先結反髢徒帝反也玊之瑱吐殿反也象之揥敕帝反也掦且子餘反之晳星厯反叶征例反也胡然而天也胡然而帝也集傳賦也玼鮮盛貌翟衣祭服刻繒為翟雉之形而彩畫之以為飾也毛氏萇曰揄翟闕翟也鄭氏康成曰侯伯夫人之服自揄翟而下如王后焉孔氏穎達曰翟雉名彩畫為飾不用真羽嚴氏粲曰鄭氏云江淮而西青質五色皆備成章曰揄揄翟則畫揄雉闕翟刻而不畫鬒黑也如雲言多而美也屑潔也髢髲鬄也人少髮則以髢益之髮自美則不潔於髢而用之也孔氏穎達曰髢一名髲說文云益髮也言人髮少聚他人髮益之哀十七年左傳曰衛莊公見已氏之妻髮美使髠以為吕姜髢是也陳氏推曰不屑只薄之不用猶云不消得髢非以此為不潔也瑱塞耳也象象骨也揥所以摘音剔髮也孔氏穎達曰以象骨搔首因以為飾名之曰揥掦眉上廣也張氏彩曰睂目以疏秀為美故以掦見稱且助語辭晳白也胡然而天胡然而帝言其服飾容貌之美見者驚猶鬼神也許氏謙曰容貌服飾之盛胡為而在此乎其自天而降也其鬼神也集說孔氏穎達曰宣姜為淫亂故責之言夫人何由見尊敬如天乎何由見尊敬如帝乎非由衣服之盛顔色之莊歟既由衣服顔色以見尊敬何故反為淫昏之行乎輔氏廣曰其者指宣姜而言玼兮玼兮其之翟也言服之美也鬒髮如雲不屑髢也言質之美也足乎已無待於外也玊之瑱也象之揥也言飾之美也掦且之晳也言色之美也服飾容貌之美盛如天如帝然是豈可以徒居哉朱氏公遷曰此章言服飾容貌之盛若可疑又可畏沈氏萬鈳曰此章論祭服言其德當神明故尊之以比天帝卒章論事君子見賔客之服故以美人言之瑳七我反兮瑳兮其之展陟戰反叶諸延反也蒙彼皺側救反絺是紲息列反袢薄慢反叶汾乾反也子之清掦掦且之顔叶魚堅反也展如之人兮邦之媛于眷反叶于權反也集傳賦也瑳亦鮮盛貌許氏慎曰玊色鮮白展衣也以禮見於君及見賔客之服也鄭氏康成曰展衣宜白展衣字悮禮記作袒衣孔氏穎達曰玊藻云一命袒衣喪大記曰世婦以䄠衣是禮記作袒衣也展為聲誤從袒為正蒙覆也皺絺絺之蹙蹙者當暑之服也鄭氏康成曰展衣夏則裏衣皺絺孔氏穎達曰葛之精曰絺其精尤細靡者皺也質細而縷皺紲袢束縛意以展衣蒙絺綌而為之紲袢所以自斂飭也許氏謙曰案說文袢博僈反傳意袢字如絆字意是紲袢為連綿字共成束縛意也或曰蒙謂加絺綌於䙝衣之上所謂表而出之也王氏安石曰暑服則加紲絺焉朱子曰先著裏衣表絺綌而出之於外欲其不見體也清視清明也揚眉上廣也孔氏穎達曰以目視清明因名為清揚者睂上之美名因謂睂上睂下皆曰揚目上目下皆曰清故野有蔓草傳云清揚睂目之間猗嗟傳云目下為清顔額角豐滿也展誠也美女曰媛見其徒有美色而無人君之德也鄭氏康成曰人君小君也孔氏穎達曰婦人從夫之爵故同名曰人君集說嚴氏粲曰宣姜服展衣之禮服目視清明睂上掦起而又顔角豐滿如此人乃邦家之美女也歎息不滿之意見於言外矣朱氏公遷曰此章言服飾容貌之盛若可喜而實可惜也黃氏佐曰稱其有傾一國之色正譏其無母一國之德也總論孔氏穎達曰由夫人失事君子之道故陳此夫人既有服飾之盛宜與君子俱至於老反為淫泆之行而不能與君子偕老故刺之嚴氏粲曰此詩惟述夫人服飾之盛容貌之尊不及淫亂之事但中間有子之不淑一言而譏刺之意盡見朱氏善曰當其奉宗廟之時其首飾之有副也其身章之有翟也是非不盛也而不知宣姜之行果能視先君而無愧否乎當其見賔客之時其禮服之有展也其裏服之有絺也又非不盛也而不知宣姜之行果能視賔客而無愧否乎夫入而奉宗廟出而見賔客非不尊且嚴也而曾無羞愧悔悟之萌則是人心之果亡而天理之果滅矣能無禍乎黃氏一正曰夫人與君同體者也幽而祀乎神明而禮於人所當淑身愼行也今宣姜之惡乃如此以人莫誰何也獨不畏於鬼神乎夫不足計也獨不畏於賔客乎詩人所以備舉副筓翟展而深刺之也君子偕老三章一章七句一章九句一章八句集傳東萊吕氏曰首章之末云子之不淑云如之何責之也二章之末云胡然而天也胡然而帝也問之也三章之末云展如之人兮邦之媛也惜之也辭益婉而意益深矣集說范氏處義曰衛夷姜宣姜皆謂之夫人皆失事君子之道是詩繼牆有茨之後故說者以為宣姜劉氏瑾曰三章皆極言宣姜服飾容貌之盛如此玩其辭想其人有德以稱之固足以尊其瞻視享其安榮苟無其德不幾於誨淫者乎惟詩人寬厚意在言外故其立言如此蓋與猗嗟之詩同意爰采唐矣沫音妹之鄉矣云誰之思美孟姜矣期我乎桑中叶諸良反要於遙反我乎上宫叶居王反送我乎淇之上叶辰羊反矣集傳賦也唐蒙菜也一名兔絲孔氏穎達曰釋草云唐蒙女蘿女蘿菟絲舍人曰唐蒙名女蘿女蘿又名菟絲郭璞曰唐與蒙或并或别孫炎曰蒙唐也沫衛邑也書所謂妹邦者也孔氏穎達曰酒誥注云沫邦紂之都所處也於詩國屬鄘今鄘并於衛故言衛邑紂都朝歌朝歌即沫也孟長也姜齊女言貴族也桑中上宫淇上又沫鄉之中小地名也王氏應麟曰通典衛州衛縣有上宫臺要猶迎也衛俗淫亂世族在位相竊妻妾故此人自言將采唐於沫而與其所思之人相期㑹迎送如此也蘇氏轍曰託采唐以相誘也集說鄭氏康成曰於何采唐必沫之鄉猶言欲為淫亂者必之衛之都孟姜列國之長女而思與淫亂疾世族在位有是惡行也孔氏穎達曰衛朝貴族無姓姜者故為列國列國姜姓齊許申吕之屬不斥其國未知誰國之女也言孟故知長女下孟弋孟庸以孟類之蓋亦列國之長女但當時列國姓庸弋者無文以言之蘇氏轍曰刺無禮則稱孟言雖長而忘禮也美有禮則稱季有齊季女言雖幼而好禮也附録嚴氏粲曰此作者刺淫者謂汝言采唐而往沫邑之鄉矣然汝非為采唐而往也汝所思者思彼美好姜姓之長女也汝特託言采唐以往耳汝思孟姜而往㑹之或相期於桑中或相約於上宫或相送於淇水之上所㑹之地人皆知之見為不善於隱僻者終不可掩也我指淫者非詩人自我也爰采麥叶訖力反矣沫之北矣云誰之思美孟弋矣期我乎桑中要我乎上宫送我乎淇之上矣集傳賦也麥榖名秋種夏熟者弋春秋或作姒朱子曰春秋定姒公榖作定弋蓋杞女夏后氏之後亦貴族也爰采葑矣沫之東矣云誰之思美孟庸矣期我乎桑中要我乎上宫送我乎淇之上矣集傳賦也葑蔓菁也庸未聞疑亦貴族也集說王氏應麟曰補傳曰鄘本庸姓之國漢有庸光及膠東庸生是其後也傳氏曰孟庸當是鄘國之姓鄘為衛所滅故其後有仕於衛者總論劉氏彝曰采唐麥葑者亦是欲適幽逺行其淫亂不敢正名而託以采此也李氏樗曰以姜弋庸皆著姓衛多淫泆之事蓋有由矣惟其公族既化則下化之矣劉氏瑾曰孟姜孟弋孟庸亦託言貴族以指所私之人非必當時實有此三姓之女也附録鄧氏元錫曰桑中蓋刺之者之詩唐麥葑匪一其采沫鄉沫北沫東匪一其地孟姜孟弋孟庸匪一其姓而期而要而送如出一軌焉蓋恥心亡而淇沫之閒上宫之地風潰四流而莫可止也桑中三章章七句集傳樂記曰鄭衛之音亂世之音也比於慢矣孔氏穎達曰五聲竝和則君臣上下不失若五聲不和則君臣上下互相陵越所以為慢也比猶同也鄭音好濫淫志衛樂促速煩志竝是亂世之音故云比於慢也桑閒濮上之音亡國之音也其政散其民流誣上行私而不可止也班氏固曰衛地有桑閒濮上之阻男女亦亟聚㑹聲色生焉輔氏廣曰誣上只是欺謾其上之人大抵行私者皆有此心桑中之詩雖肆言無忌然誣上行私之心自在此皆緣民情流蕩無所限節之故民情所以如此則又因政散之故上之人苟有政事則何至於此案桑閒即此篇故小序亦用樂記之語鄭氏康成曰濮水之上地有桑閒者亡國之音於此水出也昔殷紂使師延作靡靡之樂已而自沈於濮水後師涓過焉夜聞而寫之為晋平公鼓之是之謂也劉氏瑾曰朱子以桑閒即此桑中詩而證以樂記之語然則鄭氏謂師涓所聞者自是濮上之音也集說輔氏廣曰此詩分明是淫亂者所自作只為先儒以為聖人不應取此等詩以著於經故斷以為刺奔而不復玩詩之辭以求其真是非先生孰能正之附録吕氏祖謙曰詩之體不同有直刺之者新臺之類是也有微諷之者君子偕老之類是也有鋪陳其事不加一詞而意自見者此類是也嚴氏粲曰詩記謂詩皆正樂此桑中非桑閒濮上之音今考濮水之上地有桑閒亡國之音出於此桑中即其類也詩之正經為雅樂變詩以垂戒耳非祭祀朝聘所用也然或以桑中為淫奔者所自作則非所謂止乎禮義矣當從國史所題以為刺也案詩樂章也古人皆以樂論詩荀況曰詩者中聲所止司馬遷曰三百篇夫子皆絃歌之以求合於韶武之音漢唐諸儒祖述其說而不敢易至吕祖謙以為聖人正樂首放鄭聲豈有刪詩而反取淫詞桑中之詩刺惡昭彰所謂思無邪也又史記載師曠所指濮上之音鄭康成以為濮水之上地有桑閒亡國之音於此水出焉則桑閒乃紂樂非即桑中詩也諸說皆不為無據然朱子力闢其非以為夫子於鄭衛深絶其聲於樂以為法而嚴立其辭於詩以為戒若謂桑中為刺惡者之辭則發人隱僻有傷溫厚謂出自淫奔者之口而我以無邪之思觀之其懲戒尤切而又云古樂既亡無所考正則我不敢必為之說獨以其理與其詞推之有以知其必不然耳蓋千百載後欲於三百篇中求所為中聲求所為合於韶武之音者何從而得之何如即其詞以考其實為足據集傳就本詩稱我之辭而斷為淫者所自言與古序雖異而與聖人垂戒後世之意一也鶉音純之奔奔鵲之彊彊音姜人之無良我以為兄叶虛王反集傳興也鶉䳺音諳屬寇氏宗奭曰鶉初生謂之羅鶉至初秋謂之早秋中秋以後謂之白唐一物四名也奔奔左傳作賁賁彊彊居有常匹飛則相隨之貌陸氏德明曰韓詩云奔奔彊彊乘匹之貌人謂公子頑良善也衛人刺宣姜與頑非匹耦而相從也故為惠公之言以刺之曰人之無良鶉鵲之不若而我反以為兄何哉朱氏道行曰此言無良託惠公言公子頑集說孔氏穎達曰言鶉則鶉自相隨奔奔然鵲則鵲自相隨彊彊然各有常匹不亂其類今宣姜為母頑則為子而與之淫亂失其常匹曾鶉鵲之不如矣又言人行無一善者我君反以為兄而不禁之也惡頑而責惠公之辭范氏處義曰鶉不亂其匹所以奔奔然喜鬬者惡其亂匹而鬭也鵲不淫其匹所以彊彊然難偶者傳枝授卵故能不淫也今人之不善信鶉鵲之不如矣鵲之彊彊鶉之奔奔叶逋珉反人之無良我以為君集傳興也人謂宣姜君小君也集說孔氏穎達曰夫人對君稱小君以夫妻一體言之亦得曰君輔氏廣曰詩人疾惡宣姜至矣而猶不敢不以為小君也彼謂狡童碩鼠為稱其君者何哉總論孔氏穎達曰二章皆上二句刺宣姜下二句責公不防間也鶉之奔奔二章章四句集傳范氏曰宣姜之惡不可勝道也國人疾而刺之或逺言焉或切言焉逺言之者君子偕老是也切言之者鶉之奔奔是也衛詩至此而人道盡天理滅矣中國無以異於夷狄人類無以異於禽獸而國隨以亡矣胡氏曰楊時有言詩載此篇以見衛為狄所滅之因也故在定之方中之前彭氏執中曰傅氏云木必壞然後蠧生焉國必亂然後寇生焉聖人存此詩以為狄入衛張本使後世知所戒也因以是說考於歷代凡淫亂者未有不至於殺身敗國而亡其家者然後知古詩垂戒之大而近世有獻議乞於經筵不以國風進講者殊失聖經之㫖矣集說郝氏敬曰衛風至此人道盡矣不再造不可以國故繼之以定之方中定丁佞反之方中作于楚宫揆之以日作于楚室樹之榛栗椅於宜反桐梓漆爰伐琴瑟集傳賦也定北方之宿營室星也晉天文志營室二星一曰𤣥宫一曰清廟又為土功事孔氏穎達曰釋天云營室謂之定孫炎曰定正也天下作宫室者皆以營室中為正此星昏而正中夏正十月也鄭氏康成曰定昏中而正謂小雪時孔氏穎達曰小雪者十月之中氣於此時定星昏而正中也劉氏瑾曰夏正十月建亥春秋時十二月也農事已畢可以興作而人君居必南面故亥月昏時見定星當南方之午位因記此星為每嵗營作之候又因號為營室此蓋成周以後之制上考唐虞之時定星以戌月昏中嵗久而差至周時定星始以亥月昏中下逮今日此星又以子月昏中矣朱氏公遷曰此據月令為說與堯典中星異於是時可以營制宫室故謂之營室孔氏穎達曰以方中為記時箋取爾雅為說也毛不取記時而名營室者為視其星而正南北以營宫室也朱氏公遷曰候定星順天時也楚宫楚邱之宫也孔氏穎達曰鄭志張逸問楚宫今何地答曰楚邱在濟河閒今東郡界中衛本河北至懿公滅乃東徙渡河野處漕邑則在河南矣又此二章升漕虛望楚邱楚邱與漕不甚相逺亦河南明矣故疑在東郡界中杜預云楚邱濟隂成武縣西南屬濟隂郡猶在濟北故云濟河間也揆度也樹八尺之臬音齧而度其日之出入之景以定東西又參日中之景以正南北也孔氏穎達曰此度日出日入謂度其影也故公劉傳曰考於日影是也其術則匠人云水地以懸置槷𣙗臬同以懸視以影為規識日出之影與日入之影畫參諸日中之影注云於四角立植而懸以水望其髙下高下既定乃為位於所平之地中央樹八尺之臬以懸正之視之以其影將以正四方也日出日入之影其端則東西正也又為規以識之者為其難審也自日出而晝其影端以至日入既則為規測影兩端之內規之規之交乃審也度兩交之間中屈之以指臬則南北正是揆日以正東西南北之事也匠人注度日出日入之影不假於視定而東西南北皆知之經傳未有以定星正南北者故上箋以定為記時異於傳也劉氏瑾曰彭魯叔云槷柱也懸垂繩也柱有四角四中垂以八繩繩皆附柱則其柱正矣柱正然後視之以測日景也又轉筵畫地為圓規朝識日景其端指西暮識日景其端指東兩端長短必與規齊測其端則東西正就其中屈之則南北亦可正也又於晝漏午時參此日中之景可以正南方之位因以正北方之位也此周禮定方制度衛文公建宫室定四方之法蓋亦如此朱氏公遷曰度日景審地勢也楚室猶楚宫互文以協韻耳孔氏穎達曰毛以為東西南北皆既正方乃為宫室别言宫室異其文耳榛栗二木其實榛小栗大皆可供籩實周禮饋食之籩其實栗陸氏璣曰榛栗屬皮葉如栗子小形似杼子味亦如栗范氏祖禹曰榛栗為女贄蔡氏卞曰榛小木也以為禮實則貴矣植之榛栗先禮實也蓋衛居處於漕無城市宫室君臣上下冠婚喪祭無以為禮實則於是不可不先也椅梓實桐皮桐梧桐也陸氏璣曰梓實桐皮曰椅大類同而小别也桐有青桐白桐赤桐白桐宜琴瑟蔡氏卞曰桐木之良利者也其性虛以柔故能受聲以為琴瑟嚴氏粲曰椅桐梓漆之桐為白桐梧桐生矣之桐為青桐梓楸之疏理白色而生子者鍾氏惺曰管子曰五沃之土宜白梓陳氏子龍曰齊民要術云白色青角者為梓或名角楸又名子楸蕭炳云梓樹似桐而葉小花紫漆木有液黏念平聲黑可飾器物許氏慎曰漆木汁可以䰍音休物象形漆如水滴而下蘇氏頌曰漆木髙二三丈皮白葉似椿花似槐子若牛李六七月以竹筒針入木中取之四木皆琴瑟之材也鄭氏康成曰樹木於宫中者其長大可伐以為琴瑟也范氏處義曰椅桐梓漆止言爰伐琴瑟蓋舉其用之重可以備禮樂者言之嚴氏粲曰榛栗可備籩實梓漆可供器用但言伐琴瑟者取成句耳朱氏公遷曰飭種樹備國用也爰於也衛為狄所滅文公徙居楚邱營立宫室國人悅之而作是詩以美之蘇氏曰種木者求用於十年之後其不求近功凡此類也范氏祖禹曰美其新造而志於永久集說鄭氏康成曰魯僖公二年齊桓公城楚邱而封衛孔氏穎達曰春秋正月城楚邱榖梁傳云不言城衛衛未遷則諸侯先為之城其城文公乃於其中營宫室也建城在正月則作室亦正月矣而云得時者左傳曰凡土功水昏正而栽杜預注定星昏而中於是樹板幹而興作日至而畢則冬至以前皆為土功之時僖二年閏在正月之後正月之初未冬至故為得時也毛以為定星正南北作楚邱之宫度日知東西作楚邱之室鄭以為於定之方中之時作楚邱之宫又度日影而營表其位正其東西南北而作楚邱之室室與宫俱於定星中而為之同度日影而正之各於其文互舉一事耳范氏處義曰定之方中謂視營室之中以為興作之始揆之以日為度日影之正以知向背之宜輔氏廣曰古人作室上順天時下正方靣不敢苟也劉氏瑾曰此章上四句言其得天時地理之宜下三句言其有久逺預備之計所謂悅之美之者皆追述其事如此也朱氏善曰遷國之初城郭不可以不完宫室不可以不修器用不可以不備文公之遷楚邱也以言其城郭則既賴諸侯之師以成之矣以言其宫室則自戴公野處而至於今成之不可不亟也而文公為民力之不可或傷則寧待其時而不速為國法之不可或廢則寧從其制而不苟若乃器用之所資其所需者非一事乃於是而種木焉以創造之初其潤色之功正有待於十年之後非其心之塞實淵深不足以致此若文公者其亦可謂賢矣附録毛氏萇曰方中昏正四方度日出日入以知東西南視定北準極以正南北鄭氏康成曰楚宫謂宗廟也楚室居室也君子將營宫室宗廟為先廏庫為次居室為後升彼虛起居反叶起吕反矣以望楚矣望楚與堂景山與京叶居良反降觀于桑卜云其吉終焉允臧集傳賦也虛故城也毛氏萇曰虛漕虛也孔氏穎達曰文公自漕徙楚邱故知升漕墟蓋地有故墟高可登之以望猶僖公二十八年左傳稱晉侯登有莘之墟也楚楚邱也堂楚邱之㫄邑也毛氏萇曰楚邱有堂邑者孔氏穎達曰升虛而并望楚堂明其相近故言楚邱有堂邑楚邱本亦邑也但今以為都故以堂繫楚邱而言之傅氏寅曰堂是今博州堂邑博濮二州連境景測景以正方靣也與既景乃岡之景同劉氏瑾曰建國之制必先辨方辨方之法必考日景故謂之景朱氏公遷曰上章揆之以日是定其基址此言景者未定居時覽山川之形勢或曰景音璟山名見商頌王氏應麟曰水經注河水分濟北徑景山東又北徑楚邱城西京髙邱也孔氏穎達曰邱者自然而有京者人力所為形則相類故云京髙邱也蘇氏轍曰有陵阜可以屏蔽其國桑木名葉可飼蠶者觀之以察其土宜也蔡氏卞曰兗地宜桑如桑閒濮上可驗也劉氏瑾曰衛詩多言桑如桑中與氓詩及此皆再三言之蓋衛地跨冀兗二州桑者尤其土所宜而民生之所資也據楚邱在冀河之東兗州之境則文公所觀所說其桑土之野乎黃氏一正曰降觀于桑桑宜肥土桑盛則地美也允信臧善也王氏安石曰卜言吉遂建城市而營宫室允臧者言今信善如卜所云也此章本其始之望景觀卜而言以至於終而果獲其善也集說鄭氏康成曰文公將徙登漕之虛以望楚邱觀其㫄邑及其邱山審其高下所依倚乃後建國焉慎之至也孔氏穎達曰形勢得宜蠶桑茂美可以居民矣人事既從乃命龜卜之云從其吉終焉信善焉劉氏彝曰建國之初憂民之不得其所不敢遑寧曰終焉允臧者喜其果遂於志願也吕氏祖謙曰升彼虛矣以領略其大勢降觀于桑以細察其土宜輔氏廣曰既正其方靣也又覽其形勢也又察其土宜也然後卜之則始之吉而終之臧宜矣朱氏善曰望者登高而望形勢也景者測景以正方靣也觀者觀之以察其土宜也卜者問焉以決其吉凶也始之以望景觀卜所以求得乎善也繼而終焉允臧則是果獲乎善也徐氏鳳彩曰此作室以前事也登故城以望楚邱自逺以觀其大勢望楚而兼及於堂而夾輔之勢成景山而兼及於京而山邱之位正然後降而觀桑桑盛則土美可知又協以神謀見處事之慎也靈雨既零命彼倌音官人星言夙駕說始鋭反于桑田叶徒因反匪直也人秉心塞淵叶一均反騋音來牝三千叶倉新反集傳賦也靈善零落也李氏樗曰靈雨好雨也黃氏一正曰靈雨瑞雨降而應物者也鄒氏泉曰時雨既降正土膏脉動人務農桑之時倌人主駕者也孔氏穎達曰以命之使駕故知主駕者諸侯之禮亡未聞倌人為何官也星見星也鄭氏康成曰雨止星見范氏處義曰謂戴星命駕朱子曰古人戴星而出戴星而入必是身耐勞苦方能率得人說舍止也嚴氏粲曰說止於桑田之野以勞勸之秉操塞實淵深也孔氏穎達曰秉操其心能誠實且復深逺謝氏枋得曰秉心也實故事事朴實秉心也淵故事事深長鄒氏泉曰懷國家根本之圖而不事乎虛文所以為塞實建國家久逺之䇿而不狃乎近慮所以為淵深馬七尺以上為騋孔氏穎達曰三千言其總數國馬供用牝牡俱有或七尺六尺舉騋牝以互見故言騋馬與牝馬也蘇氏轍曰春秋傳文公元年革車三十乘季年乃三百乘而此言三千者蓋其可用者三百乘而其牝牡則三千也言方春時雨既降而農桑之務作文公於是命主駕者晨起駕車亟音棘往而勞勸之然非獨此人所以操其心者誠實而淵深也蓋其所畜之馬七尺而牝者亦已至於三千之衆矣蓋人操心誠實而淵深則無所為而不成其致此富盛宜矣記曰問國君之富數馬以對今言騋牝之衆如此則生息之蕃可見而衛國之富亦可知矣此章又要其終而言也集說王氏安石曰上既言城市宫室於是言其政事蓋人君辨方正位體國經野然後可以施政事云蘇氏轍曰文公勤於民事雨既止見星而駕以行舍于桑田矣是以民說而稱之曰是人也其心充實而淵深則宜有騋牝三千也言富彊之業必深厚者為之非輕揚淺薄者之所能致耳輔氏廣曰此章乃要其後日之終而言觀其始之經營其國者如此其備繼之勸勞於民者如此其勤則其終之善與富亦宜矣黃氏一正曰惟其秉心塞淵則所行皆切實深逺之事故不特勤於農桑而且使馬之蕃庶至騋牝者三千矣方氏應龍曰因靈雨而說桑田恐積衰之民易於懈怠而久敝之後不宜再殃故勤者勸之惰者激之此為國家根本之慮萬民衣食之謀故以塞淵接下三千騋牝亦舉一端以驗富庶非専指此事也附録黃氏櫄曰匪直也人蓋詩人言而形容不能盡為不直其為人也如此而其所以秉心者又誠實而無僞淵深而不淺所以能治國家嚴氏粲曰是文公能務農重本以蕃育其人也非特人也文公操心塞實淵深故能致國富彊總論孔氏穎達曰作定之方中詩者美衛文公也文公徙居楚邱之邑始建城使民得安處始建市使民得交易而營造宫室既得其時節又得其制度百姓喜而悅之民既富饒官亦充足致使國家殷實而富盛焉故百姓美之徙居楚邱即二章升虛望楚是也營宫室者即首章作楚宫楚室是也建城市經無其事因徙居而始築城立市故連言之也程子曰一章言建國之事次章方言相土度地之初屬文之勢然也今文首言其事然後言其初者多矣既度其可然後卜以決之卜洛亦然人謀臧則龜筮從矣卒章則叙其勤勞以致殷富劉氏瑾曰春秋紀事用月定星中時乃周之十二月衛懿公九年十二月狄滅衛戴公立而卒文公繼立以次年為元年至文公二年嵗首之月齊桓始城楚邱則詩人所指定星方中其在文公元年之終楚邱未城之先歟然詩言終焉允臧騋牝三千則是詩蓋作於文公之季年而追言其始遷時一事耳故二章以前皆本其始二章以後則要其終也沈氏守正曰營建時不忘惜民樹木又取有用無非逺慮而營建以前恁地詳審才營建了又恁地勤民皆是秉心塞淵處故舉騋牝以見富庶見得操心之要如此案嘗讀康誥酒誥梓材三篇而歎武王之訓康叔也開國承家之道可謂至矣及後子孫不克祗遵先王之懿訓而敗德是聞馴至政散民流鶴軒致滅文公仗齊桓之力乃築楚邱史稱其輕賦平罪身自勞與百姓同苦以收衛民今觀定中一詩占天時審土宜盡人力規模宏逺經營具備而尤以農桑為立國之本戎馬為富彊之資巡行不怠蕃育有方使康叔開國之模復見於播遷之後而詩人推本自塞淵中來可見一心為萬事根本衛業所由重興也及春秋之季孔子適衛殷然思所以富之教之夫孰非文公生聚之所貽歟定之方中三章章七句集傳案春秋傳衛懿公九年冬狄入衛懿公及狄人戰于熒澤而敗死焉宋桓公迎衛之遺民渡河而南立宣姜子申以廬於漕是為戴公是年卒立其弟燬是為文公於是齊桓公合諸侯以城楚邱而遷衛焉文公大布之衣大帛之冠務材訓農通商惠工敬教勸學授方任能元年革車三十乘季年乃三百乘左傳閔公二年冬十二月狄人伐衛衛懿公好鶴鶴有乘軒者將戰國人受甲者皆曰使鶴鶴實有祿位余焉能戰公與石祁子玦與寧莊子矢使守曰以此贊國擇利而為之渠孔御戎子伯為右黃夷前驅孔嬰齊殿及狄人戰于熒澤衛師敗績遂滅衛衛侯不去其旗是以甚敗狄入衛遂從之又敗諸河宋桓公逆諸河宵濟衛之遺民男女七百有三十人益之以共滕之民為五千人立戴公以廬於曹許穆夫人賦載馳齊侯使公子無虧帥車三百乘甲士三千人以戍曹歸公乘馬祭服五稱牛羊豕雞狗皆三百與門材歸夫人魚軒重錦三十兩僖之二年封衛於楚邱集說孔氏穎達曰衛東徙渡河齊桓公攘狄而封之立文公焉國家殷富在文公末年故左傳曰季年乃三百乘明騋牝三千亦末年之事也此詩蓋末年始作東徙渡河則戰在河北禹貢豫州滎波既豬注云沇水溢出河為澤今塞為平地滎陽民猶謂其處為滎澤在縣東春秋衛及狄戰于滎澤此其地也如禹貢注則當在河南時衛都河北狄來伐而禦之既敗而渡河在河北明矣故杜預云此滎澤當在河北但沇水發源河北入於河乃溢為滎則沇水所溢被河南北故河北亦有滎澤但在河南多耳故指其豬水犬處則在豫州此戰于滎則在其北也吕氏祖謙曰鼂錯言古之徙逺方以實廣虛也相其隂陽之和嘗其水泉之味審其土地之宜觀其草木之饒然後營邑立城此蓋古之遺法定之方中公劉所載是也蝃丁計反蝀都動反在東莫之敢指女子有行逺于萬反父母兄弟叶待里反集傳比也蝃蝀虹也陸氏德明曰蝃蝀爾雅作螮蝀音同孔氏穎達曰釋天云螮蝀謂之雩螮蝀虹也郭璞曰俗名為美人音義云虹雙出色鮮盛者為雄雄曰虹暗者為雌雌曰霓日與雨交倏然成質似有血氣之類乃隂陽之氣不當交而交者蓋天地之淫氣也蔡氏卞曰霓為挈二二蓋言二淮南子曰天二氣則成虹劉氏辰翁曰何獨非隂陽之交而虹獨以不正之氣著見於野詩之託物如此在東者莫音暮虹也虹隨日所映故朝西而莫東也劉氏熙曰蝃蝀其見每於日在西而見於東啜飲東方之水氣也見於西方曰升朝日始生而出見也劉氏瑾曰虹之為質不映日不成蓋雲薄漏日日映雨氣則生也今以水噀日亦成青紅之暈此刺淫奔之詩言蝃蝀在東而人不敢指以比淫奔之惡人不可道况女子有行又當逺其父母兄弟豈可不顧此而冒行乎集說毛氏萇曰夫婦過禮則虹氣盛君子見戒而懼諱之莫之敢指孔氏穎達曰言虹氣見於東方為夫婦過禮之戒女子有適人之道當自逺其父母兄弟於禮當嫁何憂於不嫁而為淫奔之過惡乎程子曰蝃蝀隂陽氣之交映日而見故朝西而暮東在東者隂方之氣就交於陽也夫陽倡隂和男行女隨乃理之正今隂來交陽人所醜惡故莫敢指之女子之奔猶蝃蝀之東人所醜也吕氏祖謙曰女子有行逺父母兄弟此詩蓋言女子終當適人非久在家者何為而犯禮也泉水竹竿蓋衛女思家言女子分當適人雖欲常在父母兄弟之側不可得也一則欲常居家而不可得一則欲亟去家而不能得其善惡可見矣朝隮子西反于西崇朝其雨女子有行逺兄弟父母叶滿補反集傳比也隮升也周禮十輝音運九日隮注以為虹蓋忽然而見如自下而升也周禮春官眂祲掌十輝之法以觀妖祥辨吉凶一曰祲二曰象三曰鐫四曰監五曰暗六曰瞢七曰彌八曰叙九曰隮十曰想鄭康成注隮虹也孔氏穎達曰隮言升氣者以隮升也由升氣所為故號虹為隮十輝注云輝謂日光氣也則隮亦日之光氣崇終也從旦至食時為終朝言方雨而虹見則其雨終朝而止矣蓋淫慝之氣有害於隂陽之和也今俗謂虹能截雨信然輔氏廣曰淫慝之氣害隂陽之和以比淫奔之惡害人道之正蓋理所不容也集說蔡氏卞曰朝氣之升自西則非雨矣雖幸而雨亦莫能久也崇朝其雨言其雨崇朝而已張氏栻曰蝃蝀見則雨止初無東西之分驗之多矣隂陽和則成雨隂氣方凝聚而日氣自他方來感不以正隂受其感其正反為之解散故雨不能成也嚴氏粲曰女子出適於人自當與父母兄弟相逺所貴得禮之正耳彼蝃蝀淫氣暫見而旋滅不能為雨猶違禮相從暫合而易離也乃如之人也懷昏姻也大無信叶斯人反也不知命叶彌并反也集傳賦也乃如之人指淫奔者而言婚姻謂男女之欲程子曰女子以不自失為信命正理也言此淫奔之人但知思念男女之欲是不能自守其貞信之節而不知天理之正也程子曰人雖不能無欲然當有以制之無以制之而惟欲之從則人道廢而入於禽獸矣以道制欲則能順命輔氏廣曰道即是理理即是命以道制欲則能順命去其人欲則能循乎天理矣集說王氏安石曰男女之欲性也有命焉君子不謂性也今也從欲而不知命有所制此之謂不知命也嚴氏粲曰詩人言乃如是淫奔之人也思昏姻之事也不待父母之命媒妁之言是無信而不自守也命言所賦之分謂男女居室自有分定今不安其分而淫奔是不知命也張氏彩曰前猶託諷此章則直刺之總論許氏謙曰此詩前二章刺女子後章兼刺男女衛國淫邪一轉移閒民之知義乃如此且其辭非止論事常言而達理知命真君子之言也朱氏公遷曰一章賤之二章惡之三章深責之蝃蝀三章章四句集說孔氏穎達曰作蝃蝀詩者言能止當時之淫奔衛文公以道化其民使皆知禮法以淫奔者為恥其有淫之恥者國人皆能惡之不與之為齒列故人皆恥之而自止也范氏處義曰蝃蝀之詩謂之止奔則國人有厭亂者矣衛文公以道化其民雖與文王道化行相逺然敬教勸學春秋賢君有所不能宜乎化民有恥亦幾於惡無禮之氣象也張氏栻曰宣公無道國人化之讀桑中之詩無恥如此文公復國一以身率下於是無禮者見惡於相鼠淫奔者不齒於蝃蝀下所趨向繫於一人如此相息亮反鼠有皮叶蒲何反人而無儀叶牛何反人而無儀不死何為叶吾何反集傳興也相視也鼠蟲之可賤惡者言視彼鼠而猶必有皮可以人而無儀乎鄭氏康成曰儀威儀也陸氏佃曰今一種鼠見人則交其前兩足而拱謂之禮鼠亦或謂之拱鼠吕氏祖謙曰韓愈聨句云禮鼠拱而立人而無儀則其不死亦何為哉朱氏公遷曰此甚言人不如物而以有無二字為興集說鄭氏康成曰人以有威儀為貴今反無之傷化敗俗不如其死無所害也相鼠有齒人而無止人而無止不死何俟叶羽已反又音始集傳興也止容止也俟待也集說鄭氏康成曰孝經曰容止可觀無止則無禮節也相鼠有體人而無禮人而無禮胡不遄死叶想止反集傳興也體支體也孔氏穎達曰上云有皮有齒已指體言之明此言體非遍體也故為支體遄速也集說禮記禮運孔子曰夫禮先王以承天之道以治人之情故失之者死得之者生詩曰相鼠有體人而無禮人而無禮胡不遄死方氏逄辰曰禮本天道故先王制禮還以承天之道禮出人情故先王制禮還以順人之情人之所欲莫甚於生所惡莫甚於死禮之得失遂有生死之道此其所以為急歟總論歐陽氏修曰鼠有皮毛以成其體而人反無威儀容止以自飭其身曾鼠之不如也人不如鼠則何不死爾此甚嫉之之辭也三章之意皆然更無他意范氏處義曰鼠雖微物猶有皮以被其外猶有齒以飬其內猶具四體以全其形今在位之人無威儀容止不知有禮則生無禮則死是人不如鼠也疾惡之甚以見清議之不可犯遷善改過不可不力也吕氏祖謙曰相鼠之惡無禮何其如是之甚也蓋溺於淫亂之俗不如是則不足以自拔也疾惡不深則遷善不力嚴氏粲曰凡獸皆有皮齒體獨言鼠舉卑汚可惡之物以惡人之無禮也相鼠三章章四句集說孔氏穎達曰作相鼠詩者刺無禮也衛羣臣有承先君之化無禮儀者由文公能化之使有禮而刺其無禮者所以美文公也輔氏廣曰蝃蝀相鼠二詩皆文公之化行而人心去邪反正見國人之淫奔在位之無禮為可惡而作故其辭意比他詩特為嚴厲然亦未嘗不止於禮義也孑孑居熱反干旄在浚蘇俊反之郊叶音高素絲紕符至反之良馬四之彼姝赤朱反者子何以畀必寐反之集傳賦也孑孑特出之貌干旄以旄牛尾注於旗干之首而建之車後也孔氏穎達曰干旄者注旄於干首李巡曰旄牛尾著干首郭璞曰載旄於竿頭如今之幢亦有旒也浚衛邑名邑外謂之郊紕織組也蓋以素絲織組而維之也孔氏穎達曰以素絲為線縷所以縫紕旌旗之旒縿也縿謂繫於旌旗之體旒謂縿末之垂者須以縷縫之使相連四之兩服兩驂董氏逌曰馬在車中為服在車外為驂凡四馬以載之也姝美也子指所見之人也畀與也言衛大夫乘此車馬建此旌旄以見賢者彼其所見之賢者將何以畀之而答其禮意之勤乎集說鄭氏康成曰周禮孤卿建旃大夫建物首皆注旄焉時有建此旄來至浚之郊卿大夫好善也程子曰注旄干首九旗皆然九旗之物所建各不同若王建太常諸侯建旗孤卿建旃大夫士建物是也云旄云旟云旌皆通言耳謂卿大夫建旗而來就浚之郊禮下賢者黃氏佐曰大夫平日之行未嘗不建干旄乘車馬今則為見賢而建之乘之也則好善有誠矣附録程子曰素絲束帛也謂以束帛乘馬行禮於賢者蘇氏轍曰素絲良馬所以贈之也孑孑干旟在浚之都素絲組音祖之良馬五之彼姝者子何以豫音與之集傳賦也旟州里所建鳥隼之旗也上設旌旄其下繫斿音由斿下屬音燭縿音衫皆畫鳥隼也周禮司常鳥隼為旟考工記鳥旟七斿以象鶉火孔氏穎達曰二章言干旟旟亦有旄五文也言旄則有旒縿言旟則亦有旄矣朱氏善曰鳥隼於旟畫鳥隼為飾以其注旄於干首謂之干旄以其析夏翟之羽以為綏謂之干旌其實皆旟也下邑曰都朱子曰都居民所聚也何氏楷曰以前後章推之則都在郊之內在城之外也五之五馬言其盛也集說許氏謙曰凡旗自王以下各有所建旗上所畫則各有其物旟畫鳥隼鳥與隼二物也縿及旒皆畫之或者以為大司馬百官載旟乃卿大夫仲秋教治兵所建而司常州里建旟亦大閲時也見賢載旟無明文以疑此詩然司常下文明言賔客亦如之而陳祥道曰州里建旟者州里之常百官載旟者一時之事軍國之容固不同耳此詩干旟乃是箋所謂州長之屬疏所謂鄉內州長黨正遂內酇長里宰鄰長等同建者也黃氏一正曰百官載旟旟雖州里所建而百官皆得建之也四馬一車定制上下相同者也今曰五之六之蓋出郊逺行而外有所備也孑孑干旌在浚之城素絲祝之良馬六之彼姝者子何以告姑沃反之集傳賦也析羽為旌干旌蓋析翟羽設於旗干之首也孔氏穎達曰孫炎曰析五采羽注旄上則干之首有旄有羽也故周禮夏采注云夏采夏翟羽色禹貢徐州貢夏翟之羽有虞氏以為綏後世或無故染鳥羽象而用之謂之夏采蘇氏轍曰注旄而不設旒縿曰旌城都城也祝屬也王氏安石曰組成而祝之故初言紕中言組終言祝六之六馬極其盛而言也程子曰馬四至於五六馬之益多見其禮之益加也徐氏光啓曰駕車用四馬固是常制然漢制太守駟馬其加秩中二千石乃益右驂故太守稱五馬書曰若朽索之馭六馬則五之六之想古有此制集說朱子曰五之六之取協韻耳亦極言其車馬之盛見其位高勢重而能降屈於賢者如此非心誠好善不能也總論孔氏穎達曰三章皆上四句言文公臣子建旌乘馬數往見賢者於浚邑是好善下二句言賢樂告以善道王氏安石曰以素絲良馬以見賢者臣子之好善也文公之臣子好善如此亦以文公故也故曰一國之事繫一人之本謂之風李氏樗曰在郊在都在城以言其賢者之所在故以干旄旟旌而就見之也王氏柏曰干旄之作以見尚賢樂善猶為中興之本許氏謙曰一章三章旄旌皆因旟而言紕者縫之也組者飾之也祝者維之也朱氏公遷曰禮著於外意本於中車服之盛如此則好善有誠矣賢者之忠告當何如哉詩人所以預為之謀也以良馬四之五之六之為次序也郝氏敬曰詩美好善而但言車旗何也衛自中衰諸大夫艱難再造改圖修省以志於善是以文物一新夫浚邑豈乏姝子而干旄在郊則是此大夫始也詩人不貴有姝子而貴有此大夫故盛稱其車旗所謂見羽旄之美聞車馬之音欣欣有喜色者也篇末更屬望姝子則大夫益增重矣干旄三章章六句集傳此上三詩小序皆以為文公時詩蓋見其列於定中載馳之閒故爾他無所考也然衛本以淫亂無禮不樂善道而亡其國今破滅之餘人心危懼正其有以懲創往事而興起善端之時也故其為詩如此蓋所謂生於憂患死於安樂者小序之言疑亦有所本云集說范氏處義曰樂取諸人為善虞之所以為盛帝善人是富周之所以為顯王為人君而好善固為可美為臣下而好善尤為可美也故鄭武公善善之功詠之於詩一個臣之休休有容載之於書蓋為臣子而不好善則疾賢忌能俾之不達人君雖有好善之心亦阻格而不行此干旄之樂告所以美衛之臣而不及文公也劉氏瑾曰衛俗淫亂無禮不好善道以致亡國君臣上下蓋嘗溺於三者之中而不知矣逮其滅亡之餘懲往事而興善念於是淫亂者有蝃蝀之刺無禮者有相鼠之惡樂善道者又有干旄之詩非文公之更化何以臻此朱氏善曰大夫之乘車馬建旌旄而來者乃朝夕與君圖議國政者也聞浚之郊有賢人焉駕言適野而往從之賢者以其所學而告之大夫大夫以其所聞入而告之君君復以其所聞而謀之卿大夫而施之政事則豈惟一人賴之將舉國之人實賴之矣味其辭氣蓋與星言夙駕之意相類亦與敬教勸學授方任能之意相表裏序以為文公時詩亦豈無所本與載馳載驅叶祛尤反歸唁衛侯驅馬悠悠言至於漕叶徂侯反大夫跋蒲末反涉我心則憂集傳賦也載則也弔失國曰唁孔氏穎達曰昭公二十五年榖梁傳云弔失國曰唁若對弔死曰弔則弔生曰唁悠悠逺而未至之貌草行曰跋孔氏穎達曰左傳云跋涉山川跋本行草之名行山必有草故山行亦曰跋水行曰涉宣姜之女為許穆公夫人王氏應麟曰春秋譜曰許姜姓堯四嶽伯夷之後周封其苗裔文叔於許今潁川許昌是也自文叔至莊公十一世始見春秋閔衛之亡馳驅而歸將以唁衛侯於漕邑蘇氏轍曰列國之詩皆以世為先後今載馳之一章曰言至於漕戴公之詩也而列於文公之下蓋傳者失之矣朱子曰此詩之作在定之方中之前則未知其為戴公時歟文公時歟未至而許之大夫有奔走跋涉而來者夫人知其必將以不可歸之義來告故心以為憂也既而終不果歸乃作此詩以自言其意爾嚴氏粲曰首章婉而未露也集說輔氏廣曰據此詩所言則是許穆夫人既已馳驅而歸欲唁衛侯於漕邑而許之大夫乃追之於路而告之以不可歸之義夫許大夫何不告而止之於欲行之時乎想夫人傷宗國之亡不能為懷既請於穆公故遂行焉既而許之大夫國人皆以為不可遂請於穆公而追而止之耳觀夫人見其大夫之至亦知其必將以不可歸之義來告而心以為憂則夫人之行亦固知其於義有不可者矣特以惻怛之情有不能自止者耳鄒氏泉曰此章上四句言為歸唁之行下言切見阻之憂也至漕是擬言之猶未至漕也曰至漕者時衛侯渡河而處漕也陳氏推曰歸唁云者一則奔走赴亂一則圖謀恢復此惟歸始得盡耳附録孔氏穎達曰夫人言已欲往歸於宗國以唁衛侯故願悠悠逺行疾至於漕邑我所以思願如是者以衛大夫跋涉而告難於我我心則憂閔其亡傷不能救故且驅馳而唁之既不我嘉不能旋反視爾不臧我思不逺既不我嘉不能旋濟視爾不臧我思不閟集傳賦也嘉臧皆善也嚴氏粲曰善猶是也猶孟子王如善之也逺猶忘也鄧氏元錫曰視爾則不我嘉然我揆所思亦各有道焉不逺也濟渡也自許歸衛必有所渡之水也閟閉也止也言思之不止也言大夫既至而果不以我歸為善則我亦不能旋反而濟以至於衛矣雖視爾不以我為善然我之所思終不能自已也李氏樗曰不能旋濟者言歸衛必濟水也不閟者言我思常在目前也嚴氏粲曰言爾未必是我未必非始微露已有意見與許人别而猶未遽言之也集說王氏安石曰宗廟顛覆變之大者人情之至痛也夫人致其思如此然後盡於人心夫人致其思大夫致其義非先王之澤孰能使人如此鄒氏泉曰總是叙其行有所制而情不能已也上章追而未至知有所制而憂此章告而欲止果有所制而思陟彼阿丘言采其虻音盲叶謨郎反女子善懷亦各有行叶户郎反許人尤之衆稚直吏反且狂集傳賦也偏高曰阿丘孔氏穎達曰偏高阿丘釋邱文李巡曰謂邱邉高虻貝母主療鬱結之疾孔氏穎達曰陸璣疏云虻今藥草貝母也其葉如栝樓而細小其子在根下如芋子正白四方連纍相著有分解是也嚴氏粲曰本草云治心中氣不快多愁鬱者殊有功善懷多憂思也猶漢書云岸善崩也溝洫志引洛水至商顔下岸善崩行道尤過也又言以其既不適衛而思終不止也故其在塗或升高以舒憂想之情或采虻以療鬱結之疾蓋女子所以善懷者亦各有道而許國之衆人以為過則亦少不更事而狂妄之人爾許人守禮非稚且狂也但以其不知已情之切至而言若是爾然而卒不敢違焉則亦豈真以為稚且狂哉嚴氏粲曰至是始慨然責之而不得不言其情矣下章發之集說范氏處義曰虻可以療鬱結之疾夫人思歸中懷鬱結故欲采虻以療之既而自謂我女子所懷之事亦欲各行其志耳許人何為以我為過豈皆幼稚狂惑不能知我之志乎吕氏祖謙曰言女子雖多懷思然今之所以迫切者亦各有道他人不知則以為女子情性之常而尤之也衆稚且狂非真指許人以為稚狂蓋言我憂患如此之迫切彼方且尤我之歸意者衆人其幼稚乎其狂惑乎不然何其不相體悉一至於是也我行其野芃芃蒲紅反其麥叶訖力反控苦貢反于大邦誰因誰極大夫君子無我有尤叶于其反百爾所思叶新齎反不如我所之集傳賦也芃芄麥盛長貌控持而告之也因如因魏莊子之因左傳襄公四年無終子使孟樂如晉因魏莊子納虎豹之皮以請和諸戎極至也大夫即跋涉之大夫君子謂許國之衆人也又言歸途在野而涉芄芃之麥又自傷許國之小而力不能救故思欲為之控告于大邦而又未知其將何所因而何所至乎黃氏一正曰誰因恐所因非其人而無救衛之心也誰極恐所至非其國而無救衛之力也大夫君子無以我為有過雖爾所以處此百方然不如使我得自盡其心之為愈也王氏安石曰終欲歸唁之辭輔氏廣曰蓋欲其察我之情而憐我之志耳集說蘇氏轍曰許人雖尤之而其心不已故告其君子曰無我有尤雖竭爾思慮以為我謀衛不如使我一往親見之也嚴氏粲曰末章乃言其情謂若我自歸則將不憚勞苦以控告於大國而求其能救衛者諸國之中誰可因藉誰肯來至多方圖之必有所濟也赴難乞師本非女子之事諷許人當為告急於方伯不當坐視其亡至哀至切之情也其後齊桓卒救衛而存之然後信夫人所思為有理矣總論嚴氏粲曰味詩之意夫人蓋欲赴訴於方伯以圖救衛而託歸唁為辭序言自傷不能救得之矣朱氏善曰宗國顚覆而不知恤有人心者宜不若是恝也然而義有重於亡者獨且奈之何哉宜其思之至切也載馳四章二章章六句二章章八句集傳事見春秋傳見閔公二年舊說此詩五章一章六句二章三章四句四章六句五章八句孔氏穎達曰此實五章左傳叔孫豹鄭子家賦載馳之四章義取控引大國今控于大邦乃在卒章言賦四章者杜預云并賦四章以下賦詩雖意有所主欲為首引之勢并上章而賦之也蘇氏合二章三章以為一章蘇氏轍曰四章一章三章章六句二章四章章八句以春秋傳叔孫豹賦載馳之四章義取控于大邦非今之四章故也案春秋傳叔孫豹賦載馳之四章而取其控于大邦誰因誰極之意與蘇說合今從之范氏曰先王制禮父母沒則不得歸寧者義也雖國滅君死不得往赴焉義重於亡故也孔氏穎達曰禮諸侯夫人父母終惟得使大夫問於兄弟有義不得歸是以許人尤之集說朱子曰載馳詩煞有首尾委曲詳盡非大段㑹底說不得聖人録泉水於前所以著禮之經列載馳於後所以盡事之變夫宗國覆滅莫大之變顧以父母既終而不得歸則事變之微於是者可知矣然則許穆夫人亦賢矣哉宣姜生衛文公宋桓夫人許穆夫人衛夀子以此觀之則人生自有秉彞不係氣類許氏謙曰案閔公二年冬十有二月狄入衛宋桓公立戴公以廬於漕許穆夫人賦載馳是年戴公卒而文公立然則戴公之立與卒在一月之閒耳周十二月今十月也是采虻與麥之芃芃皆非其時特託意以言之如卷耳草蟲之類不必以為實然也蓋夫人欲歸唁衛知於義不可而極其思託意賦此詩也鄘國十篇二十九章百七十六句衛一之五集說王氏應麟曰地理志河內朝歌縣紂所都康叔所封更名衛左傳祝他曰分康叔封畛塗所徑也土略界也自武父衛北界以南及圃田鄭藪名之北竟封於殷虛吕氏曰衛自康叔受封至君角凡四十世地理志成公徙於帝邱今濮陽是也秦并天下猶獨置衛君凡九百年最後絶瞻彼淇奧於六反緑竹猗猗於宜反叶於何反有匪君子如切如磋七何反如琢如磨瑟兮僩遐版反兮赫兮喧況晚反兮有匪君子終不可諼況元反叶況逺反兮集傳興也淇水名奧隈也爾雅崖內為奧外為隈劉氏彞曰奧謂水涯彎曲之地緑色也淇上多竹漢世猶然所謂淇園之竹是也劉氏瑾曰漢志武帝塞瓠子決河薪柴少乃下淇園之竹以為楗音建又寇恂傳伐淇園之竹為矢百餘萬猗猗始生柔弱而美盛也程子曰猗猗言竹之態匪斐通文章著見之貌也王氏安石曰考工記曰且其匪色匪者有文章之謂也君子指武公也孔氏穎達曰武公和僖侯子治骨角者既切以刀斧而復磋以鑢鐋治玉石者既琢以槌鑿而復磨以沙石言其德之修飭有進而無已也朱子曰切琢皆裁物使成形質也磋磨皆治物使其滑澤也切而復磋琢而復磨言治之有叙而益致其精也陳氏淳曰切是窮究事物之理逐件分析有倫有序磋是講究到純熟道理瑩徹所以如切而又如磋琢是克去物欲之私使無瑕纇磨是磨礲至那十分純粹處所以如琢而又如磨瑟矜莊貌僩威嚴貌曹氏粹中曰瑟縝密也如瑟彼玉瓚之瑟范氏處義曰說文曰晉魏之閒謂猛為僩蓋懦則無立猛則能立事喧宣著貌諼忘也衛人美武公之德而以緑竹始生之美盛興其學問自修之進益也輔氏廣曰以緑竹始生之美盛興武公學問自修之進益遂言其威儀之盛而盛德至善民不能忘則固已極其始終而言之矣方氏應龍曰本章以竹起興甚有意蓋竹內虛外剛清徑不染有似心體故取以為興大學傳曰如切如磋者道學也如琢如磨者自修也問道學自修此詩人美武公之本㫖耶朱子曰武公大假是有學問底人抑之一詩義理精密詩中如此者甚不易得問大學傳引此詩而以道學自修釋之與論語子貢所引不同何也曰古人引詩斷章取義姑以發已之志或疏或密或同或異蓋不能同也瑟兮僩兮者恂栗也赫兮咺兮者威儀也有斐君子終不可諼兮者道盛德至善民之不能忘也集說毛氏萇曰武公質美德盛有康叔之餘烈治骨曰切象曰磋玊曰琢石曰磨道其學而成也聽其規諌以自修如玊石之見琢磨也孔氏穎達曰此四者皆言內有其德外見於貌大同而小異也瑟是外貌莊嚴僩是內心寬裕赫有明德赫然是內有其德故發見於外也咺威儀宣著皆言外有其儀明內有其德故釋訓與大學皆云恂栗威儀也程子曰淇奧之地潤澤膏沃而生緑竹竹生物之美者興武公之美內充而文章威儀著於外也首章言德美文章由善學自治而然范氏處義曰詩人謂武公之德見於文章者如竹之始盛由切磋琢磨之致切磋者以利器攻骨角而成其文喻武公能受人之規諌以成其德也琢磨者以玊石就錯礪而成其器喻武公以禮自防而成其德也武公能資諸人盡諸已者如此所以內而能恂栗知其志氣之有立也外而有威儀知其聲聞之不息也自非盛德至善何以有此文章宜民之愛之終不能忘也黃氏櫄曰言其德愈足而武公之心愈不自足又從而日新日日新又日新如切磋琢磨之不能自已也惟其不能自已故盛德發見於容貌而有寬厚溫粹之美斯民見之自有不能忘者饒氏魯曰有匪君子詳此文勢是說已做成君子之人言君子之所以斐然有文者其初自切磋琢磨中來嚴氏粲曰骨象玊石雖美材非磨礲不成器亦猶人有美質必問學以成德問學之功必積漸致之故取治骨象玊石用功之深者喻之朱氏公遷曰恂栗者敬之存於中也威儀者敬之見於外也皆以成德氣象言而進德工夫亦可見矣大學於止至善之傳引此詩止善乃大學之成功聖賢之能事則武公之德固不可以淺近窺矣黃氏佐曰此與大學稍不同彼言交致其功此言有進無已蓋彼重精密而不至粗疏此重進益而不至退損也瞻彼淇奧緑竹青青子丁反有匪君子充耳琇瑩音營㑹古外反辨如星瑟兮僩兮赫兮喧兮有匪君子終不可諼兮集傳興也青青堅剛茂盛之貌充耳瑱也琇瑩美石也天子玊瑱諸侯以石會縫也辨皮辨也毛氏萇曰皮辨所以㑹髮以玊飾皮辨之縫中如星之明也鄭氏康成曰會謂辨之縫中飾之以玊皪皪而處狀似星也孔氏穎達曰辨師云王之皮辨會五采玊璂注云會縫中也皮辨之縫中每貫結五采玊十二以為飾謂之綦詩云㑹辨如星又曰其辨伊綦是也又云諸侯及孤卿大夫之皮辨各以其等為之注云侯伯璂飾七子男璂飾五玊亦三采武公本畿外諸侯入相於周自以本爵為等則玊用三采而璂飾七也以竹之堅剛茂盛興其服飾之尊嚴劉氏瑾曰此釋上五句而見其德之稱也劉氏瑾曰此釋下四句集說孔氏穎達曰有斐然文章之君子其充耳以琇瑩之石為之會髮之辨文駮如星言有其德而稱其服故宜入王朝而為卿相也程子曰二章言其威儀之美服飾之盛朱氏公遷曰此與下章専主成德言故不及乎切磋琢磨也薛氏應旗曰充耳以石㑹辨以玊諸侯之服飾皆然惟武公以德稱乃見尊嚴耳姚氏舜牧曰充耳琇瑩㑹辨如星不專美其服飾然非服飾不足以見其容止之尊嚴中庸云齊明盛服非禮不動論語云君子正其衣冠尊其瞻視必相合言之正是此意瞻彼淇奧緑竹如簀音責叶側歷反有匪君子如金如錫如圭如璧寬兮綽兮猗於綺反重直恭反較古嶽反兮善戲謔兮不為虐兮集傳興也簀棧也禮記檀弓注簀謂牀第即牀棧也竹之密比似之則盛之至也程子曰如簀言其盛密比如簀金錫言其煆鍊之精純圭璧言其生質之溫潤鄭氏康成曰金錫錬而精圭璧性有質寬宏裕也綽開大也猗歎辭也重較卿士之車也較兩輢上出軾者謂車兩㫄也吕氏大鈞曰古者車箱長四尺四寸三分前一後二橫一木下去車牀三尺三寸謂之式又於式上二尺二寸橫一木謂之較去車牀凡五尺五寸古人立乘若平常則憑較若應為敬則落手憑下式而頭得俯范氏處義曰較髙五尺五寸式髙三尺三寸較既出於式上故曰重較善戲謔不為虐者言其樂易而有節也陳氏傅良曰謔而善已是中節特言不為虐以足之耳以竹之至盛興其德之成就劉氏瑾曰此釋上五句而又言其寬廣而自如和易而中節也劉氏瑾曰此釋下四句蓋寬綽無斂束之意戲謔非莊厲之時皆常情所忽而易致過差之地也然猶可觀而必有節焉則其動容周旋之間無適而非禮亦可見矣禮曰張而不弛文武不能也弛而不張文武不為也一張一弛文武之道也此之謂也鄭氏康成曰君子之德有張有弛故不常矜莊而時戲謔陳氏傅良曰古人張不廢弛屏不廢逞肅肅不廢雍雍僮僮不廢祁祁有所拘者必有所從也劉氏瑾曰前章瑟僩赫喧張之時也此章寬綽戲謔弛之時也集說孔氏穎達曰言武公器德已成錬精如金錫道業既就琢磨如圭璧又性寬容而情綽緩既外修飾而內寬𢎞入相為卿士倚此重較之車實稱其德也又能善戲謔而不為虐言其張弛得中也此與首章互文首章論其學問聽諫之時言如器未成之初須琢磨此論道德既成之時故言如圭璧已成之器程子曰言其成質之美如金錫圭璧然善戲謔言其樂易而以禮自防節不至於過是不為虐也劉氏瑾曰緑竹自始生猗猗以至盛多如簀則成其生矣武公由學問自修如金錫之出於煆錬如圭璧之成於琢磨則成其德矣興之取義蓋如此若其寬綽而居重較則自如而猶可觀也戲謔而不為虐和易而必有節也所以能然者由其德之全備也張氏彩曰詩故云如金如錫語其知柔知剛也如圭如璧語其能圓能方也登車而倚重較易於矜嚴者也武公則寬綽其容歡宴而至戲謔易至陵侮者也武公則以禮自檢是皆剛柔方圓之相濟者也總論朱子語類問淇奧一篇衛武公進德成德之序始終可見一章言切瑳琢磨則學問自修之功精密如此上章言威儀服飾之盛有諸中而形諸外者也三章言如金錫圭璧則煆錬以精溫純深粹而德器成矣前二章皆有瑟僩赫咺之詞三章但言寬綽戲謔而已於此可見不事矜持而周旋自然中禮之意曰說得甚善衛武公學問之功甚不苟畢竟周之卿士去聖人近氣象自是不同朱氏善曰首章以竹之美盛興其德之進修卒章以竹之至盛興其德之成就故讀詩者又當合二章而竝觀之所以能有是煆錬之精純者由其知行之並進也所以能全其生質之溫潤者由其表裏之相符也寬廣者矜莊之反矜莊而又寬廣則是寬而有制也和易者威嚴之反威嚴而又和易則是嚴而能泰也此所以為德之成也果能是則其謂之睿聖也亦可以無愧矣案史稱武公修康叔之政百姓和集佐周平戎有動王室又國語稱其耄而咨警於朝受戒不怠然未詳其立德制行之本也讀淇奧之詩而見其省察克治之勤學問進修之密極煆錬之精純底粹質於溫潤以致動皆中禮民不能忘幾於至善可謂盛矣夫康叔紹聞衣德作則於前武公敬慎恪恭繼業於後從來開國承家保邦圖治無二道也淇奧三章章九句集傳案國語武公年九十有五猶針警於國曰自卿以下至於師長士苟在朝者無謂我老耄而舍我必恪恭於朝以交戒我遂作懿懿當讀為抑戒之詩以自警而賔之初筵亦武公悔過之作則其有文章而能聽規諫以禮自防也可知矣衛之他君蓋無足以及此者故序以此詩為美武公而今從之也集說王氏柏曰淇奧一詩形容武公之盛德條理縝密而興寄遐暢非大賢不能道此大學所以取之以為至善之本鄧氏元錫曰康叔宅心知訓至武公而睿聖故衛風首淇奧明國有與立焉考槃在㵎叶居賢反碩人之寬叶區權反獨寐寤言永矢弗諼況元反集傳賦也考成也槃盤桓之意言成其隱處之室也黃氏一正曰槃考架木為屋盤結之義也陳氏曰考扣也槃器名蓋扣之以節歌如鼓盆拊缶之為樂也黃氏櫄曰詩言子有鐘鼓弗鼓弗考則所謂考槃者猶考擊其槃以自樂也二說未知孰是山夾水曰㵎碩大寬廣永長矢誓諼忘也詩人美賢者隱處㵎谷之閒而碩大寬廣無戚戚之意雖獨寐而寤言猶自誓其不忘此樂也集說毛氏萇曰槃樂也孔氏穎達曰王肅注云窮處山㵎之閒而能成其樂者以大人寬博之德故雖在山㵎獨寐而覺獨言先王之道長自誓不忘也美君子執德𢎞信道篤也賢者志欲終處於此㵎而不仕故云然若其更有仕心則不復自誓矣陳氏傅良曰碩人在㵎考槃樂歌天子不得而臣諸侯不得而友雖寤寐永矢不忘此樂嚴氏粲曰窮處山㵎之中而成其槃樂者乃是碩大之賢人其心甚寬裕雖在寂寞之濵而處之泰然永誓不忘此樂所以形容其遺佚不怨之意也邵氏寶曰考槃言成乎隱者也世固有隱而勿成者矣永矢弗諼自得也隱而至於自得斯能隱矣考槃在阿碩人之薖苦禾反獨寐寤歌永矢弗過古禾反集傳賦也曲陵曰阿薖義未詳或云亦寬大之意也永矢弗過自誓所願不踰於此若將終身之意也輔氏廣曰退而窮處逼仄甚矣而能寬大自樂若將終身焉蓋無入而不自得也集說嚴氏粲曰賢者之窮處其能寐而寤既寤而歌無往非獨而自得其樂永誓不復他往居之而安也如龎德公居峴山之南未嘗入城府也考槃在陸碩人之軸獨寐寤宿永矢弗告姑沃反集傳賦也髙平曰陸軸盤桓不行之意蘇氏轍曰盤桓不行從容自廣之謂也范氏處義曰軸卷也猶言卷而懷之張氏彩曰軸者言其旋轉而不窮猶所謂遊於環中者也亦有任其旋轉不出乎此之意寤宿已覺而猶卧也弗告者不以此樂告人也集說嚴氏粲曰賢者成樂於陸如軸之卷收藏不用而自得其樂永誓不告於人惟恐人之知也然弗諼弗過弗告亦作詩者形容其髙舉逺遁有終焉之意耳賢者不自言其如此也總論李氏樗曰考槃在澗在阿在陸者皆是賢者退處之地也夫富與貴是人之所同好也在㵎在阿在陸皆非人之所樂而賢者獨成樂於此故處之甚安綽綽然有餘裕曾無狹隘褊淺之意故云碩人之寬也許氏謙曰考槃在㵎可謂幽僻碩德之人居之則見其寬廣此君子居之何陋之有之意於是獨寐於此寤而自言誓永弗忘此樂矣二章同意歌則長其言也至曰宿則惟於此留止且不以語人是遁世無悶自樂於心并其言忘之矣朱氏善曰賢者隱處於澗谷其所飬之充所守之正有以自尊而不慕乎人爵之貴有以自重而不狥乎外物之誘則天下之樂亦孰有加於此哉是故始而曰弗諼謂其心之不忘乎此也繼而曰弗過謂所願之不踰乎此也終而曰弗告謂不以此樂告人非不以告人也得於心而難於言雖言人亦未必信也斯人也其東漢徐稚之流也歟朱氏道行曰澗阿陸總是一處其地兩山夾水其上有陸其傍有阿中有流水故碩人得隱處其閒通三章總形容一箇寬字之樂惟大斯寬考槃三章章四句集說嚴氏粲曰舊說以弗過弗告皆為賢者畎畝不忘君之意其義亦正但與上文槃樂寬大之意不類此詩不過極言賢者山林之樂以見其時之不可為而賢者無復有意於仕也附録程子曰賢者退處㵎谷雖德體寬裕而心在朝廷寤寐不能忘懷深念其不得以善道告君故陳其由也碩人其頎其機反衣於既反錦褧苦迥反衣齊侯之子衛侯之妻東宫之妹邢侯之姨談公維私息夷反集傳賦也碩人指莊姜也頎長貌孔氏穎達曰猗嗟云頎而長兮錦文衣也褧襌音丹也錦衣而加褧焉為其文之太著也鄭氏康成曰國君夫人翟衣而嫁今衣錦者在塗之所服也朱子曰褧儀禮作景禮記作絅古注以為禪衣所以襲錦衣者沈存中謂褧與檾同是用檾麻織布為之不知是否嚴氏粲曰褧以縠為之東宫太子所居之宫齊太子得臣也繫太子言之者明與同母言所生之貴也女子後生曰妹妻之姊妹曰姨姊妹之夫曰私孫氏炎曰私無正親之言邢侯談公皆莊姜姊妹之夫互言之也杜氏預曰邢國在廣平襄國縣孔氏穎達曰春秋談子奔莒則談子爵蘇氏轍曰邢周公之後談近齊吕氏祖謙曰白虎通曰伯子男臣子於其國中褎其君為公諸侯之女嫁於諸侯則尊同故歷言之劉氏瑾曰歷言此者以見莊姜之姊妹與莊公之姻婭其尊皆同也莊姜事見邶風緑衣等篇春秋傳曰莊姜美而無子衛人為之賦碩人即謂此詩而其首章極稱其族類之貴以見其為正嫡小君所宜親厚而重歎莊公之昏惑也集說孔氏穎達曰以齊侯之子嫁為衛侯之妻父母兄弟正大如此君何為不答之也范氏處義曰碩人蓋男子婦人有德者之通稱也錦衣而加褧言莊姜德稱其服也諸侯之女嫁於諸侯言莊姜宜為配也邢侯談公言莊姜之穎戚皆貴也嚴氏粲曰風人不直言莊姜不見答之事但首章歷述其親族欲讀之者知其為莊姜則不見答之事國人自知之不待察察言之矣手如柔荑徒兮反膚如凝脂領如蝤似修反蠐音齊齒如瓠户故反犀螓音秦首蛾我波反眉巧笑倩七薦反兮美目盼匹莧反叶匹見反兮集傳賦也茅之始生曰荑言柔而白也凝脂脂寒而凝者亦言白也領頸也蝤蠐木蟲之白而長者毛氏萇曰蝤蠐蝎蟲也孔氏穎達曰孫炎曰關東謂之蝤蠐梁益之閒謂之蝎以在木中白而長故以比頸也蔡氏卞曰蝤蠐桑蟲也蝤蠐食桑之腴故色白而體柔瓠犀瓠中之子方正潔白而比次整齊也毛氏萇曰瓠犀瓠瓣孔氏穎達曰釋草云瓠棲瓣也孫炎曰棲瓠中瓣也棲與犀字異音同螓如蟬而小其額廣而方正鄭氏康成曰螓謂蜻蜻也孔氏穎達曰釋蟲云蚻蜻蜻孫炎曰方言云有文者謂之螓郭氏曰如蟬而小有文是也蛾蠶蛾也其眉細而長曲爾雅蛾羅邢昺疏此即蠶蛹所變者也孔氏穎達曰手膚領齒舉全物以比之故言如螓首蛾眉則指其體之所似故不言如也倩口輔之美也孔氏穎達曰左傳曰輔車相依服䖍云輔上頷車也與牙相依則是牙外之皮膚頰下之别名也故易云咸其輔頰舌明輔近頰也而非頰也笑之貌美在於口輔故連言之也盼黑白分明也此章言其容貌之美猶前章之意也集說鄭氏康成曰此章說莊姜容貌之美所宜親幸碩人敖敖五刀反說始鋭反于農郊叶音高四壯有驕起橋反叶音高朱幩符云反鑣鑣表驕反叶音裦翟茀音弗以朝直遙反叶直豪反大夫夙退無使君勞集傳賦也敖敖長貌鄭氏康成曰敖敖猶頎頎也說舍也李氏樗曰鄭氏謂說當作襚言莊姜始來更正衣服於衛近郊非也王氏謂說當作駕說之說是也農郊近郊也四牡車之四馬驕壯貌幩鑣飾也鑣者馬銜外鐡人君以朱纒之也陸氏德明曰說文云馬纒鑣扇汗也鑣一名扇汗又曰排沫爾雅云鑣謂之钀魚列反孔氏穎達曰此纒鑣之鑣自解飾之所施非經中之鑣也鑣鑣盛也孔氏穎達曰言既以朱飾其鑣而四牡之馬鑣鑣而盛也翟翟車也夫人以翟羽飾車茀蔽也婦人之車前後設蔽孔氏穎達曰婦人乘車不露見車之前後設幛以自隱蔽謂之茀因以翟羽為之飾蓋厭音葉翟也次其羽使相迫也夙早也玉藻曰君日出而視朝鄭氏康成曰朝內朝路寢門外之正朝也退適路寢聽政使人視大夫大夫退然後適小寢釋服鄭氏康成曰小寢燕寢也孔氏穎達曰君出視朝事畢乃之路寢以待大夫之所咨決事之多少大夫所主故使人視大夫大夫退然後罷此言莊姜自齊來嫁舍止近郊乘是車馬之盛以入君之朝國人樂得以為莊公之配故謂諸大夫朝於君者宜早退無使君勞於政事不得與夫人相親而歎今之不然也集說孔氏穎達曰言其初來嫁則說舍于衛之近郊而整其車飾則乘四牡之馬驕驕然壯健以朱飾其鑣則鑣鑣然而盛美又以翟羽為車之蔽其車馬之飾如此乃乘之以入君之朝既入朝而諸大夫聼朝者皆為早退以君與夫人新為妃耦宜相親幸無使君之勞倦此言莊姜容貌之美皆用嫡夫人之正禮君何為不答之乎程子曰其來也禮數之備至近郊而說止復整車服而後入於朝君為之早退以與夫人燕處見禮之之重也河水洋洋北流活活古濶反叶户劣反施罛音孤濊濊呼活反叶許月反鱣陟連反鮪于軌反發發補末反叶方月反葭音加菼他覽反揭揭居謁反庶姜孽孽魚竭反庶士有朅欺列反集傳賦也河在齊西衛東北流入海洋洋盛大貌活活流貌孔氏穎達曰齊所以得有河者左傳曰賜我先君履西至於河是河在齊西北流也衛境亦有河知此是齊地者以庶姜庶士類之知不據衛之河也施設也罛魚罟也孔氏穎達曰釋器云魚罟謂之罛李巡曰魚罟捕魚具也濊濊罟入水聲也許氏愼曰濊礙流也鱣魚似龍黃色鋭頭口在頷下背上腹下皆有甲大者千餘斤孔氏穎達曰鱣似鱏而短鼻口在頷下體有邪行甲無鱗肉黃大者長二三丈江東呼為黃魚是也鮪似鱣而小色青黑孔氏穎達曰陸璣云鮪形似鱣頭小而尖似鐵兜鍪口亦在頷下其甲可以摩薑大者不過七八尺益州人謂之鱣鮪大者為王鮪小者為鮛鮪發發盛貌陸氏德明曰發魚著網尾發發然韓詩作鱍菼薍頑去聲也亦謂之荻孔氏穎達曰葭蘆菼薍釋草文李巡曰分别葦類之異名郭璞曰蘆葦也薍似葦而小如李云蘆薍共為一草如郭云則蘆薍别草揭揭長也庶姜謂姪娣孽孽盛飾也庶士謂媵臣朅武貌毛氏萇曰庶士齊大夫送女者言齊地廣饒而夫人之來士女佼好禮儀盛備如此亦首章之意也集說黃氏佐曰此章說宗國之地美而歸國之儀盛徐氏光啓曰春秋時嫁娶大都倚大國為重故言齊國之大方氏應龍曰齊國富饒不特夫人之鍾靈育秀於海邦者淑姿美質逈出一時即士女之追隨者亦足以爛盈門之顧故末二句以庶姜庶士承之不見親厚則昏惑甚矣總論嚴氏粲曰此詩無一語及莊姜不見答之事但言其姻族之貴容貌之美禮儀之備又言齊地廣饒士女佼好以深寓其閔惜之意而已惟大夫夙退無使君勞二句微見其意而辭亦深婉風人之辭大抵然也朱氏善曰夫貴族人之所願娶今有是族類之貴而不見答何也美色人之所願得今有是容貌之美而不見親何也大國人之所願交今有是媵送之盛而不見禮何也蓋莊公狂惑之人也嬖幸之是昵而貞信之是棄今莊姜端莊靜一以自守則固不能如嬖妾之左右逢迎以求媚說也其不合也宜哉碩人四章章七句集說黃氏櫄曰緑衣言嬖妾之不當僭而僭碩人言夫人之宜見答而不見答此國人所以傷之也雖然古人之觀詩以意逆志而不泥於章句之末則此詩雖為美莊姜而作未始不為學者之戒也如衣錦褧衣皆言莊姜衣服之盛而中庸則曰惡其文之著也推此以為謹獨之學如巧笑倩兮美目盼兮素以為絢兮特言莊姜容貌之美而孔子則曰繪事後素子夏推之以為禮之後詩豈可於言語文字閒而有得哉學者當以意悟之輔氏廣曰觀邶風燕燕等篇則莊姜之德行文章皆未易及而此詩不之言何也朱子曰此但指其人所易見者以刺莊公之昏惑而不知耳莊姜之美則固不止此也氓之蚩蚩尺之反抱布貿莫豆反絲叶新齊反匪來貿絲來即我謀叶謨悲反送子涉淇至于頓丘叶祛竒反匪我愆期子無良媒叶謨悲反將七羊反子無怒秋以為期集傳賦也氓民也蓋男子而不知其誰何之稱也朱子曰始見其來莫知其為誰何也既與之謀則爾汝之矣此言之序也蚩蚩無知之貌蓋怨而鄙之也布幣孔氏穎達曰檀弓注云古者謂錢為泉布知此布非泉而言幣者以言抱之則宜為幣也貿買也貿絲蓋初夏之時也鄭氏康成日幣者所以貿買物也季春始蠶孟夏賣絲頓丘地名孔氏穎達曰釋邱云邱一成為敦音頓邱王氏應麟曰地理志東郡頓丘縣輿地廣記頓丘本衛邑在淇水南愆過也將願也請也此淫婦為人所棄而自叙其事以道其悔恨之意夫既與之謀而不遂往又責所無以難其事再為之約以堅其志此其計亦狡矣徐氏光啓曰曲禮非有行媒不相知名既曰私奔矣又焉用媒朱子謂責所無以難其事可謂見其肺肝矣以御蚩蚩之氓宜其有餘而不免於見棄蓋一失其身人所賤惡始雖以欲而迷後必以時而悟是以無往而不困耳士君子立身一敗而萬事瓦裂者何以異此可不戒哉朱氏公遷曰朱子又推之以戒士君子蓋廣說詩之法也集說范氏處義曰是時必有謀昏之言詩之所不及不然安得已有從之之意遂送涉淇水之地是時必有迫促之言亦詩之所不及不然安得遽有無良媒無我怒秋以為期之約然此亦悔悟之後追悼前日之事故有是語耳使其初能覺其非為絲而為我謀又能知無良媒為非禮安肯輕從其約也吕氏祖謙曰氓假貿絲而來即我謀本謀挈是女而歸也及氓之歸是女乃遲遲未行送之於野謂之曰匪我愆期也子無良媒以往來道達故我行未成耳乘彼垝俱毁反垣音袁以望復關叶圭員反不見復關泣涕漣漣音連既見復關載笑載言爾卜爾筮體無咎言以爾車來以我賄呼罪反遷集傳賦也垝毁垣牆也復關男子之所居也李氏樗曰復關關名王氏應麟曰寰宇記澶州臨河縣復關城在南黃河北阜也復關堤在南三百步不敢顯言其人故託言之耳龜曰卜蓍曰筮體兆卦之體也班氏固曰蓍龜者重事决疑示不自専龜之為言久也蓍之為言耆也久長意也卜赴也爆見兆筮信也見其卦也孔氏穎達曰兆卦之體謂龜兆筮卦也左傳曰其繇音宙曰一薰一蕕十年猶有臭是龜之繇易曰困于石據于蒺藜是卦之繇二者皆有繇辭賄財遷徙也與之期矣故及期而乘垝垣以望之既見之矣於是問其卜筮所得卦兆之體若無凶咎之言則以爾之車來迎當以我之賄往遷也歐陽氏修曰女被棄遂怨悔而追序與男相得之初云子初來即我謀我既許子而爾乃決以卜筮於是我從子而往爾集說孔氏穎逹曰此男子實不卜筮而言皆吉無凶咎者又誘以定之前因貿絲以誘之今復言卜筮以誘之也劉氏瑾曰卜筮之法所以開物成務定天下之吉凶成天下之亹亹者曾謂有淫人之瀆問而尚得無凶咎之言乎以其有能自疑而欲決之也則請以蒙之六三告之蓋使此氓而知勿用取行不順之戒此女而知不有躬無攸利之戒則必各求正應豈復至於相棄也哉何氏楷曰卜筮無咎矣而厥後色衰被棄似卜筮不靈然者先儒所謂易為君子謀不為小人謀也桑之未落其葉沃若于音吁下同嗟鳩兮無食桑椹音甚叶知林反于嗟女兮無與士耽叶持林反士之耽兮猶可說也女之耽兮不可說也集傳比而興也沃若潤澤貌鳩鶻音骨鳩也似山雀而小短尾青黑色多聲孔氏穎達曰釋鳥云鶌鳩鶻鵃音嘲某氏曰春秋云鶻鳩氏司事春來冬去孫炎曰一名鳴鳩月令云鳴鳩拂其羽陸璣云班鳩也爾雅鳩類非一知此是鶻鳩者以鶻鳩冬始去今秋見之以為喻故知非餘鳩也椹桑實也鳩食椹多則致醉耽相樂也說解也言桑之潤澤以比已之容色光麗然又念其不可恃此而從欲忘反故遂戒鳩無食桑椹以興下句戒女無與士耽也劉氏瑾曰此章比自比興自興下泉則就以比辭起興蓋有兩例後凡言比而興者各以文意求之可也朱氏道行曰桑未落二句是比于嗟鳩二句是興士猶可說而女不可說者婦人被棄之後深自愧悔之辭主言婦人無外事唯以貞信為節一失其正則餘無足觀爾不可便為士之耽惑實無所妨也劉氏瑾曰集傳所謂主言者蓋以此婦立言之意専主於言婦人不可一失其節故以辭意抑揚重於女而輕於男非謂男有可耽之理而無所妨玩詩文猶之一字意亦可見也集說鄭氏康成曰士有百行可以功過相除至於婦人惟以貞信為節孔氏穎達曰鳩食桑椹過時則醉而傷其性女與士耽過度則淫而傷禮義然耽雖士女所同而女思於男故言士之耽尚可解說女之耽則不可解說已時為夫所棄乃思而自悔歐陽氏修曰鄭以為國之賢者刺此婦人見誘故于嗟而戒之今據上文以我賄遷下文桑之落矣皆是女之自語豈於其閒獨此數句為國之賢者之言據序但言序其事以風則是詩人序述女語爾桑之落矣其黃而隕叶于貧反自我徂爾三歲食貧淇水湯湯音傷漸子亷反車帷裳女也不爽叶師莊反士二其行下孟反叶户郎反士也罔極二三其德集傳比也隕落徂往也湯湯水盛貌漸漬也帷裳車飾亦名童容婦人之車則有之孔氏穎達曰丈夫之車立乘有蓋無帷裳此言帷裳者婦人之車故也以幃幃車之傍如裳以為容飾故或謂之幃裳或謂之童容爽差極至也嚴氏粲曰罔極為無窮之意善惡皆可言之蓼莪昊天罔極為父母之德無窮極青蠅讒人罔極與此士也罔極皆為反覆無窮極言桑之黃落以比已之容色凋謝遂言自我往之爾家而值爾之貧於是見棄復乘車而度水以歸復自言其過不在此而在彼也集說孔氏穎達曰婦人色衰而雕落時君子則棄已使無自以託故追說見薄之漸言自我往爾家三嵗之後貧於衣食而見困苦已不得其志今乃見棄所以自悔也又言我心於汝不為差二士也行無中正故二三其德及年老而棄已所以怨也蘇氏轍曰桑之未落也其葉沃然為若可依者也鳩食其椹椹美而不能去則將依焉不知其將黃而隕男子之始相得也意得而財豐一若可依者婦人喜而從之不知其三嵗食貧而至於相棄也輔氏廣曰女也不爽此但言其誓約之言不差耳豈不悔其初之失哉然終不說破是亦狡者之所為也雖云曲不在已殊不知始既如此則其終固宜然也三嵗為婦靡室勞矣夙興夜寐靡有朝叶直豪反矣言既遂矣至于㬥矣兄弟不知嘻許意反其笑叶音燥矣靜言思之躬自悼矣集傳賦也靡不夙早興起也嘻笑貌言我三嵗為婦盡心竭力不以室家之務為勞早起夜臥無有朝旦之暇與爾始相謀約之言既遂鄒氏泉曰言既遂矣即谷風既生既育之㫖而爾遽以㬥戾加我蘇氏轍曰言婚姻既成而至于㬥也兄弟見我之歸不知其然但嘻然其笑而己蓋淫奔從人不為兄弟所齒故其見棄而歸亦不為兄弟所恤理固有必然者亦何所歸咎哉但自痛悼而已集說嚴氏粲曰言我三嵗為室之勞無有一朝不然者初與爾謀為室家惟恐不諧其言既遂爾乃以㬥虐加我我兄弟不知之耳若知我見㬥如此必嘻然笑我也始為所誘今為所㬥故恐兄弟笑之此承上文漸車帷裳見棄而歸在途自念之辭羞見兄弟也及爾偕老老使我怨淇則有岸叶魚戰反隰則有泮音畔叶匹見反總角之宴言笑晏晏叶伊佃反信誓旦旦叶得絹反不思其反叶孚絢反反是不思叶新齎反亦已焉哉叶將黎反集傳賦而興也及與也泮涯也髙下之判也總角女子未許嫁則未笄但結髮為飾也孔氏穎達曰甫田云總角丱兮是男子總角未冠則婦人總角未笄也以無筓直結其髮聚之為兩角晏晏和柔也旦旦明也鄭氏康成曰以信相誓旦旦耳言其懇惻欵誠言我與汝本期偕老不知老而見棄如此徒使我怨也淇則有岸矣隰則有泮矣而我總角之時與爾宴樂言笑成此信誓曾不思其反復以至於此也此則興也劉氏瑾曰此章興在賦外他章亦有就賦其事以起興如黍離之類者蓋亦有兩例也後凡言賦而興者當各以文意求之鄒氏泉曰地有限止而可見事有終窮而不思此反其意以為興也既不思其反復而至此矣則亦如之何哉亦已而已矣傳曰思其終也思其復也思其反之謂也輔氏廣曰皆悔恨之極也大凡人之處事須當思其反不然鮮有不陷於凶咎者欲心一縱則必不能思其反耳集說嚴氏粲曰述其怨而自解之辭淇則有岸隰則有泮何汝心之無泮岸不可知也即上章所謂罔極也我自總角之初與爾言笑信誓曽不思其反覆一至於此是始焉不思之過今則無如之何矣故曰亦已焉哉劉氏瑾曰詩言總角之宴則此女未筓而奔矣又言老使我怨則至老而後見棄也故前章以桑之黃落自比其色之衰也所謂三嵗為婦三嵗食貧者言其在夫家貧勞之嵗月耳黃氏佐曰此章思其始奔而悔無及也縱欲敗度失身從人此豈永終知敝之謂哉人窮反本於此見之矣總論劉氏彞曰夫婦者五品之本匹配雖自於人謀義理實根於天地順其道者足以安於其位逆其理者無以保於其生蓋肇有人倫以來未有違理犯義終其身而弗悔者也陳氏鵬飛曰詩人蓋有所指而備一人之始末以為戒也朱氏善曰責之以良媒是欲謀之人也而不知人之不吾與也要之以卜筮是欲詢之神也而不知神之不吾告也及其見棄而歸兄弟是欲依其親也而不知親之醜吾行而不見恤也女之苟合者色衰而愛弛士之苟合者利盡而交絶合之不可以苟也如此沈氏守正曰詩雖作於悔恨然悔所託之非人不悔始奔之非正此之謂淫人之悔也氓六章章十句集說輔氏廣曰谷風與氓二詩皆怨然谷風雖怨而責之其辭直蓋其初以正也氓之詩則怨而悔之耳其辭隱蓋其初之不正也嘗謂二詩皆出於衛之婦人其文辭序次雖後世工文之士所不能及然考其行則一賢一否如是之不同所謂有言者不必有德豈不信哉嚴氏粲曰刺時則上所化也男女之合不以正則不可以久雖悔何及所以戒也非美也籊籊他歷反竹竿以釣于淇豈不爾思逺莫致之集傳賦也籊籊長而殺也許氏謙曰殺衰小之也長而殺謂釣竿長而根大其末漸漸衰小竹衛物淇衛地也杜氏佑曰淇水至衛州衛縣界入河謂之淇水口古朝歌也衛居河淇之閒衛女嫁於諸侯思歸寧而不可得故作此詩言思以竹竿釣于淇水而遠不可至也集說歐陽氏修曰衛女之思歸者述其國俗之樂云有籊籊然執竿以釣于淇者我在家時常出而見之今我豈不思復見之乎而遠適異國不得見耳李氏樗曰毛氏謂釣以得魚婦人待禮以成為室家王氏亦以謂釣有男下女之道詩人每以釣喻夫婦之相求淇水者言衛女嫁於異國故思淇水若泉水所謂思須與漕我心悠悠載馳所謂我行其野芃芃其麥之類是也若謂以釣于淇而取譬夫婦何必獨言淇水乎輔氏廣曰豈不爾思者謂固不能不思也逺莫致之者以義有不可故託以逺而不能致耳魏氏浣初曰須知詩意非但竹竿釣淇是託言即遠不可至亦因義不可歸而託之於遠此風人之微詞泉源在左淇水在右叶羽軌反女子有行遠于萬反兄弟父母叶滿彼反集傳賦也泉源即百泉也在衛之西北而東南流入淇故曰在左淇在衛之西南而東流與泉源合故曰在右毛氏萇曰泉源小水之源吕氏大臨曰左右蓋主山而言之相衛之山東面故以北為左南為右王氏應麟曰水經注泉源水有二源一水出朝歌西北又東與左水合謂之馬溝水又美溝水出朝歌西北大嶺下更出徑駱駝谷於中逶迤九十曲故俗有美溝之目徐氏光啓曰泉源之委在左淇水之原在右思二水之在衛而自歎其不如也集說李氏樗曰言舊時游泳二水之閒其樂如此今則嫁於異國而不得見也故曰女子有行逺父母兄弟嚴氏粲曰幼時出游泉源淇水之閒甚可樂也自歎女子出適於人則雖父母兄弟之至親且疏遠矣安得復至少時游戲之所乎吳氏瑞登曰二水在左者常在左在右者常在右而女子乃不得周旋於左右故曰不如淇水在右泉源在左巧笑之瑳七可反佩玉之儺乃可反集傳賦也瑳鮮白色笑而見齒其色瑳然猶所謂粲然皆笑也穀梁傳軍人粲然皆笑注粲然盛笑貌儺行有度也嚴氏粲曰儺柔緩也腰身裊儺也何氏楷曰巧工也猶好也瑳說文云玉色鮮白也笑而見齒其色似之儺說文云行有節也徐鍇云佩玉所以節步承上章言二水在衛而自恨其不得笑語遊戲於其間也集說歐陽氏修曰思衛女之在其國者巧笑佩玉威儀閒暇樂於二水之上念已有所不如也嚴氏粲曰我思遊二水之閒與其女伴巧笑露齒瑳然鮮白佩玉而身裊儺是可樂也淇水悠悠音由檜楫松舟駕言出遊以寫我憂集傳賦也悠悠流貌陸氏德明曰悠本亦作浟檜木名似柏毛氏萇曰檜柏葉松身孔氏穎達曰檜書作栝字禹貢云杶幹栝柏注云柏葉松身曰栝與此一也楫所以行舟也吕氏祖謙曰釋文曰方言云楫謂之橈或謂之櫂橈音鐃釋名云楫捷也撥水行舟疾也與泉水之卒章同意集說歐陽氏修曰淇水悠悠然有乘舟而遊者亦可樂也鄒氏泉曰切宗國之情而歎不得以紓其情也言淇水之悠悠而有檜楫松舟固可假之以寫我憂矣奈之何行不能以徑遂安得駕舟濟水出遊於彼以寫憂也哉總論歐陽氏修曰竹竿之詩據文求義終篇無比興之言其言多述衛國風俗所安之樂以見已志思歸而不得爾范氏處義曰衛女思歸而不得故謂我豈不思淇水遊釣之樂以道遠莫能致耳不言違禮而言道遠尚其私情未克也既而思泉源淇水亦舊時游觀之可樂者今我為女子既有行而適異國雖欲復往有不可者此乃以禮自克之言也於是申言幼時在父母家游觀於淇水泉源之閒其樂可想而不可復往矣卒章言淇水悠悠而可樂今既不可復往苐當命駕出游以輸寫心之樂耳此發乎情止乎禮義者也楊氏廷麟曰通詩不說出義字而隱隱就思字上描寫為義所制之意蓋思之不得直遂即是義之不得踰越也竹竿四章章四句集說李氏樗曰泉水載馳竹竿三詩皆是思歸衛國之詩泉水以常時思歸非有故也載馳以衛國之滅而思歸竹竿以不見答而思歸是自閔而思歸也然載馳之詩猶言其力不能救之事竹竿則不見其不見答之事則知竹竿之女子其忠厚可見矣黃氏櫄曰谷風之婦有怨辭載馳之夫人有悲辭而竹竿一詩雍容和緩述其昔日之樂而不言今日之恨為此詩者思而能以禮者也芄音丸蘭之支童子佩觿許規反雖則佩觿能不我知容兮遂兮垂帶悸其季反兮集傳興也芄蘭草一名蘿摩蔓生斷之有白汁可啖支枝同爾雅雚音貫芄蘭鄭氏康成曰芄蘭柔弱恆蔓延於地有所依緣則起陸氏璣曰芄蘭幽州人謂之雀瓢沈氏括曰支莢也芄蘭生莢支出於葉閒垂之如觿狀吕氏祖謙曰董氏曰支石經作枝說文同觿錐也以象骨為之所以解結成人之佩非童子之飾也劉氏向曰能治煩決亂者佩觿孔氏穎達曰內則云子事父母左佩小觿右佩大觿成人之佩也知猶智也言其才能不足以知於我也卜容遂舒緩放肆之貌悸帶下垂之貌毛氏萇曰容儀可觀佩玉遂遂然垂其紳帶悸悸然有節度嚴氏粲曰容雍容也離騷云遵赤水而容與祭義云及祭之後陶陶遂遂如將復入然蓋舒緩之狀集說蘇氏轍曰芄蘭雖有支然不得所依則蔓延於地而不能起童子雖佩觿然不能如我之多知也朱氏公遷曰芄蘭柔弱而枝葉長蔓本不稱末故以興童稚無能而不能稱其服黃氏佐曰首一句興童子不當有其服下譏童子不能稱其服芄蘭本是蔓生今則有枝矣以興童子本未成人今則佩觿矣夫童子既不當佩成人之服然使備人之能猶可諉也今雖佩觿而其舒放之甚如此何足以稱是服哉沈氏守正曰本不勝枝服不旗𠂻此興意也至二句止容兮遂兮垂帶悸兮言此外無可見鄙之也恥之也芄蘭之葉童子佩韘失涉反雖則佩韘能不我甲叶古協反容兮遂兮垂帶悸兮集傳興也韘決也以象骨為之著右手大指所以鉤弦闓音開與開同體毛氏萇曰韘玦也能射御則帶韘嚴氏粲曰玦車攻作決夏官繕人作抉鄭氏曰沓冒也也即大射所謂朱極三是也以朱韋為之用以彄音摳沓右手食指將指無名指也儀禮大射小射正取決興贊設決朱極三注極猶放也所以韜指利放弦也三者食指將指無名指孔氏穎達曰鄭以禮無以韘為玦者故易之為沓車攻云決拾既次箋云手指相比次亦謂巨指既著決左臂加拾右手指又著沓而相比次也馮氏復京曰沓極二名一物也甲長也言其才能不足以長於我也毛氏萇曰甲狎也李氏樗曰甲字訓狎未若程氏曰雖佩韘其才能實不能君我長我以甲字為長故可從何氏楷曰甲者十干之首猶言長也即甲於天下之甲集說張氏栻曰獨再言容兮遂兮垂帶悸兮而其驕慢無所知之氣象蓋莫掩矣黃氏佐曰射者男子之事尤非童孺所能者才能甚不稱其服飾也總論許氏謙曰芄蘭柔弱之草其枝葉不足以取以興童子無才智而居大人之位不足尚故雖服成人之佩而智不足以知我才不足以長我猶且不能自省而舒緩放肆垂帶悸然以自得蓋惟知處尊高之位侈然以自樂其身而不知所以處之之道故為人指議如此季氏本曰言童子稚弱如芄蘭然於禮但當佩容臭耳而使之佩觿韘則為躐等欲速之事方氏應龍曰觿以解結理煩治劇者可佩韘以開弦射疏命中者可佩而童子躐等至此此詩所由作也容遂二句自足自滿氣象與甫田之刺相似芄蘭二章章六句集傳此詩不知所謂不敢强解輔氏廣曰牆有茨傳謂宣公卒惠公幼而杜預又謂惠公即位時方十五六則小序以此詩屬之惠公亦可但他無所見而詩文又不明言其所以故先生直斷以為不知所謂不敢强解此闕疑之意若必為刺衛惠公則便至有依託鑿空之失矣集說黃氏佐曰小序以為刺惠公意謂如魯昭公猶有童心之例故刺之耳然無明文故朱子不從誰謂河廣一葦韋鬼反杭户郎反之誰謂宋逺跂邱䜴反豫望叶武方反之集傳賦也葦蒹葭之屬孔氏穎達曰言一葦者謂一束也可以浮之水上而渡若桴筏然非一根葦也杭度也衛在河北宋在河南嚴氏粲曰衛都朝歌宋都睢陽自衛適宋必涉河宣姜之女為宋桓公夫人生襄公而出歸於衛襄公即位夫人思之而義不可往蓋嗣君承父之重與祖為體朱氏公遷曰祖孫昭穆同故與祖為體孔疏體上有一字母出與廟絶不可以私反故作此詩言誰謂河廣乎但以一葦加之則可以渡矣誰謂宋國遠乎但一跂足而望則可以見矣孔氏穎達曰宋去衛甚逺跂足可見言宋近猶喻河狹嚴氏粲曰跂舉踵也腳跟不著地明非宋逺而不可至也乃義不可而不得往耳集說鄭氏康成曰誰謂河水廣與一葦可渡喻狹也今我之不渡直自不往耳非謂其廣誰謂宋國逺與我跂足可望亦喻近也今我之不往直以義不往耳非謂其逺孔氏穎達曰此假有渡者之辭非喻夫人之嚮宋渡河也此文公之時衛已在河南自衛適宋不渡河蘇氏轍曰河廣矣宋遠矣以為一葦可渡而跂可見所以緩說其思宋之心也蓋曰雖在衛猶在宋耳曹氏粹中曰禮為出母期而為父後者無服襄公為桓公後嗣夫人見黜於先君則為絶於宋廟矣義不可以復至宋也李氏樗曰載馳之詩曰大夫跋涉我心則憂竹竿之詩曰豈不爾思逺莫致之皆言其逺也至於此詩惟言其甚近者蓋言人之於逺者則憚而不往至於甚近而不往者非有所憚也義不可也大抵人之行事其所當為者雖千里之逺猶在所往也其不當為者雖咫尺之地不可妄動也此宋襄公之母有念子之心而不敢歸宋也附録嚴氏粲曰箋謂宋襄即位其母思之而作河廣之詩疏因以為衛文公時非也衛自魯閔二年狄入衛之後戴公始渡河而南河廣之詩言誰謂河廣一葦杭之則是作於衛未遷之前矣時宋桓猶在襄公方為世子衛戴文俱未立也朱氏公遷曰襄公即位則衛國在河南矣此恐當作興體不必以渡河為說也案鄭箋以為宋襄公即位其母思之而作是詩孔疏以為假有渡者之詞非喻夫人之嚮宋渡河朱子集傳從之定為襄公時詩嚴粲謂詩言河廣可杭則為宋桓公時詩以襄公時衛已遷於河南不須渡河也然此詩以為母思其子則本於慈廟絶而不往則止乎禮於義為正若以為桓公時詩則夫人於已出之後而為復往之思不足為賢矣當從箋疏及朱傳為是誰謂河廣曾不容刀誰謂宋遠曾不崇朝集傳賦也小船曰刀孔氏穎達曰上言一葦桴筏之小此刀宜為舟船之小刀說文作􅟊􅟊小船也釋名云二百斛以上曰艇三百曰刀嚴氏粲曰刀舠古字通用不容刀言小也鄭氏康成曰不容刀亦喻狹崇終也行不終朝而至言近也集說黃氏一正曰不容刀則又小矣不崇朝則又易至矣朱氏道行曰廣不容刀逺不崇朝極言狹近破上文廣逺以答誰謂二字如此則往易矣而卒不往所謂制乎義也總論孔氏穎達曰二章皆言義不得往之事嚴氏粲曰夫人義不可以往宋而設為或人以遠沮已已為辭以解之欲往之切故謂遠為近若真欲往宋者思子之情隱於言外矣河廣二章章四句集傳范氏曰夫人之不往義也天下豈有無母之人歟有千乘之國而不得飬其母則人之不幸也為襄公者將若之何生則致其孝沒則盡其禮而已衛有婦人之詩自共姜至於襄公之母六人焉羅氏中行曰六人謂共姜也莊姜也許穆夫人也宋桓夫人也泉水之女也竹竿之女也皆止於禮義而不敢過也夫以衛之政教淫僻風俗傷敗然而女子乃有知禮而畏義如此者則以先王之化猶有存焉故也輔氏廣曰范氏為襄公處者得其義矣所謂先王之化猶有存焉即大序所謂止乎禮義先王之澤也必如此等詩方可當之集說吕氏祖謙曰說苑曰宋襄公為太子請於桓公曰請使目夷立公曰何故對曰臣之舅在衛愛臣若終立則不可以往味此詩而推其母子之心蓋不相逺所載似可信也不曰欲見母而曰欲見舅者恐傷其父之意也母之慈子之孝皆止於義而不敢過焉不幸處母子之變者可以觀矣嚴氏粲曰疏以河廣屬衛風當為衛人所作非宋襄公母所親作然宋襄公母本衛女又歸衛而作此詩不屬之衛何所屬乎朱氏善曰宗廟之中不以恩掩義閨門之內不以義勝恩襄公能盡其誠敬於宗廟則外既不失乎承重之義盡其孝飬於慈母則內亦不失乎愛親之仁庶乎恩義兩全而無憾矣然則母可以返國乎曰母之轍雖不可以私返而子之使則未嘗不可以私往也嵗時問安之使交錯於道路而一草一木之微必先以奉乎親焉則子之心可以無愧而母之心亦可以少慰矣伯兮朅邱列反兮邦之桀兮伯也執殳市朱反為于僞反王前驅集傳賦也伯婦人目其夫之字也朅武貌桀才過人也鄭氏康成曰桀英桀言賢也黃氏佐曰邦之桀本朅字來蓋果敢剛毅一國未能或之先也殳長丈二而無刃范氐處義曰殳長尋有四尺在車之左故曰前驅婦人以夫久從征役而作是詩言其君子之才之美如是今方執殳而為王前驅也集說范氏處義曰伯叔尊稱詩人多用之如叔兮伯兮倡豫和汝是也此詩婦人之尊其夫故以伯兮呼之閔其勞久而不歸也輔氏廣曰先言君子之才之美如是而後言方執殳而為王前驅則是惜其用之不得其所也黃氏佐曰今方執殳前驅還歸正未有日以起思念之端朱氏道行曰案周禮選國之能用五兵者以衛王宫出則夾王車則執殳前驅者亦與推擇之選故稱邦桀為王非必王真在行以諸侯之命供王役即為王也執殳前驅亦只婦人想見其夫如此附録鄭氏康成曰衛宣公之時蔡人衛人陳人從王伐鄭伯也為王前驅久故家人思之孔氏穎達曰言為王前驅則非賤者今言伯兮故知為州伯謂州里之伯也自伯之東首如飛蓬豈無膏沐誰適都歷反為容集傳賦也蓬草名其華如柳絮聚而飛如亂髮也膏所以澤髮者沐滌首去垢也吕氏祖謙曰膏所以膏首面沐蓋潘也左傳遺之潘沐杜預云潘米汁可以沐頭魯遣展喜以膏沐勞齊師則膏非専婦人用也胡氏一桂曰內則女事父母舅姑五日燂湯請浴三日具沐其閒面垢燂潘請靧足垢燂湯請洗潘淅米汁靧洗面適主也言我髮亂如此非無膏沐可以為容所以不為者君子行役無所主而為之故也傳曰女為說已容輔氏廣曰此其真情也集說李氏樗曰言我非無膏沐但夫不在家故未嘗有容飾也如采緑之詩曰豫髮曲局薄言歸沐蓋言膏沐必俟夫之歸也朱氏道行曰婦髮惟膏濡沐潤斯斂緝而首容光美今有此不用何哉為伯之東賢勞王事誰適為主尚事容飾所謂夫忠婦義也附録孔氏穎達曰衛從王伐鄭則兵至京師乃東行伐鄭也上云為王前驅即云自伯之東明從王為前驅而東行故據以言之非謂鄭在衛東鄒氏泉曰周既東遷衛自西北而往故云之東胡氏紹曾曰案衛人從王至京師屬右軍虢公林父正東行矣其雨其雨杲杲古老反出日願言思伯甘心首疾集傳比也其者冀其將然之詞冀其將雨而杲然日出嚴氏粲曰錢氏曰杲杲日色明也以比望其君子之歸而不歸也是以不堪憂思之苦而寧甘心於首疾也嚴氏粲曰頭痛也集說鄭氏康成曰人言其雨其雨而杲杲然日復出猶我言伯且來伯且來則復不來孔氏穎達曰願每也言我每有所言則思念於伯甘心者思之不能已如口味之甘故左傳云請受而甘心焉甘與子同夢義亦然輔氏廣曰冀其歸復不歸則其憂思為尤甚朱氏公遷曰憂思之苦本不能堪而令人首疾也但我則思而又思寧甘心首疾而不辭耳此章辭意當與下章例之焉於䖍反得諼況袁反草言樹之背音佩願言思伯使我心痗呼內反集傳賦也諼忘也諼草合歡食之令人忘憂者嚴氏粲曰孔氏以諼訓為忘非草名然毛氏云諼草令人忘憂是有其物也諼本又作萱說文作萱或作萱皆從草則為草名無疑矣陳氏子龍曰夲草云萱草一名鹿蔥花名宜男背北堂也孔氏穎達曰背者嚮北之義故知在北婦人欲樹草於堂上冀數見之明非遠地也婦人所常處者堂也故知北堂房室所居之地總謂之堂房半以北為北堂房半以南為南堂朱子曰北堂蓋古之植花草之處痗病也言焉得忘憂之草樹之北堂以忘吾憂乎然終不忍忘也是以寧不求此草而但願言思伯雖至於心痗而不辭爾心痗則其病益深非特首疾而已也集說孔氏穎達曰君子過時不反思之至甚既生首疾恐以危身故言我憂如此何處得一忘憂之草樹之於北堂之上冀觀之以忘憂也嚴氏粲曰人謂諼草忘憂何處可得之我欲植之以銷憂今我思伯至於心病恐非諼草所能療也黃氏佐曰憂思非人之欲也而欲之可以觀情矣懷憂者亦恆欲排遣之至於願言心痗乃若不欲解者思至於不欲解非身嘗之孰能解之總論朱氏公遷曰一章憫夫之才二章明已之志三章四章則極其憂思之苦而言之朱氏善曰首如飛蓬則髮已亂矣而未至於病也甘心首疾則頭已痛矣而心則無恙也至於使我心痗則心又病矣其憂思之苦亦已甚矣所以然者以其君子之未歸也然思之雖切而無雄雉卒章之勉以正何也觀首章言邦之桀兮則其夫之才必有大過人者豈其於事上保身之道有不待勉而後能故不及言歟徐氏常吉曰有膏沐而無意於首之容願思伯而甘心於首之疾思諼草而卒安於心之痗此可以見婦人性情之正伯兮四章章四句集傳范氏曰居而相離則思期而不至則憂此人之情也文王之遣戍役周公之勞歸士皆敘其室家之情男女之思以閔之故其民悅而忘死聖人能通天下之志是以能成天下之務兵者毒民於死者也孤人之子寡人之妻傷天地之和召水旱之災故聖王重之如不得已而行則告以歸期念其勤勞哀傷慘怛不啻在已是以治世之詩則言其君上閔恤之情亂世之詩則録其室家怨思之苦以為人情不出乎此也輔氏廣曰范氏之說深得聖人録詩之意集說黃氏櫄曰汝墳之婦女能閔其君子而猶勉以正殷靁之大夫妻能閔其勤勞而勸之以義夫以婦人而思其君子者情之常也而能勉之以正勸之以義為難然則伯兮之詩其不足以知此乎曰衛國之風固不足以比二南之化而過時不反亦非王者使民之道也徐氏光啓曰伯兮猶知有王周德未衰也北風鴇羽亦然有狐綏綏在彼淇梁心之憂矣之子無裳集傳此也狐者妖媚之獸綏綏獨行求匹之貌嚴氏粲曰綏本訓安則綏綏安綏之意也狐性多疑綏綏則獨行而遲疑也石絶水曰梁郭氏璞曰梁即橋也在梁則可以裳矣國亂民散喪其妃耦有寡婦見鰥夫而欲嫁之故託言有狐獨行而憂其無裳也集說鄭氏康成曰時婦人喪其妃耦寡而憂是子無裳無為作裳者欲與為室家范氏祖禹曰狐獨行於水之梁失其所也嚴氏粲曰狐性淫又多疑今在淇水之梁綏綏然有求匹之意喻無妻之人也謝氏枋得曰見鰥夫無人縫裳而有憂則其情可知矣沈氏守正曰之子即指狐說如碩鼠稱女之類有狐綏綏在彼淇厲心之憂矣之子無帶叶丁計反集傳比也厲深水可涉處也王氏安石曰岸近危曰厲何氏楷曰厲說文云旱石也纍岸石於水中踐之以渡帶所以申束衣也朱氏公遷曰申重也衣已束矣又用帶以束之在厲則可以帶矣集說顧氏起元曰水自帶以上曰厲必脫去其帶而渡之既厲則可以帶矣有狐綏綏在彼淇側心之憂矣之子無服叶蒲北反集傳比也濟乎水則可以服矣集說李氏樗曰無服言其衣服之不備也總論范氏處義曰詩人刺男女之無夫家故取獨行性孤之物以為喻且淇水之有梁者淇水之可厲者及淇水之側皆狐之所甚疑而不敢渡者今獨行於彼縱使欲求其匹不可得矣以喻民之困窮者下則無裳中則無帶上則無服其貧窶至此宜乎如狐獨行不可以得妃耦也朱氏公遷曰著裳然後加帶故用裳與帶為先後而又言服以兼之鄒氏泉曰此詩見寡婦不得已之情而時事亦可知矣姚氏舜牧曰之子自無裳無帶無服何預伊事而彼為之憂因其言以探其所不言而風人之情得矣有狐三章章四句集說李氏樗曰古者國有凶荒則減殺其禮而多昏觀大司徒以荒政十二聚萬民十曰多昏言不備禮而娶者多也蓋多昏可以會男女之無夫家者而蕃育人民今則不然故詩人刺之黃氏櫄曰觀氓之詩則知衛之男女不正觀有狐之詩則知衛之男女失時男女之不以正者淫奔之風也昏姻之不以時者凶荒之災也然凶荒豈嵗之罪哉民之失其本業也久矣采蘩條桑之風不復見而抱布貿絲之俗不可革此之子無裳無帶無服所以為衛之憂也雖欲殺禮而多昏其可得乎嚴氏粲曰有狐之詩桃夭標有梅之變也投我以木瓜叶攻乎反報之以瓊琚音居匪報也永以為好呼報反也集傳比也木瓜楙音茂木也實如小瓜酢可食爾雅楙木瓜蘇氏頌曰木瓜狀如奈春末開花深紅色其實大者如瓜小者如拳吕氏祖謙曰徐氏曰瓜有瓜瓞桃有羊桃李有雀李此皆枝蔓也故言木瓜木桃木李以别之瓊玉之美者琚佩玉名嚴氏粲曰傳云瓊玉之美者疏云瓊是玉之美名非玉名也說文云瓊赤玉也姑兼存之羅氏中行曰琚處佩之中所以貫蠙珠而上繫於珩下維璜衝牙者也言人有贈我以微物我當報之以重寶而猶未足以為報也但欲其長以為好而不忘耳疑亦男女相贈答之辭如靜女之類集說毛氏萇曰孔子曰吾於木瓜見苞苴之禮行鄭氏康成曰以果實相遺者必苞苴之尚書曰厥苞橘柚朱子曰投我以木瓜而報之以瓊琚報之厚矣而猶曰非敢以為報姑欲長以為好而不忘耳蓋報人之施而曰如是報之足矣則報者之情倦而施者之德忘惟其歉然常若無物可以報之則報者之情施者之德兩無窮也方氏應龍曰首二句只形容忠厚之情下二句欲以堅相好之誼此詩亦以風世之薄道往來而較量於錙銖者附録孔氏穎達曰以衛人得齊桓之大功思厚報之而不能乃假小事以言設使齊投我以木瓜我假以瓊琚猶非敢以此報齊之木瓜欲令齊長以為玩好結我以恩情而已況今救而封我如此大功知何以報之蘇氏轍曰桓公城楚邱以封衛遺之車馬器服衛以復安衛人德之故曰雖投我以木瓜我將報之以瓊琚瓊琚之於木瓜重矣然猶不敢以為報也永以與之為歡好而已投我以木桃報之以瓊瑶匪報也永以為好也集傳比也瑶美玉也陸氏德明曰瑶說文云美石投我以木李報之以瓊玖音久叶舉里反匪報也永以為好也集傳比也玖亦玉名也陸氏德明曰玖玉黑色集說孔氏穎達曰傳言琚佩玊名瑶玖亦佩玊名瑶言美石玖言玊名明此三者皆玊石雜也故丘中有麻傳云玖石次玊是玖非全玊也顧氏夢麟曰玊重石輕惟最貴者用玊以純故有非全玊之說總論黃氏櫄曰木瓜木桃木李皆微物也而詩人欲以瓊琚瓊瑶瓊玖報之且猶以為未足非物之不足而心之不足也許氏天贈曰此詩似賦而以為比者蓋以木瓜等比微物以瓊琚等比重寶非真以木瓜等相施報也木瓜三章章四句集說輔氏廣曰有學者請於先生曰某於木瓜詩反覆諷詠但見其有忠厚之意而不見其有褻慢之情小序以為美齊桓恐非居後而揣度者所能及或者其有所傳也竊意桓公既殁之後衛文公伐齊殺長立幼衛人感桓公之惠而責文公之無恩故為是詩以風其上不然則家語所載豈鑿空而為此言乎先生以為不然曰若以此詩為衛人欲報齊桓之詩則齊桓之惠何止於木瓜而衛人實未嘗有一物報之也而先生疑以為男女相贈答之辭如靜女之類者則亦以衛風多淫亂之詩而疑其或然耳嘗試思之靜女之詩其為男女相贈答於詩文可見至此詩則全不見有男女之辭若只據詩文以為尋常相問遺之意似亦通先施之者雖薄而後報之者常過厚是亦忠厚之情也且與家語之說亦不相戾胡氏一桂曰案王氏詩考引朝氏詩序論云賈誼謂木瓜下報上也如是則集傳以為疑亦男女相贈之辭未嘗以為實然之論然矣附録孔氏穎達曰戴公出處於漕為齊公子無虧所救戴公卒文公立齊桓公又城楚邱以封之則戴也文也皆為齊所救而封之也左傳齊侯歸公乘馬祭服歸夫人魚軒重錦是遺戴公也外傳齊語曰衛人出廬於漕桓公城楚邱以封之其畜散而無育齊桓公與之繫馬三百是遺文公也胡氏安國曰木瓜美桓而夫子録之善衛人之情也曷為善之報者天下之利以德報德則民有所勸矣嚴氏粲曰木瓜美桓公衛人之情也春秋不與桓公専封所以尊王也案詩序木瓜美齊桓公也衛人思之欲厚報之而作是詩孔穎達解之曰言欲厚報之則時實不能報也心所欲耳經三章皆欲報之詞漢唐宋諸儒皆從序說即朱子讀尊孟辨亦云詩録木瓜春秋序績之意亦以善衛人之情也豈以齊桓之事為盡可法則朱子亦嘗用序說矣獨至注詩則以為美桓之說於經文無所據而疑其為男女贈答之詩然曰疑者亦未為必然之論輔廣尊師說謂非美桓公但經文無男女之詞以為只作尋常問遺解此與後之託為申培之說者相近總之木瓜之詩言人當薄遺厚報故設為瓜瓊不等之喻謂若有厚於此者報當何如此風人忠厚之情也毛鄭指為美桓者述其所傳朱子改為贈答者據文詮義後儒獨於此詩袒毛鄭而與朱子相左者甚衆今從集傳亦不廢箋義在讀詩者善觀而㑹通之可耳衛國十篇三十四章二百三句集傳張子曰衛國地濵大河其地土薄故其人氣輕浮其地平下故其人質柔弱其地肥饒不費耕耨故其人心怠惰其人情性如此則其聲音亦淫靡故聞其樂使人懈慢而有邪僻之心也鄭詩放此輔氏廣曰鄭衛之俗淫靡非獨習俗之弊蓋亦風土所致張子發此說可謂能通天地人矣集說朱氏公遷曰衛多君子於詩可見如淇奧之武公固非諸國所有而文公興衛亦卓卓可稱者其餘如凱風之孝子北門之忠臣北風之智者干旄之賢大夫簡兮之賢伶官考槃之隱君子豈不特然於變風時其次則乘舟之爭死者亦有可憫之一節又如賢婦人六人則莊姜共姜許穆宋桓夫人泉水竹竿之女也若燕燕之全淑慎伯兮之守專一雄雉之知德行谷風被棄而有德音又在六婦人以外然則衛不特多君子亦可謂多賢婦人矣欽定詩經傳說彚纂卷四
