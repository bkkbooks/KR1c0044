body:
  text: 欽定四庫全書世宗憲皇帝御製詩經傳說彚纂序朕惟詩之為教所以成孝敬厚人倫美教化移風俗其用逺矣自說詩者以其學行世釋解紛紜而經㫖漸晦朱子起而正之集傳一書參考衆說探求古始獨得精意而先王之詩教藉之以明國家列在學官著之功令家有其書人人傳習四始六義曉然知所宗尚我皇考聖祖仁皇帝右文稽古表章聖經御纂周易折中既一以本義為正於春秋詩經復命儒臣次第纂輯皆以朱子之說為宗故是書首列集傳而採漢唐以來諸儒講解訓釋之與傳合者存之其義異而理長者别為附録折中同異間出己見乙夜披覽親加正定書成凡若干卷名曰詩經傳說彚纂朕惟詩三百篇先王所以明勸懲而行黜陟蓋治世之大經而後世文人學士乃以風雲月露之辭自託風雅學經者又溺於訓詁詞章之陋習烏在其能明先王之道也我皇考指授儒臣勒為是編期以闡先王垂教之意與孔子刪詩之㫖學於是者有得於興觀羣怨之微而深明於事父事君之道從政專對無所不能則經學之實用著而所謂用之鄉人用之邦國以化天下者亦於是乎行焉刋校既竣敬述聖意序之簡端雍正五年春三月朔雍正五年六月初五日奉㫖開列欽定詩經傳說彚纂總裁校對分修校刋諸臣職名總裁原任户部尚書臣王鴻緒原任都察院左都御史臣揆敘南書房校對字位過密無法顯示臣張廷玉經筵講官户部尚書臣蔣廷錫經筵講官刑部尚書臣勵廷儀原任日講官詹事府詹事臣王圖炳字位過密無法顯示臣魏廷珍在館分修校對字位過密無法顯示臣吳士玉經筵日講官內閣學士兼禮部侍郎臣吳襄太僕寺卿臣蔡嵩原任詹事府少詹事臣梅之珩日講官起居注翰林院侍讀學士臣沈翼機日講官起居注翰林院侍講臣蔣漣原任提督貴州學政翰林院檢討臣張大受翰林院編修臣許王猷原任翰林院編修臣徐雲瑞翰林院檢討臣陳萬策提督廣西學政江南道監察御史臣衛昌績協理浙江道事湖廣道監察御史臣蔣洽秀內閣中書臣馮汝軾原任內閣中書臣林佶原任內閣中書臣王賚原任內閣中書臣陸琮福建等處提刑按察使司按察使臣喬學尹原任四川重慶府知府臣周天祜山西解州安邑縣知縣臣車敏來原任湖廣長沙府攸縣知縣臣陳溥舉人臣王希正嵗貢生臣陳崿校刊原署直𨽻巡撫事都察院僉都御史臣趙之垣欽定四庫全書經部三欽定詩經傳說彚纂目録詩類卷首上凡例引用姓氏詩傳圖諸國世次圖作詩時世圖卷首下綱領大序詩集傳序卷第一國風周南關雎樛木葛覃螽斯卷耳桃夭罝汝墳芣苡趾麟之漢廣卷第二召南鵲巢采蘋采蘩甘棠草蟲行露羔羊泛江有殷其靁麕摽有梅野有死小星穠矣何彼騶虞卷第三邶柏舟日月緑衣終風燕燕擊鼓凱風谷風雄雉式微匏有苦葉簡兮旄丘泉水新臺北門乘舟北風二子靜女卷第四鄘柏舟桑中牆有茨奔君子偕老鶉之奔定之方中干旄相鼠蝃蝀載馳衛淇奧氓考槃竹竿碩人芄蘭河廣有狐伯兮木瓜卷第五王黍離陽陽君子于役揚之水君子中谷有蓷大車采葛爰有麻葛藟丘中鄭緇衣于田將仲子大叔叔于田清人羔裘同車遵大路有女女曰雞鳴山有扶蘇蘀兮之墠狡童東門褰裳風雨丰襟子揚之水草出其東門溱洧野有蔓卷第六齊雞鳴之日還東方著方未明東南山敝笱甫田載驅盧令猗嗟魏葛屨陟岵汾沮洳閒園有桃十畝之伐檀碩鼠卷第七唐蟋蟀椒聊山有樞綢繆揚之水杖杜羔裘葛生鴇羽采苓無衣有杖之杜秦車鄰蒹葭駟驖終南小戎黃鳥晨風渭陽無衣權與卷第八陳宛丘衡門東門之枌東門之池東門之楊株林月出墓門澤陂防有鵲巢檜羔裘匪風素冠隰有萇楚曹蜉蝣下泉候人鳲鳩卷第九豳七月破斧鴟梟伐柯東山九罭狼跋卷第十小雅鹿鳴之什鹿鳴常棣四牡伐木皇皇者華天保采薇杖杜出車南陔白華之什白華由庚華黍嘉魚魚麗南有崇丘蓼蕭南山有臺湛露由儀卷第十一彤弓之什彤弓六月菁菁者莪車攻采芑吉日沔水鴻鴈鶴鳴庭燎卷第十二祈父之什祈父其野白駒我行黃鳥斯干無羊之交節南山十月正月正雨無卷第十三小旻之什小旻巧言小宛斯何人小辨巷伯谷風大東蓼莪四月卷第十四北山之什北山小明無將大車楚茨鼓鐘信南山矣甫田瞻彼洛大田者華裳裳卷第十五桑扈之什桑扈車舝鴛鴦青蠅頍辨初筵賓之魚藻角弓采菽菀栁卷第十六都人士之什都人士隰桑采緑白華黍苗綿蠻瓠葉華苕之漸漸之石何草不黃卷第十七大雅文王之什文王棫朴大明旱麓綿齊思皇矣下武靈臺有聲文王卷第十八生民之什生民鳧鷖行葦假樂既醉公劉泂酌民勞卷阿板卷第十九蕩之什蕩漢雲抑髙嵩桑柔蒸民韓奕瞻卬江漢召旻常武卷第二十頌周頌清廟之什清廟維清維天之命烈文天作時邁昊天有成命文執競思我將周頌臣工之什臣工振鷺噫嘻豐年有瞽載見潛客有雍武周頌閔豫小子之什閔豫小子敬之訪落小毖酌載芟桓良耜賚絲衣般卷第二十一魯頌駉水泮有駜閟宫商頌那發長烈祖殷武𤣥鳥詩序上風詩序下雅頌臣等謹案詩經傳說彚纂二十卷序二卷康熙末聖祖仁皇帝御定刻成於雍正五年世宗憲皇帝製序頒行詩序自古無異說王肅王基孫育陳統爭毛鄭之得失而已其舍序言詩者萌於歐陽修成於鄭樵而定於朱子之集輔廣童子問以下遞相羽翼猶未列學官也元延祐中行科舉法始定詩義用朱子猶參用古注疏也明永樂中修詩經大全以劉瑾詩集傳通釋為藍本始獨以集傳試士然數百年來諸儒多引據古義竊相辨詰亦如當日之攻毛鄭蓋集傳廢序成於吕祖謙之相激非朱子之初心故其間負氣求勝之處在所不免原不能如四書集注句銖字兩竭終身之力研辨至精特明代纂修諸臣於革除之際老師宿儒誅鋤纍盡不能如劉三吾等輯書傳㑹選於蔡氏多所補正又成祖雖戰伐之餘欲興文治而實未能究心經義定衆說之是非循聲附和亦其勢然歟是編之作恭逢聖祖仁皇帝天亶聰明道光經籍研思六義綜貫四家於衆說之異同既别白瑕瑜獨操衡鑑而編校諸臣亦克承訓示考證詳明一字一句務深溯詩人之本㫖故雖以集傳為綱而古義之不可磨滅者必一一附録以補缺遺於學術持其至平於經義乃協其至當風雅運昌千載一遇豈前代官書任儒臣拘守門户者所可比擬萬一乎乾隆四十一年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
