body:
  text: 欽定四庫全書欽定詩經傳說彚纂卷八陳一之十二集傳陳國名太皥伏羲氏之墟孔氏頴逹曰大皞又號虙戲故連言之虙戲即伏義字異音義同也在禹貢豫州之東其地廣平無名山大川西望外方許氏謙曰外方見王風東不及孟諸孔氏穎達曰明豬尚書作盟豬即左傳稱孟諸之麋爾雅云宋有孟諸是也但聲訛字變耳周武王時帝舜之胄有虞閼音遏父為周陶正武王賴其利器用與其神明之後以元女大姬妻其子滿而封之於陳都於宛丘之側與黃帝帝堯之後共為三恪是為胡公孔氏穎達曰昭八年左傳史趙云胡公不淫故周賜之姓使祀虞帝則胡公姓媯武王所賜也恪者敬也王者敬先代封其後樂記云武王未及下車封黃帝之後於薊封帝堯之後於祝封帝舜之後於陳下車乃封夏后氏之後於杞封殷之後於宋明陳與薊祝共為三恪杞宋别為二王之後矣大姬婦人尊貴好樂五教反巫覡胡狄反歌舞之事孔氏穎達曰楚語曰在女曰巫在男曰覡其民化之今之陳州即其地也皇輿表陳州今開封府陳州𨽻河南集說鄭氏康成曰大姬好巫覡禱祈鬼神歌舞之樂民俗化而為之五世至幽公當厲王時政衰大夫淫荒所為無度國人傷而刺之陳之變風作矣蘇氏轍曰陳之變風原出於大姬蓋列國之風皆有所自起方周之盛時王澤充塞其善者篤於善不善者以禮自將亦不至於惡其後周德既衰諸侯各因其舊俗而增之善者因善以入於惡而不善者日以益甚故晉以堯之遺風為儉不中禮陳以大姬之餘俗為遊蕩無度亦理勢然也朱氏公遷曰陳檜曹皆小國故居變風之終又變風訖於陳靈陳有靈公之詩亦宜居變風之終但檜曹比陳為尤小且有思治之詩故二國不可先陳而以陳列於其前也子之湯他郎他浪二反兮宛丘之上辰羊辰亮二反兮洵音荀有情兮而無望武方武放二反兮集傳賦也子指逰蕩之人也湯蕩也四方髙中央下曰宛丘濮氏一之曰宛丘因以為其地之名王氏應麟曰郡縣志宛丘在陳州宛丘縣南三里括地志縣在陳城中古陳國洵信也望人所瞻望也國人見此人常逰蕩於宛丘之上故叙其事以刺之言雖信有情思而可樂矣然無威儀可瞻望也集說吕氏祖謙曰湯雖訓蕩與徑斥為淫蕩者辭氣緩急猶不同洵有情兮而無望兮從容不迫而諷切之者深矣輔氏廣曰逰蕩以為樂情也威儀之可望禮也溺於情者必不足於禮故詩人譏之坎其擊鼓宛丘之下叶後五反無冬無夏叶與下同值直置反其鷺羽集傳賦也坎擊鼓聲值植也鷺舂鉏陸氏佃曰鷺步於淺水好自低昻故曰舂鉏也今鷺鷥好而潔白頭上有長毛十數枚羽以其羽為翳舞者持以指麾也孔氏穎達曰鷺羽執持之物故以植為持鷺羽可以為舞者之翳故持之也言無時不出遊而鼓舞於是也集說范氏祖禹曰冬夏祁寒大暑之時也人之好樂於是時必少息焉今也無冬無夏則其他時可知矣徐氏常吉曰古者春秋教以禮樂冬夏教以詩書今冬夏值其鷺羽則常舞而無度矣此商書所謂恆舞也坎其擊缶方有反宛丘之道叶徒厚反無冬無夏值其鷺翿音導叶殖有反集傳賦也缶瓦器可以節樂孔氏穎達曰易離卦九三云鼓缶而歌則樂器亦有缶坎卦六四樽酒簋二用缶則缶又是酒器也襄九年宋災左傳曰具綆缶備水器則缶是汲水之器然則缶是瓦器可以節樂若今擊甌又可以盛水盛酒即今之瓦盆也翿翳也總論輔氏廣曰後兩章但再述其事以見其遊蕩之無時耳寒暑而不休則無時而止矣樂固人之所喜也然必一張一弛時出而用之然後可以和悅其心志舒散其氣血倘作樂無時則適足以陷溺其心爾宛丘三章章四句集說鄒氏泉曰此詩見習俗之敝而詩人刺之亦不為習俗所移者矣案序宛丘刺幽公也毛萇解之曰子指大夫經所陳乃大夫之事由君化之使然故舉大夫之事以刺之鄭康成則曰子者斥幽公也是經序相符也孔穎達申其說曰經之所陳皆幽公之事不宜以為大夫隱四年公子翬謂隱公曰百姓安子諸侯說子則諸侯之臣亦呼君曰子故易傳也朱子曰子指遊蕩之人也辨小序曰陳國小無事實幽公但以惡諡故得遊蕩無度之詩未敢信也解經可謂愼矣然曰望人所瞻望也則仍似屬有位者言也若閭巷細民鼓舞於宛丘何係輕重而國人作詩以刺之又致夫子録是詩以冠陳風之首重為後世戒耶蓋上行則下效序與傳箋推其原則有所指朱子以為無其據則主泛言然其相因之理一也又集傳云大姬好樂巫覡歌舞之事其民化之其說始於漢儒此則又推陳風漬漸之由非謂宛丘之詩也東門之枌符云反宛丘之栩況浦反子仲之子婆娑素何反其下叶後五反集傳賦也枌白榆也先生葉郤著莢皮色白嚴氏粲曰枌解見唐山有樞栩解見唐鴇羽子仲之子子仲氏之女也嚴氏粲曰次章言不績其麻知子仲之子為指女子也婆娑舞貌孔氏頴逹曰孫炎曰舞者之容婆娑然何氏楷曰或婆娑於枌之下或婆娑於栩之下明其非一時非一處也此男女聚㑹歌舞而賦其事以相樂也集說嚴氏粲曰陳都宛丘之側其東門與丘之間乃國之交㑹其處又有枌栩二種之木可以休息故陳大夫子仲氏之女乃婆娑遨遊於其下蓋以相誘說也遊蕩之俗以貴族猶為之何責於小民乎徐氏常吉曰東門人所出入宛丘人所往來有枌栩之陰人所趨聚也子仲氏以大夫之女聚舞已非所宜况男女相與而慕悅乎穀旦于差初佳反叶七何反南方之原無韻未詳不績其麻叶謨婆反市也婆娑集傳賦也穀善差擇也既差擇善旦以㑹於南方之原歐陽氏修曰男女淫奔多在國之郊野所謂南方之原者猶東門之墠也李氏樗曰毛鄭以原為陳大夫而以原為氏不甚明白歐陽以為南方原野則其說為簡徑於是棄其業以舞於市而往㑹也集說范氏祖禹曰先王惡夫飽食而逸居是故君子勤禮小人盡力所以愛日也今也民於善日則擇髙明之地而荒樂焉黃氏櫄曰嘗觀豳之風俗其男耕其婦饁其女桑至於八月載績則蠶事畢而麻事起矣今陳之風俗至於男女不紡績其麻市也婆娑此所謂上有好者下必有甚焉者也馮氏復京曰案市朝之市在國中者乃是商賈貿易之地揆之地勢不宜聚㑹歌舞於其間也上文云南方之原其地必閒曠而可樂意者如遺人道路之市歟古者八家同井家有私田百畝公田十畝餘二十畝為井竈廬舍即就廬舍以交易市井之名殆出於此而後世因謂國都之市亦為市井則此詩所謂市者或在野外田間未可知也穀旦于逝越以鬷子公反邁叶力制反視爾如荍祁饒反貽我握椒集傳賦也逝往越於鬷衆也鄭氏康成曰鬷總也孔氏穎達曰謂男女總集而合行也邁行也荍芘音毗芣音浮也又名荆葵紫色蘇氏轍曰荍小草而多華羅氏願曰荆葵比戎葵葉小花似五銖錢大色粉紅有紫文縷之一名錦葵大抵似蘆蔔花椒芬芳之物也言又以善旦而往於是以其衆行而男女相與道其慕悅之詞曰我視爾顔色之美如芘芣之華於是遺我以一握之椒而交情好也集說蘇氏轍曰男女既相告以相差擇今則又相告而往矣於是遂行往㑹之於其㑹也相謔以荍而相遺以椒相與為淫蕩而莫知恥也朱氏道行曰于逝之逝有忘返意以鬷而邁謂男女成羣如雲如荼也如荍之贊男悅女也握椒之奉女昵男也至是直與溱洧秉蕑之謔勺藥之贈同風無復先王家教之遺矣總論輔氏廣曰夫民勞則思思則善心生逸則淫淫則忘善忘善則惡心生理勢之必然也陳國之地廣平又以大姬之化故其俗淫蕩無度男女聚㑹歌舞婦人棄其所業相與慕悅各有所贈以交情好動其淫欲者亦其勢之必然也東門之枌三章章四句集說王氏安石曰東門之枌宛丘之應也衡門之下可以棲音西遲泌悲位反之洋洋可以樂音洛飢集傳賦也衡門橫木為門也門之深者有阿孰堂宇許氏謙曰考工記門阿注棟也疏屋脊考工記注引爾雅門側之堂謂之孰則堂即孰也又案屋之基亦曰堂周禮堂崇三尺堂崇一筵禮記天子之堂九尺皆指堂基而言則堂字作基說為長說文宇屋邉即屋四垂此惟衡木為之孔氏頴達曰衡古文橫假借字也衡橫義同門惟橫木為之言其淺也棲遲遊息也泌泉水也孔氏穎達曰邶風有毖彼泉水知泌為泉水嚴氏粲曰此泌與彼毖字異義同亦當為泉水之流貌洋洋水流貌此隱居自樂而無求者之詞言衡門雖淺陋然亦可以遊息泌水雖不可飽然亦可以玩樂而忘飢也集說許氏謙曰衡門之詩隱士所作命士之堂三尺庶人蓋無級門之制衡門固隱士之常爾顧氏起元曰衡門以所居而安言泌水以所玩而樂言泌水非真可飽玩泌水可樂自忘其飢爾附録歐陽氏修曰詩人以僖公可以勉進於善而惜其懦無自立之志故作詩以誘進之云衡門雖淺陋若居之不以為陋則亦可以逰息於其下泌水洋洋然若閲之而樂則亦可以忘飢言陳國雖小若有意於立事則亦可以為政豈其食魚必河之魴音房豈其取音娶妻必齊之姜集傳賦也姜齊姓集說瞿氏景淳曰食魚取妻雖不是借言然賢者之意自當廣也豈其食魚必河之鯉豈其取妻必宋之子叶奬里反集傳賦也子宋姓集說陸氏佃曰里語曰洛鯉伊魴貴於牛羊言洛以深宜鯉伊以清淺宜魴也河性宜魚故曰河之魴河之鯉朱氏公遷曰食色性之欲也而食魚不必魴鯉取妻不必齊姜宋子則凡所以自奉者皆不求全而責備矣素位而行不願乎其外斯人之謂歟附録歐陽氏修曰既言雖小亦可有為又言何必大國然後可為譬如食魚者凡魚皆可食若必待魴鯉則不食魚矣譬如取妻諸姓之女皆可取若必待齊宋之族則不取妻矣是首章之意言小國皆可有為而二章三章言大國不可待而得也總論輔氏廣曰此詩以為隱居自樂而無求者之辭則辭順理明甚易而實是夫逐物徇外乃人之常情今玩其辭意安愈恬淡非樂內者有所不能也熊氏朋來曰人須是世味淡則能隱亦須世味淡則能樂衡門可棲遲居不求安也泌可樂飢食不求能也然飲食男女人之大欲故特以食魚取妻言之許氏謙曰前一章有自足之意後兩章無外慕之心此雖賦體而實似比也劉氏瑾曰能隱居者必能自樂能自樂者必能無求故三者之意備見於一詩之間首章上二句可見其隱居下二句可見其自樂後兩章又可見隨遇而安無求於世也附録蘇氏轍曰夫棲遲必大屋樂飢必飲食食魚必魴鯉取妻必姜子則終身有不獲者故從其所有而為之及其至也雖天下之美無加焉不然雖有天下之至美而常挾不足之心以待之則終亦不為而已矣僖公自謂小國無意於為治故陳此以誘之衡門三章章四句集說王氏柏曰陳風十篇止有衡門一詩為善其餘多男女㑹遇之作亞於鄭風矣黃氏佐曰隱居者自為此詩與考槃不同蓋考槃是他人美之者也故此詩無贊美之詞附録孔氏穎達曰作衡門詩者誘僖公也以僖公慤願而無自立之志故國人作是詩誘使自强行道令興國致理也范氏處義曰是詩與甫田皆視其君之失而正救之齊襄公志大心勞所謂過也詩人則抑之陳僖公願而無立志所謂不及也詩人則誘之與聖人教人之意同也案序之說詩於十五國風其㫖多矣曰美曰刺曰勸曰惡曰思曰閔曰傷曰疾曰怨曰責曰止曰懼曰戒曰哀曰憂至直賦其事者因事以為文而曰誘者獨見於陳風之衡門一篇蓋僖公願而無立志故作是詩以誘掖之也其有忠愛之意歟夫既以為誘則三章俱作比看朱子改以為隱者自樂而無求者之詞則三章俱作賦看於義似較直捷矣然古說亦可通節存其意俾後之窮經者有以博考焉東門之池可以漚烏豆反麻叶謨婆反彼美淑姬可與晤五故反歌集傳興也池城池也鄭氏康成曰孔安國云停水曰池孔氏穎達曰以池繫門言之則此池近在門外諸詩言東門皆是城門故以池為城池漚漬也治麻者必先以水漬之孔氏穎達曰考工記㡛音茫氏以涗音稅水漚其絲注云漚漸也謂漸漬使之柔韌也晤猶解也黃氏佐曰蓋我與歌之彼自解之之意此亦男女㑹遇之詞蓋因其㑹遇之地所見之物以起興也集說孔氏穎達曰黃帝姓姬炎帝姓姜二姓之後子孫昌盛其家之女美者尤多左傳引易詩云雖有姬姜無棄憔悴是以姬姜為婦人美稱也董氏逌曰周姬姓陳因元女以封故詩人猶言淑姬唐氏汝諤曰以池可治物人可快心為興沈氏守正曰水經注陳城東門內有池水至清潔而不耗竭即其地也見是公共之所人人可往無禁止也漚者漸漬之詞見可以浸淫而無害也附録鄭氏康成曰於池中柔麻使可緝績作衣服興賢女能柔順君子成其德教晤猶對也言淑姬賢女君子宜以對歌相切化也孔氏穎達曰以君淫昏故思得賢女配之與之對偶而歌冀其切化使君為善張氏次仲曰淑女非妖麗之稱晤歌亦無戲浪笑傲之態池水漚麻以喻漸漬而不覺淑姬晤歌以見婉轉而善入東門之池可以漚紵直吕反彼美淑姬可與晤語集傳興也紵麻屬陸氏璣曰紵科生數十莖宿根在地中至春自生不嵗種也荆揚之間一嵗三收范氏祖禹曰紵以當署東門之池可以漚菅古顔反叶居賢反彼美淑姬可與晤言集傳興也菅葉似茅而滑澤莖有白粉柔韌而振反宜為索也范氏祖禹曰菅以為屨濮氏一之曰左傳云雖有絲麻無棄菅蒯蒯與菅皆謂苕也黃華者俗名黃芒即蒯也白華者俗名白芒即菅也總論許氏天贈曰晤歌與之合曲而歌也晤語與之相答述也晤言與之相言論也東門之池三章章四句集說輔氏廣曰序以詩中淑姬二字故生其說正如靜女之詩由靜女而生說也殊不知彼美淑姬云者乃男悅女之辭彼自以為美自以為淑耳非真有賢淑之德也附録鄭氏伯熊曰觀齊雞鳴之詩其相警戒之言則閨門之奧笑歌晤言故足以浸漬其君之心而革其惡此東門之詩所以思賢女也案東門之池古序以為刺時衍其說者以為疾時之不然而思得賢女以配君子也朱子改為男女聚㑹之詞而以淫詩例之然玩其詞氣却無褻狎謔浪之意漢儒之說殆以是歟東門之楊其葉牂牂子桑反昏以為期明星煌煌集傳興也東門相期之地也楊栁之揚起者也牂牂盛貌明星啓明也煌煌大明貌此亦男女期㑹而有負約不至者故因其所見以起興也集說朱氏公遷曰語不相應義不相因特即所見以為興顧氏起元曰此女負約而男作詩也興意其枝揚則其葉盛反興約昏為期而夕不至也明星煌煌言所期不見但仰見明星之煌煌而已附録毛氏萇曰言男女失時不逮秋冬鄭氏康成曰楊葉牂牂三月中也喻時晚也失仲春之月親迎之禮以昏時女留他色不肯時行乃至大星煌煌然孔氏穎達曰禮當及時配合女當隨夫而行至使昏姻失時男女相違如是故舉以刺時也士昏禮執燭前馬是親迎之禮以昏也用昏者取陽往陰來之義東門之楊其葉肺肺普計反昏以為期明星晢晢之世反集傳興也肺肺猶牂牂也晢晢猶煌煌也總論黃氏一正曰言東門之楊葉盛可蔽而又昏以為期良可相㑹今乃失約而至於明顯之時則不遂所欲矣東門之楊二章章四句集說輔氏廣曰自宛丘而為東門之枌自東門之枌而為東門之池東門之楊蓋俗之流而勢之下也有國者之於導民可不謹哉附録嚴氏粲曰陳東門之楊與鄭丰皆親迎而女不至言刺時猶言刺亂以時使然也謝氏枋得曰男親迎而女不至此風俗之弊人道之變淫亂而不知禮義者也案集傳此篇改序說為男女期㑹而負約不至之詩然考朱子初解曰東門蓋此人親迎之所以其所見起興曰東門之楊則其葉牂牂矣昏以為期而明星煌煌矣蓋從序說也今姑存之墓門有棘斧以斯所宜反之夫也不良國人知之知而不已誰昔然矣集傳興也墓門凶僻之地多生荆棘斯析也孔氏穎達曰釋言云斯離也孫炎曰斯析之離是斯為析義也濮氏一之曰斯莊子斯而析之夫指所刺之人也誰昔昔也猶言疇昔也邢氏昺曰毛傳云昔久也郭云誰發語詞言墓門有棘則斧以斯之矣此人不良則國人知之矣國人知之猶不自改則自疇昔而已然非一日之積矣所謂不良之人亦不知其何所指也集說輔氏廣曰人之為惡初動於隱微之中猶有懼人之知之心至於公然形肆於外則已無所忌憚矣然猶幸其為人所規正刺譏而有改也今其為惡至於國人皆知之而猶不自改則非一日之積蓋不可得而救藥之也唐氏汝諤曰惡木生於幽僻為斧所析惡行發於隱微為人所知此興意也附録鄭氏康成曰興者喻陳他由不覩賢師良傅之訓道至陷於誅絶之罪蘇氏轍曰桓公之世陳人知他之不臣矣而桓公不去以及於亂是以國人追咎桓公以為桓公之智不能及其後故以墓門刺焉夫陳他也他之不良國人莫不知之者知而不之去昔者誰為此乎墓門有梅有梟萃止夫也不良歌以訊叶息悴反之訊豫不顧叶果五反顚倒思豫叶演女反集傳興也鴟梟惡聲之鳥也陸氏璣曰梟大如斑鳩緑色入人家凶賈誼所賦鵩鳥是也其肉甚美可為羮臛又可為炙濮氏一之曰楚辭注鴟梟二物又云鵩似梟本草云其實一耳莊子見彈而求梟炙是也萃集訊告也顚倒狼狽之狀墓門有梅則有梟萃之矣夫也不良則有歌其惡以訊之者矣訊之而不豫顧至於顚倒然後思豫則豈有所及哉或曰訊豫之豫疑當依前章作而字集說黃氏一正曰言梅本嘉木梟本惡鳥今墓門有梅生非其地則梟亦萃止矣夫也失其故性而不良則豈不有歌以訊之者乎姚氏舜牧曰凡人之不良者初不畏人之知亦不顧人之訊至於顛倒然後致思則已無及矣此有識者必辨之於早不待狼狽而後為無及之思也唐氏汝諤曰僻地有梅則惡聲者皆聚其中幽獨有思則惡惡者得發其隱故又以為興附録程子曰前章言有棘言他之不善後章言有梅深咎輔導之使然梅雖美木生墓門荆棘荒蕪之處則惡鳥萃矣雖有良心善性與不善人處則惡歸矣總論薛氏志學曰上章言積惡不悛而追咎其始深絶之也下章言悔過無及而永思其終微教之也總是愛人無已之意墓門二章章六句集說唐氏汝諤曰此為刺惡之詩附録陳氏鵬飛曰此詩雖以刺他乃是耆舊之賢者備見始末追咎先君不能為他置良師𫝊也范氏處義曰他桓公之弟也桓公卒而他立明年為蔡人所殺他當桓疾病殺太子而以己代之可謂不義陳由是亂國人至於分散所謂惡加於民也序詩者不以為君直言陳他蓋得春秋不稱爵書蔡人殺陳他之㫖與書衛州吁鄭忽同也案朱子初解曰此詩刺他而追咎先君不能為他置良師傅以至於此也又解末章曰夫也不良則有歌其惡以訊之者矣訊之而不豫顧至於顛倒然後思豫則豈有及哉亦追咎之辭也與諸儒舊說相同及著集傳以陳國君臣事無可紀獨陳他以亂賊被討見書於春秋序遂以此詩與之不知其信然否也蓋亦未決之詞但序曰刺他傳之國史陳有他與衛有州吁鄭有叔段等采風者皆不得無詩況陳事既無他籍可考而此詩業有古序可據則諸儒之從序說似不必致疑於千載之下矣防有鵲巢邛其恭反有旨苕徒雕反叶徒刀反誰侜陟留反豫美心焉忉忉都勞反集傳興也防人所築以捍水者周禮稻人以豬畜水以防止水邛邱孔氏穎達曰土之髙處草生尤美故邛為邱何氏楷曰防邛一說皆陳地名郡國志陳國陳縣注引博物記云邛地在縣北防亭在焉愚案防隄也朱子之解得之旨美也苕苕饒也莖如勞豆而細葉似蒺藜而青其莖葉緑色可生食如小豆藿也孔氏穎達曰苕之華傳云苕陵苕此直曰苕草彼陵苕之草好生下溼此則生於髙邱與彼異也侜侜張也猶鄭風之所謂迋居望反也濮氏一之曰侜為誑誕則字與譸同書云譸張為幻之意也豫美指所與私者也忉忉憂貌此男女之有私而憂或間之之詞故曰防則有鵲巢矣邛則有旨苕矣今此何人而侜張豫之所美使我憂之而至於忉忉乎集說朱氏公遷曰彼所宜有之物則皆有此所不當有之事乃有之蓋以尋常之物興怪異之事也黃氏一正曰鵲善相地安則為巢苕宜荒地不戕則旨今防有鵲巢邛有旨苕則各得其所矣而豫之所美者顧為侜張而不得其所乎鄒氏泉曰言駕不根之詞以侜張之而生彼擕二之心也附録鄭氏康成曰防之有鵲巢邛之有美苕處勢自然喻宣公信多言之人故致此讒人歐陽氏修曰讒言惑人非一言一日之致必由纍積而成如防之有鵲巢漸積構成之爾又如苕饒蔓引牽連將及我也程子曰侜謂譸張迂回誣罔人者必迂曲以致其惡豫美心所賢者憂讒誣賢善也中唐有甓蒲厯反邛有旨鷊五厯反誰侜豫美心焉惕惕吐歷反集傳興也廟中路謂之唐毛氏萇曰中中庭也唐堂塗也孔氏穎達曰以唐是門內之路故知中是中庭孫炎云堂途堂下至門之徑也甓瓴音零甋音滴也郭氏璞曰㼾甎音鹿專也今江東呼為瓴甓鷊小草雜色如綬董氏逌曰鷊舊作劉氏瑾曰案埤雅鷊本鳥名亦名綬鳥咽下有囊如小綬具五色此傳所釋鷊草之名豈因其似鷊鳥而取義乎惕惕猶忉忉也集說黃氏一正曰言中唐有甓人罕踐之故能成其美邛有旨鷊人莫戕之故能成其文今豫之所美者而人顧侜張之使我心惕惕乎附録歐陽氏修曰中唐有甓非一甓也亦以積纍而成旨鷊綬草雜衆色以成文猶多言交織以成惑義與貝錦同總論朱氏公遷曰憂慮之意反覆道之防有鵲巢二章章四句集說輔氏廣曰遊蕩歌舞陳之俗也其流為淫邪者宜矣故陳風之末大抵皆淫亂之詩此詩與鄭風揚之水相似附録孔氏穎達曰經二章皆上二句言宣公致讒之由下二句言己憂讒之事嚴氏粲曰此詩憂讒賊者詩人為賢者憂之也案防有鵲巢序曰憂讒賊也鄭康成曰所美謂宣公也程子曰豫美心所賢者一言下之誑君以讒人一言奸之誣善以害人皆作詩者憂患之意朱子曰豫美指所與私者而定此詩為男女有私憂或閒之之詞然不指其所謂豫美者為男乎為女乎夫風詩之託興甚逺簡兮之彼美為盛王葛生之豫美為君子詞可作男女夫婦讀意可作君親朋友觀即不泥為宣公而程子之說為可思矣月出皎兮佼古卯反人僚音了兮舒窈烏了反糾已小反兮勞心悄七小反兮集傳興也皎月光也佼人美人也陸氏德明曰佼又作姣方言云自關而東河濟之閒好謂之姣李氏樗曰孟子曰子都之姣僚好貌窈幽逺也糾愁結也顧氏起元曰言思之幽逺不可窮綰結不可解也悄憂也鄭氏康成曰思而不見則憂王氏安石曰悄言不說而靜默此亦男女相悅而相念之詞言月出則皎然矣佼人則僚然矣安得見之而舒窈糾之情乎是以為之勞心而悄然也集說蘇氏轍曰婦人之美盛如月出之光朱氏公遷曰此因所見以起興蓋月出於夜正私心所發之時沈氏守正曰勞心悄兮忖度其心若謂佼人思己者月出皓胡老反兮佼人懰力久反叶朗老反兮舒懮於久反受叶時倒反兮勞心慅七考反兮集傳興也懰好貌懮受憂思也慅猶悄也王氏安石曰慅言不安而騷動月出照兮佼人燎力召反兮舒夭於表反紹實照反兮勞心慘當作懆七弔反兮集傳興也燎明也董氏逌曰燎則其光與月並夭紹糾緊之意慘憂也王氏安石曰慘言不舒而憂愁集說輔氏廣曰窈糾懮受夭紹大抵是人心憂思牢結而難解之意然有淺深至於糾緊則甚矣朱氏公遷曰凡人心平則舒緩有憂則糾緊總論吕氏祖謙曰此詩用字聱牙意者其方言歟朱氏善曰月出之詩其悅之也至矣其思之也切矣其憂之也滐矣移是心以好賢亦將何求而不獲哉惜也吾未見好德如好色者也月出三章章四句集說沈氏守正曰此詩與澤陂朱子皆以為男女相悅之詞今玩佼人蓋男思女之詞也胡為乎株林從夏戶雅反南叶尼心反下同匪適株林從夏南集傳賦也株林夏氏邑也王氏應麟曰郡國志陳縣注陳有株邑蓋朱襄之地寰宇記陳州南頓縣西南三十里有夏亭城城北五里有株林郡縣志宋州柘城縣本陳之株邑詩株林是也夏南徵舒字也孔氏穎達曰徵舒字子南以氏配字謂之夏南靈公嚴氏粲曰疏曰靈公平國共公朔子淫於夏徵舒之母朝夕而往夏氏之邑故其民相與語曰君胡為乎株林乎曰從夏南耳然則非適株林也特以從夏南故耳蓋淫乎夏姬不可言也故以從其子言之詩人之忠厚如此集說范氏處義曰不斥夏姬而言夏南夏南實主其家國人亦預憂其禍必作於夏南也張氏彩曰意當時靈公諱言夏氏而託株林以為辭故詩云然駕我乘繩證反馬叶滿補反說音稅于株野叶上與反乘平聲我乘駒朝食于株集傳賦也說舍也馬六尺以下曰駒集說輔氏廣曰首章猶為之隱也至末章則不容隱矣但惜其車馬之被汚而已詩人雖為公隱而公則自不以為恥也馳驅乘馬而朝食于株則其無恥甚矣嚴氏粲曰駕一乘之馬則舍說于株林之野乘一乘之駒則又朝食于株原無他往朝朝暮暮只往株林何為也哉沈氏守正曰既乘馬又乘駒非一往也亦見非微行也總論姚氏舜牧曰胡為株林二句是問其行匪適株林二句是實其事駕我乘馬二句是道其往之無他乘我乘駒二句是道其見之欲亟許氏天贈曰首章本言從夏姬也然但指其子而不直斥其所從之人末章言從夏姬之頻也然不指其人而但言其所至之地此詩之厚也株林二章章四句集傳春秋傳夏姬鄭穆公之女也嫁於陳大夫夏御叔靈公與其大夫孔寧儀行父通焉泄冶諫不聽而殺之宣公九年左傳陳靈公與孔寧儀行父通於夏姬皆衷其衵服以戲於朝泄冶諫曰公卿宣淫民無效焉且聞不令君其納之公曰吾能改矣公告二子二子請殺之公弗禁遂殺泄冶後卒為其子徴舒所弒而徵舒復為楚莊王所誅宣公十年左傳陳靈公與孔寧儀行父飲酒於夏氏公謂行父曰徵舒似女對曰亦似君徵舒病之公出自其廏射而殺之二子奔楚宣公十一年左傳楚子為陳夏氏亂故伐陳謂陳人無動將討於少西氏遂入陳殺夏徵舒轘諸栗門集說朱氏公遷曰荒穢者必亡弒逆者必誅集傳舉其大要而所以示鑒戒者亦明矣朱氏善曰衛之亂至於牆有茨而極於是有狄入衛之禍陳之亂至於株林而極於是有楚入陳之禍然則狄非能入衛也宣姜實召之也楚非能入陳也夏姬實召之也此所謂女戎也比事以觀可以為淫亂者之戒矣彼澤之陂叶音波有蒲與荷音何有美一人傷如之何寤寐無為涕他弟反泗音四滂普光反沱徒何反集傳興也陂澤障也孔氏穎達曰謂澤畔障水之岸蒲水草可為席者吕氏祖謙曰說文曰蒲者似莞音官而褊有脊滑柔而溫嚴氏粲曰莞精蒲粗荷芙蕖也爾雅荷芙蕖其莖茄音加其葉蕸音遐其本蔤音密其華菡萏其實蓮其根藕其中的的中薏李氏巡曰分别蓮莖花葉實之名芙蕖其總名也自目曰涕自鼻曰泗此詩之㫖與月出相類言彼澤之陂則有蒲與荷矣有美一人而不可見則雖憂傷而如之何哉寤寐無為涕泗滂沱而已矣集說孔氏穎達曰陂障之中有蒲與荷之二草以喻男與女聚㑹之時相悅如是及其分離則憂思相憶云有美好之一人我思之而不能見當如之何乎既不能見益復感傷覺寢之中更無所為念此美女涕泗滂沱淫風如此蘇氏轍曰婦人之色如蒲荷之美思而不見故憂傷涕泗也朱氏公遷曰物與地相稱事與願相違有字相呼而無字反應為興彼澤之陂有蒲與蕑古顔反叶居賢反有美一人碩大且卷其員反寤寐無為中心悁悁烏𤣥反集傳興也蕑蘭也孔氏穎達曰以溱洧秉蕑為執蘭則知此蕑亦為蘭也卷鬢髮之美也李氏樗曰卷美也盧令曰其人美且鬈字雖不同其義則一悁悁猶悒悒也集說嚴氏粲曰或疑碩大非婦人之稱觀衛風以碩人稱莊姜車舝稱辰彼碩女則詩以碩大稱婦人多矣彼澤之陂有蒲菡戶感反萏大感反叶待檢反有美一人碩大且儼魚檢反寤寐無為輾轉伏枕叶知檢反集傳興也菡萏荷華也儼矜莊貌輾轉伏枕卧而不寐思之深且久也總論孔氏穎達曰首章言荷指芙蕖之莖卒章言菡萏指芙蕖之華二者皆取華之美以喻女色但變文以取韻耳二章言蘭者蘭是芬香之草喻女有善聞此淫佚之女必無善聲聞但悅者之意言其善耳范氏處義曰詩人以蒲配荷配蕑配菡萏所謂男女相說也其未得之也則既思其人而感傷又思其人髮之卷又思其人貌之儼寤寐之間不復他有所為或涕泗俱下或悁悁憂戚或輾轉廢寢此皆合男女之情而言之詩人言其情而不及於亂亦欲其止乎禮義也澤陂三章章六句集說王氏安石曰澤陂株林之應也輔氏廣曰男女相說至於憂思感傷如月出澤陂其末流之害當何如哉男有男之業女有女之事今也寤寐無為盡廢其事業是亦可憂也已情思之流其弊必至於此張氏彩曰有關雎之風則薰為桃李之正而麟趾應之有宛丘之俗則流為株林之淫而澤陂應之微之著也如此夫陳國十篇二十六章一百一十四句集傳東萊吕氏曰變風終於陳靈其間男女夫婦之詩一何多耶曰有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯七故反男女者三綱之本萬事之先也正風之所以為正者舉其正者以勸之也變風之所以為變者舉其不正者以戒之也道之升降時之治亂俗之汙隆民之死生於是乎在録之煩悉篇之重復亦何疑哉集說蘇氏轍曰詩止於陳靈何也古之說者曰王澤竭而詩不作是不然矣豫以為陳靈之後天下未嘗無詩而仲尼有所不取也原詩之所為作者發於思慮之不能自已而無與乎王澤之存亡也是以當其盛時其人親被王澤之純其心和樂而不流於是焉發而為詩其詩無有不善則今之正詩是也及其衰也有所憂愁憤怒不得其平淫佚放蕩不合於禮者矣而猶知復反於正故其為詩也亂而不蕩則今之變詩是也故曰變風發乎情止乎禮義發乎情民之性也止乎禮義先王之澤也先王之澤尚存而民之邪心未勝則猶取焉以為變詩及其邪心大行而禮義日逺則詩淫而無度不可復取故詩止於陳靈而非天下之無詩也有詩而不可以訓焉爾檜一之十三集傳檜國名陸氏德明曰檜本又作鄶王氏應麟曰左傳國語作鄶地理志作會高辛氏火正祝融之墟孔氏穎達曰昭十七年左傳梓慎云鄭祝融之墟也鄭滅檜而處之故知檜是祝融之墟楚語稱顓頊命南正重司天以屬神火正黎司地以屬民則黎為火正高陽時也言高辛者以重黎是顓頊命之厯及髙辛仍為此職也黎實祝融以五行官有火正祝融則火官之號在禹貢豫州外方之北滎波之南孔氏穎達曰禹貢豫州云滎波既豬注云沇水溢出所為澤也今塞為平地滎陽民猶謂其處為滎澤滎澤滎波一澤名也居溱洧之間其君妘姓祝融之後鄭氏康成曰祝融氏名黎其後八姓惟妘姓檜者處其地焉孔氏穎逹曰黎弟吳回復居火正為祝融吳回生陸終陸終生子六人四曰㑹人案世本㑹人即檜之祖也范氏處義曰王肅曰周武王封祝融之後於濟洛河穎之間為檜子周衰為鄭桓公所滅而遷國焉今之鄭州即其地也皇輿表鄭州今開封府鄭州隸河南蘇氏以為檜詩皆為鄭作如邶鄘之於衛也未知是否集說鄭氏康成曰周夷王厲主之時檜公不務政事而好潔衣服大夫去之於是檜之變風始作其國北鄰於虢孔氏穎達曰案鄭語史伯於幽王之世為桓公謀滅虢檜至平王之初武公滅之則幽王以前檜國仍在襄二十九年左傳魯為季札歌詩云自檜以下無譏焉以其國小故也季札不譏風俗無以言焉故鄭不言檜之風俗吕氏祖謙曰檜風之變固在於東遷之前然未必知其為夷厲之世也嚴氏粲曰檜世次莫考詩不言何君曰夷厲之間者鄭譜也平王初鄭武始滅檜前乎平何以知其非幽也當幽之時仲為檜君言不刺仲也前乎幽又何以知其非宣也周道復興之時不得有匪風之思也非幽非宣夷厲當之矣案朱子集傳其於鄭也曰桓公子武公定平王於東都亦為司徒又得虢檜之地乃徙其封而施舊號於新邑是為新鄭說與鄭康成合及叙檜世系則曰周衰為鄭桓公所滅而遷國焉又與鄭譜異考國語桓公為司徒問於史伯因史伯之對乃東寄孥與賄虢鄶受之十邑皆有寄地韋昭注曰賈侍中云寄地猶寄止也事在幽王八年至十一年而桓公死幽王之難是桓公時特有滅檜之謀耳周室既東武公繼桓公為平王司徒遂得虢檜之地而遷國焉則檜實滅於武公時矣桓公襲檜之說雖本韓非要當以國語為信至於蘇子由論國風次第曰檜詩不為鄭而弼鄘為衛魏為晋何也邶鄘魏之詩作於既滅其詩所為作者衛晉也至於檜風檜之未亡而作矣其譜檜曰世次微滅故其詩之世不可得而推也朱子於魏風首引蘇氏曰魏詩疑皆為晉而作猶弼鄘之於衛也則固然矣及檜風首引蘇氏以為檜詩皆為鄭作如邶鄘之於衛也考蘇氏並無此說想屬朱子誤注或其門人錯簡耶經義不便前後相貿故特為正之羔裘逍遙狐裘以朝直遙反叶直勞反豈不爾思勞心忉忉音刀集傳賦也緇衣羔裘諸侯之朝服錦衣狐裘其朝天子之服也嚴氏粲曰狐裘有白有青有黃此詩不指何色鄭氏以為黃衣狐裘謂檜君以祭服而朝也蘇氏以為狐白謂檜君以朝天子之服而聼其國之朝也二說不同狐青為臣下之服非檜君所服檜君好潔其衣服亦必不服狐黃當從蘇氏以為狐白舊說檜君好潔其衣服逍遙遊宴而不能自强於政治故詩人憂之集說毛氏萇曰羔裘以遊燕狐裘以適朝國無政令使我心勞孔氏穎達曰逍遙遊燕之事輕視朝聼政之事重今先言燕後言朝者見君不能自强於政治惟好逍遙忽於聼政故後言朝也范氏祖禹曰急於遊燕而怠於政治此賢人所以去也夫忠臣之事君言不用而去之不得已也其心豈舍君哉故曰豈不爾思勞心忉忉張氏栻曰其所事惟在於衣服之閒則其不能自强於政治可知矣羔裘翱翔狐裘在堂豈不爾思我心憂傷集傳賦也翱翔猶逍遙也堂公堂也集說孔氏穎達曰上言以朝謂日出視朝此云在堂謂正寢之堂人君日出視朝乃退適路寢以聼大夫所治之政二者於禮同服羔裘今檜君皆用狐裘故二章各舉其一李氏公凱曰在公堂聼朝也我心憂之至於感傷也羔裘如膏古報反日出有曜羊照反叶羊號反豈不爾思中心是悼集傳賦也膏脂所漬也日出有曜日照之則有光也集說孔氏穎達曰上二章唯言變易常禮未言好潔之事故卒章言羔裘之美如脂膏之色羔裘既美則狐裘亦美可知故不復說狐裘之美嚴氏粲曰凡人憂勞戒懼則不暇鮮其衣禹惡衣文王卑服衛文大布之衣是也今檜君羔裘之色潤澤如以脂膏漬之日出照之則有光曜其衣服之鮮明如此其志慮凡近可見矣安其危而樂其亡我心傷悼之也總論蘇氏轍曰檜君好盛服故以其朝服燕而以其朝天子之服朝夫君之為是也則過矣然而非大惡也而大夫以是去之何哉孔子之去魯為女樂故也而曰膰肉不至蓋諱其大惡而以微罪行檜大夫之羔裘則孔子之膰肉也歟此所謂以道去其君也輔氏廣曰心無二用志於大者必遺於小溺於小者則亦無暇於大矣檜君方冥行而不覺而詩人則為之憂勞傷悼若不能以一朝居夫人之心其初本同而末流之弊相去如此遼絶豈不哀哉嚴氏粲曰詩言衣裘之鮮潔所以形容其宴安無為之意非以潔其衣服為大故而去之也羔裘三章章四句集說孔氏穎達曰檜既小而迫於大國君好修潔其衣服逍遙遊戲而燕樂而不能用心自强於政治之事大夫見其如是諫之而不從故去之作是羔裘之詩言己去君之意也黃氏櫄曰觀羔裘一詩見臣子愛君之心未嘗一日忘雖去國矣而不敢無憂國之念君雖不用道矣而不敢言其君之過託其意於羔裘而寓其情於憂傷邶之君子不能奮飛孟子之三宿出晝皆此意也庶見素冠兮棘人欒欒力端反兮勞心慱慱徒端反兮集傳賦也庶幸也縞冠素純音皮既祥之冠也黑經白緯曰縞緣邊曰紕毛氏萇曰素冠練冠也孔氏穎達曰鄭以練冠者練布為之而經傳之言素者皆謂白絹未有以布為素者則知素冠非練也故易傳以素冠為既祥之冠王肅亦以素冠為大祥之冠孫育以箋說為長棘急也喪事欲其總總爾哀遽之狀也蘇氏轍曰君子之居喪皇皇若無所容者此所謂棘人也欒欒瘠貌慱慱憂勞之貌祥冠祥則冠之禫徒感反則除之劉氏瑾曰喪禮再期而大祥自喪至此不計閏凡二十五月大祥之後中月而禫中閒也禫祭名淡淡然平安之意至此不計閏凡二十七月今人皆不能行三年之喪矣安得見此服乎當時賢者庶幾見之至於憂勞也集說鄭氏康成曰喪禮既祥祭而縞冠素紕時人皆解緩無三年之恩於其父母而廢其喪禮故覬幸一見素冠急於哀戚之人形貌欒欒然膄瘠也勞心者憂不得見李氏樗曰詩人既刺不能三年故君子思是服既祥之素冠棘人形貌之欒欒者今無此人此心所以慱慱而憂也輔氏廣曰言庶見素冠兮而繼之以棘人欒欒兮蓋言情與服之相稱也不然服於外而忘於內則亦何以為哉庶見素衣兮我心傷悲兮聊與子同歸兮集傳賦也素冠則素衣矣孔氏穎達曰大祥之祭其服以素為裳裳而言衣衣是大名故取衣為韻與子同歸愛慕之詞也集說鄭氏康成曰除成喪者其祭也朝服縞冠朝服緇衣素裳然則此言素衣者謂素裳也聊猶且也且與子同歸欲之其家觀其居處李氏樗曰言庶幾欲見服既祥之素衣者今無此人故我心傷悲也如有其人則我且與之同歸也季氏本曰傷悲者有感於心而興悲也蓋此作詩之人必亦能終三年之喪者但以獨行無助為衆所憎故憂思如此以其可與共學故欲與同歸也庶見素韠音畢兮我心藴於粉反結叶訖力反兮聊與子如一兮集傳賦也韠蔽膝也以韋為之孔氏穎達曰古者田漁而食因衣其皮先知蔽前後知蔽後後王易之以布帛而猶存其蔽前者重古道不忘本也冕服謂之韍分勿反其餘曰韠韠從裳色素衣素裳則素韠矣藴結思之不解也與子如一甚於同歸矣黃氏一正曰如一謂其志同也集說黃氏佐曰如一是視彼準繩求不爽其尺寸由彼法則期不差於毫釐彼能奮不顧俗則我亦不嫌於矯俗也既曰同歸又曰如一只是冀望之深而言轉切非見素冠則如彼見素衣則如此也總論輔氏廣曰素衣素冠不祥之服也常情之所厭見也檜國之俗不能行三年之喪則不復見此既祥之衣冠矣而當時賢者庶幾見之而不可得則至於憂勞如此是其心必有大不安者也幸而得見之則又為之愛慕而欲與同歸為一焉是又必有大慊於其心者也此秉彜之心也先王之制喪服亦以是心而已豈强民而為之哉姚氏舜牧曰有三年之喪則有既祥之素冠素衣素韠當時無有為此喪者故賢者思一見之若是注慕之深天理民彝在人心皆有一種惻然相觸處故見棘人之欒欒我心自慱慱其憂勞也見素衣而傷悲見素韠而藴結亦此意素冠三章章三句集傳案喪禮為父為君斬衰三年昔宰豫欲短喪夫子曰子生三年然後免於父母之懷豫也有三年之愛於其父母乎三年之喪天下之通喪也傳曰子夏三年之喪畢見於夫子援音袁琴而弦衎衎苦旦反而樂作而曰先王制禮不敢不及夫子曰君子也閔子騫三年之喪畢見於夫子援琴而弦切切而哀作而曰先王制禮不敢過也夫子曰君子也子路曰敢問何謂也夫子曰子夏哀已盡能引而致之於禮故曰君子也閔子騫哀未盡能自割以禮故曰君子也夫三年之喪賢者之所輕不肖者之所勉輔氏廣曰子夏閔子騫之事毛傳所載與禮記不同先生并取宰豫之事言之而不加一辭焉然熟讀而詳玩之則自有所發而可以為情性之正矣非以三年之喪為足以報其親所謂喪三年以為極亡則弗之忘矣者也至於聖人既為中制則賢者必當俯而就不肖者必當跂而及也集說鄭氏康成曰喪禮子為父父卒為母皆三年時人思薄禮廢不能行也范氏祖禹曰檜當夷厲之時已如此則孔子孟子之世可知也隰有萇丈羊反楚猗於可反儺乃可反其枝夭於驕反之沃沃烏毒反樂音洛子之無知集傳賦也萇楚銚音遙弋今羊桃也子如小麥亦似桃陸氏璣曰葉長而狹華紫赤色其枝莖弱過一尺引蔓於草上猗儺柔順也夭少好貌吕氏祖謙曰夭如厥草惟夭之夭沃沃光澤貌子指萇楚也政煩賦重人不堪其苦歎其不如草木之無知而無憂也集說沈氏守正曰有生之樂人孰無之反羡草木之無知則不聊生甚矣與苕華知我如此不如無生皆痛極之詞也唐氏汝諤曰人生有知有知適自苦耳然有知既不樂而無知又不能此徒顧萇楚而興嗟也朱氏道行曰萇楚宜下濕故曰隰有其枝猗儺始出柔嫩又少好而光澤子之得全於天者惟無知也豫方苦已之有而安能不樂子之無哉檜民苦政煩賦重而作與王風爰尚寐無吪同意隰有萇楚猗儺其華芳無胡瓜二反夭之沃沃樂子之無家古胡古牙二反集傳賦也無家言無纍也集說許氏天贈曰無知則無賦役之憂無家則無賦役之纍隰有萇楚猗儺其實夭之沃沃樂子之無室集傳賦也無室猶無家也總論輔氏廣曰人之有知所以為萬物之靈也有家有室所以異於物也今也政煩賦重不堪其苦反歎不如物之無知無家焉則不樂其生甚矣何為使之至此極哉為人上者宜有所覺矣季氏本曰此詩小序以為疾君淫恣而思無情欲說者遂以萇楚枝柔牽蔓比人之多欲而以未有牽蔓之時生意沃然者為赤子之心至長有室家而後為所牽蔓意亦善矣但此詩三章以枝華實為次蓋自枝而華而實能遂其生之意義不在於引蔓故無取焉隰有萇楚三章章四句集說鄒氏忠𦙍曰詩發乎情如其情以為情者常也亦有反其情以為情者檜風之萇楚是也夫人懷五常之性為有生最靈誰則甘冥然無知者且有心知即有情欲聞以未有室家為苦不聞以無之為快也今檜之民至於不樂有知不樂有家不樂有室致羡乎萇楚之猗儺豈復近於人情乎此所為反其情以為情也蓋世治則室家相保由上所養世亂則室家相棄由上所殘是詩不知作於何時殆亡國之音乎匪風發叶方月反兮匪車偈起竭反兮顧瞻周道中心怛都達反叶旦悅反兮集傳賦也發飄揚貌偈疾驅貌姚氏舜牧曰風發車偈皆出於陡然不測者周道適周之路也濮氏一之曰周道與小雅大東周道如砥同怛傷也周室衰微賢人憂歎而作此詩言常時風發而車偈則中心怛然今非風發也非車偈也特顧瞻周道而思王室之陵遲故中心為之怛然耳集說張子曰人之不安常如在風中車上歐陽氏修曰我顧瞻嚮周之道欲往告以所憂而不得往者非為風之飄發非為車之偈偈而不安我中心自有所傷怛而不寧也董氏逌曰猶匪兕匪虎率彼曠野之意言政之亂而人之不安也附録毛氏萇曰發發飄風非有道之風偈偈疾驅非有道之車鄭氏康成曰周道周之政令也吕氏祖謙曰前漢王吉曰詩云匪風發兮匪車偈兮說曰是非古之風也發發者是非古之車也偈偈者蓋傷之也匪風飄符遙反叶匹妙反兮匪車嘌匹遙反叶匹妙反兮顧瞻周道中心弔兮集傳賦也回風曰飄孔氏穎逹曰回風為飄釋天文李巡曰回風旋風也一曰飄風别二名嘌漂搖不安之貌毛氏萇曰嘌嘌無節度也孔氏穎逹曰上章言疾車此言無節度車之遲速當有鸞和之節由疾故無節弔亦傷也誰能亨魚溉古愛反之釜符甫反鬵音尋誰將西歸懷之好音集傳興也溉滌也鬵釡屬陸氏德明曰說文云大釡也一曰鼎大上小下若甑曰鬵孔氏穎達曰釋器云䰝謂之鬵孫炎曰關東謂甑為鬵然則鬵是甑亨魚用釡不用甑雙舉者以其俱是食器故連言耳西歸歸於周也鄭氏康成曰檜在周之東故言西歸孔氏穎逹曰檜在滎陽周都豐鎬周在於西故言西也誰能亨魚乎有則我願為之溉其釡鬵誰將西歸乎有則我願慰之以好音以見思之之甚但有西歸之人即思有以厚之也集說程子曰魚美好之物人所欲興善政人所思誰能亨魚以食人人將喜而助之誰能歸從周之道人將樂而與之懷相要結也好音和聲喜樂相從也朱氏公遷曰亨魚則可得美味尊王則可得善治此皆可喜可願之事故用其語相呼為興也姚氏舜牧曰簡兮曰云誰之思西方美人此曰誰將西歸懷之好音當時致思於西周蓋如此附録毛氏萇曰亨魚煩則碎治民煩則散知亨魚則知治民矣張子曰溉之釡鬵欲治民不煩也溉沃之使水多也水寬則魚不壞政亦務寬總論輔氏廣曰王政不網周室陵遲諸侯放恣無復知有尊王之義者而詩人顧瞻周道為之憂傷聞有歸周之人則為之歎慕慰勉而不能自已如此熟讀而詳玩之則足以見夫君臣之彜矣朱氏公遷曰一章二章歎其衰微三章願其興復見文武之德在人而人不能忘如此朱氏善曰周之盛時其君則文武成康其臣則周召毛畢東諸侯之朝覲聘問與其臣民之往來以供百役者若百川之赴海蓋靡日而不有也而今也征伐會盟之數吾小國僕僕焉奔走以事大國之不暇而適周者寂乎其無聞也則安得不為之怛然而悲傷乎夫惟適周者之寂然也故又重言以結之曰孰有能西歸者乎有則我願慰之以好音也匪風三章章四句集說孔氏穎逹曰作匪風詩者言思周道也以其檜國既小政教又亂君子之人憂其將及禍難而思周道焉吕氏祖謙曰匪風下泉思周道之詩獨作於曹檜何也曰政出天子則强不陵弱各得其所政出諸侯則徵發之煩共億之困征伐之㬥唯小國偏受其害所以眷懷宗周為獨切也案朱子辨序說云周道但為適周之路此解其字義也至詩之本意是思文武之道不第為道路而言兩義可合觀耳檜國四篇十二章四十五句集說錢氏天錫曰亂極則治而大亂之餘小國多疲於奔命不克保其社稷民間尤哀思煩促故其思治為獨深今觀檜風僅四篇而羔裘苦逍遙之君素冠哀純孝之子萇楚歎不聊生之民時事如此又安得無匪風之思歟變風之終檜曹序詩者蓋有深意曹一之十四集傳曹國名其地在禹貢兗州陶邱之北孔氏穎達曰漢書地理志云濟陰定陶縣故曹國禹貢陶邱在西南陶邱亭是也言邱在曹之西南則曹在邱之東北止言比者舉其大望所在耳雷夏荷音歌亦作菏澤之野孔氏頴達曰禹貢兗州云雷夏既澤又云導菏澤案地理志雷夏澤在濟陰成陽縣西北菏澤在濟陰定陶縣東二澤同屬濟陰濟陰曹都所在是曹之封或在二澤周武王以封其弟振鐸今之曹州即其地也皇輿表曹州即今曹縣屬兗州府曹州隸山東集說鄭氏康成曰昔堯嘗遊成陽舜漁於雷澤民俗始化其遺風重厚多君子務稼穡薄衣食以致畜積夾於魯衛之閒又寡於患難末時富而無教乃更驕侈十一世當周惠王時政衰昭公好奢而任小人曹之變風始作孔氏穎達曰地理志云濟陰定陶詩風曹國曹都雖在濟陰其地則踰濟北春秋僖三十一年取濟西田左傳曰濟西田分曹地也曹在汶南濟東據魯而言是濟西是曹地在濟北也魯在其東南衛在其西北魯衛雖大於曹非如齊秦晉楚自專征伐不敢侵曹由此所以寡於患難作詩之時鄰國非獨魯衛而已舉魯衛略餘國也范氏處義曰曹既弱小又不能用賢今所存詩皆言任小人在位無君子則國非其國矣此所以次於檜也蜉蝣之羽衣裳楚楚叶創舉反心之憂矣於我歸處集傳比也蜉蝣渠略也似蛣音乞蜣音羌身狹而長有角朱氏公遷曰諸本脫有字黃黑色朝生暮死陸氏璣曰蜉蝣方土語也通謂之渠略似甲蟲有角大如指長三四寸甲下有翅能飛夏月陰雨時地中出楚楚鮮明貌此詩蓋以時人有玩細娛而忘逺慮者故以蜉蝣為比而刺之言蜉蝣之羽翼猶衣裳之楚楚可愛也然其朝生暮死不能久存故我心憂之而欲其於我歸處耳序以為刺其君或然而未有考也集說輔氏廣曰衣裳楚楚乃是言蜉蝣之羽耳故以為比體若以蜉蝣之羽興衣裳楚楚則是興體也嚴氏粲曰奢則國必弊大猶不堪況小而迫乎刺奢而言衣裳楚楚舉一端耳朱氏公遷曰於我歸處則將告以人無逺慮必有近憂庶幾其有備而無患也蜉蝣之翼采采衣服叶蒲北反心之憂矣於我歸息集傳比也采采華飾也息止也集說郝氏敬曰蜉蝣雖有翼而不能久如人修飾采采之衣服而不知禍之將至我心憂慮何所歸息乎蜉蝣掘求勿反閲麻衣如雪心之憂矣於我歸說音梲叶輸爇反集傳比也掘閲未詳孔氏穎達曰此蟲土裏化生閲者悅懌之意掘閲者言其掘地而出形容鮮閲也吕氏祖謙曰說文掘作堀說舍息也總論輔氏廣曰人心之體上下四方無不包括古往今來無不通貫可謂大矣今也玩細娛忘逺慮至如蜉蝣之朝生暮死而不自知則亦不靈甚矣此詩人所以憂之謝氏枋得曰此忠臣愛君憂國之至情其慮深其思逺若禍至之無日不自知其辭之痛側也金氏履祥曰君子念夫人雖不知久逺之計而亦知所以自修故心之憂之而欲其以我為歸也蓋君子之於人無不欲其入於善苟有一毫自治之心固君子之所欲進之也蜉蝣三章章四句集說陸氏德明曰鄭譜云昭公好奢而任小人曹之變風始作此詩箋云喻昭公之朝是蜉蝣為昭公作也譜又云蜉蝣至下泉四篇共公時作今諸本此序多無昭公字未詳其正也范氏處義曰檜曹皆小國詩亦相似檜之變風始於羔裘曹之變風始於蜉蝣羔裘刺潔其衣服蜉蝣刺好奢亦類也羔裘之詩不及政治序詩者以其逍遙逰燕而知其必不能自强於政治蜉蝣之詩不及小人序詩者以其將無所依而知其所用皆小人故不足恃然不能自强猶愈於將無所依此曹所以又出檜下也彼候人兮何何可反戈與祋都律都外二反彼其音記之子三百赤芾芳勿蒲昧二反集傳興也候人道路迎送賔客之官何揭祋殳音殊也孔氏穎逹曰夏官序云候人上士六人下士十有二人史六人徒百有二十人此說身荷戈祋謂作侯人之徒屬非候人之官長也戈殳俱是短兵祋字從殳故知祋為殳也之子指小人芾冕服之韠也孔氏穎達曰芾是配冕之服形制同於韠别言之則祭服謂之芾他服謂之韠嚴氏粲曰芾當作韍古字通也蔽膝之韍從韋黼黻之黻從黹采菽疏云士服爵辨以韎韐配之則服冕者以芾配之芾韠俱是蔽膝之象一命縕音溫芾黝音酉珩再命赤芾黝珩三命赤芾蔥珩大夫以上赤芾乘軒孔氏潁達曰韍之言蔽也緼赤黃之閒色所謂韍也珩佩玉之珩也黑謂之黝青謂之蔥周禮公侯伯之卿三命下大夫再命上士一命然則曹為伯爵大夫再命是大夫以上皆服赤芾於法又得乘軒故連言之此刺其君逺君子而近小人之詞言彼候人而何戈與祋者宜也彼其之子而三百赤芾何哉晉文公入曹數其不用僖負羈許氏謙曰曹賢大夫而乘軒者三百人其謂是歟嚴氏粲曰事見左傳僖二十八年集說輔氏廣曰諸侯之制大夫五人而已而曹國之小赤芾而乘軒者至三百之衆此末章所以有薈蔚朝隮之比也黃氏佐曰興意取候人宜於所役小人不宜於所服相反為興顧氏起元曰三百赤芾已是服之盛而寵之至故下二章遂承此而典不稱其服不遂其媾也附録孔氏穎達曰言共公疏逺君子賢者之官不過候人是逺君子也又親近小人曹朝三百人皆服赤芾是其近小人也范氏處義曰內君子而外小人泰之象也內小人而外君子否之象也候人之官逺在邊境所掌者何戈與祋之役而使君子居之赤芾者卿士之服常在君側而使小人居之是內小人而外君子也故序以逺近言之曹之為國視此可知矣案候人首章毛傳主賦蓋言賢者之官不過候人而不賢者佩赤芾乃三百人所謂逺君子而近小人也朱傳主興蓋言候人而何戈與祋固宜彼其之子而三百赤芾何哉是專指近小人而言也至末章季女斯飢始見逺君子之意在毛傳朱傳其解詩之大義相同而首章有賦與興之各别然賦則直陳興則婉喻耳與作詩者之旨皆無害也維鵜徒低反在梁不濡其翼彼其之子不稱尺證反其服叶蒲北反集傳興也鵜汙音烏又火故反澤水鳥也俗所謂淘河也孔氏穎逹曰郭璞曰鵜鶘好羣飛入水食魚故名汙澤陸璣疏云鵜形如鶚而極大喙長尺餘頷下胡大如數升囊若小澤中有魚便羣共杼水滿其胡而棄之令水竭盡魚陸地乃共食之故曰淘河梁水中魚梁也集說鄭氏康成曰鵜在梁當濡其翼而不濡者非其常也以喻小人在朝亦非其常不稱者言德薄而服尊歐陽氏修曰鵜當居泥水中以自求魚而食今乃邈然髙處魚梁之上竊人之魚以食而得不濡其翼如彼小人竊祿於髙位而不稱其服也維鵜在梁不濡其咮陟救反彼其之子不遂其媾古豆反集傳興也咮喙遂稱媾寵也遂之為稱猶今人謂遂意曰稱意集說張子曰不遂其媾不稱其寵待也朱氏道行曰媾訓寵知遇非常捫心負愧故曰不遂薈烏㑹反兮蔚於貴反兮南山朝隮子兮反婉於阮反兮孌力轉反兮季女斯飢集傳比也薈蔚草木盛多之貌朝隮雲氣升騰也婉少貌孌好貌薈蔚朝隮言小人衆多而氣焰盛也季女婉孌自保不妄從人而反飢困言賢者守道而反貧賤也集說孔氏穎達曰言南山朝隮則有物從山上升也必是雲矣詩人之作自歌土風南山曹南山也蘇氏轍曰小人朋黨相援竝進於朝如南山之升雲薈蔚而上莫之能止君子守道困窮於下如幼弱之女雖有飢寒之患而婉孌自保不妄從人季女者無求於人而人之所當求也張氏彩曰薈蔚本草木盛多貌詩人借以狀雲興之驟也賢人潛修如處女然故古人每取為喻婉孌言其丰儀之可慕也總論范氏處義曰近小人則逺君子勢不兩立必然之理也輔氏廣曰一章言候人而何戈與祋者宜矣彼小人而三百赤芾何哉問之也二章三章則以維鵜在梁不濡其翼咮以興彼小人者不稱其服寵惜之也末章方言小人之盛而賢者不得其所此蓋當時君子之詞也所謂賢者其指僖負羈歟使晉文公以是為曹之罪而伐之則其賢而失所亦可知矣姚氏舜牧曰候人雖一職之微然皆各供其事任其勞彼赤芾者優游於朝著之閒不稱不遂但比周為黨薈蔚如南山之朝隮何怪婉孌自守者之不得其食哉蓋深恨而痛刺之詞候人四章章四句集說許氏謙曰曹叔振鐸至共公十五世而有候人詩其言與左氏傳合餘三詩莫知其世鳲鳩在桑其子七兮淑人君子其儀一兮其儀一兮心如結叶訖力反兮集傳興也鳲鳩秸音戛鞠也亦名戴勝今之布穀也郭氏璞曰江東呼穫穀陸氏璣曰一名擊穀一名桑鳩飼音嗣子朝從上下暮從下上平均如一也嚴氏粲曰郯子所謂鳲鳩氏司空鳲鳩平均故為司空平水土也如結如物之固結而不散也張氏栻曰結云者實而不他也金氏履祥曰如結言心不放詩人美君子之用心均平專一故言鳲鳩在桑則其子七矣淑人君子則其儀一矣其儀一則心如結矣然不知其何所指也陳氏曰君子動容貌斯逺暴慢正顔色斯近信出辭氣斯逺鄙倍其見於威儀動作之閒者有常度矣豈固為是拘拘者哉蓋和順積中而英華發外是以由其威儀一於外而心如結於內者從可知也輔氏廣曰陳氏引曾子之言為說不惟解得此詩之意出又正得曽子所言之本旨內外無二理見其外可以覘其內也集說劉氏向曰傳曰鳲鳩之所以養七子者一心也君子所以理萬物者一儀也蘇氏轍曰鳲鳩之哺其子平均如一君子之於人其均一亦如是也儀其見於外者有外為一而心不然者矣君子之一也非獨外為之其中亦信然也故曰其儀一兮心如結兮朱氏公遷曰鳲鳩之子七兮衆矣而所以飼之者均平如一也人之一身其容儀亦已多矣而君子之容儀未嘗謹於此而不謹於彼亦均平如一也所以然者以其心專一耳其心專一則敬惕常存而施諸身者無不中其常度矣衛武公以抑抑威儀為德之隅而又以不愧屋漏為德之實蓋與此詩同一意也姚氏舜牧曰鳲鳩心一而無二其飼子也均君子之心固結而不解故其為儀也一心如結兮是一章大網領下文正是國人胡不萬年皆本於此鳲鳩在桑其子在梅叶莫悲反淑人君子其帶伊絲叶新齎反其帶伊絲其辨伊騏音其集傳興也鳲鳩常言在桑其子每章異木子自飛去母常不移也帶大帶也大帶用素絲有雜色飾焉孔氏穎達曰玉藻云雜帶君朱緑大夫𤣥華士緇辟是其有雜色飾焉辨皮辨也騏馬之青黑色者辨之色亦如此也朱氏公遷曰絲帶則當騏辨如緇衣羔裘之類欲其色之相稱也書云四人騏辨今作綦蘇氏轍曰騏或作􅋒􅋒辨之結飾以玉為之言鳲鳩在桑則其子在梅矣淑人君子則其帶伊絲矣其帶伊絲則其辨伊騏矣言有常度不差忒也集說蘇氏轍曰帶伊絲矣而辨不􅋒則為充於下而不充於上上下有一不充則為不一矣君子之行無不充足者故周旋反復視之而無不如一譬如絲帶而充之以騏辨耳夫無一不然者一之至也德未充而求其能一不可得也既已充矣而求其有一不然亦不可得也朱氏公遷曰鳩性專一故不失在梅之子君子之心專一故不失其外之儀衣服者威儀之一也衣服亦中其常度則施諸身者無所不均可見矣王氏志長曰其帶伊絲其辨伊騏正謂其儀一也心之如結不可見觀之其儀而已矣服飾容止似屬小節然德器學問於此可見鳲鳩在桑其子在棘淑人君子其儀不忒它得反其儀不忒正是四國叶于逼反集傳興也有常度而其心一故儀不忒儀不忒則足以正四國矣李氏樗曰此言儀之一可以為四國之矜式大學傳曰其為父子兄弟足法而後民法之也輔氏廣曰觀大學傳所言則此詩所指之君子必大賢以上人也中庸曰君子篤恭而天下平黃氏佐曰儀字不須以為父子兄弟言引傳而言者朱子特取足法而后民法之之意耳集說朱氏公遷曰威儀本有常度其心又復專一則能使之各中其度而無少差忒者矣四國者四方之國非一人也然威儀俱中其度則教示之功可以均及於彼矣錢氏天錫曰正是四國不重感化只重我足以正四國也回在朝侈靡之習革在野奇邪之風鳲鳩在桑其子在榛側巾反淑人君子正是國人正是國人胡不萬年叶尼因反集傳興也儀不忒故能正國人姚氏舜牧曰正國人即承上正四國說非二層意胡不萬年願其壽考之詞也集說蘇氏轍曰鳲鳩則在桑而已其子則不可常也以其愛之則宜其無所不從然以為從其在梅則失其在棘從其在棘則失其在榛是以居一以俟之而無不及者此得一之要也朱氏公遷曰國人亦非一人正是國人亦見均及於人之意能正國人則願其壽考使人常有所法也總論劉氏瑾曰鳲鳩之子雖非一而鳲鳩飼之之心則如一其子之飛往雖無常而鳲鳩居以待之則有常詩人託興之取義者亦以應接事物之變四國人民之衆而君子則度有常而心如一也然其言之有序以為君子之心如結是以其儀專一而有常度有常度是以其帶與辨亦有常而不差忒不差忒是以其儀不忒而可以表正四國表正四國則其終也可以受天之祿而夀考萬年是雖祝願之詞固亦天人感通之理也陳氏櫟曰心結而儀一丑不忒表裏一致也四國國人之皆正逺邇一致也由之久而胡不萬年久近一致也國人願其年夀之久豈非欲賴其表正之久哉汪氏應蛟曰易曰聖人以此洗心退藏於密密則無閒可息無隙可乘如結之謂也故徵諸身而容止有常冠服有章其民望而敬之則而象之蓋精神流浹者深矣於正四國何有鳲鳩四章章六句集說朱氏公遷曰曹小國也有賢如此則曹豈止於曹哉但詩詞寬廣無歎惜招猍之意則又非棄而在野者是故不知其何所指也附録孔氏穎達曰經云正是四國正是國人皆謂諸侯之身能為人長則知此云在位無君子者正謂在人君之位無君子之人也在位之人既用心不一故經四章皆美用心均一之人舉善以駮時惡案鳲鳩篇序以為刺詩朱子以為美詩何相徑庭耶蓋序主論世以曹之在位無足以當之故以為刺也朱子以詩中未含刺意且曹之世次無考故以為美也今合從朱傳為長冽音列彼下泉浸彼苞稂音郎愾苦愛反我寤嘆念彼周京叶居良反集傳比而興也冽寒也孔氏穎達曰七月云二之日栗冽字從冰是遇寒之意故為寒也下泉泉下流者也孔氏穎達曰釋水沃泉縣出縣出下出也李巡曰水泉從上溜下出此言下泉謂泉下流是爾雅之沃泉也苞草叢生也稂童粱莠屬也陸氏璣曰禾秀為穗而不成崱嶷然謂之童粱今人謂之宿田翁或謂守田也孔氏穎達曰此稂是禾之秀而不實者故非灌溉之草得水而病愾歎息之聲也王氏志長曰寤歎者厭亂思治之切一寤即嘆也周京天子所居也王室陵夷而小國困弊故以寒泉下流而苞稂見傷為比遂興其愾然以念周京也集說程子曰泉之潤物猶政令膏澤之及人泉寒冽則不能潤物在下則不能及物浸漬則害物苞叢生之茂者乃反害之是皆不得其所也愾然既寤而歎念周道之衰也蘇氏轍曰民之苦於虐政猶稂之得下泉也季氏本曰先王盛時民勤農業則引泉以灌禾黍今田野荒蕪無復有良苗者而冽泉在下惟浸苞稂而已下泉寒無生意而草皆病焉以比民之憔悴於虐政而因以起興也所以愾歎而念周京者良欲其留意於恤民耳黃氏佐曰比意取寒泉下流而苞稂見傷比王室陵遲而小國困弊興意取寒泉之於苞稂有相傷之意興愾我之於周京有相悲之意冽彼下泉浸彼苞蕭叶疏鳩反愾我寤嘆念彼京周集傳比而興也蕭蒿也京周猶周京也集說郝氏敬曰冽然下流之泉五榖不登浸彼叢生之蒿耳故我愾然寤歎念昔京周之盛焉冽彼下泉浸彼苞蓍音尸愾我寤嘆念彼京師叶霜夷反集傳比而興也蓍筮草也許氏愼曰蓍蒿屬生千歲三百莖易以為數天子蓍九尺諸侯七尺大夫五尺士三尺陸氏璣曰似藾蕭青色科生京師猶京周也詳見大雅公劉篇集說孔氏穎達曰周京與京師一也因異章而變文耳周京者周室所居之京師也京周者京師所治之周室也桓九年公羊傳云京師者何天子之居也京者何大也師者何衆也天子之居必以大衆言之是說天子之都名為京師也芃芃薄工反黍苗陰雨膏古報反之四國有王郇音荀伯勞力報反之集傳比而興也芃芃美貌郇伯郇侯文王之後嘗為州伯治諸侯有功孔氏穎達曰僖二十四年左傳富辰稱畢原酆郇文之昭也李氏樗曰王制謂二百一十國為州州有伯是九州中有九伯也王氏應麟曰春秋釋地曰解縣西北有郇城左傳盟於郇說文國在晉地季氏本曰郇雖文王之子所封而郇伯則其後也故鄭氏謂其為文王子而集傳則改為文王之後亦不知其為何時人矣言黍苗既芃芃然矣又有陰雨以膏之四國既有王矣而又有郇伯以勞之傷今之不然也集說孔氏穎達曰言芃芃然盛者黍之苗也此苗所以得盛者由上天以陰雨膏澤之故也以興四方之國所以得治者由有郇國之侯為伯以思德勞來之故也今無賢伯致曹國之不治故思之上有明王下有賢伯則諸侯以時朝聘善惡則有黜陟之義大司馬掌九伐之法正邦國賊賢害民則伐之爾時諸侯必不敢暴虐也范氏處義曰以陰雨喻周之澤謂其溥博霑足無此疆爾界均及於四國也言四國則不獨曹之民思周室四國胥望之矣總論輔氏廣曰冽彼下泉浸彼苞稂則衰苶之意可見芃芃黍苗陰雨膏之則生生之意可見何詩人之善於形容也夫王室陵遲則小國困弊天下之勢常相關也芃芃黍苗陰雨膏之天之生物終無已也四國有王郇伯勞之天子愛諸侯終無已也今乃不然是故君子之所憂思也許氏謙曰泉固以潤物也然必於春夏之時乃能發生至於寒則不適於用而徒以浸彼稂蕭蓍草而又傷之耳於以見王澤不下流而所被之政非澤也寤歎則見其憂思之極卒章則先王之政也錢氏天錫曰重四國有王句念周京者念王室也有王則大國修方伯連帥之職而小國倍安況有承王命而布王恩者下泉所以寤歎於周京也三章悼今末章思古也下泉四章章四句集傳程子曰易剝之為卦也諸陽消剝已盡獨有上九一爻尚存如碩大之果不見食將有復生之理上九亦變則純陰矣然陽無可盡之理變於上則生於下無閒可容息也朱子語類問變於上則生於下乃剝復相因之理畢竟須經由坤坤卦純陰無陽如此陽有斷滅也何以能生於復曰凡隂陽之生一爻當一月須是滿三十日方滿得那腔子做得一畫成今坤卦非是無陽陽始生甚微未滿那腔子做一畫未成非是坤卦純陰便無陽也陰道極盛之時其亂可知亂極則自當思治故衆心願戴於君子君子得輿也詩匪風下泉所以居變風之終也陳氏曰亂極而不治變極而不正則天理滅矣人道絶矣聖人於變風之極則係之以思治之詩以示循環之理以言亂之可治變之可正也集說吕氏祖謙曰匪風下泉雖皆思周道之詩然匪風作於東遷之前此一時也下泉作於齊桓之後此又一時也嚴氏粲曰鄭褰裳思大國之見正蓋齊桓未霸也曹共之時晉文霸業方盛襄王命之為侯伯下泉顧思明王賢伯何耶曹固可罪而文於曹虐矣執其君分其田以私憾故觀駢脅事見僖二十三年將甘心焉僅以貨免文寧能帖曹乎下泉愧木瓜矣曹國四篇十五章六十八句集說陳氏傅良曰檜亡東周之始也曹亡春秋之終也夫子之刪詩繫曹檜於國風之後於檜之卒篇曰思周之道也傷天下之無王也於曹之卒篇曰思治也傷天下之無伯也陳氏埴曰周之東遷豈專關於一檜之亡而春秋之終豈專繫於一曹之亡止齊之言或以無王無霸之時惟小國滅亡最先故小國思患最切是以聖人繫詩作春秋每於小國觀世變非謂由此二國致禍也欽定詩經傳說彚纂卷八
