body:
  text: 欽定四庫全書欽定詩經傳說彚纂卷首上凡例一厯代史志所載詩經傳受源流及先儒講論六義之體讀詩之法與評議諸家經解是非得失者采為綱領一朱子表章聖經惟詩集傳與周易本義為成書尤生平精意所屬今標以為宗而自漢迄明諸儒先之解詁采其義理精當有裨經㫖者録在朱傳之後為集說其文義小殊彼此相備者為折其中或二說各成其是則别為附録用資參考一依周易折中之式一小序相傳出於子夏或疑為衛宏所作朱子亦以其所從來逺凡真有傳授證驗而不可廢者既入集傳其可疑者係以辨論並為一編以還其舊今仍另列為一卷一詩有譜有圗譜以臚諸國世次而考其時代圖以存三代以上制作之舊古人左圖右書其遺意也今略存之其中有辨證者則附著於下一鳥獸草木之名所以資多識然儒先考索名物頗有專書而御府纂修諸書更為博洽今特依朱傳所載釋其梗槩至曲證㫄詮無關比興者則在所略一山川封域建置不齊郡邑名稱時代多改朱傳所載止據宋時今悉遵皇輿考為之補釋以見沿革源流閒有可疑寧從其闕引用姓氏周荀氏況漢賈氏誼韓氏嬰毛氏萇董氏仲舒孔氏安國子國司馬氏遷子長焦氏贛延夀劉氏向子政匡氏衡稚圭孔氏光子夏揚氏雄子雲薛氏漢公子杜氏子春班氏固孟堅賈氏逵景伯馬氏融季長許氏慎叔重服氏䖍子慎鄭氏康成趙氏岐邠卿又字臺卿何氏休邵公應氏劭仲逺劉氏熙成國荀氏悅仲豫李氏巡魏王氏肅子雍張氏揖孫氏炎叔然吳陸氏璣元恪韋氏昭𢎞嗣晉杜氏預元凱皇甫氏謐士安崔氏豹正熊郭氏璞景純梁陶氏𢎞景通明貞白劉氏協彥和北魏酈氏道元善長隋王氏通仲淹文中子唐陸氏德明顔氏師古名籀以字行孔氏頴達仲達一作沖逺李氏延夀李氏善賈氏公彥司馬氏貞呂氏向子回孫氏愐杜氏佑君卿施氏士丐韓氏愈退之昌黎楊氏倞成氏伯瑜一作伯璵段氏成式柯古後晉劉氏昫南唐徐氏鍇楚金宋聶氏崇義邢氏昺叔明胡氏旦周父寇氏宗奭宋氏祁子京阮氏逸天隱歐陽氏修永叔廬陵蘇氏洵明允老泉邵子雍堯夫康節鮮于氏侁子駿劉氏彜執中長樂張子載子厚橫渠曾氏鞏子固南豐劉氏敞原父公是王氏安石介甫臨川程子皓伯淳明道程子頤正叔伊川蘇氏頌子容沈氏括存中范氏祖禹淳夫華陽蘇氏軾子瞻東坡蘇氏轍子由潁濱徐氏積仲車呂氏大鈞和叔呂氏大臨與叔藍田陸氏佃農師劉氏安世器之元城張氏耒文潛謝氏良佐顯道上蔡遊氏酢定夫廣平楊氏時中立龜山尹氏焞彥明和靖陳氏祥道用之陳氏暘晉之蔡氏卞元度胡氏安國康侯建安董氏逌彥逺廖氏剛用中髙峰方氏慤性夫鄭氏樵漁仲夾漈胡氏寅明仲致堂鄭氏伯熊景望曹氏粹中純老陳氏鵬飛少南李氏樗迂仲林氏之竒少潁吳氏棫才老范氏浚茂明程氏大昌泰之范氏處義逸齊傅氏寅同叔羅氏願端良朱子熹元晦紫陽張氏栻敬夫南軒陳氏傅良君舉止齊呂氏祖謙伯恭東萊王氏質景文雪山黃氏櫄實夫項氏安世平甫容齊葉氏適正則水心戴氏溪肖望岷隱黃氏幹直卿勉齊陳氏淳安卿北溪輔氏廣漢卿濳庵慶源蔡氏沈仲默九峯李氏如圭寶之趙氏順孫格非陳氏埴器之潛室李氏闔祖守約潘氏時舉子善王氏日休虛中龍舒錢氏文子文季濮氏一之斗南真氏德秀景元西山魏氏了翁華父鶴山段氏昌武子武嚴氏粲坦叔華谷饒氏魯仲元又字伯輿雙峰章氏如愚俊卿山堂劉氏濟陳氏伯玉振孫陳氏大猷東齊王氏應麟伯厚熊氏剛大古溪黃氏震東發謝氏枋得君直疊山王氏柏㑹之魯齊方氏逢辰君錫蛟峯熊氏未去非勿軒劉氏辰翁㑹孟須溪王氏炎晦叔何氏士信張氏學龍竹房彭氏執中元金氏履祥吉甫仁山董氏鼎季亨胡氏一桂庭芳雙湖熊氏朋來與可吳氏澄幼清草廬臨川馬氏端臨貴與陳氏櫟夀翁定宇許氏謙益之白雲虞氏集伯生劉氏瑾公瑾安成梁氏益友直曹氏居貞羅氏復中行吳氏師道正傳陳氏日强胡氏一中允夫陳氏澔可大雲莊東滙顔氏達一作達龍李氏公凱仲容朱氏倬孟章朱氏德潤朱氏公遷克升蔣氏悌生仁叔明宋氏濓景濓王氏禕子充朱氏善備善楊氏士竒名寓以字行東里胡氏廣光大薛氏瑄德溫敬軒楊氏守陳維新王氏逢原夫野谷何氏英積中松塢王氏鏊濟之守溪邵氏寶國賢二泉王氏守仁伯安陽明湛氏若水元明甘泉陸氏深子淵儼山崔氏銑子鐘後渠呂氏柟仲木涇野季氏本眀德彭山楊氏慎用修升庵黃氏佐才伯唐氏順之應德荆川薛氏應旗仲常方山袁氏煒懋中元峯瞿氏景淳師道昆湖周氏斯盛袁氏仁章氏甫小東章氏潢本清鄧氏元錫汝極濳谷許氏天贈德夫南臺胡氏明朂馮氏時可元敏黃氏洪憲葵陽姚氏舜牧虞佐承菴朱氏得之本思汪氏應蛟澄源孫氏礦文融月峯薛氏志學希之朱氏謀㙔鬱儀鄒氏泉嶧山林氏濛初初成林氏兆珂孟鳴陸氏南陽聚岡陶氏其情逸則吳氏瑞登雲卿省菴陳氏所學幼溪趙氏一元士㑹黃氏正陳氏推行之葉氏向髙道卿臺山徐氏常吉士彰警弦郝氏敬仲輿楚望向氏楫景岩曹氏學佺能始張氏彩還白顧氏起元鄰初顧氏大韶仲恭馮氏復京嗣宗徐氏光啓子先沈氏守正無回張氏榜賓王張氏所望叔翹七澤劉氏楨寧之沈氏萬鈳仲容吳氏肅公唐氏汝諤士雅鍾氏惺伯敬鄒氏忠𦙍周氏昌年陸氏化熙濬源胡氏𦙍嘉休復魏氏浣初仲雪朱氏道行簡修錢氏天錫公永何氏楷元子金氏聲子駿正希楊氏廷麟伯祥張氏次仲元岵陳氏際泰大士陳氏組綬伯玉王氏志長平仲韋氏調鼎玉鉉顧氏夢麟麟士趙氏起元庶先胡氏紹曽宗一范氏王孫陳氏鴻謨徐氏鳳彩聖期附録周氏斯盛曰詩云薄伐玁狁至于太原傳云大音泰大原地名亦曰大鹵今在太原府陽曲縣至于大原逐出之而已不窮追也案大太二字音本不同禹貢既修大原在冀州詩至于大原在雍州周都豐鎬玁狁侵鎬及方至于涇陽非自冀州太原而入地理志涇水出安定涇陽縣今原州百泉縣笄頭山也則詩所云涇陽指此地而言涇陽東北至太原二千餘里山川險阻黃河介其中安得飭戎車日行三十里逐雍州涇陽玁狁由冀州太原而出乎禹貢原隰底績蔡傳引鄭氏云其地在今邠州唐有涇原節度使今固原州即唐原州故城漢唐以來又以河南地為五原郡則詩人所云至于大原者指原州而言非冀州之太原也朱子在南渡後未至北方集傳偶誤耳頗多今參考輿圖地志改案大全原圖地界方位舛訛就清析惟玁狁舊列於太原之北長城之外者以小雅六月篇薄伐玁狁至于大原毛鄭孔俱未實指何地至朱傅始云大原地名亦曰大鹵今在太原府陽曲縣是禹貢冀州之太原也眀嘉靖間周斯盛輯山西通志以經文焦穫鎬方皆近涇陽之地似大原當亦距涇陽不逺意即禹貢雍州之原隰漢為邠州唐為原州而非冀之太原其說似近于理且考國語宣王料民於大原似為鎬備禦之計未必逺料之於晉國也又考前漢地理志大原郡秦置周為唐國詩所言大原集傳引公羊穀梁大原大鹵之文為據然公穀本文非有定指而唐徐彥公羊解云此地形勢高大而廣平故謂之大原則古屬通名似難專指陽曲也豈朱子當日以經文眀有大原疑周時玁狁往來雍冀無定處或宣王用師有次第時日有先後經文總叙其事非必執一時一處而言耶故仍從朱傳照大全舊圖注列而以公羊穀梁二書所解大原大鹵之義併附通志之說以備一解云諸國世次圖商宋附契昭明相土昌若曹圉冥振微報丁報乙報丙主壬主癸湯即天乙外丙湯次子仲壬外丙弟太甲湯嫡孫沃丁太庚沃丁弟小甲雍己小甲弟太戊雍己弟仲丁外壬仲丁弟河亶甲外壬弟祖乙祖辛沃甲祖辛弟祖丁祖辛子南庚沃甲子陽甲祖丁子盤庚陽甲弟小辛盤庚弟小乙小辛弟武丁祖庚祖甲祖庚弟廩辛庚丁廩辛弟武乙太丁帝乙紂宋微子紂庶兄微仲微子弟宋公稽丁公湣公煬公湣公弟厲公湣公子釐公惠公哀公戴公武公宣公穆公宣公弟殤公宣公子莊公穆公子湣公桓公湣公弟襄公成公昭公文公昭公弟共公平公元公景公昭公元公庶曽孫悼公休公辟公剔成偃剔成弟周豳附后稷不窋鞠左傳作鞠陶豳公劉慶節皇僕差弗毁隃公非髙圉亞圉公叔祖類岐周太王王季文王武王成王康王昭王穆王共王懿王孝王共王弟夷王懿王子厲王宣王幽王平王桓王平王孫莊王釐王惠王襄王頃王匡王定王匡王弟簡王靈王景王悼王敬王悼王弟元王貞王哀王思王哀王弟考王哀王弟威烈王安王烈王顯王烈王弟慎靚王赧王周公封魯侯爵周公伯禽考公煬公考公弟幽公魏公幽公弟厲公獻公厲公弟真公武公真公弟懿公伯御懿公姪孝公懿公弟惠公隱公桓公隱公弟莊公閔公僖公閔公庶兄文公宣公成公襄公昭公定公昭公弟哀公悼公元公穆公共公康公景公平公頃公召公封燕侯爵召公九世至惠侯釐侯頃侯哀侯鄭侯繆侯宣侯桓侯莊公襄公宣公昭公武公文公懿公惠公悼公共公平公簡公獻公孝公成公湣公釐公桓公文公易王子噲昭王惠王武成王孝王王喜邶鄘以上二國封爵世次未詳衛侯爵康叔康伯考伯嗣伯康伯靖伯貞伯頃侯釐侯共伯武公共伯弟莊公桓公宣公桓公弟惠公黔牟桓公子懿公戴公公子頑子文公戴公弟成公穆公定公獻公殤公定公弟襄公獻公子靈公出公靈公孫莊公出公父班師襄公孫君起靈公子悼公出公季父敬公昭公懷公羣公子慎公敬公孫聲公成侯平侯嗣君懷君元君嗣君弟君角鄭伯爵桓公武公莊公昭公厲公昭公弟子亹昭公弟子嬰子亹弟左傳作子儀文公厲公子穆公靈公襄公靈公弟悼公成公悼公弟釐公簡公定公獻公聲公哀公共公聲公弟幽公繻公幽公弟君乙幽公弟齊侯爵太公丁公乙公癸公哀公胡公哀公弟獻公哀公弟武公厲公文公成公莊公釐公襄公桓公襄公弟孝公昭公孝公弟懿公孝公弟惠公孝公弟頃公靈公莊公景公莊公弟晏孺子悼公景公子簡公平公簡公弟宣公康公魏畢公髙之後封爵世次未詳唐即晉侯爵曲沃附唐叔晉侯燮武侯成侯厲侯靖侯釐侯獻侯穆侯殤叔穆侯弟文侯穆侯子昭侯孝侯鄂侯哀侯小子侯緡哀侯弟曲沃桓叔穆侯子莊伯晉武公獻公奚齊卓子奚齊弟惠公獻公子懷公文公獻公子襄公靈公成公襄公弟景公厲公悼公襄公曽孫平公昭公頃公定公出公哀公昭公曾孫幽公烈公孝公靜公秦伯爵非子秦侯公伯秦仲莊公襄公文公寧公文公孫出子武公寧公長子出子兄德公武公弟宣公成公宣公弟穆公成公弟康公共公桓公景公哀公惠公哀公孫悼公厲共公躁公懷公躁公弟靈公懷公孫簡公懷公子惠公出子獻公靈公子孝公惠文王武王昭襄王武王弟孝文王莊襄王始皇帝二世皇帝子嬰二世皇帝弟陳侯爵胡公申公相公申公弟孝公申公子慎公幽公釐公武公夷公平公夷公弟文公桓公厲公桓公弟利公桓公子莊公利公弟宣公莊公弟穆公共公靈公成公哀公惠公哀公孫懷公湣公檜祝融之後封爵世次未詳曹伯爵振鐸太伯仲君宮伯孝伯夷伯幽伯夷伯弟戴伯幽伯弟惠伯石甫繆公石甫弟桓公莊公釐公昭公共公文公宣公成公宣公弟武公平公悼公聲公悼公弟隱公平公弟靖公聲公弟伯陽作詩時世圖商詩五篇太甲之世頌一篇那鄭氏康成謂太甲祭湯也孔氏頴逹謂那之作當太甲時朱子不詳其世仲丁以後頌一篇烈祖孔氏穎達謂箋稱祭中宗諸侯來助明是其後或子孫之時未知當誰世朱子不詳其世祖庚之世頌一篇𤣥鳥孔氏穎達謂禮三年喪畢祫於太祖之廟序言祫髙宗明是為髙宗而作祫故知是祫於契之廟也朱子不詳其世祖庚以後頌二篇長發殷武孔氏穎達謂𤣥鳥箋以為髙宗始祫殷武云祀髙宗則亦在其後殷武既在後則知長發之作亦在後矣以上二篇朱子不詳其世周詩三百六篇文王之世正風二十三篇孔氏穎達謂二南之詩文王時作惟甘棠何彼穠矣武王時作朱子皆同而以甘棠亦為文王時詩周南關雎葛覃卷耳樛木螽斯桃夭兔罝芣苡漢廣汝墳麟之趾召南鵲巢采蘩草蟲采蘋行露羔羊殷其靁摽有梅小星江有汜野有死麕騶虞正小雅八篇孔氏穎達謂鹿鳴等三篇此文王小雅采薇為伐昆夷而作事在受命四年出車杕杜還而勞之在受命五年伐木天保無文王之諡或當時即作或後為之未可定也朱子皆不詳其世鹿鳴四牡皇皇者華伐木天保采薇出車杕杜正大雅三篇孔氏穎達謂棫朴云濟濟辟王靈臺云王在靈沼皆言王旱麓不言諡又不言王但經無諡者或當其生存之時或在其後不可定也朱子皆疑為周公所作棫朴旱麓靈臺武王之世正風二篇召南甘棠孔氏穎達謂箋云美其為伯之功謂武王時也朱子以為文王時詩何彼穠矣孔氏穎達謂何彼穠矣太公已封於齊武王時作朱子同又疑為東遷後詩正小雅四篇南陔白華華黍孔氏穎達謂此三篇蓋武王之時朱子皆不詳其世魚麗孔氏穎達謂此篇武王時詩朱子不詳其世正大雅三篇孔氏穎達謂三篇皆言文王之諡皆文王後作之朱子以綿為成王時詩思齊皇矣疑為周公所作綿思齊皇矣成王之世變風七篇鄭氏康成謂成王之時周公避流言之難其詩為豳國變風朱子亦以為成王周公時詩豳七月鴟梟東山破斧伐柯九罭狼跋正小雅十篇常棣鄭氏康成謂周公弔二叔之不咸召公為作此詩朱子同由庚南有嘉魚崇丘南山有臺由儀蓼蕭湛露彤弓菁菁者莪孔氏穎達謂由庚以下周公成王之詩則南有嘉魚至菁菁者莪從可知也朱子皆不詳其世正大雅十二篇文王大明孔氏穎逹謂文王大明二篇成王時作朱子同下武孔氏穎達謂成王時作朱子同文王有聲孔氏穎達謂文王有聲舉其諡則成王時作朱子同生民行葦既醉鳧鷖假樂公劉泂酌卷阿鄭氏康成謂生民及卷阿周公成王時詩朱子同頌三十一篇鄭氏康成謂周頌者其作在周公攝政成王即位之初朱子亦以為多周公所定而間或有康王以後之詩清廟維天之命維清烈文天作昊天有成命朱子疑為康王時詩我將時邁朱子以為武王時詩執競朱子疑為昭王時詩思文臣工噫嘻朱子疑為康王時詩振鷺豐年有瞽潛雍朱子以為武王時詩載見有客武閔豫小子訪落敬之小毖載芟良耜絲衣酌桓賚般懿王之世變風五篇齊雞鳴鄭氏康成謂哀公政衰懿王烹之齊人變風始作朱子不詳其世還孔氏穎達謂還序云刺哀公則哀公時詩也朱子不詳其世著東方之日東方未明孔氏穎達謂三篇亦為哀公時詩朱子不詳其世夷王之世變風一篇邶柏舟序衛頃公之時仁人不遇小人在側鄭氏康成謂頃公當周夷王時朱子不詳其世又疑為莊姜詩則平王之世夷王厲王之閒變風四篇鄭氏康成謂夷王厲王之時檜之變風始作朱子不詳其世檜羔裘素冠隰有萇楚匪風厲王之世變風二篇陳宛丘序刺幽公也鄭氏康成謂幽公當厲王時朱子不詳其世東門之枌序幽公淫荒風化之所行男女棄其舊業亟㑹於道路歌舞於市井朱子不詳其世變小雅四篇鄭氏康成謂刺厲王十月之交雨無正小旻小宛是也十月之交朱子以為幽王時詩雨無正朱子不詳其世疑為東遷後詩小旻小宛以上二篇朱子不詳其世變大雅五篇民勞序召穆公刺厲王朱子同板序凡伯刺厲王朱子同蕩序召穆公傷周室大壞朱子同抑序衛武公刺厲王朱子以為衛武公作此自警當在平王之世桑柔序芮伯刺厲王朱子同共和之世變風一篇唐蟋蟀序刺晉僖公也鄭氏康成謂當周公召公共和之時朱子不詳其世宣王之世變風五篇鄘柏舟孔氏穎達謂衛武公時作朱子同秦車鄰鄭氏康成謂非子曾孫秦仲宣王命為大夫國人美之朱子不詳其世陳衡門東門之池東門之楊孔氏穎達謂衡門誘僖公東門之池東門之楊從上明之亦僖公時詩也朱子皆不詳共世變小雅十四篇六月序宣王北伐也朱子同采芑序宣王南征也朱子同車攻序宣王復古也朱子同吉日序美宣王也朱子同鴻雁序美宣王也朱子同庭燎序美宣王也朱子不詳其世沔水序規宣王也朱子不詳其世鶴鳴序誨宣王也朱子不詳其世祈父序刺宣王也朱子不詳其世白駒序大夫刺宣王也朱子不詳其世黃鳥序刺宣王也朱子不詳其世我行其野序刺宣王也朱子不詳其世斯干序宣王考室也朱子不詳其世無羊序宣王考牧也朱子不詳其世變大雅六篇雲漢序仍叔美宣王也朱子亦以為宣王時詩嵩髙序尹吉甫美宣王朱子亦以為宣王時詩蒸民序尹吉甫美宣王朱子亦以為宣王時詩韓奕序尹吉甫美宣王朱子不詳其世江漢序尹吉甫美宣王朱子亦以為宣王時詩常武序召穆公美宣王朱子亦以為宣王時詩幽王之世變小雅四十篇孔氏穎達謂小雅自節南山下盡何草不黃去十月之交等四篇餘四十篇皆幽王時詩節南山朱子亦以為幽王時詩正月朱子不詳其世小辨朱子亦以為幽王時詩巧言朱子不詳其世何人斯朱子不詳其世巷伯朱子不詳其世谷風朱子不詳其世蓼莪朱子不詳其世大東朱子不詳其世四月朱子不詳其世北山朱子不詳其世無將大車朱子不詳其世小明朱子不詳其世鼓鐘朱子亦以為幽王時詩楚茨朱子不詳其世信南山朱子不詳其世甫田朱子不詳其世大田朱子不詳其世瞻彼洛矣朱子不詳其世裳裳者華朱子不詳其世桑扈朱子不詳其世鴛鴦朱子不詳其世頍辨朱子不詳其世車舝朱子不詳其世青蠅朱子不詳其世賓之初筵朱子亦以為幽王時詩魚藻朱子不詳其世采菽朱子不詳其世角弓朱子不詳其世菀栁朱子不詳其世都人士朱子不詳其世采緑朱子不詳其世黍苗朱子以為宣王時詩隰桑朱子不詳其世白華朱子亦以為幽王時詩綿蠻朱子不詳其世瓠葉朱子不詳其世漸漸之石朱子不詳其世苕之華朱子不詳其世何草不黃朱子亦以為幽王時詩變大雅二篇孔氏穎達謂幽王大雅瞻卬召旻朱子同瞻卬召旻平王之世變風二十八篇邶緑衣孔氏頴達謂當莊公時朱子同衛淇奧孔氏穎達謂淇奧美武公則武公時詩矣朱子同考槃孔氏穎達謂莊公時詩朱子不詳其世碩人孔氏穎達謂莊公時詩朱子同王黍離孔氏穎達謂平王時詩朱子不詳其世君子于役序刺平王也朱子不詳其世君子陽陽孔氏穎達謂平王時詩朱子不詳其世揚之水序刺平王也朱子同中谷有蓷孔氏穎達謂平王時詩朱子不詳其世葛藟序王族刺平王也朱子不詳其世鄭緇衣序美武公也朱子同將仲子序刺莊公也朱子不詳其世叔于田序刺莊公也朱子亦以為莊公時詩大叔于田序刺莊公也朱子亦以為莊公時詩羔裘孔氏穎達謂莊公時詩朱子不詳其世遵大路序莊公失道朱子不詳其世女曰雞鳴孔氏穎達謂莊公時詩朱子不詳其世唐山有樞序刺晉昭公也朱子不詳其世揚之水序刺晉昭公也朱子亦以為昭公時詩椒聊序刺晉昭公也朱子亦以為昭公時詩綢繆孔氏穎達謂昭公時詩朱子不詳其世杕杜孔氏穎達謂昭公時詩朱子不詳其世羔裘孔氏穎達謂昭公時詩朱子不詳其世鴇羽序昭公之後大亂五世君子下從征役不得養其父母而作是詩朱子不詳其世秦駟驖序美襄公也朱子不詳其世小戎序美襄公也朱子同蒹葭序刺襄公也朱子不詳其世終南序戒襄公也朱子不詳其世平王桓王之閒變風七篇鄭氏康成謂當周平桓之世魏之變風始作朱子不詳其世魏葛屨汾沮洳園有桃陟岵十畝之閒伐檀碩鼠桓王之世變風三十三篇邶燕燕孔氏穎達謂州吁時詩朱子同日月序衛莊姜遭州吁之難朱子以為莊公時詩終風序莊姜遭州吁之暴朱子以為莊公時詩擊鼓序怨州吁也朱子同凱風孔氏穎達謂州吁時詩朱子不詳其世雄雉序刺衛宣公也朱子不詳其世匏有苦葉序刺衛宣公也朱子不詳其世谷風孔氏穎達謂宣公時詩朱子不詳其世式微孔氏穎達謂宣公時詩朱子不詳其世旄丘孔氏穎達謂宣公時詩朱子不詳其世簡兮孔氏穎達謂宣公時詩朱子不詳其世泉水孔氏穎達謂宣公時詩朱子不詳其世北門孔氏穎達謂宣公時詩朱子不詳其世北風孔氏穎達謂宣公時詩朱子不詳其世靜女孔氏穎達謂宣公時詩朱子不詳其世新臺序刺衛宣公也朱子不詳其世二子乘舟孔氏穎達謂宣公時詩朱子不詳其世鄘牆有茨序公子頑通於君母國人疾之朱子同君子偕老序刺衛夫人鄭氏康成謂宣公夫人朱子同桑中序衛之公室淫亂鄭氏康成謂宣惠之世朱子不詳其世鶉之奔奔序刺衛宣姜也朱子同衛氓序宣公之時朱子不詳其世竹竿孔氏穎達謂宣公時詩朱子不詳其世芄蘭序刺惠公也朱子不詳其世伯兮鄭氏康成謂宣公時詩朱子不詳其世有狐孔氏穎達謂宣公時詩朱子不詳其世王兔爰序桓王失信諸侯朱子不詳其世采葛鄭氏康成謂桓王之時朱子不詳其世大車孔氏穎達謂桓王時詩朱子不詳其世鄭有女同車序刺忽也朱子不詳其世褰裳孔氏穎達謂褰裳思見正突初立事也朱子不詳其世陳墓門序刺陳他也朱子不詳其世莊王之世變風十五篇王丘中有麻序莊王不明賢人放逐國人思之而作是詩也朱子不詳其世鄭山有扶蘇序刺忽也朱子不詳其世蘀兮序刺忽也朱子不詳其世狡童序刺忽也朱子不詳其世丰東門之墠風雨子襟孔氏穎達謂丰東門之墠風雨子襟或當突篡之時或當忽入之後朱子皆不詳其世揚之水序君子閔忽之無忠臣良士終以死亡而作是詩也朱子不詳其世齊南山序刺襄公也朱子同甫田序大夫刺襄公也朱子不詳其世盧令序襄公好田獵故陳古以風焉朱子不詳其世敝笱序刺文姜也朱子同載驅序齊人刺襄公朱子同猗嗟序刺魯莊公也朱子同釐王之世變風五篇鄭出其東門野有蔓草溱洧孔氏穎達謂此一篇厲公時詩朱子皆不詳其世唐無衣序美晉武公也朱子亦以為武公時詩有杕之杜序刺晉武公也朱子不詳其世惠王之世變風十二篇鄘定之方中序美衛文公也朱子同蝃蝀序衛文公能以道化民朱子同相鼠序衛文公能正其羣臣朱子同干旄序衛文公臣子多好善朱子同載馳序許穆夫人閔衛之亡朱子同衛木瓜序美齊桓公也朱子不詳其世鄭清人序刺文公也朱子同唐葛生序刺晉獻公也朱子不詳其世采苓序刺晉獻公也朱子不詳其世陳防有鵲巢序宣王多信讒君子憂懼焉朱子不詳其世月出孔氏穎達謂宣王時詩朱子不詳其世曹蜉蝣鄭氏康成謂周惠王時昭公好奢曹之變風始作朱子不詳其世襄王之時變風九篇衛河廣序宋襄公母歸于衛思而不止故作是詩也朱子同秦黃鳥序國人刺穆公朱子同晨風序刺康公也朱子不詳其世無衣孔氏穎達謂康公時詩朱子不詳其世渭陽序康公念母也朱子同權輿序刺康公也朱子不詳其世曹候人序刺共公也朱子同鳲鳩孔氏穎達謂共公時詩朱子不詳其世下泉序曹人疾共公朱子不詳其世頌四篇魯頌駉序頌僖公也朱子同有駜序頌僖公也朱子不詳其世泮水序頌僖公也朱子不詳其世閟宫序頌僖公也朱子同定王之世變風二篇陳株林序刺靈公也朱子同澤陂序言靈公君臣淫於其國男女相說憂思感傷焉朱子不詳其世案作詩之時世經秦火之後難以全考故自漢唐諸儒訓詁互異然古序與經竝出毛鄭孔氏羽翼其說傳流最古至朱子一以經文為據其餘不見諸經者都為未定之辭此據理之論也歐陽修祖鄭譜而駁議許謙劉瑾宗朱傳而亦微有不同逮明何楷作世本古義引證雖博而僞說滋繁矣今輯古序及毛鄭孔氏舊義而大指仍以朱子為歸餘說則存而不論也欽定詩經傳說彚纂卷首上
