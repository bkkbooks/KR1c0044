body:
  text: 欽定四庫全書欽定詩經傳說彚纂卷九豳一之十五集傳豳國名許氏謙曰豳即邠州豳之字為邠唐開元因改古文而改也在禹貢雍州岐山之北原隰之野孔氏穎達曰禹貢雍州云荆岐既旅原隰底績是岐山原隰屬雍州也虞夏之際棄為后稷而封於邰及夏之衰棄稷不務韋氏昭曰棄廢也謂夏太康廢稷官不務農棄子不窋竹律反失其官守而自竄於戎狄之閒不窋生鞠陶鞠陶生公劉能復修后稷之業民以富實乃相土地之宜而立國於豳之谷焉十世而太王徙居岐山之陽十二世而文王始受天命十三世而武王遂為天子武王崩成王立年幼不能涖阼周公旦以冢宰攝政孔氏穎逹曰定四年左傳云周公為太宰以左王室乃述后稷公劉之化作詩一篇以戒成王謂之豳風而後人又取周公所作及凡為周公而作之詩以附焉劉氏瑾曰名之為豳實周公詩耳周公作詩意在於豳而周公其他詩無所可繫故因附之豳也七月而後附以鴟鴞東山者亦周公所作也附以伐柯破斧九罭狼跋者衆人為周公而作之詩也豳在今邠州三水縣邰在今京兆府武功縣皇輿表邠州三水縣今邠州三水縣屬西安府京兆府武功縣今西安府武功縣竝隸陜西集説班氏固曰昔后稷封邰公劉處豳太王徙􅑢文王作酆武王治鎬其民有先王遺風好稼穡務本業故豳詩言農桑衣食之本甚備孔氏穎逹曰此乃逺論豳公為諸侯之政不美王業之本不得入周召之正風又非刺美成王不得入成王之正雅周公王朝卿士不得專名一國進退既無所繫因其上陳豳公故為豳之變風次之風後雅前者言周公徳髙於諸侯事同於王政處諸國之後不與諸國為倫次之小雅之前言其近堪為雅使周公專有此善也范氏祖禹曰豳風居於風雅之閒何也風之所為終而雅之所為始也變風終於曹思眀王賢伯之不可得於是次之以豳反之於周公而後至於鹿鳴言周之所以盛者由周公也張子曰始於二南終於豳聖人所以為無窮也蘇氏轍曰豳公之詩一國之風也周公之詩一人之事也皆非天下之政是故得為風不得為雅也楊氏時曰豳風周公詩也周公居攝政由已出謂之雅則人臣之事而已謂之風則周公非有國也而七月陳先公風化故幷繫之豳金氏履祥曰篤公劉為召公所獻以備燕饗之樂使成王知立國勤勞之故七月為周公所陳以為矇工之誦使成王知故國衣食之原故篤公劉列於雅而豳七月自為風朱氏公遷曰豳不先二南尊文王也不繼二南豳先岐後也不與王風相屬興衰非其類也文王致治周公反正十五國風以是始終之則循環而為治世矣七月流火叶虎委反九月授衣叶上聲一之日觱音必發叶方吠反二之日栗烈叶力制反無衣無褐音曷叶許例反何以卒歳或曰發烈褐皆如字而歳讀如雪三之日于耜叶羊里反四之日舉趾同我婦子叶奨里反饁炎輒反彼南畝叶滿彼反田畯音俊至喜集傳賦也七月斗建申之月夏之七月也後凡言月者放此張子曰七月之詩皆以夏正為斷曹氏粹中曰公劉正當夏時所用者夏正也劉氏瑾曰凡詩中月數皆以寅月起數不特此詩為然也流下也火大火心星也鄭氏康成曰大火者寒暑之候也火星中而寒暑退故將言寒先著火所在許氏謙曰晉天文志東方心三星天王正位也中星曰明堂天子位前星為太子後星為庶子以六月之昏加於地之南方至七月之昏則下而西流矣劉氏瑾曰堯典云日永星火以正仲夏蓋堯時仲夏日在鶉火故昏而大火中及周公攝政時凡一千二百四十餘年歳差當退十六七度故六月而後日在鶉火大火昏中七月則日在鶉首而昏時大火西流於地之未位然此詩上述豳俗乃當夏商之時而言七月流火者蓋據周公時所見而言耳朱氏公遷曰天傾西北故自東而西則曰下而西流九月霜降始寒而蠶績之功亦成故授人以衣使禦寒也范氏祖禹曰七月隂氣始盛而寒至九月則不可無衣矣朱氏公遷曰授者家長以與家人也一之日謂斗建子一陽之月二之日謂斗建丑二陽之月也變月言日言是月之日也後凡言日者放此毛氏萇曰一之日十之餘也一之日周正月也二之日殷正月也許氏謙曰詩中以日言者雖為建子之義其實主於陽而言朱氏倬曰數始於一而終於十故七月詩中言至十月而止而一陽生於子即以一之日言之蓋周之先公朱子曰公劉以下太王以前先公之通稱已用此以紀候故周有天下遂以為一代之正朔也蘇氏轍曰此言月者夏正也言日者周正也觱發風寒也栗烈氣寒也孔氏穎逹曰仲冬之月待風乃寒季冬之月無風亦寒王氏安石曰風而寒尚非其至也無風而寒於是為至褐毛布也歳夏正之歳也范氏祖禹曰何以卒歳則又見二之日為歳之終也于往也耜田器也易繫辭斵木為耜揉木為耒嚴氏粲曰釋文曰耜耒下耓也廣五寸耒耜上句木也濮氏一之曰耒耜可偏舉故周頌有略其耜畟畟良耜以起土者言之祭義天子諸侯躬秉耒以手所執柄言之于耜言往修田器也毛氏萇曰三之日夏正月也豳土晚寒于耜始修耒耜也嚴氏粲曰西北温晚寒當早也毛言豳土晚寒當謂氣候晚而多寒故耕事遲耳舉趾舉足而耕也毛氏萇曰四之日周四月也民無不舉足而耕矣我家長自我也饁餉田也田畯田大夫勸農之官也孔氏穎逹曰釋言云畯農夫也孫炎曰農夫田官也郭璞曰今之嗇夫是也然則此官選俊人主田謂之田畯典農之大夫謂之農夫以王者尤重農事知其爵為大夫也周公以成王未知稼穡之艱難故陳后稷公劉風化之所由使瞽矇朝夕諷誦以敎之真氏徳秀曰周家以農事開國成王幼沖周公作詩使瞽矇歌之庶㡬王知小民之依不敢荒寜蓋與無逸同一意也許氏謙曰周禮注疏諷誦謂闇讀之不依琴瑟而詠也此章首言七月暑退將寒程子曰歳過中而將暮矣當有卒歳之具禦寒之備故以七月流火為首故九月而授衣以禦之蓋十一月以後風氣日寒不如是則無以卒歳也正月則往修田器二月則舉趾而耕少者既皆出而在田故老者率婦子而餉之治田早而用力齊是以田畯至而喜之也歐陽氏修曰田大夫見其勤農樂業而喜此章前段言衣之始後段言食之始二章至五章終前段之意六章至八章終後段之意李氏樗曰惟九月既授衣則蠶月條桑八月載績所以為授衣之具也惟四之日既舉趾則十月納禾稼所以為田事之成也劉氏瑾曰此章前段以七月言衣褐之所始二章至五章既終其意而復言穹窒墐戸之事後段以三之日言耕食之始六章至八章既終其意而幷言蔬果祭享之事又皆所以廣此章衣食之意也集説孔氏穎逹曰先公敎民周備民奉上命於七月之中有西流者是火之星也知是將寒之漸至九月之中云可以相授以冬衣矣若不授冬衣則一之日有觱發之寒風二之日有栗烈之寒氣此二日者大寒之時人之貴者無衣賤者無褐何以終其歳乎故至八月則當績也又豳人從君之敎三之日於是始修耒耜四之日悉皆舉足而耕其時我耕者之婦子奉饋食餉彼南畝之中耕作者田畯來至見其勤於農事則歡喜也張子曰周人慮事有豫七月之詩常於半年前提掇故頻舉七月為言范氏祖禹曰孔子曰作易者其有憂患乎先王敎民農桑以為衣食非以充欲所以備患也是故將言衣之本則著寒之候民生本乎衣食天下之務莫實於此矣禮義之所以起孝悌之所以生敎化之所以成人情之所以固也故勤儉之俗莫如豳風朱氏善曰三隂之月隂氣始盛故於是而豫為禦寒之備三陽之月陽氣始盛故於是而豫為治田之備先衣而後食故以七月為首也大寒之候在於丑月而圖之於建申之時收成之候在於酉月而慮之於建寅之日其為豫備可知若寒至而後索衣飢至而後索食則其為計亦晚矣七月流火九月授衣春日載陽有鳴倉庚叶古郎反女執懿筐遵彼微行叶户郎反爰求柔桑春日遲遲采蘩祁祁巨之反女心傷悲殆及公子同歸集傳賦也載始也陽温和也倉庚黄鸝也孔氏穎達曰即葛覃黄鳥是也懿深美也遵循也微行小徑也毛氏萇曰微行牆下徑也五畝之宅樹之以桑柔桑穉桑也遲遲日長而暄也孔氏穎逹曰人在陽則舒在陰則慘遇春暄則四體舒泰覺畫景之稍長謂日行遲緩故以遲遲言之蘩白蒿也所以生蠶今人猶用之蓋蠶生未齊未可食桑故以此啖音淡之也祁祁衆多也黄氏佐曰祁祁不獨田野之家為然而貴家大族亦無不然所以衆也或曰徐也公子豳公之子也再言流火授衣者將言女功之始故又本於此遂言春日始和有鳴倉庚之時而蠶始生則執深筐以求穉桑王氏安石曰以九月授衣也故春日載陽則求桑而蠶然又有生而未齊者則采蘩者衆而此治蠶之女感時而傷悲顧氏起元曰治蠶之時正昏姻之候故其所感如此蓋是時公子猶娶於國中而貴家大族連姻公室者亦無不力於蠶桑之務故其許嫁之女預以將及公子同歸而逺其父母為悲也張子曰此意次於耕事者重昏嫁本人情曹氏粹中曰預有離親之感而傷悲亦忠厚也劉氏瑾曰同歸者同親迎之公子而歸也其風俗之厚而上下之情交相忠愛如此後章凡言公子者放此集説孔氏穎逹曰人之為衣絲帛為先故二章言女功之始養蠶之事一章之中而再言春日者先言執筐養蠶因論女心傷悲感物但傷悲在蠶生之初陳之於求桑之下顛倒不順故更本春日采蘩記傷悲之節所以再言春日也范氏祖禹曰男莫不耕女莫不蠶則衣食之本立矣昏姻以時則男女正矣輔氏廣曰舊説以女心傷悲為感春陽之氣而然則失之䙝以殆及公子同歸為欲與公之女同歸則又失之僭且於下為公子裳為公子裘有礙故先生不取而以為許嫁之女預以將及公子同歸為憂而逺其父母為悲也不唯見當時風俗之厚而又於下文皆可通也夫后稷先公之世去周公亦逺矣而能體其民如此則當時之民痒疴疾痛周公又豈有不體之者乎所謂唯君子為能通天下之志而聖人之心能合天下為一體通古今為一息者周公之謂矣七月流火八月萑戸官反葦韋鬼反蠶月條它彫反桑取彼斧斨七羊反以伐逺揚猗於宜反彼女桑七月鳴鵙圭覓反八月載績載𤣥載黄我朱孔陽為公子裳集傳賦也萑葦即蒹葭也毛氏萇曰薍為萑葭為葦豫畜萑葦可以為曲也蠶月治蠶之月王氏安石曰蠶月非一月故不指言某月程子曰蠶月當蠶長之月也計歳氣之早晚不可指定㡬月也劉氏瑾曰蠶月雖不可指定某月然其既條取大桑復猗彼女桑大約當在建辰之月蠶盛之時先儒或疑此詩獨闕三月蓋已具於蠶月之閒矣條桑枝落之采其葉也朱子曰條而取之則蠶長而桑盛與求柔桑之時異矣斧隋駝妥二音銎音穹斨方銎陸氏徳眀曰隋孔形狹而長銎説文云斧孔也孔氏穎逹曰斨即斧也唯銎孔異耳逺揚逺枝揚起者也孔氏穎達曰逺者謂長枝去人逺也揚謂長條楊起者皆手所不及故枝落之而采其葉取葉存條曰猗女桑小桑也爾雅釋木女桑桋桑郭璞注今俗呼桑樹小而條長者為女桑樹黄氏震曰前云柔桑指桑葉之小者此云女桑指桑樹之小者小桑不可條取故取其葉而存其條猗猗然耳蘇氏轍曰猗長也葉盡則條猗猗而長也曹氏粹中曰曰伐曰猗言取之無遺且有法也鵙伯勞也孔氏穎逹曰樊光曰少皞氏以鳥名官伯趙氏司至伯趙鵙也以夏至來冬至去范氏處義曰鵙仲夏始鳴至七月則鳴之極而將去矣朱子曰鵙以七月鳴則隂氣至而衆芳歇矣鴂鵙音相近服䖍陸佃以為題鴂即鵙也績緝也毛氏萇曰載績絲事畢而麻事起矣𤣥黒而有赤之色朱赤色陽眀也孔氏穎達曰以陽為明謂朱色光明也王氏安石曰周官染人秋染夏夏五色也蓋是時五色皆可以染也言七月暑退将寒而是歳禦冬之備亦庶㡬其成矣呂氏大臨曰七月流火三章皆言丁寧之也又當預擬来歳治蠶之用故於八月萑葦既成之際而收蓄之将以為曲薄孔氏穎達曰月令季春具曲植筐筥注云曲薄也植槌也薄用萑葦為之至來歳治蠶之月則采桑以供蠶食而大小畢取見蠶盛而人力至也蠶事既備又於鳴鵙之後麻熟而可績之時則績其麻以為布而凡此蠶績之所成者皆染之或𤣥或黄而其朱者尤為鮮眀皆以供上而為公子之裳嚴氏粲曰不敢言為豳公之裳而託言公子也言勞於其事而不自愛以奉其上蓋至誠慘怛之意上以是施之下以是報之也朱氏公遷曰此因在下者之情而上之所施者可見以上二章専言蠶績之事以終首章前段無衣之意劉氏瑾曰二章三章雖皆以終首章無衣之意而其意則益深逺蓋二章之終其意者推言暑退将寒而授衣其衣之成實始於春月之蠶桑此章又推言暑退之後是歳蠶桑之功既成而來歳蠶桑之備方始以至預言八月載績又皆預恐來歳之無衣焉其慮之逺而備之悉者如此集説孔氏穎達曰養蠶績麻是造衣之始故先言之染色作裳是為衣之終故後言之計蠶績所得民亦自衣而特言公子裳厚重於其貴者故特説之張子曰我朱孔陽則己欲為公子裳取彼狐貍則己欲為公子裘春日遲遲采蘩祁祁則迨及公子同歸民愛豳公待之如家人其愛之深如此朱氏善曰上章於春日而求桑以養蠶為今年授衣計也此章於八月萑葦既成而豫蓄之以為曲薄為明年養蠶計也上章求穉桑以養其始生者采白蒿以洗其未生者此蠶事之始也此章於桑之大者條取之桑之小者猗取之蠶盛而大小畢取此蠶事之成也蠶事既成又於鳴鵙之候而績其麻以為布蓋蠶之所成者可以供老疾給婚嫁奉君上而已非績麻以為布則固無以為少者壯者之供也蠶績皆成然後染之且以供上而為公子之裳其風俗之厚如此豈一日之積哉四月秀葽於遥反五月鳴蜩徒彫反八月其穫户郭反十月隕于敏反蘀音託一之日于貉户各反取彼狐貍力之反為公子裘叶渠之反二之日其同載纘子管反武功言私其豵子公反獻豣古年反于公集傳賦也不榮而實曰秀葽草名王氏應麟曰四月秀葽諸儒不詳其名惟説文引劉向説以為苦葽曹氏以爾雅本草證之知其為逺志蜩蟬也孔氏穎達曰方言曰楚謂蟬為蜩宋衛謂之螗蜩陳鄭謂之蜋蜩秦晉謂之蟬是蜩蟬一物方俗異名耳穫禾之早者可穫也隕墜蘀落也謂草木隕落也貉狐貍也于貉猶言于耜謂往取狐貍也蘇氏轍曰十一月鳥獸氄毛其皮可取於是擇其狐貍以與公子為裘同竭作以狩也程子曰其同謂㑹聚共事也朱氏公遷曰地官小司徒云凡起役毋過家一人以其餘為羡唯田與追胥竭作注云唯田獵與逐捕寇盗則正卒羡卒盡行焉纘習而繼之也孔氏穎逹曰繼續武事年常習之使不忘戰也豵一歳豕豣三歳豕言自四月純陽而歴一隂四陰以至純陰之月則大寒之候将至王氏安石曰陽生則言日陰生則言月四月正陽也秀葽言月何也秀葽以言陰生也隂始於四月生於五月而於四月言隂生者氣之先至者也段氏昌武曰秀葽言月即陽月之意見陰陽無截然間斷之理也雖蠶桑之功無所不備猶恐其不足以禦寒故于貉而取狐貍之皮以為公子之裘也真氏徳秀曰上言織薄於秋求蠶於春躬蠶績之勞以為衣者無所不至猶恐其未足也于貉為裘又有以相之獸之小者私之以為己有而大者則獻之於上亦愛其上之無已也此章専言狩獵以終首章前段無褐之意集説鄭氏康成曰秀葽也鳴蜩也穫禾也隕蘀也四者皆物成而将寒之候物成自秀葽始于貉者時寒宜助女功其同者居臣及民因習兵俱出田也孔氏穎逹曰孟冬天子始裘自此之後臣民亦服裘也孟冬已裘而仲冬始捕獸者為來年用之天官掌皮秋歛皮冬歛革春獻之注云皮革踰歳乾冬乃可用獻之以入司裘是其事也大司馬云仲冬教大閱遂以狩田是因習兵而田獵也禮云仲冬此言二之日即是季冬也不用仲冬者豳地晚寒故習兵晚也四時皆習兵而獨説冬獵者以取皮在冬且大閲禮備故也輔氏廣曰此章又自四月純陽説起以至十二月大寒之候取狐貍之皮以為公子裘而助布帛之用因幷及竭力以冬狩大獸公之小獸私之以見其民奉上無己之情其同纘武雖先公風化之使然抑以見武事之不可廢人情自有所不能已者故曰天生五材民竝用之誰能去兵錢氏天錫曰因天時之變而物化隨之寒於冬而萌於夏豳民早計如此蓋不止履霜而知嚴冰矣古者狩獵之禮以備武事故曰載纘武功然豳民知狩獵耳不知其為武功也狩獵不専為君但於勤生中有先公後私之義蠶績必獻一女之勤不敢忘君也狩獵必獻一男之作不敢忘君也五月斯螽音終動股六月莎素和反雞振羽七月在野叶上與反八月在宇九月在户後五反十月蟋蟀入我牀下叶後五反八字一句穹起弓反窒珍悉反熏許云反鼠塞向墐音覲户同上嗟我婦子叶茲五反曰為改歳入此室處集傳賦也斯螽莎雞蟋蟀一物隨時變化而異其名動股始躍而以股鳴也振羽能飛而以翅鳴也毛氏萇曰斯螽蚣蝑也莎雞羽成而振訊之陸氏璣曰莎雞如蝗而斑色毛翅數重其翅正赤六月中飛而振羽索索作聲嚴氏粲曰蟋蟀促織也解見唐蟋蟀宇簷下也暑則在野寒則依人孔氏穎達曰月令季夏云蟋蟀居辟是從辟内出在野穹空隙也窒塞也向北出牖也墐塗也庶人篳戶冬則塗之孔氏穎逹曰篳户以荆竹織門以其通風故泥之也東萊呂氏曰十月而曰改歳三正之通於民俗尚矣周特舉而迭用之耳蘇氏轍曰改歳十一月周正也曹氏粹中曰或曰夏曰歳歳星行一周也周曰年取禾一熟也此時豳人用夏正而於十月則言改歳者蓋其俗素以禾熟記歳功之成殘歳無復事矣故歳雖未終而謂之改歳也其後周人遂以十一月為正蓋本此劉氏瑾曰歳字之義有以天時一周而言者有以正朔所紀而言者天時一周必始於孟春而終於季冬首章所謂二之日何以卒歳是也正朔所紀則子丑寅之迭建與此十月而謂改歳者是也夫夏書有怠棄三正之語則自夏以前已有子丑之正是三正通於民俗其來既逺故豳公創國偏方亦有十月改歳之俗及至周有天下又因以為一代之正朔正如公劉徹田為糧之法其後亦為成周之徹法也言覩蟋蟀之依人則知寒之将至矣李氏樗曰始而在野既而在宇在户皆自外而之内自逺而之近既入於牀下則近人而寒至矣於是室中空隙者塞之熏鼠使不得穴於其中塞向以當北風墐户以禦寒氣而語其婦子曰歳将改矣天既寒而事亦已可以入此室處矣此見老者之愛也程子曰嗟我婦子歎其勤勞歳事既終又復為改歳之事歳暮入居室也曹氏粹中曰既皆温宻矣然後以其婦子入處於内此章亦以終首章前段禦寒之意集説鄭氏康成曰自七月在野至十月入我牀下皆謂蟋蟀也言此三物之如此著将寒有漸非卒來也改歳者歳終而一之日觱發二之日栗烈當避寒氣而入所穹窒墐户之室而居之至此而女功止孔氏穎逹曰月令云孟冬命有司閉塞而成冬此經穹窒墐戸文在十月之下亦當以十月塞塗之矣云曰為改歳者以仲冬陽氣始萌可以為年之始若總言一歳之事則寒暑一周乃為終歳寒氣未過是為未終故上言無衣無褐不得終歳謂度寒至春二者意小異也從養蠶而至此時一歳之女功止故告婦子令之入室避寒也王氏安石曰隂陽往來不窮而與之出入作息天地萬物性命之理非特人事也楊氏時曰堯命羲和以昏中之星正四時鳥獸氄毛希革之類為之應七月所陳以倉庚鳴鵙為蠶績之候以秀葽隕蘀其穫為取皮之候以斯螽蟋蟀為處室之候皆此意也朱氏善曰感時物之屢變盡人事之當為豳民於衣食之奉必先老而後幼先貴而後賤獨於改歳入室則老幼貴賤同之所以廣其愛也六月食鬱及薁於六反七月亨普庚反葵及菽音叔八月剝普卜反棗叶音走十月穫稻叶徒苟反為此春酒以介睂夀叶殖酉反七月食瓜叶音孤八月斷壺九月叔苴七餘反采荼音徒薪樗勅書反食音嗣我農夫集傳賦也鬱棣屬薁蘡音纓薁也孔氏穎逹曰鬱棣屬者是唐棣之類屬也其樹髙五六尺其實大如李正赤食之甜蘡薁者亦是鬱類而小别耳二者相類而同時熟故言鬱薁也葵菜名呂氏祖謙曰爾雅注曰葵承露也大莖小葉華紫黄色可茹菽豆也剝擊也陸氏佃曰收棗擊而落之齊民要術所謂全赤即收收法撼而落之為上是也穫稻以釀酒也介助也介睂夀者頌禱之詞也毛氏萇曰春酒凍醪也睂夀豪睂也孔氏穎逹曰凍時釀之故稱凍醪人年老者必有豪睂秀出者故知睂謂豪睂也蘇氏轍曰養老者必有酒以助養其氣呂氏祖謙曰月令仲冬麴蘖必時注云古者穫稻而漬米麴至春而為酒壺瓠也劉氏彞曰枯者可為壺嫩者可供茹食瓜斷壺亦去圃為場之漸也叔拾也苴麻子也孔氏穎逹曰苴麻之有實者也下章納榖有麻此言叔苴者以麻九月初熟拾取以供羮菜其在田收穫者猶納倉以供常食也荼苦菜也樗惡木也孔氏穎達曰荼以為菜樗以為薪各從所宜耳王氏安石曰荼則苦菜非若葵之渭廿故以食農夫而已以樗不材故薪之也自此至卒章皆言農圃飲食祭祀燕樂以終首章後段之意而此章果酒嘉蔬以供老疾奉賓祭瓜瓠苴荼以為常食少長之義豐儉之節然也程子曰自六月食鬱及薁以下果蔬棗酒皆為養老之具七月食𤓰以下皆為壯者之食陳氏鵬飛曰取豵以為私取豣以獻公上下之分著矣以美者養老以惡者自食長幼之義明矣集説王氏安石曰地無遺利矣故物不可勝用也吕氏大臨曰衣裘具矣居室安矣老者之養不可以無加也農夫之勤其養不可以不畜也曹氏粹中曰周人貴親而尚齒也四章既言八月其穫矣此章又言十月穫稻則五榖之熟各隨其早晚耳朱氏善曰果酒嘉蔬非不可以及少也而供老疾奉賓祭之意多𤓰瓠苴荼老者未必不食也而不可以為常於以見食稻食肉乃老者之常而果酒嘉蔬則又於常食之外専以此而致其助也有常食以養之而又有美味以助之此豳人之老所以無凍餒也歟九月築場圃博故反十月納禾稼叶古護反黍稷重直容反穋音六叶六直反禾麻菽麥叶訖力反嗟我農夫我稼既同上入執宫功晝爾于茅宵爾索綯徒刀反亟紀力反其乗屋其始播百榖集傳賦也場圃同地物生之時則耕治以為圃而種菜茹物成之際則築堅之以為場而納禾稼蓋自田而納之於場也王氏安石曰無曠土故築場於圃彭氏執中曰地無遺利也禾者榖連藳秸之總名禾之秀實而在野曰稼先種後熟曰重後種先熟曰穋再言禾者稻秫苽粱之屬皆禾也孔氏穎達曰禾是大名非徒黍稷重穋四種而已麻與菽麥則無禾稱故於麻麥之上更言禾字以總諸禾也許氏謙曰麥非納於十月蓋總言農事畢耳同聚也王氏安石曰言所納之備也宫邑居之宅也古者民受五畝之宅二畝半為廬在田春夏居之二畝半為宅在邑秋冬居之功葺治之事也毛氏萇曰入為上出為下程子曰遷入都邑之居也王氏安石曰上入執宫功城中之宅也中田有廬田中之廬也出而作於田入而休於室皆授之以時或曰公室官府之役也古者用民之力歳不過三日是也梁氏益曰周禮地官均人職凡均力政以歳上下豐年則公旬用三日焉中年則公旬用二日焉無年則公旬用一日焉索絞也綯索也乗升也言納於場者無所不備則我稼同矣可以上入都邑而執治宫室之事矣故晝往取茅夜而絞索亟升其屋而治之蓋以來歳将復始播百榖而不暇於此故也王氏應麟曰楊泉物理論曰稻粱菽各二十種為六十蔬果之實助榖各二十凡為百榖不待督責而自相警戒不敢休息如此輔氏廣曰詩言民之趨於農功自然如此其亟故孟子引之以證其民事不可緩之説呂氏曰此章終始農事以極憂勤艱難之意范氏祖禹曰天運而不息人勤而不已故我稼既同則又将始播殖也王氏安石曰如易所謂終則有始者也集説朱氏公遷曰此章先言農之終事以起農之始事故以九月為始朱氏善曰稼之既同若可以少休也而即念夫邑居之當修屋之方乗若可以少緩也而復念夫農功之當始於其築而納之也有以見其歡欣鼔舞之意於其亟而乗之也有以見其勸勉戒飭之意事有始終而其憂勤艱難則無閒於始終此所以為厚也歟二之日鑿冰沖沖三之日納于凌力證反陰叶於容反四之日其蚤音早獻羔祭韭音九叶已小反九月肅霜十月滌徒力反場朋酒斯饗叶虚良反曰殺羔羊躋子奚反彼公堂稱彼兕觥虢彭反叶古黄反萬夀無疆集傳賦也鑿冰謂取冰於山也沖沖鑿冰之意周禮正歳十二月令斬冰是也左傳其藏冰也深山窮谷固隂冱寒於是乎取之杜預注冱閑也必取積隂之冰所以道逹其氣使不為災納藏也藏冰所以備暑也凌隂冰室也豳土寒多正月風未解凍故冰猶可藏也蚤蚤朝也韭菜名獻羔祭韭而後啓之月令仲春獻羔開冰先薦寢廟是也鄭氏康成曰古者日在北陸而藏冰西陸朝覿而出之祭司寒而藏之獻羔而啓之其出之也朝之禄位賓食䘮祭於是乎用之上章備寒故此章備暑孔氏穎逹曰凌人十二月斬冰即以其月納之此言三之日納于凌隂四之日即出之藏之既晚出之又早者仲春陽氣出地始温故禮應開冰先薦寢廟言由寒晚得晚納冰依禮湏早開故也二月開冰君始用之至於夏初出之乃頒賜臣下也陸氏佃曰禮曰春行羔豚又曰春薦韭黄氏一正曰司寒之神藏冰時先以黒牡秬黍享之至開冰而又祭以羔韭也蘇氏曰古者藏冰發冰以節陽氣之盛夫陽氣之在天地譬如火之著於物也故常有以解之十二月陽氣藴伏錮而未發其盛在下則納冰於地中至於二月四陽作蟄蟲起陽始用事則亦始啓冰而廟薦之至於四月陽氣畢逹隂氣將絶則冰於是大發食肉之禄老病䘮浴冰無不及杜氏預曰食肉之禄謂在朝廷治其職事就官食者老致仕在家者是以冬無愆陽夏無伏隂春無淒風秋無苦雨雷出不震無災霜雹癘疾不降民不夭札也杜氏預白愆過也謂冬温伏隂謂夏寒淒寒也霖雨為人所患苦短折為夭夭死為札胡氏曰藏冰開冰亦聖人輔相爕調之一事耳不専恃此以為治也肅霜氣肅而霜降也毛氏萇曰肅縮也霜降而收縮萬物呂氏祖謙曰邱氏曰肅嚴氣也滌場者農事畢而埽場地也兩尊曰朋鄉飲酒之禮兩尊壺于房户間是也許氏謙曰儀禮鄉飲酒禮尊兩壺于房户閒士冠禮注置酒曰尊今傳云兩尊壺恐傳寫之誤李氏如圭曰房户間者房西室户東於堂為東西之中當兩楹間躋升也公堂君之堂也稱舉也疆竟也王氏安石曰於是乎可以飲酒燕樂是謂燕饗之節張子曰此章見民忠愛其君之甚既勸趨其藏冰之役又相戒速畢場功殺羊以獻於公舉酒而祝其夀也問民何以得升君之堂朱子曰周初國小君民相親其禮樂法制未必盡備而民事之艱難君則盡得以知之成王時禮樂備法制立然但知為君之尊而未必知為國之初此等意思故周公特作此詩使之因是以知民事也集説孔氏穎達曰七章言收歛之事所以成首章也衣食已具卒章乃言備暑藏冰飲酒相樂皆是先公憂民之風教輔氏廣曰以介睂夀祝其親也萬夀無疆祝其君也周之先公以農桑教民而使民給足於衣食然未嘗以為恵也周之民亦自力於農桑之事以樂其生至於歳終休暇之時則殺羊為酒祝君之夀以致其尊君親上之誠亦未嘗以為是足以報其上也上以誠愛下下以誠事上而兩不知其所以然此所謂皞皞如也朱氏善曰鑿冰藏冰其供上役也為甚勤肅霜滌場其畢農功也為甚速故其開冰也獻羔祭韭以薦寢廟君既得以致其誠孝於神其務閑也殺羊舉酒而祝其夀民復有以致其忠愛於君可謂上下相親之甚矣總論孔氏穎逹曰民之大命在温與飽八章所陳皆論衣服飲食首章為其總要餘章廣而成之絲麻布帛衣服之常故蠶績為女功之正皮裘則其助黍稷菽麥飲食之常故禾稼為男功之正菜果則其助養蠶時節易過恐失其時殷勤言之故二章三章皆言養蠶之事耕稼者一年之事非時月之功民必趨時不假深戒首章已言其始七章略言其終不復説其芟耨耘耕之事故男功之正少女功之正多也絲麻之外唯有皮裘可衣者少黍稷之外果𤓰之屬可食者多故男功之助多女功之助少也先公之教急於衣食四章之末説田獵習戎卒章之初説藏冰禦暑非衣食之事而言之者廣述先公禮教具備也閒於政事然後饗燕卒章説飲酒之事得其次也劉氏彛曰此詩所記苟非井邑其民鄉黨其教各有正長部分司其歳功未易集也程子曰此詩多陳節物大要言歳敘之遷人事當及時耳所言或與月令異者月令多舉其始此但言其有時不必始有也朱子曰使成王知其積累之艱難如此而思奉承之不易且以見己之所以當國而不辭之意輔氏廣曰虞夏之際洪水之害始除鮮食艱食既奏而民始可以得食桑土既蠶而民始可以得衣又得后稷公劉有以教導而輔翼之其於蠶績耕稼之事使之早戒預備則民皆得其所而尊君親上之心以生養老慈幼之禮自行食力用節而奢侈之意未萌誠實相與而機械之事未作此是民生冣好底時節故周公述其事而作詩欲使成周之俗如此方是慊快今觀雅頌大田良耜諸詩及後來刑措四十年而不用則亦既得之矣非聖人其孰能與於此哉七月八章章十一句集傳周禮籥章中音仲春晝擊土鼓龡音吹豳詩以逆暑中秋夜迎寒亦如之即謂此詩也鄭氏康成曰杜子春云土鼔以瓦為匡以革為兩面可擊也吹之者以籥為之聲七月言寒暑之事迎氣歌其類也迎暑以晝求諸陽迎寒以夜求諸隂王氏曰仰觀星日霜露之變俯察昆蟲草木之化以知天時以授民事女服事乎内男服事乎外上以誠愛下下以忠利上父父子子夫夫婦婦養老而慈幼食力而助弱其祭祀也時其燕饗也節此七月之義也集説孔氏穎達曰此詩主意於豳之事則所陳者處豳地陳先公公劉太王之等耳不陳后稷之教今輒言后稷者以先公修行后稷之教故以后稷冠之嚴氏粲曰七月陳豳民農桑之事而首序謂之王業猶孟子謂之王道也蓋周以農事開國而豳者豐鎬之基也周公因管蔡流言將壊成業念先公之初艱難積累歴十數世之久以致今日何忍一旦壊之所以感悟成王也鴟鴞鴟鴞既取我子又叶入聲無毁我室又叶上聲恩斯勤斯鬻由六反子之閔叶睂貧反斯集傳比也為鳥言以自比也鴟鴞鵂鶹音休畱惡鳥攫俱縛反鳥子而食者也爾雅釋鳥鴟鴞鸋鴂郭璞注鴟類吕氏大臨曰鴟鴞惡聲之鷙鳥也有鴞萃止翩彼飛鴞為梟為鴟蓋梟之類室鳥自名其巢也恩情愛也勤篤厚也鬻養閔憂也武王克商使弟管叔鮮蔡叔度監於紂子武庚之國武王崩成王立周公相之而二叔以武庚叛且流言於國曰周公将不利於孺子問周公使管叔監殷豈非以愛兄之心勝故不敢疑之耶朱子曰若説不敢疑則已是有可疑者矣蓋周公以管叔是吾之兄事同一體今既克商使之監殷又何疑焉非是不敢疑乃是即無可疑之事也叔重因云孟子所謂周公之過不亦宜乎者正謂此也曰然故周公東征二年乃得管叔武庚而誅之而成王猶未知公之意也公乃作此詩以貽王託為鳥之愛巢者呼鴟鴞而謂之曰鴟鴞鴟鴞爾既取我之子矣無更毁我之室也以我情愛之心篤厚之意鬻養此子誠可憐憫今既取之其毒甚矣況又毁我室乎以比武庚既敗管蔡不可更毁我王室也問既取我子無毁我室解者以為武庚既殺我管蔡不可復亂王室畢竟是當初管蔡挟武庚為亂朱子曰詩人之言只得如此不成歸怨管蔡集説程子曰鴟鴞喻為惡者子喻管蔡室喻王室管蔡骨肉而與之為亂是既取我子矣母更毁壊我王室也黄氏櫄曰鴟鴞破羣鳥之巢而食其子鳥護其巢呼而告之曰我養子之勤營巢之勞其所積累盤聚纒綿固蔕者非一日矣而汝其毁我之成巢乎其意謂周自后稷開基公劉篤烈太王肇基王迹王季勤勞王家文武經營内外之治武庚既逞其姦於管蔡而復欲幷王室而毁之也迨天之未隂雨徹彼桑土音杜徒古反綢直留反繆莫侯反牖戶後五反今女音汝下民或敢侮予叶演女反集傳比也迨及徹取也桑土桑根也陸氏徳眀曰土韓詩作杜方言云東齊謂根曰杜綢繆纒綿也牖巢之通氣處戶其出入處也亦為鳥言我及天未隂雨之時而往取桑根以纒綿巢之隙穴使之堅固以備隂雨之患則此下土之民誰敢有侮予者亦以比已深愛王室而預防其患難之意故孔子贊之曰為此詩者其知道乎能治其國家誰敢侮之朱氏公遷曰有備則無患此為治之大法也朱子引之以見周公善於為治如此集説張氏栻曰鳥於天未隂兩而徹桑土葺牖戶是猶於國家安泰之日而經理備預者也蓋消息盈虚之相盪安危治亂之相承理之常然非知㡬者孰能審微於未形而禦變於将來哉輔氏廣曰言己之深愛王室先事為備以防禍亂之意疑當時流言必以為周公平日勤勞皆是自為己謀故周公言此以曉成王也朱氏得之曰取子出於意料所不及則下民之侮安知其必無情之切而急慮之逺而周也予手拮音吉据音居予所捋力活反荼予所蓄租子胡反予口卒瘏音徒曰予未有室家叶古胡反集傳比也拮据手口共作之貌毛氏萇曰拮据撠京劇反挶俱局反也孔氏穎達曰説文云撠持撠挶謂以手爪挶持草也捋取也荼萑音丸苕音迢可藉巢者也孔氏穎達曰七月傳云薍為萑此言萑苕謂薍之秀穂也出其東門箋云荼茅秀然則茅薍之秀其物相類故皆名荼也蓄積租聚也王氏安石曰與租賦之租同卒盡瘏病也室家巢也亦為鳥言作巢之始所以拮据以捋荼蓄租勞苦而至於盡病者以巢之未成也朱子曰詩詞多是出於當時鄉談雜而為之如鴟鴞拮据捋荼之語皆此類也輔氏廣曰拮据手口共作捋荼蓄租則其所作之事也先言手之拮据終言口之卒瘏亦言之法以比己之前日所以勤勞如此者以王室之新造而未集故也集説蘇氏轍曰以手捋荼則至於拮据以口蓄租則至於卒瘏予所以勤勞病瘁而不辭者曰予未有室家故也奈何既成而将或毁之哉予羽譙譙在消反予尾翛翛素彫反予室翹翹析消反風雨所漂匹遥反揺予維音嘵嘵呼堯反集傳比也譙譙殺色界反也翛翛敝也孔氏穎達曰鳥之羽尾疲勞之狀翹翹危也嘵嘵急也鄭氏康成曰音嘵嘵然恐懼告愬之意亦為鳥言羽殺尾敝以成其室而未定也風雨又從而漂揺之則我之哀鳴安得而不急哉以比已既勞悴王室又未安而多難乗之則其作詩以喻王亦不得而不汲汲也集説程子曰予羽尾殘敝然後成室既其成就之勞如此故為風雨漂揺則其聲憂懼此詩所以辭袁而意切也劉氏瑾曰上章及此周公自比其勤勞如此者蓋公以貴戚大臣宗社安危繫於其身者非一日矣成王既惑於流言則夫自言其勞而不為誇謂王室為予室而不為嫌良以嘵嘵之音出於忠愛之情所不能已也總論程子曰管蔡流言及叛是亂也成王㓜而未知周公之志公為此詩告以王業艱難不忍其毁壊之意以悟王心此周公出征救亂之心作詩之志也輔氏廣曰成王之疑不釋則周之為周未可知也此詩辭哀意切至為禽鳥之語以感動之不啻如慈母之誥教子弟而蘄其悔悟仁之至義之盡也劉氏瑾曰此詩歸罪於武庚而於三叔則有憫恤之意蓋為親者諱也如書之大誥亦然此皆兄弟私情見於立言之際然而公義則不可掩故史臣於書既曰管叔及其羣弟流言於國又曰周公位冡宰羣叔流言乃皆以公義直書之者也朱氏善曰鴟鴞之於衆鳥有攫其子而食之者矣而鳥不廢其生育之勤也有毁其巢而破之者矣而鳥不廢其補葺之勞也蓋子之殘而室之毁者禍患之不測也養育之勤而補葺之勞者已分之當為也豈可以禍患之或至而遂廢其室家嗣續之常理也哉若武庚之敗管蔡則比之於鳥雖取其子猶未能毁其室也而纒綿補葺之勤周公果可以辭其責耶於是拮据於是蓄租於是手口交病卒之羽殺尾敝以成其室而未安也則其作詩以遺王亦不得而不汲汲矣鴟鴞四章章五句集傳事見書金縢篇金縢武王既喪管叔及其羣弟乃流言於國曰公将不利於孺子周公乃告二公曰我之弗辟我無以告我先王周公居東二年則罪人斯得於後公乃為詩以貽王名之曰鴟鴞王亦未敢誚公孔氏安國曰周公攝政其弟管叔及蔡叔霍叔乃放言於國以誣周公以惑成王三叔以周公大聖有次立之勢遂生流言孺稚也稚子成王辟法也告召公太公言我不以法法三叔則我無以成周道告我先王周公既告二公遂東征之二年之中罪人此得成王信流言而疑周公故周公既誅三監而作詩解所以宜誅之意以遺王王猶未悟故欲讓公而未敢朱氏公遷曰事本金縢説從孔氏故以居東為東征以鴟鴞為作於致辟管蔡之後也至蔡氏書傳乃朱子晚年之説又從鄭氏改讀弗辟之辟為避而與此説不同但詩言既取我子則武庚已敗管蔡管叔既已受誅矣今讀鴟鴞不必求合於蔡氏書傳也集説歐陽氏修曰武王崩成王㓜周公攝政管蔡疑其不利於㓜君遂有流言周公乃東征而誅之懼成王之怪已誅其二叔乃序其意作鴟鴞詩以貽王此金縢之説也其義簡直而易明鄭乃謂武王崩成王即位居䘮不言周公以冡宰聽政而二叔流言且冡宰聽政乃是常禮二叔何疑而流言也金縢言周公居東二年罪人斯得謂東征二年而得三監淮夷叛者誅之爾鄭乃謂二叔既流言周公避而居東者二年又謂罪人斯得者成王多得周公官屬而誅之且周公本以成王㓜未能行事遂攝政若避而居東則周之國政成王當自行之若已能臨政二年何又待周公歸攝乎刑賞國之大事也周公國之尊親大臣也使周公有閒隙而出避成王能以周法刑其尊親大臣之屬周公復歸其勢必不得攝且周公所以攝者以成王㓜而不能臨政爾若已能臨二年刑其尊親大臣之屬則周公将以何辭奪其政而攝乎矧周公誅管蔡前世説者多同而成王誅周公官屬六經諸史皆無之可知其臆説也曹氏粹中曰周公之志在於卒寜王之圖事成寧考之圖功而已成王惑於流言而疑周公将敗厥功亂孰甚矣故作鴟鴞以救之陳鵬飛論管蔡流言之意是矣以為周公避居於東都則不然蓋羣叔與周公皆文王子武王弟也武王崩時成王方十三管叔於兄弟之次最長而周公身自居中専政乃使管蔡外監商民内懐不平反與武庚謀圖周公遂挾之以叛故祝鮀曰管蔡啓商惎閒王室金縢曰云云是周公至東都已誅管蔡而成王疑尚未解故周公作此詩冀以覺悟王意則鴟鴞詩固作在誅管蔡後也鄭氏以辟音避謂周公避居東都陳鵬飛取之因謂成王方疑周公周公不宜逞怒於成王遽誅流言之黨故謂東征在成王既迎周公之後其言與金縢之序不合且大誥曰三監及淮夷叛周公相成王将黜殷是周公即以王命誅之初無避疑之事也又蔡仲之命曰惟周公位冡宰羣叔流言乃致辟管叔於商金縢之弗辟蔡仲之致辟其為誅殺一也夫武王與周公共致天下方集大統以全盛之神器付之孺子以有周公故也而羣叔挾仇敵外叛将復反鄙我周邦周公任其顧託豈當畏避小嫌坐視宗社之顛覆哉其曰我之弗辟我無以告我先王蓋言先王以此顧託於我我不討定其亂則無以告我先王苟為避之而已何用告我先王而東山之役又何用戰士為哉且成王疑雖未解而太公召公在内與周公同心左右王室且破斧之所以美周公者専言其征四國之亂為大為嘉為休則周公之東為討罪人無疑也朱子曰管蔡流言使成王疑周公周公雖已滅之然成王之疑未釋則亂未弭也故周公作此鴟鴞之詩以遺王而告以王業艱難不忍毁壊之意所以為救亂也蒋氏悌生曰殷亡而周興革命之後殷民洶洶未靖也武王崩成王㓜周公攝行天子之事三叔流言語侵成王周公此誠家國重事周公不即遏絶禍萌而避嫌疑退居散地三叔乗殷民之未靖挾武庚以叛設或張皇則天下安危之寄寧忍優㳺坐視而託之他人乎故辟字作致辟説於一時事理為長也附録孔氏穎達曰鄭以為武王崩周公為冡宰三年服終将欲攝政管蔡流言即避居東都成王多殺公之屬黨公作䲭鴞之詩救其屬臣請勿奪其官位土地及遭風雷之異啓金縢之書迎公來反反乃居攝後方始東征管蔡朱子曰弗辟之説只從鄭氏為是向董叔重得書亦辨此一時信筆答之謂當從古注説後來思之不然三叔方流言周公處骨肉之閒豈應以片言半語遽然興師以征之聖人氣象大不如此又成王方疑周公周公固不應不請而自誅之若請之於王亦未必見從雖曰聖人之心公平正大區區嫌疑似不必避但舜避堯之子禹避舜之子自是合如此或謂周公居東不幸成王終不悟不知周公又如何處愚謂公亦惟盡其忠誠而已矣問鴟鴞詩其詞艱苦深奥不知當時成王如何便即理㑹得曰當時事變在眼前故讀其詩者便知其用意所在自今讀之既不及見當時事所以謂其詩難曉然成王雖得此詩亦只是未敢誚公其心未必能遂無疑及至雷風之變啓金縢之書後方始釋然開悟案史記魯世家云成王少在襁葆之中周公恐天下畔乃踐阼代成王攝行政當國管叔及其羣弟流言於國曰周公将不利於成王周公乃告太公望召公奭曰我之所以弗辟而攝行政者恐天下畔周無以告我先王所以為之若此於是卒相成王而使其子伯禽就封於魯管蔡武庚等果率淮夷而反周公乃奉成王命興師東伐作大誥遂誅管叔殺武庚放蔡叔乃為詩貽王命之曰鴟鴞自史傳而外考之秦以上諸書竝無周公避居於東而成王有誅周公官屬之事且其時未營洛邑鄭何以云東都也孔安國在西漢武帝時治尚書起家司馬遷嘗從安國問故班固云遷書載金縢諸篇多古文説鄭康成在東漢末其説未審所出故漢唐諸儒皆不從之朱子傳詩初從古注及覆蔡沈書説數條云弗辟之説只從鄭氏為是於是蔡沈遂謂居東二年東征往返又是三年此又從鄭氏避之一説而衍之亦非有所本也總之朱子晚年復蔡之説義極正大然辛未曽追改詩傳或尚未決今亦仍其舊注而不易云我徂東山慆慆吐刀反不歸無韻未詳我來自東零雨其濛我東曰歸我心西悲制彼裳衣勿士行户郎反枚叶謨悲反蜎蜎鳥𤣥反者蠋音蜀烝在桑野叶上與反敦都廻反彼獨宿亦在車下叶後五反集傳賦也東山所征之地也嚴氏粲曰三監在周之東周公自西徂東以征之軍屯必依山為固故以東山言之慆慆言久也陳氏鵬飛曰慆慢也有流而不止之意零落也濛雨貌呂氏祖謙曰説文曰濛微雨也裳衣平居之服也程子曰治歸装也范氏祖禹曰征役久則衣敝制彼裳衣歸士之情也勿士行枚未詳其義鄭氏曰士事也行陣也枚如箸許氏謙曰箸從竹遲據反今俗作筯銜之有繣許氏謙曰繣周禮釋文胡卦胡麥二反徽也結項中以止語也鄭氏康成曰軍法止語為相疑惑也徐氏鳳彩曰行以束伍枚以止囂所謂軍旅之事也蜎蜎動貌蠋桑蟲如蠶者也孔氏穎達曰釋蟲云蚅鳥蠋郭璞曰大蟲如指似蠶烝發語辭敦獨處不移之貌此則興也成王既得鴟鴞之詩又感雷風之變始悟而迎周公於是周公東征已三年矣既歸因作此詩以勞歸士朱氏公遷曰上篇言東征二年此言東征三年二説不同蓋謂東征之役凡二年其往來首尾則三年也蓋為之述其意而言曰我之東征既久而歸途又有遇雨之勞范氏祖禹曰人之情憚往而樂歸於其歸猶憫其遇雨則其往可知也因追言其在東而言歸之時心已西嚮而悲蘇氏轍曰東征之士皆西人也其心念西而悲其室家季氏本曰大抵軍士思家之情在久住之處猶或可忍歸心已動而未至則其情尤切故東歸矣而復言西悲也於是制其平居之服而以為自今可以勿為行陳銜枚之事矣吕氏祖謙曰歸士之情自幸全身而歸願勿從事於行陳也所謂敘其情而閔其勞及其在塗則又覩物起興而自歎曰彼蜎蜎者蠋則在彼桑野矣此敦然而獨宿者則亦在此車下矣孔氏穎逹曰蠋在桑野是其常處實非勞苦似有勞苦軍士獨宿車下則實有勞苦以不實喻實者取其在桑野在車下其事相類故也王氏安石曰古用車戰戰則将卒有所蔽倚止則為營衛與塹柵無以異兵械衣服之屬皆可以載其中集説董氏逌曰我徂東山記其地也慆慆不歸記其久也我來自東記其還也零雨其濛記其時也嚴氏粲曰此設為軍士自道之辭行役冣以雨為苦言雨之濛濛形容得覉旅愁慘之意我自東言歸行而未至我心念家之在西而悲也在塗經行桑野因見彼蜎蜎然微動之桑蟲久在桑野之中如我敦然不移而獨宿亦在車下言獨宿思室家也見上之體其情也姚氏舜牧曰既東歸矣曷為其西悲也曰此人情也置室家逺行非人情之所欲一旦釋甲胄而完歸其喜悦當何如哉喜之之極不覺反生其悽愴也初往東時常虞罹於鋒鏑而今敦然獨宿於車下視死於瘡痍亦天壤矣此士之所以懽幸也我徂東山慆慆不歸我來自東零雨其濛果臝力果反之實亦施羊䜴反于宇伊威在室蠨音蕭蛸所交反在戶後五反町他頂反畽他短反鹿場熠以執反燿以照反宵行叶戸郎反亦可畏叶於非反也伊可懐叶胡威反也集傳賦也果臝栝樓也孔氏穎達曰本草云栝樓葉如瓜葉形兩兩相值蔓延責黑色六月華七月實如瓜瓣是也施延也蔓生延施于宇下也曹氏粹中曰果臝當蔓生野中今乃延入于宇之内矣伊威鼠婦也室不埽則有之陸氏佃曰爾雅曰伊威委黍一名䑕婦亦曰鼠負因溼化生今俗謂之溼生蠨蛸小蜘蛛也户無人出入則結網當之陸氏佃曰釋蟲云蠨蛸長踦郭璞曰今小蜘蛛長股者俗呼喜子亦如蜘蛛布網垂絲著人衣當有親客至荆州河内之人謂之喜母町畽舍傍隙地也程子曰盧傍畦壠董氏逌曰區種法曰伊尹作為區田一畝之中地長十八丈分十八丈作十五町町閒分十四道通人行畽為田里所聚無人焉故鹿以為場也熠燿眀不定貌宵行蟲名如蠶夜行喉下有光如螢濮氏一之曰舊説以熠燿即螢以宵行為夜飛與下章熠燿其羽相戾當知宵行乃蟲名章首四句言其往来之勞在外之久故每章重言見其感念之深遂言已東征而室廬荒廢至於如此亦可畏矣然豈可畏而不歸哉亦可懐思而已此則述其歸未至而思家之情也集説鄭氏康成曰室中久無人故有此五物是不足可畏乃可為憂思程子曰丁夫于役田事廢室廬遂荒果臝以下是也在彼思念其如此地嚴氏粲曰室盧将近則家事纎悉一一上心此人之情也我徂東山慆慆不歸我來自東零雨其濛鸛古玩反鳴于垤田節反叶地一反婦嘆于室洒埽穹窒我征聿至叶入聲有敦都迴反瓜苦烝在栗薪自我不見于今三年叶尼因反集傳賦也鸛水鳥似鶴者也陸氏璣曰鸛鸛雀也似鴻而大長頸赤喙白身黒尾翅垤蟻塜也孔氏穎逹曰輦土為塜以避溼陸氏佃曰蟻将雨則出壅土成峰方言曰其場謂之坻亦或謂之垤易占所謂蟻封其垤大雨将至是也一名蟻封今朔地蟻封其髙大有如塜者所謂蟻塜蓋出於此穹窒見七月将隂雨則穴處者先知故蟻出垤而鸛就食之遂鳴于其上也孔氏穎逹曰将欲隂雨水泉上潤故蟻避溼而上塜鸛是好水之鳥知天将雨故長鳴而喜也黄氏一正曰鸛以喙相擊而鳴俯鳴則隂仰鳴則晴善知雨候者也行者之妻亦思其夫之勞苦而歎息于家鄭氏康成曰行者於隂雨尤苦婦念之則歎于室也於是洒埽穹窒以待其歸而其夫之行忽已至矣徐氏鳳彩曰聿至忽然而至居者方思行者之勞行者適慰居者之願也因見苦瓜繫於栗薪之上孔氏穎逹曰敦是瓜之繫蔓之貌而曰自我之不見此亦已三年矣栗周土所宜木與苦瓜皆微物也見之而喜則其行久而感深可知矣集説程子曰有陰雨之候則婦思念其勞而悲歎又計其行之久念其将至我征聿至謂我之行者其遂至也念其将至而洒埽復恨其留繫之久見其思望之情切也瓜之苦者人所不取常在其所以比君子久留滯不還也輔氏廣曰周公作此詩所以述歸士之情而此章又述其歸士室家之情非通天下為一己者孰能之張氏彩曰鸛鳴感雨也婦歎亦感雨也穹窒洒埽以待其夫前此憂思不遑也苦瓜在栗鄉土恒有之久征故不見也我徂東山慆慆不歸我來自東零雨其濛倉庚于飛熠燿其羽之子于歸皇駁邦角反其馬叶滿補反親結其縭叶離羅二音九十其儀叶宜俄二音其新孔嘉叶居宜居何二反其舊如之何叶奚何二音集傳賦而興也倉庚飛昏姻時也鄭氏康成曰倉庚仲春而鳴嫁取之候也熠燿鮮明也劉氏瑾曰上章熠燿言宵行蟲之光故以為明不定貌此章言倉庚之羽故以為鮮眀集傳隨文解義類如此黄白曰皇孔氏穎逹曰謂馬色有黄處有白處駵音留白曰駁孔氏穎逹曰謂馬色有駵處有白處駵赤色也縭婦人之褘音暉也母戒女而為之施衿其鴆反結帨也孔氏穎達曰釋器云婦人之褘謂之縭縭綏也孫炎曰褘帨巾也案昏禮言結縭則縭當是帨朱子曰士昏禮曰父送女命之曰戒之敬之夙夜無違命母施衿結帨曰勉之敬之夙夜無愆而事此親結其縭之事然也九其儀十其儀言其儀之多也黄氏佐曰古者昏禮之費省矣幣止於緇帛五兩牲止於魚祭而饋然承筐無實亦非也故曰九十其儀賦時物以起興而言東征之歸士未有室家者及時而昏姻既甚美矣其舊有室家者相見而喜當如何耶曹氏粹中曰新娶者猶甚善其配又況舊有偕老之志久别而復見者乎集説輔氏廣曰倉庚于飛熠燿其羽雖以見昏姻之時又以言時物之美好也之子于歸皇駁其馬亦言人情之所同喜也親結其縭九十其儀又見其禮儀之備舉也始歸而以得免死傷為幸歸近而不勝感念之切室家之望男女之及時此皆人之至情而周公體悉之而無遺此所謂唯君子為能通天下之志也總論朱氏公遷曰首章言敦彼獨宿夫之念其婦也三章言婦歎于室婦之念其夫也行者遇雨沾體塗足室家思念於此為甚是以占其候而歎焉末章則新者及時舊者相見夫婦之樂可知矣周公之勞歸士亦本之人情而已朱氏善曰聖人之所以能感人者以其以己之心度人之心而天下之人亦樂於效力而不患上之不我知也東山之詩述其歸而未至也則凡道途之逺歳月之久風雨之陵犯飢渴之困頓裳衣之以久而垢敝室廬之以久而荒廢室家之以久而怨思皆其心之所苦而不敢言者我則有以慰勞之及其歸而既至也則覩天時之和暢聽禽鳥之和鳴而人情和悦適與景㑹舊有室家者其既歸而相見固可樂未有室家者其既歸而新昏尤可樂此皆其心之所願而不敢言者我則有以發揚之莫苦於歸而在途之時而上之人能與之同其憂莫喜於歸而相見之時而上之人能與之同其樂樂以天下憂以天下然而不王者未之有也其是之謂歟東山四章章十二句集傳序曰一章言其完也二章言其思也三章言其室家之望女也四章樂男女之得及時也君子之於人序其情而閔其勞所以説也説以使民民忘其死其唯東山乎愚謂完謂全師而歸無死傷之苦思謂未至而思有愴恨之懐至於室家望女男女及時亦皆其心之所願而不敢言者上之人乃先其未發而歌詠以勞苦之則其歡欣感激之情為如何哉蓋古之勞詩皆如此其上下之際情志交孚雖家人父子之相語無以過之此其所以維持鞏固數十百年而無一旦土崩之患也集説朱子曰周公是王室至親諸侯連衡背叛當國大臣豈有坐視不救之理帥師征之乃是正義周公之志非為身謀也為先王謀也非為先王謀也以身任天下之重也輔氏廣曰七月述后稷公劉衣食斯民之事以告成王見君人之道也鴟鴞述己之勤勞以悟成王見為人臣之義也東山述歸士之意以慰勞之見用民之宜也三詩誠足以為萬世法非周公其孰能為之嚴氏粲曰東山周公所作以勞歸士猶杕杜勞還役也杕杜述家人望歸之情東山述歸士思家之情其意則一然杕杜之辭簡東山之辭詳蓋周公與歸士居東三年患難同之情之繾綣言之諄復宜與杕杜不同也附録鄭氏康成曰成王既得金縢之書親迎周公周公歸攝政三監及淮夷叛周公乃東伐之三年而後歸耳許氏謙曰周公居東有二自流言之行公則避而居東二年有風雷之變而迎公以歸然後作大誥東征三年而歸此詩則作於東征而歸之時也既破我斧又缺我斨七羊反周公東征四國是皇哀我人斯亦孔之將集傳賦也隋銎曰斧方銎曰斨征伐之用也王氏質曰古専征杕鉞黄金飾斧四國四方之國也范氏處義曰説者以四國為管蔡商奄而淮夷亦在叛國之數乃不及之則知其非矣皇匡也董氏逌曰齊詩作四國是匡賈公彦引以為據将大也從軍之士以前篇周公勞己之勤故言此以荅其意曰東征之役既破我斧而缺我斨其勞甚矣然周公之為此舉蓋将使四方莫敢不一於正而後已其哀我人也豈不大哉然則雖有破斧缺斨之勞而義有所不得辭矣夫管蔡流言以謗周公而公以六軍之衆往而征之使其心一有出於自私而不在於天下則撫之雖勤勞之雖至而從役之士豈能不怨也哉今觀此詩固足以見周公之心大公至正天下信其無有一毫自愛之私抑又以見當是之時雖被堅執鋭之人亦皆能以周公之心為心而不自為一身一家之計蓋亦莫非聖人之徒也學者於此熟玩而有得焉則其心正大而天地之情真可見矣集説歐陽氏修曰四國為亂周公征討凡三年至於斧破斨缺然後克之其難如此然周公必往征之者以哀四國之人陷於逆亂耳程子曰商奄始率管蔡為流言遂以叛将益動天下以傷壞王業惡日以滋當速誅也周公所以東征四國是皇也周公之心勤勞王家如是其徳亦甚大矣蘇氏轍曰周公之東征亦四方是為非以救其身也使周公嫌於救其身潔身而退以避二叔之難則其亂将及於四方如是而周公亦清矣然而未免於小也維不嫌於自救哀人之不治而誅管蔡而後可以為大朱氏善曰戮一人而天下服則向之不正者復反於正矣蓋其匡四國即所以哀我人匡四國者以其功言也哀我人者以其心言也惟其心即天地生物之心故其功即天地成物之功也是詩雖作於軍士然亦可謂知聖人者矣既破我斧又缺我錡巨宜反叶巨何反周公東征四國是吪五戈反哀我人斯亦孔之嘉叶居何反集傳賦也錡鑿屬吪化李氏樗曰化其惡而使之為善也嘉善也嚴氏粲曰言徳之甚善也集説黄氏佐曰大抵二叔一挾武庚以叛人心未知適從而為流言之轉移者有矣周公東征正欲化此人心使之曉然知邪正之歸而渾化於正大光眀之中豈不善哉既破我斧又缺我銶音求周公東征四國是遒在羞反哀我人斯亦孔之休集傳賦也銶木屬遒歛而固之也孔氏穎逹曰遒訓為聚亦堅固之義釋詀云遒歛聚也言四國之民於是歛聚不流散也休美也集説范氏祖禹曰亦孔之休言四國平而天下和也黄氏佐曰流言一興四國将信将疑之中即是民心不固處周公東征正所以歛固四國之人心使之確然翕聚臣附於周而不至於渙散焉耳總論范氏處義曰周公東征不免用刑言其破缺甚之之辭亦漂杵之類也明用刑非為一己之私哀斯人将至於亂故以身任其責然則周公之心可為甚大甚善甚美矣朱子曰破斧詩看聖人這般心下詩人直是形容得出古人做事苟利國家雖殺身為之而不辭如今人訃較利害四國不安也得不寧也得只是護了我斨我斧莫待缺壊了此詩説出極分明毛注却云四國是管蔡商奄詩裏多少處説四國如正是四國之類猶言四海他却不照這例自恁地説須看那周公東征四國是皇見得周公用心始得破斧三章章六句集傳范氏曰象日以殺舜為事舜為天子也則封之管蔡啟商以叛周公之為相也則誅之迹雖不同其道則一也蓋象之禍及於舜而已故舜封之管蔡流言将危周公以閒王室得罪於天下故周公誅之非周公誅之天下之所當誅也周公豈得而私之哉朱氏公遷曰舜為象計故得全其友愛之天周公為文武天下計不得不盡夫大公至正之道集傳引此以眀聖人處物之義而見周公無愧於舜也集説輔氏廣曰東山之詩周公能得歸士之心也破斧之詩歸士能得周公之心也所謂上下交而其志同者也伐柯如何匪斧不克取七喻反妻如何匪媒不得集傳比也柯斧柄也孔氏穎逹曰考工記車人云柯長三尺博三寸厚一寸有半五分其長以其一為之首注云首六寸謂關頭斧也柯其柄也克能也媒通二姓之言者也鄭氏康成曰将欲與彼合昏姻必先使媒氏下通其言昏必由媒交接設紹介皆所以養廉恥周公居東之時東人言此以比平日欲見周公之難集説顧氏起元曰伐柯之道惟斧乃能之以類求其類也此二句比儀型之無自媒所以用禮也此二句比交際之無由皆是追敘昔日得見之難錢氏天錫曰不重斧與媒只重不克不得上則無以觀禮無以成也附録程子曰伐柯匪斧則不能取妻匪媒則不成言各有其道今欲周公之歸亦必有其道也蘇氏轍曰伐柯而不用斧取妻而不用媒豈可得哉今成王欲治國棄周公而不召亦不可得也伐柯伐柯其則不逺我覯古豆反之子籩豆有踐賤淺反集傳比也則法也我東人自我也之子指其妻而言也籩竹豆也邢氏昺曰籩以竹為之形制如豆亦受四升盛棗栗桃梅蔆芡脯脩膴鮑糗餌之屬是也豆木豆也邢氏昺曰豆以木為之其實四升用薦葅醢周禮醢人掌四豆之實朝事之豆其實韭葅醓醢之類是也踐行列之貌言伐柯而有斧則不過即此舊斧之柯而得其新柯之法鄭氏康成曰伐柯者必用柯其大小長短近取法於柯所謂不逺求也娶妻而有媒則亦不過即此見之而成其同牢之禮矣劉氏瑾曰昏禮用特豚夫婦各一胖合升於鼎俎所謂同牢而食也東人言此以比今日得見周公之易深喜之之詞也集説姚氏舜牧曰嘗言伐柯矣今視此柯也則其端具於其身信乎柯必伐而後可識其則也嘗言娶妻矣今覯之子也籩豆燦然其有踐信乎妻必娶而後可識其禮也蓋謂平日欲見公今一見之得挹禮度之美不虚此願見之心故言之亹亹有深幸耳附録程子曰二章言其道伐柯其取則不逺今欲反周公取則於周公可也周公者動必以禮者也亦當以禮致之則周公可得而覯見也曹氏粹中曰誠有斧矣則其所伐短長小大之則當視其所執誠有禮矣則其所陳籩豆多寡之數當稱其所宜踐重疉相踐履之意以見其豐厚也蓋周公之功當享備禮此乃所謂其則不逺者歟總論輔氏廣曰此詩但言其心事故不及於周公然既言其平日欲見公之難又言其今日得見公之易則其心慰滿浹洽而無一毫不足之意可見使其所聞或過於所見所見或歉於所聞則烏得喜之如是哉許氏謙曰東人之於周公被其風而化其徳思慕之極瞻之固若在前也然而貴賤之殊道里之逺亦未易見也故其企望如此及其因事而東則幸而得見故喜之而如二章之所言也伐柯二章章四句附録孔氏穎達曰作伐柯詩者美周公也毛以為周公攝政東征四國既定仍在東土已作鴟鴞之後未得雷風之前羣臣皆知周公有成就周道之志而成王猶未知之故周大夫作詩美周公以刺朝廷之不知鄭以為周公避居東都三年之秋得雷風之後啟金縢之前王意稍悟欲迎周公而朝廷大夫猶有不知周公之志故周大夫作此詩以美周公刺彼朝廷大夫之不知也程子曰伐柯乃既得罪人之後周公遲留未歸士大夫刺朝廷不知所以還周公之道案序伐柯美周公也周大夫刺朝廷之不知也朱子初説執柯以伐柯即此手中之柯而得其法以比王欲迎周公亦不過反之於吾心則知所以迎之之道則吾得見公而陳其籩豆之列将有日矣蓋用序義也後以此詩難曉而我覯之子一句與九罭之詩同二篇又相屬故推求其意以為東人欲見周公始難而終易而為是深喜之詞然總作比看則與序所言刺朝廷之不知皆非詩詞之所有者一也故竝録諸儒之從序説者於右以俟考焉九罭于逼反之魚鱒才損反魴音房我覯之子衮古本反衣繡裳集傳興也九罭九囊之網也孔氏穎達曰釋器云緵罟謂之九罭九罭魚網也孫炎曰謂魚之所入有九囊也鱒似鯶而鱗細眼赤許氏謙曰爾雅翼鱒魚目中赤色一道横貫瞳多獨行見網輒避魴已見上劉氏瑾曰見汝墳皆魚之美者也毛氏萇曰鱒魴大魚也孔氏穎逹曰驗今鱒魴非是大魚言大魚者以其雖非九罭密網此魚亦将不漏故言大耳非大於餘魚也傳以為大者欲取大小為喻我東人自我也之子指周公也衮衣裳九章一曰龍二曰山三曰華蟲雉也四曰火五曰宗彞虎蜼壘柚瞶三音也爾雅蜼卬鼻而長尾皆繢音潰於衣六曰藻七曰粉米八曰黼九曰黻皆繡於裳蔡氏沈曰龍取其變也山取其鎮也華蟲取其文也火取其眀也宗彞取其孝也藻水草取其潔也粉米白米取其養也黼若斧形取其斷也黻兩已相背取其辨也梁氏益曰尚書益稷篇注曰舜十二章周九章周以日月星辰畫於旂故衣裳九章天子之龍一升一降上公但有降龍以龍首卷音衮然故謂之衮也朱氏公遷曰周禮典命王之三公八命冕服七章與侯伯同及出封則加一等而服衮孟子言周公封於魯則公以三公而受出封之命矣此所以有九章之衮衣也此亦周公居東之時東人喜得見之而言九罭之網則有鱒魴之魚矣我覯之子則見其衮衣繡裳之服矣集説朱氏公遷曰九罭之魚有鱒又有魴之子之服有衣又有裳皆二者兼備之意故以為興姚氏舜牧曰惟九罭而後得鱒魴是甚不易見也今我覯之子而得覩衮衣繡裳之儀範焉此生亦何幸哉朱氏道行曰以非常之魚不易網興非常之人不易覯附録歐陽氏修曰周大夫以周公出居東都成王君臣不知其心而不召使久處於外譬猶鱒魴大魚反在九罭小罟因斥言周公云我覯之子衮衣繡裳者上公之服也上公宜在朝廷者也程子曰施九罭之綱則得鱒魴之魚用隆厚之禮則得聖賢我欲覯之子當用上公禮服往逆之鴻飛遵渚公歸無所於女音汝信處集傳興也遵循也渚小洲也女東人自相女也再宿曰信東人聞成王将迎周公又自相謂而言鴻飛則遵渚矣公歸豈無所乎朱子曰二章飛歸叶是句腰亦用韻詩中亦有此體今特於女信處而已集説黄氏一正曰鴻順時而動周公隨寓而安故又以為興也張氏彩曰鴻飛雖有時遵渚而非其久居之所言其别自有所也豈以公歸而無所乎今不過於女信處耳言暫寄跡也附録程子曰此章言公之不得其所也鴻飛戾天者也今乃遵渚言不得其所蓋朝廷未以師保重禮往逆也陳氏鵬飛曰今公未歸其所於女朝廷之臣信能自安處乎鴻飛遵陸公歸不復於女信宿集傳興也髙平曰陸不復言将留相王室而不復來東也集説季氏本曰鴻北向則歸而不復矣言周公既歸則留王室而不復來東也姚氏舜牧曰鴻之遵陸亦偶飛至此興公信宿之意附録毛氏萇曰陸非鴻所宜止宿猶處也蘇氏轍曰鴻飛而遵陸不得已也周公之在東亦猶是矣非其所願居也苟其得已則義當復西耳是以有衮衣兮無以我公歸兮無使我心悲兮集傳賦也承上二章言周公信處信宿於此是以東方有此服衮衣之人又願其且留於此無遽迎公以歸歸則将不復來而使我心悲也集説姚氏舜牧曰是以有衮衣兮其欣仰亦何至無以我公歸兮其懐戀亦何深信非盛徳不足以至此唐氏汝諤曰朝廷不可一日無公而公亦無日不以朝廷為念則公之歸自有不遑恤乎人情者但天下可喜而東人則可悲故願於信處信宿之外得少留焉即以為幸也附録歐陽氏修曰卒章因道東都之人留公之意云衮衣雖宜在朝廷然無以公歸使我人思公而悲也詩人述東都之人猶能愛公所以刺朝廷之不知也程子曰此章祈反周公誠切之意是以猶所以也朝廷所以有衮衣之章用尊禮聖賢無以以也無以是服逆我公來歸無使士民之心悲思望公也總論朱氏善曰惟其信處信宿於此也是以東方有此服衮衣之人此固東土之幸也然相位不可以久虚君徳不可以無輔人心天意不可以久咈則必有迎公以歸者而使我心悲矣盖留公者東人之私情而迎公者天下之公論一人之私情不足以勝天下之公論此東人所以拳拳於公雖欲挽而留之而卒不可得也沈氏守正曰此詩作於将歸之時首章敘得見之喜下三章切願留之情附録吕氏祖謙曰成王既發金縢悔悟而迎周公其言曰惟朕小子其逆我國家禮亦宜之此正國人之所望於朝廷者也首章曰我覯之子衮衣繡裳卒章曰是以有衮衣兮無以我公歸兮所謂禮亦宜之也乃此篇之大指也説詩者徒見信宿兩字偶相屬遂以為過宿曰信之信故其釋二章三章或以為西人語東人或以為東人自相語而不見國人深望乎上誠懇切至之意求一字之通而失一篇之㫖學者苟能玩味程氏之説則詩人之心可見矣九罭四章一章四句三章章三句集説朱子曰此詩分眀是東人願其來故致願留之意公歸豈無所於汝但寓信處耳公歸将不復來於汝但當寓信宿耳是以有衮衣兮是以兩字而今都不説蓋本謂縁公暫至於此是以此閒有被衮衣之人其為東人願留之詩豈不甚明白止縁序有刺朝廷不知之句故後之説詩者悉委曲附㑹之費多少辭語到底鶻突某嘗謂去後千百年湏有人知此意自看來直是盡得聖人之心輔氏廣曰伐柯喜其得見之辭九罭願其久留之辭東人之愛公可見其有加而無已也使天下之人愛戴之如此則何為而不成宜乎制禮作樂而卒成周家太平之治也附録程子曰周公居東未反士大夫始刺朝廷不知反周公之道伐柯是也既又思之切刺之深責在朝廷之人不速還公也范氏處義曰是詩與伐柯相類然伐柯則言朝廷不能以禮迎周公是詩則言周公之尊不當久處外地詩辭可見也郝氏敬曰一章謀所以迎公之禮二章三章揣公必歸而託為辭東人之語四章迎公西歸而託為東人留公之語是時公居東已二年矣信處信宿諷王之速迎公也王雖不諒公公終未忍忘王往迎則必反耳東人悲公歸而朝廷不恤公去序所以刺其不知也案伐柯九罭二篇序説以為皆周大夫美周公而責在朝之人不連迎公之詞朱子改為東人愛慕公之詞以末章語氣而定之也然當時人情周大夫則願速迎公歸以相王室東人則望公少留以盡私情要為美周公其義一也狼䟦蒲末反其胡載疐丁四反其尾公孫音遜碩膚赤舄音昔几几集傳興也跋躐也李氏廵曰跋前行曰躐胡頷下懸肉也載則疐跲也李氏廵曰跲卻頓曰疐吕氏祖謙曰説文曰跲躓也老狼有胡進而躐其胡則退而跲其尾公周公也孔氏穎逹曰箋以上言公歸皆是周公故以此公為周公孫讓碩大膚美也赤舄冕服之舄也鄭氏康成曰舄有三等赤舄為上冕服之舄則諸侯與王同几几安重貌王氏安石曰几人所憑以為安故几几安也周公雖遭疑謗然所以處之不失其常故詩人美之言狼跋其胡則疐其尾矣公遭流言之變而其安肆自得乃如此朱子曰此興是反説亦有些意義略似程子説但程子説得深如狼性貪之類蓋其道隆徳盛而安土樂天有不足言者所以遭大變而不失其常也夫公之被毁以管蔡之流言也而詩人以為此非四國之所為乃公自讓其大美而不居耳劉氏瑾曰所謂四國蓋指管蔡商奄與破斧詩所言四國又不同也蓋不使讒邪之口得以加乎公之忠聖此可見其愛公之深敬公之至而其立言亦有法矣輔氏廣曰公孫碩膚之説自程子開端至先生方盡其義集説程子曰周公居危疑之地終不能損其聖徳者以其忠誠在於主家無貪欲之私心也狼獸之貪者猛於求欲故陷於機穽羅縶前跋後疐進退困險詩人取之以言夫狼之所以致禍難危困如是者以其有貪欲故也若周公者至公不私進退以道無利欲之蔽以謙遜自處不有其尊不矜其徳故雖在危疑之地安歩舒泰赤舄几几然也只是形容周公一箇氣象乃孟子所謂睟面盎背四體不言而喻之意蘇氏轍曰周公之輔成王亦多故矣二叔流言以病其外成王不信以憂其内人之視周公如狼然前憂其躐胡而後憂其跲尾也然周公居之從容自得而二患皆釋也黄氏佐曰周公讓大美而弗之居寧退然以自晦焉是故事君則忠矣而莫孚於二叔豈二叔所能為哉乃公自讓其美焉爾治國則誠矣而未信於四國豈四國所能致哉乃公自遜其美焉爾斯時也心無少怍於中而氣體從容自不少損於外常度何失乎觀書一則曰在予小子非克有正二則曰在予小子若游大川可以見公孫碩膚之大概矣狼疐其尾載跋其胡公孫碩膚徳音不瑕叶洪孤反集傳興也徳音猶令聞也瑕疵病也左傳晏子曰心平徳和故詩曰徳音不瑕杜預注心平則徳音無瑕闕程子曰周公之處已也夔夔然存恭畏之心其存誠也蕩蕩然無顧慮之意所以不失其聖而徳音不瑕也集説歐陽氏修曰卒章則直言其徳之不可瑕疵也朱氏道行曰徳音就公之為人頌者言不瑕即武王顯名不失之謂總論朱氏善曰物之累於形者其進退跋疐無所往而不病聖人之周於徳者其進退從容無所往而不宜盖臨大難而不懼處大變而不憂斷大事而不疑非道隆徳盛者固不足以語此非常人所能及也錢氏天錫曰詩美公之處變而不失其常度令名由其心事光眀正大故著之儀而儀如故問之人而人無閒耳狼跋二章章四句集傳范氏曰神龍或潛或飛能大能小其變化不測然得而畜之若犬羊然有欲故也唯其可以畜之是以亦得醢而食之凡有欲之類莫不可制焉唯聖人無欲故天地萬物不能易也富貴貧賤死生如寒暑晝夜相代乎前吾豈有二其心乎哉亦順受之而已矣舜受堯之天下不以為泰孔子阨於陳蔡而不以為戚周公逺則四國流言近則王不知而赤舄几几徳音不瑕其致一也楊氏時曰狼跋之詩云公孫碩膚赤舄几几周公之遇謗何其安閑而不廹也學詩者不在語言文字當想其氣味則詩之意得矣集説孔氏穎達曰作狼跋詩者美周公也進退有難而聖徳著明終無愆過故周大夫美其不失其聖也經二章皆云進退有難之事徳音不瑕是不失聖也張子曰狼跋美周公不失其聖卒能感人心於和平也豳國七篇二十七章二百三句集傳程元問於文中子曰敢問豳風何風也曰變風也元曰周公之際亦有變風乎曰君臣相誚其能正乎成王終疑周公則風遂變矣非周公至誠其孰卒正之哉元曰居變風之末何也曰夷王以下變風不復正矣夫子蓋傷之也故終之以豳風言變之可正也惟周公能之故係之以正變而克正危而克扶始終不失其本其惟周公乎係之豳逺矣哉籥章龡豳詩以逆暑迎寒已見於七月之篇矣又曰祈年於田祖則龡豳雅以樂田畯鄭氏康成曰祈年祈豐年也田祖始耕田者謂神農也田畯古之先教田者祭蜡音乍則龡豳頌以息老物禮記郊特牲伊耆氏始為蜡蜡也者索也歳十二月合聚萬物而索饗之也鄭氏康成曰十二月建亥之月也求萬物而祭之者萬物助天成歳事至此為其老而勞乃祀而老息之則考之於詩未見其篇章之所在故鄭氏三分七月之詩以當之其道情思者為風正禮節者為雅樂成功者為頌劉氏瑾曰鄭氏分一章二章為風三章四章五章六章之半為雅又以六章之半七章八章為頌又於籥章注云豳雅者以其言男女之正豳頌者以其言歳終人功之成然一篇之詩首尾相應乃剟音輟取其一節而偏用之恐無此理故王氏不取而但謂本有是詩而亡之其説近是或者又疑但以七月全篇隨事而變其音節或以為風或以為雅或以為頌則於理為通而事亦可行如又不然則雅頌之中凡為農事而作者皆可冠以豳號其説具於大田良耜諸篇讀者擇焉可也集説輔氏廣曰豳雅頌之説鄭氏固繆今當從或者之説而先生之説與王氏之説相近若大田良耜諸篇或以音節不同而居雅頌之中則固可從矣饒氏魯曰雅有雅之音頌有頌之音風有風之音故豳風亦曰豳雅亦曰豳頌蓋一詩而備三體也欽定詩經傳說彚纂卷九
