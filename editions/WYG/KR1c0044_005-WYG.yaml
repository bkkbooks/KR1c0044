body:
  text: 欽定四庫全書欽定詩經傳説彚纂巻三邶一之三集傳邶鄘衛三國名在禹貢冀州西阻太行孔氏穎逹曰案禹貢太行屬冀州地理志云太行在河内河内即紂都而西不踰太行者蓋其都近西也北踰衡漳孔氏穎逹曰漳水自上黨而過鄴城之北南距紂都百餘里故知踰之東南跨河以及兗州桑土之野孔氏穎逹曰禹貢兗州云桑王既蠶注云其地尤宜蠶桑因以名之今濮水之上地有桑閒者僖三十一年衛遷于帝邱杜預云帝邱今東郡濮陽縣也濮陽在濮水之北是有桑土明矣及商之季而紂都焉武王克商分自紂城朝歌而北謂之邶南謂之鄘東謂之衛以封諸侯邶鄘不詳其始封衛則武王弟康叔之國也劉氏瑾曰武王作酒誥戒康叔而曰明大命于妹邦妹邦即紂都則康叔封衛明在武王時矣邶鄘之地豈始為武庚三叔之封至成王滅武庚誅三監乃復以封他國而其後又幷入於衛也歟衛本都河北朝歌之東淇水之北百泉之南其後不知何時幷得邶鄘之地至懿公爲狄所滅戴公東徙渡河野處漕邑文公又徙居于楚邱朝歌故城在今衞州衞縣西二十二里皇輿表朝歌今衛輝府淇縣隷河南所謂殷墟衞故都即今衛縣皇輿表衛今濬縣隸直𨽻大名府漕楚邱皆在滑州皇輿表漕今滑縣𨽻直𨽻大名府楚邱今兗州府城武縣𨽻山東大抵今懐衛澶音蟬相滑濮等州皇輿表懐州今懐慶府衛州今衛輝府相州今彰徳府竝隸河南澶州今開州滑州今滑縣竝隸直𨽻大名府濮州今東昌府濮州隸山東開封大名府界皇輿表開封府今仍舊𨽻河南大名府今仍舊𨽻京師皆衛境也但邶鄘地既入衛其詩皆爲衛事而猶繫其故國之名則不可曉范氏處義曰國史録詩因其詩所得之地而存其國之舊先邶而後鄘豈以其亡之先後歟朱子曰存其舊號者豈其聲之異歟輔氏廣曰邶鄘衛先儒辨説雖多先生初説亦疑其爲聲之異今以爲不可曉者蓋此等既不繫詩之大義又他無所考不若闕之爲得也王氏應麟曰薛氏曰邶鄘滅而音存故非衛所能亂嚴氏粲曰王道盛則諸侯不得擅相幷存邶鄘之名不與衛之滅國也邶列其首衛後於鄘世次也劉氏瑾曰緑衣燕燕等詩莊姜自作共姜作柏舟桑中言沫鄉皆正作於衛國而或繫邶或繫鄘泉水載馳竹竿皆作於外國而一繫邶一繫鄘一繫衛意大師各從得詩之地而繫之也其所以必繫邶鄘故名者無乃欲寓興滅繼絶之心如春秋昭公八年楚既滅陳而九年經書陳災糓梁以爲存陳亦此意也是以太師存邶鄘之名置於衛前亦如魏風先於唐之例夫子存其名而不削因其序而不革耳而舊説以此下十三國皆爲變風焉吕氏祖謙曰邶鄘衛三風聖人録變風而皆首之以正垂訓深且逺哉一以見變之皆本於正而令人勸一以見正易流於變而令人懲是故邶首柏舟鄘首柏舟衛首淇奥嚴氏粲曰關雎鵲巢爲三百篇綱領風之正也反乎此者變也邶鄘衛皆衛風也衛禍基於祍席覃及宗社居變風之首二南之變也集說鄭氏康成曰邶鄘衛者商紂畿内方千里之地周武王伐紂以其京師封紂子武庚爲殷後乃三分其地置三監使管叔蔡叔霍叔尹而教之自紂城而北謂之邶南謂之鄘東謂之衛成王既黜殷命殺武庚復伐三監更於此三國建諸侯以殷餘民封康叔於衛使爲之長後世子孫稍幷彼二國混而名之七世至頃侯當周夷王時衛國政衰變風始作故作者各有所傷從其國本而異之爲邶鄘衛之詩焉孔氏穎逹曰詩人之作自歌土風驗其水土之名知其國之所在衛曰送子涉淇至于頓丘頓丘今爲郡名在朝歌紂都之東也紂都河北而鄘曰在彼中河鄘境在南明矣都既近西明不分國故以爲邶在北三國之境地相連接故邶曰亦流于淇鄘曰送我乎淇之上矣衛曰瞻彼淇奥三國皆言淇也戴公東徙渡河野處漕邑則漕地在鄘也而邶曰土國城漕國人所築之城也思須與漕衛女所經之邑也河水瀰瀰宣公作臺之處也此詩人本述其事自歌其土也衛幷邶鄘分爲三國鄭幷十邑不分之者以鄭在西都十邑之中無鄭名又皆國小土風不異不似邶鄘之地大與衛同又先有衛名故分之也雖分從邶鄘其實衛也故序每篇言衛明是衛詩猶唐實是晉故序亦每篇言晉也張子曰周之興也商民後革及其衰也衛風先變衞幷邶鄘邶鄘之詩皆衞也晉幷魏而魏之詩非晉然其詩亦相附近何也其聲類也魏唐皆儉故也鄭幷檜而檜獨遠於鄭何也其聲不類也自檜以下所不足序也以爲是相去也無幾耳故季札觀樂於魯歌邶鄘衞則合之歌魏歌唐則别之歌鄭歌檜則逺之蓋因以爲識焉蘇氏轍曰春秋所見百七十餘國變風之作春秋數世矣而載於大師者獨十三國意者列國不皆有詩其有詩者雖檜曹之小邶鄘之亡而有不能已也薛氏瑄曰國風至於邶小雅至於鴻鴈大雅至於民勞皆泰極而否隂陽相根之理微矣崔氏銑曰鶉奔先定中著其所以亡木瓜爲殿著其所以存齊桓之功也汎芳劒反彼柏舟亦汎其流耿耿古幸反不寐如有隱憂微我無酒以敖五羔反以遊集傳比也汎流貌柏木名耿耿小明憂之貌也朱子曰耿耿猶儆儆不寐貌也輔氏廣曰蓋人有所憂則其心耿耿然惟於憂之一路分明耳其他固有所不及也古人下字不苟如此惟其心耿耿然故不能寐也隱痛也微猶非也婦人不得於其夫故以柏舟自比問柏舟看來與關雎亦無異彼何以爲興朱子曰他下面便説淑女見得是因彼與此此詩才説柏舟下面更無貼意見得其義是比言以柏爲舟堅緻音稚密也牢實而不以乘載無所依薄劉氏瑾曰薄字訓附以説卦雷風相薄證之只讀作泊若以離騷九章芳不得薄之薄證之則音爲博而亦訓爲附也但汎然於水中而已嚴氏粲曰二柏舟用意皆在下句邶柏舟在於亦汎其流鄘柏舟在於在彼中河也故其隱憂之深如此徐氏光啓曰不曰隱憂而曰如有隱憂極善形容憂恨之意非爲無酒可以敖遊而解之也輔氏廣曰酒可忘憂其説本此列女傳以此爲婦人之詩今考其辭氣卑順柔弱且居變風之首而與下篇相類豈亦莊姜之詩也歟鄭氏康成曰莊姜莊公夫人齊女姓姜氏胡氏一桂曰此詩辭氣誠爲卑弱而末云不能奮飛可見婦人詩何則人臣道不合則去是有可去之義若姜氏則無可去之義矣故曰不能奮飛況以下四篇皆婦人作二南與邶鄘柏舟皆首婦人亦是一證集説毛氏萇曰柏木所以宜爲舟也亦汎汎其流不以濟渡也許氏謙曰柏舟則宜以載物乃汎汎於水中而無所用以此喻已故耿耿而憂思至於不能寐如有所隱痛之憂非無酒以自樂然此憂非酒之所能遣也沈氏守正曰舟以載物而不得載婦以承夫而不得夫此比意也篇中惟此一句是顯説見棄而又是託言餘皆反覆述已之憂而不言所憂之何事即明言羣小之見慍而不言見慍之何由所以爲賢婦人也若一語稍不含渾即是懟夫一語稍不自問即是揚已附錄鄭氏康成曰舟載渡物者今不用而與衆物汎汎然俱流水中興者喻仁人之不見用而與羣小人竝列亦猶是也李氏樗曰君子之仕欲行其道徒食其祿而道不行豈仁人之本心哉仁人之所憂者憂國也不可以酒觧也亦非敖遊之所能釋也嚴氏粲曰柏美材也以柏爲舟義不在柏也舟必有人以維楫之而後能有所濟今浮舟於水而無人以維楫之其将何所止泊乎喻衛國無賢人以維持之則亦聼其自爲敗壊耳其將何所底止乎猶言譬彼舟流不知所屆也舊説以柏舟自喻其材美以汎汎喻已之不見用下即繼之以耿耿不寐如有隱憂則傷於迫切而非仁人之氣象矣故以舟喻國流於水中以喻國之靡所底止爲此而隱憂然後見仁人之心也我心匪鑒不可以茹如預反亦有兄弟不可以據薄言往愬逢彼之怒集傳賦也鑒鏡茹度待洛反羅氏中行曰量也謀也計也料也忖也惟分寸丈尺引曰五虞則也過也音徒故反故此類推據依愬告也言我心既匪鑒而不能度物陳氏推曰言不能度已見棄之故與下文自反相照應雖有兄弟而又不可依以爲重故往告之而反遭其怒也輔氏廣曰内既不得於其夫外又不得於其兄弟其情之無聊亦甚矣集説許氏謙曰承上言鑒明則可度物我心憂煩不能度物不知何以處此歸而告諸兄弟聊以寄此憤耳而又逢彼之怒是兄弟亦不可據憑而終莫知所以自處也徐氏光啓曰夫者婦之所天不得於夫則無往而非拂逆之鄉故言逢彼之怒只形容困阸無聊之状皆意在言外也附錄鄭氏康成曰鑒之察形但知方圓白黑不能度其眞僞我心非如是鑒我於衆人之善惡外内心度知之兄弟至親當相據依言亦有不相據依以爲是者希耳責之以兄弟之道謂同姓臣也何氏楷曰上章言上不得於君此章言下不得於僚友我心匪石不可轉也我心匪席不可卷眷勉反也威儀棣棣不可選也集傳賦也棣棣富而閑習之貌毛氏萇曰物有其容不可數也呂氏祖謙曰言威儀閑習自有常度輔氏廣曰富謂富盛也富盛則全備而無欠闕閑習則從容而不生疎選簡擇也言石可轉而我心不可轉席可卷而我心不可卷鄭氏康成曰言已心志堅平過於石席威儀無一不善又不可得而簡擇取舍皆自反而無闕之意集說輔氏廣曰心之不可轉不可卷言其有常也威儀之不可選言其皆善也惟其存諸中者有常而不可移故形於外者皆善而不可揀也許氏謙曰石不可轉是其貞潔自守之意堅席不可卷是其公平逮下之心溥也徐氏光啓曰既言心之有常又言儀之皆善乃求其見棄之故而不得故自猜自疑不能爲情之甚也附錄鄭氏康成曰稱已威儀如此者言已徳備而不遇所以慍也蘇氏轍曰小人之惡君子曰何爲斯踽踽涼涼然君子不以其故自改也此所謂不可轉而不可卷也嚴氏粲曰兄弟見怒欲已改行以趨時仁人於是自誓而言心不可轉不可卷此不以兄弟之沮而易其守也威儀不可有所選擇而自貶以苟合此處羣小之間而雍容不失其常度也憂心悄悄七小反慍于羣小覯古豆反閔既多受侮不少静言思之寤辟避亦反有摽符小反集傳賦也悄悄憂貌慍怒意羣小衆妾也言見怒於衆妾也覯見閔病也辟拊心也摽拊心貌孔氏穎逹曰寤覺之中拊心而手摽然嚴氏粲曰摽本訓擊故摽然爲拊心貌集説輔氏廣曰此章又言其所憂之事以至於拊心而有摽則其憂極矣許氏謙曰謂我之憂者自揆無過正以見怒諸妾䜛譖而致然黙而思之無可奈何惟拊心而已附錄鄭氏康成曰羣小衆小人在君側者歐陽氏修曰仁人爲羣小所怒故常懼禍而憂心焉王氏安石曰君子與小人異趣其爲小人所慍固其理也故曰憂心悄悄慍于羣小小人得志則爲䜛誣以病君子君子既病矣則又從而侮之故曰覯閔既多受侮不少其曰既多不少者以著小人之衆也日居月諸胡迭待結反而微心之憂矣如匪澣户管反衣靜言思之不能奮飛集傳比也居諸語辭迭更微虧也嚴氏粲曰微謂不明也日月食則不明十月之交云彼月而微此日而微匪澣衣謂垢汙不濯之衣奮飛如鳥奮翼而飛去也言日當常明月則有時而虧猶正嫡當尊衆妾當卑今衆妾反勝正嫡是日月更迭而虧是以憂之至於煩寃憒古對反心亂也眊音冒日不明也如衣不澣之衣恨不能奮起而飛去也集説輔氏廣曰此章方述其常理而以日月爲比以見已之所遭非理之常故其心之憂煩寃眊如衣不澣之衣又恨其不能如鳥之奮翼而飛去也蓋亦可謂知其不可奈何而安之於命矣許氏謙曰卒章再言上下失序所以憂不能解但恨不能飛去耳憂之極止曰不能奮飛可謂正而不深怨矣黄氏佐曰此章言不得於夫見慍於妾則衆妾反尊顯而正嫡反幽微矣然婦之事夫一與之齊終身不改是終無可去之義也附錄鄭氏康成曰日君象也月臣象也君道當常明如日而月有虧盈君失道而任小人大臣専恣則日如月然臣不遇於君猶不忍去厚之至也蘇氏轍曰君子與小人常迭相勝然而小人而不得其志者常也君子而不遂如日而微耳是以憂之不去於心如衣垢之不澣不忘濯也憂患既深思奮飛以避之而不能矣總論朱子曰讀詩須看詩人之意在甚處如婦人不得於其夫宜其怨之深矣而曰我思古人實獲我心又曰靜言思之不能奮飛其詞氣忠厚惻怛怨而不過如此此所謂止乎禮義而中喜怒哀樂之節者所以雖爲變風而繼二南之後者以此臣之不得於君子之不得於父弟之不得於兄朋友之不相信皆當以此爲法如屈原不忍其憤懐沙赴水此賢者之過也賈誼云歴九州而相其君兮何必懐此都也又失之逺矣問静言思之不能奮飛猶似未有和平意曰也只是如此説無過當處既有可怨之事亦須逺他有些怨底意思只看舜之號泣于旻天更有甚於此者喜怒哀樂但發之不過其則耳亦豈可無聖賢處憂危只要不失其正如綠衣言我思古人實獲我心這般意思却又分外好輔氏廣曰首章以柏舟爲比比其可用乘載也末章以日月爲比比其當明而虧當尊而卑也所謂詞氣卑順柔弱全篇固然末後兩章尤可見朱氏善曰不得志於夫而無怨夫之意不見禮於兄弟而無絶兄弟之情不見愛於衆妾而無怨衆妾之心而所以自反者惟知心志不可以不專一威儀不可以不閑習使惡我者無得而簡擇怒我者無得以瑕疵亦可謂善自處矣附錄蘇氏轍曰毛傳之序曰此衛頃公之詩也變風之作而至於漢其間逺矣其出於毛氏者其傳之也傳之猶可信也嚴氏粲曰衞衰世也而有柏舟之仁人身雖不遇而惓惓於國今誦其詩猶想見其藹然仁人氣象劉向列女傳以邶柏舟爲衞宣夫人之詩此魯詩說也孔叢子載孔子讀柏舟見匹夫執志之不可易則非婦人之詩也黄氏震曰晦菴主列女傳以此爲婦人之詩以柏舟之堅自比華谷援孔叢子載孔子讀柏舟見匹夫執志之不可易謂非婦人之詩晦菴據列女傳以變毛氏華谷又據孔叢子以變晦菴愚案汎彼柏舟之詩説汎然流水中似與經文合初不見所謂堅守之意且合從毛氏古説以仁人不遇爲主案小序以此詩爲仁人不遇韓嬰以爲宣姜自誓而劉向列女傳曰衛宣夫人者齊侯女也嫁衛至城門而衛君死遂入持三年喪畢弟立請曰衛小國也不容二庖夫人曰惟夫婦同庖不聼衛人愬於齊兄弟兄弟皆欲與君女終不聼乃作此詩朱子本向説改毛傳爲婦人之詩而意其爲莊姜以下篇而推之然不敢指爲宣姜與宣夫人者以宣姜見烝於昭伯左傳記載甚明而向所云宣夫人者豈有兩衛宣耶故以詩之篇次考之則指莊姜爲協也但向著列女傳以爲詩本婦人而所上封事論恭顯傾陷正人則引是詩之詞爲證又解之曰小人成羣亦足慍也朱子力闢小序而定此詩爲婦人不得志於夫者所作及注孟子引詩憂心悄悄慍於羣小則曰本言衛之仁人見怒於羣小孟子以爲孔子之事可以當之是又與詩集傳異矣諸儒因此辨論甚多總之君臣夫婦其道無二婦人不得於夫仁人不遇於時而因物起興發乎情止乎禮義要皆聖人之所取也朱子注詩與注孟子各存一義故仍録古説於末以備博覽云柏舟五章章六句集說張氏學龍曰莊姜處失婦之變正静自守而不忍斥言其夫共姜處母子之變以死誓無他感動其母然母之慈愛猶可回也故共姜處之易夫之昏惑不可移也故莊姜處之難所以冠鄘衛居變風之首也朱氏公遷曰柏舟與關雎鵲巢反對而處變以常不愧於后妃夫人之化所以首變風而繼二南也綠兮衣兮綠衣黄裏心之憂矣曷維其已集傳比也緑蒼勝黄之閒色黄中央土之正色劉氏瑾曰青黄赤白黑五方之正色也綠紅碧紫纁五方之閒色也蓋以木之青克土之黄合青黄而成綠爲東方之閒色閒色賤而以為衣正色貴而以為裏言皆失其所也已止也荘公惑於嬖妾鄭氏康成曰妾謂公子州吁之母母嬖而州吁日驕曹氏粹中曰荘公楊武公子夫人荘姜賢而失位故作此詩言緑衣黄裏以比賤妾尊顯而正嫡幽微使我憂之不能自已也集説孔氏穎逹曰閒色之綠不當為衣猶不正之妾不宜嬖寵今閒色為衣而見正色反為裏而隱以興妾蒙寵而顯夫人反見疏而微綠衣以邪干正猶妾以賤陵貴故心之憂矣何時其可以止也謝氏枋得曰嫡妾易位尊卑不明家不齊則國不治莊姜之心豈但憂一身哉為君憂為君之子憂為國家後日憂其憂何時能止也綠兮衣兮綠衣黄裳心之憂矣曷維其亡集傳比也上曰衣下曰裳記曰衣正色裳閒色今以綠為衣而黄者自裏轉而為裳其失所益甚矣嚴氏粲曰黄裏言掩蔽而已黄裳則失位矣姚氏舜牧曰綠衣黄裏是傷其及背綠衣黄裳是傷其倒置亡之為言忘也集説孔氏穎逹曰閒色之綠今為衣而在上正色之黄反為裳而處下以興妾蒙寵而尊夫人反見疏而卑前以表裏興幽顯此以上下喻尊卑雖嫡妾之位不易而莊公禮過有薄厚也綠兮絲兮女音汝所治平聲兮我思古人俾無訧音尤叶于其反兮集傳比也女指其君子而言也治謂理而織之也俾使訧過也言綠方爲絲而女又治之毛氏萇曰綠末也絲本也以比妾方少艾而女又嬖之也許氏謙曰綠之所以成綠而爲衣者人以絲染治而成也妾之所以上僭者以君子嬖之而然也上綠字已包前章衣字在内然則我將如之何哉亦思古人有嘗遭此而善處之者以自勵焉使不至於有過而已輔氏廣曰彼之所爲自違悖而我之所爲則欲其無過而已此其所以爲賢也陳氏推曰俾無訧兮只委曲以全夫婦之道不兼嫡妾說善處必期盡道若只安於過時則但付之於命而已豈得謂善處集說孔氏穎逹曰毛以爲由絲以爲綠即綠爲末絲爲本猶承嫡而使妾則妾爲卑而嫡爲尊公定尊卑不可亂猶女治絲本末不可易今公何爲使妾上僭而令尊卑亂乎莊姜旣見公不能定尊卑使已微而妾顯故云我思古之君子妻妾有序自使其行無過差者以莊公不能然故思之嚴氏粲曰言此閒色之綠也本是絲也乃女染治以爲綠也女旣染此絲以爲綠豈可復以爲衣而加諸黄色之上乎嬖旣以爲妾則不僭嫡也我思古人能處嫡妾使尊卑有序而無尤過也徐氏光啓曰詩人之意謂凡妾見寵婦人多嫉心忿争便是處失其宜而我亦有過矣故思古人以自勵焉絺兮綌兮淒七西反其以風叶符愔反我思古人實獲我心集傳比也淒寒風也絺綌而遇寒風猶已之過時而見棄也故思古人之善處此者眞能先得我心之所求也集說鄭氏康成曰絺綌所以當暑今以待寒喻其失所也古之聖人制禮者使夫婦有道妻妾貴賤各有次序朱子曰古人所爲恰與我合只此便是至善前乎千百世之已往後乎千百世之未來只是此道理孟子所謂若合符節政謂是爾輔氏廣曰莊姜始則思法古人以求無過旣又因古人之事而知其先得我心之所同然者可不謂之賢乎哉嚴氏粲曰絺綌暑服今當淒然寒風之時喻不適時而見棄猶班婕妤秋扇捐篋之意也我思古人能處嫡妾實得我心言當於人心也女子之情鐃怨此詩但刺莊公不能正嫡妾之分其辭温柔敦厚如此故曰詩可以怨黃氏一正曰我思古人俾無訧兮欲求古道以處之使其夫歸於無過也我思古人實獲我心欲求古道以處之然後心得其所安也總論程子曰綠衣衛莊姜傷已無德以致之行有不得者反求諸已而已矣故曰綠兮絲兮女所治兮我思古人俾無訧兮絺兮綌兮凄其以風我思古人實獲我心絲之綠由汝之染治以成言有所自也絺綌所以來風也許氏謙曰首章言已爲賤者所掩蔽次章則貴賤易位矣然此伹就妾身而言三章則言妾僭之由皆在于君子末章則深逹乎事逐時變物隨氣遷理勢之常無足怪者尚何憂悴之有徐氏常吉曰前之憂憂今日遇此而無聊也後之思思古人處此之有道也然求自盡而已非有冀於夫也非有憾於羣小也綠衣四章章四句集傳莊姜事見春秋傳此詩無所考姑從序說下三篇同左傳莊姜美而無子戴嬀生桓公莊姜以爲已子公子州吁嬖人之子也有寵而好兵公弗禁莊姜惡之集說嚴氏粲曰聖人存綠衣以明夫婦治道之原申二南之義以埀世戒非取女子之怨也此詩莊姜所自作而屬邶風者蓋邶人傳詠之而采詩者得之於邶耳黃氏震曰觀詩至綠衣然後知先王之風澤深厚夫以婦人女子而所知如此詞氣坦夷固與氣息茀然者不可同年語矣蓋不得已而後言仁厚積中而然也燕燕于飛差初宜反池其羽之子于歸遠送于野叶上與反瞻望弗及泣涕如雨集傳興也燕鳦音壹也謂之燕燕者重言之也孔氏穎逹曰釋鳥云巂周燕燕鳦孫炎曰别三名舍人曰巂周名燕燕又名鳦郭璞曰一名𤣥鳥齊人呼鳦曰燕卽今之燕也古人重言之漢書童謡云燕燕尾涎涎是也差池不齊之貌李氏樗曰左氏何敢差池杜元凱以爲不齊也之子指戴嬀也陸氏德明曰戴諡也嬀陳姓也歸大歸也毛氏萇曰歸歸宗也孔氏穎逹曰大歸者不反之辭以歸寧者有時而反此卽歸不復來故謂之大歸也莊姜無子以陳女戴嬀之子完爲已子莊公卒完卽位嬖人之子州吁弑之故戴嬀大歸於陳而莊姜送之作此詩也毛氏萇曰逺送過禮王氏安石曰燕方春時以其匹至其羽相與差池其鳴一上一下故莊姜感所見以起興楊氏愼曰師矌禽經曰鳥向飛背宿燕向宿背飛此物理也故莊姜以爲送歸妾之比取其背飛之義送别之情也集說鄭氏康成曰婦人之禮送迎不出門今我送是子乃至于野者舒已憤盡已情孔氏穎逹曰旣至于野與之訣别已留而彼去稍稍更遠瞻望之不復能及故念之泣涕如雨然也上二句謂其將行次二句言已在路下二句言旣訣之後嚴氏粲曰燕以春來秋去有離别之義故以起興莊姜橅戴嬀之子平時與戴嬀㤙信相親及莊公旣没嫡妾相依如雙燕之飛其羽差池相爲先後而常相逐飛也今戴嬀大歸而已獨留不復得如雙燕矣我遠送而瞻望不及泣涕如兩之傾也風人含不盡之意此但叙離别之恨而子弑國危之戚皆隱然在不言之中矣燕燕于飛頡户結反之頏户郎反之之子于歸遠于將之瞻望弗及佇立以泣集傳興也飛而上曰頡飛而下曰頏嚴氏粲曰雙燕之飛或頡或頏亦常相隨逐也何氏楷曰頡說文云直項也頏爾雅云鳥嚨也蓋鳥高飛直上故見其項頸上向也雙燕各飛興已與嬀形影相望也將送也何氏楷曰將持也言相攜持而行也佇立久立也集說黃氏櫄曰頡頏上下言其去國之時有回首再三不忍相别之意燕燕于飛下上時掌反其音之子于歸遠送于南叶尼心反瞻望弗及實勞我心集傳興也鳴而上曰上音鳴而下曰下音送于南者陳在衞南集說輔氏廣曰泣涕如雨初别時也佇立以泣已别而久立以泣也實勞我心旣去而思之不忘也朱氏公遷曰飛相上下聲相應和皆不忍相違之意仲氏任而今反只音紙其心塞淵叶一均反終溫且惠淑愼其身先君之思以朂寡人集傳賦也仲氏戴嬀字也孔氏穎逹曰婦人不以名行今稱仲氏明是其字禮記男女異長注云各自爲伯季故婦人稱仲氏也以恩相信曰任周禮六行孝友睦婣任恤注任信於友道只語辭塞實淵深終竟温和惠順淑善也朱子曰終溫且惠始終如一也先君謂莊公也朂勉也寡人寡德之人莊姜自稱也言戴嬀之賢如此又以先君之思勉我使我常念之而不失其守也輔氏廣曰以恩愛相信嫡妾相與之情於是爲至塞實不虚妄也淵深不淺露也二者其本也溫和惠順又終竟如此而無作輟焉則是得情性之常也淑又婦人之美德而愼則持身之謹也有是衆德而又謹於持身其賢爲可知矣徐氏常吉曰先君之思夫人之自盟素矣而嬀之言如此非所謂同心之言其臭如蘭者乎楊氏曰州吁之暴桓公之死戴嬀之去皆夫人失位不見荅於先君所致也而戴嬀猶以先君之思勉其夫人眞可謂溫且惠矣集說孔氏穎達曰莊姜旣送戴嬀而思其德行及其言語乃稱其字言仲氏有大德行也其心誠實而深逺也又終當顔色溫和且能恭順善自謹愼其身内外之德旣如此又於將歸之時思先君之故勸勉寡人以禮義也朱子語類或問戴嬀不以莊公已死而勉莊姜以思之可見溫和惠順而能終也亦緣他之心塞實淵深所禀之厚故能如此曰不知古人文字之美詞氣溫和義理精密如此秦漢以後無此等語某讀詩於此數句讀書至先王肇修人紀從諫弗咈先民時若居上克明爲下克忠與人不求備檢身若不及以至于有萬邦兹維艱哉深誦歎之譬如畫工傳神一般直是寫得他精神出嚴氏粲曰此章皆稱戴嬀之美以爲别辭所以致其愛戀之意末又稱戴嬀相勉之辭雖以見戴嬀之賢而意緒黯然矣總論孔氏穎逹曰戴嬀大歸莊姜送之經所陳皆訣别之後述其送之之事也潘氏時舉曰前三章但見莊姜拳拳於戴嬀有不能已者四章乃見莊姜於戴嬀非是情愛之私由其有塞淵溫惠之德能自淑愼其身又能以先君之思勉莊姜以不忘則見戴嬀平日於莊姜相勸勉以善者多矣故於其歸而愛之如此無非情性之正也朱氏公遷曰前三章述已之情後一章美戴嬀之德燕燕四章章六句集說孔氏穎逹曰隱三年左傳曰衛莊公娶於齊東宫得臣之妹曰莊姜美而無子又娶於陳曰厲嬀生孝伯早死其娣戴嬀生桓公莊姜以爲己子四年春州吁殺桓公經書弑其君完是莊姜無子完立州吁殺之之事也由其子見殺故戴嬀於是大歸莊姜養其子與之相善故越禮遠送于野作此詩以見莊姜之志也知歸是戴嬀者經云先君之思則莊公薨矣桓公之時母不當輒歸雖歸非莊姜所當送歸明桓公死後其母見子之殺故歸莊姜養其子同傷桓公之死故涕泣而送之也衛世家云莊公娶齊女爲夫人而無子又娶陳女爲夫人禮諸侯不再娶且莊姜仍在左傳惟言又娶於陳不言爲夫人也左傳惟言戴嬀生桓公莊姜養之以爲己子不言其死也然傳言又娶者蓋謂媵也左傳曰同姓媵之異姓則否此陳女得媵莊姜者春秋之世不能如禮顧氏夢麟曰案春秋書戊申衛州吁弑其君完九月衞人殺州吁于濮杜預注戊申三月十七日則皆桓王之元隱公之四一年内事也蓋未幾而君完之仇雪矣此詩之作則在君完被弑後州吁未殺先當春夏之間見燕託興案史記州吁襲殺桓公自立欲伐鄭請宋陳蔡與俱石碏乃因桓公母家於陳詳爲善州吁至鄭郊石碏與陳侯謀因殺州吁於濮據史以論詩則戴嬀之大歸正後日石碏用陳以討賊之由也然則莊姜之越禮遠送而惓惓於戴嬀爲之涕泣不置者當非僅辱常婦人女子離别之情其亦有他望也歟日居月諸照臨下土乃如之人兮逝不古處昌呂反胡能有定寧不我顧叶果五反集傳賦也日居月諸呼而訴之也之人指莊公也逝發語辭古處未詳毛氏萇曰古故也或云以古道相處也王氏回曰不以古夫婦之道處我胡寧皆何也莊姜不見荅於莊公故呼日月而訴之言日月之照臨下土久矣今乃有如是之人而不以古道相處吕氏祖謙曰觀碩人之詩則莊姜初來卽不見荅非始有㤙義而後忘之也古不當訓故是其心志回惑亦何能有定哉許氏謙曰四胡能有定期之之辭也謂令其心回惑何時而能定乎此莊姜忠厚之意也而何爲其獨不我顧也見棄如此而猶有望之之意焉此詩之所以爲厚也劉氏瑾曰每章章末二句皆有望之之意集說毛氏萇曰日乎月乎照臨之也朱子曰夫婦相敬如賔古之道也莊姜貞靜自守而莊公謔浪笑敖此所謂逝不古處也輔氏廣曰觀綠衣之詩所謂我思古人則於此歎莊公不以古道處已者宜也自處以古人爲法而望人以古道處已莊姜之處已望人皆有則矣黃氏一正曰呼日月者以其明能徧照也定定其志也顧氏起元曰以古道相處如古之刑于睦雍是也沈氏守正曰怨非詩意也大意謂斯人之不古處也不知胡時能有定乎使其定也寧終棄我而不顧乎附錄鄭氏康成曰日月喻國君與夫人也孔氏穎逹曰言日乎日以照畫月乎月以照夜故得同曜齊明而照臨下土以興國君也夫人也國君視外治夫人視内政當亦同德齊意以治理國事如此是其常道今乃如是人莊公其所接及我夫人不以古時恩意處遇之是不與之同德齊意失月配日之義也公於夫婦尚不得所於衆事亦何能有所定乎適曽不顧念我之言而已無能有所定也郝氏敬曰呼日月者詩之情境以比夫婦非專爲告訴日月也日居月諸下土是冒乃如之人兮逝不相好呼報反胡能有定寧不我報集傳賦也冒覆也鄭氏康成曰覆猶照臨也報荅也毛氏萇曰盡婦道而不得報集說鄭氏康成曰其所以接及我者不以相好之恩情甚於已薄也張子曰以禮事莊公不以恩荅已寧不我報是也日居月諸出自東方乃如之人兮德音無良胡能有定俾也可忘集傳賦也日旦必出東方月望亦出東方毛氏萇曰日始月盛皆出東方德音美其辭無良醜其實也嚴氏粲曰此德音無良及邶谷風德音莫違皆婦人言其夫待已之意俾也可忘言何獨使我爲可忘者耶集説李氏樗曰俾也可忘諸家以爲莊姜忘其莊公非也莊姜之爲人母其子之㬥猶且念之莊姜慈於爲母豈肯忘莊公哉戴嬀之歸猶曰先君之思以朂寡人戴嬀不忘莊公莊姜豈忘莊公乎俾也可忘當是莊公忘莊姜言使我果當忘乎是不當忘而忘也朱氏公遷曰莊姜之賢可親不可忘者也而莊公忘之何哉附錄孔氏穎逹曰言日乎月乎日之始照月之盛望皆出東方言月盛之時有與日同以興國君也夫人也國君之平常夫人之隆盛皆秉其國事夫人之盛時亦當與君同如此是其常今乃如之人莊公曾無良善之德音以處語夫人是疏遠已不與之同位失月配日之義君之行如是何能有所定使是無良之行可忘也日月雖分照書夜而日恒明月則有盈有闕不常盛盛則與日皆出東方猶君與夫人雖各聽内外而君恒伸夫人有屈有伸伸則與君同居尊位故箋云夫人當盛之時與君同位嚴氏粲曰德音無良言莊公待已其聲音言語之閒皆無善意也今家國之亂何能有定是可憂也若往日之事則使我可忘不復追咎之矣詩之敦厚如此日居月諸東方自出父兮母兮畜我不卒胡能有定報我不述集傳賦也畜養卒終也不得其夫而歎父母養我之不終蓋憂患疾痛之極必呼父母人之至情也劉氏瑾曰日居月諸呼日月而訴之父兮母兮呼父母而訴之也猶舜號泣于旻天于父母之意述循也言不循義理也集說朱氏公遷曰始責其不以古道處我終責其不循義理以報我性情之厚而發於正者也報我不述於終風首章可見呼日月而怨其夫則有望焉者也呼日月而呼父母則絶意於夫無所望也顧氏起元曰報我不循禮義則猶之乎不報也附錄呂氏祖謙曰胡能有定反覆言之蓋推原禍亂之由而非爲已私也俾也可忘謂莊公恩義之薄誠使我可忘而我自不忍忘之也末章不欲咎莊公徒自傷父母養我不終而已報我不述言莊公之所以報我不欲稱述之矣亦不欲咎莊公也總論輔氏廣曰呼日月而但云照臨下土尊之之詞也呼父母而遂言畜我不卒親之之詞也一章云寧不我顧言不相顧盼也二章言寧不我報言不相酬荅也三章云俾也可忘則蒙上句胡字言何獨使我爲可忘者耶詞雖緩而意則切矣四章言報我不述則又言莊公雖有時相報我而都不循乎義理也雖爲莊公所棄而猶有望之之意焉是其性情之正也胡氏一桂曰此篇分明作於莊公之時胡能有定只是說莊公心志回惑反覆無定之意故不我顧不我報俾也可忘而報我不述也日月四章章六句集傳此詩當在燕燕之前下篇放此問日月終風二篇據集傳云當在燕燕之前以某觀之終風當在先日月當次之蓋詳終風之詞莊公於莊姜猶有往來之時至日日則見莊公已絶不顧莊姜而莊姜不免微怨矣燕燕則莊公薨後送歸妾情不能堪耳以此觀之則終風當先而日月當次朱子曰恐或如此集說朱氏善曰變風之始莊姜何也曰婦人夫其所天也以夫則狂惑妾其所使也以妾則上僭子其所恃頼以終身也以子則㬥而無禮莊姜之處此亦難矣雖遭人倫之變而不失乎天理之常則莊姜亦賢矣哉是可以爲處變者之法矣終風且㬥顧我則笑叶音燥謔許約反浪笑敖五報反中心是悼集傳比也終風終日風也㬥疾也孔氏穎逹曰釋天云日出而風爲㬥孫炎曰陰雲不興而大風㬥起然則爲風之㬥疾故云疾也謔戲言也浪放蕩也顧氏夢麟曰謔而浪非常謔也笑而敖非誠笑也悼傷也莊公之爲人狂蕩㬥疾莊姜蓋不忍斥言之故但以終風且㬥爲比言雖其狂㬥如此然亦有顧我則笑之時但皆出於戲慢之意而無愛敬之誠孔氏穎逹曰連云笑敖故爲不敬淇奥云善戲謔兮明非不敬也則又使我不敢言而心獨傷之耳蓋莊公㬥慢無常而莊姜正靜自守所以忤其意而不見荅也集説許氏謙曰顧我則笑是不禮其夫人而不能相敬如賔可見鄧氏元錫曰夫笑爲歡也謔浪而笑不古處也何歡焉中心悼之而已鄒氏泉曰終風且㬥是說莊公之狂蕩㬥疾謔浪笑敖總是戲慢不誠而已中心是悼不敢言而心獨傷之意朱氏道行曰語云㬥風不終朝終風而㬥非風之常起下顧我則笑以謔浪笑敖非情之常也一切喜怒把來做正經不得所以中心是悼耳附錄毛氏萇曰笑侮之也鄭氏康成曰旣竟日風矣而又㬥疾喻州吁之爲不善如終風之無休止而其閒又有甚惡其在莊姜之前視莊姜則反笑之是無敬心之甚悼者傷其如是然而已不能得而止之終風且霾亡皆反叶音貍惠然肯來叶如字又陵之反莫往莫來悠悠我思叶新才新齎二反集傳比也霾雨土蒙霿音茂又音夢也孔氏穎逹曰釋天云風而雨土爲霾孫炎曰大風揚塵土從上下也徐氏光啓曰蒙霿閉塞不開之意惠順也毛氏萇曰言時有順心也悠悠思之長也終風且霾以比莊公之狂惑也雖云狂惑然亦或惠然而肯來但又有莫往莫來之時則使我悠悠而思之望其君子之深厚之至也集說唐氏汝諤曰肯來無幾而莫來甚長此悠悠之思苦其終無了期也朱氏道行曰終日風㬥揚塵滿目如霧雨然皆終風之變怪也惠然肯來與顧我則笑一例不出自根心倐忽轉移狂態曲盡悠悠我思發端於悼附錄孔氏穎逹曰毛以爲天旣終日風且又有㬥甚雨土之時以興州吁常爲不善又有甚惡恚怒之時州吁之㬥如是又不肯數見莊姜時有順心然後肯來雖來復侮慢之旣無子道以來事已由此已不得以母道往加之莫往莫來母子恩絶悠悠然我心思之言思其如是則悠悠然也楊氏時曰見侮慢則悼之而已其莫往莫來則又思之可謂極母道矣終風且曀於計反不日有曀寤言不寐願言則嚏都麗反集傳比也陰而風曰曀孫氏炎曰雲風曀日光有又也不日有曀言旣曀矣不旋日而又曀也亦比人之狂惑暫開而復蔽也願思也嚏鼽音求嚏也禮記月令民多鼽嚏注鼽者氣窒於鼻嚏者聲發於口人氣感傷閉鬱又爲風霧所襲則有是疾也集說呂氏祖謙曰陰風終日意其止矣不旋日而又曀焉最苦之辭也輔氏廣曰寤則憂而不能寐思之則感傷氣閉而成疾其憂危甚矣顧氏起元曰暫開者天理之萌復蔽者人欲之錮寤言二句串說言寤則憂而不寐思之至於成疾也附錄孔氏穎逹曰毛以爲天旣終日風且復陰而曀不見日光矣而又曀以興州吁旣常不善而又甚㬥如是莊姜言我寤覺而不能寐願以母道往加之我則嚏跲而不行跲與劫音義同曀曀其陰虺虺其靁寤言不寐願言則懷叶胡椳反集傳比也曀曀陰貌孔氏穎逹曰言曀復曀則陰曀之甚也虺虺靁將發而未震之聲以比人之狂惑愈深而未已也懷思也徐氏光啓曰懷懷抱不釋之意集說范氏處義曰陰而風曰曀曰曀曀則日常陰也曰虺虺則雷電俱發也呂氏祖謙曰驟雨迅雷其止可待至於曀曀之陰虺虺之雷則殊未有開霽之期也附錄毛氏萇曰懷傷也孔氏穎逹曰毛以爲天旣曀曀然其常陰又虺虺然其震雷以興州吁之㬥如是故莊姜言我夜覺恒不寐願以母道往加之我則傷心總論許氏謙曰莊姜賢夫人也所思者大矣國君及夫人父母一國而國人作則者也莊公無人君儀度其曰終風曰㬥曰霾曀陰雷曰謔浪笑敖爲君如此果足以正一國乎夫人賢而不見荅果足以示人齊家之道乎夫人之中心是悼悠悠之思寤而不寐願言而嚏而懷所思者大矣非情欲之謂也劉氏瑾曰一章言莊公狂㬥二章言其狂惑皆止一句爲比而莊公猶有顧笑惠來之時所謂㬥慢無常狂惑暫開者也三章則暫開而復蔽四章則愈深而未已皆是以兩句爲比終風四章章四句集傳說見上集說劉氏瑾曰若以此詩繼綠衣之後次日月次燕燕讀之尤可備見姜氏初作柏舟綠衣惟自憂歎而止於和平未嘗譏公之爲人也至於終風則言其狂惑蔽痼而猶不忍斥言及日月然後極其詞此豈情之所得已哉附錄嚴氏粲曰國史題日月終風二詩止曰衞莊姜傷已不言爲何時詩也後序以爲作於州吁之時或者以爲作於莊公之時且後序有毛公所不及見者固不可盡據然莫往莫來傳云人無子道以來事已已亦不得以母道往加之是毛公以爲州吁詩矣蔣氏悌生曰莊公惑於嬖妾疎棄莊姜宜其有怨心矣然綠衣歸於自省無一語憾莊公至於州吁弑桓自立戴嬀大歸於陳而莊姜送之其悲痛困窮無以加於此時其原皆莊公不見荅之所致也而燕燕之詩但言涕泣勞心而且以戴嬀能以先君之思朂寡人爲戴嬀温惠淑愼之德之實則可見莊姜之心逹尊卑之分守順承之義無一毫怨尤善處變而不失其正矣及觀日月終風二詩所謂乃如之人德音無良終風且㬥謔浪笑敖等語明斥其人之過惡與綠衣燕燕二詩詞意大有遼絶者竊意此語施之州吁則可施於莊公則於義有不可況三百篇次先後已定何必移易郝氏敬曰此詩爲母憂子則謂之賢母爲婦怨夫則傷於怒矣案此篇序以爲莊姜遭州吁之㬥毛鄭以後皆從之至朱子集傳始變其說以爲詳味詩辭有夫婦之情未見母子之意識可謂卓矣但四詩篇次朱子雖欲移日月終風於燕燕之前然止存其論而究未曾改置其位良以詩本刪定於孔子故不敢更易其經也今以朱傳爲正義俾講師有所宗主而附古說於後以見釋經之初義有如此擊鼓其鏜吐當反踊躍用兵叶晡芒反土國城漕我獨南行叶戸郎反集傳賦也鏜擊鼓聲也孔氏穎逹曰司馬法云鼓聲不過閭字雖異音實同也左傳曰夫戰勇氣也一鼓作氣又曰金鼔以聲氣踊躍坐作擊刺之狀也周禮大司馬敎坐作進退疾徐疏數之節注習戰法也兵謂戈戟之屬周禮司兵掌五兵注五兵者戈殳戟酋矛夷矛車之五兵也歩卒之五兵則無夷矛而有􅃓矢孔氏穎逹曰古者謂戰器為兵經云踊躍用兵謂兵器也土土功也國國中也漕衞邑名嚴氏粲曰漕鄘地也在河南王氏應麟曰通典滑州白馬縣衞國漕邑戴公廬於漕卽此胡氏紹曾曰漕邑戴延之西征記為白馬城案通典白馬縣在滑州皇輿表直隸大名府滑縣衞人從軍者自言其所為因言衞國之民或役土功於國或築城於漕而我獨南行何氏楷曰鄭在衞之南有鋒兵端也鏑音滴矢鋒也死亡之憂危苦尤甚也李氏樗曰土國城漕非不勞苦而猶處於境内今我之在外死亡未可知也集說鄭氏康成曰此用兵謂治兵時言衆民皆勞苦而我獨見使從軍南行伐鄭是尤勞苦之甚孔氏穎逹曰禮記曰五十不從力政六十不與服戎注云力政城郭道渠之役則戎事六十始免輕於土功而言尤苦者以州吁用兵㬥亂從軍出國恐有死傷故為尤苦土國城漕雖用力勞苦無死傷之患故優於兵事也曾氏鞏曰鏜然擊鼓踊躍用兵想見州吁好兵喜鬬之狀其興師動衆非出於不得已也人所甚憚者州吁之所最樂國人怨之正以其踊躍爾王氏志長曰伐鼓淵淵方叔之鼓也擊鼓其鏜州吁之鼓也鼓不異而擊鼓之人則異矣春官大師執同律以聽軍聲詔吉㓙師曠歌南風而知楚敗孰謂渺茫之論哉從孫子仲平陳與宋不我以歸憂心有忡敕中反叶敕衆反集傳賦也孫氏子仲字時軍帥也毛氏萇曰孫子仲謂公孫文仲也呂氏祖謙曰言所從者乃孫子仲也則輕其帥可知矣平和也合二國之好也鄭氏康成曰平成也將伐鄭先告陳與宋以成其伐事朱子曰伐鄭以結陳宋之成也胡氏一桂曰必先和陳宋而後進兵也舊說以此爲春秋隱公四年州吁自立之時宋衞陳蔡伐鄭之事恐或然也左傳宋殤公之卽位也公子馮出奔鄭鄭人欲納之及衛州吁立將修先君之怨於鄭而求寵於諸侯以和其民使告於宋曰君若伐鄭以除君害君爲主敝邑以賦與陳蔡從則衛國之願也宋人許之於是陳蔡方睦於衛故宋公陳侯蔡人衞人伐鄭圍其東門五日而還以猶與也言不與我而歸也王氏質曰不我以歸者夏還而秋再舉當是征夫不得還家也集說鄭氏康成曰與我南行不與我歸期兵凶事懼不得歸豫憂之嚴氏粲曰王仲宣詩云從軍有苦樂但問所從誰今從孫子仲以平陳宋所從非其人也憂其南行而不得以歸故憂心忡忡然朱氏道行曰孫子仲帥師結好陳宋及蔡伐鄭皆州吁所使民不樂從故東門之役五日而還不遐遺也而輒曰不我以歸何哉彼見出師助與國與國必交助自此兵連禍結歸休無日矣憂心有忡以此何氏楷曰平陳與宋之後卽往伐鄭旣圍其東門五日而還矣未幾魯翬帥師來㑹復往伐鄭自夏而秋僅隔一時必帥師在途又聞後命未得班師故曰不我以歸也爰居爰處爰喪息浪反其馬叶滿補反于以求之于林之下叶後五反集傳賦也爰於也於是居於是處於是喪其馬而求之於林下見其失伍離次無鬭志也集說顧氏起元曰三爰字有聊且之意行伍居處自有常所此則任情所適非行伍中所常居處之所矣爰喪三句則不範馳驅矣唐氏汝諤曰憂心日結不復以戰鬬爲念此雖人心懈弛亦見上無節制而軍有敗形也附錄歐陽氏修曰王肅以下三章衞人從軍者與其室家訣别之詞云我此行未有歸期亦未知於何居處於何喪其馬若求我與馬當於林下求之蓋爲必敗之計也死生契苦結反闊叶苦劣反與子成說執子之手與子偕老叶魯吼反集傳賦也契闊隔遠之意嚴氏粲曰漢書閒何闊注云久闊不相見則契闊爲閒闊之義也成說謂成其約誓之言鄭氏康成曰執其手與之約誓示信也從役者念其室家因言始爲室家之時期以死生契闊不相忘棄又相與執手而期以偕老也集說嚴氏粲曰我往者初昏之時與子成其約誓之言執子之手期於偕老不謂今者便爲死生之别怨辭也徐氏光啓曰死生契闊作二事看一死一生一彼一此俱不忘棄也朱氏道行曰死生離合決不相忘此成說也執手二句卽成說時丁寧但有生合無死離其夫願如此徐氏鳳彩曰從役者不以國事爲憂而惟繫情室家如此于音吁下同嗟闊叶苦劣反兮不我活叶户劣反兮于嗟洵音荀兮不我信師人反兮集傳賦也于嗟歎辭也闊契闊也活生洵信也信與申同孔氏穎逹曰信古仲字故易曰引而信之言昔者契闊之約如此而今不得活偕老之信如此而今不得伸意必死亡不復得與其室家遂前約之信也集說嚴氏粲曰歎從今之閒闊不得相依以生活也又歎夫婦相違遠不得伸其偕老之志其怨深矣總論孔氏穎逹曰經五章皆陳兵役之怨辭曾氏鞏曰非獨爰居爰處之章爲從軍者訣别之辭一篇之意皆如此徐氏常吉曰首章言南行之事二章本南行之故三章陳怠慢之狀皆自征行之苦而言也四章追思室家之約五章恐違室家之約皆自思家之情而言也擊鼓五章章四句集說朱子曰案左傳州吁與宋陳伐鄭圍其東門五日而還出師不爲久而衞人之怨如此身犯大逆衆叛親離莫肯爲之用爾王氏質曰衞伐鄭之役宋陳蔡皆從夏秋再舉不堪連役也嚴氏粲曰衆仲云州吁阻兵而安忍阻兵無衆安忍無親兵猶火也弗戢將自焚觀擊鼓之詩衆仲之言信矣朱氏善曰役土功於國者此民也築城於漕者亦此民也南行而平陳與宋者又此民也先王之於民也不得已而用之則必先其所急後其所緩未聞衆役竝興罷民之力以逞已之志若斯之甚者也是亦可謂忍矣其卒至於敗亡也宜哉陸氏深曰案左傳隱公五年夏衛伐鄭而還九月而州吁殺當時從軍之士不但怨深而死亡兆矣史記稱鄭段亡而州吁求與之友吁得志而伐鄭爲段也是其身負不義而又黨惡此詩之錄鑒戒大焉凱風自南叶尼心反吹彼棘心棘心夭夭於驕反母氏劬勞叶音僚集傳比也南風謂之凱風長養萬物者也李氏廵曰南風長養萬物喜樂故曰凱風凱樂也棘小木叢生多刺難長而心又其稚弱而未成者也毛氏萇曰棘難長養者許氏慎曰棘酸棗也大曰棗小曰棘陸氏佃曰棘性堅彊費風之長養者其心之生更難於幹四時纂要云四月棗葉生凱風之時也胡氏紹曾曰棗棘皆有朿音次棗立生獨髙棘列生獨卑故取爲七子之喻棘有赤白二種夭夭少好貌劬勞病苦也衞之淫風流行雖有七子之母猶不能安其室故其子作此詩以凱風比母棘心比子之㓜時蓋曰母生衆子㓜而育之其劬勞甚矣本其始而言以起自責之端也集說鄭氏康成曰以凱風喻寛仁之母棘猶七子也夭夭以喻七子少長母養之病苦也孔氏穎逹曰棘木之難長者凱風吹而漸大猶七子亦難養者慈母養之以成長歐陽氏修曰凱以言其樂之情孝子慰母心者情也故樂長養之仁王氏安石曰棘心至於夭夭則風之爲力多矣此母氏劬勞之譬也蔡氏卞曰棘非能順者而凱風有母之道便能吹之使其心夭夭然和以茂也嚴氏粲曰母之養子於少時最勞苦故於夭夭言劬勞朱氏道行曰以凱風比母氏顧養恩同天地之施言吹心比襁褓之誠求言夭夭比孩抱之色笑也凱風自南吹彼棘薪母氏聖善我無令人集傳興也劉氏瑾曰上章言凱風棘心而下句無應故屬比此章言風與棘而下文以母與子應故屬興二章相似而不同也聖叡令善也棘可以爲薪則成矣毛氏萇曰棘薪其成就者然非美材故以興子之壯大而無善也復以聖善稱其母而自謂無令人其自責也深矣集說孔氏穎逹曰風吹難養之棘以成就猶母長養七子以成人則我之母氏有叡智之善德但我七子無善人之行以報之故母不安也劉氏彝曰自言七子之中有一令善之人則母亦不舍之而去也楊氏時曰母氏聖善我無令人孝子之事親如此此孔子所以取之輔氏廣曰母之不善在他人見之則可自其子觀之則只見其聖善而七子之中自無令人而已不然則不足以感悟其母以成其善志也嚴氏粲曰棘心喻子之幼小棘薪喻子之成立凱風吹彼棘心至於成薪可見長養之功而所吹之棘非美材僅堪爲薪猶母氏養我七子至於成人可見聖善之德而我七子無令善之人也子之成立猶母之德故於棘薪言聖善聖者明逹之稱善者賢淑之稱朱氏道行曰聖善其母而自謂無令是風美而材不美徒負此吹耳爰有寒泉在浚之下叶後五反有子七人母氏勞苦集傳興也浚衞邑王氏應麟曰水經注濮水枝津東逕浚城南而北去濮陽三十五里城側有寒泉岡即詩爰有寒泉在浚之下世謂之髙平渠非也諸子自責言寒泉在浚之下猶能有所滋益於浚而有子七人反不能事母而使母至於勞苦乎於是乃若微指其事而痛自刻責以感動其母心也母以淫風流行不能自守而諸子自責但以不能事母使母勞苦爲辭婉詞幾諫不顯其親之惡可謂孝矣下章放此集說鄭氏康成曰爰曰也曰有寒泉者在浚之下浸潤之使浚之民逸樂以興七子不能如也孔氏穎達曰寒泉有益於浚民以興七子無益於母陳氏鵬飛曰寒泉在浚之邑下邑人頼之以生養今子七人反不能養其母而使母勞苦求嫁也朱氏道行曰有子數多而勞苦母氏反不得與下泉比報傷哉責已愈至而諷母愈深矣勞苦直指子不能養與首章劬勞不同睍胡顯反睆華板反黄鳥載好其音有子七人莫慰母心集傳興也睍睆淸和圓轉之意毛氏萇曰睍睆好貌言黄鳥猶能好其音以悅人而我七子獨不能慰悦母心哉輔氏廣曰三章以無情興有情四章以無知興有知集說鄭氏康成曰睍睆以興顔色悅也好其音者興其辭令順也以言七子不能如也孔氏穎逹曰言黄鳥有睍睆之容貎則又和好其音聲以興孝子當和其顔色順其辭令自責言黄鳥之不如也興必以類睍睆是好貌故興顔色也音聲猶言語故興辭令也論語曰色難注云和顔悅色是爲難也又内則云父母之所下氣怡聲是孝子當和顔色善辭令也何氏楷曰七子怨艾之深見其中亦宜有一人能養且悅者而今無有也不獨引爲已非亦寛爲母地矣總論孔氏穎逹曰經皆自責之辭將欲自責先說母之勞苦故首章二章上二句皆言母氏之養已以下自責耳曾氏鞏曰凱風盛於夏時黄烏鳴於夏木寒泉亦夏所宜耳寒泉能使人甘之有子而使母勞苦黄鳥能使人悅之有子而莫慰母心黄氏櫄曰孝子不斥母之過而誦母之劬勞以為七子而不能安一母曾寒泉黄鳥之不若而卒能感其母此大孝養志也謝氏枋得曰不怨母而責已孝之至也朱氏公遷曰一章起自責之端二章極自責之義三四章主於自責而有微諷之意焉附錄孔氏穎逹曰以序云不安其室不言已嫁則仍在室但心不安耳故知欲去嫁也此母有欲嫁之志孝子自責已無令人不能安母之心母遂不嫁故美孝子能慰其母心也以美其能慰母心故知成其志者成言孝子自責之意也朱氏謀㙔曰凱風美孝子也寡母不能安其室七子自責以諷之幹母之蠱矣胡氏紹曾曰不能喻親於道非孝也凱風豈惟不怨而勤勤自艾此所以能慰其母終不去讀其詩何悱惻沁人也案序曰凱風美孝子也又曰七子能盡其孝道以慰其母心而成其志鄭康成解之曰母有嫁志孝子自責以安母心母遂不嫁朱子則以為此詩乃孝子自責之辭而不及其母之不嫁蓋據經文而言而不衍述其事也然猶曰以孟子之説證之序說亦是則亦不盡廢古說矣夫使當日孝子自責不能感動其母卒致嫁去七子亦遂已焉是何足成其為孝也故附錄諸儒之從古說者以補傳義之所未足凱風四章章四句集說段氏昌武曰曹曰母不安其室七子欲留之而不敢斥言乃自託於不令痛自咎責此大舜負罪引慝之意雄雉于飛泄泄移世反其羽我之懷矣自詒伊阻集傳興也雉野雞雄者有冠長尾身有文采善鬬陸氏佃曰其交有時别有倫而其羽文明可用爲儀泄泄飛之緩也李氏樗曰泄泄自得也懷思詒遺阻隔也婦人以其君子從役於外故言雄雉之飛舒緩自得如此而我之所思者乃從役於外而自遺阻隔也鄭氏康成曰伊當作繄繄猶是也集說輔氏廣曰我之懷矣指其夫也自詒伊阻不以怨人也朱氏公遷曰物得自由人不如物故以起興鄒氏泉曰卽物之自得而興所思者不得自如也劉氏楨曰本爲王事伊阻而顧曰自詒蓋勤王臣子所當自盡若夫所自致者然不敢歸怨其上也此見婦人能知大義處附錄段氏昌武曰曾曰雄雉以喻其夫雄雉于飛雌懷安而不從之今之阻隔蓋自遺也大夫行役婦人本無可從之理怨思之切耳嚴氏粲曰此詩及兔爰雉離于羅皆言從軍之人故以善鬬之雉興之大夫久役其妻怨曠言雄雉于飛泄泄然舒張其羽雉初飛則張其翼喻其夫始往從役之時也雄者飛而雌者留喻其夫從役而已留在家也我今思之乃自取今之阻隔悔不從行也雄雉于飛下上時掌反其音展矣君子實勞我心集傳興也下上其音言其飛鳴自得也嚴氏粲曰燕燕言下上其音謂雙燕相追逐而飛鳴也此言雄雉下上其音則止是一雉之音或下或上也展誠也言誠又言實所以甚言此君子之勞我心也集說范氏祖禹曰展矣君子久役而不得歸者也此婦人之閔其夫也朱氏公遷曰上章託物爲君子之行役勞苦而起興此章託物爲己之思念勞役而起興也瞻彼日月悠悠我思叶新齎反道之云遠曷云能來叶陵之反集傳賦也悠悠思之長也見日月之往來而思其君子從役之久也集說鄭氏康成曰日月之行迭往迭來今君子獨久行役而不來使我心悠悠然思之曷何也何時能來望之也程子曰日月取其迭往迭來之意又日月陰陽相配而不相見又旦暮所見動人情思總包意其閒嚴氏粲曰視日月之往來則君子之從役積時已久矣使我心悠悠然長思之道路之遠如此不知何時能歸乎一章言初往之時二章言其去漸遠三章言日月之久辭之序也百爾君子不知德行下孟反叶户郎反不忮之豉反不求何用不臧集傳賦也百猶凡也忮害求貪臧善也言凡爾君子鄭氏康成曰爾汝也豈不知德行乎若能不忮害又不貪求胡氏安國曰不忮則能懲忿不求則能窒慾陳氏傅良曰忮心生於忿怒求心生於貪慕故人之恥貧賤患難者能不忮則或入於求能不求則或入於忮故忮者常生於嫉人求者常至於枉已李氏閎祖曰忮是疾人之有求是恥已之無則何所爲而不善哉憂其遠行之犯患冀其善處而得全也集說張子曰不忮不求是大夫妻言其夫也呂氏祖謙曰婦人思其君子之切而知其未得歸也於是復自解曰凡百君子但不忮害不貪求則何所用而不善雖久處軍旅之閒固未害也朱氏公遷曰仁則不忮義則不求此所謂德行也思君子之詩多矣而未有及於德行者此雄雉之所以爲賢也徐氏光啓曰勉君子而曰百爾詩人詞不迫切處且衆人皆知德行然後朋儕之閒和氣充溢推賢讓美兩俱無傷也不敢望其歸而但願其以善處得全王風苟無飢渴亦此意顧氏夢麟曰六帖云念其乆處不常但得保全亦幸正思之最深最切處漢書萬里之外以身爲本附錄嚴氏粲曰不欲斥國君而呼其夫之同寮告之言我婦人不知如何爲德行也我但知人若不忮害不貪求則無往而下善譏其用兵非忮則求國人所患也總論程子曰瞻彼日月悠悠我思道之云遠曷云能來思之深也百爾君子不知德行不忮不求何用不臧勉以正也朱氏善曰雄雉四章前三章皆所謂發乎情後一章乃所謂止乎禮義蓋閨門之内以愛爲主則雖思之之切是亦情之正也惟其思之也切故其憂之也深惟其憂之也深故其勉之也至忮求者皆取禍之道也必能不忮害不貪求乃可以自免於患矣噫不忮不求此孔門克已之術求仁之方而行役之婦人能言之其亦可謂賢也已此其所以爲先王之遺澤也歟雄雉四章章四句集說謝氏良佐曰君子之於詩非徒誦其言又將以考其情性非徒以考其情性又將以考先王之澤蓋法度禮樂雖亡於此猶能幷與其深微之意而傳之故其爲言率皆樂而不淫憂而不困怨而不怒哀而不傷如綠衣傷已之詩也不過曰我思古人俾無訧兮擊鼓怨上之詩也不過曰土國城漕我獨南行至軍旅數起大夫久役止曰自詒伊阻行役無期度思其危難以風焉不過曰苟無飢渴而已作詩者如此讀詩者其可以邪心讀之乎案此詩乃婦人怨曠之辭序說以爲刺或是推本而言然篇中無此義也鄭康成泥之遂多謬解當以朱子集傳爲精匏有苦葉濟有深涉深則厲淺則揭苦例反集傳比也匏瓠也匏之苦者不可食特可佩以渡水而已然今尚有葉則亦未可用之時也孔氏穎逹曰外傳魯語叔向曰苦匏不材於人供濟而已韋昭注云不材於人言不可食佩匏可以渡水也嚴氏粲曰匏經霜其葉枯落然後乾之腰以渡水陳氏子龍曰匏似􅉚而圓亦曰壺盧性善浮腰之可以涉水鶡冠子中流失船一壺千金濟渡處也行渡水曰涉以衣而涉曰厲褰衣而涉曰揭爾雅繇膝以下爲揭繇膝以上爲涉繇帶以上爲厲孔氏穎逹曰深淺各有所對此深涉不可渡則深於厲矣厲言深者對揭之淺耳爾雅以由帶以上由膝以下釋之明過此不可厲也其實由膝以上亦爲厲耳此刺淫亂之詩言匏未可用而渡處方深行者當量其淺深而後可渡以比男女之際亦當量度禮義而行也集說毛氏萇曰遭事制宜如遇水深則厲淺則揭矣男女之際安可以無禮義將無以自濟也朱子曰匏尚有葉是未有霜而成實之時濟渡之處又有深涉未可以渡也許氏謙曰以水喻禮涉是徒步渡水之名水淺可涉則是合禮而可行者也水深險而不可涉則是非禮而不可行者也今濟處有深涉是不可涉者也況匏尚未可爲浮渡之器以比非禮絶不可行之事是指淫亂而言也然於可渡處又當分擇深淺以厲以揭比事有合禮可行而又須擇義謂雖於禮可成男女之好又擇義而行之可也四句作兩截看深涉之深非深厲之深深涉是水太深而不可涉者下面是水可涉而又就其中度淺深而厲揭也朱氏善曰行者之涉水必度乎水勢之深淺而揭厲之男女之昏姻必審乎事理之可否而從違之彼不度可否而率意妄行者未有不階於惡者也朱氏道行曰匏有葉則未可剖而繫以渡涉有深則未可輕而槩云濟就著涉之可濟處言深者厲淺者揭亦各有宜彼男女昏姻少長良賤豈無其宜而得私相暱就耶附錄序曰刺衞宣公也公與夫人竝爲淫亂鄭氏康成曰夫人謂夷姜孔氏穎逹曰知非宣姜者以宣姜適伋爲公所要云雉鳴求其牡明是夷姜毛以爲匏有苦葉不可食濟有深涉不可渡以興禮有不可越鄭以爲過水各隨淺深之宜以興男女長幼之序以求昏君何犯禮而烝於夷姜乎范氏祖禹曰深則厲淺則揭宜斟酌也宣公夫人不顧禮義猶不度水之深淺而欲濟也有瀰彌爾反濟盈有鷕以小反雉鳴濟盈不濡軌居美反叶居有反雉鳴求其牡集傳比也瀰水滿貌鷕雌雉聲軌車轍也張氏學龍曰說文曰軌車轍也從車九軓車軾前也從車凡音犯諸家辨之詳矣然集傳獨從軌蓋以九牡聲之叶也軌聲則難叶矣羅氏中行曰周禮輈人疏轍廣謂之軌轂末亦爲軌韻㑹曰車軸謂轊頭也轊卽車頭之端貫轂者車輪廣狹高下皆定於軌軌同則轍迹亦同後人因謂車轍亦曰軌曲禮塵不出軌以高下言中庸車同軌以廣狹言蓋車輪崇六尺六寸軌居輪中若濡軌則水涉三尺三寸飛曰雌雄走曰牝牡夫濟盈必濡其轍雉鳴當求其雄此常理也今濟盈而曰不濡軌雉鳴而反求其牡以比淫亂之人不度禮義非其配耦而犯禮以相求也集說陸氏佃曰以雌求雄者淫也非特以雌求雄而又求牡焉者亂也朱子曰承上章之興以爲比也蓋以匏有苦葉興濟有深涉以濟盈興雉鳴然後雉求其牡比淫亂之人此亦詩之一體也張氏學龍曰走曰牝牡此爾雅釋獸之正例諸家以牝雞雄狐爲證言飛走通也殊不識詩人之意曰當濡其轍今乃不濡其轍迹是大可怪也當求其雄今乃求其牡獸是大異常也如此歌之則得詩人之意如集傳之旨也附錄孔氏穎逹曰言濟盈者必濡其軌今言不濡軌是濟者不自知以興淫亂者必違禮義今云不違禮是夫人不自知夫人違禮淫亂不由其道猶雉鳴求其牡也今雌雉鳴也乃鳴求其走獸之牡非其道以興夷姜母也乃媚悅爲子之容非所求也夫人非所當求而求之是犯禮不自知也雝雝鳴鴈叶魚肝反旭許玉反日始旦士如歸妻迨冰未泮集傳賦也雝雝聲之和也孔氏穎逹曰生執之以行禮故言鴈聲鴈鳥名似鵝畏寒秋南春北旭日初出貌毛氏萇曰日始出謂大昕音欣之時昏禮李氏如圭曰娶妻之禮以昏爲期因以名焉日入二刻半爲昏納采用鴈鄭氏康成曰鴈者隨陽而處似婦人從夫故昏禮用焉孔氏穎逹曰六禮惟納徵用幣餘皆用鴈程子曰取其不再偶也朱子曰凡贄用生鴈左首以生色繒交絡之劉氏瑾曰集傳但言納采用鴈者惟舉六禮之始耳陳氏子龍曰本草衍義鴈得中和之氣熱卽北寒卽南以就和氣所以爲禮幣者一取其信二取其和親迎以昏而納采請期以且鄭氏康成曰自納采至請期皆用昕親迎用昏孔氏穎逹云用昕者君子行禮貴其始親迎用昏鄭氏曰取陽往陰來之義歸妻以冰泮而納采請期迨冰未泮之時鄭氏康成曰歸妻使之來歸於已謂請期也冰未㪚正月中以前也二月可以昏矣言古人之於婚姻其求之不㬥而節之以禮如此以深刺淫亂之人也集說輔氏廣曰此章言昏姻之常理以刺淫亂者之不然也胡氏一桂曰味士如歸妻之辭可見是刺淫者若責之曰士如欲歸妻自有昏姻之禮何得如此淫亂也朱氏善曰棄禮則必至於妄作違義則必至於妄求此淫亂之人所以逆理犯分而不顧也附錄嚴氏粲曰此章陳昏姻之正禮以刺淫亂言有雝雝然和聲之鴈於日出旭然而明始旦之時行納采之禮也士之娶妻當及九月霜降之後正月冰未泮㪚之前士猶以禮而成昏豈可以國君而肆情犯禮招招照遥反舟子叶奨里反人涉卬五郎反否叶補美反人涉卬否卬須我友叶羽軌反集傳比也招招號召之貌孔氏穎逹曰王逸云以手曰招以言曰召舟子舟人主濟渡者卬我也舟人招人以渡人皆從之而我獨否者待我友之招而後從之也以比男女必待其配耦而相從而刺此人之不然也集說毛氏萇曰人皆涉我友未至我獨待之而不涉以言室家之道非得所適貞女不行非得禮義昏姻不成嚴氏粲曰一章二章以徒涉喻犯禮此章以待舟喻得禮朱氏道行曰末復以濟渡託比與首章應見舟涉者不泛從舟子之招而惟我友之須乃淫者隨招卽赴不須我耦是以終身之託反不若一航之渡也結此示法非獨守淺深厲揭之常亦以避濡軌求牡之誚矣徐氏鳳彩曰上章於迨字見不迫此章於須字見不苟附錄鄭氏康成曰舟人之子號召當渡者猶媒人之㑹男女無夫家者使之爲妃匹人皆從之而渡我獨否張氏彩曰上章言遵禮之士以申刺宣公此章言守禮之女以申刺夷姜有招我者猶未可輕往況以女而反求男乎總論輔氏廣曰此詩意雖正而體製異於諸作若有不敢正言之意一章言爲事當有所度量二章言苟不能度量則必至於反常而逆理三章則詔之以昏姻常理四章則言人當有可有不可以刺淫亂之人亂常逆理而無有不可也許氏謙曰濟盈不濡軌應一章下兩句雉鳴求其牡應一章上兩句三章言昏禮之正卽深厲淺揭之意而濟盈不濡軌之反四章言非類不可從卽濟有深涉之意而雉鳴求其牡之反附錄呂氏祖謙曰此詩刺宣公之淫亂然一章二章四章皆以物爲比而不正言其事三章雖言昏禮特舉士之歸妻蓋不欲斥言之而以小喻大也所謂主文而譎諫也匏有苦葉四章章四句集說嚴氏粲曰匏有苦葉新臺牆有茨君子偕老鶉之奔奔著衛滅之由也沈氏守正曰通詩旁取託喻而未嘗直指其人陳說古義而未嘗一及今事譏刺之意隱然見於言外風人之旨也案此篇朱子云未有以見其爲刺宣公夫人之詩故泛指爲淫亂之人況作此詩者通篇是比喻意旨微婉絶不顯斥原無可據以詮釋第中云雉鳴求其牡則與泛刺淫亂者不同且古序與詩同時而出亦無以斷其必不然也姑存之而不削習習谷風以陰以雨黽勉同心不宜有怒叶暖五反采葑孚容反采菲妃鬼反無以下體德音莫違及爾同死叶想止反集傳比也習習和舒也東風謂之谷風毛氏萇曰陰陽和而谷風至孔氏穎逹曰孫炎曰谷之言穀穀生也谷風者生長之風陰陽不和卽風雨無節故陰陽和乃谷風至陳氏推曰陰陽之氣嘘則爲風濡則爲雨雨非風所致然谷風至陰陽和故常以陰而雨葑蔓菁也陳氏子龍曰埤雅云蕪菁似菘而小有臺一名葑一名須俗謂之臺菜其紫花者謂之蘆菔一名萊菔所謂温菘也梗長葉瘦高者謂菘葉闊厚短者爲蕪菁菲似葍莖麤葉厚而長有毛爾雅釋草菲芴孫氏炎曰葍類也郭氏璞曰卽土爪也下體根也葑菲根莖皆可食而其根則有時而美惡嚴氏粲曰江南有菘江北有蔓菁相似而異春食苖夏食心秋食莖冬食根菲葍類爾雅謂蔥菜河内謂蓿菜三月中烝爲茹滑美可作羹根如指正白可啖德音美譽也婦人爲夫所棄故作此詩以叙其悲怨之情言陰陽和而後雨澤降如夫婦和而後家道成故爲夫婦者當黽勉以同心嚴氏粲曰黽勉猶勉強也力所不堪心所不欲而勉強爲之皆謂之黽勉而不宜至於有怒又言采葑菲者不可以其根之惡而棄其莖之美如爲夫婦者不可以其顔色之衰而棄其德音之善但德音之不違則可以與爾同死矣集說鄭氏康成曰二菜皆上下可食然而其根有美時有惡時采之者不可以根惡時幷棄其葉喻夫婦以禮義合顔色相親亦不可以顔色衰棄其相與之禮程子曰陰陽交和則感陰而成雨原注其感也陰其成也雨夫婦之道當黽勉和同不宜有怨怒也蓋和則夫婦之道成而室家正如陰陽和而成雨也夫婦之道貴於有終德音好音也當期好音無違至於偕老輔氏廣曰上四句以陰陽之和比夫婦之和下四句以葑菲根比婦人之色鄒氏泉曰上四句言室家之當和下是言已德之可取此只論夫婦之常道以見今日之不然也沈氏守正曰德音卽照下治家勤生等事苟能如是是亦足以偕老矣無夫婦而論色之道也行道遲遲中心有違不遠伊邇薄送我畿音祈誰謂荼音徒苦其甘如薺音泚宴爾新昏如兄如弟待禮反集傳賦而比也遲遲舒行貌違相背也畿門内也孔氏穎逹曰畿者期限之名故周禮九畿及王畿千里皆期限之義楚茨傳曰畿期也經云不遠言至有限之處故知是門内呂氏祖謙曰韓愈譴瘧鬼詩云白石爲門畿蓋以畿爲閫内也必有所據可以發明毛氏之說荼苦菜蓼屬也陸氏璣曰荼生山田及澤中得霜甜脆而美所謂董荼如飴内則云濡豚包苦用苦菜是也邢氏昺曰荼味苦月令孟夏苦菜秀是也葉似苦苣而細斷之有白汁花似菊堪食但苦耳詳見良耜薺甘菜陶氏𢎞景曰薺味甘人取其葉作葅及羮亦佳宴樂也新昏夫所更娶之妻也言我之被棄行於道路遲遲不進蓋其足欲前而心有所不忍如相背然而故夫之送我乃不遠而甚邇亦至其門内而止耳又言荼雖甚苦反甘如薺以比已之見棄其苦有甚於荼而其夫方且宴樂其新昏如兄如弟而不見恤陳氏鵬飛曰物莫苦於荼婦人見棄其情甚苦則荼反甘於薺矣蓋婦人從一而終今雖見棄猶有望夫之情厚之至也劉氏瑾曰上四句賦其望夫之意而及其夫之薄情下四句則比已之甚苦而歎其夫之方樂賦體與比體相繼成章後凡言賦而比者文意亦放此云集說鄭氏康成曰言君子與己訣别送我裁於門内無恩之甚程子曰我行道而遲遲者中心念其有違乎此也朱氏公遷曰此章見棄之時不忍絶意於夫而夫則絶意於已也涇以渭濁湜湜音殖其沚音止宴爾新昏不我屑以毋逝我梁毋發我笱古口反我躬不閱遑恤我後胡口反集傳比也涇渭二水名涇水出今原州百泉縣皇輿表今陜西平涼府鎭原縣笄頭山東南至永興軍高陵皇輿表今陜西西安府高陵縣入渭渭水出渭州渭源縣皇輿表今陜西臨洮府渭源縣鳥鼠山至同州馮翊縣皇輿表今陜西西安府同州入河呂氏祖謙曰詩人多述土風此衛詩而遠引涇渭者蓋涇濁渭清天下所共知如云海鹹河淡也湜湜淸貌許氏愼曰湜水清見底沚水渚也朱氏道行曰沚涇流之别出者不與渭合停之徐清故曰湜湜屑潔以與逝之也梁堰音宴石障水而空音控其中以通魚之往來者也笱以竹爲器而承梁之空以取魚者也閲容也涇濁渭淸然涇未屬渭之時雖濁而未甚見由二水旣合而淸濁益分然其别出之渚流或稍緩則猶有淸處婦人以自比其容貌之衰久矣又以新昏形之益見憔悴然其心則固猶有可取者但以故夫之安於新昏故不以我爲潔而與之耳又言毋逝我之梁毋發我之笱以比欲戒新昏毋居我之處毋行我之事鄭氏康成曰毋者喻禁新昏之女毋之我家取我爲室家之道而又自思我身且不見容何暇恤我已去之後哉知不能禁而絶意之辭也集說孔氏穎逹曰婦人旣言君子苦已又本已見薄之由言涇水以有渭水清故見涇水濁以興舊室以有新昏美故見舊室惡本涇水雖濁未有彰見由涇渭水相入而清濁異言已顔色雖衰未至醜惡由新舊幷而善惡别已雖爲君子所惡尚湜湜然持正守初其狀如沚然不動摇可用爲室家矣君子何爲安樂女之新昏則不復潔飾用我歐陽氏修曰禁其新昏毋逝我梁毋發我笱言棄妻將去猶顧惜其家之物旣而歎曰我身不容安得恤後事乎蘇氏轍曰梁笱皆所設以取魚逝人之梁而發人之笱因人之成功之謂也新昏因舊室之成業不知其成之難則將輕用之我雖見棄猶憂其後之不繼也故告而止之旣而曰我躬且不容何暇恤我後哉知告之無益之詞也輔氏廣曰不忍遂棄其家事者仁也知其不能禁而絶意焉者知也許氏謙曰毋逝我梁謂勿踰越我成家規模毋發我笱謂勿敗我所爲之事雖去而猶有顧其家之意朱氏公遷曰言已之容貌雖衰而德猶可取者然夫旣絶意於已則已無可奈何矣在已且然況暇爲新昏計哉沈氏守正曰涇之濁以合流形之而濁假令於其沚觀之未始不清也色之衰以新昏形之而衰假令略色而求之未始無可稱也附錄程子曰涇濁而渭清今涇反以渭爲濁湜湜清貌視於淺處則見清彼以爲濁而其沚自湜湜以言其惑而不能正也呂氏祖謙曰涇新昏也渭舊室也涇渭旣合則清濁易惑於洲渚淺處視之渭之清猶可見也就其深矣方之舟之就其淺矣泳之游之何有何亡黽勉求之凡民有喪匍音蒲匐蒲卜反救叶居尤反之集傳興也方桴許氏愼曰方倂船也徐氏鍇曰竝兩船也舟船也潛行曰泳浮水曰游劉氏瑾曰泳與游今俗所謂㴹與泅也匍匐手足竝行急遽之甚也許氏愼曰匍手行也匐伏地也孔氏穎逹曰匍匐本小兒未行之狀其盡力顚蹶似之故取名婦人自陳其治家勤勞之事言我隨事盡其心力而爲之深則方舟淺則泳游不計其有與亡而勉強以求之毛氏萇曰有謂富也亡謂貧也孔氏穎逹曰隨水深淺期於必渡以興隨事難易期於必成不問貧富我皆盡力求之劉氏瑾曰深淺以興有亡方舟泳游以興勉求也又周睦其鄰里鄉黨莫不盡其道也集說鄭氏康成曰君子何所有乎何所亡乎吾其黽勉勤力爲求之有求多亡求有凡於民有凶禍之事鄰里尚盡力往救之況我於君子之家事難易乎固當黽勉以疏喻親也張子曰皆婦人曲狥其夫之言輔氏廣曰勤勞家事周恤鄰里卽首章之所謂德音下章之所謂我德也婦人無外事以勤家睦鄰爲德而已此可見其勤而不怨顧氏起元曰治家睦鄰皆就相夫說而睦鄰又治家中餘事見其無所不盡也有則慮其亡而不以有爲足無則冀其有而不以無爲辭正黽勉求之處朱氏道行曰此章叙黽勉同心時事以深淺之就起有亡之求有喪之救揭出哀死一節相夫子恤鄰敦厚德音遐布不是說自家去救不我能慉許六反反以我爲讎旣阻我德賈音古用不售市救反叶市周反昔育恐育鞠居六反及爾顚覆芳服反旣生旣育比予于毒集傳賦也慉養阻却鞠窮也黄氏一正曰育生理也生理不遂曰鞠承上章言我於女家勤勞如此而女旣不我養而反以我爲仇讎惟其心旣拒却我之善故雖勤勞如此而不見取如賈之不見售也程子曰凡人所以憎而不知其善者由其心阻絶其善故也鄒氏泉曰售謂物出手也猶諺云賣去也因念其昔時相與爲生惟恐其生理窮盡而及爾皆至於顚覆今旣遂其生矣乃反比我於毒而棄之乎張子曰育恐謂生於恐懼之中育鞠謂生於困窮之際亦通李氏樗曰正所謂將恐將懼惟予與汝將安將樂汝轉棄予是也輔氏廣曰或問昔育恐育鞠張子之說固善然推之下文及爾顚覆之云意不甚貫不若前說爲順先生曰此姑存異義耳然舊說亦不甚明白耳集說朱氏公遷曰此章言故夫棄我之確然如此患難相保安樂相違可怨也我有旨蓄勅六反亦以御魚呂反下同冬宴爾新昏以我御窮有洸音光有潰戸對反旣詒我肄羊至反不念昔者伊余來墍集傳興也旨美蓄聚御當也洸武貌潰怒色也項氏安世曰洸水涌也其勇如水涌水之潰者其勢横㬥而四出故怒之盛者爲潰肄勞墍息也黄氏一正曰婦三月廟見然後執婦功故婦初來曰息也又言我之所以蓄聚美菜者蓋欲以禦冬月乏無之時至於春夏則不食之矣劉氏瑾曰古人場圃同地秋杪則築堅圃地爲場以納禾稼至來春又耕治之以種菜茹故蓄菜但以禦冬也今君子安於新昏而厭棄我是但使我禦其窮苦之時至於安樂則棄之也朱氏公遷曰物可棄陳而取新夫婦不可圖新而厭舊此以處置事理不同爲興又言於我極其武怒而盡遺我以勤勞之事曾不念昔者我之來息時也追言其始見君子之時接禮之厚怨之深也集說孔氏穎逹曰言窮苦取我至於富貴而見棄似冬月蓄菜至於春夏則見遺也曾氏鞏曰人之於物得新可以捐故然厚者猶有所不忍夫婦義當偕老乃姑以御窮而已其薄惡可知蘇氏轍曰蓄美菜者所以御冬月之無也今君子亦以我御窮而已及其富樂則不我以不念昔者由我而獲此安息也輔氏廣曰末二章又可見其怨而不怒黄氏佐曰此章旣興其同乎苦而反棄於樂因言其薄於今而曾厚於始見得當時亦如兄如弟來昔何厚而今何薄昔何愛而今何忍也此詩須反覆玩味方見悲怨之情上下相承可謂善作者矣陳氏所學曰詒肄非言平日治家勤勞之事乃將棄時故委以艱難勞苦之事令彼處之不能而後藉口棄之也朱氏道行曰洸潰因夫新昏揭此以與宴爾相形不勝苦樂之别總論徐氏常吉曰此詩以顔色之衰德音之善作主而治家勤勞亦卽其德中事篇中屢言德音見已無可棄之罪也首章先論夫婦之常理見不當以色故棄之而夫也不然二章遂有見棄之事三章乃推言所以見棄者正爲顔色之衰而不取其德也四章乃自道勤勞以見其無可棄五章又原夫之不有其德者由其本心拒却其善來但念勞於貧苦之時而棄於安樂之後人情尤不能堪耳末章文言夫之忍且薄如此因追念其來時之厚而怨之深也沈氏守正曰首章言夫婦之常道下反覆陳已見棄之情事中以德色爲主夫重色所以棄已有德所以悲谷風六章章八句集說朱子曰皆述逐婦之辭也宣姜有寵而夷姜縊是以其民化之而谷風之詩作所謂一國之事繫一人之本者如此輔氏廣曰觀此一詩比物連類因事興詞條理秩然有序勤而不怨怨而不怒玩而味之可謂賢婦人矣而見棄於夫者亦獨何哉朱氏善曰谷風雖棄婦所作而觀其自序有治家之勤有睦鄰之善有安貧之志有周急之義皆其節之可取者也至於見棄矣而拳拳忠厚之意猶藹然溢於言辭之表則是初無可棄之罪也徒以其夫之安於新昏不以爲潔而棄之耳然其言之有序而不迫如此殆庶幾乎夫子所謂可以怨者矣式微式微胡不歸微君之故胡爲乎中露集傳賦也式發語辭微猶衰也再言之者言衰之甚也爾雅式微式微者微乎微者也孔氏穎逹曰以君被逐旣微又見卑賤是至微也微猶非也劉氏瑾曰此章二微字義不同中露露中也言有霑濡之辱而無所芘覆也舊説以爲黎侯失國陸氏德明曰杜預云黎在上黨壺關縣段氏昌武曰曹曰黎侯國也壺關縣有黎亭東郡有黎縣未知孰是嚴氏粲曰陳曰黎上黨之東卽古衞地衛之附庸也王氏志長曰呂氏春秋謂武王封帝堯後於黎城而寓於衛鄭氏康成曰寓寄也黎侯爲狄人所逐棄其國而寄於衞孔氏穎逹曰被逐而云寄者若春秋出奔之君所在亦曰寄左傳曰齊以郲寄衛侯是也喪服傳曰寄公者何失地之君也謂削地盡者與此别其臣勸之曰衰微甚矣何不歸哉我若非以君之故則亦胡爲而辱於此哉沈氏守正曰微君之故者非怨之也激其君以有爲也集說鄭氏康成曰君何不歸乎禁君留止於此之辭孔氏穎逹曰主憂臣辱主辱臣死故當不憚淹恤今言我若無君何爲處此自言已勞以勸君歸是極諫之辭輔氏廣曰式微式微胡不歸羞惡之心義之端也微君之故胡爲乎中露忠敬之誠仁之至也式微式微胡不歸微君之躬胡爲乎泥中集傳賦也泥中言有陷溺之難而不見拯救也集説李氏樗曰凡失國者云越在草莽卑賤曰辱在泥塗黃氏震曰中露泥中諸家以爲辱在泥塗是也古注以爲二邑名李迂仲以爲無所據愚恐亦無一身處二邑之理總論范氏處義曰臣子之微亦何足言以君之故不可在此㬥露也以君之躬不可在此泥塗也爲衞不能振起其微不若謀歸故國之爲愈也朱子語類問式微詩以爲勸耶戒耶曰亦不必如此看只是隨他當時所作之意如此可見得有羇旅狼狽之君如此而方伯連帥無救恤之意嚴氏粲曰時狄已退黎侯可以歸而不歸猶望衞之助已也其臣知衞宣之不足賴故勸以歸姚氏舜牧曰此詩雖勸黎侯之歸亦有責衞君之意觀其詞曰胡爲乎中露胡爲乎泥中蓋情見乎詞矣附錄毛氏萇曰中露泥中衛邑也鄭氏康成曰黎侯寄於衛衞處之以二邑水經河水東北過黎陽縣南注詩式微黎侯寓於衞是也曹氏學佺曰考黎侯寓衛泥中中露二邑今在束離狐城者是隋開皇中置廩邱縣於此側近卑濕城居水阜案毛萇以中露泥中爲二邑當非無本但周時地理已屬荒邈難稽而後代都邑志所載或因經而附㑹其說不若宋儒以中露泥中作霑濡陷溺解於詩義尤爲深長也式微二章章四句集傳此無所考姑從序說集說朱氏公遷曰衛有他國之詩六篇式微旄丘河廣作於衞者也載馳泉水竹竿爲衞而作者也作於衞者衞國之所錄爲衞而作者衞國之所傳旄丘之葛叶居謁反兮何誕徒旱反之節兮叔兮伯叶音逼兮何多日也集傳興也前高後下曰旄丘孔氏穎逹曰釋邱云前高旄丘李廵云謂前高後卑下以前高後必卑下故傳亦言後下王氏應麟曰寰宇記旄丘在澶州臨河縣東誕闊也叔伯衞之諸臣也舊說黎之臣子自言久寓於衞時物變矣故登旄丘之上見其葛長大而節疎闊因託以起興曰旄丘之葛何其節之闊也衞之諸臣何其多日而不見救也此詩本責衞君而但斥其臣可見其優柔而不迫也集說呂氏祖謙曰葛初生其節蹙而密旣長其節闊而疎黎人見葛之長感時之久而衞猶未見救爾嚴氏粲曰黎臣子感寄寓之久也尊稱衞臣而問之曰叔兮伯兮何其多日而不見救也君臣一體不斥其君而責其臣婉辭也鄒氏泉曰此章卽時物變之久興衞臣救之緩也以多日爲言者望之之意切也何其處也必有與也何其久叶舉里反也必有以也集傳賦也處安處也與與國也以他故也因上章何多日也而言何其安處而不來意必有與國相俟而俱來耳又言何其久而不來意其或有他故而不得來耳詩之曲盡人情如此集說王氏鏊曰雖多日而不救宜亦爲之不安也而今何以安處不來使果結與而來今亦可以至矣而何以久而不至知其不來而猶望其來詩之曲盡也如此沈氏守正曰曰必有與必有以便見無與無以自當不遑起居不俟終日者何爲若是之處且久也哉狐裘蒙戎匪車不東叔兮伯兮靡所與同集傳賦也大夫狐蒼裘玉藻君子狐青裘豹褎𤣥綃衣以裼之注君子大夫士也蒙戎亂貌言弊也呂氏祖謙曰蒙戎狐裘之貌晉士蔿曰狐裘蒙茸黄氏一正曰言葛而又言裘時歴冬夏見其久也又自言客久而裘弊矣豈我之車不東告於女乎但叔兮伯兮不與我同心雖往告之而不肯來耳至是始微諷切之或曰狐裘蒙戎指衞大夫而譏其憒音潰亂之意匪車不東言非其車不肯東來救我也但其人不肯與俱來耳今案黎國在衞西前說近是孔氏穎逹曰杜預云上黨壺關縣有黎亭是在衛之西也嚴氏粲曰黎在衞西爲狄所逐入衞境而寓亦在西故往衛則東舊說越國而寓東非也集說毛氏萇曰無救患卹同也蘇氏轍曰諸侯雖異國而相爲救苟黎亡則衛及矣奈何靡所與同哉蓋時衞在河北黎衞壤地相接故狄之爲患黎衞共之嚴氏粲曰衞人不恤黎患謂利害不切於已耳不知脣亡齒寒黎實衛之附庸利害同之衞人不思同患之義是以有滎澤之敗鄒氏泉曰此章上二句驗已寓衞之乆下卽其所以不救者諷之也不與已同心謂我有亡國之憂而彼無憫恤之意我有恢復之念而彼無拯救之心是已不言不肯救而只言不與已同心此正所謂微諷切之也叔伯之不來乃自不來耳非眞有與國之約他故之臨也朱氏道行曰不言秦越之視僅言心之靡同故注以爲微諷也瑣素果反兮尾兮流離之子叶奬里反叔兮伯兮褎由救反如充耳集傳賦也瑣細尾末也流離漂㪚也王氏安石曰黎侯之臣子流離失職故瑣尾也褎多笑貌充耳塞耳也耳聾之人恒多笑鄭氏康成曰言衞之諸臣顔色褎然如見塞耳無聞知也人之耳聾恒多笑而已黃氏櫄曰言衞侯褎如服充耳而不聞也淇奥詩云充耳琇瑩蓋充耳者瑱也天子以玉諸侯以石言黎之君臣流離瑣尾若此其可憐也而衞之諸臣褎然如塞耳而無聞何哉至是然後盡其詞焉流離患難之餘而其言之可序而不迫如此其人亦可知矣輔氏廣曰褎如充耳責之也自緩而疑自疑而諷自諷而責是皆性情之正也集說李氏樗曰瑣尾流離殆從王氏之說爲優蓋詩人之意謂黎侯窮困於此瑣細而尾末矣流離而失職矣而衞之諸臣不能救之蓋責之深也嚴氏粲曰責其不能聽已之訴如以瑱塞耳而無聞也鄒氏泉曰此章上二句言已寓衞之勢微下直責衞之不救也總論劉氏辰翁曰一章何多日也未有怨望之意也二章必有與也必有以也有望於衞未怨也三章靡所與同微怨也四章褎如充耳不能不怨也朱氏公遷曰一章怪之二章疑之三章微諷之四章直責之式微處困而思奮旄丘責人而不刻可謂賢矣馮氏時可曰黎之臣子望救於衞其詞雖危廹而終無責人之意此所謂處患難而不失其正也案旄丘篇毛鄭專主責衞說次章必有與責衞不行仁義必有以責衞不務功德繼言實有戎車不肯迎我末章責衞諸臣褎然有尊盛之服而德不能稱也朱子則以與國訓與字以他故訓以字測其必有而緩來故三章疑其無與同心者而不來蓋救災分患非一國所能獨任觀齊晉主盟凡役必合諸侯可見至於終不見恤乃知非無與國非有他故乃衞之君臣褎如充耳若罔聞知也曲折以體其情而終乃質言以責之尤見忠厚之意旄丘四章章四句集傳說同上篇集說孔氏穎逹曰作旄丘詩者責衞伯也黎侯出奔來寄於衛以衞爲州伯當修連率之職以救於已今衞侯不能修職不救於已故黎之臣子以此言責衞而作此詩也李氏樗曰衞無救患之志不惟不能睦乃四鄰以至脣亡齒寒而國亦不保矣其後衞爲狄所滅齊桓公以管仲之言而救之觀木𤓰之詩知衞人之德桓公者深觀此詩知黎人之怨衞爲最切黄氏櫄曰衛失國而齊救之黎失國而衞不救此齊之所以伯而衞之所以不振也簡兮簡兮方將萬舞日之方中在前上處集傳賦也簡簡易不恭之意萬者舞之總名武用干戚文用羽籥也呂氏祖謙曰萬舞者二舞之總名干舞者武舞之别名籥舞者文舞之别名也鄭康成據公羊傳以萬舞爲干舞誤也春秋書萬入去籥言文武二舞俱入以仲遂之喪去其有聲者故去籥焉若萬舞止爲武舞則此詩與商頌何爲獨言萬舞而不及文舞耶左傳載考仲子之宮將萬焉婦人之廟亦不應獨用武舞也然則萬舞爲二舞之總名明矣劉氏瑾曰干盾也戚斧也羽籥此詩三章所言者是也皆舞者所執之物日之方中在前上處言當明顯之處賢者不得志而仕於伶官鄭氏康成曰伶氏世掌樂官而善焉故後世多號樂官爲伶官范氏處義曰伶官之名起於黄帝之臣伶倫取崑崙之竹吹黃鐘之宮至周景王問無射於伶州鳩後世遂以名之有輕世肆志之心焉故其言如此若自譽而實自嘲也集說孔氏穎逹曰衞之賢者仕於伶官之賤職伶官者樂官之總名仕於伶官在舞職者也諸侯有樂正之屬此賢者身在舞位在賤吏之列必非樂正也輔氏廣曰此章旣自以爲簡易次章又自以爲碩人只此便可見其爲不恭也當明顯之處公然爲此而不以爲辱亦是不恭之意與次章所謂公庭萬舞同先生謂其若自譽而實自嘲者深得其旨也碩人俁俁疑矩反公庭萬舞有力如虎執轡如組音祖集傳賦也碩大也俁俁大貌轡今之韁也組織絲爲之言其柔也御能使馬則轡柔如組矣朱氏公遷曰人馬皆從容不急迫故轡柔如此又自譽其才之無所不備亦上章之意也劉氏瑾曰旣能樂舞又善御馬亦若上章之自譽而實自嘲也集說程子曰此章言其才藝之美有力如虎才武也執轡如組藝也言其藝如此非在公庭見之也朱氏道行曰稱人曰碩重其品也俁俁指形體亦帶儀度說如虎之力因舞而見執轡如組亦其力能駕馭而周旋折旋不失其馳也此以御之一節言才舉此以見其餘耳附錄孔氏穎逹曰言碩人旣有武力比如虎可以能禦亂矣又有文德能治民如御馬之執轡使之有文章如織組矣以御者執轡於此使馬騁於彼織組者總紕於此而成文於彼皆動於近成於遠以興碩人能治衆施化於已而有文章在民亦動於近成於遠矣左手執籥餘若反右手秉翟亭歴反叶直角反赫如渥於角反赭音者叶陟畧反公言錫爵集傳賦也執籥秉翟者文舞也籥如笛而六孔或曰三孔陸氏德明曰籥以竹爲之長三尺執之以舞郭璞云形似笛而小孔氏穎逹曰籥雖吹器舞時與羽竝執故得舞名賔之初筵云籥舞笙鼓是也翟雉羽也赫赤貌渥厚漬也赭赤色也言其顔色之充盛也孔氏穎逹曰渥者浸潤之名信南山曰旣優旣渥是也言漬之久厚則有光澤故以興顔色之潤公言錫爵卽儀禮燕飲而獻工之禮也儀禮燕禮主人洗升獻工工不興一人拜受爵胡氏紹曾曰錫爵之禮舊以公庭爲宗廟故云祭末勞翟記所謂祭有畀煇胞翟閽寺也朱子不拘祭祀故引獻工徐氏鳯彩曰工告樂備則主人獻工主人宰夫也然必錫之於君故曰公言錫爵重君命也以碩人而得此則亦辱矣程子曰錫之以爵勞賤者之道乃反以其賚予之親洽爲榮而誇美之亦玩世不恭之意也集說鄭氏康成曰碩人多才多藝又能籥舞言文武道備碩人容色赫然如厚傅丹君徒賜其一爵而已不知其賢而進用之輔氏廣曰前已言其輕世肆志之心又言其玩世不恭之意何也曰意惟輕之是以玩之志惟肆焉故不恭也知其世之不可與有爲故輕玩之心生焉於其所不足爲而姑爲之於其所不足誇而反誇之是皆不恭之意也山有榛側中反隰有苓音零云誰之思西方美人彼美人兮西方之人兮集傳興也榛似栗而小下濕曰隰苓一名大苦葉似地黃卽今甘草也鄭氏康成曰榛苓尘各得其所以言碩人處非其位西方美人託言以指西周之盛王如離騷亦以美人目其君也又曰西方之人者歎其遠而不得見之辭也賢者不得志於衰世之下國而思盛際之顯王故其言如此而意遠矣集說張氏學龍曰榛之實甘美而山有之苓之莖甘美而隰有之以興爲人之君而美好者惟西周有之所以思之者其人也思之而不得見之故重歎而思之深也朱氏公遷曰此章乃見不恭之情實夫其所思者在西方之美人則當世無有可其意者故玩之如此總論朱氏公遷曰一章自譽其位處二章自譽其才力三章自譽其榮寵四章乃言其情實而有鬰鬰之意焉朱氏善曰簡兮簡兮言其志之大也有力如虎言其才之武也執轡如組言其藝之精也赫如渥赭言其貌之充也皆自譽之辭也而不免仕於伶官則亦可辱之甚矣使遇西周之盛王豈使我有是哉盛王旣不可得而見則賤役亦不可得而辭於是而執籥於是而秉翟於是而錫爵於公庭玩其辭則懽然以爲榮揣其意則歉然以爲辱故曰彼美人兮西方之人兮安得言從之遊以寫我心之憂乎此其思也深矣其意也遠矣而世莫之知也噫此輕玩之心所由生也與簡兮四章三章章四句一章六句集傳舊三章章六句今改定張子曰爲祿仕而抱關擊柝則猶恭其職也爲伶官則雜於侏儒俳優之閒不恭甚矣其得謂之賢者雖其迹如此而其中固有以過人又能卷而懷之是亦可以爲賢矣東方朔似之問如張子之說是固可以爲賢然以聖賢出處律之恐未可以爲盡善朱子曰古之伶官亦非甚賤其所執者猶是先王之正樂故獻工之禮亦與之交酢但賢者而爲此則自不得志耳集說李氏樗曰伶官者賤職耳今以賢人乃爲之猶君子陽陽之詩序言君子遭亂相招爲祿仕全身遠害正猶此詩言君子仕於伶官蓋生不遇時屈於賤役也王氏柏曰自古出仕者大略有三端處衰世不擇而仕近於玩侮不恭如簡兮是也亦有盡心竭力不計貧窶歸於天而不怨如北門是也知禍亂之將作相呼而遠遁如北風是也簡兮難學也非自度果有不磷不緇之操其可苟哉北風北門在人審時量力而爲之未可輕相詆訾也毖悲位反彼泉水亦流于淇有懷于衞靡日不思叶新齎反孌力轉反彼諸姬聊與之謀叶謨悲反集傳興也毖泉始出之貌王氏應麟曰毖韓詩作祕說文作䎵泉水卽今衞州共城皇輿表今河南衞輝府輝縣之百泉也淇水出相州林慮音閭縣皇輿表今彰德府林縣東流泉水自西北而東南來注之孌好貌諸姬謂姪娣也毛氏萇曰諸姬同姓之女季氏本曰諸姬同姓媵從之姪娣也與之謀欲其以情逹也衞女嫁於諸侯父母終思歸寜而不得故作此詩言毖然之泉水亦流于淇矣我之有懷于衞則亦無日而不思矣是以卽諸姬而與之謀爲歸衞之計如下兩章之云也集說鄭氏康成曰泉水流而入淇猶婦人出嫁於異國懷至也言我有所至念於衞無日不思也范氏處義曰泉水始出雖毖然而流尚能至於淇淇衞地也可以人而不如彼泉水乎此我所以懷歸衞國無日不在念也孌然諸姬乃衞女所嫁之國娣媵之屬故聊與之謀歸衞之事也輔氏廣曰讀首四句便可見其思歸之思蓋與泉水日流於衞而不息此是興體中說得好者極好玩味凡人之情營私背公故不詢謀惟恐人之或知也衞女思歸博謀於諸姬而無所隱則其情之正大可知矣朱氏公遷曰泉水流淇不易其地女子思歸不忘其慮彼此皆有定向也故以爲興出宿于泲子禮反飲餞音踐于禰乃禮反女子有行遠于萬反父母兄弟待禮反問我諸姑遂及伯姊叶奬禮反集傳賦也泲地名王氏應麟曰地理志禹貢導沇水東流爲泲東郡臨邑有泲廟飲餞者古之行者必有祖道之祭祭畢處者送之飲於其側而後行也毛氏萇曰祖而舍軷飲酒於其側曰餞重始有事於道也孔氏穎逹曰祖道之祭當釋酒脯於軷舍軷卽軷釋也所以爲祖祭者重已方有事於道故祭道之神也軷又名祖聘禮及詩云出祖是也又名道曽子問云道而出是也一祭而三名也皆先軷而飲餞及後出宿此先言出宿者見飲餞爲出宿而設禰亦地名王氏應麟曰寰宇記大禰溝在曹州寃句縣北七十里皆自衞來時所經之處也諸姑伯姊卽所謂諸姬也劉氏瑾曰夫人之嫁必有姪娣二人爲媵而同姓二國往媵之亦有姪娣皆謂之媵凡八人集傳以此詩爲夫人作而以諸姬爲姪娣又謂諸姑伯姊卽諸姬然則八人之中亦有是夫人姑姊軰行者乎言始嫁來時則固已遠其父母兄弟矣況今父母旣終而復可歸哉是以問於諸姑伯姊而謀其可否云耳鄭氏曰國君夫人父母在則歸寜没則使大夫寜於兄弟集說王氏安石曰泲禰蓋父母之國地名欲歸則又思嫁時出宿飲餞相與訣而之夫家附錄鄭氏康成曰婦人有出嫁之道遠於親親故禮緣人情使得歸寜寜則又問姑及姊親其類也先姑後姊尊姑也孔氏穎逹曰衞女思歸言我欲出宿飲餞以嚮衛國爲覲問諸姑遂及伯姊而已豈爲犯禮也哉而止我也范氏處義曰衞女始謀歸必有以遣大夫寜兄弟之禮告之者而衞女之意未能自己謂女子旣嫁雖當遠父母兄弟我今謀歸止欲問父之姊妹與已之伯姊爾舍兄弟而言姑姊遠嫌也案諸姑伯姊鄭孔皆以爲指在母家者而言考公羊傳云諸侯娶一國則二國往媵之以姪娣從未載有姑姊從媵者集傳以諸姬爲姪娣諸姑伯姊卽指所謂諸姬者然無文可證朱子第據詩義而言之耳出宿于干叶居焉反飲餞于言載脂載舝胡瞎反叶下介反還音旋車言邁遄市專反臻于衞此字本與邁害叶今讀誤不瑕有害集傳賦也干言地名王氏應麟曰隋志邢州内邱縣有干言山李公緒曰柏人縣有干山言山柏人邢州堯山縣適衞所經之地也脂以脂膏塗其舝使滑澤也舝車軸也不駕則脫之設之而後行也陸氏德明曰舝車軸頭金也嚴氏粲曰未設舝時先以脂塗其舝其用在脂故曰載脂塗旣畢乃設舝於車其用在舝故曰載舝還回旋也旋其嫁來之車也鄭氏康成曰言旋車者嫁時乘來今思乘以歸呂氏祖謙曰還車猶言回轅遄疾臻至也瑕何古音相近通用言如是則其至衞疾矣然豈不害於義理乎疑之而不敢遂之辭也集說范氏處義曰衞女之意旣未能自己尚欲出宿飲餞而行且欲脂舝其所乘還歸之車使疾至於衞國自謂雖不爲瑕疵而未免有害於禮謂禮當遣大夫也嚴氏粲曰泲禰干言非一時宿餞之地泲禰以下以女子有行言之則爲嫁時曾宿餞之地也干言以下以遄臻于衞言之則爲思歸而欲宿餞之地也言向由泲禰宿餞而來嫁今豈不可由干言宿餞而歸寜乎我思肥泉兹之永歎叶它涓反思須與漕叶徂侯反我心悠悠駕言出遊以寫我憂集傳賦也肥泉水名毛氏萇曰所出同所歸異爲肥泉鄭氏康成曰自衞而來所渡水王氏應麟曰水經注馬溝水出朝歌城北又東流與美溝合又東南注淇水爲肥泉爾雅歸異出同曰肥今是水異出同歸須漕衞邑也鄭氏康成曰自衞而來所經邑孔氏穎逹曰鄘云以廬於漕漕是衞邑須與漕連明亦衞邑悠悠思之長也寫除也旣不敢歸然其思衞地不能忘也安得出遊於彼而寫其憂哉集說朱子語類問恐此只是因思歸不得故欲出遊於國以寫其憂否曰夫人之遊亦不可輕出只是思遊於彼地耳沈氏守正曰思肥泉而永歎思須漕而悠悠不知何日出遊其地以慰我靡日不思之憂哉只如此序過而不可歸之意自在矣總論蘇氏轍曰思歸情之所當然也不歸法之不得已也聖人不以不得已之法而廢其當然之情故閔而錄之也輔氏廣曰思歸寜者思之正也謀及姪娣謀之正也恐害義理而卒於不歸事之正也始終一出於正雖賢士且難之況婦人乎胡氏一桂曰一章託泉水起興而謀於諸姬也二章述初嫁時宿餞衞郊旣遠父母今父母終而欲歸故以問諸姑伯姊何如耳三章又欲效初嫁時宿餞於所嫁國之干言脂舝歸衞苐未知有害於義理乎此正謀諸姬之語四章旣不可歸於是但思肥泉思須漕以重衞國悠悠之景慕欲往遊而寫憂而已所謂發乎情止乎禮義也泉水四章章六句集傳楊氏曰衞女思歸發乎情也其卒也不歸止乎禮義也聖人著之於經以示後世使知適異國者父母終無歸寧之義則能自克者知所處矣朱氏善曰禮緣人情而爲之則父母其根本也兄弟其同氣也皆人情之不可忘者而曷爲其不可以寜兄弟也曰人之情有出於天理之公者有出於人欲之私者據禮女子已嫁而反兄弟不與同席而坐不與同器而食所以厚别也則閨門之内所可同坐而食者惟母姑姊妹耳使父母没而歸寧則誰與同坐誰與共食而孰爲之主乎聖人於此寧以義斷恩不以恩掩義故制爲父母終不得歸寧之禮所以存天理而遏人欲也集說蘇氏轍曰凡詩皆繫於所作之國故木𤓰雖美齊桓而在衞猗嗟雖刺魯莊而在齊泉水載馳竹竿皆異國之詩而在衛者以其聲衞聲歟衞國之女思衞而作詩其爲衞音也固宜猶莊舄之病而越吟人情之所必然也陳氏傅良曰泉水載馳竹竿皆衞女思歸也泉水竹竿作於無事之時故其辭緩以婉載馳賦於故國已亡之日故其辭切以怨出自北門叶睂貧反憂心殷殷終窶其矩反且貧莫知我艱叶居銀反已焉哉叶將其反下同天實爲之謂之何哉集傳比也北門背陽向陰張子曰出自北門是偶出北門因有此言曹氏粹中曰北門忠臣行役之所由出殷殷憂也窶者貧而無以爲禮也毛氏萇曰窶者無禮也貧者困於財孔氏穎逹曰釋言云窶貧也則窶貧爲一此終窶且貧爲二事之辭故窶與貧别窶謂無財可以爲禮貧謂無財可以自給李氏樗曰兼言之以見貧之甚也衞之賢者處亂世事暗君不得其志故因出北門而賦以自比問只作賦說如何朱子曰當作賦而比當時必欲出北門而後作此詩亦有比意思又歎其貧窶人莫知之而歸之於天也季氏本曰謂之何哉無所歸咎之詞集說鄭氏康成曰詩人事君無二志故自決歸之於天我勤身以事君何哉忠之至孔氏穎逹曰此詩人叙仕者之意君不知已而不去是無二志也已困苦應去而不去是終當貧困故言已焉哉是自決也此實由君言天實爲之是歸之於天也君臣義合道不行則去今君於已薄矣猶云勤身以事之知復何哉無去心是忠之至也李氏樗曰終窶且貧君之莫我知也君不我知歸之天而不怨於君乃知天命者之言嚴氏粲曰此蓋從事獨賢之歎也但言貧窶則不見知於君可知非計祿也王事適我政事一埤避支反益我我入自外室人交徧讁知革反叶竹棘反我已焉哉天實爲之謂之何哉集傳賦也王事王命使爲之事也孔氏穎逹曰王事不必天子事直以戰伐行役皆王家之事猶鴇羽云王事靡盬也范氏處義曰王事上所命之事也適之也鄭氏康成曰國有王命役使之事不以之彼必來之我政事其國之政事也范氏處義曰政事職所治之事也一猶皆也埤厚室家讁責也李氏樗曰室人徧讁見其勞苦而窶貧不能無怨陳氏推曰讁謂其貧不能養也王事旣適我矣政事又一切以埤益我其勞如此而窶貧又甚室人至無以自安而交徧讁我朱氏道行曰盡人而求曰交每事而責曰徧則其困於内外極矣集說孔氏穎逹曰此言非直貧窶而外爲君所困内爲家人不知故又自決歸之於天范氏祖禹曰關雎之化行則婦人能閔其君子至於衰世則室家日見而有不知其心者許氏謙曰外不見知於君而不得行其志内爲窶貧之故而有室人之讁困於内外極矣乃一歸之於天非知命樂天之君子能如是乎王氏志長曰王事政事蓋言煩簡鉅細莫不叢集於一身者記曰官盛任使所以勸大臣也此其爲先王之經歟王事敦叶都回反我政事一埤遺唯季反叶夷回反我我入自外室人交徧摧徂回反我已焉哉天實爲之謂之何哉集傳賦也敦猶投擲也陸氏德明曰韓詩云敦迫也孔氏穎逹曰傳云敦厚也箋云敦猶投擲蓋以事與之無所爲厚也故以爲投擲於已黃氏震曰鄭云投擲晦庵取之蓋與王事適我相協若以爲厚則難說矣釋文云迫義亦相近朱氏道行曰敦者投擲煩多一時分理不逮遺加摧沮也鄭氏康成曰摧者刺譏之言孔氏穎逹曰毛以爲室人更責則乖沮已志定本集注皆云摧沮也箋以上章類之言讁已者是室人責已故以摧爲刺譏已也輔氏廣曰摧謂摧折沮抑之又甚於讁也集說李氏樗曰此詩云婦人或讁之或摧之則與殷其靁召南之大夫遠行從役不遑寧處其室家能閔其勤勞勸以義者大異矣范氏處義曰上所命之事有適至而不可料者有敦迫而不容緩者職所當治之事則厚以益我不一而足厚以遺我不容辭避似有役使不均從事獨賢之意貧窶艱難旣知有命何足形於言室人朝夕相處誚責摧沮交徧不已故不免作此以自解總論張子曰此詩忠臣所自作朱氏公遷曰前一章歎其貧窶而安於命後二章歎其勞苦而安於命朱氏善曰投之以王事之重遺之以國事之難益之以家計之窘賢者之處此亦難而又家人之交讁則是内不見知於妻子也祿食不足以自存則是外不見知於君上也斯二者人之所爲乎抑天之所爲乎然不得於天而不怨天不合於人而不尤人盡心竭力以爲其所當爲而無一毫忿悶之心所以爲賢陳氏推曰三章一意總叙已之見困於人而歸之天也北門三章章七句集傳楊氏曰忠信重祿所以勸士也衞之忠臣至於窶貧而莫知其艱則無勸士之道矣仕之所以不得志也先王視臣如手足豈有以事投遺之而不知其艱哉然不擇事而安之無懟憾之辭知其無可奈何而歸之於天所以爲忠臣也輔氏廣曰楊氏之說其論君臣之道備矣而衞之忠臣則處其變而不失其道者可以爲萬世臣子之法也集說李氏樗曰人臣事君惟效其忠而已若以利祿存心是懷二心以事其君也表記云君子不以小言受大祿不以大言受小祿以小言受大祿則報踰其分固不當受也以大言受小祿則不見知於君亦所不當受也衞之忠臣終窶且貧是不見知於君非專較廪祿之厚薄者也北風其涼雨于付反雪其雱普康反惠而好呼報反下同我攜手同行叶户郎反其虚其邪音徐下同旣亟只音紙下同且子餘反下同集傳比也北風寒涼之風也鄭氏康成曰寒涼之風病害萬物孔氏穎逹曰風雪竝喻而箋獨言涼風者以風非所害物但北風寒涼故害萬物與常風異也程子曰四時之風春而自東則生物夏而自南則養物秋而自西則成物冬而自北則殺物涼寒氣也雱雪盛貌孔氏穎逹曰天旣爲北風其寒涼矣又加之雨雪其雱然而盛范氏處義曰北風寒涼雨雪雱然而盛此威虐可畏之喻惠愛鄭氏康成曰性仁愛者行去也虛寛貌邪一作徐緩也陸氏德明曰爾雅作徐亟急也只且語助辭歐陽氏修曰其虚其邪旣亟只且者言無暇寛徐當亟去也言北風雨雪以比國家危亂將至而氣象愁惨也故欲與其相好之人去而避之且曰是尚可以寛徐乎彼禍亂之迫已甚而去不可不速矣集說蘇氏轍曰北風而又雨雪其虐甚矣李氏樗曰詩人以風雪喻㬥虐如終風之詩曰終風且霾終風且曀之類皆取於㬥虐此詩亦然吕氏祖謙曰好我同行蓋泉涸魚相與處於陸相呴以濕相濡以沫之時也輔氏廣曰恵而好我攜手同行不敢忘故舊之仁也其虚其邪旣亟只且見幾而作之智也胡氏紹曾曰北風雨雪鄭箋喻政敎酷㬥朱注虚言氣象虚邪二句舊云在位之人其故寛虚徐閒者盡變爲刲急之行朱注較善兩其字初尚疑可緩亟則萬不能已矣是其心雖不忍而見幾則當速也北風其喈音皆叶居奚反雨雪其霏芳非反惠而好我攜手同歸其虚其邪旣亟只且集傳比也喈疾聲也謝氏枋得曰北風怒而有聲不止於涼矣霏雨雪分㪚之狀劉氏彝曰霏雪落急也謝氏枋得曰雨雪霏霏而密不止於雱矣歸者去而不反之辭也集說毛氏萇曰歸有德也范氏處義曰北風喈然有聲雨雪霏然而下此威虐及人之喻也始威虐方盛謀與惠而相好者攜手同行而去今威虐及人則行計遂決當求有德者歸之耳莫赤匪狐莫黒匪烏惠而好我攜手同車其虛其邪旣亟只且集傳比也狐獸名似犬黃赤色陸氏佃曰舊說以狐有媚珠善變化其爲物妖淫故詩以刺惡烏鵶黑色陸氏佃曰烏一名鴉其名自呼體全黑皆不祥之物人所惡見者也所見無非此物則國將危亂可知問狐與烏不知比何物朱子曰不但指一物而言當國將危亂時凡所見者無非不好底景象也輔氏廣曰目所見者無非赤狐烏鴉不祥之物亦非有先見者不能然也同行同歸猶賤者也同車則貴者亦去矣集說王氏安石曰乘車非賤者也攜手同行賤者去也攜手同車則貴者去之矣言國人無貴賤皆憚其威虐莫不舍之而適他國也程子曰同車亦偕行耳但卒章詞意益迫切同車有已駕之意范氏處義曰三章皆言其虚其邪旣亟只且蓋懼及於禍謂今日之行當緩乎當急乎再三言之人情可見矣總論孔氏穎逹曰首章二章言君政酷㬥卒章乃君臣竝言三章次二句皆言去下二句言去之意也程子曰序謂百姓不親相攜持而去乃述當時之事然考詩之詞乃君子見幾而作相招無及於禍患也君子全身遠害惟恐去之不速故其詞迫切李氏樗曰夫去國豈人之本情哉昔孔子去魯曰遲遲我行也去父母國之道也今衞之㬥虐而民亟去者蓋恐遲留於此而遭其禍必有大不忍於此而奪其情也黄氏櫄曰觀此詩而見民情之不可失也人君能發政施仁則耕者皆欲耕於其野商賈皆欲藏於其市行旅皆欲出於其塗賢者皆欲立於其朝而尚忍去之哉劉氏瑾曰詩中有同車之語疑此爲仕於衞者所作旣亟只且三章言之豈果於忘君哉蓋見幾而作不俟終日之義顧氏起元曰借風雪以言其愁惨之狀借狐鳥以言其危亂之兆非當時眞有是事也北風三章章六句集說朱氏公遷曰北風與魏風十畝之間相似然彼則其意舒其辭緩猶之可也此則危迫已甚矣陳氏際泰曰北風勞臣困於事也北門忠臣困於事也北門得困之二焉而無其酒食北風得遯之初焉而無其繫戀靜女其姝赤朱反俟我於城隅愛而不見搔蘇刀反首踟直知反蹰直誅反集傳賦也靜者閒雅之意姝美色也城隅幽僻之處不見者期而不至也踟蹰猶躑躅音擲觸也黃氏一正曰搔首人煩急則手爬其首也踟蹰行不前也陳氏推曰男子已先至而女猶未見搔首顧盼踟蹰不前其相俟無聊之狀如此此淫奔期㑹之詩也集說范氏處義曰首章男女相慕悦期而未遂之辭也謂貞靜之女有此美色俟我於幽深之地我心愛之而未得見所以搔首憒亂不果於行止也朱子語類問淫奔之人方相與狎暱又何取乎閒雅曰淫奔之人不知其爲可醜但見其可愛耳以女而俟人於城隅安得謂之閒雅而此曰靜女者猶所謂德音無良也無良則不足以爲德音矣而曰德音亦愛之之辭也輔氏廣曰觀此章所言則爲淫奔期會之詩明矣以女子而俟人於幽僻之地期之者不見而至於搔首踟蹰此豈男女之正情哉黃氏震曰靜之爲義詩緝又援曹氏謂靜女仕族處幽閒者今亦相約於城隅隱僻之地似亦有此理愚意靜女其姝乃奔者自爲相稱美之辭豈必泥此而謂其眞有貞靜之德哉附錄毛氏萇曰女德貞靜而有法度乃可說也孔氏穎逹曰言有貞靜之女其美色姝然又能待禮而後動自防如城隅然高而不可踰有德如是愛之而不得見故搔其首而踟蹰然張子曰後宮西北邃城隅俟我幽閒念彼姝呂氏大臨曰古之人君夫人媵妾㪚處後宫城隅者後宮幽閒之地也女有靜德又處於幽閒而待進御此有道之君所好也靜女其孌貽我彤徒冬反管叶古兗反彤管有煒于鬼反說音悦懌音亦女美集傳賦也孌好貌於是則見之矣彤管未詳何物毛氏萇曰彤管以赤心正人也鄭氏康成曰彤管筆赤管也歐陽氏修曰古者鍼筆皆有管樂器亦有管不知此管是何物但彤是色之美者蓋相贈以結殷勤之意耳煒赤貌言旣得此物而又悦懌此女之美也集說李氏樗曰赤色之管可以悦人如女色之美可以悦懌范氏處義曰彤管女子所玩之物謂女之有美態者旣以彤管贈男子其色煒然而充盛男子悦懌此管之色謂亦如女之美此女贈男之物也附錄毛氏萇曰旣有靜德又有美色又能遺我以古人之法可以配人君也古者后夫人必有女史彤管之法事無大小記以成法孔氏穎逹曰言貞靜之女遺我以彤管之法不違女史所書之事此女史彤管能成靜女之德故王肅云嘉彤管之煒煒然喜樂其成女美也何氏楷曰左傳引靜女之三章取彤管焉杜預注云雖悦美女義在彤管女史記事規誨之所執自牧歸荑徒兮徒計二反洵美且異夷曵二音匪女音汝之爲美美人之貽與異叶集傳賦也牧外野也歸亦貽也荑茅之始生者洵信也女指荑而言也言靜女又贈我以荑而其荑亦美且異然非此荑之爲美特以美人之所贈故其物亦美耳朱氏道行曰洵美雖連靜女言實指所歸之荑與下爲美美字相應集說李氏樗曰自牧歸荑言自牧田之地而歸我以荑信爲美且異男女相遺正如溱洧之詩贈之以勺藥東門之枌之詩胎我握椒之類輔氏廣曰先生惟不泥靜女其姝一句又以匪女之爲美之女音汝以爲指荑而言然後此詩之意明白矣許氏謙曰首言城隅末言自牧蓋不特俟於城隅抑且相逐於野矣附錄毛氏萇曰牧田官也孔氏穎逹曰茅潔白之物信美而異於衆草可以供祭祀喻靜女有德異於衆女可以配人君故言洵美且異也張子曰自牧歸荑牧牧地也不耕種之地則多草木根芽如甸人供果蓏之屬因以贈夫人也歸荑以備虀俎供豆實總論歐陽氏修曰衞俗淫風大行男女務以色相誘悦雖幽靜之女亦然舉靜女猶如此則其他可知范氏處義曰周南被化則雖游女有不可求衞國淫亂則雖靜女亦不自保三章所詠皆男女相慕悦之事朱氏公遷曰一章未見之時二章胥會之時三章旣㑹而歸之時朱氏道行曰此詩企慕自男而城隅之約管荑之投皆女招摇邶風之淫與鄭同稱其見端於斯乎女淫曰靜出自悅懌者之口也附錄呂氏祖謙曰此詩刺衞君無道夫人無德故述古者賢君賢妃之相與一章言賢妃有德有容事其君子逡廵待唱於後宮幽閒之地蓋靜之至也愛而不見搔首踟蹰猶關睢求之不得寤寐思服思之切也横渠謂後宮西北乃城隅必有所據二章言賢妃貽以彤管女史之法蓋彤管之光華與其容色之美皆可悦懌則所悦者不専以其色也三章田官獻新物於君所歸之荑信芳美而且異於常乃用之以荅彤管之贈蓋所以贈之者非其女色之爲美亦惟德美之人是貽耳案靜女詩毛鄭推本古序謂陳靜女之美德以示法戒後人多從之朱子則本歐陽修之説斥爲男女期㑹之詩蓋玩其詞祗是男女相爲慕悦未見有陳古諷今之意也但彤管爲女史所需以紀成法傳之自古朱子旣主淫詩難得其解以爲未詳何物蓋姑闕所疑耳今節採舊說參觀以備彤管之義云靜女三章章四句集說嚴氏粲曰當時皆爲淫泆之行故曰刺時其本則上所化也陸氏深曰靜女之詩序以爲刺傳以爲淫謂淫爲靜反辭也反辭有刺矣新臺有泚此禮反河水瀰瀰莫邇反燕婉之求籧音蕖篨音除不鮮斯淺反叶想止反集傳賦也泚鮮明也爾雅四方而高曰臺劉氏彝曰泚水中臺影鮮明之貌李氏樗曰新臺臨河今澶州遺址尚存王氏應麟曰水經注鄄城北岸有新臺寰宇記在濮州鄄城縣北十七里輿地廣記開德府觀城縣有新臺胡氏一桂曰臺在河上曰泚曰洒皆從水義瀰瀰盛也燕安婉順也籧篨不能俯疾之醜者也蓋籧篨本竹席之名人或編以爲囷其狀如人之擁腫而不能俯者故又因以名此疾也鮮少也鄭氏康成曰鮮善也舊說以爲衞宣公孔氏穎逹曰宣公晉桓公子爲其子伋娶於齊而聞其美欲自娶之乃作新臺於河上而要之國人惡之而作此詩以刺之言齊女本求與伋爲燕婉之好而反得宣公醜惡之人也集說孔氏穎逹曰此時伋妻蓋自齊始來未至於衞故爲新臺待其至於河而困臺所以要之耳若已至國則不須河上要之矣以公作臺要齊女故言臺又言河水者表作臺之處也蘇氏轍曰國人疾之而難言之故識其臺之所在而已謝氏枋得曰籧篨乃惡疾宣公非有此疾國人惡其無禮義亂人倫故以惡疾比之旣無人道亦非人形也新臺有洒七罪反叶先典反河水浼浼每罪反叶美辨反燕婉之求籧篨不殄集傳賦也洒高峻也陸氏德明曰洒韓詩作漼鮮貌浼浼平也陸氏德明曰浼浼韓詩作浘浘盛貌殄絶也鄭氏康成曰殄當作腆腆善也孔氏穎逹曰腆與殄古今字之異故儀禮注云腆古文字作殄是也言其病不已也魚網之設鴻則離之燕婉之求得此戚施集傳興也鴻雁之大者離麗也戚施不能仰亦醜疾也言設魚網而反得鴻以興求燕婉而反得醜疾之人所得非所求也集說孔氏穎逹曰籧篨戚施本人疾之名故晉語云籧篨不可使俯戚施不可使仰是也但人口柔者必仰靣觀人之顔色而爲辭以邃篨不能俯之人因名口柔者爲籧篨面柔者必低首下人媚以容色似戚施之人因名面柔者爲戚施故箋云籧篨口柔戚施面柔也歐陽氏修曰籧篨偃人不可使俛戚施僂人不可使仰明其俯仰有愧云耳呂氏祖謙曰籧篨戚施蓋國人惡宣公而以惡疾指之不能俯者籧篨之疾證不能仰者戚施之疾證非於此取義也總論范氏處義曰凡人之爲不善猶有羞惡之心往往多秘其迹懼爲人所指目雖其過未有隱而不形然視宣公於河上鮮明高峻之臺肆爲燕婉之行固有閒矣新臺三章章四句集傳凡宣姜事首末見春秋傳然於詩則皆未有考也諸篇放此集說朱氏公遷曰衞詩美者多淫詩少本不當與鄭比也然新臺牆茨之惡又國風中所無有故論淫詩必以鄭衞竝稱蓋鄭舉其全衞舉其重二子乘舟汎汎芳劒反其景叶舉兩反願言思子中心養養以兩反集傳賦也二子謂伋壽也乘舟渡河如齊也王氏應麟曰水經注京相璠曰陽平縣北十里有莘亭自衞適齊之道縣東有二子廟猶謂之孝祠景古影字劉氏瑾曰葛洪始加彡為影字養養猶漾漾憂不知所定之貌鄭氏康成曰願念也念我思此二子心爲之憂養養然舊說以爲宣公納伋之妻是爲宣姜生壽及朔朔與宣姜愬伋於公公令伋之齊使賊先待於隘而殺之壽知之以告伋伋曰君命也不可以逃壽竊其節而先往賊殺之伋至曰君命殺我壽有何罪賊又殺之國人傷之而作是詩也集說孔氏穎逹曰伋壽爭相爲死赴死似歸不顧其生如乘舟之無所薄觀之汎汎然見其影之去往而不礙猶二子爭死遂往而亦不礙也故國人傷之蘇氏轍曰自衞適齊必渉河國人傷其往而不返汎汎然徒見其景欲往救之而不可得是以思之養養然憂而不知所定也嚴氏粲曰伋壽二子乘舟渉河以適齊其影汎汎然何所歸乎伋夀之事其國人實深傷之詩人不言其他而慘然哀痛悲思之意具見矣二子乘舟汎汎其逝此字本與害叶今讀誤願言思子不瑕有害集傳賦也逝往也不瑕疑辭義見泉水此則見其不歸而疑之也徐氏光啓曰不瑕有害凡再見斷以朱傳爲正集說孔氏穎逹曰此國人思念之至故追言其本何爲不去而取死深閨之之辭也輔氏廣曰泉水所謂害者害於義也此所謂害者害其身而已故先生謂此見其不歸而疑之之辭蓋不忍正言其死且爲君諱也朱氏道行曰不瑕有害疑其見害之詞與泉水之有害於理者其意異總論歐陽氏修曰二子舉非合理死不得其所但國人憐而哀其不幸故詩人述其事以譬夫乘舟者汎汎然無所維制至於覆溺可哀而不足尚也范氏處義曰伋不廢君之命壽至代兄之死不可謂不賢況死者人之所難古人視死若輕必有以也國人傷而思之聖人所以取之也二子乘舟二章章四句集傳太史公曰余讀世家言至於宣公之子以婦見誅弟壽爭死以相讓此與晉太子申生不敢明驪姬之過同俱惡傷父之志然卒死亡何其悲也或父子相殺兄弟相戮亦獨何哉集說朱子曰聖人錄國人之情著宣公之過亦以見二子事親之道有未盡也舜之事瞽瞍烝烝乂不格姦欲使之未嘗不在側索而殺之未嘗可得此舜之所以為法於天下也許氏謙曰君子之處事以其有愧於心焉否爾苟當於理而於心焉無愧則何恤於人言昔者大舜嘗為之矣二子於此取法焉可也而守區區一節之義豈非擇之未精者耶邶十九篇七十二章三百六十三句集說劉氏瑾曰衞三十九篇而邶風才十有九然亂常敗政莫甚於此所以居變風之首歟於乎渡河野處已兆矣不待讀定之方中而后知也欽定詩經傳說彚纂巻三
