body:
  text: 欽定四庫全書欽定詩經傳說彚纂卷七唐一之十集傳唐國名夲帝堯舊都鄭氏康成曰今曰大原晉陽是堯始居此後乃遷河東平陽在禹貢冀州之域大行恒山之西大原大岳之野孔氏穎逹曰大行恒山皆在河北故屬冀州晉之東境迫此二山故云之西禹貢云既修大原至于岳陽鄭注云岳陽縣大岳之南大岳在河東名霍大山河東大原皆晉境所及故云大原大岳之野周成王以封弟叔虞為唐侯孔氏穎逹曰晉世家云成王與叔虞戲削桐葉為珪曰以此封若於是封叔虞於唐南有晉水王氏應麟曰水經汾水過晉陽縣東晉水從縣南東流注之晋水出縣西懸甕山至子燮乃改國號曰晉後徙曲沃又徙居絳嚴氏粲曰晉之遷徙不一歴歴可考自叔虞始封於晉陽其後三世至成侯自晉陽徙曲沃八世至穆侯自曲沃徙絳十世至昭侯自絳徙翼自昭公以曲沃封桓叔至其孫武公幷晉又自曲沃徙絳其地土瘠民貧勤儉質朴憂深思逺有堯之遺風焉班氏固曰河東夲唐堯所居有先王遺敎君子深思小人儉嗇張氏栻曰堯之遺風只是儉而用禮一事亦不必事事稱有遺風也其詩不謂之晉而謂之唐葢仍其始封之舊號耳唐叔所都在今大原府曲沃及絳皆在今絳州皇輿表大原府即今大原府曲沃今平陽府聞喜縣絳今平陽府翼城縣絳州今平陽府絳州竝𨽻山西集說鄭氏康成曰昔堯之末洪水九年下民其咨萬國不粒於時殺禮以救艱厄其流乃被於今當周公召公共和之時成侯曽孫僖侯甚嗇愛物儉不中禮國人閔之唐之變風始作蘇氏轍曰晉詩而謂之唐以為此堯之舊而非日徳之所及也范氏處義曰日之為晋久矣而詩猶謂之唐葢具二美焉一則以堯之遺澤在人心者萬世如一日故存唐之名示不忘堯也一則以見聖人之思古故凡有古之名號存於世者不輕變易也劉氏瑾曰叔虞封唐變侯號晉十七傳至晉侯緡為曲沃武公所幷然武公能滅晉之宗而不能滅唐之號能冒晉之號而不能繼唐之統君子欲絶武公於晉而不可故總名其詩為唐以寓意焉然則晉詩稱唐見曲沃武公滅宗國之罪而魏風首晉又以見曲沃獻公滅同姓之惡世變如比春秋欲不作不可也蟋蟀在堂嵗聿允橘反其莫音慕今我不樂音洛下同日月其除直慮反無已大音泰康職思其居叶音據好呼報反樂無荒良士瞿瞿俱具反集傳賦也蟋蟀蟲名似蝗而小正黑有光澤如漆有角翅或謂之促織陸氏璣曰蟋蟀一名蛬一名蜻􅖹幽州人謂之趨織里語曰趨織鳴懶婦驚是也九月在堂聿遂莫晚孔氏穎達曰七月之篇說蟋蟀云九月在戸此言在堂謂在室户之外與户相近時當九月嵗未為暮而言嵗聿其暮者言其過此月後則嵗遂將暮耳除去也大康過於樂也職主也瞿瞿却顧之貌朱氏公遷曰顧其後也唐俗勤儉故其民閒終嵗勞苦不敢少休及其嵗晚務閒之時乃敢相與燕飲為樂而言今蟋蟀在堂而嵗忽已晚矣當此之時而不為樂則日月將舍我而去矣然其憂深而思逺也故方燕樂而又遽相戒曰今雖不可以不為樂然不已過於樂乎盍亦顧念其職之所居者使其雖好樂而無荒若彼良士之長慮而却顧焉則可以不至於危亡也葢其民俗之厚而前聖遺風之逺如此集說朱子曰唐風自是尚有勤儉之意作是詩是一箇不敢放懐底人說今我不樂日月其除便又說無已大康職思其居輔氏廣曰今我不樂日月其除張而不弛文武不能也無已大康職思其居弛而不張文武不為也好樂無荒良士瞿瞿一張一弛文武之道也姚氏舜牧曰士農工商各有其職各有其居就其職而思其居則必各止其所無然遊縱以荒其職矣張氏彩曰此詩大意謂窮窘迫促非可久之道如此嵗暮休藏之時曷嘗不可為樂惟無至於大康而忘其當修之豫備則樂亦何妨於事哉觀彼瞿瞿之良士何嘗不樂但不至於荒耳蟋蟀在堂嵗聿其逝今我不樂日月其邁叶力制反無已大康職思其外叶五墜反好樂無荒良士蹶蹶俱衞反集傳賦也逝邁皆去也外餘也其所治之事固當思之而所治之餘亦不敢忽葢其事變或出於平常思慮之所不及故當過而備之也歐陽氏修曰職思其外者謂廣為周慮也蘇氏轍曰既思其職又思其職之外蹶蹶動而敏於事也孔氏穎達曰釋詁云蹶動也釋訓云蹶蹶敏也朱氏公遷曰動即勤動之義集說輔氏廣曰人無逺慮必有近憂故常思慮在事外也思之雖周而為之不敏則亦無益矣蟋蟀在堂役車其休今我不樂日月其慆吐刀反叶佗侯反無已大康職思其憂好樂無荒良士休休集傳賦也庶人乘役車嵗晚則百工皆休矣孔氏穎達曰春官巾車注云役車方箱可載任器以供役然則收納禾稼亦用此車故役車休息是農工畢也蘇氏轍曰嵗晚則入居於室而役車止慆過也休休安閑之貌樂而有節不至於淫所以安也季氏夲曰休休以安為念亦懼意也集說黄氏佐曰既思職内之事又思職外之事内外若無遺患矣然憂患之來又有出於非常以為逺而又在近所謂謹備其所憎禍常生於所愛則亦不可不思慮也如此則思患豫防無所不至矣焉有不安者乎總論劉氏瑾曰此詩必曰蟋蟀在堂而後曰今我不樂則能不遊於逸矣既曰今我不樂又曰無已大康則能不淫於樂矣曰職思其外則儆戒無虞也曰好樂無荒則無怠無荒也以詩人之克勤克儉所憂所思雖無唐虞君臣之徳業而其發於詩者與伯益告戒之辭同條共貫信乎前聖遺風之逺也鄒氏泉曰此詩言愈緊而意愈切首言居猶是夲分常事未及其餘也次言外則及其餘矣然猶是過而備之耳未切於憂也言憂則操心危慮患深常在多凶多懼之地而比上之思備其餘者益切矣蟋蟀三章章八句集說張子曰晉以土地薄民貧故其俗本來儉儉而用禮乃有堯之遺風指詩人而言也惟晉詩此意為多可以意求劉氏瑾曰自堯而至於周葢千餘年矣而其風化流傳固結於唐人之心故其民閒質實勤儉之習親愛和樂之恩警戒忠告之情備見於詩比其俗之所以為厚也山有樞烏侯昌朱二反隰有榆夷周以朱二反子有衣裳弗曳弗婁力侯力俱二反子有車馬弗馳弗驅祛尤虧于二反宛於阮反其死矣他人是愉他侯以朱二反集傳興也樞荎音垤也今刺榆也呂氏祖謙曰陸璣疏云樞其針刺如柘其葉如榆為茹美滑於白榆也榆之類有十種葉皆相似皮及理異耳榆白枌也呂氏祖謙曰爾雅疏曰榆之皮色白者名枌婁亦曳也孔氏穎逹曰曳者衣裳在身行必曳之婁與曳連則同為一事黄氏一正曰曳婁蓋服衣裳而行動之意馳走驅策也孔氏穎達曰走馬謂之馳策馬謂之驅宛坐見貌愉樂也此詩葢亦荅前篇之意而解其憂故言山則有樞矣隰則有榆矣子有衣裳車馬而不服不乘則一旦宛然以死而他人取之以為已樂矣葢言不可不及時為樂然其憂愈深而意愈蹙矣集說朱子曰詩所以能興起人處全在興如山有樞隰有榆别無意義只是興起下面子有車馬子有衣裳耳劉氏瑾曰宛其死矣而衣裳車馬徒為他人之樂是其憂逺及於身後其意欲盡樂於生時則雖解前篇深逺之憂而憂反愈深雖荅前篇為樂之意而意則愈蹙矣山有栲音考叶去九反隰有杻女九反子有廷内弗洒弗埽叶蘇后反子有鐘鼓弗鼔弗考叶去九反宛其死矣他人是保叶補苟反集傳興也栲山樗勅居反也似樗色小白葉差狹孔氏穎達曰郭璞曰栲似樗生山中亦類漆樹俗語曰櫄樗栲漆相似如一杻檍音億也葉似杏而尖白色皮正赤其理多曲少直材可為弓弩榦者也陸氏璣曰杻枝葉茂好二月中葉疏華如楝而細蘂正白今官園種之正名曰萬嵗考擊也保居有也范氏處義曰他人是保謂保而有之也集說孔氏穎達曰上云他人是愉為得已樂以為樂此云他人是保為得已之安以為安也山有漆音七隰有栗子有酒食何不日鼔瑟且以喜樂音洛且以永日宛其死矣他人入室集傳興也君子無故琴瑟不離於側永長也人多憂則覺日短飲食作樂可以永長此日也總論輔氏廣曰蟋蟀但言不可不及時以自樂而遂相戒以為不已過於樂乎則是初未必敢為樂也故國人又作山有樞之詩以荅其意而寛其憂然其所謂樂者豈或至於溺情極欲流而不反者哉觀於唐風之所謂樂或不及而失於蹙然愈於過而流於奢者多矣謝氏枋得曰始言他人是愉中言他人是保末言他人入室一節悲一節此亦憂深思逺也許氏謙曰蟋蟀以為不可過於樂而豫防事變憂患之不測其憂固已深矣然其勤儉自守思患豫防其意猶可制而此詩所思又若朝不謀夕者故曰憂愈深而意愈蹙也山有樞三章章八句集說呂氏祖謙曰前漢地理志云唐詩蟋蟀山有樞葛生三篇皆思奢儉之中念死生之慮輔氏廣曰以此詩為荅前篇之意而寛其憂則句句有著落有意味此義葢自先生發之然亦因天保為報上之詩故幷既醉假樂諸篇皆得其正也揚之水白石鑿鑿子洛反素衣朱襮音博從子于沃叶鬰鏄反既見君子云何不樂音洛集傳比也鑿鑿巉巖貌襮領也諸侯之服繡黼領而丹朱純音準也孔氏穎達曰釋器云黼領謂之襮孫炎曰繡刺黼文以褗領是襮為領也郊特牲云繡黼丹朱中衣大夫之僭禮知諸侯當服之中衣者朝服祭服之裏衣也大夫中衣亦用素不必以繡黼為領繡黼唯諸侯乃得服之耳子指桓叔也沃曲沃也晉昭侯陸氏徳明曰昭公左傳及史記作昭侯嚴氏粲曰疏曰昭公伯文侯仇之子封其叔父成師于曲沃是為桓叔孔氏穎達曰封沃者使專有之别為沃國不復屬晉地理志云河東聞喜縣故曲沃也應劭曰武帝於此聞南越破改曰聞喜其後沃盛強而晉微弱國人將叛而歸之故作此詩言水緩弱而石巉巖以比晉衰而沃盛故欲以諸侯之服從桓叔于曲沃且自喜其見君子而無不樂也集說歐陽氏修曰激揚之水其力弱不能流移白石以興昭公微弱不能制曲沃而桓叔之強於晉國如白石鑿鑿然其民從而樂之蘇氏轍曰昭公始封桓叔於曲沃沃盛強昭公㣲弱雖欲去之而不可得矣譬如揚水以求其能流雖物之易流者有不能流矣而况於石乎祇以益其鑿鑿耳民知昭公之不振也故將具諸侯之衣以從桓叔于沃附録嚴氏粲曰水喻昭公石喻桓叔又設為國人相語之辭言以素絲為中衣以丹朱為緣以繡黼為領此諸侯之服也今子欲奉此服於桓叔我將從子往沃以見此桓叔則如何不樂乎子指叛者設言其人其意謂國中有相與為叛以應曲沃者矣此㣲詞以泄其謀欲昭公聞之而戒懼早為之備也揚之水白石皓皓胡老反叶胡㬥反素衣朱繡叶先妙反從子于鵠叶居號反既見君子云何其憂叶一笑反集傳比也朱繡即朱襮也毛氏萇曰繡黼也孔氏穎達曰傳言繡黼者謂於繒之上繡刺以為黼非訓繡為黼也鵠曲沃邑也集說孔氏穎達曰晉封桓叔非獨一邑而已其都在曲沃其旁更有邑也揚之水白石粼粼利新反我聞有命叶彌幷反不敢以告人集傳比也粼粼水清石見之貌毛氏萇曰粼粼清澈也許氏愼曰水生厓石聞粼粼也聞其命而不敢以吿人者為之隱也桓叔將以傾晉而民為之隱葢欲其成矣蘇氏轍曰命桓叔之政命也李氏曰古者不軌之臣欲行其志必先施小惠以收衆情然後民翕然從之田氏之於齊亦猶是也故其召公子陽生於魯國人皆知其已至而不言所謂我聞有命不敢以告人也集說鄭氏康成曰不敢以告人而去者畏昭公謂已動民心輔氏廣曰民為桓叔隐而欲其事之成此可見其情之大可畏也附錄嚴氏粲曰昭公諸詩皆以沃強為憂此詩末章之云葢反辭以見意故泄其謀欲昭公知之忠之至也自桓叔至武公屢得志矣而晉人終不服相與攻而去之其後更六世逾六七十載迫於王命而後不敢不聼在昭公之初晉人之心豈從沃哉若助桓叔而匿其情則此詩不作可也亦既聲之於詩使采詩者颺之以諷其君矣安在其為匿之也故言不敢告人者乃所以告昭公言我聞有命者又以見其事已成禍至甚迫所以激發昭公者至切切也總論劉氏敞曰非揚之水不能使白石鑿鑿非昭公微弱不能驅百姓歸沃沃以盛強卒章曰我聞有命者道民將叛之實也李氏樗曰既見君子云何不樂以見其得衆心也我聞有命不敢以告人亦是言得衆心也張横渠曰民愛桓叔聞有叛逆之命不敢以告人以見民心之愛桓叔其深如此范氏處義曰素衣繡黼在邑而服侯服國人宜惡之乃反以為美皆欲從之以為可以樂而無憂則桓叔之所為必有以要民譽而收衆情故國人聞桓叔叛逆之命不敢以語人恐其或致人言以害其成也揚之水三章二章章六句一章四句集說孔氏穎達曰作揚之水詩者刺晉昭公也昭公分國封沃已為不可國人將叛又不能撫之也故刺之附錄嚴氏粲曰時沃有簒宗國之謀而潘父隂主之將為内應而昭公不知此詩正發潘父之謀其忠告於昭公者可謂切至若眞欲從沃則是潘父之黨必不作此詩以泄漏其事且自取敗也郝氏敬曰此託為國人從沃之辭刺昭公之失民也民心貳而後敵人乘之叚之叛鄭也國人先美之沃之叛晉也國人先從之詩皆以為刺而聖人皆存之所以為萬世長民者戒逺矣案集傳云國人將叛晉而歸沃故作此詩聞其命而不敢以告人者民為之隐而欲其事之成也葢是時晉衰沃盛民知昭公之不振而樂從桓叔與歐陽修蘇轍之說同惟嚴粲詩緝以為昭公時晉人之心尚未渙散其樂從沃者沃之黨耳作詩者設為國人相語之詞其曰我聞有命不敢以告人正所以泄沃黨之謀而非叛晉者之所自作也其說亦似近理故姑存之以備一解椒聊之實蕃衍盈升彼其音記之子碩大無朋椒聊且子餘反逺條且集傳興而比也椒樹似茱萸有針刺其實味辛而香烈聊語助也朋比也陸氏徳明曰比必履反謂無比例也李氏樗曰言其强盛而無比也且歎詞逺條長枝也椒之蕃盛則采之盈升矣彼其之子則碩大而無朋矣椒聊且逺條且歎其枝逺而實益蕃也陳氏鵬飛曰是椒也其條逺矣言子孫大也此不知其所指序亦以為沃也集說范氏祖禹曰椒聊且者本其始也逺條且者言其枝别將逺而無窮也嚴氏粲曰椒實蕃衍采之盈升喻桓叔子孫衆多也彼其碩大盛彊無與倫比矣然方興未艾將不止於今日之所觀故復歎是椒新長之條益逺則實益蕃喻桓叔他日之子孫將日益衆多也桓叔日彊昭公其危哉為告昭公故稱桓叔為彼也朱氏公遷曰以椒之蕃衍興沃之盛大葢用蕃盛之意為興也晉至於沃而勢愈盛猶椒至逺條而實益蕃此則比也椒聊之實蕃衍盈匊九六反彼其之子碩大且篤椒聊且逺條且集傳興而比也兩手曰匊李氏樗曰陸農師謂兩手為匊兩匊為升先曰升後曰匊互相備而已李氏公凱曰匊言其繁衍盛多而不可以升較篤厚也顧氏起元曰篤是盤根深厚不可㧞意總論嚴氏粲曰此詩言桓叔之彊而不及昭公其意則憂昭公之弱而非主桓叔言在此而意在彼也鄧氏元錫曰椒聊憂晉也曲沃昌晉㣲矣碩大無朋况大都耦國也碩大且篤况厚施得衆也復詠椒聊逺條三致意焉其志隐其思深詩其有忠臣之心哉椒聊二章章六句集說孔氏穎達曰作椒聊詩者刺晉昭公也君子見沃國之盛彊知其後世稍復蕃衍盛大子孫將幷有晉國焉昭公不知故刺之范氏處義曰以春秋左氏傳考之昭公封成師於曲沃乃魯恵公之二十四年至魯荘公十六年曲沃伯為晉侯葢幾七十年詩人於昭公之世已知沃之子孫將有晉國非君子知微知彰不能為此言也沃之修其政多歴年所中閒屢有簒奪之禍而昭公以来略不知所為備至於失國而後已此可以為永鍳也輔氏廣曰案揚之水椒聊二詩述當時民情棄舊君而樂桓叔也如此則其俗之薄甚矣聖人何取焉夫民罔常懷懷於有仁民之去就繫上之人如何耳故聖人錄此二詩以見民無常懐而在止者不可不強於自治也綢直留反繆芒侯反束薪三星在天叶鐵因反今夕何夕見此良人子兮子兮如此良人何集傳興也綢繆猶纒綿也蘇氏轍曰薪之為物束之則合釋之則解是則綢繆固之而後可以望其合也三星心也羅氏中行曰心東方蒼龍七宿之第五星在天昏始見於東方建辰之月也胡氏一桂曰毛以三星為參星今朱子從鄭說葢以見其失嫁娶之時也劉氏瑾曰心宿之象三心鼎立故因謂之三星然凢三星者非止心之一宿而知此詩為指心宿者葢春秋之初辰月末日在畢昏時日淪地之酉位而心宿始見於地之東方此詩男女既過仲春之月而得成婚故適見心宿也良人夫稱也馮氏復亰曰儀禮鄭注云婦人稱夫曰良國亂民貧男女有失其時而後得遂其婚姻之禮者詩人叙其婦語夫之詞曰方綢繆以束薪也而仰見三星之在天今夕不知其何夕也而忽見良人之在此旣又自謂曰子兮子兮其將奈此良人何哉喜之甚而自慶之詞也集說鄭氏康成曰三星謂心星也心有尊卑夫婦父子之象又為二月之合宿故嫁娶者以為候焉昏而火星不見嫁娶之時也今我束薪於野乃見其在天則三月之末四月之中見於東方矣故云不得其時王氏安石曰見此良人言女子之失時者也曹氏粹中曰詩人每以薪喻昏姻如翹翹錯薪析薪如之何是也束薪者析於彼而合於此有昏姻之義焉綢繆束芻叶側九反三星在隅叶語口反今夕何夕見此邂戸解反逅胡豆反叶狠口反子兮子兮如此邂逅何集傳興也隅東南隅也昏見之星至此則夜久矣邂逅相遇之意此為夫婦相語之詞也集說唐氏汝諤曰張南軒疑昏姻不得稱邂逅然而得自過時喜出望外亦若有不期而㑹者故云張氏彩曰昏姻恒久之事而曰邂逅者指初㑹之時為言綢繆束楚三星在戸侯古反今夕何夕見此粲采旦反者叶章與反子兮子兮如此粲者何集傳興也戸室戸也戸必南出昏見之星至此則夜分矣粲美也張氏彩曰粲者華美之意意以女之服貌為言此為夫語婦之詞也或曰女三為粲一妻二妾也李氏樗曰國語雖曰女三為粲而又曰粲美物也是言美女也集說王氏安石曰見此粲者言男子之夫時也朱氏公遷曰昏而正東夜久而東南隅夜分而正南葢衆星随天而轉以夜之淺深為序總論范氏處義曰國亂則征役無時賦斂無節民既不得安居且乏貨財不能備禮此昏姻所以失時也呂氏祖謙曰三星見則非昏姻之時在天在隅在戸随所見而互言之不必以為時之先後輔氏廣曰昏姻禮之常也及其時行其禮雖曰可嘉然亦常事耳何至喜之甚而自慶如此惟其失時之久而一旦得遂其禮故喜幸之詞至於不能自勝也誦綢繆之詩則足以知民之情而為人上者其可不使之得其常哉許氏謙曰仲春㑹男女禮也今過時之人自謂昏姻之道失矣而忽得遂此所以樂也詩上四句皆詩人述夫婦之言下二句皆詩人自道其夫婦之喜綢繆三章章六句集說李氏樗曰此詩與衞有狐鄭野有蔓草陳東門之楊皆言世變多故昏姻不得其時然陳鄭衞之詩淫亂為多葢當時政教不修禮義不明此所以有相奔之俗至於唐風則不然葢淫泆之禍在於奢侈唐之風俗尚儉雖不得其時猶未至於淫奔也有杕徒細反之杜其葉湑湑私敘反獨行踽踽俱禹反豈無他人不如我同父扶雨反嗟行之人胡不比毗至反焉人無兄弟胡不佽七利反焉集傳興也杕特也杜赤棠也嚴氏粲曰赤棠白棠解見甘棠湑湑盛貌踽踽無所親之貌李氏樗曰案孟子何為踽踽涼􅈵則踽踽然無所親之意也同父兄弟也比輔佽助也錢氏天錫曰比有眷戀意佽有扶持意此無兄弟者自傷其孤特而求助於人之詞言杕然之杜其葉猶湑湑然人無兄弟則獨行踽踽曾杜之不如矣然豈無他人之可與同行也哉特以其不如我兄弟是以不免於踽踽耳於是嗟歎行路之人何不閔我之獨行而見親憐我之無兄弟而見助乎集說鄧氏元錫曰天生物使一本也豈無他人不如我同父一本故也朱氏道行曰詩以獨生之杜猶葉茂起獨行之人終無與此反興也無兄弟者顧影踽踽而望比佽於他人他人非同父知其不如而庶幾於萬一之我比我佽無聊頼之詞也錢氏天錫曰不如我同父言其不我親不我助也我親我助則他人猶同父矣以不如兄弟之人而以兄弟之義望之正所以為自傷也有杕之杜其葉菁菁子零反獨行睘睘求螢反豈無他人不如我同姓叶桑經反嗟行之人胡不比焉人無兄弟胡不佽焉集傳興也菁菁亦盛貌睘睘無所依貌曹氏粹中曰說文云睘睘驚視也獨行多懼故睘睘也集說嚴氏粲曰同姓亦謂兄弟變文成章耳朱氏公遷曰由同父而同姓以親疎為次序也總論季氏夲曰此詩之意欲人厚於兄弟而篤親親之恩言杕杜雖特生亦有湑湑菁菁之葉以庇本根人苟獨行而無兄弟則無庇矣見人不可無兄弟也非兄弟則為行路之人行路之人相遇何嘗相親比乎此即常棣所謂雖有良朋況也永歎之意顧氏起元曰各上五句自傷其孤特下四句求助於人也踽踽睘睘就情義上說此只是孤特豈無他人二句原其所以為孤特也杕杜二章章九句集說輔氏廣曰讀是詩者見人生世閒不可獨居無與而他人又不如同氣之為親也葢有常棣之遺意庶幾於大序所謂厚人倫者姚氏舜牧曰杕杜凢三見一見於此傷已之無兄弟也再見於後傷已之寡弱不足恃也三見於小雅傷征夫在外而未歸也總是孤特無倚之意羔裘豹袪起居起據二反自我人居居斤於斤御二反豈無他人維子之故攻乎古慕二反集傳賦也羔裘君純羔大夫以豹飾袪袂也孔氏穎達曰袂是袖之大名袪是袖頭之小稱其通皆為袂也居居未詳集說毛氏萇曰自用也居居懐惡不相親比之貌鄭氏康成曰羔裘豹袪在位卿大夫之服也其役使我之民人其意居居然有悖惡之心不恤我之困苦此民卿大夫采邑之民也故云豈無他人可歸往者乎我不去者乃念子故舊之人朱子曰在位者不恤其民故在下者謂之曰彼服是羔裘豹袪之人胡氏紹曾曰詩美其人則指其服飾曰羔裘豹飾孔武有力刺其人則曰羔裘豹袪自我人居居夫一服而見好見惡服無美惡葢其人乎其人可望而知之羔裘豹褎徐救反自我人究究豈無他人維子之好呼報反叶呼候反集傳賦也褎猶袪也究究亦未詳集說毛氏萇曰究究猶居居也鄭氏康成曰我不去而歸往他人者乃念子而愛好之也民之厚如此亦唐之遺風總論孔氏穎達曰在位之臣當助君憂民經二章皆刺在位懐惡不恤下民之辭釋訓云居居究究惡也李廵曰居居不狎習之惡孫炎曰究究窮極人之惡此言懐惡而不與民相親是不狎習也用民力而不憂其困是窮極人也范氏處義曰晉之諸臣尸位素餐不聞以民事言於上者故羔裘刺之終篇皆責以不恤民之言作是詩者葢與在位之人有舊好是以原其為民設官之意告之冀其必聼也羔裘二章章四句集傳此詩不知所謂不敢強解集說輔氏廣曰先生但以居居究究四字不可曉故以為不敢強解此正得闕疑之意然曰羔裘豹袪則是指其卿大夫也明矣豈無他人維子之故則其欲去而不忍去之意亦可見矣近世諸儒皆據爾雅有居居究究惡也之訓故多從毛鄭之說然先生嘗謂爾雅乃是集諸儒訓詁以成書其閒葢亦不能無誤者則居居究究之訓亦未可據也案朱子以居居究究之文止見爾雅未敢據以解經故云此詩不知所謂然羔裘豹袪不得不指為卿大夫之服也詳繹居居究究云者必非頌羙之詞况爾雅之為訓興於中古在毛鄭之前與其廢斯篇於不解且姑從傳疏以求通似亦可矣肅肅鴇羽集于苞栩况禹反王事靡盬音古不能蓺稷黍父母何怙候古反悠悠蒼天曷其有所集傳比也肅肅羽聲鴇鳥名似鴈而大無後趾陸氏璣曰鴇鳥連蹄性不樹止樹止則為苦集止也苞叢生也毛氏萇曰苞稹也孔氏穎逹曰孫炎曰物叢生曰苞齊人名曰稹郭璞曰今人呼物叢緻者爲稹栩柞櫟也其子為皁斗殻可以染皁者是也陸氏璣曰徐州人謂櫟為杼或謂之為栩盬不攻緻音稚也孔氏穎達曰盬為蠱字異義同左傳云於文皿蟲為蠱穀之飛亦為蠱然則蟲害器敗榖者皆謂之蠱是盬為不攻牢不堅緻之意也蓺樹怙恃也民從征役而不得養其父母故作此詩何氏楷曰序謂君子下從征役今案篇中有蓺稷黍等語似與君子不類言鴇之性不樹止而今乃飛集于苞栩之上如民之性本不便於勞苦今乃久從征役而不得耕田以供子職也悠悠蒼天何時使我得其所乎集說輔氏廣曰王事靡盬者或是勤王之事或是敵王之愾皆不可知使民久從征役父母飢餓無所恃頼則其窮亦甚矣然但呼天而告之猶冀有時而得所也惟君子為能通天下之志必使斯民飬生送死仰事俯肓之無憾不然則赤何所不至哉季氏夲曰鴇本水鳥性不樹止以下無可棲之地而集于苞栩之上如易之所謂鴻漸于木或得其桷以比民之性本欲安居而久勞征役急于求息也朱氏道行曰子少則怙父母既壮則父母怙子所謂相依為命也怙父母正子之所乃今不得故呼悠悠蒼天而歎之徐氏鳳彩曰言王事者必唐國之民役於王室者也逺從征繕故以羽聲肅肅為比肅肅鴇翼集于苞棘王事靡盬不能蓺黍稷父母何食悠悠蒼天曷其有極集傳比也極已也集說范氏祖禹曰曷其有極者言勞役之無已也黄氏佐曰征役已則得耕田以供子職矣肅肅鴇行戸郎反集于苞桑王事靡盬不能蓺稻粱父母何嘗悠悠蒼天曷其有常集傳比也行列也陸氏佃曰說文曰音寶相次也葢鴇性羣居如鴈自然而有行列故从詩曰鴇行以此故也稻即今南方所食稻米水生而色白者也黄氏一正曰稻一名稌水田夏種冬收髙四五尺葉細而長有赤白紫芒數種米粒霜白粱粟類也有數色王氏逢曰本草注凡云粱米皆是粟類青粱殻穗有毛粒青米亦㣲青而細於黄白粱黄粱穂大毛長穀米俱麤於白粱嘗食也常復其常也集說范氏祖禹曰思得休息以反其常厭亂之甚也朱氏公遷曰復其常則遂安居之樂矣總論孔氏穎逹曰三章皆上二句言從征役之苦下五句恨不得供飬父母之辭范氏處義曰語意雖切不敢怨其上詩人之忠厚也朱氏公遷曰一章言居處何時而可定二章言行役何時而可已三章言舊時之樂何時而可復徐氏鳳彩曰黍稷稻粱非成熟於一時者而今皆不得蓺見從役非一日矣鴇羽三章章七句集說陳氏鵬飛曰春秋之時諸侯猶以王命征役故曰王事靡盬但調發未必均故君子苦之劉氏瑾曰變風多作於春秋時斯時也天下不知有王之時也而北門云王事適我伯兮云為王前驅此詩亦云王事而且以靡盬為言雖皆怨者之詞猶幸王命之行於列國亦可以見君臣之義根於人心也亦可以見文武成康之遺澤也黄氏佐曰朱傳既曰征役則以征伐之役言如伯兮之詩曰久從征役則是以征伐言也若夫殷其雷曰從役君子于役曰久役皆未嘗有征字則泛說為是豈曰無衣七兮不如子之衣安且吉兮集傳賦也侯伯七命其車旗衣服皆以七為節孔氏穎達曰晉唐叔之封爵稱侯侯伯之禮冕服七章故請七章之衣呂氏祖謙曰周禮注鷩冕七章衣三章一曰華蟲畫以雉即鷩也二曰火三曰宗彛皆畫為繢裳四章一曰藻二曰粉米三曰黼四曰黻皆絺以為繡許氏謙曰車旗衣服謂繁纓之就屬車之乗旗之斿服之章皆以七為節子天子也史記曲沃桓叔之孫武公嚴氏粲曰桓叔成師始封曲沃荘伯鱓桓叔子也武公稱荘伯子也伐晉滅之盡以其寳器賂周釐與僖同王王以武公為晉君列於諸侯此詩葢述其請命之意言我非無是七章之衣也而必請命者葢以不如天子之命服之為安且吉也葢當是時周室雖衰典刑猶在武公既負弑君簒國之罪則人得討之而無以自立於天地之閒故賂王請命而為說如此然其倨慢無禮亦已甚矣釐王貪其寶玩而不思天理民彝之不可廢是以誅討不加而爵命行焉則王綱於是乎不振而人紀或幾乎絶矣嗚呼痛哉集說毛氏萇曰諸侯不命於天子則不成為君鄭氏康成曰云我豈無是七章之衣乎晉舊有之非新命之服輔氏廣曰安謂不陧杌吉謂無後患此時以利害言耳非誠知義理之所在也請命於天子而敢自謂豈曰無衣不如子之所命則其辭之悖慢無禮亦甚矣大率意得志滿者其辭多如此附錄孔氏穎達曰天子命諸侯必賜之以服故請其衣就天子之使請天子之衣故云子之衣也武公幷晉心不自安故得王命服則安且吉兮世家稱武公厚賂周僖王僖王乃賜之命是於法武公不當賜之羙之者其臣之意羙之耳嚴氏粲曰子者指天子之使言之言我非不能造此衣之七章然不如子之賜我者為安且吉也曲沃自桓叔以来屢得志矣晉人不服每攻而去之故以請於天子者為安吉然曰我非無之雖曰不要君吾不信也豈曰無衣六兮不如子之衣安且燠於六反兮集傳賦也天子之卿六命孔氏穎達曰典命云王之三公八命其卿六命其國家宫室車旗衣服禮儀亦如之變七言六者謙也不敢以當侯伯之命得受六命之服比於天子之卿亦幸矣孔氏穎達曰晉實侯爵之國非天子之卿所以請六章衣者謙不敢必當侯伯之禮故求得受六命之服也燠煖也言其可以久也程子曰燠煖亦謂安耳徐氏鳯彩曰燠服久則煖也集說孔氏穎達曰侯伯入為卿士依其夲國之命不服六章也晉之先世不得有六章之衣而云豈曰無衣六者從上章之文飾辭以請命耳非實有也輔氏廣曰敢求侯伯七命之服既又自貶而欲比於天子之卿則其無忌憚可知矣總論呂氏祖謙曰以史記左傳考之平王二十六年晉昭侯封季弟成師於曲沃專封而王不問一失也三十二年潘文弑昭侯欲納成師而王又不問二失也四十七年曲沃荘伯弑晉孝侯而王又不問三失也桓王二年曲沃荘伯攻晉王非特不能討反使尹氏武氏助之四失也至是武公篡晉僖王反受賂命之為諸侯五失也以此觀之則禮樂征伐移於諸侯降於大夫竊於陪臣其所由來者漸矣黄氏佐曰武公滅宗國而自立不顧天理矣書曰恵廸吉順理之謂也請命之意但以勢壓人免凶禍耳豈曰無衣跋扈要君之意顯然矣附錄嚴氏粲曰武公之事國人所不與序言美之者特武公大夫之意耳武公有無王之心而後動於惡篡弑大惡也王法之所不容誅也彼其請命於天子之使豈真知有王哉正以人心所不與非假王靈則終不能定晉此正與唐藩鎮戕其主帥而代之以坐邀桂節者無以異無衣之詩不刪者所以著世變之窮也他曰三家分晋王又移其命武公者命三家矣君子是以知周之不復振也無衣二章章三句集說楊氏守陳曰無衣序謂美晉武公朱夫子辨說至當矣然辨猶開兩說謂此詩若非武公自作以述其䀩王請命之意則詩人所作以著其事而陰刺之至傳則直以為武公之所自作者耳愚謂武公亂賊也若果其所自作則亂賊之言聖人未必錄之葢詩人陰刺如辨之後說云耳然傳說正大嚴厲足以誅千古之賊黨而正萬世之人心解經垂訓之功莫大於此案序無衣美晉武公也武公始幷晋國其大夫為之請命乎天子之使而作是詩也孔穎達曰就天子之使請衣故云子之衣程子曰武公始有晋國而能請命天子故詩人美之呂祖謙曰劉氏云此之謂變風變之中有羙羙之中有刺取其一節不兼其義無衣之詩其力足以兼國然不自安也待天子之命然後安是之取爾至朱子謂此詩若非武公自作以述其賂王請命之意則詩人所作以著其事而陰刺之耳序乃以是為羙吾恐其奬姦誨盜而非所以為教也斯論可謂卓越乎前儒矣及著集傳則定為武公所自作就其倨慢之辭以正其簒弑之罪則尤春秋討賊之義也而嚴粲則申穎達之意以為自桓叔至武公沃晉相攻相逐逾六七十載晉人終不服至是特廹於王命不得已而從之豈以武公為可羙哉特武公大夫之意耳子者指天子之使言之此正與朱子辨小序後一說所謂詩人著其事而陰刺之者合也然則以為美者特曲沃大夫黨惡之情詩人代述其請命之辭正所以彰其無君之罪爾有杕之杜生于道左彼君子兮噬韓詩作逝肯適我中心好呼報反之曷飲於鴆反食音嗣之集傳比也左東也嚴氏粲曰以南為正則左為東噬發語詞曷何也此人好賢而恐不足以致之故言此杕然之杜生于道左其䕃不足以休息如已之寡弱不足恃賴則彼君子者亦安肯顧而適我哉然其中心好之則不已也但無自而得飲食之耳夫以好賢之心如此則賢者安有不至而何寡弱之足患哉集說沈氏守正曰以杕杜比寡弱者詩人好賢之謙詞其實晉非寡弱之邦也賢者之去㽞亦不以勢好賢之心如此耳曷飲食之有不可冀望之意正好之深也錢氏天錫曰噬肯適我此心惟恐賢人棄他驚疑顧慮正是中心篤好處即據天府四塞而自視猶歉然不拘拘在勢力寡弱上論也曷飲食之是幾望之語非絶意之詞有杕之杜生于道周彼君子兮噬肯来遊中心好之曷飲食之集傳比也周曲也孔氏穎達曰言道周繞之故為曲也總論朱氏公遷曰道左則僻道周則迂杕杜生於僻左迂廻之地力薄位卑有若此矣故兩章皆合兩句為比適我且不肯况昔来以遨遊乎以意之淺深為次序鄒氏泉曰此詩二章上四句言勢不足以致賢下言心實切於好賢以杕然無枝之杜生於僻左迂廻之地其廕不足以休息如已寡弱無爵以貴人無禄以富人勢不足頼則不足以行其道故賢者不至中心好之正表已好賢之誠不能自己無自飲食之所謂恐不足以致之也末見此人勢不足以致賢而其心誠於好賢如此彼有可致之勢顧使野有遺賢亦獨何哉有杕之杜二章章六句集說徐氏常吉曰此所謂士之尊賢非王公之尊賢者也讀之者可以想見其切至之情葛生蒙楚蘝音廉蔓于野叶上與反予美亡此誰與獨處集傳興也蘝草名似栝樓葉盛而細蔓延也予美婦人指其夫也婦人以其夫久從征役而不歸故言葛生而蒙于楚蘝生而蔓于野各有所依託而予之所美者獨不在是則誰與而獨處於此乎朱氏公遷曰此以人不如物起興徐氏光啓曰誰與獨處僅四字而意則兩轉詩有一句二韻者此類是也易亦有之匪冦婚媾集說程子曰此詩思存者非悼亡者葛之生記於物蘝之生依於地興婦人依君子誰與獨處誰與乎獨處而已陸氏佃曰言葛生髙而䝉楚蘞生卑蔓於野各繫所遇猶之婦人外成於夫榮悴随焉所以一心乎君子葛生蒙棘蘞蔓于域予美亡此誰與獨息集傳興也域塋音營域也息止也集說錢氏天錫曰變野言域即此葛生之地旋有永畢之志矣角枕粲兮錦衾爛兮予美亡此誰與獨旦集傳賦也粲爛華美鮮明之貌獨旦獨處至旦也集說范氏祖禹曰角枕之粲錦衾之爛則其嫁未久也嚴氏粲曰枕華衾鮮思始嫁之具而歎今之獨宿也獨旦猶王仲宣詩言獨夜也思者苦長夜而難旦長夜漫漫何時旦之意也夏之日冬之夜叶羊茹反百嵗之後歸于其居叶姬御反集傳賦也夏日永冬夜永毛氏萇曰言長也鄭氏康成曰思者於晝夜之長時尤甚故極言之以盡情居墳墓也夏日冬夜獨居憂思於是為切然君子之歸無期不可得而見矣要死而相從耳鄭氏曰言此者婦人專一義之至情之盡蘇氏曰思之深而無異心此唐風之厚也集說程子曰晝夜之永時思念之情尤切故期於死而同穴乃不相離也蘇氏轍曰夏之日冬之夜思者於是劇矣思之而不可得則曰不可生得而見之矣要之百嵗之後歸於其居而已唐氏汝諤曰夏非獨思於日但思因夏日而益永冬非獨思於夜但思随冬夜而俱長總晝夜計之則思亦無冬無夏矣冬之夜同上夏之日百嵗之後叶音戸歸于其室集傳賦也室壙也集說李氏樗曰夫婦之道生則異室死則同穴故曰歸于其居歸于其室總論輔氏廣曰前三章人情之常也後二章唐風之厚也大序所謂發乎情民之性也止乎禮義先王之澤也者是詩可以當之矣葛生五章章四句集說張氏栻曰葛生之詩雖婦人思存者而作然以獻公攻戰不休知其死亡之無日也則斷之以百嵗之後庶幾得同歸於邱而已其亦傷之至也采苓采苓首陽之巔叶典因反人之為言苟亦無信叶斯人反舍音捨下同旃之然反舍旃苟亦無然人之為言胡得焉集傳比也首陽首山之南也孔氏穎達曰首陽之山在河東蒲坂縣南李氏樗曰亦名雷首山劉氏瑾曰集傳以首為山名陽為山之南春秋傳亦曰趙宣子田于首山然此詩下章又云首陽之東則似首陽二字同為山名論語集注亦嘗指首陽為山名矣豈泛名其山則曰首山主山南而言則又獨得首陽之稱乎巔山頂也旃之也此刺聽讒之詩言子欲采苓於首陽之巔乎然人之為是言以告子者未可遽以為信也姑舍置之而無遽以為然徐察而審聽之則造言者無所得而讒止矣或曰興也下章放此朱子曰采有聽取之義故以采苓起興朱氏公遷曰山巔之苓可采而讒人之言難信反意相承則興體也集說鄭氏康成曰首陽山之上信有苓矣然而今之采者未必於此山然而人必信之喻事有似而非彭氏執中曰人之為言不可遽信則固當舍置然舍之而不究其實則讒言猶幸於得中而無所懲必究其有無之實則為言者無所得而自止矣季氏夲曰人之為言或有不可信者謂不必其皆實也若舍之而或不以為然則人之為言豈有得行者哉正以其必可信而略無所疑故人得以行其言耳不為必然之辭而曰苟者不敢自決其無招謗之實而欲人之少加察也婉而不廹亦可見其心氣之和平矣張氏榜曰讒人似是之言能投於卒然之頃而不能不露於審察之後故舍旃舍旃為止讒之法采苦采苦首陽之下叶後五反人之為言苟亦無與舍旃舍旃苟亦無然人之為言胡得焉集傳比也苦苦菜也生山田及澤中得霜甜脆而美與許也采葑采葑首陽之東人之為言苟亦無從舍旃舍旃苟亦無然人之為言胡得焉集傳比也從聽也總論輔氏廣曰凡有言者不審而遽聽之則讒言日進反是而一切拒絶之則忠言又不復可聞矣二者胥失之也故讒譖之人不畏人之不聽而畏人之能審今雖不聽彼將浸潤而入之則異日或不能不聽矣惟能審察而真有以見其情偽之所以然則不惟不敢進而亦無自而進矣此止讒之法也朱氏善曰采苓於首陽非必果無是事也而猶曰無遽以為信則欲其察之詳也曰舍之而無遽以為然則欲其聽之審也能如是則雖誑之以理之所有其計且有所不行況欲昧之以理之所無其計果孰得而行哉小人之為讒譖或積小以成大或飾虛以為實其為害大矣人君徐察而審聽之則造言者無所遁其情而被讒者亦可以免於禍矣采苓三章章八句集說呂氏祖謙曰采苓采苦采葑不曰郊野而曰首陽者興采聼之當逺也孔子曰浸潤之譖膚受之愬不行焉可謂逺也已矣不輕聽易動而徐觀其是非惟逺者能之毛氏以采苓為細事首陽為幽辟孔氏引而伸之謂讒言之起由君數問小事於小人雖求之太過然實天下之名言也唐國十二篇三十三章二百三句集說朱氏公遷曰憂深思逺唐風之厚杕杜好賢葢亦知所崇尚者聽讒有刺征役有怨亦無責於變風時惟武公之元惡大憝則國風中所無有也秦一之十一集傳秦國名鄭氏康成曰秦者隴西谷名孔氏穎達曰地理志云秦今隴西秦亭秦谷是也其地在禹貢雍州之域近鳥鼠山孔氏穎達曰鳥鼠與秦今俱在隴西爾雅云鳥鼠同穴其鳥為鵌其鼠為鼷是鳥鼠共處一山以為名初伯益佐禹治水有功賜姓嬴氏孔氏穎達曰鄭語云嬴伯翳之後地理志云嬴伯益之後則伯翳伯益聲轉宇異猶一人也未子語類問姓氏如何分别曰姓是大總腦處氏是後来次第分别處如魯本姬姓後有孟氏季氏同為姬姓而氏不同其後中音仲潏音決居西戎以保西垂六世孫大駱生成及非子非子事周孝王養馬於汧音牽渭之閒劉氏瑾曰地理志曰汧水出扶風汧縣西北入於渭馬大繁息孝王封為附庸而邑之秦至宣王時犬戎滅成之族宣王遂命非子曾孫秦仲為大夫鄭氏康成曰始有車馬禮樂侍御之好國人美之秦之變風始作誅西戎不克見殺及幽王為西戎犬戎所殺平王東遷秦仲孫襄公以兵送之王封襄公為諸侯孔氏穎達曰本紀云襄公於是始國與諸侯通使聘享之禮曰能逐犬戎即有岐豐之地襄公遂有周西都畿内八百里之地孔氏穎達曰周之二都相接為畿其地東西横長西都方八百里也本紀云赐襄公岐以西之地襄公生文公遂收周餘民有之地至岐岐以東獻之周案終南山在岐之東南大夫之戒襄公已引終南為喻則襄公亦得岐東非唯自岐以西也明襄公救周即得之矣至𤣥孫徳公又徙於雍孔氏穎達曰案夲紀秦世居西垂非子封為附庸别居槐里寕公徙平陽至徳公乃徙雍僖十三年左傳云秦輸粟于晋自雍及絳昭元年左傳云秦后子享晋侯自雍及絳是秦自徳公已後常居雍也秦即今之秦州雍今京兆府興平縣是也皇輿表秦州即今鞏昌府秦州京兆府興平縣即今西安府興平縣竝隸陕西集說孔氏穎達曰邾滕紀莒之等以其國小蔑而不録其詩而録秦仲附庸之風者秦土地廣寛雖未得爵命而大於邾莒詩者縁政而作故附庸而得盲詩也且秦於襄公之後國大而錄其詩因秦仲先已有詩故幷錄之耳左傳季札見歌秦曰美哉此之謂夏聲杜預云秦本在西戎汧隴之西秦仲始有車馬禮樂去戎狄之音而有諸夏之聲故謂之夏聲耳曹氏粹中曰漢興六郡良家子選給羽林期門以材力為官名将多出焉故秦詩多言戰鬭田獵之事沈氏萬鈳曰李氏曰鄭風都曼齊風闌緩秦風㢘勁亦由風聲氣習使然其形諸聲音也秦獨大於諸國有車鄰鄰有馬白顛都田反叶典因反未見君子寺人之令力星反集傳賦也鄰鄰衆車之聲孔氏穎達曰車有副貳明非一車故以鄰鄰為衆車之聲白顛額有白毛今謂之的顙孔氏穎達曰車既衆多則馬亦多矣故於馬見其毛色而已王氏安石曰白顛葢名馬騂騮盗驪赤兔的盧之稱君子指秦君寺人内小臣也孔氏穎達曰左傳齊有寺人貂晋有寺人披是諸侯之官有寺人也寺人是在内細小之臣令使也范氏祖禹曰寺人所以傳内外之命君臣相信故其下得以使之也是時秦君始有車馬及此寺人之官將見者必先使寺人通之張氏栻曰寺人之令若今之通謁者也令者役使之稱未見君子者得以令寺人則其謁之無壅可知矣故國人創見而誇美之也蘇氏轍曰凡此皆人君之常禮而秦之先君昔所未有也集說輔氏廣曰古人相見之際必為之擯相以詔其禮介紹以傳其命是豈聖人固為多事以美觀聽哉葢皆理之當然者今觀車鄰之詩以秦君有寺人而誇美之則人之情亦可見矣黄氏佐曰此章是創有中國之儀向也身為大夫大夫雖不徒行然車馬則未備也今則車馬備矣昔也位為百乘百乘雖有家臣然寺人則未有也今則使令足矣阪音反有漆隰有栗既見君子竝坐鼔瑟今者不樂音洛逝者其耊田結反叶地一反集傳興也八十曰耊阪則有漆矣毛氏萇曰陂者曰阪曹氏粹中曰說文阪山脅也地理志隴西有隴坻音底在其西注隴阪也即今隴山三秦記其阪九曲欲上者七日乃越髙處東望秦川然則阪固秦地之所有也隰則有栗矣既見君子則竝坐鼔瑟矣黄氏佐曰竝坐者同坐非竝肩而坐也失今不樂范氏祖禹曰今者不樂恐失時也則逝者其耊矣李氏樗曰逝者與日月逝矣之逝同皆言其嵗月之徃劉氏辰翁曰俯仰一時之景以冩其中之所甚快者此所以為興也朱子每句著則矣字多得興意集說鄭氏康成曰竝坐鼔瑟君臣以閒暇燕飲相安樂也蘇氏轍曰人君之有禮樂猶阪之有漆隰之有栗也苟不與人用之則亦為無用之物而已呂氏祖謙曰既見君子竝坐鼔瑟簡易相親之俗也今者不樂逝者其耊悲壯感歎之氣也秦之強以此而止於為秦者亦以此輔氏廣曰未見秦君而覩其車馬之盛寺人之命而誇羙之矣則其既見秦君也相與竝坐鼔瑟而又歎以為苟今時而不作樂則逝者其耋矣葢禮儀初備而人情喜樂故至如此阪有桑隰有楊既見君子竝坐鼓簧今者不樂逝者其亡集傳興也簧笙中金葉吹笙則鼔動之以出聲者也集說沈氏萬鈳曰夫擊甕扣缶彈筝拊髀而歌烏鳥快耳目者真秦之聲也今鼓瑟鼔簧非其舊聲創見可知總論顧氏起元曰鄰鄰是車之多白顛是馬之羙寺人對車馬㸔此皆昔無而今有者阪有漆二章各上四句興其作樂以為樂下歎其宜及時以為樂也國家方興人心踊躍以樂其上而樂其有車馬寺人意亦在其中車鄰三章一章四句二章章六句集說嚴氏粲曰秦反周之政者也秦興而帝王之影響盡矣車鄰其濫觴也世道興衰升降之機在是歟沈氏守正曰未見而傳衞之森嚴既見而略其名分與國中雄桀之士慨慷悲歌勉其及時以就功名即安能邑邑待數十百年之意也讀車鄰秦之規模定矣駟驖田結反孔阜符有反六轡在手公之媚睂冀反子從公于狩叶始九反集傳賦也駟驖四馬皆黑色如鐵也陸氏佃曰說文曰馬深黒色驪馬赤黒色驖非特有取於色葢亦取其堅壯如鐵也孔甚也阜肥大也六轡者兩服兩驂各兩轡而驂馬兩轡納之於觖觖與觼同古穴反故惟六轡在手也孔氏穎達曰每馬有二轡四馬當八轡矣言六轡者以驂馬内轡納之於觖故在手者惟六轡耳嚴氏粲曰在手言把握其轡能制馬之遲速帷手之是聽也媚子所親愛之人也朱氏道行曰媚子指左右便嬖從公于狩即前者寺人之令意此亦前篇之意也集說呂氏大臨曰公之媚子不必如媚于天子媚于庶人者也此詩稱其始為諸侯未必能用賢但人君之奉稍備云爾曹氏粹中曰冬田曰狩田之大者也始命而能狩侈之也黄氏佐曰此章將狩之時言車馬之盛使令之多徐氏鳯彩曰駟驖孔阜齊色又齊力秦以牧馬開國其後猶大蕃息歟奉時辰牡辰牡孔碩叶常灼反公曰左之舍音捨拔蒲末反則獲叶黄郭反集傳賦也時是辰時也牡獸之牡者曹氏粹中曰祭祀之牲不用牝皆以牡為貴辰牡者冬獻狼夏獻麋春秋獻鹿豕之類孔氏穎達曰獸之供食各有時節故謂之時牡奉之者虞人翼以待射音石也孔氏穎達曰奉是時牡謂虞人也獸人獻時節之獸以供膳故虞人亦驅時節之獸以待射耳碩肥大也公曰左之者命御者使左其車以射獸之左也葢射必中其左乃為中殺五御所謂逐禽左者為是故也朱子曰逐禽左逆驅禽獸使左當人君以射之也何氏士信曰御者從左以逐之君從左以射之公羊傳解第一殺第二殺第三殺皆自左膘音縹射之達於右則左當人君之左指禽獸之左膘而言拔矢括也孔氏穎達曰矢末為括曰左之而捨拔無不獲者言獸之多而射御之善也集說叚氏昌武曰吾為之範我馳驅終日而不獲一禽公曰左之守御法也而舍拔則無不獲馬許氏謙曰以君所乘車而言四馬一色君車之選也媚子公之御者也六轡在手在其手也公曰左之命此人也舍拔則獲君射之善又以見御之良也詠其詞意則車馬侍從之盛不言而可見矣黄氏佐曰此章則正狩時也言待狩之禮行狩之善遊于北園四馬既閑叶胡田反輶音由車鸞鑣彼驕反載獫力驗反歇許竭反驕許喬反集傳賦也田事已畢故遊于北園閑調習也輶輕去聲又如字也鸞鈴也效鸞鳥之聲鑣馬銜也驅音去又音區逆之車置鸞於馬銜之兩㫄孔氏穎達曰夏官田僕掌設驅逆之車注云驅驅禽使前趨獲逆御還之使不出圍輕車即驅逆之車也陸氏佃曰輶車置鸞於鑣異於乘車者驅逆之車則尚輕疾故也乘車則鸞在衡和在軾也曹氏粹中曰馬動則鸞鳴與車軾之和相應此言卽不失節也獫歇驕皆田犬名長喙音諱曰獫短喙曰歇驕以車載犬葢以休其足力也韓愈畫記有騎擁田犬者亦此類集說黄氏佐曰此章狩畢之時也言勞逸之節綜理之周馬無事於馳驅但見其閑習而已車無事於逐禽但見其有聲而已當斯時也以是車也休田犬之足力焉徐氏常吉曰人遊而馬閑車輕而犬休見從容整暇之意王氏志長曰末章舊說以為追論未獵之前調習車馬之事不若今說之順總論輔氏廣曰駟驖孔阜言其馬之盛也六轡在手言其御之善也公之媚子從公于狩言公有所親愛之人随公以田獵疑即指御者而言也奉時辰牡辰牡孔碩虞人奉翼大獸以待公之射禮儀之備也公曰左之舍拔則獲射御之精也遊于北園因出狩而遊觀也四馬既閑車馬皆閑習也輶車鸞鑣載獫歇驕雖田犬而亦處之得宜也此皆昔無而今有故歴叙其事而誇羙之也沈氏守正曰獵非先秦之所無也威儀氣象之改觀則今所創見耳駟驖三章章四句集說孔氏穎逹曰作駟驖詩者美襄公也秦自非子以来世為附庸未得王命今襄公始受王命為諸侯有遊田狩獵之事園囿之樂焉故羙之也張氏栻曰讀車鄰駟驖之詩則知秦之立國自其始創不過盛其車馬奉養之事競於射獵之為而已葢不及於用賢制民也則其流風亦習乎是而已劉氏瑾曰朱子雖以此序稍平不復辨說然又謂秦詩時世多不可考今據詩中言公乃臣子稱其君之詞疑此詩亦作於襄公受命為侯之後也小戎俴錢淺反收五楘音木梁輈陟畱反游環脅驅叶俱懼反又居錄反陰靷音𦙍鋈音沃續叶辭屢反又如字文茵音因暢勅亮反轂叶又去聲駕我騏音其馵之樹反又之錄反言念君子温其如玉在其板屋亂我心曲集傳賦也小戎兵車也范氏處義曰案考工記有兵車有田車有乘車至車人又有大車之名釋者曰大車平地載任之車也乘車為大則兵車為小此小戎之說也俴淺也收軫也謂車前後兩端橫木所以收斂所載者也凡車之制廣皆六尺六寸其平地任載者為大車則軫深八尺兵車則軫深四尺四寸故曰小戎俴收也孔氏穎逹曰兵車前軫至後軫帷深四尺四寸人之升車自後登之入於車内故以深淺言之朱氏道行曰兵車以馳突攻擊為事取其便利故收從淺五五束也楘歴録音禄然文章之貌也梁輈從前軫以前稍曲而上至衡則向下鉤之衡橫於輈下而輈形穹隆上曲如屋之梁又以皮革五處束之其文章歴録然也陳氏鵬飛曰輈車轅也其前駕於服馬之衡之上其後則乘前軫直逼後軫梁輈則穹其上以便服馬之進退車之進退以轅為主懼輈之不堅也故一轅則五分其穹每分以皮束之使堅是謂五楘劉氏瑾曰梁輈即所謂軏也游環靷環也以皮為環當兩服馬之背上游移前却無定處引兩驂馬之外轡貫其中而執之所以制驂馬使不得外出左傳曰如驂之有靷是也陸氏徳明曰靷本又作靳梁氏益曰左傳定九年齊人王猛謂東郭書曰吾從子如驂之靳言已從書如驂馬之随靳也脅驅亦以皮為之前係於衡之兩端後係於軫之兩端當服馬脅之外所以驅驂馬使不得内入也曹氏粹中曰兩服馬駕句衡之下㫄有兩驂馬齊於服馬之頸懼驂之外出也故以環貫驂之外轡以禁其出欲出則此環牽之懼驂之内入亂服馬也故以韋二條繫衡與軫䕶服馬脅以止驂之入欲入則此皮從而約之也陰揜軓音範也軓在軾前而以板橫側揜之以其陰映此軓故謂之陰也朱氏公遷曰横側揜之者横用一板揜其前側用二板揜其左右板之内與軓相映也靷以皮二條前係驂馬之頸後係陰板之上也蘇氏轍曰靷驂之所引也范氏處義曰以韋帯四各繫於驂馬之頸而兩之故謂之靷鋈續陰板之上有續靷之處消白金沃灌其環以為飾也嚴氏粲曰靷端作環相接謂之續葢車衡之長六尺六寸止容二服驂馬之頸不當於衡故别為二靷以引車亦謂之靳朱氏道行曰驂馬不當衡更無用力處故别設二靷左傳曰兩靷將絶是也孔氏穎達曰哀二年左傳郵無恤云兩靷將絶吾能止之駕而乘材兩靷皆絶是横軓之前别有驂馬二靷也文茵車中所坐虎皮褥也范氏處義曰以虎皮為車中之褥有文之可觀故謂之文茵暢長也轂者車輪之中外持輻内受軸者也大車之轂一尺有半兵車之轂長三尺二寸故兵車曰暢轂朱子曰轂所以貫車輪者朱氏道行曰暢轂者兵車驅馳險阻轂短虞脫輻故長比大車倍之騏騏文也孔氏穎達曰色之青黑者名為綦馬名為騏知其色作綦文馬左足白曰馵君子婦人目其夫也温其如玊羙之之詞也板屋者西戎之俗以板為屋孔氏穎達曰地理志云天水隴西山多林木民以板為屋然則秦之西垂民亦板屋言西戎板屋者念想君子伐得而居之也心曲心中委曲之處也西戎者秦之臣子所與不共戴天之讎也襄公上承天子之命率其國人往而征之故其從役者之家人先誇車甲之盛如此而後及其私情葢以義興師則雖婦人亦知勇於赴敵而無所怨矣輔氏廣曰此詩所謂板屋者可見是伐西戎時事故先生於序下雖以為時世無所據而未可知然於詩之首章下復以襄公為說也集說嚴氏粲曰婦人言其君子以此車馬徃伐西戎我念君子温然如玊今乃思而不得見亂我心中之委曲也閨門之情若曰戰陣乃武勇者之事而我君子之温然恐其不堪勞苦序所謂閔也顧氏起元曰小戎至暢轂是車駕我騏馵是馬小戎句言車軫之制五楘句言車轅之制游環句言御驂馬内外之制陰靷句言使驂馬引車之制文茵句言車上所用之制徐氏鳯彩曰約而計之攻木之工三收也輈也轂也攻革之工四游環也脅驅也陰靷也文茵也攻金之工一鋈是也一車而工聚如此四牡孔阜扶有反六轡在手騏駵音畱是中叶諸仍反騧古花反驪是驂叶疏簪反龍盾順允反之合鋈以觼古穴反軜音納言念君子温其在邑叶於合反方何為期胡然我念之集傳賦也赤馬黑鬛曰駵中兩服馬也黄馬黑喙曰騧驪黑色也盾干也孔子穎達曰盾以木為之畫龍於盾合而載之以為車上之衞必載二者備破毁也黄氏震曰盾狭而車廣一盾不足為衞必以二盾比而合之觼環之有舌者軜驂内轡也置觼於軾前以係軜故謂之觼軜亦消沃白金以為飾也孔氏穎達曰馬之有轡者所以制馬之左右令之随逐人意驂馬欲入則偪於脅驅内轡不須牽挽故知納者納驂内轡繫於軾前也蘇氏轍曰驂之外轡則御者軓之邑西鄙之邑也曹氏粹中曰温其在邑言在彼無患苦也方將也將以何時為歸期乎何為使我思念之極也集說黄氏佐曰此章已帯器械說范氏王孫曰馬力有上駟中駟下駟之殊而馬性又有宜中宜左宜右之别秦不徒以天閑之駿甲天下實以駕馭之略雄天下是中是驂者曰是宜為中是宜為驂也俴駟孔羣厹音求矛鋈錞徒對反叶朱倫反蒙伐有苑叶音氲虎韔勅亮反鏤音漏膺交韔二弓叶姑𢎞反竹閉緄古本反縢直登反言念君子載寢載興厭厭於鹽反良人秩秩徳音叶一陵反集傳賦也俴駟四馬皆以淺薄之金為甲欲其輕而易於馬之旋習也孔氏穎達曰成二年左傳說齊侯與晉戰云不介馬而馳之是戰馬皆被甲也孔甚羣和也孔氏穎達曰金甲堅剛則苦其不和故羙其能甚羣言和調也物不和則不得羣聚故以和為羣也厹矛三隅矛也鋈錞以白金沃矛之下端平底者也孔氏穎達曰厹矛刃有三角曲禮曰進戈者前其鐏存去聲後其刃進矛㦸者前其鐓錞同注云銳底曰鐏平底曰鐓䝉雜也伐中干也盾之别名苑文貌畫雜羽之文於盾上也毛氏萇曰蒙討羽也鄭氏康成曰䝉厖也討雜也孔氏穎達曰以䝉為討羽謂畫雜鳥之羽以為盾飾也夏官司兵掌五盾各辨其等注云五盾干櫓之屬櫓是大盾故以伐為中干干伐皆盾之别名也虎韔以虎皮為弓室也鏤膺鏤金以飾馬當胷帶也孔氏穎達曰兵車馬帯用力尤多故用金為膺飾取其堅牢交韔交二弓於韔中謂顛倒安置之必二弓以備壞也閉弓檠音景也儀禮作䪐緄绳縢約也以竹為閉而以绳約之於弛弓之裏檠弓體使正也陳氏祥道曰柲以竹為之狀如弓然約於弓裏命之曰柲所以備損傷也柲以閉之故亦謂之閉緄以繫之故亦謂之紲如此則納之韣中足以定往来之體祛翩反之病矣徐氏鳯彩曰閉為弓檠用竹則不屈撓縢以約弓用䋲則久纒綿也載寢載興言思之深而起居不寕也厭厭安也朱氏公遷曰言其徳之安重也秩秩有序也曹氏粹中曰徳音嗣續不失條理葢有常者也朱氏公遷曰聲譽之著自内及外自近及逺所謂秩秩之徳音也集說鄭氏康成曰此既閔其君子寝起之勞又思其性與徳呉氏瑞登曰厹矛鋈錞利撃刺也此主敵人䝉伐有苑備矢石也此主自衛附録范氏處義曰韔以虎皮為之而以金鏤飾其膺也膺胷也謂弓室之胷也嚴氏粲曰傳以膺為馬帶疏釋之為鏤胷之鞶即鉤膺也然此首言虎韔繼言鏤膺下文又言交韔二弓竹閉緄縢則皆言弓耳不得以鏤膺為鉤膺也補傳義長總論輔氏廣曰一章主言車二章主言馬三章主言兵器所謂婦人必其卿大夫為將帥之妻也葢君子良人溫其如玊厭厭秩秩皆非士卒所能當也極其憂思情也無所怨刺義也二者竝行而不相悖嚴氏粲曰小戎之詩鋪陳兵車器械之事津津然夸說不已以婦人閔其君子而猶有鼔勇之意其真秦風也哉劉氏瑾曰毎章前六句誇車甲也後四句私情也姚氏舜牧曰三稱言念君子以致其私情而必先敘其軍容之盛是婦人亦知公義之為重也小戎三章章十句集說孔氏穎達曰作小戎詩者羙襄公也襄公能備具其兵甲以征討西方之戎於是之時西戎方漸強盛而襄公征伐不休國人應苦其勞婦人應多怨曠襄公能說以使之國人忘其軍旅之苦反矜夸其車甲之盛婦人無怨曠之志則能閔念其君子皆襄公使之得所故序外内之情以羙之朱子曰西戎方強則征伐宜休矣而不休征伐不休則國人宜怨矣而不怨反為詩以羙其主而聖人亦有取焉何哉襄公上承天子之命以報君父之讎其所以不能自己者豈忮忿之私心哉乃人倫之正天理之發以大義驅其人而戰之敵之強弱戰之勝負皆不暇有所顧而惟知仇讎之不可以不復此襄公所以能用其人而秦人所以樂為之用也聖人有取乎此亦春秋大復讎而與討賊之意歟蒹古恬反葭音加蒼蒼白露為霜所謂伊人在水一方遡所路反洄音回從之道阻且長遡游從之宛在水中央集傳賦也蒹似萑音丸而細髙數尺又謂之薕音㢘陸氏佃曰今人以為簾箔因以得名葭蘆也陸氏佃曰孔氏云初生為葭長大為蘆成則為葦蒹葭未敗而露始為霜祭氏卞曰露之繁在夏至秋則成霜釋而為露結而為霜秋水時至百川灌河之時也伊人猶言彼人也一方彼一方也遡洄逆流而上也遡游順流而下也宛然坐見貌在水之中央言近而不可至也言秋水方盛之時所謂彼人者乃在水之一方上下求之而皆不可得然不知其何所指也集說朱氏善曰白露為霜言其時之暮也在水一方言其居之逺也迫之以時之暮限之以水之逺所謂伊人果若何而求之將欲逆流而上以求之歟則既逺而不可即將欲順流而下以求之歟則雖近而不可至味其辭有敬慕之意而無褻慢之情則必指賢人之肥遯者蒹葭淒淒白露未晞所謂伊人在水之湄遡洄從之道阻且躋遡游從之宛在水中坻直尸反集傳賦也淒淒猶蒼蒼也晞乾也季氏夲曰未晞秋露重而不易乾也湄水草之交也孔氏穎達曰謂水草交際之處水之岸也躋升也言難至也鄭氏康成曰升者言其難至如升阪小渚曰坻孔氏穎達曰釋水云小沚曰坁然則坁是小沚言小渚者渚沚皆水中之地小大異也以渚易知故繋渚言之蒹葭采采叶此禮反白露未已所謂伊人在水之涘叶以始二音遡洄從之道阻且右叶羽軌反遡游從之宛在水中沚集傳賦也采采言其盛而可采也已止也右不相直音値而出其右也鄭氏康成曰右者言其迂廻也孔氏穎達曰出其左亦迂廻言右取其涘沚為韻小渚曰沚總論朱氏公遷曰秦無尊賢好徳之風又無男女淫奔豈朋友相念而作歟黄氏佐曰天下豈有求不可至之理者詩人大槩如此說以意逆志是為得之後之人思其人而不得或託之道阻或託之一方此之謂也如簡兮三章本思盛世之顯王乃託曰西方唐氏順之曰秦時風俗為聲利所驅雖豪傑亦且側足於寺人媚子閒而不知愧乃有遺世獨立溏乎埃􅅽之外若斯人者豈所謂一國之人皆若狂而此獨醒者歟乃并其姓名而逃之此其所以為至也蒹葭三章章八句集說胡氏一桂曰此詩毛氏謂刺襄公能用周禮則可以固國如蒹葭得霜露則可用諸家皆因之至伊人鄭氏以為知周禮之賢人乃在大水一邉葢言其逺也欲求而用之陳氏歐陽氏謂伊人斥襄公東萊謂伊人猶曰所謂此理葢指周禮也襄公所以未能用周禮者疑其迂耳故詩人諷之以禮甚易且近特人求之非其道耳此皆序說愈巧而愈鑿如此案序蒹葭刺襄公未能用周禮朱子以為其說近於鑿然集傳所謂彼人者仍不知其何所指也今反覆讀之曰伊人曰從之曰宛在恍若有髙人逸士隐於水濵潛深伏隩可望不可即者則以是篇作懐人思賢詠觀可也終南何有有條有梅叶莫悲反君子至止錦衣狐裘叶渠之反顔如渥於角反丹其君也哉叶將黎反集傳興也終南山名毛氏萇曰終南周之名山中南也孔氏穎達曰昭四年左傳曰荆山中南九州之險是此一名中南也嚴氏粲曰長樂劉氏云終南在鎬亰之南也以其在南故云南山班固西都賦云表以大華終南之山大華雖高而在東不若終南在前舉頭剈見故周多以南山言之在今京兆府南皇輿表京兆府即今陕西西安府條山楸音秋也皮葉白色亦白材理好宜為車版曹氏粹中曰條梅皆良材言終南所有富而且羙也君子指其君也至止至終南之下也錦衣狐裘諸侯之服也玊藻曰君衣狐白裘錦衣以裼之孔氏穎逹曰諸侯在國服麑裘不服狐白狐裘為朝廷之服諸侯在天子之朝廷服此服耳諸侯受天子之賜歸則服之以告廟於後不復服之馮氏復京曰古人之裘最重狐白故天子以為朝服諸侯以為賜服凡在朝君臣同服而惟卿大夫得衣之又别其裼衣天子諸侯以錦卿大夫以素葢禮服之重者也渥漬疾賜反也季氏本曰渥丹猶簡兮所謂渥赭言其有樂意而顔色赤澤也其君也哉言容貌衣服稱其為君也劉氏辰翁曰其君也哉亦似賦其始見也此秦人美其君之詞亦車鄰駟驖之意也集說程子曰終南崇髙厚大以興君位之尊山之高大必生美材人君尊崇必有令徳故宜稱顯服又美其容貌稱人君之位蘇氏轍曰終南則有草木以自交被而成其深君子則有服章以自嚴飾而成其尊其君也哉嚴憚之詞也朱子曰襄公雖未能遽有周地然既有天子之命矣穀梁子曰王者無外命之則成矣嚴氏粲曰平王以岐西之地賜襄公岐西之地其名山莫如終南舉終南則可以談岐西言岐西山髙木茂氣象葱鬰我襄公自周受命而歸其將被顯服正顔色儼然君臨於此土也哉其者將然之辭哉者疑而未定之辭終南何有有紀有堂君子至止黻音弗衣繡裳珮玊將將七羊反壽考不忘集傳興也紀山之廉角也堂山之寛平處也毛氏萇曰紀基也堂畢道平如堂也孔氏穎逹曰基謂山基也釋邱云畢堂牆郭璞曰今終南山道名畢其邉若堂之牆黻之狀亞兩已相戾也繡刺七亦反繡也毛氏萇曰黑與青謂之黻五色備謂之繡孔氏穎達曰黻皆在裳言黻衣者衣大名與繡裳異其文耳將將佩玊聲也壽考不忘者欲其居此位服此服長久而安寜也朱子曰亦戒勸之辭集說程子曰紀稜角堂平寛紀興禮法堂興徳度山必有紀堂君必有禮徳故宜其服稱其位當修其徳保其位故曰壽考不忘也曹氏粹中曰襄公雖據秦國形勢之壮當盡臣節服其命服以時而来聘享於王庭久而不失其職佩玉將將然徳音有常而無懈乃得長享有秦國壽考不忘矣此戒勸之意總論范氏處義曰有條有梅則材木可用有紀有堂則形勢可居詩人謂岐豐之地其美如此而襄公以王命而得之又受諸侯之顯服顔如渥丹其君也哉謂其容貌之盛足以稱人君之位也佩玉將將壽考不忘謂其佩服之美終身不可忘周之賜也輔氏廣曰棊人見其君名位衣服之盛冄三誇美之以至頌禱其安且久也此亦可見君臣之彜常有不容己者其或怨刺之作則必有大不得已者焉終南二章章六句集說孔氏穎達曰美之者美以功徳受顯服戒勸之者戒令修徳無倦勸其務立功業也李氏樗曰襄公能却西戎之鋒敵王所愾使周室得以東遷洛邑以是封諸侯受顯服大夫恐其志驕意滿怠於修徳故因羙之而遂以戒勸也交交黃鳥止于棘誰從穆公子車奄息維此奄息百夫之特臨其穴叶戸橘反惴惴其慄彼蒼者天叶鐵因反殲子廉反我良人如可贖兮人百其身集傳興也交交飛而往来之貌從穆公從死也沈氏守正曰詩作於己殉之後故稱穆公子車氏孔氏穎達曰左傳作子輿輿車字異義同奄息名孔氏穎逹曰傳以奄息為名仲行亦為名箋云仲行為字者以伯仲叔季為字之常也然則鍼虎亦名矣或名或字取甚韻耳特傑出之稱王氏安石曰百夫之特則特出於百夫穴壙也惴惴懼貌慄懼殲盡良善贖貿音茂也秦穆公卒嚴氏粲曰疏曰穆公任好徳公子以子車氏之三子為殉孔氏穎達曰殺人以葬璇環其左右曰殉皆秦之良也國人哀之為之賦黄鳥事見春秋傳劉氏瑾曰見文公六年即此詩也言交交黄鳥則止于棘矣誰從穆公則子車奄息也葢以所見起興也臨穴而惴惴葢生納之壙中也三子皆國之良而一旦殺之若可貿以他人則人皆願百其身以易之矣集說曹氏粹中曰黄鳥聲音顔色之美人所愛悦猶三良為人之所愛也嚴氏粲曰黄鳥飛而往来止于棘木得其所也今良人從死非其所也此奄息之死若可以他人贖之則當以百人之身贖之言百人不如一賢也交交黄鳥止于桑誰從穆公子車仲行戸郎反維此仲行百夫之防臨其穴惴惴其慄彼蒼者天殲我良人如可贖兮人百其身集傳興也防當也吕氏祖謙曰訓防為當者葢如隄防之防水朱氏道行曰防取捍衛意言一人可以當百夫也集說徐氏常吉曰唯其才可以當百夫故願百其身以贖之交交黄鳥止于楚誰從穆公子車鍼其廉反虎維此鍼虎百夫之禦臨其穴惴惴其慄彼蒼者天殲我良人如可贖兮人百其身集傳興也禦猶當也王氏安石曰百夫之禦則能禦百夫者也總論蘇氏轍曰臣之託君猶黄鳥之止于木交交其和鳴今三子獨不得其死曽鳥之不若也然三良之死穆公之命也康公從其言而不改其亦異於魏顆矣故黄鳥之詩交譏之也朱子曰三人者不食其言以死從君而詩人不為美者死不為義不足羙也黄鳥三章章十二句集傳春秋傳曰君子曰秦穆公之不為盟主也宜哉死而棄民先王違世猶貽之法而況奪之善人乎今縱無法以遺後嗣而又收其良以死難以在上矣君子是以知秦之不復東征也愚案穆公於此其罪不可逃矣但或以為穆公遺命如此而三子自殺以從則三子亦不得為無罪今觀臨穴惴慄之言則是康公從父之亂命迫而納之於壙其罪有所歸矣又案史記秦武公卒初以人從死死者六十六人至穆公遂用百七十七人而三良與焉葢其初特出于戎狄之俗而無明王賢伯以討其罪於是習以為常則雖以穆公之賢而不免論其事者亦徒閔三良之不幸而歎秦之衰至於王政不綱諸侯擅命殺人不忌至於如此則莫知其為非也嗚呼俗之弊也乆矣其後始皇之葬後宮皆令從死工匠生閉墓中尚何怪哉集說黄氏佐曰秦獻公元年始下命止從死者然則自穆公以至康公其國俗既以願殉為義國亦不立法禁也責穆公不察其非理無遺命以變其俗則可責穆公有遺命迫其從死則不可也惟孫太山止責康公而不及其他此為得其情者至朱子之論而是非始定錢氏天錫曰夫死生之際亦重矣三良之從死豈能不介於懷臨穴惴惴非其本心也夫亦有所迫而不獲已耳東坡過秦穆公墓云穆公生不誅孟明豈有死之日而忍用其良罪康公也鴥伊稱反彼晨風叶孚愔反鬱彼北林未見君子憂心欽欽如何如何忘我實多集傳興也鴥疾飛貌晨風鸇也陸氏璣曰鷂似鷂青黄色燕頷句喙嚮風揺翅乃因風飛急疾撃鳩鴿燕雀食之鬱茂盛貌君子指其夫也欽欽憂而不忘之貌婦人以夫不在而言鴥彼晨風則歸於鬱然之北林矣故我未見君子而憂心欽欽也彼君子者如之何而忘我之多乎此與扊扅之歌同意葢秦俗也孫氏愐曰扊扅户牡所以止扉或作剡移劉氏瑾曰晋獻公滅虞百里奚亡秦走宛楚鄙人執之秦穆公聞其賢以五羖羊皮贖之授以國政後因作樂所賃澣婦自言知音呼之援琴而歌曰百里奚五羊皮臨别時烹伏扶富反雌炊扊扅今富貴忘我為因問之乃其妻也集說朱氏公遷曰物有所歸則意甚得人無所託則憂不忘人不如物故以起興黄氏佐曰言我既不忘君子君子宜亦以我之心為心可也今從事於外如之何而莫我肯顧以日月計之不日不月而忘我之多豈一日一月乎哉以朝夕計之靡朝靡夕而忘我之多豈一朝一夕乎哉忘我實多與不我遐棄相反錢氏天錫曰只不歸便是忘曰多者以時之久言也附録毛氏萇曰先君招賢人賢人往之駛疾如晨風之飛入北林鄭氏康成曰先君謂穆公孔氏穎達曰穆公能招賢故賢者疾往而歸之穆公未見君子之時思望之憂心欽欽然惟恐不見今康公乃棄其賢臣故以穆公之意責之程子曰以晨風興君子取其来去之疾人君好賢待士有道則賢者歸之禮貌不至則浩然去矣林木茂盛則飛鳥所集興朝廷有道則賢者所就也此詩主賢者見棄之意而言故云忘我如何如何歎其如是也山有苞櫟盧狄反叶歴各反隰有六駮邦角反未見君子憂心靡樂音洛如何如何忘我實多集傳興也駮梓榆也其皮青白如駮山則有苞櫟矣陸氏璣曰秦人謂柞櫟為櫟河内人謂木蓼為櫟此秦詩也宜從其方土之言柞櫟是也隰則有六駮矣孔氏穎達曰釋畜云駮如馬倨牙食虎豹然則此獸名駮而已言六者王肅云據所見而言也陸璣疏云下章云山有苞棣隰有樹檖皆山隰之木可配不宜云獸此言非無理也但箋傳不言未見君子則憂心靡樂矣靡樂則憂之甚也集說朱氏公遷曰山高隰下則有樂與駮夫婦離合則有靡樂之憂心物與地相宜而情與事相繫也故以爲興姚氏舜牧曰山隰有上下喻夫婦之倡随也附録鄭氏康成曰山之櫟隰之駮皆其所宜有也言賢者亦國家所宜有之程子曰言當念下之有賢才也櫟山之所有也而有茂盛而苞者衆人之中固有秀異者矣隰有六駮亦然六見其盛多也義亦苞聚之類如下之有賢則當求而用之故於未見則憂而靡樂如何反忘我乎山有苞棣隰有樹檖未見君子憂心如醉如何如何忘我實多集傳興也棣唐棣呂氏祖謙曰解見何彼穠矣檖赤羅也郭氏璞曰今楊檖也陸氏佃曰其文細宻如羅故曰羅又有白羅雖皆文木然赤羅為上實似梨而小酢可食如醉則憂又甚矣總論程子曰欽欽靡樂如醉淺深之次漸言其至也鄒氏泉曰首章以物之有所止興已之有所憂二三章亦以山與隰之所有興未見君子而有憂也晨風三章章六句集說趙氏一元曰雍州無鄭衞浮靡之習故其民多深厚之思晨風之歌是也夫秦民輕生樂戰棄其室家而莫之顧寜保其無相忘乎吁視汝墳殷靁之風逺矣附録范氏處義曰此詩乃穆公舊臣謂穆公待賢之禮厚而康公棄其賢臣也呂氏祖謙曰此詩亦如權輿刺康公與賢者有始而無終也案晨風詩毛鄭以後諸儒皆從序說刺康公忘穆公之業始棄其賢臣與權輿篇同類而觀之朱子則改為婦人念其君子之詞又引扊扅歌以證西秦風俗葢康公棄賢固無從考其實事而思婦獨居與賢士失所亦情之相似而理之可通者也豈曰無衣與子同袍抱毛反叶歩謀反王于興師修我戈矛與子同仇集傳賦也袍襺音繭也孔氏穎達曰玊藻云纊為襺緼為袍純著新綿名為襺雜用舊絮名為袍戈長六尺六寸陳氏祥道曰五兵之便於用者戈而已可以摏可以斬可以撃可以鉤矛長二丈孔氏穎達曰謂酋矛也夷矛則三尋長二丈四尺矣記云攻國之兵用短守國之兵用長此言興師以伐人國知用二丈之矛非夷矛也王于興師以天子之命而興師也秦俗強悍樂於戰鬪故其人平居而相謂曰豈以子之無衣而與子同袍乎葢以王于興師則將修我戈矛而與子同仇也陳氏鵬飛曰仇怨也其懽愛之心足以相死如此蘇氏曰秦本周地故其民猶思周之盛時而稱先王焉或曰興也取與子同三字為義毛氏萇曰興也上與百姓同欲則百姓樂致其死孔氏穎達曰言朋友相與同袍以興君與百姓同欲後章放此集說曹氏粹中曰王始曰興師則民已各修其戈矛矣不戒而孚不令而服也朱氏公遷曰我有緼袍而與爾共之者非謂爾之無衣也君有仇讎葢欲與爾共報耳市思結死以為君上此奮不顧身者之所為也沈氏守正曰秦人勇公戰怯私閟即平居相要其好勇輕生尚功負氣如此蘇子所謂秦人好戰之心囂然而未有己者是也曰王于興師猶知勤王也附録鄭氏康成曰此責康公之言也君豈嘗曰女無衣我與女共袍乎言不與民同欲君不與我同欲而於王興師則云修我戈矛與子同仇往伐之刺其好攻戰孔氏穎達曰案此時當周頃王匡王天子之命不行於諸侯天子未嘗出師又不見康公從王征伐且從王乃是為臣之義而刺其好攻戰者箋言王于出師謂於王法興師今是康公自興之王不興師也以出師征伐是王者之法故以王為言耳豈曰無衣與子同澤叶徒洛反王于興師修我矛㦸叶訖約反與子偕作集傳賦也澤裏衣也以其親膚近於垢澤故謂之澤陸氏徳明曰澤如字說文作襗云袴也戟車㦸也長丈六尺鄭氏康成曰車㦸常也劉氏熙曰㦸格也旁有枝格也豈曰無衣與子同裳王于興師修我甲兵叶晡茫反與子偕行叶戸郎反集傳賦也行徃也集說陳氏祥道曰考工記函人為甲犀甲七屬兕甲六屬合甲五屬甲亦曰介曰函曰鎧經言甲而不及鎧則古者之甲以革為之後世乃用金耳周官司兵軍事㑹同建車之五兵戈殳㦸酋矛夷矛也歩之五兵無夷矛而有弓矢也然夷矛雖不施於步而弓矢未嘗不設於車陳氏鴻謨曰作有奮發振作意行有踊躍樂從意總論訐氏謙曰先王之制民居於近郊者為比閭族黨州鄉居逺郊者則有鄰里鄼鄙縣遂使之相保相受其在野則八家同井使之友助扶持有事則㑹萬民為卒伍而用之平居暇日情意之孚恩愛之接固己彼此交得懽心一旦同在戰陣而左提右挈協心力戰可以揚威而制勝不幸而敗亦争相為死此王者之兵所以無敵也秦舊周也先王遺化猶有存者其曰同袍者相賙之意也其曰同仇者相死之心也但秦不善用之一導之以武事而不知以禮故敦厚之風化為剛暴之氣而遂至於不可禁也朱氏善曰與子同袍恩愛相結於無事之時也與子同仇患難相恤於有事之日也曰王于興師則非從其君之私也誠欲其君奉王命而為討賊復讎之舉也無衣三章章五句集傳秦人之俗大抵尚氣概先勇力忘生輕死故其見於詩如此然本其初而論之岐豐之地文王用之以興二南之化如彼其忠且厚也秦人用之未幾而一變其俗至於如此則已悍然有招音翹舉也八州而朝同列之氣矣何哉雍州土厚水深其民厚重質直無鄭衞驕惰浮靡之習以善導之則易興起而篤於仁義以猛驅之則其彊毅果敢之資亦足以彊兵力農而成富彊之業非山東諸國所及也嗚呼後世欲為定都立國之計者誠不可不監乎此而凡為國者其於導民之路尤不可不審其所之也集說陳氏鵬飛曰襄公攘西戎救王室之難因此列為諸侯故其民至是猶知王室之尊然後知東遷之後王室雖㣲而本於人心者未泯讀文侯之命者歎平王之無志其有以哉謝氏枋得曰考春秋二百四十二年之傳可以知天下無復讎之志矣獨無衣一詩毅然以天下大義為己任秦國何人所作千載而下聞其風莫不興起況親炙其人乎附錄孔氏穎達曰康公以文七年立案春秋文七年晋人秦人戰于令狐十年秦伯伐晋十二年晋人秦人戰于河曲十六年楚人秦人滅庸見於經傳者已如是序故云刺用兵也不與民同欲章首二句是也好攻戰者下三句是也范氏處義曰襄公征伐不休則詩人羙之謂其有王命而復世讎是民之所同欲也康公征伐出於修怨逞忿且無王命豈民所欲哉詩人再三以王于興師言深譏其征伐不自天子出也案序無衣刺用兵也不指某公鄭箋則指康公朱子初解曰襄公攘戎狄報君父之讎故征伐不休而詩人羙之康公令狐之戰修私怨逞小忿故好攻戰亟用兵而詩人刺之是以此詩為刺也集傳以為秦人平居相謂之辭則似羙而非刺然引蘇轍之言曰秦本周地其民猶思周之盛時則作東遷以後詩觀矣然東遷從康公有令狐河曲及滅庸之舉未聞有為王興師之事則序之以為刺或亦然也我送舅氏曰至渭陽何以贈之路車乘繩證反黄集傳賦也舅氏毛氏萇曰母之昆弟曰舅孔氏穎達曰舅之與甥氏姓必異故書傳通謂為舅氏秦康公孔氏穎達曰康公罃穆公子之舅晋公子重平聲耳也出亡在外穆公召而納之時康公為太子送之渭陽而作此詩渭水名秦時都雍至渭陽者葢東行送之於咸陽之地也孔氏潁逹曰雍在渭南水北曰陽晋在秦東行必渡渭地理志云右扶風渭城縣故咸陽也其地在渭水之北王氏應麟曰水經渭水逕長安城北注即咸陽也郡縣志京兆府咸陽縣本秦舊縣渭水南去縣三里秦咸陽在今縣東二十二里路車諸侯之車也董氏逌曰巾車金路以封同姓象路以封異姓革路以封四衛木路以封蕃國皆諸侯也故人君之車曰路車朱氏道行曰路車繁纓七就乃象革二路若金路玉路非天子封建同姓不得而有乘黄四馬皆黄也集說嚴氏粲曰送舅涉渭至水之北何以贈舅氏乎惟路車秉馬而已歉然猶以為薄意有餘也如采菽云雖無予之路車乘馬也見殷勤繾綣於舅而思母之意隐然於不言之中矣黄氏佐曰贈之只是行者必以贐之意不須說舅歸為諸侯我可無路車乘黄之贈乎如此則赠之之意似見不誠矣我送舅氏悠悠我思叶新齎反何以贈之瓊瑰古回反玊佩叶蒲睂反集傳賦也悠悠長也序以為時康公之母穆姬已卒故康公送其舅而念母之不見也沈氏守正曰詩本送舅而序云康公念母指其意中事也或曰穆姬之卒不可考此但别其舅而懐思耳瓊瑰石而次玉孔氏穎達曰瓊者王之羙名瑰是羙石之名也佩玊之制惟天子用純諸侯以下則玊石雜用集說孔氏穎達曰秦姬生存之時欲使文公反國康公見舅得反憶母宿心故念母之不見見舅如母存也嚴氏粲曰送舅而有所思則思母也此詩念母而不言母但言見舅而勤拳不已自有念母之意讀之者但覺其味悠然深長也瓊瑰玊佩雖贈之貴矣然未足以舒我心之思也總論輔氏廣曰讀是詩者見其情意周至言有盡而意無窮良心之發固如是也薛氏應旂曰上章是送之有所在而以所乘贈之下章是送之有所思而以所佩贈之渭陽二章章四句集傳案春秋傳晋獻公烝於齊姜生秦穆夫人太子申生娶犬戎胡姬生重耳小戎子生夷吾驪姬生奚齊其娣生卓子驪姬譖申生申生自殺又譖二公子二公子皆出奔獻公卒奚齊卓子繼立皆為大夫里克所弑秦穆公納夷吾是為惠公卒子圉立是為懐公立之明年秦穆公又召重耳而納之是為文公王氏曰至渭陽者送之逺也悠悠我思者思之長也路車乘黄瓊瑰玊佩者贈之厚也廣漢張氏曰康公為太子送舅氏而念母之不見是固良心也而卒不能自克於令狐之役劉氏瑾曰左傳文公七年晉敗秦師于令狐怨欲害乎良心也使康公知循是心養其端而充之則怨欲可消矣集說范氏祖禹曰見舅而思其母此人之情也人能充是心則孝亦無不至矣若康公者未能充之也然其以是心而作是詩亦足以為孝矣朱氏道行曰讀渭陽便見晋伯中原皆西秦羽翼雖曰甥情實奉父命傳記穆公為重耳慮與以紀綱之僕三千人皆所以鄭重其行藉以定晉者也春秋於秦晉交戰每主晉客秦多抑揚焉即錄詩渭陽之意於我乎夏屋渠渠今也每食無餘于音吁嗟乎不承權輿集傳賦也夏大也渠渠深廣貌馮氏復京曰案夏屋毛無明訓鄭則以為大具以食我王肅以為屋室之屋而朱子從之承繼也權輿始也胡氏一桂曰陳氏曰作量自權始以準量由此而生造車自輿始以葢軫由此而起故謂始曰權輿此言其君始有渠渠之夏屋以待賢者而其後禮意寖衰供億寖薄杜氏預曰供給億安也至於賢者每食而無餘於是歎之言不能繼其始也集說蘇氏轍曰穆公好賢居之以大屋渠渠其深廣至於康公而遇之薄矣食之無餘者故曰不承權輿輔氏廣曰以為不能繼其始而已無已甚之辭也讀是詩者則知可以怨之義矣於我乎每食四簋叶已有反今也每食不飽叶捕苟反于嗟乎不承權輿集傳賦也簋瓦器孔氏穎達曰考工記云旊人為簋則簋是瓦器也易損卦二簋可用享注云離為日日體圓巽為木木器圓簋象則簋亦以木為之也容斗二勝王氏逢曰勝孔疏作升方曰簠圓曰簋簠盛稻粱簋盛黍稷四簋禮食之盛也孔氏穎達曰案公食大夫禮宰夫膳稻於粱西注云膳猶進也進稻粱者以簠然則稻粱當在簠詩言每食四簋稱君禮物大具則宜每器一物不應以黍稷二物分為四簋知此四簋之内兼有稻粱集說輔氏廣曰夏屋渠渠無不致其備也每食無餘無一致其備也每食四簋無不極其至也毎食不飽無一極其至也其進銳者其退速惟有恒者然後可久也謝氏枋得曰孟子曰古之君子所就三所去三康公之用賢禮貎衰而不去至於每食不飽豈非饑餓免死者乎康公固可刺當時號為賢者亦為可恥矣總論范氏處義曰此詩始終言飲食葢人君禮貎其臣意之厚薄即是而可卜也朱氏公遷曰秦君非有好賢之誠心者故其無恒如此姚氏舜牧曰凡人君之禮賢與賢者之所自處不獨在居食之閒然非此不足以見其意也此而寖薄禮意從可知矣此賢者之所為去也權輿二章章五句集傳漢楚元王敬禮申公白生穆生穆生不嗜酒元王每置酒嘗為穆生設醴及王戊即位常設後忘設焉穆生退曰可以逝矣醴酒不設王之意怠不去楚人將鉗巨廉反我於市遂稱疾申公白生強起之曰獨不念先王之德歟今王一旦失小禮何足至此穆生曰先王之所以禮吾三人者為道之存故也今而忽之是忘道也忘道之人胡可與久處豈為區區之禮哉遂謝病去亦此詩之意也輔氏廣曰引穆生之事為證者推原詩人之心葢本於此不然則其所計者不過區區於安居餔歇之事而已恐非賢者之志也集說孔氏穎逹曰作權輿詩者刺康公也康公遺忘其先君穆公之舊臣不加禮餼與賢者交接有始無終初時殷勤後則疏薄故刺之嚴氏粲曰以伐木觀權輿周秦氣象判然矣案是詩朱子初說仍依序指康公而言吕祖謙作讀詩記嘗引之矣及著集傳則泛言其君而不辨序說為非是至章末引楚元王事為證則猶是序意也故前儒從古義者叅録之秦國十篇二十七章一百八十一句集說張子曰車鄰駟驖小戎諸詩武事備矣葢其地與戎錯而秦仲以来武事最勝故能使秦伯有天下者是詩也而使之不二世而失國者亦是詩也夫其嚴急之風與三代温柔敦厚抑何逺哉錢氏天錫曰康節論夫子㝎書以秦誓綴周魯之後謂其知周之必為秦也即其刪詩亦然齊桓晉文更伯以来列國皆已不振唯秦獨駸駸乎始大故齊晉之後次以秦風周亡而秦興夫子已早見其兆矣不然秦始僻逺實與吳楚僭王等乃吴楚詩無傳而秦風卒不削以此知康節之言益信欽定詩經傳說彚纂卷七
