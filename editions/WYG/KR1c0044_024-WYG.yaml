body:
  text: 欽定四庫全書欽定詩經傳說彚纂詩序上朱子辯說詩序之作說者不同或以為孔子程子曰大序是仲尼作或以為子夏朱子曰王肅沈重亦云大序是子夏作小序子夏毛公合作或以為國史程子曰國史明乎得失之迹是也皆無明文可考惟後漢書儒林傳以為衛宏作毛詩序今傳於世則序乃宏作明矣然鄭氏又以為諸序本自合為一編毛公始分以寘諸篇之首孔氏穎達曰毛傳不訓序者以分置篇首義理易明性好簡畧故不為傳則是毛公之前其傳已久宏特増廣而潤色之耳隋經籍志先儒相承謂毛詩序子夏所創毛公及衛敬仲更加潤益故近世諸儒多以序之首句為毛公所分而其下推説云云者為後人所益理或有之但今考其首句則已有不得詩人之本意而肆為妄説者矣況沿襲云云之誤哉然計其初猶必自謂出於臆度之私非經本文故且自為一編别附經後孔氏穎達曰漢初為傳訓者皆與經别行藝文志云毛詩經二十九卷毛詩故訓傳三十卷是毛為詁訓亦與經别也及後漢以來始就經為注朱子曰古本詩序别作一處如易大傳及班固序傳竝在後京師舊本揚子注其序亦總在後又以尚有齊魯韓氏之說竝傳於世故讀者亦有以知其出於後人之手不盡信也及至毛公引以入經乃不綴篇後而超冠篇端不為注文而直作經字不為疑辭而遂為決辭其後三家之傳又絶而毛説孤行則其抵捂之迹無復可見故此序者遂若詩人先所命題而詩文反為因序以作於是讀者傳相尊信無敢擬議至於有所不通則必為之委曲遷就穿鑿而附合之寧使經之本文繚戾破碎不成文理而終不忍明以小序為出於漢儒也愚之病此久矣然猶以其所從來也逺其間容或真有傳授證騐而不可廢者故既頗采以附傳中而復幷為一編以還其舊因以論其得失云集說程子曰詩小序要之皆得大意只後之觀詩者亦添入張子曰詩序亦有後人添入者則極淺近自可辨大序詩者志之所之也在心為志發言為詩情動於中而形於言言之不足故嗟歎之嗟歎之不足故永歌之永歌之不足不知手之舞之足之蹈之也情發於聲聲成文謂之音治世之音安以樂其政和亂世之音怨以怒其政乖亡國之音哀以思其民困故正得失動天地感鬼神莫近乎詩先王以是經夫婦成孝敬厚人倫美教化移風俗故詩有六義焉一曰風二曰賦三曰比四曰興五曰雅六曰頌上以風化下下以風刺上主文而譎諫言之者無罪聞之者足以戒故曰風至於王道衰禮義廢政教失國異政家殊俗而變風變雅作矣國史明乎得失之迹傷人倫之變哀刑政之苛吟詠性情以風其上達於事變而懷其舊俗者也故變風發乎情止乎禮義發乎情民之性也止乎禮義先王之澤也是以一國之事繫一人之本謂之風言天下之事形四方之風謂之雅雅者正也言王政之所由廢興也政有小大故有小雅焉有大雅焉頌者美盛德之形容以其成功告於神明者也是謂四始詩之至也小序周南關雎后妃之德也辯說后妃文王之妃大姒也天子之妃曰后近世諸儒多辨文王未甞稱王則大姒亦未甞稱后序者盖追稱之亦未害也但其詩雖若專美大姒而實以深見文王之德序者徒見其詞而不察其意遂壹以后妃為主而不復知有文王是固已失之矣至於化行國中三分天下亦皆以為后妃之所致則是禮樂征伐皆出於婦人之手而文王者徒擁虚器以為寄生之君也其失甚矣惟南豐曽氏之言曰先王之政必自内始故其閨門之治所以施之家人者必為之師傅保姆之助詩書圖史之戒珩璜琚瑀之節威儀動作之度其教之者有此具然古之君子未甞不以身化也故家人之義歸於反身二南之業本於文王豈自外至哉世皆知文王之所以興能得内助而不知其所以然者盖本於文王之躬化故内則后妃有關雎之行外則羣臣有二南之美與之相成其推而及逺則商辛之昏俗江漢之小國兔罝之野人莫不好善而不自知此所謂身修故國家天下治者也竊謂此說庶幾得之風之始也辯說所謂闗雎之亂以為風始是也盖謂國風篇章之始亦風化之由始也所以風天下而正夫婦也故用之鄉人焉用之邦國焉孔氏穎逹曰儀禮鄉飲酒禮乃合樂周南關雎是用之鄉人也燕禮遂歌鄉樂周南關雎是用之邦國也施化之法自上而下此先言風天下而正夫婦焉既言化及于民遂從民而廣之故先鄉人而後邦國也李氏樗曰詩之雅頌惟用於宗廟朝廷郊祀燕饗非其所用者不得用也至於正夫婦之道自天子達於庶人未甞有二道也辯說說見二南總論邦國謂諸侯之國明非獨天子用之也風風也教也風以動之教以化之王氏安石曰風之於物方其鼓舞摇蕩所謂動之也及其因形移易使榮者枯甲者坼乃所謂化之也詩之有風亦若是也始於風之而動終於教之而化辯說承上文觧風字之義以象言則曰風以事言則曰教然則關雎麟趾之化王者之風故繫之周公南言化自北而南也鵲巢騶虞之德諸侯之風也先王之所以教故繫之召公辯說說見二南卷首關雎麟趾言化者化之所自出也鵲巢騶虞言德者被化而成德也以其被化而後成德故又曰先王之所以教先王即文王也舊説以為大王王季誤矣程子曰周南召南如乾坤乾統坤坤承乾也周南召南正始之道王化之基孔氏穎逹曰髙以下為基逺以近為始文王正其家而後及其國是正其始也化南土以成王業是王化之基也季札見歌周南召南曰始基之矣猶未也服䖍云未有雅頌之成功亦謂二南為王化基始序意出於彼文也辯說王者之道始於家終於天下而二南正家之事也王者之化必至於法度彰禮樂著雅頌之聲作然後可以言成然無其始則亦何所因而立哉基者堂宇之所因而立者也程子曰有關雎麟趾之意然後可以行周官之法度其為是歟是以關雎樂得淑女以配君子憂在進賢不淫其色哀窈窕思賢才而無傷善之心焉是關雎之義也辯說按論語孔子甞言關雎樂而不淫哀而不傷盖淫者樂之過傷者哀之過獨為是詩者得其性情之正是以哀樂中節而不至於過耳而序者乃析哀樂淫傷各為一事而不相湏則已失其㫖矣至於傷為傷善之心則又大失其旨而全無文理也或曰先儒多以周道衰詩人本諸衽席而關雎作故揚雄以周康之時關雎作為傷始亂杜欽亦曰佩玉晏鳴關雎歎之說者以為古者后夫人雞鳴佩玉去君所周康后不然故詩人歎而傷之此魯詩說也與毛異矣歐陽氏修曰齊魯韓三家皆以為康王政衰之詩前漢杜欽傳曰佩玉晏鳴關雎歎之瓉曰此魯詩也後漢明帝詔曰昔應門失守關雎刺世注薛君韓詩章句曰人君退朝后妃御見有度應門擊柝鼔人上堂今内傾於色故詠關雎說淑女以刺時吕氏祖謙曰魯齊韓毛師讀既異義亦不同關雎正風之首三家者乃以為刺餘可知矣王氏應麟曰薛士龍曰關雎作刺之說是賦其詩者但以哀而不傷之意推之恐其有此理也曰此不可知矣但儀禮以關雎為鄉樂又為房中之樂則是周公制作之時已有此詩矣若如魯說則儀禮不得為周公之書儀禮不為周公之書則周之盛時乃無鄉射燕飲房中之樂而必有待乎後世之刺詩也其不然也明矣且為人子孫乃無故而播其先祖之失於天下如此而尚可以為風化之首乎附録王氏肅曰哀窈窕之不得思賢才之良質無傷善之心焉若苟慕其色則善心傷也孔氏穎逹曰憂在進賢下三章是也不淫其色首章上二句是也此詩之作主美后妃進賢所以能進賢者由不淫其色故先言不淫其色序論作者之意主在進賢故先云進賢所以經序倒也葛覃后妃之本也后妃在父母家則志在於女功之事躬儉節用服澣濯之衣尊敬師傅則可以歸安父母化天下以婦道也辯說此詩之序首尾皆是但其所謂在父母家者一句為未安盖若謂未嫁之時即詩中不應遽以歸寧父母為言況未嫁之時自當服勤女功不足稱述以為盛美若謂歸寧之時即詩中先言刈葛而後言歸寧亦不相合且不常為之於平居之日而暫為之於歸寧之時亦豈所謂庸行之謹哉序之淺拙大率類此集說范氏處義曰王業之本在知稼穡艱難内治之本在女功之事序詩者謂后妃在父母家則志在女功之事此推本而言之也在家而志女功雖未足為異惟大姒能不忘其本故既貴而為后妃能躬行儉德節抑用度服澣濯之衣則不侈尊敬師傳則不驕以此而歸問安於父母則天下之感化皆知為婦之道當然也朱氏公遷曰此詩作於将告歸寧之時非務勤儉於此時也卷耳后妃之志也又當輔佐君子求賢審官知臣下之勤勞内有進賢之志而無險詖私謁之心朝夕思念至於憂勤也孔氏穎逹曰輔佐君子總辭也求賢審官至於憂勤皆是輔佐君子之事君子所專后妃志意如然故云后妃之志也至於憂勤即首章上二句是也求賢審官即首章下二句是也序見后妃求賢而憂勤故先言求賢經主美后妃之志能為此憂勤故先言其憂也李氏樗曰闑内之事后妃主之闑外之事天子主之故后妃之職惟在于求衆妾以助内治關雎之詩是也至于求賢審官知臣下之勤勞此乃天子之職后妃特輔佐之而已此序言后妃之志則是求賢審官知臣下之勤勞但有其志耳有進賢之志則無險詖私謁之心矣辯說此詩之序首句得之餘皆傅㑹之鑿說后妃雖知臣下之勤勞而憂之然曰嗟我懷人則其言親暱非后妃之所得施於使臣者矣且首章之我獨為后妃而後章之我皆為使臣首尾衡決不相承應亦非文字之體也樛木后妃逮下也言能逮下而無嫉妒之心焉辯說此序稍平後不注者放此螽斯后妃子孫衆多也言若螽斯不妒忌則子孫衆多也辯說螽斯聚處和一而卵育蕃多故以為不妒忌則子孫衆多之比序者不逹此詩之體故遂以不妒忌者歸之螽斯其亦誤矣蒋氏悌生曰小序若螽斯三字當在則子孫衆多之下集說朱氏公遷曰若曰不妒忌則子孫衆多如螽斯庶乎其可耳桃夭后妃之所致也不妒忌則男女以正昏姻以時國無鰥民也辯說序首句非是其所謂男女以正昏姻以時國無鰥民者得之盖此以下諸詩皆言文王風化之盛由家及國之事而序者失之皆以為后妃之所致既非所以正男女之位而於此詩又專以為不妒忌之功則其意愈狹而説愈踈矣附録李氏樗曰王氏謂禮義明則上下不亂故男女以正政事治則財用不乏故昏姻以時龜山以為不然盖男女以正昏姻以時此乃是不妒忌之所致非縁政事之治也后妃能躬行于上則周南之國皆聞風而化不待政令而人樂從之矣蒋氏悌生曰文王之化正家之道莫盛於后妃妃之徳莫盛於不妒忌小序之言亦未為失兔􅆯后妃之化也關雎之化行則莫不好德賢人衆多也嚴氏粲曰詩人因見兔罝之人處賤事而能敬便知其材之可用序者因詩人美兔􅆯之賢便知當時多好徳之賢又便知其為關雎之化非知類通達者未可與言詩也能敬即是好德辯說此序首句非是而所謂莫不好德賢人衆多者得之芣苢后妃之美也和平則婦人樂有子矣漢廣德廣所及也文王之道被於南國美化行乎江漢之域無思犯禮求而不可得也范氏處義曰德隨所寓而見故曰德廣所及道無乎不周故曰被于南國文王之化始於岐周而行乎江漢之域非德廣道被不足以形容之或疑㳺女不可求謂化及女子而不及男子竊謂無思犯禮求而不可得乃合男女而言之盖男子無犯禮之思女子有不可犯之色自然不相求也辯說此詩以篇内有漢之廣矣一句得名而序者謬誤乃以德廣所及為言失之逺矣然其下文復得詩意而所謂文王之化者尤可以正前篇之誤先儒甞謂序非出於一人之手者此其一騐但首句未必是下文未必非耳蘇氏乃例取首句而去其下文則於此類兩失之矣吕氏祖謙曰蘇氏以序為非一人之詞盖近之至于止存其首一言而盡去其餘則失之易矣汝墳道化行也文王之化行乎汝墳之國婦人能閔其君子猶勉之以正也范氏祖禹曰汝墳之國婦人閔其君子勉之以正此豈家至日見而能使之然哉民日遷善而不知為之者故曰道化行也麟之趾關雎之應也關雎之化行則天下無犯非禮雖衰世之公子皆信厚如麟趾之時也李氏樗曰劉氏以應為效非為瑞應盖以關雎之化行至使衰世之公子皆信厚以此見化行之效也衰世者指紂之世風化既衰矣而公子皆能信厚而無驕奢淫佚之行則他可知也辯說之時二字可刪召南鵲巢夫人之德也國君積行累功以致爵位夫人起家而居有之德如鳲鳩乃可以配焉鄭氏康成曰起家而居有之謂嫁于諸侯也夫人有均壹之德如鳲鳩然而後可配國君辯說文王之時關雎之化行於閨門之内而諸侯蒙化以成德者其道亦始於家人故其夫人之德如是而詩人美之也不言所美之人者世逺而不可知也後皆放此集說嚴氏粲曰言夫人之德亦以見文王齊家之化行於諸侯非專美夫人也采蘩夫人不失職也夫人可以奉祭祀則不失職矣鄭氏康成曰奉祭祀者采蘩之事也不失職者夙夜在公也范氏處義曰采蘩以奉祭祀與后供荇菜之意同可謂不失夫人之職矣草蟲大夫妻能以禮自防也王氏安石曰夫婦之際或至于敝而不終者無禮以自防故也辯說此恐亦是夫人之詩而未見以禮自防之意集說王氏應麟曰詩正義曰儀禮歌召南三篇越草蟲而取采蘋盖采蘋舊在草蟲之前曹氏詩說謂齊詩先采蘋而後草蟲采蘋大夫妻能循法度也能循法度則可以承先祖共祭祀矣王氏安石曰自所薦之物所采之處所用之器所奠之地皆有常而不敢變所謂能循法度集說吕氏祖謙曰自天子之后妃至於大夫之妻共由一道因其所處之廣狹而有斂舒焉甘棠美召伯也召伯之教明於南國集說范氏處義曰凡二南之詩非必竝作於一時後之録詩者隨所得而取之聖人於刪詩之際苐存其可以為後世法戒者初不計其作詩之先後也如甘棠之詩思其人而愛其木逺出召伯之後以其能奉行文王之教使之明於南國故詩人不以美文王而以美召伯也嚴氏粲曰武王分周召為二伯詩稱召伯是作於武王之時也作詩雖在後明教前乎此矣二南皆文王詩也行露召伯聽訟也衰亂之俗微貞信之教興强暴之男不能侵陵貞女也集說范氏處義曰行露之詩乃作於召伯在南國之日非甘棠之比也何以知之考序詩之言謂衰亂之俗至是始㣲貞信之教至是始興强暴之男至是始不能侵陵貞女則知詩作於當時也羔羊鵲巢之功致也召南之國化文王之政在位皆節儉正直德如羔羊也呂氏大臨曰徳如羔羊如羔羊之詩也嚴氏粲曰猶言好賢如緇衣國君齊家而及國其本由於關雎故曰化文王之政辯說此序得之但德如羔羊一句為衍說耳殷其靁勸以義也召南之大夫逺行從政不遑寧處其室家能閔其勤勞勸以義也范氏處義曰三章申言振振君子歸哉歸哉謂君子既能奮然自立勇於從役當竭力以俟卒事不可徒歸也相勸之辭諄復如此非知義者不能也辯說案此詩無勸以義之意集說李氏樗曰鄭氏以召南之大夫為召伯之屬孔氏云文王未稱王召伯為諸侯之臣其下不得有大夫所謂召南之大夫非必召伯之臣也自陜而西而南方之國皆召南之大夫也摽有梅男女及時也召南之國被文王之化男女得以及時也范氏處義曰男女昏姻失時固有多端或以時之凶荒無以為禮或以俗之强暴不容擇配或以役之無節不遑寧處今召南之國被文王之化既無三者之患可以及時而昏姻矣故詩三章皆幸其可以講禮又惟恐其失時也辯說此序末句未安小星惠及下也夫人無妒忌之行惠及賤妾進御於君知其命有貴賤能盡其心矣江有汜美媵也勤而無怨嫡能悔過也文王之時江沱之間有嫡不以其媵備數媵遇勞而無怨嫡亦自悔也辯說詩中未見勤勞無怨之意野有死麕惡無禮也天下大亂强暴相陵遂成淫風被文王之化雖當亂世猶惡無禮也辯說此序得之但所謂無禮者言淫亂之非禮耳不謂無聘幣之禮也集說范氏處義曰野有死麕之惡無禮亦與行露之意同盖始猶習亂强暴相陵遂成淫風既被文王之化則雖在啇之末世强暴之人已知無禮之可惡以見難化者有悛心矣則此詩作於當時可知也何彼穠矣美王姬也雖則王姬亦下嫁於諸侯車服不繫其夫下王后一等猶執婦道以成肅雝之德也辯說此詩時世不可知其說已見本篇但序云雖則王姬亦下嫁於諸侯說者多笑其陋然此但讀為兩句之失耳若讀此十字合為一句而對下文車服不繫其夫下王后一等為義則序者之意亦自明白盖曰王姬雖嫁於諸侯然其車服制度與他國之夫人不同所以甚言其貴盛之極而猶不敢挾貴以驕其夫家也但立文不善終費詞說耳鄭氏曰下王后一等謂車乘厭音葉翟音狄勒面繢音繪緫服則褕音遥翟孔氏穎達曰王后五路重翟為上厭翟次之六服褘衣為上褕翟次之重翟者重用翟羽以為車茀也厭翟者次其羽使相廹也勒面謂以如玉龍勒之韋為當面飾也繢畫文也緫以繒為之著馬勒直兩耳與兩鑣也朱氏公遷曰鄭氏曰素質而五色成章曰翬青質而五色成章曰褕盖衣之上畫此二者以為文也然則公侯夫人翟茀者其翟車貝面組緫有幄也歟朱氏公遷曰翟車又次厭翟不重不厭但以翟羽飾車而已貝面者以貝飾勒之當面也組織文也幄帷裳車飾也亦名童容重翟厭翟有容有盖翟車則有容而無盖集說嚴氏粲曰詩稱王姬之車必非文王之女當從毛氏以為武王之女也武王之詩當為雅而不當為風然此詩三章只是風體當時采詩之官得之於召南之地以為武王之女下嫁召南之國能執婦道成其肅雝之德皆本於文王大姒之化故以其詩列於召南而為文王之風騶虞鵲巢之應也鵲巢之化行人倫既正朝廷既治天下純被文王之化則庻類蕃殖蒐田以時仁如騶虞則王道成也辯說此序得詩之大指然語意亦不分明楊氏曰二南正始之道王化之基盖一體也王者諸侯之風相湏以為治諸侯所以代其終也故召南之終至於仁如騶虞然後王道成焉夫王道成非諸侯之事也然非諸侯有騶虞之德亦何以見王道之成哉歐陽公曰賈誼新書曰騶者文王之囿名虞者囿之司獸也陳氏曰禮記射義云天子以騶虞為節樂官備也則其為虞官明矣獵以虞為主其實歎文王之仁而不斥言也此與舊說不同今存於此朱氏公遷曰鵲巢與關雎對騶虞與麟趾對則舊說為優集說孔氏穎逹曰言王道成者以此篇處末故總之言天下純被文王之化庶類又蒙其澤仁心能如騶虞則王化之道成矣所謂周南召南王化之基也嚴氏粲曰天下純被文王之化以大較言之謂所及者廣耳其實商王猶在未能純被也邶栢舟言仁而不遇也衛頃公之時仁人不遇小人在側辯說詩之文意事類可以思而得其時世名氏則不可以强而推故凡小序唯詩文明白直指其事如甘棠定中南山株林之屬若證騐的切見於書史如載馳碩人清人黄鳥之類決為可無疑者其次則詞旨大槩可知必為某事而不可知其的為某時某人者尚多有之若為小序者姑以其意推尋探索依約而言則雖有所不知亦不害其為不自欺雖有未當人亦當恕其所不及今乃不然不知其時者必强以為某王某公之時不知其人者必强以為某甲某乙之事於是𫝊㑹書史依託名諡鑿空妄語以誑後人其所以然者特以恥其有所不知而唯恐人之不見信而已且如栢舟不知其出於婦人而以為男子不知其不得於夫而以為不遇於君此則失矣然有所不及而不自欺則亦未至於大害理也今乃斷然以為衛頃公之時則其故為欺罔以誤後人之罪不可揜矣盖其偶見此詩冠於三衛變風之首是以求之春秋之前而史記所書莊桓以上衞之諸君事皆無可考者諡亦無甚惡者獨頃公有賂王請命之事其諡又為甄心動懼之名如漢諸侯王必其甞以罪謫然後加以此諡以是意其必有棄賢用佞之失而遂以此詩予音與之若將以􅃷其多知而必於取信不知將有明者從旁觀之則適所以暴其真不知而啟其深不信也凡小序之失以此推之什得八九矣又其為說必使詩無一篇不為美刺時君國政而作固已不切於情性之自然而又拘於時世之先後其或書傳所載當此之時偶無賢君美諡則雖有詞之美者亦例以為陳古而刺今是使讀者疑於當時之人絶無善則稱君過則稱己之意而一不得志則扼腕切齒嘻笑冷語以懟其上者所在而成羣是其輕躁險薄尤有害於温柔敦厚之教故予不可以不辯朱子曰温柔敦厚詩人之教也使篇篇是譏刺人安得温柔敦厚集說蒋氏悌生曰此篇小序朱傳極貶之然以仁人不遇小人在側之義求之經文亦未為害義亦安敢必其非頃公之時所作亦安敢必其非男子之詩亦安敢必其非不遇於君乎誠未敢輕議也孟子引詩憂心悄悄愠于羣小意集注仍用序說朱子四書工夫尤為精宻當從集注為定郝氏敬曰忠臣不得於君與賢女不得於夫情相似故忠臣常託賢女自鳴怨而不怒不遇而不忍去序所以目為仁人也案朱子詩集傳序作于淳熈四年丁酉冬十月四書集注序作於淳熙十六年己酉二月是詩集傳先成四書集注後定矣乃於孟子所引栢舟詩仍從序說為仁人不遇可見朱子原無成見惟理是揆而已甞觀讀詩記中朱子初說大抵從序義者居多此呂祖謙所見者也是時朱子甞以序說為不足信質之祖謙而祖謙未以為然及後集傳成而祖謙已不及見故朱子集中每以為憾盖至是而詩傳已兩易矣迨晩年而四書集注成其於栢舟之義又已三易矣由此推之凡集傳與序相持而原存疑義者後人仍可合儒先之論以恭觀庶無失乎朱子翼經之苦心斯為得耳緑衣衛莊姜傷己也妾上僭夫人失位而作是詩也辯說此詩下至終風四篇序皆以為荘姜之詩今姑從之然唯燕燕一篇詩文畧可據耳燕燕衛荘姜送歸妾也辯說逺送于南一句可為送戴媯之騐日月衛荘姜傷己也遭州吁之難傷己不見荅於先君以至困窮之詩也辯說此詩序以為荘姜之作今未有以見其不然但謂遭州吁之難而作則未然耳盖詩言寧不我顧猶有望之之意又言德音無良亦非所宜施於前人者明是荘公在時所作其篇次亦當在燕燕之前也終風衞荘姜傷己也遭州吁之暴見侮慢而不能正也辯說詳味此詩有夫婦之情無母子之意若果荘姜之詩則亦當在莊公之世而列於燕燕之前序說誤矣附錄蒋氏悌生曰朱子以日月終風二篇為非因州吁之難而作今觀詩文所謂無良所謂暴所謂謔浪笑傲等語又豈宜施於荘公者若反序說而欲更置此二篇于燕燕之前孰若只從序説而亦無害於義乎擊鼓怨州吁也衞州吁用兵暴亂使公孫文仲將而平陳與宋國人怨其勇而無禮也范氏處義曰衛州吁弑君簒立遽為伐鄭之役意欲求寵于諸侯以和其民抑不知犯大惡衆叛親離安能得志故雖與陳宋有成伐鄭圍其東門五日而還國人已怨之此詩終篇皆豫為喪亡之言信乎人心未易服也序詩者以用兵為暴亂為無禮衆仲謂兵猶火弗戢將自焚其言果信然此怨詩也暴如州吁猶怨而不叛所以為忠厚也歟辯說春秋隠公四年宋衞陳蔡伐鄭正州吁自立之時也序盖據詩文平陳與宋而引此為說恐或然也然傳記魯衆仲之言曰州吁阻兵而安忍阻兵無衆安忍無親衆叛親離難以濟矣夫兵猶火也弗戢將自焚也夫州吁弑其君而虐用其民於是乎不務令德而欲以亂成必不免矣案州吁簒弑之賊此序但譏其勇而無禮固為淺陋而衆仲之言亦止於此盖君臣之義不明於天下久矣春秋其得不作乎凱風美孝子也衛之淫風流行雖有七子之母猶不能安其室故美七子能盡其孝道以慰其母心而成其志爾李氏樗曰此盖七子能反躬自責盡孝道以慰其母心使母得留于家而不復嫁此詩之所為作也夫善養志者人子之職七子能盡其孝道以慰其母心而成其志此正人子當為者也辯說以孟子之說證之序說亦是但此乃七子自責之辭非美七子之作也雄雉刺衛宣公也淫亂不恤國事軍旅數起大夫久役男女怨曠國人患之而作是詩辯説序所謂大夫久役男女怨曠者得之但未有以見其為宣公之時與淫亂不恤國事之意耳兼此詩亦婦人作非國人之所為也集說范氏處義曰卒章有不知德行之説以此知是詩所謂君子盖指大夫非㣲賤之役夫也匏有苦葉刺衞宣公也公與夫人竝為淫亂歐陽氏修曰濟盈無不濡之理而涉者貪于必進自謂不濡又興宣公貪于淫欲身蹈罪惡而不自知也雉鳴求其牡者又興夫人不顧禮義而從宣公如禽鳥之相求惟知雌雄為匹而無親疎父子之别辯說未有以見其為刺宣公夫人之詩谷風刺夫婦失道也衞人化其上淫於新昏而棄其舊室夫婦離絶國俗傷敗焉孔氏穎逹曰此刺夫接其婦不以禮是夫婦失道非謂夫婦竝刺也其婦既與夫絶乃陳夫之棄已見遇非道淫於新昏之事辯說亦未有以見化其上之意式㣲黎侯寓于衞其臣勸以歸也鄭氏康成曰寓寄也黎侯為狄人所逐棄其國而寄于衞衛處之以二邑因安之可以歸而不歸故其臣勸之孔氏穎達曰此及旄丘皆陳黎臣之辭而在邶風者盖邶人述其意而作亦所以刺衛君也以旄丘之序故知為狄人所逐以經云中露泥中知處之以二邑也辯說詩中無黎侯字未詳是否下篇同旄丘責衛伯也狄人迫逐黎侯黎侯寓于衞衛不能修方伯連率音帥之職黎之臣子以責於衛也辯說序見詩有伯兮二字而以為責衞伯之詞誤矣陳氏曰説者以此為宣公之詩然宣公之後百餘年衞穆公之時晉滅赤狄潞氏數之以其奪黎氏地然則此其穆公之詩乎不可得而知也集說劉氏瑾曰以此詩為作於宣公之時固無可考但上篇黎臣有勸歸之辭則此時黎之宗社疑未滅也豈其後黎侯復國至衞穆公時方為赤狄所滅故晉人數赤狄之罪立黎侯而還以此意之式㣲旄丘二詩雖未有以見其必作於衛宣之時恐亦未必作於衞穆時也簡兮刺不用賢也衞之賢者仕於伶官皆可以承事王者也范氏處義曰衞國之賢有不得志而仕於伶官者詩人惜之其曰皆可以承王事則非止一人當是其徒相招為此故雖其才可為王官有所不顧也辯說此序畧得詩意而詞不足以達之泉水衛女思歸也嫁於諸侯父母終思歸寧而不得故作是詩以自見也鄭氏康成曰以自見者見己志也國君夫人父母在則歸寧沒則使大夫寧於兄弟衛女之思歸雖非禮思之至也北門刺士不得志也言衞之忠臣不得其志爾劉氏瑾曰朱子以此序稍平故不注然集傳以此詩為仕者自作則序意與詩亦㣲不合集說嚴氏粲曰不得志不得行其所志也王事適我政事一埤益我盖皆賢勞㣲賤之事非諌行言聼也北風刺虐也衛國竝為威虐百姓不親莫不相攜持而去焉鄭氏康成曰寒凉之風病害萬物興者喻君政教酷暴使民散亂孔氏穎達曰言衛國君臣竝為威虐使國民百姓不親附之莫不相攜持而去之歸于有道也辯說衛以淫亂亡國未聞其有威虐之政如序所云者此恐非是静女刺時也衛君無道夫人無德辯說此序全然不似詩意劉氏辰翁曰只是男女相遺之詩新臺刺衛宣公也納伋之妻作新臺於河上而要之國人惡之而作是詩也二子乘舟思伋壽也衛宣公之二子争相為死國人傷而思之作是詩也辯說二詩說已各見本篇鄘栢舟共姜自誓也衛世子共伯蚤死其妻守義父母欲奪而嫁之誓而弗許故作是詩以絶之辯說此事無所見於他書序者或有所傳今姑從之牆有茨衛人刺其上也公子頑通乎君母國人疾之而不可道也孔氏穎逹曰此主刺君故以宣姜繫於君謂之君母鶉之奔奔則主刺宣姜與頑亦所以惡公之不防閑詩人主意異也君子偕老刺衛夫人也夫人淫亂失事君子之道故陳人君之德服飾之盛宜與君子偕老也辯說公子頑事見春秋傳但此詩所以作亦未可考鶉之奔奔放此桑中刺奔也衛之公室淫亂男女相奔至於世族在位相竊妻妾期於幽逺政散民流而不可止孔氏穎達曰桑中詩者刺男女淫亂而相奔也言衛都淫亂國中男女相奔及世族相竊妻妾俱是相奔之事故序總云刺奔既上下淫亂有同亡國故序云政散民流而不可止辯說此詩乃淫奔者所自作序之首句以為刺奔誤矣其下云云者乃復得之樂記之說已畧見本篇矣而或者以為刺詩之體固有鋪陳其事不加一辭而閔惜懲創之意自見於言外者此類是也豈必譙譲質責然後為刺也哉此說不然夫詩之為刺固有不加一辭而意自見者清人猗嗟之屬是已然甞試玩之則其賦之之人猶在所賦之外而詞意之閒猶有賓主之分也豈有将欲刺人之惡乃反自為彼人之言以䧟其身於所刺之中而不自知也哉其必不然也明矣又況此等之人安於為惡其於此等之詩計其平日固已自其口出而無慚矣又何待吾之鋪陳而後始知其所為之如此亦豈畏我之閔惜而遂幡然遽有懲創之心耶以是為刺不惟無益殆恐不免於鼓之舞之而反以勸其惡也或者又曰詩三百篇皆雅樂也祭祀朝聘之所用也桑間濮上之音鄭衛之樂也世俗之所用也雅鄭不同部其來尚矣且夫子荅顔淵之問於鄭聲亟欲放而絶之豈其刪詩乃録淫奔者之詞而使之合奏於雅樂之中乎亦不然也雅者二雅是也鄭者緇衣以下二十一篇是也衛者邶鄘衞三十九篇是也桑間衛之一篇桑中之詩是也二南雅頌祭祀朝聘之所用也鄭衛桑濮里巷狹邪之所歌也夫子之於鄭衛盖深絶其聲於樂以為法而嚴立其詞於詩以為戒如聖人固不語亂而春秋所記無非亂臣賊子之事盖不如是無以見當時風俗事變之實而垂鑒戒於後世固不得已而存之所謂道竝行而不相悖者也今不察此乃欲為之諱其鄭衛桑濮之實而文之以雅樂之名又欲從而奏之宗廟之中朝廷之上則未知其将以薦之何等之鬼神用之何等之賓客而於聖人為邦之法又豈不為陽守而隂叛之耶其亦誤矣曰然則大序所謂止乎禮義夫子所謂思無邪者又何謂耶曰大序指栢舟緑衣泉水竹竿之屬而言以為多出於此耳非謂篇篇皆然而桑中之類亦止乎禮義也夫子之言正為其有邪正美惡之雜故特言此以明其皆可以懲惡勸善而使人得其性情之正耳非以桑中之類亦以無邪之思作之也曰荀卿所謂詩者中聲之所止太史公亦謂三百篇者夫子皆絃歌之以求合於韶武之音何耶曰荀卿之言固為正經而發若史遷之說則恐亦未足為據也豈有哇淫之曲而可以强合於韶武之音也耶鶉之奔奔刺衛宣姜也衞人以為宣姜鶉鵲之不若也辯說見上定之方中美衛文公也衛為狄所滅東徙渡河野處漕邑齊桓公攘戎狄而封之文公徙居楚邱始建城市而營宫室得其時制百姓説之國家殷富焉蝃蝀止奔也衛文公能以道化其民淫奔之恥國人不齒也鄭氏康成曰不齒者不與相長稚相鼠刺無禮也衞文公能正其羣臣而刺在位承先君之化無禮儀也干旄美好善也衛文公臣子多好善賢者樂告以善道也辯說定之方中一篇經文明白故序得以不誤蝃蝀以下亦因其在此而以為文公之詩耳他未有考也載馳許穆夫人作也閔其宗國顛覆自傷不能救也衛懿公爲狄人所滅國人分散露於漕邑許穆夫人閔衛之亡傷許之小力不能救思歸唁其兄又義不得故賦是詩也鄭氏康成曰滅者懿公死也君死於位曰滅露於漕邑者謂戴公也懿公死國人分散宋桓公迎衛之遺民渡河處之於漕邑而立戴公焉戴公與許穆夫人俱公子頑烝於宣姜所生也男子先生曰兄孔氏穎逹曰許穆夫人閔念衛國之亡傷已許國之小而力弱不能救故且欲歸國而唁其兄但在禮諸侯夫人父母終唯得使大夫問于兄弟有義不得歸是以許人尤之故賦是載馳之詩而見已志也辯說此亦經明白而序不誤者又有春秋傳可證衛淇奥美武公之徳也有文章又能聼其規諫以禮自防故能入相於周美而作是詩也辯說此序疑得之集說孔氏穎逹曰卒章傳曰重較卿士之車則入相爲卿士也賓之初筵云武公旣入而作是詩也則武公當幽王之時已爲卿士矣又世家云武公將兵佐周平戎甚有功平王命爲公則平王之初未命爲公亦爲卿士矣此云入相于周其時或幽或平未可知也考槃刺莊公也不能繼先公之業使賢者退而窮處鄭氏康成曰窮猶終也孔氏穎逹曰刺其不能繼其先君武公之業修徳任賢乃使賢者退而終處於澗阿張子曰此詩意怨而言樂者是終山澗不出之意辯說此為美賢者窮處而能安其樂之詩文意甚明然詩文未有見棄於君之意則亦不得為刺荘公矣序盖失之而未有害於義也至於鄭氏遂有誓不忘君之惡誓不過君之朝誓不告君以善之說則其害義又有甚焉於是程子易其訓詁以為陳其不能忘君之意陳其不得過君之朝陳其不得告君以善則其意忠厚而和平矣然未知鄭氏之失生於序文之誤若但直據詩詞則與其君初不相涉也集說歐陽氏修曰考槃夲述賢者退而窮處如鄭之說進則喜樂退則怨懟乃不知命之很人爾安得為賢者也孔孟常不遇矣所居之國其君召之以禮無不往也顔子常窮處矣人不堪其憂而不改其樂也使詩人之意果如鄭說孔子錄詩必不取也李氏樗曰初章言永矢弗諼中章言永矢弗過卒章言永矢弗告盖賢者退而窮處其居甚安雖知朝廷之不可復居矣而又不敢忘於君也孟子去齊其言曰雖然豈舍王哉王庻幾改之子曰望之夫賢者之愛君其切如此豈有不得志而遽忘愛君之誠心乎碩人閔荘姜也荘公惑於嬖妾使驕上僣荘姜賢而不荅終以無子國人閔而憂之辯說此序據春秋傳得之集說孔氏穎逹曰嬖妾謂州吁之毋惑者謂心所嬖愛使情迷惑故夫人雖賢不被荅遇范氏處義曰詩之所陳初不及莊公惑於嬖妾使驕上僭之事序詩者推本言之謂莊姜所以不見荅者由此耳莊姜之賢即燕燕日月終風之詩可以想見是詩亦不及其賢也嚴氏粲曰首序題以閔莊姜有左傳可證說詩若不用首序則以此詩爲美莊姜可乎氓刺時也宣公之時禮義消亡淫風大行男女無别遂相奔誘華落色衰復相棄背或乃困而自悔喪其妃耦故序其事以風焉美反正刺淫泆也蔣氏悌生曰序謂刺時美反正者亦曰困而自悔良心復萌耳郝氏敬曰風人美刺微婉而刺尤鮮有直者惟二雅端慤有之若民閒謳歌較臣子忠諫之情自寛如必直斥某人某事善而後爲美某人某事惡而後爲刺亦不逹於風人之志矣此篇本刺無一語譏詆但代棄婦自言而風旨稜然故曰美反正刺淫泆也辯說此非刺詩宣公未有考故序其事以下亦非是其曰美反正者尤無理竹竿衛女思歸也適異國而不見荅思而能以禮者也范氏祖禹曰夫婦之際猶君臣之交或遇或不遇命也進不見荅退不得歸則如之何以禮自止而已賢女惟安於義命是以雖憂而不困也嚴氏粲曰婦人以夫家爲歸者也衛女既嫁異國而反思衛之樂蓋於異國不得其所則思故鄉也此雖不言其夫家之不見荅而觀其思歸之切如此則其情不言可知矣風人之辭也辯說未見不見荅之意芄蘭刺惠公也驕而無禮大夫刺之鄭氏康成曰惠公以幼童即位自謂有才能而驕慢于大臣但習威儀不知爲政以禮孔氏穎逹曰經言童子則惠公時仍幼童童者未成人之稱年十九以下皆是也閔二年左傳曰初惠公之卽位也少杜預云蓋年十五六杜氏以傳言初衞宣公烝于夷姜生急子爲之娶於齊而美公娶之生壽及朔言爲之娶於齊則宣公已即位也宣公以隠四年冬立假令五年即娶齊女至桓十二年見經凡十九年而朔尚有兄壽則宣公即位三四年始生惠公也故疑爲十五六也且此自謂有才能則非身幼也經云能不我知是自謂有才能刺之而言容遂之美故知但習威儀不知爲政以禮辯說此詩不可考當闕集說輔氏廣曰觀詩辭所謂不我知不我甲之言則亦必須是譏刺其在上之人童孺無知才能不足以知我長我而徒爾舒緩而垂帶悸然也但未必是刺其君耳胡氏紹曾曰杜預言惠公即位時年十五六案十九以下皆得稱童序或然矣但似與君競能理未安耳河廣宋襄公母歸於衞思而不止故作是詩也伯兮刺時也言君子行役爲王前驅過時而不反焉毛氏萇曰伯州伯也孔氏穎逹曰謂之伯者伯長也内則云州史獻諸州伯州伯命藏諸州府彼州伯對閭史閭府亦謂州里之伯此在前驅而執兵則有勇力爲車右當亦有官但不必州長爲之此言過時者謂三月一時榖梁傳伐不踰時故何草不黄箋云古者師出不踰時所以厚民之性是也此序婦人所思之由經陳所思之辭皆由行役過時之所致序言爲王前驅雖辭出於經總序四章非指一句也蔡人衛人陳人從王伐鄭春秋桓五年經也時當衛宣公之時服䖍云言人者時陳亂無君則三國皆大夫也故稱人公羊傳曰其言從王伐鄭何從王正也鄭荅臨碩引公羊之文言諸侯不得專征伐有從天子及伯者之禮然則宣公從王爲得其正以兵屬王節度不由于衛君而以過時刺宣公者諸侯從王雖正其時天子微弱不能使衛侯從已而宣公自使從之據其君子過時不反實宣公之由故主責之宣公而云刺時者也此時從王伐鄭則兵至京師乃東行辯說舊說以詩有爲王前驅之文遂以此爲春秋所書從王伐鄭之事然詩又言自伯之東則鄭在衛西不得爲此行矣序言爲王前驅蓋用詩文然似未識其文意也呂氏袓謙曰爲王前驅特詩中之一語非大義也有狐刺時也衛之男女失時喪其妃耦焉古者國有凶荒則殺禮而多昏會男女之無夫家者所以育人民也辯說男女失時之句未安其曰殺禮多昏者周禮大司徒以荒政十有二聚萬民十曰多昏者是也序者之意蓋曰衛於此時不能舉此之政耳然亦非詩之正意也長樂劉氏曰夫婦之禮雖不可不謹於其始然民有細微貧弱者或困於凶荒必待禮而後昏則男女之失時者多無室家之養聖人傷之寧邦典之或違而不忍失其昏嫁之時也故有荒政多昏之禮所以使之相依以爲生而又以育人民也詩不云乎愷悌君子民之父母苟無子育兆庶之心其能若此哉此則周禮之意也集說孔氏穎逹曰凶荒多昏序意言古者有此禮故刺衛不爲之而使男女失時非謂以此詩爲陳古也故經皆陳喪其妃耦不得匹行思爲夫婦之辭木瓜美齊桓公也衛國有狄人之敗出處于漕齊桓公救而封之遺之車馬器服焉衛人思之欲厚報之而作是詩也辯說說見本篇附録呂氏柟曰詩蓋謂投我以木瓜桃李尚當報之以瓊琚瑶玖汎桓公之德封我于楚邱使公子無虧帥師戍漕令我無國而有國且其乗馬稱服六畜門材魚軒重錦皆非常之贈也然則當何以報之也厥後晉韓起聘于衛因北宫文子之賦淇奥而遂荅以此詩是亦以徳報徳也而孔子亦曰吾于木瓜見苞苴之禮行也豈特男女相贈之辭哉王黍離閔宗周也周大夫行役至于宗周過故宗廟宮室盡爲禾黍閔周室之顚覆彷徨不忍去而作是詩也鄭氏康成曰宗周鎬京也謂之西周周王城也謂之東周幽王之亂而宗周滅平王東遷政遂微弱下列於諸侯孔氏穎逹曰作黍離詩者言閔宗周也周之大夫行從征役至於宗周鎬京過歴故時宗廟宮室其地民皆墾耕盡爲禾黍以先王宫室忽爲平田於是大夫閔傷周室之顚墜覆敗彷徨省視不忍速去而作黍離之詩以閔之也言過故宗廟則是有所適因過舊墟非故詣宗周也周室顚覆正謂幽王之亂王室覆滅致使東遷洛邑喪其舊都雖作在平王之時而志恨幽王之敗但主傷宫室生黍稷非是追刺幽王故爲平王詩耳又宗周喪滅非平王之咎故不刺平王也彷徨不忍去序其作詩之意未必即在宗周而作也周語云幽王三年西周三川皆震是鎬京謂之西周也即知王城謂之東周也論語孔子曰如有用我者吾其爲東周乎注云據時東周則謂成周爲東周者以敬王去王城而遷於成周自是以後謂王城爲西周成周爲東周故昭二十二年王子猛入于王城公羊傳曰王城者何西周也二十六年天王入于成周公羊傳曰成周者何東周也孔子設言之時在敬王居成周之後且意取周公之教頑民故知其爲東周據時成周也此在敬王之前王城與鎬京相對故言王城謂之東周也周夲紀云平王東徙洛邑避戎寇平王之時周室微弱諸侯以强幷弱齊楚秦晉始大政由方伯是平王東遷政遂微弱下列于諸侯謂化之所及纔行境内政敎不加於諸侯與諸侯齊其列位故其詩與諸侯同爲國風焉君子于役刺平王也君子行役無期度大夫思其危難以風焉孔氏穎逹曰大夫思其危難謂在家之大夫思君子僚友在外之危難君子行役無期度二章上六句是也思其危難下二句是也范氏處義曰此詩作於大夫所謂君子者非婦人指其夫蓋大夫見時之賢者不免行役故以君子稱之下篇君子陽陽亦此意或謂詩不見思其危難之事竊意行役之人所憂者死亡耳飢渴則至疾病疾病則致死亡所謂危難即疾病死亡也卒章苟無飢渴蓋思其危難所由致而風諭之使無飢渴以生患也辯說此國人行役而室家念之之辭序說誤矣其曰刺平王亦未有考君子陽陽閔周也君子遭亂相招爲祿仕全身遠害而已范氏處義曰東周之賢者相招爲祿仕雖抱關擊柝亦可爲也何至如衛之仕於伶官竊意詩人據所見而言未必盡然或謂伶官人所賤無復責望若其他皆有常職未必能全身逺害此亦一說也輔氏廣曰此序得之蓋古之樂官實掌敎事如舜命夔典樂敎胄子周官大司樂掌敎國子可見故賢者多隠於樂工如簡兮詩之類至春秋時如魯大師摯諸人猶知踰河蹈海以去亂不賢者能如是乎使賢者隠於樂工而以全身逺害爲樂則時可知矣辯說說同上篇揚之水刺平王也不撫其民而逺屯戍于母家周人怨思焉鄭氏康成曰怨平王恩澤不行於民而久令屯戍不得歸思其鄉里之處者言周人者時諸侯亦有使人戍焉平王母家申國在陳鄭之南迫近彊楚王室微弱而數見侵伐王是以戍之中谷有蓷閔周也夫婦曰以衰薄凶年饑饉室家相棄爾范氏處義曰凶年饑歳世所不免爲夫婦者正當同患難遽至相棄由其夫婦之義日以衰薄而致然也詩人以爲風俗衰薄其來有自未可遽望其善特閔之而已爰閔周也桓王失信諸侯背叛構怨連禍王師傷敗君子不樂其生焉黄氏櫄曰桓王一失其信而至於諸侯背叛王師傷敗人君之於天下其可一日而忘信乎兵食可去而信不可去非兵食之果可去也與其去於此者不若去於彼苟信不立雖有菽粟安得而食雖有城池將誰與守此君子之所以閔周之亡也辯說君子不樂其生一句得之餘皆衍說其指桓王蓋據春秋傳鄭伯不朝王以諸侯伐鄭鄭伯禦之王卒大敗祝聃射王中肩之事然未有以見此詩之爲是而作也葛藟王族刺平王也周室道衰棄其九族焉鄭氏康成曰九族者據已上至高袓下及𤣥孫之親孔氏穎逹曰尚書歐陽說云九族乃異姓有親屬者父族四母族三妻族二棄其九族者不復以族食族燕之禮序而親睦之故王之族人作此詩以刺王也此序其刺王之由經皆陳族人怨王之辭嚴氏粲曰陳氏曰周公大封同姓成王内睦九族親親周道也棄其九族則周道衰矣辯說序說未有據詩意亦不類說已見本篇采葛懼䜛也鄭氏康成曰桓王之時政事不眀臣無大小使出者則爲䜛人所毁故懼之范氏處義曰鄭氏以一日不見之語謂人臣因出使而懼䜛不爲無理蓋古之忠臣一日不在朝廷則讒言遂入其事多矣鄭氏之說不可廢也辯說此淫奔之詩其篇與大車相屬其事與采唐采麥采葑相似其詞與鄭子衿正同序說誤矣大車刺周大夫也禮義陵遲男女淫奔故陳古以刺今大夫不能聽男女之訟焉孔氏穎逹曰經三章皆陳古者大夫善於聽訟之事也陵遲猶陂阤言禮義廢壞之意也男女淫奔謂男淫而女奔之也范氏處義曰據詩所陳當禮義陵遲之時男女淫奔由無所忌憚而然詩人因言古之大夫能聽男女之訟與行露美召伯之意畧同然行露言不能此詩言不敢其息訟雖同而所以息者有異曰不能者德明惟眀也曰不敢者德威惟畏也明與威皆出於德其可美均也辯說非刺大夫之詩乃畏大夫之詩丘中有麻思賢也莊王不明賢人放逐國人思之而作是詩也孔氏穎逹曰毛以爲放逐者本在位有功今去而思之鄭以爲去治賤事所在有功故思之意雖小異三章俱是思賢之事嚴氏粲曰二畱名氏不顯事迹無傳以國人思之知其賢矣辯說此亦淫奔者之詞其篇上屬大車而語意不莊非望賢之意序亦誤矣鄭緇衣美武公也父子竝爲周司徒善於其職國人宜之故美其德以明有國善善之功焉孔氏穎達曰武公之與桓公父子皆為周司徒之卿而美於其卿之職鄭國之人咸宜之謂武公為卿正得其宜諸侯有徳乃能入仕王朝武公既為鄭國之君又復入作司徒已是其善又能善其職此乃有國者善中之善故作此詩美其武公之徳以明有邦國者善善之功焉經三章皆是國人宜之美其徳之辭也以明其國善善之功焉序其作詩之意於經無所當也此與淇澳國人美君有徳能仕王朝是其一國之事故為風蘇公之刺㬥公吉甫之美申伯同寮之相刺美乃所以刺美時王故為雅作者主意有異故所繫不同范氏處義曰鄭武公父子所以能入則世為卿士出則長享國祚者豈無自而然哉周之國人以為善於其職宜在此位故作緇衣之詩以美之序詩者發明其意以武公之徳所以能有其國者由善善之功也孔子所謂好賢如緇衣謂於緇衣見好賢之至也說者求善善之說而不得遂疑詩序以明有國善善之功之說為非詩意蓋考之未精爾辯說此未有據今姑從之將仲子刺莊公也不勝其母以害其弟弟叔失道而公弗制祭仲諫而公弗聽小不忍以致大亂焉嚴氏粲曰荘公克叚之事左氏以為譏失敎此詩後序以為小不忍皆責之也輕穀梁公羊及胡氏深誅其心以為大惡後之說詩者祖其意以後序為非且謂詩人探荘公之心在於殺段而託諸父母諸兄國人以為說以稔成其惡耳竊謂此駁後序未盡荘公之惡則然而說詩之本意則未也荘公固非不忍者然春秋乃聖人襃貶之法變風乃國人諷諫之辭不可以竝論也此詩止以公與祭仲有殺段之謀故設為公拒祭仲之辭以天理感動之公論開悟之耳如此則不失詩人溫柔敦厚之㫖辯說事見春秋傳劉氏瑾曰見隠公元年然莆田鄭氏謂此實淫奔之詩無與於荘公叔段之事序蓋失之而說者又從而巧為之說以實其事誤亦甚矣今從其說叔于田刺荘公也叔處于京繕甲治兵以出于田國人說而歸之嚴氏粲曰二叔于田皆美叔段之材武無一辭他及而首序以為刺荘公蓋與春秋書鄭伯克段譏失敎之意同此詩言段出田而京邑之黨相媚說以從之耳後序謂國人說而歸之非也鄭師臨其境京人亦叛之矣辯說國人之心貳於叔而歌其田狩適野之事初非以刺荘公亦非說其出于田而後歸之也或曰叚以國君貴弟受封大邑有人民兵甲之衆不得出居閭巷下雜民伍此詩恐亦民間男女相說之詞耳大叔于田刺荘公也叔多才而好勇不義而得衆也李氏樗曰此詩所言皆以叔段為義而序所以刺荘公者王氏曰人君明義以正衆使衆知義而孰敢為不義為不義則衆之所棄也安能得衆哉楊龜山亦曰叔段以不義得衆其失在於荘公不制之早也人君明義以正衆使衆知義則雖有不義者莫之與也雖有僭竊者莫之助也尚何使人悦而歸之哉二說皆是如将仲子叔于田不刺叔段而刺荘公揚之水不刺桓叔而刺昭公皆禍之所由生也辯說此詩與上篇意同非刺荘公也下兩句得之清人刺文公也髙克好利而不顧其君文公惡而欲逺之不能使髙克将兵而禦敵於竟陳其師旅翺翔河上久而不召衆散而歸髙克奔陳公子素惡髙克進之不以禮文公退之不以道危國亡師之本故作是詩也辯說按此序盖本春秋傳而以他說廣之未詳所据孔氏正義又据序文而以是詩為公子素之作然則進之當作之進今文誤也羔裘刺朝也言古之君子以風其朝焉孔氏穎逹曰荘公之朝無正直之臣故作此詩道古之在朝君子有徳有力故以風刺其今朝廷之人焉嚴氏粲曰或謂檜羔裘專刺其君唐羔裘專刺其臣鄚羔裘兼刺君臣案此詩言豹飾止是臣下之服舍命不渝及邦之司直邦之彦兮皆臣事也止當為刺在朝之臣稱彼所以譏此也辯說序以變風不應有美故以此為言古以刺今之詩今詳詩意恐未必然且當時鄭之大夫如子皮子産之徒豈無可以當此詩者但今不可考耳遵大路思君子也荘公失道君子云之國人思望焉范氏處義曰鄭荘公失道君子舍之而去蓋出於不得已詩人思念君子而望其畱為國計忠厚之意見之終篇誠為懇切也黄氏櫄曰此詩是君子去國而國人欲畱之之意執其袪執其手而惟恐去之之速也古者人君之用人皆必察於國人之好惡今國人皆欲畱之而荘公不能用失國人之望矣辯說此亦淫亂之詩序說誤矣女曰雞鳴刺不說德也陳古義以刺今不說德而好色也孔氏穎達曰以荘公之時朝廷之上不說有徳之君子故作此詩陳古之賢士好徳不好色之義以刺之歐陽氏修曰詩人刺時好色而不說德乃陳古賢夫婦相警勵以勤生之語其卒章又言知子之來相和好者當有以贈報之以勉其夫不獨厚於室家又當尊賢友善而因物以結之此所謂說徳而不好色以刺時之不然也辯說此亦未有以見其陳古刺今之意有女同車刺忽也鄭人刺忽之不昏于齊大子忽嘗有功于齊齊侯請妻之齊女賢而不取卒以無大國之助至於見逐故國人刺之范氏處義曰鄭忽辭昏之言未為失也君子固許其善自為謀卒之所以自謀者無聞焉故詩人閔其當立無助咎其辭昏蓋専為無助而設謂其既終不能自謀不若初無辭昏猶有大國之助耳此詩人之本意也有功於齊即左氏傳桓六年北戎伐齊鄭大子忽帥師救齊大敗戎師獲其二帥甲首三百以獻於齊是其事也忽辭昏者再詩請妻者文姜也此詩序言有功於齊齊侯請妻之是再請妻者明矣辯說案春秋傳齊侯欲以文姜妻鄭大子忽忽辭人問其故忽曰人各有耦齊大非吾耦也詩曰自求多福在我而已大國何為其後北戎侵齊鄭伯使忽帥師救之敗戎師齊侯又請妻之忽曰無事於齊吾猶不敢今以君命奔齊之急而受室以歸是以師昏也民其謂我何遂辭諸鄭伯祭仲謂忽曰君多内寵子無大援将不立忽又不聽及即位遂為祭仲所逐此序文所據以為說者也然以今考之此詩未必為忽而作序者但見孟姜二字遂指以為齊女而附之於忽耳假如其說則忽之辭昏未為不正而可刺至其失國則又特以勢孤援寡不能自定亦未有可刺之罪也序乃以為國人作詩以刺之其亦誤矣後之讀者又襲其誤必欲鍜鍊羅織文致其罪而不肯赦徒欲以徇說詩者之謬而不知其失是非之正害義理之公以亂聖經之本指而壞學者之心術故予不可以不辯山有扶蘇刺忽也所美非美然孔氏穎逹曰毛以二章皆言用臣不得其宜鄭以上章言用之失所下章言養之失所箋傳意雖小異皆是所美非美人之事黄氏櫄曰詩人之意蓋以為山有扶蘇亦有橋松隰有荷華亦有游龍以見國人未嘗無君子亦未嘗無小人在人君能辨之耳今昭公不見子都子充而乃見狂且狡童是所美者非所當美而反以小人為君子也辯說此下四詩及揚之水皆男女戲謔之辭序之者不得其說而例以為刺忽殊無情理蘀兮刺忽也君弱臣彊不倡而和也黄氏櫄曰君倡而臣和者理之當然也事不出於君而出於臣則其國必危魯之政出於三家晉之政出於六卿齊之政出於田常則有篡弑之禍今昭公微弱而為祭仲所専此詩人所以悲其将亡而為之嗟歎歟辯說見上狡童刺忽也不能與賢人圖事權臣擅命也鄭氏康成曰懽臣擅命祭仲專也孔氏穎達曰大臣專國之政輕重由之是之謂權臣也擅命謂専擅國之敎命有所號令自以己意行之不復諮白於君鄭忽之臣有如此者唯祭仲耳桓十一年左傳稱祭仲為公娶鄧曼生昭公故祭仲立之是忽之前立祭仲専政也其年宋人誘祭仲而執之歸立突祭仲逐忽立突又專突之政故十五年傳稱祭仲專鄭伯患之使其壻雍糾殺之祭仲殺雍糾厲公奔蔡祭仲又迎昭公而復立是忽之復立祭仲又專此當是忽復立時事也辯說昭公嘗為鄭國之君而不幸失國非有大惡使其民疾之如寇讎也況方刺其不能與賢人圖事權臣擅命則是公猶在位也豈可忘其君臣之分而遽以狡童目之耶且昭公之為人柔懦疎闊不可謂狡即位之時年已壯大不可謂童以是名之殊不相似而序於山有扶蘇所謂狡童者方指昭公之所美至於此篇則遂移以指公之身焉則其舛又甚而非詩之本旨明矣大抵序者之於鄭詩凡不得其說者則舉而歸之於忽文義一失而其害於義理有不可勝言者一則使昭公無辜而被謗二則使詩人脫其淫謔之實罪而麗於訕上悖理之虛惡三則厚誣聖人刪述之意以為實踐昭公之守正而深與詩人之無禮於其君凡此皆非小失而後之說者猶或主之其論愈精其害愈甚學者不可以不察也附錄范氏處義曰狡童指祭仲詩所以刺忽者謂忽不能與賢人圖事惟權臣之為聽所以擅命而不可制也祭仲得專廢立非權臣而何說者以狡童為指忽非詩人之本意山有扶蘇既指所美非美者為狡童不當又指其君為狡童也詩人謂忽不自為政祭仲既得以專之矣彼祭仲之狡雖不與我言我則不忍忘君以忽之故憂之而不能餐也彼祭仲之狡雖不與我食我則不忍忘君以忽之故憂之而不能息也大槩謂祭仲狂狡自專不復取謀於我不復以禮待我而我之憂國愛君自不能忘爾彼祭仲者賤之也子忽者親之也詩人親之如此而謂指君為狡童可乎褰裳思見正也狂童恣行國人思大國之正已也孔氏穎逹曰忽是荘公世子於禮宜立非詩人所當疾故知狂童恣行謂突也忽以桓十一年繼世而立其年九月經書突歸于鄭鄭忽出奔衞是突入而忽出也桓十五年經書鄭伯突出奔蔡鄭世子忽復歸于鄭是忽入而突出也箋言更出更入而無大國正之則是忽復立之時思大國也忽之復立突已出奔仍思大國正已者突以桓十五年奔蔡其年九月鄭伯突入于櫟櫟是鄭之大都突入據之與忽爭國忽以微弱不能誅逐去突諸侯又無助忽者故國人思大國之正己也歐陽氏修曰褰裳之詩思大國來定其亂也謂彼大國有惠然思念我鄭國之亂欲來為我討正之者非道逺而難至但褰其裳行涉溱水而來則至矣言甚易而不來爾子不我思豈無他人者但言諸侯衆矣子不我思則當有他國思我者爾詩人假為此言以述鄭怨諸侯不相救䘏爾又曰豈無他士者猶言他人爾辯說此序之失蓋本於子大叔韓宣子之言而不察其斷章取義之意耳丰刺亂也昏姻之道缺陽倡而隂不和男行而女不隨孔氏穎逹曰鄭國衰亂昏姻禮廢有男親迎而女不從後乃追悔陳其辭也范氏處義曰說是詩者皆以陽倡隂不和男行女不隨專罪女子謂其始也男子求昏女乃不往後既失身始知追悔此特一偏之說也蓋是詩本於昏姻之道缺故有倡而不和行而不隨之事夫禮之不行道之所以缺也男子求昏既無其禮豈得專罪女子哉辯說此淫奔之詩序說誤矣東門之墠刺亂也男女有不待禮而相奔者也范氏處義曰是詩所刺以男女俱不由禮而相奔誘故謂之亂然國人以奔為恥作詩刺之而以人甚逺不我即為言亦以見先王之澤在人心者未泯故雖刺其亂不忍指其實此聖人之所取也辯說此序得之風雨思君子也亂世則思君子不改其度焉嚴氏粲曰鄭公子之亂時事反覆士之怵於利害隨勢變遷失其常度者多矣故詩人思見君子焉辯說序意甚美然考詩之詞輕佻狎暱非思賢之意也子衿刺學校廢也亂世則學校不修焉黄氏櫄曰夏曰校商曰序周曰庠學則三代共之皆所以明人倫也古者學校修則學者於此藏焉修焉今鄭人學校不修而學者失業故此一詩皆是學者朋儕分散思念相責之意夫僖公修泮宮而魯人頌之鄭之學校不修其刺也宜矣辯說疑同上篇蓋其詞意儇薄施之學校尤不相似也揚之水閔無臣也君子閔忽之無忠臣良士終以死亡而作是詩也范氏處義曰為此詩者其鄭國之賢與一薛居州不能使宋王之善以左右前後皆非薛居州也忽無忠臣良士獨有為此詩之賢不能有益於忽故曰閔無臣也辯說此男女要結之詞序說誤矣出其東門閔亂也公子五爭兵革不息男女相棄民人思保其室家焉孔氏穎逹曰公子五度爭國兵革不得休息下民窮困男女相棄經二章皆陳男思保妻之辭其公子五爭序其相棄之由於經無所當也桓十一年左傳云祭仲為公娶鄧曼生昭公故祭仲立之宋雍氏女於鄭荘公生厲公故宋人誘祭仲而執之曰不立突将死祭仲與宋人盟以厲公歸而立之秋九月昭公奔衞已亥厲公立是一爭也十五年傳曰祭仲專鄭伯患之使其壻雍糾殺之雍姬知之以告祭仲祭仲殺雍糾厲公出奔蔡六月乙亥鄭世子忽復歸于鄭是二爭也十七年傳曰初鄭伯将以髙渠彌為卿昭公惡之固諫不聽昭公立懼其殺已也殺昭公而立公子亹是三爭也十八年傳曰齊侯師于首止子亹㑹之髙渠彌相七月齊人殺子亹而軷髙渠彌祭仲逆鄭子于陳而立之服䖍云鄭子昭公弟子儀也是四爭也荘十四年傳曰鄭厲公自櫟侵鄭及大陵獲傅瑕傅瑕曰苟舍我吾請納君與之盟而舍之六月傅瑕殺鄭子而納厲公是五爭也忽亦再為鄭君前以大子嗣立不為爭簒故惟數後為五爭也范氏處義曰公子五爭首尾二十年兵革不息所以致亂男女相棄室家不保此其所以謂之閔亂也辯說五爭事見春秋傳然非此之謂也此乃惡淫奔者之詞序誤野有蔓草思遇時也君之澤不下流民窮於兵革男女失時思不期而會焉孔氏穎達曰作野有蔓草詩者言思得逢遇男女合㑹之時由君之恩徳潤澤不流及於下又征伐不休國内之民皆窮困於兵革之事男女失其時節不得早相配耦思得不與期約而相㑹遇焉是下民窮困之至故述其事以刺時也男女失時謂失年盛之時非謂昏之時月也毛以為君之潤澤不下流下章首二句是也思不期而㑹下四句是也辯說東萊呂氏曰君之澤不下流迺講師見零露之語從而附益之溱洧刺亂也兵革不息男女相棄淫風大行莫之能救焉王氏安石曰羞惡之心莫不有之而其為至於如此者豈其人性之固然哉兵革不息男女相棄而無所從歸也然則民之失性也為可哀君之失道也為可刺辯說鄭俗淫亂乃其風聲氣習流傳已乆不為兵革不息男女相棄而後然也齊雞鳴思賢妃也哀公荒淫怠慢故陳賢妃貞女夙夜警戒相成之道焉孔氏穎逹曰哀公荒淫女色怠慢朝政君子見其如此故作此詩陳古之賢妃貞女夙夜警戒於夫以相成益之道焉二章章首上二句陳夫婦可起之禮下二句述諸侯夫人之言卒章皆陳夫人之辭以哀公荒淫故夫人興戒君子使不畱色怠慢故陳人君早朝戒君子使不惰於政事皆陳與夫相警相成之事也黄氏櫄曰哀公政事不修本於社席之失助故作是詩以思賢妃此詩皆是夙夜警戒之意宣王晏起姜后待罪遂勤政事以致中興觀此則夙夜警戒乃賢妃貞女所當然也辯說此序得之但哀公未有所考豈亦以諡惡而得之歟還刺荒也哀公好田獵從禽獸而無厭國人化之遂成風俗習於田獵謂之賢閑於馳逐謂之好焉孔氏穎達曰君上以善田獵為賢好則下民皆慕之政事荒廢化之使然故作此詩以刺之經三章皆士大夫相荅之辭是遂成風俗謂之賢好之事范氏處義曰化於上者謂之風習於下者謂之俗然上有好者下必甚焉齊俗喜畋驅馳之閒邂逅相遇互相誇詡以習於田獵為賢以閑於馳逐為好形於辭氣之閒可以想見由哀公好田獵故也記曰上之好惡不可不謹也是民之表也孟子曰從獸無厭謂之荒故曰刺荒也辯說同上著刺時也時不親迎也孔氏穎達曰毛以為首章言士親迎二章言卿大夫親迎卒章言人君親迎俱是受女於堂出而至庭至著各舉其一以相互見鄭以為三章共述人臣親迎之禮雖所據有異俱是陳親迎之禮以刺今之不親迎也東方之日刺衰也君臣失道男女淫奔不能以禮化也陸氏徳明曰刺衰本或作刺襄公非也南山已下始是襄公之詩孔氏穎達曰哀公君臣失道至使男女淫奔謂男女不待以禮配合君臣皆失其道不能以禮化之是其時政之衰故刺之也毛以為陳君臣盛明化民以禮之事以刺當時之衰鄭則指陳當時君臣不能化民以禮雖屬意異皆以章首一句東方之日為君失道東方之月為臣失道下四句為男女淫奔不能以禮化之之事嚴氏粲曰衰謂政衰民散淫風肆行而無忌也辯說此男女淫奔者所自作非有刺也其曰君臣失道者尤無所謂東方未明刺無節也朝廷興居無節號令不時挈壺氏不能掌其職焉孔氏穎達曰哀公之時朝廷起居或早或晚而無常節度號令召呼不以其時故刺之且言置挈壺氏之官不得其人也朝廷是君臣之總辭辯說夏官挈壺氏下士六人挈縣挈之名壺盛水器盖置壺浮箭以為晝夜之節也劉氏瑾曰孔氏曰挈壺氏以水為漏準晝夜共為百刻冬夏之間則有長短太史立成法於每氣之間加減刻數以一年有二十四氣一氣之間分為二通率七日强半而易一箭周年而用箭四十八也厯言晝夜者以昏明為限漏刻不明固可以見其無政然所以興居無節號令不時則未必皆挈壺氏之罪也南山刺襄公也鳥獸之行淫乎其妺大夫遇是惡作詩而去之孔氏穎達曰經上二章刺襄公淫乎其妹下二章責魯桓縱恣文姜序以主刺襄公故不言魯桓大夫遇是惡作詩而去之言作詩之意以見君惡之甚於經無所當也辯說此序據春秋經傳為文說見本篇甫田大夫刺襄公也無禮義而求大功不修德而求諸侯志大心勞所以求者非其道也孔氏穎達曰有禮義而後功立惟徳可以來人今襄公無禮義無徳諸侯必不從之其志望大徒使心勞而公之所求者非其道也故作詩以刺之求大功與求諸侯一也若諸侯從之則大功克立所從言之異耳求大功者欲求為霸主也於時王室㣲弱諸侯無主齊是大國故欲求之鄭以國語云齊荘僖於是乎小伯韋昭曰小伯主諸侯盟㑹襄即荘孫僖子以父祖已作盟㑹之長可以為霸業之基又自以國大民衆負恃强力故欲求為霸也至其弟桓公即求而得之是齊國可以為霸但襄公無徳而不可求耳范氏處義曰禮義非以求大功也而有禮義者大功可馴致修徳非以求諸侯也而有徳者諸侯將自歸安有志大心勞之患今襄公無禮義而不修徳是無其本矣無其本而切切然望大功之立諸侯之從無是道也辯說未見其為襄公之詩盧令刺荒也襄公好田獵畢弋而不修民事百姓苦之故陳古以風焉范氏處義曰是詩本刺襄公從獸無厭不欲直指其過故陳古之田獵與民同樂百姓聞而説之冀襄公愧而改耳辯說義與還同序說非是敝笱刺文姜也齊人惡魯桓公微弱不能防閑文姜使至淫亂為二國患焉孔氏穎達曰文姜淫亂由魯桓㣲弱使然經三章皆是惡魯桓以刺文姜之辭齊則襄公通妹魯則夫人外淫桓公見殺於齊襄公惡名不滅是為二國患也文姜既嫁於魯齊人不當刺之由其兄與妹淫齊人惡君而復惡文姜亦所以刺君故編之為襄公詩也郝氏敬曰此詩作於桓公遇害之後故曰為二國患也荘公於文姜其子也桓公則其夫也夫為妻綱如笱制魚子之於母猶曰弗克夫不能制妻則同敝笱耳故敝笱刺夫猗嗟刺子序説各有攸當也辯說桓當作荘劉氏瑾曰桓公十八年不聽申繻之諫必欲與文姜同如齊則姜氏此一行非由桓公不能制而然也及公薨于齊而姜氏返魯荘公嗣位而姜氏孫于齊未乆復返于魯自後姜氏之㑹齊侯者相望於春秋之䇿則防閑之説屬之桓公乎屬之荘公乎故曰桓當作莊載驅齊人刺襄公也無禮義故盛其車服疾驅於通道大都與文姜淫播其惡於萬民焉孔氏穎達曰國人刺君乃是常事諸序未有舉國之名言其民刺君此獨云齊人刺襄公者以文姜魯之夫人襄公往入魯境以其齊魯交錯須言齊以辨嫌范氏處義曰春秋魯莊公二年冬夫人姜氏㑹齊侯于禚四年春夫人姜氏享齊侯于祝邱五年夫人姜氏如齊師七年夫人姜氏㑹齊侯于防冬夫人姜氏㑹齊侯于榖此皆荘公之時齊襄公恃荘公為已之甥往来畧無顧忌春秋既書而深貶之詩人作載驅為襄公之罪狀明矣辯說此亦刺文姜之詩猗嗟刺魯荘公也齊人傷魯荘公有威儀技藝然而不能以禮防閑其母失子之道人以為齊侯之子焉孔氏穎達曰禮婦人夫死從子子當防母姦淫莊公不能防禁是失為人子之道經言猗嗟是歎傷之言也言其形貌之長面目之美善於趨歩是有威儀也言其善舞善射是有技藝也言展我甥兮拒時人以為齊侯之子也以其齊人所作故繫之於齊襄公淫之故為襄公之詩也嚴氏粲曰文姜之事齊襄大惡也南山既歸咎於魯桓敝笱又刺魯桓不能防閑其妻猗嗟又刺魯荘不能防閑其母皆歸咎於他人盖不忍斥言其君之惡者齊臣子之情也郝氏敬曰此詩刺魯荘公較敝笱辭婉所以為母及子也妻淫而責夫其言易直母亂而責子其語難顯詩所以善於言也人以為齊侯之子者春秋之義也當世人疑荘公非桓公子也春秋特書所生年月日以折羣議此詩云展我甥明其非我子也亦㣲諷之辭辯說此序得之魏葛屨刺褊也魏地陿隘其民機巧趨利其君儉嗇褊急而無徳以将之曹氏粹中曰魏晉皆有儉嗇之風然其詩若作在獻公幷吞以後則其俗漸已荒侈此詩每刺勤儉知其在未幷於晉以前也李氏樗曰奢則不計財之有無而用之僭上有所不當為而為之也儉則計厚薄失之偪下有所當為而不為之也奢儉雖殊而過中則一此所以刺之也汾沮洳刺儉也其君儉以能勤刺不得禮也孔氏穎達曰王肅孫毓皆以為大夫采菜其集注序云君子儉以能勤案今定本及諸本序直云其君義亦得通辯說此未必為其君而作崔靈恩集注其君作君子義雖稍通然未必序者之本意也園有桃刺時也大夫憂其君國小而迫而儉以嗇不能用其民而無徳教日以侵削故作是詩也范氏祖禹曰魏君儉而不取嗇而不施君不能發政施仁而民亦無以趨事勸功上下相離君民相棄君獨行之於上而臣民不以為非此詩所以刺時也辯說國小而迫日以侵削者得之餘非是陟岵孝子行役思念父母也國迫而數侵削役乎大國父母兄弟離散而作是詩也鄭氏康成曰役乎大國者為大國所徴發范氏處義曰魏地迫小而數侵削故為大國之役不敢不受命獨其民之父母兄弟離散為可念耳此陟岵所為作也十畝之間刺時也言其國削小民無所居焉孔氏穎達曰經二章皆言十畝一夫之分不能百畝是為削小無所居謂土田陿隘不足耕墾以居生非謂無居宅也辯說國削則其民隨之序文殊無理其說已見本篇矣伐檀刺貪也在位貪鄙無功而受禄君子不得進仕爾孔氏穎達曰在位貪鄙者經三章皆次四句是也君子不得進仕者首章三句是也經序倒者序見由在位貪鄙令君子不得仕如其次以述之經先言君子不仕乃責在位之貪鄙故章卒二句皆言君子不素餐以責小人之貪是終始相結也辯說此詩專美君子之不素餐序言刺貪失其指矣碩䑕刺重斂也國人刺其君重斂蠶食於民不修其政貪而畏人若大䑕也孔氏穎達曰蠶食桑漸漸以食使桑盡也猶君重斂漸漸以稅使民困也范氏處義曰蠶食桑無時而饜盡而後已喻重斂者莫切於此䑕食物且食且畏四顧不寕喻貪畏者莫切於此辯說此亦託於碩䑕以刺其有司之詞未必直以碩䑕比其君也集說黄氏櫄曰國人而目其君以碩鼠可乎意者伐檀刺在位貪鄙則碩鼠亦未必非刺在位要之在位者如此而民至於無告訴則其君可知孔子刪詩而以碩鼠附於魏風之末所以為後世戒哉唐蟋蟀刺晉僖公也儉不中禮故作是詩以閔之欲其及時以禮自娛樂也此晉也而謂之唐本其風俗憂深思逺儉而用禮乃有堯之遺風焉孔氏穎達曰作蟋蟀詩者由僖公太儉偪下不中禮度故閔傷之以其太儉故欲其自樂樂失於盈又恐過禮欲令節之以禮故云以禮自娛樂也既序一篇之義又序名晉為唐之意大師察其詩之音旨本其國之風俗見其所憂之事深所思之事逺儉約而能用禮有唐堯之遺風故名之曰唐也范氏祖禹曰人之憂樂如晝之有夜隂之有陽君子以禮節之不過乎中而已所以順天地而理情性也僖公有國而不能自樂慘戚以窮年此猶有夜而無晝有隂而無陽也故君子閔之楊氏時曰晉之為晉久矣風俗之成非一日之積蟋蟀之詩盖風之變也國人閔其君欲其及時以禮自娛樂也而卒告之以好樂無荒可謂有禮矣昭公政荒民散四鄰謀取其國家而不知則作詩以刺之可謂憂深思逺矣當是時風雖變堯之遺風未亡也及沃盛强國人将叛而歸焉則不復有禮矣盖風俗之成壊皆非一日之積所謂繫一人之本者其有見於斯歟辯說河東地瘠民貧風俗勤儉乃其風土氣習有以使之至今猶然則在三代之時可知矣序所謂儉不中禮固當有之但所謂刺僖公者盖特以諡得之而所謂欲其及時以禮自娛樂者又與詩意正相反耳況古今風俗之變常必由儉以入奢而其變之漸又必由上以及下今謂君之儉反過於初而民之俗猶知用禮則尤恐其無是理也獨其憂深思逺有堯之遺風者為得之然其所以不謂之晉而謂之唐者又初不為此也山有樞刺晉昭公也不能修道以正其國有財不能用有鐘鼔不能以自樂有朝廷不能洒掃政荒民散将以危亡四鄰謀取其國家而不知國人作詩以刺之也孔氏穎達曰有財不能用者三章章首二句是也此二句總言昭公不能用財耳其經之所陳言昭公有衣裳車馬鐘鼔酒食不用之是分别說其不能用財之事也有鐘鼔不能以自樂者二章云子有鐘鼔弗鼓弗考是也有朝廷不能洒埽者二章云子有廷内弗洒弗埽是也經先言廷内序先言鐘鼔者廷内人君治政之處其事大鐘鼔者娱樂已身其事小經責昭公先重後輕故先言廷内序既言有財不能用鐘鼓亦貨財之事故因即先言之衣裳車馬亦是有財序獨言鐘鼓者㨿娱樂之大者言之也經先言衣裳後車馬者衣裳附於身車馬則差逺故先言衣裳也四鄰謀取其國家者三章下二句是也四鄰即桓叔謀伐晉是也故下篇刺昭公皆言沃所并沃雖一國即四鄰之一故以四鄰言之呂氏大臨曰有鐘鼔不能以自樂非其節也有財不能用非其愛也有朝廷不能以洒埽非不好潔也大抵無政不能令其下瞢然無所知将為他人有也范氏䖏義曰晉儉陋之弊至昭公極矣序詩者推言其弊之由起謂不能修道以正其國也道者政之本也本之不修則無其政何以正其國故有財則不能用有鐘鼔則不能自樂有朝廷則不能洒埽此之謂政荒國政既荒則民散而之四方危亡將至故為四鄰所窺而昭公猶不悟是誠可刺也呂氏祖謙曰詩人豈真欲昭公馳驅飲樂者哉盖曰是物也行且為他人所有曽不若及今為樂之為愈其激發感切之者深矣非勸其為樂也呂禄棄軍其姑呂嬃悉出珠玉寳器散堂下曰毋為他人守也乃此詩之意也末章尤可見張氏栻曰山有樞之詩盖傷之深也謂他人謀子之國後嗣且不可保矣子有衣裳車馬何不曳婁而馳驅子有廷内何不洒埽子有鐘鼓何不鼓考子有飲食何不鼓瑟以喜樂以引日一旦宛然而死則為他人之所有是傷之深也雖然昭公惟其頽墮不立百事廢弛以至此極使其於物能用之以其節而舉之以其時則又能自强於政凡所施為各有條理不至若是其危殆矣故不曰閔而曰刺焉辯說此詩盖亦答蟋蟀之意而寛其憂非臣子所得施於君父者序說大誤揚之水刺晉昭公也昭公分國以封沃沃盛强昭公㣲弱國人将叛而歸沃焉鄭氏康成曰封沃者封叔父桓叔於沃也沃曲沃晉之邑也孔氏穎逹曰桓叔有徳沃是大都沃國日以盛强昭公國既削小身又無徳其國日以㣲弱分國封沃已為不可國人將叛又不能撫之昭公之國危矣而昭公不知故陳桓叔有徳民樂從之所以刺昭公也桓二年左傳云初晉穆侯之夫人姜氏以條之役生太子命之曰仇其弟以千畝之戰生命曰成師師服曰異哉君之名子也嘉耦曰妃怨耦曰仇古之命也今君命太子曰仇弟曰成師始兆亂矣兄其替乎惠之二十四年晉始亂故封桓叔於曲沃師服曰吾聞國家之立也本大而末小是以能固故天子建國諸侯立家今晉甸侯也而建國本既弱矣其能乆乎惠之三十年晉潘父弑昭侯而納桓叔不克是封桓叔於沃之事也此邑本名曲沃序單言沃則既封之後謂之沃國故云沃范氏處義曰昭公以沃之大邑封成師已無逺慮且不知人矣而詩人刺之欲其早為之所與祭仲諫鄭莊公封叔叚于京之事類也莊公之失在小不忍昭公之失在弱而寡謀外則鄰國窺之而不能悟内則國人將叛而不之察序詩者謂之㣲弱信乎其為㣲弱也辯説詩文明白序説不誤椒聊刺晉昭公也君子見沃之盛彊能修其政知其蕃衍盛大子孫將有晉國焉黄氏櫄曰武公獲晉在荘十六年而君子於桓叔之世已逆知其如此者盖觀人之國者當於其㣲田氏厚施而得民心晏子謂景公曰田氏厚施民歸之矣公曰若之何對曰惟禮可以已之曰善哉吾不能之矣此皆微弱而不能自立之過也晉之所以為曲沃之所獲亦類是與辯説此詩未見其必為沃而作也綢繆刺晉亂也國亂則昏姻不得其時焉孔氏穎逹曰毛以為不得初冬冬末開春之時故陳昏姻之正時以刺之鄭以為不得仲春之正時四月五月乃成昏故直舉失時之事以刺之毛以三星者參也首章言在天謂始見東方王肅云謂十月也在天既㨿十月二章在隅謂在東南隅又在十月之後謂十一月十二月也卒章在户言參星正中直戸月令孟春之月昏參中是參星直戸在正月中也此皆昏姻之正時晉國昏姻失此三者之時故三章各舉一時以刺之鄭以三星者心也一名火星凡嫁娶者以二月之昏火星未見之時為之首章言在天謂昏而火星始見東方三月之末四月之中也二章言在隅又晚於在天謂四月之末五月之中也卒章言在戸又晚於在隅謂五月之末六月之中故月令季夏之月昏火中是六月之中心星直戸也此三者皆晚矣失仲春之月三章歴言其失以刺之辯説此但為昏姻者相得而喜之詞未必為刺晉國之亂也杕杜刺時也君不能親其宗族骨肉離散獨居而無兄弟將為沃所幷爾鄭氏康成曰他人謂異姓也言昭公逺其宗族獨行於國中踽踽然此豈無異姓之臣乎顧恩不如同姓親親也呂氏祖謙曰苟以他人為可恃則嗟彼行道之人胡不自相親比也凡人無兄弟者胡不外求佽助也盖深曉晉君以行道之人必不相親比苟非兄弟必不相佽助信乎豈無他人不如我同父也辯說此乃人無兄弟而自歎之詞未必如序之説也况曲沃實晉之同姓其服屬又未逺乎羔裘刺時也晉人刺其在位不恤其民也嚴氏粲曰昭公有曲沃之偪孤危將亡而其臣又不為保障之謀時事大可憂也故曰刺時辯說詩中未見此意鴇羽刺時也昭公之後大亂五世君子下從征役不得飬其父母而作是詩也孔氏穎逹曰言下從征役者君子之人當居平安之處不有征役之勞今乃退與無知之人共從征役故言下也此言大亂五世則亂後始作但亂從昭起追刺昭公故為昭公詩也朱子曰昭公七年潘父弑昭公而納桓叔不克晉人立昭公之子平是為孝侯孝侯八年曲沃桓叔卒鱓立是為荘伯伐翼殺孝侯晉人立其弟鄂侯六年荘伯伐翼鄂侯奔随王命虢公伐曲沃而立鄂侯之子光是為哀侯元年翼人復逆鄂侯而納諸鄂二年荘伯卒子稱立是為武公九年武公伐翼逐翼侯於汾隰夜獲之晉人立哀侯之子是為小子侯小子侯四年武公殺之明年遂滅翼王命虢仲立哀侯之弟緡二十八年武公又殺之自孝侯至是大亂五世矣辯説序意得之但其時世則未可知耳無衣美晉武公也武公始幷晉國其大夫為之請命乎天子之使而作是詩也孔氏穎逹曰武公始滅晉而有之其大夫為之請王賜命於天子之使而作是無衣之詩以美之其大夫者武公之下大夫也曲沃之大夫美其能并晉國故為之請命不言請命於天子而云請命於天子之使是時使来使以他事適晉大夫就使求之欲得此使告王令王賜以命服也辯説序以史記為文詳見本篇但此詩若非武公自作以述其賂王請命之意則詩人所作以著其事而隂刺之耳序乃以為美之失其㫖矣且武公弑君簒國大逆不道乃王法之所必誅而不赦者雖曰尚知王命之重而能請之以自安是亦禦人於白晝大都之中而自知其罪之甚重則分薄贓餌貪吏以求私有其重寳而免於刑戮是乃猾賊之尤耳以是為美吾恐其奬姦誨盗而非所以為教也小序之陋固多然其顛倒順逆亂倫悖理未有如此之甚者故予特深辯之以正人心以誅賊黨意庻幾乎大序所謂正得失者而因以自附於春秋之義云有杕之杜刺晉武公也武公寡特兼其宗族而不求賢以自輔焉孔氏穎逹曰兼其宗族者昭侯以下為君於晉國者是武公之宗族武公兼有之也武公初兼宗國宜須求賢而不求賢者故刺之范氏處義曰武公兼并宗國屡相殘賊宗族誰敢相侵者可謂寡特矣偃然自以為能不知求賢者為輔翼是誠可刺謂其不能親親故不能用賢也辯説此序全非詩意葛生刺晉獻公也好攻戰則國人多喪矣鄭氏康成曰喪棄亡也夫從征役棄亡不反則其妻居家而怨思孔氏穎逹曰獻公以莊十八年立僖九年卒案左傳荘二十八年晉伐驪戎閔元年晉侯作二軍以滅耿滅霍滅魏三年晉侯使太子申生伐東山皋落氏僖二年晉師滅下陽五年八月晉侯圍上陽冬滅虢又執虞公八年晉里克敗狄於采桑見於傳者已如此是其好攻戰也采苓刺晉獻公也獻公好聽讒焉孔氏穎達曰以獻公好聽用讒人之言或見貶退賢者或進用惡人故刺之經三章皆上二句刺君用讒下六句教君止讒皆是好聽讒之事范氏處義曰晉獻公好聽讒惟驪姬之事為最著由詩人之言考之正指其事也辯説獻公固喜攻戰而好讒佞然未見此二詩之果作於其時也秦車鄰美秦仲也秦仲始大陸氏徳明曰始大絶句或連下句非有車馬禮樂侍御之好焉孔氏穎逹曰秦自非子以来世為附庸其國仍小至今秦仲而國土大矣由國始大而得有此車馬禮樂也王肅云秦為附庸世處西戎秦仲修徳為宣王大夫遂誅西戎是以始大鄭語云秦仲齊侯姜嬴之雋且大其將興乎辯説未見其必為秦仲之詩大率秦風唯黄鳥渭陽為有据其他諸詩皆不可考劉氏瑾曰秦仲但為宣王大夫未必得備寺人之官此詩疑作於平王命襄公為侯之後駟驖美襄公也始命有田狩之事園囿之樂焉鄭氏康成曰始命命為諸侯也孔氏穎達曰有舊曰園有牆曰囿囿者域飬禽獸之處黄氏櫄曰田狩之事園囿之樂何足為美以襄公救周有功而始受天子之命則雖田狩園囿而人亦樂與之也小戎美襄公也備其兵甲以討西戎西戎方彊而征伐不休國人則矜其車甲婦人能閔其君子焉鄭氏康成曰國人夸大其車甲之盛有樂之意也婦人閔其君子恩義之至也作者叙内外之志所以美君政教之功辯説此詩時世未必然而義則得之説見本篇蒹葭刺襄公也未能用周禮將無以國其國焉鄭氏康成曰秦處周之舊土其人被周之徳教日乆矣今襄公新為諸侯未習周之禮法故國人未服焉蘇氏轍曰蒹葭之方盛也蒼蒼其强勁而不適於用至於白露凝戾為霜然後堅成可適於用矣襄公興於西戎知以耕戰富國强兵而不知以禮義終成之非不蒼然盛也而君子以為未成故告之曰有賢者於是不逺也在水之一方耳胡不求與為治哉惟不以道求之也則道阻且長不可得而見矣如以其道求之則宛然在水之中耳呂氏祖謙曰此詩全篇皆比猶鶴鳴之類所謂伊人猶曰所謂此理盖指周禮也襄公所以未能用周禮者疑其迂耳若孝公所云安能邑邑待數十百年以成帝王也故詩人諷之以禮甚易且近特人求之非其道耳辯説此詩未詳所謂然序説之鑿則必不然矣終南戒襄公也能取周地始為諸侯受顯服大夫美之故作是詩以戒勸之歐陽氏修曰周雖以岐豐賜秦使自攻取而襄公亦嘗一以兵至岐至文始逐戎而取岐豐之地李氏樗曰案秦木紀自西戎侵奪岐豐之地周遂東遷雖使秦取岐豐之地而終襄公之世不能取之但十二年伐戎至岐而卒其子文公於是伐戎取其地此詩序所言襄公能取周地是説與史記相戾鄭氏因此序謂秦處周之舊土歐陽以此破之至於始為諸侯其言與史記合矣黄鳥哀三良也國人刺穆公以人從死而作是詩也董氏逌曰陳乾昔魏顆從其治命不以為殉君子美之然康公得無罪乎詩人特以傷賢者之不得死然方責穆公死而棄民故舉其重者辯説此序最為有㨿晨風刺康公也忘穆公之業始棄其賢臣焉黄氏櫄曰秦穆公不聽蹇叔之言喪師於殽其後悔過自誓而求其所謂一介臣者以保我子孫黎民則其所以求賢臣以保後世者切矣今康公忘穆公之業而至於棄其舊臣始之一字作序者所以深責之也蔣氏悌生曰晨風序未敢辯其非辯説此婦人念其君子之辭序説誤矣無衣刺用兵也秦人刺其君好攻戰亟用兵而不與民同欲焉蘇氏轍曰古者君與民同其甘苦非謂其無衣也然有是􅂁也願與之同之故於王之興師也民皆修其戈矛而與之同仇矣傷今無恩於民而用其死也秦本周地故其民猶思周之盛時而稱先王焉李氏樗曰説者以謂王于興師秦為諸侯之國安得稱王毛氏以謂天下有道則禮樂征伐自天子出鄭氏以謂王法興師王肅以謂疾其好攻戰不由王命王荆公以謂阻王命以厲民程氏謂以王道興師数説皆非也此是思古之詩指古之王者而言也黄氏櫄曰秦為諸侯之國而曰王于興師者何也盖此言秦君好攻戰而不與民同欲故詩人思古之王者能與民同安逸故能與民同憂患若平居不能恤民而臨難責其死節其將孰從乎孟子曰君行仁政斯民親其上死其長矣故周公東山之役至於三年之乆而民忘其死勾踐伐吴國人皆父勉其子兄勉其弟婦勉其夫曰孰是吾君也歟可無死乎盖其能與民同其好惡則民之視君猶吾身也視國猶吾家也秦人亟用兵而不與民同欲其怨之也宜矣郝氏敬曰其君平居不能惠民假王命復仇以日從事於干戈所以刺之王氏志長曰案本紀康公二年秦與晉戰于武城報令狐之役也六年復與晉戰于河曲報晉之取少梁也皆晉人先加兵焉而無衣刺康公不貸者以其修私怨耳襄公憤犬戎殺幽王將兵救周力戰有功復以兵送平王徙雒平王封襄公為諸侯賜以岐西之地命襄公逐戎居之故襄公先後與戎為難其後伐戎至岐而卒所謂王于興師與子同仇者非歟無衣詠古以刺今宜也辯説序意與詩情不協説已見本篇矣附錄金氏履祥曰秦紀曰西戎殺秦仲秦仲立二十三年死於戎有子五人其長者曰莊公周宣王乃召莊公昆弟五人與兵七千使伐西戎破之於是復予秦仲後及其先大駱地犬邱并有之為西垂大夫莊公居其故西犬邱秦國風無衣之詩曰豈曰無衣與子同祀王于興師修我戈矛與子同仇豈曰無衣與子同澤王于興師修我矛㦸與子偕作豈曰無衣與子同裳王于興師修我甲兵與子偕行何氏楷曰序云刺用兵也朱子以為序意與詩情不協良是然謂是秦俗强悍樂於戰鬭之詩𫝊説皆云秦襄公以王命征伐周人赴之賦此較為近之然襄公之世周西之地已為秦有宜不復知有王而此詩尚諄諄以王于興師為言則固周人詩也考史記稱宣王以兵七千與秦莊公使伐西戎正與王于興師之言合故仁山金氏編次此詩屬之莊公不為無見也西戎反王室又僴然殺天子之命吏此必討之讐也時七千之士從征在行者自相告語曰我平日所以與子衣袍必共無分爾我者豈誠為爾與我無衣之故哉正以我軰居則為比閭族黨之民出則為伍両軍師之衆今既奉王命征戎正出力敵愾之日也卒之破戎復所侵地所藉於同之奮不可誣已渭陽康公念母也康公之母晉獻公之女文公遭麗姬之難未反而秦姬卒穆公納文公康公時為太子贈送文公于渭之陽念母之不見也我見舅氏如母存焉及其即位思而作是詩也范氏處義曰康公即位猶能作是詩既而遂修晉怨有令狐之役所謂念母之良心安在哉序詩者本前日康公見舅念母之意而詳言之非後日之意也秦自殽之敗遂絶昏姻之好為仇讐之國使康公終能念母釋舊怨而修新好則秦晉之兵可息矣辯説此序得之但我見舅氏如母存焉兩句若為康公之辭者其情哀矣然無所繫屬不成文理盖此以下又别一手所為也及其即位而作是詩盖亦但見首句云康公而下云時為太子故生此説其淺暗拘滯大率如此權輿刺康公也忘先君之舊臣與賢者有始而無終也陳宛丘刺幽公也淫荒昏亂游蕩無度焉范氏處義曰人君之遊豫苟有益於民如春省耕而補不足秋省歛而助不給乃民之所望固為善也其次能與民同樂如田獵鼓樂民見羽旄之美聞鐘鼓之音欣然有喜色抑其次也今陳之幽公以淫昏之故遊蕩無度國人歌詩以刺之諷味其言備見一時鄙厭之意此國人之情也辯説陳國小無事實幽公但以謚惡故得游蕩無度之詩未敢信也東門之枌疾亂也幽公淫荒風化之所行男女棄其舊業亟㑹於道路歌舞於市井爾孔氏穎逹曰男棄其業子仲之于是也女棄其業不績其麻是也會於道路者首章上二句是也歌舞於市井者婆娑是也經先言歌舞之處然後責其棄業序以棄業而後敖游故先言棄業也此實歌舞於市而謂之市井者白虎通云因井為市故曰市井應劭通俗云市恃也飬贍老少恃以不匱也案古者二十畝為一井因為市交易故稱市井然則本由井田之中交易為市故國都之市亦因名市井耳辯説同上衡門誘僖公也愿而無立志故作是詩以誘掖其君也孔氏穎逹曰僖公孝幽公子歐陽氏修曰詩人以陳僖公其性不恣放可以勉進於善而惜其懦而無自立之志故作是詩以誘進之范氏處義曰陳小國也僖公僅能自守耳豈能抗志以有立哉故詩人欲誘道扶持使之卓然奮起有為於國不至安於畢陋而遂止也辯説僖者小心畏忌之名故以為愿無立志而配以此詩不知其為賢者自樂而無求之意也東門之池刺時也疾其君之淫昏而思賢女以配君子也蘇氏轍曰陳君荒淫無度不可告語故其君子思得淑女以化之於内婦人之於君子日夜處而無間庻可以漸革其㬥如池之漚麻漸漬而不自知也范氏處義曰凡詩言刺時盖指一時之事或指其君或指其臣民是詩之序明言疾其君之淫昏必其君有淫行如衛宣公之類不然何以遽加以疾之一字盖疾近於惡如衛宣公之類直可惡矣無復可正救陳君之淫昏詩人猶思得賢女以配之雖由其心之愛君亦其君之資質猶可與為善也辯説此淫奔之詩序説盖誤東門之楊刺時也昏姻失時男女多違親迎女猶有不至者也孔氏穎逹曰毛以昏姻失時者失秋冬之時鄭以為失仲春之時言親迎女猶不至明不親迎者相違衆矣故舉不至者以刺當時之淫亂也言相違者正謂女違男使昏姻之禮不成是男女之意相違耳非謂男亦違女也辯説同上墓門刺陳佗也陳佗無良師傅以至於不義惡加於萬民焉孔氏穎逹曰定本直云民無萬字呂氏祖謙曰墓門幽深之地興其惡也墟墓之間荆棘最難去非用斧不足以除之佗之惡大矣非嚴師傅痛棓擊之亦莫能去其惡也墓門有梅有鴞萃止言佗之性質本非惡為師傅所累也左傳載佗勸陳侯許鄭平親仁善鄰之言中於事理盖非昏愚者陳侯不許卒見侵伐既而徐思佗言復與鄭和遣佗往鄭涖盟佗與鄭伯盟歃如忘洩伯料其必不免考其歲月纔數年耳而蠱惑變壞如是此詩人之所傷也辯説陳國君臣事無可紀獨陳佗以亂賊被討見書於春秋故以無良之詩與之序之作大抵類此不知其信然否也防有鵲巢憂讒賊也宣公多信讒君子憂懼焉范氏處義曰古者謂讒人必曰讒賊盖其巧發竒中甚於以刃殺人者矣况為宣公者多信其言不能考察此君子所以憂懼也夫所貴於考察者亦有理之可㨿理之所必無者讒人以為有何足信哉是詩皆㨿理之言也辯説此非刺其君之詩月出刺好色也在位不好徳而説美色焉孔氏穎逹曰人於徳色不得並時好之心既好色則不復好徳故經之所陳惟言好色而已序言不好徳者以見作詩之意耳於經無所當也王氏安石曰詩所言者説美色而已然序知其不好徳者子夏曰賢賢易色盖説色如此喪其志矣未有能好徳者也辯說此不得為刺詩株林刺靈公也淫乎夏姬驅馳而往朝夕不休息焉范氏處義曰陳靈公與夏姬亂至與其臣相戯於朝又驅馳而往朝夕不休息其無忌憚之甚殆與疾驅於通道天都者無以異國人刺之其辭比他詩為迫切奈靈公無羞惡之心何辯說陳風獨此篇為有据澤陂刺時也言靈公君臣淫於其國男女相說憂思感傷焉嚴氏粲曰此刺淫之詩非淫者自作乃時人作詩譏刺其如此聖人存之以立教使後世知為不善於隠微之地人得而知之欲其戒謹恐懼也檜羔裘大夫以道去其君也國小而迫君不用道好絜其衣服逍遥游燕而不能自强於政治故作是詩也素冠刺不能三年也隰有萇楚疾恣也國人疾其君之淫恣而思無情慾者也呂氏大臨曰萇楚始生猶能自立然枝幹柔弱至於長則引蔓於草上則既長不如初生之自立故引以為喻呂氏祖謙曰夭如厥草唯夭之夭謂萇楚始生未有牽蔓之時生意沃沃然盖甚可愛也此所謂赤子之心也此檜君未有知識未有室家之時也曰無知無家無室者盖疾其君之多慾故其辭過而激辯說此序之誤說見本篇匪風思周道也國小政亂憂及禍難而思周道焉黄氏櫄曰風則發今非風也而發車則偈今非車也而偈盖言其政之亂而人之不安也甞觀此詩至此乃知周之先王其所以得民之心者至矣方周家之衰而諸侯之政亂當是時疑天下之不知有周矣而人猶思周道於周室将亡之時惓惓念慕之意不能自已嗚呼欲觀周之所以得民者當於此詩觀之辯說詩言周道但謂適周之路如四牡所謂周道逶遲耳序言思周道者盖不達此意也曹蜉蝣刺奢也昭公國小而迫無法以自守好奢而任小人将無所依焉蘇氏轍曰曹君危亡之不恤而楚楚然潔其衣服如蜉蝣也是以君子悲其淺陋而知其不能慮逺憂其國以及其身曰我将於何歸處陳氏鵬飛曰儉則寡欲寡欲則小人無所投奢則多欲多欲則小人得以中其欲而自售小人得志則其國家必有危亡之禍而彼致禍之人亦且立而觀之耳因而挺之耳孰與圖其難而共其憂哉辯說言昭公未有考候人刺近小人也共公遠君子而近小人焉辯說此詩但以三百赤芾合於左氏所記晉侯入曹之事序遂以為共公未知然否附錄鄭氏樵曰當毛公之時左氏傳未出鳲鳩刺不壹也在位無君子用心之不壹也范氏處義曰書言惟尹暨湯咸有一徳然則徳惟一動罔不吉徳二三動罔不凶亦君臣之所同也今曹在位無君子用心之不壹似亦指其君臣然臣之不一君實為之是篇皆陳古之人君一徳之美以刺時之不然如曰正是四國豈人臣之能為曰胡不萬年亦不可以是為人臣之祝也辯說此美詩非刺詩下泉思治也曹人疾共公侵刻下民不得其所憂而思明王賢伯也范氏處義曰亂極思治人之常情也共公專務侵刻民不得其所若當盛世天子在上必能命賢方伯以行黜陟之政共公在東周時上下廢弛得以自恣故詩人疾之而思治也辯說曹無他事可考序因候人而遂以為共公然此乃天下之大勢非共公之罪也豳七月陳王業也周公遭變故陳后稷先公風化之所由致王業之艱難也孔氏穎逹曰毛以為周公遭管蔡流言之變舉兵而東伐之憂此王業之将壞故陳后稷及居豳地之光公其風化之所由致此王業之艱難之事先公遭難乃能勤行風化已今遭難亦欲勤修徳教所以陳此先公之事将以比序己志鄭以為周公遭流言之變避居東都非征伐耳其文義則同辯說董氏曰先儒以七月為周公居東而作考其詩則陳后稷公劉所以治其國者方風諭以成其德故是未居東也至於鴟鴞則居東而作其在書可知矣鴟鴞周公救亂也成王未知周公之志公乃為詩以遺王名之曰鴟鴞焉嚴氏粲曰三監雖平而君臣之疑未釋則亂猶在也此詩不知者以為公之自明耳曰周公救亂者用春秋書法也周公既出而作七月未還而作鴟鴞既還而作東山著公之出入也辯說此序以金縢為文最為有据東山周公東征也周公東征三年而歸勞歸士大夫美之故作是詩也一章言其完也二章言其思也三章言其室家之望女也四章樂男女之得及時也君子之於人序其情而閔其勞所以說也說以使民民忘其死其唯東山乎李氏樗曰管蔡挾三監叛周公帥師東征周在豐鎬其地在西管蔡與商其地在王室之東周公自東而征之則是自西而東故謂之東征三年而得罪人因其罪之輕重而行法至於歸周則三年矣遂勞其歸士故作此詩辯說此周公勞歸士之詞非大夫美之而作也破斧美周公也周大夫以惡四國焉鄭氏康成曰惡四國者惡其流言毁周公也孔氏穎達曰按金縢流言者管叔及其羣弟耳今并言惡四國流言毁周公者書傳曰武王殺紂繼公子禄父及管蔡流言奄君薄姑謂禄父曰武王已死成王㓜周公見疑矣此百世之時也請舉事然後禄父及三監叛管蔡流言商奄即叛是同毁周公故并言之程子曰豳七月陳王業鴟鴞遺王東山言東征破斧伐柯九罭皆刺朝廷不知周公於刺也復有淺深之異觀詩可見狼跋美不失其望辯說此歸士美周公之辭非大夫惡四國之詩也且詩所謂四國猶言斬伐四國耳序說以為管蔡商奄尤無理也伐柯美周公也周大夫刺朝廷之不知也孔氏穎達曰鄭以為周大夫作此詩以美周公刺彼朝廷大夫之不知也經二章皆言王當以禮迎周公刺彼羣臣不知之也飲食之事聖人以之為禮今勸迎周公而言陳列籩豆是令王以此籩豆與公饗燕也范氏處義曰此周公居東未歸之時周大夫美周公之善處而刺朝廷不知其忠尚遲遲而未迎周公也朝廷者人主與羣臣論國是之地成王未悟而羣臣不能力争是誰之過歟呂氏祖謙曰觀金縢所載二公之知周公至矣今曰朝廷則二公亦與焉盖大臣與國同體者也主未悟而事未回國人所當責而二公所當受也九罭美周公也周大夫刺朝廷之不知也辯說二詩東人喜周公之至而願其留之詞序說皆非狼䟦美周公也周公攝政逺則四國流言近則王不知周大夫美其不失其聖也范氏處義曰詩序推本其初而言觀詩之所詠乃周公東歸及復辟後事故曰徳音不瑕謂其始終無瑕也不失其聖之語亦合終始而言之欽定詩經傳說彚纂詩序上
