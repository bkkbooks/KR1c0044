body:
  text: 欽定四庫全書欽定詩經傳說彚纂卷十小雅二大雅說附集傳雅者正也張子曰雅之體直言之比興差少無隐諷譎諌之巧程子曰雅者正言其事雅者陳其正理正樂之歌也其篇本有大小之殊何氏楷曰左傳襄二十九年吳季札觀周樂歌大雅小雅是雅有大小已見於夫子未刪之前矣而先儒說又各有正變之别以今考之正小雅燕饗之樂也正大雅㑹朝之樂受釐劉氏瑾曰釐與禧同祭而受福也陳戒之辭也故或歡欣和說以盡羣下之情或恭敬齊莊以發先王之德詞氣不同音節亦異程氏大昌曰均之爲雅音類旣同又自别爲大小則聲度必有豐殺亷肉亦如十二律然旣有大呂又有小呂也劉氏瑾曰小雅正詩歌之以燕樂勞饗羣臣故其辭氣歡欣和說以通上下之情大雅正詩或歌於㑹朝之時如文王大明等篇或陳於祭祀之後如生民行葦等篇或陳於進戒之際如公劉卷阿等篇則其詞氣又皆恭敬齊莊以發先王之德此其詞之異者今猶可考若其音節之異則不可聞矣多周公制作時所定也程子曰自鹿鳴以下二十二篇各賦其事而用之其周公之爲乎與二南同也及其變也則事未必同而各以其聲附之問變雅朱子曰亦是變用他腔調耳輔氏廣曰至於其變則不可以例言但以其聲之有合故以附焉而已其次序時世則有不可考者矣劉氏瑾曰其有可考者則已各見本篇集說鄭氏康成曰小雅大雅者周室居西都豐鎬之時詩也后稷有播種之功於民公劉至於太王王季歴及千載越異代而别世載其功業爲天下所歸文王受命武王遂定天下盛德之隆大雅之初起自文王至於文王有聲據盛隆而推原天命上述祖考之美小雅自鹿鳴至於魚麗先其文所以治内後其武所以治外此二雅逆順之次要於極賢聖之情著天道之助如此而已矣又大雅生民下及卷阿小雅南有嘉魚下及菁菁者莪周公成王之時詩也大雅十八篇小雅十六篇爲正經大雅民勞小雅六月之後皆謂之變雅美惡各以其時亦顯善懲過正之次也孔氏穎達曰六詩之作各有其體詠由歌政而興體亦因政而異作者各有所擬述大政爲大雅之體述小政爲小雅之體體以政興名由體定體旣不同雅有大小大師審其所述察其異體然後分而别之去聖久逺無所傳授雖髣髴其大校不可以言宣也正詩錄善事所以垂法後代變旣美惡不純亦兼采之者為善則顯之令自强不息爲惡則刺之使懲惡而不爲亦足以勸戒是正經之次故錄之也小雅大雅隨政善惡爲美刺之形容以正物也所正之形容有大小所以爲二雅矣詳觀其歎美審察其譏刺大雅則宏逺而疏朗𢎞大體以明責小雅則躁急而局促多憂傷而怨誹幽王小雅四十四而大雅惟二自大體者少也厲王大雅有五而小雅惟四自小體者少也但文武成王正經也厲宣幽王變雅也小大之體時俱有作故采者竝存以示二體本自大小異區非徒以意中分也蘇氏軾曰小雅者言王政之小而兼陳乎其盛衰之際者也季札觀周樂歌小雅曰其周之衰乎文中子曰小雅烏乎衰其周之盛乎札之所謂衰者蓋親見周道之衰而不睹乎文武成康之盛也文中子之所謂盛者言文武餘烈歴數百年而未忘雖其子孫之微而天下猶或宗周也太史公曰小雅怨誹而不亂當周之衰君子不能無怨要在不至於亂而已故通乎二子之說而小雅之道備矣蘇氏轍曰小雅言政事之得失而大雅言道德之存亡政事雖大形也道德雖小不可以形盡也故雖爵命諸侯征伐四國事之大者而在小雅行葦言燕兄弟耆老靈臺言麋鹿魚鼈蕩刺飲酒韓奕歌取妻皆事之小者而在大雅夫政之得失利害止於其事而道德之存亡所指雖小而其所及者大矣朱子曰舊說自鹿鳴至魚麗文武之世燕勞樂歌之辭周公之刪定也南陔至菁菁者莪周公相成王所制之樂歌也蓋國之常政每事爲詩以冩其至誠和樂而被之音聲舉是事則奏是詩焉小雅恐是燕禮用之大雅須饗禮方用小雅施之君臣之閒大雅則止人君可歌大雅氣象宏闊小雅雖各指一事說得精切至到如鹿鳴之詩見得賔主之閒相好之誠如德音孔昭以燕樂嘉賔之心情意懇切而不失義理之正四牡云王事靡盬又云不遑将母皆是人情少不得底說得懇切如皇皇者華郎首云每懷靡及其後便須咨詢咨謀看此詩不用小序意義自然明白鹿鳴之什二之一集傳雅頌無諸國别故以十篇爲一卷而謂之什猶軍法以十人爲什也孔氏穎達曰周禮小司徒職云五人爲伍五人謂之伍則十人謂之什也故左傳曰以什其車必克然則什伍者部别聚居之名風及商魯頌以當國爲别詩少可以同卷而雅頌篇數旣多不可混倂故分其積篇每十爲卷卽以卷首之篇爲什長卷中之篇皆統焉呦呦音幽鹿鳴叶音芒食野之苹叶音㫄我有嘉賓鼓瑟吹笙叶師莊反吹笙鼔簧音黄承筐是將人之好呼報反我示我周行叶戸郎反集傳興也呦呦聲之和也苹藾音頼蕭也郭氏璞曰今藾蒿也初生亦可食嚴氏粲曰釋草苹有二種一云苹蓱其大者蘋此水生之萍也觧見采蘋一云苹藾蕭此陸生之苹也即鹿所食是也青色白莖如筯我主人也賓所燕之客或本國之臣或諸侯之使也瑟笙燕禮所用之樂也李氏如圭曰鼓瑟工歌鹿鳴之三是也吹笙笙奏南陔以下是也李氏本曰琴瑟協比歌聲升歌也吹笙合堂下之樂也儀禮有歌有笙古者作樂必歌吹閒作簧笙中之簧也張氏揖曰笙以匏爲之十三管列匏中而施簧管端嚴氏粲曰鼔謂動其聲易繫辭鼔之以雷霆注鼓動也吹笙則動其簧而發聲承奉也筐所以盛幣帛者也將行也奉筐而行幣帛飲則以酬賓送酒食則以侑賓勸飽也鄭氏康成曰飲之而有幣酬幣也食之而有幣侑幣也孔氏穎達曰飲食必酬侑之者以爲食賔殷勤之意未至復發幣以勸之欲其深安賔也周行大道也朱氏公遷曰道者事物當然之理日用之閒坦然可以由之者也古者於旅也語故欲於此聞其言也孔氏穎達曰鄉射記曰古者於旅也語注云言禮成樂備乃可以言語先王禮樂之道是飲酒之禮至旅酬之禮而語先王之道也此燕饗賔客之詩也李氏如圭曰饗在廟燕在寢饗重而燕輕饗則君親獻燕則不親獻蓋君臣之分以嚴爲主朝廷之禮以敬爲主然一於嚴敬則情或不通而無以盡其忠告之益故先王因其飲食聚㑹而制爲燕饗之禮以通上下之情而其樂歌又以鹿鳴起興瞿氏景淳曰鹿聚於野其情適故其聲和賓在於燕其情通故其言盡而言其禮意之厚如此庶乎人之好我而示我以大道也曹氏粹中曰孟子曰畜君者好君也與此好我之好同此蓋因燕樂之際求賢以自助也許氏謙曰冀之之辭也記曰私惠不歸徳君子不自留焉劉氏瑾曰陳澔云記言人有私惠於我而不合於徳義之公君子决不肯自留處也蓋其所望於羣臣嘉賓者唯在於示我以大道則必不以私惠爲德而自留矣嗚呼此其所以和樂而不淫也與集說王氏肅曰飲食以饗之瑟笙以樂之幣帛以將之則能好愛我好愛我則示我以至美之道矣孔氏穎達曰燕禮於客之内立一人爲賔使宰夫爲主與之對行禮耳其實君設酒殽羣臣皆在君爲之主羣臣總爲賔也燕禮云若與四方之賔燕則迎之於大門内四方之賔唯迎之爲異其燕皆與臣同則此嘉賔之中容四方之賔矣故鄉飲酒燕禮注云鹿鳴者君與臣下及四方之賔燕講道修德之樂歌是也程子曰鹿食則相呼故以興燕樂和聲相呼共食野之草物情相樂也君臣賔主相樂如此我有嘉賔鼔瑟吹笙言其相樂又以幣帛將其誠意故云承筐是將承以藉之筐以貯之旣有誠樂之厚意則人心感悅而相好故人勸而得盡其懽心謝氏枋得曰古之聖賢無一時而忘學問無一事而非道德鹿鳴之具樂將幣人見其和樂而已不知所望於嘉賔者講聖人之道德談先王之禮樂皆相示以道也呦呦鹿鳴食野之蒿我有嘉賔德音孔昭叶則豪反視民不恌他彫反叶音洮君子是則是傚胡教反叶胡高反我有旨酒嘉賓式燕以敖牛刀反集傳興也蒿菣去刃反也即靑蒿也孫氏炎曰荆楚之閒謂蒿爲菣郭氏璞曰今人呼靑蒿香中炙啖者爲菣孔甚昭明也視與示同恌偷薄也敖游也言嘉賓之德音甚明李氏公凱曰宣播德音甚昭著也鄒氏泉曰德音指平日懿德之著爲令聞者足以示民使不偷薄而君子所當則傚王氏炎曰君子有官君子大夫以下羣臣則亦不待言語之閒而其所以示我者深矣集說劉氏彝曰燕禮有親疎之義有尊卑之等有長少之序有内外之分有賔主之位人倫之道莫有不備而我有嘉賓踐其禮安其樂誠信感於人心故聞者見者靡不孚而化之不亦德音孔昭視民不恌乎觀其禮而知則且傚者不亦君子乎程子曰此章又言所燕禮嘉賔聞望昭明示民以厚之之意使儀法之范氏祖禹曰式燕以敖言其禮之從容也夫莊而不至於矜和而不至於流此其德之純也呦呦鹿鳴食野之芩其今反我有嘉賓鼓瑟鼓琴鼔瑟鼔琴和樂音洛且湛都南反叶持林反我有旨酒以燕樂嘉賓之心集傳興也芩草名莖如釵股葉如竹蔓生湛樂之久也范氏處義曰湛露燕諸侯有厭厭夜飲不醉無歸之語則燕以示慈惠不嫌於久也燕安也言安樂其心則非止養其體娛其外而已蓋所以致其殷勤之厚而欲其敎示之無已也郝氏敬曰心契而後忠告可幾也集說毛氏萇曰夫不能致其樂則不能得其志不能得其志則嘉賓不能竭其力曹氏粹中曰君臣相勉以善故久而不荒輔氏廣曰此章再言樂之以樂以見其所以和樂之意永久無斁有旨酒以燕樂其心則又不止於養口體爲觀聽之美而已其所以望於嘉賓敎示之意益深至而無窮矣總論嚴氏粲曰古者上下交而爲泰於鹿鳴諸詩見之謂羣臣爲嘉賓以禮待臣之厚也詩中求規益謂忠告無隱也上下之情不通則忠臣嘉賓雖欲盡心以告君而其勢分隔絶有不可得者非爲必待燕而後盡其心也蔣氏悌生曰首章言始作樂將幣帛以侑賓而所以娛賓之意在乎望嘉賓告我以大道二章言旅酬之禮旣行又欲其遨遊以盡懽然其所望於嘉賔者有不在言語之閒而威儀動作可師可法其德可以厚人倫敦風俗儀軌百寮也嘉賓有是德而設厚禮以饗之則燕非徒設矣三章言和樂且湛湛有過樂之義然嘉賔所以可娛樂者由其德可爲師法也則雖過於樂而不至於淫矣故古人之燕雖極其歡欣和悅之情而尊賢貴德之意未始不流行乎其閒也鹿鳴三章章八句集傳案序以此爲燕羣臣嘉賓之詩而燕禮亦云工歌鹿鳴四牡皇皇者華卽謂此也鄉飲酒用樂亦然儀禮鄉飲酒禮工歌鹿鳴四牡皇皇者華注三者皆小雅篇也鹿鳴采其已有旨酒以召嘉賔嘉賔旣來示我以善道又樂嘉賔有孔昭之明德可則傚也而學記言大學始敎宵雅肄三禮記樂記宵雅肄三官其始也注宵之言小也肄習也亦謂此三詩然則又爲上下通用之樂矣豈本爲燕羣臣嘉賓而作其後乃推而用之鄉人也與問鹿鳴四牡皇皇者華三詩儀禮皆以爲上下通用之樂不知爲君勞使臣謂王事靡盬之類庶人安得而用之朱子曰鄉飲酒亦用而大學始敎宵雅肄三官其始也正謂習此蓋入學之始須敎他便知有君臣之義始得劉氏瑾曰先王作此詩以燕饗賔客後乃推而用之於諸侯之燕禮又用於鄉大夫貢士之禮又用於大學之敎習蓋不專用於天子也今據大射儀亦有歌鹿鳴之文則又通用於諸侯之射禮矣然考儀禮凡上下通用之樂止是小雅二南諸詩而無歌大雅者可見大雅獨爲天子之樂此二雅大小所以分也然於朝曰君臣焉於燕曰賓主焉范氏處義曰於朝曰君臣以名分言之也於燕曰賔主以禮意言之也名分旣嚴禮意未孚則君心不通乎下有懷不盡勢使之然上下情通則和樂可知先王以禮使臣之厚於此見矣范氏曰食之以禮樂之以樂將之以實求之以誠此所以得其心也賢者豈以飲食幣帛爲悅哉夫婚姻不備則貞女不行也禮樂不備則賢者不處也賢者不處則豈得樂而盡其心乎集說孔氏穎逹曰作鹿鳴詩者燕羣臣嘉賔也言人君之於羣臣嘉賔旣行其厚意然後忠臣嘉賔佩荷恩德皆得盡其忠誠之心以事上焉明上隆下報君臣盡誠所以爲政之美也鄧氏元錫曰鹿鳴賔臣也傳曰賔臣者帝師臣者王易稱尚賢九經先尊賢尊之故賔之賔之故燕樂之是周之盛德也四牡騑騑芳非反周道倭於危反遲豈不懷歸王事靡盬音古我心傷悲集傳賦也騑騑行不止之貌周道大路也程子曰猶通途也倭遲回遠之貌盬不堅固也董氏逌曰說文煮海爲鹽煮池爲盬盬苦而易敗故傳以不堅訓之此勞使臣之詩也夫君之使臣臣之事君禮也故爲臣者奔走於王事特以盡其職分之所當爲而已何敢自以爲勞哉然君之心則不敢以是而自安也故燕饗之際叙其情而閔其勞言駕此四牡而出使於外其道路之回遠如此當是時豈不思歸乎特以王事不可以不堅固不敢徇私以廢公是以内顧而傷悲也孔氏穎達曰使臣以王家之事我當從役以堅固之故義不得廢我心念思父母而傷悲也朱氏公遷曰傷悲於心王事故也不然則可以逸樂矣臣勞於事而不自言君探其情而代之言上下之閒可謂各盡其道矣傳曰思歸者私恩也靡盬者公義也傷悲者情思也孔氏穎達曰我心傷悲出自其情故曰情思情思即私恩正謂念憶父母也無私恩非孝子也無公義非忠臣也君子不以私害公不以家事辭王事范氏曰臣之事上也必先公而後私君之勞臣也必先恩而後義集說輔氏廣曰其私恩雖不能不懐歸而其公義則又念王事之不可不堅固如此而悲傷則得其正矣呂氏柟曰私恩公義之說可以竝行不悖之義求之蓋君子以忠爲孝也傷悲之意其在斯乎黄氏佐曰懷歸雖切亦惟使軄盡而後可以得遂但今日之事王事也臣勞王之事不可以不堅是以情爲義制但内顧而傷悲耳四牡騑騑嘽嘽他丹反駱音洛馬叶滿補反豈不懷歸王事靡盬不遑啓處集傳賦也嘽嘽衆盛之貌白馬黒鬛曰駱程子曰駱馬強而耐逺遑暇啓跪處居也項氏安世曰古者席地故有跪有坐跪卽起身居則坐也嚴氏粲曰跪者䨇膝著地而直身坐者䨇膝著地而坐也集說輔氏廣曰我心傷悲旣述其私恩之不能忘不遑啓處又述其公義之不可已也此所謂天理人情之至也季氏本曰此申言在途不得休息而無暇念父母之意翩翩音篇者鵻當作佳朱惟反載飛載下叶後五反集于苞栩況甫反王事靡盬不遑將父扶雨反集傳興也翩翩飛貌鵻夫不也羅氏中行曰夫方扶反不方浮反又如字爾雅作鳺鴀音同今鵓鳩也毛氏萇曰鵻壹宿之鳥陸氏佃曰壹宿壹於所宿之木鵻性慈孝慤謹凡鳥之短尾者皆隹屬將養也翩翩者鵻猶或飛或下而集於所安之處今使人乃勞苦於外而不遑養其父徐氏鳯彩曰以物之得所止興子之失所養此君人者所以不能自安而深以爲憂也范氏曰忠臣孝子之行役未甞不念其親君之使臣豈待其勞苦而自傷哉亦憂其憂如已而已矣此聖人所以感人心也朱氏公遷曰憂其憂則說待其勞苦而自傷則怨矣集說蘇氏轍曰鵻祝鳩孝鳥也春秋傳曰祝鳩氏司徒也謂其孝故爾是以孝子不獲養而稱焉鵻之飛也則亦下而集于栩不若使者之久行不返不獲養父母也翩翩者鵻載飛載止集于苞杞音起王事靡盬不遑將母叶滿彼反集傳興也杞枸音苟檵音計也郭氏璞曰今枸杞也嚴氏粲曰本草有枸杞一名仙人杖一名西王母杖其根名地骨其莖幹三五尺作叢集說朱氏公遷曰此兩章乃言所以懷歸之故先言公義後言私恩而私恩乃所歸重也黃氏佐曰上二章言其思親而不得此則興其缺親之養也駕彼四駱載驟助救反駸駸侵寢二音豈不懷歸是用作歌將母來諗深審二音集傳賦也駸駸驟貌呂氏祖謙曰說文曰驟馬疾歩也駸馬行疾也諗告也孔氏穎達曰左傳辛伯諗周桓公是以言告周桓公故知諗爲告也以其不獲養父母之情而來告於君也非使人作是歌也設言其情而勞之耳孔氏穎達曰臣有勞苦患上不知今君勞使臣言汝曰豈不思歸作歌來告是探情以勞之獨言將母者因上章之文也孔氏穎達曰母以恩意偏多故再言之集說范氏祖禹曰父至尊也母至親也知母之親則知父之尊矣卒章再言母本其恩所起以敎愛也愛母則敬父矣敬父則尊君矣未有愛親而不愛其君者也謝氏枋得曰聖人以孝治天下聞有以養母來告者安得不俞其請乎此蓋設言欲使人臣忠孝兩全也總論朱子曰使臣將命以賦政於四方乃其職分之所當然而先王之意殷勤惻怛惟恐勞之不至乃爲之探其情意之所不能已而未敢言者於其燕勞而詠歌之孔子曰體羣臣則士之報禮重於此其見之矣朱氏善曰忠於君者必其能養於親也然致其勞於外則必闕其養於内又不可以不慮也爲人臣者將欲致其力於私養歟則當官而行國事固不可以不恤將欲致其力於王事歟則子職之不共又何以爲孝哉此王者所以必探其情而代之言爲人臣者聞之亦必有以自慰而益不懈於用力矣呂氏柟曰以王事之靡盬也心傷悲而身不遑啓處且於父母不暇以將抑何爲耶其功可知矣然非上知其心鮮不倦於行而作北山也易曰說以使民民忘其勞況於臣乎此先王縁人情而治也四牡五章章五句集傳案序言此詩所以勞使臣之來甚協詩意輔氏廣曰或己國使臣之歸或諸侯使臣之來皆可用也故春秋傳亦云而外傳以爲章使臣之勤所謂使臣雖叔孫之自稱亦正合其本事也春秋魯襄公四年左傳穆叔如晉晉侯享之歌鹿鳴之三三拜韓獻子使子員問之對曰鹿鳴君所以嘉寡君也敢不拜嘉四牡君所以勞使臣也敢不重拜皇皇者華君敎使臣曰必諮於周敢不重拜魯語叔孫穆子對曰四牡君所以章使臣之勤也敢不拜章但儀禮又以爲上下通用之樂儀禮鄉飲酒禮注四牡采其勤苦王事念將父母懷歸傷悲忠孝之至以勞賔也疑亦本爲勞使臣而作其後乃移以他用耳集說程子曰四牡之義憫使臣之勤勞故云有功而見知則說矣上不知下之勞則下不自盡其力故四牡之義廢則君臣缺矣蘇氏轍曰皇皇者華以遣使臣四牡以勞其來以事言之當先遣後勞今先勞而後遣何也鹿鳴之三常施於禮樂不獨用於勞遣故燕禮鄉飲酒歌焉意者以其聲爲先後歟皇皇者華芳無反與夫叶于彼原隰駪駪所巾反征夫每懷靡及集傳興也皇皇猶煌煌也華草木之華也高平曰原下溼曰隰駪駪衆多疾行之貌征夫使臣與其屬也毛氏萇曰征夫行人也鄭氏康成曰衆行夫孔氏穎逹曰使與上介衆介也懷思也此遣使臣之詩也君之使臣固欲其宣上德而達下情而臣之受命亦惟恐其無以副君之意也故先王之遣使臣也美其行道之勤而述其心之所懷曰彼煌煌之華則于彼原隰矣此駪駪然之征夫則其所懷思常若有所不及矣蓋亦因以爲戒然其辭之婉而不迫如此詩之忠厚亦可見矣輔氏廣曰以爲戒者卽穆子所謂君敎使臣之意夫欲以爲敎戒而不遂直言之乃設言其使臣之情自如此所謂婉而不迫也集說毛氏萇曰忠臣奉使能光君命無遠無近如華不以高下易其色程子曰天子遣使四方以觀省風俗采察善惡訪問疾苦宣道化於天下皇華之光明於野猶王澤之流布光華天下也使人惟恐不能宣達是每懷靡及也蘇氏轍曰煌煌之華生於原隰而不知原隰之異維其所在而無不煌煌者臣奉君命以出而每懷不及事之憂不忘咨訪不以逺近險易易其心亦如華之無不煌煌也朱氏善曰每懷者每事而思之謂之靡及則其心歉然常若有所不及也然不曰使臣而曰征夫則不特使臣此心其屬亦此心也推此心以在外則耆老之在所當問遺逸之在所當求鰥寡之在所當恤廢墜之在所當舉上德之厚而欲其無一之不宣下情之遠而欲其無一之不達爲使臣者固惟恐無以副君之意而爲其屬者又惟恐無以爲使臣之助庻可以稱斯職矣我馬維駒恭于恭侯二反六轡如濡如朱如由二反載馳載驅虧于虧由二反周爰咨諏子須子侯二反集傳賦也如濡鮮澤也周徧爰於也咨諏訪問也使臣自以每懷靡及故廣詢博訪以補其不及而盡其職也程子曰咨訪使臣之大務黄氏佐曰此章至末章皆一意集說歐陽氏修曰二章以下戒其調御車馬雖有馳驅之勞不忘國事周詳訪問因以博采廣聞不徒將一事而出也李氏樗曰使者之奉使周徧其所而詢問之周官撢人之職掌誦王志道國之政事以廵天下邦國而語之則是使臣之職欲其周徧咨謀無所不及也輔氏廣曰程子所謂咨訪使臣之大務者蓋人君正以其耳目不得親與四遠之民相接故遣使臣於外以宣己意而通下情則爲之使者又豈可不務廣詢博訪以副其君之意哉我馬維騏音其六轡如絲叶新齎反載馳載驅周爰咨謀叶莫悲反集傳賦也如絲調忍音刃也朱氏公遷曰猶言和柔也謀猶諏也變文以協韻爾下章放此歐陽氏修曰諏謀度詢但叶韻爾詩家此類甚多我馬維駱六轡沃烏毒反若載馳載驅周爰咨度待洛反集傳賦也沃若猶如濡也劉氏瑾曰沃若有鮮澤之義故猶二章之如濡度猶謀也我馬維駰音因六轡旣均載馳載驅周爰咨詢集傳賦也陰白雜毛曰駰呂氏祖謙曰詳解見駉均調也詢猶度也總論劉氏彝曰駒騏駱駰皆駟之良選所以賁使臣之行也黃氏佐曰首章興其勤使役而常懷不及之心下詳其服使役以補其不及之職首章述其心後四章述其事蓋惟其有是心而後有是事惟其事之敏則其心之勤益可知矣附錄毛氏萇曰忠信爲周訪問於善爲咨咨事爲諏咨事之難易爲謀咨禮義所宜爲度親戚之謀爲詢兼此五者雖有中和當自謂無所及成於六德也鄭氏康成曰中和謂忠信也五者咨也諏也謀也度也詢也雖得此於忠信之賢人猶當云已將無所及於事則成六德言愼其事孔氏穎達曰左傳云臣獲五善是也魯語曰重之以六德是傳之所據范氏處義曰載馳載驅而往不憚勞苦周徧咨訪其事悉以告上諏也謀也度也詢也說者謂變文以叶韻然諏有聚議之意謀有計畫之意度有體諒之意詢有究問之意旣欲以告上故貴詳審冀得其實也呂氏祖謙曰諏謀度詢必咨於周而詩文乃云周爰咨諏者古語多倒也歐陽氏諸説詩中亦兼有此意然毛傳乃經之本旨皇皇者華五章章四句集傳案序以此詩爲君遣使臣春秋内外傳皆云君敎使臣其說己見前篇儀禮亦見鹿鳴儀禮鄉飲酒禮注皇皇者華采其更是勞苦自以爲不及欲諮謀於賢知而以自光明也疑亦本爲遣使臣而作其後乃移以他用也然叔孫穆子所謂君敎使臣曰每懷靡及諏謀度詢必咨於周敢不拜敎可謂得詩之意矣范氏曰王者遣使於四方敎之以咨諏善道將以廣聰明也夫臣欲助其君之德必求賢以自助故臣能從善則可以善君矣臣能聽諌則可以諌君矣未有不自治而能正君者也輔氏廣曰范氏說是餘意夫君臣一體已不能咨諏善道則君亦安能聽用己言哉集說嚴氏粲曰遣使以禮樂歸又勞之體羣臣也朱氏公遷曰皇華遣使勸以義四牡勞使恤以情是以出則盡其職歸則忘其勞由君之使臣有道也常棣之華鄂五各反不韡韡韋鬼反凡今之人莫如兄弟待禮反集傳興也常棣棣也子如櫻桃可食宋氏祁曰世人多誤以常棣爲唐棣於兄弟用之唐棣栘也栘開而反合者也此兩物不相親李氏樗曰何彼穠矣唐棣之華與論語所舉唐棣之華偏其反而則爾雅所謂移也此常棣與采薇詩曰維常之華則爾雅所謂棣也二者異木也鄂鄂然外見之貌毛氏萇曰鄂猶鄂鄂然言外發也孔氏穎達曰謂華聚而發於外也不猶豈不也韡韡光明貌王氏肅曰不韡韡言韡韡也孔氏穎達曰華非一色故云光明此燕兄弟之樂歌故言常棣之華則其鄂然而外見者豈不韡韡乎凡今之人則豈有如兄弟者乎輔氏廣曰詩記所載諸家常棣之說皆兼比體惟集傳之說乃是興體只是以豈不韡韡興豈有如兄弟一句耳集說孔氏穎達曰常棣之木衆花俱發實韡韡而光明以興兄弟衆多而相和睦豈不强盛而有光暉乎嚴氏粲曰一章發端姑言兄弟之常而辭氣抑揚之閒已有感歎不盡之意其斯周公之心乎朱氏道行曰凡今之人大槪泛說非屬毛離裏於我隔膜者情分不甚關切焉得如己之兄弟此其理易見也下七章反覆發明總以見其不如耳附錄鄭氏康成曰承華者曰鄂不當作柎方于反柎鄂足也鄂足得華之光明則韡韡然盛興弟以敬事兄兄以榮覆弟恩義之顯亦韡韡然王氏安石曰華鄂之相恃不可須叟離者以天屬故也兄弟天屬也其相承覆相恃而不可離如此程子曰不作柎亦可如字亦可以花萼相依生相親力相承興人之莫如兄弟也呂氏祖謙曰說文鄂作萼常棣之華鄂不韡韡諸家文義雖小不同然詩皆包此意學者所當徧察熟味也死喪之威兄弟孔懷叶胡威反原隰裒薄侯反矣兄弟求矣集傳賦也威畏懷思裒聚也言死喪之禍他人所畏惡惟兄弟爲相恤耳至於積尸裒聚於原野之閒亦惟兄弟爲相求也此詩蓋周公旣誅管蔡而作故此章以下專以死喪急難鬭鬩之事爲言其志切其情哀乃處兄弟之變如孟子所謂其兄關音彎弓而射之則已垂涕泣而道之者序以爲閔管蔡之失道者得之而又以爲文武之詩則誤矣大抵舊說詩之時世皆不足信舉此自相矛盾者以見其一端後不能悉辨也范氏處義曰周公遭管蔡之變因思文武能燕樂兄弟如此而今乃爾故作是詩蓋閔之也然則謂文武燕兄弟於當時周公追詠其事於後於理亦可信朱子曰文武之際固有燕兄弟之詩矣周公以管蔡之爲亂也故制作之際更爲是詩以申兄弟之好蓋燕兄弟者文武之政而閔管蔡者周公之心也集說何氏楷曰此就常情而言上章所謂莫如兄弟者於此驗之最爲親切莊子所云以利合者迫窮禍患害相棄也以天屬者迫窮禍患害相收也脊井益反令音零在原兄弟急難叶泥沿反每有良朋況也永歎吐丹反叶它涓反集傳興也脊令董氏逌曰爾雅作䳭鴒雝渠水鳥也禽經脊令友悌陸氏璣曰大如鷃雀腹下白頸下黒如連錢杜陽人謂之連錢陸氏佃曰物類相感志曰俗呼雪姑鳴則天當大雪況發語詞或曰當作怳季氏本曰況與怳同言朋友情雖愴怳亦但長歎而已脊令飛則鳴行則揺有急難之意故以起興孔氏穎達曰脊令水鳥今乃在於高原之上失其常處飛則鳴行則揺動其身不能自舍以喻兄弟旣在急難而相救亦不能自舎嚴氏粲曰小宛取義在於飛則鳴故曰題彼脊令載飛載鳴此詩取義在於行則揺故曰脊令在原程子以爲脊令首尾相應是也而言當此之時雖有良朋不過爲之長歎息而已力或不能相及也東萊呂氏曰疎其所親而親其所疎此失其本心者也故此詩反覆言朋友之不如兄弟蓋示之以親疎之分使之反循其本也本心旣得則由親及疎秩然有序兄弟之親旣篤朋友之義亦敦矣初非薄於朋友也苟雜施而不孫雖曰厚於朋友如無源之水朝滿夕除胡可保哉或曰人之在難朋友亦可以坐視與曰每有良朋況也永歎則非不憂憫但視兄弟急難爲有差等耳詩人之詞容有抑揚然常棣周公作也聖人之言小大高下皆宜而前後左右不相悖集說王氏安石曰古者朋友之喪則視兄弟視兄弟則急難宼讐何爲而不豫白莫不有君而爲之臣莫不有父而爲之子莫不有師而爲之弟子莫不有兄弟而爲之兄弟則吾急難宼讐之所當致力也博矣又推而致之朋友則有所不暇然則世之致力於朋友者非與曰勢足以振之力足以周之而無傷於義則鄰里鄉黨不可不勉也而況於朋友乎兄弟鬩許歴反于牆外禦其務春秋傳作侮罔甫反每有良朋烝之承反也無戎叶而主反集傳賦也鬩鬬狠也朱氏道行曰牆與外相應同室之鬬在門以内故曰鬩禦禁也烝發語聲戎助也言兄弟設有不幸鬬狠于内然有外侮則同心禦之矣雖有良朋豈能有所助乎王氏安石曰狠於内非令兄弟也然及其禦侮則雖每有良朋曽不如不令兄弟之可恃也富辰曰兄弟雖有小忿不廢懿親左傳富辰曰昔周公弔二叔之不咸故封建親戚以蕃屛周召穆公思周德之不類故糾合宗族於成周而作詩周之有懿德也猶曰莫如兄弟其懐柔天下也猶懼有外侮扞禦侮者莫如親親故以親屛周召穆公亦云杜氏預曰周公作詩召公歌之故言亦云孔氏穎達曰此詩自是成王之時周公所作以親兄弟但召穆公見厲王之時兄弟恩疏重歌此周公之詩以親之耳集說歐陽氏修曰旣言兄弟之相親者如是又言兄弟雖有内鬩者至逢外侮猶共禦之輔氏廣曰二章至四章雖是周公處管蔡之變故以死喪急難鬬鬩之事爲言然兄弟眞切之情亦惟於此際而後見得分曉若於安平之時觀之則人或以爲朋友與兄弟等耳喪亂旣平旣安且寧雖有兄弟不如友生叶桑經反集傳賦也上章言患難之時兄弟相救非朋友可比此章遂言安寧之後乃有視兄弟不如友生者悖理之甚也集說歐陽氏修曰及乎喪亂平而安寧則反視兄弟不如友生此乃責之之辭所謂弔其不咸也蘇氏轍曰人居平安之世不知兄弟之可恃而以至親相責望則兄弟常多過失易以生怨故有以朋友爲賢於兄弟者儐賔𦙍反爾籩豆飲酒之飫於慮反兄弟旣具和樂音洛且孺集傳賦也儐陳飫饜具俱也王氏安石曰兄弟無故則旣具矣孺小兒之慕父母也言陳籩豆以醉飽而兄弟有不具焉則無與共享其樂矣集說程子曰此章勸其相燕樂養恩義陳爾籩豆飲食飫足兄弟旣皆來當和樂而相親慕也謝氏枋得曰凡人飲燕待親戚朋友之禮常盛待兄弟之禮常簡愛有餘者敬或不足顔情稔熟者禮文有時而脫略也籩豆畢陳飲酒而至於饜飫亦可樂矣何如兄弟無故飲酒於家庭之閒不惟和樂其情親義厚無異於孺子嬉戯之時乎妻子好呼報反合如鼓瑟琴兄弟旣翕許及反和樂且湛荅南反叶持林反集傳賦也翕合也言妻子好合如琴瑟之和鄭氏康成曰合者如鼓瑟琴之聲相應和也董氏逌曰鼓官宫動鼓角角應琴瑟尚宫其合也無閒矣而兄弟有不合焉則無以久其樂矣嚴氏粲曰鹿鳴傳曰湛樂之久也集說蘇氏轍曰妻子以好合耳及其和也如鼓瑟琴況於兄弟之以天屬也哉特患不親之耳苟其親之其樂豈特妻子而已朱子語類問六章七章就他逸樂時良心發處指出蓋居患難則人情不期而相親故天理常易復處逸樂多爲物欲所轉移故天理常隱而難尋反覆玩味眞能使人孝友之心油然而生也曰此所謂生於憂患死於逸樂那二章正是遏人欲而存天理須是恁地看宜爾室家叶古胡反樂爾妻帑音奴是究是圖亶其然乎就用乎字爲韻集傳賦也帑子陸氏德明曰帑依字吐蕩反經典通爲妻帑字今讀音孥也究窮圖謀亶信也宜爾室家者兄弟具而後樂且孺也樂爾妻帑者兄弟翕而後樂且湛也兄弟於人其重如此試以是究而圖之豈不信其然乎東萊呂氏曰告人以兄弟之當親未有不以爲然者也苟非是究是圖實從事於此則亦未有誠知其然者也不誠知其然則所知者特其名而已矣凡學蓋莫不然集說輔氏廣曰兄弟之具翕是乃所以宜爾室家樂爾妻帑也此理固當是究是圖而信其然矣乎疑辭也不自以爲然而使之反求諸心以見其眞情實理之所在周公亦可謂善敎人者也黄氏佐曰此章承上二章而言欲人驗其信然所以致丁寧之意也蓋死喪患難之時天理眞情發見不待究圖自知兄弟之重至此安寧之時人欲易溺蔽於不知必待究圖而後信其重也總論朱氏善曰自三章至五章皆舉朋友以明兄弟之當親自六章至八章復舉妻子以明兄弟之當厚薄於兄弟而厚於朋友者不知親疎之殺者也薄於兄弟而厚於妻子者不知尊卑之等者也故必厚於兄弟而後朋友之好愈篤尤必厚於兄弟而後妻帑之樂可久苟兄弟鬭鬩於内則不惟朋友不得以盡其情而妻帑且不得以久其樂矣汪氏應蛟曰常棣言兄弟曲盡人情也死生憂樂靡不相通豈良朋能論厚薄哉夫天性懿親始何嘗不篤愛其後鮮克終卽有妻子奚樂焉故詩之卒章曰宜室家樂妻帑意至深遠矣常棣八章章四句集傳此詩首章略言至親莫如兄弟之意次章乃以意外不測之事言之以明兄弟之情其切如此三章但言急難則淺於死喪矣至於四章則又以其情義之甚薄而猶有所不能已者言之其序若曰不待死喪然後相收但有急難便當相助言又不幸而至於或有小忿猶必共禦外侮其所以言之者雖若益輕以約而所以著夫兄弟之義者益深且切矣至於五章遂言安寧之後乃謂兄弟不如友生則是至親反爲路人而人道或幾乎息矣故下兩章乃復極言兄弟之恩異形同氣死生苦樂無適而不相須之意卒章又申告之使反覆窮極而驗其信然可謂委曲漸次說盡人情矣讀者宜深味之集說孔氏穎達曰常棣燕兄弟也所以作此燕兄弟之詩者周公閔傷管叔蔡叔失兄弟相承順之道故言兄弟不可不親以敦天下之俗焉此序其由管蔡而作詩意直言兄弟至親須加燕飫以示王者之法不論管蔡之事也程子曰此詩句少而章多章多所以極其鄭重句少則各陳一義故也伐木丁丁陟耕反鳥鳴嚶嚶於耕反出自幽谷遷于喬木嚶其鳴矣求其友聲相息亮反彼鳥矣猶求友聲矧伊人矣不求友生叶桑經反神之聽之終和且平集傳興也丁丁伐木聲劉氏敞曰聲相應也嚶嚶鳥聲之和也郭氏璞曰嚶嚶兩鳥鳴幽深遷升喬高相視矧況也此燕朋友故舊之樂歌李氏樗曰旣謂朋友又謂之故舊亦如鹿鳴之詩旣謂之羣臣又謂之嘉賔不必分别言之故以伐木之丁丁興鳥鳴之嚶嚶呂氏祖謙曰什方張氏曰詩人多相因之詞如伐木而感鳥鳴蓋因此而興焉者也故下章皆以伐木言之而言鳥之求友遂以鳥之求友喻人之不可無友也人能篤朋友之好則神之聽之終和且平矣程子曰和謂相好平謂不變王氏質曰神且來聽以其和平亦有感動也集說程子曰山中伐木非一人能獨爲必與同志者共之旣同其事則相親好成朋友之義繼言鳥鳴嚶嚶又以物情興朋友之好友聲謂應聲猶人之朋友相從也視鳥如是豈人而不求友乎朋友之信久不渝可質於神明蘇氏轍曰事之甚小而須友者伐木也物之無知而不忘其羣者烏也鳥出於谷而升於木以木爲安而不獨有也故嚶然而鳴以求其友况於事之大於伐木而人之有知也哉是以先王不遺朋友故舊以爲非特有人助也鬼神亦將祐之以和平矣李氏樗曰自天子至於庻人未有不須友以成者然又在上之人率之於上則民皆翕然效德歸於淳厚之域天子求友以治天下而有和平之效庶人求友以治一身而有和平之效唐氏順之曰以和召和則萬邦協和而永無拂逆之風終於和也以平致平則四方旣平而永無傾危之患終於平也伐木許許呼古反釃所宜反酒有藇象呂反旣有肥羜直呂反以速諸父扶雨反寧適不來微我弗顧叶居五反於音烏粲洒所懈反埽蘇報反叶蘇吼反陳饋八簋叶已有反旣有肥牡以速諸舅其九反寧適不來微我有咎其九反集傳興也許許衆人共力之聲淮南子曰舉大木者呼邪余遮反許蓋舉重勸力之歌也釃酒者或以筐陸氏德明曰謂以篚􅜷音鹿酒或以草孔氏穎達曰用草者用茅也泲躋上聲之而去其糟也禮所謂縮酌用茅是也禮記郊特牲縮酌用茅明酌也鄭氏康成曰五齊醴尤濁和之以明酌藉之以茅縮去滓也明酌者事酒之上也事酒今之醳酒皆新成也藇美貌羜未成羊也郭氏璞曰今俗呼五月羔爲羜速召也諸父朋友之同姓而尊者也微無顧念也於歎辭粲鮮明貌孔氏穎達曰粲然灑埽其室庭陳飮食之饋八簋器之盛也毛氏萇曰天子八簋孔氏穎達曰周官掌客職五等諸侯簋皆十二此天子云八簋者據待族人設食之禮劉氏彝曰簋八則籩豆倍之天子燕禮之數也諸舅朋友之異姓而尊者也先諸父而後諸舅者親疎之殺所界反也孔氏穎達曰禮記注云稱之以父與舅親親之辭也覲禮說天子呼諸侯之義曰同姓大國則曰伯父其異姓則曰伯舅同姓小國則曰叔父異姓則曰叔舅是天子稱諸侯也咎過也言具酒食以樂朋友如此寧使彼適有故而不來而無使我恩意之不至也孔子曰所求乎朋友先施之未能也此可謂能先施矣集說范氏祖禹曰寧適不來微我弗顧者豈必期其至哉不來在人弗顧在我躬自厚而不責於人也李氏樗曰上章言伐木丁丁鳥鳴嚶嚶下章但云伐木許許者省文也旣言伐木之時鳥猶求友君子於閑暇之時則有釃酒肥羜宴樂朋友此古人忠厚之情有見於此故寧使召之而自不來無使言我不顧念也黃氏佐曰以伐木無不用其力興篤友無不用其情也伐木于阪叶孚臠反釃酒有衍籩豆有踐在演反兄弟無遠民之失德乾餱音侯以愆叶起淺反有酒湑思呂反我無酒酤音古我坎坎鼔我蹲蹲七旬反舞我迨音待我暇叶後五反矣飮此湑矣集傳興也衍多也踐陳列貌嚴氏粲曰解見伐柯兄弟朋友之同儕者曹氏粹中曰兄弟者同氣之親推而廣之以及其異姓皆得稱焉無遠皆在也胡氏紹曽曰尊者不敢必其來兄弟則言無遠立言之法先諸舅而後兄弟者尊卑之等也乾餱食之薄者也嚴氏粲曰餱乾食也公劉乃裹餱糧王制乾豆注云乾謂腊之以爲豆實愆過也曹氏粹中曰易曰飮食必有訟湑亦釃也酤買也嚴氏粲曰設言縱使無酒猶當酤之下文言飮此湑知不待酤也謝氏枋得曰湑我我湑之也酤我我酤之也坎坎擊鼓聲蹲蹲舞貌謝氏枋得曰鼓我我鼓之也舞我我舞之也迨及也言人之所以至於失朋友之義者非必有大故或但以乾餱之薄不以分人而至於有愆耳故我於朋友不計有無但及閒暇則飮酒以相樂也徐氏鳯彩曰飮乘於暇旣不拘好㑹燕饗之常亦不廢蒞朝考政之期也集説蘇氏轍曰民之失德也有以乾餱相譴故君子於其朋友故舊無所愛者有則湑之無則酟之不以有無爲辭也奏之以鼔重之以舞盡其有以樂之也輔氏廣曰此章蓋極道和樂而不變之意言細民之相失或以薄乎飮食而不以相分之故蓋前章旣言其厚故此章又以薄者言之且乾餱之愆亦微過耳於微過而猶不敢不謹則其大者可知矣鄒氏泉曰以伐木必於所生之地興燕飮必於所親之人總論朱氏善曰伐木以燕朋友而篇中有諸父諸舅兄弟之辭何也曰人之所資乎朋友者以明道也以進德也貴之而爲天子賤之而爲庶人尊之而爲父兄卑之而爲子弟親之而爲同姓疎之而爲異姓其分雖不同而其可友則如一故以賤交貴而不爲謟以貴交賤而不爲屈以卑就尊而不爲僭以尊就卑而不爲貶内取之同姓而不爲昵外取之異姓而不爲泛道之所存德之所存卽吾友之所存也而何貴賤親疎之閒哉何氏楷曰禮有饗有食有燕饗禮烹太牢以飮賔體薦而不食爵盈而不飮几設而不倚食禮無樂有飯有殽雖設酒而不飮燕禮一獻之禮旣畢皆坐而飮酒其爵無算也其樂無算也此詩言有肥牡肥羜是用太牢則同於饗言陳饋八簋籩豆有踐是有飯有殽則同於食言有酒湑我無酒酤我是無算爵言坎坎鼓我蹲蹲舞我是無算樂則同於燕兼是三者而備之蓋禮之盛也伐木三章章十二句集傳劉氏曰此詩每章首輒云伐木凡三云伐木故知當爲三章舊作六章誤矣今從其說正之范氏處義曰是詩原六章考文義當作三章集說眞氏德秀曰鹿鳴之詩以臣爲賔伐木之詩以臣爲友以臣爲賔敬已至矣以臣爲友敬益至焉玩伐木之詩止見爲人之求友而不見爲君之求臣蓋先王樂道忘勢但知有朋友相須之義而不見有君臣相臨之分也天保定爾亦孔之固俾爾單音丹厚何福不除直慮反俾爾多益以莫不庶集傳賦也保安也曹氏粹中曰保則不危定則不傾爾指君也歐陽氏修曰詩人爾其君者蓋稱天以爲言王氏質曰人傳天辭如皇矣帝謂也固堅單盡也除除舊而生新也程子曰除更新也日益之義胡氏紹曽曰除字詩中皆直慮反除猶易也庶衆也人君以鹿鳴以下五詩燕其臣臣受賜者歌此詩以答其君言天之安定我君使之獲福如此也集說王氏安石曰君恩至重臣雖有犬馬之勞不足以上荅唯稱其福祿以報之此出於懽心而不强以爲者也曹氏粹中曰人臣之福祿出於君人君之福祿出於天輔氏廣曰此章言天之安定我君亦甚堅固也使我君無不極其單厚其於福祉無不見其除舊而生新也使我君多見其悠久之益以莫不庶便見其盛大之意終篇不過是此二意也朱氏公遷曰徃者方消來者復受福之在已無少閒也無時而不受福則積之也極厚故以單厚言無事而不受福則得之也極多故以多益言何福不除以莫不庶正以申言單厚多益之意天保定爾俾爾戩子淺反穀罄無不宜受天百祿降爾遐福維日不足集傳賦也聞人氏曰戩與翦同盡也范氏處義曰說文以實始翦啇之翦爲戩亦取除舊爲義穀善也盡善云者猶其曰單厚多益也罄盡遐遠也爾有以受天之祿矣而又降爾以福言天人之際交相與也朱氏公遷曰爾旣受於天天又錫於爾一受一錫反覆申重所謂交相與也書所謂昭受上帝天其申命用休語意正如此集說歐陽氏修曰旣曰何福不除矣又曰俾爾戩榖又曰無所不宜而受天百祿又曰降爾遐福其所以殷勤重複如此而猶曰維日不足也蘇氏轍曰將使之安有福祿故開其心智使之無所不宜以能受之詩云宜民宜人受祿於天如是然後可以長有其福而日且不足矣此所謂何福不除也輔氏廣曰此章又言天使我君無不盡善云爲動作無不適宜而亦旣受天之百祿矣而天之所以申命其悠久之福者方且維日不足也罄無不宜受天百祿者已然之事也降爾遐福維日不足者方來之事也天保定爾以莫不興如山如阜如岡如陵如川之方至以莫不增集傳賦也興盛也高平曰陸大陸曰阜大阜曰陵李氏廵曰高平謂土地豐正名爲陸土地獨高大名曰阜最大名爲陵劉氏熈曰山産也産生物也阜厚也言高厚也陵隆也體高隆也岡亢也在上之言也皆高大之意鄭氏康成曰此言其福祿委積高大也川之方至劉氏熙曰川穿也穿地而流也蔡氏邕曰衆流注海曰川言其盛長之未可量也集說呂氏大臨曰上章言受百祿降遐福其莫不庶也旣庶矣則欲積累至於崇高故曰以莫不興如山阜岡陵言其興也旣興矣欲增益而不絶故曰以莫不增如川方至言其增也徐氏鳳彩曰以上三章皆言天之福君欲君祈天永命也吉蠲古𤣥反爲饎尺志反是用孝享叶虛良反禴餘若反祠烝嘗于公先王君曰卜爾萬壽無疆集傳賦也吉言諏日擇士之善劉氏瑾曰諏日者君臣諏謀祭日於旬有一日之先至次日乃卜所諏之日吉否如少牢饋食大夫先與有司諏丁巳之日至明日乃筮其日之吉凶也擇士者大射於射宮以選與祭之士蔣氏悌生曰旣諏士然後卜日卜吉而後有祭期蠲董氏逌曰周官蜡氏注曰蠲如吉圭惟饎之圭則是圭字作蠲音韓詩作吉圭言齊戒滌濯之潔劉氏瑾曰齊戒謂七日齊三日戒之類滌濯謂漑濯祭器埽除宗廟之類饎劉氏瑾曰儀禮有饎爨注炊黍稷曰饎酒食也郭氏璞曰猶今云饎饌皆一語而兼通邢氏昺曰言饎之一字通酒食兩名也享獻也宗廟之祭春曰祠夏曰禴秋曰嘗冬曰烝孔氏穎達曰孫炎曰祠之言食礿新菜可汋嘗嘗新穀烝進品物也若以四時當云祠禴嘗烝詩以便文故不依先後此皆周禮文自殷以上則禴禘嘗烝王制文也至周公則去夏禘之名以春禴當之更名春曰祠公先公也謂后稷以下至公叔祖類也司馬氏遷曰亞圉子公叔祖類公叔祖類子古公亶父司馬氏貞曰世本云太公組紺諸􅉦音籌三代世表稱叔類凡四名先王大王以下也孔氏穎逹曰周之所追太王以下其太王之前皆爲先公問古無追王之禮武王周公以王業肇於太王王季文王故追王三王至於組紺以上則止祀以先公之禮朱子曰然周禮祀先王以袞冕祀先公以鷩冕乃是天子祭先公之禮耳君通謂先公先王也卜猶期也此尸傳人意以嘏主人之詞毛氏萇曰尸所以象神孔氏穎達曰少牢云皇尸命工祝承致多福無疆于汝孝孫之等是傳神辭嘏主人也文王時周未有曰先王者此必武王以後所作也劉氏瑾曰此詩所以荅前五篇然則前五篇亦作於武王以後明矣集說歐陽氏修曰非惟天之福我君如此至於四時豐潔酒食祀其先公先王而神亦降之福朱氏公遷曰此言祖宗降福之故必述嘏詞以祝之者明其出於神意而非無徵之言也將祭而先盡其誠則致祭而必受其福矣鄒氏泉曰此章先言祭者特本致福之由耳非若他詩盡事神之禮而始獲神之福也神之弔都歴反矣詒以之反爾多福叶筆力反民之質矣日用飮食羣黎百姓徧爲爾德集傳賦也弔至也神之至矣猶言祖考來格也鄭氏康成曰神至者宗廟致敬鬼神著矣此之謂也詒遺質實也言其質實無僞日用飲食而已王氏安石曰民無所施其智巧也羣衆也黎黑也猶秦言黔其淹反首也百姓庶民也爲爾德者則而象之猶助爾而爲德也集說范氏祖禹曰君所以爲神民之主神則降福民則日用飲食而不知所以然羣黎百姓皆爲君德此君人者之至願也彭氏執中曰上有多福之君則下受多福之庇始言民繼言羣黎百姓廣而言之正修已安人安百姓之意也劉氏瑾曰此承上章祭祀而言神之降福推而至於民之質實百姓之爲德莫非君之福也亦莫非君之德也所謂德者其一篇之本領歟朱氏公遷曰神降多福不惟福爾一身而已必使民德歸厚而爲人君之大福也上章專言其悠久此章專言其盛大福至於此無以加矣如月之恒胡登反如日之升如南山之壽不騫起䖍反不崩如松柏之茂無不爾或承集傳賦也恒弦陸氏德明曰恒本亦作縆升出也月上弦而就盈孔氏穎達曰弦有上下知上弦者以對如日之升是益進之義故知上弦矣日始出而就明騫虧也承繼也言舊葉將落而新葉已生相繼而長茂也問承是繼承相接續之義如何朱子曰松柏非是葉不凋但舊葉凋時新葉已生集說呂氏大臨曰上言神享之矣民服之矣福祿無以加矣又欲常享是福有進而無退有成而無虧相承而無衰故以日月南山松柏喻焉輔氏廣曰此章又言其進盛悠久相繼無窮之意無不爾或承是言其子孫承繼之意夫人心自以爲足則已矣故天保之臣祝其君以福祿言有盡而意無盡也總論朱氏善曰是詩前三章言天之福我君後三章言神之福我君故三章以山阜岡陵喻其福之興盛以川之方至喻其福之盛長所以終首章而下之意六章以日月松柏喻其福之方進而不已以南山喻其福之有常而不變所以終四章而下之意當是時君以鹿鳴四牡皇華燕羣臣以常棣燕兄弟以伐木燕朋友而臣之所以荅其君者如此君燕其臣臣媚其君此所以上下交德業成而均享盛大悠久之福也歟季氏本曰人君能以德及民宜享多福故其臣美之盖欲其德之有常也雖稱頌之而歸於有德則責難之意寓焉朱氏謀㙔曰人臣將以福祿祝其君不敢自爲之詞必稱天保之天定之先公先王以詒之尊敬之義也天保六章章六句集說孔氏穎達曰作天保詩者言下報上也謂臣下作詩歌君之美言天保神祐福祿所鍾是臣下歸美以報其上劉氏瑾曰鹿鳴以下五詩所言非同一事所歌非同一時所燕非同一臣而其臣之荅之則惟同歌此詩者蓋凡臣子之祝報其君惟願其福祿壽考而已試取前五詩分而讀之而各以此詩荅之尤可見其一時君臣相與殷勤忠厚之意采薇采薇薇亦作叶則故反止曰歸曰歸歲亦莫音暮止靡室靡家叶古乎反玁音險狁音允之故不遑啓居玁狁之故此章作與莫故叶薇與歸叶家又與居叶集傳興也薇菜名呂氏祖謙曰薇解見草蟲作生出地也劉氏彝曰作謂芽初出土莫晚靡無也玁狁北狄也遑暇啓跪也嚴氏粲曰解見四牡不遑啓居此遣戍役之詩孔氏穎達曰戍守也謂遣守衛之役人以其出戍之時采薇以食而念歸期之遠也故爲其自言而以采薇起興曰采薇采薇則薇亦作止矣黄氏佐曰今年春也曰歸曰歸則歲亦莫止矣黄氏佐曰明年冬也然凡此所以使我舍其室家而不暇啓居者非上之人故爲是以苦我也直以玁狁侵陵之故有所不得已而然耳蓋敘其勤苦悲傷之情而又風以義也程子曰毒民不由其上則人懷敵愾之心矣又曰古者戍役兩朞而還今年春莫行明年夏代者至復留備秋至過十一月而歸又明年中音仲春至春莫遣次戍者毎秋與冬初兩番戍者皆在疆圉如今之防秋也許氏謙曰防秋宋遣戍之名集說程子曰采薇采薇以薇爲遣戍役之候也曰歸曰歸深念歸時在歲暮也舍其室家不遑暇起居以玁狁之故也嚴氏粲曰念歸之切當在歲晚雖託爲軍士自計之辭亦因示歸期以安其心也玁狁之故言不得已而用兵非上之人毒我也此以義曉之而託於軍士之自道若其心之已諭耳采薇采薇薇亦柔止曰歸曰歸心亦憂止憂心烈烈載飢載渴叶巨烈反我戍未定靡使歸聘集傳興也柔始生而弱也烈烈憂貌載則也定止聘問也孔氏穎達曰聘問俱是謂問安否之義散則通對則别言戍人念歸期之遠而憂勞之甚然戍事未已則無人可使歸而問其室家之安否也集說輔氏廣曰凡人在道路時飢渴固有所不免故卒章言其歸路之情亦曰載渇載飢戍者勤苦之情大槩最切者有四一則有舍其室家之悲二則有不遑啓居之勞三則有載飢載渴之苦四則有不得其家音信之憂故此詩於首兩章備道此四事以慰之叚氏昌武曰天下之艱苦非所期而驟遭焉則情必至於難堪倘前知其必然而一旦當之則安矣是詩作於遣戍之初而預道其室家之契闊飢渴之窮困道途經歴之險阻如此正所以安其心使不至臨境而驚憂也采薇采薇薇亦剛止曰歸曰歸歲亦陽止王事靡盬不遑啓處憂心孔疚叶訖力反我行不來叶六直反集傳興也剛旣成而剛也李氏公凱曰始言薇始生中而柔終而剛以見天時之變爾陽十月也時純隂用事嫌於無陽故名之曰陽月也程子曰疑於無陽故謂陽月然何時無陽如日有光之類蓋陰陽之氣有常存而不移者有消長而無窮者問十月何以爲陽月朱子曰剝盡而坤復則一陽生也復之一陽不是頓然便生乃是自坤卦中積來且一月三十日以復之一陽分作三十分從小雪後一日生一分到十一月半一陽始成以此見天地無休息處孔甚疚病也來歸也此見士之竭力致死無還心也集說輔氏廣曰歲亦陽止亦謂來歲之十月於歸期爲近也此章言其旣至戍所則當勉於王事無苟安息宼敵之來當竭力致死而無復有回顧之意憂心孔疚切於仁也我行不來安於義也情與理竝行而不相悖也彼爾維何維常之華芳無胡瓜二反彼路斯何君子之車斤於尺奢二反戎車旣駕四牡業業豈敢定居一月三捷集傳興也爾華盛貌董氏逌曰爾雅注說文皆作薾薾華盛貌常常棣也嚴氏粲曰解見常棣路戎車也君子謂將帥也孔氏穎達曰以其乘路車而稱君子故知謂將帥得稱路者左傳鄭子蟜叔孫豹王賜之大路是卿車得稱路也業業壯也捷勝也彼爾然而盛者常棣之華也彼路車者君子之車也戎車旣駕而四牡盛矣則何敢以定居乎庶乎一月之間三戰而三捷矣朱氏公遷曰此章預言其蓄勇以待敵如此集說鄭氏康成曰言彼爾者乃常棣之華以興將率車馬服飾之盛王氏安石曰豈敢定居一月三捷言憂勤之至而冀其功之速成也叚氏昌武曰聖人不欲以一戰求盡也戰而敗敗而三焉在彼亦心服在此亦非倖矣曰三者以赴敵休士之節約而言之也駕彼四牡四牡騤騤求龜反君子所依小人所腓符非反四牡翼翼象弭彌氐反魚服叶蒲北反豈不日戒叶訖力反玁狁孔棘集傳賦也騤騤強也依猶乘也腓猶芘也鄭氏康成曰腓當作芘孔氏穎達曰謂依廕也程子曰腓隨動也如足之腓足動則隨而動也董氏逌曰案字書腓脛腨也易之咸艮皆取象以著其隨物以動也李氏樗曰言此車乃君子所處小人則從而動也翼翼行列整治之狀象弭以象骨飾弓弰所交反也孔氏穎達曰釋器云弓有緣者謂之弓孫炎曰緣謂繳束而漆之又曰無緣者謂之弭孫炎曰不以繳束骨飾兩頭者也然則弭者弓弰之名以象骨爲之是弓之末弭也嚴氏粲曰左傳云左執鞭弭曲禮云右手執簫簫弭頭卽受弦處以象齒飾之上下不至齟齬也魚獸名似豬東海有之其皮背上斑文腹下純靑可爲弓鞬居言反矢服也陸氏璣曰魚獸之皮雖乾燥以爲弓鞬矢服經年海水潮及天將雨其毛皆起水潮還及天晴其毛復如故戒警棘急也言戎車者將帥之所依乘戍役之所芘倚劉氏彝曰君子則依之以爲備禦也小人則腓之以爲進退也且其行列整治而器械精好如此豈不日相警戒乎玁狁之難甚急誠不可以忘備也朱氏公遷曰此章亦預言在戍所之時而致謹以防宼者如此集說陳氏祥道曰古者之用兵也險野人爲主易野車爲主則險野非不用車而主於人易野非不用人而主於車車之於戰動則足以衝突止則足以營衛將卒有所芘兵械衣裘有所齎詩曰君子所依小人所腓則車之爲利大矣鄒氏泉曰駕彼二句言駕車之馬甚强也君子二句言所乘之車利用也四牡句言行列整治也象弭句言器械精好也豈不日戒總承車馬行伍器械如此豈可恃此而不日相警戒乎玁狁孔棘卽警戒之辭昔我往矣楊柳依依今我來思雨于付反雪霏霏芳菲反行道遲遲載渴載飢我心傷悲莫知我哀叶於希反集傳賦也楊栁蒲栁也霏霏雪甚貌遲遲長遠也此章又設爲役人預自道其歸時之事以見其勤勞之甚也程子曰此皆極道其勞苦憂傷之情也上能察其情則雖勞而不怨雖憂而能勵矣范氏曰予於采薇見先王以人道使人後世則牛羊而已矣朱氏公遷曰首章風諭以不得已之意末章體悉以不忍人之心起結兩章相應也集說曹氏粹中曰往時楊柳依依則與首章薇作之候同來時雨雪霏霏則遲於三章陽止之候矣輔氏廣曰路之長遠身之飢渴是亦勞苦之甚而傷悲之極也上之人旣已述其情如此則知之可謂盡矣而猶曰莫知我哀可见其體悉之心無有窮極也且於其遣戍之初而遽言及此則亦不憂上之人不我知矣總論程子曰首章述事之由次章三章極道勞苦憂傷之情四章五章則勸以義卒章言其歸以憫其勞朱氏公遷曰前三章雖兼私情公義言而重在義四章五章專言公義六章専言私情敎戒以倡其勤憫恤以致其悅使人之道當然也采薇六章章八句集說范氏處義曰采薇序雖指言文王之時大抵天保以上采薇以下文武之世皆歌此樂章宜爲文武之詩謝氏枋得曰采薇一詩見先王仁厚之至所謂體羣臣所謂本人情所謂說以使民民忘其勞當以東山詩合觀我出我車于彼牧叶莫狄反矣自天子所謂我來叶六直反矣召彼僕夫謂之載叶節力反矣王事多難乃旦反維其棘矣集傳賦也牧郊外也爾雅郊外謂之牧邢氏昺曰言可放牧也自從也天子周王也僕夫御夫也孔氏穎達曰周禮戎僕掌御戎車御夫掌御貳車從車是僕夫與御夫别矣而言僕夫御夫者以此云維其載矣言裝載物是從車之事故爲御夫其實此僕夫亦有戎僕也此勞還率音帥之詩追言其始受命出征之時出車於郊外而語其人曰我受命於天子之所而來於是乎召僕夫使之載其車以行而戒之曰王事多難是行也不可以緩矣集說鄭氏康成曰王命召已已卽召御夫使裝載物而往王之事多難其召我必急欲疾趨之此序其忠敬也程子曰出車于牧王命之征赴事之急不敢寧也謝氏枋得曰此章有尊敬王命之禮有憂勤王事之志有整暇勇決之材有奔走犯難之忠鄒氏泉曰自天子所二句蓋語其人以見王命之重與三章天子命我城彼朔方意不類此是在郊外時事彼是至朔方時事此是表其出有所自彼欲振作士卒之氣耳我出我車于彼郊叶音高矣設此旐音兆矣建彼旄矣音毛彼旟音餘旐斯胡不旆旆叶蒲寐反憂心悄悄僕夫況瘁似醉反集傳賦也郊在牧内劉氏瑾曰都城外五十里爲近郊百里爲遠郊也蓋前軍已至牧而後軍猶在郊也陸氏化熙曰出車在郊視前在牧之車爲後軍則所見止是設旐建旄而設旟建旄已在彼牧故亟接之曰彼旟旐斯蓋兼前後軍言之也設陳也龜蛇曰旐許氏謙曰龜蛇曰旐鳥隼曰旟及下交龍爲旂皆周禮司常文建立也旄注旄於旗干之首也鳥隼曰旟嚴氏粲曰旟解見鄘干旄鳥隼龜蛇曲禮所謂前朱雀而後𤣥武也范氏處義曰詩所謂旐者𤣥武也所謂旟者朱雀也楊氏曰師行之法四方之星各隨其方以爲左右前後進退有度各司其局朱氏公遷曰局部分也左者常左右者常右前後亦然不易其所也則士無失伍離次矣旆旆飛揚之貌嚴氏粲曰繼旐曰旆旆以全帛爲之續旐末爲燕尾者名之爲旆言旆之本體也左傳建而不旆言不張旆也此胡不旆旆乃飛揚之貌生民荏菽旆旆亦揚起也悄悄憂貌況兹也或云當作怳言出車在郊建設旗幟音熾彼旗幟者豈不旆旆而飛揚乎但將帥方以任大責重爲憂而僕夫亦爲之恐懼而憔悴耳東萊呂氏曰古者出師以䘮禮處之命下之日士皆泣涕夫子之言行三軍亦曰臨事而懼皆此意也黄氏幹曰臨事而懷懼則有持重謹畏之心此誠行軍法也集說程子曰旣受命而行有旗章之盛見付與之重憂勞其事也嚴氏粲曰設爲將率之辭言出車郊地人競於趨事或設旐於干或建旄於車車上載干干上設旐干首有旄旄旐互言之耳彼旟與旐皆旆旆然飛揚軍容甚張也然憂心悄悄僕夫亦爲之憔悴述其前時之戒懼以慰勞之也王命南仲往城于方出車彭彭叶鋪郎反旂旐央央於良反天子命我城彼朔方赫赫南仲玁狁于襄集傳賦也王周王也南仲此時大將也程子曰指元帥之名以顯其功方朔方孔氏穎達曰北方皆言朔方堯典云宅朔方爾雅云朔北方也此直云方卽朔方也今靈夏等州之地皇輿表靈州今靈州所屬寧夏衛夏州今寧夏衛竝隸陜西彭彭衆盛貌交龍爲旂此所謂左靑龍也央央鮮明也赫赫威名光顯也襄除也或曰上也與懷山襄陵之襄同蔡氏沈曰襄駕出其上也言勝之也東萊呂氏曰大將傳天子之命以令軍衆於是車馬衆盛旂旐鮮明威靈氣熖赫然動人矣兵事以哀敬爲本而所尚則威二章之戒懼三章之奮揚竝行而不相悖也程子曰城朔方而玁狁之難除禦戎狄之道守備爲本不以攻戰爲先也范氏祖禹曰往城于方所以守衛中國也非取玁狁之地而城之劉氏瑾曰此上三章皆本於公義以勞之也集說蔣氏悌生曰王命南仲往城于方國人之辭也天子命我城彼朔方南仲之辭也由國人觀之則軍之甚盛不可當自南仲論之則制戎之長策不可易誠以戰而勝之不若不戰而屈人兵之爲愈勝而滅之孰若兵不血刃而戎患自息之爲長此明良之定䇿馭戎之要術出自王言而入乎南仲之耳所謂神武而不殺者歟姚氏舜牧曰說王命南仲往城于方見上所云出車建幟以急難者蓋承此命耳故南仲始出令軍中以振厲士卒之氣士卒皆用命而玁狁于襄焉其出也有名其作也有勇而其往也無敵此之謂王者之師此之謂王者之將昔我往矣黍稷方華叶芳無反今我來思雨于付反雪載塗王事多難不遑啓居豈不懐歸畏此簡書集傳賦也華盛也塗凍釋而泥塗也孔氏穎達曰雪落而釋爲泥塗簡書戒命也鄰國有急則以簡書相戒命也或曰簡書䇿命臨遣之詞也孔氏穎達曰古者無紙有事則書之於簡謂之簡書問簡書二說朱子曰後說爲長當以後說載前前說則據左氏簡書同惡相恤之謂然此是天子戒命不得謂之鄰國也黄氏佐曰左傳狄人伐邢管敬仲言於齊侯曰請救邢以從簡書集注出此然非此詩本意故從後說此言其旣歸在塗而本其往時所見與今還時所遭以見其出之久也東萊呂氏曰采薇之所謂往遣戍時也此詩之所謂往在道時也采薇之所謂來戍畢時也此詩之所謂來歸而在道時也集說曹氏粹中曰南仲旣襄玁狁則思歸矣繼得伐西戎之命不敢或違故曰畏此簡書嚴氏粲曰言我昔自朔方而往伐西戎當黍稷方華六月時也今我自伐西戎歸而在道雪釋爲塗泥春初時也初謂止伐玁狁期於歲莫可以畢事而歸因有西伐之命遂致遷延春初猶在道也簡書謂移師西伐之命也喓喓於遙反草蟲趯趯他歴反阜螽未見君子憂心忡忡敕中反旣見君子我心則降戸江反叶胡攻反赫赫南仲薄伐西戎集傳賦也此言將帥之出征也其室家感時物之變而念之以爲未見而憂之如此必旣見然後心可降耳朱氏公遷曰此與召南草蟲同但彼婦人自述之詞此則述婦人之情而代賦其事耳然此南仲今何在乎方往伐西戎而未歸也豈旣却玁狁而還師以伐昆夷也與薄之爲言聊也蓋不勞餘力矣集說程子曰觀此詩意似當時西戎兵不加而服輔氏廣曰前章旣言其歸途之事故此章又述其室家之情雖家室之人皆以爲薄伐西戎不勞餘力則王者之師有征而無戰可知也季氏本曰草蟲鳴鄭氏以爲晚秋之時蓋在六月出車之後雨雪載塗之前朔方城畢而西戎警急之時也此時南仲家人感於時物之變方思其歸而忽有西戎之伐尚不得歸也春日遲遲卉許貴反木萋萋七西反倉庚喈喈音皆叶居奚反采蘩祁祁臣移反執訊音信獲醜薄言還音旋歸赫赫南仲玁狁于夷集傳賦也卉草也萋萋盛貌倉庚黄鸝也喈喈聲之和也訊其魁首當訊問者也醜徒衆也夷平也姚氏舜牧曰于襄者埽除而無敵也于夷者蕩平而無事也歐陽氏曰述其歸時春日暄妍草木榮茂而禽鳥和鳴於此之時執訊獲醜而歸豈不樂哉鄭氏曰此詩亦伐西戎獨言平玁狁者玁狁大故以爲始以爲終劉氏瑾曰此則述其歸日之懽情以勞之也集說嚴氏粲曰上章言其未歸也室家望之此章言其旣歸也室家喜之敘景物之暄妍稱將率之功伐皆喜而道之也蘩以生蠶婦人之事述其所見知爲室家之言也獨言玁狁不言西戎者舉出師所主也采芑不戰亦言執訊獲醜此詩亦不戰而言之也總論程子曰此詩所賦自受命至還歸其事有敘大要在歸功將率輔氏廣曰行師之道始出則尚嚴肅旣歸則尚和樂故出則有誓而歸曰凱還前三章則如秋霜之肅後三章則如春風之和如此然後謂之王者之師出車六章章八句集說嚴氏粲曰采薇方遣行之初而預道其將來之勞苦見深體之心也出車杕杜當還歸之候而追述其已往之勞苦示不忘之意也有杕大計反之杜有睆華板反其實王事靡盬繼嗣我日日月陽止女心傷止征夫遑止集傳賦也睆實貌嗣續也陽十月也嚴氏粲曰陽解見采薇遑暇也此勞還役之詩鄭氏康成曰役戍役也故追述其未還之時室家感於時物之變而思之曰特生之杜嚴氏粲曰杜解見唐杕杜有晥其實則秋冬之交矣而征夫以王事出乃以日繼日而無休息之期王氏質曰繼嗣我日積日爲月而至於陽至於十月可以歸而猶不至故女心悲傷而曰征夫亦可以暇矣曷爲而不歸哉范氏祖禹曰女心傷止居者之思也凡行役惟居者之憂爲甚或曰興也毛氏萇曰興也杕杜猶得其時蕃兹征夫勞苦不得盡其天性下章放此劉氏瑾曰指二章而言也集說曹氏粹中曰始遣之也以楊栁依依之時而出行期以雨雪霏霏之時而來歸今旣十月期已至矣故其室家思念之久而至於哀傷也輔氏廣曰述其室家之情不直言其思之切而必曰王事靡盬則雖其室家亦知義也劉氏瑾曰次年十月乃戍畢之時故采薇遣戍之際預言歲亦陽止以爲歸期此章之思望征夫者亦以日月陽止而知其遑暇也有杕之杜其葉萋萋王事靡盬我心傷悲卉木萋止女心悲止征夫歸止集傳賦也萋萋盛貌春將莫之時也歸止可以歸也集說毛氏萇曰室家踰時則思輔氏廣曰王事靡盬者公義也我心傷悲者私情也雖其室家亦情義竝行而不相悖也劉氏瑾曰戍者之還當以仲春至家故此章於杕杜萋萋之時而知征夫之可以歸也鄒氏泉曰杕杜有實是去年十月秋冬之交戍畢之期也故念其當暇杕杜有葉是今年二月春之將莫至家之期也故念其當歸陟彼北山言采其杞王事靡盬憂我父母叶滿洧反檀車幝幝尺善反四牡痯痯古緩反叶古轉反征夫不遠集傳賦也檀木堅宜爲車毛氏萇曰檀車役車也孔氏穎達曰伐檀曰伐輪伐輻是檀可爲車之輪輻又大明云檀車煌煌武王之戎車幝幝敝貌痯痯罷音皮貌登山采杞則春已暮而杞可食矣蓋託以望其君子曹氏粹中曰以朔方而視岐周爲南故陟北山以望之而念其以王事詒父母之憂也呂氏祖謙曰邱氏曰我君子也父母君子之父母也然檀車之堅而敝矣四牡之壯而罷矣孔氏穎達曰役夫以從征之故其甲士三人所乘之車而備四馬故曰四牡非庶人尋常得乘四馬也則征夫之歸亦不遠矣集說嚴氏粲曰婦以事舅姑爲職汝墳勉其夫以正則曰父母孔邇蓋謂不必憂家也此詩望其夫之歸則曰憂我父母蓋謂父母思之當早歸也汝墳則下之人明其義此詩則上之人體其情各盡其道也匪載匪來叶立直反憂心孔疚叶訖力反期逝不至叶朱力反而多爲恤卜筮偕叶舉里反止會言近叶渠紀反止征夫邇止集傳賦也載裝疚病逝往恤憂偕俱㑹合也言征夫不裝載而來歸固已使我念之而甚病矣況歸期已過而猶不至則使我多爲憂恤宜如何哉毛氏萇曰遠行不必如期室家之情以期望之王氏炎曰而多爲恤飢渴歟疾病歟死傷歟是何期逝不至也故且卜且筮相襲俱作何氏楷曰禮大事先筮而後卜小事則龜筮不相襲今相襲俱作以心之惶惑不定也合言於繇直又反羅氏中行曰蓍龜之辭也而皆曰近矣則征夫其亦邇而將至矣范氏曰以卜筮終之言思之切而無所不爲也集說輔氏廣曰征夫不遠料想之辭也征夫邇止決定之辭也歸期近而思愈切者人情也期逝不至然後憂傷孔疚焉行者過期而不至則居者之憂百端矣鄒氏泉曰近謀乃心或蔽於私臆遠度諸物猶出於想像故以卜筮終之總論范氏處義曰此詩專勞戍役終始言室家思望待小人之道尤貴於切近其情也嚴氏粲曰此詩四章皆不言戍役來歸之事惟述其未歸之時室家思望之切如此則今日之歸其喜樂爲何如也所以慰勞之也劉氏瑾曰前三章皆述其私情而兼公義爲言卒章則又專勞之以私情大槩與四牡采薇出車同本於公私情義以慰之也杕杜四章章七句集傳鄭氏曰遣將帥及戍役同歌同時欲其同心也反而勞之異歌異日殊尊卑也記曰賜君子小人不同日此其義也王氏曰出而用兵則均服同食一衆心也入而振旅則殊尊卑辨貴賤定衆志也范氏曰出車勞率故美其功杕杜勞衆故極其情先王以己之心爲人之心故能曲盡其情使民忘其死以忠於上也集說蘇氏轍曰兵之出也有遣役而無遣率蓋爲軍中之禮也軍中上下同事故遣役而遂遣率及其還也率役分勞蓋爲國中之禮也國中貴賤異數故勞率而後勞役李氏樗曰呂吉甫嘗云其遣也則預述其還歸之事其還歸也又不忘其行役之勞故采薇出車枤杜之詩遣勞率役之事雖不同而敘其往返始終之情以憫之則一也南陔集傳此笙詩也有聲無詞舊在魚麗之後以儀禮考之其篇次當在此輔氏廣曰已下三篇不綴於皇皇者華之後而附於此者欲以笙詩六篇相次也今正之說見華黍附錄李氏善曰陔隴也呂氏向曰南方養萬物方此以戒養故取之爲名王氏應麟曰羣經音辯云序曰孝子相戒以養陔當訓戒鄕飮酒燕禮賓醉而出奏陔夏鄭氏注陔之言戒也以陔爲節明無失禮與詩序義協愚案春官樂師鄭司農注今時行禮於大學罷出以鼓陔爲節鹿鳴之什十篇一篇無辭凡四十六章二百九十七句白華之什二之二集傳毛公以南陔以下三篇無辭故升魚麗以足鹿鳴什數而附笙詩三篇於其後因以南有嘉魚爲次什之首今悉依儀禮正之白華集傳笙詩也說見上下篇華黍集傳亦笙詩也鄉飲酒禮鼓瑟而歌鹿鳴四牡皇皇者華然後笙入堂下磬南北面立樂南陔白華華黍燕禮亦鼓瑟而歌鹿鳴四牡皇華然後笙入立于縣中李氏如圭曰諸侯軒縣縣中者北縣之南也鄕飮酒唯有磬故笙立于磬南奏南陔白華華黍南陔以下今無以考其名篇之義然曰笙曰樂曰奏而不言歌則有聲而無詞明矣所以知其篇第在此者意古經篇題之下必有譜焉如投壺魯鼓薛鼔之節而亡之耳劉氏瑾曰魯鼔薛鼔之節其譜見禮記投壺篇末蓋魯薛二國投壺燕射擊鼔之節也其圓者擊鼙其方者擊鼓其節不同亦皆有聲而無詞也集說董氏逌曰笙入者有聲而無詩也蓋詩有歌有聲見於詩者歌也寓於樂者聲也以其用於鄉人邦國故當時人習其義工師肄業朝夕其事是以因其器識其聲而知其義之如是也然則亡其辭者非失亡之乃本亡也李氏樗曰其辭旣亡則其義不可得而知鄭漁仲曰詩多以首二字或篇中次取二字或一字以爲題如螽斯樛木之類皆是卽物而命或賦或喻故一篇之義全屬題中如竹竿君子陽陽大東四月之類一篇之義不全屬題中丰還之類一篇之義全不在是但說篇中一兩字爾此六章有題無詩作序者但考二字便率意作一篇之序此說是也夫言詩正如言書其亡書序雖存亦不可以强通詩旣亡其辭又無其文安可以强通乎毛氏以意度之其後束晳又以毛氏之意作補亡也黄氏震曰古者亡卽無字亡其辭之說云出於毛公毛公漢人漢世以亡爲無王雪山云西漢亡一人之獄是也附錄序曰南陔孝子相戒以養也白華孝子之絜白也華黍時和歲豐宜黍稷也毛氏萇曰有其義而亡其辭鄭氏康成曰此三篇者鄕飮酒燕禮用焉孔子論詩雅頌各得其所時俱在耳遭戰國及秦之世而亡之其義則與衆篇之義合編故存至毛公爲詁訓傳乃分衆篇之義各置於其篇端云張子曰人或言亡詩六篇古無其詩旣無詩安得有此篇必是有其辭所以亡者良由施之於笙非若歌之可習呂氏祖謙曰國語叔孫穆子聘晉伶簫詠歌鹿鳴之三鹿鳴三篇旣可與簫相和而歌則南陔以下豈不可與笙相和而歌乎嚴氏粲曰樂以人聲爲主人聲卽所歌之詩也若本無其辭則無由有其義矣序本因其辭以知其義後亡其辭則惟有序所言之義存耳魚麗力馳反于罶音柳與酒叶鱨音常鯊音沙叶蘇何反君子有酒旨且多集傳興也麗歷也罶以曲簿爲笱而承梁之空音孔者也毛氏萇曰罶曲梁也寡婦之笱也孔氏穎達曰以簿爲魚笱其功易故號寡婦笱耳非寡婦所作也鱨揚也今黄頰魚是也似燕頭魚身形厚而長大頰骨正黄魚之大而有力解飛者陸氏佃曰今黄鱗魚性浮而善飛躍故一曰揚也鯊鮀徒何反也魚狹而小常張口吹沙故又名吹沙濮氏一之曰鯊魚多種有極大者其皮如沙今人以爲刀劒鞘吹沙小魚耳君子指主人旨且多旨而又多也朱子曰舊說君子有酒旨爲句且多爲句非是當以有酒爲句旨且多爲句且罶酒鯊多亦隔句協韻也此燕饗通用之樂歌卽燕饗所薦之羞而極道其美且多見主人禮意之勤以優賓也何氏英曰古人燕饗物致盛備蓋無非以寓其誠敬而賔亦樂其優勤之意也或曰賦也下二章放此毛氏萇曰太平而後微物衆多取之有時用之有道則物莫不多矣古者不風不㬥不行火草木不折不操斧斤不入山林豺祭獸然後殺獺祭魚然後漁鷹隼擊然後罻羅設是以天子不合圍諸侯不掩羣大夫不麛不卵士不隐塞庶人不數罟故山不童澤不竭鳥獸魚鼈皆得其所然朱子曰凡此皆先王之政也然必有至誠惻怛之心仁厚愷悌之化使人不知其所以爲之者然後可行耳不然則叢脞已甚矣豈所恃以爲治者哉集說蘇氏轍曰苟而獲鱨鯊施者小而得者大也古之仁人交萬物有道取之有時用之有節則草木鳥獸蕃殖無有求而不得君子於是及其閑暇而爲酒醴以燕樂之旣旨且多言無所不備也朱氏公遷曰此不主言魚借之以爲起語耳但罶中之魚旣有鱨又有鯊君子之酒旣已旨又且多以二者兼備爲興魚麗于罶魴鱧音禮君子有酒多且旨集傳興也鱧鮦同重二音也嚴氏粲曰毛氏以鱧爲鮦本草云蠡一名鮦今黑鱧魚也又曰鯇音睆也嚴氏粲白舍人云鱧名鯇陸璣云鯇似鯉頰狹而厚是舍人與陸璣皆以鯉爲今之鯇魚也集說季氏本曰多旨卽上章之意取協韻故覆言耳魚麗于罶鰋音偃鯉君子有酒旨且有叶羽已反集傳興也鰋鮎念平聲也孔氏穎達曰釋魚有鰋鮎郭璞曰今鰋額白魚也鮎别名鯷孫炎以爲鰋鮎一魚郭璞以鰋鮎各爲一魚有猶多也集說范氏處義曰萬物盛多詩人特取於魚何也蓋魚之爲物非人力所能及必陰陽和而後衆多故夢魚者爲豐年之兆今魚之麗于羀者有鱨鯊焉有魴鱧焉有鰋鯉焉則他物之盛當稱是矣君子之行禮特言有酒蓋酒以行禮故爲酒爲醴所以洽百禮濮氏一之曰興言竹羀何足以得巨魚而乃有魚如是之多自謙不足以致賢而乃賔客如是之衆雖衆也主人不患於無酒也美而且多多而且有則取之不竭矣言酒則殽隨之言物則所該者廣豈眞謂罶中之魚哉謂曲梁之笱果可以得如是衆多之魚哉物其多矣維其嘉叶居何反矣集傳賦也集說季氏本曰物謂水陸之羞嘉卽旨也本前章多且旨而言物其旨矣維其偕叶舉里反矣集傳賦也集說呂氏祖謙曰物雖嘉旨然陸産或不如水産之盛澤物不如山物之蕃猶未可以言偕也季氏本曰偕卽多也言水陸之物皆備也物其有叶羽已反矣維其時叶上紙反矣集傳賦也蘇氏曰多則患其不嘉旨則患其不齊有則患其不時今多而能嘉旨而能齊有而能時言曲全也集說程子曰盛而及時也王氏安石曰若季冬薦魚春獻鮪之類是也呂氏大臨曰物常有而不乏則可以待時而取之故曰維其時矣物不常有不可必其時也呂氏祖謙曰物雖盛多而偕有必適當其時然後盡善所謂時者不専爲用之之時也苟非國家閑暇内外無故則物雖盛不能全其樂矣總論季氏本曰前三章皆言有酒乃置酒之通名也後三章皆言物則其所謂旨所謂多者皆以殽言矣雖用字不同其實嘉與時皆所以言旨也有與偕皆所以言多也不過卽旨多二義反覆歎詠以見主人禮意之殷勤耳如此賢者豈不樂就哉黄氏佐曰或曰樽酒簋貳曰可用享而瓠葉兔斯聖人取之魚麗之燕母乃過於侈乎夫養賢所以養天下也故聖王重之燕饗所以致其交也故賢士觀之儉豈其所先哉燕之於寢則稱之曰賔饗之於廟則躬爲獻酬禮以食之樂以樂之實以將之猶汲汲然若有所不及也故魚麗則盡物以優賔瓠葉則薄物必與賔共彼述主人之謙詞此逹主人之誠意非以論豐儉也魚麗六章三章章四句三章章二句集傳案儀禮鄉飮酒及燕禮前樂旣畢朱氏公遷曰前樂謂歌鹿鳴四牡皇華奏南陔白華華黍也皆閒歌魚麗笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀閒代也言一歌一吹也然則此六者蓋一時之詩而皆爲燕饗賓客上下通用之樂毛公分魚麗以足前什而說者不察遂分魚麗以上爲文武詩嘉魚以下爲成王詩其失甚矣集說孔氏穎達曰作魚麗詩者美當時萬物盛多能備禮也朱子曰魚麗諸篇皆君臣燕飲之詩道主人意以譽賔如今宴飲致語之類亦有閒敘賔客辭者漢書載客歌驪駒主人歌客無庸歸亦此意由庚集傳此亦笙詩說見魚麗附錄李氏善曰由從也庚道也言物竝得從陰陽道理而生也南有嘉魚烝之承反然罩罩張敎竹卓二反君子有酒嘉賔式燕以樂五敎歷各二反集傳興也南謂江漢之閒嘉魚鯉質鱒才損反鱗肌肉甚美朱氏公遷曰諸本作鱒鯽肌誤何氏英曰吳師道曰案詩記引山陰陸氏曰鯉質鱒鱗肌肉甚美傳是本此而本有誤脫今興國刋本朱鑑所傳者鯉質鱒鱗爲是鯽字誤無疑出於沔南之丙穴李氏樗曰嘉魚鄭氏意以爲善魚是魚之美者案左太沖蜀都賦嘉魚出於丙穴在漢中沔陽縣嘉乃是魚名也烝然發語聲也罩篧助角反也編細竹以罩魚者也孔氏穎達曰釋器云篧謂之罩李廵曰篧編細竹以爲罩捕魚也孫炎曰今楚篧也郭璞曰今魚罩然則罩以竹爲之無竹則以荆故謂之楚篧重言罩罩非一之詞也此亦燕饗通用之樂故其辭曰南有嘉魚則必烝然而罩罩之矣君子有酒則必與嘉賔共之而式燕以樂矣此亦因所薦之物而道達主人樂賔之意也劉氏瑾曰詩言燕樂衎綏旣燕而又燕故知爲道達主人樂賔之意集說蘇氐轍曰魚之在水至深遠矣然人未嘗以深遠爲辭而不求雖不可得猶久伺而多罩之是以魚無有不得也苟君子之求賢心誠好之而不倦如是人之於魚則亦豈有不可得者哉朱氏公遷曰以魚起興與魚麗同所薦之物不止於魚特借此爲起語耳然魚必取以供燕饗酒必舉以樂賔客則又以用物之義爲興也姚氏舜牧曰讀其詞似以有魚興有酒然其意實以嘉魚興嘉賔也觀下章甘瓠翩鵻自見得南有嘉魚烝然汕汕所諫反君子有酒嘉賓式燕以衎苦旦反集傳興也汕樔劉氏瑾曰爾雅作罺竝側交反也以薄汕魚也鄭氏康成曰今之撩罟也衎樂也唐氏汝諤曰衎卽樂之甚也易曰飲食衎衎集說陸氏佃曰君子求賢上籠之如罩下撩之如汕淮南子曰罩者抑之罾者舉之爲之難易得魚一也南有樛居虬反木甘瓠音護纍力追反之君子有酒嘉賓式燕綏之集傳興也東萊呂氏曰瓠有甘有苦甘瓠則可食者也樛木下垂而美實纍之固結而不可解也愚謂此興之取義者似比而實興也朱氏公遷曰主人卑禮而嘉賔樂之綢繆繾綣亦若此也此以相得之意爲興集說蘇氏轍曰瓜蔓於地然其遇樛木也未甞不纍之而上物之相從物之性也豈有賢者而不願從人者哉獨患不之求耳陸氏佃曰言樛木下逮故甘瓠得以纍之則以貴下賤之況也傳曰苦匏不材於人則明此甘瓠譬其材也黄氏佐曰樛木興君子甘瓠興嘉賔綏之自我燕賔而言纒綿殷勤以安其心也翩翩者鵻之誰反烝然來叶六直陵之二反思君子有酒嘉賓式燕又叶夷昔反或如字思集傳興也此興之全不取義者也輔氏廣曰詩中興體固有此兩様但此二章相比故於此發之也思語辭也又旣燕而又燕以見其至誠有加而無已也孔氏穎達曰思皆爲辭頻與之燕言親之甚也或曰又思言其又思念而不忘也朱子曰來思之思語辭又思旣燕而又思之也凡思字爲語助者上字協韻爲思慮之思本字協韻此章則來字與末句思字協韻也集說曹氏粹中曰以其類自至不待更如嘉魚之初勤勞以求之也初曰烝然罩罩烝然汕汕末曰烝然來思惟其始求之衆故其終能致來者之衆也徐氏鳳彩曰鵻性專一今肯翩然而來則其情諧適而可以久矣興嘉賔燕而又燕獻酬交錯久而不厭其瀆也總論范氏處義曰嘉賔賢者也嘉魚魚之美者甘瓠瓠之甘者鵻鳥之壹者三物雖皆以喻賢者然一章曰罩罩恐其逸故罩之使入也二章曰汕汕恐其伏故汕之使出也此言人君之善與賢者處也三章曰纍之乃瓠之自纍四章曰來思乃鵻之自至此言賢者之喜仕於王之朝也四章皆言待賢者以燕禮始言其樂好次言其衎樂次言其綏而安之次言其又欲燕之非至誠安能有加無已如此姚氏舜牧曰此燕饗通用樂章故不獨頌嘉賔而主人樂賔之意亦具見焉樂歡會也藉此燕以相歡會也衎宜適也藉此燕以相宜適也綏見燕之綢繆所謂中心好之曷飲食之者也又字見燕之重復所謂迨我暇矣飮此湑矣者也南有嘉魚四章章四句集傳說見魚麗集說孔氏穎達曰作南有嘉魚之詩者言樂與賢也嚴氏粲曰南有嘉魚南山有臺皆燕賢之樂歌故曰樂與賢樂得賢言以樂樂之也猶射義言騶虞者樂官備也采蘋者樂循法也采蘩者樂不失職也皆以播之樂歌爲樂之也崇丘集傳說見魚麗附錄李氏善曰言萬物生長於高邱皆遂其性得極其高大也南山有臺叶田飴反北山有萊叶陵之反樂音洛只音紙君子邦家之基樂只君子萬壽無期集傳興也臺夫音符須卽莎草也陸氏璣曰舊說夫須莎草也可爲蓑笠或云臺草有皮堅細滑緻可爲簦笠萊草名葉香可食者也陸氏璣曰今兖州人烝以爲茹謂之萊烝君子指賓客也此亦燕饗通用之樂故其辭曰南山則有臺矣北山則有萊矣范氏處義曰南北指周地之南北也樂只君子則邦家之基矣樂只君子則萬壽無期矣所以道達主人尊賓之意美其徳而祝其壽也劉氏瑾曰或疑賓客不足以當萬壽之語愚謂此詩上下通用之樂當時賔客容有爵齒俱尊足當之者蓋古人簡質如士冠禮祝辭亦云眉壽萬年又況古器物銘所謂用蘄萬年用蘄眉壽萬年無疆之類皆爲自祝之辭則此詩以萬壽祝賔庸何傷乎集說朱氏公遷曰山有臺又有萊君子有德又有福其所有者皆不一也美者卽其所有而美之祝者期之於後來君子之福無窮則邦家之基亦永永無窮矣鄒氏泉曰基者如興道致治建功樹業以内則柱石乎王朝而邦畿鞏固以外則藩維乎四國而侯服奠安是也南山有桑北山有楊樂只君子邦家之光樂只君子萬壽無疆集傳興也集說程子曰桑楊充用之物言山生財以濟用興君子爲邦家之光榮輔氏廣曰首章邦家之基美其可以爲邦家之基本所謂治生子君子賢者爲國之楨幹也次章言邦家之光美其可以爲邦家之顯榮所謂儒者在朝則美政在位則美俗也旣足以爲邦家之基本與顯榮故因祝其壽之無期限而無疆界也南山有杞北山有李樂只君子民之父母叶滿彼反樂只君子徳音不已集傳興也杞樹如樗一名狗骨集說程子曰杞李可食之物興君子養人如父母德音不已言令聞無窮劉氏瑾曰此章則專美其德也朱氏公遷曰民之父母謂愛利及民民所贍依者也旣爲邦家之基又爲邦家之光又爲民之父母則得美譽甚矣而且願其常有弗替也故以德音不已祝之南山有栲音考叶音口北山有杻女九反樂只君子遐不睂壽叶直酉反樂只君子德音是茂叶莫口反集傳興也栲山樗嚴氏粲曰栲可爲車輻解見唐山有樞杻檍音億也嚴氏粲曰杻可爲弓弩幹解見唐山有樞遐何通睂壽秀睂也朱氏公遷曰秀睂睂有秀毛也長睂秀出於其閒爲壽徴集說李氏樗曰徳音是茂言其令聞之茂盛也朱氏公遷曰享眉壽而德音又加茂焉則年彌高徳彌邵矣一章二章則有是徳而願其有是福也此章則有是福而尤願其有是徳也南山有枸俱甫反北山有楰音庾樂只君子遐不黃耉音苟叶果五反樂只君子保艾五蓋反爾後叶下五反集傳興也枸枳枸樹高大似白楊有子著枝端大如指長數寸噉音㗖之甘美如飴八月熟亦名木蜜楰鼠梓樹葉木理如楸亦名苦楸曹氏居貞曰宫室之良材黄老人髮復黄也耇老人面凍梨色如浮垢也保安艾養也集說劉氏瑾曰此章又專祝其壽也黄氏佐曰黄耇自其徴諸今者言保艾自其善諸後者言朱氏道行曰爾後指君子後人培養厚則流澤長淑氣鍾則賢才出惟有此後方可撫我子孫黎民邦家之基永固而無期無疆之祝不虛矣總論輔氏廣曰後二章言遐不睂壽遐不黄耇與首章次章末句相應萬壽無期萬壽無疆者願之之辭也遐不睂壽遐不黄耇者必之之辭也徳音是茂言不但不已而已而又愈益茂盛也保艾爾後則不但爲今日計而又願其安養其後世之子孫也沈氏守正曰首三章曰邦家之基邦家之光民之父母是美其已然之徳也曰萬壽無期萬壽無疆徳音不已祝其将然之壽也曰不已則壽亦可知矣下二章曰遐不睂壽遐不黄耇美其必然之壽也曰徳音是茂保艾爾後又美其修徳以保是壽也曰保艾有引翼之道寓焉亦徳也雖通是贊美之詞而未嘗不諷之以惠廸感召之理是之謂盛世之雅也南山有臺五章章六句集傳說見魚麗集說鄭氏元錫曰南山有臺本興賢樂後因爲燕饗通用樂所頌禱亦各以其情而遷焉朱氏道行曰徐氏曰魚麗言品物之豐美故曰優賔嘉魚言懽忻之交通故曰樂賔南山頌徳祝壽而徳與壽天下之達尊也故曰尊賔三詩各有一義三者備斯燕賔之道盡矣由儀集傳說見魚麗附錄序曰由庚萬物得由其道也崇丘萬物得極其高大也由儀萬物之生各得其宜也毛氏萇曰有其義而亡其辭鄭氏康成曰此三篇者鄉飲酒燕禮亦用焉亦遭世亂而亡之燕禮又有升歌鹿鳴下管新宫新宫亦詩篇名也辭義皆亡無以知其篇第之處蓼音六彼蕭斯零露湑息呂反兮旣見君子我心寫叶想羽反兮燕笑語兮是以有譽處兮集傳興也蓼長大貌蕭蒿也嚴氏粲曰蒿總名也蕭蒿之香者也湑湑然蕭上露貌君子指諸侯也寫輸寫也燕謂燕飲譽善聲也處安樂也蘇氏曰譽豫通凡詩之譽皆言樂也郝氏敬曰如韓姞燕譽之譽亦通諸侯朝於天子天子與之燕以示慈惠劉氏瑾曰左傳晉郤至曰燕以示慈惠蓋謂升殽於俎相與共食所以示慈愛恩惠也故歌此詩言蓼彼蕭斯則零露湑然矣旣見君子則我心輸寫而無留恨矣是以燕笑語而有譽處也其曰旣見蓋於其初燕而歌之也集說張子曰有譽處兮謂君接之以溫厚則下情得伸而美名可保也朱氏公遷曰露零於蓼蕭天子之心寫於諸侯皆天道之下濟者而語又相應故爲興朱氏善曰心之輸寫鬱結之㪚於中也燕且笑語和樂之見於外也譽則善聞之著於人處則樂意之在乎己又兼内外而言之蓼彼蕭斯零露瀼瀼如羊反旣見君子爲龍爲光其徳不爽叶師莊反壽考不忘集傳興也瀼瀼露蕃貌龍寵也爲龍爲光唐氏汝諤曰爲龍增寵之意爲光輝耀之意喜其徳之詞也爽差也其徳不爽則壽考不忘矣裦美而祝頌之又因以勸戒之也朱氏公遷曰褎美自爲龍爲光言祝頌自壽考不忘言其徳不爽則勸戒之詞也集說輔氏廣曰天子以得見諸侯爲寵光則諸侯之徳之美可知矣故因以戒之曰其徳不爽壽考不忘言使其徳常如此不爽則當享壽考而永不忘矣朱氏公遷曰我以爲寵我以爲光則中心之喜可見與我心寫兮相應德無差失則長乆安寧爲龍爲光可保其終蓼彼蕭斯零露泥泥乃禮反旣見君子孔燕豈弟宜兄宜弟待禮反令德壽豈開改反叶去禮反集傳興也泥泥露濡貌孔甚嚴氏粲曰孔燕猶言盛燕謂其禮盛設也豈樂弟易也宜兄宜弟猶曰宜其家人蓋諸侯繼世而立多疑忌其兄弟如晉詛無畜羣公子劉氏瑾曰左傳宣公二年初晉驪姬之亂詛無畜羣公子自是晉無公族秦鍼音鉗懼選朱氏公遷曰秦鍼景公弟也得罪於景公其母曰弗去懼選注曰選數也恐景公數其罪而加戮也見左傳昭公元年之類故以宜兄宜弟美之亦所以警戒之也壽豈壽而且樂也集說輔氏廣曰旣見君子相與厚爲燕飲以嘉其樂易之德則又推言能以是樂易之德而宜其兄弟焉則其令徳將旣壽而且樂矣濮氏一之曰甚燕而情樂易則知其宜兄弟而德可久也蓼彼蕭斯零露濃濃奴同反旣見君子鞗徒彫反革沖沖敕弓反和鸞雝雝萬福攸同集傳興也濃濃厚貌鞗轡也革轡首也馬轡所把之外有餘而垂者也孔氏穎達曰鞗皮爲之故云鞗革何氏楷曰从絲曰轡从革曰鞗鞗卽轡之别名革乃轡首之垂者沖沖垂貌和鸞皆鈴也在軾曰和在鑣曰鸞陸氏佃曰青鳳爲鸞鸞雌曰和後世作和鸞以象之劉氏瑾曰集傳於駟驖以爲乘車之鸞在衡則此傳鑣字恐當作衡字沈氏守正曰朱子云在鑣曰鸞從毛氏也皆諸侯車馬之飾也庭燎亦以君子目諸侯而稱其鸞旂之美正此類也攸所同聚也集說賈氏誼曰言動以紀度則萬福之所聚也輔氏廣曰此章則但美其車馬之飾而極言其萬福攸同以見其期望之意無有窮已焉朱氏公遷曰諸侯之福天子之所賜也車馬如此而沖沖雝雝然從容自得其安樂也甚矣非萬福之所聚乎又以終首章譽處之意鄔氏泉曰鞗革以飾驂服沖沖以垂有順適之意而忠順之度形矣和鸞以飾車馬雝雝以和有協應之意而和敬之徳形矣皆見其謹侯度處總論輔氏廣曰一章燕笑語兮是以有譽處兮通上下而言之天子與諸侯皆然也下三章則專美諸侯二章三章則又因以勸戒而警敎之也許氏謙曰見君子而心寫笑語因備其謙接之語至曰爲龍爲光則又其卑孫之極者也上之人禮容揖孫乃如此而爲下者所以承順悅服又當何如耶鄒氏泉曰此詩見至治之世諸侯之朝有常期而天子之禮遇有常典又拳拳惟徳之勸戒此周道之所以爲泰也蓼蕭四章章六句集說李氏樗曰左氏昭公十二年宋華定來聘享之爲賦蓼蕭弗知又不答賦昭子曰宴語之不懷寵光之不宣令德之不知同福之不受將何以在宴語之不懷指第一章寵光之不宣指第二章令德之不知指第三章同福之不受指第四章惟以寵光之不宣指二章則以龍爲寵是也湛湛直減反露斯匪陽不晞音希厭厭於鹽反夜飲不醉無歸集傳興也湛湛露盛貌陽日晞乾也厭厭安也亦久也足也輔氏廣曰厭厭二字具安久足三義安故久久故足夜飲私燕也韓氏嬰曰飲之禮不脫屨而卽序者謂之禮跣而上坐者謂之宴孔氏穎達曰楚茨云備言燕私傳曰燕而盡其私恩明夜飲者亦君留而盡私恩之義燕禮宵則兩階及庭門皆設大燭焉儀禮燕禮宵則庶子執燭於阼階上司宮執燭於西階上甸人執大燭於庭閽人爲大燭於門外歐陽氏修曰燕當以晝而言夜飲者燕禮有宵則設燭之禮是古雖以禮飲酒有至夜者所以申燕私之恩盡殷勤之意此亦天子燕諸侯之詩鄭氏康成曰諸侯朝覲㑹同天子與之燕所以示慈恵言湛湛露斯非日則不晞以興厭厭夜飲不醉則不歸燕禮君曰無不醉賔及卿大夫皆興對曰諾敢不醉黄氏佐曰酌酒始於旅酬爵行終於無算故曰醉蓋於其夜飲之中而歌之也集說歐陽氏修曰露以夜降者也因其夜飲故近取以爲比云湛湛之露潤沾於物非至曙則不乾厭厭之飮恩被於諸侯非至醉則不止曹氏粹中曰不醉無歸則其醉乃出於天子眷顧勤厚之意湛湛露斯在彼豐草厭厭夜飲在宗載考集傳興也豐茂也夜飲必於宗室呂氏祖謙曰邱氏曰言在所尊者之室蓋路寢之屬也賈氏公彦曰路大也人君所居皆曰路嚴氏粲曰燕禮膳宰具官饌於寢束注云寢路寢也考成也輔氏廣曰載考謂成其禮旣云成其禮則必無過當之事矣劉氏瑾曰在宗室而成燕禮也集說范氏祖禹曰王者天下之宗諸侯之所主也在宗載考禮成而恩洽也朱氏公遷曰露在豐草則膏澤深飲在宗室則恩意厚故以爲興湛湛露斯在彼杞棘顯允君子莫不令德集傳興也顯明允信也謝氏枋得曰顯者其心明白洞達允者其心忠信誠慤無一毫可疑也君子指諸侯爲賓者也令善也令德謂其飮多而不亂德足以將之也輔氏廣曰莫不令徳言與燕之諸侯無不有是德也集說蘇氏轍曰露之在草也如將不勝其在木也則能任之矣將言其無不醉故以豐草言之將言其醉而不能亂故以杞棘言之顯允君子莫不令徳言醉而不亂也蔣氏悌生曰二章言天澤濃而人君有成禮三章言天澤溥而諸侯有成徳以湛露及豐草興夜飮成禮以湛露及杞棘興諸侯成徳詩人之意若曰以豐草杞棘之賤而湛露皆有所及況我所燕之諸侯皆有令徳可不加禮以饗之蓋上天無心以成化而雨露之澤不擇物而周被聖人有心於制禮而燕饗之設必擇人而後行其桐其椅於宜反其實離離豈弟君子莫不令儀集傳興也離離垂也韓氏嬰曰離離長貌程子曰離離猶纍纍令儀言醉而不喪其威儀也輔氏廣曰莫不令儀言與燕之諸侯無不有是儀也集說歐陽氏修曰桐椅木之美者其實離離然亦喻諸侯在燕冇威儀耳詩人比事多於卒章别引他物若下泉詩芃芃黍苖之類是也陸氏佃曰杞棘剛木故詩以況令徳椅桐柔木故詩以況令儀黄氏櫄曰莫不令德其與醉而不出是謂伐德者異矣莫不令儀其與威儀幡幡屢舞僊僊者異矣上之所以繩下者愈寛而下之所以自繩者愈嚴君有餘恩臣有餘敬此所以爲盛時也總論范氏處義曰燕以示慈恵禮不嫌於厚禮意未盡雖逮宵可也亦不可以爲燕禮之常詩之所詠亦記一時待諸侯之厚如此學者不可不知也輔氏廣曰顯允明信也豈弟樂易也明信者固宜其有德矣樂易者則恐其或畧於威儀也樂易君子而威儀無不令焉此其所以爲成德也旣醉則情或佚矣在宗則儀可畧矣然莫不令儀此其所以爲成禮也不醉無歸見其情之厚也在宗載考見其情之親也莫不令德見其德之存乎中者善也莫不令儀見其儀之見乎外者善也厚而不親則上之待下者猶未盡也德雖令而儀有闕焉則臣之持身猶不足也朱氏公遷曰前二章見親愛之至情後二章有戒飭之微意姚氏舜牧曰露必待陽而晞飮必至醉而歸期其饗也露必濡於豐草飮必設於宗室隆其禮也杞棘承湛湛之露桐椅生離離之實君子承燕而不喪其令德不失其令儀此天子所樂予而錫之燕饗之隆禮也詩敘燕飲於前而推本於君子之德儀旨深哉湛露四章章四句集傳春秋傳寗武子曰諸侯朝正於王杜氏預曰朝而受政敎也王宴樂之周禮大宗伯以饗燕之禮親四方之賔客賈氏公彦曰上公三饗三燕侯伯再饗再燕子男一饗一燕於是賦湛露曽氏曰前兩章言厭厭夜飲後兩章言令德令儀雖過三爵禮記玉藻君子之飲酒也受一爵而色洒如也二爵而言言魚斤反斯禮已三爵而油油以退亦可謂不繼以淫矣莊二十二年左傳陳公子完奔齊為工正飲桓公酒樂公曰以大繼之辭曰臣卜其晝未卜其夜不敢君子曰酒以成禮不繼以淫義也以君成禮弗納於淫仁也集説朱子語類時舉說蓼蕭湛露二詩曰文義也只如此却更須要諷詠實見他至誠和樂之意方好鄧氏元錫曰蓼蕭之辭篤而莊湛露之辭親而洽愛敬至矣愛敬篤於辟公其究及於海内其斯之謂歟郝氏敬曰前篇來朝此篇賜燕朝則禮嚴燕則情恰白華之什十篇五篇無辭凡二十三章一百四句欽定詩經傳説彚纂卷十
