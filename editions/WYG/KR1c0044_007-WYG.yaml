body:
  text: 欽定四庫全書欽定詩經傳說彚纂卷五王一之六集傳王謂周東都洛邑王城畿内方六百里之地孔氏穎逹曰周以鎬京為西都故謂王城為東都王城即洛邑漢書地理志云初洛邑與宗周通封畿東西長南比短短長相覆千里案西周方八百里八八六十四為方百里者六十四東周方六百里六六三十六為方百里者三十六二都方百里者百方千里也在禹貢豫州大華外方之間孔氏穎逹曰大華即華山外方即嵩高也金氏履祥曰外方今河南伊陽縣伊闕鎭之西陸渾山其山固嵩高之連峰然謂為嵩高則非爾北得河陽孔氏穎逹曰左傳稱襄王賜晉文公陽樊温原之田晉於是始啟南陽杜預云在晉山南河北故曰南陽是未賜晉時為周畿内故知比得南陽漸冀州之南也孔氏頴逹曰河内曰冀州知河比之地漸冀南境也周室之初文王居豐武王居鎬至成王周公始營洛邑為時㑹諸侯之所以其土中四方來者道里均故也自是謂豐鎬為西都而洛邑為東都鄭氏康成曰始武王作邑於鎬京謂之宗周是為西都成王在豐欲宅洛邑使召公先相宅既成謂之王城是為東都今河南是也召公既相宅周公徃營成周今洛陽是也陳氏大猷曰鎬京謂之宗周以其為天下所宗也洛邑謂之東都又謂之成周以周道成於此也於洛邑定鼎以朝諸侯宅土中以涖四海其示天下也公於鎬京定都以據形勝處上游以制六合其慮天下也逺至幽王嬖襃姒生伯服廢申后及太子宜臼宜臼奔申申侯怒與犬戎攻宗周弑幽王於戲音義嚴氏粲曰戲驪山下地名亦水名晉文侯鄭武公迎宜臼於申而立之是為平王徙居東都王城李氏樗曰自豐鎬而言之則宗周為西周而王城為東周周既東遷則成周為東周而王城為西周於是王室遂卑與諸侯無異故其詩不為雅而為風然其王號未替也故不曰周而曰王陸氏徳明曰平王東遷政遂微弱詩不能復雅下列稱風以王當國猶春秋稱王人孔氏穎逹曰言王國變風者稱王而列於諸侯之上在風則卑矣當言周而言王則尊之也蘇氏轍曰其風及其竟内而不能被天下與諸侯比陳氏櫟曰平王以後詩不入於大小雅而儕爲十五國風其事遂始載於春秋而詩終乎此矣其地則今河南府及懷孟等州是也皇輿表河南府即今河南府懐州今懷慶府孟州今孟縣竝隸河南集說孔氏穎逹曰王室雖衰天命未改言與諸侯無異者以其王爵雖在政教纔行於畿内化之所及與諸侯相似也詩者縁政而作風雅繫政廣狹王爵雖尊猶以政狹入風風雅之作本自有體非謂採得其詩乃貶之也張子曰王次衞者恐混於二南故以三衞間之曹氏粹中曰春秋之作始於隐公隐公之元年即平王之四十九年也天下無王而寄元於魯故曰王者之迹熄而詩亡李氏樗曰孟子所謂詩亡者雅頌之詩亡也既以平王之詩為國風則是下列於諸侯矣然春秋或書天王者所以存王道也鄭氏樵曰七月者西周之風黍離者東周之風朱子語類問王風是他風如此不是降為國風曰其辭語可見風多出於在下之人雅乃士大夫所作雅雖有刺而其辭與風異陳氏埴曰雅詩多是朝㑹燕饗樂章或是公卿大臣規諫獻納之所作東遷以後朝廷既無制作公卿又無獻納故雅詩遂亡獨有民俗歌謠其體製聲節與列國之風同也王氏應麟曰范甯榖梁序孔子就大師正雅頌因魯史修春秋列黍離於國風齊王徳於邦君明其不能復雅政化不足以被羣后也然左傳襄二十九年季札觀樂於魯已為之歌王矣孔子至哀十一年始自衞反魯樂正雅頌得所則降王於國風非孔子也彼黍離離彼稷之苖行邁靡靡中心搖搖知我者謂我心憂不知我者謂我何求悠悠蒼天叶鐵因反此何人哉集傳賦而興也黍榖名苖似蘆高丈餘穗黑色實圓重孔子家語黍者五榖之長祭先王以為上盛嚴氏粲曰說文曰黍禾屬而黏者也以大暑而種故謂之黍本草唐本注云黍似粟而非粟也黄氏一正曰黍有丹白黄黒四色粒多而黏穀之可為酒者也離離垂貌稷亦榖也一名穄音祭似黍而小或曰粟也爾雅粢稷也邢氏昺曰左傳云粢食不鑿曲禮云稷曰明粢是也郭云今江東人呼粟為粢然則粢也稷也粟也止是一物嚴氏粲曰說文曰稷百榖之長邁行也靡靡猶遲遲也搖搖無所定也孔氏穎逹曰楚威王曰寡人心搖搖然如懸旌而無所薄是心憂而無附著之意悠悠逺貌蒼天者據逺而視之蒼蒼然也毛氏萇曰蒼天以體言之周既東遷大夫行役至於宗周鄭氏康成曰宗周鎬京也過故宗廟宫室盡為禾黍閔周室之顚覆傍徨不忍去故賦其所見黍之離離與稷之苖以興行之靡靡心之搖搖朱氏公遷曰黍之實垂有靡靡之意稷之苖動有搖搖之意本因感歎黍稷而賦之但其下兩句義又相因故為賦而興既歎時人莫識己意又傷所以致此者果何人哉追怨之深也李氏樗曰含蓄其辭不欲指斥其人也集說李氏樗曰箕子過故殷墟作麥秀之詩曰麥秀漸漸兮禾黍油油與此詩意同輔氏廣曰人憂則行自遲而心無所定國家顛覆在臣子固不能無所憂此詩人憂之得其正者也嚴氏粲曰言彼處有黍彼處又有稷見無處不然所謂盡為禾黍也人有知我之情者謂我心有所憂不知我之情者怪我久留不去謂我有何所求也唯呼天而訴之而蒼然悠逺歎其訴而不聞也彼黍離離彼稷之穗音遂行邁靡靡中心如醉知我者謂我心憂不知我者謂我何求悠悠蒼天此何人哉集傳賦而興也穗秀也嚴氏粲曰論語觧云吐華曰秀是秀為未穗今所謂秀則已成穗而秀茂與彼秀别稷穗下垂如心之醉故以起興集說毛氏萇曰醉於憂也李氏公凱曰憂甚而不自知如醉於酒朱氏道行曰如醉搖搖之感深而沈冥也彼黍離離彼稷之實行邁靡靡中心如噎於結反叶於悉反知我者謂我心憂不知我者謂我何求悠悠蒼天此何人哉集傳賦而興也噎憂深不能喘息如噎之然孔氏穎逹曰噎咽喉閉塞之貌言憂深也稷之實如心之噎故以起興集說朱氏公遷曰虚則通實則塞而噎朱氏道行曰如噎摇摇之鬰結而息滯也總論孔氏穎逹曰詩人以黍秀時至稷則尚苖未得還歸遂至於稷之穗又至於稷之實三章歴道其所更見稷則穂實改易黍則常云離離欲記其初至故不變黍文大夫役當有期而反但事尚未周也范氏處義曰憂思亂於中則瞻視眩於外閔周室者黍稷莫分念父母者莪蒿莫辨此黍稷蓼莪所為作也黍離三章章十句集傳元城劉氏曰常人之情於憂樂之事初遇之則其心變焉次遇之則其變少衰三遇之則其心如常矣至於君子忠厚之情則不然其行役徃來固非一見也初見稷之苖矣又見稷之穗矣又見稷之實矣張子曰言苖言穗言實作文者須是如此而所感之心終始如一不少變而愈深此則詩人之意也輔氏廣曰久而不忘者天理之常也㬥集旋涸者人欲之無定也情得其正則自然久而不忘矣集說王氏柏曰周大夫亦善於為詩者感慨深而言不廹切反覆歌詠之自見其悽愴追恨之意謝氏枋得曰文武成康之宗廟盡為禾黍而能為閔周之詩者一行役大夫之外無人也吾觀書至文侯之命所以訓戒晉文侯者惟曰自保其國而已王室之盛衰故都之興廢悉置度外吾於黍離之詩重有感也夫朱氏善曰周之王業公劉開拓之於豳太王創造之於岐文王光大之於豐武王成就之於鎬皆在西都八百里之内其土地則先王之土地其人民則先王之人民也為子孫者正當守之而不去今乃舉舊都棄之而即安於東行役之大夫既已見而憂之且追怨之豈容付之無可奈何而己邪謂宜請於平王號令諸侯整師輯旅光復舊物諸侯見王之有志孰不奔走而服從當是時晉之義知鄭之掘突既皆王室之舊勲齊藉太公之故基魯承周公之遺烈衞憑康叔之威靈亦皆足以左右王室而王自棄之為之臣者又寂無一人以為言噫周轍之不西有由矣夫君子于役不知其期曷至哉叶將黎反雞棲音西于塒音時日之夕矣羊牛下來叶陵之反君子于役如之何勿思叶新齎反集傳賦也君子婦人目其夫之辭鑿牆而棲曰塒許氏慎曰日在西方而鳥棲郭氏璞曰今寒鄉穿牆棲雞馮氏復京曰禽經云陸鳥曰棲水鳥曰宿徐氏鳯彩曰徐鍇云雞稽也能稽時也其鳴也知時其棲也知隂日夕則羊先歸而牛次之陸氏佃曰羊性畏露晚出而早歸常先於牛大夫久役於外其室家思而賦之曰君子行役不知其反還之期且今亦何所至哉雞則棲於塒矣日則夕矣羊牛則下來矣是則畜産出入尚有旦暮之節而行役之君子乃無休息之時使我如何而不思也哉集說蘇氏轍曰君子行役而無至期曽雞與牛羊之不若奈何勿思哉輔氏廣曰知其歸期則思有所止也知其所在則思有所向也今也不知其期則不知其幾時可歸也曷至哉則不知其今在何所也覩物興思雖欲自已而有所不能也嚴氏粲曰君子往而行役不知期以何時而歸乎言其時之久也且今何所至哉又不知其所至之處言其地之逺也雞棲日夕羊牛又下牧地而來歸皆有休息之時君子行役乃無休息如之何而使我不思乎君子于役不日不月曷其有佸户括反叶户劣反雞棲于桀日之夕矣羊牛下括古活反叶古劣反君子于役苟無飢渴叶巨列反集傳賦也佸㑹桀杙爾雅雞棲於弋為桀李氏廵曰弋橜也陸氏徳明曰弋亦作杙括至苟且也君子行役之久不可計以日月而又不知其何時可以來㑹也亦庶幾其免於飢渴而已矣此憂之深而思之切也李氏公凱曰既不得歸則庶幾其在道路之間且無飢渴之患亦可矣集說鄭氏康成曰行役反無日月何時而有來㑹期且得無飢渴憂其飢渴也輔氏廣曰可以日月訃則思猶有節也知其㑹期則思猶有止也不日不月則不可計以日月也曷其有佸則不知其何時可以來㑹也苟無飢渴則不敢必其歸而但幸其不至於飢渴而己其憂思之情益甚矣王氏柏曰君子于役閨思之正也感時念逺固人之常情至情所鍾聚在苟無飢渴一語上總論許氏謙曰上三句謂君子之役無期可歸次三句則家中目前之所覩者雞則必棲於塒與桀猶人必當止於家今乃不得止息日夕則牛羊必來猶人出有期必當歸今乃無期可歸則思君子之心容可已乎朱氏公遷曰前章極思之之心後章致願之之心沈氏守正曰詩意因思而觸物非感物而興思也不知其期計時也曷至哉計地也不日不月數徃日也曷其有佸傷來日也苟無飢渴則知思之無可奈何而但冀其生還思益深矣君子于役二章章八句集說謝氏枋得曰雨雪霏霏遣戍役而預言歸期也卉木棲萋勞還卒而詳言歸期也四牡之使寜幾何時勞之曰我心傷悲吉甫在鎬不過千里勞之曰我行永久先王之心惟恐一人之勞苦惟恐一人之怨咨本於推己及物之恕發而為序情閔勞之仁豈有無期度乎哉君子于役至於不知其期仁恕之義泯然矣文武宣王之治何時而可復見乎沈氏守正曰草蟲殷靁平淡之思也君子于役哀傷之思也世有盛衰而婦人女子之口傳之此之謂風也案序說君子行役無期度大夫思其危難而作是詩孔穎逹謂在家之大夫思君子僚友在外之危難也朱子改為大夫行役而室家念之之詩從室家而言其情更為真切而無衍說若從同僚而思其危難則篇中未露此意故朱子不從當為正解君子陽陽左執簧音黃右招我由房其樂音洛只音止且子餘反集傳賦也陽陽得志之貌毛氏萇曰陽陽無所用其心也董氏逌曰陽陽者氣充於内容貌不枯也簧笙竽管中金葉也蓋笙竽皆以竹管植於匏中而竅其管底之側以薄金葉障之吹則鼔之而出聲所謂簧也故笙竽皆謂之簧笙十三簧或十九簧竽三十六簧也邢氏昺曰笙管必有簧故或謂笙為簧陳氏暘曰樂記云絃匏笙簧則簧之為物笙竽有焉其羙在中所以鼔中聲也嚴氏粲曰簧笙之舌也由從也房東房也劉氏熈曰房旁也在堂兩旁也朱子曰由房只是人出入處古人於房前有壁後無壁所以通内只且語助辭此詩疑亦前篇婦人所作蓋其夫既歸不以行役為勞而安於貧賤以自樂其家人又識其意而深歎羙之皆可謂賢矣豈非先王之澤哉或曰序說亦通宜更詳之序曰君子陽陽閔周也君子遭亂相招為禄仕全身逺害而已輔氏廣曰先生謂此詩疑亦前篇婦人所作者蓋篇首皆以君子為言而又相聫屬此固不害於義然安知其非偶然而然也故又取或者之說以為序說亦通宜更詳之蓋欲仍舊也集說毛氏萇曰由用也國君有房中之樂孔氏穎逹曰路寢之常樂天子以周南諸侯以召南是天子諸侯皆有房中之樂也君子禄仕賤職招呼其友此君子之友陳其呼己之事言有君子在於樂官之位左手執其笙簧右手招我用此房中樂官之位言道教不行且相與樂此而已胡氏一桂曰朱子初解云君子知道之不行為貧而仕所以辭尊居卑辭富居貧相招為禄仕雖役於伶官之賤而陽陽自得若誠有樂乎此者其所以全身逺害之計深矣雖非聖賢出處之正然比於不量其力貪利以没身者豈不賢哉君子陶陶左執翿徒刀反右招我由敖五刀反其樂只且集傳賦也陶陶和樂之貌孫氏愐曰陶喜也叚氏昌武曰記云人喜斯陶陶斯詠翿舞者所持羽旄之屬孔氏穎逹曰釋言云翿纛也孫炎曰纛舞者所持羽也又曰纛翳也郭璞云所持以自蔽翳也敖舞位也集說朱氏公遷曰由東房入後堂然後就舞位言之序也如序說則房為作樂之處敖為舞之位其言亦有序矣總論程子曰陽陽自得陶陶自樂之狀皆不任憂責全身自樂而已陳氏暘曰古之為樂播諸聲音而有簧以鼔之形諸動靜而有翿以容之樂莫大焉故詩人取之以見意李氏樗曰樂官之職豈君子所當為哉蓋以衰亂之世賢者多窮處草野及不得已而仕者皆居於下位此簡兮之詩之義也范氏處義曰周之賢者執樂舞之器招同志之友相與為人君房中之樂在人君遨逰之所其容充盛其志自得賢者之所為固未易窺也嚴氏粲曰君子之樂如此蓋非所樂而樂焉知時事之不可為矣李氏公凱曰君子遭亂不欲居尊位以懐天下之憂也君子陽陽二章章四句集說蘓氏轍曰君子以賤為樂則其貴者不可居也雖有貴位而君子不居則周不可輔矣此所以為閔周也鄧氏元錫曰君子陽陽賢隐也古賢多隐伶官夫伶賤工也然司樂節得節禮樂而樂有平心反性之益焉君子之陽陽樂獨得其道也云爾故仕為貧而道存焉揚之水不流束薪彼其音記之子不與我戍申懷叶胡威反哉懷哉曷月予還音旋歸哉集傳興也揚悠揚也水緩流之貌彼其之子戍人指其室家而言也戍屯兵以守也申姜姓之國平王之母家也在今鄧州信陽軍之境孔氏穎逹曰申今南陽宛縣是也在陳鄭之南後竟為楚所滅梁氏益曰申伯爵初為侯平王母申姜國楚靈王遷之今信陽之方城内也皇輿表鄧州屬南陽府信陽軍今信陽州屬汝寧府竝隸河南懷思曷何也平王以申國近楚數被侵伐故遣畿内之民戍之而戍者怨思作此詩也興取之不二字如小星之例輔氏廣曰此興體之中又别是一例不然則又似比體集說孔氏穎達曰役人所思當思其家但既怨王政不均羡其在家處者雖託辭於處者願早歸而見之其實所思之甚在於父母妻子耳黃氏震曰古注云是子獨處鄉里不與我來守申是思之言也䟽云政教頗僻彼子在家不與我戍申是怨不均平也至歐陽程蘇則以為國人怨諸侯不戍申言周人不當逺戍也詩記詩緝皆從之晦菴傳獨從古注云彼其之子戍人指室家而言夫室家豈有同戍之理而詩人云爾者思之情然也附録歐陽氏修曰激揚之水力弱不能流束薪猶東周政衰不能召發諸侯彼其之子周民謂他諸侯國之當戍者也蘇氏轍曰揚之水非自流之水也水不能自流而或揚之雖束薪之易流有不流矣水之能自流者物斯從之安在其揚之哉周之盛也諸侯聽役於王室無敢違命及其衰也雖令而不至其曰不與我戍申者怨諸侯不戍之辭也曷月予還歸哉久戍而不得代之辭也揚之水不流束楚彼其之子不與我戍甫懷哉懷哉曷月予還歸哉集傳興也楚木也張氏揖曰楚荆也牡荆蔓荆也陸氏佃曰楚者楚地所出其一名荆故楚入春秋稱荆而荆州亦以此木得名也甫即呂也亦姜姓書呂刑禮記作甫刑而孔氏以為呂侯後為甫侯是也當時蓋以申故而并戍之今未知其國之所在計亦不逺於申許也王氏應麟曰史記呂尚先祖為四岳佐禹治水有功虞夏之際受封於吕括地志故呂城在鄧州南陽縣西四十里吕氏春秋吕在宛縣西集說孔氏穎逹曰周語云胙四岳為侯伯賜姓曰姜氏曰有吕又曰申吕雖衰齊許猶在是申與甫許同為姜姓詩人重章變文借甫許以言申其實不戍甫許也六國時秦趙皆伯益之後同為嬴姓史記漢書多謂秦為趙亦此類也揚之水不流束蒲叶滂古反彼其之子不與我戍許懐哉懷哉曷月予還歸哉集傳興也蒲蒲柳春秋傳云董澤之蒲杜氏云蒲楊柳可以為箭者是也陸氏璣曰蒲柳有兩種皮正青者曰小楊其一種皮紅者曰大楊蘓氏頌曰蒲柳又謂之萑蒲即水楊也嚴氏粲曰毛以為草鄭以為蒲柳皆通蒲草見陳澤陂蒲柳見陳東門之楊許國名亦姜姓今潁昌府許昌縣是也皇輿表潁昌府許昌縣今開封府許州隸河南集說黄氏佐曰戍守專為申戍甫與許則以申之故以事勢輕重為先後之序也總論王氏質曰當是役夫逺戍而憫其妻貧苦之獨處願與之同戍而有所不可則逆計以數歸期也沈氏守正曰思處即是其怨處不明言役非其職而但言思室家詩人微婉之意如此耳揚之水三章章六句集傳申侯與犬戎攻宗周而弑幽王則申侯者王法必誅不赦之賊而平王與其臣庶不共戴天之讎也今平王知有母而不知有父知其立已為有徳而不知其弑父為可怨至使復讎討賊之師反為報施酬恩之舉則其忘親逆理而得罪於天已甚矣又况先王之制諸侯有故則方伯連帥以諸侯之師討之王室有故則方伯連帥以諸侯之師救之天子鄉遂之民供貢賦衞王室而已今平王不能行其威令於天下無以保其母家乃勞天子之民逺為諸侯戍守故周人之戍申者又以非其職而怨思焉則其衰懦微弱而得罪於民又可見矣王氏應麟曰營謝戍申其篤于母家一也一美焉一刺焉宣王親親平王忘讎也嗚呼詩亡而後春秋作其不以此也哉輔氏廣曰此正平王之詩故曰詩亡然後春秋作集說程子曰周人勞戍申而怨思諸侯有患天子命保衞之亦宜也平王獨私其母家耳非有王者保天下之心人怨宜也况天子當使方伯鄰國保助之豈當獨勞畿内之民也李氏樗曰以公存心則如采薇以私存心則如揚之水遣戍則同而美刺則異也張氏栻曰胡文定公云案邶鄘而下多春秋時詩而謂詩亡然後春秋作何也自黍離降為國風天下無復有雅而王者之詩亡春秋作於隐公適當雅亡之後夫黍離所以為國風者平王自為之也平王忘讐於是王者之迹熄而詩亡故孔子懼而作春秋中谷有蓷吐雷反暵呼但反其乾矣有女仳匹指反離嘅口愛反其嘆土丹反矣嘅其嘆矣遇人之艱難矣集傳興也蓷鵻音錐也陸氏徳明曰鵻爾雅作萑音同葉似萑許氏謙曰爾雅注作葉似荏荏者白蘇紫蘇類也方莖白華華生節間即今益母草也孔氏穎逹曰釋草云萑蓷郭璞曰今茺蔚也陸璣䟽云舊說及魏博士周元明皆云菴閭是也韓詩及三蒼說悉云益母案本草云益母茺蔚也嚴氏粲曰舊說以蓷草宜生高陸生谷中則傷於水非也據本草茺蔚正生海濵池澤其性宜溼暵燥孔氏穎達曰易曰燥萬物者莫暵乎火仳别也嘅歎聲艱難窮厄也凶年饑饉陸氏徳明曰饑糓不熟饉蔬不熟室家相棄婦人覽物起興而自述其悲歎之詞也集說程子曰蓷谷中所生之物待隂潤而後能生故暵則乾矣興夫婦樂嵗則能相保凶年則至相棄也嚴氏粲曰詩以嵗旱草枯興饑年之憔悴蕭索無潤澤氣象由此而致夫婦衰薄遂以相棄故曰遇人之艱難蓋棄妻不怨其夫而以為時之艱難使然中谷有蓷暵其修叶式竹反矣有女仳離條其歗叶息六反矣條其歗矣遇人之不淑矣集傳興也脩長也或曰乾也如脯之謂脩也條條然歗貌范氏王孫曰條者是長逺之義漢郊祀歌聲氣逺條歗蹙口出聲也悲恨之深不止於嘆矣淑善也古者謂死喪饑饉皆曰不淑蓋以吉慶為善事凶禍為不善事雖今人語猶然也曾氏曰凶年而遽相棄背蓋衰薄之甚者而詩人乃曰遇斯人之艱難遇斯人之不淑而無怨懟過甚之詞焉厚之至也集說嚴氏粲曰長茂者亦為所暵興饑饉甚則粗給者亦乏絶矣條條然而長歗其悲恨深於歎矣不善猶言不幸也鄒氏泉曰不淑亦只是艱難之意言遇斯人遭不善之事非謂其人之不善也中谷有蓷暵其溼矣有女仳離啜張劣反其泣矣啜其泣矣何嗟及矣集傳興也暵溼者旱甚則草之生於溼者亦不免也啜泣貌鄭氏康成曰泣者傷其君子棄已何嗟及矣言事已至此末如之何窮之甚也蘇氏轍曰歎之者知其不得已也歗者怨之深也泣則窮之甚也集說輔氏廣曰方其歎且恨之時而曰遇人之艱難遇人之不淑而無怨懟過甚之辭固見其厚矣及其至於傷而泣也則亦曰何嗟及矣而已殆有知其不可奈何而安於命之意此尤見其厚也嚴氏粲曰生於溼者又難暵於脩者今亦為所暵興富足者亦乏絶矣凶年饑饉之甚貧富皆憔悴也朱氏道行曰中谷最下處時時常溼暵所不及者至是亦乾旱之至殘之盡也雖嗟泣無及於事艱難不淑之相仍莫可如之何也已總論范氏處義曰以脆弱之物喻衰薄之俗蓋有深意使堅强之物雖遇旱暵未至俱燥使忠厚之俗雖遇凶歉未至相棄詩人可謂長於譬喻也劉氏辰翁曰乾者已暵脩者又暵溼者亦暵其為旱勢可勝言哉旱愈甚則仳離之怨歎愈甚矣王氏柏曰中谷有蓷雖婦人為夫所棄想出於凶年不得已之情而非有所怨惡也是以有閔之之心而無恨之之意中谷有蓷三章章六句集傳范氏曰世治則室家相保者上之所養也世亂則室家相棄者上之所殘也其使之也勤其取之也厚則夫婦日以衰薄而凶年不免於離散矣伊尹曰匹夫匹婦不獲自盡民主㒺與成厥功故讀詩者於一物失所而知王政之惡一女見棄而知人民之困周之政荒民散而將無以為國於此亦可見矣輔氏廣曰范氏之說得讀詩之㫖集說李氏樗曰孔子繫易言夫婦之道不可以不久也故受之以恒恆者久也則常而久者乃夫婦之道也凶年饑饉為夫婦者正當患難相恤豈至棄而不保可以見平王不能厚風俗也此中谷有蓷所由作也謝氏枋得曰凶年饑嵗上而王朝有司徒荒政十二以聚民下而有司能以時告其上發倉廩開府庫懋遷化居以賑民必無夫婦衰薄室家相棄之事矣此詩三章言物之暵一節急一節民之怨恨者一節深一節始曰遇人之艱難憐其窮苦也中曰遇人之不淑憐其遭凶禍也終曰何嗟及矣夫婦既已離别雖怨嗟亦無及也夫婦人之大倫饑饉而相棄人道之大變婦無一語怨其夫而有哀矜惻怛之意焉知其無可奈何而安之若命此義婦也與忠臣孝子同道矣有爰爰雉離于羅我生之初尚無為叶吾禾反我生之後逢此百罹叶良何反尚寐無吪集傳比也性隂狡爰爰緩意孔氏穎逹曰無所拘制爰爰然而緩雉性耿介羅氏願曰雉輕死亦其性然陳氏子龍曰周禮春官大宗伯云士執雉注取其守介不失節離麗羅網孔氏穎逹曰釋器云鳥罟謂之羅李廵曰鳥飛張網以羅之尚猶罹憂也尚庶幾也姚氏舜牧曰尚無為尚字作猶字解尚寐尚字作可字解若曰寕可如此云爾吪動也黄氏震曰古注吪動也蓋動則憂寐則不知故欲無吪周室衰微諸侯背叛君子不樂其生而作此詩言張羅本以取今狡得脱而雉以耿介反離于羅以比小人致亂而以巧計幸免君子無辜而以忠直受禍也范氏處義曰爰爰而自得雉則憂網羅之多故不樂其生者自比於雉也為此詩者蓋猶及見西周之盛故曰方我生之初天下尚無事及我生之後而逢時之多難如此然既無如之何則但庶幾寐而不動以死耳或曰興也以爰興無為以雉離興百罹也黄氏佐曰脫禍則安静雉入羅則有憂其義相因而可以為興下章放此集說歐陽氏修曰兔爰雉離歎物有幸有不幸也其曰我生之初尚無為者謂昔時人尚幸世無事而閑緩如兔之爰爰也我生之後逢此百罹者謂今時人不幸遭此亂世如雉䧟於網羅蓋傷己適丁其時也蘇氏轍曰狡而難取雉介而易執世亂則輕狡之人肆而耿介之士常被其禍其曰尚寐無化寜死而不欲見之之辭也輔氏廣曰玩章未一句則為君子不樂其生而作無可疑者至於周室衰微諸侯背叛亦東遷以後所有之實事故先生取以為說所謂小人幸免君子被禍者以章首二句為比則當如此說又觀君子不樂其生之意則亦容有此事也或以為興者毛氏說也然與其他興體又似不同故先生謂若以為興則當以爰興無為雉離興百罹則其說亦簡易可通不然則只當作比體有爰爰雉離于罦音孚叶歩廟反我生之初尚無造我生之後逢此百憂叶一笑反尚寐無覺居孝反叶居笑反集傳比也罦覆車也可以掩孔氏穎逹曰釋器云繴音壁謂之罿罿罬音拙也罬謂之罦罦覆車也孫炎曰覆車網可以掩者也郭璞曰今之翻車也有兩轅中施罥音絹以捕鳥鍾氏惺曰覆車既是兩轅可以網鳥亦可以網獸造亦為也范氏處義曰周之君子既不樂生於是歎曰我生之初時未亂離也尚無有造此者覺寤也集說鄭氏康成曰不樂其生者寐不欲覺之謂也歐陽氏修曰鄭氏以雉喻政有緩急詩言欲寐而不覺其惡時甚矣政有緩急未為大害也矧夫政自當有緩有急就令寛猛失中詩人未至欲寐而不覺也有爰爰雉離于罿音衝我生之初尚無庸我生之後逢此百凶尚寐無聰集傳比也罿罬也朱氏道行曰罿即施於車上之罬即罦也或曰施羅於車上也庸用聰聞也無所聞則亦死耳李氏樗曰聰耳有聞也言我欲長寐而無所聞知也詩謂鮮民之生不如死之久矣又曰知我如此不如無生皆此意也集說顧氏起元曰無造無庸意同無庸者凡有事則有所用無事則無所用矣無覺付天下事於不知也無聰天下之變皆不入於耳也總論孔氏穎達曰序云君子不樂其生三章下五句皆言不樂其生之事首二句言君子為此而不樂也范氏處義曰是詩三章皆比而賦之也輔氏廣曰無吪無覺無聰義無輕重但趂韻耳顧氏起元曰三章各首二句比君子得禍而小人獨免下皆是歎其所遭而安於死也爰三章章七句集說季氏本曰周道衰微政刑紊亂君子欲自晦而作此詩也鄒氏泉曰此詩見世道之變至於使人不樂其生可為長歎息矣用小人者安能辭其責乎附録孔氏穎達曰作爰詩者閔周也桓王失信於諸侯諸侯背叛王乃興師伐諸侯諸侯禦之與之交戰王師傷敗國危役賦不息使君子之人皆不樂其生焉故作此詩以閔傷之也隐三年左傳曰鄭武公莊公為平王卿士王貳於虢鄭伯怨王故周鄭交質及周人将畀虢公政鄭祭足帥師取溫之麥又取成周之粟周鄭交惡是桓王失信之事也桓五年左傳曰王奪鄭伯政鄭伯不朝是諸侯背叛也又曰王以諸侯伐鄭鄭伯禦之戰於繻葛祝聃射王中肩是王師傷敗之事也緜緜葛藟力軌反在河之滸呼五反終逺于萬反兄弟謂他人父夫矩反謂他人父亦莫我顧叶果五反集傳興也緜緜長而不絶之貌岸上曰滸毛氏萇曰水厓曰滸嚴氏粲曰岸近水之岸世衰民散有去其鄉里家族而流離失所者作此詩以自嘆言緜緜葛藟則在河之滸矣今乃終逺兄弟而謂他人為已父已雖謂彼為父而彼亦不我顧則其窮也甚矣朱氏公遷曰物得其所人失所依人不如物故以起興鄒氏泉曰諸說皆云此詩興至四句止但觀集傳今乃字與則其字若相照應且終逺兄弟四句皆是失所依而窮之甚意宜作興至未為當集說朱子曰葛藟枝蔓聨屬有宗族之義輔氏廣曰世治則人皆安土重遷各親其親者其本性然也世亂則人多流離失所疎其所親親其所踈者夫豈性之所欲哉不得已也使民不得已而倒行逆施如此卒至於窮困而無所告焉則其責必有任之者矣錢氏天錫曰此詩以歎己之窮為主責人之意輕緜緜與終逺字相應蓋緜緜是長蔓而不絶如終逺則不長相聚矣緜緜葛藟在河之涘音俟叶矣始二音終逺兄弟謂他人母叶滿彼反謂他人母亦莫我有叶羽已反集傳興也水厓曰涘孔氏穎逹曰釋邱云涘為厓李廵曰涘一名厓郭璞云謂水邉也謂他人父者其妻則母也有識有也羅氏中行曰識音志記而不忘也春秋傳曰不有寡君許氏謙曰左傳昭三年鄭罕虎如晉叔向曰君若不有寡君雖朝夕辱於敝邑寡君猜焉又二十年齊公孫青聘於衞賓将掫掫行夜主人辭賓曰寡君之下臣君之牧圉也若不獲扞外役是不有寡君也注有相親有集說嚴氏粲曰莫我有視之若無也范氏王孫曰俱以終逺兄弟振起則所重兄弟也謂他人父是認非同本者為兄弟也謂他人母亦是認非同胞者為兄弟也而踈者詎可强為親乎緜緜葛藟在河之漘順春反終逺兄弟謂他人昆叶古勻反謂他人昆亦莫我聞叶微勻反集傳興也夷上洒音跣猶洗也下曰漘孫氏炎曰平上陗下故名曰漘漘之為言脣也許氏謙曰岸上面平夷而下為水洗蕩齧入若脣也昆兄也聞相聞也李氏公凱曰如不聞有我而不見親也顧氏起元曰言視己之窮困漠不相聞也集說輔氏廣曰顧親於有有重於聞詩曰顧我復我至於亦莫我聞則漠然而不相領畧矣夫親乃天屬也其可強為之哉王氏志長曰母之所以為母昆之所以為昆皆由於父苟謂他人父則謂他人母謂他人昆不待言而可知矣故曰天之生物也使之一本總論鄒氏泉曰此詩三章一意但始言父次言母次言兄有次序耳郝氏敬曰兄弟相親以父母同也不顧兄弟即是不顧父母謂他人為父母也不直斥其薄而諷之以二本所謂怨而不怒也張氏彩曰本同父母而為昆弟者尚相棄如路人而乃望路人收我如子弟此必不得之數也則其不我顧不我有不我聞又何怪乎葛藟三章章六句集說黄氏佐曰左傳曰葛藟猶能庇其本根似此詩託興之義沈氏守正曰即人之流離失所而民間之不能睦族可知即民間之不能睦族而上之所風可知詩語中無尤人意總是自傷之詞彼采葛叶居謁反兮一日不見如三月兮集傳賦也采葛所以為絺綌許氏慎曰葛絺綌草也蓋淫奔者託以行也故因以指其人而言思念之深未久而似久也集說徐氏光啓曰彼采葛兮蓋託言以指其人猶氓之稱復關耳顧氏起元曰上一句指所思之人下二句言思念之情附録孔氏穎逹曰采葛以興臣有使出其事雖小憂懼於讒一日不得見君如三月不見日久情疎為懼益甚故以多時况少時也嚴氏粲曰人臣任事於外則讒間易生一日不見於君己懼小人乘閒而讒之如三月之久矣蓋讒人衆多君子動輒疑懼畧不可以有所為事之大者誰敢任之彼采蕭叶疎鳩反兮一日不見如三秋兮集傳賦也蕭荻也白葉莖麄科生有香氣祭則焫音爇以報氣故采之孔氏穎逹曰李巡曰荻一名蕭陸璣云今人所謂荻蒿者是也郊特牲云既奠然後爇蕭合馨香是蕭所以供祭祀也曰三秋則不止三月矣集說孔氏穎逹曰年有四時時皆三月三秋謂九月也設言三春三夏其義亦同作者取其韻耳彼采艾兮一日不見如三嵗本與艾叶兮集傳賦也艾蒿屬爾雅艾氷臺注今艾蒿乾之可炙故采之陸氏佃曰艾字从乂草之可以乂病者也一名炙草博物志曰削冰令圓舉以向日以艾承其影則得火艾曰冰臺以此曰三嵗則不止三秋矣集說朱氏公遷曰思念之意以漸而深張氏彩曰楚辭云何昔日之芳草兮今直為此蕭艾也意蓋本此總論吕氏祖謙曰葛為絺綌蕭供祭祀艾療疾特訓釋三物見采之由不於此取義也姚氏舜牧曰葛生於初夏采於盛夏故下承三月蕭采於秋後故下承三秋艾必三年之久為佳故下承三嵗附録孔氏穎達曰三章如此次者既以葛蕭艾為喻因以月秋嵗為韻積日成月積月成時積時成嵗欲先少而後多故以月秋嵗為次也臣之懼讒小事大事其憂等耳未必小事之憂如月急事之憂如嵗設文各從其韻也歐陽氏修曰詩人刺讒以積少成多為患蘇氏轍曰朝有讒人則下不敢有為采葛采蕭采艾雖事之無疑者猶不敢行畏往而有讒之者是以一日不見君而如三月之久也采葛三章章三句附録黄氏震曰古以采葛去君側故懼讒特采葛非人臣之事於事情未通晦菴傳以為淫奔者託以行然亦意之之詞至詩傳折衷載晦菴新說乃以采葛比聽讒愚案晉風采苓之詩亦以比聽讒則此說近人情而不反古矣大車檻檻毳尺銳反衣如菼吐敢反豈不爾思畏子不敢集傳賦也大車大夫車孔氏穎逹曰春官巾車職云革路以封四衞四衞四方諸侯守衞者又云大夫乘墨車然則王朝大夫於禮當乘墨車以大夫出封如子男之服則車亦得乘諸侯之車此大車蓋革路也檻檻車行聲也毳衣天子大夫之服孔氏穎逹曰春官司服云子男之服自毳冕而下春官典命職曰王之三公八命其卿六命其大夫四命及其出封皆加一等出封謂出於封畿即得加命故得如子男之衣服菼蘆之始生也毳衣之屬衣繪而裳繡五色皆備其青者如菼劉氏濟曰毳衣以宗彛為首蓋畫虎蜼虎蜼淺毛故謂之毳劉氏瑾曰毳衣所畫者三章宗彛也藻也粉米也裳所繡者二章黼也黻也所畫所繡皆備五色所謂以五采彰施於五色者也爾淫奔者相命之詞也子大夫也鄭氏康成曰子者稱所尊敬之詞不敢不敢奔也周衰大夫猶有能以刑政治其私邑者故淫奔者畏而歌之如此然其去二南之化則逺矣此可以觀世變也集說輔氏廣曰不明言其大夫而但言車服而己亦可見其畏之意朱氏公遷曰此詩之言所謂小人革面民免而無恥者蓋政刑之效視徳化不能及也故去二南為逺顧氏起元曰檻檻以所聞言毳衣以所見言蓋其一時氣勢威靈不敢玩視畏非畏其車服只平素懾其政刑故不覺望而生懼心耳但詩自含蓄不曽道及一政刑字附録孔氏穎達曰言古者大夫乘大車服毳冕巡行邦國決男女之訟於時男女莫不畏之有女欲奔者謂男子云我豈不於汝思為無禮之交與畏子大夫之政必将罪我故不敢也古之大夫使民畏之若此今之大夫不能然故陳古以刺之也蘇氏轍曰古者大夫巡行邦國以聽男女之訟其聽之也明而止之有道民聞其車聲而見其衣服則畏而不敢矣非待刑之而後已也大車啍啍他敦反毳衣如璊音門豈不爾思畏子不奔集傳賦也啍啍重遲之貌孔氏穎達曰啍啍行之貎故為重遲上言行之聲此言行之貎互相見也璊玉赤色孔氏穎達曰璊玉赬色也禾之赤苖謂之璊玉色如之五色備則有赤集說黄氏佐曰此二章即耳目之所感而畏相從於今生見其畏刑政於一時榖則異室死則同穴叶户橘反謂予不信有如皦古了反曰集傳賦也榖生穴壙皦白也民之欲相奔者畏其大夫自以終身不得如其志也故曰生不得相奔以同室庶幾死得合葬以同穴而已謂予不信有如皦日約誓之辭也集說吳氏師道曰前二章言不敢不奔猶不失為善也此章猶言生不得相從死猶不變云爾故申以約誓之辭亦邪思之不解者也黄氏佐曰此章因志願之相違而堅所約於没後見其畏刑政於終身附録孔氏穎達曰檀弓曰合葬非古也自周公以來未之有改然則周法始合葬也經稱死則同穴則陳古者陳周公以來賢大夫蘇氏轍曰生則有内外之别而死則同穴夫婦之正也古之聽男女之訟者非獨使淫奔者止也乃使其夫婦相與以禮久要而無相棄也嚴氏粲曰言古者男女皆守禮之正生則異室不至相瀆死則同穴從一以終謂予不信有如皦日觀其自誓之詞所守之堅可知矣此由上之風化使然也總論輔氏廣曰世變雖下而大夫能使人畏之如此亦可謂賢也已始則不敢奔而已終則知其雖沒身不得遂其志則其刑政之效亦非無常者之所能也黄氏佐曰記云君子禮以坊徳刑以坊淫又曰夫禮坊民所淫章民之别故男女無媒不交無幣不相見恐男女之無别也大夫能使民生畏心則其所以坊之者必有禮以為政刑之本矣朱氏道行曰此詩歸美周大夫之賢能懾俗淫奔少見王風之正姚氏舜牧曰周之紀綱壊極矣一大夫以刑政治其私邑猶能使淫奔者畏憚而不敢是一木之支也附録孔氏穎達曰三章皆陳古者大夫善於聽訟之事李氏樗曰孔子曰聽訟吾猶人也必也使無訟乎古之聽訟者何待於言哉觀大車之詩深得夫子無訟之意也大車三章章四句集說輔氏廣曰漢廣之游女端荘静一人見而知其不可求野有死麕之女子貞潔自守人見而知其不可犯此所以為二南之化也豈至於有淫奔之心必待有所畏而後不敢哉今觀此詩則世變之愈下可知矣朱氏公遷曰哀痛如黍離可謂悲矣以刑政治民如大車亦可謂有能者矣變雖云變而東都之大夫則寥寥乎僅見者也附録吕氏祖謙曰此詩所謂陳古其猶在文武成康之後歟蓋惟能止其奔未能革其心與行露之詩異矣亦僅勝於東遷之時而已丘中有麻彼留子嗟彼留子嗟將七羊反其來施施叶時遮反集傳賦也麻榖名子可食皮可績為布者黄氏一正曰麻高四五尺葉如荏而圓銳花黄子房生色黒而莖方房八稜者名巨勝莖圓而房稜或四或六者名胡麻皮可為布花白色者則曰麻蕡曰大麻曰麻勃也子嗟男子之字也将願也吕氏大臨曰將之為言猶欲也施施喜悦之意吕氏祖謙曰孟子曰施施從外來婦人望其所與私者而不來故疑丘中有麻之處復有與之私而留之者今安得其施施然而來乎集說朱子曰将其來施施望之之詞黄氏佐曰因麻麥及李似桑中之約而又有所留故易巖穴之賢為姦私之事不從小序附録毛氏萇曰丘中墝埆之處盡有麻麥草木乃彼子嗟之所治施施難進之意鄭氏康成曰子嗟放逐於朝去治卑賤之職而有功所在則治理所以為賢施施舒行伺閒獨來見己之貌張氏栻曰賢人放逐越在他國故國人思之曰丘中有麻彼蓋可以留子嗟而使不外適也其所以欲留之者欲其不越吾國庶幾猶可望其施施而來也則其思而望之蓋亦切矣丘中有麥彼留子國彼留子國將其來食集傳賦也子國亦男子字也來食就我而食也集說嚴氏粲曰庶幾從我食猶言中心好之曷飲食之之意附録毛氏萇曰子國子嗟父鄭氏康成曰言子國使丘中有麥著其世賢孔氏穎逹曰毛時書籍猶多或有所據此章言其父亦是治理之人耳丘中有李彼留之子叶奬里反彼留之子貽我佩玖叶舉里反集傳賦也之子并指前二人也貽我佩玖冀其有以贈己也集說輔氏廣曰三章所謂望之之情益厚冀其有以贈己則厚於望其就我而食望其就我而食則厚於望其施施然而來也先生所謂語意不莊非望賢之意附録毛氏萇曰玖石次玉者言能貽我美寳孔氏穎逹曰傳以為作者思而不能見乃陳其昔日之功言彼留氏之子有能遺我以美道謂在朝所施之政教箋亦以佩玖喻美道冀望其來敬己而遺己耳總論黄氏佐曰上二章各指其人而冀其就已下一章總指其人而冀其贈已附録歐陽氏修曰莊王之時賢人被放逐退處於丘壑國人思之以為麻麥之類生於丘中以其有用皆見收於人惟彼賢如子嗟子國者獨留於彼而不見錄其來施施難於自進也将其來食思其來而錄之也貽我佩玖謂其有美徳也子嗟子國當時賢士之字泛言之也叚氏昌武曰陳曰有麻有麥有李言其所居有此足以自養無求於外猶韓子云盤之土可稼而食也丘中有麻三章章四句集說范氏王孫曰朱子以為淫詩宋氏曰昔二南之化江漢有不淫之士野麕有守貞之女無何西轍不回葛覃既變為采葛矣卷耳之懷復變為丘中之思茲其所以有黍離也歟附録黄氏震曰古以留為氏或以為滯留之留合兩存之以俟知者胡氏一桂曰愚案諸家皆本序說毛氏曰留大夫氏子嗟字曹曰留本邑名其大夫以為氏李氏曰所謂彼留子嗟者亦猶陳風所謂子仲之子豈必求之他書有子仲乃言其姓氏乎蓋詩中所陳便是實事迹蘇氏曰子嗟隐居邱陵之閒而殖麻麥果實以為生者民思其賢庶其肻徐來以從我嚴氏曰莊王不能用賢使國人私致其愛慕欲其相與游從不能飬賢使國人私致其殷勤以飲食之不能使賢者金玉王度使國人望其私淑於己是可歎也姑備諸說觀焉錢氏天錫曰東周之俗似非鄭衞比以大車二詩為淫詩闕疑可也案朱子以此詩為婦人望其所私者而不來疑丘中復有與私而留之者蓋有子嗟子國二人焉其說自朱子始後儒閒有疑之以為如此則夫子刪詩時何取於田野之淫人而錄之歟毛傳留大夫之氏子嗟子國為父子鄭康成曰著其世賢若然則賢大夫而隐君子也毛萇去古未逺其說當有所本惜衰周之季古籍云亡無得而考矣王國十篇二十八章百六十二句集說張氏耒曰或問王風之詩凡十篇而閔周之詩四當是時平王東遷豐鎬為墟文武之舊已埽地矣此黍離所以閔也兵敗禍結此爰之所以閔也風俗衰薄室家不相保此中谷有蓷之所以閔也國家有是三者閔之宜矣君子陽陽之序曰君子遭亂相招為禄仕全身逺害而已蓋君子猶未去也何遽閔之哉曰序此詩者其知道乎國家之患莫大於有君子而不能知小人在位而賢人在下也其小人不為盡心未害也至於君子不為盡心苟求免於飢寒熟視其禍而不肻救者國恒亡此知微君子所以嗟傷而閔之也彼黍離爰中谷有蓷之亂苟有君子其至是乎輔氏廣曰讀詩者可以怨則詩人固無怨懟過甚之詞然予讀王風則見其怨詩尤為平和此可見周人之風俗也鄭一之七集傳鄭邑名本在西都畿内咸林之地宣王以封其弟友為采地後為幽王司徒而死於犬戎之難是為桓公其子武公掘一作滑竝音鶻突定平王於東都亦為司徒又得虢檜之地服氏虔曰東鄭古鄶國之地杜氏預曰鄫國在滎陽密縣東北陸氏徳明曰武公随平王東遷遂滅虢鄫而居之許氏謙曰文王二弟虢仲封東虢鄭滅之即鄭之制今鄭州滎陽縣也虢叔封西虢晉滅之今陜州是若虢州則其竟之所至也乃徙其封而施舊號於新邑是為新鄭咸林在今華州鄭縣皇輿表今陜西西安府華州新鄭即今之鄭州是也皇輿表今河南開封府新鄭縣其封域山川詳見檜風集說鄭氏康成曰初鄭桓公為幽王大司徒甚得周衆與東土之人問於史伯曰王室多故余懼及焉其何所可以逃死史伯曰其濟洛河穎之閒乎是其子男之國虢鄶為大虢叔恃勢鄶仲恃險皆有驕侈怠慢之心加之以貪冒君若以周難之故寄帑與賄不敢不許是驕而貪必将背君君以成周之衆奉辭罰罪無不克矣若克二邑鄢蔽補丹依疇歴華君之土也修典刑以守之惟是可以少固桓公從之後三年幽王為犬戎所殺桓公死之其子武公與晉文侯定平王於東都王城卒取史伯所云十邑之地右洛左濟前華後河食溱洧焉孔氏穎達曰畿内之國政教稟於天子善惡歸於其上無假風諫不當有詩桓公國於西周本在畿内武公初遷亦在東周畿内及并十邑盟㑹列於諸侯灼然在畿外故緇衣傳曰諸侯入為天子卿士是畿外之君稱入也緇衣序曰父子竝為周司徒則桓公之死武公即代為司徒是作卿士在并十邑之前也王氏應麟曰吳氏曰齊詩刺哀襄而季札觀樂乃曰泱泱乎大風也哉鄭美武公而札乃曰其細已甚曰大曰細自其土地風氣之發於音聲者言之而非繫乎辭也朱氏公遷曰諸侯并吞則周衰周衰則侯國異政自近者始衞王鄭相次其以此歟胡氏紹曽曰鄭初封在圻内風所以次王且周之衰鄭為之也桓公時王室多故謀及史伯寄帑於虢檜之間以隂謀鬰成大國然新鄭即成皋滎陽虎牢之分巖險聞天下故春秋戰争之多者無如鄭緇衣之宜兮敝予又改為兮適子之館叶古玩反兮還予授子之粲兮集傳賦也緇黑色周禮考工記三入為纁五入為緅七入為緇注染纁者三入而成又再染以黒則為緅又復再染以黒乃成緇緇衣卿大夫居私朝之服也孔氏穎逹曰緇衣即士冠禮所云𤣥冠朝服緇帶素韠是也卿士旦朝於王服皮弁不服緇衣退適治事之館釋皮弁而服以聽其所朝之政也宜稱改更適之館舍鄭氏康成曰卿士之館在天子之宫如今之諸廬也孔氏穎逹曰考工記外有九室九卿朝焉注云九室如今朝堂諸曹治事之處謂天子宫内卿士各立曹司有廬舍以治事也粲餐音孫也郭氏璞曰今河北人呼食為粲鄭氏康成曰愛之欲飲食之或曰粲粟之精鑿音作者王氏安石曰粲粟治之精者許氏謙曰粟一石得米六斗為糲糲米一石舂為八斗為鑿舊說鄭桓公武公相繼為周司徒善於其職周人愛之故作是詩言子之服緇衣也甚宜敝則我將為子更為之且將適子之館既還而又授子以粲言好之無己也集說范氏祖禹曰桓公武公之為司徒上得於君下得於民其君子好之愈久而愈不厭適子之館親之也既親之又授之以飲食此好賢之至也輔氏廣曰緇衣之宜美武公之徳稱其服也改為欲其服之常新授粲欲其粟之常繼發乎情形乎歌詠好善之誠心也黄氏佐曰宜是一徳相傳於父子而五教敬敷乎逺邇館即私朝也非私館也蘇氏曰諸侯入為卿士皆授館於王室還乃司徒退食而還其私室也彼自有粲固無待於人之授也而我授之者特以致其愛耳緇衣之好兮敝予又改造叶在早反兮適子之館兮還予授子之粲兮集傳賦也好猶宜也集說季氏本曰好亦謂徳與服稱也緇衣之蓆叶祥籥反兮敝予又改作兮適子之館兮還予授子之粲兮集傳賦也蓆大也孔氏穎逹曰言服緇衣大得其宜也程子曰蓆有安舒之義服稱其徳則安舒也集說黃氏佐曰蓆訓大蓋服而不衷只見其小今桓武相繼善於職有以宜此服故人自見其莊嚴尊大也總論李氏樗曰以詩觀之宜好蓆只是一意言國人之愛武公父子緇衣之敝我将為子改作之蓋欲其久於其職也朱氏善曰始之厚者不能保其終之不薄始之勤者不能保其終之不怠惟緇衣之好賢不然其改造改作既始終之無閒而適館授粲復前後之如一彼夏屋之渠渠者其始非不盛也而終或每食之無餘此詩人所以歎其權輿之不繼也緇衣三章章四句集傳記曰好賢如緇衣又曰於緇衣見好賢之至集說吕氏祖謙曰此詩武公入仕於周而周人美之也若鄭人所作何為三章皆言適子之館兮好賢如緇衣所謂賢即謂武公父子也後之講師習其讀而不知其義誤以為稱武公之好賢遂曰明有國善善之功失其㫖矣嚴氏粲曰說者多以此詩為鄭人所作謂周人之詩當在王風非也破斧伐柯九罭狼跋皆周大夫所作而附於豳此武公為司徒善於其職周人善之而作耳周人愛武公欲其常為卿士至其子荘公不克肖其徳周人遂畀虢公政而緇衣之意替矣將七羊反仲子兮無踰我里無折之舌反我樹杞豈敢愛之畏我父母叶滿彼反仲可懷叶胡威反也父母之言亦可畏叶於非反也集傳賦也将請也仲子男子之字也我女子自我也里二十五家所居也孔氏穎逹曰地官遂人云五家為鄰五鄰為里是二十五家為里也杞柳屬也生水傍樹如柳葉麤而白色理微赤蓋里之地域溝樹也王氏應麟曰杞有三無折我樹杞柳屬也南山有杞在彼杞棘梓杞也集于苞杞言采其杞隰有杞桋枸檵也莆田鄭氏曰此淫奔者之辭集說劉氏瑾曰此女猶知畏憚故其託辭如此鄭風之中亦所罕見也朱氏道行曰仲子私來父母知之必謂以我之故致仲之來豈得不畏而惟情之懷乎故戒之以無踰無折附録毛氏萇曰仲子祭仲也鄭氏康成曰祭仲驟諫荘公不能用其言故言無踰我里喻無干我親戚也無折我樹杞喻無害我兄弟也段將為害我豈敢愛之而不誅以父母之故故不為也將仲子兮無踰我牆無折我樹桑豈敢愛之畏我諸兄叶虗陽反仲可懷也諸兄之言亦可畏也集傳賦也牆垣也古者樹牆下以桑將仲子兮無踰我園無折我樹檀叶徒沿反豈敢愛之畏人之多言仲可懷也人之多言亦可畏也集傳賦也園者圃之藩其内可種木也周禮太宰九職二曰園圃毓草木檀皮青滑澤材彊韌可為車陸氏璣曰檀木與檕音計迷相似又似梓榆集說徐氏常吉曰由踰里而牆而園仲之來也以漸而廹也由父母而諸兄而衆人女之畏也以漸而逺也總論胡氏一桂曰三章皆有所畏而不輕身以從其所懐亦庶幾止乎禮義者也附録孔氏穎逹曰莊公有弟名段其母愛之令公處之大都公不能勝止其母遂至使驕而作亂也此叔未亂之前有臣祭仲者諫公令早為之所而公不聽小不忍以致大亂國焉經三章皆陳拒諫之辭豈敢愛之畏我父母是小不忍也後乃興師伐之是致大亂國也吕氏祖謙曰辭雖拒仲而意則與之豈敢愛之畏我父母則於段非有所不忍也仲可懐也父母之言亦可畏也則拳拳於叔而不得已於姜氏者可見矣畏我諸兄畏人之多言特廹於宗族國人之議論非愛段也具文見意而莊公之情得矣將仲子三章章八句集說輔氏廣曰此雖為淫奔之詩然其心猶有所畏未至於蕩然而無忌也故列於鄭詩之首以見其為風之始變也歟附録孔氏穎逹曰此事見於隐元年傳黃氏佐曰左傳襄二十六年鄭伯為衞侯如晉晉侯言衞侯之罪使叔向告鄭伯子展賦将仲子兮晉侯乃許歸衞侯即此詩也吳氏肅公曰子展賦此詩取兄弟相護之意則豈淫奔語乎案此詩朱子取莆田鄭樵之說定為淫奔玩其詩辭乃一籬落閒女子雖不能自遏其情而猶畏父母兄弟國人之言不敢輕身以從其人者也然考左傳載衞侯見囚於晉齊侯鄭伯為衞侯故如晉以請衞侯子展賦将仲子兮而衞侯得歸使其為本國淫奔之詩當日晉侯賦嘉樂齊侯賦蓼蕭鄭伯賦緇衣皆寓意𢎞逺子展何取以同賦而復見許於叔向耶今從集傳為正解而錄序說以備覽叔于田叶地因反巷無居人豈無居人不如叔也洵美且仁集傳賦也叔莊公弟共叔段也事見春秋毛氏萇曰叔大叔段也孔氏穎逹曰其字曰叔以寵祿過度時呼為大叔左傳謂之京城大叔是由寵而異其號也田取禽也邢氏昺曰白虎通義曰四時之田總名為田為田除害也巷里塗也孔氏穎逹曰里内之塗道也洵信美好也仁愛人也段不義而得衆國人愛之故作此詩言叔出而田則所居之巷若無居人矣非實無居人也雖有而不如叔之美且仁是以若無人耳或疑此亦民間男女相悅之詞也集說孔氏穎逹曰仁是行之美名叔乃作亂之賊謂之信美好而又仁者言國人悅之辭非實仁也黄氏佐曰美字俱自便捷輕利而言仁字如頒禽均以及衆之謂也相媚悅以從之其所謂仁不過私愛之飾詞鄭伯克段京人叛之則信美且仁豈由衷之言哉叔于狩叶始九反巷無飲酒豈無飲酒不如叔也洵美且好叶許厚反集傳賦也冬獵曰狩杜氏預曰狩圍守也冬物畢成獲則取之無所擇也集說鄭氏康成曰飲酒謂燕飲也鄒氏泉曰二章之美槩言其善飲酒也而好則指其獻酬歡洽而言也叔適野叶上與反巷無服馬叶滿補反豈無服馬不如叔也洵美且武集傳賦也適之也郊外曰野服乘也孔氏穎逹曰易稱服牛乘馬俱是駕用之義故服馬猶乘馬也集說輔氏廣曰因其服馬故稱其武鄒氏泉曰三章之美槩言其善服馬而武則指其控御馳騁之武勇也總論楊氏時曰仁且有武焉固宜國人之所悅而歸之也而詩以為不義得衆何也蓋先王之迹微而禮義消亡國俗傷敗故人之好惡不足以當是非而毁譽不足以公善惡叔段不義而為衆所悅者亦以衰俗好惡毁譽不當其實故也然則所謂仁者豈誠有仁哉所謂武者亦若此而已以是觀之則俗之所好惡可知矣范氏處義曰美且仁謂其威儀也美且好謂其燕樂也美且武謂其善御也叔之處京繕甲治兵豈為田獵而國人悅之如此能無後患乎許氏謙曰終篇雖全稱美畧無譏刺之辭而所美者惟田狩飲酒之事舍是蓋無足言者禍敗之來豫知之矣叔于田三章章五句集說范氏處義曰自古小人為惡亦必行小惠善矯師以要民譽然後能惑衆為亂此詩與晉揚之水沃盛强國人将叛而歸沃之意同皆一時愚俗為小人所欺至形之歌詠孔子刪詩何取焉蓋以戒後之人君謹於其初勿使小人得志以成難圗之勢此聖人錄詩之意也彭氏執中曰玩味此詩如見叔段輕獧浮揚之意閭里少年朋徒追逐而極口誇美之也次篇放此附録嚴氏粲曰詩人之意謂段之不令而羣小相與縱㬰如此必為厲階以自禍莊公曷為不禁止之乎故序曰刺莊公也叔于田乘乘下繩證反馬叶滿補反執轡如組音祖兩驂如舞叔在藪素口反叶素苦反火烈具舉襢音但裼素歴反㬥虎獻于公所將七羊反叔無狃女九反叶女古反戒其傷女音汝集傳賦也叔亦段也車衡車軛也外兩馬曰驂如舞謂諧和中節董氏逌曰五御之法有舞交衢者蓋詩所謂如舞也驂與服諧和然服制於衡不得如舞其言舞者驂也皆言御之善也劉氏瑾曰善御其馬是以轡則柔順如組驂則諧和如舞也藪澤也毛氏萇曰禽之府也陸氏徳明曰韓詩云禽獸居之曰藪孔氏穎逹曰鄭有圃田此言在藪蓋圃田也火焚而射也烈熾盛貌具俱也曹氏粹中曰王制云昆蟲未蟄不以火田故爾雅謂火田為狩惟冬田乃用火若夫刈草以為防驅禽而納諸防中然後焚而射焉則四時之田皆然也襢裼肉襢也孔氏穎逹曰李廵曰襢裼脫衣見體曰肉袒孫炎曰襢去裼衣㬥空手搏獸也公莊公也毛氏萇曰叔從公田也狃習也孔氏穎逹曰釋言云狃復也復亦貫習之意國人戒之曰請叔無習此事恐其或傷汝也蓋叔多材好勇而鄭人愛之如此劉氏瑾曰章首四句所謂材也次四句所謂勇也末二句則國人愛之之詞也集說朱氏道行曰乘馬執轡皆在道時事在藪以下則至田所從事矣火烈具舉非此無以搜獸故未田先焚襢裼而曓得虎而獻見叔勇敢懼虎之傷戒其無狃見叔不自愛與國人愛叔情况悉宛然矣張氏彩曰㬥虎危矣以此而驕其兄則又危故曰將叔無狃戒其傷女言其不可恃也叔于田乘乘黃兩服上襄兩驂鴈行戸郎反叔在藪火烈具揚叔善射忌音記又良御叶魚駕反忌抑磬苦定反控口貢反忌抑縱送忌集傳賦也乘黃四馬皆黃也陸氏佃曰黃馬之上色明堂位曰周人黃馬蕃鬛言吉事乘此衡下夾轅兩馬曰服孔氏穎逹曰車有一轅而四馬駕之中央夾轅者名服馬兩邊名騑馬亦曰驂馬襄駕也馬之上者為上駕猶言上駟也鄭氏康成曰上駕言馬之最良也鴈行者驂少次服後如鴈行也揚起也忌抑皆語助辭騁馬曰磬止馬曰控范氏處義曰磬謂使之曲折如磬控謂控制不逸舍音捨㧞音跋曰縱覆彇曰送梁氏益曰拔矢末也所謂括也亦作筈箭本受弦處彇與簫同弓之梢末所謂弭也曲禮左手執簫疏云弓頭稍剡差斜似簫故名曰簫又謂之弰集說孔氏穎逹曰叔能磬騁馬矣又能控止馬矣言欲疾則走欲止則住能縱矢以射禽矣又能縱送以逐禽矣言發則能中逐則能及是叔之善射善御也嚴氏粲曰既言叔良御忌遂言其能磬以騁馬控以止馬則馬之進退惟其意所以實其良御也既言叔善射忌遂言其能後手㔢而縱前手攧而送則矢去勁而有力所以實其善射也黃氏佐曰稱其射御之善乃喜其無傷之詞也末章注云亦喜其無傷之詞蓋承此章而解耳叔于田乘乘鴇音保叶補苟反兩服齊首兩驂如手叔在藪火烈具阜符有反叔馬慢叶黄半反忌叔發罕叶虚旰反忌抑釋掤音氷忌抑鬯敇亮反弓叶姑𢎞反忌集傳賦也驪白雜毛曰鴇今所謂烏驄也齊首如手兩服竝首在前而兩驂在㫄稍次其後如人之兩手也阜盛慢遲也發發矢也罕希釋解也掤矢筩蓋春秋傳作冰孔氏穎逹曰昭二十五年左傳云公徒執冰而踞字異音義同服虔云冰櫝丸蓋杜預云櫝丸是箭筩嚴氏粲曰用矢則舉掤以開筩既用則納矢筩中釋下掤以覆筩鬯弓囊也與韔同孔氏穎逹曰謂弢弓而納諸鬯中言其田事将畢而從容整暇如此鄭氏康成曰馬行遲發矢希蓋矢弢弓言田事畢亦喜其無傷之詞也集說劉氏瑾曰上章及此亦皆言其田獵射御之善而喜其畢事無偒皆所謂多才好勇而得衆者也朱氏公遷曰馬慢發罕則獸幾盡釋掤鬯弓則事亦已昔懼其或傷今喜其無傷首末兩章相應也總論鄭氏伯熊曰叚以國君介弟之親京城太叔之貴而所好者馳騁弋獵也所矜者襢裼㬥虎也所賢者射御足力也出而人思之者飲酒服馬之儔也氣習到此而又恃其君母之愛玩於莊公之惟其所欲而不誰何也欲不為亂得乎黃氏櫄曰司馬温公常言君子挾才以為善小人挾才以為惡大叔多才而不義所謂挾才而為惡者也朱氏善曰段之為人以射則善以御則良以容止則甚習以材力則甚武如是而甚不仁夫不仁而國人愛之若此者豈盡出於公哉上教不明人心不古顚倒是非混殽黑白固有不勝其可歎者矣大叔于田三章章十句集傳陸氏曰首章作大叔于田者誤蘇氏曰二詩皆曰叔于田故加大以别之不知者乃以段有大叔之號而讀曰泰又加大于首章失之矣嚴氏粲曰兩叔于田其短篇者止曰叔于田其長篇者加大以别之集說吕氏祖謙曰鷙鳥將擊必匿其形二詩所載段之輕淺如此宜其為莊公之所易也吳氏肅公曰叔于田下篇全是諷語如猗嗟之美魯莊公意全在言外戒其狃而傷女智者已見其端倪叔不悟耳附録孔氏穎逹曰叔負才恃衆必為亂階而公不知禁故刺之清人在彭叶普郎反駟介旁旁補彭反叶補岡反二矛重直龍反英叶於良反河上乎翱翔集傳賦也清邑名清人清邑之人也鄭氏康成曰清者高克所帥衆之邑也彭河上地名毛氏萇曰彭衞之河上鄭之郊也王氏質曰臨河名清者甚多酈氏以清陽亭即清人城引詩清人在彭當是此地左氏衞侯甯喜盟於彭水之上衞鄭相近彭或是此王氏應麟曰杜預春秋釋地云中牟縣西有清陽亭駟介四馬而被甲也孔氏穎逹曰介是甲之别名旁旁馳驅不息之貌二矛酋矛夷矛也英以朱羽為矛飾也酋矛長二丈夷矛長二丈四尺竝建於車上則其英重疊而見黃氏一正曰矛上銳而旁句蓋可刺可句之器也翱翔遊戲之貌鄭文公孔氏穎達曰文公捷厲公子惡高克使將清邑之兵禦狄于河上孔氏穎達曰是時狄侵衞衞在河北鄭在河南恐其渡河侵鄭故使高克将兵於河上禦之久而不召師散而歸鄭人為之賦此詩言其師出之久無事而不得歸但相與遊戲如此其勢必至於潰散而後已爾集說鄭氏伯熊曰夫擁大衆於外而無所事不為亂則必潰散耳嚴氏粲曰狄去無事乃使四馬被甲驅馳不息車上建矛翱翔於河上之地何為者耶清人在消駟介麃麃表驕反二矛重喬河上乎逍遙集傳賦也消亦河上地名麃麃武貌矛之上句音勾曰喬所以懸英也英弊而盡所存者喬而已清人在軸軸音胄駟介陶陶叶徒候反左旋右抽叶敕救反中軍作好叶許候反集傳賦也軸亦河上地名孔氏穎逹曰彭消軸皆河上之地久不得歸師有遷移三地亦應不甚相逺陶陶樂而自適之貌左謂御在將車之左執轡而御馬者也旋還車也右謂勇力之士在將車之右執兵以擊刺者也抽拔刃也中軍謂將在鼓下居車之中即高克也好謂容好也東萊呂氏曰言師久而不歸無所聊賴姑遊戲以自樂必潰之勢也不言已潰而言將潰其詞深其情危矣集說孔氏穎達曰毛以為左右中總謂一軍之事箋以左為軍之左旋右為人之右手於事不類故易傳以為一車之事左謂御者在車左右謂勇力之士在車右中謂將居車中也車是御之所主也故習旋迴之事右主持兵故抽刃擊刺之高克自居車中以此一車所為之事為軍之容好此謂將之所乘車耳若士卒兵車則左人持弓右人持矛中人御御車不在左也黄氏佐曰左旋是挽車盤旋以為戲右抽是抽刃撫視以為樂左右兒戲而中軍之將雖作好而强留亦豈能久哉總論范氏處義曰師之出處當嚴其期今乃翱翔之久不思班師師之屯次當謹其備今乃逍遥自適同於兒戲佳兵者不祥之器今乃左旋右抽以軍作好不敗何待陳氏推曰在彭在消在軸有遷徙無常爰居爰處之意旁旁麃麃陶陶俱指乘駟介之人言有無事不歸自為馳驅之意重英重喬有師久英弊而虛備故事之意清人三章章四句集傳事見春秋閔公二年冬十二月狄入衞鄭棄其師胡氏曰人君擅一國之名寵生殺予奪惟我所制耳使高克不臣之罪已著案而誅之可也情狀未明黜而退之可也愛惜其才以禮馭之亦可也烏可假以兵權委諸竟上坐視其離散而莫之䘏乎春秋書曰鄭棄其師其責之深矣集說蘇氏轍曰翱翔於河上非所以禦狄也以禦狄為名而逐高克也以君而逐大夫不能而假興師焉以為大無政刑矣故曰棄師羔裘如濡叶而朱而由二反洵直且侯叶洪姑洪鉤二反彼其音記之子舍音赦命不渝叶容朱容周二反集傳賦也羔裘大夫服也如濡潤澤也洵信直順侯美也其語助辭舍處渝變也言此羔裘潤澤毛順而美彼服此者當生死之際又能以身居其所受之理而不可奪鄭氏康成曰謂守死善道見危授命之等葢美其大夫之詞然不知其所指矣集說范氏處義曰服是服者稱莫濡澤之美人臣惟信而直乃能處君命而不變輔氏廣曰舍命不俞所包者濶命有指理而言者有指氣而言者以理言則居其理而不變以氣言則居其分而不踰理可以兼氣故集傳止以理言之嚴氏粲曰命天所賦於我者舍則居之而安也君子安於命臨利害而不變羔裘豹飾孔武有力彼其之子邦之司直集傳賦也飾緣去聲袖也禮君用純物臣下之故羔裘而以豹皮為飾也孔氏穎逹曰唐風云羔裘豹袪羔裘豹袖然則緣以豹皮謂之為袪袖也孔甚也豹甚武而有力故服其所飾之裘者如之司主也嚴氏粲曰司直謂直遒之宗主官名多稱司言主掌之也集說范氏處義曰服是服者稱其豹飾之有力人臣惟强而有力乃能主國是而不搖黄氏一正曰大夫羔裘所以象其禮也豹飾所以象其義也又言其體柔而文之以剛其義上達也羔裘晏兮三英粲兮彼其之子邦之彥叶魚旰反兮集傳賦也晏鮮盛也三英裘飾也未詳其制程子曰三英者若素絲五紽之類葢衣服制度之節段氏昌武曰曹曰古者素絲以英裘葢以素絲織為組紃以英飾裘縫也三者其數也粲光明也彥者士之美稱集說黃氏佐曰此言晏粲之美故稱其為彥也彥即是美士猶君子成徳之名三英相稱亦是大夫正直之義總論輔氏廣曰首言其能舍命不渝次言其為邦之司直末乃以為邦之彥而結之然則為臣之道主於正直不阿而已雖孔子之在朝亦以便便誾誾侃侃為常至於柔行㢲入委曲以就事亦固有時而當用要之其出於不得已而已朱氏公遷曰一章美其存心二章美其從政三章美其為人朱氏善曰舍命不渝則必不徼幸而苟得而於守身之道得矣邦之司直則必不諛悅以求容而於事君之道盡矣既能順命以持身又能忠直以事上此所以為邦之彥也歟羔裘三章章四句集說陳氏子龍曰義所難裁莫深於貴寵之際事所難處莫甚於强大之間鄭之奢偪桓武以來亦難調矣其國疲小則晉楚之事亦孔艱矣是不可姑息治而怯懦定者猛獸有不採之威君子有不辱之色其之子之謂乎遵大路兮摻所覽反執子之袪叶起據反兮無我惡烏路反兮不寁市坎反故也集傳賦也遵循摻擥許氏謙曰擥與攬同撮持也袪袂孔氏穎逹曰袂是袪之本袪為袂之末俱是衣袖寁速嚴氏粲曰猶言倉卒也故舊也淫婦為人所棄故於其去也擥其袪而留之曰子無惡我而不留故舊不可以遽絶也宋玉賦有遵大路兮攬子袪之句亦男女相說之詞也劉氏瑾曰宋玉登徒子好色賦曰鄭衞溱洧之間羣女出桑臣觀其麗者因稱詩曰遵大路兮攬子袪贈以芳華辭甚妙集傳援此為證者蓋宋玉去此詩之時未逺其所引用當得詩人之本㫖彼為男語女之詞猶此詩為女語男之詞也集說朱氏道行曰言相與己故母以喜新一念見惡而遽絶之斯成子之厚耳附録鄭氏康成曰思望君子於道中見之則欲擥持其袂而留之嚴氏粲曰子無惡我而倉卒於故舊也謂棄去之速也不言其惡莊公而以為惡我婉詞也言故舊以先君之義諷之庶其或留也遵大路兮摻執子之手兮無我魗市由反叶齒九反兮不寁好叶許口反也集傳賦也魗與醜同欲其不以已為醜而棄之也好情好也集說黃氏佐曰故舊己不可遽棄而况情好之人乎留之之意以漸而深也朱氏道行曰以手易袪更親言魗以見惡之由言好以見時雖故而情猶在據章面不寁故與好則惡之魗之者自處澆薄似亦宜有責焉不得偏詆摻執者之非也總論輔氏廣曰無我惡兮不寁故也猶假義以責之至無我魗兮不寁好也則真情見而詞益哀矣范氏王孫曰大凡衣故不棄物故不毁故以故字動之美必代醜貌不勝心故以好字動之附録范氏處義曰既欲攬其袪又欲執其手以見為王留行之意甚堅既陳故舊之情復陳昔日之好以見詩人述己之私情期君子之必聽非愛君憂國者安得此言哉遵大路二章章四句附録曹氏粹中曰申公白生强起穆生曰獨不念先王之徳歟即此詩欲留君子之意吕氏祖謙曰武公之朝葢多君子矣至於莊公尚權謀專武力氣象一變左右前後無非祭仲高渠彌祝聃之徒也君子安得不去之乎不寁故也不寁好也詩人豈徒勉君子遲遲其行也感於事而懐其舊者亦深矣案序思君子也莊公失道君子去之國人思望焉朱子初解云君子去其國國人思而望之於其循大路而去也攬持其祛以留之曰子無惡我而不留故舊不可遽絶也是亦嘗從序義矣後定為淫婦留其人之詞引宋玉賦有遵大路兮攬子袪之句以為証劉瑾謂宋玉去古未逺其所引用當得詩人本㫖辨之者曰小序首句國史所題尤去古未逺也况遵大路見非私徑宋元明諸儒於此篇都從序說故節存大意以俟考女曰雞鳴士曰昧旦子興視夜明星有爛將翱將翔弋鳬音符與鴈集傳賦也昧晦旦明也昧旦天欲旦昧晦未辨之際也吕氏祖謙曰列子曰将旦昧爽之交日夕昏明之際明星啓明之星先日而出者也爾雅釋天明星謂之启明嚴氏粲曰今俗所謂曉星也毛氏謂天將曉而小星不見惟明大之星爛然雖不指為啓明然将曉而明大者惟啓明耳弋繳音灼射謂以生絲繫矢而射也許氏謙曰周禮司弓矢矰矢茀矢用諸弋射注疏結繳於矢謂之矰繳繩也矰高也取向上射飛鳥之義茀之言刜也以弋飛鳥刜羅之謂結繳以羅取而刜殺之也鳬水鳥如鴨青色背上有文李氏廵曰野曰鳬家曰鶩陸氏佃曰沈鳬善没而又容與與波上下此詩人述賢夫婦相警戒之詞言女曰雞鳴以警其夫而士曰昧旦則不止於雞鳴矣婦人又語其夫曰若是則子可以起而視夜之如何意者明星已出而爛然則當翱翔而徃弋取鳬鴈而歸矣其相與警戒之言如此則不留於晏昵之私可知矣集說孔氏穎逹曰雞鳴女起之常節昧旦士起之常節皆是自言起節而彼既以時而起此亦不敢淹留即是相警之義也各以時起是不為色而留也鄒氏泉曰弋鳬與鴈正是勤業處不獨為飲食之故而已弋言加叶居之居何二反之與子宜叶魚竒魚何二反之宜言飲酒與子偕老叶吕吼反琴瑟在御莫不静好叶許厚反集傳賦也加中去聲也史記所謂以弱弓微繳加諸鳧鴈之上是也陸氏佃曰弱弓微矢乘風振之曰弋朱氏道行曰弋言加謂應弦而倒弓繳出其上也宜和其所宜也内則所謂鴈宜麥之屬是也鄭氏康成曰言其氣味相成射者男子之事而中饋婦人之職故婦謂其夫既得鳧鴈以歸則我當為子和其滋味之所宜以之飲酒相樂期於偕老而琴瑟之在御者亦莫不安靜而和好其和樂而不淫可見矣集說李氏樗曰飲酒偕老鄭氏謂宜乎我燕樂賓客而飲酒與之俱至老親愛之言也歐陽氏以為賓客一時相接豈有偕老之理與子者皆婦人謂其夫也御其琴瑟莫不安好是夫婦相愛之意也輔氏廣曰家道和夫婦睦則凡其器用自然覺得安靜而和好况乎琴瑟本以為和樂之具哉徐氏常吉曰君子無故琴瑟不離於側凡物在手曰御莫不静好見以心之和形而為聲之和也知子之來叶六直反之雜佩以赠叶音則之知子之順之雜佩以問之知子之好呼報反之雜佩以報之集傳賦也來之致其來者如所謂修文徳以來之雜佩者左右佩玉也上橫曰珩下繫三組貫以蠙珠許氏謙曰蠙蚌之别名中組之半貫一大珠曰瑀末懸一玉兩端皆銳曰衝牙兩㫄組半各懸一玉長博而方曰琚其末各懸一玉如半璧而内向曰璜又以兩組貫珠上繫珩兩端下交貫於瑀而下繫於兩璜行則衝牙觸璜而有聲也吕氏曰非獨玉也觿許規反燧箴與針同管熊氏剛大曰觿解結燧取火箴貯以管凡可佩者皆是也范氏處義曰雜佩或謂珩璜琚瑀衝牙之類或謂觿燧箴管凡可佩之物是詩既為民俗而作佩玊非民閒所常有當以後說為是贈送順愛問遺也孔氏穎逹曰曲禮云凡以苞苴簞笥問人者左傳云衞侯使以弓問子貢皆遺人物謂之問婦又語其夫曰我苟知子之所致而來及所親愛者則當解此雜佩以送遺報荅之蓋不惟治其門内之職又欲其君子親賢友善結其驩心而無所愛於服飾之玩也集說張子曰言婦人之好徳甚於男子輔氏廣曰一意而三疊之以見其情之不能自已也夫勤勞以成業和樂以宜家此婦人之賢徳然情猶未已也則無所愛於服飾之玩而欲其君子之親賢樂善以輔成其徳是又加於人一等矣徐氏鳯彩曰來之既致其來宜贈其徃也順之志同道合故問以通情愫也好者好其善彼以善施我以物報也總論王氏質曰大率此詩婦人為主辭故子興視夜以下皆婦人之詞朱氏善曰雞鳴而興昧旦而往言其時之有常也翱翔而往鳧鴈而歸言其事之有常也弋而取之於外宜而和之於内蓋欲各供其職也酒食以飬其身琴瑟以和其志蓋欲同享其樂也來者致其來贈者送其往順以愛之好以親之皆來之之意問以遺之報以荅之皆贈之之意又見其重不在物而在乎徳也前二章相戒以職分之當為後一章相勉以徳業之交修汪氏應蛟曰家之興始於憂勤道之成始於閨閫鷄鳴夫婦早夜警戒矣又以親賢友善為君子願内有賢助外有良朋士之所以成徳業顯當世也女曰雞鳴三章章六句集說朱子曰此詩意思甚好讀之使人有不知手舞足蹈者輔氏廣曰鄭國之俗雖曰淫亂然在下之人夫婦之閒猶知禮義勤生業不昵於宴私相安於和樂而又能贊助君子以成其徳此可以觀先王之澤與民性之善矣朱氏公遷曰此詩與齊雞鳴同意然彼言㑹朝之事可知其為國君之妃此其男子躬親射弋則士庶人之妻也有女同車顔如舜華叶芳無反將翱將翔佩玉瓊琚彼美孟姜洵美且都集傳賦也舜木槿也樹如李其華朝生暮落陸氏璣曰舜一名木槿一名櫬一名椵齊魯之閒謂之王蒸五月始華故月令仲夏木槿榮孟字姜姓洵信都閑雅也孔氏穎逹曰都者美好閑習之言司馬相如上林賦云妖冶閑都此疑亦淫奔之詩言所與同車之女其美如此而又歎之曰彼美色之孟姜信美矣而又都也集說輔氏廣曰舜華言其容色之美瓊琚言其儀飾之盛洵美且都又極稱道其好樂之情也附録鄭氏康成曰鄭人刺忽昭公忽莊公子不娶齊女故稱同車之禮齊女之美言孟姜信美好且閑習婦禮孔氏穎逹曰忽不與齊為昏卒以無大國之助至於見逐故國人假言忽實娶齊女與之同車之事以刺之桓六年傳曰北戎侵齊齊侯使乞師於鄭鄭太子忽帥師救齊是忽嘗有功於齊也傳又云公之未昏於齊也齊侯欲以文姜妻鄭太子忽忽辭及其敗戎師也齊侯又請妻之固辭如左傳文齊侯前欲以文姜妻忽後復欲以他女妻忽再請之此言齊女賢謂復請妻者非文姜也嚴氏粲曰忽以弱見逐國人恨其不取齊女言忽所取他國之女行親迎之禮而與之同車者特取其色爾如木槿之華朝生暮落不足恃也翱翔佩玉徒有威儀服飾之可觀而無益於事也曷若彼美好齊國之長女忽若取之則有大國以為援而不至於見逐矣有女同行叶户郎反顔如舜英叶於良反將翱將翔佩玉將將七羊反彼美孟姜徳音不忘集傳賦也英猶華也將將聲也毛氏萇曰將將鳴玉而後行孔氏穎逹曰上章言玉名此章言玉聲互相足徳音不忘言其賢也集說王氏安石曰古之人於玉比徳焉於瓊琚言徳之容於將將言徳之音各以其類也總論顧氏起元曰一章悅其色二章悅其徳也附録范氏處義曰同車同行親迎之禮也舜華舜英徳之見於容也瓊琚將將徳之稱其服也洵美且都信美而且閑雅也徳音不忘美名之不可忘也詩人之言如此非賢女不足以當之蓋指忽再辭昏之齊女也有女同車二章章六句集說輔氏廣曰鄭詩惟此篇為男悦女之辭世衰道降徇情肆欲所美非美者多矣案詩序刺忽也衍之者曰忽不昏於齊後以無大國之援而見逐故國人刺之其事見於春秋傳朱子以為忽之辭昏未為不正至其失國以勢孤援弱亦未有可刺之罪也又云此詩未必為忽而作其論可謂極正大矣然既以為未必為忽而作則將據何說以解之乎集傳以其在鄭風也曰疑亦淫奔之詩後儒謂詩曰同車則有御輪之禮曰佩玉則有矩歩之莭曰孟姜則本齊族之貴淫奔而越國有若是之威儀盛飾昭彰耳目乎不知朱子特辨序說因孟姜二字為齊女遂指刺忽之為傅㑹其曰淫奔蓋疑詞也詩固在人之善觀矣山有扶蘇隰有荷華叶芳無反不見子都乃見狂且子餘反集傳興也扶蘇扶胥疎須二音小木也荷華芙蕖也陸氏璣曰荷芙蕖其華未發為菡萏已發為芙蕖子都男子之美者也孔氏穎逹曰都謂美好而閑習於禮法也季氏本曰子都古之美男子借以為喻狂狂人也孔氏穎逹曰都是美好則狂是醜惡且語辭也淫女戲其所私者曰山則有扶蘇矣隰則有荷華矣今乃不見子都而見此狂人何哉集說許氏謙曰此詩恐是滛女見絶於男子而復私於人乃思絶者之美好而厭所私者之狂狡也朱氏道行曰扶蘇荷華俱有體色可愛以物之宜有者有之興人之不宜見者反見之也女謔男醜一時調􅀏之詞附録鄭氏康成曰人之好羙色不往覩子都乃反往覩狂醜之人以興忽好善不任用賢者反任用小人其意同吕氏祖謙曰山宜有扶蘇者也隰宜有荷華者也朝宜有賢俊者也今觀昭公之朝不見子都乃見狂且焉則昭公所美非美可知矣山有橋松隰有游龍不見子充乃見狡童集傳興也上竦無枝曰橋亦作喬游枝葉放縱也龍紅草也一名馬蓼葉大而色白生水澤中高丈餘孔氏穎逹曰釋草云紅蘢古其大者蘬舍人曰紅名蘢古其大者名蘬是龍紅一草而别名也張子曰龍是葒草其枝榦樛屈著土處便有根如龍也本草云葒草一名鴻䕵音纈如馬蓼而大即水紅也詩注云一名馬蓼馬蓼自是一種也子充猶子都也童氏逌曰子充不見於書疑亦以美著也狡童狡獪之小兒也鄭氏康成曰狡童有貌而無實總論朱氏公遷曰狡甚於狂故以為序朱氏道行曰借子都子充相形狂狡狂以情之蕩言狡以情之詐言附録范氏祖禹曰山不惟有小木而又有大材隰不惟有華而又有草然則一國之大賢材無不有人君所美宜得其美者也范氏處義曰在山則扶蘇之與橋松在隰則荷華之與游龍孰為美孰為非美宜若易辨也今所用之人乃狂狡之童而子都子充之美乃不見用則美惡倒置矣二章皆比而賦之也山有扶蘇二章章四句附録孔氏穎逹曰此篇刺昭公之飬臣失宜不以狡童為昭公也案此詩朱子初解曰所美非美謂賢者佞智者愚也吕祖謙取其說著之讀詩記朱子亦曾與之後改是篇為淫女戲其所私者而作而祖謙己不及見矣然後之儒者卒多袒序說而朱傳自孤行於天壤雖屬令甲所尊亦以其持論之正也歟然即就序說詮之毛萇以詩之狡童為斥昭公鄭康成以為喻昭公之所用非人孔穎逹曰箋義為長狡童之不斥昭公昔人已有定論矣蘀他落反兮蘀兮風其吹女音汝叔兮伯兮倡昌亮反予和胡卧反叶户圭反女集傳興也蘀木槁而將落者也毛氏萇曰蘀槁也孔氏穎逹曰七月云十月隕蘀傳曰蘀落也然則落葉謂之蘀此云蘀槁者謂枯槁乃落也女指蘀而言也叔伯男子之字也孔氏穎逹曰士冠禮為冠者作字云伯某甫則叔伯是長幼之異字予女子自予也女叔伯也孔氏穎逹曰予女相對之語此淫女之詞言蘀兮蘀兮則風將吹女矣叔兮伯兮則盍倡予而予將和女矣集說徐氏光啓曰以葉蘀而風吹興彼倡而此和取相應相求之意朱氏道行曰風吹蘀落男倡女和情有固然但不應啓自女口望倡予者之亟亟而令予得以和也附録鄭氏康成曰叔伯羣臣相謂也羣臣自以强弱相服女倡矣我則将和之言此者刺其自專也李氏樗曰君行於上臣從於下今也臣行事而不禀命於君是專命也嚴氏粲曰此小臣有憂國之心呼諸大夫而告之言槁葉風吹不能久矣豈可坐視以為無與於己而不相與扶持之乎叔伯諸大夫其亟圗之患無其倡不患無和之者也蘀兮蘀兮風其漂匹遙反女叔兮伯兮倡予要於遙反女集傳興也漂飄同毛氏萇曰漂猶吹也要成也唐氏汝諤曰要有成終之義集說輔氏廣曰爾能倡予則予將成女之志視前章所謂和女者其情益急矣總論朱氏公遷曰此專以語相應為興先和之後要之言之序也附録吕氏祖謙曰昭公微弱孤危其羣臣相謂國勢如槁葉之待衝風難將及矣叔乎伯乎盍各自謀爾倡我則我和女要女矣要謂要結也蘀兮二章章四句附録胡氏紹曾曰舊謂木葉槁待風乃落人臣待君倡而後和風喻號令也今羣臣自相倡和故刺其專又或因國勢不安不啻如發蒙振落者遂相呼而有同心之􅁩乎此則猶是忠義之情矣案此詩序以為君弱臣强不倡而和蓋指忽微弱孤危難將及矣叔伯羣臣相謂也朱子以為此亦淫女之詞叔伯男子之字一則曰憂國之篇一則曰狹邪之作相去何啻霄壤然朱子以後諸儒卒從序說者多蓋以詩詞未見有男女之情事也大抵去聖久逺微意難窺而因經釋義朱傳可得其八九然漢儒以事證詩考見當時得失雖閒有傅㑹而其近理者要亦不可廢爾彼狡童兮不與我言兮維子之故使我不能餐七丹反叶七宣反兮集傳賦也此亦淫女見絶而戲其人之詞言悅己者衆子雖見絶未至於使我不能餐也集說唐氏汝諤曰反言以戲之第此戲謔生於見棄之後與山有扶蘇不同相與言者有人豈以狡童之故而食不下咽蓋絶意之詞附録鄭氏康成曰不與我言者賢者欲與忽圗國之政事而忽不能受之故云然嚴氏粲曰忽不與賢人圖事賢者憂之不欲斥忽而斥其所用之人也為告忽言之故指狡童為彼而稱忽為子曰彼狡獪之童少不更事恃權寵而侮老成故不與我言也彼狡童不足恤吾惟憂君之故恐為所誤至於不能餐也舊說既以狡童指忽又以子為指忽非也彼以指忽之所用子以稱忽則語意抑揚分明矣彼者薄之之辭子者親之之辭也彼狡童兮不與我食兮維子之故使我不能息兮集傳賦也息安也集說黄氏佐曰戲之之意反復道之總論朱子曰聖人言鄭聲淫者蓋鄭人之詩多是言當時風俗男女淫奔故有此等語狡童想說當時之人非刺其君也經書多被人說壊且如狡童詩安得當時人民敢指其君為狡童况忽之所為可謂之愚豈得為狡當是男女相怨之詩輔氏廣曰男子之淫佚非狂則狡以狡童二字言之則知其下兩句是反而戲之之辭若以為眞不能餐與息則不應謂之狡童也附録范氏祖禹曰昭公孤危將亡君子憂之至於不能餐息愛君之至也夫不與我言不與我食則棄賢可知也然賢人豈以君之不知而浩然以忘之哉亦盡其忠愛以憂之而已吕氏祖謙曰賢者於忽懇懇如此而忽不之察焉上下可謂不交矣疎其可親親其可疎斯其所以亡也狡童二章章四句附録嚴氏粲曰狡童或以為指忽或以為指蔡仲春秋書忽乃聖人筆削以示褒貶首序稱忽亦國史所題經聖人之手忽以世子為鄭君其當時國人作詩義不得目為狡童也若指祭仲則仲自莊公時已為卿且為莊公取鄧曼而生昭公當昭公即位仲已老矣不應目為童也今考山有扶蘇詩刺忽所美非美乃見狂且狡童是所用之人非狂即狡此詩正指忽所用之人耳聖人刪詩以垂世教安取目君為狡童乎案序狡童刺忽也不能與賢人圖事權臣擅命也毛萇解狡童即斥忽程子曰春秋書忽止曰鄭忽蓋不以忽為君故也不以為君故詩人目之為狡童是亦箕子黍離歌之遺意矣朱子謂忽不幸而失國况方刺其不能與賢人圗事則猶在位也豈可忘君臣之分而以狡童目之斯論有闗綱常名教者甚大足正千古傳習之失但以為淫女見絶反言以戲之曰悅己者衆子雖見絶未至於使我不能餐與息也未至之義詩無其文朱子門人疑詩謂彼謂子非指一人而言云不能餐者為憂忽之辭云彼狡童者指當時擅命之臣嘗以質諸講席矣至嚴粲直斷曰彼以指忽所用之人子以稱忽語意分明又儒先謂禮諸侯即位未踰年稱子如此解則足顯詩人忠愛之心而不失君臣之分似當以嚴說為優矣子惠思我褰裳渉溱側巾反子不我思豈無他人狂童之狂也且子餘反集傳賦也惠愛也溱鄭水名水經潧水出鄭縣西比南入于洧水陸氏徳明曰說文溱作潧云潧水出鄭溱水出桂陽也狂童猶狂且狡童也且語辭也淫女語其所私者曰子惠然而思我則將褰裳而渉溱以從子子不我思則豈無他人之可從而必於子哉狂童之狂也且亦謔之之辭集說魏氏浣初曰褰裳渉溱子思專而我思亦專豈無他人子意泛而我意亦泛朱氏道行曰思我則褰裳以就不思我則又顧之他較賦揚水者維予與女之歌又不可同日道矣附録鄭氏康成曰子者斥大國之正卿范氏處義曰忽之與突更入迭出皆祭仲之徒為之故國人思大國仗義以定其邪正也大國苟能惠然肯來思我國之亂當褰裳渉溱而至非甚難也黃氏佐曰言諸侯衆矣爾不我思則當有他國思我者耳朱子舊注曰所以然者狂童之狂已甚而不可緩也子惠思我褰裳渉洧叶于己反子不我思豈無他士鉏里反狂童之狂也且集傳賦也洧亦鄭水名梁氏益曰地理志云洧水出陽城山東南至長平入潁今汴梁之洧川縣地近鄭州士未娶者之稱總論唐氏汝諤曰此淫女欲所私者思己而故謔之也溱洧未必褰裳可渉特明其至之易耳狂童直是謔辭有相眷戀之意附録黃氏櫄曰祭仲恣其狂狡之行弄其君於股掌之上故國人思大國之正已而怨諸侯之不我救也且言狂童之狂日甚以見權臣擅命而舉鄭國無如之何也褰裳二章章五句集說輔氏廣曰婦人從一而終者也狡童褰裳之詩則其縱欲而賊理也甚矣附録嚴氏粲曰鄭人始作蘀兮望大夫相與扶持之既無其人則又作褰裳望大國之見正也王道既微小國無所控愬往往思方伯之拯已霸圗能無興乎是可以觀世變矣案序褰裳思正已也孔穎逹曰狂童謂突也忽以桓十一年立其年九月突歸於鄭忽出奔衞桓十五年突出奔蔡忽復歸于鄭其年九月突入於櫟與忽爭國忽微弱不能逐突故國人思大國之正己也左傳鄭六卿餞韓宣子于郊皆賦子大叔賦褰裳宣子曰起在此敢勤子至於他人乎子大叔拜蓋拜韓起之有鄭而許己也是自有此詩皆不作淫風觀矣朱子初解亦云所以然者狂童之狂已甚不可緩也本從序義後以刺忽之詩太多故定為淫女謔其所私之詞况鄭風語意類多輕佻律以男女調笑固亦相符也子之丰芳容反叶芳用反兮俟我乎巷叶胡貢反兮悔予不送兮集傳賦也丰豐滿也巷門外也孔氏穎逹曰門外之道也婦人所期之男子己俟乎巷而婦人以有異志不從既則悔之而作是詩也集說朱氏道行曰此詩意在與行與歸而發端在悔予二字子之丰兮嘉其貎之揚也俟巷不送見屬意自子負情自予以是悔謝之附録鄭氏康成曰子謂親迎者有親迎我者面貌丰丰然豐滿出門而俟我於巷中悔我不送是子而去也子之昌兮俟我乎堂兮悔予不將兮集傳賦也昌盛壯貌將亦送也集說朱氏道行曰俟堂則較巷而更密邇矣將不止送便有暱就之意衣於既反錦褧苦迥反衣裳錦褧裳叔兮伯兮駕予與行叶户郎反集傳賦也褧襌音丹也鄭氏康成曰以襌縠為之中衣裳用錦而上加襌榖焉庶人之妻嫁服也孔氏穎逹曰婦人之服不殊裳而經衣裳異文者以詩須韻句故别言之耳其實婦人之服衣裳連俱用錦皆有褧下章倒其文互言之叔伯或人之字也毛氏萇曰叔伯迎己者郝氏敬曰叔伯不定其人之辭婦人既悔其始之不送而失此人也則曰我之服飾既盛備矣豈無駕車以迎我而偕行者乎集說沈氏守正曰始之不往有别志也叔伯非呼其初迎之人也裳錦褧裳衣錦褧衣叔兮伯兮駕予與歸集傳賦也婦人謂嫁曰歸總論朱氏公遷曰既悔不從其人繼又變志於他人縱欲之意以漸而深胡氏紹曾曰人當悔其前失何反悔其不奔也鄭之俗日以偷而欲之中人有愈汨愈迷者丰四章二章章三句二章章四句集說輔氏廣曰親迎之禮在六禮之後豈有親迎者己在乎堂而反不行者况鄭風之淫亂乎附録李氏樗曰觀此章則鄭風俗可見矣始也男子親迎女則不從其失正也如此及其終也已失身於他人欲復從昔日親迎之男子其失正也又如此此詩所以刺之也案序丰刺亂也鄭孔以為鄭國衰亂昏姻禮廢有男親迎而女不從者已而悔焉思復從之其失在女子也朱子則不作親迎觀以女所期之男子俟巷俟堂而女有異志不從既悔失此人而又言服飾既盛備豈無迎我者則其慾為更奢矣蓋先王之教化不行民閒之風俗日壊而鄭為尤甚存此詩者重傷其淫亂也東門之墠音善叶上演反茹音如藘力於反在阪音反叶乎臠反其室則邇其人甚逺集傳賦也東門城東門也嚴氏粲曰東門鄭要㑹之地隐公四年左傳宋公陳侯蔡人衞人伐鄭圍其東門墠除地町町者梁氏益曰蟬除地去草也封土為壇除地為墠町町言有町畦茹蘆茅蒐也一名茜可以染絳陸氏璣曰茹藘蒨草也齊人謂之茜今圃人或作畦種蒔貨殖傳云巵茜千石亦比千乘之家陂者曰阪郭氏璞曰陂陀不平門之旁有墠墠之外有阪阪之上有草識其所與淫者之居也室邇人逺者思之而未得見之詞也集說鄭氏康成曰其室則近謂所欲奔男之家望其來迎己而不來則為逺嚴氏粲曰東門有墠其墠之外有阪茹藘之草生焉此男子所居之處也女欲奔之而未遂故言其室則近不難至也其人甚逺未得就之也東門之栗有踐家室豈不爾思子不我即集傳賦也踐行列貌門之旁有栗毛氏萇曰栗行上栗也孔氏穎逹曰栗在東門之外不處園圃之閒則是表道樹也故云行上栗行謂道也左傳云趙武魏絳斬行栗杜預注云行栗表道樹栗之下有成行列之家室亦識其處也即就也輔氏廣曰思之切而冀其亟來就己之辭集說孔氏穎逹曰栗有美味已有美色故女以自喻曰我豈不於汝思望之乎但子不於我來就迎之故我無由得往耳女當待禮從男今欲男就迎即去故刺之朱氏道行曰栗在門傍栗下家室成行抒寫上文景物之未盡者不我即有冀其終即意曰人曰子指男子言姚氏舜牧曰貞者惟恐其凂淫者惟恐其不即總論范氏處義曰始期於茹藘之阪奈其人則尚相逺終期於栗林之室奈其人不相即刺其相奔之情而謂邇其室而未親履其室而未就也東門之墠二章章四句集說孔氏穎逹曰二章皆女奔男之事也上篇女違而不至此復有不待禮而相奔者俱是淫風故名為刺也許氏謙曰朱子謂刺詩雖有鋪陳其事不加一辭者而賦之之人常在所賦之外凡若其自言者則淫邪之人所自賦也嘗於桑中之序論之是固然矣然以後世觀之放淫之辭深能道狎邪之情状者未必皆其所自作亦當時善為詞章而深知風俗者為之也故愚於東門之墠以為詩人道其男女倡和淫邪之言非其自作此類亦多非獨此篇亦非獨淫邪之詩為然也風雨淒淒七西反雞鳴喈喈音皆叶居奚反既見君子云胡不夷集傳賦也淒淒寒凉之氣喈喈雞鳴之聲錢氏天錫曰淒淒喈喈極道其時之無聊也風雨晦冥蓋淫奔之時君子指所期之男子也夷平也嚴氏粲曰毛傳以夷為悅心悅則夷平憂則鬰結也淫奔之女言當此之時見其所期之人而心悅也集說朱子曰我得見此人則我心之所思豈不坦然而平哉朱氏道行曰淒淒風雨既寒且濡喈喈雞鳴尚未逹旦乘此際得見君子向之種種反側者至此克慰故曰夷附録毛氏萇曰興也風且雨雞猶守時而鳴鄭氏康成曰喻君子雖居亂世不變改其節度思而見之云何而心不說范氏處義曰雞鳴必以時為徳之信故詩人有取焉風雨瀟瀟雞鳴膠膠叶音驕既見君子云胡不瘳叶憐蕭反集傳賦也瀟瀟風雨之聲膠膠猶喈喈也錢氏文子曰膠膠聲雜也嚴氏粲曰膠膠擾擾是雜之意謂羣雞之聲也瘳病愈也言積思之病至此而愈也集說朱氏道行曰膠膠之鳴羣起相屬也積思之病一見而忘故曰瘳風雨如晦叶呼洧反雞鳴不已既見君子云胡不喜集傳賦也晦昏已止也集說輔氏廣曰喜甚於瘳瘳甚於夷云胡不喜言云如之何而不喜也蓋喜劇之辭附録鄭氏康成曰雞不為如晦而止不鳴范氏祖禹曰如晦又甚於瀟瀟而雞鳴不已此所以為不改其度總論顧氏起元曰此淫女見所朝而悅也三章一意上二句言其時指其所期也下二句表其心如其所期也附録陸氏佃曰言雞之信度如此秋氣慘而淒淒風雨如此則疑於不能和秋物脫而瀟瀟風雨如此則疑於不能固嚮晦則君子入以宴息之時也風雨如此則又疑於己今曰喈喈膠膠不已則亂世君子不改其度之譬也風雨三章章四句附録范氏處義曰嵗寒而後知松柏疾風而後知勁草遭亂世而不改其度君子人也故詩人思之案序雞鳴思君子也亂世則思君子不改其度焉所謂亂世者稽諸鄭譜疏及嚴粲詩緝之說以鄭公子之亂時事反覆士之怵於利害失其常度故詩人有思夫君子是在突與忽更入更出之閒也其詩見采於國史後鄭之賢大夫皆誦習之於燕享之㑹至賦以言志焉所以自兩漢六朝及唐宋諸儒皆傳其說守而不易獨至朱子而直斷為詩詞輕佻狎暱非思賢之意風雨晦冥為淫奔之時而南宋元明諸儒率不宗其說且辨之曰淫詩未見有稱其人為君子者蓋風雨雜至而如晦喻世之昏亂雞鳴在暗而思曙喻君子居亂而思治君子不改其度則世道可挽故見之而心悅如疾之去其體焉以此觀詩古說亦可通也夫青青子衿音金悠悠我心縱我不往子寧不嗣音集傳賦也青青純音準緣去聲之色具父母衣純以青孔氏穎逹曰衿色雖一青而重言青青者古人之復言也下言青青子佩謂青組綬耳都人士狐裘黃黃謂裘色黃耳深衣云具父母衣純以青孤子衣純以素是無父母者用素子男子也衿領也爾雅衣皆音恣謂之襟孫氏炎曰交領也孔氏穎逹曰衿與襟音義同衿是領之别名悠悠思之長也我女子自我也嗣音繼續其聲問也此亦淫奔之詩集說鄒氏泉曰思其服想見其人也朱氏道行曰悠悠之心欲往之心也我往難而子音易以是尤其不嗣音思之切而冀之至矣附録毛氏萇曰青衿學子之所服嗣習也古者教以詩樂誦之歌之絃之舞之鄭氏康成曰學子俱在學校之中已留彼去故随而思之嗣續也女曾不傳聲問我以思責其忘己程子曰世亂學校不修學者棄業賢者念之故曰悠悠我心縱我不可以反求於汝謂往教强聒也子寧不思其所學而繼其音問遽爾棄絶於善道乎青青子佩叶蒲睂反悠悠我思叶新齎反縱我不往子寧不來叶陵之反集傳賦也青青組綬之色佩佩玉也孔氏穎逹曰禮不佩青玉而云青青子佩者佩玉以組綬帶之士佩瓀珉而青組綬故云青青謂組綬也許氏謙曰綬玉藻注所以貫佩玉相承受者組綬一物也集說朱氏道行曰來則不止嗣音我心慰矣附録嚴氏粲曰既不繼聲問亦不來訪挑他刀反兮達他末反叶他悅反兮在城闕兮一日不見如三月兮集傳賦也挑輕儇烜平聲跳躍之貌逹放恣也集說季氏本曰男子好遊而不來也顧氏夢麟曰一日不見即如三月之久而况不止一日也則思何能已附録鄭氏康成曰君子之學以文㑹友以友輔仁獨學而無友則孤陋而寡聞故思之甚孔氏穎逹曰毛以為禮樂之道不學則廢何為廢學而遊觀釋宫云觀謂之闕孫炎曰宫門雙闕舊章懸焉使民觀之因謂之觀如爾雅之文則宫門觀闕不宜乗之侯望此言城之上别有高闕非宫闕也歐陽氏修曰朋友不復羣居桃逹城闕間日遨遊無度者也總論輔氏廣曰此淫女望其所與私者既無音問又不見其來而極其怨思之辭也朱氏公遷曰一章二章致思而微責之末章切責而深思之子衿三章章四句附録孔氏穎逹曰鄭國衰亂不修學校學者分散或去或留經三章皆陳留者責去者之辭校是學之别名非謂鄭國獨稱校也言學校廢者謂鄭國之人廢於學問耳非謂廢毁學宫也程子曰世治則庠序之教行有法以率之不率教者有至於移屏不齒又禮義廉讓之風所漸陶父兄朋友之義所勸督故人莫不强於進學及夫亂世上不復主其教則無以率之風俗雜亂浮偷父兄所教者趨利朋友所習者從時故人莫不肆情廢惰為自棄之人雖有賢者欲强之於學亦豈能也故悲傷之而已案序子衿刺學校廢也世亂則學校不修焉左傳襄公三十一年鄭人游鄊校以論執政然明曰毁鄉校如何子産曰何為蓋鄭之有學校也舊矣鄭康成曰國亂人棄學業范祖禹曰大亂五世學廢之由也此詩自漢及唐宋元明諸儒皆主學校之說而集傳定為淫奔之作他日朱子作白鹿洞賦云廣青衿之疑問則仍用序說矣今集傳已是不刋而古義亦有可據且朱子曽所引用故節録昔儒之說如右揚之水不流束楚終鮮息淺反兄弟維予與女女汝同無信人之言人實迋居望反女集傳興也兄弟婚姻之稱爾雅婦之黨為婚兄弟壻之黨為姻兄弟注云古人皆謂婚姻為兄弟禮所謂不得嗣為兄弟是也見禮記曾子問陳氏櫟曰夫婦有兄弟之義夫倡婦隨猶兄先弟從所謂宴爾新婚如兄如弟是也陳氏澔曰兄弟者亦親親之辭也予女男女自相謂也人他人也迋與誑同杜氏預曰迋欺也淫者相謂言揚之水則不流束楚矣終鮮兄弟則維予與女矣豈可以他人離閒之言而疑之哉彼人之言特誑女耳集說輔氏廣曰悠揚緩弱之水不足以流東楚故以興兄弟之寡少維予與女而已此淫女為人所離間而自解於其所私之辭附録鄭氏康成曰作此詩者同姓臣也范氏祖禹曰揚之水不流束楚弱也終鮮兄弟唯予與女無親也無信人之言人實迋女小人衆也朱子曰兄弟既不相容所與親者二人而已然亦不能自保於讒閒此忽之所以亡也揚之水不流束薪終鮮兄弟維予二人無信人之言人實不信叶斯人反集傳興也總論姚氏舜牧曰迋是一時之妄言不信是其平素之不誠也朱氏道行曰兩章一意縂是堅維予與女之信附録吕氏祖謙曰無信人之言非教之以不信人言也忽既微弱强公子復多其臣大抵懷二心而外市僅有一二人實心向之者乃暗於情偽不知所倚故提耳而告之也揚之水二章章六句附録嚴氏粲曰忽非無臣也臣非忠良雖有之如無之揚之水三篇王風言平王不能令諸侯唐風言晉昭不能制沃此詩言忽不能制權臣皆興微弱也忽能用忠臣良士則轉弱為强矣案序揚之水閔無臣也漢唐宋諸儒之解曰忽微弱政令不行於臣下而親戚擕貳終寡友于之恩又無忠良之士與之同心将至亡滅故君子閔之是此詩之作在忽未遇髙渠彌之難之前也吕祖謙讀詩記載朱子初解以為所親者惟二人亦不能自保於讒閒此忽之所以亡是與序義同矣後改為淫女相謂其所私之言而於兄弟二字難解則曰兄弟婚姻之稱禮所謂不得嗣為兄弟是也後儒疑之以壻辭於女家曰恐不得嗣為兄弟者言有大故不可嫁娶将無中表兄弟之續非夫婦而有兄弟之稱然茲亦一解不必具論即就婚姻詮釋兄弟後儒謂與終鮮文義究有未協况揚之水三篇皆興微弱一言平王一言晉昭此言鄭忽詩同一例則似仍從朱子初解之為長矣出其東門有女如雲雖則如雲匪我思存縞古老反衣綦巨基反巾聊樂音洛我員于云反集傳賦也如雲美且衆也縞白色綦蒼艾色孔氏穎逹曰廣雅云縞細繒也戰國䇿云强弩之餘不能穿魯縞然則縞是薄繒不染故色白也綦者青色之小别青而微白為艾草之色也縞衣綦巾女服之貧陋者馮氏復京曰按禮記左佩紛帨紛帨即巾也此巾宜為佩巾或以為婦人裹頭之巾此人自目其室家也員與云同語辭也人見淫奔之女而作此詩以為此女雖美且衆而非我思之所存也如己之室家雖貧且陋而聊可以自樂也是時淫風大行而其間乃有如此之人亦可謂能自好而不為習俗所移矣羞惡之心人皆有之豈不信哉集說輔氏廣曰目之所覩若可美也反之於心而知其非所當慕縞衣綦巾聊樂我員則安分自樂而不狥俗以忘己也出其闉音因闍音都有女如荼音徒雖則如荼匪我思且子餘反縞衣茹藘聊可與娛集傳賦也闉曲城也陳氏鵬飛曰門之外有副城回曲以障門者謂之闉闍城臺也孔氏穎逹曰闍是城上之臺謂當門臺也荼茅華輕白可愛者也毛氏萇曰荼英荼也孔氏穎逹曰荼是茅草秀出之穗言英荼者英是白貌吳語黄池之㑹白常白旗素甲白羽之矰望之如荼李氏樗曰漢禮樂志曰顔如荼應邵曰荼野菅白華也顔師古曰菅茅也言美色如茅荼之柔也且語助辭茹藘可以染絳故以名衣服之色娛樂也集說輔氏廣曰聊樂我員自樂其樂也聊可與娛夫婦同樂其樂也黄氏佐曰兩言縞衣而分綦巾與茹藘者巾以擁蔽其面茹藘則染其布裳者猶今云荆釵布裙也自足之意反覆道之總論陳氏組綬曰詩意只重不慕非禮之色其言自樂於己者正見不動心於彼也出其東門二章章六句集說朱子曰此詩却是個識道理人做鄭詩雖淫亂然此詩却如此好女曰雞鳴一詩亦好王氏柏曰鄭詩多淫奔忽有出其東門一詩守義安分為得性情之正可見天理之在人心有未嘗亡案出其東門序曰閔亂也毛萇以為兵革不息男女相棄民人思保其室家故詩人閔之歴代儒者竝沿其說然細玩經文詞意從容無干戈擾攘男奔女竄景象朱子定為鄭風淫亂而此人能不染汙俗安其室家之貧陋以自止於禮義可謂得風人之正解矣乃知序言閔亂者是閔淫亂彼牽鄭事以說詩於經無所當也至經云如雲如荼者言冶容誨淫盡成習氣猶舉世皆濁之意若實指為出東門而見淫女之衆如此則又以詞而害志矣野有蔓草零露漙徒端反叶上兖反兮有美一人清揚婉兮邂逅相遇適我願叶五逺反兮集傳賦而興也蔓延也漙露多貌清揚睂目之閒婉然美也黄氏佐曰清揚以睂目之閒言者猶楚辭目成之意邂逅不期而㑹也嚴氏粲曰邂逅謂其議速成猶迨其今兮之意今人言事之速者云邂逅而成男女相遇於野田草露之閒故賦其所在以起興言野有蔓草則零露􅄎矣有美一人則清揚婉矣邂逅相遇則得以適我願矣集說歐陽氏修曰詩文是男女昏娶失時邂逅相遇於野草之閒耳鄭以蔓草有露為仲春遂引周禮㑹男女之禮者衍說也魏氏浣初曰此賦其相遇之情蔓草得露其澤渥美人得遇其意濃故又以為興附録孔氏穎逹曰王肅云草之所以能延蔓被盛露也民之所以能蕃息䝉君澤也恩澤不流於下男女失時於時之民乃思得有美好之一人邂逅適願由不得早婚故思相逢遇野有蔓草零露瀼瀼有美一人婉如清揚邂逅相遇與子偕臧集傳賦而興也瀼瀼亦露多貌臧美也與子偕臧言各得其所欲也集說范氏處義曰男女相悦由其顔色之美故反復言清揚之婉總論輔氏廣曰適我願矣與子偕臧則與前篇之聊樂我員聊可與娛者異矣大抵樂於理者和易安徐樂於欲者沉溺蕩肆朱氏公遷曰喜幸之意反覆道之野有蔓草二章章六句附録蘓氏轍曰鄭人困於亂政感蔓草之得露零以生而自傷不及也故思得君子以被其膏澤思之而不可得然猶庶幾邂逅而見之以適我願故鄭伯享趙文子於垂隴子太叔賦野有蔓草文子曰吾子之惠也意取此矣或曰有美一人婦人之謂也然則彼姝者子何以畀之亦婦人也哉吴氏肅公曰蔓草為朋友期㑹之詩韓詩外傳孔子遭齊程木子於郯傾盖而語終日顧子路束帛十匹以贈先生子路對曰士不中道相見女無媒而嫁者君子不行也孔子曰夫詩不云乎野有蔓草零露􅄎兮有美一人清揚婉兮邂逅相遇適我願兮齊程木子天下之賢士也吾於是而不贈終身不之見也案序野有蔓草思遇時也盖言思得君子以被其膏澤庶幾邂逅而遇之其詩兩見於左傳鄭享趙孟而子太叔賦此趙孟以為受其惠鄭餞韓起而子齹又賦此宣子以為孺子善哉吾有望矣一見於韓詩外傳孔子遭齊程木子於郯傾盖而語顧子路束帛以贈子路對曰士不中道相見孔子乃詠此詩以曉之是皆取士君子邂逅相遇為義有美云者猶簡兮之稱彼美爾時未有講師之說也至毛萇輩衍之曰君之澤不下流民窮於兵革男女失時思不期而㑹焉其謂澤不下流者因零露之文取反興以為解猶屬寓言也逮朱子則言田野草露之間男女邂逅心許目成以苟合為偕臧因賦其事以起興是實有之矣盖以鄭風而意之也縂之觀詩而不膠其文則前説皆可旁通若執字句以求則經㫖甚淺朱子所解原屬不可易也歟溱與洧方渙渙叶于元反兮士與女方秉蕑古顔反叶古賢反兮女曰觀乎士曰既且子餘反且往觀乎洧之外洵訏况于反且樂音洛維士與女伊其相謔贈之以勺藥集傳賦而興也渙渙春水盛貌蓋冰解而水散之時也陸氏徳明曰渙韓詩作洹音丸說文作汎音馮王氏應麟曰三月桃花水下之時蕑蘭也其莖葉似澤蘭廣而長節節中赤高四五尺陸氏璣曰蕑即蘭香草也且語辭洵信訏大也勺藥亦香草也三月開花芳色可愛劉氏瑾曰本草注曰勺藥有二種有草勺藥木勺藥鄭國之俗三月上巳之辰采蘭水上以祓除不祥應氏劭曰周禮女巫嵗時以祓除釁浴禊者潔也已者祉也邪疾已去祈介祉也黄氏一正曰上巳者三月第一巳也續漢書禮儀志曰三月上巳官人竝禊飲東流水上宋書云魏已後但用三日不復用已故其女問於士曰盍往觀乎士曰吾既往矣女復要之曰且往觀乎葢洧水之外其地信寛大而可樂也於是士女相與戲謔且以勺藥為贈陸氏佃曰韓詩曰勺藥離草也牛亨問曰将離相贈以勺藥者何也董子荅曰勺藥一名可離将别故贈之亦猶相招贈之以文無故文無一名當歸而結恩情之厚也此詩淫奔者自敘之詞集說鄭氏康成曰男女竝出託采芬香之草而為淫泆之行陳氏鵬飛曰勺藥者溱洧之地富有之詩人賦物有所因也黄氏一正曰水上祓除之事古今有之但鄭之士女於此相要戲謔為風俗淫亂耳陳氏推曰采蘭水上鄭俗皆然故以士女秉蕑為賦而又以溱與洧引起士與女為興此在詩體中又是一格溱與洧瀏音留其清矣士與女殷其盈矣女曰觀乎士曰既且且往觀乎洧之外洵訏且樂維士與女伊其將謔贈之以勺藥集傳賦而興也瀏深貌殷衆也朱氏道行曰殷其盈通溱洧上皆是士女将當作相聲之誤也嚴氏粲曰將相將也方且也猶將安將樂之將集說陸氏佃曰溱洧祓除其風俗之舊也及其甚也淫風大行過時而不反來者日益以衆故二章曰士與女殷其盈矣總論輔氏廣曰鄭國土地寛平人物繁麗情意駘蕩風俗淫泆讀是詩者可以盡得之黄氏佐曰俗荒於遊淫奔之所由起也方且託之聲詩以相夸詡慆淫之漸染也深且久矣溱洧二章章十二句集說輔氏廣曰鄭風淫奔諸篇皆有所屬惟溱洧之詩則見其國俗淫蕩蓋無人不如此也故居其未以見鄭俗之不美焉嚴氏粲曰鄭衞多淫詩漢地理志皆以為風土之習固然若是則教化為虚言而二南之義誣矣附録孔氏穎逹曰男女當以禮相配今淫泆如是故陳之以刺亂張氏彩曰此篇曰士曰女皆旁觀而述之之詞所謂直書其事而醜穢自見者也鄭國二十一篇五十三章二百八十三句集傳鄭衞之樂皆為淫聲然以詩考之衞詩三十有九而淫奔之詩才四之一鄭詩二十有一而淫奔之詩已不翅七之五王氏應麟曰公羊疏許氏云鄭詩二十一篇說婦人者十九衞猶為男悦女之詞而鄭皆為女惑男之語衞人猶多刺譏懲創之意而鄭人幾於蕩然無復羞愧悔悟之萌是則鄭聲之淫有甚於衞矣故夫子論為邦獨以鄭聲為戒而不及衞葢舉重而言固自有次第也詩可以觀豈不信哉劉氏瑾曰自昔說詩者唯以東門之墠與溱洧為淫詩今朱子乃例以淫奔斥之者蓋即其辭而得其情正以發明放鄭聲之㫖不然則衞齊陳詩諸篇非無淫聲夫子何獨以鄭聲為當放哉集說班氏固曰鄭土陿而險山居谷汲男女亟聚㑹故其俗淫范氏祖禹曰樂之淫者曰鄭衞如有王者必放鄭聲然則亂闗睢者莫如鄭衞故鄭詩終於亂之極者焉附録嚴氏粲曰鄭衞皆淫聲孔子獨先於鄭今鄭之淫詩顧少於衞何也詩之見在者孔子所存以為世戒也聖筆所刪多矣言鄭聲淫者舉其大體言之不繫今詩之多寡不必盡黜國史所題例目之為男女之詩也楊氏守陳曰序多推詩意於言外而為迂曲之說傳多求詩意於辭閒而立坦明之論此其所以異之大畧也楊氏愼曰鄭聲淫淫者聲之過也水溢於平曰淫水雨過於節曰淫雨聲溢於樂曰淫聲一也非謂鄭詩皆淫也案衞風桑中篇序謂刺奔鄭風溱洧篇序謂刺亂吕祖謙於桑中篇申其説朱子於二詩俱改為淫奔者所自作舉祖謙之説辨之至詳且切矣然自南宋以迄元明諸儒卒多異議大約不出馬端臨之說而或又進曰放鄭聲者主聲不主詩子夏對文侯所謂宋鄭衞齊四音皆淫於色而宋本無詩或曰凡樂非雅者皆謂之鄭聲故漢志云鄭聲施於朝廷或曰得聲而得詩者三百篇則係之風雅頌得詩而不得聲者則置之謂之逸詩或曰刺奔刺亂國史所題應是當時情事所以王應麟方回輩以為前輩未了公案而莫敢定也夫聖人編詩原以正樂非以説義入漢而齊魯韓毛以訓詁相高而聲音之道日微然太樂氏肄業仲尼三百篇瞽史例或能歌逮東漢末雅樂郎杜䕫已老只記習鹿鳴騶虞伐檀文王四篇餘聲不傳太和末又失其三至晉室而鹿鳴又無傳是詩存而聲失蓋已久矣朱子止據理與詞以求詩誠為卓識祖謙祖述中聲之説可置勿論至集傳謂淫者自述古序謂聞者作刺縂於聖人錄以垂戒之意相符在古序傳流既逺原不能盡廢而朱子案經詮解更為較切自足昭示後世矣欽定詩經傳說彚纂卷五
