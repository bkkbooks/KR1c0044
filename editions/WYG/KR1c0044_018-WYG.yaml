body:
  text: 欽定四庫全書欽定詩經傳說彚纂卷十六都人士之什二之八彼都人士狐裘黃黃其容不改出言有章行歸于周萬民所望叶音亡集傳賦也都王都也鄭氏康成曰城郭之域曰都孔氏穎達曰舉都邑者以都邑之人近政化有道先被其德也黃黃狐裘色也鄭氏康成曰冬則衣狐裘黃黃然取溫裕而已不改有常也章文章也周鎬京也亂離之後人不復見昔日都邑之盛人物儀容之美而作此詩以歎惜之也集說范氏處義曰此章言都人之爲士者服先王之法服道先王之法言其服與言旣相稱故萬民皆望其容服不生慢易而爲法也輔氏廣曰容則德之符也言則德之發也容言如是則其德可知彼都人士臺笠緇撮七活反叶租悅反彼君子女綢直畱反直如髮叶方月反我不見兮我心不說音悅集傳賦也臺夫音扶須也許氏謙曰臺見南山有臺傳緇撮緇布冠也其制小僅可撮其髻也君子女都人貴家之女也綢直如髮未詳其義然以四章五章推之亦言其髮之美耳陸氏徳明曰綢密也朱氏公遷曰綢直言其多而不曲局也或云如字當作其字集說嚴氏粲曰言都人之男子以臺草爲笠以緇布爲冠撮持其髮見儉素也彼君子家之女其爲髻密而直如其本髮亦儉素也密是其髮生之密直亦髮之本性緊梳則順其髮性之直故曰密直如髮疾時奢淫故我不見如此之風俗心思之而憂也彼都人士充耳琇音秀實彼君子女謂之尹吉我不見兮我心苑於粉反結叶繳質反集傳賦也琇美石也以美石爲瑱蘇氏轍曰充耳瑱也實塞也尹吉未詳鄭氏曰吉讀爲姞其吉反尹氏姞氏周之昏姻舊姓也人見都人之女咸謂尹氏姞氏之女言其有禮法也孔氏穎達曰常武曰王謂尹氏昭二十三年尹氏立王子朝是其世爲公卿明與周室爲昏姻也韓奕云爲韓姞相攸言汾王之甥是姞與周室爲昏姻也旣世貴舊姓昏連於王室家風不替是有禮法矣李氏曰所謂尹吉猶晉言王謝唐言崔盧也劉氏瑾曰晉之江左王謝唐之山東崔盧皆一時之望族爲世所稱也苑猶屈也積也何氏楷曰風俗通云苑藴也言薪蒸所藴結故有積義集說姚氏舜牧曰尹吉周之著姓大家凡國俗之趨向大抵都效大家之所爲故詩人特稱之徐氏常吉曰充耳琇實言士有禮服謂之尹吉言女有禮法彼都人士垂帶而厲叶落蓋反彼君子女卷音權髮如蠆初邁反我不見兮言從之邁集傳賦也厲垂帶之貌孔氏穎達曰禮大帶垂三尺大帶之垂者名之爲紳而復名爲厲者紳是帶之名厲是垂之貌也卷髮鬢傍短髮不可斂者曲上卷然以爲飾也蠆螫音釋蟲也尾末揵音䖍然似髮之曲上者陸氏徳明曰長尾爲蠆短尾爲蠍揵舉也邁行也蓋曰是不可得見也得見則我從之邁矣思之甚也集說孔氏穎達曰彼都人士垂其帶之飾而有厲然言其服飾有常也彼君子女乃卷曲其髮末如蠆之尾言其容儀有法也我今不見士女如是儀飾是故中心思之欲從之行也徐氏光啓曰言從之邁與行歸二句同意俱是設言得見之喜以甚其不得見之思耳匪伊垂之帶則有餘匪伊卷之髮則有旟我不見兮云何盱喜俱反矣集傳賦也旟揚也盱望也說見何人斯篇此言士之帶非故垂之也帶自有餘耳女之髪非故卷之也髮自有旟耳言其自然閑美不假修飾也然不可得而見矣則如何而不望之乎集說輔氏廣曰後二章但言其帶與髮者以見此猶不可得而見況於言與徳乎徐氏光啓曰服飾氣象固欲其盛美而有意文飾亦非盛世之象惟自然閑美不假修飾則無舒肆冶容之態而民生之咸獲自盡槩可知矣總論鄧氏元錫曰都人士慕舊都化也化自上始服其服文以君子之容有其容文以君子之辭有其辭實以君子之徳民望而歸之非化成俗美孰能與於此今邈不可見矣慕之至也都人士五章章六句集說孔氏穎達曰經言萬民所望明都人爲人所法傚也襄十四年左傳引此二句服䖍曰逸詩也都人士首章有之禮記注亦言毛氏有之三家則亡今韓詩實無此首章時三家列於學官毛詩不得立故服以爲逸終朝采綠不盈一匊弓六反予髮曲局薄言歸沐集傳賦也自旦及食時爲終朝綠王芻也郭氏璞曰菉蓐也今呼鴟脚莎董氏逌曰楚辭曰薋菉葹以盈室王逸云終朝采菉今攷鄭氏說以爲王芻則當逸時字爲菉矣兩手曰匊局卷音權也猶言首如飛蓬也婦人思其君子而言終朝采綠而不盈一匊者思念之深不專於事也又念其髮之曲局於是舍之而歸沐以待其君子之還也集說蘇氏轍曰王芻易得之菜終朝采之而不盈匊意不在所采也婦人夫不在無容飾故曰予髮曲局矣庻幾君子之歸而沐之也終朝采藍盧談反不盈一襜尺占反叶都甘反五日爲期六日不詹音占叶都甘反集傳賦也藍染草也孔氏穎達曰藍可以染青故淮南子云青出於藍月令仲夏無刈藍是可以染之草衣蔽前謂之襜卽蔽膝也詹與瞻同五日爲期去時之約也六日不詹過期而不見也李氏樗曰所謂期逝不至也集說李氏公凱曰君子久役婦人獨處往采藍草易得之物而終一朝之久乃不滿一襜焉是其憂思而不專於事也因慨歎曰昔君子之去也約五日爲歸期今六日而猶不見焉如之何而勿思之子于狩尺救反言韔勅亮反其弓叶姑𢎞反之子于釣言綸之繩集傳賦也之子謂其君子也理絲曰綸言君子若歸而欲往狩耶我則爲之韔其弓欲往釣耶我則爲之綸其繩望之切思之深欲無往而不與之俱也集說吕氏祖謙曰邱氏曰是子往獵我則爲之納弓於韔中往釣我則爲之緡繩於竿今久而不歸思其如此而不可得也何氏楷曰此下二章皆預擬之詞其釣維何維魴音房及鱮音叙叶音湑維魴及鱮薄言觀者叶掌與反集傳賦也於其釣而有獲也又將從而觀之亦上章之意也鄒氏泉曰上兼言狩此偏言釣者因上章釣之文在下接言之蓋亦舉此以該彼也集說董氏逌曰維魴及鱮薄言觀者言其得魚之多使觀者樂也姚氏舜牧曰韔弓綸繩非婦人事而況觀其所爲釣者乎此蓋甚言思之至極耳若曰如其至也我願爲之役與之周旋不舍也總論沈氏守正曰通詩總是思念之情末二章則思中之摹擬也方采綠而忽思髮之曲局而歸沐之情景可想五日六日亦是大約言之耳末二章總是無往而不與之俱意中事詩中景也采綠四章章四句集說郝氏敬曰人情者聖王之田男女居室人之大欲古者用民之力嵗不過三日新昏三月不從政恤其私也今使其室家暌離匹婦銜怨故聖人錄是詩以明王道本乎人情爾芃芃蒲東反黍苗陰雨膏古報反之悠悠南行召伯勞力報反之集傳興也芃芃長大貌悠悠逺行之意宣王封申伯於謝命召穆公往營城邑故將徒役南行而行者作此言芃芃黍苖則惟陰雨能膏之悠悠南行則惟召伯能勞之也蘇氏轍曰宣王國申伯於謝使召伯往營之召公之勞行者猶陰雨之膏黍苖也何氏楷曰勞之謂慰其勞苦恤其飢渇拊循勸勉如天澤沃然其勞也蓋膏也集說孔氏穎達曰言芃芃長大者是黍苖也此黍苖所以得長大者天以陰雨之澤膏潤之故也以興宣王之時衆人所以得悅樂者由王以恩惠之澤養育之故也其時之人在國則蒙君之恩澤其行又得臣之勞來故言悠悠衆多而南行者是營謝邑之人召伯則又能勞來勸悅以先之言知人之勞苦也我任音壬我輦力展反我車我牛叶魚其反我行旣集蓋云歸哉叶將黎反集傳賦也任負任者也孔氏穎達曰謂器物人所負持輦人輓音晚車也周禮鄉師注輦人輓行所以載任器也牛所以駕大車也集成也營謝之役旣成而歸也呂氏祖謙曰邱氏曰蓋云歸哉謂解之使說也何氏楷曰蓋者未定之辭功旣就庶可言歸哉集說王氏安石曰召伯之遇役夫如此嚴氏粲曰二章言營謝之役蓋任輦車牛是工役之事也召穆公之營謝也知役夫之勞故皆呼而諭之曰俟我南行營謝之功已成蓋云歸哉示以歸期安其心也姚氏舜牧曰細玩我任我輦二章數我字似召伯之所以勞之者此民之樂爲役也我徒我御我師我旅我行既集蓋云歸處集傳賦也徒歩行者御乘車者五百人爲旅五旅爲師春秋傳曰君行師從卿行旅從孔氏穎達曰旅屬於師徒行御車還是師旅之人而經别之者以其所司各異故亦歷言以類上章也范氏處義曰召伯天子之卿視君故言師旅也集說王氏安石曰召伯之遇征夫如此朱氏道行曰行役者無不告勞亦無不亟言還歸今獨曰我行旣集便有欣然先竣役而不敢以家念參者召伯之激勸神也肅肅謝功召伯營之烈烈征師召伯成之集傳賦也肅肅嚴正之貌謝邑名申伯所封國也今在鄧州信陽軍皇輿表鄧州今南陽府鄧州信陽軍今汝寧府信陽州隸河南功工役之事也營治也烈烈威武貌征行也集說鄭氏康成曰美召伯治謝邑則使之嚴正將師旅行則有威武也姚氏舜牧曰征師役衆也人衆而役大非威信以號召鼔舞有不能作其勇烈者故曰召伯成之薛氏志學曰肅肅以規模形勢言營之謂區畫董治之也烈烈以趨事赴功言成之謂鼔舞激勸之也原隰旣平泉流旣清召伯有成王心則寧集傳賦也土治曰平水治曰清言召伯營謝邑相其原隰之宜通其水泉之利王氏安石曰原隰旣平則疆其土田故也泉流旣清則理其溝洫故也張氏榜曰建侯開國民事爲重故又以土田言之此功旣成宣王之心則安也朱氏公遷曰當時宣王以徹申伯土田爲命故云然集說呂氏祖謙曰天子子萬姓者也大臣慮四方者也方伯分一面者也申伯之體勢不重則無以鎭定南服召穆公身爲卿士豈得辭其憂責哉宣王雖深居九重宵旰之慮固未嘗一日忘之也必待召公告厥成功而王心始寧焉此眞知職分者也輔氏廣曰此章又重言營謝之功水土悉得其平治者皆召伯成之而天子之心亦得以自安也召伯之出爲營謝耳然謝功旣成而上則有以安夫天子報功之心下則有以成夫師旅威武之勢則其經畫之方保綏之德非有大過人者能如是乎總論許氏謙曰上公則下悅蓋申伯誠有功於天下而封之故民雖勞無怨而且樂道其事也其末章旣喜謝邑之平治頌召伯之成功而歸重於王心之寧忘己之勞以奉其上惟欲得王心之安耳此見忠實之情太平之氣象也鄒氏泉曰首章言召公能勞其役也二章三章言行役者感激勸勉必謝功既成而後歸也四章歸功於召公末章則美其成功之大也黍苖五章章四句集傳此宣王時詩與大雅崧高相表裏姚氏舜牧曰崧高云維申及甫維周之翰四國于蕃四方于宣又云申伯之德柔惠且直揉此萬邦聞于四國則申伯之功德可見矣此王命召伯營申伯之宅民爭勸而樂成之也集說何氏楷曰謝爲荆徐要衝之地封申伯於此則足以鎭撫南國宣王之心則安也觀崧高之詩一則曰南土是保再則曰戎有良翰則王心之所以寧可知不獨謂其足以篤厚元舅克副親親賢賢之念己也隰桑有阿其葉有難乃多反旣見君子其樂音洛下同如何集傳興也隰下溼之處宜桑者也孔氏穎達曰下溼曰隰桑宜在溼潤之所隰之近畔宜桑以今驗之實然也阿美貌難盛貌皆言枝葉條垂之狀此喜見君子之詩言隰桑有阿則其葉有難矣旣見君子則其樂如何哉詞意大槩與菁莪相類然所謂君子則不知其何所指矣或曰比也下章放此劉氏瑾曰所謂比者蓋以隰桑枝葉顔色之美比君子容貌威儀之盛亦與菁莪比意相類集說呂氏祖謙曰是詩三以隰桑爲興皆形容樂見賢者之精神情意也隰桑有阿其葉有沃烏酷反叶鬱縳反旣見君子云何不樂集傳興也沃光澤貌劉氏彝曰沃謂長茂光澤如膏之沃也集說鄒氏泉曰其樂如何欲自言而非言語所能形容也云何不樂欲自止而非在我所能遏抑也隰桑有阿其葉有幽叶於交反旣見君子德音孔膠音交集傳興也幽黒色也孔氏穎達曰難爲葉之茂沃言葉之柔幽是葉之色言桑葉茂盛而柔軟則其色純黒故三章各言其一也膠固也集說輔氏廣曰徳音孔膠謂君子之德音足以感人使之甚膠固而不可解也朱氏公遷曰此章見其可樂之實下章之誠愛亦本於此耳心乎愛叶許旣反矣遐不謂矣中心藏之何日忘之集傳賦也遐與何同表記作瑕鄭氏注曰瑕之言胡也謂猶告也言我中心誠愛君子而旣見之則何不遂以告之而但中心藏之董氏逌曰中心藏之結於心也將使何日而忘之耶呂氏祖謙曰邱氏曰詩人自道其愛賢之意楚辭所謂思公子兮未敢言意蓋如此愛之根於中者深故發之遲而存之久也集說輔氏廣曰上章旣言徳音孔膠故此遂言誠愛之意惟其德音之感人者膠固而不忘故其誠愛之深發之遲存之久而至於如此也姚氏舜牧曰愛出於根心卽從而謂之亦不能盡但藏之中心有不能終忘者耳中心藏正與心乎愛相應總論黃氏佐曰此詩首三章是屢興其見之之喜末一章是極道其愛之之誠隰桑四章章四句白華音花菅音姦兮白茅束兮之子之逺俾我獨兮集傳比也白華野菅也已漚爲菅陸氏璣曰菅似茅而滑澤無毛根下五寸中有白粉者柔韌宜爲索漚乃尤善矣陸氏佃曰未霑人功故謂之野菅菅茅屬也而其華白故曰白華之子斥幽王也俾使也我申后自我也幽王娶申女以爲后又得襃姒而黜申后故申后作此詩言白華爲菅則白茅爲束二物至微猶必相須爲用何之子之遠而俾我獨耶集說朱子曰讀詩之法且如此章蓋言白華與茅尚能相依而我與子乃相去之遠何哉朱氏公遷曰宜相得而反相遺可怨者也附錄蘇氏轍曰取白華而漚之又束以白茅焉言表裏無不潔也今申后之修如此幽王遠之而近襃姒使獨居焉何哉英英白雲露彼菅茅叶莫侯反天步艱難之子不猶集傳比也英英輕明之貌白雲水土輕清之氣當夜而上騰者也露卽其㪚而下降者也季氏本曰天無雲則有露有雲則無露白雲水土輕清之氣未爲層雲也而英英如花朶然則尤輕而不蔽明矣故其氣薄而易㪚是不露而猶露也歩行也天歩猶言時運也猶圖也或曰猶如也言雲之澤物無微不被今時運艱難而之子不圖不如白雲之露菅茅也集說嚴氏粲曰言王之恩澤當均及之如白雲之覆露菅茅皆蒙潤澤也今天運艱難而幽王不如是也歸之天運謂已所遭之不幸耳滮符彪反池北流浸彼稻田叶地因反嘯歌傷懷念彼碩人集傳比也滮流貌北流豐鎬之閒水多北流碩人尊大之稱亦謂幽王也言小水微流尚能浸灌王之尊大而反不能通其寵澤所以使我嘯歌傷懷而念之也集說鄭氏康成曰池水之澤浸潤稻田使之生殖喻王無恩意滮池之不如也附錄王氏應麟曰水經注鄗水又北流西北注與滮池合水出鄗池西而北流入於鄗世傳以爲水名寰宇記渭水西自京兆鄠縣流入長安漢建元三年造便橋跨渭斯滮池之别名西北合渭水樵徂焦反彼桑薪卬五綱反烘火東反于煁市林反維彼碩人實勞我心集傳比也樵采也桑薪薪之善者也卬我烘燎也煁無釡之竈可燎而不可烹飪者也郭氏璞曰今之三隅竈也孔氏穎達曰無釜之竈其上燃火謂之烘本爲此竈止以燃火照物若今火爐也桑薪宜以烹飪而但爲燎燭以比嫡后之尊而反見卑賤也集說程子曰樵彼桑薪不用而我烘于煁竈興王之捨嫡后之尊而專寵於嬖人也維王之所爲如此所以勞傷我心也鼓鐘于宮聲聞音問于外念子懆懆七到反視我邁邁集傳比也懆懆憂貌邁邁不顧也何氏楷曰懆說文云愁不安也陸德明云愁不申也非一念之而已故曰懆懆邁說文云遠行也王之視我望望然不顧若邁而又邁然者遠之之甚也鼓鐘于宮則聲聞于外矣念子懆懆而反視我邁邁何哉集說程子曰此章自傷其誠意之不能動王也鼔鐘于宮而聲聞于外今我中心念子而曾不感動視我邁邁而去邁邁去遠不顧之意季氏本曰宫者深密之地言鼔鐘于深宮必聲聞于外以比中有實徳則王必知之而有感動也此蓋反躬自責之辭有鶖音秋在梁有鶴在林維彼碩人實勞我心集傳比也鶖秃鶖也陸氏佃曰鶖性貪惡一名扶老狀如鶴而大長頸赤目其毛辟水毒頭高八九尺善與人鬭好啗蛇梁魚梁也蘇氏曰鶖鶴皆以魚爲食然鶴之於鶖清濁則有閒矣今鶖在梁而鶴在林鶖則飽而鶴則飢矣幽王進襃姒而黜申后譬之養鶖而棄鶴也集說歐陽氏修曰有鶖在梁有鶴在林言二物皆非其所處如妾不宜居正位而妻不宜被遠棄也鴛鴦在梁戢其左翼之子無良二三其德集傳比也戢其左翼言不失其常也劉氏瑾曰戢其左翼以相依於内舒其右翼以防患於外此禽鳥匹偶竝棲之常也良善也二三其德則鴛鴦之不如矣集說王氏安石曰鴛鴦能好其匹雄雌相從不失其性也謝氏枋得曰衞詩云士也罔極二三其德亦刺夫婦之相棄背也與此意合有扁歩典反斯石履之卑兮之子之遠俾我疷都禮反叶喬移反兮集傳比也扁卑貌俾使疷病也有扁然而卑之石則履之者亦卑矣如妾之賤則寵之者亦賤矣是以之子之遠而俾我疷也集說季氏本曰人履扁石而卑以比寵妾而賤自賤如此豈碩人所宜哉故我以遠我爲病非爲我之失愛也正以王自失其所以爲尊耳總論程子曰詩大意刺王專寵失上下之分劉氏瑾曰此詩章多而句少八章皆爲比體一章以一事爲喻反覆諷詠以泄其情而猶不能絶念於王可謂怨而不怒者矣白華八章章四句集說李氏樗曰此詩大抵與綠衣相類綠衣之詩專以綠衣取譬此詩則泛取譬喻體雖不同而發明嫡妾之分則一也緜蠻黃鳥止于丘阿道之云遠我勞如何飲於鴆反之食音嗣之敎之誨之命彼後車謂之載之集傳比也緜蠻鳥聲何氏楷曰以其聲之微細相連不絶如緜而鳥語不可與人解又似蠻也阿曲阿也孔氏穎達曰卷阿云有卷者阿知丘阿是邱之曲中也後車副車也此微賤勞苦而思有所託者爲鳥言以自比也蓋曰緜蠻之黃鳥自言止于丘阿而不能前蓋道遠而勞甚矣當是時也有能飲之食之敎之誨之又命後車以載之者乎集說鄒氏泉曰飲之食之欲其周恤乎己也敎之誨之欲其指示乎己也後車載之欲其振拔乎己也唐氏汝諤曰止于丘阿非得所止之意乃倦飛而止不得已而然也道遠非一蹴能到而勞苦不勝非不欲前實不能前耳故下遂致冀望之語緜蠻黃鳥止于丘隅豈敢憚行畏不能趨飲之食之敎之誨之命彼後車謂之載之集傳比也隅角朱子曰丘隅岑蔚之處憚畏也趨疾行也集說郝氏敬曰以微賤之分豈敢憚行但畏力疲不能趨庶幾貴顯者一假援之而已緜蠻黃鳥止于丘側豈敢憚行畏不能極飲之食之敎之誨之命彼後車謂之載之集傳比也側傍極至也國語云齊朝駕則夕極於魯國集說張氏彩曰行百里者半九十言末路之難也故曰畏不能極總論輔氏廣曰微賤之臣奔走行役道遠而勞甚至爲鳥言以自比而求所託焉固仁人君子所宜動心者也郝氏敬曰詩不敢直愬而自託於鳥不敢辭勞而但告哀於人黃鳥睍睆應節趨時人所喜悅故以爲比志苦而辭卑乃所以爲溫柔敦厚之意也章氏甫曰周之盛世大司徒以保息六養萬民三曰振窮四曰恤貧五曰寛疾豈有如緜蠻詩人所思者乎可以觀世變矣緜蠻三章章八句集說徐氏光啓曰此詩比體與碩鼠采苓一例其初託言於鳥下只直言己志而已幡幡孚煩反瓠葉采之亨叶鋪郎反之君子有酒酌言甞之集傳賦也幡幡瓠葉貌羅氏願曰瓠其葉可爲菜此亦燕飲之詩言幡幡瓠葉采之亨之至薄也然君子有酒則亦以是酌而甞之蓋述主人之謙詞言物雖薄而必與賓客共之也集說孔氏穎達曰幡幡然者是瓠之葉也采取之又亨煮之釀以爲飲酒之菹也言古者不以微薄而廢禮王氏安石曰甞其旨否然後行獻酬之禮有兔它故反斯首炮白交反之燔音煩叶汾乾反之君子有酒酌言獻叶虚言反之集傳賦也有兔斯首一兔也猶數魚以尾也毛曰炮加火曰燔亦薄物也獻獻之於賓也集說鄭氏康成曰炮之燔之者將以爲飲酒之羞也飲酒之禮旣奏酒於賓乃薦羞有兔斯首燔之炙音隻叶陟略反之君子有酒酌言酢才洛反之集傳賦也炕音抗火曰炙謂以物貫之而舉於火上以炙之酢報也賓旣卒爵而酌主人也集說鄭氏康成曰凡治兔之宜鮮者毛炮之柔者炙之乾者燔之有兔斯首燔之炮叶蒲侯反之君子有酒酌言醻市周反之集傳賦也醻導飲也集說胡氏一桂曰主人旣飲酢爵欲以醻賓又酌而先自飲以導之然後復酌而進於賓故謂之醻張氏彩曰一物而三舉之者以禮有獻酢醻故也酒三行而殽惟一兔首益以見其約矣總論杜氏預曰古人不以微薄廢禮雖瓠葉首猶與賓客享之姚氏舜牧曰瓠葉之采亨兔首之燔炙可謂薄矣而情由此達禮由此行君子不以爲簡傳曰苟有明信㵎溪沼沚之毛可羞於王公此之謂也瓠葉四章章四句集說徐氏常吉曰豐以燕賓者魚麗是也易鼎之彖傳曰大亨以養聖賢薄以燕賓者瓠葉是也易損之彖曰二簋可用享知易之意則知詩之意矣漸漸竝士銜反下同之石維其高矣山川悠逺維其勞矣武人東征不遑朝叶直高反矣集傳賦也漸漸高峻之貌武人將帥也遑暇也言無朝旦之暇也將帥出征經歴險遠不堪勞苦而作此詩也集說歐陽氏修曰漸漸高石與悠遠之山川皆叙其所歴險阻之勞劉氏彝曰漸漸之石維其高矣者謂所歴之路高峻峭㧞非攀援則不可以登也山川悠遠維其勞矣者山窮者川斷之川盡者山閒之重重相閒遠不可極不曰悠遠乎漸漸之石維其卒在律反矣山川悠逺曷其沒叶莫筆反矣武人東征不遑出矣集傳賦也卒崔嵬也謂山巓之末也曷何沒盡也言所登歷何時而可盡也不遑出謂但知深入不暇謀出也集說黃氏佐曰不暇謀出則甚於無朝旦之暇矣有豕白蹢音的烝涉波矣月離于畢俾滂普郞反沱徒何反矣武人東征不遑他湯何反矣集傳賦也蹢蹄烝衆也離月所宿也畢星名朱子曰畢是漉魚底叉網漉魚則其汁水淋漓而下若雨然畢星名義蓋取此今畢星上有一柄下開兩叉形亦類畢故月宿之則雨豕涉波月離畢將雨之驗也陸氏佃曰犬喜雪馬喜風豕喜雨故天將雨則豕渉水波也胡氏一桂曰畢星好雨月水之精離畢而雨星象相感如此張子曰豕之負塗曵泥其常性也今其足皆白衆與渉波而去水患之多可知矣此言久役又逢大雨甚勞苦而不暇及他事也集說孔氏穎達曰豕渉入水是在地爲將雨之徵月更離歴于畢之陰星在天爲將雨之候果致大雨使其水滂沱而盛役人遇之尤以疲病不暇更有他事矣歐陽氏修曰謂在險阻之中惟雨是憂不遑及他也履險遇雨征行所尤苦故以爲言總論輔氏廣曰世之治也行者之勞未嘗自言而上之人則汲汲然以言其勞之可念世之亂也上之人未甞念其勞而言之而行者則自言其勞苦而不置焉夫使勞者自言而上之人不加恤焉烏在其爲民之父母也朱氏公遷曰一章則兵起在道而無休息之期二章則懸軍入險而無出險之計三章則以持戈執戟之勞有霑體塗足之苦是以智慮廢而憂患専也漸漸之石三章章六句苕音條之華音花芸音云其黃矣心之憂矣維其傷矣集傳比也苕陵苕也本草云卽今之紫葳蔓生附於喬木之上其華黃赤色亦名凌霄鄭氏康成曰陵苕之華紫赤而繁詩人自以身逢周室之衰如苕附物而生雖榮不久故以爲比而自言其心之憂傷也集說李氏公凱曰周室將衰如苕華之將落芸然而黃不能久矣是以我心憂愁而自傷所遇之如此也苕之華其葉青青子零反知我如此不如無生叶桑經反集傳比也青青盛貌然亦何能久哉集說孔氏穎達曰上言將落則此已落矣又言其葉明唯葉在耳季氏本曰言我本不意所遇之世如此若知我如此則不如無生謂生則不忍見也牂子桑反羊墳扶云反首三星在罶音柳人可以食鮮息淺反可以飽叶補苟反集傳賦也牂羊牝羊也墳大也羊瘠則首大也鄭氏樵曰牝羊首小今也羸瘰反首大而身小羀笱也羀中無魚而水靜但見三星之光而已言饑饉之餘百物彫耗如此苟且得食足矣豈可望其飽哉集說朱子曰周家初興時周原膴膴堇荼如飴苦物亦甜及其衰也牂羊墳首三星在羀人可以食鮮可以飽直恁地蕭索向氏楫曰言羊以見陸物言魚以見水物其去無羊魚麗之世遠矣總論鄒氏泉曰首二章言衰世難久存而深致其感末章言百物皆彫耗而不聊其生見其所以不能久存也苕之華三章章四句集傳陳氏曰此詩其詞簡其情哀周室將亡不可救矣詩人傷之而已何草不黃何日不行叶户郎反何人不將經營四方集傳興也草衰則黃將亦行也周室將亡征役不息行者苦之故作此詩言何草而不黃何日而不行何人而不將以經營於四方也哉集說李氏樗曰何日不行以見其一歲之中無日不行也何人不將以見其一國之中無人得免也朱氏公遷曰以草之憔悴興人之勞苦而語又相呼也何草不𤣥叶胡勻反何人不矜古頑反韓詩作鰥叶居陵反哀我征夫獨爲匪民集傳興也𤣥赤黑色也旣黃而𤣥也王氏質曰草自黃而𤣥與苕自華黃而葉青同爲時節之變無妻曰矜言從役過時而不得歸失其室家之樂也哀我征夫豈獨爲非民哉集說李氏樗曰哀我征夫獨爲匪民言以我征夫爲非民乎蓋以民視之則仁愛之必不至於久役也今旣不以民視之故不復顧惜之也匪兕徐履反匪虎率彼曠野叶上與反哀我征夫朝夕不暇叶後五反集傳賦也率循曠空也言征夫非兕非虎何爲使之循曠野而朝夕不得閒暇也集說孔氏穎達曰野獸可常在外今非是兕非是虎何爲久不得歸常循彼空野之中與兕虎無異乎王氏質曰言不以民待下也有芃薄工反者狐與車叶率彼幽草有棧士板反之車行彼周道集傳興也芃尾長貌棧車役車也周道大道也言不得休息也集說李氏公凱曰彼芃然之狐循於幽草之中則其宜也今我何爲亦乘此有棧之車而行彼周道之上乎總論顧氏起元曰此反覆傷已征役之不息也首章言役之重困二章言失其家室之樂三章傷其自同於物四章傷其物之不如也何草不黃四章章四句集說輔氏廣曰苕之華言國家之衰微時物之彫耗人民不聊其生天運窮矣何草不黃言士民役使之繁數征行之勞苦上之人視之與禽獸無異人事極矣周室至是無可爲矣此黍離之所以降爲國風也朱氏公遷曰自菀柳至此其詩多似風體雅降爲風亦有其漸歟都人士之什十篇四十三章二百句欽定詩經傳說彚纂卷十六
