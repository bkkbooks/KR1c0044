body:
  text: 欽定四庫全書欽定詩經傳說彚纂卷六齊一之八集傳齊國名司馬氏遷曰齊所以為齊以天齊也司馬貞注臨淄城南有天齊泉五泉竝出有異於常本少昊時爽鳩氏所居之地孔氏穎達曰爽鳩氏司宼也少皞以鳥名官其人之名氏則未聞也在禹貢為青州之域周武王以封太公望王氏應麟曰地理志成王滅蒲姑以封師尚父注武王封太公於齊初未得爽鳩之地成王以益之也左傳曰晏子曰昔爽鳩氏始居此地也季萴因之有逢伯陵因之薄姑氏因之而後太公因之東至于海西至于河南至于穆陵北至于無棣太公姜姓本四岳之後孔氏穎達曰齊世家云呂尚者其先世為四岳封於呂姓姜氏從其封姓故曰呂尚西伯獵遇於渭陽與語大悅曰自吾先君太公曰當有聖人適周周興子眞是耶吾太公望子久矣故號之曰太公望載與俱歸立為太師武王平啇封於營邱既封於齊通工商之業便魚鹽之利民多歸之故為大國輔氏廣曰地理志言太公以齊地負海舄鹵少五榖而人民寡廼勸以女工之業通魚鹽之利而人物輻湊管仲又設輕重之權以富國故齊人織作冰紈綺繡純麗之物號為冠帶衣履天下以是言之則所謂工者女工為多然至田齊時臨淄海岱之閒為一都㑹其中具五民服䖍以五民為士農啇工賈則或百工皆具焉今青齊淄莊持反濰德棣等州是其地也皇輿表青州今青州府齊州今濟南府淄州今淄川縣濰州今濰縣徳州今陵縣棣州今樂安縣竝隸山東集說鄭氏康成曰武王封太師呂望於齊地方百里都營邱周公致太平敷定九畿成王用周公之法制廣大邦國之境而齊受上公之地更方五百里其子丁公嗣位於王官後五世哀公政衰荒淫怠慢齊人變風始作孔氏穎達曰魯為季札歌齊曰美哉此詩皆云刺彼云美哉者以雞鳴有思賢妃之事東方未眀雖刺無節尚能促遽自警詩人懐其舊俗故有箴規季札美其聲非謂詩内皆是美事嚴氏粲曰政令僅行於郊畿而畿内之鄭亦自為列國王室之微甚矣於是乎齊始霸故王鄭之後次以齊也子夏言鄭音好濫淫志衞音趣數煩志齊音傲僻驕志皆淫於色而害於徳齊亦二南之變也熊氏禾曰齊乃東方形勝要害之地世號為東西秦秦得百二齊亦得十二蓋可見矣大抵齊地富強近利故孔子謂齊變而後至魯也附錄許氏謙曰東至于海北至于無棣索隠曰淮南有故穆陵門是楚之境無棣在遼西孤竹服䖍以為太公受封境界所至不然也蓋言其征伐所至之域雞旣鳴矣朝音潮旣盈矣匪雞則鳴蒼蠅之聲集傳賦也言古之賢妃御於君所至於將旦之時必告君曰雞既鳴矣陳氏子龍曰劉向云雞者主司時起居人管輅别傳雞者兌之畜故太白揚輝則雞鳴㑹朝之臣既已盈矣欲令君早起而視朝也然其實非雞之鳴也乃蒼繩之聲也段氏成式曰蠅類有蒼者聲雄壯負金者聲清聒其聲在翼也蔡氏卞曰青蠅善亂色蒼蠅善亂聲蓋賢妃當夙興之時心常恐晚故聞其似者而以為眞非其心存警畏而不留於逸欲何以能此故詩人叙其事而美之也集說毛氏萇曰雞鳴而夫人作朝盈而君作鄭氏康成曰雞鳴朝盈可以起之常禮夫人以蠅聲為雞鳴則起早於常禮敬也孔氏穎達曰夫人御於君之禮大師奏雞鳴於階下夫人鳴玉佩於房中告去則雞鳴以告當待大師告之此夫人自聽雞嗚者說夫人相警戒不必待告方起也李氏樗曰雞鳴之聲與蒼蠅大小不相類而乃聞蠅聲以為雞鳴者志之所在惟恐其失時也東方明叶謨郎反矣朝既昌矣匪東方則明同上月出之光集傳賦也東方明則日將出矣昌盛也此再告也集說毛氏萇曰東方明則夫人纚笄而朝朝已昌盛則君聽朝鄭氏康成曰夫人以月光為東方明則朝亦敬也孔氏穎達曰上章言朝既盈矣謂朝已有人君可以起此言朝既昌矣謂盛於盈時羣臣畢集故君可以聽朝也輔氏廣曰一章疑於耳也二章疑於目也古之賢妃進御於君當其夙興之時心常恐晚故於耳目聞見之際疑其似者而以為眞玩繹其辭則其戰兢警惕眞有臨深履薄之意至誠所感則其為君焉有留於宴昵之私者哉蟲飛薨薨甘與子同夢叶莫縢反會且歸矣無庶予子憎集傳賦也蟲飛夜將旦而百蟲作也甘樂會朝也此三告也言當此時我豈不樂與子同寢而夢哉然羣臣之會於朝者俟君不出將散而歸矣無乃以我之故而并以子為憎乎集說毛氏萇曰古之夫人配其君子亦不忘其敬孔氏穎達曰上言欲君早起此又述其欲早起之意君若不早聽朝則事不速訖罷朝必晚衆臣憎君是由我故故欲令君早起也王氏安石曰甘與子同夢情也會且歸矣無庶予子憎義也蘇氏轍曰予豈不欲與子同夢歟然羣臣之會於朝者亦欲退朝而歸治其家事是以為之早作姚氏舜牧曰朝無會歸之理甚言起不早臣子之心將厭倦欲歸耳徐氏常吉曰不曰君之荒於内而言己之甘於同夢不曰以君之故憎我而反言以己之故及君其言温厚和平總論范氏祖禹曰聖人順天地隂陽之理觀萬物之情明而動晦而休故以雞鳴為夙興之節至於蟲飛薨薨則不獨以怠於政事亦非為寐之時也君子之修身不以有事而早無事則晏其興居皆順天地之理所以為常也輔氏廣曰前兩章但述賢妃儆畏之誠至末章方極其情意以致戒詩人其亦善於形容諷諫者哉非誠意有以感之於先則亦豈能使其君聽信之也黄氏震曰古說皆謂賢妃欲其夫之早起誤以蠅聲為雞聲晦菴云心常恐晚聞其似者而以為眞至曹氏始謂哀公以雞聲為蠅聲嚴氏宗之云蠅以天將明乃飛而有聲雞未鳴之前無蠅聲也戴氏曰哀公荒淫雞鳴矣乃託辭曰此蒼蠅之聲耳東方明矣乃託辭曰此月出之光耳一以為賢妃之言一以為哀公之言未知孰是然讀者且當從古說庶三章之義聯貫黄氏佐曰案三章雖有初告再告三告之不同然皆一時之言也首章即所聞以告君二章即所見以告君三章即將旦之候以告君本心常恐晚故言之複耳雞鳴三章章四句集說李氏樗曰自古人君修身謹行非特有忠臣義士亦由賢妃貞女夙夜警戒以成其徳周宣之姜后齊桓之衞姬楚莊之樊妃是也王氏柏曰齊詩十有一篇止雞鳴一篇為美詩耳劉氏瑾曰夫為妻綱古之人身修而家齊者上也思齊所謂刑于寡妻是也夫道不足幸有賢妃助之成徳者次也此詩所述是也案序雞鳴思賢妃也後之說詩者因以人實之曰哀公荒淫怠惰故陳賢妃貞女夙夜警戒相成之道焉朱子曰此序得之但哀公未有所考蓋以史載哀公被紀侯之譖為周所害不聞其有荒淫之事也故集傳只作古之賢妃御於君所其告戒於君者如此而詩人叙其事以美之眞德秀詩説亦云指古之賢妃是當以朱傳為允子之還音旋兮遭我乎峱乃刀反之閒叶居賢反兮竝驅從兩肩兮揖我謂我儇許全反兮集傳賦也還便捷之貎峱山名也許氏愼曰峱山在齊地從逐也獸三嵗曰肩陸氏徳明曰肩說文云三嵗豕肩相及者本亦作豜音同孔氏穎達曰大司馬云大獸公之七月云獻豜于公則肩是大獸儇利也獵者交錯於道路且以便捷輕利相稱譽如此而不自知其非也則其俗之不美可見而其來亦必有所自矣劉氏瑾曰集傳但言必有所自葢不質其為哀公所致也集說鄭氏康成曰子也我也俱出田獵而相遭竝併也併驅而逐禽獸子則揖耦我謂我儇譽之也譽之者以報前言還也蘇氏轍曰言齊人好田至以還儇相譽而不知恥之則荒之甚也嚴氏粲曰國人好田成俗俱出而相從既歸而相謂曰以子之便捷還然向來遭我於峱山之閒我與子竝行驅馬從逐兩獸子乃揖我謂我甚儇利也以子之能尚且見推此自矜於其黨以氣陵之之辭也黄氏佐曰還字與儇意義相照應輕利由便捷故也章氏潢曰子之還兮已譽人也謂我儇兮人譽已也竝驅則人已皆與有能也詩人直述其詞不加一語以致美刺之意然齊人矜夸之俗昭然不容揜矣子之茂叶莫口反兮遭我乎峱之道叶徒厚反兮竝驅從兩牡兮揖我謂我好叶許厚反兮集傳賦也茂羙也集說鄭氏康成曰譽之言好者以報前言茂也黄氏佐曰茂字與好意義相照應技好由才美也子之昌兮遭我乎峱之陽兮竝驅從兩狼兮揖我謂我臧兮集傳賦也昌盛也山南曰陽狼似犬銳頭白頰高前廣後孔氏穎達曰舍人曰狼牡名貛牝名狼貛音歡臧善也集說季氏本曰三章言獸皆以有力者矜其能也黄氏佐曰昌字與臧意義相照應藝善由盛壯也總論范氏處義曰謂便捷之子茂美而昌盛相値於山之閒山之道山之陽竝馬驅獸有肩有牡有狼從之曰兩言非一也揖我謂我馳驟之輕利便好而盡善曰遭曰竝曰揖以見從禽者衆更相稱譽也黄氏櫄曰田獵不足為賢而謂之賢驅馳非可為好而謂之好此猶鄭之國人以大叔之善射善御而謂之洵美且武也輔氏廣曰古者四時各有田獵所以奉順天時發抒民氣而以之習戎事備典禮也然田獵不以時或耽樂於此則先王必以為戒今齊以游畋成俗互稱譽其便捷輕利以為美則其心荒肆而失其是非之正矣郝氏敬曰詩述民閒尚勇好勝之習見化之所從來耳時雖霸業未興而功利夸詐已有其漸矣姚氏舜牧曰所尚者弋獵便捷便見齊俗之急功利處所遇者相稱譽便見齊俗之喜夸詐處還三章章四句集說范氏祖禹曰表記曰上之所好惡不可不愼也是民之表也國君禽荒而國人以習於田獵為賢閑於馳逐為好安於所習而不自知其非道民之道可不愼哉呂氏祖謙曰當是時齊以游畋成俗馳驅相遇意氣飛動鬱鬱見於睂睫之閒染其神者深矣夫豈一朝一夕所能反哉周遷商民既歴三紀之後畢命猶不敢忘其憂良有以也俟我於著直據反叶直居反乎而充耳以素叶孫租反乎而尚之以瓊華叶芳無反乎而集傳賦也俟待也我嫁者自謂也著門屏之閒也孔氏穎達曰釋宫云門屏之閒謂之宁李巡曰門屏之閒謂正門内兩塾閒著與宁音義同充耳以纊音曠懸瑱吐殿反所謂紞音膽也尚加也瓊華美石似玉者即所以為瑱也孔氏穎達曰充耳用素絲為紞以懸瓊華之石為瑱紞懸瑱之繩用雜綵線織之瓊是玉之美名華謂色有光華此石似瓊玉之色張子曰充耳非一物先以纊塞後以玉加之朱子曰古人充耳以瑱或用玉或用象看來是以線穿垂在當耳處東萊呂氏曰昏禮壻往婦家親迎去聲既奠鴈御輪而先歸俟于門外婦至則揖以入時齊俗不親迎故女至壻門始見其俟已也集說張子曰俟我言夫之俟我也著夫家之著也如是則不親迎也嚴氏粲曰設為嫁者之辭言其夫服此服飾而止俟我於其家門屏之閒而壻往婦家之禮不行矣黄氏佐曰此女子叙其夫俟已之處與夫俟已之飾如此即此而觀便見齊俗不曾親迎俟我於庭乎而充耳以青乎而尚之以瓊瑩音榮乎而集傳賦也庭在大門之内寢門之外李氏如圭曰堂下至門謂之庭瓊瑩亦美石似玉者鄭氏康成曰石色似瓊似瑩也呂氏曰此昏禮所謂壻道婦及寢門揖入之時也集說朱氏道行曰俟我於庭由著而進迎之再也俟我於堂乎而充耳以黄乎而尚之以瓊英叶於良反乎而集傳賦也瓊英亦美石似玉者孔氏穎達曰釋草云木謂之華草謂之榮榮而不實者謂之英然則英是華之别名言瓊英猶瓊華也英華是玉光色耳呂氏曰升階而後至堂此昏禮所謂升自西階之時也呂氏祖謙曰既不親迎故但行婦至壻家之禮壻道婦入故於著於庭於堂每節皆俟之也集說朱氏道行曰俟我於堂歴階而上迎之三也張氏彩曰服飾不同皆自素而文俟處不同皆以漸而近總論謝氏枋得曰其充耳則以素以青以黄其加飾則瓊華瓊瑩瓊英修容盛飾非不美也惜乎不知禮耳鄒氏泉曰玩呂氏及朱傳引昏禮俟於門外次道婦及寢門揖入次升自西階則齊俗所缺者只是前靣親迎奠鴈御輪一截事耳齊本重禮之國而古制之壊如此世道之趨可知矣著三章章三句集說范氏處義曰著之詩刺時不親迎說者謂陳親迎之禮以刺之非也三章所陳皆不親迎之事耳呂氏祖謙曰前漢地理志載齊之風俗曰俟我於著乎而此亦其舒緩之體也雖非此篇意之所主然廣谷大川異制民生其閒異俗剛柔輕重遲速異齊五味異和器械異制衣服異宜皆學者所當觀也詩可以觀其此類歟葉氏向高曰禮惟天子不親迎使三公迎后諸侯以下皆當親迎故冕而親迎夫子所以告哀公履緰逆女春秋所以譏紀子也是故親迎于渭是世子而親迎也韓侯迎止是諸侯而親迎也齊山東望國獨不聞此乎東方之日兮彼姝赤朱反者子在我室兮在我室兮履我即兮集傳興也履躡即就也言此女躡我之跡而相就也范氏處義曰謂我入室而處則迹我所居而就也集說歐陽氏修曰彼姝之子顔色美盛履我即者相邀以奔之詞也此述男女淫風但知稱其美色以相誇榮而不顧禮義也下章之義亦然朱氏公遷曰此即所見以為興蓋淫奔多在夜旦也詩中之興語不相應義不相因者始見於此黄氏佐曰東方之日謂早也日出而行來相就也彼姝者子鄘風指大夫言此以女子言猶美人可以稱盛王亦可以稱婦女也東方之月兮彼姝者子在我闥叶它悅反兮在我闥兮履我發叶方月反兮集傳興也闥門内也陸氏徳明曰韓詩云門屏之閒曰闥徐氏常吉曰室在寢内闥在門内發行去也言躡我而行去也孔氏穎達曰行必發足而去故以發為行也范氏處義曰謂我由闥而出則迹我所出而行也集說黄氏佐曰東方之月謂夜也月生於西則其明未盛及出於東方則明盛之時可以行而去矣袁氏煒曰此女蓋旦來而暮去者來則在室去則在闥自室而出於闥將行也朱氏道行曰向晦入息故言在闥竚此曰即行去曰發罔所不履歩亦歩趨亦趨也總論黄氏震曰諸家皆以日為喻君然詩中似無此意惟戴岷隱云男女相奔不夙則暮日出早也月出暮也此為近事情鄒氏忠𦙍曰序以為君臣失道男女淫奔不能以禮化也毛鄭遂以日月喻君臣於詩義何渉韓詩及歐陽氏皆以日月喻姝子顔色美盛猶為近之神女賦云其始來也耀乎若白日初出照屋梁其少進也皎若明月舒其光此喻意也沈氏守正曰日月皆曰東方昧爽而來初昏而去履即迎之也履發送之也只泛作淫詩足矣東方之日二章章五句集說胡氏紹曾曰毛喻古君臣明盛日喻君月喻臣下言昏姻之正禮刺今不然履禮也鄭以首句為訴之詞又以東方為未明盛說各不同總不如朱傳耳東方未明叶謨郎反顚倒都老反衣裳顚之倒叶都妙反之自公召之集傳賦也自從也羣臣之朝音潮别必列反色始入此詩人刺其君興居無節孔氏穎達曰興起也居安坐也言坐起無時節也號令不時鄭氏康成曰號令猶召呼也孔氏穎達曰以經言自公召之故云猶召呼也言東方未明而顛倒其衣裳則既早矣而又已有從君所而來召之者焉葢猶以為晚也孔氏穎達曰臣起已太早君興又早於臣也或曰所以然者以有自公所而召之者故也集說蘇氏轍曰為政必有節及其節而為之則用力少而事舉苟為無節緩急皆所以害政也夫東方未明起而顚倒其衣裳可謂急矣然猶有以為緩而自公召之者則政將何以堪之然則東方未明尚可以徐服其服而無至於顚倒也黄氏佐曰此雖只言其興之早已見得他日不免又太晚意故曰無節玩末章不夙則莫一句可見顚倒衣裳者蓋東方未明不得其要領故顚倒之也若辨色則從容齊整何至匆遽錯亂至是哉夫東方未明未當來召今而召之故曰不時東方未晞顚倒裳衣倒之顚叶典因反之自公令力證反叶力呈反之集傳賦也晞明之始升也孔氏穎達曰晞是日之光氣湛露云匪陽不晞謂見日之光而物乾故以晞為乾蒹葭云白露未晞言露在朝旦未見日氣故亦為乾義此無取於乾故言明之始升謂將旦時日之光氣始升也令號令也范氏處義曰令謂號召臣下非出令也集說何氏楷曰上章言召之第謂召見其人耳此則將有所使之雖不指言其事而此時非聽政出治之時則此令何為而至哉折音哲柳樊圃叶博故反狂夫瞿瞿俱具反不能辰夜叶羊茹反不夙則莫音慕集傳比也柳楊之下垂者柔脆之木也許氏愼曰柳小楊也陸氏佃曰柳柔脆易生之木與楊同類樊藩也圃菜園也孔氏穎達曰孫炎曰樊圃之藩也郭璞曰謂藩籬也種菜之地謂之圃其外藩籬謂之園瞿瞿驚顧之貌夙早也折柳樊圃雖不足恃然狂夫見之猶驚顧而不敢越以比辰夜之限甚明人所易知今乃不能知而不失之早則失之莫也李氏樗曰言不能時節其夜之早晚也集說毛氏萇曰古者有挈壺氏以水火分日夜以告時於朝辰時也孔氏穎達曰釋訓云不辰不時也是辰為時也程子曰柳柔脆之物折之以為藩籬非堅固也狂夫亦知其有限見之則躩然而驚晝夜之限非不明也乃不能知而不早則晏言無節之甚輔氏廣曰興居有節號令有時然後能常不然則始雖若豫而勤終則必至於怠而失之莫矣且晝夜昏明人所當知所當守也今乃顚倒錯繆如此則其他越禮亂常之事不言而可知矣總論許氏謙曰人君勤則國治惰則政昏固其理也未日出而視朝可以言勤乎而遽已興刺何歟蓋天下之道中而止聖人制禮因人心之所同然未有不由乎中也雞鳴視朝之晚此詩視朝之早皆不能中聖人於齊竝存之豈無意哉君子讀詩以自警則於應事必求合於中使無可議則善矣沈氏守正曰上二章歎其無節末章怪其易知而不知也陳氏推曰惟興居無節斯號令不時而臣下之奔走伺候者亦將無可凖信此詩人所以刺也東方未明三章章四句集說黄氏櫄曰若挈壺氏不能掌其職則當刺挈壺氏不當刺朝廷若朝廷興居無節則當刺朝廷不當刺挈壺氏今詩人兩責之者蓋詩人微其意以責其臣而作序者原其本以責君也許氏謙曰詩意但言興居無節號令不時而無明刺挈壺氏之語故傳亦無挈壺之意若果刺挈壺氏則三章是也郝氏敬曰興居號令非辰夜者所得司無所歸咎不敢斥君而求諸挈壺氏所謂敢告僕夫云爾南山崔崔子雖反雄狐綏綏魯道有蕩齊子由歸既曰歸止曷又懷叶胡威反止集傳比也南山齊南山也孔氏穎達曰詩人自歌土風山川不出其境崔崔高大貎狐邪媚之獸孔氏穎達曰對文則飛曰雌雄走曰牝牡散則可以相通左傳曰獲其雄狐亦謂牡為雄也綏綏求匹之貌魯道適魯之道也馮氏復京曰水經注汶水南逕鉅平縣故城東西南流城東有魯道詩所謂魯道有蕩今汶上夾水有文姜臺蕩平易也齊子襄公之妹魯桓公夫人文姜襄公通焉者也孔氏穎達曰襄公名諸兒僖公子劉氏瑾曰桓公名軌一名允惠公庶子由從也婦人謂嫁曰歸懷思也止語辭言南山有狐以比襄公居高位而行邪行且文姜既從此道歸於魯矣襄公何為而復思之乎何氏楷曰朱子從王肅說謂懷指襄公集說孔氏穎達曰言南山高大崔崔然以喻國君之位尊高如山也雄狐相隨綏綏然失陰陽之匹以襄公居尊位而失匹配故舉以責之言魯之道路蕩然平易齊子既歸於魯自有夫矣襄公何為復思之而與之㑹乎蘇氏轍曰人君之尊如南山之崔崔襄公之行如雄狐之綏綏疾其以人君而為此行也葛屨五兩如字又音亮冠緌如誰反雙叶所終反止魯道有蕩齊子庸止既曰庸止曷又從止集傳比也兩二屨也孔氏穎達曰屨必兩隻相配故以一兩為一物曹氏粹中曰屨人辨外内命夫命婦之命屨功屨散屨注云有纁屨黄屨白屨黑屨散屨所謂五兩也緌冠上飾也許氏謙曰禮書二組屬於笄順頥而下結之謂之纓纓之垂者謂之緌屨必兩緌必雙物各有耦不可亂也呂氏大臨曰屨與屨為耦雖五兩各相耦冠緌之雙亦自為耦襄公文姜非其耦也庸用也用此道以嫁於魯也從相從也孔氏穎達曰文姜既用此道以歸魯止襄公何復從為淫泆之行集說毛氏萇曰葛屨服之賤者冠緌服之尊者鄭氏康成曰冠屨不宜同處猶襄公文姜不宜為夫婦之道蘇氏轍曰葛屨五兩則屨具於下矣冠緌雙止則緌具於上矣言文姜有匹於魯而襄公有耦於齊曷為又相從哉蓺麻如之何衡音横從子容反其畝莫後反取七喻反妻如之何必告工毒反父母莫後反既曰告同上止曷又鞠居六反止集傳興也蓺樹孔氏穎達曰大司徒云敎稼穡樹蓺則樹蓺皆種之别名也鞠窮也欲樹麻者必先縱横耕治其田畝毛氏萇曰衡獵之從獵之種之然後得麻孔氏穎達曰獵是行歩踐履之名衡獵縱獵謂既耕而東西踐躡槩摩之也陸氏德明曰衡亦作横韓詩云東西耕曰横從韓詩作由云南北耕曰由曹氏粹中曰齊民要術云種麻欲得良田耕不厭熟縱横七遍以上則麻生無葉衡從其畝蓋古法也欲娶妻者必先告其父母毛氏萇曰必告父母廟鄭氏康成曰取妻之禮議於生者卜於死者此之謂告孔氏穎達曰婚有納吉之禮卜而得吉使告女家是娶妻必卜之士冠禮云筮於廟門明卜亦在廟也昭元年左傳楚公子圍娶於鄭其辭云圍布几筵告於莊恭之廟而來是娶妻自有告廟之法也今魯桓公既告父母而娶矣又曷為使之得窮其欲而至此哉集說朱子曰桓公之娶文姜也既告而成禮矣曷為不能禁止呂氏祖謙曰納之不正則容有不敢制者今魯侯既以正禮納文姜當蚤裁制之也季氏本曰桓公娶妻時父母已沒而此云告父母者告廟也析薪如之何匪斧不克取妻如之何匪媒不得既曰得止曷又極止集傳興也克能也極亦窮也毛氏萇曰極至也集說鄭氏康成曰女既以媒得之矣何不禁制而恣極其邪意令至齊乎又非魯桓黄氏佐曰析薪用斧猶娶妻用媒故以為興上言告此言媒皆理之當然也而淫縱其欲者何哉總論呂氏大臨曰上二章所謂曷又懷止曷又從止者言其理如是而襄公違之以淫泆何也下二章所謂曷又鞠止曷又極止者言其理如是桓公縱之窮極其惡何也輔氏廣曰既曰歸止既曰庸止既曰告止既曰得止言其始之幸得其正也曷又懷止曷又從止曷又鞠止曷又極止惜其終之肆行縱欲而莫之正也沈氏守正曰兩言魯道有蕩見齊子之歸人人矚目也舉告父母通媒妁者見婚姻之正也所以不能窮止之故詩人不言也詞歸魯桓恥之也意主齊襄惡之也南山四章章六句集傳春秋桓公十八年公與夫人姜氏如齊公薨于齊傳曰公將有行遂與姜氏如齊申繻音需曰女有家男有室無相瀆也謂之有禮易此必敗公㑹齊侯于濼匹沃反遂及文姜如齊齊侯通焉公謫之以告夏四月享公使公子彭生乘公公薨于車此詩前二章刺齊襄後二章刺魯桓也集說范氏處義曰此變風之直指其事不暇詭辭以明其過之大也朱氏道行曰譏齊襄在懷從二字譏魯桓在鞠窮二字通詩全以詰問法令其難以置對錄齊風帶見魯事合觀敝笱載驅猗嗟諸章有深意焉讀者不可漫言魯有頌無風而不一致思也無田音佃甫田維莠羊九反驕驕叶音高無思遠人勞心忉忉音刀集傳比也田謂耕治之也孔氏穎達曰田甫田猶多方云宅爾宅田爾田今人謂佃食古之遺語也甫大也毛氏萇曰大田過度而無人功終不能獲莠害苖之草也驕驕張王之意忉忉憂勞也言無田甫田也田甫田而力不給則草盛矣無思遠人也思遠人而人不至則心勞矣以戒時人厭小而務大忽近而圖遠將徒勞而無功也集說輔氏廣曰厭小而務大田甫田者也妄作者之所為也忽近而圖遠思遠人者也妄想者之所冀也妄作則事不遂妄想則心徒勞附錄鄭氏康成曰喻人君欲立功致治必勤身修德積小以成高大無德而求諸侯徒勞其心耳孔氏穎達曰以襄公所求非道故設辭以戒之嚴氏粲曰甫田非不可耕遠人非不可致今言無田無思者蓋言襄公求之者非其道耳若謂以若所為求若所欲則必不可得也思遠人謂求諸侯也無田甫田維莠桀桀無思遠人勞心怛怛叶旦悅反集傳比也桀桀猶驕驕也呂氏祖謙曰驕驕桀桀皆稂莠侵陵嘉榖之狀怛怛猶忉忉也黄氏一正曰怛怛慘切貌婉兮孌叶龍眷反兮總角丱古患反叶古縣反兮未幾居豈反見兮突而弁兮集傳比也婉孌少好貌丱兩角貌嚴氏粲曰童子總聚其髪以為兩角如丱字之形未幾未多時也突忽然高出之貌陸氏德明曰方言云凡卒相見謂之突弁冠名孔氏穎達曰周禮掌冠冕者其職謂之弁師則弁者冠之大號也言總角之童見之未久而忽然戴弁以出者非其躐等而強求之也蓋循其序而勢有必至耳此又以明小之可大邇之可遠能循其序而修之則可以忽然而至其極若躐等而欲速則反有所不達矣集說輔氏廣曰末章又以其事之易見而人所共知者為比以曉之附錄鄭氏康成曰人君内善其身外修其德居無幾何可以立功猶是婉孌之童子少自修飾丱然而稚見之無幾何突耳加冠為成人也蘇氏轍曰夫總角之童而至於突然弁也豈其求之哉其道則有所必至也君子之得諸侯亦未嘗求之矣苟修其身而治其政令諸侯不來而將安往呂氏祖謙曰苟由其道而循其序則小者俄而大微者俄而著厥德修罔覺非計功求獲者所能與也總論朱子詩傳遺說問甫田詩志大心勞曰小序說志大心勞已是說他不好人若能循序而進求之以道則志不為徒大心亦何勞之有人之所期固不可不逺大然下手做時也湏一歩斂一歩著實做始得若徒然心務高遠而不下著實之功亦何益哉鄧氏元錫曰田甫田歆於大也窮大而失其歸荒矣思遠人羡於遠也遠人以為思蕩矣婉孌而丱也已突而弁也亦毋庸遠思為矣故易積小以高大記行遠自邇自然之體也甫田三章章四句附錄孔氏穎達曰甫田詩者齊之大夫所作以刺襄公也上二章刺其求大功卒章刺其不能修德皆言其所求非道之事案此詩國史題為刺襄公也毛萇軰解曰無禮義而求大功不修德而求諸侯志大心勞所以求者非其道也朱子曰未見其為襄公之詩故泛指為戒時人厭小務大忽近圖遠者而作又毛萇謂興也朱子改作比蓋以興言則無思遠人是詩旨則正求諸侯之說也若以比言則無思遠人句亦是比矣諸儒竊謂不知所比何事或欲以理言則厭小務大忽近圖遠與下婉孌總角皆說理矣何以為比且襄公無禮義而求諸侯霸業卒以無成事具於春秋傳而此詩恰在南山敝笱之閒因是與朱傳解各不同然風人作詩意在言外或有謂或泛言皆不可知集傳止從文以求其義不欲遇一詩必摭一事以實之自是朱子說經大本領處盧令令音零其人美且仁集傳賦也盧田犬也孔氏穎達曰犬有田犬守犬戰國策云韓國盧天下之駿犬東郭逡海内之狡兔韓盧逐東郭俱為田父之所獲是盧為田犬也令令犬頷下環聲董氏逌曰韓詩作盧泠泠說文引詩作獜此詩大意與還略同集說蘇氏轍曰時人以田獵相尚故聞其纓環之聲而美之曰此仁人也猶還曰揖我謂我儇兮耳王氏質曰其人言縱犬獵獸之人也此當是旁觀而為之誇譽者也黄氏佐曰逐獸者犬也發縱指示者人也美與仁皆當自田獵上言美即便捷輕利之云仁則從狩必俱而不自私頒禽必均而不自吝友愛之意充溢於顔靣閒也正與叔于田之仁字同如此方與下章鬈偲相稱盧重直龍反環其人美且鬈音權集傳賦也重環子母環也孔氏穎達曰重環謂環相重大環貫一小環也鬈鬚鬢好貌毛氏萇曰鬈好貌陸氏德明曰說文云髪好貌盧重鋂音梅其人美且偲七才反集傳賦也鋂一環貫二也許氏愼曰鋂大鎖也孔氏穎達曰一大環貫二小環朱氏謀㙔曰環鋂制其逸也偲多鬚之貌春秋傳所謂于思即此字古通用耳劉氏瑾曰左傳宣公二年宋之城者譏華元曰于思于思棄甲復來陸氏曰思西才反多鬚貌則此思字音顋總論陸氏佃曰言田事彌飾而彌有制環以制之重鋂又言貫制之衆也輔氏廣曰仁美其德也鬈與偲美其貌也王氏志長曰仁内美也鬈與偲外美也惟有内美所以見其鬈亦美見其偲亦美盧令三章章二句集說姚氏舜牧曰叔于田稱不如叔也洵美且仁是鄭習之不美處盧令令其人美且仁是齊俗之不美處敎化關國之習俗信然哉附錄孔氏穎達曰作盧令詩者以襄公性好田獵用畢以掩兔用弋以射鴈國内百姓陳古者田獵之事以風刺焉經三章皆言有德之君順時田獵與百姓共樂之事曹氏粹中曰古者禽獸多或為人害故包犧氏作結繩而為網罟以佃以漁本以為人除害而已後世雖廣為四時之田意不異此而因以寄軍政焉皆所以修民事也陳氏鵬飛曰此詩與孟子言今王田獵於此百姓聞王車馬之音見羽旄之美舉欣欣然有喜色同意敝笱在梁其魚魴鰥古頑反叶古倫反齊子歸止其從才用反如雲集傳比也敝壞笱罟也許氏謙曰說文笱曲竹捕魚魴鰥大魚也孔氏穎達曰孔叢子云衛人釣得鰥魚其大盈車是則鰥為大魚也馮氏復京曰毛以鰥為大魚次章釋魴鱮亦云大魚則鰥特魴鱮之類耳非必大至於盈車也盈車則鰥之尤大者歸歸齊也張子曰反歸於齊也如雲言衆也齊人以敝笱不能制大魚比魯莊公不能防閑文姜朱子曰防所以止水閑所以扞物故防閑有禁制之意故歸齊而從之者衆也集說胡氏明朂曰笱本可以制魚今乘梁之空者笱則敝也安能制乎大魚沛然於梁之中者則魚魴鰥也豈能見制於敝笱莊公威令不行不能制文姜是以車馬僕從不俟莊公之命而惟文姜是從也附錄孔氏穎達曰魴鰥之大魚非敝敗之笱所能制喻魯桓之微弱不能制文姜也又言文姜初歸於魯國其從者庶姜庶士衆多如雲以此强盛故桓不能禁也胡氏旦曰魴鰥魚之可制者為其笱之敝敗而不能制也文姜本可以防閑而制之由魯桓微弱致文姜驕伉而難制也敝笱在梁其魚魴鱮才呂反齊子歸止其從如雨集傳比也鱮似魴厚而頭大或謂之鰱陸氏璣曰鱮似魴厚而頭大魚之不美者故里語曰網魚得鱮不如㗖茹陸氏佃曰鱮性旅行故其字從與亦謂之鰱也如雨亦多也附錄楊氏時曰如雲如雨言從之者衆也許穆夫人思歸唁其兄許人尢之終以義不得而止若魯桓公剛而有制使魯人無肯從者如許人焉則文姜雖欲適齊尚可得乎敝笱在梁其魚唯唯維癸反齊子歸止其從如水集傳比也唯唯行出入之貌陸氏德明曰唯唯韓詩作遺遺言不能制也姚氏舜牧曰唯唯者惟所出入而無忌之貌如水亦多也集說嚴氏粲曰一魚或出或入而衆魚隨之唯然順從無復限制也如水言從之者順猶孟子言民歸之如水之就下也總論輔氏廣曰如雲盛也如雨多也如水與之俱流而不止也魴鰥魴鱮但言其大耳唯唯則言其出入之自如也季氏本曰此詩三章皆以敝笱比魯莊公也夫死從子莊公當知所自立矣齊子反歸於齊而從者如雲如雨如水言其衆多而勢不可遏也鄧氏元錫曰春秋曰夫人孫于齊稱孫明大歸也稱夫人不氏明絶屬也父之所絶子不得而復屬乃屬而復歸歸而從如雲如雨如水也於敝笱豈有異哉父母在可言歸寧孫可言大歸不可以歸名聖人之所甚愼也敝笱三章章四句集傳案春秋魯莊公二年夫人姜氏㑹齊侯于禚音灼杜氏預曰禚齊地胡氏安國曰婦人無外事送迎不出門既嫁從夫夫死從子今㑹齊侯于禚是莊公不能防閑其母失子道也四年夫人姜氏享齊侯于祝邱杜氏預曰魯地胡氏安國曰兩君相見享於廟中禮也非兩君相見又去其國而享諸侯甚矣五年夫人姜氏如齊師胡氏安國曰曰㑹曰享猶為之名也至是如齊師羞惡之心亡矣夫人之行不可復制矣七年夫人姜氏㑹齊侯于防又㑹齊侯于穀胡氏安國曰防魯地榖齊地一嵗而再㑹焉其為惡益遠矣集說季氏本曰此刺魯莊公不能防閑文姜舊說魯桓微弱不能防閑則桓公時文姜尚未肆集傳得之矣沈氏守正曰于禚于祝邱如齊師于防于榖皆莊公時事其從如雲如雨如水刺文姜之恬不知恥正刺莊公之威令不行也案序敝笱刺文姜也說者謂齊人惡魯桓公微弱不能防閑文姜使至淫亂為二國患朱子曰桓當作莊蓋以魯桓公被害之後自魯莊公嗣位之二年以至四年五年七年文姜凡㑹襄公者五前此在桓公時跡尚未縱故以此詩為刺莊也其說固當但胡旦楊時在朱子之前彼承序說以為魯桓而劉瑾通釋徑改為魯莊湊合朱傳大全遂襲其謬是誣前人矣故於附錄中正之載驅薄薄普各反簟茀朱鞹苦郭反魯道有蕩齊子發夕叶祥龠反集傳賦也薄薄疾驅聲簟方文席也茀車後戸也孔氏穎達曰簟字從竹用竹為席其文必方車之蔽曰茀朱朱漆也鞹獸皮之去毛者蓋車革質而朱漆也爾雅輿革前謂之鞎音痕後謂之茀竹前謂之禦後謂之蔽郭璞注鞎以韋靶音霸車軾茀以韋靶後户禦以簟衣軾蔽以簟衣後户陳氏祥道曰鞎與茀皆革為之詩所謂朱鞹是也禦與蔽皆竹為之詩所謂簟茀是也夕猶宿也發夕謂離於所宿之舍毛氏萇曰發夕自夕發至旦齊人刺文姜乗此車而來㑹襄公也王氏質曰簟茀朱鞹自是文姜所乘之飾不必言襄公之路車也集說嚴氏粲曰言有疾驅其車以竹簟為車之茀蔽又有朱色之皮革以靶車之前後者乃魯之道路蕩然平易而齊子文姜夕發於魯而來齊也其來何為耶不必言及襄公而襄公之惡自見矣舊說上二句言襄公下二句言文姜碩人云翟茀以朝則婦人之車亦言茀矣今以四句竝言文姜文意方貫陳氏所學曰疾驅齊境而發夕魯道實魯夫人而但言齊子此詩人微詞四驪力馳反濟濟子禮反垂轡濔濔乃禮反魯道有蕩齊子豈開改反弟叶待禮反集傳賦也驪馬黑色也濟濟羙貌毛氏萇曰四驪言物色盛也孔氏穎達曰夏官校人云凡軍事物馬而頒之注云物馬齊其力言四言驪道其物色俱盛也濔濔柔貌毛氏萇曰垂轡轡之垂者濔濔衆也沈氏萬鈳曰釋名云轡拂也言牽引拂戾以制馬也家語曰善御馬者正身以總轡豈弟樂易也言無忌憚羞恥之意也集說呂氏祖謙曰齊子豈弟蓋於此而樂易也美惡不嫌同辭嚴氏粲曰文姜車駕四馬皆是鐡驪之色濟濟然而美其六轡之垂者濔濔然而衆樂易安舒恬然無慙恥之色汶音問水湯湯失章反行人彭彭必亡反魯道有蕩齊子翱翔集傳賦也汶水名在齊南魯北二國之竟曹氏粹中曰汶水有二許氏以為出琅邪朱虛縣東泰山東至安邱入濰桑欽以為出泰山萊蕪縣西南入濟說者主欽義以為在齊南魯北湯湯水盛貌彭彭多貌言行人之多亦以見其無恥也集說嚴氏粲曰汶水在齊境自魯至齊必渡汶水言文姜渡汶水而來其道路平易衆庶往來而文姜翱翔彷徉無恥甚矣舊說汶水之上蓋有都焉襄公與文姜所㑹考春秋姜氏㑹齊侯之地禚也祝邱也防也榖也無㑹汶之事汶水滔滔吐刀反行人儦儦表驕反叶音褎魯道有蕩齊子遊敖集傳賦也滔滔流貌儦儦衆貌朱氏道行曰滔滔流之長儦儦隊之多遊敖猶翱翔也總論范氏處義曰曰發夕則以宵而逝猶有自赧之意曰豈弟則安然樂易已無自歉之色曰翱翔則廻翔從容而後去曰遊敖則遊觀愜適而忘反雖指齊子而言襄公無禮無義之迹不可掩矣輔氏廣曰首章言文姜疾驅其車離於所宿之舍而來㑹襄公也二章言其四馬之美六轡之柔而其人則無忌憚羞愧之意也三章四章則又言行道之人甚衆而彼乃翱翔遊遨於其閒也人而無羞惡之心則亦何所不至哉謝氏枋得曰詩人鋪敘之詳形容之巧刺之深疾之甚也載驅四章章四句集說孔氏穎達曰序言疾驅於通道大都若魯桓尚存不應公然如此此篇所陳蓋是莊公時事猗嗟昌兮頎音祈而長兮抑若揚兮美目揚兮巧趨蹌兮射則臧兮集傳賦也猗嗟歎詞昌盛也頎長貌抑而若揚美之盛也錢氏文子曰言進退高下不失其宜也揚目之動也蹌趨翼如也孔氏穎達曰曲禮云士蹌蹌注又云行而張足曰趨禮有徐趨疾趨為之有巧有拙故美其巧趨蹌兮臧善也齊人極道魯莊公威儀技藝之美如此所以刺其不能以禮防閑其母若曰惜乎其獨少此耳集說輔氏廣曰容止之美固美也至於射則又善則可見其才之稱也射者男子之事故三章皆言射以終之嚴氏粲曰威儀技藝本是可美之事而傷歎言之有所不滿何也文姜之事蓋難言之首章微寓其意於猗嗟之辭而未遽言之也猗嗟名兮美目清兮儀既成兮終日射食亦反侯不出正音征兮展我甥叶桑經反兮集傳賦也名猶稱也言其威儀技藝之可名也清目清明也儀既成言其終事而禮無違也侯張布而射之者也正設的於侯中而射之者也大射則張皮侯而設鵠賔射則張布侯而設正孔氏穎達曰射皆三番而止而云終日射侯者美其久射而常中也正者侯中所射之處布侯畫正正大如鵠三分侯廣而正居一焉侯身長一丈八尺者正方六尺侯身一丈四尺者正方四尺六寸大半寸侯身一丈者正方三尺三寸少半寸正以綵畫為之王射五正諸侯射三正孤卿大夫士同射二正其外畔凖侯廣狹各居其侯三分之一中央之采方二尺正之言正也射者内志正則能中正亦鳥名鳥之捷黠者射之難中以中為俊故取名焉劉氏瑾曰周禮梓人有皮侯采侯獸侯天子大射用皮侯賔射用采侯燕射用獸侯鵠以皮為之正則布為之射義注畫布曰正棲皮曰鵠是也展誠也姊妹之子曰甥馮氏復京曰爾雅曰男子謂姊妹之子為出謂我舅者吾謂之甥也邢昺疏甥猶生也取相親之義言稱其為齊之甥而又以明非齊侯之子此詩人之微詞也案春秋桓公三年夫人姜氏至自齊六年九月子同生即莊公也十八年桓公乃與夫人如齊則莊公誠非齊侯之子矣集說鄭氏康成曰容貌技藝如此誠我齊之甥言誠者拒時人言齊侯之子輔氏廣曰儀言文也射則武也以展我甥兮為詩人微詞者極當猗嗟孌叶龍眷反兮清揚婉叶許願反兮舞則選雪戀反兮射則貫叶扃縣反兮四矢反叶孚絢反兮以禦亂叶靈眷反兮集傳賦也孌好貌清目之美也揚睂之美也婉亦好貌王氏安石曰婉好睂目也選異於衆也孔氏穎達曰舞能勝人倫等之中上選也或曰齊於樂節也毛氏萇曰選齊薛氏漢曰言其舞則應雅樂也貫中而貫革也李氏樗曰大射禮曰不貫不釋四矢禮射每發四矢反復也中皆得其故處也鄭氏康成曰禮射三而止每射四矢皆得其故處此之謂復射必四矢者象其能禦四方之亂也言莊公射藝之精可以禦亂如以金僕姑射南宮長萬可見矣許氏謙曰左氏傳莊公十年齊桓公宋閔公伐魯戰于乗邱公以金僕姑射南宮長萬金僕姑矢名長萬宋大夫集說范氏祖禹曰射足以禦亂而禮不足以防淫故卒章深疾之蘇氏轍曰君子之於射也將安用之亦以禦亂焉耳今莊公徒以為技而已季氏本曰清揚婉孌容貌羙也舞則選兮禮度習也貫革之射足以禦亂技藝精也王氏志長曰不出正兮言其巧也射則貫兮言其力也四矢反兮巧之中又有巧焉所以詳言其射之臧也總論謝氏枋得曰一章射則善矣德則未見其善亦可惜也二章誠是我齊國之甥今人乃以為齊侯之子亦可惜也三章莊公善射似可以禦亂也齊侯文姜之淫亂則無策以禦之亦可惜也劉氏瑾曰射則臧不出正舞則選四矢反皆技藝之美其餘所言皆威儀之美猗嗟三章章六句集傳或曰子可以制母乎趙子曰夫死從子通乎其下況國君乎君者人神之主風敎之本也不能正家如正國何若莊公者哀痛以思父誠敬以事母威刑以馭下車馬僕從莫不俟命夫人徒往乎夫人之往也則公哀敬之不至威命之不行耳輔氏廣曰趙子匡之說義理之正聖賢復生不可易也東萊呂氏曰此詩三章譏刺之意皆在言外嗟歎再三則莊公所大闕者不言可見矣集說孔氏穎達曰此詩以其齊人所作故繫之於齊李氏樗曰夫子曰君子多乎哉不多也後世乃專心於此而忘其本故莊公有威儀技藝而不免猗嗟之刺昭公習儀以亟而不能止乾侯之禍雖多材藝而不能務本何所補哉嚴氏粲曰變風之體意在言外有全篇首尾皆託之他詞但中間冷下一二語自然使人黙會如此詩自猗嗟而下句句稱美處節節是歎息不滿處詞不急迫而意深切矣齊國十一篇三十四章一百四十三句集說許氏謙曰齊自太公十二世至襄公齊詩十一篇惟南山敝笱載驅猗嗟四篇為襄公詩餘不可考朱氏公遷曰齊俗惟以射獵輕儇相尚淫奔之事惟東方之日一篇而已民閒荒穢未甚也襄公之惡聖人著之而魯桓莊之醜亦有不可掩者雖父母之國不可諱也魏一之九集傳魏國名本舜禹故都孔氏穎達曰舜都蒲坂禹都平陽或安邑皆屬河東然則魏都河北蒲坂安邑皆偪近之謂境内有其都爾魏不居其墟也在禹貢冀州雷首之北析城之西孔氏穎達曰禹貢云壺口雷首至于太岳底柱析城至于王屋地理志云雷首在蒲坂南析城在濩澤西南皆在河東界内是其屬冀州也南枕之鴆反河曲北涉汾水孔氏穎達曰地理志云魏在晉之南河曲故其詩曰彼汾一曲寘諸河之干兮是南枕河曲也汾沮洳曰彼汾沮洳言采其莫明其境踰汾矣故知北涉汾水其地陿隘而民貧俗儉蓋有聖賢之遺風焉呂氏祖謙曰水經注故魏國城南西竝去大河可二十餘里北去首山十餘里處河山之閒土地迫隘周初以封同姓孔氏穎達曰左傳曰虞虢焦滑霍楊韓魏皆姬姓也魏世家絶不知所封為誰後為晉獻公所滅而取其地今河中府解下買反州即其地也皇輿表河中府解州今平陽府解州隸山西蘇氏曰魏地入晉久矣其詩疑皆為晉而作故列於唐風之前猶邶鄘之於衛也蘇氏轍曰邶鄘者衛之所滅也魏者晉之所滅檜者鄭之所滅也檜詩不為鄭而邶鄘為衛魏為晉何也邶鄘魏之詩作於既滅其詩所為作者衛晉也至於檜風檜之未亡而作也今案篇中公行戸郎反公路公族皆晉官疑實晉詩又恐魏亦嘗有此官蓋不可考矣集說鄭氏康成曰昔舜耕於歴山陶於河濵禹菲飲食惡衣服卑宮室此一帝一王儉約之化於時猶存及今魏君嗇且褊急不務廣修徳於民敎以義方其與秦晉鄰國日見侵削國人憂之當周平桓之世魏之變風始作至春秋魯閔公元年晉獻公竟滅之以其地賜大夫畢萬自爾而後晉有魏氏孔氏穎達曰閔公以前魏國尚存故平桓之世得作詩也魏無世家而鄭云葛屨至十畝之閒為一君伐檀碩䑕為一君者以上五篇刺儉下二篇刺貪其事相反故分為異君或父祖或子孫不可知曹氏粹中曰畢萬畢公高之後也魏晉皆有儉嗇之風然其詩若作在晉獻公幷吞已後則其俗漸已荒侈此詩每刺其君儉勤故知其作詩在未幷於晉以前也然序皆不著其時君無得而知之朱氏公遷曰魏詩為晉而作似矣然國小無政似非晉事儉嗇褊急與勤儉質朴亦不同直以為晉詩不可也故蘇氏朱子之說皆有疑字糾糾吉黝反葛屨可以履霜摻摻所銜反女手可以縫裳要於遙反之襋紀力反之好人服叶蒲北反之集傳興也糾糾繚戾寒涼之意夏葛屨冬皮屨孔氏穎達曰夏日之有葛屨猶絺綌所以當暑特為便於時耳非行禮之服若行禮雖夏猶當用皮摻摻猶纖纖也孔氏穎達曰摻摻為女手之狀則為纖細之貌古詩云纖纖出素手是也女婦未廟見音現之稱也娶婦三月廟見然後執婦功孔氏穎達曰三月廟見謂無舅姑者婦入三月乃見於舅姑之廟若有舅姑則士昏禮云質明贊見婦於舅姑不待三月也雖即見舅姑亦三月乃助祭行未祭行亦未成婦也要裳要襋衣領好人猶大人也黄氏佐曰猶今言大人不當親細事耳魏地陿隘其俗儉嗇而褊急故以葛屨履霜起興而刺其使女縫裳又使治其要襋而遂服之也此詩疑即縫裳之女所作集說蘇氏轍曰葛屨而以履霜及其暑也將安用矣婦之未廟見也而使之縫裳及其成為婦也將安使之矣輔氏廣曰糾糾葛屨本非可以履霜然自儉嗇者言之則亦可用以履霜矣以興摻摻女手本未可以縫裳然自褊急者言之則亦可使之縫裳矣夫人之情儉嗇者必褊急褊急而不已則較計瑣屑務省而不適宜謀利而不顧禮將無所不至矣所以不但使女縫裳而又使之治其要襋而遂服之也好人提提徒兮反宛於阮反然左辟音避佩其象揥勅帝反維是褊心是以為刺叶音砌集傳賦也提提安舒之意宛然讓之貌也嚴氏粲曰宛委曲遜順貌讓而辟者必左徐氏鳯彩曰古人以右為尊故讓者辟右就左大人之儀容也揥所以摘音剔髪用象為之貴者之飾也其人如此若無有可刺矣所以刺之者以其褊迫急促如前章之云耳集說輔氏廣曰此章刺其内外表裏之不相副嚴氏粲曰尊貴之人其容止提提然安徐而審諦其辭讓而左辟也其儀宛然而遜順又以象骨為搔首之揥而佩之其威儀服飾之羙無可譏者獨其中之褊急為可刺耳好人泛言尊貴者不欲斥其君也張氏彩曰言其容止以見其知禮言其服飾以見其居人上夫禮不豐不殺惟其稱耳國人不足責矣今居上位而閑於禮者猶且褊狹迫促若此抑獨何哉總論范氏祖禹曰魏俗所以機巧趨利如此者君心之所為也故是詩惟刺其褊朱氏謀㙔曰曰左辟曰象揥貴者飾也冬服夏屨女執婦功在貧賤可耳貴者之家則固陋矣王氏志長曰葛屨履霜儉也女手縫裳勤也勤與儉立國之先務也何刺焉曰為國以禮禮者上下有章而已矣當時魏之卿大夫皆習其君之敎而為此褊急無禮之行故以為刺也佩其象揥則非士庶已下可知汾沮洳云殊異乎公路殊異乎公族風人之意蓋昭然矣不然風之趨於奢與惰也若水之就下也而謂聖人汲汲以刺褊立敎令奢與惰者得藉口哉葛屨二章一章六句一章五句集傳廣漢張氏曰夫子謂與其奢也寧儉則儉雖失中本非惡德然而儉之過則至於吝嗇迫隘計較分毫之閒而謀利之心始急矣葛屨汾沮洳園有桃三詩皆言急迫瑣碎之意集說輔氏廣曰儉本非惡德故葛屨汾沮洳二詩雖有所刺而必先言其美好也彼汾扶云反沮子豫反洳如豫反言采其莫音慕彼其音記之子美無度美無度殊異乎公路集傳興也汾水名出太原晉陽山西南入河王氏應麟曰水經汾水西至汾陰縣北西入于河入河之處即魏之舊國沮洳水浸處下濕之地莫菜也似柳葉厚而長有毛刺可為羮孔氏穎達曰陸璣疏云莫莖大如箸赤節節一葉今人繅以取繭緒其味酢而滑五方通謂之酸迷河汾之閒謂之莫無度言不可以尺寸量也孔氏穎達曰宛丘云游蕩無度賔之初筵云飲酒無度皆謂無節度也此不得為美無節度故為無復度限也公路者掌公之路車晉以卿大夫之庶子為之此亦刺儉不中禮之詩言若此人者美則美矣然其儉嗇褊急之態殊不似貴人也集說鄭氏康成曰於彼汾水漸洳之中采其莫以為菜是儉以能勤是子之德美信無度矣雖然其采莫之事則非公路之禮也蘇氏轍曰汾水出於晉其流及魏涉汾而采莫其儉信美而非法也朱氏道行曰采莫者必因其地貴介者必稱其望兩相因而不相違也彼其之子居養優崇而趨纖襲陋文物之不嫻而狹隘之是甘不意官公路者所為若此殊可異也徐氏鳯彩曰以賤草生下地猶有微美可採興之子有美而不足觀彼汾一方言采其桑彼其之子美如英叶於良反美如英殊異乎公行戸郎反集傳興也一方彼一方也史記扁鵲視見垣一方人史記扁鵲傳扁鵲姓秦氏名越人遇長桑君出其懷中藥予扁鵲飲是以上池之水扁鵲飲藥三十日視見垣一方人以此視病盡見五藏癥音徵結司馬貞注方猶邊也言能隔牆見彼邊之人劉氏瑾曰垣一方猶此詩言汾一方古語皆然也英華也公行即公路也以其主兵車之行列故謂之公行也孔氏穎達曰公路與公行一也宣二年左傳云晉成公立乃宧卿之適以為公族其庶子為公行趙盾請以括為公族公許之冬趙盾為軞音毛車之族是其事也趙盾自以為庶子讓公族而為公行服䖍云軞車戎車之倅杜預云公行之官是也彼汾一曲言采其藚音續彼其之子美如玉羙如玉殊異乎公族集傳興也一曲謂水曲流處藚水舄音昔也葉如車前草孔氏穎達曰郭璞云水蕮如續斷寸寸有節拔之可復陸璣疏云今澤蕮也公族掌公之宗族晉以卿大夫之適子為之孔氏穎達曰成十八年左傳曰晉荀會欒黶音黯韓無忌為公族大夫使訓卿之子弟是公族主君之同姓也此公族公行諸侯之官故魏晉有之周禮六官皆無公族公行之官是天子諸侯異禮也集說黄氏佐曰如玉亦當自著於外者言之公族比公路公行為貴故一詩之意自輕而重也總論輔氏廣曰沮洳一方一曲皆言其小也魏之俗吝嗇褊急不中禮節故雖公路公行公族之官而或自采莫采桑采藚於汾水之側故因以起興言若而人者美則美矣然其所為儉不中禮屑為卑下之事殊不似夫貴人也所謂美無度如英如玉者亦猶葛屨末章之首所言耳夫儉以能勤而不顧禮則苟可以得者無不為也采莫采桑詩人特舉其一事耳然則作此詩者蓋生乎其時而不溺其習者也許氏謙曰公路公行公族大夫也采莫采桑采藚細民之事也大夫而為細民之事是急於利而用心褊也彼其之子雖美奈奪民之利何此其所以興刺也汾沮洳三章章六句集說范氏處義曰是詩疑為晉詩蓋儉而不中禮既近於蟋蟀之所刺汾水又出於晉公族亦為晉官豈晉既幷魏之後得此詩於魏之故地歟朱氏公遷曰此與前篇可謂知君子之大體園有桃其實之殽心之憂矣我歌且謠音遥不知我者謂我士也驕彼人是哉叶將黎反子曰何其音基心之憂矣其誰知之其誰知之蓋亦勿思叶新齎反集傳興也殽食也合曲曰歌徒歌曰謡孔氏穎達曰釋樂云徒歌謂之謡謡既徒歌則歌不徒矣故曰曲合樂曰歌樂即琴瑟行葦傳曰歌者合於琴瑟也歌謡對文如此散則歌為總名未必合樂也其語辭張氏彩曰何其猶檀弓言何居蓋述譏已者反問之詞言不喻其志也詩人憂其國小而無政故作是詩言園有桃則其實之殽矣心有憂則我歌且謡矣然不知我之心者見其歌謡而反以為驕王氏安石曰儉而非之則疑於驕輔氏廣曰居褊急之時則以憂世而歌謡者為驕且曰彼之所為已是矣而子之言獨何為哉蓋舉國之人莫覺其非而反以憂之者為驕也於是憂者重嗟歎之以為此之可憂初不難知彼之非我特未之思耳誠思之則將不暇非我而自憂矣朱子曰或云比也園有桃則食其實國有民則用其力或云賦也詩固有一章而三義者在人觀之如何耳集說程子曰觀此詩可見其憂深思逺矣桃果之賤者園有桃亦用其實以為殽興國有民雖寡能用則治今不能用其民故心憂之至歌且謡重言人不知者不思耳其情至深切也季氏本曰士未仕之稱驕者以其輕世肆志而言彼人指當國之人也以當國者為是則同流合汚之類所以為不知我也呂氏柟曰如其思之則知所以用其民者蓋在德敎而不在區區之小儉矣必不以我憂為非也顧氏夢麟曰歌而且謠者只是不一歌而足之意自此以下每二句為一轉既訴已之難懷亦望人之有悟園有棘其實之食心之憂矣聊以行國叶于逼反不知我者謂我士也罔極彼人是哉子曰何其心之憂矣其誰知之其誰知之蓋亦勿思集傳興也棘棗之短者聊且略之辭歌謡之不足則出遊於國中而寫憂也極至也罔極言其心縱恣無所至極范氏祖禹曰謂我士也罔極言責君無已也集說輔氏廣曰聊以出遊寫其憂正以其無可告語者故耳罔極則不止以為驕也重言人不知為不思者猶欲其反思以得其是非之正也總論季氏本曰此詩言當國者無意於治所以憂世者不能不切於心也然不知我者謂我乃士也而驕縱無極以其無志不以世道為憂故不思也思則必能知我憂世之心矣錢氏天錫曰興意與前篇同亦興之兼賦者也所云國小無政只是安於儉嗇固陋而不知經制之大振起之謀也園有桃二章章十二句集說輔氏廣曰黍離之憂憂王室之已覆也園有桃之憂憂魏國之將亡也憂其已覆而不我知則亦已矣憂其將亡而不我知則欲其思之者亦宜也嚴氏粲曰陳國區區而衡門欲誘掖其君檜至微矣而羔裘欲其君自強於政治與園有桃詩意同蓋國無不可為患其君不能為耳此孟子告滕文公之意也陟彼岵音戸兮瞻望父兮父曰嗟予子行役夙夜無已上愼旃哉猶來無止集傳賦也山無草木曰岵孔氏穎達曰釋山云多草木岵無草木屺傳言無草木曰岵下云有草木曰屺與爾雅正反當是傳寫誤也上猶尚也孝子行役不忘其親故登山以望其父之所在因想像其父念已之言曰嗟乎我之子行役夙夜勤勞不得止息又祝之曰庶幾愼之哉猶可以來歸無止於彼而不來也鍾氏惺曰猶來者不敢必之詞愼心所發也蓋生則必歸死則止而不來矣或曰止獲也言無為人所獲也李氏樗曰左傳莊九年秦子梁子以公旗避於下道是以皆止是古者見獲於敵皆謂之止集說張氏栻曰直述所以念父之意未若思父所以念已之心之為深切也輔氏廣曰行旅之人登陟高處可以眺望則必有思慕鄉里親舊之心昔狄仁傑登大行山望白雲而思其親之在下者是也鄒氏忠𦙍曰男子生而志四方東西南北惟命是從者亦往役之義則然然采薇以公義言故曰我行不來陟岵以私情言故曰猶來無止陟彼屺音起兮瞻望母叶滿彼反兮母曰嗟予季行役夙夜無寐上愼旃哉猶來無棄集傳賦也山有草木曰屺季少子也尤憐愛少子者婦人之情也無寐亦言其勞之甚也李氏公凱曰夙夜無寐無暇眠也棄謂死而棄其尸也附錄呂氏祖謙曰母尚恩故曰無棄言無棄母而不歸也陟彼岡兮瞻望兄叶虛王反兮兄曰嗟予弟行役夙夜必偕叶舉里反上愼旃哉猶來無死叶想止反集傳賦也山脊曰岡陳氏鵬飛曰岵也屺也岡也皆山之高處而可以瞻望者詩人各取其一以協韻耳必偕言與其儕同作同止不得自如也集說蘇氏轍曰必偕必與同役者偕無獨行也錢氏天錫曰夙夜必偕見離我同胞而與同儕為侶也總論輔氏廣曰既思其父又思其母又思其兄既想像其念已之言又想像其祝已之言曰庶幾其謹之哉則斯人也必能以其親之心為心亦可謂賢矣劉氏瑾曰詩人以已之思親而知親之念已雖曰設為親念已之言實以深寓已念親之心也章末二語所以自警亦所以自悲可以見其忠孝之心矣朱氏公遷曰三章皆以愼言則凡所以謹其身者宜無不至矣陟岵三章章六句集說曾氏鞏曰先王之世上之所以接下惟恐失其養父母之心其勞使臣之辭則然而推至於戍役之人亦勞之以王事靡盬憂我父母則先王之政即人之心莫大於此也及其後世或任使不均或苦於征役而不得養父母則有北山之感鴇羽之嗟或行役不已而父母兄弟離散則有陟岵之思詩人皆推其意見於國風所謂發乎情止乎禮義者也朱氏公遷曰觀陟岵而魏之所以役其民者可知觀碩鼠而魏之所以賦其民者可見十畝之閒叶居賢反兮桑者閑閑叶胡田反兮行與子還叶音旋兮集傳賦也十畝之閒郊外所受場圃之地也張子曰周制國郛之外有聽為場圃之地者疑家授十畝以毓草木胡氏紹曾曰畝古作畮司馬法云六尺為步步百為畮畮百為夫閑閑往來者自得之貌行猶將也還猶歸也孔氏穎達曰還兮相呼而共歸下云逝兮相呼而共往政亂國危賢者不樂仕於其朝而思與其友歸於農圃故其詞如此集說蘇氏轍曰雖有十畝之田桑者閑閑其可樂也行與子歸居之夫有十畝之田其所以為樂者亦鮮矣而可以易仕之樂則仕之不可樂也甚矣黄氏佐曰場圃之地即冬築之以為場而納禾稼春治之以為圃而毓草木者閑閑固是往來自得其實有黜陟不知理亂不聞意十畝之外叶五墜反兮桑者泄泄以世反兮行與子逝兮集傳賦也十畝之外鄰圃也泄泄猶閑閑也逝往也集說朱氏道行曰言外則益廣泄泄舒而不迫意曰逝則長往不返矣總論輔氏廣曰危邦不入亂邦不居君子仕止之常法也使賢者以場圃之採桑者為自得而思與其友歸焉則其不樂仕之意可見矣黄氏佐曰先言我之圃次言鄰之圃逝為往彼之辭或相與旋歸或相與偕往皆見閑暇無所事也姚氏舜牧曰曰十畝之閒又曰十畝之外曰桑者閑閑又曰桑者泄泄蓋深嫉朝市之莫可居而欲飄然於風塵之外也仕者之心如是豈世道之福哉十畝之閒二章章三句集說呂氏祖謙曰横渠指桑地為場圃合於古制但又謂魏地侵削外無井受之田徒有近郭園廛而已則似不然果如是民將何所食乎政使周制果家賦園廛十畝魏既削小豈容尚守古法容或數家共之也況詩所謂十畝者特甚言之爾未可以為定數也姚氏舜牧曰細玩魏之詩見魏之俗尚大抵以褊急勝君子不欲仕而樂就桑者之閑閑小人不欲居而甘就樂土之得所則其時其政蓋可知已坎坎伐檀叶徒沿反兮寘之河之干叶居焉反兮河水清且漣力㕓反猗於宜反不稼不穡胡取禾三百廛直連反兮不狩不獵胡瞻爾庭有縣音𤣥貆音暄兮彼君子兮不素餐七丹反叶七宣反兮集傳賦也坎坎用力之聲曹氏粹中曰檀木堅韌故伐之之聲坎坎然非若丁丁之易也檀木可為車者寘與置同干厓也孔氏穎達曰易漸卦鴻漸于干注云干謂大水之傍故停水處與此同也漣風行水成文也孔氏穎達曰釋水云河水清且瀾猗大波為瀾漣瀾雖異而義同猗與兮同語詞也書斷斷猗大學作兮莊子亦云而我猶為人猗是也種之曰稼斂之曰穡許氏愼曰禾之秀實為稼榖可收曰穡孔氏穎達曰以稼穡相對皆先稼後穡故知種之曰稼斂之曰穡若散則相通大田云曾孫之稼非唯種之也湯誓云舍我穡事非唯斂之也胡何也一夫所居曰廛孔氏穎達曰一夫之居曰廛謂一夫之田百畝也地官遂人云夫一廛田百畝揚子云有田一廛與此傳同也曹氏粹中曰三百廛為田三萬畝以漢志凖之畝收一石有半三百廛之所收當四萬五千石下章三百億其數與三百廛甚相遼絶故知詩人情性之言亦不甚拘於名數也狩亦獵也鄭氏康成曰冬獵曰狩宵田曰獵孔氏穎達曰此對文耳散即獵通於晝夜狩兼於四時若周禮云大田獵王制云佐車止則百姓田獵不必皆宵田也駟驖云從公于狩未必皆冬獵也貆貉類鄭氏康成曰貉子曰貆素空餐食也詩人言有人於此用力伐檀將以為車而行陸也今乃寘之河干則河水清漣而無所用雖欲自食其力而不可得矣然其志則自以為不耕則不可以得禾不獵則不可以得獸是以甘心窮餓而不悔也詩人述其事而歎之以為是眞能不空食者後世若徐穉之流非其力不食其厲志蓋如此劉氏瑾曰後漢徐孺子家貧常自耕稼非其力不食蓋其厲志之勤必欲服勞而後食亦若此詩賢者之志也集說輔氏廣曰不稼不穡則不可以得粒食不狩不獵則不可以得鮮食人之所食雖多而此二者為大故舉而言之所謂甘心窮餓而不悔者詩中雖無此意然觀其志之所存如此而詩人又以為眞能不素餐者則必當有是事矣嚴氏粲曰伐檀則供勞賤之役河干則在寂寞之濵賢者不得其所矣然其心無入而不自得故見河水之清漣而玩而樂之不戚戚於得喪也曹氏居貞曰伐檀而寘之河之干此勞於事而不得以食其力者也然天下之事固有為其事而無其功者未有不為其事而能有其功者矣君子之心寧勞而無功必不肯無功而食人之食此先難後獲之意也附錄鄭氏康成曰謂君子之人不得進仕在位貪鄙無功而受祿也彼君子者斥伐檀之人仕有功乃肯受祿呂氏祖謙曰坎坎伐檀寘之河干悠然遺佚而不怨阨窮而不閔者也國人見君子在下者如此小人在位者如彼乃責之曰汝未嘗稼穡禾何為而積汝未嘗狩獵貆何為而來獨不見夫彼河干之君子義不素餐親伐檀以自食者乎此特旁觀者之辭若所謂伐檀之君子方且陶陶不改其樂豈較短量長者哉坎坎伐輻音福叶筆力反兮寘之河之側叶莊力反兮河水清且直猗不稼不穡胡取禾三百億兮不狩不獵胡瞻爾庭有縣特兮彼君子兮不素食兮集傳賦也輻車輻也伐木以為輻也毛氏萇曰輻檀輻也季氏本曰輻在車輪中輳轂者老子所謂三十輻共一轂也亦伐檀為之直波文之直也毛氏萇曰直直波也蘇氏轍曰水平則流直十萬曰億蓋言禾秉之數也孔氏穎達曰三百億與三百廛三百囷相類若為釡斛之數則大多不類故為禾秉之數秉把也謂刈禾之把數也獸三歲曰特坎坎伐輪兮寘之河之漘順倫反兮河水清且淪猗不稼不穡胡取禾三百囷邱倫反兮不狩不獵胡瞻爾庭有縣鶉音純兮彼君子兮不素飧素門反叶素倫反兮集傳賦也輪車輪也伐木以為輪也毛氏萇曰檀可以為輪淪小風水成文轉如輪也陸氏德明曰韓詩云順流而風曰淪淪文貌黄氏一正曰淪小波相次有倫理也囷圓倉也鶉䳺屬熟食曰飧孔氏穎達曰說文云飧水澆飯也總論劉氏瑾曰有勞心而得食者有勞力而得食者有躬耕而自食者豈必人人自耕以食哉但不可無其事而食其食耳伐檀君子意正如此故詩人美其甘貧樂賤雖不見用而不苟食也黄氏佐曰此詩三章意思相近重自厲其志上易曰頤貞吉觀頤自求口實頤貞吉養正則吉也觀頤觀其所養也自求口實觀其自養也口體之養曰自求者反觀於己考其善不善也德之養在其中矣伐檀君子以之附錄范氏處義曰詩人本以是詩刺貪謂在位者皆貪鄙之人無功而得祿而君子乃不得進仕失其所矣非謂君子自為伐檀之事也黄氏櫄曰言君子有其功而無其祿小人有其祿而無其功因取物理之倒置者言之坎坎伐檀反寘之河之干而不稼不穡不狩不獵反有禾貆特鶉之富其文意易明不必以艱深而求之也案朱子注此詩謂伐檀之人欲自食其力而不可得則寧甘窮餓而不悔詩人因歎其為不素餐之君子蓋全就一人之厲志上說而以古序為未得詩指固已然考孟子之荅公孫丑君子不耕而食之問也曰其君用之則安富尊榮其子弟從之則孝弟忠信不素餐兮孰大於是朱子注云詩魏國風伐檀之篇無功而食祿謂之素餐則仍節取序說矣故錄鄭呂二說以存古義之大略云伐檀三章章九句集說朱氏道行曰讀十畝知士不貪位讀伐檀知士不慕祿有先王遺風碩鼠碩鼠無食我黍三歲貫古患反女音汝莫我肯顧叶果五反逝將去女適彼樂音洛下同土樂土樂土爰得我所集傳比也碩大也孔氏穎達曰釋獸於鼠屬有鼫鼠孫炎曰五技鼠郭璞曰大鼠好在田中食粟豆舍人樊光同引此詩以鼫鼠為彼五技之鼠也許愼云鼫鼠五技能飛不能上屋能游不能渡谷能緣不能窮木能走不能先人能穴不能覆身陸璣疏云今河東有大鼠食人禾苖亦有五技或謂之雀鼠其形大故序云大鼠也魏國今河北縣是也言其方物宜謂此鼠非鼫鼠也案此經作碩鼠訓之為六不作鼫鼠之字其義或如陸言也三歲言其久也貫習黄氏佐曰貫訓習謂久而熟事之也顧念逝往也樂土有道之國也爰於也民困於貪殘之政故託言大鼠害己而去之也集說輔氏廣曰三歲貫女則民之於上至矣莫我肯顧則上之於民甚矣於是而決去焉非民之罪也嚴氏粲曰言魏國用此重斂之人已三歲矣我今將去女而適彼樂土謂適有道之國也連稱樂土者喜樂於彼以見其厭苦於此也碩鼠碩鼠無食我麥叶訖力反三歲貫女莫我肯德逝將去女適彼樂國叶于逼反樂國樂國爰得我直集傳比也德歸恩也嚴氏粲曰不肯德惠我也直猶宜也黄氏佐曰直訓宜者久抑於此得伸其志於彼與之相宜也集說姚氏舜牧曰元元赤子全賴長我者之顧復取之盡錙銖而略不一軫顧焉秦越人之視也民寧不轉而之他哉居上者導利惠民上之直也居下者安生樂業下之直也爰得我直蓋謂此可以安生樂業云爾碩鼠碩鼠無食我苖叶音毛三歲貫女莫我肯勞逝將去女適彼樂郊叶音高樂郊樂郊誰之永號戸毛反集傳比也勞勤苦也謂不以我為勤勞也永號長呼也言既往樂郊則無復有害已者當復為誰而永號乎集說張氏栻曰國人疾之甚而欲去之而著其情於詩乃其所未忍絶者也誰之永號謂我將去爾而適樂郊當誰復永號於爾之土者乎此則尤可見其情也嚴氏粲曰魏人為爾重斂所迫至於長號彼樂郊則誰長號乎謂無歎息愁恨之聲也謝氏枋得曰食黍不足而食麥食麥不足而食苖苗者禾方樹而未秀也食至於此其貪甚矣總論輔氏廣曰首章冀得其所次章冀適其宜末章則冀其得免於永號而已讀碩鼠之詩固當知民之情不可以久隳而又當知民之情亦無敢有過求也季氏本曰民苦虐政不得已而欲歸仁當此時賢者不能不避地况於凡民乎其情亦可閔矣碩鼠三章章八句集說嚴氏粲曰碩鼠指聚斂之臣即伐檀序所言在位貪鄙者也此軰奉承其君以重斂於民故曰三歲貫女謂其君任用此人而吾事之已三嵗矣國史題其事於篇端但曰刺重斂耳其後說詩者乃以為刺其君若大鼠程子謂序有失詩之意者此類是也臣之奉行由君政使然謂刺其君重斂可也便以碩鼠為稱其君不可也魏國七篇十八章一百二十八句集說輔氏廣曰寛裕者其流長急迫者其意短魏以地陿而褊急如此其何以傳世至於長久哉故變風作於平桓之世而國遂滅於惠公之十七年止五六十年閒耳詩人之意固憂之矣嚴氏粲曰魏唐無淫詩蓋猶有先代之風化焉朱氏公遷曰陟岵思親孝子也伐檀食力卓行者也園有桃有憂亂之心十畝之閒有去亂之志則皆見幾者也魏雖小國而有賢如此欽定詩經傳說彚纂卷六
